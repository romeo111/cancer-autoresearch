notes: 'PALOMA-3 phase-3 (NCT01942135): palbociclib 125 mg PO + fulvestrant 500 mg
  vs placebo + fulvestrant in HR+/HER2- ABC progressing on prior endocrine therapy
  (n=521). Median PFS 9.2 vs 3.8 mo (HR 0.42; p<0.001). OS update (Turner NEJM 2018):
  mOS 34.9 vs 28.0 mo (HR 0.81; not statistically significant overall, benefit in
  ESR1-WT subgroup). Established CDK4/6i + fulvestrant 2L for HR+/HER2- ABC after
  endocrine progression. NOTE: task brief listed PMID 26947332 — that PMID belongs
  to a separate Turner Lancet Oncol follow-up; primary PALOMA-3 PMID is 26030518 (verified).

