notes: 'KEYNOTE-006 phase-3 (NCT01866319): pembrolizumab Q2W or Q3W vs ipilimumab
  in 1L unresectable/metastatic melanoma (n=834). 6-mo PFS 47% vs 26% (HR 0.58); 12-mo
  OS 74% vs 58% (HR 0.69; p<0.001). 7-yr update (Robert Lancet Oncol 2023): 7-yr OS
  ~37% pembro arms, ~25% ipi arm. Established anti-PD-1 mono as preferred 1L IO for
  melanoma; basis for pembro FDA approval Dec 2015.

