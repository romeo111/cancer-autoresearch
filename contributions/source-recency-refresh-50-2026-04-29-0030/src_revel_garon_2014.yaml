notes: 'REVEL phase-3: docetaxel + ramucirumab vs docetaxel + placebo in 1253 2L NSCLC
  post-platinum (pre-ICI era). mOS 10.5 vs 9.1 mo (HR 0.86, p=0.023); mPFS 4.5 vs
  3.0 mo; ORR 23% vs 14%. FDA approval 2014 for doc+ram in 2L NSCLC any histology.
  In modern post-1L chemo+ICI era, doc+ram remains the cytotoxic 2L workhorse; nintedanib
  (LUME-Lung 1) alternative for adenocarcinoma; single-agent docetaxel acceptable
  fallback when ramucirumab not accessible.

