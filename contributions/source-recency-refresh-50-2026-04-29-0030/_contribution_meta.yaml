  notes_for_reviewer: |
    Result:
      32 upserts (HTTP 200 — URL fully reachable from automated HEAD)
      16 HTTP 403 (Forbidden) — likely bot-blocking, not actually dead.
                                 Common on journal publisher sites
                                 (Wiley, Elsevier, etc.) that reject
                                 non-browser User-Agents. Maintainer
                                 should verify in a real browser.
       2 HTTP 404 (Not Found) — actually broken links, need maintainer
                                 to find new URL or mark superseded.

    The 16 × 403 are Type-I false negatives (URL is alive, our check
    couldn't see it). Future refinement: rotate browser-like UAs OR
    use a headless browser for those publishers. For v0.4, flagging
    is sufficient — maintainer review is part of the workflow anyway.

