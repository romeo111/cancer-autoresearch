    Recency-refresh chunk for issue #33. Selected 50 sources weighted by
    (a) staleness (current_as_of age) and (b) citation count from
    BMA/IND/RF entities. Performed real HTTP HEAD check on each
    Source.url via stdlib urllib (User-Agent: TaskTorrent-RecencyCheck/0.4).

    For each reachable source (HTTP 2xx/3xx): upsert sidecar that
    bumps current_as_of to 2026-04-29 + adds last_recency_check +
    recency_check_status_code. No content fields modified.

    For unreachable sources: flagged in unreachable.yaml without upsert
    (do not bump current_as_of when reachability is unconfirmed).

    Worker: `_refresh_worker.py` in this dir (allowlist-compliant audit trail).
