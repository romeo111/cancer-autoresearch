id: BMA-KIT-EXON13-17-GIST
biomarker_id: BIO-KIT
variant_qualifier: exon 13/14 (ATP-binding) or exon 17/18 (activation loop) secondary
  mutation post-imatinib
disease_id: DIS-GIST
escat_tier: IIA
evidence_summary: 'Secondary KIT mutations after imatinib failure cluster in exon
  13/14 (ATP-binding pocket — V654A, T670I) or exon 17/18 (activation loop — D816,
  D820, N822, Y823). Sunitinib (Demetri Lancet 2006) covers exon 13/14 secondaries;
  regorafenib (GRID) provides 3L coverage; ripretinib (INVICTUS) is a switch-control
  inhibitor active across both classes — preferred 4L+.

  '
evidence_summary_ua: 'Secondary KIT мутації after іматиніб failure cluster in exon
  13/14 (ATP-binding pocket — V654A, T670I) or exon 17/18 (activation loop — D816,
  D820, N822, Y823). сунитиніб (Demetri Lancet 2006) covers exon 13/14 secondaries;
  регорафеніб (GRID) provides 3L coverage; ripretinib (INVICTUS) is a switch-control
  інгібітор active across both classes — переважний 4L+.

  '
