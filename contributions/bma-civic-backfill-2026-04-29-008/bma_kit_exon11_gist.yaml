id: BMA-KIT-EXON11-GIST
biomarker_id: BIO-KIT
variant_qualifier: exon 11 deletion / insertion (juxtamembrane domain — ~50% of GIST)
disease_id: DIS-GIST
escat_tier: IA
evidence_summary: 'KIT exon 11 mutation in GIST: imatinib 400 mg/day is standard 1L
  (B2222, Demetri NEJM 2002 — ORR 67%; EORTC-62005 / S0033 confirmed long-term benefit).
  Exon 11 mutants have the longest PFS and OS on imatinib of any GIST genotype. Adjuvant
  imatinib 3 yr post- resection improves RFS in high-risk disease (SSG-XVIII / ACOSOG-Z9001).

  '
evidence_summary_ua: 'KIT exon 11 мутація in GIST: іматиніб 400 mg/day is стандарт
  1L (B2222, Demetri NEJM 2002 — ORR 67%; EORTC-62005 / S0033 confirmed long-term
  виграш). Exon 11 mutants have the longest PFS and OS on іматиніб of any GIST генотип.
  ад''ювантний іматиніб 3 рік post- resection покращує RFS in високого ризику хвороба
  (SSG-XVIII / ACOSOG-Z9001).

  '
