evidence_summary: 'BRCA1 germline pathogenic variants in advanced epithelial ovarian
  carcinoma (incl. fallopian-tube and primary peritoneal): olaparib maintenance after
  platinum-response in 1L (SOLO1, Moore 2018) yields ~70% reduction in progression
  risk; niraparib (NOVA, Mirza 2016) and rucaparib (ARIEL3) extend PFS in platinum-sensitive
  recurrence. ESCAT IA / OncoKB Level 1.

  '
evidence_summary_ua: 'BRCA1 герміногенний патогенний варіанти in поширений epithelial
  ovarian карцинома (incl. fallopian-tube and primary peritoneal): олапариб підтримка
  after platinum-відповідь in 1L (SOLO1, Moore 2018) yields ~70% зниження in прогресування
  risk; нірапариб (NOVA, Mirza 2016) and рукапариб (ARIEL3) extend PFS in platinum-sensitive
  рецидив. ESCAT IA / OncoKB рівень 1.

  '
