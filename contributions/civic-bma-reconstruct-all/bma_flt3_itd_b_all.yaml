evidence_summary: 'FLT3-ITD in B-ALL is rare (~1-3% adult; enriched in MLL/KMT2A-
  rearranged infant ALL). Gilteritinib and midostaurin have basket activity in FLT3-mutant
  ALL but no phase-3 evidence. Tumor-agnostic FLT3i actionability is informed by AML
  data; specific B-ALL trials pending.

  '
evidence_summary_ua: 'FLT3-ITD in B-ALL is рідкісний (~1-3% дорослий; enriched in
  MLL/KMT2A- перебудований infant ALL). гілтеритиніб and мідостаурин have basket activity
  in FLT3-mutant ALL but ні phase-3 докази. пухлина-agnostic FLT3i actionability is
  informed by AML дані; specific B-ALL trials pending.

  '
