evidence_summary: 'FLT3-F691L is a gatekeeper mutation arising under FLT3-TKI selective
  pressure (gilteritinib, quizartinib). Confers cross-resistance to most current FLT3i.
  Crenolanib (investigational type-I) and next-gen FLT3i retain partial activity.
  No approved targeted option — clinical trial enrollment or salvage chemo + allo-SCT.

  '
