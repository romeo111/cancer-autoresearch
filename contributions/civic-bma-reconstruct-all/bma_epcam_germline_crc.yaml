evidence_summary: 'EPCAM germline deletion (3'' end) silences downstream MSH2 by promoter
  hypermethylation → Lynch syndrome with isolated MSH2/MSH6 protein loss on IHC. Treat
  as MSH2-equivalent Lynch: pembrolizumab 1L mCRC dMMR (KEYNOTE-177); pan- tumor MSI-H
  ICI eligibility supersedes tumor-specific lines. ESCAT IA / OncoKB Level 1.

  '
