evidence_summary: 'BRCA1 germline pathogenic in HER2-negative metastatic breast (HR+
  or TNBC): olaparib (OlympiAD, Robson 2017) and talazoparib (EMBRACA, Litton 2018)
  improve PFS vs physician-choice chemotherapy. In early-stage high-risk HER2-negative:
  1y adjuvant olaparib improves iDFS and OS (OlympiA, Tutt 2021). ESCAT IA / OncoKB
  Level 1.

  '
