variant_qualifier: fusion / rearrangement (BICC1-FGFR2 most common; ~10-15% intrahepatic
  cholangio)
disease_id: DIS-CHOLANGIOCARCINOMA
escat_tier: IA
evidence_summary: 'FGFR2 fusion in intrahepatic cholangiocarcinoma (~10-15%): pemigatinib
  (FIGHT-202, Abou-Alfa Lancet Oncol 2020 — ORR 36%, mDOR 9.1 mo) and futibatinib
  (FOENIX-CCA2, Goyal NEJM 2023 — ORR 42%, mPFS 9.0 mo) are FDA-approved for previously-treated
  FGFR2-fusion cholangio. Futibatinib is irreversible and has activity against pemigatinib-resistance
  gatekeeper mutations.

  '
evidence_summary_ua: 'FGFR2 злиття in intrahepatic cholangiocarcinoma (~10-15%): pemigatinib
  (FIGHT-202, Abou-Alfa Lancet Oncol 2020 — ORR 36%, mDOR 9.1 міс.) and futibatinib
  (FOENIX-CCA2, Goyal NEJM 2023 — ORR 42%, mPFS 9.0 міс.) are FDA-схвалений для previously-treated
  FGFR2-злиття cholangio. Futibatinib is необоротний and has activity against pemigatinib-resistance
  gatekeeper мутації.

  '
