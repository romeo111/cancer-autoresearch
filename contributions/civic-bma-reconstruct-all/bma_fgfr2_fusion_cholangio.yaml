notes: 'ESCAT IA. OncoKB Level 1. 1L remains gemcitabine + cisplatin ± durvalumab
  (TOPAZ-1). FGFR2-fusion testing recommended at diagnosis by NCCN to plan 2L. Detection:
  RNA-NGS preferred (intronic breakpoints commonly missed by DNA panels). Resistance:
  gatekeeper V564F, molecular brake L617M, kinase-domain N549K — futibatinib retains
  activity vs many of these. Source-gap: SRC-NCCN-HEPATOBILIARY / SRC-FIGHT-202 /
  SRC-FOENIX-CCA2 not yet ingested.

  '
