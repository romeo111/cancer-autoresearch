evidence_summary: 'NOTCH1 activating mutations occur in >50% of T-ALL (HD and PEST
  domains). Gamma-secretase inhibitors (GSI) showed activity but were limited by GI
  toxicity. No GSI is FDA-approved in T-ALL. Standard 1L remains pediatric-inspired
  regimens (BFM, CALGB-10403). MRD-directed nelarabine/PEG-asparaginase per protocol.

  '
