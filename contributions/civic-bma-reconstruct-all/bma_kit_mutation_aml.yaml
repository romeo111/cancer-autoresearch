id: BMA-KIT-MUTATION-AML
biomarker_id: BIO-KIT
variant_qualifier: activating mutation (exon 17 D816V / N822K most common; ~25-30%
  of core-binding-factor AML)
disease_id: DIS-AML
escat_tier: IIA
evidence_summary: 'KIT mutation in core-binding-factor (CBF) AML (t(8;21) / inv(16))
  is enriched (~25-30%) and confers worse OS vs CBF-AML wild-type. Dasatinib + 7+3
  + HiDAC consolidation (CALGB-10801, Marcucci Blood 2020 — CBF-AML setting) is being
  studied; not standard. Avapritinib has activity in D816V-mutant AML basket cohorts
  but no AML approval. ELN 2022 considers KIT mutation in CBF-AML as intermediate/adverse-risk
  modifier within the favorable CBF subset.

  '
evidence_summary_ua: 'KIT мутація in core-binding-factor (CBF) AML (t(8;21) / inv(16))
  is enriched (~25-30%) and confers гірше OS vs CBF-AML wild-type. дазатиніб + 7+3
  + HiDAC консолідація (CALGB-10801, Marcucci Blood 2020 — CBF-AML setting) is being
  studied; not стандарт. Avapritinib has activity in D816V-mutant AML basket cohorts
  but ні AML схвалення. ELN 2022 considers KIT мутація in CBF-AML as intermediate/несприятливий-risk
  modifier within the сприятливий CBF subset.

  '
