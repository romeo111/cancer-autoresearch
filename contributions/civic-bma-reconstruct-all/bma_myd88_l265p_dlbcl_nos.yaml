evidence_summary: 'MYD88 L265P in DLBCL marks the ABC/MCD molecular subtype (Schmitz
  et al. NEJM 2018; Wright Cancer Cell 2020). Ibrutinib improves OS specifically in
  MCD/N1/A53 subtypes when added to R-CHOP (PHOENIX subgroup analysis, Wilson et al.
  Cancer Cell 2021). Not formally approved as biomarker-selected indication in DLBCL;
  basket trials ongoing.

