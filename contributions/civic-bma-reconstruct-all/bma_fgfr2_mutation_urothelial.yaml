evidence_summary: 'FGFR2 fusion / activating mutation in metastatic urothelial carcinoma:
  erdafitinib (BLC2001, Loriot NEJM 2019 — ORR 40%; THOR phase 3, Loriot NEJM 2023
  — OS HR 0.64 vs chemo) is FDA-approved for FGFR2/3-altered locally advanced or metastatic
  urothelial 2L+. FGFR2 alterations less common than FGFR3 in urothelial (~3% vs ~15%).

  '
