evidence_summary: 'BICC1-FGFR2 fusion is the most common FGFR2 fusion partner in intrahepatic
  cholangiocarcinoma. Treatment is identical to gene-level FGFR2-fusion: pemigatinib
  (FIGHT-202) and futibatinib (FOENIX-CCA2). Fusion-partner identity does not currently
  modify TKI selection.

