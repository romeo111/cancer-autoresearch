evidence_summary: 'HGBL with MYC + BCL2 (and/or BCL6) rearrangements (''double-hit''
  / ''triple-hit'') has aggressive course with R-CHOP undercure. DA- EPOCH-R (Petrich
  JCO 2014; Dunleavy Blood 2018) shows superior CR/PFS in single-arm series. Pola-R-CHP
  (POLARIX, Tilly NEJM 2022) approved for DLBCL — DH subgroup analysis numerically
  favorable. CAR-T (axi-cel, liso-cel) effective at 2L+.

  '
