  лімфома (~85%). Drives constitutive BCL2 гіперекспресія. венетоклакс монотерапія
  modest activity in FL (Davids JCO 2017 ORR ~38%); combos with R-CHOP (CONTRALTO)
  and обінутузумаб in дослідження. стандарт 1L (BR, R-CHOP, обінутузумаб + chemo)
  effective regardless of BCL2-R presence.

  '
