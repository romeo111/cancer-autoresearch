notes: 'ESCAT IA / OncoKB Level 1 (BRCA1/2 strongest evidence; other HRR genes Level
  1 by FDA label inclusion but heterogeneous evidence — ATM benefit weakest in PROfound
  subgroup analysis). EAU 2024 more conservative than NCCN on non-BRCA HRR PARP indications
  — documented position difference. Both germline and somatic testing recommended
  at metastatic diagnosis. Source-gap: SRC-PROFOUND, SRC-MAGNITUDE, SRC-PROPEL, SRC-TALAPRO2
  not yet ingested.

