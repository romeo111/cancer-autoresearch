escat_tier: IA
evidence_summary: 'Homologous-recombination-repair (HRR) gene alterations in metastatic
  castration-resistant prostate cancer (mCRPC, ~25% somatic + germline): olaparib
  monotherapy is FDA-approved for BRCA1/2 (and several other HRR genes per FDA label)
  mCRPC after enzalutamide or abiraterone failure based on PROfound (de Bono NEJM
  2020 — cohort A BRCA1/2/ATM mPFS 7.4 vs 3.6 mo, HR 0.34). Niraparib + abiraterone
  acetate (MAGNITUDE Chi JCO 2023) and olaparib + abiraterone (PROpel Clarke NEJM
  Evid 2022) are FDA-approved 1L combinations for HRR- altered mCRPC. Talazoparib
  + enzalutamide (TALAPRO-2 Agarwal Lancet 2023) is FDA-approved for HRR-mutated mCRPC
  1L. Rucaparib has accelerated approval for BRCA1/2 mCRPC post-androgen-receptor-
  targeted therapy (TRITON3) per SRC-NCCN-PROSTATE-2025, SRC-ESMO-PROSTATE-2024, SRC-EAU-PROSTATE-2024.

  '
