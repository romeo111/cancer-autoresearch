evidence_summary: 'EGFR exon 18 G719X (G719A/C/S) is an "uncommon" sensitizing mutation
  (~3% of EGFR-mut NSCLC). Afatinib (LUX-Lung pooled analysis, Yang 2015) shows highest
  activity in G719X; osimertinib also active (UNICORN, Ahn 2022). Often co-occurs
  with S768I or L861Q.

  '
