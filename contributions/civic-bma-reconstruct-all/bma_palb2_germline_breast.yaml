evidence_summary: 'PALB2 germline pathogenic confers BRCA-like breast risk (~50% lifetime).
  Olaparib activity reported in PALB2-mutated breast (Tung TBCRC-048: ORR ~82% in
  HER2-negative metastatic, n=11) but PARPi labels in breast remain BRCA- only. NCCN
  lists PALB2 as a PARPi-eligible mutation off-label. ESCAT IIA / OncoKB Level 3A.

  '
