id: BMA-FLT3-ITD-AML
biomarker_id: BIO-FLT3-ITD
variant_qualifier: internal tandem duplication (juxtamembrane domain — ~25% of AML)
disease_id: DIS-AML
escat_tier: IA
evidence_summary: 'FLT3-ITD in newly-diagnosed AML: midostaurin + 7+3 induction +
  high-dose cytarabine consolidation + maintenance improved OS vs chemo alone in fit
  adults (RATIFY, Stone NEJM 2017 — 4-yr OS HR 0.78). Quizartinib + 7+3 + maintenance
  also superior in QuANTUM-First (Erba Lancet 2023 — 4-yr OS HR 0.78). FLT3-ITD remains
  a poor-risk marker (ELN 2022) when allelic ratio high; allo-SCT in CR1 indicated.

  '
evidence_summary_ua: 'FLT3-ITD in newly-diagnosed AML: мідостаурин + 7+3 індукція
  + high-доза цитарабін консолідація + підтримка покращений OS vs chemo alone in fit
  adults (RATIFY, Stone NEJM 2017 — 4-рік OS HR 0.78). квізартиніб + 7+3 + підтримка
  also перевершує in QuANTUM-First (Erba Lancet 2023 — 4-рік OS HR 0.78). FLT3-ITD
  remains a poor-risk marker (ELN 2022) when allelic ratio high; allo-SCT in CR1 indicated.

  '
