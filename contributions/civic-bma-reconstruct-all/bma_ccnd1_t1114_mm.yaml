evidence_summary: 't(11;14) myeloma (~15-20%) — distinct biology with high BCL2/MCL1
  ratio. Venetoclax monotherapy (M14-032; Kumar Blood 2017 ORR ~40%) and venetoclax
  + dexamethasone (BELLINI subgroup; Kumar Lancet Oncol 2020) active. BELLINI raised
  mortality signal in non-t(11;14) arm — venetoclax is now t(11;14)-selected in MM.
  CANOVA Ph3 (venetoclax + dex vs pomalidomide + dex in t(11;14) R/R MM) read out
  2024.

  '
