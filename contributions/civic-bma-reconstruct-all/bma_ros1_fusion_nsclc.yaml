evidence_summary: 'ROS1 rearrangement in advanced NSCLC: entrectinib (CNS-active)
  and crizotinib have established 1L approvals. Repotrectinib (TRIDENT-1, Drilon 2024)
  demonstrated superior PFS and CNS activity 1L — including activity vs G2032R resistance
  — and is increasingly preferred. Lorlatinib also active off-label.

  '
evidence_summary_ua: 'ROS1 перебудова in поширений NSCLC: ентректиніб (CNS-active)
  and кризотиніб have усталений 1L approvals. репотректиніб (TRIDENT-1, Drilon 2024)
  продемонстровано перевершує PFS and активність в ЦНС 1L — включаючи activity vs
  G2032R resistance — and is increasingly переважний. лорлатиніб also active off-label.

  '
