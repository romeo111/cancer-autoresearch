regulatory_approval:
  fda:
  - ponatinib + chemotherapy — newly diagnosed Ph+ B-ALL (FDA approved 2024)
  - imatinib / dasatinib + chemo — Ph+ B-ALL (FDA approved historically)
  - blinatumomab — relapsed/refractory and MRD+ B-ALL (FDA approved)
  ema:
  - ponatinib — Ph+ ALL (EMA approved)
  - blinatumomab — relapsed/MRD+ B-ALL (EMA approved)
  ukraine: []
recommended_combinations:
- ponatinib + hyper-CVAD (1L)
- dasatinib + blinatumomab (D-ALBA chemo-light)
- imatinib + chemotherapy (1L alternative, lower-resource setting)
- ponatinib + blinatumomab (chemo-free regimen)
contraindicated_monotherapy:
- TKI alone without chemotherapy or immunotherapy backbone (insufficient durability)
