id: BMA-BCR-ABL1-P190-BALL
biomarker_id: BIO-BCR-ABL1
variant_qualifier: p190 (e1a2) — typical Ph+ B-ALL
disease_id: DIS-B-ALL
escat_tier: IA
evidence_summary: 'Ph+ B-ALL (typically p190) requires TKI-incorporating regimens.
  Modern trials (D-ALBA, Foà 2020; GIMEMA LAL2116) show dasatinib + blinatumomab achieves
  molecular CR in >60% with reduced chemotherapy. Ponatinib + hyper-CVAD (Jabbour
  2024) and ponatinib + blinatumomab combos extend this further. TKI selection now
  favors ponatinib for highest molecular-response rates.

  '
evidence_summary_ua: 'Ph+ B-ALL (типово p190) requires TKI-incorporating схеми. Modern
  trials (D-ALBA, Foà 2020; GIMEMA LAL2116) show дазатиніб + блінатумомаб achieves
  molecular CR in >60% with зменшений хіміотерапія. понатиніб + hyper-CVAD (Jabbour
  2024) and понатиніб + блінатумомаб combos extend this further. TKI selection now
  favors понатиніб for найвища molecular-відповідь rates.

  '
