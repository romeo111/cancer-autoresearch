evidence_summary: 'IDH1 R132H — defines IDH-mutant astrocytoma (WHO 2021 grade 2-4)
  and oligodendroglioma (with 1p/19q codeletion). Vorasidenib improved PFS in residual/recurrent
  grade 2 IDH-mut glioma post- resection (INDIGO, Mellinghoff et al. NEJM 2023) —
  FDA-approved 2024. For grade 4 (IDH-mut GBM equivalent) — standard of care still
  RT + TMZ; ivosidenib explored.

  '
