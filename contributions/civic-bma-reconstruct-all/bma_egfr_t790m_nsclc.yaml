# BMA payload — fields match knowledge_base/schemas/biomarker_actionability.py
id: BMA-EGFR-T790M-NSCLC
biomarker_id: BIO-EGFR-MUTATION
variant_qualifier: "T790M"
disease_id: DIS-NSCLC
escat_tier: "IA"
evidence_summary: >
  EGFR T790M is the dominant acquired-resistance mechanism after 1st/2nd-gen
  EGFR-TKI (gefitinib/erlotinib/afatinib). Osimertinib (3rd-gen) is
  active against T790M and is standard 2L (AURA3, Mok et al. 2017).
  In the modern era T790M is rarely encountered de novo since osimertinib
  has moved to 1L; remains relevant after legacy 1L-TKI use.
evidence_summary_ua: >
  EGFR T790M is the dominant набутий-resistance mechanism after 1st/2nd-gen EGFR-TKI (гефітиніб/ерлотиніб/афатиніб). осимертиніб (3rd-gen) is active against T790M and is стандарт 2L (AURA3, Mok et al. 2017). In the modern era T790M is рідко encountered de novo since осимертиніб has moved to 1L; remains relevant after legacy 1L-TKI use.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
