evidence_summary: 'EGFR L858R in advanced NSCLC: osimertinib 1L is standard (FLAURA);
  L858R historically shows somewhat lower TKI response than exon 19 del, prompting
  interest in combination strategies (FLAURA2 chemo combo; MARIPOSA amivantamab+lazertinib).
  Adjuvant osimertinib indicated post resection (ADAURA).

  '
