disease_id: DIS-NSCLC
escat_tier: IA
evidence_summary: 'BRAF V600E in advanced NSCLC (≈1-2% of adenocarcinomas): dabrafenib
  + trametinib gives ORR ~64% in 1L (Planchard et al. Lancet Oncol 2017) and is FDA/EMA-approved
  across lines. Encorafenib + binimetinib (PHAROS, Riely et al. JCO 2023) ORR 75%
  in treatment-naïve, 46% pretreated — also FDA-approved 2023.

  '
evidence_summary_ua: 'BRAF V600E in поширений NSCLC (≈1-2% of adenocarcinomas): дабрафеніб
  + траметиніб gives ORR ~64% in 1L (Planchard et al. Lancet Oncol 2017) and is FDA/схвалений
  EMA across lines. енкорафеніб + біниметиніб (PHAROS, Riely et al. JCO 2023) ORR
  75% in без попереднього лікування, 46% pretreated — also схвалений FDA 2023.

  '
