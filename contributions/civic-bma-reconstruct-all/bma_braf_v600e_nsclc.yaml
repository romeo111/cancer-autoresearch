notes: 'ESCAT IA. OncoKB Level 1. Reflex testing for BRAF V600E in metastatic non-squamous
  NSCLC mandatory. Class 2 (V600 non-E) and Class 3 (kinase-impaired) BRAF mutations
  are NOT covered by these approvals — see separate cells. ICI monotherapy generally
  less effective in BRAF V600E NSCLC than BRAF/MEKi at progression.

  '
