id: BMA-ATM-LOSS-CLL
biomarker_id: BIO-HRR-PANEL
variant_qualifier: ATM loss (11q deletion or somatic mutation)
disease_id: DIS-CLL
escat_tier: IIA
evidence_summary: 'ATM loss in CLL (del(11q) or somatic mutation): historically poor-prognostic
  with chemoimmunotherapy (FCR), but BTK inhibitors (ibrutinib, acalabrutinib, zanubrutinib)
  and venetoclax+obinutuzumab abrogate this risk. Avoid FCR in ATM-deficient CLL.
  ESCAT IIA (treatment-modifying) / OncoKB Level 3A.

  '
evidence_summary_ua: 'ATM loss in CLL (del(11q) or соматичний мутація): historically
  poor-прогностичний with хіміоімунотерапія (FCR), but BTK інгібітори (ібрутиніб,
  акалабрутиніб, занубрутиніб) and венетоклакс+обінутузумаб abrogate this risk. Avoid
  FCR in ATM-deficient CLL. ESCAT IIA (лікування-modifying) / OncoKB рівень 3A.

  '
