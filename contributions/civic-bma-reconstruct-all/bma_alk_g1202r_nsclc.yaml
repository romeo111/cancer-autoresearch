notes: 'OncoKB R1 (FDA-recognized resistance biomarker). ctDNA at progression is preferred
  to detect resistance; tissue rebiopsy if ctDNA negative. Compound mutations G1202R+L1196M
  emerge after lorlatinib — investigate 4th-gen ALK-TKIs (NVL-655) or chemotherapy
  salvage.

  '
