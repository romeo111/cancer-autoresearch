variant_qualifier: G1202R (acquired resistance)
disease_id: DIS-NSCLC
escat_tier: IB
evidence_summary: 'ALK G1202R is a solvent-front mutation conferring resistance to
  1st/2nd-gen ALK-TKIs (crizotinib, alectinib, brigatinib, ceritinib). Lorlatinib
  remains active and is the standard salvage TKI (Shaw 2019). Acquired G1202R is the
  most common resistance mutation after alectinib failure (~20-40%).

  '
evidence_summary_ua: 'ALK G1202R is a solvent-front мутація conferring резистентність
  до 1st/2nd-gen ALK-TKIs (кризотиніб, алектиніб, брігатиніб, цертиніб). лорлатиніб
  remains active and is the стандарт сальвадж TKI (Shaw 2019). набутий G1202R is the
  найбільш поширений резистентна мутація after алектиніб failure (~20-40%).

  '
