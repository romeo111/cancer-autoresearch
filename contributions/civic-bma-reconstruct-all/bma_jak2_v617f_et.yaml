biomarker_id: BIO-JAK2
variant_qualifier: V617F (exon 14 — present in ~50-60% of essential thrombocythemia)
disease_id: DIS-ET
escat_tier: IA
evidence_summary: 'JAK2 V617F is one of three defining drivers in essential thrombocythemia
  (~50-60%; CALR ~25-30%, MPL ~3-5%, triple-negative ~10-15%) and a WHO 2022 / ICC
  2022 major diagnostic criterion (per SRC-NCCN-MPN-2025, SRC-ESMO-MPN-2015). Treatment
  is risk-stratified by IPSET-thrombosis (age, prior thrombosis, JAK2 V617F positivity,
  cardiovascular risk factors); high-risk → cytoreduction with hydroxyurea (PT1 trial
  Harrison 2005 — superior thrombosis-free survival vs anagrelide in HU-naive ET);
  low-risk → low-dose aspirin alone (or observation in CALR-mutated very-low-risk
  per SRC-ESMO-MPN-2015).

  '
evidence_summary_ua: 'JAK2 V617F is one of three defining drivers in essential thrombocythemia
