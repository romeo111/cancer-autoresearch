biomarker_id: BIO-RET
variant_qualifier: KIF5B-RET fusion
disease_id: DIS-NSCLC
escat_tier: IA
evidence_summary: 'KIF5B-RET is the most common RET fusion in NSCLC (~70% of RET+
  NSCLC). Treatment is identical to gene-level RET fusion: selpercatinib (LIBRETTO-001
  / LIBRETTO-431) and pralsetinib (ARROW). Deep CNS penetrance with selpercatinib
  (intracranial ORR 82%).

  '
evidence_summary_ua: 'KIF5B-RET is the найбільш поширений RET злиття in NSCLC (~70%
  of RET+ NSCLC). лікування is identical to gene-level RET злиття: селперкатиніб (LIBRETTO-001
  / LIBRETTO-431) and пралсетиніб (ARROW). Deep CNS penetrance with селперкатиніб
  (intracranial ORR 82%).

  '
