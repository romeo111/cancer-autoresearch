id: BMA-EZH2-Y641-FL
biomarker_id: BIO-EZH2-Y641
variant_qualifier: Y641N/F/H/S/C activating mutations in SET domain — gain-of-function
  H3K27 hypermethylation; ~20-25% of follicular lymphoma
disease_id: DIS-FL
escat_tier: IB
evidence_summary: 'EZH2 Y641 hotspot activating mutations occur in ~20-25% of follicular
  lymphoma (and rarely in DLBCL/HGBL). Tazemetostat is a selective EZH2 inhibitor
  FDA-approved for relapsed/refractory FL: in EZH2- mutated FL after ≥2 prior lines,
  ORR 69%, mPFS 13.8 mo (E7438-202 Morschhauser Lancet Oncol 2020); in EZH2-WT FL,
  ORR 35%, mPFS 11.1 mo — mutated population had stronger responses, leading to a
  companion-diagnostic-paired indication per SRC-NCCN-BCELL-2025, SRC-ESMO-FL-2024.

  '
