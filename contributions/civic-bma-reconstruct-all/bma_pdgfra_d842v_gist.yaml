  / SRC-NAVIGATOR / SRC-VOYAGER not yet ingested. CNS toxicity (cognitive effects,
  intracranial hemorrhage) is on-target / dose- related — dose modifications standard.
  Companion-diagnostic genotyping via NGS panel mandatory before avapritinib initiation.
  Adjuvant imatinib has NO benefit in D842V GIST — these patients should be observed
