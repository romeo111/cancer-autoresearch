evidence_summary: 'FGFR1 amplification in squamous NSCLC (~15-20%). Multiple FGFR-TKI
  trials (lucitanib, AZD4547, BGJ398, erdafitinib) showed modest activity (ORR 5-15%)
  — FGFR1-amp does not predict robust response. Erdafitinib is NOT approved for FGFR1-amp
  NSCLC (label is FGFR2/3 in urothelial). Standard squamous NSCLC therapy applies;
  FGFR1-amp is trial-only actionability.

  '
