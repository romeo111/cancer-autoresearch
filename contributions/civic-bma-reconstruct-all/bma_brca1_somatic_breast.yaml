evidence_summary: 'Somatic BRCA1 loss-of-function in HER2-negative metastatic breast:
  TBCRC-048 (Tung 2020) showed talazoparib activity in sBRCA tumors (ORR ~31%). PARPi
  labels in breast are formally germline-only (gBRCAm); somatic tumors treated off-label
  or via NCCN extrapolation. ESCAT IB / OncoKB Level 2.

  '
