evidence_summary: 'BRAF V600E in AML is rare (<1%, more in histiocytic disorders /
  mixed-phenotype acute leukemia with histiocytic component). Tissue-agnostic dabrafenib
  + trametinib not approved in heme. Off-label use case-report level; consider in
  BRAF V600E AML with myeloid/dendritic mixed lineage.

  '
