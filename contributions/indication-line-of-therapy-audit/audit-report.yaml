  submission_date: '2026-04-28'
  ai_tool: claude-code
  ai_model: claude-opus-4-7
  notes_for_reviewer: 'B3 subset: 30 random INDs (sample). Algorithmic check via regex
    on cited Source title/notes; NO web fetch. Many findings will be ''ambiguous_source''
    because line-of-therapy keywords often live in source full-text, not titles. Demonstrates
    methodology floor.'
audit_method: 'Sampled 30 INDs randomly. For each: read Indication.applicable_to.line_of_therapy
  + collected text-blob from cited Source entities (title + notes + section). Regex-detected
  first-line / second-line / third-line keywords. NO PubMed PDF fetch — those fields
  aren''t in source title/notes typically.'
summary:
  total_audited: 30
  ambiguous_source: 29
  match: 1
limitations: 'Floor-quality: source titles/notes often don''t contain line-of-therapy
  keywords explicitly (those live in full-text PDFs). ''ambiguous_source'' is expected
  high-fraction. Real chunk via Codex with web fetch would resolve these via PubMed
  abstracts.'
