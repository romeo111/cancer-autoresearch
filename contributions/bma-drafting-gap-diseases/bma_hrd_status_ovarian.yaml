notes: >
  ESCAT IA / OncoKB Level 1. HRD assays are not interchangeable —
  Myriad MyChoice CDx, FoundationOne CDx, and Caris all use different
  scoring models; FDA companion-diagnostic specificity matters. HRD-
  negative patients still derive smaller niraparib benefit (PRIMA all-
  comers) but ESMO 2024 explicitly de-prioritizes PARP maintenance in
  HRD-negative platinum-sensitive recurrence — documented disagreement
  with NCCN that lists niraparib for HRD-negative as well. Flagged for
  clinical-co-lead review. Source-gap: SRC-SOLO1, SRC-PAOLA1, SRC-PRIMA
  not yet ingested.
