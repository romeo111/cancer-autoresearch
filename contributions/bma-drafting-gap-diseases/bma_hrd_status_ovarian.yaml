id: BMA-HRD-STATUS-OVARIAN
biomarker_id: BIO-HRD-STATUS
variant_qualifier: "HRD-positive — BRCA1/2 mutation OR genomic instability score (GIS) above validated threshold (Myriad MyChoice ≥42 or equivalent FoundationOne CDx HRD signature); ~50% of high-grade serous ovarian carcinoma"
disease_id: DIS-OVARIAN
escat_tier: "IA"
evidence_summary: >
  HRD-positive high-grade serous ovarian carcinoma (~50% — encompassing
  BRCA1/2-mutated and BRCA-WT/HRD+): PARP inhibitor maintenance after
  platinum response is FDA-approved 1L. Olaparib monotherapy
  maintenance for BRCA1/2-mutated newly-diagnosed advanced ovarian after
  CR/PR to platinum (SOLO-1 Moore NEJM 2018 — mPFS not reached vs 13.8
  mo, HR 0.30) per SRC-NCCN-OVARIAN-2025, SRC-ESMO-OVARIAN-2024.
  Olaparib + bevacizumab maintenance for HRD-positive (BRCA-mut OR
  HRD-genomic) post-1L platinum + bevacizumab (PAOLA-1 Ray-Coquard NEJM
  2019 — HRD subgroup mPFS 37 vs 17 mo, HR 0.33). Niraparib monotherapy
  maintenance is approved for all-comers (PRIMA Gonzalez-Martin NEJM
  2019), with the strongest benefit in HRD-positive subgroup.
evidence_summary_ua: >
  HRD-positive високого ступеня serous ovarian карцинома (~50% — encompassing BRCA1/2-mutated and BRCA-WT/HRD+): інгібітор PARP підтримка after platinum відповідь is схвалений FDA 1L. олапариб монотерапія підтримка for BRCA1/2-mutated newly-diagnosed поширений ovarian after CR/PR to platinum (SOLO-1 Moore NEJM 2018 — mPFS not reached vs 13.8 міс., HR 0.30) per SRC-NCCN-OVARIAN-2025, SRC-ESMO-OVARIAN-2024. олапариб + бевацизумаб підтримка for HRD-positive (BRCA-mut OR HRD-genomic) post-1L platinum + бевацизумаб (PAOLA-1 Ray-Coquard NEJM 2019 — HRD subgroup mPFS 37 проти 17 міс., HR 0.33). нірапариб монотерапія підтримка is схвалений для all-comers (PRIMA Gonzalez-Martin NEJM 2019), with the strongest виграш in HRD-positive subgroup.
