id: BMA-CD30-ALCL
biomarker_id: BIO-CD30-IHC
variant_qualifier: "CD30 expression — universal (~100%) in systemic anaplastic large-cell lymphoma (ALK-positive and ALK-negative)"
disease_id: DIS-ALCL
escat_tier: "IA"
evidence_summary: >
  CD30 expression is a defining feature of anaplastic large-cell
  lymphoma (sALCL); brentuximab vedotin (BV) targets CD30 with an
  auristatin payload. 1L sALCL: BV + CHP (cyclophosphamide /
  doxorubicin / prednisone, replacing vincristine) is preferred over
  CHOP per ECHELON-2 (Horwitz Lancet 2019 — mPFS 48 vs 21 mo, HR 0.71;
  OS HR 0.66) per SRC-NCCN-BCELL-2025, SRC-ESMO-PTCL-2024. R/R sALCL:
  BV monotherapy was the basis of FDA accelerated approval (Pro JCO
  2012 — ORR 86%, CR 57%) and is preferred salvage. Pediatric ALCL:
  AHOD1331 supports BV + AVEPC.
evidence_summary_ua: >
  CD30 експресія is a визначальна ознака anaplastic large-cell лімфома (sALCL); брентуксимаб ведотин (BV) targets CD30 with an auristatin payload. 1L sALCL: BV + CHP (циклофосфамід / доксорубіцин / prednisone, replacing вінкристин) is переважний over CHOP per ECHELON-2 (Horwitz Lancet 2019 — mPFS 48 проти 21 міс., HR 0.71; OS HR 0.66) per SRC-NCCN-BCELL-2025, SRC-ESMO-PTCL-2024. р/р sALCL: BV монотерапія was the basis of FDA accelerated схвалення (Pro JCO 2012 — ORR 86%, CR 57%) and is переважний сальвадж. педіатричний ALCL: AHOD1331 supports BV + AVEPC.
