notes: >
  ESCAT IA / OncoKB Level 1. Existing BMA-ALK-FUSION-ALCL covers ALK-
  rearranged subset (where crizotinib R/R has different role). For
  sALCL, BV+CHP is genotype-agnostic 1L (covers ALK-positive and ALK-
  negative). ECHELON-2 enrolled CD30+ PTCL with ≥10% expression — that
  threshold is the standard inclusion gate. Source-gap: SRC-ECHELON-2,
  SRC-AHOD1331 not yet ingested.
