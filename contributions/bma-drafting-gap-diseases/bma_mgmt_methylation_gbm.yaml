id: BMA-MGMT-METHYLATION-GBM
biomarker_id: BIO-MGMT-METHYLATION
variant_qualifier: "MGMT promoter methylation (positive vs unmethylated; ~40% of newly-diagnosed glioblastoma IDH-WT)"
disease_id: DIS-GBM
escat_tier: "IA"
evidence_summary: >
  MGMT promoter methylation in IDH-WT glioblastoma is the strongest
  validated predictor of temozolomide benefit (Stupp NEJM 2005 / 2009
  long-term — methylated patients derive ~2x OS benefit from
  RT+TMZ vs RT alone). Standard 1L for newly-diagnosed GBM remains
  Stupp protocol (concurrent RT + temozolomide → 6 cycles adjuvant
  TMZ) per SRC-NCCN-CNS-2025, SRC-EANO-GBM-2024 — but methylation
  status drives intensification decisions: in elderly MGMT-methylated
  patients, hypofractionated RT + TMZ (Perry NEJM 2017) is preferred,
  while elderly MGMT-unmethylated patients can receive RT alone with
  much smaller TMZ benefit. CeTeG/NOA-09 (Herrlinger Lancet 2019)
  showed lomustine + TMZ + RT may extend OS in newly-diagnosed MGMT-
  methylated GBM but is not standard worldwide.
evidence_summary_ua: >
  MGMT promoter метилювання in IDH-WT гліобластома is the strongest validated predictor of temozolomide виграш (Stupp NEJM 2005 / 2009 long-term — methylated patients derive ~2x OS виграш from RT+TMZ vs RT alone). стандарт 1L for newly-diagnosed GBM remains Stupp protocol (concurrent RT + temozolomide → 6 цикли ад'ювантний TMZ) per SRC-NCCN-CNS-2025, SRC-EANO-GBM-2024 — but метилювання status drives intensification decisions: in літнього віку MGMT-methylated patients, hypofractionated RT + TMZ (Perry NEJM 2017) is переважний, while літнього віку MGMT-unmethylated patients can receive RT alone with much smaller TMZ виграш. CeTeG/NOA-09 (Herrlinger Lancet 2019) showed lomustine + TMZ + RT may extend OS in newly-diagnosed MGMT- methylated GBM but is not стандарт worldwide.
