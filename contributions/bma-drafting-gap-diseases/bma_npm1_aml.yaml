notes: >
  ESCAT IA / OncoKB Level 1 — definitional, prognostic, and MRD-
  trackable. Co-occurring FLT3-ITD high-allelic-ratio shifts NPM1-mut
  AML from favorable to intermediate/adverse risk per SRC-ELN-AML-2022;
  see also BMA-FLT3-ITD-AML for FLT3-targeted therapy. Mutation-
  specific therapy (e.g., menin inhibitors revumenib / ziftomenib in
  NPM1-mutated R/R AML) is in late-phase trials but has no FDA approval
  for NPM1 yet; menin-inhibitor sources not in repo.
