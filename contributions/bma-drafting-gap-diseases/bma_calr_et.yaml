id: BMA-CALR-ET
biomarker_id: BIO-CALR
variant_qualifier: "exon 9 indels — type-1/type-1-like (52-bp deletion) and type-2/type-2-like (5-bp insertion); ~25-30% of essential thrombocythemia"
disease_id: DIS-ET
escat_tier: "IA"
evidence_summary: >
  CALR exon 9 indels are the second most common driver in ET (~25-30%)
  and a WHO 2022 / ICC 2022 major diagnostic criterion in JAK2/MPL-
  negative cases (per SRC-NCCN-MPN-2025, SRC-ESMO-MPN-2015). CALR-
  mutated ET has lower thrombosis risk than JAK2-mutated ET, which
  feeds into IPSET-thrombosis stratification: very-low-risk CALR
  patients may be managed with observation alone; otherwise risk-
  stratified management identical to JAK2-positive ET (low-risk →
  aspirin; high-risk → hydroxyurea/IFN per SRC-PT1-HARRISON-2005).
evidence_summary_ua: >
  CALR exon 9 indels are the second найбільш поширений driver in ET (~25-30%) and a WHO 2022 / ICC 2022 major діагностичний criterion in JAK2/MPL- negative cases (per SRC-NCCN-MPN-2025, SRC-ESMO-MPN-2015). CALR- mutated ET has lower thrombosis risk than JAK2-mutated ET, which feeds into IPSET-thrombosis stratification: very-низького ризику CALR patients may be managed with observation alone; otherwise risk- stratified management identical to JAK2-positive ET (низького ризику → aspirin; високого ризику → гідроксикарбамід/IFN per SRC-PT1-HARRISON-2005).
