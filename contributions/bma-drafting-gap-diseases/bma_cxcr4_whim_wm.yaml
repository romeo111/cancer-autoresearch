id: BMA-CXCR4-WHIM-WM
biomarker_id: BIO-CXCR4-WHIM
variant_qualifier: "CXCR4 WHIM-like nonsense / frameshift mutations (C-terminal truncation, e.g., S338X, R334X); ~30-40% of MYD88-L265P Waldenström macroglobulinemia"
disease_id: DIS-WM
escat_tier: "IB"
evidence_summary: >
  CXCR4 WHIM-like mutations co-occur in ~30-40% of MYD88-L265P
  Waldenström macroglobulinemia and confer relative resistance to
  ibrutinib (BTKi) — lower ORR and major-response rate, slower kinetics
  of IgM decline (Treon NEJM 2015 — initial cohort; Castillo Blood 2020
  — confirmation) per SRC-NCCN-BCELL-2025, SRC-ESMO-WM-2024. CXCR4
  status drives 1L therapy selection in WM: in CXCR4-mutated patients,
  guidelines list bendamustine + rituximab (BR) or proteasome-inhibitor-
  based regimens (BDR — bortezomib/dex/rituximab) as preferred over
  BTKi monotherapy; in CXCR4-WT patients, BTKi monotherapy
  (ibrutinib or zanubrutinib) is preferred. Mavorixafor (CXCR4
  antagonist) has FDA orphan designation for WHIM but is investigational
  in WM.
evidence_summary_ua: >
  CXCR4 WHIM-like мутації co-occur in ~30-40% of MYD88-L265P Waldenström macroglobulinemia and confer relative резистентність до ібрутиніб (BTKi) — lower ORR and major-частота відповіді, slower kinetics of IgM зниження (Treon NEJM 2015 — initial cohort; Castillo Blood 2020 — confirmation) per SRC-NCCN-BCELL-2025, SRC-ESMO-WM-2024. CXCR4 status drives 1L терапія selection in WM: in CXCR4-mutated patients, настанови list бендамустин + ритуксимаб (BR) or proteasome-інгібітор- based схеми (BDR — бортезоміб/dex/ритуксимаб) as переважний over BTKi монотерапія; in CXCR4-WT patients, BTKi монотерапія (ібрутиніб or занубрутиніб) is переважний. Mavorixafor (CXCR4 антагоніст) has FDA orphan designation for WHIM but is експериментальний in WM.
