id: BMA-BRAF-V600E-THYROID-ANAPLASTIC
biomarker_id: BIO-BRAF-V600E
variant_qualifier: V600E (exon 15, kinase domain — present in ~25-50% of anaplastic
  thyroid carcinoma)
disease_id: DIS-THYROID-ANAPLASTIC
escat_tier: IA
evidence_summary: 'BRAF V600E in anaplastic thyroid carcinoma (ATC, ~25-50% of cases):
  dabrafenib + trametinib has tumor-agnostic FDA approval for BRAF V600E unresectable/metastatic
  disease and is preferred 1L for V600E-mutant ATC per SRC-NCCN-THYROID-2025. The
  pivotal ROAR basket trial (Subbiah JCO 2018 — ATC cohort ORR 69%, mOS ~14 mo, dramatic
  response in a historically rapid-fatal disease — historical mOS ~5 mo) drove the
  2018 FDA accelerated approval (full conversion 2022 with pan-cancer broadening).
  Consider neoadjuvant dabrafenib+trametinib to enable surgery in initially unresectable
  V600E ATC per SRC-NCCN-THYROID-2025.

  '
evidence_summary_ua: 'BRAF V600E in anaplastic thyroid карцинома (ATC, ~25-50% of
  cases): дабрафеніб + траметиніб has пухлина-agnostic FDA схвалення for BRAF V600E
  нерезектабельний/метастатичний хвороба and is переважний 1L for V600E-mutant ATC
  per SRC-NCCN-THYROID-2025. The pivotal ROAR basket дослідження (Subbiah JCO 2018
  — ATC cohort ORR 69%, міс. ~14 міс., dramatic відповідь in a historically rapid-fatal
  хвороба — historical mOS ~5 міс.) drove the 2018 FDA accelerated схвалення (full
  conversion 2022 with pan-рак broadening). Consider неоад''ювантний дабрафеніб+траметиніб
  to enable surgery in initially нерезектабельний V600E ATC per SRC-NCCN-THYROID-2025.

  '
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
  fda:
  - dabrafenib + trametinib — locally advanced/metastatic BRAF V600E ATC (FDA accelerated
    2018)
  - dabrafenib + trametinib — solid tumors with BRAF V600E (FDA tumor-agnostic 2022)
  ema:
  - dabrafenib + trametinib — BRAF V600E ATC (EMA approved 2020)
  ukraine: []
recommended_combinations:
- dabrafenib + trametinib (1L V600E ATC per SRC-NCCN-THYROID-2025)
- neoadjuvant dabrafenib + trametinib → surgery → adjuvant systemic ± RT (initially
  unresectable, per SRC-NCCN-THYROID-2025)
contraindicated_monotherapy:
- BRAF inhibitor monotherapy (paradoxical MAPK activation; combination with MEK inhibitor
  required per SRC-NCCN-THYROID-2025)
