evidence_summary: 't(11;14) IGH/CCND1 is the defining genetic lesion of MCL — drives
  cyclin D1 overexpression. BTKi (acalabrutinib + rituximab — TRIANGLE, Dreyling Lancet
  2024; ECHO — Wang NEJM 2024) is the new 1L standard regardless of fitness for TP53-mut;
  high-dose AraC + autoSCT historically (LyMa, MCL Younger). Venetoclax (CCND1 → BCL2-mediated
  anti-apoptosis rationale) active R/R.

  '
