id: BMA-MSH6-SOMATIC-CRC
biomarker_id: BIO-DMMR-IHC
variant_qualifier: MSH6 somatic loss-of-function (dMMR / MSI-H)
disease_id: DIS-CRC
escat_tier: IA
evidence_summary: 'MSH6 somatic loss-of-function in crc produces dMMR/MSI-H phenotype.
  Pan-tumor MSI-H ICI eligibility (pembrolizumab per KEYNOTE-158, dostarlimab per
  GARNET) supersedes tumor-specific lines via tissue-agnostic FDA approval. 1L mCRC:
  pembrolizumab monotherapy (KEYNOTE-177) — mPFS 16.5 vs 8.2 mo vs chemo. Adjuvant
  ICI in stage III dMMR CRC under investigation; deferral of adjuvant 5-FU appropriate
  in stage II dMMR (chemoinsensitive). Neoadjuvant dostarlimab in dMMR rectal cancer
  → 100% cCR (Cercek 2022).

  '
evidence_summary_ua: 'MSH6 соматичний втрата функції in crc produces dMMR/MSI-H фенотип.
  Pan-пухлина MSI-H ICI eligibility (пембролізумаб per KEYNOTE-158, dostarlimab per
  GARNET) supersedes пухлина-specific lines via tissue-agnostic FDA схвалення. 1L
  mCRC: пембролізумаб монотерапія (KEYNOTE-177) — mPFS 16.5 проти 8.2 mo vs chemo.
  ад''ювантний ICI in stage III dMMR CRC under investigation; deferral of ад''ювантний
  5-FU appropriate in stage II dMMR (chemoinsensitive). неоад''ювантний dostarlimab
  in dMMR rectal рак → 100% cCR (Cercek 2022).

  '
