audit_method: |
  1. Bulk-read drug_class + mechanism + atc_code fields from 216 YAMLs.
  2. Normalize each drug_class for cluster detection: lowercase + strip
     non-alphanumeric + expand abbreviations (TKI→tyrosine kinase inhibitor,
     mAb→monoclonal antibody, generation tags).
  3. Group by normalized key. Identify clusters with multiple distinct
     original phrasings = real normalization candidates.
  4. Verify generation-tag uniformity (1st-gen vs first-generation, etc.).
  5. Verify capitalization-only variants.

findings: []   # explicit empty: no normalization actions proposed

conclusion: |
  Existing OpenOnco Drug entities have remarkably consistent drug_class
  formatting. Hypothesized inconsistency (capitalization drift, mixed
  abbreviations, generation-tag variants) was not present in the data.

  Likely cause: Drugs were authored by a small set of contributors with
  shared style conventions, OR a prior cleanup pass already normalized
  the field. Either way, additional contributor-side normalization adds
  zero clinical value.

