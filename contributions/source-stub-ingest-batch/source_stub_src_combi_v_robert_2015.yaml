notes: >
  COMBI-v phase-3 (NCT01597908): dabrafenib + trametinib vs
  vemurafenib monotherapy in 1L BRAF V600-mutant unresectable/
  metastatic melanoma (n=704). 12-mo OS 72% vs 65% (HR 0.69;
  p=0.005); mPFS 11.4 vs 7.3 mo (HR 0.56). Pooled COMBI-d+v
  5-yr update (Robert NEJM 2019): 5-yr OS 34%, 5-yr PFS 19%.
  Companion to COMBI-d; together they established BRAFi+MEKi as
  standard for BRAF-mutant metastatic melanoma.
