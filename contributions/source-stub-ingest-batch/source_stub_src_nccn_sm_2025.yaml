notes: >
  Primary international guideline for systemic mastocytosis. Codifies
  WHO 2022 subtyping (ISM / SSM / ASM / SM-AHN / MCL), KIT D816V testing
  on bone-marrow aspirate as standard, avapritinib (EXPLORER /
  PATHFINDER) as preferred 1L for advanced SM, midostaurin (D-RIVE) as
  alternative, dual-compartment management of SM-AHN, allo-HSCT
  consideration in fit MCL.
