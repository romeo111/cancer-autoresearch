notes: >
  PROfound phase-3 (NCT02987543): olaparib 300 mg PO BID vs
  physician-choice ARSI (enzalutamide or abiraterone) in mCRPC with
  qualifying HRR alteration who progressed on prior ARSI. Cohort A
  (BRCA1/2, ATM): mPFS 7.4 vs 3.6 mo (HR 0.34, p<0.001); mOS 19.1 vs
  14.7 mo (HR 0.69). Cohort B (12 other HRR genes): smaller benefit.
  Established olaparib as standard 2L for HRR-mutated (especially
  BRCA1/2) post-ARSI mCRPC; basis for FDA approval (May 2020).
