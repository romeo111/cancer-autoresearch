notes: >
  KEYNOTE-164 phase-2 (NCT02460198): pembrolizumab 200 mg IV q3w in
  MSI-H/dMMR metastatic CRC after ≥2 prior lines (cohort A) or ≥1 prior
  line (cohort B). ORR 33% (cohort A) and 33% (cohort B); median PFS
  2.3 mo / 4.1 mo with durable responses (median DOR not reached).
  3-year OS 36% / 41%. Established pembrolizumab as standard salvage
  for MSI-H mCRC; basis for FDA full approval (Jun 2020) of
  pembrolizumab in MSI-H/dMMR mCRC after fluoropyrimidine + oxaliplatin
  + irinotecan. NOTE: original task list cited PMID 33264544 — that
  PMID belongs to KEYNOTE-177 (Le 2020 NEJM); correct PMID for
  KEYNOTE-164 is 31725351 (verified via PubMed).
