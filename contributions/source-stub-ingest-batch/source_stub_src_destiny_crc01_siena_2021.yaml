notes: >
  DESTINY-CRC01 phase-2 (NCT03384940): trastuzumab deruxtecan (T-DXd)
  6.4 mg/kg IV q3w in HER2-expressing chemo-refractory mCRC. Cohort A
  (HER2 IHC 3+ or IHC 2+/ISH+, n=53): ORR 45.3%; median PFS 6.9 mo;
  mOS 15.5 mo. Cohorts B/C (HER2 IHC 2+/ISH−, IHC 1+): minimal
  response. Demonstrated activity of T-DXd in HER2-overexpressing
  mCRC; supports HER2 IHC 3+ / IHC 2+ ISH+ as the actionable threshold.
  Cited as evidence for T-DXd CRC option pending DESTINY-CRC02 (Raghav
  2024) confirmation. NOTE: original task list cited PMID 34637687 —
  that PMID does not match this Siena DESTINY-CRC01 paper; correct
  PMID is 34022157 (verified via PubMed, Lancet Oncol 22(6):779–789).
