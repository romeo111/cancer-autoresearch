      value_constraint: "IDH1 R132H mutation (or non-canonical IDH1/IDH2) — defines IDH-mutant astrocytoma / oligodendroglioma"
  biomarker_requirements_excluded:
    - biomarker_id: BIO-IDH1-MUTATION
