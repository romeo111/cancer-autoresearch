      - position: "RT+TMZ has equivalent activity in CATNON (grade 3 IDH-mut astro) and is significantly better tolerated; CODEL trial (RT+TMZ vs RT+PCV in 1p/19q-codeleted) ongoing"
        sources:
          - SRC-EANO-GBM-2024
    our_default: "RT+PCV preferred for fit ECOG 0-1 patients, especially 1p/19q-codeleted oligodendroglioma (largest RTOG 9802 benefit); RT+TMZ alternative for borderline-tolerance"
    rationale: "PCV has stronger LGG-specific OS data; TMZ is interchangeable in clinical practice given tolerability"

