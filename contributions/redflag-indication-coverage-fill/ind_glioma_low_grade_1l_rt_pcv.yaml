id: IND-GLIOMA-LOW-GRADE-1L-RT-PCV
plan_track: aggressive

applicable_to:
  disease_id: DIS-GLIOMA-LOW-GRADE
  line_of_therapy: 1
  stage_requirements: ["High-risk IDH-mut diffuse glioma WHO grade 2-3 (per WHO 5th ed.): age ≥40 OR subtotal resection / biopsy-only OR symptomatic / large residual"]
  biomarker_requirements_required:
    - biomarker_id: BIO-IDH1-MUTATION
