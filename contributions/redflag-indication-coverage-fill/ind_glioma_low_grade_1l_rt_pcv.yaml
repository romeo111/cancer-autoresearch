rationale: >
  RTOG 9802 (Buckner et al. 2016 NEJM) established RT (54 Gy/30 fx) +
  6 cycles adjuvant PCV (procarbazine 60 mg/m²/d ×8 + lomustine 110
  mg/m² d1 + vincristine 1.4 mg/m² d8, q6w) as standard for high-risk
  IDH-mut LGG (age ≥40 or subtotal resection). 1p/19q-codeleted
  oligodendroglioma derives the largest benefit. TMZ alternative
  (per CATNON for grade 3 astrocytoma; LGG-specific data from CODEL
  pending) is widely used as better-tolerated substitute. EANO 2024
  endorses both RT+PCV (preferred for fit) and RT+TMZ (alternative).

rationale_ua: >
  RTOG 9802 (Buckner et al. 2016 NEJM) усталений RT (54 Gy/30 fx) + 6 цикли ад'ювантний PCV (procarbazine 60 mg/m²/d ×8 + lomustine 110 mg/m² d1 + вінкристин 1.4 mg/m² d8, q6w) as стандарт for високого ризику IDH-mut LGG (age ≥40 or subtotal resection). 1p/19q-codeleted oligodendroglioma derives the largest виграш. TMZ alternative (per CATNON for grade 3 astrocytoma; LGG-specific дані from CODEL pending) is widely used as краще-tolerated substitute. EANO 2024 endorses both RT+PCV (переважний for fit) and RT+TMZ (alternative).
