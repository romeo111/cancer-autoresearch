id: RF-GLIOMA-LOW-GRADE-HIGH-RISK-BIOLOGY
definition: "Low-grade glioma with high-risk molecular features: IDH-wildtype (per WHO 5th ed., reclassified as glioblastoma molecular features even if histologically low-grade), CDKN2A/B homozygous deletion, TERT-promoter mutation in IDH-wildtype, or 1p/19q intact astrocytoma with poor risk score"
definition_ua: "Гліома низького ступеня з молекулярними high-risk факторами: IDH-wildtype (за ВООЗ 5-те вид., реклас. як glioblastoma molecular features), CDKN2A/B гомозиготна делеція, TERT-promoter мутація при IDH-wt, або 1p/19q-intact астроцитома з поганим прогнозом"

trigger:
  type: composite
  any_of:
    - finding: "idh_wildtype"
      value: true
    - finding: "cdkn2a_b_homozygous_deletion"
      value: true
    - finding: "tert_promoter_mutation"
      value: true
    - finding: "histology_grade_3_features"
      value: true

clinical_direction: intensify

severity: critical
priority: 25
category: high-risk-biology
relevant_diseases:
