draft: true
review_status: pending_clinical_signoff
drafted_by: claude_extraction
notes: >
  Per WHO 5th ed.: IDH-wildtype diffuse astrocytoma with EGFR amp / +7-10 /
  TERT-promoter mutation is reclassified as "glioblastoma, IDH-wildtype"
  regardless of histology grade — these patients are managed under
  GBM (DIS-GBM) algorithm, not LGG. Per EANO 2024 + NCCN-CNS LGG:
  CDKN2A/B homozygous deletion in IDH-mut astrocytoma confers grade 4
  behavior. Direction INTENSIFY — shifts to GBM-like management
  (Stupp protocol or aggressive RT + chemotherapy). STUB — requires
  clinical co-lead signoff.
notes_ua: >
  Per WHO 5th ed.: IDH-wildtype diffuse astrocytoma with EGFR amp / +7-10 / TERT-promoter мутація is reclassified as "гліобластома, IDH-wildtype" regardless of гістологія grade — these patients are managed under GBM (DIS-GBM) algorithm, not LGG. Per EANO 2024 + NCCN-CNS LGG: CDKN2A/B homozygous делеція in IDH-mut astrocytoma confers grade 4 behavior. Direction INTENSIFY — shifts to GBM-like management (Stupp protocol or агресивний RT + хіміотерапія). STUB — requires clinical co-lead signoff.
