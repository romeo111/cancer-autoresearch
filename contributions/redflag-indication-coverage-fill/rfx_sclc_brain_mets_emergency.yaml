draft: true
review_status: pending_clinical_signoff
drafted_by: claude_extraction
notes: >
  Per NCCN-SCLC + ESMO-SCLC 2021: WBRT (30 Gy/10 fx) is preferred for
  symptomatic SCLC brain mets given multifocality; SRS for limited
  disease in select cases; dexamethasone 4-16 mg/day for edema.
  Concurrent platinum-etoposide chemotherapy active in CNS — can
  start simultaneously. Direction HOLD on routine systemic start
  until ICP controlled. Priority 14. STUB — requires clinical
  co-lead signoff.
