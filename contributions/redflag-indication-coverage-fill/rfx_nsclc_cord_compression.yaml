notes: >
  Per NCCN-NSCLC + NCCN supportive-care: dexamethasone 10 mg IV bolus
  + 4 mg q6h, urgent MRI whole spine, neurosurgery/radiation oncology
  consult within 24 h. Surgical decompression + RT if surgical
  candidate (Patchell criteria); RT alone otherwise. Time to motor
  deficit ≤24 h is functional-recovery cutoff. Direction HOLD on
  systemic therapy until cord stabilized. Priority 8 (matches PMBCL
  airway). STUB — requires clinical co-lead signoff.
