notes: >
  Cladribine (purine analog) is profoundly lymphotoxic; per NCCN-SM:
  HBV/HCV/HIV screen mandatory before cytoreductive therapy. AASLD-HBV
  2024 mandates entecavir or TAF prophylaxis for HBsAg+ on lymphocyte-
  depleting therapy through 12 months post-completion. Direction HOLD
  on cytoreduction until prophylaxis underway. STUB — requires
  clinical co-lead signoff.
