id: RF-GLIOMA-LOW-GRADE-INTRACRANIAL-PRESSURE
definition: "Low-grade glioma with raised intracranial pressure or refractory seizures requiring emergency intervention: midline shift ≥5 mm, papilledema, GCS drop, status epilepticus or breakthrough seizures despite ≥2 AEDs"
definition_ua: "Гліома низького ступеня з підвищеним внутрішньочерепним тиском або рефрактерними судомами: дислокація ≥5 мм, набряк диска, зниження GCS, епілептичний статус або зриви на тлі ≥2 АЕП"

trigger:
  type: composite
  any_of:
    - finding: "raised_intracranial_pressure"
      value: true
    - finding: "midline_shift_mm"
      threshold: 5
      comparator: ">="
    - finding: "status_epilepticus"
      value: true
    - finding: "refractory_seizures_on_2_aeds"
      value: true
    - finding: "gcs_score"
      threshold: 12
      comparator: "<"

clinical_direction: hold

severity: critical
priority: 8
category: organ-dysfunction
relevant_diseases:
  - DIS-GLIOMA-LOW-GRADE
shifts_algorithm: []

sources:
  - SRC-NCCN-CNS-2025
  - SRC-EANO-GBM-2024

last_reviewed: "2026-04-27"
draft: true
review_status: pending_clinical_signoff
drafted_by: claude_extraction
notes: >
  Per NCCN-CNS + EANO 2024: dexamethasone 4-16 mg/day for vasogenic
  edema; urgent neurosurgical evaluation for resection (max safe
  resection improves OS in LGG); levetiracetam preferred AED (no
  P450 induction → preserves chemo efficacy); status epilepticus
  treated per neurology emergency protocol. Direction HOLD on
  systemic / RT therapy until ICP managed and resection assessed.
  Priority 8. STUB — requires clinical co-lead signoff.
