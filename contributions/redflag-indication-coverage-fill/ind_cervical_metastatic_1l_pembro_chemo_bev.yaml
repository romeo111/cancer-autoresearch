desired_tests: []

rationale: >
  Pembrolizumab + paclitaxel + (cisplatin or carboplatin) ± bevacizumab,
  for PD-L1 CPS ≥1 metastatic / persistent / recurrent cervical cancer.
  KEYNOTE-826 (Colombo 2021 NEJM, final OS published Lancet 2023):
  pembrolizumab + chemo ± bev superior to chemo ± bev across PD-L1
  CPS ≥1 (HR 0.64 OS) and all-comers (HR 0.67 OS). Bevacizumab
  addition (GOG 240 backbone) preferred when no contraindication
  (no fistula history, no anticoagulation, BP controlled, urine
  protein <2+).

rationale_ua: >
  пембролізумаб + паклітаксел + (цисплатин or карбоплатин) ± бевацизумаб, for PD-L1 CPS ≥1 метастатичний / persistent / рецидивний рак шийки матки. KEYNOTE-826 (Colombo 2021 NEJM, final OS published Lancet 2023): пембролізумаб + chemo ± bev перевершує chemo ± bev across PD-L1 CPS ≥1 (HR 0.64 OS) and all-comers (HR 0.67 OS). бевацизумаб addition (GOG 240 основа схеми) переважний when ні протипоказання (ні fistula history, ні anticoagulation, BP controlled, urine protein <2+).
