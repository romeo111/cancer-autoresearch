      - position: "Cisplatin remains preferred in cisplatin-naïve patients per ESMO CPGs"
        sources:
          - SRC-ESMO-CERVICAL-2024
    our_default: "Carboplatin AUC 5 + paclitaxel for cisplatin-pretreated or renal dysfunction; cisplatin 50 mg/m² + paclitaxel 175 mg/m² for cisplatin-naïve fit patients"
    rationale: "Both supported as Category 1; institutional + patient factors decide"

