  - source_id: SRC-ESMO-CERVICAL-2024
    position: supports
    relevant_quote_paraphrase: "ESMO recommends pembrolizumab + platinum-paclitaxel ± bevacizumab as preferred 1L for PD-L1 CPS ≥1 advanced cervical cancer"

do_not_do:
