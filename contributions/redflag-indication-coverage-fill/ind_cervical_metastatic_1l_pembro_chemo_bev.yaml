      required: false
      value_constraint: "PD-L1 CPS ≥1 (KEYNOTE-826 enrolled all CPS but benefit greatest at CPS ≥1; FDA-approved indication is CPS ≥1)"
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 1

recommended_regimen:
concurrent_therapy: []
followed_by: []

evidence_level: high
