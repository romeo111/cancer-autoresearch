expected_outcomes:
  overall_response_rate: "~68% (KEYNOTE-826 PD-L1 CPS ≥1, pembro+chemo arm)"
  complete_response: "~23%"
  progression_free_survival: "Median PFS 10.4 mo (pembro+chemo vs 8.2 mo placebo+chemo, HR 0.62 in CPS ≥1, KEYNOTE-826)"
  overall_survival_5y: "Median OS 28.6 mo vs 16.5 mo (HR 0.64 in CPS ≥1, KEYNOTE-826 final analysis)"

