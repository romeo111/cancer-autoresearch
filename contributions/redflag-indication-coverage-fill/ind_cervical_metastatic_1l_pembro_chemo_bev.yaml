id: IND-CERVICAL-METASTATIC-1L-PEMBRO-CHEMO-BEV
plan_track: standard

applicable_to:
  disease_id: DIS-CERVICAL
  line_of_therapy: 1
  stage_requirements: ["FIGO IVB (metastatic) OR persistent / recurrent cervical cancer not amenable to curative-intent therapy"]
  biomarker_requirements_required:
