id: BMA-MET-EX14-NSCLC
biomarker_id: BIO-MET
variant_qualifier: exon 14 skipping
disease_id: DIS-NSCLC
escat_tier: IA
evidence_summary: 'MET exon 14 skipping in advanced NSCLC (~3-4% of adenocarcinoma):
  capmatinib (GEOMETRY mono-1, Wolf 2020 — ORR 68% 1L / 41% prior-tx) and tepotinib
  (VISION, Paik 2020 — ORR 46% liquid + tissue) are selective MET-TKIs with FDA approval.
  Crizotinib has activity but is inferior; selective inhibitors preferred.

  '
evidence_summary_ua: 'MET exon 14 skipping in поширений NSCLC (~3-4% of adenocarcinoma):
  капматиніб (GEOMETRY mono-1, Wolf 2020 — ORR 68% 1L / 41% prior-tx) and тепотиніб
  (VISION, Paik 2020 — ORR 46% liquid + tissue) are селективний MET-TKIs with FDA
  схвалення. кризотиніб has activity but is поступається; селективний інгібітори переважний.

  '
