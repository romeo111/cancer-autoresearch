  - trial_name: MONUMENTAL-1
    verdict: false_positive
    rationale: >
      MonumenTAL-1 is a talquetamab study, but the extracted OpenOnco row is
      REG-TECLISTAMAB. Teclistamab should map to MajesTEC-1, not MonumenTAL-1.
  - trial_name: BRIGHT
    verdict: false_positive
    rationale: >
      BRIGHT is a real bendamustine/rituximab lymphoma trial name, but the
      extracted row is IND-ATLL-2L-MOGAMULIZUMAB where "bright" appears to come
      from CCR4-expression wording, not a trial citation.
