id: BMA-BCL2-REARRANGEMENT-FL
biomarker_id: BIO-BCL2-REARRANGEMENT
variant_qualifier: t(14;18) IGH/BCL2
disease_id: DIS-FL
escat_tier: IIIA
evidence_summary: 't(14;18) IGH/BCL2 is the defining genetic lesion of follicular
  lymphoma (~85%). Drives constitutive BCL2 overexpression. Venetoclax monotherapy
  modest activity in FL (Davids JCO 2017 ORR ~38%); combos with R-CHOP (CONTRALTO)
  and obinutuzumab in trial. Standard 1L (BR, R-CHOP, obinutuzumab + chemo) effective
  regardless of BCL2-R presence.

  '
evidence_summary_ua: 't(14;18) IGH/BCL2 is the defining genetic lesion of фолікулярна
  лімфома (~85%). Drives constitutive BCL2 гіперекспресія. венетоклакс монотерапія
  modest activity in FL (Davids JCO 2017 ORR ~38%); combos with R-CHOP (CONTRALTO)
  and обінутузумаб in дослідження. стандарт 1L (BR, R-CHOP, обінутузумаб + chemo)
  effective regardless of BCL2-R presence.

  '
