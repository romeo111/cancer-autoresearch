ukrainian_drafted_by: claude_extraction
regulatory_approval:
  fda:
  - oral azacitidine (CC-486) — AML maintenance in 1st CR not undergoing HCT (FDA
    approved 2020)
  - venetoclax + azacitidine — newly-diagnosed AML in adults ≥75y or ineligible for
    intensive chemo (FDA approved 2018)
  ema:
  - oral azacitidine — AML maintenance (EMA approved 2021)
  - venetoclax + azacitidine — newly-diagnosed AML unfit for intensive chemo (EMA
    approved 2021)
  ukraine: []
recommended_combinations:
- 7+3 induction → consolidation (fit, NPM1-mut without FLT3-ITD, intermediate/favorable
  per SRC-ELN-AML-2022)
- oral azacitidine maintenance post-CR (per SRC-QUAZAR-WEI-2020)
- venetoclax + azacitidine (unfit per SRC-VIALE-A-DINARDO-2020)
- MRD-guided allogeneic HCT (NPM1-MRD persistence post-2 cycles per SRC-ELN-AML-2022)
contraindicated_monotherapy: []
