id: BMA-NPM1-AML
biomarker_id: BIO-NPM1
variant_qualifier: exon 12 frameshift insertions (type A 4-bp duplication most common;
  ~30% of de novo AML, ~50% of normal-karyotype AML)
disease_id: DIS-AML
escat_tier: IA
evidence_summary: 'NPM1-mutated AML is a distinct WHO 2022 / ICC 2022 entity and ELN
  2022 favorable-risk category in the absence of adverse co-mutations (per SRC-ELN-AML-2022,
  SRC-NCCN-AML-2025, SRC-ESMO-AML-2020). For fit patients, intensive induction (7+3
  cytarabine/anthracycline) remains standard 1L; oral azacitidine maintenance after
  CR significantly prolongs OS in non-transplant patients (QUAZAR AML-001 Wei NEJM
  2020 — median OS 24.7 vs 14.8 mo, HR 0.69). For unfit patients, venetoclax + azacitidine
  is preferred (VIALE-A DiNardo NEJM 2020 — NPM1-mutated subgroup particularly responsive,
  CR/CRi ~67%, mOS 14.7 mo). NPM1-mutation MRD by RT-qPCR drives post-CR intensification
  decisions in younger fit patients per SRC-ELN-AML-2022.

  '
evidence_summary_ua: 'NPM1-mutated AML is a distinct WHO 2022 / ICC 2022 сутність
  and ELN 2022 сприятливого ризику category in the absence of несприятливий co-мутації
  (per SRC-ELN-AML-2022, SRC-NCCN-AML-2025, SRC-ESMO-AML-2020). For fit patients,
  intensive індукція (7+3 цитарабін/anthracycline) remains стандарт 1L; oral азацитидин
  підтримка after CR significantly prolongs OS in non-transplant patients (QUAZAR
  AML-001 Wei NEJM 2020 — медіана ЗВ 24.7 проти 14.8 міс., HR 0.69). For unfit patients,
  венетоклакс + азацитидин is переважний (VIALE-A DiNardo NEJM 2020 — NPM1-mutated
  subgroup особливо responsive, CR/CRi ~67%, міс. 14.7 міс.). NPM1-мутація МЗХ by
  RT-qPCR drives post-CR intensification decisions in younger fit patients per SRC-ELN-AML-2022.

  '
