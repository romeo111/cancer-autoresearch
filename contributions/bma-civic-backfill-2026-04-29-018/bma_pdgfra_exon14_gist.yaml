id: BMA-PDGFRA-EXON14-GIST
biomarker_id: BIO-PDGFRA
variant_qualifier: exon 14 mutation (ATP-binding pocket — N659K, N659Y; very rare)
disease_id: DIS-GIST
escat_tier: IB
evidence_summary: 'PDGFRA exon 14 mutations in GIST are very rare and are imatinib-
  sensitive. Treatment is identical to other imatinib-sensitive PDGFRA variants: imatinib
  400 mg/day 1L. Per OncoKB and NCCN, all PDGFRA non-D842V mutations are grouped as
  imatinib-responsive.

  '
