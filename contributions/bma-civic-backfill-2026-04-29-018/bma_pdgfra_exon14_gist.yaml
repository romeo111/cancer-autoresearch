  sensitive. лікування is identical to other іматиніб-sensitive PDGFRA варіанти: іматиніб
  400 mg/day 1L. Per OncoKB and NCCN, all PDGFRA non-D842V мутації are grouped as
  іматиніб-responsive.

  '
