notes: |
  NCCN does not publish a single "Pediatric Sarcoma" guideline; pediatric
  sarcoma guidance is distributed across:
  - NCCN Bone Cancer (with pediatric subsections)
  - NCCN Soft Tissue Sarcoma
  - NCCN Adolescent and Young Adult Oncology
  - NCCN Pediatric Hodgkin Lymphoma (related)

  Citing entities should pin the specific NCCN document + version in
  their `source_section` field, e.g., "NCCN Bone Cancer v2.2025 §EWING-1".

