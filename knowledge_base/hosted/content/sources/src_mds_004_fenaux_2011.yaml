notes: >
  MDS-004 phase-3: lenalidomide 10 mg PO d1-21/28d vs 5 mg
  continuous vs placebo in transfusion-dependent LR-MDS with
  del(5q). 26-week RBC TI 56.1% (10 mg) vs 42.6% (5 mg) vs 5.9%
  (placebo). Median TI duration >2 years. Established lenalidomide
  as Cat 1 for del(5q) LR-MDS. Companion to MDS-003 (Houston phase-2).
  Subset of patients (~20-25%) may achieve cytogenetic CR (loss of
  del(5q) clone).
