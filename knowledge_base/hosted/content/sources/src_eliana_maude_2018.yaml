notes: >
  ELIANA single-arm phase-2: tisagenlecleucel CD19 CAR-T in R/R
  pediatric and young-adult (3-21 years; later expanded to ≤25)
  B-ALL. ORR 81%; CR/CRi 60%; MRD-negativity in CR/CRi 100%;
  12-month EFS 50%, OS 76%. CRS Grade ≥3 ~46%; ICANS Grade ≥3
  ~13%. FDA approval Aug 2017 — first FDA-approved CAR-T. EMA Aug
  2018. Established tisa-cel as standard for R/R B-ALL ≤25 years.
