notes: >
  CodeBreaK 300 phase-3 (NCT05198934): sotorasib 960 mg PO daily +
  panitumumab vs sotorasib 240 mg + panitumumab vs investigator-choice
  (trifluridine/tipiracil or regorafenib) in chemo-refractory KRAS
  G12C-mutated mCRC. mPFS 5.6 mo (soto 960 + pani) vs 3.9 mo (soto 240
  + pani) vs 2.2 mo (control); HR 0.49 (960 + pani vs control,
  p=0.006). ORR 26.4% vs 5.7% vs 0%. Basis for FDA approval (Jan 2025)
  of sotorasib + panitumumab in KRAS G12C mCRC after fluoropyrimidine,
  oxaliplatin, irinotecan. Established KRAS-G12C + EGFR dual blockade
  as standard salvage in this niche.
