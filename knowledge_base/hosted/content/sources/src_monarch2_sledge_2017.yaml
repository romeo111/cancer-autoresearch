notes: >
  MONARCH-2 phase-3 (NCT02107703): abemaciclib + fulvestrant vs
  placebo + fulvestrant in HR+/HER2- ABC after endocrine therapy
  failure (n=669). Median PFS 16.4 vs 9.3 mo (HR 0.553; p<0.001).
  OS update (Sledge JAMA Oncol 2019): mOS 46.7 vs 37.3 mo
  (HR 0.757; p=0.01). Established abemaciclib + fulvestrant 2L
  HR+/HER2- ABC with OS benefit; basis for FDA approval Sep 2017.
