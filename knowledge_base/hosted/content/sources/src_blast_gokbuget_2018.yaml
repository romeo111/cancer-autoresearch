notes: >
  BLAST phase-2 single-arm: blinatumomab 28 µg/day continuous IV
  d1-28 of 42-day cycle ×4 cycles in adults with B-ALL with
  persistent or recurrent MRD ≥10⁻³ after ≥3 cycles intensive
  induction. Complete MRD response 78%. Established blinatumomab
  for MRD+ B-ALL post-induction. TOWER (Kantarjian et al., NEJM
  2017) is the R/R Ph- phase-3.
