notes: >
  MONARCH-3 phase-3 (NCT02246621): abemaciclib 150 mg PO BID
  continuous + nonsteroidal AI (anastrozole or letrozole) vs
  placebo + AI in 1L postmenopausal HR+/HER2- ABC (n=493). Median
  PFS 28.2 vs 14.8 mo (HR 0.54; p<0.001). OS update (Goetz Ann
  Oncol 2024): mOS 66.8 vs 53.7 mo (HR 0.804; p=0.0664) — trend
  but not statistically significant. Established abemaciclib as
  3rd CDK4/6i for 1L HR+/HER2- ABC.
