notes: >
  SOLO-1 phase-3 (NCT01844986): olaparib 300 mg PO BID maintenance
  for up to 2 years vs placebo in BRCA1/2-mutant advanced ovarian
  cancer in CR/PR after 1L platinum-based chemo. Median PFS not
  reached vs 13.8 mo (HR 0.30, p<0.001); 3-year PFS 60% vs 27%.
  7-year update (DiSilvestro JCO 2023) showed durable PFS/OS benefit.
  Established olaparib as 1L maintenance standard for BRCA-mutant
  advanced ovarian; basis for FDA approval (Dec 2018).
