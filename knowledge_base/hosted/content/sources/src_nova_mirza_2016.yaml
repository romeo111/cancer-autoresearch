notes: >
  ENGOT-OV16/NOVA phase 3: niraparib 300 mg PO daily maintenance vs
  placebo in platinum-sensitive recurrent ovarian after CR/PR to most
  recent platinum. Stratified by germline BRCA: gBRCA mut PFS 21.0 vs
  5.5 mo (HR 0.27); non-gBRCA HRD+ PFS 12.9 vs 3.8 mo (HR 0.38);
  non-gBRCA overall PFS 9.3 vs 3.9 mo (HR 0.45). Established niraparib
  as the broadest-indication PARPi maintenance regardless of biomarker.
