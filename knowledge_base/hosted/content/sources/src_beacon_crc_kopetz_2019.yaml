notes: >
  BEACON CRC phase-3 (NCT02928224): encorafenib 300 mg PO daily +
  binimetinib 45 mg BID + cetuximab vs encorafenib + cetuximab vs
  control (FOLFIRI/irinotecan + cetuximab) in BRAF V600E-mutated
  metastatic CRC after 1–2 prior lines. Triplet mOS 9.0 vs 5.4 mo
  (HR 0.52, p<0.001); ORR 26% vs 2%. Doublet (enco+cetux) mOS 8.4 mo,
  HR 0.60. Established BRAFi + EGFRi (± MEKi) as 2L+ standard for
  BRAF V600E mCRC; basis for FDA approval (Apr 2020) of encorafenib +
  cetuximab. Final analysis (Tabernero 2021, JCO) confirmed OS benefit.
