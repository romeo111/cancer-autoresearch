notes: >
  MURANO phase-3 (NCT02005471): venetoclax + rituximab × 24 mo
  (fixed duration) vs bendamustine + rituximab in R/R CLL (n=389).
  24-mo PFS 84.9% vs 36.3% (HR 0.17; p<0.001). 7-yr update
  (Seymour Blood 2024): 7-yr OS 69.6% vs 51.0% (HR 0.53). MRD-
  negativity sustained off-treatment. Established time-limited
  ven+R as 2L standard for R/R CLL; basis for FDA approval Jun
  2018.
