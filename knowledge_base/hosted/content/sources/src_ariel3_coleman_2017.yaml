notes: >
  ARIEL3 phase 3: rucaparib 600 mg PO BID maintenance vs placebo in
  platinum-sensitive recurrent ovarian after CR/PR to most recent
  platinum, ≥2 prior platinum lines. BRCA-mut: mPFS 16.6 vs 5.4 mo
  (HR 0.23); HRD+ (BRCA + LOH-high): 13.6 vs 5.4 mo (HR 0.32);
  ITT all-comers: 10.8 vs 5.4 mo (HR 0.36). Established rucaparib as
  third PARPi maintenance option for platinum-sensitive recurrent
  ovarian.
