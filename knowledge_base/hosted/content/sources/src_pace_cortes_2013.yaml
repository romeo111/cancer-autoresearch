notes: >
  PACE phase-2: ponatinib 45 mg PO daily in r/r Ph+ leukemias
  (CML chronic/accelerated/blast, Ph+ ALL) post-multi-TKI or
  T315I+. CML-CP MCyR 56% / MMR 34%. T315I-CP MCyR 70%. Established
  ponatinib for T315I-positive AND post-multi-TKI failure CML/Ph+
  ALL. OPTIC trial (Cortes et al., Blood 2021) subsequently
  validated response-adjusted dose reduction (45 → 15 mg upon MMR)
  to mitigate vascular events.
