notes: >
  Carvajal et al. phase 2 (NCT00470470): imatinib 400 mg PO BID in
  KIT-mutant or KIT-amplified metastatic mucosal, acral, or
  chronically-sun-damaged melanoma (n=51 enrolled, 25 treated for
  >=6 wks). Durable responses observed in patients with KIT mutations
  affecting exon 11 or 13 (L576P, K642E) — ORR 23%, with several
  responses lasting >1 year. KIT amplification alone was NOT
  predictive of response. Establishes imatinib as an option for the
  ~15-20% of mucosal/acral melanoma patients with actionable KIT
  exon-11/13 mutations. ESCAT IIA per ESMO molecular targets framework.
  Subsequent confirmatory studies (Hodi 2013, Guo 2017) reproduced
  the genotype-response correlation.
