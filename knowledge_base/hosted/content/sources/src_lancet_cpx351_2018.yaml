notes: >
  Pivotal phase-3 (NCT01696084): CPX-351 (Vyxeos) liposomal
  cytarabine + daunorubicin vs standard 7+3 in patients age 60-75
  with secondary AML (t-AML, AML-MRC, history of MDS/CMML). Median
  OS 9.56 vs 5.95 mo (HR 0.69). 5-year OS 18% vs 8%. Higher CR/CRi
  rate (47.7% vs 33.3%). Basis for FDA approval Aug 2017 specifically
  for newly-dx tAML or AML-MRC.
