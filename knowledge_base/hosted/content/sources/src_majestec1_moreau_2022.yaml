notes: >
  MajesTEC-1 phase-1/2 (NCT03145181 / NCT04557098): teclistamab
  (BCMA × CD3 bispecific T-cell engager) 1.5 mg/kg SC weekly after
  step-up in heavily pretreated R/R MM (n=165, median 5 prior
  lines including PI, IMiD, anti-CD38). ORR 63%, ≥CR 39%; mPFS
  11.3 mo; mDOR 18.4 mo. Established teclistamab as first BCMA-
  bispecific approved for MM; basis for FDA accelerated approval
  Oct 2022.
