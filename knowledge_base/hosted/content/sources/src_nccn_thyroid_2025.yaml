notes: 'Primary international guideline for differentiated, medullary, and anaplastic
  thyroid carcinoma. Codifies mandatory germline RET testing in MTC, RET-selective
  TKIs (selpercatinib LIBRETTO-531, pralsetinib ARROW) as preferred 1L for advanced/progressive
  RET-mutant MTC over multikinase TKIs (cabozantinib EXAM, vandetanib ZETA), and calcitonin
  / CEA monitoring.

