notes: >
  Multidisciplinary update incorporating the revised 2023 FIGO staging
  system (peritoneal carcinomatosis + lymph-node-metastasis refinements;
  histological-subtype + LVSI + molecular-classification factors) for
  endometrial carcinoma. 30 international experts, 225 external
  reviewers. Covers risk-group stratification, molecular classification
  & biomarkers, pathological features, surgical cornerstones, adjuvant
  treatment, and management of metastatic / recurrent disease. ESMO is
  no longer a co-publisher (vs the 2022 ESMO-ESGO-ESTRO consensus,
  SRC-ESMO-ENDOMETRIAL-2022 in KB, which it supersedes). Open-access
  PDF mirrored at guidelines.esgo.org.
