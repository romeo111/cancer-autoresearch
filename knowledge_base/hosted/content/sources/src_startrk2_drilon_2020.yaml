notes: >
  Integrated analysis of ALKA-372-001, STARTRK-1, STARTRK-2: entrectinib
  in 53 ROS1+ NSCLC pts. ORR 77%, mPFS 19.0 mo, intracranial ORR 55%.
  Established entrectinib as preferred ROS1 1L in CNS-positive disease
  given crizotinib's poor CNS penetration. NCCN/ESMO 1L for ROS1+ NSCLC
  alongside crizotinib.
