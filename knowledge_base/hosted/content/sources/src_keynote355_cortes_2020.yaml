notes: >
  KEYNOTE-355 phase-3 (NCT02819518): pembrolizumab + investigator-
  choice chemo (nab-paclitaxel, paclitaxel, or gemcitabine/carbo)
  vs placebo + chemo in 1L locally recurrent unresectable or
  metastatic TNBC (n=847). In CPS≥10 cohort: mPFS 9.7 vs 5.6 mo
  (HR 0.65). OS update (Cortes NEJM 2022): mOS 23.0 vs 16.1 mo
  in CPS≥10 (HR 0.73; p=0.0185). Established pembro + chemo as 1L
  standard for PD-L1 CPS≥10 metastatic TNBC.
