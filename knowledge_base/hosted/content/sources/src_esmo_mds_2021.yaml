notes: >
  ESMO consensus on MDS diagnosis (WHO/ICC alignment), IPSS-R/IPSS-M
  risk stratification, ESA + luspatercept + lenalidomide for low-risk,
  hypomethylating agents (azacitidine, decitabine) for high-risk,
  alloHCT timing.
  Freshness check 2026-04-27: ESMO has not published an MDS guideline
  refresh since 2021 (Fenaux et al). The 2022 WHO / ICC reclassification
  of "myelodysplastic neoplasms" and the IPSS-M (Bernard 2022;
  SRC-IPSS-M-BERNARD-2022 in KB) refine the risk-stratification layer.
  NCCN-MDS guidance has continued to update annually (paywalled).
  Source kept as the ESMO-tier reference; re-verify in 12 months.
