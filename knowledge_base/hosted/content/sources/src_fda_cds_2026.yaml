notes: >
  Authoritative interpretation of §520(o)(1)(E) of the FD&C Act
  (21st Century Cures Act CDS carve-out). Defines four criteria for
  software to qualify as Non-Device CDS, exempt from FDA premarket
  review. OpenOnco's design (CHARTER §2 two-plan output, §8.3
  no-LLM-clinical-reasoning, transparent rule engine, source citations)
  was independently shaped to fit this carve-out. The PDF lives at
  specs/Guidance-Clinical-Decision-Software_5.pdf.
