notes: >
  AURELIA phase 3: investigator-choice chemotherapy (PLD 40 mg/m² q28d,
  weekly paclitaxel 80 mg/m² days 1, 8, 15, 22 q28d, OR topotecan)
  ± bevacizumab 15 mg/kg q21d (or 10 mg/kg q14d with weekly pacli) in
  platinum-resistant recurrent ovarian (≤2 prior antiangiogenic-naive
  lines). mPFS 6.7 vs 3.4 mo (HR 0.48); ORR 27.3% vs 11.8%; OS NS
  (16.6 vs 13.3 mo, HR 0.85) but weekly-paclitaxel subgroup had OS
  benefit. Established bev + chemo as standard platinum-resistant option.
