notes: >
  BOLERO-2 phase-3: everolimus 10 mg PO daily + exemestane 25 mg PO
  daily vs placebo + exemestane in postmenopausal HR+/HER2- advanced
  breast progressing on non-steroidal AI. Median PFS 10.6 vs 4.1 mo
  by central review (HR 0.36, p<0.001). Stomatitis (56%), rash,
  fatigue, pneumonitis dominant AEs. Established mTOR inhibition as
  endocrine-resistance reversal strategy; in current era used as
  no-targetable-mutation 2L+ option (per task: with fulvestrant +
  everolimus combination off-label but supported by PrECOG/MANTA
  data).
