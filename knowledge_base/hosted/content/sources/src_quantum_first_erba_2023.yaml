notes: >
  QuANTUM-First phase-3: quizartinib 35.4-53 mg PO + standard 7+3
  induction + consolidation + 3-year maintenance vs placebo+chemo,
  newly-dx FLT3-ITD+ AML, age 18-75. Median OS 31.9 vs 15.1 mo
  (HR 0.78). Basis for FDA approval July 2023.
