notes: >
  KEYNOTE-177 phase-3 (NCT02563002): pembrolizumab 200 mg IV q3w vs
  investigator-choice 1L chemo (mFOLFOX6 or FOLFIRI ± bevacizumab/
  cetuximab) in untreated MSI-H/dMMR metastatic CRC. mPFS 16.5 vs 8.2
  mo (HR 0.60, p=0.0002); ORR 43.8% vs 33.1%. Final OS analysis
  (Diaz 2022, Lancet Oncol) crossed without statistical significance
  due to high crossover (60%). Established pembrolizumab as 1L
  standard for MSI-H/dMMR mCRC; basis for FDA approval (Jun 2020).
