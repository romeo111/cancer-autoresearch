notes: >
  OlympiAD phase-3: olaparib 300 mg PO BID vs physician-choice
  single-agent chemo (capecitabine, eribulin, vinorelbine) in
  germline BRCA1/2-mutant HER2- metastatic breast (≤2 prior chemo
  lines for metastatic disease; HR+ subset must have progressed on
  ≥1 endocrine line). Median PFS 7.0 vs 4.2 mo (HR 0.58, p<0.001);
  ORR 60% vs 29%; OS not significantly improved in final analysis.
  Established olaparib as 2L+ option for gBRCA-mutant HER2-
  metastatic; applies across HR+ and TNBC subtypes.
