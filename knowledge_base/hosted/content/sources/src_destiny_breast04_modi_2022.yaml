notes: 'DESTINY-Breast04 phase-3: T-DXd 5.4 mg/kg q3w vs physician-choice chemo in
  HER2-low (IHC 1+ or IHC 2+/ISH-) advanced breast pretreated with 1-2 prior chemo
  lines for metastatic disease (HR+ cohort had to have progressed on endocrine ± CDK4/6i
  first). HR+ cohort (n=494): median PFS 10.1 vs 5.4 mo (HR 0.51, p<0.001); median
  OS 23.9 vs 17.5 mo (HR 0.64, p=0.003). Overall TNBC + HR+ cohort (n=557): consistent
  benefit. ILD any-grade ~12%, G3+ 1.3%. Established HER2-low as actionable category
  and T-DXd as standard 2L+ for both HR+ post-CDK4/6i/endocrine and TNBC post-1L.

