notes: >
  PT-1 (Primary Thrombocythemia 1): RCT in 809 high-risk ET patients
  comparing HU + low-dose ASA vs anagrelide + low-dose ASA. Composite
  primary endpoint (arterial thrombosis, venous thrombosis, serious
  hemorrhage, death from vascular cause): HU arm SUPERIOR — anagrelide
  associated with more arterial thrombosis, more serious hemorrhage,
  and more progression to myelofibrosis. Established HU as preferred
  1L cytoreduction in high-risk ET; anagrelide reserved for HU
  resistance / intolerance.
