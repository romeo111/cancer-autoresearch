notes: >
  TRANSCEND NHL 001 phase-1 (NCT02631044): lisocabtagene
  maraleucel (liso-cel, CD19 CAR-T) at 100×10^6 cells in R/R
  aggressive B-NHL after ≥2 prior lines (n=256 leukapheresed,
  269 efficacy). ORR 73%, CR 53%; mDOR not reached for CR; mPFS
  6.8 mo, mOS 21.1 mo. Established liso-cel as 3L+ option with
  more favorable CRS/ICANS profile (Grade 3+ CRS 2%, ICANS 10%);
  basis for FDA approval Feb 2021.
