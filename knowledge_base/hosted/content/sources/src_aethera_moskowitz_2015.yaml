notes: 'AETHERA phase-3 (NCT01100502): brentuximab vedotin (BV) consolidation × 16
  cycles vs placebo after autologous HCT in high-risk relapsed/refractory classical
  Hodgkin lymphoma (n=329). Median PFS 42.9 vs 24.1 mo (HR 0.57; p=0.0013). 5-yr update
  (Moskowitz Blood 2018): 5-yr PFS 59% vs 41%. Established BV post-ASCT consolidation
  for high-risk cHL; basis for FDA approval Aug 2015. NOTE: task brief listed PMID
  25733100 — that PMID is the trial design paper; primary results PMID is 25796459
  (verified).

