notes: >
  EMBRACA phase-3: talazoparib 1 mg PO daily vs physician-choice
  single-agent chemo in germline BRCA1/2-mutant HER2- metastatic
  breast (≤3 prior cytotoxic regimens). Median PFS 8.6 vs 5.6 mo
  (HR 0.54, p<0.001); ORR 62.6% vs 27.2%. Anemia G3+ (39%) more
  pronounced than with olaparib; nausea, fatigue, alopecia common.
  Established talazoparib as alternative PARPi to olaparib for
  gBRCA-mutant HER2- metastatic breast — comparable efficacy,
  different AE profile (more haematologic, less GI than olaparib).
