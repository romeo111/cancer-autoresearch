notes: >
  IMerge phase-3: imetelstat 7.1 mg/kg IV q4wk vs placebo in
  transfusion-dependent LR-MDS (IPSS low / int-1) post-ESA
  failure. Primary endpoint 8-week RBC TI: 39.8% vs 15.0%
  (p<0.001). Sustained 24-week TI 28% vs 3.3%. Median TI duration
  ~52 weeks. Established imetelstat as 2L for transfusion-
  dependent LR-MDS post-ESA failure. FDA-approved June 2024.
