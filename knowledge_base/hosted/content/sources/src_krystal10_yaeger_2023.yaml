notes: >
  KRYSTAL-1 CRC cohort phase-1/2 (NCT03785249): adagrasib 600 mg PO BID
  monotherapy (n=44) or adagrasib + cetuximab (n=32) in chemo-refractory
  KRAS G12C-mutant mCRC. Mono ORR 19%; mPFS 5.6 mo; mOS 19.8 mo.
  Combo ORR 46%; mPFS 6.9 mo; mOS 13.4 mo. Demonstrated KRAS-G12C +
  EGFR doublet superiority in CRC (consistent with EGFR-feedback
  reactivation hypothesis); set the stage for the randomized KRYSTAL-10
  phase-3 trial of adagrasib + cetuximab vs chemo. Basis for FDA
  accelerated approval (Jun 2024) of adagrasib + cetuximab in pretreated
  KRAS G12C mCRC. NOTE: KRYSTAL-10 is the confirmatory phase-3 (results
  pending at time of authoring); this entry references the phase-1/2
  Yaeger 2023 NEJM publication that supplied the registration data.
