notes: >
  KarMMa phase-2 (NCT03361748): ide-cel (idecabtagene vicleucel,
  BCMA-CAR-T) at 150–450×10^6 cells in heavily pretreated R/R
  multiple myeloma (n=128, median 6 prior lines). ORR 73% overall,
  81% at top dose; sCR 33%; mPFS 8.8 mo (450×10^6 dose 12.1 mo);
  mOS 24.8 mo. Established ide-cel as first BCMA CAR-T approved
  for MM; basis for FDA approval Mar 2021. NOTE: task brief listed
  PMID 33812491 — that PMID is the editorial; primary PMID is
  33626253 (verified).
