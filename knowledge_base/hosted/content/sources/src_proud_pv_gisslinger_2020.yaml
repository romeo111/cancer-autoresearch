notes: >
  PROUD-PV (initial, n=257, 12 months) + CONTINUATION-PV (extension,
  36 months) — phase-3 RCT of ropeginterferon alfa-2b 100-500 µg
  SC q2wk vs hydroxyurea in newly-dx PV (or pre-treated <3 years).
  Complete hematologic response 71% vs 51% at 36 months. Marked
  reduction of JAK2-V617F allele burden (only with ropeginterferon).
  Established ropeginterferon as 1L cytoreductive option for PV
  with disease-modifying potential.
