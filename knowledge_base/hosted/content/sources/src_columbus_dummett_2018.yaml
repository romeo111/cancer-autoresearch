notes: >
  COLUMBUS phase 3 (NCT01909453): encorafenib 450 mg + binimetinib
  45 mg BID vs vemurafenib 960 mg BID vs encorafenib 300 mg mono in
  treatment-naive or post-1L-IO BRAF V600-mutant unresectable/metastatic
  melanoma. mPFS 14.9 vs 7.3 mo (encorafenib+binimetinib vs vemurafenib;
  HR 0.54). 5-year OS update (Dummer 2022, Ann Oncol): mOS 33.6 vs 16.9
  mo. Improved tolerability vs vemurafenib (less photosensitivity, less
  pyrexia than dabrafenib+trametinib). Establishes ENCO+BINI as
  preferred BRAFi+MEKi doublet per NCCN/ESMO. Applied here for 2L
  post-IO BRAF V600E/K positive sequence.
