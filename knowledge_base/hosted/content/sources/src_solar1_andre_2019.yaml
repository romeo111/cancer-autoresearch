notes: >
  SOLAR-1 phase-3: alpelisib 300 mg PO daily + fulvestrant vs
  placebo + fulvestrant in HR+/HER2- advanced breast progressing on
  AI. PIK3CA-mutant cohort (n=341): median PFS 11.0 vs 5.7 mo
  (HR 0.65, p<0.001). Hyperglycemia G3+ in 37%. Established
  alpelisib + fulvestrant as standard 2L for PIK3CA-mutant
  HR+/HER2- post-AI.
