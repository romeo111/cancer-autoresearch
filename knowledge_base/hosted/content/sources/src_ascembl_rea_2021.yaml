notes: >
  ASCEMBL phase-3 RCT: asciminib 40 mg BID vs bosutinib 500 mg
  daily in CML-CP after ≥2 prior TKIs (n=233). Primary endpoint
  MMR at 24 weeks 25.5% vs 13.2% (difference 12.2%, p=0.029).
  Better tolerability than bosutinib. Established asciminib as 3L+
  standard for CML-CP post-multi-TKI failure (T315I-negative).
