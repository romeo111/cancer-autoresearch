notes: >
  MOMENTUM phase-3: momelotinib 200 mg PO daily vs danazol 600 mg
  PO daily in JAKi-experienced MF with anemia (Hb <10) +
  symptoms. Primary endpoint MFSAF total symptom score response
  25% vs 9% at week 24 (p=0.0095). Spleen volume response 22% vs
  3%. Transfusion independence 31% vs 20%. Established momelotinib
  for MF with anemia post-JAKi failure. FDA approval Sept 2023.
