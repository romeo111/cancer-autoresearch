notes: >
  Single-center / multi-institutional series describing
  gemtuzumab ozogamicin + ATO ± ATRA in relapsed APL post
  front-line ATRA + chemo (or ATRA + ATO). High CR rates (~91%)
  with rapid deep MRD-negative responses. Established gemtuzumab's
  role in salvage APL — relapsed APL is exquisitely CD33+. No
  large RCT in this rare relapsed setting; salvage data is mostly
  case series + retrospective registries. MyloFrance label-name
  refers to the French gemtuzumab dosing convention.
