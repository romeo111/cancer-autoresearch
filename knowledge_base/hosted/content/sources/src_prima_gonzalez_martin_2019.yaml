notes: >
  PRIMA/ENGOT-OV26 phase 3: niraparib 200/300 mg daily (individualized
  by weight + platelets) maintenance vs placebo in newly diagnosed
  advanced ovarian after CR/PR to 1L platinum (regardless of biomarker).
  HRD+ subset: mPFS 21.9 vs 10.4 mo (HR 0.43). Overall: mPFS 13.8 vs
  8.2 mo (HR 0.62). Cited here for HRD+ recurrent maintenance evidence
  alongside NOVA — the niraparib indication used in 2L+ ALGO-OVARIAN-2L
  is supported by both PRIMA (1L) and NOVA (2L+) data.
