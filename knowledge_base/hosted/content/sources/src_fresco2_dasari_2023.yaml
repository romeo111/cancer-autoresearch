notes: >
  FRESCO-2 phase-3 (NCT04322539): fruquintinib 5 mg PO daily (3 wk on /
  1 wk off) vs placebo in mCRC after all approved standards
  (fluoropyrimidine, oxaliplatin, irinotecan, anti-VEGF, anti-EGFR if
  RAS-WT, TAS-102 and/or regorafenib). mOS 7.4 vs 4.8 mo (HR 0.66,
  p<0.0001); mPFS 3.7 vs 1.8 mo (HR 0.32). Basis for FDA approval
  (Nov 2023) of fruquintinib in chemo-refractory mCRC. Adds a 4th-line
  oral VEGFR-TKI option after RECOURSE/SUNLIGHT and regorafenib.
  NOTE: original task list cited PMID 37004416 — that PMID does not
  match this paper; correct PMID is 37331369 (verified via PubMed).
