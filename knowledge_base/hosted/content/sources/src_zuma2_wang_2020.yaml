notes: >
  ZUMA-2 phase-2 (NCT02601313): brexucabtagene autoleucel (brexu-cel,
  KTE-X19, CD19 CAR-T) in R/R mantle cell lymphoma after BTKi
  failure (n=68 treated). ORR 87%, CR 62%; 12-mo PFS 61%, 12-mo OS
  83%. 3-yr update (Wang JCO 2023): mPFS 25.8 mo, mOS 46.6 mo.
  Established brexu-cel as 2L+ standard for R/R MCL post-BTKi;
  basis for FDA approval Jul 2020.
