notes: >
  Primary international guideline for breast cancer. Codifies receptor-
  driven branching, CDK4/6i in HR+/HER2- metastatic + adjuvant high-risk
  (monarchE, NATALEE), pertuzumab + trastuzumab backbone for HER2+
  (APHINITY, CLEOPATRA), T-DM1 adjuvant for residual after neoadjuvant
  HER2+ (KATHERINE), T-DXd ≥2L HER2+ metastatic (DESTINY-Breast03),
  pembrolizumab + chemo neoadjuvant TNBC (KEYNOTE-522) and metastatic
  TNBC PD-L1+ (KEYNOTE-355), olaparib adjuvant BRCA+ early-high-risk
  (OlympiA), sacituzumab-govitecan ≥2L TNBC (ASCENT) and HR+ ≥3L
  (TROPiCS-02), elacestrant ESR1-mutant HR+ (EMERALD), alpelisib +
  fulvestrant for PIK3CA-mutant HR+ (SOLAR-1).
