notes: >
  MAIA phase-3 (NCT02252172): daratumumab + lenalidomide +
  dexamethasone (DRd) vs Rd in 1L transplant-ineligible NDMM
  (n=737). 30-mo PFS 70.6% vs 55.6% (HR 0.56; p<0.001). OS update
  (Facon Lancet Oncol 2021): 5-yr OS 66.3% vs 53.1% (HR 0.66;
  p=0.0013). Established DRd as 1L standard for transplant-
  ineligible NDMM; basis for FDA approval Jun 2019.
