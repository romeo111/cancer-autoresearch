notes: >
  ZUMA-7 phase-3 (NCT03391466): axi-cel vs standard 2L (chemo +
  ASCT for responders) in R/R LBCL within 12 mo of 1L (n=359).
  Median EFS 8.3 vs 2.0 mo (HR 0.40; p<0.001); ORR 83% vs 50%.
  4-yr OS update (Westin NEJM 2023): mOS not reached vs 31.1 mo
  (HR 0.726; p=0.03). Established axi-cel as 2L standard for
  primary refractory / early relapsed LBCL; basis for FDA approval
  Apr 2022.
