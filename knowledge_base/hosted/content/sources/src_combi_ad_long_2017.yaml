notes: 'COMBI-AD phase-3 (NCT01682083): adjuvant dabrafenib + trametinib × 12 mo vs
  placebo after complete resection of stage III BRAF V600E/K-mutated melanoma (n=870).
  3-yr RFS 58% vs 39% (HR 0.47; p<0.001). 5-yr update (Dummer NEJM 2020): 5-yr RFS
  52% vs 36% (HR 0.51); 5-yr OS 65% vs 54% (HR 0.71). Established adjuvant BRAFi+MEKi
  for resected stage III BRAF-mutant melanoma; basis for FDA approval Apr 2018.

