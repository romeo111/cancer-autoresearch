notes: >
  CAPItello-291 phase-3: capivasertib 400 mg PO BID 4-on/3-off +
  fulvestrant vs placebo + fulvestrant in HR+/HER2- advanced breast
  after progression on AI ± CDK4/6i. Overall: median PFS 7.2 vs
  3.6 mo (HR 0.60). AKT-pathway-altered subgroup (PIK3CA / AKT1 /
  PTEN, n=289): PFS 7.3 vs 3.1 mo (HR 0.50). Diarrhea (72%),
  hyperglycemia, rash dominant AEs. FDA-approved 2023 for
  PIK3CA / AKT1 / PTEN-altered HR+/HER2- advanced breast post-CDK4/6i.
