notes: >
  MOUNTAINEER phase-2 (NCT03043313): tucatinib 300 mg PO BID +
  trastuzumab IV q3w in HER2-positive (IHC 3+ or IHC 2+ / ISH+) RAS
  wild-type chemo-refractory metastatic CRC. ORR 38.1% (cohort A+B,
  n=84); median DOR 12.4 mo; median PFS 8.2 mo; mOS 24.1 mo. Basis for
  FDA accelerated approval (Jan 2023) of tucatinib + trastuzumab in
  HER2+ RAS-WT mCRC after fluoropyrimidine + oxaliplatin + irinotecan.
  Established chemo-free dual HER2 blockade as a standard option in
  this niche.
