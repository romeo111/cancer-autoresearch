notes: >
  LOTIS-2 phase-2 (NCT03589469): loncastuximab tesirine (CD19-
  targeted ADC, pyrrolobenzodiazepine payload) 0.15 mg/kg q3w in
  R/R DLBCL after ≥2 prior lines (n=145). ORR 48.3%, CR 24.1%;
  mDOR 10.3 mo (CR 13.4 mo); mPFS 4.9 mo. Established lonca as
  3L+ option for R/R DLBCL; basis for FDA accelerated approval
  Apr 2021. NOTE: task brief listed PMID 33851117 — that PMID
  belongs to a separate abstract; primary publication PMID is
  33989558 (verified).
