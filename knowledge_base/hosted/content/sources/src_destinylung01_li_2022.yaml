notes: 'DESTINY-Lung01 phase-2: T-DXd 6.4 mg/kg q3w in 91 pretreated HER2-mutant metastatic
  NSCLC. ORR 55%, mPFS 8.2 mo, mOS 17.8 mo. Pneumonitis ~26% (most G1-2). Established
  T-DXd as first targeted option for HER2-mut NSCLC; subsequent DESTINY-Lung02 randomized
  5.4 vs 6.4 mg/kg → 5.4 chosen for label.

