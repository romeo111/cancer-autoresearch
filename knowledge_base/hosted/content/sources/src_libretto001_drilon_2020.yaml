notes: >
  LIBRETTO-001 phase-1/2 NSCLC cohorts: selpercatinib in RET-fusion+
  NSCLC. Pretreated (n=105) ORR 64%, mPFS 16.5 mo; TKI-naive (n=39)
  ORR 85%. Intracranial ORR 91% (measurable brain mets). FDA approval
  2020 for RET-fusion+ NSCLC any line. LIBRETTO-431 confirmatory phase-3
  vs platinum±pembrolizumab (2023, PFS HR 0.46).
