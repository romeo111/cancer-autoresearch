notes: >
  GOG-0213 phase 3 (chemo arm): paclitaxel 175 mg/m² + carboplatin
  AUC 5 q21d × 6-8 cycles ± bevacizumab 15 mg/kg q21d (with continuation
  maintenance until progression) in platinum-sensitive recurrent
  ovarian. mOS 42.2 vs 37.3 mo (HR 0.823, p=0.056 stratified, 0.0447
  unstratified — primary endpoint missed by predefined alpha but
  clinically meaningful); mPFS 13.8 vs 10.4 mo (HR 0.628). Cited
  alongside OCEANS to support carbo+pacli+bev as a platinum-sensitive
  option (carbo+PLD+bev extrapolated from this backbone, with PLD
  substituted for paclitaxel in patients with neuropathy).
