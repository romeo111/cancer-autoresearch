notes: >
  ASCENT phase-3: sacituzumab govitecan 10 mg/kg IV days 1, 8 q3w
  vs physician-choice single-agent chemo (eribulin, vinorelbine,
  capecitabine, gemcitabine) in metastatic TNBC pretreated with
  ≥2 prior chemo lines (≥1 in metastatic setting). Brain-mets-
  negative cohort (n=468): median PFS 5.6 vs 1.7 mo (HR 0.41,
  p<0.001); median OS 12.1 vs 6.7 mo (HR 0.48, p<0.001); ORR
  35% vs 5%. Neutropenia G3+ (51%), diarrhea G3+ (10%) dominant
  AEs. Established sacituzumab govitecan as standard ≥2L for
  metastatic TNBC; later TROPiCS-02 extended indication to HR+/HER2-
  ≥3L (not in this scope).
