notes: >
  LIBRETTO-531 phase-3 (NCT04211337): selpercatinib 160 mg PO BID vs
  physician-choice multikinase inhibitor (cabozantinib or vandetanib)
  in treatment-naive RET-mutant advanced/metastatic medullary thyroid
  cancer. Median PFS not reached vs 16.8 mo (HR 0.28, p<0.001); 12-mo
  PFS 86.8% vs 65.7%. ORR 69.4% vs 38.8%. Significantly fewer G3+ AEs
  (50% vs 79%) and discontinuations (4.7% vs 26.8%). Established
  selpercatinib as 1L standard for RET-mutant MTC; basis for accelerated
  approval conversion. NOTE: original task list omitted PMID; verified
  via PubMed: 37870969 (Wirth LJ et al., N Engl J Med 2024;390:69–78).
