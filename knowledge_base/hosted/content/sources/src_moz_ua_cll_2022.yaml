notes: >
  Поточний український стандарт лікування CLL/SLL (затверджений наказом
  МОЗ № 1635 від 09.09.2022). Замінив старий протокол № 439 від 12.05.2016.
  Інтегрує BTKi (ibrutinib), venetoclax + obinutuzumab fixed-duration,
  актуальні diagnostic criteria за iwCLL 2018. Враховує доступність
  препаратів через НСЗУ (поточний Програмні гарантії onko-package).

