notes: >
  RECOURSE phase-3 (NCT01607957): trifluridine-tipiracil (TAS-102) 35
  mg/m² PO BID d1–5 and d8–12 of 28-day cycle vs placebo in mCRC after
  ≥2 prior lines including fluoropyrimidine, oxaliplatin, irinotecan,
  bevacizumab, anti-EGFR (if RAS-WT). mOS 7.1 vs 5.3 mo (HR 0.68,
  p<0.001); mPFS 2.0 vs 1.7 mo (HR 0.48). Basis for FDA approval
  (Sep 2015) of trifluridine-tipiracil in chemo-refractory mCRC.
  Established TAS-102 as a standard salvage option later expanded by
  SUNLIGHT (TAS-102 + bevacizumab) and FRESCO-2.
