notes: >
  OVA-301 phase 3: trabectedin 1.1 mg/m² IV over 3 h + PLD 30 mg/m²
  IV q21d vs PLD 50 mg/m² IV q28d alone in recurrent ovarian (BSA-corrected
  PFI ≥6 mo OR <6 mo allowed). Overall mPFS 7.3 vs 5.8 mo (HR 0.79);
  partially-platinum-sensitive subgroup (PFI 6-12 mo): mPFS 7.4 vs 5.5
  mo (HR 0.65) and mOS 23.0 vs 17.1 mo (HR 0.59). Supports trabectedin
  + PLD as 3L+ option, particularly when re-platinum is undesirable
  (cumulative toxicity, hypersensitivity).
