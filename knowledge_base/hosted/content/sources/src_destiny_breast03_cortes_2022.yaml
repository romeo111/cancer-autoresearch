notes: 'DESTINY-Breast03 phase-3: T-DXd 5.4 mg/kg q3w vs T-DM1 3.6 mg/kg q3w in HER2+
  metastatic breast pretreated with trastuzumab + taxane. Median PFS 28.8 vs 6.8 mo
  by BICR (HR 0.33, p<0.001); 12-mo PFS 75.8% vs 34.1%; ORR 79% vs 34%. ILD any-grade
  10.5%, G3+ 0.8%. Established T-DXd as preferred 2L for HER2+ metastatic post-THP,
  superior to T-DM1. NOTE: task brief listed PMID 35665782 for this trial; correct
  PMID is 35320644 (DB-04 Modi shares the listed PMID).

