notes: >
  PALOMA-2 phase-3 (NCT01740427): palbociclib 125 mg PO daily (3-wk
  on / 1-wk off) + letrozole 2.5 mg PO daily vs placebo + letrozole
  in 1L postmenopausal HR+/HER2- advanced breast cancer (n=666).
  Median PFS 24.8 vs 14.5 mo (HR 0.58; p<0.001). OS update
  (Finn JAMA 2022): mOS 53.9 vs 51.2 mo, not statistically
  significant. Established CDK4/6i + AI as 1L standard for HR+/HER2-
  ABC; basis for FDA approval Mar 2017.
