notes: >
  ZUMA-1 phase-2 (NCT02348216): axicabtagene ciloleucel (axi-cel,
  CD19 CAR-T) in R/R aggressive B-NHL (DLBCL, transformed FL,
  PMBCL) after ≥2 lines (n=101). ORR 82%, CR 54% at 6 mo; 5-yr
  update (Neelapu Blood 2023): 5-yr OS 42.6%; mDOR 11.1 mo, durable
  remissions in CR cohort. Established axi-cel as 3L+ standard for
  R/R aggressive B-NHL; basis for FDA approval Oct 2017 (first
  CAR-T approval in lymphoma).
