notes: >
  INO-VATE phase-3: inotuzumab ozogamicin vs investigator-choice
  salvage chemo in R/R Ph- B-ALL (n=326). CR/CRi 80.7% vs 29.4%
  (p<0.001); MRD-negativity 78.4% vs 28.1%; median PFS 5.0 vs
  1.8 mo; median OS 7.7 vs 6.7 mo (HR 0.77). VOD/SOS post-HCT
  ~14% (boxed warning). Established inotuzumab as 2L+ for R/R
  Ph- B-ALL; bridge-to-HCT intent dominant.
