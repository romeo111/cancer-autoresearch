notes: >
  RELATIVITY-047 phase 2/3 (NCT03470922): fixed-dose nivolumab
  480 mg + relatlimab 160 mg IV q4w (Opdualag) vs nivolumab mono in
  treatment-naive unresectable/metastatic melanoma. Median PFS 10.1 vs
  4.6 mo (HR 0.75). Grade 3-4 treatment-related AE 18.9% vs 9.7% —
  substantially less toxic than ipi+nivo (Grade 3-4 ~50%). FDA
  approval 2022-03-18 for Opdualag in 1L melanoma. Note: RELATIVITY
  was a 1L study; we surface it here as an IO-naive 2L alternative
  for patients who received 1L BRAFi+MEKi (and so are anti-PD-1 + LAG-3
  naive). Toxicity advantage over ipi+nivo makes this attractive
  when ipi-grade irAE risk is unacceptable.
