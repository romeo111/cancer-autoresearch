notes: 'EMERALD phase-3: elacestrant 400 mg PO daily vs investigator-choice endocrine
  (fulvestrant or AI) in HR+/HER2- advanced breast after 1-2 prior endocrine lines
  including CDK4/6i. ITT: median PFS 2.8 vs 1.9 mo (HR 0.70, p=0.002). ESR1-mutant
  subgroup (n=228): median PFS 3.8 vs 1.9 mo (HR 0.55, p=0.0005). Established elacestrant
  as preferred 2L+ for ESR1-mutant HR+/HER2- post-AI/CDK4/6i. FDA-approved Jan 2023.

