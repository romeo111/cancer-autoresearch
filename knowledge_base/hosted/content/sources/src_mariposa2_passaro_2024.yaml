notes: >
  MARIPOSA-2 phase-3: amivantamab + chemo (carbo+pem) ± lazertinib vs
  carbo+pem in EGFR-mutated NSCLC progressing on osimertinib.
  Ami+chemo PFS HR 0.48 (8.3 vs 4.2 mo); ami+laz+chemo HR 0.44
  (8.3 vs 4.2 mo). VTE rate elevated with lazertinib combo →
  prophylactic anticoagulation mandated.
