notes: >
  QUAZAR AML-001 phase-3: oral azacitidine (CC-486 / Onureg) 300 mg PO
  daily × 14 d / 28-d cycle vs placebo as maintenance after CR/CRi
  post-induction ± consolidation in AML patients ≥55 years not eligible
  for HCT. Median OS 24.7 vs 14.8 months (HR 0.69; p<0.001), median RFS
  10.2 vs 4.8 months. FDA-approved Sep 2020. Established oral
  azacitidine as standard of care AML CR1 maintenance for transplant-
  ineligible patients.
