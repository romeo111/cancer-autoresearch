notes: >
  MONALEESA-3 phase-3 (NCT02422615): ribociclib + fulvestrant vs
  placebo + fulvestrant in postmenopausal HR+/HER2- ABC, 1L or
  early relapse (n=726). Median PFS 20.5 vs 12.8 mo (HR 0.59).
  OS update (Slamon NEJM 2020): 42-mo OS 57.8% vs 45.9% (HR 0.72;
  p=0.00455). Confirmed OS benefit of ribociclib in HR+/HER2- ABC
  including 1L postmenopausal subset and early-relapse cohort.
