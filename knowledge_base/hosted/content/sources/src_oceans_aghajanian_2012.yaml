notes: >
  OCEANS phase 3: carboplatin AUC 4 + gemcitabine 1000 mg/m² days 1, 8
  q21d × 6-10 cycles ± bevacizumab 15 mg/kg q21d (continued as
  maintenance until progression) in platinum-sensitive recurrent
  ovarian. mPFS 12.4 vs 8.4 mo (HR 0.484); ORR 78.5% vs 57.4%; OS
  not significantly improved (33.3 vs 32.9 mo). Established
  bevacizumab + carbo/gem as 2L platinum-sensitive option.
