notes: >
  MIRASOL/GOG 3045/ENGOT-ov55 phase 3: mirvetuximab soravtansine
  6 mg/kg AIBW IV q21d vs investigator-choice chemo (paclitaxel weekly,
  PLD, OR topotecan) in FRα-high (≥75% TPS, VENTANA FOLR1 RxDx),
  platinum-resistant recurrent ovarian after 1-3 prior lines.
  mPFS 5.62 vs 3.98 mo (HR 0.65); ORR 42% vs 16%; mOS 16.46 vs 12.75
  mo (HR 0.67) — first phase-3 PFS+OS win in platinum-resistant
  ovarian. Established mirvetuximab as preferred 2L+ option in FRα-high
  subset and converted FDA accelerated approval to full approval.
