notes: >
  POLLUX phase-3 (NCT02076009): daratumumab + lenalidomide +
  dexamethasone (DRd) vs Rd in R/R MM with ≥1 prior line (n=569).
  12-mo PFS 83.2% vs 60.1% (HR 0.37; p<0.001); ORR 92.9% vs 76.4%.
  Final OS update (Dimopoulos Lancet Oncol 2020): mOS 67.6 vs
  51.8 mo (HR 0.73). Established DRd as 2L+ standard for R/R MM;
  basis for FDA approval Nov 2016.
