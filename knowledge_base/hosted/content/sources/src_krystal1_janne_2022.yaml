notes: >
  KRYSTAL-1 phase-2: adagrasib 600 mg PO BID in 116 pretreated KRAS
  G12C+ NSCLC pts. ORR 43%, mPFS 6.5 mo, mOS 12.6 mo. Intracranial ORR
  33% (active brain mets) — distinguishing CNS profile from sotorasib.
  FDA accelerated approval 2022 for 2L+ KRAS G12C+ NSCLC. KRYSTAL-12
  phase-3 vs docetaxel confirmatory.
