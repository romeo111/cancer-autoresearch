notes: >
  SOLO2 phase 3: olaparib 300 mg PO BID maintenance vs placebo in
  germline-BRCA1/2-mutant platinum-sensitive recurrent ovarian cancer
  with CR/PR to ≥2 lines of platinum chemo. Median PFS 19.1 vs 5.5 mo
  (HR 0.30); long-term OS update (Poveda 2021): mOS 51.7 vs 38.8 mo
  (HR 0.74, NS but clinically meaningful). Established olaparib as
  standard maintenance after platinum-sensitive relapse with BRCA1/2.
