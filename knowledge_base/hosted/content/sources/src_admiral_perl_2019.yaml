notes: >
  ADMIRAL phase-3: single-agent gilteritinib 120 mg PO daily vs
  investigator-choice salvage chemo in R/R FLT3-mutated AML.
  Median OS 9.3 vs 5.6 mo (HR 0.64). CR/CRh 34% vs 15.3%.
  Established gilteritinib as standard 2L+ for R/R FLT3-mutated AML.
