notes: >
  Pooled analysis (LOXO-TRK-14001 phase-1, SCOUT pediatric, NAVIGATE
  basket): larotrectinib in 55 TRK-fusion+ patients across 17 tumor
  types. ORR 75% (Independent Review), DOR not reached at median 9.4 mo
  follow-up. Tumor-agnostic FDA approval 2018 for NTRK-fusion+ solid
  tumors irrespective of histology, including NSCLC subset (n=4 in
  initial pool, expanded later). Uniformly low toxicity vs entrectinib;
  no CNS-AE class. Resistance mutations (G595R / G667C) actionable
  with selitrectinib / repotrectinib.
