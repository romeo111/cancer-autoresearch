notes: >
  CALGB 10403 phase-2: pediatric-inspired BFM-style regimen for AYA
  (17-39 yr) Ph-negative B-ALL — induction + consolidation + interim
  maintenance + delayed intensification + 2-3 yr POMP maintenance
  (vincristine + 6-mercaptopurine + methotrexate + prednisone).
  3-year EFS 59%, OS 73% — superior to historical adult-style
  regimens in AYA cohort. Established pediatric-inspired approach
  + multi-year POMP maintenance as standard for AYA Ph-negative B-ALL.
