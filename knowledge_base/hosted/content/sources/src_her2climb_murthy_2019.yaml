notes: >
  HER2CLIMB phase-3: tucatinib 300 mg PO BID + trastuzumab + capecitabine
  vs placebo + trastuzumab + capecitabine in HER2+ metastatic breast
  with ≥2 prior anti-HER2 lines, including 48% with brain metastases
  (active or treated). Overall: median PFS 7.8 vs 5.6 mo (HR 0.54);
  median OS 21.9 vs 17.4 mo (HR 0.66). Brain-mets cohort (n=291):
  median CNS-PFS 9.9 vs 4.2 mo (HR 0.32); intracranial ORR 47% vs
  20%. Diarrhea, PPE (capecitabine effect), transaminitis dominant
  AEs. Established tucatinib triplet as preferred regimen for HER2+
  metastatic with brain metastases.
