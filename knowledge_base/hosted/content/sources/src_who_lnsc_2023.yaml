notes: 'STUB. Standardized 5-tier reporting framework for lymph-node FNA cytology: Inadequate / Benign
  / Atypical / Suspicious / Malignant, each with published risk-of-malignancy (ROM) and recommended next
  step. Used in WORKUP-LYMPHADENOPATHY-NONSPECIFIC for the undifferentiated lymphadenopathy triage path
  where FNA-first is modern standard (especially cervical / supraclavicular nodes where carcinoma metastasis
  is in the differential). NOT used in WORKUP-SUSPECTED-LYMPHOMA — once lineage points to lymphoma, excisional
  or core biopsy remains preferred (architecture + adequate IHC + FISH material). Spleen and thymus components
  of the reporting system are out of current OpenOnco scope.

  '
