notes: >
  TRIDENT-1 phase-1/2: repotrectinib in ROS1+ advanced NSCLC. TKI-naive
  ORR 79% (mDOR 34.1 mo); post-1 ROS1-TKI ORR 38% incl. G2032R subset.
  Intracranial ORR 89% TKI-naive. FDA approval 2023 for ROS1+ NSCLC
  irrespective of prior TKI; 2024 expansion to NTRK fusion solid tumors
  (separate cohort). Lead-in dosing 14 days mitigates CNS-AE.
