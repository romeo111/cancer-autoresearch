notes: >
  LUME-Lung 1 phase-3: docetaxel + nintedanib vs docetaxel + placebo in
  1314 2L NSCLC post-1L chemo. PFS 3.4 vs 2.7 mo (HR 0.79, p=0.0019).
  OS benefit confined to adenocarcinoma subgroup (mOS 12.6 vs 10.3 mo,
  HR 0.83); particularly active in early-progressors (<9 mo from 1L,
  mOS 10.9 vs 7.9 mo). Squamous histology no benefit. EU approval (no
  US approval for NSCLC). Oral PO alternative to ramucirumab (REVEL)
  for fit adenocarcinoma 2L.
