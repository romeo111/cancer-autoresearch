notes: >
  DESTINY-Lung02 phase-2 randomized: T-DXd 5.4 vs 6.4 mg/kg q3w in
  152 pretreated HER2-mutant (kinase-domain insertion / point mutation)
  metastatic NSCLC. 5.4 mg/kg ORR 49%, mPFS 9.9 mo, mOS 19.5 mo;
  6.4 mg/kg ORR 56% but more pneumonitis. 5.4 mg/kg established as
  preferred dose. FDA approval 2022 (DESTINY-Lung01 + 02). ILD risk
  ~12% any-grade — boxed warning, baseline + serial CT chest.
