notes: >
  KATHERINE phase-3 (NCT01772472): adjuvant T-DM1 (trastuzumab
  emtansine) 3.6 mg/kg q3w × 14 cycles vs trastuzumab alone in
  HER2+ early breast cancer with residual invasive disease after
  neoadjuvant chemo + HER2-targeted therapy (n=1486). 3-yr iDFS
  88.3% vs 77.0% (HR 0.50; p<0.001). OS update (Geyer NEJM 2024):
  7-yr OS 89.1% vs 84.4% (HR 0.66; p=0.003). Established T-DM1 as
  adjuvant standard for HER2+ EBC with residual disease post-neoadj.
