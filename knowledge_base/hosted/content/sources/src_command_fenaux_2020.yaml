notes: >
  MEDALIST phase-3 RCT: luspatercept vs placebo in lower-risk MDS with
  ring sideroblasts and RBC transfusion dependence. RBC transfusion
  independence ≥8 wk 38% vs 13%. Established luspatercept as 2L (post-ESA
  failure) in LR-MDS-RS. The COMMANDS trial later established luspatercept
  as 1L; this MEDALIST entry is the foundational regulatory pivot.
