notes: >
  MONALEESA-2 phase-3 (NCT01958021): ribociclib 600 mg PO daily
  (3-wk on / 1-wk off) + letrozole vs placebo + letrozole in 1L
  postmenopausal HR+/HER2- ABC (n=668). Median PFS 25.3 vs 16.0 mo
  (HR 0.57; p<0.001). OS update (Hortobagyi NEJM 2022): mOS 63.9
  vs 51.4 mo (HR 0.76; p=0.008) — first CDK4/6i to show
  statistically significant OS benefit in 1L. Established ribociclib
  as preferred CDK4/6i for 1L HR+/HER2- ABC.
