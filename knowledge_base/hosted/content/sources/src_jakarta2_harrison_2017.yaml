notes: >
  JAKARTA-2 phase-2: fedratinib 400 mg PO daily in MF patients
  previously treated with ruxolitinib (resistance or intolerance).
  ≥35% spleen volume response 31-55% (depending on prior-rux
  duration / response criteria); ≥50% symptom score reduction 27%.
  Established fedratinib for 2L MF post-ruxolitinib. FDA approval
  2019; FREEDOM-2 (Harrison et al., Lancet Haematol 2024) is the
  confirmatory phase-3.
