id: IND-AML-2L-GILTERITINIB-FLT3
plan_track: aggressive
applicable_to:
  disease_id: DIS-AML
  line_of_therapy: 2
  stage_requirements:
  - Relapsed or refractory AML after ≥1 prior systemic therapy (induction failure OR relapse after CR)
  - FLT3-ITD or FLT3-TKD (D835/I836) mutation confirmed at relapse (re-test — clones evolve)
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2
recommended_regimen: REG-GILTERITINIB-AML
concurrent_therapy: []
followed_by: []
evidence_level: high
strength_of_recommendation: strong
nccn_category: '1'
expected_outcomes:
  overall_response_rate: ~21% CR/CRh, ~54% composite CR (ADMIRAL)
  complete_response: ~21% CR/CRh
  progression_free_survival: Median EFS 2.8 mo (ADMIRAL); responders bridged to alloHCT have substantially longer PFS
  overall_survival_5y: Median OS 9.3 mo overall (ADMIRAL); ~25-30% 2-y OS for those bridged to alloHCT
hard_contraindications: []
red_flags_triggering_alternative:
- RF-AML-FLT3-ACTIONABLE
- RF-AML-EMERGENCY-TLS-LEUKOSTASIS
- RF-AML-INFECTION-SCREENING
- RF-AML-ORGAN-DYSFUNCTION
required_tests:
- TEST-CBC
- TEST-CMP
- TEST-LFT
- TEST-LDH
- TEST-URIC-ACID
- TEST-COAG-PANEL
- TEST-HBV-SEROLOGY
- TEST-HCV-ANTIBODY
- TEST-HIV-SEROLOGY
- TEST-BM-ASPIRATE
- TEST-BM-TREPHINE
- TEST-FLOW-CYTOMETRY
- TEST-NGS-MYELOID-PANEL
- TEST-FISH-PANEL
- TEST-ECHO
desired_tests: []
rationale: 'Gilteritinib monotherapy is standard 2L+ for R/R FLT3-mutated AML per ADMIRAL phase-3 trial: median OS 9.3 vs
  5.6 mo (HR 0.64) vs investigator-choice salvage chemo. CRITICAL: re-test FLT3 status at relapse — clonal evolution can lose
  FLT3-mutated clone (~25% of relapses lose detectable FLT3) or acquire resistance mutations (FLT3-F691L gatekeeper). Gilteritinib
  covers BOTH FLT3-ITD AND FLT3-TKD (D835/I836) — distinct from quizartinib. Bridge to alloHCT for fit responders — gilteritinib
  alone NOT curative. Continue gilteritinib post-HCT as maintenance (MORPHO trial emerging data). Differentiation syndrome
  + QTc prolongation manageable but require active monitoring. Major Ukraine access barrier: not registered, international
  referral or compassionate-use only.

  '
sources:
- source_id: SRC-NCCN-AML-2025
  position: supports
  relevant_quote_paraphrase: Gilteritinib is preferred for R/R FLT3-mutated AML (Cat 1) per ADMIRAL
- source_id: SRC-ADMIRAL-PERL-2019
  position: supports
  relevant_quote_paraphrase: 'ADMIRAL phase-3: gilteritinib mono vs salvage chemo in R/R FLT3-mut AML; mOS 9.3 vs 5.6 mo (HR
    0.64)'
- source_id: SRC-ELN-AML-2022
  position: supports
  relevant_quote_paraphrase: FLT3i (gilteritinib) is standard for R/R FLT3-mutated AML; bridge to alloHCT in responders
do_not_do:
- НЕ призначати без re-testing FLT3 на момент рецидиву — FLT3-clone може зникнути або еволюціонувати; ~25% relapse-loss FLT3.
- НЕ пропускати baseline + serial ECG + electrolyte correction (K+ ≥4.0, Mg++ ≥2.0) — torsades документовано.
- НЕ ігнорувати differentiation syndrome (лихоманка, задишка, набір ваги, плевральний випіт) — фатальне без dexamethasone.
- НЕ розглядати як curative monotherapy — обов'язково bridge до alloHCT для fit responders.
- НЕ комбінувати з сильними CYP3A4-inhibitors без редукції дози + intensive QTc monitoring.
- НЕ скасовувати при transient cytopenia — recovery часто повільне; підтримка G-CSF + transfusion як необхідно.
- НЕ підтверджувати план без funding pathway — препарат не зареєстрований в Україні.
known_controversies:
- topic: Gilteritinib monotherapy vs gilteritinib + venetoclax + azacitidine in R/R FLT3+ AML
  positions:
  - position: Gilteritinib mono per ADMIRAL — standard, registered indication
    sources:
    - SRC-NCCN-AML-2025
    - SRC-ADMIRAL-PERL-2019
  - position: Triplet (gilt+ven+aza) — emerging higher CR rate (~85%) in phase 1b/2 (Daver et al.); under formal RCT investigation
    sources:
    - SRC-NCCN-AML-2025
    evidence_note: Phase 1b/2 only; no RCT vs gilt mono; toxicity higher (cytopenia, infection). Reserve for fit patients
      with high-burden relapse.
  our_default: Gilteritinib mono per ADMIRAL; consider triplet only at AML-experienced center for fit patients with poor mono
    response after 1-2 cycles
  rationale: ADMIRAL is the registered standard; triplet evidence still maturing
time_critical: false
last_reviewed: '2026-04-26'
