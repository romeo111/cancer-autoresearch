id: IND-NSCLC-2L-ROS1-REPOTRECTINIB
plan_track: aggressive

applicable_to:
  disease_id: DIS-NSCLC
  molecular_subtype: ROS1_REARRANGED
  stage_stratum: STAGE_IV_METASTATIC
  line_of_therapy: 2
  stage_requirements:
    - "Stage IV metastatic ROS1-rearranged NSCLC"
    - "TKI-naïve OR post-prior ROS1-TKI (crizotinib OR entrectinib) — TRIDENT-1 covered both"
    - "G2032R solvent-front resistance mutation strongly favors repotrectinib over crizotinib/entrectinib"
  biomarker_requirements_required:
    - biomarker_id: BIO-ROS1-FUSION
      value_constraint: "ROS1 rearrangement confirmed (RNA-NGS preferred); G2032R resistance mutation if known prior TKI"
      required: true
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-REPOTRECTINIB-NSCLC
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "~79% TKI-naïve; ~38% post-1 ROS1-TKI (TRIDENT-1)"
  progression_free_survival: "TKI-naïve mDOR 34.1 mo; post-TKI mPFS ~9 mo"
  overall_survival_5y: "Mature OS evolving; intracranial ORR 89% TKI-naïve"

hard_contraindications: []
red_flags_triggering_alternative: []

required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-CECT-CAP
  - TEST-NSCLC-NGS-PANEL  # critical for resistance characterization
  - TEST-BRAIN-MRI-CONTRAST
desired_tests: []

rationale: >
  Repotrectinib (next-generation macrocyclic ROS1 / NTRK / ALK TKI with
  solvent-front activity) for ROS1+ metastatic NSCLC. Approved 2023 for
  ROS1+ NSCLC irrespective of prior TKI. TRIDENT-1: TKI-naïve ORR 79%,
  mDOR 34.1 mo, intracranial ORR 89%; post-1 ROS1-TKI ORR 38% including
  G2032R-mutant disease (the dominant solvent-front resistance to
  crizotinib / entrectinib). Lead-in dosing (160 mg daily x14 days, then
  160 mg BID) is essential to manage CNS-AE (vestibular ~60% baseline,
  attenuates with continued therapy). Aggressive-track 2L for fit
  patients; preferred over entrectinib when G2032R is documented or
  when CNS dominant. Long-term skeletal-fracture surveillance class
  signal.

sources:
  - source_id: SRC-TRIDENT1-DRILON-2024
    position: supports
    relevant_quote_paraphrase: "Repotrectinib in ROS1+ NSCLC TRIDENT-1: TKI-naïve ORR 79%, mDOR 34.1 mo; post-1 ROS1-TKI ORR 38% including G2032R; intracranial ORR 89%"
  - source_id: SRC-NCCN-NSCLC-2025
    position: supports
    relevant_quote_paraphrase: "Repotrectinib is recommended for ROS1+ NSCLC any line; preferred for solvent-front resistance (G2032R) post-prior ROS1-TKI; Cat 1"
  - source_id: SRC-ESMO-NSCLC-METASTATIC-2024
    position: supports
    relevant_quote_paraphrase: "Repotrectinib is the preferred next-generation option for ROS1+ NSCLC, particularly post-prior ROS1-TKI failure with characterized resistance"

known_controversies:
  - topic: "Repotrectinib 1L (TRIDENT-1 TKI-naive) vs crizotinib/entrectinib 1L → repotrectinib 2L"
    positions:
      - position: "Repotrectinib 1L: best PFS, durable, CNS-active, G2032R-active; aggressive default"
        sources: [SRC-TRIDENT1-DRILON-2024]
      - position: "Sequencing 1L crizotinib/entrectinib → 2L repotrectinib: preserves later-line options; resistance characterization informs precise sequencing"
        sources: [SRC-NCCN-NSCLC-2025]
    our_default: "Repotrectinib 1L for fit patients with funding (best mDOR + CNS profile); sequencing approach (crizotinib/entrectinib 1L → repotrectinib 2L) for cost/access reasons"
    rationale: "Sequencing remains valid; repotrectinib 1L if access permits"

do_not_do:
  - "НЕ пропускати lead-in dosing (14 days at 160 mg daily before BID) — пряме BID різко погіршує CNS-AE."
  - "НЕ ігнорувати vestibular AE counseling — пацієнти повинні розуміти, що dizziness ~60% але зазвичай адаптується через 4-8 тижнів."
  - "НЕ комбінувати з strong CYP3A4 inhibitors або inducers без dose modification — exposure shifts significant."
  - "НЕ ігнорувати long-term skeletal fracture monitoring — bone density q-yearly."
  - "НЕ підтверджувати план без funding pathway — repotrectinib не зареєстрований в Україні."
  - "НЕ використовувати при baseline severe vestibular dysfunction — additive CNS toxicity."
  - "НЕ припиняти за reversible Grade 1-2 dizziness — зазвичай адаптується; reduction до 120 mg BID при Grade 3."

time_critical: false
last_reviewed: "2026-04-27"
reviewers: []
