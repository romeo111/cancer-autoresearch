id: IND-PCNSL-2L-RMPV-SALVAGE
plan_track: standard
applicable_to:
  disease_id: DIS-PCNSL
  line_of_therapy: 2
  stage_requirements:
    - Relapsed PCNSL after initial HD-MTX-based 1L (R-MPV or MATRix) with documented prior chemosensitivity
    - Adequate renal function (CrCl ≥50 mL/min) for HD-MTX
  biomarker_requirements_required:
    - biomarker_id: BIO-CD20-IHC
      required: true
      value_constraint: positive (CD20+)
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2
recommended_regimen: REG-R-MPV-SALVAGE-PCNSL
concurrent_therapy: []
followed_by: []
evidence_level: moderate
strength_of_recommendation: conditional
nccn_category: 2A
expected_outcomes:
  overall_response_rate: ~50-70% in chemosensitive late relapse (>12 mo from 1L)
  complete_response: ~40-50%
  progression_free_survival: Median PFS ~12-18 mo; longer with autoSCT consolidation
  overall_survival_5y: ~30-40%
hard_contraindications:
  - CI-RENAL-FAILURE-FOR-HD-MTX
red_flags_triggering_alternative:
  - RF-PCNSL-FRAILTY-AGE
  - RF-PCNSL-ORGAN-DYSFUNCTION
required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-LDH
  - TEST-B2-MICROGLOBULIN
  - TEST-HBV-SEROLOGY
  - TEST-CD20-IHC
  - TEST-BRAIN-MRI-CONTRAST
  - TEST-CSF-CYTOLOGY-FLOW
desired_tests: []
rationale: 'For relapsed PCNSL after initial HD-MTX-based induction with documented prior chemosensitivity (relapse >12 mo post-1L), re-induction with R-MPV or MATRix-style HD-MTX-based regimen → consolidation with autoSCT (thiotepa-based conditioning, IELSG32 trial) is preferred for fit patients. Alternative 2L: ibrutinib (BTKi monotherapy — Soussain 2019, ORR ~52%; emerging in chemorefractory PCNSL); WBRT for ASCT-ineligible (significant cognitive toxicity caveat in elderly). Lenalidomide-rituximab also active.'
rationale_ua: >-
  For рецидивний PCNSL after initial HD-MTX-based індукція with documented prior chemosensitivity (рецидив >12 mo post-1L), re-індукція with R-MPV or MATRix-style HD-MTX-based схема → консолідація with аутоТГСК (thiotepa-based conditioning, IELSG32 дослідження) is переважний for fit patients. Alternative 2L: ібрутиніб (BTKi монотерапія — Soussain 2019, ORR ~52%; новий in chemorefractory PCNSL); WBRT for ASCT-ineligible (significant cognitive токсичність caveat in літнього віку). леналідомід-ритуксимаб also active.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-CNS-2025
    position: supports
    relevant_quote_paraphrase: 'For chemosensitive late-relapse PCNSL: re-induction with HD-MTX-based regimen → consolidation autoSCT (thiotepa-based) is preferred 2L'
  - source_id: SRC-ESMO-DLBCL-2024
    position: supports
    relevant_quote_paraphrase: ESMO DLBCL guideline § PCNSL endorses HD-MTX re-induction + autoSCT consolidation for fit relapsed PCNSL
known_controversies:
  - topic: AutoSCT (thiotepa-based) vs WBRT consolidation post-salvage in r/r PCNSL
    positions:
      - position: AutoSCT (thiotepa/BCNU) — durable PFS in fit patients (IELSG32)
        sources:
          - SRC-NCCN-CNS-2025
      - position: WBRT — established for ASCT-ineligible; significant cognitive toxicity in elderly
        sources:
          - SRC-ESMO-DLBCL-2024
        evidence_note: Cognitive decline universal; reserve for younger or symptomatic disease
    our_default: AutoSCT for fit patients (age ≤65, ECOG ≤2); ibrutinib or lenalidomide-R for older/unfit; WBRT only when no other option
    rationale: Long-term cognitive function priority — autoSCT lower neurotoxicity than WBRT
do_not_do:
  - НЕ призначати HD-MTX при CrCl <50 mL/min OR third-space fluid — substitute reduced MTX with intensified rescue.
  - НЕ пропускати aggressive IV hydration + urine alkalinization (pH ≥7.5) перед HD-MTX.
  - НЕ забувати leucovorin rescue 24h post-MTX.
  - НЕ ігнорувати delayed MTX clearance — glucarpidase rescue при rising MTX >100 µmol/L at 24h.
  - НЕ призначати WBRT у пацієнтів >60 років без обговорення cognitive toxicity ризику.
  - НЕ забувати PJP profilaxis (cotrimoxazole) ≥6 міс після останньої дози anti-CD20.
time_critical: false
last_reviewed: '2026-04-27'
reviewers: []
reviewer_signoffs: 0
notes: Standard-track 2L PCNSL for chemosensitive late-relapse (>12 mo post-1L). AutoSCT consolidation preferred for fit; ibrutinib/lenalidomide-R for older. WBRT only when no other option.
