id: IND-MM-4L-TECLISTAMAB
plan_track: aggressive

applicable_to:
  disease_id: DIS-MM
  line_of_therapy: 4
  stage_requirements:
    - "Triple-class refractory (post-PI, post-IMiD, post-anti-CD38)"
    - "≥3 prior systemic lines"
    - "Active progressive disease (IMWG criteria)"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2
    age_min: 18

recommended_regimen: REG-TECLISTAMAB
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "~63% (MajesTEC-1)"
  complete_response: "~39% sCR / CR"
  progression_free_survival: "Median PFS ~11 mo"
  overall_survival_5y: "Median OS ~22 mo (mature follow-up)"

hard_contraindications:
  - CI-ACTIVE-INFECTION-FOR-ALEMTUZUMAB  # any active infection precludes start
red_flags_triggering_alternative:
