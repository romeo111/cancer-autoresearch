rationale: 'Classical Hodgkin lymphoma in pregnancy can be safely treated in 2nd-3rd trimester with modified ABVD (omit dacarbazine — DTIC; teratogenic in early gestation, less data for late) OR AVD (doxorubicin + vinblastine + dacarbazine omitted). Doxorubicin + vinblastine + bleomycin have substantial pregnancy experience without major fetal abnormality (registry data: Hodgkin lymphoma + pregnancy registry, Brenner 2018). 1st-trimester treatment requires therapeutic abortion discussion (high teratogenic risk for any cytotoxic). 2nd-3rd trimester treatment proceeds with PET-CT replaced by ultrasound + MRI without contrast (ferumoxytol acceptable). Brentuximab vedotin (BV) and pembrolizumab are CONTRAINDICATED in pregnancy — fetal loss + immunologic risks. Defer staging PET-CT to postpartum. Bleomycin pulmonary toxicity surveillance with serial DLCO not feasible during pregnancy — clinical respiratory monitoring + omit bleomycin if concerns. Delivery timed for nadir avoidance (≥3 weeks after last cycle). Postpartum: complete A(B)VD course + reassess with PET-CT.'
rationale_ua: >-
  Classical лімфома Ходжкіна in вагітність can be safely treated in 2nd-3rd trimester with modified ABVD (omit dacarbazine — DTIC; teratogenic in early gestation, less дані for late) OR AVD (доксорубіцин + вінбластин + dacarbazine omitted). доксорубіцин + вінбластин + bleomycin have substantial вагітність experience without major fetal abnormality (registry дані: лімфома Ходжкіна + вагітність registry, Brenner 2018). 1st-trimester лікування requires терапевтичний abortion discussion (high teratogenic risk for any cytotoxic). 2nd-3rd trimester лікування proceeds with PET-CT replaced by ultrasound + MRI without contrast (ferumoxytol прийнятний). брентуксимаб ведотин (BV) and пембролізумаб are протипоказаний in вагітність — fetal loss + immunologic risks. Defer стадіювання PET-CT to postpartum. Bleomycin pulmonary токсичність спостереження with serial DLCO not feasible during вагітність — clinical respiratory моніторинг + omit bleomycin if concerns. Delivery timed for nadir avoidance (≥3 weeks after last цикл). Postpartum: complete A(B)VD course + reassess with PET-CT.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: Hodgkin lymphoma in 2nd-3rd trimester pregnancy can be treated with ABVD or AVD; brentuximab vedotin and pembrolizumab contraindicated in pregnancy
  - source_id: SRC-ESMO-HODGKIN-2024
    position: supports
    relevant_quote_paraphrase: Modified ABVD (omit DTIC) or AVD is acceptable for CHL in 2nd-3rd trimester; 1st-trimester treatment requires termination discussion or treatment deferral if feasible
known_controversies:
  - topic: Modified ABVD (omit DTIC) vs full ABVD in 2nd-3rd trimester pregnancy
    positions:
      - position: Modified ABVD — historical caution about DTIC teratogenicity
        sources:
          - SRC-NCCN-BCELL-2025
      - position: Full ABVD — emerging registry data suggest DTIC safe in 2nd-3rd trimester; better disease control
        sources:
          - SRC-ESMO-HODGKIN-2024
        evidence_note: Limited prospective data; default to modification
    our_default: Modified ABVD (omit DTIC) for conservative approach in 2nd trimester; full ABVD acceptable in 3rd trimester per local practice
    rationale: Conservative approach prioritizes fetal safety; OS impact likely minimal given short course + postpartum completion
do_not_do:
  - "НЕ призначати в 1-му триместрі без обговорення термінації — teratogenic ризик для будь-якого cytotoxic висока."
  - НЕ використовувати brentuximab vedotin або pembrolizumab в pregnancy — fetal loss + immunologic ризики.
  - НЕ робити PET-CT під час pregnancy — radiation exposure; substitute з ultrasound + non-contrast MRI.
  - НЕ використовувати rituximab без strict indication (CHL CD20-) — fetal B-cell depletion documented (recovers postpartum).
  - НЕ забути LVEF baseline + post-ABVD — anthracycline cardiotoxicity surveillance; ECHO during pregnancy.
  - "НЕ доставляти пацієнтку в nadir — timing delivery ≥3 тижні після останнього циклу для neutrophil recovery."
  - НЕ забути дата завершення A(B)VD postpartum + PET-CT для restaging.
time_critical: false
