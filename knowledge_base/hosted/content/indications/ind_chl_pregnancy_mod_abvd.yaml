id: IND-CHL-PREGNANCY-MOD-ABVD
plan_track: standard
applicable_to:
  disease_id: DIS-CHL
  line_of_therapy: 1
  stage_requirements:
    - "Classical Hodgkin lymphoma diagnosed in 2nd or 3rd trimester pregnancy"
    - "Disease requires treatment during pregnancy (cannot defer to postpartum due to bulk, B-symptoms, organ compromise)"
    - "Multidisciplinary management: hematology + maternal-fetal medicine + neonatology"
  biomarker_requirements_required:
