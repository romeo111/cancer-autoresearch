rationale: 'Standard 1L for MYD88-mutated WM with iwWM treatment indication. Zanubrutinib preferred per ASPEN trial (superior hematologic + safety vs ibrutinib). Continuous therapy until progression or intolerance. CXCR4 WHIM-mutated subset has weaker response — consider DRC alternative.

  '
rationale_ua: >
  стандарт 1L for MYD88-mutated WM with iwWM лікування показання. занубрутиніб переважний per ASPEN дослідження (перевершує hematologic + безпека vs ібрутиніб). Continuous терапія until прогресування or intolerance. CXCR4 WHIM-mutated subset has weaker відповідь — consider DRC alternative.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
  - source_id: SRC-ESMO-WM-2024
    position: supports
    relevant_quote_paraphrase: ESMO 2024 endorses BTKi (zanubrutinib preferred over ibrutinib) and DRC as 1L WM options; choice driven by MYD88/CXCR4 status, IgM level, comorbidities
known_controversies: []
do_not_do:
  - Не призначати при MYD88-WT WM — BTKi не активний; chemoimmuno (DRC) preferred.
  - Не пропускати CXCR4 sequencing — WHIM-mutated subset має слабшу відповідь.
  - Не призначати rituximab при symptomatic hyperviscosity без plasmapheresis спочатку.
time_critical: false
