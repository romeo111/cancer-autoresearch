rationale: >
  Aggressive 1L for symptomatic PMF (and post-PV/ET MF) with
  splenomegaly + constitutional symptoms — ruxolitinib at platelet-
  adjusted starting dose (5-20 mg BID by baseline plt). Concurrent
  alloHCT donor search for intermediate-2 / high-risk eligible
  patients (RF-PMF-HIGH-RISK-DIPSS) — ruxolitinib bridges symptoms
  + spleen during pre-transplant workup. Momelotinib preferred if
  anemia is dominant problem (RF-PMF-ANEMIA-DOMINANT).

rationale_ua: >
  агресивний 1L for symptomatic PMF (and post-PV/ET MF) with splenomegaly + constitutional symptoms — руксолитиніб at platelet- adjusted starting доза (5-20 mg BID by базове plt). Concurrent alloHCT donor search for intermediate-2 / високого ризику eligible patients (RF-PMF-високого ризику-DIPSS) — руксолитиніб bridges symptoms + spleen during pre-transplant обстеження. момелотиніб переважний if анемія is dominant problem (RF-PMF-анемія-DOMINANT).
