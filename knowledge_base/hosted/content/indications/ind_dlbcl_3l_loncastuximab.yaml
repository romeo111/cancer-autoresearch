sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: Loncastuximab tesirine is Cat 2A for r/r DLBCL after ≥2 prior systemic therapies per LOTIS-2; ideal for non-CAR-T-eligible patients
  - source_id: SRC-ESMO-DLBCL-2024
    position: supports
    relevant_quote_paraphrase: Loncastuximab tesirine is recognized 3L+ option for r/r DLBCL when CAR-T not feasible; bispecifics (epcoritamab, glofitamab) are alternatives with similar efficacy
known_controversies:
  - topic: Loncastuximab vs bispecific (epcoritamab / glofitamab) for r/r DLBCL 3L+ when CAR-T not feasible
    positions:
      - position: Loncastuximab — off-the-shelf, outpatient, no CRS/ICANS risk
        sources:
          - SRC-NCCN-BCELL-2025
      - position: Epcoritamab (subcutaneous) — ORR 63%, CR 39% (EPCORE NHL-1); requires step-up + inpatient observation
        sources:
          - SRC-NCCN-BCELL-2025
      - position: Glofitamab — fixed-duration (12 cycles) ORR 52%, CR 39%, but requires obinutuzumab pretreatment + step-up
        sources:
          - SRC-ESMO-DLBCL-2024
    our_default: Loncastuximab when outpatient + lower-toxicity preferred (frail, lacks IP infrastructure for bispecific step-up); bispecific (epcoritamab) when deeper response prioritized + IP observation feasible
    rationale: All 3L+ options for non-CAR-T pathway; loncastuximab has operational advantages but lower CR rate; bispecifics have higher CR but require infrastructure
do_not_do:
  - НЕ призначати при значній серцевій патології (LVEF <50%) — fluid retention + effusions можуть погіршити CHF.
  - НЕ ігнорувати baseline + serial liver tests — hepatotoxicity у ~30%, може бути severe.
  - НЕ призначати при active infection — neutropenia + lymphopenia підвищать септичний ризик.
  - НЕ комбінувати з іншими myelosuppressive agents без adjustment.
  - НЕ забути thromboprophylaxis для пацієнтів з venous thromboembolism risk — ADC + lymphoma combine high-risk.
  - НЕ продовжувати при grade 3 effusions / edema — hold + diuretic; consider permanent discontinuation.
