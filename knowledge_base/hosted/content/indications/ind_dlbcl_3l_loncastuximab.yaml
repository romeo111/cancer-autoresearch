rationale: 'Loncastuximab tesirine (Zynlonta) is a CD19-directed antibody-drug conjugate (ADC) with PBD warhead approved for r/r DLBCL after ≥2 prior systemic therapies. LOTIS-2 (Caimi 2021 Lancet Oncol): single-arm phase 2; ORR 48%, CR 24%, mPFS 4.9 mo, mOS 9.5 mo, in heavily pretreated patients (median 3 prior lines, ~30% prior CAR-T). Ideal for patients NOT candidates for CAR-T (frailty, manufacturing window prohibitive, prior CD19 CAR-T failure with CD19-positive relapse, comorbidity precluding lymphodepletion). Off-the-shelf + outpatient feasible — major operational advantage over CAR-T. Bispecifics (epcoritamab, glofitamab) are competing 3L+ options with comparable ORR (~60%) but require step-up dosing + inpatient observation. Loncastuximab toxicities: peripheral edema (~50%), thrombocytopenia (~33%), neutropenia (~20%), hepatotoxicity, effusions/edema (PBD class effect). STUB regimen — no dedicated REG- entity for loncastuximab yet; flagged for REG follow-up.'
rationale_ua: >-
  лонкастуксимаб тезирін (Zynlonta) is a CD19-directed кон'югат антитіло-препарат (ADC) with PBD warhead схвалений для р/р DLBCL after ≥2 prior systemic therapies. LOTIS-2 (Caimi 2021 Lancet Oncol): single-arm фаза 2; ORR 48%, CR 24%, mPFS 4.9 міс., міс. 9.5 міс., in heavily pretreated patients (медіана 3 prior lines, ~30% prior CAR-T). Ideal for patients NOT candidates for CAR-T (дряхлість, manufacturing window prohibitive, prior CD19 CAR-T failure with CD19-positive рецидив, коморбідність precluding lymphodepletion). Off-the-shelf + outpatient feasible — major operational advantage over CAR-T. Bispecifics (epcoritamab, glofitamab) are competing 3L+ options with співставний ORR (~60%) but require step-up дозування + inpatient observation. Loncastuximab toxicities: peripheral edema (~50%), тромбоцитопенія (~33%), нейтропенія (~20%), гепатотоксичність, effusions/edema (PBD class effect). STUB схема — ні dedicated REG- сутність for loncastuximab yet; flagged for REG спостереження.
