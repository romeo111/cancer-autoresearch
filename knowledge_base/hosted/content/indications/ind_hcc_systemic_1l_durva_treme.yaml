id: IND-HCC-SYSTEMIC-1L-DURVA-TREME
plan_track: aggressive

applicable_to:
  disease_id: DIS-HCC
  line_of_therapy: 1
  stage_requirements: ["BCLC C (advanced)", "Child-Pugh A"]
  biomarker_requirements_required:
    - biomarker_id: BIO-AFP
      required: true
      value_constraint: "AFP baseline (ng/mL) — required as risk-stratifier and treatment-response marker; HIMALAYA STRIDE benefit independent of AFP level"
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 1

recommended_regimen: REG-DURVA-TREME-STRIDE
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "~20%"
  complete_response: "~3%"
  progression_free_survival: "Median ~4 mo"
  overall_survival_5y: "mOS 16.4 vs 13.8 sorafenib (HIMALAYA)"

hard_contraindications:
  - CI-PEMBROLIZUMAB-AUTOIMMUNE
red_flags_triggering_alternative:
  - RF-HCC-CHILD-PUGH-B-C

required_tests:
  - TEST-CT-CHEST-ABDOMEN-PELVIS
  - TEST-AFP
  - TEST-CHILD-PUGH-CALCULATION

desired_tests: []

rationale: >
  HIMALAYA: STRIDE regimen — preferred 1L when bevacizumab
  contraindicated (high-risk varices, recent thromboembolic event,
  uncontrolled HTN). No EGD prerequisite (no bev). NCCN category 1.

rationale_ua: >
  HIMALAYA: STRIDE схема — переважний 1L when бевацизумаб протипоказаний (високого ризику varices, recent thromboembolic event, uncontrolled HTN). ні EGD prerequisite (ні bev). NCCN категорія 1.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-HCC-2025
    position: supports

do_not_do:
  - "Do NOT use in Child-Pugh B/C"
  - "Do NOT skip HBV prophylaxis"
  - "Do NOT continue through Grade 3+ irAE without permanent discontinuation consideration (CTLA-4 colitis can be fatal)"

last_reviewed: "2026-04-26"
notes: "Bev-sparing 1L track — variceal-bleed-history patients route here."
