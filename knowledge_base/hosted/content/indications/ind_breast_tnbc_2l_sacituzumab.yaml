notes: >
  ESCAT IA. ASCENT established sacituzumab govitecan (anti-Trop-2 ADC
  with SN-38 payload) as standard ≥2L for metastatic TNBC pretreated
  with ≥2 prior chemo lines (≥1 in metastatic). No biomarker gating —
  Trop-2 expression is universal in TNBC. Severe AE profile:
  neutropenia G3+ 51% (G-CSF primary prophylaxis recommended),
  diarrhea G3+ 10%. UGT1A1*28 homozygous patients require dose
  reduction. Default 2L for non-BRCA TNBC; default 3L for BRCA-mut
  TNBC after PARPi failure. UA access barrier: not registered;
  named-patient import / EAP / cross-border only.
