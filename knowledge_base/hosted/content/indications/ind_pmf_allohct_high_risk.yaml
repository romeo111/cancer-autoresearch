rationale: >
  AlloHCT is the ONLY curative option for PMF — mandatory
  consideration in ALL transplant-eligible patients with DIPSS-Plus
  intermediate-2 OR high-risk OR MIPSS70+ high-risk OR HMR
  mutations (TP53, ASXL1, EZH2, IDH1/2, SRSF2). 5-y OS post-HCT
  30-65% (DIPSS-stratified) vs <20% high-risk without HCT.
  Ruxolitinib pre-HCT bridging 3-6 months reduces spleen volume +
  symptoms → improves transplant outcomes; taper ruxolitinib 5-7
  days before conditioning to avoid cytokine rebound. Donor
  search initiated CONCURRENTLY with JAKi optimization — donor
  identification can take 3-6 months. Conditioning intensity
  tailored to age + comorbidity. Splenectomy NOT routinely
  recommended pre-HCT (high mortality in MF; only for refractory
  massive splenomegaly per institution). TP53-mutated MF has
  worse outcomes (~20% 5-y OS post-HCT) but HCT still the only
  curative pathway. CRITICAL: do NOT defer alloHCT discussion to
  JAKi failure — long-term JAKi exposure does not delay
  progression and donor search delays compound.

rationale_ua: >
  AlloHCT is the ONLY curative option for PMF — обов'язковий consideration in ALL придатний до трансплантації patients with DIPSS-Plus intermediate-2 OR високого ризику OR MIPSS70+ високого ризику OR HMR мутації (TP53, ASXL1, EZH2, IDH1/2, SRSF2). 5-y OS post-HCT 30-65% (DIPSS-stratified) проти <20% високого ризику without HCT. руксолитиніб pre-HCT bridging 3-6 months зменшує spleen volume + symptoms → покращує transplant outcomes; taper руксолитиніб 5-7 days before conditioning to avoid cytokine rebound. Donor search initiated CONCURRENTLY with JAKi optimization — donor identification can take 3-6 місяців. Conditioning intensity tailored to age + коморбідність. Splenectomy NOT routinely рекомендований pre-HCT (high mortality in MF; only for рефрактерний massive splenomegaly per institution). TP53-mutated MF has гірше outcomes (~20% 5-y OS post-HCT) but HCT still the only curative pathway. CRITICAL: do NOT defer alloHCT discussion to JAKi failure — long-term JAKi exposure does not delay прогресування and donor search delays compound.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-MPN-2025
    position: supports
    relevant_quote_paraphrase: "AlloHCT is the only curative option for PMF; mandatory consideration in DIPSS-Plus int-2/high or MIPSS70+ high transplant-eligible patients"
  - source_id: SRC-DIPSS-PLUS-GANGAT-2011
    position: supports
    relevant_quote_paraphrase: "DIPSS-Plus stratifies PMF risk; int-2 and high-risk warrant alloHCT pathway in eligible patients"
  - source_id: SRC-ESMO-MPN-2015
    position: supports
    relevant_quote_paraphrase: "AlloHCT recommended for high-risk MF transplant-eligible patients per ESMO 2015"

do_not_do:
  - "НЕ відкладати alloHCT-обговорення до JAKi failure — JAKi не виліковує MF, donor search триває 3-6 місяців."
  - "НЕ виконувати HCT при активному uncontrolled infection — лімфодеплеція + GVHD-профілактика = high mortality."
  - "НЕ виконувати splenectomy перед HCT routinely — висока peri-op mortality в MF; тільки для refractory massive splenomegaly per institutional expertise."
  - "НЕ припиняти ruxolitinib abrupt перед conditioning — taper 5-7 днів; cytokine rebound life-threatening."
  - "НЕ ігнорувати MIPSS70+ molecular reclassification — HMR mutations підвищують ризик; може змінити HCT timing."
  - "НЕ забувати fertility preservation у молодих пацієнтів перед conditioning."
  - "НЕ забувати donor-search timing — international donor може потребувати 2-3 місяці."

known_controversies:
  - topic: "Timing of alloHCT for PMF — DIPSS-Plus int-2 vs high-only"
    positions:
      - position: "AlloHCT for ALL transplant-eligible DIPSS-Plus int-2 or high (mandatory)"
        sources: [SRC-NCCN-MPN-2025, SRC-DIPSS-PLUS-GANGAT-2011]
      - position: "Reserve alloHCT for high-risk only (or int-2 with HMR mutations) — int-2 patients often have stable disease for 3-5 years on JAKi without HCT TRM exposure"
        sources: [SRC-NCCN-MPN-2025]
        evidence_note: "Markov modeling supports earlier HCT for high-risk + HMR; int-2 without HMR more nuanced"
    our_default: "AlloHCT for all transplant-eligible high-risk (mandatory); int-2 with HMR mutations; int-2 without HMR — case-by-case based on patient + donor availability"
    rationale: "Mutation profile (HMR) refines risk beyond DIPSS-Plus; goal-directed HCT pathway"

