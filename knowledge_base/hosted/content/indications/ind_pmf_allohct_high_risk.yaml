id: IND-PMF-ALLOHCT-HIGH-RISK
plan_track: aggressive

applicable_to:
  disease_id: DIS-PMF
  line_of_therapy: 1
  stage_requirements:
    - "PMF (or post-PV-MF, post-ET-MF) with DIPSS-Plus intermediate-2 OR high-risk OR MIPSS70+ high-risk OR HMR (high molecular risk) mutations (TP53, ASXL1, EZH2, IDH1/2, SRSF2)"
    - "Transplant-eligible: typically age <70-75, ECOG ≤2, adequate organ function, suitable donor, caregiver support"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2
    age_max: 75

recommended_regimen: REG-ALLOHCT-PMF
concurrent_therapy: []
followed_by: []

evidence_level: moderate
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "~70-90% achieve disease control post-HCT (variable by pre-HCT spleen volume + disease control)"
  complete_response: "Durable molecular CR ~30-50% at 5 years (variable by mutation profile)"
  progression_free_survival: "5-y PFS 30-65% by DIPSS-Plus / MIPSS70 risk; substantially worse for TP53-mutated"
  overall_survival_5y: "5-y OS 30-65% high-risk MF (substantially better than non-transplant: <20% high-risk without HCT)"

