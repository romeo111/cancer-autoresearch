id: IND-NSCLC-3L-DRIVER-BEYOND-2L
plan_track: standard
applicable_to:
  disease_id: DIS-NSCLC
  line_of_therapy: 3
  stage_requirements:
    - "Stage IV NSCLC after ≥2 prior lines (driver-targeted 1L + chemo or IO 2L+)"
    - "Adequate organ function for chemotherapy + antiangiogenic therapy"
    - "No untreated brain or leptomeningeal metastases (or controlled with local therapy)"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2
recommended_regimen: REG-DOCETAXEL-RAMUCIRUMAB
concurrent_therapy: []
followed_by: []
evidence_level: moderate
strength_of_recommendation: conditional
nccn_category: '2A'
expected_outcomes:
  overall_response_rate: ~23% docetaxel + ramucirumab (REVEL Garon 2014 Lancet)
  complete_response: ~1%
  progression_free_survival: Median PFS 4.5 vs 3.0 mo (REVEL HR 0.76)
  overall_survival_5y: Median OS 10.5 vs 9.1 mo (REVEL HR 0.86); benefit modest in 3L+
hard_contraindications: []
