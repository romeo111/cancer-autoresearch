id: IND-ESOPH-RESECTABLE-CROSS-NEOADJUVANT
plan_track: standard

applicable_to:
  disease_id: DIS-ESOPHAGEAL
  line_of_therapy: 1
  stage_requirements: ["cT1b N+ M0", "cT2-4a any N M0", "Resectable / borderline"]
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-CARBOPLATIN-PACLITAXEL-WEEKLY
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "pCR rate ~29% squamous, ~23% adeno (CROSS)"
  complete_response: "pCR rates above"
  progression_free_survival: "median DFS ~24 mo (CROSS combined)"
  overall_survival_5y: "5-yr OS ~47% (CROSS)"

hard_contraindications: []
red_flags_triggering_alternative:
  - RF-ESOPH-SEVERE-DYSPHAGIA-ASPIRATION

required_tests:
  - TEST-CT-CHEST-ABDOMEN-PELVIS
  - TEST-CT-PET
  - TEST-EGD-VARICES-SCREENING

desired_tests: []

rationale: >
  CROSS trial — neoadjuvant CRT (carbo+pacli weekly × 5 + RT 41.4 Gy /
  23 fx) followed by esophagectomy. OS benefit vs surgery alone in
  both squamous and adenocarcinoma resectable T1b-T3 disease. NCCN
  category 1.

rationale_ua: >
  CROSS дослідження — неоад'ювантний CRT (carbo+pacli weekly × 5 + RT 41.4 Gy / 23 fx) followed by esophagectomy. OS виграш vs surgery alone in both squamous and adenocarcinoma резектабельний T1b-T3 хвороба. NCCN категорія 1.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-ESOPHAGEAL-2025
    position: supports
  - source_id: SRC-ESMO-ESOPHAGEAL-2024
    position: supports

do_not_do:
  - "Do NOT proceed to surgery without restaging post-CRT (occult progression detection)"
  - "Do NOT initiate RT without addressing severe dysphagia / aspiration risk first"
  - "Do NOT skip CheckMate-577 nivolumab adjuvant for residual ypT+ or ypN+ post-CROSS"

last_reviewed: "2026-04-26"
notes: >
  PARTIAL — RT 41.4 Gy / 23 fractions concurrent with chemo is NOT
  modellable in current OpenOnco schema. This Indication captures
  the chemo backbone; the RT + esophagectomy + adjuvant nivolumab
  sequence is documented here but cannot be enforced by the engine
  until PROPOSAL §17 (Surgery + RadiationCourse + Indication.phases)
  is ratified.
