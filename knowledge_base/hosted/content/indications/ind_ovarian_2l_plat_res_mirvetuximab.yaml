id: IND-OVARIAN-2L-PLAT-RES-MIRVETUXIMAB
plan_track: aggressive

applicable_to:
  disease_id: DIS-OVARIAN
  line_of_therapy: 2
  stage_requirements:
    - "Recurrent epithelial ovarian / fallopian tube / primary peritoneal cancer"
    - "Platinum-free interval ≤6 months (platinum-resistant)"
    - "1-3 prior systemic therapies"
  biomarker_requirements_required:
    - biomarker_id: BIO-FRA
      value_constraint: "high (≥75% of viable tumor cells with ≥2+ membrane staining by VENTANA FOLR1 RxDx)"
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 1

recommended_regimen: REG-MIRVETUXIMAB-OVARIAN
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "42% (MIRASOL vs 16% chemo control)"
  progression_free_survival: "mPFS 5.62 vs 3.98 mo (MIRASOL, HR 0.65)"
  overall_survival_5y: "mOS 16.46 vs 12.75 mo (MIRASOL, HR 0.67) — first phase-3 OS win in platinum-resistant ovarian"

hard_contraindications: []
red_flags_triggering_alternative:
  - RF-OVARIAN-FRAILTY-AGE

required_tests:
  - TEST-CBC
desired_tests: []

rationale: >
  Mirvetuximab soravtansine for FRα-high (≥75% TPS by VENTANA FOLR1
  RxDx), platinum-resistant recurrent ovarian after 1-3 prior lines.
  MIRASOL trial: PFS, ORR, and OS superiority over investigator-choice
  chemo (paclitaxel weekly, PLD, or topotecan). First targeted ADC
  with proven OS benefit in this scenario. Defining biomarker and
  defining toxicity (ocular) require workflow setup before starting.

sources:
  - source_id: SRC-NCCN-OVARIAN-2025
    position: supports
  - source_id: SRC-ESMO-OVARIAN-2024
    position: supports
  - source_id: SRC-MIRASOL-MOORE-2024
    position: supports

do_not_do:
  - "Do NOT start without documented FRα-high (≥75% TPS at ≥2+) by VENTANA FOLR1 RxDx assay specifically — other FRα IHC assays not validated"
  - "Do NOT start without baseline ophthalmology evaluation (slit-lamp + visual acuity)"
  - "Do NOT skip prophylactic corticosteroid + lubricant eye drops — keratopathy is the dose-limiting AE"
  - "Do NOT continue contact lens use during therapy"
  - "Do NOT start in patients with active corneal disorder or pre-existing severe keratopathy"

last_reviewed: "2026-04-27"
reviewer_signoffs: 0
notes: "ESCAT IA. UA-access: not registered as of 2026-04 — потребує клінічного дослідження або благодійного імпорту. Альтернатива з UA-доступом: REG-WEEKLY-PAC-BEV-OVARIAN або REG-PLD-BEV-OVARIAN."
