id: IND-NK-T-NASAL-1L-P-GEMOX
plan_track: aggressive

applicable_to:
  disease_id: DIS-NK-T-NASAL
  line_of_therapy: 1
  stage_requirements: []
  biomarker_requirements_required:
    - biomarker_id: BIO-EBV-DNA
      required: false  # monitoring marker, not gating — baseline + serial; same role as in SMILE
      value_constraint: "quantitative copies/mL (or IU/mL via WHO standard) on EDTA plasma; baseline + monitoring during therapy and post-treatment surveillance — NOT a treatment-decision gate, used as response surrogate"
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 3  # broader than SMILE; less HD-MTX neuro/renal toxicity

recommended_regimen: REG-P-GEMOX-NK-T
concurrent_therapy: []
followed_by:
  - "Concurrent RT 50 Gy for localized stage I/II"
  - "AutoSCT consideration in CR1 for high-risk disseminated"

evidence_level: moderate
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "~80% (Wang 2013, comparable to SMILE)"
  complete_response: "~50%"
  progression_free_survival: "5-year PFS ~70% (localized stage I/II); ~30-40% (disseminated)"
  overall_survival_5y: "~70% localized; ~40% disseminated"

hard_contraindications: []
red_flags_triggering_alternative: []

required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-LDH
  - TEST-COAG-PANEL
  - TEST-EBV-VIRAL-LOAD
  - TEST-HBV-SEROLOGY
  - TEST-HCV-ANTIBODY
  - TEST-HIV-SEROLOGY
  - TEST-FLOW-CYTOMETRY
  - TEST-LN-EXCISIONAL-BIOPSY
  - TEST-PET-CT
  - TEST-MRI-BRAIN-CONTRAST  # CNS extension common
  - TEST-RENAL-FUNCTION-EGFR
  - TEST-ECHO
  - TEST-PREGNANCY
desired_tests: []

rationale: >
  P-GEMOX (pegaspargase + gemcitabine + oxaliplatin) — pragmatic
  asparaginase-based alternative to SMILE for centers where MTX-
  intensive regimens are not feasible (older patients, renal
  impairment, intermittent asparaginase supply). Wang 2013 (Leukemia)
  in r/r NK/T-cell — ORR ~80% comparable to SMILE with less toxicity.
  Asparaginase preserved as essential active agent (P-glycoprotein-
  bypass mechanism). Lower mucositis and renal burden than SMILE
  permits broader patient eligibility. Concurrent CRT for localized
  stage I/II remains standard. AutoSCT consolidation for high-risk
  disseminated CR1.

rationale_ua: >
  P-GEMOX (pegaspargase + гемцитабін + оксаліплатин) — pragmatic asparaginase-based alternative to SMILE for centers where MTX- intensive схеми are not feasible (older patients, ниркова недостатність, intermittent asparaginase supply). Wang 2013 (лейкоз) in р/р NK/T-cell — ORR ~80% співставний з SMILE with less токсичність. Asparaginase preserved as essential active agent (P-glycoprotein- bypass mechanism). Lower мукозит and renal burden than SMILE permits broader patient eligibility. Concurrent CRT for localized stage I/II remains стандарт. аутоТГСК консолідація for високого ризику disseminated CR1.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: "P-GEMOX is acceptable alternative to SMILE for nasal NK/T-cell lymphoma; preserves asparaginase activity with reduced toxicity"
  - source_id: SRC-ESMO-PTCL-2024
    position: supports
    relevant_quote_paraphrase: "Asparaginase-based regimens (SMILE, P-GEMOX, DDGP) are preferred 1L for NK/T-cell nasal lymphoma; choice driven by access and patient fitness"

known_controversies:
  - topic: "SMILE vs P-GEMOX vs DDGP as preferred 1L"
    positions:
      - position: "SMILE — strongest RCT evidence (Yamaguchi 2008)"
        sources: [SRC-NCCN-BCELL-2025]
      - position: "P-GEMOX — comparable efficacy with significantly less toxicity, broader eligibility"
        sources: [SRC-ESMO-PTCL-2024]
    our_default: "SMILE for fit ≤70 with intact renal function and asparaginase access; P-GEMOX for older / renal-impaired / centers with intermittent asparaginase access"

do_not_do:
  - "Не пропускати antithrombin III monitoring при asparaginase — thrombosis."
  - "Не давати asparaginase якщо pancreatitis history — fatal pancreatitis."
  - "Не пропускати hypersensitivity test перед першою дозою asparaginase."
  - "Не пропускати EBV viral load — корелює з disease activity + relapse early detection."
  - "Не давати full-dose oxaliplatin при CrCl <30 — dose reduce 50% або switch to alternative."
  - "Не комбінувати asparaginase з warfarin без INR monitoring — coagulopathy."
  - "Не вводити вінкристин (якщо у subsequent regimen) інтратекально — фатально."

time_critical: false
last_reviewed: "2026-04-27"
reviewer_signoffs: 0
notes: >
  STUB. Pragmatic alternative to SMILE; gemcitabine + oxaliplatin
  fully accessible in UA. PEG-asparaginase preferred when available.
