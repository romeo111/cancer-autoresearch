rationale: >
  P-GEMOX (pegaspargase + gemcitabine + oxaliplatin) — pragmatic
  asparaginase-based alternative to SMILE for centers where MTX-
  intensive regimens are not feasible (older patients, renal
  impairment, intermittent asparaginase supply). Wang 2013 (Leukemia)
  in r/r NK/T-cell — ORR ~80% comparable to SMILE with less toxicity.
  Asparaginase preserved as essential active agent (P-glycoprotein-
  bypass mechanism). Lower mucositis and renal burden than SMILE
  permits broader patient eligibility. Concurrent CRT for localized
  stage I/II remains standard. AutoSCT consolidation for high-risk
  disseminated CR1.

sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: "P-GEMOX is acceptable alternative to SMILE for nasal NK/T-cell lymphoma; preserves asparaginase activity with reduced toxicity"
  - source_id: SRC-ESMO-PTCL-2024
    position: supports
    relevant_quote_paraphrase: "Asparaginase-based regimens (SMILE, P-GEMOX, DDGP) are preferred 1L for NK/T-cell nasal lymphoma; choice driven by access and patient fitness"

known_controversies:
  - topic: "SMILE vs P-GEMOX vs DDGP as preferred 1L"
    positions:
      - position: "SMILE — strongest RCT evidence (Yamaguchi 2008)"
        sources: [SRC-NCCN-BCELL-2025]
      - position: "P-GEMOX — comparable efficacy with significantly less toxicity, broader eligibility"
        sources: [SRC-ESMO-PTCL-2024]
    our_default: "SMILE for fit ≤70 with intact renal function and asparaginase access; P-GEMOX for older / renal-impaired / centers with intermittent asparaginase access"

do_not_do:
  - "Не пропускати antithrombin III monitoring при asparaginase — thrombosis."
  - "Не давати asparaginase якщо pancreatitis history — fatal pancreatitis."
  - "Не пропускати hypersensitivity test перед першою дозою asparaginase."
  - "Не пропускати EBV viral load — корелює з disease activity + relapse early detection."
  - "Не давати full-dose oxaliplatin при CrCl <30 — dose reduce 50% або switch to alternative."
  - "Не комбінувати asparaginase з warfarin без INR monitoring — coagulopathy."
  - "Не вводити вінкристин (якщо у subsequent regimen) інтратекально — фатально."

time_critical: false
last_reviewed: "2026-04-27"
reviewer_signoffs: 0
notes: >
  STUB. Pragmatic alternative to SMILE; gemcitabine + oxaliplatin
  fully accessible in UA. PEG-asparaginase preferred when available.
