rationale: >
  Watch-and-wait for low-burden asymptomatic nodal MZL. Treatment
  paradigm mirrors FL — same evidence base supports observation for
  GELF-negative patients. Active treatment triggered on GELF criteria
  or transformation suspect (route to BR or R-CHOP respectively).

