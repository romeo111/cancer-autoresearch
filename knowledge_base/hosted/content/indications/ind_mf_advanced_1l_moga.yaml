  - TEST-HCV-ANTIBODY
  - TEST-HIV-SEROLOGY
desired_tests: []

rationale: >
  Advanced MF (IIB+) or Sézary syndrome (B2) — mogamulizumab preferred
  systemic per NCCN cat 1, especially when blood compartment dominant
  (Sézary) where MAVORIC subset showed highest activity. CCR4-targeted
  ADCC depletes circulating malignant T-cells effectively. Dermatology
  partnership mandatory for AE differentiation (drug rash vs disease
  progression). Allo-SCT consideration in fit responders — but
  mogamulizumab carries severe GVHD risk if SCT within 50 days post
  last dose (FDA black box) — coordinate timing.

rationale_ua: >
  поширений MF (IIB+) or Sézary syndrome (B2) — mogamulizumab переважний systemic per NCCN cat 1, особливо when blood compartment dominant (Sézary) where MAVORIC subset showed найвища activity. CCR4-targeted ADCC depletes circulating malignant T-cells effectively. Dermatology partnership обов'язковий for AE differentiation (drug висип vs прогресування хвороби). Allo-SCT consideration in fit responders — but mogamulizumab carries severe GVHD risk if SCT within 50 days post last доза (FDA black box) — coordinate timing.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources: [{source_id: SRC-NCCN-BCELL-2025, position: supports}]
known_controversies:
  - topic: "Mogamulizumab vs brentuximab in CD30+ Sézary"
    positions:
      - position: "Mogamulizumab if blood-dominant (Sézary syndrome) — best B-compartment response"
        sources: [SRC-NCCN-BCELL-2025]
      - position: "Brentuximab if CD30+ ≥10% with skin-dominant burden — ALCANZA evidence"
        sources: [SRC-NCCN-BCELL-2025]
    our_default: "Mogamulizumab for Sézary syndrome + blood-dominant; BV-mono if CD30+ AND skin-dominant"

do_not_do:
  - "НЕ розпочинати mogamulizumab якщо allo-SCT планується <50 днів — severe GVHD risk per FDA black box."
  - "НЕ ігнорувати drug rash — interrupt + dermatology consult; differentiate від progression critical."
  - "НЕ комбінувати з іншими immunosuppressants без dermatology + ID coordination — інфекційний ризик підвищений."
  - "НЕ застосовувати при відсутності МОЗ-import підтвердження або clinical trial — не зареєстрований у Україні."
  - "НЕ пропускати Sezary count baseline + повтор q3 mo — головний end point response у B-компартменті."

time_critical: false
