id: IND-MF-ADVANCED-1L-MOGA
plan_track: standard  # for advanced/Sezary stage — this IS the standard-of-care default

applicable_to:
  disease_id: DIS-MF-SEZARY
  line_of_therapy: 1
  stage_requirements: ["IIB", "III", "IVA1", "IVA2", "IVB"]  # advanced-stage MF or Sézary syndrome
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints: {ecog_max: 3}

recommended_regimen: REG-MOGAMULIZUMAB
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "~28% (MAVORIC, r/r setting; 1L higher in real-world)"
  complete_response: "~5% globally; higher in blood compartment ~30-40%"
  progression_free_survival: "Median PFS ~7.7 months (MAVORIC); higher in B2 / Sézary"
  overall_survival_5y: "Improvements vs vorinostat era; mature data accumulating"

hard_contraindications: []
