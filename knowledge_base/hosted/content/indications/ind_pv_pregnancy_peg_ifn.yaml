id: IND-PV-PREGNANCY-PEG-IFN
plan_track: standard
applicable_to:
  disease_id: DIS-PV
  line_of_therapy: 1
  stage_requirements:
    - "Polycythemia vera in pregnancy planning OR confirmed pregnancy"
    - "Hydroxyurea contraindicated (teratogenic) — switch to peg-IFN α-2a (Pegasys) BEFORE conception OR immediately on confirmation"
    - "Goal: maintain HCT <45% (women), platelet stability, prevent thrombosis through pregnancy"
  biomarker_requirements_required:
