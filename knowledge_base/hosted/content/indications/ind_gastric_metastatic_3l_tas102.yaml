rationale: >
  Trifluridine-tipiracil (TAS-102) is the NCCN cat 1 preferred 3L+ option
  for metastatic gastric/GEJ adenocarcinoma after ≥2 prior regimens
  including platinum + fluoropyrimidine. TAGS trial established modest
  but real OS benefit (5.7 vs 3.6 mo) over best-supportive-care/placebo.
  Distinct mechanism (thymidine-analog incorporation, TS-independent)
  retains activity in 5-FU-refractory disease. Main toxicity is
  myelosuppression. ORR is low — value is disease stabilization +
  symptom control + modest OS extension. Patients with ECOG 3 or
  rapidly declining performance status are unlikely to benefit;
  best-supportive-care is the appropriate alternative.

rationale_ua: >
  трифлуридин-типірацил (TAS-102) is the NCCN cat 1 переважний 3L+ option for метастатичний gastric/GEJ adenocarcinoma after ≥2 prior схеми включаючи platinum + fluoropyrimidine. TAGS дослідження усталений modest but real OS виграш (5.7 проти 3.6 міс.) over найкращий-supportive-care/placebo. Distinct mechanism (thymidine-analog incorporation, TS-independent) retains activity in 5-FU-рефрактерний хвороба. Main токсичність is myelosuppression. ORR is low — value is хвороба stabilization + symptom control + modest OS extension. Patients with ECOG 3 or rapidly declining функціональний статус are unlikely to виграш; найкращий-supportive-care is the appropriate alternative.
