do_not_do:
  - "НЕ призначати при ECOG ≥3 / rapidly declining PS — toxicity overcomes minimal benefit; розглянути best-supportive-care."
  - "НЕ ігнорувати CBC — нейтропенія dose-limiting (~38%); G-CSF за потреби."
  - "НЕ забути renal-dose-adjustment при CrCl <60."
  - "НЕ комбінувати з іншими myelotoxic drugs без чіткої обґрунтованості."
  - "НЕ продовжувати після першого прогресування — ефективність single-agent обмежена; розглянути clinical-trial referral."

