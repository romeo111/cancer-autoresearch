rationale: 'After 4 cycles of nivolumab + ipilimumab combination induction (4 doses q3w) per CheckMate-067, patients transition to nivolumab monotherapy maintenance (240 mg q2w or 480 mg q4w) until progression, unacceptable toxicity, or maximum 2 years. CheckMate-067 (Larkin 2015 NEJM, Wolchok 2017/2019/2022 updates): 5-yr OS 52% combination vs 44% nivo mono vs 26% ipi mono; 6.5-yr OS plateau ~49%; mOS NR for combination arm vs 36.9 mo nivo mono. Approximately 50-60% of patients have durable disease control beyond treatment cessation. PD-L1 status does NOT clinically modify combination choice in advanced melanoma (unlike NSCLC). Brain metastases (CheckMate-204) respond well — combination with nivo+ipi is preferred over mono. STUB regimen — no dedicated REG- entity for nivo maintenance post-CheckMate-067 yet; flagged for REG follow-up.'
rationale_ua: >-
  After 4 цикли of ніволумаб + іпілімумаб комбінація індукція (4 doses q3w) per CheckMate-067, patients transition to ніволумаб монотерапія підтримка (240 mg q2w or 480 mg q4w) until прогресування, unacceptable токсичність, or maximum 2 years. CheckMate-067 (Larkin 2015 NEJM, Wolchok 2017/2019/2022 updates): 5-річна ЗВ 52% комбінація vs 44% nivo mono vs 26% ipi mono; 6.5-річна ЗВ plateau ~49%; mOS NR for комбінація arm vs 36.9 mo nivo mono. приблизно 50-60% of patients have durable контроль хвороби beyond лікування cessation. PD-L1 status does NOT clinically modify комбінація choice in поширений меланома (unlike NSCLC). метастази в мозок (CheckMate-204) respond well — комбінація with nivo+ipi is переважний over mono. STUB схема — ні dedicated REG- сутність for nivo підтримка post-CheckMate-067 yet; flagged for REG спостереження.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-MELANOMA-2025
    position: supports
    relevant_quote_paraphrase: Nivolumab maintenance after nivolumab + ipilimumab induction is Category 1 for advanced melanoma per CheckMate-067; continue up to 2 years
  - source_id: SRC-ESMO-MELANOMA-2024
    position: supports
    relevant_quote_paraphrase: After 4 cycles nivo+ipi, transition to nivo mono maintenance is standard; pembrolizumab monotherapy is alternative 1L for low-tumor-burden patients
  - source_id: SRC-CHECKMATE-067-LARKIN-2019
    position: supports
    relevant_quote_paraphrase: CHECKMATE-067 trial — see referenced publication for primary outcome data.
known_controversies:
  - topic: 2-year fixed duration vs treat-until-progression for nivolumab maintenance
    positions:
      - position: 2-year fixed duration — supported by CheckMate-067 protocol
        sources:
          - SRC-NCCN-MELANOMA-2025
      - position: "Treat-until-progression — observational data suggest continuing benefit; risk of late progression after stopping"
        sources:
          - SRC-ESMO-MELANOMA-2024
        evidence_note: KEYNOTE-006 melanoma 5-yr update suggests 2-yr treatment duration acceptable for stable responders
    our_default: 2-year fixed duration for stable CR/PR; consider extension for individual high-risk cases
    rationale: 2-year cap reflects pivotal trial protocol; long-tail OS curves suggest treatment-free disease control common
do_not_do:
  - НЕ продовжувати nivo+ipi понад 4 цикли — toxicity ескалаційна без додаткової efficacy; switch до nivo mono maintenance.
  - НЕ ігнорувати thyroid panel + cortisol — endocrinopathies (hypophysitis, thyroiditis) часті, можуть бути permanent.
  - НЕ призначати при active autoimmune disease (RA, IBD, lupus, MS) без multidisciplinary дискусії — ризик flare ≥40%.
  - НЕ продовжувати при grade 3 immune-related AE — hold + steroid taper; permanent discontinue при grade 4 (other than endocrinopathy on replacement).
  - НЕ робити vaccination (live-attenuated) під час та ≥3 місяці після nivo — недостатня immune response + ризики.
  - НЕ скасовувати при ізольованій pseudoprogression на 1st restaging — confirm з repeat imaging 4-6 weeks.
