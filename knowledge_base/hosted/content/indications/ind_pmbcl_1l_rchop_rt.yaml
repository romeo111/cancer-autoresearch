rationale: 'R-CHOP × 6 + consolidation involved-site mediastinal RT — historic standard. Менш бажаний за DA-EPOCH-R, але acceptable коли DA-EPOCH-R недоступний (центр без infusional досвіду). RT додає late toxicity (breast cancer, cardiac, secondary malignancies).

  '
rationale_ua: >
  R-CHOP × 6 + консолідація involved-site mediastinal RT — historic стандарт. Менш бажаний за DA-EPOCH-R, але прийнятний коли DA-EPOCH-R недоступний (центр без infusional досвіду). RT додає late токсичність (рак молочної залози, cardiac, secondary malignancies).
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: R-CHOP-21 + ISRT is acceptable alternative when DA-EPOCH-R not available
  - source_id: SRC-ESMO-DLBCL-2024
    position: supports
    relevant_quote_paraphrase: ESMO 2024 (DLBCL guideline §PMBCL) endorses DA-EPOCH-R as preferred 1L for PMBCL; R-CHOP + RT alternative when DA-EPOCH-R not feasible
known_controversies: []
do_not_do:
  - Не пропускати consolidation RT після R-CHOP — на відміну від DA-EPOCH-R, RT тут необхідна для більшості.
  - Не призначати без HBV prophylaxis.
  - Не нехтувати fertility preservation discussion.
  - Не вводити вінкристин інтратекально — фатально.
time_critical: false
last_reviewed: '2026-04-27'
