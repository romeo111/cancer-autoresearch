  - source_id: SRC-ESMO-BREAST-METASTATIC-2024
    weight: confirmatory

last_reviewed: "2026-04-27"
reviewers: []
reviewer_signoffs: 0

notes: >
  ESCAT IB (no biomarker gating; broad applicability). Default 2L
  HR+/HER2- when no targetable mutation found (no PIK3CA / AKT1 /
  PTEN alteration → no capivasertib/alpelisib; no ESR1 mutation →
  no elacestrant) and HER2-low not actionable / T-DXd not available.
  Pivotal trial BOLERO-2 used everolimus + exemestane; PrECOG 0102
  validated fulvestrant substitution (mechanistically equivalent;
  preferred when fulvestrant already in use). Stomatitis prophylaxis
  with dexamethasone mouthwash (SWISH) reduces G2+ stomatitis from
  ~33% to ~2% — mandatory pre-medication. Pneumonitis (~16% any
  grade) and immunosuppression-related infections require monitoring.
  UA access: everolimus registered (generics + brand Afinitor) but
  NSZU does not cover breast indication — out-of-pocket; generic
  substantially cheaper.
