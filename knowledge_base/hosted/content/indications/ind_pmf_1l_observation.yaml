strength_of_recommendation: conditional
nccn_category: "2A"

expected_outcomes:
  overall_response_rate: "Symptom control + spleen-volume reduction in ~40-50% on JAKi (COMFORT-I/II)"
  complete_response: "Spontaneous; does not eliminate clone; no MF reversal"
  progression_free_survival: "Symptomatic improvement; AML-transformation rate not altered"
  overall_survival_5y: "DIPSS-Plus low ~10-15 yrs; int-1 ~6-7 yrs; int-2 ~3 yrs; high ~1.5 yrs"

