  disease_id: DIS-PMF
  line_of_therapy: 1
  stage_requirements: []
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints: {}

recommended_regimen: REG-RUX-PMF
concurrent_therapy: []
