rationale: >
  Standard 1L for low / intermediate-1 risk PMF (DIPSS-Plus): observation
  + symptom-directed care (transfusion, danazol for anemia, ESA in
  selected, ruxolitinib for symptomatic splenomegaly / constitutional
  symptoms even at lower DIPSS risk if quality-of-life burden). NO
  alloHCT 1L for low-risk. Asymptomatic patients monitored q3-6 mo
  with CBC + spleen exam + symptom score (MPN-SAF).

rationale_ua: >
  стандарт 1L for low / intermediate-1 risk PMF (DIPSS-Plus): observation + symptom-directed care (transfusion, danazol for анемія, ESA in selected, руксолитиніб for symptomatic splenomegaly / constitutional symptoms even at lower DIPSS risk if quality-of-life burden). ні alloHCT 1L for низького ризику. Asymptomatic patients monitored q3-6 mo with CBC + spleen exam + symptom score (MPN-SAF).
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-MPN-2025
    position: supports
    relevant_quote_paraphrase: "Low / int-1 risk PMF: observation + symptom-directed therapy"
  - source_id: SRC-DIPSS-PLUS-GANGAT-2011
    position: supports
    relevant_quote_paraphrase: "DIPSS-Plus risk-stratifies PMF treatment intensity; low/int-1 has long natural history"
  - source_id: SRC-COMFORT-I-VERSTOVSEK-2012
    position: context
    relevant_quote_paraphrase: "Ruxolitinib indicated for symptomatic splenomegaly / symptoms regardless of DIPSS risk; alters QoL not necessarily natural history"

do_not_do:
  - "Не пропускати DIPSS-Plus / MIPSS70 risk-стратифікацію на дебюті — критично для довгострокового планування."
  - "Не призначати ruxolitinib асимптоматичним пацієнтам — preview зміна natural history не доведена; токсичність + cost непотрібні."
  - "Не пропускати pre-JAKi HBV / TB screening + active prophylaxis."
  - "Не abrupt-stop ruxolitinib — taper over 1-2 weeks."
  - "Не пропускати alloHCT-обговорення для intermediate-2 / high — switch до aggressive-track indication через RF."

known_controversies:
  - topic: "Early ruxolitinib for low/int-1 PMF with mild symptoms"
    positions:
      - position: "Ruxolitinib improves QoL even in lower-risk; consider earlier initiation"
        sources:
          - SRC-NCCN-MPN-2025
      - position: "Toxicity + cost + lack of clear OS benefit favor symptom-only initiation"
        sources:
          - SRC-DIPSS-PLUS-GANGAT-2011
    our_default: "Symptom-driven initiation; do NOT treat asymptomatic low-risk"
    rationale: "Cost / access dominant in Ukraine; QoL benefit must justify"

time_critical: false
