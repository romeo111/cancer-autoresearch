id: IND-HCV-MZL-1L-BR-AGGRESSIVE
plan_track: aggressive

applicable_to:
  disease_id: DIS-HCV-MZL
  line_of_therapy: 1
  stage_requirements: []
  biomarker_requirements_required:
    - biomarker_id: BIO-HCV-RNA
      required: true
      value_constraint: "detectable (positive viral load)"
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2
    fit_for_chemoimmunotherapy: true

recommended_regimen: REG-BR-STANDARD
concurrent_therapy:
  - REG-DAA-SOF-VEL  # antiviral runs in parallel / preceding
followed_by: []

evidence_level: moderate
strength_of_recommendation: conditional
nccn_category: "2A"

expected_outcomes:
  overall_response_rate: "~90%"
  complete_response: "~70%"
  progression_free_survival: "Median >5 years in responders"
  overall_survival_5y: ">80%"
  hcv_cure_rate_svr12: ">95% (with concurrent DAA)"

hard_contraindications:
  - CI-HBV-NO-PROPHYLAXIS
  - CI-SEVERE-CYTOPENIA-BR
red_flags_triggering_alternative:
  - RF-DECOMP-CIRRHOSIS

required_tests:
  - TEST-CBC
  - TEST-LFT
  - TEST-LDH
  - TEST-FIB4
  - TEST-CD20-IHC
  - TEST-HBV-SEROLOGY
  - TEST-PET-CT
desired_tests: []

rationale: >
  Aggressive-plan default for HCV-MZL with bulky disease, symptomatic
  presentation, or histologic evidence of transformation — situations
  where waiting for antiviral response is clinically unacceptable.
  Concurrent or preceding DAA addresses HCV; chemoimmunotherapy provides
  immediate cytoreduction. NCCN 2.2025 supports earlier chemoimmunotherapy
  in bulky or symptomatic cases. Bendamustine dose reduction applied if
  FIB-4 > 3.25 or cirrhosis (see REG-BR-STANDARD.dose_adjustments).

rationale_ua: >
  агресивний-plan default for HCV-MZL with bulky хвороба, symptomatic presentation, or histologic докази of трансформація — situations where waiting for antiviral відповідь is clinically unacceptable. Concurrent or preceding DAA addresses HCV; хіміоімунотерапія provides immediate cytoreduction. NCCN 2.2025 supports earlier хіміоімунотерапія in bulky or symptomatic cases. бендамустин зниження дози applied if FIB-4 > 3.25 or cirrhosis (see REG-BR-стандарт.доза_adjustments).
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: "For bulky or symptomatic HCV-associated indolent B-cell lymphoma, chemoimmunotherapy with concurrent antivirals is acceptable first-line"
  - source_id: SRC-ESMO-MZL-2024
    position: supports
    relevant_quote_paraphrase: "Chemoimmunotherapy reserved for non-response to antivirals or aggressive phenotype"

do_not_do:
  - "Не починати anti-CD20 терапію без HBV профілактики (entecavir) при HBsAg+ або anti-HBc+ — ризик фульмінантного гепатиту."
  - "Не використовувати full-dose bendamustine (90 mg/m²) при FIB-4 > 3.25 або компенсованому цирозі — редукція до 70 mg/m²."
  - "Не пропускати PJP профілактику (cotrimoxazole) під час BR + ≥6 місяців після останньої дози anti-CD20."
  - "Не починати regimen при ANC <1500/µL або тромбоцитах <75K — затримати цикл, розглянути G-CSF support."
  - "Не вводити bendamustine при CrCl <30 mL/min без dose adjustment — токсичність збільшується експоненційно."

known_controversies: []

time_critical: false  # outpatient cancer planning, not time-critical (FDA non-device CDS criterion 4)
last_reviewed: "2026-04-24"
reviewers: []
reviewer_signoffs: 0
notes: >
  STUB — requires clinical co-lead signoff before publication.
  Aggressive counterpart to IND-HCV-MZL-1L-ANTIVIRAL for two-plan
  output (CHARTER §2).
