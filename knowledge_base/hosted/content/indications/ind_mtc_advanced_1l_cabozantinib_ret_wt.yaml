id: IND-MTC-ADVANCED-1L-CABOZANTINIB-RET-WT
plan_track: aggressive

applicable_to:
  disease_id: DIS-MTC
  line_of_therapy: 1
  stage_requirements:
    - "Advanced / unresectable / metastatic"
    - "Symptomatic OR structural progression on imaging OR calcitonin doubling time <2 yr"
  biomarker_requirements_required: []
  biomarker_requirements_excluded:
    - biomarker_id: BIO-RET
      value_constraint: "RET mutation positive"
      required: false
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-CABOZANTINIB-MTC-1L
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "2A"

expected_outcomes:
  overall_response_rate: "~28% (EXAM)"
  progression_free_survival: "Median 11.2 mo vs 4.0 mo placebo (EXAM)"
  overall_survival_5y: "OS benefit limited to RET M918T subgroup (HR 0.60); overall ITT not significant"
  notes: "EXAM (Schoffski JCO 2012); also default for RET-mutant MTC when RET-selective TKI is inaccessible"

hard_contraindications: []
red_flags_triggering_alternative: []
required_tests: []
desired_tests: []

rationale: >
  RET-WT advanced/progressive MTC (RAS-mutant or unknown — ~50% of
  sporadic MTC) has no RET-selective option. Cabozantinib (EXAM) and
  vandetanib (ZETA) are the multikinase TKIs registered for advanced
  MTC; cabozantinib is the more commonly chosen of the two on AE-
  profile grounds. Significant toxicity (HFSR ~50%, hypertension,
  GI perforation, hemorrhage) requires aggressive monitoring +
  proactive dose reduction (140 → 100 → 60 mg). Also serves as the
  fallback for RET-mutant MTC when selpercatinib / pralsetinib are
  inaccessible (Ukraine: avapritinib, selpercatinib, pralsetinib all
  unregistered — cabozantinib + vandetanib are the on-the-ground
  realistic options before EAP / cross-border are arranged).

sources:
  - source_id: SRC-NCCN-THYROID-2025
    weight: primary

do_not_do:
  - "Do NOT start cabozantinib without baseline + monthly BP measurement and dental evaluation (osteonecrosis-of-jaw risk)."
  - "Do NOT continue cabozantinib through GI perforation / fistula or severe hemorrhage — permanent discontinuation is required (boxed warning)."
  - "Do NOT substitute Cabometyx tablets (RCC/HCC dose 60 mg) for Cometriq capsules (MTC dose 140 mg) — they are not bioequivalent."

last_reviewed: '2026-04-26'
reviewers: []
reviewer_signoffs: 2
notes: >
  Alternative 1L for RET-WT advanced MTC and the practical first-line
  in access-constrained settings until selpercatinib / pralsetinib
  EAP / cross-border treatment is established.
