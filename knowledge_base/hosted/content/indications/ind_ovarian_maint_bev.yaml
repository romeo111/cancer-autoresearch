id: IND-OVARIAN-MAINT-BEV
plan_track: standard
applicable_to:
  disease_id: DIS-OVARIAN
  line_of_therapy: 1
  stage_requirements:
    - "Stage III-IV epithelial ovarian / fallopian tube / primary peritoneal cancer"
    - "Bevacizumab introduced concurrent with carboplatin + paclitaxel induction (cycles 2-6) and continued as maintenance"
    - "Total bevacizumab duration: 15-22 months (GOG-218: 15 mo total; ICON7: 12 mo total)"
  biomarker_requirements_required: []
  biomarker_requirements_excluded:
    - biomarker_id: BIO-BRCA-GERMLINE
      required: false
      value_constraint: BRCA-mutated patients should be on olaparib maintenance (SOLO-1) preferentially; bevacizumab considered for HRD-positive non-BRCA per PAOLA-1 (with olaparib)
  demographic_constraints:
    ecog_max: 2
recommended_regimen:
concurrent_therapy: []
followed_by:
  - IND-OVARIAN-3L-POST-PARPi-POST-MIRVE
evidence_level: high
strength_of_recommendation: strong
nccn_category: '1'
expected_outcomes:
  overall_response_rate: Maintenance — measured by PFS extension
  complete_response: N/A (maintenance phase)
  progression_free_survival: Median PFS extension ~3.8 mo (GOG-218 Burger 2011 NEJM; mPFS 14.1 vs 10.3 mo); high-risk subgroup gain larger (ICON7 Oza 2015 Lancet Oncol; mPFS 18.1 vs 14.5 mo)
  overall_survival_5y: OS benefit confined to high-risk subgroup (ICON7 mOS 39.7 vs 30.2 mo); no overall OS gain in GOG-218
hard_contraindications: []
