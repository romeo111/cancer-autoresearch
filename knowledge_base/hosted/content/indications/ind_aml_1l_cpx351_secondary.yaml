notes: 'STUB — pending Clinical Co-Lead sign-off. Aggressive-track 1L for SECONDARY AML (tAML, AML-MRC, post-MDS/CMML) age
  60-75 fit. Younger fit patients with secondary AML often still get standard 7+3 + risk-adjusted consolidation; CPX-351 specifically
  positioned for the older subset where fitness is borderline. Ukraine: not registered, dominant access barrier.

  '
