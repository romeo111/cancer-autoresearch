id: IND-AML-1L-CPX351-SECONDARY
plan_track: aggressive
applicable_to:
  disease_id: DIS-AML
  line_of_therapy: 1
  stage_requirements:
  - Therapy-related AML (post-cytotoxic / post-radiation) OR AML with myelodysplasia-related changes (AML-MRC) OR antecedent
    MDS / CMML
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2
    age_min: 60
    age_max: 75
    fit_for_intensive_chemo: true
recommended_regimen: REG-CPX351-AML
concurrent_therapy: []
followed_by: []
evidence_level: high
strength_of_recommendation: strong
nccn_category: '1'
expected_outcomes:
  overall_response_rate: ~47.7% CR/CRi (vs 33.3% with 7+3) per Lancet et al. 2018
  complete_response: ~38% CR (vs 26% 7+3)
  progression_free_survival: Median EFS 2.5 vs 1.3 mo; PFS benefit dominant in alloHCT-bridge subset
  overall_survival_5y: 5-y OS 18% vs 8%; median OS 9.56 vs 5.95 mo (HR 0.69)
hard_contraindications:
- CI-LVEF-LOW-FOR-ANTHRACYCLINE
red_flags_triggering_alternative:
- RF-AML-EMERGENCY-TLS-LEUKOSTASIS
- RF-AML-FRAILTY-AGE
- RF-AML-INFECTION-SCREENING
- RF-AML-ORGAN-DYSFUNCTION
- RF-AML-HIGH-RISK-BIOLOGY
required_tests:
- TEST-CBC
- TEST-PERIPHERAL-SMEAR
- TEST-CMP
- TEST-LFT
- TEST-LDH
- TEST-URIC-ACID
- TEST-COAG-PANEL
- TEST-HBV-SEROLOGY
- TEST-HCV-ANTIBODY
- TEST-HIV-SEROLOGY
- TEST-CMV-SEROLOGY
- TEST-BM-ASPIRATE
- TEST-BM-TREPHINE
- TEST-FLOW-CYTOMETRY
- TEST-KARYOTYPE
- TEST-FISH-PANEL
- TEST-NGS-MYELOID-PANEL
- TEST-ECHO
desired_tests:
- TEST-PREGNANCY
rationale: 'CPX-351 (Vyxeos) liposomal cytarabine + daunorubicin in 5:1 synergistic ratio is FDA-approved for newly-dx therapy-related
  AML (t-AML) and AML with myelodysplasia-related changes (AML-MRC) in fit older patients (60-75). Pivotal phase-3 (Lancet
  et al., JCO 2018): median OS 9.56 vs 5.95 mo for standard 7+3 (HR 0.69), 5-y OS 18% vs 8%. Higher CR/CRi (47.7% vs 33.3%)
  → more patients bridged to alloHCT (34% vs 25%) drives the survival benefit. CRITICAL labeling: dosing is "units/m²" not
  "mg/m²" — fatal dosing errors when liposomal product mistaken for free cytarabine + daunorubicin. ECHO + cumulative anthracycline
  tracking mandatory. Prolonged cytopenia recovery (often beyond day 35) — G-CSF + transfusion + infection prophylaxis. Ukraine:
  not registered, international referral required.

  '
sources:
- source_id: SRC-NCCN-AML-2025
  position: supports
  relevant_quote_paraphrase: CPX-351 (Vyxeos) preferred 1L for newly-dx tAML or AML-MRC age 60-75 fit (Cat 1)
- source_id: SRC-LANCET-CPX351-2018
  position: supports
  relevant_quote_paraphrase: Phase-3 CPX-351 vs 7+3 in older secondary AML; median OS 9.56 vs 5.95 mo (HR 0.69), 5-y OS 18%
    vs 8%
- source_id: SRC-ELN-AML-2022
  position: supports
  relevant_quote_paraphrase: CPX-351 standard for fit older patients with secondary AML per ELN 2022
do_not_do:
- 'НЕ використовувати CPX-351 у пацієнтів з de novo AML без MRC-features — FDA-approval вузьке: тільки tAML / AML-MRC / antecedent
  MDS-CMML.'
- НЕ змішувати або замінювати з вільним цитарабіном + дауноруібіцином — фатальні dosing errors задокументовано (units/m² vs
  mg/m²).
- НЕ призначати при LVEF <50% — ліпосомний антрациклін все ще кардіотоксичний.
- НЕ пропускати pre-cycle ECHO + cumulative-anthracycline tracking.
- НЕ розпочинати без планування alloHCT-pathway — survival benefit домінантно через bridge до HCT.
- НЕ припиняти при відстроченому одужанні (>day 35) — це очікуване для liposomal формуляції; G-CSF + transfusion підтримка.
- НЕ пропускати TLS prophylaxis при високому WBC або високій активності пухлини.
known_controversies:
- topic: CPX-351 vs ven+aza for fit older patients with AML-MRC age 60-75
  positions:
  - position: CPX-351 — higher CR rate, supports alloHCT bridge, registered for AML-MRC
    sources:
    - SRC-NCCN-AML-2025
    - SRC-LANCET-CPX351-2018
  - position: Ven+aza — lower TRM, outpatient feasible, growing data in MDS-MRC subset
    sources:
    - SRC-NCCN-AML-2025
    evidence_note: Cross-trial comparison only; no head-to-head RCT. CPX-351 favored when alloHCT planned + patient sufficiently
      fit for intensive induction.
  our_default: CPX-351 for fit 60-75 AML-MRC / tAML with alloHCT pathway feasible; ven+aza for unfit OR no alloHCT pathway
  rationale: Bridge-to-HCT intent drives choice; fitness assessment dominant
time_critical: false
last_reviewed: '2026-04-26'
reviewers: []
