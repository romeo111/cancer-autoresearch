id: IND-MDS-LR-2L-IMETELSTAT
plan_track: aggressive

applicable_to:
  disease_id: DIS-MDS-LR
  line_of_therapy: 2
  stage_requirements:
    - "Transfusion-dependent LR-MDS (IPSS Low / Int-1; IPSS-M Low / Moderate-Low / Moderate-High)"
    - "Relapsed or refractory to ESA (or luspatercept where available) — failed to achieve or sustain transfusion independence"
    - "Non-del(5q) (del(5q) → lenalidomide preferred)"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-IMETELSTAT-MDS-LR
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "8-week RBC TI ~39.8% (IMerge; vs 15.0% placebo, p<0.001)"
  complete_response: "Sustained 24-week TI ~28% (vs 3.3% placebo)"
  progression_free_survival: "Cytopenia management; does not alter natural history; median TI duration ~52 weeks for responders"
  overall_survival_5y: "Per IPSS-R / IPSS-M baseline; OS not significantly altered (cytopenia management indication)"

