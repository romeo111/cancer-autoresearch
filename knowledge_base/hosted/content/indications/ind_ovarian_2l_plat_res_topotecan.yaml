id: IND-OVARIAN-2L-PLAT-RES-TOPOTECAN
plan_track: palliative

applicable_to:
  disease_id: DIS-OVARIAN
  line_of_therapy: 2
  stage_requirements:
    - "Recurrent epithelial ovarian / fallopian tube / primary peritoneal cancer"
    - "Platinum-free interval ≤6 months (platinum-resistant)"
    - "Bevacizumab contraindicated OR exhausted PLD / weekly paclitaxel options"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-TOPOTECAN-OVARIAN
concurrent_therapy: []
followed_by: []

evidence_level: moderate
strength_of_recommendation: conditional
nccn_category: "2A"

expected_outcomes:
  overall_response_rate: "~7-15% (single-agent in platinum-resistant)"
  progression_free_survival: "mPFS ~3-4 mo"
  overall_survival_5y: "mOS ~9-13 mo single-agent in platinum-resistant"

hard_contraindications: []
red_flags_triggering_alternative:
  - RF-OVARIAN-FRAILTY-AGE

required_tests:
  - TEST-CBC
desired_tests: []

rationale: >
  Single-agent topotecan as later-line salvage in platinum-resistant
  recurrent ovarian when bevacizumab is contraindicated or other
  AURELIA-style options exhausted. Weekly schedule (4 mg/m² days 1, 8,
  15 q28d) preferred over historical 5-day q21d for lower
  myelosuppression with similar efficacy. Was control arm in MIRASOL
  alongside paclitaxel and PLD.

sources:
  - source_id: SRC-NCCN-OVARIAN-2025
    position: supports
  - source_id: SRC-ESMO-OVARIAN-2024
    position: supports

do_not_do:
  - "Do NOT use as first platinum-resistant choice if bevacizumab is available — AURELIA backbones outperform single-agent"
  - "Do NOT use 5-day q21d schedule unless weekly is contraindicated — myelotoxicity markedly higher with no efficacy advantage"
  - "Do NOT give if CrCl <20 (renal clearance, dose-modify CrCl 20-39)"
  - "Do NOT continue if no response after 2-3 cycles — palliative track, change quickly"

last_reviewed: "2026-04-27"
reviewer_signoffs: 0
notes: "ESCAT IIA. Salvage / palliative track when other platinum-resistant options exhausted or contraindicated."
