id: IND-MTC-ADVANCED-1L-SELPERCATINIB
plan_track: standard

applicable_to:
  disease_id: DIS-MTC
  line_of_therapy: 1
  stage_requirements:
    - "Advanced / unresectable / metastatic"
    - "Symptomatic OR structural progression on imaging OR calcitonin doubling time <2 yr"
  biomarker_requirements_required:
    - biomarker_id: BIO-RET
      value_constraint: "RET mutation positive (somatic M918T OR germline MEN2-associated C634/M918T/other)"
      required: true
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-SELPERCATINIB-MTC-1L
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "~73% (LIBRETTO-001 RET-mutant MTC); ~69% (LIBRETTO-531 1L)"
  progression_free_survival: "Median not reached at 24 mo follow-up (LIBRETTO-531)"
  overall_survival_5y: "Not yet mature; PFS at 24 mo ~73%"
  notes: "LIBRETTO-001 (Wirth NEJM 2020); LIBRETTO-531 (Hadoux NEJM 2023) — superior to cabozantinib/vandetanib"

hard_contraindications: []
red_flags_triggering_alternative: []
required_tests: []
desired_tests: []

rationale: >
  Advanced/progressive RET-mutant MTC: selpercatinib is preferred 1L
  per NCCN — LIBRETTO-531 randomized vs cabozantinib OR vandetanib
  showed superior PFS and substantially better tolerability. RET-
  selective design avoids the multikinase off-target toxicity (HFSR,
  GI perforation, severe hypertension) that limits cabozantinib /
  vandetanib. Calcitonin doubling time <2 yr or RECIST progression
  triggers transition from observation to systemic therapy; localized
  disease is managed surgically (total thyroidectomy + central neck
  dissection). Pralsetinib (ARROW) is the alternative RET-selective.

sources:
  - source_id: SRC-NCCN-THYROID-2025
    weight: primary
  - source_id: SRC-ONCOKB
    weight: supporting

do_not_do:
  - "Do NOT start systemic therapy in asymptomatic, structurally stable, slowly-rising-calcitonin MTC — observe with calcitonin / CEA q3-6 mo + imaging q6-12 mo."
  - "Do NOT use radioactive iodine (RAI) in MTC — parafollicular C-cells do not concentrate iodide; RAI has zero efficacy."
  - "Do NOT skip germline RET testing — ~25% of MTC is hereditary; positive germline drives kindred screening + pheochromocytoma surveillance + prophylactic-thyroidectomy timing in offspring."

last_reviewed: "2026-04-27"
reviewers: []
reviewer_signoffs: 0
notes: >
  Standard 1L for the ~50-100% of advanced MTC that is RET-mutant
  (sporadic ~50% RET M918T; hereditary MEN2 ~100%). Reuses
  cross-disease DRUG-SELPERCATINIB.
