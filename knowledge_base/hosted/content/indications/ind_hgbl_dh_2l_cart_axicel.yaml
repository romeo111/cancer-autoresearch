id: IND-HGBL-DH-2L-CART-AXICEL
plan_track: aggressive
applicable_to:
  disease_id: DIS-HGBL-DH
  line_of_therapy: 2
  stage_requirements:
    - Relapsed/refractory or primary refractory after 1L DA-EPOCH-R
    - CAR-T center referral feasible
  biomarker_requirements_required:
    - biomarker_id: BIO-CD20-IHC
      required: true
      value_constraint: positive (CD20+)
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 1
recommended_regimen: REG-CAR-T-AXICEL-HGBL
concurrent_therapy: []
followed_by: []
evidence_level: moderate
strength_of_recommendation: strong
nccn_category: '1'
expected_outcomes:
  overall_response_rate: ~83% (ZUMA-1 axi-cel in r/r aggressive B-NHL including HGBL-DH subgroup)
  complete_response: ~58%
  progression_free_survival: Median PFS ~5.9 mo; durable response ~40% at 24 mo
  overall_survival_5y: ~25-40% durable (5-yr ZUMA-1 update)
hard_contraindications: []
red_flags_triggering_alternative:
  - RF-HGBL-DH-FRAILTY-AGE
required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-LDH
  - TEST-B2-MICROGLOBULIN
  - TEST-HBV-SEROLOGY
  - TEST-HCV-ANTIBODY
  - TEST-HIV-SEROLOGY
  - TEST-CD20-IHC
  - TEST-PET-CT
  - TEST-LN-CORE-BIOPSY
  - TEST-ECHO
  - TEST-BRAIN-MRI-CONTRAST
desired_tests: []
rationale: 'CAR-T (axi-cel preferred in HGBL-DH) is standard 2L for relapsed/refractory or primary refractory HGBL-DH. ZUMA-1 (Locke 2019) HGBL-DH subgroup outcomes comparable to non-DH r/r DLBCL (ORR ~83%, CR ~58%, durable response ~40% at 24 mo). ZUMA-7 (Locke 2022 NEJM): CAR-T superior to standard salvage chemo + autoSCT in early-relapse / primary-refractory aggressive B-NHL — HGBL-DH is high-priority indication. Bridging therapy + lymphodepletion (Flu/Cy) handled in regimen layer. CRS (Grade ≥2 ~13%) + ICANS (Grade ≥3 ~28%) require CAR-T-certified center.'
rationale_ua: >-
  CAR-T (axi-cel переважний in HGBL-DH) is стандарт 2L for рецидивний/рефрактерний or primary рефрактерний HGBL-DH. ZUMA-1 (Locke 2019) HGBL-DH subgroup outcomes співставний з non-DH р/р DLBCL (ORR ~83%, CR ~58%, стійка відповідь ~40% at 24 міс.). ZUMA-7 (Locke 2022 NEJM): CAR-T перевершує стандарт сальвадж chemo + аутоТГСК in early-рецидив / primary-рефрактерний агресивний B-NHL — HGBL-DH is high-priority показання. бриджингова терапія + lymphodepletion (Flu/Cy) handled in схема layer. CRS (Grade ≥2 ~13%) + ICANS (Grade ≥3 ~28%) require CAR-T-certified center.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: CAR-T (axi-cel, liso-cel, brexu-cel) is Category 1 preferred 2L for primary refractory or early-relapse aggressive B-NHL including HGBL-DH (ZUMA-7 / TRANSFORM evidence)
  - source_id: SRC-ESMO-DLBCL-2024
    position: supports
    relevant_quote_paraphrase: CAR-T is recommended as 2L for primary refractory and early-relapse (≤12 mo) DLBCL including HGBL-DH
known_controversies:
  - topic: CAR-T vs salvage chemo + autoSCT as preferred 2L for late-relapse (>12 mo) HGBL-DH
    positions:
      - position: CAR-T — superior in early-relapse / primary-refractory; emerging data in late-relapse
        sources:
          - SRC-NCCN-BCELL-2025
      - position: Salvage chemo + autoSCT for chemosensitive late-relapse — established standard
        sources:
          - SRC-ESMO-DLBCL-2024
        evidence_note: Inferred from DLBCL data; HGBL-DH–specific RCTs lacking
    our_default: CAR-T for primary refractory / early-relapse (≤12 mo); salvage R-ICE/R-DHAP + autoSCT for late-relapse chemosensitive
    rationale: HGBL-DH biology argues for CAR-T preference; access dominates choice in UA
do_not_do:
  - НЕ ініціювати без CAR-T-certified center referral pathway — toxicity management потребує спеціалізованої інфраструктури.
  - НЕ призначати при ECOG >1 OR active CNS involvement — exclusion criteria CAR-T trials.
  - НЕ пропускати baseline PET + brain MRI — high CNS relapse risk у HGBL-DH.
  - НЕ забувати про bridging therapy між апаразисом + інфузією — disease control критичний.
  - НЕ ігнорувати CRS / ICANS моніторинг перші 14 днів post-infusion.
  - НЕ призначати у пацієнтів з активною аутоімунною хворобою.
time_critical: false
last_reviewed: '2026-04-27'
reviewers: []
reviewer_signoffs: 0
notes: 'Aggressive-track 2L for HGBL-DH. UA access barrier: CAR-T not commercially available — international referral pathway only. Alternative 2L (standard track) for chemorefractory or no CAR-T access: salvage R-ICE/R-DHAP + autoSCT — separate Indication when scope opens.'
