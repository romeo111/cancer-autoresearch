id: IND-CLL-3L-PIRTOBRUTINIB
plan_track: aggressive

applicable_to:
  disease_id: DIS-CLL
  line_of_therapy: 3
  stage_requirements:
    - "Relapsed/refractory after ≥2 prior systemic lines including a covalent BTK inhibitor (ibrutinib / acalabrutinib / zanubrutinib)"
    - "Documented progression on cBTKi OR cBTKi intolerance"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-PIRTOBRUTINIB
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "2A"

expected_outcomes:
  overall_response_rate: "~73% (BRUIN; ~71% in BTK-C481-mutated subset)"
  complete_response: "~3-7%"
  progression_free_survival: "Median PFS ~19.6 mo (BRUIN, mostly post-cBTKi+BCL2i)"
  overall_survival_5y: "Mature OS data still maturing; 18-month OS ~80%"

hard_contraindications: []
red_flags_triggering_alternative: []

required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-LDH
  - TEST-B2-MICROGLOBULIN
  - TEST-FISH-PANEL
  - TEST-NGS-LYMPHOID-PANEL  # check BTK-C481 + TP53 mutation status to confirm rationale
  - TEST-IMMUNOGLOBULINS
  - TEST-HBV-SEROLOGY
  - TEST-HCV-ANTIBODY
  - TEST-HIV-SEROLOGY
  - TEST-CECT-CAP
  - TEST-ECHO
desired_tests: []

rationale: >
  Pirtobrutinib (non-covalent reversible BTKi) for r/r CLL after ≥2
  prior lines including a covalent BTKi. Distinct binding mechanism
  (C481-independent) overcomes BTK-C481-S/R mutations that confer
  resistance to ibrutinib / acalabrutinib / zanubrutinib. BRUIN trial:
  ORR 73% in heavily pretreated population (median 3 prior lines, ~50%
  with prior BCL2i too) — including ~71% ORR in confirmed BTK-C481-
  mutated subset. Particularly active in TP53-mutated CLL where
  conventional chemoimmunotherapy fails. Cardiac safety better than
  ibrutinib (afib ~3% vs ~7-15%). Major UA access barrier: not
  registered.

sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: "Pirtobrutinib is recommended for r/r CLL/SLL after ≥2 prior lines including cBTKi and BCL2i (BRUIN trial); Cat 2A"
  - source_id: SRC-ESMO-CLL-2024
    position: supports
    relevant_quote_paraphrase: "Non-covalent BTK inhibitors (pirtobrutinib) are emerging standard for r/r CLL post-cBTKi resistance, particularly in BTK-C481 and TP53-mutated subsets"

known_controversies:
  - topic: "Pirtobrutinib vs CAR-T (lisocabtagene maraleucel) for post-cBTKi+BCL2i CLL"
    positions:
      - position: "Pirtobrutinib: oral, manageable in standard hematology, no CRS/ICANS"
        sources: [SRC-NCCN-BCELL-2025]
      - position: "Lisocabtagene maraleucel: durable remission ~40% at 2 years (TRANSCEND CLL 004); only curative-intent option"
        sources: [SRC-NCCN-BCELL-2025]
        evidence_note: "CAR-T reserved for fit patients + accessible CAR-T center; pirto more practical 1st choice"
    our_default: "Pirtobrutinib first; CAR-T (international referral) for younger/fit patients with durable remission goal"
    rationale: "Both require international access in Ukraine; pirto is the more pragmatic first attempt"

do_not_do:
  - "НЕ призначати без verified prior cBTKi exposure — Cat 2A indication restricts use to post-cBTKi setting."
  - "НЕ використовувати при non-resistant 1L scenarios — slot for resistant disease only."
  - "НЕ пропускати baseline ECG + кардіологічну оцінку — afib знижений але можливий."
  - "НЕ комбінувати з anticoagulants без strict monitoring — bleeding risk persists."
  - "НЕ призначати при concomitant strong CYP3A4 inhibitor без dose reduction."
  - "НЕ підтверджувати план без funding pathway — препарат не зареєстрований в Україні."
  - "НЕ припиняти при transient AE без переоцінки — для C481-mutated/TP53-mutated пацієнтів альтернатив мало."

time_critical: false
last_reviewed: "2026-04-25"
reviewers: []
reviewer_signoffs: 0
notes: >
  STUB — pending Co-Lead sign-off. Aggressive-track 3L+ option for r/r
  CLL post-cBTKi resistance. Particularly indicated for BTK-C481 and
  TP53-mutated subsets. CAR-T (lisocabtagene maraleucel, TRANSCEND CLL
  004) is the alternative cellular therapy — separate future Indication.
  UA access barrier is dominant (not registered, no domestic supply).
