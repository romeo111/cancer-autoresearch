rationale: 'R-MPV — MSKCC standard induction (Morris 2013), Cat 1 NCCN. Більш доступний за MATRix (немає тіотепи). Followed by HD-cytarabine consolidation OR reduced-dose WBRT (23.4 Gy) для CR pts. Менш intensive ніж MATRix — підходить для unfit older patients.

  '
rationale_ua: >
  R-MPV — MSKCC стандарт індукція (Morris 2013), Cat 1 NCCN. Більш доступний за MATRix (немає тіотепи). Followed by HD-цитарабін консолідація OR зменшений-доза WBRT (23.4 Gy) для CR pts. Менш intensive ніж MATRix — підходить для unfit older patients.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: R-MPV is Category 1 induction for PCNSL when MATRix-eligibility uncertain
  - source_id: SRC-NCCN-CNS-2025
    position: supports
    relevant_quote_paraphrase: NCCN CNS 2025 endorses HD-MTX-based induction (R-MPV or MATRix) followed by consolidation (autoSCT/thiotepa-based or WBRT) as PCNSL 1L standard
known_controversies: []
do_not_do:
  - Не давати steroids ПЕРЕД біопсією.
  - Не давати HD-MTX без monitoring CrCl + MTX levels.
  - Не вводити вінкристин інтратекально.
  - Не використовувати full-dose WBRT (45 Gy) у >60 — severe neurocognitive decline.
time_critical: false
