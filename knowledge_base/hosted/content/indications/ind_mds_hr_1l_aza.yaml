rationale: >
  Standard 1L for MDS-HR (IPSS-R high / very high; IPSS-M High / Very
  High; MDS-IB1/IB2). Azacitidine 75 mg/m² SC days 1-7 q28d
  (AZA-001: median OS 24.5 vs 15.0 mo, HR 0.58). Continue ≥6 cycles
  before declaring failure (response often delayed to cycles 4-6).
  Concurrent alloHCT donor search if eligible (RF-MDS-TRANSPLANT-
  ELIGIBLE) — do NOT defer donor search to HMA failure (search takes
  3-6 months). Decitabine 20 mg/m² × 5 d q28d is functionally
  equivalent alternative; choice often local.

rationale_ua: >
  стандарт 1L for MDS-HR (IPSS-R high / very high; IPSS-M High / Very High; MDS-IB1/IB2). азацитидин 75 mg/m² SC days 1-7 q28d (AZA-001: медіана ЗВ 24.5 проти 15.0 міс., HR 0.58). Continue ≥6 цикли before declaring failure (відповідь часто delayed to цикли 4-6). Concurrent alloHCT donor search if eligible (RF-MDS-TRANSPLANT- ELIGIBLE) — do NOT defer donor search to HMA failure (search takes 3-6 months). децитабін 20 mg/m² × 5 d q28d is functionally еквівалентний alternative; choice часто local.
