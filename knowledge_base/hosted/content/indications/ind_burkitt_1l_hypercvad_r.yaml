id: IND-BURKITT-1L-HYPERCVAD-R
plan_track: aggressive

applicable_to:
  disease_id: DIS-BURKITT
  line_of_therapy: 1
  stage_requirements:
    - "Newly diagnosed high-risk Burkitt: CNS involvement OR leukemic phase OR LDH >3× ULN OR bulky abdominal disease (RF-BURKITT-HIGH-RISK fired)"
    - "Alternative to R-CODOX-M/IVAC for fit younger high-risk Burkitt; choice often driven by center experience + bone marrow + CNS disease intensity"
  biomarker_requirements_required:
    - {biomarker_id: BIO-CD20-IHC, required: true, value_constraint: "positive"}
    - {biomarker_id: BIO-MYC-REARRANGEMENT, required: true, value_constraint: "positive"}
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2
    age_max: 60

recommended_regimen: REG-HYPER-CVAD-R
concurrent_therapy: [SUP-PJP-PROPHYLAXIS, SUP-TLS-PROPHYLAXIS, SUP-HSV-PROPHYLAXIS, SUP-GCSF-NEUTROPENIA]
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "~90-95%"
  complete_response: "~80-90%"
  progression_free_survival: "3y PFS ~70-80% in fit younger high-risk per Thomas 2010"
  overall_survival_5y: "~70-80% in fit younger high-risk; substantially worse age >60"

hard_contraindications: [CI-HBV-NO-PROPHYLAXIS, CI-LVEF-LOW-FOR-ANTHRACYCLINE, CI-RENAL-FAILURE-FOR-HD-MTX]
red_flags_triggering_alternative: []

