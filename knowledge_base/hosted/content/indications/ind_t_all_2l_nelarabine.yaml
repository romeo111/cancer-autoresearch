id: IND-T-ALL-2L-NELARABINE
plan_track: standard

applicable_to:
  disease_id: DIS-T-ALL
  line_of_therapy: 2
  stage_requirements:
    - "Relapsed/refractory T-ALL or T-LBL after ≥1 prior line (typically hyper-CVAD or BFM-derivative)"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-NELARABINE-TCELL
concurrent_therapy: []
followed_by:
  - "AlloSCT consolidation in fit responders — only curative path for r/r T-ALL/T-LBL"

evidence_level: moderate
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "~36-41% (Gökbuget 2017; DeAngelo 2007)"
  complete_response: "~31% (CR + CRi)"
  progression_free_survival: "Median PFS ~3-4 months without consolidation; sustained only with alloSCT"
  overall_survival_5y: "~10% chemo-only; ~30-40% if successful bridge to alloSCT"

hard_contraindications: []
red_flags_triggering_alternative: []

required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-LDH
  - TEST-URIC-ACID
  - TEST-COAG-PANEL
  - TEST-RENAL-FUNCTION-EGFR
  - TEST-FLOW-CYTOMETRY
  - TEST-BM-ASPIRATE
  - TEST-BM-TREPHINE
  - TEST-CSF-CYTOLOGY-FLOW
  - TEST-PET-CT  # for T-LBL with mediastinal/extranodal disease
  - TEST-CECT-CAP
  - TEST-ECHO
  - TEST-PREGNANCY
desired_tests:
  - TEST-NGS-LYMPHOID-PANEL  # NOTCH1, FBXW7 status

rationale: >
  Nelarabine — T-cell-selective deoxyguanosine analog; FDA-approved
  for r/r T-ALL/T-LBL after ≥2 prior lines (NCCN extends to ≥1 prior).
  Distinct mechanism (ara-GTP DNA incorporation) from
  cyclophosphamide/anthracycline backbone. ORR ~36-41% with CR ~31%
  in adult r/r series (Gökbuget 2017). Used as bridge to alloSCT —
  sustained remission without transplant uncommon. Neurotoxicity
  (peripheral neuropathy, demyelination, Guillain-Barré-like
  syndromes) is dominant DLT and may be irreversible — Grade ≥2
  triggers permanent discontinuation. Major UA access barrier.

rationale_ua: >
  Nelarabine — T-cell-селективний deoxyguanosine analog; FDA-схвалений для р/р T-ALL/T-LBL after ≥2 prior lines (NCCN extends to ≥1 prior). Distinct mechanism (ara-GTP DNA incorporation) from циклофосфамід/anthracycline основа схеми. ORR ~36-41% with CR ~31% in дорослий р/р series (Gökbuget 2017). Used as bridge to алоТГСК — sustained ремісія without transplant uncommon. Neurotoxicity (периферична нейропатія, demyelination, Guillain-Barré-like syndromes) is dominant DLT and may be необоротний — Grade ≥2 triggers permanent припинення. Major UA access barrier.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: "Nelarabine is Category 1 for r/r T-ALL/T-LBL after ≥1 prior line; bridge to alloSCT in fit responders"
  - source_id: SRC-ESMO-PTCL-2024
    position: supports
    relevant_quote_paraphrase: "Nelarabine is preferred 2L+ option for r/r T-cell ALL/LBL; allo-SCT consolidation mandatory for cure"

known_controversies:
  - topic: "Nelarabine vs FLAG-IDA / clofarabine-based salvage"
    positions:
      - position: "Nelarabine — T-cell selectivity, FDA-approved indication"
        sources: [SRC-NCCN-BCELL-2025]
      - position: "FLAG-IDA / clofarabine — broader cytotoxicity, less neurotoxicity, may permit deeper CR pre-SCT"
        sources: [SRC-ESMO-PTCL-2024]
    our_default: "Nelarabine first-line salvage when accessible; FLAG-IDA / clofarabine when nelarabine unavailable or in patients with neurologic comorbidity"

do_not_do:
  - "НЕ продовжувати при Grade ≥2 neurologic event — neurotoxicity може бути irreversible (Guillain-Barré-like)."
  - "НЕ комбінувати з pentostatin — additive neurotoxicity."
  - "НЕ давати concurrent intrathecal chemotherapy у тому ж тижні — additive CNS toxicity."
  - "НЕ нехтувати donor search паралельно — alloSCT — єдиний curative варіант."
  - "НЕ пропускати TLS prophylaxis у hyperleukocytosis."
  - "НЕ пропускати baseline neurologic exam — необхідне для interpretation neurotoxicity."
  - "НЕ давати full dose при CrCl <50 — reduce 25-50%, close monitoring."
  - "НЕ забути про PJP prophylaxis."

time_critical: true
last_reviewed: "2026-04-27"
reviewer_signoffs: 0
notes: >
  STUB. Major UA access barrier — international supply required.
  Always plan as bridge to alloSCT in fit; palliative if not.
