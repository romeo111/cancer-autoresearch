do_not_do:
  - "НЕ призначати без HBV / HCV / HIV / TB screening — JAKi reactivation risk."
  - "НЕ комбінувати з ruxolitinib — обирати один JAKi."
  - "НЕ ігнорувати baseline + serial LFT — hepatotoxicity у MOMENTUM."
  - "НЕ продовжувати без response — assessment at 24 тижні; switch якщо немає symptom + anemia improvement."
  - "НЕ забувати alloHCT-pathway для transplant-eligible — momelotinib не є curative."
  - "НЕ комбінувати з OATP1B1/1B3 substrates (rosuvastatin) без caution."
  - "НЕ підтверджувати план без funding pathway — препарат не зареєстрований в Україні."

known_controversies:
  - topic: "Momelotinib 1L vs 2L for anemia-dominant MF"
    positions:
      - position: "Momelotinib 2L (post-rux) per MOMENTUM registration; standard pathway"
        sources: [SRC-MOMENTUM-VERSTOVSEK-2023, SRC-NCCN-MPN-2025]
      - position: "Momelotinib 1L for newly-dx MF with anemia (Hb <10) — SIMPLIFY-1 phase-3 vs ruxolitinib (non-inferior spleen response, superior transfusion independence)"
        sources: [SRC-NCCN-MPN-2025]
        evidence_note: "SIMPLIFY-1 supports 1L use in anemia-dominant MF; emerging guideline support"
    our_default: "Momelotinib 2L (post-rux per MOMENTUM); consider 1L if newly-dx MF with anemia precluding ruxolitinib initiation"
    rationale: "Anemia profile drives JAKi selection; momelotinib uniquely addresses anemia"

