rationale: >
  Momelotinib is JAK1/JAK2 + ACVR1 inhibitor approved for MF with
  anemia where ruxolitinib often worsens cytopenia. Distinct
  ACVR1 inhibition reduces hepcidin → restores iron utilization +
  erythropoiesis. MOMENTUM phase-3 (Verstovsek et al., Lancet
  2023): vs danazol in JAKi-experienced anemic symptomatic MF
  (Hb <10) — MFSAF total symptom score response 25% vs 9%
  (p=0.0095); spleen volume response 22% vs 3%; transfusion
  independence 31% vs 20%. FDA approval Sept 2023. Particularly
  appropriate when anemia is dominant problem (RF-PMF-ANEMIA-
  DOMINANT). Mandatory pre-treatment HBV / HCV / HIV / TB
  screening. Major Ukraine access barrier: not registered.

rationale_ua: >
  момелотиніб is JAK1/JAK2 + ACVR1 інгібітор схвалений для MF with анемія where руксолитиніб часто погіршує цитопенія. Distinct ACVR1 inhibition зменшує hepcidin → restores iron utilization + erythropoiesis. MOMENTUM phase-3 (Verstovsek et al., Lancet 2023): vs danazol in JAKi-experienced anemic symptomatic MF (Hb <10) — MFSAF total symptom score відповідь 25% проти 9% (p=0.0095); spleen volume відповідь 22% проти 3%; transfusion independence 31% проти 20%. FDA схвалення Sept 2023. особливо appropriate when анемія is dominant problem (RF-PMF-анемія- DOMINANT). обов'язковий pre-лікування HBV / HCV / HIV / TB screening. Major Ukraine access barrier: not registered.
