id: IND-NLPBL-1L-OBSERVATION-OR-RT
plan_track: surveillance  # for early-stage NLPBL — RT often curative; observation also reasonable

applicable_to:
  disease_id: DIS-NLPBL
  line_of_therapy: 1
  stage_requirements: []
  biomarker_requirements_required:
    - {biomarker_id: BIO-CD20-IHC, required: true, value_constraint: "positive"}
  biomarker_requirements_excluded: []
  demographic_constraints: {ecog_max: 2}

recommended_regimen: null  # ISRT or observation, not a drug regimen
concurrent_therapy: []
followed_by: []

evidence_level: moderate
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "ISRT ~95%"
  complete_response: "ISRT ~90%"
  progression_free_survival: "10y PFS ~85% with ISRT alone for early stage"
  overall_survival_5y: ">95% early-stage"

hard_contraindications: []
red_flags_triggering_alternative: []

required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LDH
  - TEST-CD20-IHC
  - TEST-LN-EXCISIONAL-BIOPSY
  - TEST-FLOW-CYTOMETRY
