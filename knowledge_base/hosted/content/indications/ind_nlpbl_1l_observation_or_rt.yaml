rationale: 'Early-stage NLPBL (formerly NLPHL) — ISRT alone is often curative; observation acceptable for some completely-resected stage IA. Avoid intensive chemoimmuno for early NLPBL — overcure with toxicity. Advanced NLPBL → R-CHOP-like (treats as B-cell, not Hodgkin).

  '
