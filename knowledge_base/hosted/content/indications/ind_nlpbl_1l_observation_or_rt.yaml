desired_tests: []

rationale: >
  Early-stage NLPBL (formerly NLPHL) — ISRT alone is often curative;
  observation acceptable for some completely-resected stage IA. Avoid
  intensive chemoimmuno for early NLPBL — overcure with toxicity.
  Advanced NLPBL → R-CHOP-like (treats as B-cell, not Hodgkin).

sources: [{source_id: SRC-NCCN-BCELL-2025, position: supports}]
known_controversies: []

do_not_do:
  - "НЕ застосовувати ABVD — NLPBL CD15- CD30- (різний від cHL); CD20+ → rituximab-based."
  - "НЕ перетреати — ISRT alone is often sufficient у early stage."

time_critical: false
last_reviewed: "2026-04-25"
reviewer_signoffs: 0
notes: STUB. Surveillance/RT track; advanced NLPBL routes to DLBCL-like R-CHOP via FL aggressive indication.
