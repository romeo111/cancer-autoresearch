desired_tests: []

rationale: >
  AlloHCT is the ONLY curative option for MDS-HR — mandatory
  consideration in ALL transplant-eligible patients (typically
  age <70-75, adequate organ function, ECOG ≤2, suitable donor,
  caregiver support). 5-y OS post-HCT 40-50% vs 10-15% with
  non-transplant therapy. Donor search initiated CONCURRENTLY
  with HMA induction — donor identification can take 3-6 months
  and HMA-failure rapid-pivot needed. HMA bridging during search
  improves disease control before transplant. Conditioning
  intensity tailored to age + comorbidity (myeloablative for fit
  young; reduced-intensity for older / comorbid). TP53-mutated
  MDS-HR has worse outcomes (~20-30% 3-y OS) but HCT still the
  only curative pathway; consider clinical trial enrollment +
  post-HCT azacitidine maintenance. CRITICAL: do NOT defer donor
  search to HMA failure — search vs HMA-failure timeline is the
  dominant access constraint.

rationale_ua: >
  AlloHCT is the ONLY curative option for MDS-HR — обов'язковий consideration in ALL придатний до трансплантації patients (типово age <70-75, adequate organ function, ECOG ≤2, suitable donor, caregiver support). 5-y OS post-HCT 40-50% проти 10-15% with non-transplant терапія. Donor search initiated CONCURRENTLY with HMA індукція — donor identification can take 3-6 months and HMA-failure rapid-pivot needed. HMA bridging during search покращує контроль хвороби before transplant. Conditioning intensity tailored to age + коморбідність (myeloablative for fit young; зменшений-intensity for older / comorbid). TP53-mutated MDS-HR has гірше outcomes (~20-30% 3-y OS) but HCT still the only curative pathway; consider включення в клінічне дослідження + post-HCT азацитидин підтримка. CRITICAL: do NOT defer donor search to HMA failure — search vs HMA-failure timeline is the dominant access constraint.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-AML-2025
    position: supports
    relevant_quote_paraphrase: "AlloHCT is the only curative option for MDS-HR; mandatory consideration in all transplant-eligible patients"
  - source_id: SRC-ESMO-MDS-2021
    position: supports
    relevant_quote_paraphrase: "AlloHCT recommended for MDS-HR transplant-eligible; HMA bridging during donor search; conditioning regimen tailored to age + comorbidity"
  - source_id: SRC-IPSS-M-BERNARD-2022
    position: supports
    relevant_quote_paraphrase: "IPSS-M molecular features refine HCT timing decision; very-high-risk warrants accelerated HCT pathway"

do_not_do:
  - "НЕ відкладати donor search до HMA failure — пошук триває 3-6 місяців; розпочинати концурентно з 1L HMA."
  - "НЕ виконувати HCT при активному uncontrolled infection — лімфодеплеція + GVHD-профілактика = high mortality."
  - "НЕ виконувати HCT без оптимального blast control (target <10%, ideally <5%) — outcomes substantially worse при active blast burden."
  - "НЕ ігнорувати IPSS-M molecular reclassification — ~46% reclassified vs IPSS-R; може змінити HCT timing."
  - "НЕ припиняти HMA безпосередньо перед conditioning — продовжувати через donor search до conditioning per institution."
  - "НЕ забувати fertility preservation у молодих пацієнтів перед conditioning."
  - "НЕ пропускати TP53-status testing — впливає на conditioning intensity, post-HCT maintenance, прогноз."

known_controversies:
  - topic: "Timing of alloHCT for MDS-HR — upfront vs after HMA failure"
    positions:
      - position: "Upfront HCT (after donor identification, no HMA failure required) — better outcomes for very-high-risk + fit young per IPSS-M"
        sources: [SRC-IPSS-M-BERNARD-2022, SRC-NCCN-AML-2025]
      - position: "HMA bridging until response confirmed, then HCT for adequate responders only — minimizes TRM exposure"
        sources: [SRC-ESMO-MDS-2021]
        evidence_note: "Markov modeling supports earlier HCT for IPSS-R very-high; modeling for IPSS-R high less clear"
    our_default: "Concurrent HMA + donor search; transplant as soon as donor + slot available + adequate disease control (do NOT wait for HMA failure)"
    rationale: "Donor search delay is the dominant constraint; pre-HCT control + early HCT maximize curative potential"

time_critical: true
last_reviewed: "2026-04-25"
reviewers: []
reviewer_signoffs: 0
