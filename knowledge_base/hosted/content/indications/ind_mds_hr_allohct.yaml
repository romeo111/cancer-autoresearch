id: IND-MDS-HR-ALLOHCT
plan_track: aggressive

applicable_to:
  disease_id: DIS-MDS-HR
  line_of_therapy: 1
  stage_requirements:
    - "MDS-HR (IPSS-R high / very high; IPSS-M High / Very High; MDS-IB1/IB2)"
    - "Transplant-eligible: age <70-75 + adequate organ function + ECOG ≤2 + adequate caregiver support"
    - "Suitable donor: HLA-matched sibling > matched unrelated > haploidentical > cord"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2
    age_max: 75

recommended_regimen: REG-ALLOHCT-MDS-HR
concurrent_therapy: []
followed_by: []

evidence_level: moderate
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "~70-90% achieve disease control post-HCT (variable by pre-HCT blast burden)"
  complete_response: "Durable molecular CR ~40-60% at 5 years for MDS-HR with optimal pre-HCT control"
  progression_free_survival: "5-y PFS 35-50% for MDS-HR overall; 50-60% for IPSS-R high; 25-35% for very high; ~20-30% for TP53-mutated"
  overall_survival_5y: "5-y OS 40-50% MDS-HR overall; substantially better than non-transplant (~10-15% 5-y OS)"

hard_contraindications:
  - CI-ACTIVE-INFECTION-FOR-ALEMTUZUMAB
red_flags_triggering_alternative:
  - RF-MDS-TRANSPLANT-ELIGIBLE
  - RF-MDS-TP53-MUTATION
  - RF-MDS-HIGH-RISK-IPSS
  - RF-MDS-FRAILTY-AGE
  - RF-MDS-ORGAN-DYSFUNCTION
  - RF-MDS-INFECTION-SCREENING

