id: IND-PMBCL-2L-RICE-AUTOSCT
plan_track: standard
applicable_to:
  disease_id: DIS-PMBCL
  line_of_therapy: 2
  stage_requirements:
    - Relapsed / refractory after 1L DA-EPOCH-R or R-CHOP+RT
    - Transplant-eligible (age ≤70, ECOG ≤2, adequate organ function)
  biomarker_requirements_required:
    - biomarker_id: BIO-CD20-IHC
      required: true
      value_constraint: positive (CD20+)
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2
recommended_regimen: REG-R-ICE-PMBCL
concurrent_therapy: []
followed_by: []
evidence_level: moderate
strength_of_recommendation: strong
nccn_category: 2A
expected_outcomes:
  overall_response_rate: ~50-60% (chemosensitive disease)
  complete_response: ~30-40% post-salvage chemo + autoSCT
  progression_free_survival: 2-year PFS ~50% in chemosensitive responders post-autoSCT
  overall_survival_5y: ~50-60% for chemosensitive responders
hard_contraindications:
  - CI-HBV-NO-PROPHYLAXIS
  - CI-LVEF-LOW-FOR-ANTHRACYCLINE
red_flags_triggering_alternative:
  - RF-PMBCL-FRAILTY-AGE
  - RF-AGGRESSIVE-HISTOLOGY-TRANSFORMATION
required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-LDH
  - TEST-B2-MICROGLOBULIN
  - TEST-HBV-SEROLOGY
  - TEST-HCV-ANTIBODY
  - TEST-HIV-SEROLOGY
  - TEST-CD20-IHC
  - TEST-PET-CT
  - TEST-LN-CORE-BIOPSY
  - TEST-ECHO
desired_tests: []
rationale: 'R-ICE × 2-3 cycles → response assessment (PET) → BEAM-conditioned autoSCT for chemosensitive r/r PMBCL is standard 2L per NCCN and ESMO. ~50-60% achieve durable remission post-autoSCT. For chemorefractory disease: CAR-T (axi-cel/liso-cel) or pembrolizumab (KEYNOTE-170, ORR ~45% in r/r PMBCL). PMBCL biology overlaps with classic Hodgkin (PD-L1 amplification 9p24.1) — checkpoint inhibitor response notable.'
rationale_ua: >-
  R-ICE × 2-3 цикли → відповідь assessment (PET) → BEAM-conditioned аутоТГСК for chemosensitive р/р PMBCL is стандарт 2L per NCCN and ESMO. ~50-60% achieve стійка ремісія post-аутоТГСК. For chemorefractory хвороба: CAR-T (axi-cel/liso-cel) or пембролізумаб (KEYNOTE-170, ORR ~45% in р/р PMBCL). PMBCL biology overlaps with classic Hodgkin (PD-L1 ампліфікація 9p24.1) — інгібітор контрольних точок відповідь notable.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: R-ICE → autoSCT is preferred 2L for chemosensitive r/r PMBCL; CAR-T or pembrolizumab for chemorefractory
  - source_id: SRC-ESMO-DLBCL-2024
    position: supports
    relevant_quote_paraphrase: ESMO endorses platinum-based salvage (R-ICE / R-DHAP / R-GDP) followed by autoSCT for chemosensitive r/r aggressive B-NHL including PMBCL
known_controversies:
  - topic: Pembrolizumab vs CAR-T as preferred salvage for chemorefractory PMBCL
    positions:
      - position: CAR-T — durable remission potential ~40% at 2 yr
        sources:
          - SRC-NCCN-BCELL-2025
      - position: Pembrolizumab — chemo-free; ORR ~45% (KEYNOTE-170); easier access in UA
        sources:
          - SRC-NCCN-BCELL-2025
        evidence_note: Most responses partial; bridging to CAR-T or autoSCT often needed
    our_default: Pembrolizumab as bridge / standalone when CAR-T inaccessible (UA reality); CAR-T preferred when accessible
    rationale: CAR-T not commercially available in Ukraine
do_not_do:
  - НЕ розпочинати без HBV screening + prophylaxis при HBsAg+ або anti-HBc+.
  - НЕ використовувати ifosfamide при baseline encephalopathy або CNS metastasis без MRI clearance.
  - НЕ пропускати mesna prophylaxis (ifosfamide hemorrhagic cystitis).
  - НЕ призначати у transplant-ineligible — переходити на pembrolizumab або bispecific antibody.
  - НЕ забувати GCSF prophylaxis — інтенсивна myelosuppression R-ICE.
  - НЕ затримувати оцінку відповіді — PET після 2 циклів обов'язковий перед autoSCT decision.
time_critical: false
last_reviewed: '2026-04-27'
reviewers: []
reviewer_signoffs: 0
notes: 'Standard-track 2L for transplant-eligible r/r PMBCL. For transplant-ineligible: pembrolizumab (KEYNOTE-170). CAR-T alternative for chemorefractory or post-autoSCT relapse — UA access via international referral only.'
