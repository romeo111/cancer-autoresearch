id: IND-HGBL-DH-1L-RCHOP
plan_track: aggressive
applicable_to:
  disease_id: DIS-HGBL-DH
  line_of_therapy: 1
  stage_requirements: []
  biomarker_requirements_required:
    - biomarker_id: BIO-CD20-IHC
      required: true
      value_constraint: positive
    - biomarker_id: BIO-MYC-REARRANGEMENT
      required: true
      value_constraint: positive (FISH break-apart) — HGBL-DH classification requires MYC-rearrangement
    - biomarker_id: BIO-BCL2-REARRANGEMENT
      required: false
      value_constraint: positive (FISH) — classic MYC partner in HGBL-DH
    - biomarker_id: BIO-BCL6-REARRANGEMENT
      required: false
      value_constraint: positive (FISH) — alternative MYC partner
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 3
recommended_regimen: REG-R-CHOP
concurrent_therapy: []
followed_by: []
evidence_level: moderate
strength_of_recommendation: conditional
nccn_category: 2A
expected_outcomes:
  overall_response_rate: ~70%
  complete_response: ~50%
  progression_free_survival: Median PFS ~1-2 years
  overall_survival_5y: ~30%
hard_contraindications:
  - CI-HBV-NO-PROPHYLAXIS
  - CI-LVEF-LOW-FOR-ANTHRACYCLINE
red_flags_triggering_alternative: []
required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-LDH
  - TEST-CD20-IHC
  - TEST-FISH-PANEL
  - TEST-PET-CT
  - TEST-HBV-SEROLOGY
  - TEST-HIV-SEROLOGY
  - TEST-ECHO
desired_tests: []
rationale: 'R-CHOP fallback for HGBL-DH when DA-EPOCH-R logistics not feasible (no continuous-infusion capability, severely limited supportive care). Outcomes substantially worse than DA-EPOCH-R; consider as bridge to CAR-T at progression.

  '
rationale_ua: >
  R-CHOP fallback for HGBL-DH when DA-EPOCH-R logistics not feasible (ні continuous-infusion capability, severely limited підтримуюче лікування). Outcomes substantially гірше than DA-EPOCH-R; consider as bridge to CAR-T at прогресування.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
  - source_id: SRC-ESMO-DLBCL-2024
    position: supports
    relevant_quote_paraphrase: ESMO 2024 (DLBCL guideline §HGBL-DH) endorses DA-EPOCH-R as preferred 1L for high-grade B-cell lymphoma with MYC + BCL2/BCL6 rearrangement
known_controversies: []
do_not_do:
  - НЕ призначати R-CHOP if DA-EPOCH-R is accessible — outcome difference clinically significant.
  - НЕ пропускати HBV скринінг + prophylaxis.
  - НЕ забути про CAR-T pathway якщо relapse — раннє направлення на CAR-T center.
time_critical: false
last_reviewed: '2026-04-27'
reviewer_signoffs: 0
notes: STUB.
