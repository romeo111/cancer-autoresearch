id: IND-OVARIAN-2L-PLAT-SENS-CARBO-PLD-BEV
plan_track: standard

applicable_to:
  disease_id: DIS-OVARIAN
  line_of_therapy: 2
  stage_requirements:
    - "Recurrent epithelial ovarian / fallopian tube / primary peritoneal cancer"
    - "Platinum-free interval >6 months (platinum-sensitive)"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-CARBO-PLD-BEV-OVARIAN
concurrent_therapy: []
followed_by:
  - IND-OVARIAN-MAINT-PARPI-BRCAM-OLAPARIB
  - IND-OVARIAN-MAINT-PARPI-HRD-NIRAPARIB
  - IND-OVARIAN-MAINT-PARPI-RUCAPARIB

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "~70-78% (platinum-sensitive re-induction; extrapolated from CALYPSO + GOG-0213)"
  progression_free_survival: "Median ~13-14 mo with bev-containing platinum-sensitive backbone (GOG-0213)"
  overall_survival_5y: "GOG-0213: mOS 42.2 vs 37.3 mo (HR 0.823, primary endpoint missed by predefined alpha but clinically meaningful)"

hard_contraindications: []
red_flags_triggering_alternative:
  - RF-OVARIAN-FRAILTY-AGE
  - RF-OVARIAN-PERIOPERATIVE-VTE

required_tests: []
desired_tests: []

rationale: >
  Platinum-sensitive recurrent ovarian (PFI >6 mo) — carbo+PLD+bev
  combines the platinum-sensitive backbone with bevacizumab maintenance
  per GOG-0213 (carbo+pacli+bev superior to chemo alone for PFS, OS
  trend); PLD substitutes for paclitaxel in patients with residual
  taxane-induced peripheral neuropathy. CALYPSO (Pujade-Lauraine JCO
  2010) established carbo+PLD non-inferiority to carbo+pacli with
  distinct toxicity profile. Followed by maintenance PARPi (BRCA-mut →
  olaparib; HRD+ → niraparib; alternative rucaparib) after demonstrated
  CR/PR.

sources:
  - source_id: SRC-NCCN-OVARIAN-2025
    position: supports
  - source_id: SRC-ESMO-OVARIAN-2024
    position: supports
  - source_id: SRC-GOG0213-COLEMAN-2017
    position: supports

do_not_do:
  - "Do NOT use this regimen if PFI ≤6 months (platinum-resistant — switch to AURELIA backbone)"
  - "Do NOT add bevacizumab if patient had a Grade 3-4 bev event in prior line, untreated CNS mets, or major surgery within 28 days"
  - "Do NOT exceed cumulative anthracycline 550 mg/m² lifetime — track exposure across all anthracycline-containing lines"
  - "Do NOT skip maintenance PARPi if BRCA1/2-mutant or HRD-positive after CR/PR — major OS-affecting omission"

last_reviewed: "2026-04-27"
reviewer_signoffs: 0
notes: "ESCAT IB. PLD-based platinum-sensitive backbone — preferred when prior taxane neuropathy. UA access: bev + carbo НСЗУ-фінансовані; PLD здебільшого OOP — REG-CARBO-GEM-BEV-OVARIAN is the realistic UA standard."
