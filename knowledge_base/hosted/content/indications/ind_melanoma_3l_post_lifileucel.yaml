id: IND-MELANOMA-3L-POST-LIFILEUCEL
plan_track: palliative
applicable_to:
  disease_id: DIS-MELANOMA
  line_of_therapy: 4
  stage_requirements:
    - "Stage IV unresectable / metastatic melanoma"
    - "Progression on prior nivolumab + ipilimumab 1L"
    - "Progression on BRAF/MEK targeted therapy 2L (if BRAF V600E/K mutant)"
    - "Progression on lifileucel (TIL therapy) 3L"
    - "Limited 4L+ options; clinical trial enrollment OR best supportive care"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2
recommended_regimen:
concurrent_therapy: []
followed_by: []
evidence_level: very_low
strength_of_recommendation: conditional
nccn_category: '2B'
expected_outcomes:
  overall_response_rate: <15% with empirical chemo (dacarbazine, temozolomide, paclitaxel)
  complete_response: rare
  progression_free_survival: Median PFS 1.5-3 mo
  overall_survival_5y: Salvage; mOS 4-8 mo from 4L initiation
hard_contraindications: []
