desired_tests: []
rationale: 'Patients with advanced melanoma who progress through nivolumab + ipilimumab 1L, BRAF/MEK targeted 2L (if BRAF-mutant), AND lifileucel TIL therapy 3L (FDA-approved Feb 2024 for post-ICI metastatic melanoma; ORR ~31%, mPFS 4.1 mo) face a 4L+ setting with no established standard. Best supportive care + clinical trial enrollment is the dominant recommendation. Empirical single-agent chemotherapy (dacarbazine, temozolomide, paclitaxel, carboplatin/paclitaxel) has historical ORR <15% with mPFS 1.5-3 mo. ICI re-challenge (PD-1 monotherapy or CTLA-4 add-back) has anecdotal evidence; bispecifics on trial (tebentafusp for HLA-A*02:01 uveal melanoma — NOT applicable for cutaneous melanoma 4L+). Brain metastases common at this stage; SRS + dexamethasone palliation often the focus. Hospice referral discussion appropriate when ECOG declines.'
rationale_ua: >-
  Patients with поширений меланома who progress through ніволумаб + іпілімумаб 1L, BRAF/MEK targeted 2L (if BRAF-mutant), AND lifileucel TIL терапія 3L (схвалений FDA Feb 2024 for post-ICI метастатичний меланома; ORR ~31%, mPFS 4.1 міс.) face a 4L+ setting with ні усталений стандарт. найкраще підтримуюче лікування + включення в клінічне дослідження is the dominant рекомендація. Empirical single-agent хіміотерапія (dacarbazine, temozolomide, паклітаксел, карбоплатин/паклітаксел) has historical ORR <15% with mPFS 1.5-3 mo. ICI re-challenge (PD-1 монотерапія or CTLA-4 add-back) has anecdotal докази; bispecifics on дослідження (тебентафусп for HLA-A*02:01 uveal меланома — NOT applicable for cutaneous меланома 4L+). метастази в мозок поширений at this stage; SRS + dexamethasone palliation часто the focus. Hospice referral discussion appropriate when ECOG знижується.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-MELANOMA-2025
    position: supports
    relevant_quote_paraphrase: After exhaustion of immunotherapy, BRAF/MEK targeted (if applicable), and TIL therapy, melanoma 4L+ has no established standard; clinical trial OR empirical chemo OR best supportive care
  - source_id: SRC-ESMO-MELANOMA-2024
    position: supports
    relevant_quote_paraphrase: Melanoma 4L+ post-TIL has very limited evidence; trial enrollment + palliative care should be prioritized
known_controversies:
  - topic: Empirical chemo vs ICI re-challenge vs best supportive care at 4L+ melanoma
    positions:
      - position: Empirical chemo (dacarbazine, temozolomide) — minimal benefit, palliative response only
        sources:
          - SRC-NCCN-MELANOMA-2025
      - position: ICI re-challenge — anecdotal; no controlled data; may flare immune AEs
        sources:
          - SRC-ESMO-MELANOMA-2024
      - position: Best supportive care + hospice — appropriate when ECOG declines
        sources:
          - SRC-NCCN-MELANOMA-2025
    our_default: Trial enrollment first; if no trial, empirical chemo for fit patients (ECOG 0-1) OR best supportive care for ECOG ≥2
    rationale: Real-world 4L+ melanoma benefit from empirical therapy minimal; patient-centered trade-off is dominant
do_not_do:
  - НЕ повторювати lifileucel — re-treatment не вивчено + lymphodepletion ризик інфекції непомірний у 4L+.
  - НЕ призначати при ECOG ≥3 — focus shift до palliative care + hospice.
  - "НЕ ігнорувати CNS — large brain metastases часті: SRS / WBRT + dexamethasone palliation often more impactful than systemic therapy."
  - НЕ комбінувати chemo + ICI re-challenge — toxicity без proven incremental benefit.
  - НЕ забути про family / advance care planning conversations — prognosis обмежена.
  - НЕ продовжувати active therapy при поганій якості життя — discussion з patient + family обов'язкова.
time_critical: false
last_reviewed: '2026-04-27'
reviewers: []
reviewer_signoffs: 0
notes: 'STUB — pending Clinical Co-Lead sign-off. 4L+ palliative pathway after exhaustion of all current active therapies (ICI, BRAF/MEK, TIL). Trial enrollment + palliative care + hospice referral are the primary considerations.'
