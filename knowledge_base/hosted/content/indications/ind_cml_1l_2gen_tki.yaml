rationale: >
  Aggressive 1L for CML chronic phase: high-risk by ELTS / Sokal /
  EUTOS, younger patients with TFR ambition, OR low-risk patients
  preferring deeper / faster molecular response. 2nd-generation TKI
  selected by comorbidity matrix per ELN 2020:
    - Default low-CV-risk: dasatinib OR nilotinib
    - CV disease / DM / hyperlipidemia → AVOID nilotinib + ponatinib → bosutinib or dasatinib
    - Pulmonary disease → AVOID dasatinib → nilotinib or bosutinib
    - GI disease → AVOID bosutinib → dasatinib or nilotinib
    - Pancreatitis history → AVOID nilotinib → dasatinib or bosutinib
  Faster early molecular response vs imatinib (DASISION, ENESTnd, BFORE)
  but no consistent OS benefit. Higher rate of TFR-eligibility (~30-40%
  achieve sustained DMR enabling TKI stop attempt).

rationale_ua: >
  агресивний 1L for CML chronic phase: високого ризику by ELTS / Sokal / EUTOS, younger patients with TFR ambition, OR низького ризику patients preferring deeper / faster molecular відповідь. 2nd-generation TKI selected by коморбідність matrix per ELN 2020:
    - Default low-CV-risk: дазатиніб OR нілотиніб
    - CV хвороба / DM / hyperlipidemia → AVOID нілотиніб + понатиніб → бозутиніб or дазатиніб
    - Pulmonary хвороба → AVOID дазатиніб → нілотиніб or бозутиніб
    - GI хвороба → AVOID бозутиніб → дазатиніб or нілотиніб
    - Pancreatitis history → AVOID нілотиніб → дазатиніб or бозутиніб
  Faster early molecular відповідь vs іматиніб (DASISION, ENESTnd, BFORE) but ні consistent OS виграш. Higher rate of TFR-eligibility (~30-40% achieve sustained DMR enabling TKI stop attempt).
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-MPN-2025
    position: supports
    relevant_quote_paraphrase: "2nd-gen TKIs are alternative 1L for CML chronic phase; preferred for younger / high-risk / TFR ambition"
  - source_id: SRC-ELN-CML-2020
    position: supports
    relevant_quote_paraphrase: "Comorbidity matrix dictates choice between dasatinib / nilotinib / bosutinib; ELTS risk + TFR ambition tip toward 2nd-gen"
  - source_id: SRC-ESMO-CML-2017
    position: supports
    relevant_quote_paraphrase: "Faster MMR with 2nd-gen TKIs; safety profile dictates choice"

do_not_do:
  - "Не призначати nilotinib без baseline CV-оцінки + ECG + lipid panel + glucose — boxed QT warning + cumulative vascular toxicity."
  - "Не призначати dasatinib пацієнтам з пульмональною коморбідністю / попереднім pleural effusion — risk severe effusion."
  - "Не призначати bosutinib пацієнтам з IBD / тяжкою diarrhoea historии — діарея ~70% ризик."
  - "Не пропускати pre-TKI HBV скринінг."
  - "Не пропускати фертильність-обговорення; TKI безпеки під час вагітності обмежені."
  - "Не починати без food для bosutinib (з їжею); СТРОГО на голодний шлунок для nilotinib (≥1h до / ≥2h після)."

known_controversies:
  - topic: "Asciminib (STAMP) as 1L (ASC4FIRST trial)"
    positions:
      - position: "ASC4FIRST showed asciminib 1L MMR superiority over investigator-choice TKI (imatinib + 2nd-gen)"
        sources:
          - SRC-NCCN-MPN-2025
      - position: "Long-term safety + TFR data not yet mature; cost / access prohibitive"
        sources:
          - SRC-ELN-CML-2020
    our_default: "Asciminib reserved for 3L+ or T315I (NOT registered in Ukraine; access barrier dominant)"
    rationale: "ASC4FIRST encouraging but immature; standard 2nd-gen still 1L"

time_critical: false
last_reviewed: "2026-04-25"
reviewers: []
reviewer_signoffs: 0
notes: >
  AGGRESSIVE track for CML 1L with TFR ambition or high-risk biology.
  Selection between dasatinib / nilotinib / bosutinib / asciminib done
  via comorbidity sub-matrix at the regimen level. STUB — requires
  clinical co-lead signoff.
