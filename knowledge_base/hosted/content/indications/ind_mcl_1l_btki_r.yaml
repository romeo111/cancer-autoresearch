id: IND-MCL-1L-BTKI-R
plan_track: standard
applicable_to:
  disease_id: DIS-MCL
  line_of_therapy: 1
  stage_requirements: []
  biomarker_requirements_required:
    - biomarker_id: BIO-CD20-IHC
      required: true
      value_constraint: positive
    - biomarker_id: BIO-CCND1-IHC
      required: true
      value_constraint: positive (cyclin D1 nuclear staining) — diagnostic hallmark of MCL
    - biomarker_id: BIO-T11-14-IGH-CCND1
      required: true
      value_constraint: positive by FISH — diagnostic; required when CCND1-IHC equivocal or to confirm classical MCL
    - biomarker_id: BIO-CD5-IHC
      required: true
      value_constraint: positive (CD5+) — part of MCL immunophenotype panel; CD5-negative MCL is rare but recognised
    - biomarker_id: BIO-MCL-MIPI
      required: true
      value_constraint: MIPI 0-11 (low/intermediate/high) — required risk stratifier; informs intensity choice and surveillance
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 3
recommended_regimen: REG-ACALABRUTINIB-RITUXIMAB
concurrent_therapy: []
followed_by: []
evidence_level: moderate
strength_of_recommendation: strong
nccn_category: '1'
expected_outcomes:
  overall_response_rate: ~85-90%
  complete_response: ~50%
  progression_free_survival: Median PFS ~3-5 years (longer in TP53-wt subset)
  overall_survival_5y: ~70%
hard_contraindications:
  - CI-HBV-NO-PROPHYLAXIS
red_flags_triggering_alternative: []
required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-LDH
  - TEST-CD20-IHC
  - TEST-FISH-PANEL
  - TEST-NGS-LYMPHOID-PANEL
  - TEST-HBV-SEROLOGY
  - TEST-HIV-SEROLOGY
  - TEST-PET-CT
  - TEST-ECHO
desired_tests: []
rationale: 'Standard 1L for unfit / older / transplant-ineligible MCL OR for TP53-mutant / blastoid high-risk variants where chemoimmuno fails (RF-MCL-BLASTOID-OR-TP53). Continuous BTKi + rituximab × 2 years induction-then-maintenance. Tolerability superior to intensive chemoimmuno; durable in TP53-wt; less effective in TP53-mutant where CAR-T or alloSCT may be needed at progression.

  '
rationale_ua: >
  стандарт 1L for unfit / older / непридатний до трансплантації MCL OR for TP53-mutant / blastoid високого ризику варіанти where chemoimmuno fails (RF-MCL-BLASTOID-OR-TP53). Continuous BTKi + ритуксимаб × 2 years індукція-then-підтримка. переносимість перевершує intensive chemoimmuno; durable in TP53-wt; less effective in TP53-mutant where CAR-T or алоТГСК may be needed at прогресування.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: BTKi-based regimens preferred for older / unfit MCL and for chemoimmuno-resistant variants
  - source_id: SRC-ESMO-MCL-2024
    position: supports
    relevant_quote_paraphrase: ESMO 2024 endorses BTKi-rituximab combinations for older/unfit MCL; intensive cytarabine-based induction + autoSCT for fit younger patients
known_controversies: []
do_not_do:
  - Не пропускати TP53 / Ki67 — TP53-mutant потребує consideration of CAR-T pathway and alloSCT consultation.
  - Не призначати без HBV скринінгу + prophylaxis при HBsAg+ / anti-HBc+.
  - Не комбінувати з warfarin без strict monitoring.
  - Не призначати при concomitant strong CYP3A4 inhibitor — hold inhibitor or dose-modify acalabrutinib.
time_critical: false
last_reviewed: '2026-04-27'
reviewer_signoffs: 0
notes: STUB.
