rationale: 'Febrile neutropenia (FN) is a medical emergency. Definition: single oral T ≥38.3°C OR sustained
  T ≥38.0°C ×1h, AND ANC <500/μL (or expected to fall <500/μL within 48h). Empirical broad-spectrum antibiotic
  must be initiated within 60 minutes of presentation per IDSA, NCCN, ASCO, MASCC guidelines — antibiotic
  delay >60 min correlates with increased mortality (Rosa 2014 J Clin Oncol). Default empirical regimen:
  piperacillin-tazobactam 4.5 g IV q6h (covers most gram-positive + gram-negative + Pseudomonas) OR cefepime
  2 g IV q8h (similar coverage) OR meropenem 1 g IV q8h (if prior carbapenem-sparing reasonable; broader
  for ESBL/AmpC concerns). ADD vancomycin 15-20 mg/kg IV q12h IF: clinical suspicion of catheter-related
  infection, mucositis grade ≥3, hemodynamic instability, prior MRSA colonization/infection, recent quinolone
  prophylaxis. Coverage escalation: linezolid OR daptomycin if VRE risk; aminoglycoside (gentamicin) addition
  for septic shock; antifungal (caspofungin or voriconazole) if persistent fever >96h despite antibacterial
  + at-risk for invasive fungal disease. Source workup: CXR, urine culture, blood cultures × 2 sets (one
  from each lumen of central line if present), nasopharyngeal swab for respiratory virus PCR, HSV/CMV PCR
  if mucositis severe. MASCC risk-index score guides outpatient vs inpatient management — score ≥21 (low
  risk) eligible for outpatient oral therapy (ciprofloxacin + amoxicillin-clavulanate) per IDSA. STUB regimen
  — no dedicated REG- entity for empirical FN protocol yet; flagged for REG follow-up.'
