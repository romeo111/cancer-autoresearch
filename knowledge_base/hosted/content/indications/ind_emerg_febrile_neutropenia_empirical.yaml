known_controversies:
- topic: Pip-tazo vs cefepime vs meropenem as empirical FN therapy
  positions:
  - position: Pip-tazo — broadest gram-negative + Pseudomonas, lower C. difficile rate
    sources:
    - SRC-NCCN-AML-2025
    evidence_note: Hospital-specific antibiogram should drive choice
  - position: Cefepime — comparable, less anaerobic coverage, may preserve carbapenems
    sources:
    - SRC-NCCN-AML-2025
  - position: Meropenem — broadest spectrum, reserve for highly suspected ESBL / AmpC OR salvage
    sources:
    - SRC-NCCN-BCELL-2025
  our_default: Pip-tazo as default empirical; cefepime if pip-tazo contraindicated; meropenem for known
    ESBL colonization OR persistent fever escalation
  rationale: Antibiotic stewardship favors pip-tazo / cefepime; meropenem reserved for documented resistance
    needs
do_not_do:
- "НЕ затримувати антибіотики >60 хвилин від presentation — кожна година затримки збільшує mortality."
- НЕ використовувати vancomycin emipirically для всіх FN — додати лише при clear MRSA risk factors.
- НЕ припиняти антибіотики при afebrile <72h ANC recovery — лікувати всю clinical course; meta-analysis
  suggests neutropenic period не закінчується afebrile alone.
- НЕ забувати fungal coverage при persistent fever >96h на адекватних antibacterials — invasive aspergillosis
  / candidiasis ризик.
- НЕ ігнорувати джерело інфекції — central line removal for catheter-related sepsis; abscess drainage; mucositis
  source control.
- НЕ призначати aminoglycoside monotherapy — никогда; завжди в комбінації + AKI + ototoxicity ризик.
- НЕ забути de-escalation після culture results — narrow до targeted therapy.
