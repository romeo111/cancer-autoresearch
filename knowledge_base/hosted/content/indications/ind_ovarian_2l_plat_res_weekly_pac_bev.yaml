id: IND-OVARIAN-2L-PLAT-RES-WEEKLY-PAC-BEV
plan_track: standard

applicable_to:
  disease_id: DIS-OVARIAN
  line_of_therapy: 2
  stage_requirements:
    - "Recurrent epithelial ovarian / fallopian tube / primary peritoneal cancer"
    - "Platinum-free interval ≤6 months (platinum-resistant)"
    - "≤2 prior antiangiogenic-naive lines"
    - "No significant residual peripheral neuropathy from prior taxane"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-WEEKLY-PAC-BEV-OVARIAN
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "53.3% (AURELIA weekly-pacli+bev arm vs 30.2% pacli alone)"
  progression_free_survival: "mPFS 10.4 vs 3.9 mo (AURELIA weekly-pacli arm, HR 0.46)"
  overall_survival_5y: "mOS 22.4 vs 13.2 mo (AURELIA weekly-pacli subgroup, HR 0.65) — only AURELIA chemo arm with significant OS benefit"

hard_contraindications: []
red_flags_triggering_alternative:
  - RF-OVARIAN-FRAILTY-AGE
  - RF-OVARIAN-PERIOPERATIVE-VTE

required_tests: []
desired_tests: []

rationale: >
  Platinum-resistant recurrent ovarian — weekly paclitaxel + bevacizumab
  per AURELIA. Statistically significant OS benefit over chemo alone in
  the weekly-pacli AURELIA subgroup makes this the preferred AURELIA
  arm when no contraindication to paclitaxel re-exposure. Full UA
  reimbursement for both components.

sources:
  - source_id: SRC-NCCN-OVARIAN-2025
    position: supports
  - source_id: SRC-ESMO-OVARIAN-2024
    position: supports
  - source_id: SRC-AURELIA-PUJADE-LAURAINE-2014
    position: supports

do_not_do:
  - "Do NOT use if Grade ≥2 residual peripheral neuropathy from prior taxane — switch to PLD arm or topotecan"
  - "Do NOT add bev if patient had Grade 3-4 bev event prior, untreated CNS mets, or major surgery within 28 days"
  - "Do NOT use platinum reinduction here — PFI ≤6 mo defines platinum-resistance"
  - "Do NOT skip paclitaxel premedication (dex + diphenhydramine + ranitidine) on first cycle"

last_reviewed: "2026-04-27"
reviewer_signoffs: 0
notes: "ESCAT IB. Preferred AURELIA backbone when no residual neuropathy. Full NSZU coverage of both components — primary UA platinum-resistant 2L recommendation."
