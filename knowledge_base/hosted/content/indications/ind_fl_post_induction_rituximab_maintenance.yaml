id: IND-FL-POST-INDUCTION-RITUXIMAB-MAINTENANCE
plan_track: standard
applicable_to:
  disease_id: DIS-FL
  line_of_therapy: 1
  stage_requirements:
    - Post-induction ≥PR after 1L BR or R-CHOP
    - 'Treatment intent: maintenance'
  biomarker_requirements_required:
    - biomarker_id: BIO-CD20-IHC
      required: true
      value_constraint: positive (CD20+)
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2
recommended_regimen: REG-RITUXIMAB-MAINTENANCE-FL
concurrent_therapy: []
followed_by: []
evidence_level: high
strength_of_recommendation: strong
nccn_category: '1'
expected_outcomes:
  overall_response_rate: Maintenance — measured by deepening + duration; ~30% achieve CR conversion during maintenance
  complete_response: N/A (maintenance phase)
  progression_free_survival: Median PFS ~10 years vs ~4 years observation (PRIMA Salles 2011 + 2019 update)
  overall_survival_5y: OS impact unclear; PRIMA 9-yr update no OS difference
hard_contraindications:
  - CI-HBV-NO-PROPHYLAXIS
red_flags_triggering_alternative:
  - RF-FL-TRANSFORMATION-SUSPECT
required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-LDH
  - TEST-HBV-SEROLOGY
  - TEST-IMMUNOGLOBULINS
  - TEST-CD20-IHC
  - TEST-PET-CT
desired_tests: []
rationale: 'Post-induction rituximab maintenance × 2 years standard of care for FL high-burden after BR or R-CHOP induction (NCCN Cat 1). PRIMA trial (Salles 2011 Lancet; 9-year update Bachy 2019): R-maintenance extends median PFS from ~4 to ~10 years vs observation; OS benefit not demonstrated in 9-year follow-up. Counsel on cumulative hypogammaglobulinemia + infection risk; PJP prophylaxis recommended; HBV reactivation surveillance mandatory throughout. Skip in elderly/frail/recurrent infection patients (preference-sensitive).'
rationale_ua: >-
  після індукції ритуксимаб підтримка × 2 years стандарт лікування for FL high-burden after BR or R-CHOP індукція (NCCN Cat 1). PRIMA дослідження (Salles 2011 Lancet; 9-year update Bachy 2019): R-підтримка extends медіана ВБП from ~4 to ~10 years vs observation; OS виграш not продемонстровано in 9-year спостереження. Counsel on cumulative hypogammaglobulinemia + infection risk; PJP prophylaxis рекомендований; HBV reactivation спостереження обов'язковий throughout. Skip in літнього віку/frail/рецидивний infection patients (preference-sensitive).
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: Rituximab maintenance × 2 years post-induction is Category 1 preferred for FL high-burden after 1L BR or R-CHOP achieving ≥PR (PRIMA evidence)
  - source_id: SRC-ESMO-FL-2024
    position: supports
    relevant_quote_paraphrase: Rituximab maintenance q8w × 2 years post-induction recommended for FL achieving ≥PR; balance against infection / hypogammaglobulinemia risk in selected patients
known_controversies:
  - topic: Rituximab maintenance × 2 years vs observation post-induction for FL
    positions:
      - position: Maintenance per PRIMA — substantial PFS extension
        sources:
          - SRC-NCCN-BCELL-2025
      - position: Skip maintenance — no OS benefit; reduce infection / cost burden
        sources:
          - SRC-ESMO-FL-2024
        evidence_note: 9-year PRIMA update showed no OS difference; reasonable in older / frail / infection-prone
    our_default: Maintenance × 2 years for fit patients without infection diathesis; skip in frail / recurrent infection / patient preference
    rationale: PFS gain clear; OS uncertain — preference-sensitive trade-off
do_not_do:
  - НЕ розпочинати maintenance без HBV скринінгу + entecavir prophylaxis при HBsAg+ або anti-HBc+.
  - НЕ продовжувати при cumulative hypogammaglobulinemia (<400 mg/dL) + рецидивні інфекції — припинити maintenance, розглянути IVIG.
  - НЕ призначати при активній інфекції — відкласти до контролю.
  - НЕ забувати PJP profilaxis (cotrimoxazole) ≥6 міс після останньої дози anti-CD20.
  - НЕ використовувати у пацієнтів з прогресуванням під час maintenance — перейти на 2L+ algorithm.
time_critical: false
last_reviewed: '2026-04-27'
reviewers: []
reviewer_signoffs: 0
notes: 'Post-induction maintenance — line_of_therapy: 1 reflects continuation of 1L pathway, not 2L initiation. Engine activates after 1L induction completes with ≥PR. Skip if patient frail / recurrent infections / patient preference.'
