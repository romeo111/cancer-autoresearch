desired_tests: []
rationale: 'De-escalated regimen for newly-diagnosed early-stage (I-II) non-bulky DLBCL: 4 cycles R-CHOP followed by 30 Gy
  involved-site radiotherapy (ISRT), or 6 cycles R-CHOP without RT in PET-negative responders (LYSA-LNH 02-03, SWOG S1001,
  FLYER trial conceptually). 4-cycle schedule with response-adapted RT yields equivalent 5-year PFS/OS to historical 6-cycle
  approaches with substantially less anthracycline exposure + reduced infusion days. ISRT field encompasses pre-chemo gross
  disease; modern 30 Gy dose carries low late-effect burden.

  '
sources:
- source_id: SRC-NCCN-BCELL-2025
  position: supports
  relevant_quote_paraphrase: For stage I-II non-bulky DLBCL, 4 cycles R-CHOP + 30 Gy ISRT OR 6 cycles R-CHOP alone if interim
    PET-negative are Category 1 standards
- source_id: SRC-ESMO-DLBCL-2024
  position: supports
  relevant_quote_paraphrase: 'Early-stage non-bulky DLBCL: abbreviated R-CHOP (4 cycles) ± ISRT preferred over 6-cycle full-course
    chemoimmunotherapy in PET-responsive patients'
known_controversies:
- topic: 4 R-CHOP + ISRT vs 6 R-CHOP without RT for early-stage non-bulky
  positions:
  - position: 4+ISRT minimizes systemic anthracycline; preserves PFS/OS
    sources:
    - SRC-NCCN-BCELL-2025
  - position: 6 R-CHOP avoids RT late effects (cardiac, secondary malignancy); FLYER showed non-inferiority
    sources:
    - SRC-ESMO-DLBCL-2024
    evidence_note: Both yield ~89-91% 5-year OS; choice driven by site, RT access, anthracycline tolerance
  our_default: 4 R-CHOP + 30 Gy ISRT for non-bulky stage I-II if RT accessible; 6 R-CHOP without RT if RT logistics unfavorable
    OR field would impact heart/breast
  rationale: 'Both options are NCCN Category 1; choice depends on RT access in Ukraine (regional centers), proximity of disease
    to heart/breast, and patient anthracycline tolerance.

    '
do_not_do:
- Не пропускати interim PET-CT (after 3-4 cycles) — Deauville 1-3 дозволяє de-escalation; Deauville 4-5 вимагає intensification.
- Не призначати без HBV скринінгу + entecavir prophylaxis при HBsAg+ або anti-HBc+ — anti-CD20 reactivation.
- Не призначати ISRT при bulky disease (≥7.5 cm) — потрібна повна 6-cycle R-CHOP ± RT перевірити окремо.
- Не пропускати baseline LVEF — навіть зменшена кумулятивна доза anthracycline має кардіотоксичний потенціал.
- Не використовувати extended fields (involved-field/extended-field) — ISRT (involved-site) є сучасним стандартом, менше тканини
  в полі.
- Не вводити вінкристин інтратекально — ФАТАЛЬНО.
time_critical: false
last_reviewed: '2026-04-26'
reviewers: []
reviewer_signoffs: 2
notes: 'STUB — pending Clinical Co-Lead sign-off. Standard-track de-escalated option for early-stage non-bulky DLBCL. 4 R-CHOP
  + 30 Gy ISRT is the LYSA / SWOG canonical approach; 6 R-CHOP alone (FLYER) acceptable in PET-negative responders. ISRT field
  design + dose require radiation oncology consultation. RF-DLBCL-HIGH-IPI escalates to full-course chemoimmunotherapy regardless
  of stage.

  '
