id: IND-DLBCL-1L-RCHOP-ISRT-EARLY
plan_track: standard

applicable_to:
  disease_id: DIS-DLBCL-NOS
  line_of_therapy: 1
  stage_requirements: ["Stage I", "Stage II", "non-bulky (<7.5 cm)"]
  biomarker_requirements_required:
    - biomarker_id: BIO-CD20-IHC
      required: true
      value_constraint: "positive (CD20+)"
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-R-CHOP
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "~95% (≥PR by end of treatment)"
  complete_response: "~85-90%"
  progression_free_survival: "5-year PFS ~85-90% (LYSA / SWOG S1001)"
  overall_survival_5y: "~89-91% in non-bulky stage I-II"

hard_contraindications:
  - CI-HBV-NO-PROPHYLAXIS
  - CI-LVEF-LOW-FOR-ANTHRACYCLINE
red_flags_triggering_alternative:
