id: IND-BREAST-TNBC-2L-BRCA-OLAPARIB
plan_track: standard

applicable_to:
  disease_id: DIS-BREAST
  receptor_subtype: TNBC
  stage_stratum: METASTATIC
  line_of_therapy: 2
  biomarker_requirements_required:
    - biomarker_id: BIO-BRCA1-BRCA2-GERMLINE
      value_constraint: "pathogenic OR likely-pathogenic germline variant"
      required: true
  biomarker_requirements_excluded:
    - biomarker_id: BIO-HER2-SOLID
      value_constraint: "positive"
      required: false
    - biomarker_id: BIO-ESTROGEN-RECEPTOR
      value_constraint: "positive"
      required: false
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-OLAPARIB-BREAST
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  median_progression_free_survival_months: 7
  notes: "OlympiAD: 7.0 vs 4.2 mo (HR 0.58); ORR 60% vs 29%."

hard_contraindications: []
red_flags_triggering_alternative: []
required_tests:
  - TEST-ER-PR-IHC
  - TEST-HER2-IHC-FISH
  - TEST-GERMLINE-BRCA-PANEL
  - TEST-CECT-CAP
desired_tests: []

sources:
  - source_id: SRC-OLYMPIAD-ROBSON-2017
    weight: primary
  - source_id: SRC-NCCN-BREAST-2025
    weight: primary
  - source_id: SRC-ESMO-BREAST-METASTATIC-2024
    weight: confirmatory

last_reviewed: "2026-04-27"
reviewers: []
reviewer_signoffs: 0

notes: >
  ESCAT IA. OlympiAD established olaparib for germline BRCA1/2-mutant
  HER2- metastatic breast (≤2 prior chemo lines for metastatic; HR+
  subset must have ≥1 prior endocrine line). For TNBC subset olaparib
  is typically ≥2L (after 1L pembro + chemo for PD-L1+ or chemo alone
  for PD-L1-). Talazoparib (EMBRACA) is the alternative PARPi —
  comparable efficacy, more anaemia, less GI. Patient preference and
  AE-profile drive olaparib-vs-talazoparib choice. UA access:
  olaparib reimbursed for breast indication; talazoparib not yet
  reimbursed.
