id: IND-BREAST-HR-POS-MET-1L-CDKI
plan_track: standard

applicable_to:
  disease_id: DIS-BREAST
  receptor_subtype: HR_POS_HER2_NEG
  stage_stratum: METASTATIC
  line_of_therapy: 1
  biomarker_requirements_required:
    - biomarker_id: BIO-ESTROGEN-RECEPTOR
      value_constraint: "positive"
      required: true
    - biomarker_id: BIO-PROGESTERONE-RECEPTOR
      value_constraint: "positive"
      required: false  # ASCO/CAP 2020: ER OR PR positive defines HR+;
                       # PR confirms HR signaling but ER alone qualifies
  biomarker_requirements_excluded:
    - biomarker_id: BIO-HER2-SOLID
      value_constraint: "positive"
      required: false
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-AI-RIBOCICLIB
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  median_progression_free_survival_months: 25
  median_overall_survival_months: 63
  notes: "MONALEESA-2 + MONALEESA-3 + MONALEESA-7 OS validated"

hard_contraindications: []
red_flags_triggering_alternative: []
required_tests:
  - TEST-ER-PR-IHC
  - TEST-HER2-IHC-FISH
  - TEST-CECT-CAP
desired_tests:
  - TEST-PIK3CA-NGS
  - TEST-GERMLINE-BRCA-PANEL

sources:
  - source_id: SRC-NCCN-BREAST-2025
    weight: primary
  - source_id: SRC-ESMO-BREAST-METASTATIC-2024
    weight: primary

  - source_id: SRC-MONALEESA-2-HORTOBAGYI-2016
    position: supports
    relevant_quote_paraphrase: MONALEESA-2 trial — see referenced publication for primary outcome data.
  - source_id: SRC-MONALEESA-7-TRIPATHY-2018
    position: supports
    relevant_quote_paraphrase: MONALEESA-7 trial — see referenced publication for primary outcome data.
  - source_id: SRC-MONALEESA-3-SLAMON-2018
    position: supports
    relevant_quote_paraphrase: MONALEESA-3 trial — see referenced publication for primary outcome data.
last_reviewed:
reviewers: []

notes: >
  Workhorse 1L for HR+/HER2- metastatic. Premenopausal patients require
  ovarian suppression added (LHRH agonist). Ribociclib has best OS data;
  palbociclib / abemaciclib clinically interchangeable per institutional
  preference. Switch to fulvestrant + CDK4/6i (or new CDK4/6i) acceptable
  2L.
