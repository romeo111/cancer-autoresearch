rationale: 'Time-limited chemoimmuno for WM — preferred when BTKi not accessible OR for CXCR4-WHIM-mutated WM (weaker BTKi response) OR for MYD88-WT WM (BTKi inactive). 6-month course produces durable response in many. IgM flare with rituximab risk; plasmapheresis first if symptomatic hyperviscosity.

  '
