rationale: 'Lisocabtagene maraleucel (liso-cel; Breyanzi) is a CD19-targeted CAR-T cell therapy with the best safety profile of the three FDA-approved CAR-T products for r/r DLBCL (axi-cel, tisa-cel, liso-cel). TRANSCEND NHL-001 (Abramson 2020 Lancet): ORR 73%, CR 53%, mPFS 6.8 mo overall, 22.8 mo in CR responders. CRS Grade ≥3 ~2% (vs ~13% axi-cel) and ICANS Grade ≥3 ~10% (vs ~28% axi-cel) make liso-cel preferred in older / frail / cardiac comorbid patients. TRANSFORM (Kamdar 2022 Lancet) and PILOT (Sehgal 2022 Lancet Oncol) extended use to 2L for HSCT-ineligible / primary refractory or early relapse. Step-up dosing not required (single infusion); fludarabine + cyclophosphamide lymphodepletion 5-3 days pre-infusion. Hospital observation 7-14 days. Universal hypogammaglobulinemia → IVIG. PJP + HSV/VZV prophylaxis ≥6 mo. Manufacturing window (~3 weeks) excludes rapidly progressive patients — bridge therapy mandatory. Ukraine access: not registered; international referral required. Axi-cel is alternative CD19 CAR-T with similar efficacy but worse safety (ZUMA-1, ZUMA-7). STUB regimen — no dedicated REG- entity for liso-cel yet; flagged for REG follow-up.'
rationale_ua: >-
  лісокабтаген маралейцел (liso-cel; Breyanzi) is a CD19-targeted CAR-T cell терапія with the найкращий профіль безпеки of the three схвалений FDA CAR-T products for р/р DLBCL (axi-cel, tisa-cel, liso-cel). TRANSCEND NHL-001 (Abramson 2020 Lancet): ORR 73%, CR 53%, mPFS 6.8 mo overall, 22.8 mo in CR responders. CRS Grade ≥3 ~2% (vs ~13% axi-cel) and ICANS Grade ≥3 ~10% (vs ~28% axi-cel) make liso-cel переважний in older / frail / cardiac comorbid patients. TRANSFORM (Kamdar 2022 Lancet) and PILOT (Sehgal 2022 Lancet Oncol) extended use to 2L for HSCT-ineligible / primary рефрактерний or early рецидив. Step-up дозування not обов'язковий (single infusion); флударабін + циклофосфамід lymphodepletion 5-3 days pre-infusion. Hospital observation 7-14 days. Universal hypogammaglobulinemia → ВВІГ. PJP + HSV/VZV prophylaxis ≥6 mo. Manufacturing window (~3 weeks) виключає rapidly progressive patients — bridge терапія обов'язковий. Ukraine access: not registered; international referral обов'язковий. Axi-cel is alternative CD19 CAR-T with подібний ефективність but гірше безпека (ZUMA-1, ZUMA-7). STUB схема — ні dedicated REG- сутність for liso-cel yet; flagged for REG спостереження.
