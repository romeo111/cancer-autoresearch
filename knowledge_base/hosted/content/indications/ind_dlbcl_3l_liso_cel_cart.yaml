known_controversies:
  - topic: Liso-cel vs axi-cel vs tisa-cel for r/r DLBCL 3L+
    positions:
      - position: Liso-cel — best safety (CRS G≥3 2%, ICANS G≥3 10%), comparable efficacy
        sources:
          - SRC-NCCN-BCELL-2025
      - position: Axi-cel — most experience, slightly higher CR rate (~58%), but worse safety (CRS G≥3 13%, ICANS G≥3 28%)
        sources:
          - SRC-NCCN-BCELL-2025
      - position: Tisa-cel — outpatient feasible, low-grade CRS, but lower efficacy (ORR 52%, CR 40%; JULIET)
        sources:
          - SRC-ESMO-DLBCL-2024
    our_default: Liso-cel for older / frail / cardiac comorbid OR when outpatient pathway desired; axi-cel for younger fit patients prioritizing depth of response; tisa-cel as alternative when liso-cel unavailable
    rationale: All three Cat 1; safety profile + manufacturing window drive individualization
do_not_do:
  - НЕ використовувати поза certified CAR-T center — REMS обов'язкові + tocilizumab + dexamethasone on-site.
  - НЕ призначати при active infection — lymphodepletion підвищить септичний ризик до untenable.
  - НЕ забути bridging therapy під час manufacturing window — disease control критично.
  - НЕ призначати при significant cardiac dysfunction (LVEF <40%) — CRS-related cardiotoxicity може бути fatal.
  - НЕ повторювати CD19 CAR-T — repeat infusion не вивчено; розглянути bispecific (epcoritamab, glofitamab) при relapse.
  - НЕ забувати IVIG (IgG <400) + PJP/HSV/VZV профілактику ≥6 міс після інфузії.
  - НЕ призначати без international referral pathway + funding — препарат недоступний в Україні.
