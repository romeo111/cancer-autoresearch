id: IND-DLBCL-3L-LISO-CEL-CART
plan_track: aggressive
applicable_to:
  disease_id: DIS-DLBCL-NOS
  line_of_therapy: 3
  stage_requirements:
    - "Relapsed / refractory DLBCL after ≥2 prior lines (1L R-CHOP / Pola-R-CHP, 2L salvage chemo ± autoSCT or pola-R-bendamustine)"
    - "Active progressive disease at lymphodepletion timepoint"
    - "ECOG 0-2 (TRANSCEND NHL-001 enrolment)"
    - "Adequate organ function for fludarabine + cyclophosphamide lymphodepletion"
    - "No prior CD19-directed CAR-T (or sufficient washout per protocol)"
    - "Manufacturing slot available (~3-week wait acceptable for disease tempo)"
  biomarker_requirements_required:
    - biomarker_id: BIO-CD20-IHC
      required: true
      value_constraint: "CD20 positive (and CD19 positive on flow / IHC; CD19 loss is exclusion)"
  biomarker_requirements_excluded: []
  demographic_constraints:
    age_min: 18
    ecog_max: 2
