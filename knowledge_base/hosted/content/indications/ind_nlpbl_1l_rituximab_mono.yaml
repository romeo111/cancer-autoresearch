expected_outcomes:
  overall_response_rate: ~75-85% (single-agent rituximab in NLPBL)
  complete_response: ~50-70%
  progression_free_survival: Median PFS ~3-5 years; relapse-prone but salvageable
  overall_survival_5y: '>90% (NLPBL indolent biology preserved)'
hard_contraindications:
