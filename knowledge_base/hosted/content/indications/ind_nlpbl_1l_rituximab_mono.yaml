desired_tests: []
rationale: 'Early-stage NLPBL where RT not preferred — young patients with field overlap concerns (breast tissue, gonads, thyroid in cervical fields), patients refusing RT, or already-resected stage IA where adjuvant alone is reasonable. Rituximab monotherapy (4 weekly induction + 2-year maintenance) leverages CD20+ biology of NLPBL (reclassified WHO 5th-ed B-cell — NOT Hodgkin) — high response rate, low toxicity, preserves chemo for relapse. Avoids RT late effects (secondary cancers, cardiac, breast — particularly relevant in young women).

  '
rationale_ua: >
  ранньої стадії NLPBL where RT not переважний — young patients with field overlap concerns (breast tissue, gonads, thyroid in cervical fields), patients refusing RT, or already-resected stage IA where ад'ювантний alone is reasonable. ритуксимаб монотерапія (4 weekly індукція + 2-year підтримка) leverages CD20+ biology of NLPBL (reclassified WHO 5th-ed B-cell — NOT Hodgkin) — high частота відповіді, low токсичність, preserves chemo for рецидив. Avoids RT late effects (secondary cancers, cardiac, breast — особливо relevant in young women).
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
  - source_id: SRC-ESMO-DLBCL-2024
    position: supports
    relevant_quote_paraphrase: ESMO 2024 covers NLPBL within indolent B-cell lymphoma framework; observation for stage IA after excision; rituximab monotherapy for symptomatic/multifocal disease
known_controversies:
  - topic: Rituximab maintenance duration in NLPBL
    positions:
      - position: 2-year maintenance — extrapolated from FL evidence
        sources:
          - SRC-NCCN-BCELL-2025
      - position: Induction-only — relapses salvageable, late effects of prolonged B-cell depletion concerning
        sources:
          - SRC-NCCN-BCELL-2025
    our_default: 2-year maintenance for first-presentation early-stage; reassess at relapse
do_not_do:
  - НЕ застосовувати при ABVD-style уявленні NLPBL = Hodgkin (legacy classification) — WHO 5th-ed reclассифікувала як B-cell. CD20+ → rituximab-based, НЕ ABVD.
  - НЕ пропускати HBV скринінг + entecavir prophylaxis.
  - НЕ розширювати на advanced stage (III-IV) — там R-CHOP per FL pathway.
  - НЕ забувати моніторинг pocket transformation in DLBCL — late risk у NLPBL.
  - НЕ використовувати при відомій непереносимості mouse-protein-derived antibodies.
time_critical: false
last_reviewed: '2026-04-27'
reviewer_signoffs: 0
notes: STUB. Alternative до ISRT для early-stage NLPBL коли RT не preferred.
