id: IND-ADVSM-1L-MIDOSTAURIN
plan_track: aggressive

applicable_to:
  disease_id: DIS-MASTOCYTOSIS
  line_of_therapy: 1
  stage_requirements:
    - "Advanced systemic mastocytosis (ASM, SM-AHN, MCL per WHO 2022)"
    - "Avapritinib contraindicated (platelets <50 ×10⁹/L) OR KIT D816V negative OR avapritinib inaccessible"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 3

recommended_regimen: REG-MIDOSTAURIN-ADVSM-1L
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "2A"

expected_outcomes:
  overall_response_rate: "~28% (Valent/Cheson criteria); ~60% (IWG-MRT-ECNM-modified); D-RIVE"
  progression_free_survival: "Not formally reported in advanced-SM trial"
  overall_survival_5y: "ASM ~26 mo median OS; SM-AHN ~21 mo; MCL ~9 mo (D-RIVE long-term)"
  notes: "D-RIVE / CPKC412D2201 (Gotlib NEJM 2016)"

hard_contraindications: []
red_flags_triggering_alternative: []
required_tests: []
desired_tests: []

rationale: >
  Midostaurin 100 mg BID is the alternative 1L for advanced SM in
  three scenarios: (1) avapritinib contraindicated (platelets <50)
  per boxed warning, (2) KIT D816V-negative advanced SM where
  avapritinib lacks activity, (3) avapritinib inaccessible (Ukraine
  context — avapritinib unregistered, midostaurin НСЗУ-reimbursed).
  Pre-avapritinib it was the standard-of-care; ORR by IWG criteria
  ~60% with mast-cell-burden reduction. Substantial GI toxicity —
  ~30% require dose reduction. NB: the rare D816V-negative variant
  driven by FIP1L1-PDGFRA is actually a separate WHO entity (myeloid
  neoplasm with eosinophilia) and is treated with imatinib, not
  midostaurin — outside this indication.

sources:
  - source_id: SRC-NCCN-SM-2025
    weight: primary
  - source_id: SRC-ESMO-AML-2020
    weight: supporting

do_not_do:
  - "Do NOT use imatinib in KIT D816V advanced SM (intrinsic resistance) — imatinib is reserved for the rare FIP1L1-PDGFRA myeloid neoplasm with eosinophilia (separate entity)."
  - "Do NOT continue midostaurin through gr ≥3 nausea/vomiting without antiemetic optimization + dose reduction (100 → 50 mg BID)."
  - "Do NOT start midostaurin without baseline ECG — QT prolongation requires electrolyte correction + monitoring."

last_reviewed: '2026-04-26'
reviewers: []
reviewer_signoffs: 2
notes: >
  Practical 1L in Ukraine (midostaurin НСЗУ-reimbursed for ASM /
  SM-AHN / MCL; avapritinib unregistered). Rest-of-world fallback
  for avapritinib-contraindicated or D816V-negative advanced SM.
