id: IND-CRC-METASTATIC-3L-TRIFLURIDINE-TIPIRACIL-MONO
plan_track: standard

applicable_to:
  disease_id: DIS-CRC
  line_of_therapy: 3
  stage_requirements:
    - "Stage IV metastatic mCRC"
    - "Disease progression on standard chemo (FOLFOX, FOLFIRI) + biologic (anti-VEGF and/or anti-EGFR if RAS-WT)"
    - "Patient OR funding pathway not available for combination TAS-102 + bevacizumab (SUNLIGHT) — monotherapy fallback"
  biomarker_requirements_required: []
  biomarker_requirements_excluded:
    - biomarker_id: BIO-MSI-STATUS
      value_constraint: "MSI-H excluded — pembrolizumab continues 3L+"
    - biomarker_id: BIO-BRAF-V600E
      value_constraint: "BRAF V600E excluded — encorafenib + cetuximab (BEACON) preferred"
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-TRIFLURIDINE-TIPIRACIL-MONO
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "~1.6% (RECOURSE TAS-102 monotherapy; mainly disease stabilization)"
  progression_free_survival: "Median PFS 2.0 mo (RECOURSE; HR 0.48)"
  overall_survival_5y: "Median OS 7.1 mo (vs 5.3 mo placebo, HR 0.68); 1-year OS ~27%"

hard_contraindications: []
red_flags_triggering_alternative:
  - RF-CRC-FRAILTY-AGE

required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-CEA
  - TEST-CT-CHEST-ABDOMEN-PELVIS
desired_tests: []

rationale: >
  Trifluridine-tipiracil (TAS-102) monotherapy for chemo-refractory
  mCRC. RECOURSE Phase III (2015): modest OS benefit (7.1 vs 5.3 mo,
  HR 0.68) over placebo in heavily pretreated mCRC. Mechanism:
  thymidine analog incorporation into DNA, distinct from prior
  fluoropyrimidine exposure (TS-independent). Position: standard-
  track 3L+ MONOTHERAPY option when SUNLIGHT combination (TAS-102 +
  bevacizumab) not feasible — funding constraint for bevacizumab
  OR contraindication to bev (recent surgery, uncontrolled HTN,
  active hemorrhage). SUNLIGHT (combination) is preferred where
  accessible (mOS 10.8 vs 7.5 mo for combo vs mono). Myelosuppression
  is the dominant toxicity — neutropenia + anemia drive dose holds.
  UA access barrier: TAS-102 not NSZU-reimbursed; out-of-pocket OR
  charitable pathway.

sources:
  - source_id: SRC-NCCN-COLON-2025
    position: supports
    relevant_quote_paraphrase: "Trifluridine-tipiracil (RECOURSE) is a Cat 1 option for chemo-refractory mCRC 3L+; combination with bevacizumab (SUNLIGHT) preferred where accessible"
  - source_id: SRC-ESMO-COLON-2024
    position: supports
    relevant_quote_paraphrase: "TAS-102 monotherapy remains an option for chemo-refractory mCRC; SUNLIGHT combination is now preferred standard"

known_controversies:
  - topic: "TAS-102 mono (RECOURSE) vs TAS-102 + bev (SUNLIGHT) 3L+"
    positions:
      - position: "TAS-102 + bev (SUNLIGHT): superior OS (10.8 vs 7.5 mo); preferred where bev accessible"
        sources: [SRC-NCCN-COLON-2025]
      - position: "TAS-102 mono (RECOURSE): valid when bev contraindicated OR not funded; established Cat 1"
        sources: [SRC-ESMO-COLON-2024]
        evidence_note: "Combination is new standard; mono is fallback"
    our_default: "TAS-102 + bev (existing IND-CRC-METASTATIC-3L-TAS102-BEV) preferred where bev accessible; TAS-102 monotherapy as fallback when bev contraindicated OR not funded"
    rationale: "SUNLIGHT supersedes RECOURSE where access permits; mono retains validity in bev-restricted scenarios"

do_not_do:
  - "НЕ призначати при ANC <1500 або platelets <75K при cycle start — myelosuppression Grade 3+."
  - "НЕ ескалувати dose без count recovery cycle-to-cycle — neutropenia є dose-limiting."
  - "НЕ забути reduce dose при CrCl 30-59 (20 mg/m² BID)."
  - "НЕ призначати при CrCl <30 — недостатньо safety data."
  - "НЕ призначати при ECOG 3-4 — toxicity profile перевищує frail tolerance."
  - "НЕ підтверджувати без funding pathway для TAS-102."

time_critical: false
last_reviewed: "2026-04-27"
reviewers: []
reviewer_signoffs: 0
notes: >
  STUB — pending Clinical Co-Lead sign-off. Standard-track 3L+
  monotherapy fallback. Existing IND-CRC-METASTATIC-3L-TAS102-BEV
  (SUNLIGHT combination) is preferred where bev accessible; this
  monotherapy indication is the bev-contraindicated / bev-not-funded
  fallback. Trial-specific source (RECOURSE PMID 25970050) not in KB
  yet — flagged for CSD-4.5.
