rationale: 'CODOX-M/IVAC (Magrath protocol, R-modified) for fit younger Burkitt with high-risk features: CNS involvement, leukemic phase, LDH >3× ULN, bulky abdominal disease (RF-BURKITT-HIGH-RISK fired). HD-MTX provides CNS-penetrant therapy; HiDAC + cytarabine deliver intensive marrow + CNS effect. Substantial toxicity demands experienced center + ECOG ≤2 + age ≤60 typically.

  '
rationale_ua: >
  CODOX-M/IVAC (Magrath protocol, R-modified) for fit younger Burkitt with високого ризику features: CNS involvement, leukemic phase, LDH >3× ULN, bulky abdominal хвороба (RF-BURKITT-високого ризику fired). HD-MTX provides CNS-penetrant терапія; HiDAC + цитарабін deliver intensive marrow + CNS effect. Substantial токсичність demands experienced center + ECOG ≤2 + age ≤60 типово.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
  - source_id: SRC-ESMO-BURKITT-2024
    position: supports
    relevant_quote_paraphrase: ESMO 2024 endorses DA-EPOCH-R for low-risk Burkitt; intensive CODOX-M/IVAC or hyper-CVAD for high-risk; CNS prophylaxis mandatory
known_controversies: []
do_not_do:
  - Не призначати при наявності pleural/ascites fluid без drainage — HD-MTX clearance подовжується смертельно.
  - Не комбінувати з NSAIDs / PPIs / penicillins під час HD-MTX phase — clearance reduction.
  - Не пропускати leucovorin rescue + serial MTX levels q24h до <0.1 µM.
  - Не використовувати при age >60 OR ECOG >2 — токсичність переважає benefit; route до DA-EPOCH-R.
  - Не пропускати CrCl <60 dose adjustment — HD-MTX renally cleared.
time_critical: false
last_reviewed: '2026-04-27'
reviewer_signoffs: 0
notes: STUB.
