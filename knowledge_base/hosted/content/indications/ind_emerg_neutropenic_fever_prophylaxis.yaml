known_controversies:
- topic: Pegfilgrastim primary prophylaxis vs secondary (after FN event) for FN risk 10-20% regimens
  positions:
  - position: Primary prophylaxis — reduces FN rate uniformly; preserves dose intensity
    sources:
    - SRC-NCCN-AML-2025
  - position: Secondary prophylaxis — only for patients who develop FN; cost-effective
    sources:
    - SRC-NCCN-BCELL-2025
  our_default: Primary G-CSF for predicted FN ≥20% OR high-risk individual factors (age >65, prior FN, advanced
    disease); secondary G-CSF for 10-20% with no individual risk factors
  rationale: Cost-effectiveness analyses favor primary at ≥20% FN risk; below that, individual risk factors
    drive choice
do_not_do:
- НЕ використовувати fluoroquinolone prophylaxis рутинно — antibiotic stewardship + ризик C. difficile
  + resistance + Achilles tendinopathy.
- НЕ комбінувати G-CSF з cytotoxic chemo одночасно — обмежити до post-chemo recovery phase (≥24h після
  останнього cytotoxic).
- НЕ використовувати pegfilgrastim в weekly regimens — дізайн для q2-3 weeks cycles; weekly = filgrastim.
- НЕ забувати про HBV/HCV screening перед IVIG-replacement therapy — universal hypogammaglobulinemia з
  CD20/CD38-targeted therapy.
- НЕ використовувати posaconazole oral suspension при значній mucositis — absorption variable; switch до
  IV або alternative azole.
- НЕ ігнорувати vaccination update до cytotoxic + IO — efficacy зменшена; influenza + pneumococcal + COVID-19
  baseline.
- "НЕ забувати про PJP profilaxis ≥6 міс після anti-CD20 OR HD-corticosteroid (≥20 mg/day prednisone equivalent
  ×4 weeks)."
