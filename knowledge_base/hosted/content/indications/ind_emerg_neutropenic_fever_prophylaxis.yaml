rationale: 'G-CSF (filgrastim 5 μg/kg SC daily OR pegfilgrastim 6 mg SC fixed dose × 1) primary prophylaxis
  is recommended (NCCN/ASCO/EORTC) for chemotherapy regimens with predicted FN rate ≥20% (e.g., AML 7+3
  induction, dose-dense AC-T, R-CHOEP, HD-MTX-based protocols, FOLFIRINOX in high-risk patients). For 10-20%
  predicted FN risk, G-CSF added if individual risk factors present (age >65, prior FN, advanced disease,
  bone marrow involvement, comorbidities, hepatic/renal dysfunction). FLUOROQUINOLONE antibacterial prophylaxis
  (levofloxacin 500 mg PO daily OR ciprofloxacin 500 mg PO BID) recommended per IDSA for predicted prolonged
  profound neutropenia (ANC <100/μL ≥7 days OR ANC <500/μL ≥10 days) — typical scenarios: AML induction/consolidation,
  allogeneic HSCT, lymphoma HD-MTX, autologous HSCT mobilization. Levofloxacin reduces all-cause mortality
  during neutropenia (Cullen 2005 NEJM). Antifungal prophylaxis (posaconazole 300 mg PO daily) for AML
  + MDS with prolonged neutropenia (Cornely 2007 NEJM). Anti-PJP prophylaxis (cotrimoxazole) for ALL,
  HD-corticosteroid regimens, post-HSCT, post-anti-CD20. Anti-VZV/HSV (acyclovir / valacyclovir) for HSCT,
  CD38-targeted therapy, daratumumab-based MM. Pegfilgrastim preferred over filgrastim for predictable
  schedules — single dose covers cycle vs daily injections. STUB regimen — no dedicated REG-PRIMARY-PROPHYLAXIS-CYTOTOXIC
  entity yet; flagged for REG follow-up. SUP-GCSF-NEUTROPENIA + SUP-PJP-PROPHYLAXIS exist as proxies.'
