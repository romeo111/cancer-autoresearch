sources:
  - source_id: SRC-NCCN-MM-2025
    position: supports
    relevant_quote_paraphrase: Ciltacabtagene autoleucel (cilta-cel) is Cat 1 preferred for relapsed/refractory multiple myeloma after ≥1 prior line per CARTITUDE-4; deepest + most durable responses of any current MM therapy
  - source_id: SRC-ESMO-MM-2023
    position: supports
    relevant_quote_paraphrase: BCMA CAR-T (cilta-cel, ide-cel) preferred over BCMA bispecifics for triple-class refractory MM when manufacturing window tolerable; cilta-cel has deeper responses than ide-cel
known_controversies:
  - topic: Cilta-cel vs ide-cel vs BCMA bispecific (teclistamab) for triple-class refractory MM
    positions:
      - position: Cilta-cel — ORR 98%, mPFS 35 mo, deepest + most durable responses
        sources:
          - SRC-NCCN-MM-2025
        evidence_note: "CARTITUDE-1 long-term: substantial subset achieve treatment-free remission"
      - position: Ide-cel (idecabtagene vicleucel) — ORR 73%, mPFS 12 mo (KarMMa); broader manufacturing capacity
        sources:
          - SRC-NCCN-MM-2025
      - position: Teclistamab (BCMA bispecific) — off-the-shelf, no manufacturing window, but more prolonged immunosuppression
        sources:
          - SRC-ESMO-MM-2023
    our_default: Cilta-cel preferred when manufacturing window tolerable (4-week bridge feasible) AND no prior BCMA exposure; ide-cel as alternative CAR-T; teclistamab when CAR-T not feasible OR fast progression
    rationale: Cilta-cel has best efficacy data; ide-cel acceptable alternative; bispecifics for off-the-shelf needs
do_not_do:
  - НЕ використовувати поза certified CAR-T center — REMS обов'язкові + tocilizumab + dexamethasone on-site.
  - НЕ призначати при active infection — lymphodepletion підвищить septic ризик до untenable.
  - НЕ забути bridging therapy під час manufacturing window (4 тижні) — disease control критично.
  - НЕ ігнорувати late-onset neurotoxicity (parkinsonism-like syndrome) — unique cilta-cel signal; dopaminergic + supportive care.
  - НЕ повторювати CAR-T після cilta-cel — repeat infusion не вивчено + значне токсичне навантаження.
  - НЕ забувати про IVIG (IgG <400) + PJP/HSV/VZV профілактику ≥6 міс після інфузії.
  - НЕ призначати без international referral pathway + funding — препарат недоступний в Україні.
