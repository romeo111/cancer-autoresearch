rationale: 'Ciltacabtagene autoleucel (cilta-cel; Carvykti) is a BCMA-targeted CAR-T cell therapy with the deepest + most durable responses of any treatment for triple-class refractory multiple myeloma. CARTITUDE-1 (Berdeja 2021 Lancet, Martin 2023 JCO 3-yr update): ORR 98%, sCR/CR 83%, mPFS ~35 mo, 30-mo OS 74% in patients with median 6 prior lines. CARTITUDE-4 (San-Miguel 2023 NEJM) expanded use to 1-3 prior lines with similarly impressive results (mPFS NR vs 11.8 mo SOC; HR 0.26). Step-up dosing not required (single infusion); fludarabine + cyclophosphamide lymphodepletion 5-3 days pre-infusion. CRS Grade ≥3 ~5%, ICANS Grade ≥3 ~10%, but late-onset neurotoxicity (movement and neurocognitive treatment-emergent AEs — MNTs, including parkinsonism) ~5-10% is unique safety signal — likely BCMA expression in basal ganglia. Tocilizumab + dexamethasone for CRS; hospital observation 14 days minimum. Universal hypogammaglobulinemia → IVIG. PJP + HSV/VZV prophylaxis ≥6 mo. Manufacturing window (4 weeks) excludes rapidly progressive patients — bridge therapy mandatory. Ukraine access: not registered; international referral required. STUB regimen — no dedicated REG- entity for cilta-cel yet; flagged for REG follow-up.'
rationale_ua: >-
  цилтакабтаген аутолейцел (cilta-cel; Carvykti) is a BCMA-targeted CAR-T cell терапія with the deepest + найбільш durable responses of any лікування for triple-class рефрактерний множинна мієлома. CARTITUDE-1 (Berdeja 2021 Lancet, Martin 2023 JCO 3-річна update): ORR 98%, sCR/CR 83%, mPFS ~35 міс., 30-mo OS 74% in patients with медіана 6 prior lines. CARTITUDE-4 (San-Miguel 2023 NEJM) expanded use to 1-3 prior lines with similarly impressive results (mPFS NR vs 11.8 mo SOC; HR 0.26). Step-up дозування not обов'язковий (single infusion); флударабін + циклофосфамід lymphodepletion 5-3 days pre-infusion. CRS Grade ≥3 ~5%, ICANS Grade ≥3 ~10%, but late-onset neurotoxicity (movement and neurocognitive лікування-emergent AEs — MNTs, включаючи parkinsonism) ~5-10% is unique безпека signal — likely BCMA експресія in basal ganglia. тоцилізумаб + dexamethasone for CRS; hospital observation 14 days minimum. Universal hypogammaglobulinemia → ВВІГ. PJP + HSV/VZV prophylaxis ≥6 mo. Manufacturing window (4 weeks) виключає rapidly progressive patients — bridge терапія обов'язковий. Ukraine access: not registered; international referral обов'язковий. STUB схема — ні dedicated REG- сутність for cilta-cel yet; flagged for REG спостереження.
ukrainian_review_status: pending_clinical_signoff
