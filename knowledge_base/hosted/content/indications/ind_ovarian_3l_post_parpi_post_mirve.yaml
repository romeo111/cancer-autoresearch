notes: 'STUB — pending Clinical Co-Lead sign-off. 3L+ pathway for platinum-resistant ovarian after PARPi + mirvetuximab exhaustion. Multiple sequential single-agent chemo options exist; treatment selection highly individualized. Missing entity flag: dedicated REG-PLD-MONO + REG-WEEKLY-PACLITAXEL-OVARIAN + REG-TRABECTEDIN-PLD — author in PROD-2.'
