rationale: 'Patients with platinum-resistant epithelial ovarian cancer who have exhausted PARPi maintenance 2L AND mirvetuximab soravtansine 3L (MIRASOL Moore 2024 NEJM; FDA-approved for FRα-high platinum-resistant) face a 4L+ setting dominated by sequential single-agent chemotherapy. Pegylated liposomal doxorubicin (PLD), weekly paclitaxel, topotecan, gemcitabine, trabectedin (Yondelis) ± PLD (OVA-301) are the established options. Bevacizumab can be re-added (AURELIA paradigm) if not previously exhausted at maintenance — weekly paclitaxel + bevacizumab has the strongest 4L+ data (mPFS 6.7 vs 3.4 mo). Endocrine therapy (letrozole, tamoxifen) for low-grade serous ovarian carcinoma. Trial enrollment for novel agents (ATR inhibitors, WEE1 inhibitors, biomarker-driven combinations) is preferred. Best supportive care + palliative care consultation appropriate when ECOG declines.'
rationale_ua: >-
  Patients with platinum-resistant epithelial рак яєчника who have exhausted PARPi підтримка 2L AND mirvetuximab soravtansine 3L (MIRASOL Moore 2024 NEJM; FDA-схвалений для FRα-high platinum-resistant) face a 4L+ setting dominated by sequential single-agent хіміотерапія. Pegylated liposomal доксорубіцин (PLD), weekly паклітаксел, топотекан, гемцитабін, trabectedin (Yondelis) ± PLD (OVA-301) are the усталений options. бевацизумаб can be re-added (AURELIA paradigm) if not previously exhausted at підтримка — weekly паклітаксел + бевацизумаб has the strongest 4L+ дані (mPFS 6.7 проти 3.4 міс.). Endocrine терапія (летрозол, тамоксифен) for низького ступеня serous ovarian карцинома. дослідження enrollment for novel agents (ATR інгібітори, WEE1 інгібітори, на основі біомаркерів combinations) is переважний. найкраще підтримуюче лікування + паліативний care consultation appropriate when ECOG знижується.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-OVARIAN-2025
    position: supports
    relevant_quote_paraphrase: After exhaustion of platinum, PARPi maintenance, and mirvetuximab (if FRα-high), sequential single-agent chemotherapy ± bevacizumab is standard 3L+; trabectedin + PLD per OVA-301
  - source_id: SRC-ESMO-OVARIAN-2024
    position: supports
    relevant_quote_paraphrase: Recurrent platinum-resistant ovarian cancer 3L+ relies on sequential non-cross-resistant single agents (PLD, weekly paclitaxel, topotecan, gemcitabine); bevacizumab re-addition per AURELIA if not previously exhausted
known_controversies:
  - topic: Bevacizumab re-addition vs single-agent chemo at 3L+ ovarian
    positions:
      - position: Bevacizumab + weekly paclitaxel — mPFS gain (AURELIA mPFS 6.7 vs 3.4 mo)
        sources:
          - SRC-NCCN-OVARIAN-2025
      - position: Single-agent chemo — simpler, fewer toxicities, broad availability
        sources:
          - SRC-ESMO-OVARIAN-2024
    our_default: Bevacizumab + weekly paclitaxel for fit patients without prior bevacizumab maintenance failure; single-agent PLD or topotecan otherwise
    rationale: AURELIA-style combination has strongest 3L+ ovarian evidence; bev contraindications (proteinuria, fistula, prior bev failure) limit applicability
do_not_do:
  - НЕ продовжувати PARPi за межами primary maintenance — rechallenge evidence обмежена (OREO trial — mPFS gain modest).
  - НЕ використовувати bevacizumab при прямокишково-вагінальній фистулі або bowel obstruction history — discontinue.
  - НЕ комбінувати декілька chemo agents — toxicity > benefit; sequential strategy.
  - НЕ ігнорувати ascites / bowel obstruction symptoms — оперативне втручання (paracentesis, drainage, palliative surgery) часто більш impactful.
  - НЕ забути palliative care consultation — symptom burden високий у 3L+ ovarian.
  - НЕ продовжувати при ECOG ≥3 — focus shift до palliative care + hospice.
time_critical: false
