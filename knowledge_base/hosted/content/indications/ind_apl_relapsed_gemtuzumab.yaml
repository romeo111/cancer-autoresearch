id: IND-APL-RELAPSED-GEMTUZUMAB
plan_track: aggressive

applicable_to:
  disease_id: DIS-APL
  line_of_therapy: 3
  stage_requirements:
    - "Relapsed APL (PML-RARA confirmed) AFTER 1L ATRA + ATO OR multiply-relapsed APL"
    - "CD33+ confirmed (CD33 IHC or flow on baseline/relapse biopsy; APL essentially universally CD33+)"
    - "Eligible for re-induction (ECOG ≤2, no severe organ dysfunction or VOD history)"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-GEMTUZUMAB-APL
concurrent_therapy: []
followed_by: []

evidence_level: moderate
strength_of_recommendation: conditional
nccn_category: "2A"

expected_outcomes:
  overall_response_rate: "CR ~91% in MyloFrance series (gemtuzumab + ATO)"
  complete_response: "Rapid deep molecular CR in majority"
  progression_free_survival: "Median EFS variable; autoSCT consolidation extends durable remission"
  overall_survival_5y: "5-y OS ~50-70% with autoSCT consolidation; lower without"

hard_contraindications: []
red_flags_triggering_alternative:
  - RF-APL-EMERGENCY-DIC
  - RF-APL-HIGH-RISK-BIOLOGY
  - RF-APL-ORGAN-DYSFUNCTION
  - RF-APL-INFECTION-SCREENING
  - RF-APL-TRANSFORMATION-PROGRESSION

required_tests:
  - TEST-CBC
  - TEST-PERIPHERAL-SMEAR
  - TEST-CMP
  - TEST-LFT
  - TEST-LDH
  - TEST-COAG-PANEL
  - TEST-D-DIMER
  - TEST-HBV-SEROLOGY
  - TEST-HCV-ANTIBODY
  - TEST-HIV-SEROLOGY
  - TEST-ECHO
  - TEST-PREGNANCY
  - TEST-BM-ASPIRATE
  - TEST-BM-TREPHINE
  - TEST-FLOW-CYTOMETRY
  - TEST-KARYOTYPE
  - TEST-FISH-PANEL
  - TEST-NGS-MYELOID-PANEL
desired_tests: []

rationale: >
  Gemtuzumab ozogamicin combined with ATRA + ATO for relapsed APL
  post 1L ATRA + ATO OR multiply-relapsed disease. APL is
  exquisitely CD33+ — gemtuzumab achieves rapid deep MRD-negative
  responses (CR ~91% in MyloFrance series of relapsed APL).
  Particularly relevant when ATO + ATRA alone insufficient (e.g.,
  post 1L ATRA + ATO relapse, or molecular non-CR after ATRA +
  ATO salvage). Maintenance with gemtuzumab during consolidation
  cycles improves durability. AutoSCT consolidation for fit
  molecularly-CR responders. CRITICAL: VOD/SOS boxed warning —
  limit pre-HCT exposure to 1-2 doses, AVOID dual-alkylator
  conditioning, intensify hepatic monitoring. Gemtuzumab is the
  ADC alternative if asciminib-style novel agents not available.
  Ukraine: gemtuzumab not registered (international referral); ATRA
  + ATO available domestically.

sources:
  - source_id: SRC-NCCN-AML-2025
    position: supports
    relevant_quote_paraphrase: "Gemtuzumab ozogamicin combined with ATRA + ATO for relapsed APL post-1L; CR rates 80-90%"
  - source_id: SRC-MYLOFRANCE-ARIBI-2007
    position: supports
    relevant_quote_paraphrase: "MyloFrance / single-institution series: gemtuzumab + ATO ± ATRA in relapsed APL; CR ~91%"
  - source_id: SRC-APL-RELAPSE-LENGFELDER-2017
    position: supports
    relevant_quote_paraphrase: "Gemtuzumab in relapsed APL provides rapid deep MRD-negative response; autoSCT consolidation recommended"

do_not_do:
  - "НЕ використовувати при confirmed history of severe VOD/SOS — absolute CI."
  - "НЕ перевищувати 1-2 dose pre-HCT — VOD risk кумулятивний (boxed warning)."
  - "НЕ використовувати dual-alkylator (Bu/Cy) conditioning post-gemtuzumab — Bu/Flu кращий."
  - "НЕ ігнорувати baseline + щоциклова LFT — hepatotoxicity prelude до VOD."
  - "НЕ пропускати DS-prophylaxis dexamethasone при рості WBC — DS leading cause of induction mortality."
  - "НЕ забувати TLS prophylaxis — особливо cycle 1."
  - "НЕ підтверджувати план без funding pathway для gemtuzumab — не зареєстрований в Україні."

known_controversies:
  - topic: "Gemtuzumab ADC vs ATRA + ATO + autoSCT for relapsed APL post 1L ATRA + ATO"
    positions:
      - position: "Gemtuzumab + ATRA + ATO — enhances response in heavily-pretreated patients"
        sources: [SRC-MYLOFRANCE-ARIBI-2007, SRC-NCCN-AML-2025]
      - position: "ATRA + ATO + autoSCT — established curative pathway; gemtuzumab adds toxicity (VOD)"
        sources: [SRC-APL-RELAPSE-LENGFELDER-2017]
        evidence_note: "Gemtuzumab particularly useful when ATO already used 1L; autoSCT remains consolidation choice"
    our_default: "Gemtuzumab + ATRA + ATO for relapsed post 1L ATRA + ATO OR molecular non-CR; bridge to autoSCT"
    rationale: "ADC adds depth of response when ATO alone insufficient"

time_critical: true
last_reviewed: "2026-04-25"
reviewers: []
reviewer_signoffs: 0
notes: >
  STUB — pending Clinical Co-Lead sign-off. Aggressive-track 3L
  for relapsed APL post 1L ATRA + ATO OR multiply-relapsed.
  Ukraine access constraint for gemtuzumab dominant. AutoSCT
  consolidation for fit molecularly-CR.
