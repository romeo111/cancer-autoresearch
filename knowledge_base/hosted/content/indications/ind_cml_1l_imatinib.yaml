id: IND-CML-1L-IMATINIB
plan_track: standard

applicable_to:
  disease_id: DIS-CML
  line_of_therapy: 1
  stage_requirements:
    - "chronic_phase"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 3

recommended_regimen: REG-IMATINIB-CML
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "~95-98% complete hematologic response by 3 months"
  complete_response: "Major molecular response (BCR-ABL1 IS ≤0.1%) achieved in ~50-60% by 12 months on imatinib (vs ~70-80% on 2nd-gen TKI)"
  progression_free_survival: "10-y PFS ~80-85% (IRIS)"
  overall_survival_5y: "~83% at 10 years (IRIS); approaches age-matched general population for patients in DMR"

hard_contraindications: []
red_flags_triggering_alternative:
  - RF-CML-HIGH-RISK-ELTS
  - RF-CML-T315I-MUTATION
  - RF-CML-TRANSFORMATION-PROGRESSION
  - RF-CML-ORGAN-DYSFUNCTION

required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-LDH
  - TEST-BCR-ABL-JAK2
  - TEST-BM-ASPIRATE
  - TEST-BM-TREPHINE
  - TEST-FLOW-CYTOMETRY
  - TEST-KARYOTYPE
  - TEST-FISH-PANEL
  - TEST-HBV-SEROLOGY
  - TEST-HCV-ANTIBODY
  - TEST-PREGNANCY
desired_tests:
  - TEST-ECHO

rationale: >
  Standard 1L for CML chronic phase: low-risk by ELTS / Sokal / EUTOS,
  elderly, comorbid (especially CV disease precluding nilotinib /
  ponatinib, or pulmonary disease precluding dasatinib), or where
  cost / access is limiting. Imatinib 400 mg PO daily with food.
  IRIS established 10-y OS ~83%. ELN 2020 milestones: BCR-ABL1 IS
  ≤10% at 3 mo, ≤1% at 6 mo, ≤0.1% (MMR) at 12 mo. PCR monitoring
  q3mo for first year, then q3-6mo. Switch to 2nd-gen TKI on
  suboptimal / failure. TFR attempt eligible after ≥3 years on TKI
  + sustained DMR (MR4.5) ≥2 years per ELN.

rationale_ua: >
  стандарт 1L for CML chronic phase: низького ризику by ELTS / Sokal / EUTOS, літнього віку, comorbid (особливо CV хвороба precluding нілотиніб / понатиніб, or pulmonary хвороба precluding дазатиніб), or where cost / access is limiting. іматиніб 400 mg PO daily with food. IRIS усталений 10-y OS ~83%. ELN 2020 milestones: BCR-ABL1 IS ≤10% at 3 міс., ≤1% at 6 міс., ≤0.1% (MMR) at 12 mo. PCR моніторинг q3mo for first year, then q3-6mo. Switch to 2nd-gen TKI on suboptimal / failure. TFR attempt eligible after ≥3 years on TKI + sustained DMR (MR4.5) ≥2 years per ELN.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-MPN-2025
    position: supports
    relevant_quote_paraphrase: "Imatinib 400 mg daily is preferred 1L for low-risk CML chronic phase"
  - source_id: SRC-ELN-CML-2020
    position: supports
    relevant_quote_paraphrase: "Imatinib remains a reasonable 1L choice; 2nd-gen TKI for high-risk / TFR ambition"
  - source_id: SRC-IRIS-OBRIEN-2003
    position: supports
    relevant_quote_paraphrase: "IRIS pivotal trial: imatinib superior to IFN+Ara-C; 10-y OS ~83%"

do_not_do:
  - "Не пропускати baseline BCR-ABL1 quantitative PCR — це baseline для milestone monitoring."
  - "Не пропускати pre-TKI HBV скринінг — реактивація HBV на TKI описана у випадках."
  - "Не пропускати фертильність-обговорення у молодих пацієнтів — TKI безпеки під час вагітності обмежені; інтерферон-α — альтернатива при concept."
  - "Не призначати без food + великої склянки води — GI-непереносимість у голодного шлунка."
  - "Не повторювати імматиніб 400 мг при невдачі — переключайся за ELN-критеріями (3 mo / 6 mo / 12 mo) на 2nd-gen TKI."
  - "Не починати TFR-attempt без ≥3 років TKI + sustained MR4.5 ≥2 років + qPCR-моніторинг q1-2mo після зупинки."

known_controversies:
  - topic: "Imatinib vs 2nd-gen TKI as 1L for ALL CML chronic phase"
    positions:
      - position: "2nd-gen TKIs achieve faster + deeper molecular response → enable TFR earlier; preferred for younger patients seeking TFR"
        sources:
          - SRC-ELN-CML-2020
      - position: "No consistent OS benefit for 2nd-gen over imatinib; cost + toxicity favor imatinib for low-risk / elderly"
        sources:
          - SRC-NCCN-MPN-2025
    our_default: "Imatinib 1L for low-risk + elderly + comorbid + Ukraine cost-context; 2nd-gen for high-risk + young + TFR-ambition + comorbidity-favorable"
    rationale: "Comorbidity matrix matters; patient preference matters."

time_critical: false
last_reviewed: "2026-04-25"
reviewers: []
reviewer_signoffs: 0
notes: >
  Standard track for CML 1L. Imatinib most accessible (НСЗУ-reimbursed
  generics widely available). STUB — requires clinical co-lead signoff.
