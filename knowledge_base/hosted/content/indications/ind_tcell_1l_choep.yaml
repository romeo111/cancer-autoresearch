    positions:
      - position: "AutoSCT in CR1 — durable remission in fit younger PTCL"
        sources: [SRC-NCCN-BCELL-2025]
      - position: "Skip autoSCT — RCT evidence limited; outcomes comparable in some series"
        sources: [SRC-NCCN-BCELL-2025]
    our_default: "AutoSCT consolidation for fit younger ALCL ALK-, PTCL NOS, AITL with CR after induction"

do_not_do:
  - "НЕ пропускати CD30 IHC — якщо ≥10%, route to CHP-Bv (ECHELON-2 evidence)."
  - "НЕ пропускати HBV скринінг."
  - "НЕ використовувати у age >60 — CHOP без etoposide більш переносимий."

