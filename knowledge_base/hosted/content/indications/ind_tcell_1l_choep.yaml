desired_tests: []

rationale: >
  Standard 1L for CD30-negative PTCL NOS / AITL OR when brentuximab
  not accessible. CHOEP (CHOP + etoposide) is preferred over CHOP for
  fit younger T-cell patients per Nordic data. AutoSCT consolidation
  in fit transplant-eligible — practice standard despite limited RCT
  evidence.

rationale_ua: >
  стандарт 1L for CD30-negative PTCL NOS / AITL OR when brentuximab not accessible. CHOEP (CHOP + етопозид) is переважний over CHOP for fit younger T-cell patients per Nordic дані. аутоТГСК консолідація in fit придатний до трансплантації — practice стандарт despite limited РКД докази.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources: [{source_id: SRC-NCCN-BCELL-2025, position: supports}]
known_controversies:
