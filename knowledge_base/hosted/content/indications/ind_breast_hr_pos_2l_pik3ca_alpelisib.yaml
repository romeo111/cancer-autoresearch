id: IND-BREAST-HR-POS-2L-PIK3CA-ALPELISIB
plan_track: standard

applicable_to:
  disease_id: DIS-BREAST
  receptor_subtype: HR_POS_HER2_NEG
  stage_stratum: METASTATIC
  line_of_therapy: 2
  biomarker_requirements_required:
    - biomarker_id: BIO-ESTROGEN-RECEPTOR
      value_constraint: "positive"
      required: true
    - biomarker_id: BIO-PIK3CA-MUTATION
      value_constraint: "activating hotspot mutation present (tissue NGS or ctDNA)"
      required: true
  biomarker_requirements_excluded:
    - biomarker_id: BIO-HER2-SOLID
      value_constraint: "positive"
      required: false
  demographic_constraints:
    ecog_max: 2
    progression_on_prior_endocrine_cdk46i: true

recommended_regimen: REG-ALPELISIB-FULVESTRANT-BREAST
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  median_progression_free_survival_months: 11
  notes: "SOLAR-1 PIK3CA-mutant cohort: 11.0 vs 5.7 mo (HR 0.65)"

hard_contraindications: []
red_flags_triggering_alternative: []
required_tests:
  - TEST-ER-PR-IHC
  - TEST-HER2-IHC-FISH
  - TEST-PIK3CA-NGS
  - TEST-CECT-CAP
desired_tests: []

sources:
  - source_id: SRC-SOLAR1-ANDRE-2019
    weight: primary
  - source_id: SRC-NCCN-BREAST-2025
    weight: primary
  - source_id: SRC-ESMO-BREAST-METASTATIC-2024
    weight: confirmatory

last_reviewed: "2026-04-27"
reviewers: []
reviewer_signoffs: 0

notes: >
  ESCAT IA. SOLAR-1 established alpelisib + fulvestrant for
  PIK3CA-mutant HR+/HER2- after AI ± CDK4/6i progression. Hotspots
  in exons 9 (E542K, E545K, helical) and 20 (H1047R, H1047L, kinase)
  detected by tissue NGS or ctDNA. Hyperglycemia management dominant
  workflow burden — pre-treatment HbA1c + fasting glucose; metformin
  first-line if hyperglycemic. UA access barrier: alpelisib registered
  but NSZU does not cover; out-of-pocket. CAPItello-291 (capivasertib)
  is overlapping option for this group plus AKT1/PTEN — see
  ALGO-BREAST-HR-POS-2L for selection rationale.
