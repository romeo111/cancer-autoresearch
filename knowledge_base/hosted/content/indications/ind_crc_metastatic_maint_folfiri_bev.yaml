rationale: 'De-escalation to maintenance after 6-8 induction cycles of oxaliplatin- or irinotecan-based doublet + bevacizumab is NCCN/ESMO standard for unresectable mCRC responders. CAIRO3 (Simkens 2015 Lancet) established capecitabine + bevacizumab maintenance superiority over observation (mPFS 8.5 vs 4.1 mo); AIO 0207 (Hegewisch-Becker 2015) confirmed bevacizumab ± fluoropyrimidine maintenance vs full pause. Maintenance drug typically capecitabine + bevacizumab OR 5FU/LV + bevacizumab; full FOLFOX/FOLFIRI is NOT continued as maintenance (cumulative neuropathy/diarrhea). Reintroduction of oxaliplatin/irinotecan upon progression is standard. STUB regimen — no dedicated REG- entity for capecitabine+bev maintenance yet; flagged for REG follow-up.'
rationale_ua: >-
  De-escalation to підтримка after 6-8 індукція цикли of оксаліплатин- or іринотекан-based дублет + бевацизумаб is NCCN/ESMO стандарт for нерезектабельний mCRC responders. CAIRO3 (Simkens 2015 Lancet) усталений капецитабін + бевацизумаб підтримка superiority over observation (mPFS 8.5 проти 4.1 міс.); AIO 0207 (Hegewisch-Becker 2015) confirmed бевацизумаб ± fluoropyrimidine підтримка vs full pause. підтримка drug типово капецитабін + бевацизумаб OR 5FU/LV + бевацизумаб; full FOLFOX/FOLFIRI is NOT continued as підтримка (cumulative нейропатія/діарея). Reintroduction of оксаліплатин/іринотекан upon прогресування is стандарт. STUB схема — ні dedicated REG- сутність for капецитабін+bev підтримка yet; flagged for REG спостереження.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-COLON-2025
    position: supports
    relevant_quote_paraphrase: After 4-6 mo of 1L doublet + bev induction with response/SD, de-escalation to fluoropyrimidine + bevacizumab maintenance is preferred to limit cumulative oxaliplatin neuropathy
  - source_id: SRC-ESMO-COLON-2024
    position: supports
    relevant_quote_paraphrase: Maintenance with 5FU/capecitabine + bevacizumab after induction response is recommended for unresectable mCRC; full doublet continuation is not advised due to toxicity
known_controversies:
  - topic: Maintenance vs full pause (chemo holiday) after induction response in mCRC
    positions:
      - position: Active maintenance — PFS gain (CAIRO3, AIO 0207)
        sources:
          - SRC-NCCN-COLON-2025
      - position: Full pause acceptable for selected patients with deep response — improved QoL
        sources:
          - SRC-ESMO-COLON-2024
        evidence_note: OPTIMOX trials suggested feasibility of stop-and-go strategy
    our_default: Active maintenance (capecitabine + bevacizumab) for fit patients with adequate response; full pause for frail / patient preference / deep CR
    rationale: PFS gain modest but QoL/neuropathy avoidance vs continued doublet is the dominant consideration
do_not_do:
  - НЕ продовжувати full FOLFOX як maintenance — cumulative oxaliplatin neuropathy >7-12 мг/м² є irreversible у >30% пацієнтів.
  - НЕ продовжувати irinotecan-base maintenance — diarrhea cumulative ризик; бажаний switch до fluoropyrimidine + bev.
  - НЕ припиняти bevacizumab без причини — meta-analysis підтверджує PFS внесок під час maintenance.
  - НЕ ігнорувати протеїнурію + гіпертензію moнitоринг — bev-class effect триває впродовж maintenance.
  - НЕ continued bev при non-healing wound, GI fistula, або recent major surgery — hold ≥4 тижні.
  - НЕ забути screening для аневризм + arterial thromboembolism у пацієнтів старше 65.
