id: IND-OVARIAN-MAINT-PARPI-RUCAPARIB
plan_track: aggressive

applicable_to:
  disease_id: DIS-OVARIAN
  line_of_therapy: 2
  stage_requirements:
    - "Recurrent platinum-sensitive ovarian / fallopian tube / primary peritoneal cancer"
    - "Post-platinum reinduction CR or PR"
    - "≥2 prior platinum-containing lines"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-RUCAPARIB-MAINT-OVARIAN
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "Maintenance — measured by PFS not response"
  progression_free_survival: "BRCA-mut mPFS 16.6 vs 5.4 mo (ARIEL3, HR 0.23); HRD+ 13.6 vs 5.4 mo (HR 0.32); ITT 10.8 vs 5.4 mo (HR 0.36)"
  overall_survival_5y: "ARIEL3 final OS analysis (Coleman 2022) — no significant OS benefit overall, signals in BRCA-mut subset"

hard_contraindications: []
red_flags_triggering_alternative: []

required_tests:
  - TEST-CBC
desired_tests:
  - TEST-GERMLINE-BRCA-PANEL

rationale: >
  Rucaparib maintenance after platinum reinduction CR/PR in recurrent
  platinum-sensitive ovarian (≥2 prior platinum lines per ARIEL3
  eligibility). Alternative third PARPi option, particularly for
  patients intolerant to olaparib (anemia) or niraparib
  (thrombocytopenia). Indication is biomarker-agnostic (active in
  BRCA-mut, HRD+, and ITT all-comers) but benefit greatest with
  BRCA1/2 mutations.

sources:
  - source_id: SRC-NCCN-OVARIAN-2025
    position: supports
  - source_id: SRC-ESMO-OVARIAN-2024
    position: supports
  - source_id: SRC-ARIEL3-CORALEZA-2017
    position: supports

do_not_do:
  - "Do NOT start without confirmed CR or PR to platinum reinduction"
  - "Do NOT mistake the rucaparib transporter-mediated creatinine elevation for true nephrotoxicity (non-progressive, not a reason to stop)"
  - "Do NOT continue through Grade 3 ALT/AST elevation with bilirubin >2× ULN — hold and dose-reduce"
  - "Do NOT skip pre-treatment counseling on MDS/AML risk (PARPi class effect)"

last_reviewed: "2026-04-27"
reviewer_signoffs: 0
notes: "ESCAT IA. UA-access: rucaparib not registered as of 2026-04 — олапариб (BRCA-mut) і нірапариб (HRD+) є реалістичні UA-доступні альтернативи."
