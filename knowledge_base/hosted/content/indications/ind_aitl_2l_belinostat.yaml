id: IND-AITL-2L-BELINOSTAT
plan_track: standard

applicable_to:
  disease_id: DIS-AITL
  line_of_therapy: 2
  stage_requirements:
    - "Relapsed/refractory after ≥1 prior systemic line (CHOEP / CHP-Bv / R-CHOP-equivalent)"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-BELINOSTAT-PTCL
concurrent_therapy: []
followed_by: []

evidence_level: moderate
strength_of_recommendation: conditional
nccn_category: "2A"

expected_outcomes:
  overall_response_rate: "~26% overall (BELIEF); higher in AITL subset (~46%)"
  complete_response: "~11%"
  progression_free_survival: "Median PFS ~1.6 mo overall; mDOR for responders ~13.6 mo"
  overall_survival_5y: "~25-30% (heavily pretreated cohort baseline poor)"

hard_contraindications: []
red_flags_triggering_alternative:
  - RF-AITL-AUTOIMMUNE-CYTOPENIA
  - RF-AITL-EBV-DRIVEN-B-CELL

