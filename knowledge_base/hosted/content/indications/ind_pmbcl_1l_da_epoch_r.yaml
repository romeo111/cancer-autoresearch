id: IND-PMBCL-1L-DA-EPOCH-R
plan_track: standard
applicable_to:
  disease_id: DIS-PMBCL
  line_of_therapy: 1
  stage_requirements: []
  biomarker_requirements_required:
    - biomarker_id: BIO-CD20-IHC
      required: true
      value_constraint: positive
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2
recommended_regimen: REG-DA-EPOCH-R
concurrent_therapy: []
followed_by: []
evidence_level: high
strength_of_recommendation: strong
nccn_category: '1'
expected_outcomes:
  overall_response_rate: ~95%
  complete_response: ~80-85% (PET-CT verified)
  progression_free_survival: 5-year PFS ~93% (NCI 2013)
  overall_survival_5y: ~95%
hard_contraindications:
  - CI-HBV-NO-PROPHYLAXIS
  - CI-LVEF-LOW-FOR-ANTHRACYCLINE
red_flags_triggering_alternative: []
required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-LDH
  - TEST-B2-MICROGLOBULIN
  - TEST-HBV-SEROLOGY
  - TEST-HCV-ANTIBODY
  - TEST-HIV-SEROLOGY
  - TEST-CD20-IHC
  - TEST-PET-CT
  - TEST-ECHO
  - TEST-LN-EXCISIONAL-BIOPSY
  - TEST-PREGNANCY
desired_tests: []
rationale: 'DA-EPOCH-R — preferred 1L per NCCN (Cat 1) на основі NCI single-arm study (Dunleavy 2013, ~95% PFS). Уникає необхідності consolidation RT у більшості пацієнтів (PET-negative після induction). Краще ніж R-CHOP+RT для bulky mediastinal disease, особливо в young жінок, яким хочемо уникнути mediastinal RT (carcinogenesis ризик молочної залози).

  '
rationale_ua: >
  DA-EPOCH-R — переважний 1L per NCCN (Cat 1) на основі NCI single-arm дослідження (Dunleavy 2013, ~95% PFS). Уникає необхідності консолідація RT у більшості пацієнтів (PET-negative після індукція). Краще ніж R-CHOP+RT для bulky mediastinal хвороба, особливо в young жінок, яким хочемо уникнути mediastinal RT (carcinogenesis ризик молочної залози).
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: DA-EPOCH-R is the preferred 1L regimen for PMBCL (Category 1)
  - source_id: SRC-ESMO-DLBCL-2024
    position: supports
    relevant_quote_paraphrase: ESMO 2024 (DLBCL guideline §PMBCL) endorses DA-EPOCH-R as preferred 1L for PMBCL; R-CHOP + RT alternative when DA-EPOCH-R not feasible
known_controversies:
  - topic: DA-EPOCH-R vs R-CHOP-21 + consolidation RT
    positions:
      - position: DA-EPOCH-R preferred — best PFS, RT-sparing
        sources:
          - SRC-NCCN-BCELL-2025
      - position: R-CHOP + RT acceptable якщо DA-EPOCH-R недоступний
        sources:
          - SRC-NCCN-BCELL-2025
    our_default: DA-EPOCH-R якщо центр має досвід infusional dose-adjusting; R-CHOP + RT як альтернатива
do_not_do:
  - Не призначати mediastinal RT молодим жінкам без чітких показань — кумулятивний ризик breast cancer + cardiac late effects.
  - Не починати без HBV скринінгу — реактивація на rituximab фатальна.
  - Не вводити вінкристин інтратекально — фатально.
  - Не нехтувати 6-cycle minimum — недостатня доза знижує cure rate.
  - Не ігнорувати baseline ECG/echo — anthracycline-induced cardiomyopathy незворотна.
time_critical: false
last_reviewed: '2026-04-27'
reviewer_signoffs: 0
notes: 'STUB — pending Clinical Co-Lead approval. End-of-induction PET-CT визначає чи потрібна consolidation RT (Deauville 4-5 → RT; 1-3 → no RT).

  '
