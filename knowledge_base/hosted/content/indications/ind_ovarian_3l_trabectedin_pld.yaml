id: IND-OVARIAN-3L-TRABECTEDIN-PLD
plan_track: aggressive

applicable_to:
  disease_id: DIS-OVARIAN
  line_of_therapy: 3
  stage_requirements:
    - "Recurrent epithelial ovarian / fallopian tube / primary peritoneal cancer"
    - "Partially platinum-sensitive (PFI 6-12 months) preferred per OVA-301 subgroup analysis OR re-platinum undesirable (cumulative neuropathy, hypersensitivity)"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-TRABECTEDIN-PLD-OVARIAN
concurrent_therapy: []
followed_by: []

evidence_level: moderate
strength_of_recommendation: conditional
nccn_category: "2A"

expected_outcomes:
  overall_response_rate: "27.6% (OVA-301 vs 18.8% PLD alone, p=0.008)"
  progression_free_survival: "Overall mPFS 7.3 vs 5.8 mo (OVA-301, HR 0.79); partially-platinum-sensitive subgroup 7.4 vs 5.5 mo (HR 0.65)"
  overall_survival_5y: "Partially-platinum-sensitive subgroup mOS 23.0 vs 17.1 mo (HR 0.59)"

hard_contraindications: []
red_flags_triggering_alternative:
  - RF-OVARIAN-FRAILTY-AGE

required_tests:
  - TEST-CBC
desired_tests: []

rationale: >
  Trabectedin + PLD per OVA-301 — third-line option when re-platinum is
  undesirable in partially-platinum-sensitive (PFI 6-12 mo) recurrent
  ovarian. Largest OVA-301 benefit observed in this subgroup. Useful
  when patient cannot tolerate further platinum (cumulative neuropathy,
  hypersensitivity, marrow exhaustion).

sources:
  - source_id: SRC-NCCN-OVARIAN-2025
    position: supports
  - source_id: SRC-ESMO-OVARIAN-2024
    position: supports
  - source_id: SRC-OVA-301-MONK-2010
    position: supports

do_not_do:
  - "Do NOT initiate without central venous access — trabectedin is mandatory central-line administration"
  - "Do NOT skip mandatory dexamethasone 20 mg IV pre-trabectedin (hepatoprotective + antiemetic)"
  - "Do NOT exceed cumulative anthracycline 550 mg/m² lifetime — track exposure"
  - "Do NOT use in severe hepatic impairment (bilirubin > ULN)"
  - "Do NOT co-administer strong CYP3A4 inhibitors (ketoconazole, ritonavir) or inducers (rifampin)"

last_reviewed: "2026-04-27"
reviewer_signoffs: 0
notes: "ESCAT IIA. UA-access: trabectedin not registered as of 2026-04; PLD здебільшого OOP. Доступ через клінічне дослідження або благодійний імпорт."
