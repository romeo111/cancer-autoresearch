id: IND-MF-MAINTENANCE-RETINOID
plan_track: standard

applicable_to:
  disease_id: DIS-MF-SEZARY
  line_of_therapy: 2
  stage_requirements:
    - "Advanced MF (IIB+) or Sézary syndrome IN RESPONSE (CR or PR) after induction systemic therapy"
    - "Induction may be bexarotene full-dose, mogamulizumab, brentuximab vedotin, or other"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 3

recommended_regimen: REG-BEXAROTENE-MAINTENANCE-CTCL
concurrent_therapy: []
followed_by: []

evidence_level: moderate
strength_of_recommendation: conditional
nccn_category: "2A"

expected_outcomes:
  overall_response_rate: "Maintenance setting — extends pre-existing CR/PR"
  complete_response: "Sustains; rare deepening"
  progression_free_survival: "Extends median PFS by ~6-12 months over surveillance in responders"
  overall_survival_5y: "Highly variable — chronic disease; many continue indefinitely on maintenance"

hard_contraindications: []
red_flags_triggering_alternative: []

required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-SEZARY-COUNT
  - TEST-PREGNANCY  # ongoing if women of childbearing potential
desired_tests: []
# Note: ongoing fasting lipid panel + TSH/free T4 q3 months are mandatory
# practical monitoring (no dedicated TEST entity in KB) — see do_not_do.

rationale: >
  Low-dose bexarotene maintenance (75-150 mg/m² PO daily) extends
  responses in advanced MF/Sézary after induction systemic therapy.
  Mechanism: continuous RXR-driven differentiation pressure prevents
  re-emergence of malignant T-cell clone. Same drug as 2L induction
  but at lower dose — dominant practical concern shifts from acute
  triglyceride/thyroid management to long-term supply continuity
  (UA access barrier) and ongoing teratogenicity precautions.
  Continuation indefinite while in response and tolerable; abrupt
  cessation risks rapid relapse.

rationale_ua: >
  Low-доза bexarotene підтримка (75-150 mg/m² PO daily) extends responses in поширений MF/Sézary after індукція systemic терапія. Mechanism: continuous RXR-driven differentiation pressure prevents re-emergence of malignant T-cell clone. Same drug as 2L індукція but at lower доза — dominant practical concern shifts from acute triglyceride/thyroid management to long-term supply continuity (UA access barrier) and ongoing teratogenicity precautions. Continuation indefinite while in відповідь and tolerable; abrupt cessation risks rapid рецидив.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: "Maintenance bexarotene at low dose extends responses in advanced CTCL after induction"
  - source_id: SRC-ESMO-CTCL-2024
    position: supports
    relevant_quote_paraphrase: "Low-dose retinoid maintenance is recognized strategy for sustaining response in advanced MF/Sézary"

known_controversies:
  - topic: "Maintenance vs surveillance after CR/PR to systemic therapy"
    positions:
      - position: "Maintenance — extends PFS, well-tolerated at low dose"
        sources: [SRC-NCCN-BCELL-2025]
      - position: "Surveillance — patient preference, avoid drug toxicity, restart on relapse"
        sources: [SRC-ESMO-CTCL-2024]
    our_default: "Maintenance for patients with rapid relapse risk (Sézary syndrome, prior multiple relapses); surveillance acceptable for first deep CR in early-advanced disease"

do_not_do:
  - "НЕ припиняти раптово — relapse ризик."
  - "НЕ нехтувати ongoing TG + TSH monitoring — комплікації long-term навіть при low dose."
  - "НЕ нехтувати ongoing contraception counseling у women of childbearing potential."
  - "НЕ дозволяти supply gaps — abrupt cessation risks rapid relapse; secure international supply continuity."
  - "НЕ комбінувати з vitamin A supplements."
  - "НЕ забути про skin cancer surveillance у MF pts на retinoid long-term."

time_critical: false
last_reviewed: "2026-04-27"
reviewer_signoffs: 0
notes: >
  STUB. Maintenance applicable across induction backbones (post-bexarotene
  full-dose, post-mogamulizumab, post-BV). Major UA access barrier —
  supply continuity is critical operational concern.
