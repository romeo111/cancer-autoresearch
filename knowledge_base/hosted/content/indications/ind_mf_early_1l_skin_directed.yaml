id: IND-MF-EARLY-1L-SKIN-DIRECTED
plan_track: standard

applicable_to:
  disease_id: DIS-MF-SEZARY
  line_of_therapy: 1
  stage_requirements: ["IA", "IB", "IIA"]  # early-stage MF — skin-only / nodal-low
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints: {ecog_max: 3}

recommended_regimen:       # skin-directed = NBUVB / topicals / TSEBT, not a drug regimen
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "~80-90% (skin-directed for IA-IIA)"
  complete_response: "~50-70% (varies by modality + extent)"
  progression_free_survival: "Median PFS years; many never progress past skin-directed era"
  overall_survival_5y: ">90% IA; ~85% IIA"

hard_contraindications: []
red_flags_triggering_alternative: [RF-MF-SEZARY-LEUKEMIC, RF-MF-LARGE-CELL-TRANSFORMATION]

required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-LDH
  - TEST-SEZARY-COUNT  # rule out occult B2 — would upstage
  - TEST-TCR-CLONALITY  # confirm clonal disease + correlate skin/blood
  - TEST-FLOW-CYTOMETRY  # rule out occult blood involvement
  - TEST-CD20-IHC  # rule out B-cell secondary
  - TEST-PET-CT  # rule out occult nodal disease
desired_tests: []

rationale: >
  Early-stage MF (IA-IIA per ISCL/EORTC TNMB) — skin-directed first-line
  is curative-intent for IA, durable disease control for IB-IIA. Modalities:
  topical corticosteroids (potent class for plaques), narrow-band UVB (NBUVB)
  for thin patches, PUVA for thicker plaques, total skin electron beam therapy
  (TSEBT) for diffuse extensive disease, topical nitrogen mustard / bexarotene gel.
  Selection by extent + thickness + dermatology resource. Skin-directed avoids
  systemic immunosuppression and preserves systemic therapy options for
  progression. Workup must rule out occult B2 (Sézary count) and LCT before
  committing — both upstage to advanced + systemic-first.

rationale_ua: >
  ранньої стадії MF (IA-IIA per ISCL/EORTC TNMB) — skin-directed перша лінія is curative-intent for IA, durable контроль хвороби for IB-IIA. Modalities: topical corticosteroids (potent class for plaques), narrow-band UVB (NBUVB) for thin patches, PUVA for thicker plaques, total skin electron beam терапія (TSEBT) for diffuse extensive хвороба, topical nitrogen mustard / bexarotene gel. Selection by extent + thickness + dermatology resource. Skin-directed avoids systemic immunosuppression and preserves systemic терапія options for прогресування. обстеження must виключити occult B2 (Sézary count) and LCT before committing — both upstage to поширений + systemic-first.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources: [{source_id: SRC-NCCN-BCELL-2025, position: supports}]
known_controversies:
  - topic: "TSEBT vs combined NBUVB + topicals for IB-IIA generalized patch/plaque"
    positions:
      - position: "TSEBT — single course, durable response, retreatable"
        sources: [SRC-NCCN-BCELL-2025]
      - position: "Sequential NBUVB + topicals — preserves TSEBT for later progression"
        sources: [SRC-NCCN-BCELL-2025]
    our_default: "Sequential approach for IA-IB; TSEBT for extensive IIA or rapid response need"

do_not_do:
  - "НЕ розпочинати системну хіміотерапію у IA-IIA — не подовжує OS, додає токсичність + втрачає options для прогресування."
  - "НЕ пропускати Sezary count + TCR clonality в blood — окультний B2 апстейджить, протипоказує skin-directed alone."
  - "НЕ застосовувати NBUVB при photosensitivity (lupus, porphyria) — використовуйте topical alternatives."
  - "НЕ забувати про skin-cancer screening — MF + skin-directed підвищує ризик BCC/SCC pожиттєво."
  - "НЕ інтерпретувати progression як failure — рестадіювати TNMB; зміна T+N+M+B може дати інший лінк до системи."

time_critical: false
last_reviewed: "2026-04-25"
reviewer_signoffs: 0
notes: STUB. Skin-directed no-regimen track for early-stage MF; routes to systemic on B2/LCT triggers.
