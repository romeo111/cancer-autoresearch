id: IND-BREAST-HR-POS-MAINT-CDK46I
plan_track: standard
applicable_to:
  disease_id: DIS-BREAST
  line_of_therapy: 1
  stage_requirements:
  - "HR+/HER2- advanced or metastatic breast cancer"
  - "Continuous combination beyond initial response (CDK4/6i + endocrine therapy is continuous, not induction-maintenance)"
  - "Achieved ≥SD/PR on letrozole + palbociclib (or ribociclib / abemaciclib) 1L"
  biomarker_requirements_required:
  - biomarker_id: BIO-ESTROGEN-RECEPTOR
    required: true
    value_constraint: "ER positive (≥1% by IHC)"
  - biomarker_id: BIO-HER2-SOLID
    required: true
    value_constraint: "HER2 negative (IHC 0-1+ OR IHC 2+ FISH-negative)"
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2
recommended_regimen: REG-AI-PALBOCICLIB
concurrent_therapy: []
followed_by:
- IND-BREAST-HR-POS-3L-POST-CDK46I-POST-AKT
evidence_level: high
strength_of_recommendation: strong
nccn_category: '1'
expected_outcomes:
  overall_response_rate: ~55% during initial response phase (PALOMA-2 / MONALEESA-2)
  complete_response: ~5%
  progression_free_survival: Median PFS 27.6 mo palbo+letro (PALOMA-2 Finn 2016/Rugo 2019), 25.3 mo ribo+letro
    (MONALEESA-2)
  overall_survival_5y: OS benefit confirmed for ribociclib (MONALEESA-2 OS HR 0.76) + abemaciclib; palbociclib
    OS benefit not statistically significant (PALOMA-2 final OS Finn 2022)
hard_contraindications: []
red_flags_triggering_alternative:
- RF-BREAST-TRANSFORMATION-PROGRESSION
required_tests:
- TEST-CBC
- TEST-CMP
- TEST-LFT
- TEST-CT-CHEST-ABDOMEN-PELVIS
- TEST-ECHO
- TEST-ER-PR-IHC
- TEST-HER2-IHC-FISH
desired_tests: []
rationale: 'CDK4/6 inhibitor (palbociclib / ribociclib / abemaciclib) + aromatase inhibitor combination continued
  until progression is the 1L standard for HR+/HER2- advanced breast cancer (postmenopausal or with ovarian
  suppression). Three pivotal trials: PALOMA-2 (palbo+letrozole; Finn 2016; mPFS 27.6 vs 14.5 mo), MONALEESA-2
  (ribo+letrozole; Hortobagyi 2018/2022; mPFS 25.3 vs 16.0 mo, mOS 63.9 vs 51.4 mo), MONARCH-3 (abema+anastrozole/letrozole;
  Goetz 2017; mPFS 28.2 vs 14.8 mo). At progression: switch to fulvestrant + alpelisib (PIK3CA mut, SOLAR-1)
  OR fulvestrant + capivasertib (CAPItello-291) OR everolimus + exemestane (BOLERO-2). Sacituzumab govitecan
  (TROPiCS-02) and T-DXd (DESTINY-Breast06) are emerging post-endocrine ADC options.'
sources:
- source_id: SRC-NCCN-BREAST-2025
  position: supports
  relevant_quote_paraphrase: CDK4/6i + AI is Category 1 preferred 1L for HR+/HER2- metastatic breast cancer
    in postmenopausal (or premenopausal + OFS) patients per PALOMA-2, MONALEESA-2, MONARCH-3
- source_id: SRC-ESMO-BREAST-METASTATIC-2024
  position: supports
  relevant_quote_paraphrase: CDK4/6i + AI is the ESMO-MCBS preferred 1L combination; ribociclib + abemaciclib
    have OS benefit; palbociclib has PFS-only benefit
known_controversies:
- topic: Palbociclib vs ribociclib vs abemaciclib for 1L HR+/HER2- mBC
  positions:
  - position: Palbociclib — most prescribed historically, well-tolerated, PFS-only benefit (no OS)
    sources:
    - SRC-NCCN-BREAST-2025
  - position: Ribociclib — OS benefit demonstrated (MONALEESA-2/3/7), but QTc/hepatic monitoring required
    sources:
    - SRC-ESMO-BREAST-METASTATIC-2024
    evidence_note: MONALEESA-2 mOS 63.9 vs 51.4 mo (HR 0.76)
  - position: Abemaciclib — OS benefit (MONARCH-3 immature; MONARCH-2 in 2L confirmed); GI toxicity higher
    sources:
    - SRC-NCCN-BREAST-2025
  our_default: Ribociclib OR abemaciclib for OS benefit; palbociclib if QTc/hepatic concerns or GI tolerability
    issues
  rationale: All Cat 1; OS data favors ribo/abema; toxicity profiles drive individualization
do_not_do:
- "НЕ продовжувати CDK4/6i при ≥grade 3 neutropenia без dose-reduction — palbo: 1° dose 125 mg → 100 → 75 mg."
- НЕ призначати ribociclib без baseline ECG + electrolyte panel — QTcF >450 ms є exclusion; periodic ECGs
  під час cycles 1-2.
- НЕ використовувати CDK4/6i при незаплановній вагітності — teratogenic; premenopausal вимагають OFS + ефективна
  contraception.
- НЕ ігнорувати diarrhea з abemaciclib — proactive loperamide + dose-reduce обов'язково.
- НЕ комбінувати з сильними CYP3A4 інгібіторами без dose-adjust (≈50% зниження дози).
- НЕ зупиняти CDK4/6i при isolated PSA-equivalent biomarker rise — repeat imaging для real progression confirmation.
time_critical: false
last_reviewed: '2026-04-27'
