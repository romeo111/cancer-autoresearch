rationale: 'Standard 1L for AML patients NOT fit for intensive 7+3 induction (typically age ≥75, or ≥65 with HCT-CI ≥3, or
  ECOG ≥2 with multiple comorbidities). Venetoclax + azacitidine per VIALE-A: median OS 14.7 vs 9.6 mo with aza alone. TLS
  prophylaxis with allopurinol + hydration MANDATORY for first ramp cycle (3-day accelerated ramp: 100 → 200 → 400 mg). Long
  cytopenia windows are expected — G-CSF for febrile neutropenia, antimicrobial prophylaxis, attenuated venetoclax duration
  in subsequent cycles per institutional protocol.

  '
sources:
- source_id: SRC-NCCN-AML-2025
  position: supports
  relevant_quote_paraphrase: Venetoclax + azacitidine is preferred 1L for AML unfit for intensive induction
- source_id: SRC-VIALE-A-DINARDO-2020
  position: supports
  relevant_quote_paraphrase: 'VIALE-A: ven+aza vs aza alone in unfit AML; median OS 14.7 vs 9.6 mo (HR 0.66)'
- source_id: SRC-ELN-AML-2022
  position: supports
  relevant_quote_paraphrase: Ven+aza is the new standard for unfit-AML 1L per ELN 2022
do_not_do:
- Не пропускати 3-денний venetoclax ramp + TLS-профілактику — описані фатальні TLS випадки при пропусканні rampu.
- Не використовувати повну дозу venetoclax (400 мг) при сильному CYP3A4-інгібіторі (азол) — потрібна редукція до ~70-100 мг.
- Не пропускати HBV скринінг + профілактику — реактивація на HMA + venetoclax описана.
- Не очікувати швидку відповідь — азацитидин потребує 4-6 циклів; не припиняти раніше при відсутності прогресії.
- Не пропускати G-CSF при фебрильній нейтропенії — кумулятивні цитопенії очікувані; антимікробна профілактика обов'язкова.
known_controversies:
- topic: Ven+aza vs intensive induction at the borderline (age 70-75, ECOG 1-2, modest comorbidity)
  positions:
  - position: Intensive induction has higher CR rate + curative potential if alloHCT available — preferred for borderline-fit
      patients
    sources:
    - SRC-NCCN-AML-2025
  - position: Ven+aza has lower TRM and comparable OS in elderly even if intensification possible
    sources:
    - SRC-ELN-AML-2022
  our_default: Geriatric assessment + HCT-CI + patient preference → ven+aza in borderline-fit; document the decision rationale
  rationale: 'Borderline cases: shared decision.'
time_critical: false
last_reviewed: '2026-04-26'
reviewers: []
reviewer_signoffs: 1
notes: 'Standard track for AML 1L unfit. Curative potential limited (median OS ~14 months); a subset (~25-30%) achieves durable
  remission lasting 1-3 years. AlloHCT generally off the table for this group, though CR1 → reduced-intensity conditioning
  alloHCT is occasionally pursued in borderline cases. STUB — requires clinical co-lead signoff.

  '
