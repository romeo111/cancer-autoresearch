id: IND-AML-1L-VEN-AZA
plan_track: standard
applicable_to:
  disease_id: DIS-AML
  line_of_therapy: 1
  stage_requirements: []
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    fit_for_intensive_chemo: false
recommended_regimen: REG-VEN-AZA-AML
concurrent_therapy: []
followed_by: []
evidence_level: high
strength_of_recommendation: strong
nccn_category: '1'
expected_outcomes:
  overall_response_rate: '~60-70% composite CR + CRi (VIALE-A: 66.4% vs 28.3% with aza alone)'
  complete_response: ~37% CR (VIALE-A)
  progression_free_survival: Median ~14.7 months OS (VIALE-A; vs 9.6 mo aza alone)
  overall_survival_5y: <10% (cumulative; ~25-30% achieve durable remission lasting 1-3 years)
hard_contraindications: []
red_flags_triggering_alternative:
- RF-AML-EMERGENCY-TLS-LEUKOSTASIS
- RF-AML-INFECTION-SCREENING
