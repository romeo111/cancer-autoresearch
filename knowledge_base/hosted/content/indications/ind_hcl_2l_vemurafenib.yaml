id: IND-HCL-2L-VEMURAFENIB
plan_track: standard
applicable_to:
  disease_id: DIS-HCL
  line_of_therapy: 2
  stage_requirements:
    - Relapsed / refractory after 1L purine analog (cladribine or pentostatin)
    - BRAF-V600E mutation positive (~95% of classic HCL)
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 3
recommended_regimen: REG-VEMURAFENIB-HCL-RELAPSED
concurrent_therapy: []
followed_by: []
evidence_level: moderate
strength_of_recommendation: strong
nccn_category: 2A
expected_outcomes:
  overall_response_rate: ~96% (Tiacci 2021 NEJM vemurafenib + rituximab in r/r HCL)
  complete_response: ~87% CR; ~65% MRD-negative
  progression_free_survival: Median PFS not reached at 4-year follow-up
  overall_survival_5y: ~95%
hard_contraindications:
  - CI-HBV-NO-PROPHYLAXIS
red_flags_triggering_alternative:
  - RF-HCL-FRAILTY-AGE
required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-HBV-SEROLOGY
  - TEST-CD20-IHC
  - TEST-BM-ASPIRATE
  - TEST-BM-TREPHINE
  - TEST-DERMATOSCOPY
desired_tests: []
rationale: 'Vemurafenib (BRAF-V600E inhibitor) + rituximab is preferred 2L for relapsed/refractory classic HCL with BRAF-V600E mutation (~95% of cases). Tiacci 2021 NEJM phase 2 trial: vemurafenib + rituximab achieved CR ~87% with MRD-negativity ~65% in r/r HCL — substantially superior to vemurafenib monotherapy (CR ~35%). Targeted, chemo-free option preferred over re-treatment with purine analogs (cumulative myelosuppression + immunosuppression). For BRAF-WT HCL-variant: alternative pathway (rituximab + cladribine, moxetumomab pasudotox).'
rationale_ua: >-
  вемурафеніб (BRAF-V600E інгібітор) + ритуксимаб is переважний 2L for рецидивний/рефрактерний classic HCL with BRAF-V600E мутація (~95% of cases). Tiacci 2021 NEJM фаза 2 дослідження: вемурафеніб + ритуксимаб achieved CR ~87% with МЗХ-negativity ~65% in р/р HCL — substantially перевершує вемурафеніб монотерапія (CR ~35%). Targeted, chemo-free option переважний over re-лікування with purine analogs (cumulative myelosuppression + immunosuppression). For BRAF-WT HCL-варіант: alternative pathway (ритуксимаб + кладрибін, моксетумомаб пасудотокс).
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: Vemurafenib + rituximab is preferred 2L for relapsed/refractory BRAF-V600E classic HCL (Tiacci 2021 evidence)
  - source_id: SRC-MOZ-UA-LYMPH-2013
    position: context
    relevant_quote_paraphrase: МОЗ 2013 протокол передує сучасним BRAF-таргет терапіям; HCL relapse historically managed with purine analog re-treatment — потребує оновлення
known_controversies:
  - topic: Vemurafenib + rituximab vs purine analog re-treatment for r/r HCL
    positions:
      - position: Vemurafenib + rituximab — chemo-free, deeper response, MRD-negative achievable
        sources:
          - SRC-NCCN-BCELL-2025
      - position: Cladribine + rituximab — cheaper, established, available without genotype
        sources:
          - SRC-NCCN-BCELL-2025
        evidence_note: Effective but cumulative myelosuppression with re-treatment
    our_default: Vemurafenib + rituximab for BRAF-V600E HCL with funding pathway; cladribine + rituximab when vemurafenib access blocked
    rationale: Vemurafenib not НСЗУ-reimbursed for HCL in Ukraine — purine analog often default by access
do_not_do:
  - НЕ призначати vemurafenib без BRAF-V600E підтвердження — паттерн toxicity без benefit.
  - НЕ ігнорувати cutaneous toxicity (rash, photosensitivity, secondary skin cancers) — dermatology surveillance кожні 3-6 міс.
  - НЕ забувати про QT-prolongation моніторинг — ECG baseline + during therapy.
  - НЕ використовувати у HCL-variant (BRAF-WT) — alternative pathway needed.
  - НЕ розпочинати без HBV screening при додаванні rituximab.
time_critical: false
last_reviewed: '2026-04-27'
reviewers: []
reviewer_signoffs: 0
notes: 'Standard-track 2L HCL for BRAF-V600E classic HCL. Drug entity for vemurafenib NOT yet in KB drugs/ — flagged for promotion when broader BRAF coverage opens. UA access barrier: vemurafenib registered for melanoma but not separately НСЗУ-funded for HCL. BRAF-WT HCL-variant routes to alternative algorithm.'
