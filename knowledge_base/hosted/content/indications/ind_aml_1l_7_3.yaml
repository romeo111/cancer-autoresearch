rationale: >
  Aggressive 1L for fit AML patients (typically age <70-75, ECOG ≤2,
  HCT-CI ≤3, no severe organ dysfunction). 7+3 induction (cytarabine
  100-200 mg/m² CIVI d1-7 + daunorubicin 60-90 mg/m² d1-3 or idarubicin
  12 mg/m² d1-3); add midostaurin d8-21 if FLT3-ITD/TKD+ per RATIFY.
  Day-14 BM check; re-induction if blasts persist. Consolidation HiDAC
  3 g/m² q12h d1, 3, 5 × 3-4 cycles for younger fit; alloHCT in CR1
  for adverse-risk per ELN 2022 + donor availability.

rationale_ua: >
  агресивний 1L for fit AML patients (типово age <70-75, ECOG ≤2, HCT-CI ≤3, ні severe organ dysfunction). 7+3 індукція (цитарабін 100-200 mg/m² CIVI d1-7 + daunorubicin 60-90 mg/m² d1-3 or idarubicin 12 mg/m² d1-3); add мідостаурин d8-21 if FLT3-ITD/TKD+ per RATIFY. Day-14 BM check; re-індукція if blasts persist. консолідація HiDAC 3 g/m² q12h d1, 3, 5 × 3-4 цикли for younger fit; alloHCT in CR1 for несприятливий-risk per ELN 2022 + donor availability.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-AML-2025
    position: supports
    relevant_quote_paraphrase: "7+3 cytarabine + anthracycline is preferred 1L induction for fit AML; add midostaurin for FLT3-mutated"
  - source_id: SRC-ELN-AML-2022
    position: supports
    relevant_quote_paraphrase: "Standard 1L induction for fit AML patients; risk stratification drives post-CR pathway"
  - source_id: SRC-RATIFY-STONE-2017
    position: supports
    relevant_quote_paraphrase: "Midostaurin added to 7+3 + HiDAC improved 4-y OS in FLT3-ITD/TKD AML"

do_not_do:
  - "Не починати індукцію без baseline echo / LVEF якщо є будь-яка кардіальна підозра — кумулятивна антрациклінова кардіотоксичність може бути фатальною."
  - "Не чекати результат FLT3 щоб почати d1-d7 цитарабін + антрациклін — мідостаурин починається з дня 8, тому індукція не затримується."
  - "Не пропускати TLS-профілактику (алопуринол ± расбуриказа) у пацієнтів з високим WBC або високою активністю пухлини."
  - "Не пропускати HBV/HCV/HIV скринінг до індукції — реактивація HBV на хіміотерапії може бути фатальною."
  - "Не призначати без обговорення фертильності у молодих пацієнтів — анабольсько-індуковані гонадотоксичність часто незворотна."
  - "Не починати без валідованого донорського пошуку для ELN-adverse-ризику пацієнтів — alloHCT-вікно швидко закривається."

known_controversies:
  - topic: "Daunorubicin 60 mg/m² vs 90 mg/m² in younger fit (<60) patients"
    positions:
      - position: "Higher-dose 90 mg/m² daunorubicin improves OS in young fit (ECOG-ALL studies)"
        sources:
          - SRC-NCCN-AML-2025
      - position: "Idarubicin 12 mg/m² is alternative anthracycline of equivalent efficacy with arguably lower cardiotoxicity per dose"
        sources:
          - SRC-ELN-AML-2022
    our_default: "Daunorubicin 60 mg/m² for age 60-65, 90 mg/m² for age <60 fit; idarubicin 12 mg/m² as institutional alternative"
    rationale: "Most data support either; institutional preference + cumulative anthracycline tracking matter most"

time_critical: false
last_reviewed: "2026-04-25"
reviewers: []
reviewer_signoffs: 0
notes: >
  Aggressive track for AML 1L. Fit-vs-unfit triage is the dominant
  decision; ELN 2022 risk stratification drives post-CR1 pathway
  (consolidation HiDAC vs alloHCT). FLT3 status drives addition of
  midostaurin. STUB — requires clinical co-lead signoff.
