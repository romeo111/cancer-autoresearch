rationale: >
  HRD-negative HGSC — carbo+pacli induction × 6, optional bev
  maintenance per ICON-7 / GOG-218 (selected stage III suboptimally
  debulked + stage IV). Niraparib-all-comer maintenance per PRIMA
  trial — modest PFS benefit in HRD-negative subset (~3 mo). NCCN cat 1.

rationale_ua: >
  HRD-negative HGSC — carbo+pacli індукція × 6, опціональний bev підтримка per ICON-7 / GOG-218 (selected stage III suboptimally debulked + stage IV). нірапариб-all-comer підтримка per PRIMA дослідження — modest PFS виграш in HRD-negative subset (~3 міс.). NCCN cat 1.
