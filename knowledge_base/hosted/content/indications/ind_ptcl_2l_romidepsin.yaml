id: IND-PTCL-2L-ROMIDEPSIN
plan_track: standard

applicable_to:
  disease_id: DIS-PTCL-NOS
  line_of_therapy: 2
  stage_requirements:
    - "Relapsed/refractory after ≥1 prior systemic line (CHOEP / CHP-Bv / R-CHOP-equivalent)"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-ROMIDEPSIN-PTCL
concurrent_therapy: []
followed_by: []  # bridge to alloSCT in fit transplant-eligible responders

evidence_level: moderate
strength_of_recommendation: conditional
nccn_category: "2A"

expected_outcomes:
  overall_response_rate: "~25-38% (NCI 1312)"
  complete_response: "~15%"
  progression_free_survival: "Median PFS ~4 mo; mDOR ~17 mo for responders"
  overall_survival_5y: "~25-30% (heavily pretreated baseline)"

hard_contraindications: []
red_flags_triggering_alternative: []

required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-LDH
  - TEST-B2-MICROGLOBULIN
  - TEST-CD20-IHC
  - TEST-PET-CT
  - TEST-LN-CORE-BIOPSY
  - TEST-BM-ASPIRATE
  - TEST-HBV-SEROLOGY
  - TEST-HCV-ANTIBODY
  - TEST-HIV-SEROLOGY
desired_tests: []

rationale: >
  Romidepsin (class I-selective HDAC inhibitor) for r/r PTCL NOS after
  ≥1 prior line. NCI 1312: ORR 25-38%, CR 15%, mDOR 17 mo. NCCN-listed
  despite FDA PTCL indication voluntary withdrawal in 2021 (Ro-CHOEP
  confirmatory trial showed no PFS benefit over CHOP in 1L) —
  withdrawal reasoning applies to 1L combination, not r/r monotherapy.
  Useful bridge to alloSCT consolidation in fit responders or
  last-line option.

rationale_ua: >
  Romidepsin (class I-селективний HDAC інгібітор) for р/р PTCL NOS after ≥1 prior line. NCI 1312: ORR 25-38%, CR 15%, mDOR 17 mo. включений до NCCN despite FDA PTCL показання voluntary withdrawal in 2021 (Ro-CHOEP confirmatory дослідження showed ні PFS виграш over CHOP in 1L) — withdrawal reasoning applies to 1L комбінація, not р/р монотерапія. Useful bridge to алоТГСК консолідація in fit responders or last-line option.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: "Romidepsin is option for r/r PTCL after ≥1 prior line per NCI 1312; Cat 2A; NCCN retains despite FDA indication withdrawal"
  - source_id: SRC-ESMO-PTCL-2024
    position: supports
    relevant_quote_paraphrase: "HDAC inhibitors (romidepsin, belinostat) are recognized 2L+ option for r/r PTCL"

known_controversies:
  - topic: "Romidepsin r/r PTCL — NCCN retention vs FDA withdrawal disconnect"
    positions:
      - position: "Use per NCCN — FDA withdrawal driven by 1L Ro-CHOEP failure, not r/r monotherapy data"
        sources: [SRC-NCCN-BCELL-2025]
      - position: "Avoid given FDA withdrawal optics — choose belinostat (FDA-approved r/r PTCL retained) instead"
        sources: [SRC-NCCN-BCELL-2025]
    our_default: "Acceptable per NCCN-listing; full disclosure to patient about FDA-status nuance"

do_not_do:
  - "НЕ пропускати baseline + serial QTc + correct K/Mg до upper-normal range перед інфузією — romidepsin має cardiac signal."
  - "НЕ комбінувати з QT-prolonging drugs без strict monitoring."
  - "НЕ комбінувати з warfarin без modified INR monitoring — INR rises substantially."
  - "НЕ призначати при concomitant strong CYP3A inhibitor без dose reduction."
  - "НЕ пропускати TLS prophylaxis в high-burden disease."
  - "НЕ забути плану до alloSCT consolidation в fit transplant-eligible responders — HDACi не куративна; bridge."
  - "НЕ призначати без funding pathway clarification — препарат не зареєстрований в Україні."
  - "НЕ переплутати інтра-інфузійні ECG ST/T changes (typically benign) з ішемічними — baseline + serial ECGs."

time_critical: false
last_reviewed: "2026-04-25"
reviewers: []
reviewer_signoffs: 0
notes: >
  STUB — pending Clinical Co-Lead sign-off. Standard-track 2L+ for
  r/r PTCL NOS. NCCN-listed despite FDA PTCL indication withdrawal.
  UA access barrier dominant.
