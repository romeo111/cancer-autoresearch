id: IND-T-PLL-1L-ALEMTUZUMAB
plan_track: standard

applicable_to:
  disease_id: DIS-T-PLL
  line_of_therapy: 1
  stage_requirements: []
  biomarker_requirements_required:
    - biomarker_id: BIO-CD52-IHC
      required: true
      value_constraint: "positive (CD52+) — universal target of alemtuzumab; T-PLL is uniformly CD52-bright"
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 3

recommended_regimen: REG-ALEMTUZUMAB-IV
concurrent_therapy: []
followed_by:
  - "Allo-SCT consolidation у CR1 — myeloablative або RIC conditioning"

evidence_level: high  # despite rare disease — Keating 2002 + Dearden 2011 strong evidence
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "~90%"
  complete_response: "~70-80%"
  progression_free_survival: "Median PFS ~12 months chemo-only; ~36 months з allo-SCT"
  overall_survival_5y: "~10% chemo-only; ~30-40% з allo-SCT у CR1"

hard_contraindications:
  - CI-ACTIVE-INFECTION-FOR-ALEMTUZUMAB
red_flags_triggering_alternative: []

required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-LDH
  - TEST-CMV-SEROLOGY
  - TEST-HBV-SEROLOGY
  - TEST-HCV-ANTIBODY
  - TEST-HIV-SEROLOGY
  - TEST-FLOW-CYTOMETRY
  - TEST-FISH-PANEL  # inv(14), TCL1A
  - TEST-KARYOTYPE
  - TEST-NGS-LYMPHOID-PANEL  # ATM, JAK1/3, STAT5B
  - TEST-BM-ASPIRATE
  - TEST-BM-TREPHINE
  - TEST-PET-CT
  - TEST-CECT-CAP
  - TEST-ECHO
  - TEST-PREGNANCY
desired_tests: []

rationale: >
  Alemtuzumab IV — disease-defining therapy для T-PLL (Keating 2002:
  RR 91% pentostatin-fail pts; Dearden 2011 confirmed 1L superior).
  Без alemtuzumab — chemo-only median OS ~7 months. Allo-SCT —
  єдиний curative option; 5-year OS ~30-40% у allo-SCT pts vs ~10%
  chemo-only. SC alemtuzumab — менш effective; IV preferred.

rationale_ua: >
  Alemtuzumab IV — хвороба-defining терапія для T-PLL (Keating 2002: RR 91% пентостатин-fail pts; Dearden 2011 confirmed 1L перевершує). Без alemtuzumab — chemo-only медіана ЗВ ~7 місяців. Allo-SCT — єдиний curative option; 5-річна ЗВ ~30-40% у allo-SCT pts vs ~10% chemo-only. SC alemtuzumab — менш effective; IV переважний.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: "Alemtuzumab IV is Category 1 1L for T-PLL; allo-SCT consolidation у CR1 preferred for fit"

known_controversies: []

do_not_do:
  - "Не давати SC alemtuzumab — IV суттєво effectivніша для T-PLL."
  - "Не пропускати CMV monitoring weekly — reactivation universal без monitoring."
  - "Не пропускати PJP + HSV prophylaxis ≥6 months після last dose."
  - "Не давати alemtuzumab при active CMV або severe infection."
  - "Не нехтувати allo-SCT donor search одразу після diagnosis у fit pts."
  - "Не давати full premedication — infusion reactions severe без steroids + diphenhydramine."

time_critical: false
last_reviewed: "2026-04-25"
reviewer_signoffs: 0
notes: >
  STUB. T-PLL — дуже rare; refer до tertiary center з allo-SCT capability.
  Alemtuzumab access — bottleneck в Україні (off-label для T-PLL).
