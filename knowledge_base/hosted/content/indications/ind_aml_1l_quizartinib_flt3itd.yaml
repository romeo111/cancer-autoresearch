id: IND-AML-1L-QUIZARTINIB-FLT3ITD
plan_track: aggressive

applicable_to:
  disease_id: DIS-AML
  line_of_therapy: 1
  stage_requirements:
    - "Newly diagnosed FLT3-ITD+ AML"
    - "Fit for intensive 7+3 induction"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2
    age_min: 18
    age_max: 75
    fit_for_intensive_chemo: true

recommended_regimen: REG-QUIZARTINIB-7-3
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "~71.6% CR/CRi (similar between arms; quizartinib effect is on durability + post-CR depth)"
  complete_response: "~54.9% CR (quizartinib arm) vs 55.4% (placebo)"
  progression_free_survival: "EFS HR 0.916 (similar); benefit emerges in maintenance phase"
  overall_survival_5y: "Median OS 31.9 vs 15.1 mo (HR 0.78); 4-y OS ~39% vs ~30%"

hard_contraindications:
  - CI-LVEF-LOW-FOR-ANTHRACYCLINE
red_flags_triggering_alternative:
  - RF-AML-FLT3-ACTIONABLE
  - RF-AML-EMERGENCY-TLS-LEUKOSTASIS
  - RF-AML-INFECTION-SCREENING
  - RF-AML-ORGAN-DYSFUNCTION

required_tests:
  - TEST-CBC
  - TEST-PERIPHERAL-SMEAR
  - TEST-CMP
  - TEST-LFT
  - TEST-LDH
  - TEST-URIC-ACID
  - TEST-COAG-PANEL
  - TEST-HBV-SEROLOGY
  - TEST-HCV-ANTIBODY
  - TEST-HIV-SEROLOGY
  - TEST-BM-ASPIRATE
  - TEST-BM-TREPHINE
  - TEST-FLOW-CYTOMETRY
  - TEST-KARYOTYPE
  - TEST-FISH-PANEL
  - TEST-NGS-MYELOID-PANEL
  - TEST-ECHO
desired_tests:
  - TEST-PREGNANCY

rationale: >
  Quizartinib + standard 7+3 induction + HiDAC consolidation +
  3-year maintenance for newly-dx FLT3-ITD+ AML age 18-75. Pivotal
  QuANTUM-First (Erba et al., Lancet 2023) phase-3 RCT: median OS
  31.9 vs 15.1 mo (HR 0.78, p=0.032) vs placebo+chemo. Approved
  FDA July 2023. Quizartinib is Type-II FLT3 inhibitor — covers
  FLT3-ITD ONLY, NOT FLT3-TKD (D835/I836); for FLT3-TKD or
  combined ITD+TKD, midostaurin (RATIFY) remains the option. QTc
  prolongation requires ACTIVE management: baseline + serial ECG,
  K+ ≥4.0 / Mg++ ≥2.0 BEFORE initiation, AVOID concomitant
  QT-prolonging drugs, dose-reduce 50% with strong CYP3A4
  inhibitors (azoles). AlloHCT in CR1 still recommended for high
  FLT3-allelic-burden / NPM1-wild-type per ELN 2022. Ukraine: not
  registered, major access barrier.

rationale_ua: >
  квізартиніб + стандарт 7+3 індукція + HiDAC консолідація + 3-year підтримка for newly-dx FLT3-ITD+ AML age 18-75. Pivotal QuANTUM-First (Erba et al., Lancet 2023) phase-3 РКД: медіана ЗВ 31.9 проти 15.1 міс. (HR 0.78, p=0.032) vs placebo+chemo. схвалений FDA July 2023. квізартиніб is Type-II FLT3 інгібітор — covers FLT3-ITD ONLY, NOT FLT3-TKD (D835/I836); for FLT3-TKD or combined ITD+TKD, мідостаурин (RATIFY) remains the option. QTc prolongation requires ACTIVE management: базове + serial ECG, K+ ≥4.0 / Mg++ ≥2.0 BEFORE initiation, AVOID concomitant QT-prolonging drugs, доза-зменшити 50% with strong CYP3A4 інгібітори (azoles). AlloHCT in CR1 still рекомендований for high FLT3-allelic-burden / NPM1-wild-type per ELN 2022. Ukraine: not registered, major access barrier.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-AML-2025
    position: supports
    relevant_quote_paraphrase: "Quizartinib + 7+3 + HiDAC + maintenance for newly-dx FLT3-ITD+ AML age 18-75 (Cat 1)"
  - source_id: SRC-QUANTUM-FIRST-ERBA-2023
    position: supports
    relevant_quote_paraphrase: "QuANTUM-First phase-3: quizartinib + chemo vs placebo+chemo; mOS 31.9 vs 15.1 mo (HR 0.78)"
  - source_id: SRC-ELN-AML-2022
    position: supports
    relevant_quote_paraphrase: "FLT3i added to intensive 1L for FLT3-mutated AML — midostaurin (RATIFY) historic; quizartinib emerging for FLT3-ITD specifically"

do_not_do:
  - "НЕ призначати quizartinib для FLT3-TKD (D835/I836) — Type-II інгібітор НЕ покриває TKD; midostaurin або gilteritinib для TKD."
  - "НЕ починати без baseline ECG + corrected K+ ≥4.0 + Mg++ ≥2.0 — torsades + sudden death задокументовано."
  - "НЕ комбінувати з іншими QT-prolonging препаратами (ондансетрон HD, fluconazole, methadone) без активного monitoring."
  - "НЕ призначати повну дозу при concomitant сильному CYP3A4-inhibitor (азол) — редукція 50%."
  - "НЕ ігнорувати alloHCT-pathway для high-allelic-burden FLT3-ITD / NPM1-wt — quizartinib + maintenance НЕ заміна HCT."
  - "НЕ пропускати maintenance phase (3 роки) — survival benefit здебільшого виникає у maintenance."
  - "НЕ пропускати baseline + щоциклова ECHO + cumulative-anthracycline tracking."

known_controversies:
  - topic: "Quizartinib vs midostaurin as 1L FLT3 inhibitor for FLT3-ITD+ AML"
    positions:
      - position: "Quizartinib — selective Type-II for FLT3-ITD; cleaner OS benefit per QuANTUM-First (HR 0.78); 3-year maintenance arm"
        sources: [SRC-QUANTUM-FIRST-ERBA-2023, SRC-NCCN-AML-2025]
      - position: "Midostaurin — broader (covers both FLT3-ITD AND -TKD); more clinical experience; fewer QTc concerns; integrated into standard 1L since RATIFY 2017"
        sources: [SRC-NCCN-AML-2025]
        evidence_note: "No direct RCT quizartinib vs midostaurin. Quizartinib for ITD-dominant; midostaurin for TKD or ITD+TKD."
    our_default: "Quizartinib for confirmed FLT3-ITD+ (TKD-negative); midostaurin for FLT3-TKD or combined ITD+TKD or QTc concerns"
    rationale: "FLT3 mutation subtype dictates choice; cardiac comorbidity tilts toward midostaurin"

time_critical: false
last_reviewed: "2026-04-25"
reviewers: []
reviewer_signoffs: 0
notes: >
  STUB — pending Clinical Co-Lead sign-off. Aggressive-track 1L
  for FLT3-ITD+ AML age 18-75 fit. Replaces midostaurin pathway
  for ITD-dominant disease. AlloHCT in CR1 still considered for
  high-risk subset. Ukraine access barrier (not registered) drives
  practical 1L still toward midostaurin (also unfunded) or
  intensive 7+3 alone.
