  - TEST-NGS-MYELOID-PANEL
desired_tests: []

rationale: >
  Salvage ATRA + ATO for relapsed APL post front-line. APL
  relapses (~5-15% with modern 1L) remain highly chemosensitive —
  re-induction with ATRA + ATO achieves CR in 85-95% per
  Lengfelder et al. Leukemia 2017 multi-center registry. Particularly
  effective when 1L did NOT include ATO (ATRA + chemo / AIDA
  patients) — naive to ATO + retains exquisite sensitivity. For
  patients relapsing AFTER 1L ATRA + ATO, regimen typically
  combines ATRA + ATO + gemtuzumab ozogamicin (separate
  Indication). AutoSCT consolidation for fit molecularly-CR
  responders extends 5-y OS to ~70-80%. AlloHCT reserved for
  molecular non-CR after re-induction OR very-early relapse OR
  multiply-relapsed disease. CRITICAL: differentiation syndrome
  + DIC + QTc prolongation remain dominant safety concerns —
  daily ECG, electrolyte correction, DS prophylaxis with
  dexamethasone, DIC management. ATRA + ATO registered and
  reimbursed in Ukraine — salvage pathway feasible.

sources:
  - source_id: SRC-NCCN-AML-2025
    position: supports
    relevant_quote_paraphrase: "Salvage ATRA + ATO is recommended for relapsed APL; autoSCT consolidation for molecularly-CR responders"
  - source_id: SRC-ELN-APL-2019
    position: supports
    relevant_quote_paraphrase: "ATRA + ATO is recommended salvage induction for relapsed APL; alloHCT for non-CR or multiply-relapsed"
  - source_id: SRC-APL-RELAPSE-LENGFELDER-2017
    position: supports
    relevant_quote_paraphrase: "Multi-center registry: ATRA + ATO salvage CR ~85-95%; autoSCT consolidation extends 5-y OS to ~70-80%"

do_not_do:
  - "НЕ розпочинати без verified PML-RARA molecular relapse — APL relapse часто molecular only (PCR+ MRD); підтвердити перед салважем."
  - "НЕ пропускати DS-профілактику стероїдами при рості WBC — DS-leading-cause-of-death в APL induction."
  - "НЕ розпочинати ATO без daily ECG + електролітної корекції (K+ >4.0, Mg2+ >1.8) — torsades risk."
  - "НЕ ігнорувати DIC management at relapse onset — fibrinogen >150, plt >30-50K."
  - "НЕ забувати autoSCT-pathway для fit molecularly-CR responders — substantially extends OS."
  - "НЕ розглядати alloHCT як 1-st-choice salvage для CR-responders — autoSCT has lower TRM with comparable outcomes."
  - "НЕ продовжувати ATRA + ATO maintenance solely без consolidation autoSCT для fit responders."

known_controversies:
  - topic: "AutoSCT vs ATO + ATRA maintenance alone for molecularly-CR responders post-salvage"
    positions:
      - position: "AutoSCT consolidation — substantially better 5-y OS (~80% vs ~60%) per Lengfelder registry"
        sources: [SRC-APL-RELAPSE-LENGFELDER-2017, SRC-NCCN-AML-2025]
      - position: "ATO + ATRA maintenance alone — avoids HCT TRM; reasonable for older / frail molecularly-CR"
        sources: [SRC-ELN-APL-2019]
        evidence_note: "AutoSCT preferred for fit younger molecularly-CR; maintenance alone for older / unfit"
    our_default: "AutoSCT consolidation for fit molecularly-CR responders <65; ATRA + ATO maintenance for older / unfit"
    rationale: "Fitness drives consolidation strategy"

time_critical: true
last_reviewed: "2026-04-25"
reviewers: []
reviewer_signoffs: 0
