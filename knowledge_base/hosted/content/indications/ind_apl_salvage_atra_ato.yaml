id: IND-APL-SALVAGE-ATRA-ATO
plan_track: aggressive

applicable_to:
  disease_id: DIS-APL
  line_of_therapy: 2
  stage_requirements:
    - "Relapsed APL (PML-RARA confirmed) post front-line therapy (typically post ATRA + chemo / AIDA where ATO not used in 1L; or post 1L ATRA + ATO)"
    - "Eligible for re-induction (ECOG ≤2, no severe organ dysfunction)"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-ATRA-ATO-APL-SALVAGE
concurrent_therapy: []
followed_by: []

evidence_level: moderate
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "CR ~85-95% (Lengfelder et al., Leukemia 2017 registry)"
  complete_response: "Molecular CR in 80-90% by end of induction (typically 4-8 weeks)"
  progression_free_survival: "5-y EFS 60-80% with autoSCT consolidation in molecularly-CR responders"
  overall_survival_5y: "5-y OS ~70-80% with autoSCT consolidation; ~50-60% without consolidation; <30% if molecular non-CR"

hard_contraindications: []
red_flags_triggering_alternative:
