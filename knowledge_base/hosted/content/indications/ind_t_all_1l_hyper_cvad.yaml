id: IND-T-ALL-1L-HYPER-CVAD
plan_track: standard

applicable_to:
  disease_id: DIS-T-ALL
  line_of_therapy: 1
  stage_requirements: []
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 3

recommended_regimen: REG-HYPER-CVAD-R  # rituximab omitted у components для CD20-
concurrent_therapy:
  - "DRUG-NELARABINE 1500 mg/m² IV days 1, 3, 5 — додавати у consolidation phase для high-risk T-ALL (AALL0434 trial довів improved DFS)"
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "~90%"
  complete_response: "~85%"
  progression_free_survival: "Median PFS ~30-40 months"
  overall_survival_5y: "~50% adults; ~80% AYA з pediatric-inspired"

hard_contraindications:
  - CI-LVEF-LOW-FOR-ANTHRACYCLINE
red_flags_triggering_alternative: []

required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-LDH
  - TEST-URIC-ACID
  - TEST-COAG-PANEL
  - TEST-HBV-SEROLOGY
  - TEST-HIV-SEROLOGY
  - TEST-FLOW-CYTOMETRY
  - TEST-FISH-PANEL
  - TEST-KARYOTYPE
  - TEST-NGS-LYMPHOID-PANEL
  - TEST-BM-ASPIRATE
  - TEST-BM-TREPHINE
  - TEST-CSF-CYTOLOGY-FLOW
  - TEST-PET-CT
  - TEST-CECT-CAP
  - TEST-ECHO
  - TEST-PREGNANCY
desired_tests: []

rationale: >
  Hyper-CVAD без rituximab (CD20-) — adult standard. Pediatric-inspired
  для AYA. Add nelarabine у consolidation для high-risk (ETP-ALL,
  positive MRD post-induction). CNS prophylaxis обов'язкова. Allo-SCT
  у CR1 для ETP-ALL або high-risk cytogenetics.

rationale_ua: >
  Hyper-CVAD без ритуксимаб (CD20-) — дорослий стандарт. педіатричний-inspired для AYA. Add nelarabine у консолідація для високого ризику (ETP-ALL, positive МЗХ після індукції). CNS prophylaxis обов'язкова. Allo-SCT у CR1 для ETP-ALL або високого ризику cytogenetics.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: "Hyper-CVAD-based induction is Category 1 для adult T-ALL; pediatric-inspired for AYA"

known_controversies:
  - topic: "Allo-SCT у CR1 для ETP-ALL"
    positions:
      - position: "Allo-SCT recommended due poor prognosis"
        sources: [SRC-NCCN-BCELL-2025]
      - position: "Modern protocols з MRD-driven escalation можуть obviate"
        sources: [SRC-NCCN-BCELL-2025]
    our_default: "Allo-SCT для ETP-ALL у CR1 якщо matched donor; chemo-only у MRD-negative"

do_not_do:
  - "Не пропускати CNS prophylaxis (IT MTX/cytarabine + HD-MTX)."
  - "Не зневажати mediastinal mass airway compromise — pre-induction steroids + ICU readiness."
  - "Не вводити вінкристин інтратекально — фатально."
  - "Не давати rituximab — CD20- не reagent."
  - "Не пропускати TLS prophylaxis у hyperleukocytosis."

time_critical: true
last_reviewed: "2026-04-25"
reviewer_signoffs: 0
notes: >
  STUB. CD19/CD22 CAR-T NOT applicable (T-cell). Nelarabine — T-cell
  selective, R/R standard.
