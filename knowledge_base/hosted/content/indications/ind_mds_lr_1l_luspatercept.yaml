rationale: >
  Aggressive 1L for MDS-LR symptomatic anemia in jurisdictions with
  luspatercept access — superior 1L over ESA per COMMANDS trial
  (~58% TI vs 31% ESA at 12 wk; benefit greatest in SF3B1+ / RS-MDS
  but extends to non-RS too). Originally established as 2L (MEDALIST:
  RS-MDS post-ESA failure). Luspatercept 1.0 mg/kg SC q3wk titrating
  to 1.75 mg/kg if no response after 2 doses. Reassess at 24 weeks.
  In Ukraine NOT registered — practical 1L remains ESA.

rationale_ua: >
  агресивний 1L for MDS-LR symptomatic анемія in jurisdictions with люспатерцепт access — перевершує 1L over ESA per COMMANDS дослідження (~58% TI vs 31% ESA at 12 wk; виграш greatest in SF3B1+ / RS-MDS but extends to non-RS too). Originally усталений as 2L (MEDALIST: RS-MDS post-ESA failure). люспатерцепт 1.0 mg/kg SC q3wk titrating to 1.75 mg/kg if ні відповідь after 2 doses. Reassess at 24 weeks. In Ukraine NOT registered — practical 1L remains ESA.
