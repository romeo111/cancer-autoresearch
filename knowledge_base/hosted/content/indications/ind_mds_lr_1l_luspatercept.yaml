do_not_do:
  - "Не очікувати швидку відповідь — luspatercept потребує 8-12 тижнів; не припиняти раніше."
  - "Не призначати при HTN без контролю — luspatercept-induced HTN може бути тяжкою."
  - "Не призначати без VTE-оцінки — VTE risk підвищена (особливо β-thalassemia контекст; також MDS)."
  - "Не дозувати без ваги — це weight-based SC dosing."
  - "Не пропускати IPSS-R / IPSS-M risk-стратифікацію."

known_controversies:
  - topic: "Sequential luspatercept-then-ESA vs ESA-then-luspatercept in jurisdictions with both"
    positions:
      - position: "COMMANDS supports luspatercept 1L; MEDALIST supports ESA-then-luspatercept 2L"
        sources:
          - SRC-COMMANDS-FENAUX-2020
      - position: "ESA cheaper; reasonable to try ESA first if predictors favorable (low EPO, low TD)"
        sources:
          - SRC-ESMO-MDS-2021
    our_default: "Luspatercept 1L when accessible; ESA 1L when not"
    rationale: "Access defines pathway"

