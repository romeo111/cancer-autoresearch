  line_of_therapy: 1
  stage_requirements: []
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    fit_for_intensive_chemo: true

recommended_regimen: REG-VEN-AZA-AML
concurrent_therapy: []
followed_by: []

evidence_level: low
strength_of_recommendation: conditional
nccn_category: "2A"

expected_outcomes:
  overall_response_rate: "~50-70% composite CR + CRi (extrapolated from VIALE-A AML; small phase-2 HR-MDS series; no phase-3 yet)"
  complete_response: "Higher CR rates than aza alone in series; durability + OS benefit not yet phase-3 confirmed"
  progression_free_survival: "Median PFS ~12-15 months in early studies"
  overall_survival_5y: "Insufficient data for HR-MDS-specific 5-y; alloHCT bridging is the path to long-term survival"

hard_contraindications: []
red_flags_triggering_alternative:
  - RF-MDS-FRAILTY-AGE
  - RF-MDS-ORGAN-DYSFUNCTION

required_tests:
