rationale: >
  Aggressive 1L for MDS-HR with high blast burden (MDS-IB2, blasts
  10-19%) where intensified disease control is desired pre-alloHCT
  bridging. Off-label use of ven+aza schedule (extrapolated from
  VIALE-A AML). NOT yet phase-3 confirmed for HR-MDS specifically;
  active trials (VERONA) ongoing. Toxicity (cumulative cytopenias) is
  substantial; selection biased toward fit patients who could tolerate
  alloHCT downstream. TLS prophylaxis MANDATORY for first ramp cycle.

rationale_ua: >
  агресивний 1L for MDS-HR with high blast burden (MDS-IB2, blasts 10-19%) where intensified контроль хвороби is бажаний pre-alloHCT bridging. off-label use of венетоклакс+азацитидин схема (extrapolated from VIALE-A AML). NOT yet phase-3 confirmed for HR-MDS зокрема; active trials (VERONA) ongoing. токсичність (cumulative цитопенії) is substantial; selection biased toward fit patients who could tolerate alloHCT downstream. TLS prophylaxis обов'язковий for first ramp цикл.
