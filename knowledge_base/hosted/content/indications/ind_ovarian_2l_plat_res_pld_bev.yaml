id: IND-OVARIAN-2L-PLAT-RES-PLD-BEV
plan_track: standard

applicable_to:
  disease_id: DIS-OVARIAN
  line_of_therapy: 2
  stage_requirements:
    - "Recurrent epithelial ovarian / fallopian tube / primary peritoneal cancer"
    - "Platinum-free interval ≤6 months (platinum-resistant)"
    - "≤2 prior antiangiogenic-naive lines"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-PLD-BEV-OVARIAN
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "17.4% (AURELIA PLD+bev arm vs 7.8% PLD alone)"
  progression_free_survival: "mPFS 5.4 vs 3.5 mo (AURELIA PLD arm, HR 0.57)"
  overall_survival_5y: "mOS 16.6 vs 13.3 mo overall AURELIA cohort (HR 0.85, NS) — significant OS benefit in weekly-pacli subgroup specifically"

hard_contraindications: []
red_flags_triggering_alternative:
  - RF-OVARIAN-FRAILTY-AGE
  - RF-OVARIAN-PERIOPERATIVE-VTE

required_tests: []
desired_tests: []

rationale: >
  Platinum-resistant recurrent ovarian — PLD + bevacizumab per AURELIA.
  Preferred chemo+bev backbone in patients with prior taxane-induced
  peripheral neuropathy (avoids re-exposure). Cap cumulative
  anthracycline at lifetime ~550 mg/m².

sources:
  - source_id: SRC-NCCN-OVARIAN-2025
    position: supports
  - source_id: SRC-ESMO-OVARIAN-2024
    position: supports
  - source_id: SRC-AURELIA-PUJADE-LAURAINE-2014
    position: supports

do_not_do:
  - "Do NOT use this regimen if cumulative anthracycline approaches 550 mg/m² lifetime"
  - "Do NOT add bev if patient had Grade 3-4 bev event prior, untreated CNS mets, or major surgery within 28 days"
  - "Do NOT continue PLD through Grade 3 PPE without dose hold + reduction (40 → 30 mg/m²)"
  - "Do NOT use platinum reinduction here — PFI ≤6 mo defines platinum-resistance"

last_reviewed: "2026-04-27"
reviewer_signoffs: 0
notes: "ESCAT IB. AURELIA PLD-arm — preferred backbone when residual taxane neuropathy. UA access: bev НСЗУ-фінансований (часткове); PLD здебільшого OOP — REG-WEEKLY-PAC-BEV-OVARIAN is the realistic UA-accessible alternative."
