rationale: 'Single 7-day cladribine course is preferred 1L for HCL with treatment indication. Among most effective single-agent regimens in oncology — durable CR in >85%, median PFS >10 years. Active uncontrolled infection requires deferral. Mandatory long-term PJP + HSV prophylaxis post.

  '
rationale_ua: >
  Single 7-day кладрибін course is переважний 1L for HCL with лікування показання. серед найбільш effective single-agent схеми in oncology — durable CR in >85%, медіана ВБП >10 years. Active uncontrolled infection requires deferral. обов'язковий long-term PJP + HSV prophylaxis post.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
  - source_id: SRC-MOZ-UA-LYMPH-2013
    position: supports
    relevant_quote_paraphrase: 'МОЗ України уніфікований протокол по лімфомам 2013: cladribine — preferred 1L для HCL; pentostatin — alternative'
known_controversies:
  - topic: CdA monotherapy vs CdA + rituximab
    positions:
      - position: CdA mono — long-established, durable CR
        sources:
          - SRC-NCCN-BCELL-2025
      - position: CdA + rituximab improves depth of response (MRD-) without major safety penalty
        sources:
          - SRC-NCCN-BCELL-2025
    our_default: CdA monotherapy 1L; add rituximab if MRD-positive at 6 months or for higher-risk cases
do_not_do:
  - Не починати при активній неконтрольованій інфекції — глибока CD4-лімфопенія значно підвищить ризик.
  - Не пропускати PJP + HSV прophilaxis на ≥1 рік post-treatment.
  - Не пропускати BRAF V600E testing — необхідно для second-line targeted therapy при relapse.
  - Не лікувати asymptomatic HCL без cytopenia / splenomegaly індикації.
time_critical: false
