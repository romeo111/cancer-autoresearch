id: IND-ATLL-1L-INDOLENT-AZT-IFN
plan_track: standard

applicable_to:
  disease_id: DIS-ATLL
  line_of_therapy: 1
  stage_requirements: []
  biomarker_requirements_required:
    - biomarker_id: BIO-HTLV-1
      required: true
      value_constraint: "seropositive (HTLV-1 confirmatory Western blot/LIA + clonal HTLV-1 integration — required by WHO classification for ATLL diagnosis; smoldering / chronic-favourable subtypes only — acute / lymphoma type → IND-ATLL-1L-AGGRESSIVE)"
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-AZT-IFN-A
concurrent_therapy: []
followed_by: []

evidence_level: moderate
strength_of_recommendation: strong
nccn_category: "2A"

expected_outcomes:
  overall_response_rate: "~60-70% (indolent forms)"
  complete_response: "~30-40%"
  progression_free_survival: "Median PFS ~3-5 years (smoldering); ~2 years (chronic)"
  overall_survival_5y: "~80% smoldering; ~60% chronic"

hard_contraindications:
  - CI-PSYCH-DECOMPENSATED-FOR-INTERFERON
red_flags_triggering_alternative: []

required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-LDH
  - TEST-HTLV1-SEROLOGY
  - TEST-HBV-SEROLOGY
  - TEST-HCV-ANTIBODY
  - TEST-HIV-SEROLOGY
  - TEST-FLOW-CYTOMETRY
  - TEST-PET-CT
  - TEST-CECT-CAP
  - TEST-PREGNANCY
desired_tests: []

rationale: >
  Indolent ATLL (smoldering, chronic favourable) — best response до
  AZT (zidovudine) + IFN-α (Bazarbachi 2010 meta-analysis: 5-year OS
  46% з AZT+IFN vs 20% chemo для chronic/smoldering). Combo має
  preferential effect на HTLV-1 reverse transcriptase + immune
  modulation. Lymphoma-type — НЕ reagent на AZT+IFN; беремо chemo.

rationale_ua: >
  індолентний ATLL (smoldering, chronic favourable) — найкращий відповідь до AZT (zidovudine) + IFN-α (Bazarbachi 2010 meta-analysis: 5-річна ЗВ 46% з AZT+IFN vs 20% chemo для chronic/smoldering). Combo має preferential effect на HTLV-1 reverse transcriptase + immune modulation. лімфома-type — НЕ reagent на AZT+IFN; беремо chemo.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: "AZT + IFN-α is preferred for chronic/smoldering ATLL; aggressive forms need cytotoxic chemo"

known_controversies: []

do_not_do:
  - "Не давати AZT+IFN для acute / lymphoma type — поганий response, зволікання chemo цикл."
  - "Не пропускати depression screening перед IFN — IFN-induced depression фатальна (suicide risk)."
  - "Не нехтувати hypercalcemia treatment — bisphosphonates + hydration."
  - "Не давати IFN під час pregnancy — teratogenic."
  - "Не пропускати monitoring TSH — IFN може induce thyroiditis."

time_critical: false
last_reviewed: "2026-04-25"
reviewer_signoffs: 0
notes: >
  STUB. Тільки для chronic + smoldering subtypes. Acute / lymphoma
  → IND-ATLL-1L-AGGRESSIVE-MLSG15.
