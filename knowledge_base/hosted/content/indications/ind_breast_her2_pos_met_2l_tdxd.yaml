notes: >
  ESCAT IA. T-DXd preferred 2L per DESTINY-Breast03 (median PFS
  28.8 vs 6.8 mo vs T-DM1, HR 0.33). ILD risk (~10.5% any grade)
  requires baseline CT chest + active monitoring; immediate hold +
  corticosteroids if pneumonitis suspect. UA-availability is major
  access barrier (registered, reimbursement under negotiation).
  Routed to via ALGO-BREAST-HER2-POS-2L unless brain metastases
  present (then HER2CLIMB tucatinib triplet preferred).
