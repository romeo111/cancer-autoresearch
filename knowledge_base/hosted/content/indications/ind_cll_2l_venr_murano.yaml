notes: >
  STUB — pending Co-Lead sign-off. Standard-track 2L for r/r CLL —
  fixed-duration alternative to continued BTKi switch. Particularly
  valuable when 1L BTKi has progressed (mechanism-of-action switch).
  Distinct from VenO 1L (IND-CLL-1L-VENO) — different anti-CD20 partner
  + duration. UA: venetoclax not reimbursed; rituximab reimbursed.
