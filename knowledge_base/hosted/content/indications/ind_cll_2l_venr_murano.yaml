    position: supports
    relevant_quote_paraphrase: "Venetoclax + rituximab (24-month MURANO schedule) is a Category 1 preferred regimen for r/r CLL after 1+ prior lines"
  - source_id: SRC-ESMO-CLL-2024
    position: supports
    relevant_quote_paraphrase: "VenR fixed-duration 24-month regimen is recommended for r/r CLL with substantial PFS + OS benefit over chemoimmunotherapy"

  - source_id: SRC-CLL14-FISCHER-2019
    position: supports
    relevant_quote_paraphrase: CLL14 trial — see referenced publication for primary outcome data.
known_controversies:
  - topic: "Continued BTKi vs switch to VenR after 1L BTKi progression"
    positions:
      - position: "Switch to VenR (different MOA — BCL2 inhibition) for patients progressing on cBTKi (intolerance OR true progression)"
        sources: [SRC-NCCN-BCELL-2025]
      - position: "Switch to second-gen BTKi (zanu, acal) if 1L was ibrutinib intolerance (not progression) — same class but better tolerability"
        sources: [SRC-NCCN-BCELL-2025]
        evidence_note: "Distinguish intolerance from true progression — drives next-line choice"
    our_default: "VenR for true BTKi progression; BTKi-class-switch (e.g. ibrutinib intolerance → zanubrutinib) if intolerance only"
    rationale: "Mechanism-of-action switch indicated for true progression"

do_not_do:
  - "НЕ skip-ити venetoclax 5-week ramp-up — летальний TLS зафіксовано."
  - "НЕ призначати при concomitant strong CYP3A4 inhibitor під час ramp-up — летальне підвищення концентрації."
  - "НЕ починати без HBV скринінгу + entecavir prophylaxis при HBsAg+ або anti-HBc+ (anti-CD20 reactivation)."
  - "НЕ пропускати TLS prophylaxis (allopurinol + hydration) — особливо при ALC >25K або bulky disease."
  - "НЕ робити ramp-up на амбулаторного пацієнта при high-burden disease — потрібна госпіталізація з q6-8h labs."
  - "НЕ забути PJP prophylaxis на тривалу терапію."
  - "НЕ використовувати при попередній BCL2i резистентності — низька efficacy; розглянути pirtobrutinib або CAR-T."

time_critical: false
last_reviewed: "2026-04-25"
reviewers: []
