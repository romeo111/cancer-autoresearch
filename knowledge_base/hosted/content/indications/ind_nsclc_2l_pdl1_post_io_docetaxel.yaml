id: IND-NSCLC-2L-PD-L1-POST-IO-DOCETAXEL
plan_track: standard

applicable_to:
  disease_id: DIS-NSCLC
  molecular_subtype: DRIVER_NEGATIVE
  stage_stratum: STAGE_IV_METASTATIC
  line_of_therapy: 2
  stage_requirements:
    - "Stage IV metastatic driver-negative NSCLC"
    - "Disease progression on 1L platinum + ICI (KEYNOTE-189 / -407 / IMpower-150 OR similar)"
    - "No actionable driver mutation (EGFR / ALK / ROS1 / KRAS-G12C / MET / BRAF / RET / NTRK / HER2 — all ruled out by NGS)"
  biomarker_requirements_required: []
  biomarker_requirements_excluded:
    - biomarker_id: BIO-EGFR-MUTATION
      value_constraint: "EGFR-mutant excluded — targeted therapy preferred"
    - biomarker_id: BIO-ALK-FUSION
      value_constraint: "ALK-rearranged excluded — targeted therapy preferred"
    - biomarker_id: BIO-ROS1-FUSION
      value_constraint: "ROS1-rearranged excluded — targeted therapy preferred"
    - biomarker_id: BIO-KRAS-G12C
      value_constraint: "KRAS G12C excluded — sotorasib / adagrasib preferred"
    - biomarker_id: BIO-MET
      value_constraint: "MET ex14 excluded — capmatinib / tepotinib preferred"
    - biomarker_id: BIO-BRAF-V600E
      value_constraint: "BRAF V600E excluded — dab+tram preferred"
    - biomarker_id: BIO-RET
      value_constraint: "RET fusion excluded — selpercatinib preferred"
    - biomarker_id: BIO-NTRK-FUSION
      value_constraint: "NTRK fusion excluded — larotrectinib preferred"
    - biomarker_id: BIO-HER2-SOLID
      value_constraint: "HER2-mutant excluded — T-DXd preferred"
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-DOCETAXEL-RAMUCIRUMAB
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "~23% (REVEL doc-ram vs 14% docetaxel)"
  progression_free_survival: "Median PFS ~4.5 mo (REVEL doc-ram vs 3.0 mo doc; HR 0.76)"
  overall_survival_5y: "Median OS 10.5 vs 9.1 mo (HR 0.86); 1-year OS ~46%"

hard_contraindications: []
red_flags_triggering_alternative:
  - RF-NSCLC-FRAILTY-AGE  # frail / elderly may not tolerate doc + ram doublet

required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-CECT-CAP
  - TEST-NSCLC-NGS-PANEL  # confirm no missed driver before cytotoxic
desired_tests:
  - TEST-BRAIN-MRI-CONTRAST

rationale: >
  Docetaxel + ramucirumab for 2L driver-negative metastatic NSCLC after
  1L platinum + ICI failure (REVEL trial — pre-ICI era but mechanism
  still applies). Adds modest OS + PFS benefit over single-agent
  docetaxel. In modern post-ICI+chemo failure setting, this represents
  the default cytotoxic 2L for driver-negative disease. Single-agent
  docetaxel (without ramucirumab) is the realistic fallback in Ukraine
  where ramucirumab not NSZU-reimbursed for NSCLC. Nintedanib +
  docetaxel (LUME-Lung 1) is alternative for adenocarcinoma histology.
  CRITICAL: comprehensive NGS panel must rule out all actionable
  drivers before cytotoxic — driver-positive disease that progressed
  on 1L (rare given driver-positive ≠ ICI 1L) goes to next-line
  targeted, not docetaxel.

sources:
  - source_id: SRC-REVEL-GARON-2014
    position: supports
    relevant_quote_paraphrase: "REVEL: docetaxel + ramucirumab vs docetaxel + placebo in 2L NSCLC post-platinum: mOS 10.5 vs 9.1 mo (HR 0.86), PFS 4.5 vs 3.0 mo, ORR 23% vs 14%"
  - source_id: SRC-LUMELUNG1-RECK-2014
    position: supports
    relevant_quote_paraphrase: "LUME-Lung 1: docetaxel + nintedanib vs docetaxel in 2L NSCLC: PFS 3.4 vs 2.7 mo; OS benefit confined to adenocarcinoma (12.6 vs 10.3 mo)"
  - source_id: SRC-NCCN-NSCLC-2025
    position: supports
    relevant_quote_paraphrase: "Docetaxel ± ramucirumab is recommended 2L for driver-negative stage IV NSCLC after 1L chemo+ICI failure (REVEL); nintedanib alternative for adenocarcinoma (LUME-Lung 1); single-agent docetaxel acceptable when ramucirumab not accessible"
  - source_id: SRC-ESMO-NSCLC-METASTATIC-2024
    position: supports
    relevant_quote_paraphrase: "Docetaxel-based 2L (± ramucirumab or nintedanib) standard for driver-negative metastatic NSCLC progressing on 1L chemo-immunotherapy"

known_controversies:
  - topic: "Doc-ram vs doc-nintedanib vs doc-alone for 2L driver-negative NSCLC post-platinum + ICI"
    positions:
      - position: "Doc-ram (REVEL): mOS 10.5 mo, PFS 4.5 mo, ORR 23%; any histology"
        sources: [SRC-REVEL-GARON-2014]
      - position: "Doc-nintedanib (LUME-Lung 1): adenocarcinoma OS benefit (mOS 12.6 mo); oral PO antiangiogenic; squamous no benefit"
        sources: [SRC-LUMELUNG1-RECK-2014]
      - position: "Single-agent docetaxel: minus VEGFR2 toxicity; slight efficacy compromise; UA fallback"
        sources: [SRC-NCCN-NSCLC-2025]
    our_default: "Doc-ram for fit patients with funding pathway; nintedanib for adenocarcinoma if oral preferred; single-agent docetaxel as practical fallback in Ukraine"
    rationale: "Access + tolerability driven; outcomes broadly similar"

do_not_do:
  - "НЕ призначати без comprehensive NGS panel (≥9 driver genes) — driver-positive disease вимагає targeted, не cytotoxic 2L."
  - "НЕ призначати при baseline Grade ≥2 peripheral neuropathy — taxane токсичність cumulative."
  - "НЕ розпочинати протягом 28 днів від major surgery — perforation / dehiscence ризик ramucirumab."
  - "НЕ продовжувати ramucirumab при uncontrolled HTN >160/100 — cerebrovascular ризик."
  - "НЕ використовувати при active hemoptysis або recent GI bleeding — фатальні крововиливи можливі."
  - "НЕ пропускати dexamethasone premedication для docetaxel — fluid retention + hypersensitivity."
  - "НЕ призначати при ECOG 3-4 — toxicity profile doc+ram exceeds frail patient tolerance; consider single-agent docetaxel або best supportive care."
  - "НЕ підтверджувати ramucirumab без funding — single-agent docetaxel або doc+nintedanib (adenocarcinoma) є валідними альтернативами в UA."

time_critical: false
last_reviewed: "2026-04-27"
reviewers: []
reviewer_signoffs: 0
notes: >
  STUB — pending Clinical Co-Lead sign-off. Standard-track 2L
  cytotoxic for driver-negative metastatic NSCLC post-1L chemo+ICI
  failure. Driver-positive (EGFR, ALK, ROS1, KRAS G12C, MET, BRAF, RET,
  NTRK, HER2) excluded — those receive next-line targeted TKI. This
  Indication is closely related to existing IND-NSCLC-2L-DOCETAXEL-
  RAMUCIRUMAB but is the canonical "default branch" target of the
  ALGO-NSCLC-METASTATIC-2L decision tree.
