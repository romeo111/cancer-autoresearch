id: IND-DLBCL-3L-AXICEL-CART
plan_track: aggressive

applicable_to:
  disease_id: DIS-DLBCL-NOS
  line_of_therapy: 3
  stage_requirements: ["Relapsed/refractory after ≥2 prior systemic lines"]
  biomarker_requirements_required:
    - biomarker_id: BIO-CD20-IHC
      required: true
      value_constraint: "CD19+ confirmed (CD19 IHC or flow); CD20+ at original diagnosis sufficient"
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 1
    age_min: 18
    age_max: 75

recommended_regimen: REG-CAR-T-AXICEL
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "~83% (ZUMA-1)"
  complete_response: "~58%"
  progression_free_survival: "Median PFS ~6 months for all responders; ~40% sustained remission at 5 years (durable)"
  overall_survival_5y: "~43% (ZUMA-1 5-year follow-up)"

hard_contraindications:
  - CI-ACTIVE-INFECTION-FOR-ALEMTUZUMAB  # any active uncontrolled infection
red_flags_triggering_alternative:
  - RF-DLBCL-CNS-RISK  # CNS-2/3 disease excluded from registration trials

required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-LDH
  - TEST-HBV-SEROLOGY
  - TEST-HCV-ANTIBODY
  - TEST-HIV-SEROLOGY
  - TEST-CD20-IHC
  - TEST-PET-CT
  - TEST-ECHO
  - TEST-IMMUNOGLOBULINS
  - TEST-BM-ASPIRATE
  - TEST-LN-CORE-BIOPSY
  - TEST-FLOW-CYTOMETRY
  - TEST-PREGNANCY
desired_tests:
  - TEST-MRI-BRAIN-CONTRAST

rationale: >
  Axicabtagene ciloleucel (axi-cel) for relapsed/refractory DLBCL after
  ≥2 prior systemic lines (3L+ per ZUMA-1 registration). Anti-CD19
  CD28-costimulated CAR-T with single infusion after fludarabine-cyclo
  lymphodepletion. ~40% achieve durable remission at 5 years — only
  curative option in this otherwise grim setting (historical 2L+
  refractory mOS ~6 months pre-CAR-T). For primary-refractory or
  early-relapse (<12 mo from 1L), ZUMA-7 supports moving CAR-T to 2L
  (separate Indication, future). Absolute access barrier in Ukraine:
  not registered, no domestic manufacturing — international referral
  required.

rationale_ua: >
  аксикабтаген цилолейцел (axi-cel) for рецидивний/рефрактерний DLBCL after ≥2 prior systemic lines (3L+ per ZUMA-1 registration). Anti-CD19 CD28-costimulated CAR-T with single infusion after флударабін-cyclo lymphodepletion. ~40% achieve стійка ремісія at 5 years — only curative option in this otherwise grim setting (historical 2L+ рефрактерний mOS ~6 months pre-CAR-T). For primary-рефрактерний or early-рецидив (<12 mo from 1L), ZUMA-7 supports moving CAR-T to 2L (separate показання, future). Absolute access barrier in Ukraine: not registered, ні domestic manufacturing — international referral обов'язковий.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: "CAR-T (axi-cel, tisa-cel, liso-cel) is preferred treatment for r/r DLBCL after ≥2 prior lines; Category 1 (ZUMA-1, JULIET, TRANSCEND)"
  - source_id: SRC-ESMO-DLBCL-2024
    position: supports
    relevant_quote_paraphrase: "Anti-CD19 CAR-T cell therapy is standard of care for r/r DLBCL after 2+ prior lines; primary-refractory / early-relapse benefit from CAR-T at 2L per ZUMA-7"

known_controversies:
  - topic: "Axi-cel vs tisagenlecleucel vs lisocabtagene maraleucel for 3L+ DLBCL"
    positions:
      - position: "Axi-cel highest CR rate but highest CRS/ICANS toxicity (CD28 costimulation)"
        sources: [SRC-NCCN-BCELL-2025]
      - position: "Liso-cel comparable efficacy with substantially lower CRS/ICANS — preferred for elderly / frail"
        sources: [SRC-NCCN-BCELL-2025]
        evidence_note: "TRANSCEND NHL-001: Grade ≥3 CRS ~2%, ICANS ~10% — far below ZUMA-1"
    our_default: "Axi-cel for fit ECOG 0-1 patient under 70; liso-cel preferred for older / frailer if accessible"
    rationale: >
      In Ukraine context all 3 products require international referral —
      product selection driven by partner-center availability and patient
      tolerance of expected toxicity profile.

do_not_do:
  - "НЕ призначати prophylactic systemic corticosteroids — пригнічує CAR-T expansion + знижує efficacy."
  - "НЕ розпочинати без on-site tocilizumab (мінімум 2 дози) ДО інфузії — fatal CRS можливе."
  - "НЕ робити в центрі без CAR-T accreditation (FACT/JACIE/REMS) — toxicity management потребує спеціалізованої команди + ICU доступу."
  - "НЕ пропускати baseline brain MRI — pre-existing CNS disease (CNS-2/3) була exclusion в ZUMA-1; ризик fatal ICANS значно вищий."
  - "НЕ ігнорувати тимчасову bridging chemotherapy (3-4 тижні manufacturing window) — disease progression в цьому вікні зменшує efficacy."
  - "НЕ призначати при active uncontrolled infection — лімфодеплеція + CRS = high mortality."
  - "НЕ забути IVIG для довготривалої hypogammaglobulinemia (IgG <400 + recurrent infections) — B-cell aplasia може тривати >12 місяців."

time_critical: false
last_reviewed: "2026-04-25"
reviewers: []
reviewer_signoffs: 0
notes: >
  STUB — pending Clinical Co-Lead sign-off. Aggressive-track 3L+ option
  for r/r DLBCL. Ukraine access constraint is dominant barrier:
  international referral pathway (Israel / Poland / Germany / Spain) +
  USD 350-500K all-in cost. ZUMA-7 expansion to 2L for
  primary-refractory / early-relapse is a separate future Indication
  (IND-DLBCL-2L-CART-EARLYRELAPSE). Tisa-cel (Kymriah) and liso-cel
  (Breyanzi) alternative CD19 CAR-Ts — separate Regimen entities to
  add later.
