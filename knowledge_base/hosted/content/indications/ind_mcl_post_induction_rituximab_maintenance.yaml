id: IND-MCL-POST-INDUCTION-RITUXIMAB-MAINTENANCE
plan_track: standard
applicable_to:
  disease_id: DIS-MCL
  line_of_therapy: 1
  stage_requirements:
    - Post-induction ≥PR after 1L (autoSCT for fit; BR/R-CHOP for older)
    - 'Treatment intent: maintenance'
  biomarker_requirements_required:
    - biomarker_id: BIO-CD20-IHC
      required: true
      value_constraint: positive (CD20+)
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2
recommended_regimen: REG-RITUXIMAB-MAINTENANCE-MCL
concurrent_therapy: []
followed_by: []
evidence_level: high
strength_of_recommendation: strong
nccn_category: '1'
expected_outcomes:
  overall_response_rate: Maintenance — measured by PFS + OS extension
  complete_response: N/A (maintenance phase)
  progression_free_survival: 'Post-autoSCT (LyMa): 4-yr PFS 83% maintenance vs 64% observation'
  overall_survival_5y: 'Post-autoSCT (LyMa): 4-yr OS 89% maintenance vs 80% observation'
hard_contraindications:
  - CI-HBV-NO-PROPHYLAXIS
red_flags_triggering_alternative:
  - RF-MCL-BLASTOID-OR-TP53
required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-LDH
  - TEST-HBV-SEROLOGY
  - TEST-IMMUNOGLOBULINS
  - TEST-CD20-IHC
  - TEST-PET-CT
desired_tests: []
rationale: 'Post-induction rituximab maintenance is standard of care after MCL 1L induction (NCCN Cat 1). For fit younger patients post-autoSCT: LyMa trial (Le Gouill 2017 NEJM) demonstrated rituximab q2mo × 3 years extends PFS AND OS (4-yr OS 89% vs 80%). For older/unfit post-R-CHOP or BR: Kluin-Nelemans / EU MCL Elderly trial showed R-maintenance superior to interferon-α maintenance (PFS + OS benefit). For BTKi-R 1L induction (acalabrutinib-rituximab continuous), ''maintenance'' overlaps continuous BTKi — rituximab maintenance generally NOT added on top of continuous BTKi. Counsel cumulative hypogammaglobulinemia + infection risk.'
rationale_ua: >-
  після індукції ритуксимаб підтримка is стандарт лікування after MCL 1L індукція (NCCN Cat 1). For fit younger patients post-аутоТГСК: LyMa дослідження (Le Gouill 2017 NEJM) продемонстровано ритуксимаб q2mo × 3 years extends PFS AND OS (4-рік OS 89% проти 80%). For older/unfit post-R-CHOP or BR: Kluin-Nelemans / EU MCL літнього віку дослідження showed R-підтримка перевершує інтерферон-α підтримка (PFS + OS виграш). For BTKi-R 1L індукція (акалабрутиніб-ритуксимаб continuous), 'підтримка' overlaps continuous BTKi — ритуксимаб підтримка загалом NOT added on top of continuous BTKi. Counsel cumulative hypogammaglobulinemia + infection risk.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: Rituximab maintenance is Category 1 post-autoSCT consolidation for MCL (LyMa) and post-R-CHOP/BR for older patients (EU MCL Elderly); duration 2-3 years
  - source_id: SRC-ESMO-MCL-2024
    position: supports
    relevant_quote_paraphrase: Rituximab maintenance recommended post-induction in MCL — 3 years post-autoSCT; ≥2 years post-chemoimmunotherapy in older patients; not routinely added to continuous BTKi
known_controversies:
  - topic: Adding rituximab maintenance to continuous BTKi-R 1L induction
    positions:
      - position: Continuous BTKi alone — no added maintenance benefit demonstrated
        sources:
          - SRC-NCCN-BCELL-2025
      - position: Pulse rituximab during BTKi may deepen response — limited evidence
        sources:
          - SRC-ESMO-MCL-2024
        evidence_note: Small studies; not standard of care
    our_default: No maintenance R added to continuous BTKi-R; standard maintenance after chemoimmunotherapy or autoSCT only
    rationale: Continuous BTKi inherently sustains response; redundant rituximab adds infection burden
do_not_do:
  - НЕ розпочинати maintenance без HBV скринінгу + entecavir prophylaxis при HBsAg+ або anti-HBc+.
  - НЕ додавати rituximab maintenance поверх continuous BTKi (ефективність не показана; кумулятивна імуносупресія).
  - НЕ продовжувати при cumulative hypogammaglobulinemia (<400 mg/dL) + рецидивні інфекції.
  - НЕ забувати PJP profilaxis ≥6 міс після останньої дози anti-CD20.
  - НЕ ігнорувати MRD моніторинг при доступності — durable MRD-negativity може підтримувати раннє припинення maintenance (selected centers).
time_critical: false
last_reviewed: '2026-04-27'
reviewers: []
reviewer_signoffs: 0
notes: Post-induction maintenance — applies after autoSCT (fit younger track) OR after BR/R-CHOP (older track). Engine should NOT activate this when 1L was BTKi-R continuous (handled by BTKi continuation). LyMa (Le Gouill 2017 NEJM) is the primary post-autoSCT evidence; EU MCL Elderly (Kluin-Nelemans 2012 NEJM) is the primary post-CIT evidence.
