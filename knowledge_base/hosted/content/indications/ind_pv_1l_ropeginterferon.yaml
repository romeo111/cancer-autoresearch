id: IND-PV-1L-ROPEGINTERFERON
plan_track: aggressive

applicable_to:
  disease_id: DIS-PV
  line_of_therapy: 1
  stage_requirements:
    - "Newly diagnosed PV (or pre-treated <3 years) seeking cytoreductive therapy"
    - "HU-naive OR HU-intolerant with disease-modification goal"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 1
    age_max: 60

recommended_regimen: REG-ROPEGINTERFERON-PV
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "Complete hematologic response 71% vs 51% HU at 36 months (CONTINUATION-PV)"
  complete_response: "Hct <45% + WBC + plt control sustained ≥1 year ~50-60%"
  progression_free_survival: "Disease-modifying potential — JAK2-V617F allele burden reduction substantially greater than HU; long-term implications under study"
  overall_survival_5y: "Mature OS data still maturing; non-inferior to HU for thrombosis-free survival at 36 months"

hard_contraindications: []
red_flags_triggering_alternative:
  - RF-PV-ET-HIGH-THROMBOSIS-RISK
  - RF-PV-ET-PREGNANCY-OR-PLANNING
  - RF-PV-ET-FRAILTY-AGE
  - RF-PV-ET-ORGAN-DYSFUNCTION

required_tests:
  - TEST-CBC
  - TEST-RETICULOCYTE
  - TEST-CMP
  - TEST-LFT
  - TEST-LDH
  - TEST-IRON-PANEL
  - TEST-BCR-ABL-JAK2
  - TEST-HBV-SEROLOGY
  - TEST-HCV-ANTIBODY
  - TEST-HIV-SEROLOGY
desired_tests:
  - TEST-BM-ASPIRATE
  - TEST-BM-TREPHINE
  - TEST-ECHO

rationale: >
  Ropeginterferon alfa-2b (Besremi) — long-acting mono-PEGylated
  IFN alfa-2b — is approved 1L cytoreductive for PV regardless of
  HU exposure on basis of PROUD-PV / CONTINUATION-PV phase-3
  (Gisslinger et al., Lancet Haematol 2020). Complete hematologic
  response 71% vs 51% HU at 36 months. Distinct from HU and
  ruxolitinib in disease-modifying potential — substantially
  greater JAK2-V617F allele burden reduction. Particularly
  appropriate for younger fit patients (age <60) seeking
  long-term cytoreductive therapy with disease-modification goal,
  no severe psychiatric history, and ability to tolerate flu-like
  symptoms + thyroid + LFT monitoring. Q2wk SC dosing more
  convenient than weekly PEG-IFNa-2a. CRITICAL: baseline
  psychiatric screen (depression / suicidality boxed warning),
  thyroid panel, LFT, autoantibody screen mandatory. Major
  Ukraine access barrier: not registered.

rationale_ua: >
  Ropeginterferon alfa-2b (Besremi) — long-acting mono-PEGylated IFN alfa-2b — is схвалений 1L cytoreductive for PV regardless of HU exposure on basis of PROUD-PV / CONTINUATION-PV phase-3 (Gisslinger et al., Lancet Haematol 2020). Complete hematologic відповідь 71% проти 51% HU at 36 місяців. Distinct from HU and руксолитиніб in хвороба-modifying potential — substantially greater JAK2-V617F allele burden зниження. особливо appropriate for younger fit patients (age <60) seeking long-term cytoreductive терапія with хвороба-modification goal, ні severe psychiatric history, and ability to tolerate flu-like symptoms + thyroid + LFT моніторинг. Q2wk SC дозування more convenient than weekly PEG-IFNa-2a. CRITICAL: базове psychiatric screen (depression / suicidality спеціальне попередження в інструкції), thyroid panel, LFT, autoantibody screen обов'язковий. Major Ukraine access barrier: not registered.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-MPN-2025
    position: supports
    relevant_quote_paraphrase: "Ropeginterferon alfa-2b is recommended 1L cytoreductive for PV regardless of HU exposure (Cat 1) per PROUD-PV / CONTINUATION-PV"
  - source_id: SRC-PROUD-PV-GISSLINGER-2020
    position: supports
    relevant_quote_paraphrase: "PROUD-PV / CONTINUATION-PV phase-3: ropeginterferon vs HU; CHR 71% vs 51% at 36 mo; substantially greater V617F allele burden reduction"
  - source_id: SRC-ESMO-MPN-2015
    position: supports
    relevant_quote_paraphrase: "Pegylated interferons recommended 1L for PV particularly in younger patients seeking disease-modification"

do_not_do:
  - "НЕ призначати без baseline psychiatric screen (depression, suicidality) — black-box warning, fatal cases задокументовані."
  - "НЕ призначати при decompensated liver disease (Child-Pugh B/C) — autoimmune hepatitis ризик."
  - "НЕ призначати при active severe autoimmune disease — exacerbation очікувана."
  - "НЕ ігнорувати baseline TSH + autoantibody panel + serial LFT — autoimmune thyroiditis + hepatitis common."
  - "НЕ забувати aspirin 81-100 мг PO daily для thrombosis prevention (continued from PV pathway)."
  - "НЕ продовжувати при severe depression / suicidality — permanent discontinuation."
  - "НЕ підтверджувати план без funding pathway — препарат не зареєстрований в Україні; standard PEG-IFNa-2a (off-label PV) як альтернатива якщо доступний."

known_controversies:
  - topic: "Ropeginterferon vs HU as 1L for PV in younger patients (<60)"
    positions:
      - position: "Ropeginterferon — disease-modifying potential (V617F allele burden reduction); preferred for younger fit with long-term outlook"
        sources: [SRC-PROUD-PV-GISSLINGER-2020, SRC-NCCN-MPN-2025]
      - position: "HU — cheaper, oral, well-tolerated, decades of experience, similar thrombosis-free survival at 36 months"
        sources: [SRC-NCCN-MPN-2025, SRC-ESMO-MPN-2015]
        evidence_note: "Long-term OS / leukemic transformation outcomes still maturing for ropeginterferon. Cost + access dominant in Ukraine."
    our_default: "HU 1L for most PV (cost, access); ropeginterferon for younger fit (<60) low-risk seeking disease-modification when accessible"
    rationale: "Access defines pathway; disease-modification goal directs choice when access enables it"

time_critical: false
last_reviewed: "2026-04-25"
reviewers: []
reviewer_signoffs: 0
notes: >
  STUB — pending Clinical Co-Lead sign-off. Aggressive-track 1L
  for younger fit PV with disease-modification goal. Ukraine access
