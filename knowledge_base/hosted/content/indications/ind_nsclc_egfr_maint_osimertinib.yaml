notes: 'STUB — pending Clinical Co-Lead sign-off. line_of_therapy: 1 because TKI continuation is part of the 1L pathway (no distinct induction+maintenance phases). Engine activates this indication for any patient on osimertinib 1L beyond first restaging assessment.'
