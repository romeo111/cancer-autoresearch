  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: "5-Azacitidine is an option for r/r PTCL with TFH features (AITL), particularly with TET2/IDH2 mutations; Cat 2B (off-label)"
  - source_id: SRC-ESMO-PTCL-2024
    position: supports
    relevant_quote_paraphrase: "Hypomethylating agents (azacitidine) are emerging therapy for r/r AITL — leverages high prevalence of epigenetic mutations (TET2/IDH2/DNMT3A); RUYUAN-2 + Lemonnier series support ORR 50-75% in AITL specifically"

known_controversies:
  - topic: "Azacitidine vs HDAC inhibitor (belinostat, romidepsin) as AITL 2L+ first choice"
    positions:
      - position: "Azacitidine first — AITL-specific data, mechanistic alignment, UA-accessible"
        sources: [SRC-NCCN-BCELL-2025]
      - position: "HDAC inhibitor first — FDA-approved for r/r PTCL with broader registration data"
        sources: [SRC-NCCN-BCELL-2025]
    our_default: "5-Azacitidine first in UA context (access + AITL-specific data); HDACi if 5-aza failed and access can be arranged"
  - topic: "Optimal cycle count before declaring failure"
    positions:
      - position: "≥4 cycles per HMA experience in MDS — slow-onset epigenetic response"
        sources: [SRC-NCCN-BCELL-2025]
      - position: "≥6 cycles given heterogeneity of AITL response timing"
        sources: [SRC-NCCN-BCELL-2025]
    our_default: "≥6 cycles before declaring failure unless clear progression earlier"

do_not_do:
  - "НЕ припиняти раніше 4-6 циклів без явної прогресії — HMA response slow-onset; рання evaluation = false negative."
  - "НЕ забути monitor cytopenia + delay cycle при ANC <500 / platelets <25K — hematologic toxicity дозо-обмежуюча."
  - "НЕ ігнорувати renal function — CrCl <60 потребує dose reduction 50%."
  - "НЕ пропускати re-biopsy при швидкому росту CD20+ mass — secondary EBV-driven DLBCL у AITL мікрооточенні; отдельне routing."
  - "НЕ забути off-label disclosure — drug registered for MDS/AML; AITL off-label використання потребує MDT documentation + funding pathway clarification."
  - "НЕ пропускати baseline NGS для TET2/IDH2/DNMT3A — predictive enrichment + future trial routing (IDH2 inhibitor enasidenib для IDH2-mut)."

