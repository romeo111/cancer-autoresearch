rationale: >
  5-Azacitidine (hypomethylating agent) for r/r AITL — emerging
  epigenetic-targeted therapy with strong mechanistic rationale.
  AITL has high frequency of TET2 (~80%), IDH2 R172 (~30-45%),
  DNMT3A (~30%) mutations creating epigenetic dysregulation that
  hypomethylating agents exploit. RUYUAN-2 (Lemonnier 2018-2023)
  and other small AITL-specific series show ORR 50-75% — substantially
  higher than HDAC inhibitor mono in same setting. OFF-LABEL use
  for AITL — drug FDA/EMA-approved for MDS-HR + AML. Practical
  advantage in UA: drug is on-shelf via existing AML/MDS supply
  routes (НСЗУ-reimbursed for MDS-HR + AML), unlike belinostat /
  romidepsin / pralatrexate (none registered). Slow-onset response
  — minimum 4-6 cycles before declaring failure.

rationale_ua: >
  5-азацитидин (hypomethylating agent) for р/р AITL — новий epigenetic-таргетна терапія with strong mechanistic rationale. AITL has high frequency of TET2 (~80%), IDH2 R172 (~30-45%), DNMT3A (~30%) мутації creating epigenetic dysregulation that hypomethylating agents exploit. RUYUAN-2 (Lemonnier 2018-2023) and other small AITL-specific series show ORR 50-75% — substantially higher than HDAC інгібітор mono in same setting. off-label use for AITL — drug FDA/EMA-схвалений для MDS-HR + AML. Practical advantage in UA: drug is on-shelf via existing AML/MDS supply routes (НСЗУ-відшкодовуваний for MDS-HR + AML), unlike belinostat / romidepsin / pralatrexate (none registered). Slow-onset відповідь — minimum 4-6 цикли before declaring failure.
