id: IND-NLPBL-2L-RCHOP-TRANSFORMATION
plan_track: aggressive
applicable_to:
  disease_id: DIS-NLPBL
  line_of_therapy: 2
  stage_requirements:
    - Relapsed/progressive NLPBL after 1L (observation, RT, or rituximab monotherapy)
    - OR transformation to DLBCL (T-cell/histiocyte-rich large B-cell lymphoma) on biopsy
  biomarker_requirements_required:
    - biomarker_id: BIO-CD20-IHC
      required: true
      value_constraint: positive (CD20+)
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2
recommended_regimen: REG-R-CHOP
concurrent_therapy: []
followed_by: []
evidence_level: moderate
strength_of_recommendation: strong
nccn_category: 2A
expected_outcomes:
  overall_response_rate: ~85% (R-CHOP for transformed/aggressive B-NHL)
  complete_response: ~65-70%
  progression_free_survival: 5-year PFS ~50-60% for transformed NLPBL post-R-CHOP
  overall_survival_5y: ~70-80%
hard_contraindications:
  - CI-HBV-NO-PROPHYLAXIS
  - CI-LVEF-LOW-FOR-ANTHRACYCLINE
red_flags_triggering_alternative:
  - RF-NLPBL-FRAILTY-AGE
required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-LDH
  - TEST-B2-MICROGLOBULIN
  - TEST-HBV-SEROLOGY
  - TEST-HCV-ANTIBODY
  - TEST-HIV-SEROLOGY
  - TEST-CD20-IHC
  - TEST-PET-CT
  - TEST-LN-EXCISIONAL-BIOPSY
  - TEST-ECHO
  - TEST-BM-ASPIRATE
  - TEST-BM-TREPHINE
desired_tests: []
rationale: 'For relapsed/progressive NLPBL or transformation to T-cell/histiocyte-rich large B-cell lymphoma (THRLBCL — most common NLPBL transformation pattern), R-CHOP × 6 cycles is preferred 2L per NCCN. Treatment paradigm follows DLBCL — outcomes for NLPBL post-R-CHOP somewhat better than de novo DLBCL (intact background indolent biology). Alternative for chemo-spared younger patients without transformation: rituximab + bendamustine, R-CVP, or R-ABVD-style. CAR-T available for chemorefractory cases. Variant-pattern NLPBL has higher transformation risk — biopsy-confirm at relapse.'
rationale_ua: >-
  For рецидивний/progressive NLPBL or трансформація to T-cell/histiocyte-rich large B-cell лімфома (THRLBCL — найбільш поширений NLPBL трансформація pattern), R-CHOP × 6 цикли is переважний 2L per NCCN. лікування paradigm follows DLBCL — outcomes for NLPBL post-R-CHOP somewhat краще than de novo DLBCL (intact background індолентний biology). Alternative for chemo-spared younger patients without трансформація: ритуксимаб + бендамустин, R-CVP, or R-ABVD-style. CAR-T available for chemorefractory cases. варіант-pattern NLPBL has higher трансформація risk — біопсія-confirm at рецидив.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: Transformed NLPBL is treated as aggressive B-NHL (R-CHOP-equivalent); for non-transformed multifocal relapse R-CHOP, R-CVP, or BR all options
  - source_id: SRC-ESMO-DLBCL-2024
    position: supports
    relevant_quote_paraphrase: ESMO endorses R-CHOP for transformed NLPBL (THRLBCL pattern); manage as DLBCL pathway
known_controversies:
  - topic: R-CHOP vs less-intensive (R-CVP, BR) for non-transformed multifocal NLPBL relapse
    positions:
      - position: R-CHOP — full DLBCL-equivalent intensity for safety margin
        sources:
          - SRC-NCCN-BCELL-2025
      - position: R-CVP / BR — chemo-sparing for indolent-pattern relapse without transformation
        sources:
          - SRC-NCCN-BCELL-2025
        evidence_note: Reasonable for older/frail; reserve R-CHOP for transformation
    our_default: R-CHOP for transformation OR aggressive features; R-CVP/BR for indolent-pattern multifocal relapse in older/frail
    rationale: Transformation mandates DLBCL-equivalent therapy; preserve chemo-sparing for true indolent relapse
do_not_do:
  - НЕ призначати без re-biopsy при relapse — transformation pattern (THRLBCL) визначає intensity choice.
  - НЕ розпочинати без HBV screening + entecavir prophylaxis при HBsAg+ або anti-HBc+.
  - НЕ призначати без baseline LVEF ≥50% — anthracycline cardiotoxicity.
  - НЕ ігнорувати CNS-IPI у transformed NLPBL з CNS-risk anatomic sites.
  - НЕ забувати fertility preservation discussion у репродуктивного віку.
  - НЕ використовувати vincristine intrathecally — ФАТАЛЬНО.
  - НЕ ескалувати дозу при febrile neutropenia без G-CSF prophylaxis для високоризикових.
time_critical: false
last_reviewed: '2026-04-27'
reviewers: []
reviewer_signoffs: 0
notes: Aggressive-track 2L NLPBL for transformation OR multifocal aggressive relapse. Re-uses REG-R-CHOP. Less-intensive alternatives (R-CVP, BR) for indolent-pattern relapse — separate Indication when scope opens. Variant histology (variant-pattern NLPBL) has higher transformation risk — re-biopsy mandatory.
