id: IND-CERVICAL-LOCALLY-ADVANCED-CRT
plan_track: standard

applicable_to:
  disease_id: DIS-CERVICAL
  line_of_therapy: 1
  stage_requirements: ["FIGO IB3-IVA (locally advanced)", "Bulky primary >4 cm OR pelvic node-positive OR para-aortic-node-positive"]
  biomarker_requirements_required:
    - biomarker_id: BIO-HPV-STATUS
      required: true
      value_constraint: "HPV-positive (typically HPV-16/18) — vast majority of cervical cancers; HPV status required as eligibility / etiology confirmation and informs prognosis (HPV+ better than HPV-) and post-treatment surveillance"
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-CISPLATIN-RADIOSENS
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "~80% complete clinical response post-CRT"
  complete_response: "~60-70% local control"
  progression_free_survival: "5-yr DFS ~65-70% IB3-IIB; ~40-50% IIIB"
  overall_survival_5y: "5-yr OS ~55-65% locally advanced (depends on FIGO stage + nodal status)"

hard_contraindications: []
red_flags_triggering_alternative:
  - RF-CERVICAL-HYDRONEPHROSIS-PELVIC-OBSTRUCTION

required_tests: []
desired_tests: []

rationale: >
  GOG-120 / NCIC + 5 sister trials established cisplatin + RT for
  locally advanced cervical. Brachytherapy boost is integral
  (RetroEMBRACE / EMBRACE-II). Recent INTERLACE trial — 6 weeks of
  induction carbo+pacli before CRT improved PFS (likely future standard).

rationale_ua: >
  GOG-120 / NCIC + 5 sister trials усталений цисплатин + RT for місцево-поширений cervical. Brachytherapy boost is integral (RetroEMBRACE / EMBRACE-II). Recent INTERLACE дослідження — 6 weeks of індукція carbo+pacli before CRT покращений PFS (likely future стандарт).
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-CERVICAL-2025
    position: supports
  - source_id: SRC-ESMO-CERVICAL-2024
    position: supports

do_not_do:
  - "Do NOT defer brachytherapy — completing CRT in <8 weeks essential for outcomes"
  - "Do NOT initiate cisplatin without resolving hydronephrosis if present"
  - "Do NOT skip HIV testing — co-infection alters prognosis + needs ART optimization"

last_reviewed: "2026-04-26"
notes: >
  PARTIAL — brachytherapy + EBRT modality not modellable per
  PROPOSAL §17. This Indication captures cisplatin chemo backbone +
  free-text RT description.
