rationale: >
  Aggressive 1L for high-risk APL (Sanz: WBC >10). ATRA + ATO +
  idarubicin (preferred when ATO available) OR classic AIDA (ATRA +
  idarubicin alone). Chemo-free ATRA + ATO is NOT validated for high-risk
  (APL0406 enrolled only low/intermediate). Hyperleukocytosis-related
  DS prophylaxis with dexamethasone, aggressive DIC management, daily
  ECG + electrolyte monitoring. Cumulative anthracycline tracking for
  late cardiotoxicity. AlloHCT generally not needed for APL CR1 (cure
  rate already ~85%); reserved for relapse / TKD-ATRA-resistant variant.

rationale_ua: >
  агресивний 1L for високого ризику APL (Sanz: WBC >10). ATRA + ATO + idarubicin (переважний when ATO available) OR classic AIDA (ATRA + idarubicin alone). Chemo-free ATRA + ATO is NOT validated for високого ризику (APL0406 enrolled only low/intermediate). Hyperleukocytosis-related DS prophylaxis with dexamethasone, агресивний DIC management, daily ECG + electrolyte моніторинг. Cumulative anthracycline tracking for late кардіотоксичність. AlloHCT загалом not needed for APL CR1 (cure rate already ~85%); reserved for рецидив / TKD-ATRA-resistant варіант.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-AML-2025
    position: supports
    relevant_quote_paraphrase: "ATRA + ATO + idarubicin (or classic AIDA) is preferred 1L for high-risk APL"
  - source_id: SRC-ELN-APL-2019
    position: supports
    relevant_quote_paraphrase: "High-risk APL (WBC >10) requires anthracycline addition; chemo-free regimen NOT validated"

do_not_do:
  - "Не використовувати chemo-free ATRA + ATO для high-risk APL (WBC >10) — APL0406 enrollment criterion виключав цю популяцію."
  - "Не пропускати DS-профілактику дексаметазоном при високому WBC при дебюті — у high-risk DS особливо часта."
  - "Не пропускати DIC management — high-risk APL має найвищу частоту bleeding-related early mortality."
  - "Не призначати idarubicin без baseline LVEF + кумулятивного відстеження антрациклінів."
  - "Не пропускати hyperleukocytosis management (hydroxyurea ± leukapheresis) якщо WBC >100K при дебюті."

known_controversies:
  - topic: "ATRA + ATO + idarubicin vs classic AIDA (ATRA + idarubicin) for high-risk APL"
    positions:
      - position: "ATRA + ATO + idarubicin is preferred when ATO available — better efficacy + tolerability"
        sources:
          - SRC-ELN-APL-2019
      - position: "Classic AIDA is acceptable alternative if ATO unavailable / contraindicated"
        sources:
          - SRC-NCCN-AML-2025
    our_default: "ATRA + ATO + idarubicin when ATO available (Ukraine: yes, reimbursed); AIDA only if ATO contraindication"
    rationale: "Both ATO and idarubicin are reimbursed in Ukraine; triple is preferred."

time_critical: true
last_reviewed: "2026-04-25"
reviewers: []
