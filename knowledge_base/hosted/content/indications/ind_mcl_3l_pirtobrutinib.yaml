known_controversies:
  - topic: "Pirtobrutinib monotherapy vs bridge to brexu-cel for r/r MCL post-cBTKi"
    positions:
      - position: "Pirtobrutinib monotherapy as endpoint when CAR-T not accessible — meaningful response duration"
        sources: [SRC-NCCN-BCELL-2025]
      - position: "Pirtobrutinib as bridge to brexu-cel — durable cure-intent only via cellular therapy"
        sources: [SRC-NCCN-BCELL-2025]
    our_default: "Bridge to CAR-T when accessible; pirtobrutinib monotherapy as endpoint if CAR-T not feasible"
  - topic: "Pirto vs CAR-T as primary 3L+ choice"
    positions:
      - position: "CAR-T preferred for fit / accessible — durable remission potential"
        sources: [SRC-NCCN-BCELL-2025]
      - position: "Pirto preferred for older / frail / non-CAR-T-accessible — oral, no CRS/ICANS"
        sources: [SRC-NCCN-BCELL-2025]
    our_default: "CAR-T for fit ECOG 0-1 with access; pirto for non-CAR-T candidates"

do_not_do:
  - "НЕ призначати без verified prior cBTKi exposure — Cat 2A indication restricts use to post-cBTKi setting."
  - "НЕ припиняти при transient AE без переоцінки — для post-cBTKi MCL альтернатив мало."
  - "НЕ пропускати baseline ECG + кардіологічну оцінку — afib знижений але можливий."
  - "НЕ комбінувати з anticoagulants без strict monitoring — bleeding risk persists."
  - "НЕ призначати при concomitant strong CYP3A4 inhibitor без dose reduction до 100 mg PO QD."
  - "НЕ підтверджувати plan без funding pathway — препарат не зареєстрований в Україні."
  - "НЕ забути моніторинг прогресії — для TP53-mut або blastoid MCL рекомендовано раннє CAR-T-referral planning, навіть під час pirtobrutinib bridge."

