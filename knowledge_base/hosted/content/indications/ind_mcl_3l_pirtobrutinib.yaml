rationale: >
  Pirtobrutinib (non-covalent reversible BTKi) for r/r MCL after ≥2
  prior lines including a covalent BTKi. Distinct binding mechanism
  (C481-independent) overcomes BTK-C481-S/R mutations conferring
  resistance to ibrutinib / acalabrutinib / zanubrutinib. BRUIN MCL
  cohort: ORR 50% (CR 13%) in heavily pretreated population —
  meaningful in setting where chemoimmuno + autoSCT + cBTKi have
  all failed and CAR-T (brexu-cel) may be inaccessible logistically.
  Important bridge to brexu-cel CAR-T during manufacturing window
  when disease pace requires. Cardiac safety better than ibrutinib
  (afib ~3% vs ~7-15%). Major UA access barrier: not registered.

rationale_ua: >
  Pirtobrutinib (non-covalent оборотний BTKi) for р/р MCL after ≥2 prior lines включаючи a covalent BTKi. Distinct binding mechanism (C481-independent) overcomes BTK-C481-S/R мутації conferring резистентність до ібрутиніб / акалабрутиніб / занубрутиніб. BRUIN MCL cohort: ORR 50% (CR 13%) in heavily pretreated population — meaningful in setting where chemoimmuno + аутоТГСК + cBTKi have all failed and CAR-T (brexu-cel) may be inaccessible logistically. Important bridge to brexu-cel CAR-T during manufacturing window when хвороба pace requires. Cardiac безпека краще than ібрутиніб (afib ~3% проти ~7-15%). Major UA access barrier: not registered.
