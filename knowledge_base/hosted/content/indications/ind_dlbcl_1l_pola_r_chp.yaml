id: IND-DLBCL-1L-POLA-R-CHP
plan_track: aggressive
applicable_to:
  disease_id: DIS-DLBCL-NOS
  line_of_therapy: 1
  stage_requirements: []
  biomarker_requirements_required:
    - biomarker_id: BIO-CD20-IHC
      required: true
      value_constraint: positive (CD20+)
    - biomarker_id: BIO-CD79B-IHC
      required: true
      value_constraint: positive (CD79b is the polatuzumab vedotin target; expressed in nearly all B-cell lymphomas including DLBCL)
    - biomarker_id: BIO-DLBCL-IPI
      required: true
      value_constraint: IPI ≥2 — POLARIX PFS benefit driven by higher-risk IPI subset; IPI 0-1 see R-CHOP standard track
    - biomarker_id: BIO-HBV-STATUS
      required: true
      value_constraint: any value valid (categorical etiology gate; HBsAg+ or anti-HBc+ → entecavir prophylaxis mandatory before first rituximab dose; anti-CD20 reactivation risk not reduced by polatuzumab)
    - biomarker_id: BIO-HCV-STATUS
      required: true
      value_constraint: any value valid (categorical etiology gate; anti-HCV+ → reflex BIO-HCV-RNA; coordinate DAA with hepatology)
    - biomarker_id: BIO-HIV-STATUS
      required: true
      value_constraint: any value valid (categorical etiology gate; HIV+ → cART throughout, PJP/MAC prophylaxis if CD4 < 200, CNS prophylaxis regardless of CNS-IPI)
    - biomarker_id: BIO-DLBCL-COO-HANS
      required: false
      value_constraint: Activated B-cell-like (ABC / non-GCB) showed greater Pola-R-CHP benefit in POLARIX subgroup
    - biomarker_id: BIO-BCL2-EXPRESSION-IHC
      required: false
      value_constraint: Double-expressor (BCL2-IHC + MYC-IHC) phenotype — Pola-R-CHP may particularly benefit DEL subgroup; rule out HGBL-DH
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2
recommended_regimen: REG-POLA-R-CHP
concurrent_therapy: []
followed_by: []
evidence_level: high
strength_of_recommendation: strong
nccn_category: '1'
expected_outcomes:
  overall_response_rate: ~88% (≥PR after 6 cycles, POLARIX)
  complete_response: ~70%
  progression_free_survival: 2-year PFS ~76.7% (vs 70.2% R-CHOP, HR 0.73)
  overall_survival_5y: Mature OS data still maturing; trends comparable or favoring Pola-R-CHP
hard_contraindications:
  - CI-HBV-NO-PROPHYLAXIS
  - CI-LVEF-LOW-FOR-ANTHRACYCLINE
  - CI-BORTEZOMIB-SEVERE-NEUROPATHY
red_flags_triggering_alternative: []
required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-LDH
  - TEST-B2-MICROGLOBULIN
  - TEST-HBV-SEROLOGY
  - TEST-HCV-ANTIBODY
  - TEST-HIV-SEROLOGY
  - TEST-CD20-IHC
  - TEST-PET-CT
  - TEST-ECHO
  - TEST-LN-EXCISIONAL-BIOPSY
  - TEST-FLOW-CYTOMETRY
  - TEST-FISH-PANEL
  - TEST-PREGNANCY
  - TEST-BM-ASPIRATE
  - TEST-BM-TREPHINE
desired_tests: []
rationale: 'Aggressive-track default for newly-diagnosed DLBCL NOS with IPI ≥2 (RF-DLBCL-HIGH-IPI fired). Replaces vincristine in R-CHOP with polatuzumab vedotin (anti-CD79b ADC with MMAE payload). POLARIX trial (NEJM 2022) showed ~6.5% absolute PFS improvement at 2 years vs R-CHOP. Toxicity profile comparable; peripheral neuropathy slightly higher with polatuzumab but vincristine removed. Major access constraint in Ukraine: polatuzumab not НСЗУ-reimbursed. Funding pathway (clinical trial / charitable / out-of-pocket) MUST be verified before plan finalized.

  '
rationale_ua: >
  агресивний-track default for newly-diagnosed DLBCL NOS with IPI ≥2 (RF-DLBCL-HIGH-IPI fired). Replaces вінкристин in R-CHOP with полатузумаб ведотин (anti-CD79b ADC with MMAE payload). POLARIX дослідження (NEJM 2022) showed ~6.5% absolute PFS покращення at 2 years vs R-CHOP. профіль токсичності співставний; периферична нейропатія slightly higher with polatuzumab but вінкристин removed. Major access constraint in Ukraine: polatuzumab not НСЗУ-відшкодовуваний. Funding pathway (клінічне дослідження / charitable / із власних коштів) MUST be verified before plan finalized.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: Pola-R-CHP is a Category 1 preferred regimen for newly-diagnosed DLBCL with IPI ≥2 where polatuzumab is accessible
  - source_id: SRC-ESMO-DLBCL-2024
    position: supports
    relevant_quote_paraphrase: ESMO 2024 codifies R-CHOP × 6 as 1L standard for DLBCL NOS; Pola-R-CHP preferred for IPI ≥3 per POLARIX
known_controversies: []
do_not_do:
  - Не призначати при відсутності верифікованого funding pathway — daratumumab... вибач, polatuzumab не реімбурсується НСЗУ; пацієнт має бути попереджений ДО запропонування.
  - Не починати без HBV скринінгу + entecavir prophylaxis при HBsAg+ або anti-HBc+ — anti-CD20 reactivation ризик не зменшується від polatuzumab.
  - Не призначати без baseline LVEF ≥50% — anthracycline cardiotoxicity те ж саме як R-CHOP.
  - Не ігнорувати pre-existing peripheral neuropathy — polatuzumab MMAE викликає neuropathy; Grade ≥2 baseline = absolute CI.
  - Не пропускати CNS prophylaxis якщо CNS-IPI ≥4 — той же ризик що при R-CHOP.
  - Не використовувати при concomitant strong CYP3A4 inhibitor без monitoring — підвищена neuropathy + myelosuppression.
time_critical: false
last_reviewed: '2026-04-27'
reviewers: []
reviewer_signoffs: 0
notes: 'STUB — pending Clinical Co-Lead sign-off. Aggressive counterpart to IND-DLBCL-1L-RCHOP. Activated by RF-DLBCL-HIGH-IPI; engine routes IPI 0-1 patients to R-CHOP standard track.

