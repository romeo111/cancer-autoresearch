id: IND-CRC-ADJUVANT-STAGE3-FOLFOX
plan_track: standard
applicable_to:
  disease_id: DIS-CRC
  line_of_therapy: 1
  stage_requirements:
  - Stage III (any T, N1-2, M0)
  - Post-curative resection (R0)
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2
recommended_regimen: REG-FOLFOX
concurrent_therapy: []
followed_by: []
evidence_level: high
strength_of_recommendation: strong
nccn_category: '1'
expected_outcomes:
  overall_response_rate: Adjuvant — assessed by DFS not response
  complete_response: n/a (post-resection)
  progression_free_survival: 5-yr DFS ~70-75% stage III low-risk; ~55-65% high-risk
  overall_survival_5y: 5-yr OS ~75-85% (depends on sub-stage + tumor biology)
hard_contraindications: []
red_flags_triggering_alternative:
- RF-CRC-FRAILTY-AGE
required_tests: []
desired_tests: []
rationale: 'MOSAIC trial established FOLFOX over 5-FU/LV for stage III adjuvant. IDEA pooled analysis: 3 mo non-inferior to
  6 mo for low-risk (T1-3 N1) with much less neuropathy — duration is a clinical decision based on T/N substage and patient
  preference.

  '
sources:
- source_id: SRC-NCCN-COLON-2025
  position: supports
- source_id: SRC-ESMO-COLON-2024
  position: supports
do_not_do:
- Do NOT delay adjuvant beyond 8 weeks post-surgery if avoidable — diminishing benefit thereafter
- Do NOT continue oxaliplatin past Grade 2 functional neuropathy — switch to 5-FU/LV alone
- Do NOT add bevacizumab in adjuvant — NSABP C-08 negative, NOT a standard
last_reviewed: '2026-04-26'
notes: Standard stage III adjuvant. Decision on duration (3 vs 6 mo) per IDEA risk grouping.
