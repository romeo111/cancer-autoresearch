id: IND-HCV-MZL-POST-DAA-SURVEILLANCE
plan_track: standard
applicable_to:
  disease_id: DIS-HCV-MZL
  line_of_therapy: 1
  stage_requirements:
    - SVR12 confirmed post-DAA
    - Lymphoma response assessment in progress (typically 3-12 months post-SVR)
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 3
recommended_regimen: REG-DAA-OBSERVATION-HCV-MZL
concurrent_therapy: []
followed_by: []
evidence_level: moderate
strength_of_recommendation: strong
nccn_category: 2A
expected_outcomes:
  overall_response_rate: ~70% hematologic response from DAA alone (Arcaini 2014; modern DAA era confirmation Carrier 2015)
  complete_response: ~45-55% lymphoma CR from DAA alone
  progression_free_survival: Median time-to-event ~6-12 months for visible response; durable in most responders
  overall_survival_5y: Excellent (~90%+) for responders; non-responders route to immunochemotherapy
hard_contraindications: []
red_flags_triggering_alternative:
  - RF-HCV-MZL-FRAILTY-AGE
  - RF-AGGRESSIVE-HISTOLOGY-TRANSFORMATION
required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-LDH
  - TEST-HBV-SEROLOGY
  - TEST-PET-CT
desired_tests: []
rationale: Per ESMO MZL 2024 + EASL HCV 2023, after SVR12 achievement following pan-genotypic DAA (sofosbuvir/velpatasvir or glecaprevir/pibrentasvir), active observation for hematologic response is preferred over immediate immunochemotherapy. ~70% of HCV-associated MZL achieve hematologic response from antiviral therapy alone within 6-12 months. Persistent or progressive lymphoma after 6-12 months observation routes to standard-track immunochemotherapy (rituximab monotherapy or BR per IND-HCV-MZL-1L-BR-AGGRESSIVE). HCV-MZL transformation to DLBCL is rare but mandates immediate aggressive treatment.
rationale_ua: >-
  Per ESMO MZL 2024 + EASL HCV 2023, after SVR12 achievement following pan-genotypic DAA (sofosbuvir/velpatasvir or glecaprevir/pibrentasvir), active observation for hematologic відповідь is переважний over immediate immunochemotherapy. ~70% of HCV-associated MZL achieve hematologic відповідь from antiviral терапія alone within 6-12 місяців. Persistent or progressive лімфома after 6-12 months observation routes to стандарт-track immunochemotherapy (ритуксимаб монотерапія or BR per IND-HCV-MZL-1L-BR-агресивний). HCV-MZL трансформація to DLBCL is рідкісний but mandates immediate агресивний лікування.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-ESMO-MZL-2024
    position: supports
    relevant_quote_paraphrase: Post-SVR12 observation for hematologic response is preferred prior to immunochemotherapy initiation in HCV-MZL; reassess at 6-12 months
  - source_id: SRC-EASL-HCV-2023
    position: supports
    relevant_quote_paraphrase: DAA achieves SVR ≥95% across genotypes; lymphoma regression follows in ~70% of HCV-associated indolent B-NHL — observation post-SVR justified before adding cytotoxic therapy
known_controversies:
  - topic: Concurrent DAA + BR vs sequential DAA → observation → BR-if-needed
    positions:
      - position: Sequential — minimizes overtreatment, ~70% avoid chemo
        sources:
          - SRC-ESMO-MZL-2024
      - position: Concurrent DAA + BR for high-burden / aggressive disease — faster cytoreduction
        sources:
          - SRC-NCCN-BCELL-2025
        evidence_note: Reserved for symptomatic / high-burden / transformation-suspect
    our_default: Sequential (DAA → observe → BR-if-needed) for typical low/moderate-burden HCV-MZL; concurrent DAA+BR for high-burden / aggressive (per IND-HCV-MZL-1L-BR-AGGRESSIVE)
    rationale: Most patients respond to DAA alone — chemo avoidance preferred when feasible
do_not_do:
  - НЕ розпочинати імунохіміотерапію негайно після SVR12 без 6-12 місяців спостереження за гематологічною відповіддю — більшість пацієнтів отримують ремісію від DAA самостійно.
  - НЕ ігнорувати ознак трансформації під час спостереження — immediate aggressive treatment per IND-HCV-MZL-1L-BR-AGGRESSIVE.
  - НЕ забувати про risk HBV co-infection screening + reactivation prophylaxis перед anti-CD20.
  - НЕ продовжувати спостереження >12 місяців без візуалізації відповіді — escalate to immunochemotherapy.
  - НЕ ігнорувати кріоглобулінемічний васкуліт — окрема активна терапія може знадобитися навіть при SVR.
time_critical: false
last_reviewed: '2026-04-27'
reviewers: []
reviewer_signoffs: 0
notes: 'Post-DAA active surveillance pathway. line_of_therapy: 1 reflects continuation of antiviral 1L. Engine activates this after SVR12 confirmed and prior to immunochemotherapy decision. Reassess at 3, 6, 12 months. CR/PR → continue surveillance; SD/PD → route to BR per IND-HCV-MZL-1L-BR-AGGRESSIVE.'
