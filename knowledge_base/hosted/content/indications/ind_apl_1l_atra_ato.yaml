rationale: >
  Standard 1L for low-risk and intermediate-risk APL (Sanz: WBC ≤10).
  Chemotherapy-free ATRA + ATO per APL0406 / LO-CoCo: 2-y EFS 97% vs
  86% (ATRA + chemo / AIDA), 2-y OS 99% vs 91%. ATRA initiated
  IMMEDIATELY at clinical APL suspicion (don't wait for cytogenetic
  confirmation — early-death from bleeding is dominant APL mortality).
  Daily ECG + electrolyte monitoring during ATO induction. DS prophylaxis
  with dexamethasone if rising WBC.

rationale_ua: >
  стандарт 1L for низького ризику and проміжного ризику APL (Sanz: WBC ≤10). хіміотерапія-free ATRA + ATO per APL0406 / LO-CoCo: 2-y EFS 97% проти 86% (ATRA + chemo / AIDA), 2-y OS 99% проти 91%. ATRA initiated IMMEDIATELY at clinical APL suspicion (don't wait for cytogenetic confirmation — early-death from bleeding is dominant APL mortality). Daily ECG + electrolyte моніторинг during ATO індукція. DS prophylaxis with dexamethasone if rising WBC.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-AML-2025
    position: supports
    relevant_quote_paraphrase: "ATRA + ATO is preferred 1L for low/intermediate-risk APL"
  - source_id: SRC-ELN-APL-2019
    position: supports
    relevant_quote_paraphrase: "ATRA + ATO is recommended 1L for low/intermediate-risk APL; chemotherapy-free regimen"
  - source_id: SRC-APL0406-LOCOCO-2013
    position: supports
    relevant_quote_paraphrase: "APL0406 phase-3 trial: ATRA + ATO superior to ATRA + chemotherapy in low/intermediate-risk APL"

do_not_do:
  - "Не чекати цитогенетичне підтвердження PML-RARα щоб почати ATRA — клінічна підозра + типовий smear/DIC = негайно ATRA."
  - "Не пропускати DS-профілактику стероїдами при рості WBC під час індукції — DS — провідна причина смертності в індукції."
  - "Не починати ATO без daily ECG + електролітної корекції (K+ >4.0, Mg2+ >1.8) — risk torsades."
  - "Не призначати без виключення вагітності + 2 методів контрацепції — ATRA та ATO обидва тератогенні."
  - "Не призначати antrachycline-вмісні regimen якщо patient — low-risk (WBC ≤10) — APL0406 показав, що chemo-free ATRA + ATO кращий."
  - "Не пропускати DIC management при дебюті — fibrinogen target >150, plt target >30-50K, INR <1.5."

known_controversies:
  - topic: "Maintenance therapy after consolidation in low/intermediate-risk APL"
    positions:
      - position: "No maintenance needed for low/intermediate-risk treated with ATRA + ATO + MRD-negative at end of consolidation (APL0406)"
        sources:
          - SRC-APL0406-LOCOCO-2013
      - position: "Some protocols add ATRA / 6-MP / MTX maintenance even for low-risk"
        sources:
          - SRC-ELN-APL-2019
    our_default: "No maintenance for low/intermediate-risk MRD-negative; maintenance for high-risk per protocol"
    rationale: "APL0406 + LO-CoCo demonstrated equivalent / superior outcomes without maintenance in low-risk"

time_critical: true
last_reviewed: "2026-04-25"
reviewers: []
reviewer_signoffs: 0
notes: >
  STANDARD track for low/intermediate-risk APL. time_critical: true
  reflects CHARTER §15.2 C2 — APL initial management is partially
  outside the non-device CDS carve-out (ATRA initiation must be at
  bedside within hours, not via this tool). OpenOnco scope: workup
  + plan AFTER initial stabilization. STUB — requires clinical
  co-lead signoff.
