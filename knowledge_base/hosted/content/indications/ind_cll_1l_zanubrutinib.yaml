rationale: >
  Zanubrutinib continuous monotherapy is a preferred 1L BTKi for CLL,
  alongside acalabrutinib. Both second-generation BTKis are preferred
  over ibrutinib due to superior cardiac safety + comparable or
  superior PFS. ALPINE trial (r/r CLL): zanubrutinib superior to
  ibrutinib in PFS (HR 0.65) AND atrial fibrillation rate (5.2% vs
  13.3%). SEQUOIA trial (1L CLL): zanubrutinib superior to BR.
  Continuous therapy until progression / intolerance. Suitable for
  most patients regardless of risk; high-risk (TP53/del 17p)
  particularly benefits as chemoimmuno is contraindicated.

rationale_ua: >
  занубрутиніб continuous монотерапія is a переважний 1L BTKi for CLL, alongside акалабрутиніб. Both другого покоління BTKis are переважний over ібрутиніб due to перевершує cardiac безпека + співставний or перевершує PFS. ALPINE дослідження (р/р CLL): занубрутиніб перевершує ібрутиніб in PFS (HR 0.65) AND atrial fibrillation rate (5.2% проти 13.3%). SEQUOIA дослідження (1L CLL): занубрутиніб перевершує BR. Continuous терапія until прогресування / intolerance. Suitable for найбільш patients regardless of risk; високого ризику (TP53/del 17p) особливо виграш as chemoimmuno is протипоказаний.
