id: IND-SMZL-2L-BR
plan_track: standard
applicable_to:
  disease_id: DIS-SPLENIC-MZL
  line_of_therapy: 2
  stage_requirements:
    - Symptomatic relapse / progression after 1L rituximab monotherapy or splenectomy
    - Active treatment indication
  biomarker_requirements_required:
    - biomarker_id: BIO-CD20-IHC
      required: true
      value_constraint: positive (CD20+)
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2
recommended_regimen: REG-R-BENDAMUSTINE-RELAPSED-MZL
concurrent_therapy: []
followed_by: []
evidence_level: moderate
strength_of_recommendation: strong
nccn_category: 2A
expected_outcomes:
  overall_response_rate: ~85-90% (Rummel 2013 BR for indolent NHL; SMZL subgroup similar)
  complete_response: ~50-60%
  progression_free_survival: Median PFS ~3-4 years
  overall_survival_5y: ~75-85%
hard_contraindications:
  - CI-HBV-NO-PROPHYLAXIS
  - CI-SEVERE-CYTOPENIA-BR
red_flags_triggering_alternative:
  - RF-AGGRESSIVE-HISTOLOGY-TRANSFORMATION
required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-LDH
  - TEST-HBV-SEROLOGY
  - TEST-CD20-IHC
  - TEST-PET-CT
  - TEST-BM-ASPIRATE
  - TEST-BM-TREPHINE
desired_tests: []
rationale: 'BR is the preferred 2L for relapsed/progressive SMZL after rituximab monotherapy failure. Per NCCN and ESMO MZL 2024, BR achieves ~85-90% ORR with ~3-4 year median PFS. Alternative 2L: ibrutinib (BTKi monotherapy, registration trial Noy 2017 in MZL — ORR ~48%), splenectomy (durable for splenic-predominant disease). Choice driven by disease distribution, comorbidity, and access.'
rationale_ua: >-
  BR is the переважний 2L for рецидивний/progressive SMZL after ритуксимаб монотерапія failure. Per NCCN and ESMO MZL 2024, BR achieves ~85-90% ORR with ~3-4 year медіана ВБП. Alternative 2L: ібрутиніб (BTKi монотерапія, registration дослідження Noy 2017 in MZL — ORR ~48%), splenectomy (durable for splenic-predominant хвороба). Choice driven by хвороба distribution, коморбідність, and access.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: BR is recommended 2L for relapsed/progressive SMZL after rituximab failure; ibrutinib alternative
  - source_id: SRC-ESMO-MZL-2024
    position: supports
    relevant_quote_paraphrase: BR or ibrutinib are preferred 2L options for relapsed SMZL; splenectomy retains role for splenic-predominant disease
  - source_id: SRC-BSH-MZL-2024
    position: supports
    relevant_quote_paraphrase: BSH endorses BR as standard 2L immunochemotherapy for relapsed SMZL
known_controversies:
  - topic: BR vs ibrutinib BTKi monotherapy as preferred 2L SMZL
    positions:
      - position: BR — higher CR rate; chemo-immunotherapy with finite duration
        sources:
          - SRC-NCCN-BCELL-2025
      - position: Ibrutinib — chemo-free; sustained response on continuous therapy
        sources:
          - SRC-ESMO-MZL-2024
        evidence_note: Noy 2017 ORR ~48% in MZL; manageable AF/bleeding
    our_default: BR for fit patients with high-burden disease; ibrutinib for elderly/frail or post-BR relapse
    rationale: BR delivers deeper response; BTKi for chemo-spared patients
do_not_do:
  - НЕ призначати без HBV screening + prophylaxis при HBsAg+ або anti-HBc+.
  - НЕ використовувати full-dose bendamustine при FIB-4 >3.25 — редукція до 70 mg/m².
  - НЕ призначати при baseline severe cytopenia.
  - НЕ забувати PJP profilaxis ≥6 міс після останньої дози anti-CD20.
  - НЕ ігнорувати ознак transformation до DLBCL — biopsy при швидкій прогресії, LDH↑.
time_critical: false
last_reviewed: '2026-04-27'
reviewers: []
reviewer_signoffs: 0
notes: 'Standard-track 2L SMZL after rituximab monotherapy failure. Re-uses REG-R-BENDAMUSTINE-RELAPSED-MZL. Alternative: ibrutinib monotherapy (separate Indication when access available).'
