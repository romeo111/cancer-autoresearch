id: IND-MF-ADVANCED-2L-BEXAROTENE
plan_track: standard

applicable_to:
  disease_id: DIS-MF-SEZARY
  line_of_therapy: 2
  stage_requirements:
    - "Advanced MF (IIB+) or Sézary syndrome relapsed/refractory after ≥1 prior systemic line"
    - "OR rapidly progressive IB/IIA after skin-directed failure"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 3

recommended_regimen: REG-BEXAROTENE-MONO-CTCL
concurrent_therapy: []
followed_by:
  - "Maintenance dose 75-150 mg/m² PO daily continuation in responders (separate Indication: IND-MF-MAINTENANCE-RETINOID)"

evidence_level: moderate
strength_of_recommendation: conditional
nccn_category: "2A"

expected_outcomes:
  overall_response_rate: "~45-55% (Duvic 2001 r/r CTCL all stages)"
  complete_response: "~10%"
  progression_free_survival: "Median PFS ~9-12 months in responders"
  overall_survival_5y: "Highly variable — chronic disease; many continue indefinitely on maintenance"

hard_contraindications: []
red_flags_triggering_alternative: []

required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-LDH
  - TEST-SEZARY-COUNT
  - TEST-FLOW-CYTOMETRY
  - TEST-PET-CT
  - TEST-PREGNANCY
desired_tests: []
# Note: fasting lipid panel + TSH/free T4 baseline + monthly are mandatory
# practical monitoring (no dedicated TEST entity in KB) — see do_not_do.

rationale: >
  Bexarotene (selective RXR agonist) — oral, well-characterized 2L+
  option for relapsed/refractory MF/Sézary across stages per Duvic
  2001 (Arch Dermatol). ORR ~45-55% with durable responses in
  responders permitting transition to maintenance dose. Distinct
  mechanism (RXR-driven differentiation/apoptosis) from
  cytotoxic/HDACi/anti-CD30 axes — useful when those exhausted or
  contraindicated. Can also be used at 75-150 mg/m² maintenance dose
  in responders post induction with mogamulizumab/BV. Triglyceride
  and thyroid management are dominant practical issues — atorvastatin/
  fenofibrate prophylaxis from day 1; expect levothyroxine initiation.

rationale_ua: >
  Bexarotene (селективний RXR агоніст) — oral, well-characterized 2L+ option for рецидивний/рефрактерний MF/Sézary across stages per Duvic 2001 (Arch Dermatol). ORR ~45-55% with durable responses in responders permitting transition to підтримка доза. Distinct mechanism (RXR-driven differentiation/apoptosis) from cytotoxic/HDACi/anti-CD30 axes — useful when those exhausted or протипоказаний. Can also be used at 75-150 mg/m² підтримка доза in responders post індукція with mogamulizumab/BV. Triglyceride and thyroid management are dominant practical issues — atorvastatin/ fenofibrate prophylaxis from day 1; expect levothyroxine initiation.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: "Bexarotene is a recognized 2L+ option for r/r CTCL across stages per Duvic 2001"
  - source_id: SRC-ESMO-CTCL-2024
    position: supports
    relevant_quote_paraphrase: "Oral bexarotene is preferred 2L+ option for advanced MF/Sézary; useful in maintenance dosing after response"

known_controversies:
  - topic: "Bexarotene vs methotrexate as 2L for advanced MF without CD30/CCR4 access"
    positions:
      - position: "Bexarotene — RXR mechanism, established trial data, transitions to maintenance"
        sources: [SRC-NCCN-BCELL-2025]
      - position: "Methotrexate — broadly accessible, oral, but lower ORR (~30%)"
        sources: [SRC-ESMO-CTCL-2024]
    our_default: "Bexarotene first-line systemic 2L when accessible; methotrexate 5-25 mg/week PO when bexarotene inaccessible"

do_not_do:
  - "НЕ розпочинати без atorvastatin/fenofibrate prophylaxis — hypertriglyceridemia majoritarily."
  - "НЕ пропускати baseline + monthly fasting lipids — pancreatitis ризик при TG >1000."
  - "НЕ пропускати baseline + monthly TSH/T4 — central hypothyroidism у 30-50%."
  - "НЕ комбінувати з gemfibrozil — markedly increases bexarotene levels."
  - "НЕ призначати у вагітних — Category X teratogenic; effective contraception ≥1 month before/during/after."
  - "НЕ комбінувати з vitamin A supplements — additive toxicity."
  - "НЕ забувати про photosensitivity — sun protection counseling."

time_critical: false
last_reviewed: "2026-04-27"
reviewer_signoffs: 0
notes: >
  STUB. Major UA access barrier — international supply required.
  Topical 1% gel useful for limited disease (compounding sometimes
  available domestically). Maintenance dose continuation in
  responders is standard.
