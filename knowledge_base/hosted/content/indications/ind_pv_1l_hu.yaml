rationale: >
  Aggressive 1L for high-risk PV (age >60 OR prior thrombosis):
  HU 500-1500 mg/day (titrate to target Hct <45%, plt <400K) +
  phlebotomy (intermittent if HU adequate) + low-dose aspirin.
  Pegylated interferon-α (ropeginterferon for PV — PROUD-PV / CONTI)
  is alternative cytoreduction with potential disease-modifying
  activity (clonal allelic burden reduction); access-limited.
  Ruxolitinib reserved for HU-resistance / intolerance (RESPONSE).

rationale_ua: >
  агресивний 1L for високого ризику PV (age >60 OR prior thrombosis): HU 500-1500 mg/day (titrate to target Hct <45%, plt <400K) + phlebotomy (intermittent if HU adequate) + low-доза aspirin. Pegylated інтерферон-α (ropeginterferon for PV — PROUD-PV / CONTI) is alternative cytoreduction with potential хвороба-modifying activity (clonal allelic burden зниження); access-limited. руксолитиніб reserved for HU-resistance / intolerance (відповідь).
