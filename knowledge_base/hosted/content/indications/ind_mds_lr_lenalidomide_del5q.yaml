id: IND-MDS-LR-LENALIDOMIDE-DEL5Q
plan_track: standard

applicable_to:
  disease_id: DIS-MDS-LR
  line_of_therapy: 1
  stage_requirements:
    - "LR-MDS with del(5q) chromosomal abnormality (isolated or with one additional non-monosomy 7 abnormality)"
    - "Transfusion-dependent (RBC or symptomatic anemia not responding to ESA)"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-LENALIDOMIDE-MDS-DEL5Q
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "~56% RBC TI at 26 weeks (MDS-004; vs 5.9% placebo)"
  complete_response: "~20-25% achieve cytogenetic CR (loss of del(5q) clone)"
  progression_free_survival: "Median TI duration >2 years per MDS-004"
  overall_survival_5y: "Per IPSS-R baseline; lenalidomide does not alter natural history but improves QoL via TI"

