nccn_category: "2A"

expected_outcomes:
  overall_response_rate: "31.4% (C-144-01 pooled, n=153)"
  complete_response: "~9%"
  progression_free_survival: "Median PFS 4.1 mo overall; mDoR not reached at 27.6 mo follow-up among responders"
