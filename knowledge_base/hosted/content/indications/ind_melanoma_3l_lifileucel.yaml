  disease_id: DIS-MELANOMA
  line_of_therapy: 3
  stage_requirements:
    - "Stage IV unresectable / metastatic"
    - "Progression on or after anti-PD-1 (1L or 2L)"
    - "If BRAF V600+: also progression on BRAFi+MEKi"
    - "Resectable lesion ≥1.5 cm³ available for tumor procurement"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 1
    age_min: 18
    age_max: 70

recommended_regimen: REG-LIFILEUCEL-TIL-MELANOMA
concurrent_therapy: []
