id: IND-ADVSM-1L-AVAPRITINIB
plan_track: standard

applicable_to:
  disease_id: DIS-MASTOCYTOSIS
  line_of_therapy: 1
  stage_requirements:
    - "Advanced systemic mastocytosis (ASM, SM-AHN, MCL per WHO 2022)"
    - "C-finding present (organ damage from mast-cell infiltration: cytopenia, hepatic dysfunction, ascites, malabsorption / weight loss, large osteolysis with pathologic fracture)"
  biomarker_requirements_required:
    - biomarker_id: BIO-KIT
      value_constraint: "D816V positive"
      required: true
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2
    platelet_min: 50000

recommended_regimen: REG-AVAPRITINIB-ADVSM-1L
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "~75% (PATHFINDER advanced SM)"
  progression_free_survival: "Median not reached (PATHFINDER 24-mo follow-up)"
  overall_survival_5y: "ASM ~70% at 24 mo (vs historical ~50%); SM-AHN and MCL with concomitant AHN-directed therapy"
  notes: "EXPLORER (Gotlib NEJM 2023) at 300 mg, PATHFINDER (DeAngelo Nat Med 2023) at 200 mg; molecular response (KIT D816V VAF reduction) achieved in majority"

hard_contraindications: []
red_flags_triggering_alternative: []
required_tests: []
desired_tests: []

rationale: >
  Avapritinib at 200 mg/day is the preferred 1L for KIT D816V+
  advanced systemic mastocytosis per NCCN — superior depth of
  molecular response and tolerability vs midostaurin (D-RIVE).
  Imatinib is CONTRAINDICATED in KIT D816V (steric clash —
  activation-loop conformation prevents binding). Platelet count
  <50 ×10⁹/L is a boundary where intracranial-hemorrhage risk
  contraindicates avapritinib — these patients route to midostaurin
  (alternative indication). SM-AHN patients also need AHN-component-
  directed therapy (azacitidine for MDS / CMML AHN; intensive chemo
  for AML AHN) — avapritinib alone does not address the AHN
  compartment.

sources:
  - source_id: SRC-NCCN-SM-2025
    weight: primary
  - source_id: SRC-ESMO-AML-2020
    weight: supporting
  - source_id: SRC-ONCOKB
    weight: supporting

do_not_do:
  - "Do NOT use imatinib in KIT D816V advanced SM — intrinsic resistance (steric clash)."
  - "Do NOT start avapritinib with platelets <50 ×10⁹/L — boxed warning; switch to midostaurin (alternative indication)."
  - "Do NOT use avapritinib as monotherapy for SM-AHN — the AHN component (MDS / CMML / AML) needs its own histology-directed therapy."
  - "Do NOT skip baseline brain MRI — cerebral microbleed surveillance is part of the monitoring schedule."

last_reviewed: '2026-04-26'
reviewers: []
reviewer_signoffs: 2
notes: >
  Preferred 1L for the ~95% of advanced SM that is KIT D816V+.
  Indolent SM (ISM) does NOT receive avapritinib at this dose for
  disease modification — avapritinib 25 mg in moderate-severe
  symptomatic ISM (PIONEER) is a separate, narrower symptomatic-
  control indication not authored here.
