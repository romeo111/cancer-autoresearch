id: IND-HCC-SYSTEMIC-1L-SORAFENIB
plan_track: standard

applicable_to:
  disease_id: DIS-HCC
  line_of_therapy: 1
  stage_requirements: ["BCLC B not eligible for TACE / TARE", "BCLC C", "Child-Pugh A or selected B7"]
  biomarker_requirements_required:
    - biomarker_id: BIO-AFP
      required: true
      value_constraint: "AFP baseline (ng/mL) — required as risk-stratifier and treatment-response marker for HCC systemic therapy"
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2

recommended_regimen: REG-SORAFENIB-MONO
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "~3% (RECIST); 10-15% (mRECIST)"
  complete_response: "<1%"
  progression_free_survival: "Median ~4 mo"
  overall_survival_5y: "mOS ~10-11 mo (SHARP), worse for CP-B"

hard_contraindications: []
red_flags_triggering_alternative:
  - RF-HCC-CHILD-PUGH-B-C  # CP-C contra; CP-B7 individual decision

required_tests:
  - TEST-CT-CHEST-ABDOMEN-PELVIS
  - TEST-CHILD-PUGH-CALCULATION

desired_tests: []

rationale: >
  Sorafenib — established 1L since SHARP 2008. Now positioned as 1L
  alternative when ICI-combinations contraindicated (autoimmune disease,
  organ transplant, CP-B beyond ICI eligibility). NSZU-funded —
  practically the most-accessible 1L in Ukraine.

rationale_ua: >
  сорафеніб — усталений 1L since SHARP 2008. Now positioned as 1L alternative when ICI-combinations протипоказаний (автоімунний хвороба, organ transplant, CP-B beyond ICI eligibility). НСЗУ-funded — practically the найбільш-accessible 1L in Ukraine.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-HCC-2025
    position: supports

do_not_do:
  - "Do NOT continue through hepatic decompensation onset"
  - "Do NOT delay HFSR prophylaxis (urea cream, emollient, friction avoidance)"

last_reviewed: "2026-04-26"
notes: "Most-accessible 1L for Ukraine; lenvatinib non-inferior alternative when accessible."
