id: IND-CHL-1L-ABVD
plan_track: standard

applicable_to:
  disease_id: DIS-CHL
  line_of_therapy: 1
  stage_requirements: []
  biomarker_requirements_required:
    - biomarker_id: BIO-HBV-STATUS
      required: true
      value_constraint: "any value valid (categorical etiology gate; HBsAg+ or anti-HBc+ → entecavir prophylaxis before steroid pulse on ABVD; reactivation documented even without anti-CD20)"
    - biomarker_id: BIO-HIV-STATUS
      required: true
      value_constraint: "any value valid (categorical etiology gate; HIV+ → continue cART throughout, integrase-inhibitor backbone preferred to avoid ritonavir-vincristine interaction; PJP prophylaxis if CD4 < 200)"
  biomarker_requirements_excluded: []
  demographic_constraints: {ecog_max: 3}

recommended_regimen: REG-ABVD
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "~95%"
  complete_response: "~80-85%"
  progression_free_survival: "5y PFS ~80% advanced, ~90% early-stage"
  overall_survival_5y: "~85-90% advanced, ~95% early-stage"

hard_contraindications: [CI-LVEF-LOW-FOR-ANTHRACYCLINE]
red_flags_triggering_alternative: [RF-CHL-ADVANCED-STAGE]

required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-LDH
  - TEST-PET-CT
  - TEST-LN-EXCISIONAL-BIOPSY
  - TEST-ECHO
  - TEST-PREGNANCY
  - TEST-HBV-SEROLOGY
  - TEST-HIV-SEROLOGY
desired_tests: []

rationale: >
  ABVD is long-standing 1L for Hodgkin (40+ years). Early-stage cHL:
  ABVD × 2-4 + ISRT (response-adapted per interim PET Deauville).
  Advanced cHL: ABVD × 6 OR A+AVD × 6 (per ECHELON-1, A+AVD superior
  OS where brentuximab accessible). Bleomycin pulmonary toxicity is
  major concern — DLCO baseline + serial monitoring; discontinue
  bleomycin if drop ≥25%.

rationale_ua: >
  ABVD is long-standing 1L for Hodgkin (40+ years). ранньої стадії cHL: ABVD × 2-4 + ISRT (відповідь-adapted per interim PET Deauville). поширений cHL: ABVD × 6 OR A+AVD × 6 (per ECHELON-1, A+AVD перевершує OS where brentuximab accessible). Bleomycin pulmonary токсичність is major concern — DLCO базове + serial моніторинг; припинити bleomycin if drop ≥25%.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources: [{source_id: SRC-NCCN-BCELL-2025, position: supports}]
known_controversies:
  - topic: "ABVD vs A+AVD for advanced cHL"
    positions:
      - position: "A+AVD preferred — superior OS per ECHELON-1 follow-up"
        sources: [SRC-NCCN-BCELL-2025]
      - position: "ABVD acceptable when brentuximab not accessible"
        sources: [SRC-NCCN-BCELL-2025]
    our_default: "A+AVD for advanced cHL with brentuximab funding pathway; ABVD fallback"

do_not_do:
  - "НЕ комбінувати з brentuximab vedotin — ABSOLUTE pulmonary toxicity contraindication."
  - "НЕ використовувати G-CSF на ABVD — підвищує pulmonary toxicity bleomycin."
  - "НЕ продовжувати bleomycin при DLCO drop ≥25% — switch to AVD (drop bleo)."
  - "НЕ пропускати baseline LVEF + DLCO + fertility preservation discussion."
  - "НЕ використовувати високопоточний O2 при анестезії після bleomycin (lifetime risk)."
  - "НЕ починати без HBV скринінгу + entecavir prophylaxis при HBsAg+ — реактивація на стероїдному пульсі реальна (також actionable при anti-HBc+ — моніторити HBV-DNA q-cycle)."
  - "НЕ переривати ART у HIV+ пацієнтів — HIV-HL outcomes approach HIV-negative cHL з концурентним ART; уникати ritonavir-boosted PIs (vincristine interaction); PJP prophylaxis throughout."

time_critical: false
last_reviewed: "2026-04-27"
reviewer_signoffs: 0
notes: STUB.
