id: IND-ET-1L-ASA
plan_track: standard

applicable_to:
  disease_id: DIS-ET
  line_of_therapy: 1
  stage_requirements: []
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints: {}

recommended_regimen: REG-HU-PV-ET
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "Plt control to <400-450K achievable in >80% on HU"
  complete_response: "Thrombosis-risk reduction; symptom improvement"
  progression_free_survival: "Thrombosis-related events ~50-60% reduction on HU + ASA in high-risk"
  overall_survival_5y: "Median OS ~18-20 years; 5-y OS ~90% with proper management"

hard_contraindications: []
red_flags_triggering_alternative:
  - RF-PV-ET-HIGH-THROMBOSIS-RISK
  - RF-PV-ET-PREGNANCY-OR-PLANNING
  - RF-PV-ET-ORGAN-DYSFUNCTION
  - RF-PV-ET-FRAILTY-AGE

