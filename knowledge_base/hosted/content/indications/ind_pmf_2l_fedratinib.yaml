expected_outcomes:
  overall_response_rate: "≥35% spleen volume reduction at week 24: 31-55% (JAKARTA-2; criteria-dependent)"
  complete_response: "≥50% MFSAF symptom score reduction ~27%"
  progression_free_survival: "Median treatment duration ~7-9 months in JAKARTA-2; FREEDOM-2 confirms efficacy"
  overall_survival_5y: "Salvage setting; OS dependent on baseline DIPSS-Plus + alloHCT pathway"

