do_not_do:
  - "НЕ розпочинати без baseline thiamine measurement + correction of deficiency — boxed warning, фатальні випадки задокументовано."
  - "НЕ пропускати prophylactic thiamine 100 мг PO daily протягом усієї терапії."
  - "НЕ ігнорувати GI symptoms — take with food + active loperamide management; severe diarrhea дегідратація."
  - "НЕ комбінувати з сильним CYP3A4-inhibitor без редукції дози до 200 мг."
  - "НЕ продовжувати при Wernicke symptoms (confusion, ataxia, ophthalmoplegia) — discontinue + IV thiamine."
  - "НЕ забувати alloHCT-pathway для transplant-eligible — fedratinib не є curative."
  - "НЕ підтверджувати план без funding pathway — препарат не зареєстрований в Україні."

known_controversies:
  - topic: "Fedratinib vs momelotinib vs pacritinib as 2L MF post-ruxolitinib"
    positions:
      - position: "Fedratinib — RCT-validated, FDA-approved, broader use; preferred when anemia not dominant + thiamine status manageable"
        sources: [SRC-JAKARTA2-HARRISON-2017, SRC-NCCN-MPN-2025]
      - position: "Momelotinib — preferred when anemia is dominant problem (ACVR1 inhibition reduces hepcidin → improves anemia)"
        sources: [SRC-MOMENTUM-VERSTOVSEK-2023, SRC-NCCN-MPN-2025]
        evidence_note: "Pacritinib reserved for thrombocytopenia <50K (PERSIST-2). Symptom-driven choice."
    our_default: "Fedratinib 2L when anemia/thrombocytopenia not dominant; momelotinib for anemia-dominant; pacritinib for plt <50K"
    rationale: "Symptom-driven JAKi selection 2L"

time_critical: false
