rationale: >
  Fedratinib is approved 2L for MF post-ruxolitinib failure or
  intolerance — JAKARTA-2 phase-2 (Harrison et al., Lancet
  Haematol 2017) + FREEDOM-2 confirmatory phase-3. Selective JAK2
  inhibitor with FLT3 activity. Spleen response 31-55% (criteria-
  dependent). CRITICAL: boxed warning for Wernicke encephalopathy
  (thiamine deficiency) — MANDATORY baseline thiamine measurement,
  correction of deficiency BEFORE initiation, prophylactic
  supplementation 100 mg PO daily. Take with food to mitigate GI
  toxicity. Active diarrhea management (loperamide). Major Ukraine
  access barrier: not registered.

rationale_ua: >
  федратиніб is схвалений 2L for MF post-руксолитиніб failure or intolerance — JAKARTA-2 phase-2 (Harrison et al., Lancet Haematol 2017) + FREEDOM-2 confirmatory phase-3. селективний JAK2 інгібітор with FLT3 activity. Spleen відповідь 31-55% (criteria- dependent). CRITICAL: спеціальне попередження в інструкції for Wernicke encephalopathy (thiamine deficiency) — обов'язковий базове thiamine measurement, correction of deficiency BEFORE initiation, prophylactic supplementation 100 mg PO daily. Take with food to mitigate GI токсичність. Active діарея management (loperamide). Major Ukraine access barrier: not registered.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
