  disease_id: DIS-PMF
  line_of_therapy: 2
  stage_requirements:
    - "Symptomatic intermediate-2 / high-risk PMF (or post-PV/ET MF)"
    - "Resistance to or intolerance of ruxolitinib"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
