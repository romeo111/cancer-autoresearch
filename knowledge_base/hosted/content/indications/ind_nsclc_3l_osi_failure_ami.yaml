id: IND-NSCLC-3L-OSI-FAILURE-AMI
plan_track: aggressive
applicable_to:
  disease_id: DIS-NSCLC
  line_of_therapy: 3
  stage_requirements:
    - "Stage IV EGFR-mutant NSCLC with progression on osimertinib 1L + chemotherapy 2L"
    - "Re-biopsy at progression to identify resistance mechanism (C797S, MET amplification, HER2 amp, SCLC transformation, or no clear mechanism)"
    - "Adequate organ function for combination targeted + chemotherapy regimen"
  biomarker_requirements_required:
    - biomarker_id: BIO-EGFR-MUTATION
      required: true
      value_constraint: "EGFR exon 19 deletion OR L858R sensitizing mutation (original 1L driver)"
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2
recommended_regimen:
concurrent_therapy: []
followed_by: []
evidence_level: moderate
strength_of_recommendation: conditional
nccn_category: '2A'
expected_outcomes:
  overall_response_rate: ~63% amivantamab + lazertinib + chemo (MARIPOSA-2 Passaro 2024 Ann Oncol)
  complete_response: ~3%
  progression_free_survival: Median PFS 8.3 mo amivantamab + chemo vs 4.2 mo chemo alone (MARIPOSA-2)
  overall_survival_5y: OS data immature; HR 0.77 trending favorable
hard_contraindications: []
