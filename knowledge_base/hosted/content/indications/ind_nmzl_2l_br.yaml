id: IND-NMZL-2L-BR
plan_track: standard
applicable_to:
  disease_id: DIS-NODAL-MZL
  line_of_therapy: 2
  stage_requirements:
    - Symptomatic relapse / progression after 1L (W&W or rituximab/BR)
    - Active treatment indication
  biomarker_requirements_required:
    - biomarker_id: BIO-CD20-IHC
      required: true
      value_constraint: positive (CD20+)
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2
recommended_regimen: REG-R-BENDAMUSTINE-RELAPSED-MZL
concurrent_therapy: []
followed_by: []
evidence_level: moderate
strength_of_recommendation: strong
nccn_category: 2A
expected_outcomes:
  overall_response_rate: ~85-90%
  complete_response: ~50-60%
  progression_free_survival: Median PFS ~3-4 years
  overall_survival_5y: ~75-85%
hard_contraindications:
  - CI-HBV-NO-PROPHYLAXIS
  - CI-SEVERE-CYTOPENIA-BR
red_flags_triggering_alternative:
  - RF-AGGRESSIVE-HISTOLOGY-TRANSFORMATION
required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-LDH
  - TEST-HBV-SEROLOGY
  - TEST-CD20-IHC
  - TEST-PET-CT
  - TEST-BM-ASPIRATE
  - TEST-BM-TREPHINE
desired_tests: []
rationale: 'BR is preferred 2L for relapsed/progressive NMZL after observation or 1L rituximab/BR failure. Outcomes mirror SMZL relapse (no NMZL-specific 2L RCT — guidelines extrapolate from indolent NHL pool). Alternative: ibrutinib monotherapy (Noy 2017 MZL trial — ORR ~48% across MZL subtypes).'
rationale_ua: >-
  BR is переважний 2L for рецидивний/progressive NMZL after observation or 1L ритуксимаб/BR failure. Outcomes mirror SMZL рецидив (ні NMZL-specific 2L РКД — настанови extrapolate from індолентний NHL pool). Alternative: ібрутиніб монотерапія (Noy 2017 MZL дослідження — ORR ~48% across MZL підтипи).
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: BR is preferred 2L immunochemotherapy for relapsed NMZL; ibrutinib chemo-free alternative
  - source_id: SRC-ESMO-MZL-2024
    position: supports
    relevant_quote_paraphrase: BR or ibrutinib are recommended 2L options for relapsed NMZL
known_controversies: []
do_not_do:
  - НЕ призначати без HBV screening + prophylaxis.
  - НЕ використовувати full-dose bendamustine при FIB-4 >3.25.
  - НЕ забувати PJP profilaxis ≥6 міс після останньої дози anti-CD20.
  - НЕ ігнорувати трансформацію — biopsy при швидкій прогресії.
time_critical: false
last_reviewed: '2026-04-27'
reviewers: []
reviewer_signoffs: 0
notes: Standard-track 2L NMZL. Same regimen as SMZL 2L (REG-R-BENDAMUSTINE-RELAPSED-MZL).
