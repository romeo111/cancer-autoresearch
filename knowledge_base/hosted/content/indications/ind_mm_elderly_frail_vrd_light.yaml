desired_tests: []
rationale: 'For elderly (≥75 years) and/or frail (IMWG frailty score ≥2 per Palumbo 2015) MM patients ineligible
  for ASCT, full-dose VRD (bortezomib 1.3 mg/m² SC d1,4,8,11; lenalidomide 25 mg PO d1-14; dexamethasone
  20-40 mg PO d1,8,15,22 q21-28d) has unacceptable toxicity (peripheral neuropathy, cytopenias, infections,
  GI events). VRD-lite reduces dose intensity: bortezomib 1.3 mg/m² SC d1,8,15,22 (weekly, not biweekly);
  lenalidomide 15 mg PO d1-21 q35d; dexamethasone 20 mg PO weekly. O''Donnell 2018 BJH: ORR 86%, CR/VGPR
  66%, mPFS 35 mo, with substantially fewer grade ≥3 PN (5% vs ~20%) and treatment discontinuations. Daratumumab
  + VRD (D-VRD; PERSEUS) and isatuximab + VRD also have elderly-fit data, but D-VRD-lite analogous protocols
  emerging. Daratumumab + lenalidomide + dexamethasone (D-Rd; MAIA) is alternative for very frail (frailty
  score ≥3) — single-agent IMiD + anti-CD38 + dex is even gentler. STUB: REG-VRD-STANDARD used as proxy;
  no dedicated REG-VRD-LITE entity yet.'
sources:
- source_id: SRC-NCCN-MM-2025
  position: supports
  relevant_quote_paraphrase: VRD or VRD-lite is preferred 1L for transplant-ineligible elderly MM; daratumumab-based
    triplets (D-Rd, D-VRD) increasingly preferred for fit elderly per MAIA / PERSEUS
- source_id: SRC-ESMO-MM-2023
  position: supports
  relevant_quote_paraphrase: VRD-lite (weekly bortezomib + reduced lenalidomide) is recognized standard for
    elderly transplant-ineligible MM; D-Rd (MAIA) for very frail
- source_id: SRC-EHA-EMN-MM-2025
  position: supports
  relevant_quote_paraphrase: IMWG frailty score should drive 1L MM regimen intensity; VRD-lite for fit-frail,
    D-Rd for very frail
known_controversies:
- topic: VRD-lite vs D-Rd vs D-VRD for elderly frail MM 1L
  positions:
  - position: VRD-lite — well-tolerated, established, anti-CD38-naive
    sources:
    - SRC-NCCN-MM-2025
  - position: D-Rd (MAIA) — mPFS NR vs 34 mo VRD-lite-comparable; OS benefit; gentler tolerability
    sources:
    - SRC-NCCN-MM-2025
    evidence_note: MAIA: mPFS NR vs 34.4 mo; mOS 5-yr 66% vs 53%
  - position: D-VRD-lite (extrapolated PERSEUS) — quadruplet most active but more toxicity
    sources:
    - SRC-EHA-EMN-MM-2025
  our_default: D-Rd for very frail (frailty score ≥3); VRD-lite for fit-frail (frailty 2); D-VRD-lite for
    fit-elderly (frailty 0-1, age ≥75) where access permits
  rationale: Frailty score should drive choice; daratumumab triplets/quadruplets emerging as preferred when
    accessible
do_not_do:
- НЕ використовувати full-dose VRD при frailty score ≥2 — toxicity непомірна; PN + cytopenias treatment-limiting.
- НЕ продовжувати lenalidomide при CrCl <30 без adjustment — dose reduce до 10 mg/day; <15 — switch до
  alternative IMiD або hold.
- НЕ ігнорувати VTE prophylaxis — ASA 81-100 mg PO daily при low risk; LMWH або DOAC при high risk (DVT
  history, doxorubicin combo, tamoxifen).
- НЕ забути bone health — IV bisphosphonate (zoledronic acid) або denosumab + Ca/D supplementation.
- НЕ призначати без HBV / HSV / VZV профілактики — anti-CD38-naive не excuses.
- НЕ продовжувати при значному PN grade ≥2 — bortezomib hold + dose-reduce; switch to ixazomib if persistent.
time_critical: false
