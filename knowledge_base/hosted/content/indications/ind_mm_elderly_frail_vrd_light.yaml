id: IND-MM-ELDERLY-FRAIL-VRD-LIGHT
plan_track: standard
applicable_to:
  disease_id: DIS-MM
  line_of_therapy: 1
  stage_requirements:
  - "Newly-diagnosed multiple myeloma in elderly (≥75 years) AND/OR frail patient (IMWG frailty score ≥2)"
  - "Not transplant-eligible (no ASCT consolidation planned)"
  - "Goal: balance disease control with tolerability; reduced bortezomib + lenalidomide doses"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    age_min: 65
    ecog_max: 3
recommended_regimen: REG-VRD-STANDARD
concurrent_therapy: []
followed_by: []
evidence_level: moderate
strength_of_recommendation: strong
nccn_category: '1'
expected_outcomes:
  overall_response_rate: ~80% (VRD-lite O'Donnell 2018 BJH; Gay 2017 Lancet Oncol)
  complete_response: ~25%
  progression_free_survival: Median PFS ~35 mo (VRD-lite O'Donnell)
  overall_survival_5y: 5-yr OS ~65% (extrapolated; VRD-lite cohorts have better tolerability than full-dose
    VRD in elderly)
