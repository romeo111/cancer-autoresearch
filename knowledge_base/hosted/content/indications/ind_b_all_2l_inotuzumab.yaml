  - TEST-PREGNANCY

rationale: >
  Inotuzumab ozogamicin is anti-CD22 antibody-drug conjugate
  approved 2L+ for R/R Ph- B-ALL in adults. INO-VATE phase-3
  (Kantarjian et al., NEJM 2016): CR/CRi 80.7% vs 29.4% with
  investigator-choice salvage chemo; MRD-negativity 78.4%; median
  PFS 5.0 vs 1.8 mo (HR 0.45); median OS 7.7 vs 6.7 mo (HR 0.77).
  Bridge-to-alloHCT intent dominates use — single-agent
  inotuzumab is not curative. CRITICAL: VOD/SOS post-HCT ~14%
  (boxed warning) — limit pre-HCT exposure to 1-2 cycles, AVOID
  dual-alkylator conditioning (no Bu/Cy; use Bu/Flu instead),
  intensify hepatic monitoring. Limited data >70 years; consider
  blinatumomab as alternative for older / unfit. Ukraine: not
  registered, international referral required.

rationale_ua: >
  інотузумаб озогаміцин is anti-CD22 кон'югат антитіло-препарат схвалений 2L+ for р/р Ph- B-ALL in adults. INO-VATE phase-3 (Kantarjian et al., NEJM 2016): CR/CRi 80.7% проти 29.4% with investigator-choice сальвадж chemo; МЗХ-negativity 78.4%; медіана ВБП 5.0 проти 1.8 міс. (HR 0.45); медіана ЗВ 7.7 проти 6.7 міс. (HR 0.77). Bridge-to-alloHCT intent dominates use — single-agent inotuzumab is not curative. CRITICAL: VOD/SOS post-HCT ~14% (спеціальне попередження в інструкції) — limit pre-HCT exposure to 1-2 цикли, AVOID dual-alkylator conditioning (ні Bu/Cy; use Bu/Flu instead), intensify hepatic моніторинг. Limited дані >70 years; consider блінатумомаб as alternative for older / unfit. Ukraine: not registered, international referral обов'язковий.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: "Inotuzumab ozogamicin recommended 2L+ for R/R Ph- B-ALL adults (Cat 1) per INO-VATE; bridge to alloHCT"
  - source_id: SRC-INOVATE-KANTARJIAN-2016
    position: supports
    relevant_quote_paraphrase: "INO-VATE phase-3: inotuzumab vs salvage chemo in R/R B-ALL; CR/CRi 80.7% vs 29.4%; MRD-neg 78.4%"

do_not_do:
  - "НЕ призначати при confirmed history of severe VOD/SOS — absolute CI."
  - "НЕ перевищувати 2 цикли pre-HCT — VOD risk кумулятивний (boxed warning)."
  - "НЕ використовувати dual-alkylator (Bu/Cy) conditioning post-inotuzumab — Bu/Flu кращий."
  - "НЕ ігнорувати baseline + щоциклова LFT (білірубін, ALT, AST) — hepatotoxicity prelude до VOD."
  - "НЕ розпочинати без CD22 confirmation — CD22-negative blasts уникають targeting."
  - "НЕ забувати TLS prophylaxis (allopurinol + hydration) — особливо cycle 1."
  - "НЕ забувати alloHCT-pathway — single-agent inotuzumab НЕ є curative."

known_controversies:
  - topic: "Inotuzumab vs blinatumomab as 2L for R/R Ph- B-ALL adult"
    positions:
      - position: "Inotuzumab — higher CR/CRi rate (80.7% vs ~44% blinatumomab in TOWER), better for high-burden disease"
        sources: [SRC-INOVATE-KANTARJIAN-2016, SRC-NCCN-BCELL-2025]
      - position: "Blinatumomab — better survival in low-burden / MRD+ setting; lower VOD risk pre-HCT"
        sources: [SRC-BLAST-GOKBUGET-2018, SRC-NCCN-BCELL-2025]
        evidence_note: "INO-VATE-BL no head-to-head RCT. Patient + disease characteristics drive choice."
    our_default: "Inotuzumab for high-burden relapse; blinatumomab for MRD+ or low-burden relapse; both bridge to alloHCT in transplant-eligible"
    rationale: "Disease-burden + bridge-to-HCT timing drive choice"

time_critical: true
last_reviewed: "2026-04-25"
reviewers: []
reviewer_signoffs: 0
notes: >
  STUB — pending Clinical Co-Lead sign-off. Aggressive-track 2L+
