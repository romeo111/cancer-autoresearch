id: IND-B-ALL-2L-INOTUZUMAB
plan_track: aggressive

applicable_to:
  disease_id: DIS-B-ALL
  line_of_therapy: 2
  stage_requirements:
    - "Relapsed or refractory Ph- B-ALL after ≥1 prior systemic line"
    - "CD22+ (CD22 IHC or flow on baseline / relapse biopsy)"
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 2
    age_min: 18

recommended_regimen: REG-INOTUZUMAB-B-ALL
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "CR/CRi 80.7% vs 29.4% chemo (INO-VATE)"
  complete_response: "MRD-negativity in CR/CRi 78.4%"
  progression_free_survival: "Median PFS 5.0 vs 1.8 mo chemo (HR 0.45)"
  overall_survival_5y: "Median OS 7.7 vs 6.7 mo chemo (HR 0.77); responders bridged to alloHCT have substantially longer survival"

hard_contraindications:
  - CI-HBV-NO-PROPHYLAXIS
red_flags_triggering_alternative:
  - RF-B-ALL-HIGH-RISK-BIOLOGY
  - RF-B-ALL-INFECTION-SCREENING
  - RF-B-ALL-ORGAN-DYSFUNCTION
  - RF-B-ALL-FRAILTY-AGE
  - RF-B-ALL-TRANSFORMATION-PROGRESSION

required_tests:
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-LDH
  - TEST-URIC-ACID
  - TEST-COAG-PANEL
  - TEST-HBV-SEROLOGY
  - TEST-HCV-ANTIBODY
  - TEST-HIV-SEROLOGY
  - TEST-FLOW-CYTOMETRY
  - TEST-BCR-ABL-JAK2
  - TEST-FISH-PANEL
  - TEST-KARYOTYPE
  - TEST-NGS-LYMPHOID-PANEL
  - TEST-BM-ASPIRATE
  - TEST-BM-TREPHINE
  - TEST-CSF-CYTOLOGY-FLOW
