  line_of_therapy: 1
  stage_requirements: []
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints: {}

recommended_regimen: REG-ESA-MDS-LR
concurrent_therapy: []
followed_by: []

evidence_level: moderate
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: "~50-60% Hb response in selected MDS-LR (endogenous EPO ≤500 mU/mL + RBC TD ≤2U/month)"
  complete_response: "Transfusion independence ~30-40%"
  progression_free_survival: "Cytopenia management; does not alter MDS natural history"
  overall_survival_5y: "Per IPSS-R: VL ~80%; L ~50-60%; Int ~30-40%"

hard_contraindications: []
red_flags_triggering_alternative:
  - RF-MDS-HIGH-RISK-IPSS
