rationale: >
  Standard 1L for symptomatic anemia in MDS-LR (IPSS-R Very Low / Low /
  Intermediate). Patient selection: endogenous EPO ≤500 mU/mL + RBC TD
  ≤2U/month → response rate ~50-60%. Epoetin alfa 60,000 IU SC weekly
  OR darbepoetin 150-300 μg SC weekly. Add G-CSF in non-responders if
  RS-MDS subtype. Target Hb 10-12 g/dL (do NOT exceed; boxed mortality /
  VTE warning). Switch to luspatercept (RS-MDS / 1L COMMANDS) or
  lenalidomide (del 5q) or HMA escalation on failure.

rationale_ua: >
  стандарт 1L for symptomatic анемія in MDS-LR (IPSS-R Very Low / Low / Intermediate). Patient selection: endogenous ЕПО ≤500 mU/mL + RBC TD ≤2U/month → частота відповіді ~50-60%. епоетин альфа 60,000 IU SC weekly OR дарбепоетин 150-300 μg SC weekly. Add Г-КСФ in non-responders if RS-MDS підтип. Target Hb 10-12 g/dL (do NOT exceed; boxed mortality / VTE warning). Switch to люспатерцепт (RS-MDS / 1L COMMANDS) or леналідомід (del 5q) or HMA escalation on failure.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
sources:
  - source_id: SRC-NCCN-AML-2025
    position: supports
    relevant_quote_paraphrase: "ESA is preferred 1L for MDS-LR symptomatic anemia with low endogenous EPO"
  - source_id: SRC-ESMO-MDS-2021
    position: supports
    relevant_quote_paraphrase: "ESA + iron repletion is the cornerstone of MDS-LR anemia management"

do_not_do:
  - "Не призначати ESA при Hb >12 g/dL — boxed warning щодо тромбоемболій + смертності."
  - "Не продовжувати ESA при відсутності відповіді на 8-12 тижні — переходити до luspatercept (якщо доступний) / lenalidomide / HMA."
  - "Не пропускати iron studies + B12/folate перед ESA — функціональний дефіцит заліза обмежує відповідь."
  - "Не пропускати IPSS-R / IPSS-M risk-стратифікацію — необхідно для виключення MDS-HR."
  - "Не призначати lenalidomide без виключення del(5q) у MDS-LR — efficacy лише у del(5q) контексті."

known_controversies:
  - topic: "Luspatercept vs ESA as 1L (post-COMMANDS)"
    positions:
      - position: "COMMANDS: luspatercept 1L superior to ESA for transfusion independence in LR-MDS broadly"
        sources:
          - SRC-COMMANDS-FENAUX-2020
      - position: "ESA still preferred 1L in jurisdictions where luspatercept is unavailable / cost-prohibitive"
        sources:
          - SRC-ESMO-MDS-2021
    our_default: "ESA 1L in Ukraine (luspatercept not registered); luspatercept becomes 1L when access allows"
    rationale: "Access constraint dominates"

time_critical: false
last_reviewed: "2026-04-25"
reviewers: []
