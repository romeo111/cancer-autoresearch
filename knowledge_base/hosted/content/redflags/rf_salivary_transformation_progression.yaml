last_reviewed: "2026-04-27"
draft: false

notes: >
  Adenoid cystic carcinoma classically has indolent course but
  progressive perineural invasion + late distant relapses (lung, bone)
  10-15 yr post-treatment — surveillance imaging required even in
  apparently "stable" patients. High-grade transformation of low-grade
  histologies (acinic cell, mucoepidermoid) confers worse prognosis,
  often requires intensified RT + cisplatin chemoradiation. Re-biopsy
  at progression captures actionable molecular drivers in ~30-40% (HER2,
  AR, NTRK, HRAS, NOTCH1) — changes salvage choice from cytotoxic to
  targeted. Skull-base extension may benefit from proton-beam RT
  (improves organ-at-risk sparing).
notes_ua: >
  Adenoid cystic — індолентний, але прогресуюча периневральна інвазія +
  пізні віддалені рецидиви (легені, кістки) через 10-15 р. Трансформація
  у high-grade (acinic cell, mucoepidermoid) — гірший прогноз. Ребіопсія
  при прогресії — actionable драйвери у ~30-40% (HER2, AR, NTRK, HRAS,
  NOTCH1). Поширення на основу черепа — протонне RT.
