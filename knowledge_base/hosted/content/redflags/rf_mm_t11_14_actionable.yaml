id: RF-MM-T11-14-ACTIONABLE
definition: >
  t(11;14)(q13;q32) IGH/CCND1 translocation in multiple myeloma —
  ~15-20% prevalence, BCL-2-dependent / venetoclax-sensitive subset.
  Venetoclax-based regimens (BELLINI subgroup analysis: ven + bort + dex
  R/R MM mPFS 22.4 vs 11.6 mo in t(11;14) — vs no benefit in
  non-t(11;14)) drive R/R 2L+ selection.
definition_ua: >
  Транслокація t(11;14)(q13;q32) IGH/CCND1 при множинній мієломі —
  ~15-20% поширеність, BCL-2-залежна / венетоклакс-чутлива підгрупа.
  Венетоклакс-вмісні схеми (підгруповий аналіз BELLINI: ven + bort +
  дексаметазон р/р MM мПФВ 22.4 проти 11.6 міс при t(11;14) — vs без
  виграшу при не-t(11;14)) визначають вибір 2L+ при р/р.

trigger:
  type: biomarker
  any_of:
    - finding: "t11_14_translocation"
      value: true
    - finding: "t_11_14_status"
      value: "positive"
    - finding: "ccnd1_igh_fusion"
      value: "positive"
    - finding: "fish_t11_14"
      value: "positive"

clinical_direction: intensify

severity: major
priority: 70
category: high-risk-biology

relevant_diseases:
  - DIS-MM
shifts_algorithm:
  - ALGO-MM-2L

sources:
  - SRC-NCCN-MM-2025
  - SRC-ESMO-MM-2023
  - SRC-EHA-EMN-MM-2025

last_reviewed: "2026-04-27"
draft: false

notes: >
  BELLINI overall trial showed OS detriment in non-t(11;14) — venetoclax
  in MM is biomarker-restricted to t(11;14) (and emerging high
  BCL2 expression, BCL2/BCL2L1 ratio). Off-label use only — venetoclax
  not formally MM-approved (CANOVA confirmatory phase 3 in t(11;14)
  R/R MM ongoing). Increased infection risk on venetoclax + DCEP /
  bort / dex — PJP + VZV prophylaxis. Detection: standard MM FISH
  panel (also covers high-risk t(4;14), t(14;16), del(17p), gain/amp
  1q21 — covered by RF-MM-HIGH-RISK-CYTOGENETICS).
notes_ua: >
  BELLINI загалом показав знижену ЗВ при не-t(11;14) — венетоклакс
  при MM — біомаркер-обмежений до t(11;14) (і нові: висока експресія
  BCL2, співвідношення BCL2/BCL2L1). Лише off-label — венетоклакс
  не формально схвалений при MM (CANOVA confirmatory phase 3 у
  t(11;14) р/р MM триває). Підвищений ризик інфекції на венетоклакс +
  DCEP / bort / dex — profilактика PJP + VZV. Виявлення: стандартна
  панель MM FISH (також охоплює високого ризику t(4;14), t(14;16),
  del(17p), gain/amp 1q21 — охоплено RF-MM-HIGH-RISK-CYTOGENETICS).
