id: RF-AITL-TRANSFORMATION-PROGRESSION
definition: >
  AITL primary-refractory or early-relapse: failure to achieve CR after
  induction (interim PET Deauville 4-5 with stable/progressive disease),
  progression on therapy, or relapse <12 months from end of 1L. Routes
  to salvage (romidepsin / belinostat / pralatrexate / GEM-P) ± auto-
  or allo-HCT consolidation per ECOG/PS.
definition_ua: >
  Первинно-рефрактерна AITL або ранній рецидив: відсутність ПР після
  індукції (interim PET Deauville 4-5 із стабільною/прогресуючою
  хворобою), прогресування на терапії, або рецидив <12 міс від
  завершення 1L. Маршрутизує до сальваджу (ромідепсин / белінoстат /
  пралатрексат / GEM-P) ± ауто- або алло-ТГСК-консолідації за ECOG/PS.

trigger:
  type: composite
  any_of:
    - finding: "aitl_refractory"
      value: true
    - finding: "aitl_relapse_lt_12mo"
      value: true
    - finding: "progression_on_therapy"
      value: true
    - finding: "interim_pet_deauville"
      threshold: 4
      comparator: ">="
    - all_of:
        - finding: "post_treatment_response"
          value: "stable_or_progressive"
        - finding: "months_since_eot"
          threshold: 12
          comparator: "<"

clinical_direction: intensify

severity: critical
priority: 80
category: transformation-progression

relevant_diseases:
  - DIS-AITL
shifts_algorithm: []  # ALGO-AITL-1L scaffold; salvage routing surfaces
                      # in 2L plan rather than re-running 1L

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-PTCL-2024

last_reviewed: "2026-04-27"
draft: false

notes: >
  AITL has the worst PFS among PTCL subtypes — 5-yr PFS 18-25% with
  CHOP-class regimens; primary-refractory disease occurs in ~30%.
  Salvage options: romidepsin (HDAC-inhibitor; AITL/TFH-phenotype
  particularly sensitive due to TET2/IDH2/DNMT3A epigenetic background),
  belinostat (BELIEF trial ORR 26% in AITL specifically), pralatrexate
  (PROPEL ORR 32%), GEM-P / GDP. Allo-HCT after CR2 is the only
  consistent curative path; auto-HCT in CR1 controversial (no AITL-
  specific RCT — ECHELON-2 explicitly excluded auto-HCT effect on AITL
  subgroup). Brentuximab-vedotin re-treatment if CD30+ and not used
  in 1L. Direction "intensify" — operationally re-routes to salvage
  workup rather than 1L choice.
notes_ua: >
  AITL has the найгірший PFS серед PTCL підтипи — 5-річна ВБП 18-25% with CHOP-class схеми; primary-рефрактерний хвороба occurs in ~30%. сальвадж options: romidepsin (HDAC-інгібітор; AITL/TFH-фенотип особливо sensitive due to TET2/IDH2/DNMT3A epigenetic background), belinostat (BELIEF дослідження ORR 26% in AITL зокрема), pralatrexate (PROPEL ORR 32%), GEM-P / GDP. Allo-HCT after CR2 is the only consistent curative path; auto-HCT in CR1 controversial (ні AITL- specific РКД — ECHELON-2 explicitly excluded auto-HCT effect on AITL subgroup). Brentuximab-vedotin re-лікування if CD30+ and not used in 1L. Direction "intensify" — operationally re-routes to сальвадж обстеження rather than 1L choice.
