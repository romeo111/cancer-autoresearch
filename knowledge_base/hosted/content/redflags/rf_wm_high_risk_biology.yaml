id: RF-WM-HIGH-RISK-BIOLOGY
definition: >
  Waldenström with adverse molecular biology: MYD88-wildtype (poor BTKi
  response — ibrutinib/zanubrutinib substantially less active), CXCR4-mutated
  (delayed BTKi response, may benefit zanubrutinib > ibrutinib per ASPEN
  trial), TP53-mutated (chemo-resistance), or IPSSWM intermediate-high
  / high risk. Drives selection of fixed-duration chemoimmuno (BR or
  Dex-R-Cyclo) over continuous BTKi when MYD88-wildtype.
definition_ua: >
  Вальденстрем з біологією високого ризику: MYD88-wildtype (поганий ефект
  BTKi — ibrutinib/zanubrutinib суттєво менш активні), CXCR4-mut
  (затримана відповідь BTKi, можлива користь zanubrutinib > ibrutinib
  за ASPEN trial), TP53-mut (chemo-резистентність), IPSSWM intermediate-high
  / high. Спрямовує на fixed-duration chemoimmuno (BR або Dex-R-Cyclo)
  замість continuous BTKi при MYD88-wildtype.

trigger:
  type: biomarker
  any_of:
    - finding: "myd88_status"
      value: "wildtype"
    - finding: "cxcr4_mutation"
      value: true
    - finding: "tp53_mutation"
      value: true
    - finding: "ipsswm_high_risk"
      value: true

clinical_direction: intensify

severity: major
priority: 80
category: high-risk-biology

relevant_diseases:
  - DIS-WM
shifts_algorithm: []  # not yet wired into ALGO-WM-1L.decision_tree — surfaces as plan annotation
sources:
