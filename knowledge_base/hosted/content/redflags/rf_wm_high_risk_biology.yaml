  - SRC-ESMO-WM-2024

last_reviewed: "2026-04-27"
draft: false

notes: >
  MYD88-L265P mutation present in ~95% WM and is the predictive biomarker
  for BTKi efficacy — MYD88-wildtype WM (~5%) responds poorly to
  ibrutinib (ORR ~30% vs ~90% for MYD88-mut per Treon series). For
  MYD88-WT or BTKi-ineligible: BR (bendamustine + rituximab) is preferred
  fixed-duration regimen. CXCR4 mutations (~30-40% MYD88-mut WM) delay
  BTKi response and are partially overcome by zanubrutinib (ASPEN trial
  showed deeper responses vs ibrutinib in CXCR4-mut subset). TP53-mut
  WM: avoid chemoimmuno; BTKi-based or BCL2-based (venetoclax — Castillo
  emerging data) preferred.
notes_ua: >
  MYD88-L265P мутація present in ~95% WM and is the предиктивний біомаркер for BTKi ефективність — MYD88-wildtype WM (~5%) responds poorly to ібрутиніб (ORR ~30% проти ~90% for MYD88-mut per Treon series). For MYD88-WT or BTKi-ineligible: BR (бендамустин + ритуксимаб) is переважний fixed-duration схема. CXCR4 мутації (~30-40% MYD88-mut WM) delay BTKi відповідь and are partially overcome by занубрутиніб (ASPEN дослідження showed deeper responses vs ібрутиніб in CXCR4-mut subset). TP53-mut WM: avoid chemoimmuno; BTKi-based or BCL2-based (венетоклакс — Castillo новий дані) переважний.
