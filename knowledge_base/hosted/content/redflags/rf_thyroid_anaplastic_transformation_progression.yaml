last_reviewed: "2026-04-27"
draft: false

notes: >
  Most BRAF+ ATC will progress on dabrafenib + trametinib within 6-12
  months due to MAPK pathway reactivation (acquired NRAS / KRAS, BRAF
  amplification, MEK1 mutation). Salvage options: pembrolizumab
  monotherapy (KEYNOTE-158 ATC cohort ORR ~16%, durable in responders),
  pembrolizumab + lenvatinib (ATLAS investigational), or salvage cytotoxic
  (cisplatin-paclitaxel). DTC→ATC dedifferentiation: ~5-15% of long-
  standing PTC develops anaplastic transformation — re-biopsy any new
  rapidly enlarging mass in DTC patient. Brain metastases: stereotactic
  RT + dabrafenib (CNS-penetrant). Priority 30 reflects critical-tier
  override given disease tempo.
notes_ua: >
  Більшість BRAF+ ATC прогресує на dabrafenib + trametinib протягом
  6-12 міс. через реактивацію MAPK. Сальвадж: пембролізумаб моно
  (KEYNOTE-158 ATC ORR ~16%), пембролізумаб + lenvatinib (ATLAS у
  трайлах), сальвадж цитотоксичний. DTC→ATC: ~5-15% PTC розвиває
  анапластичну трансформацію — ребіопсія будь-якого нового масу.
