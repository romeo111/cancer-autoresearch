id: RF-THYROID-ANAPLASTIC-TRANSFORMATION-PROGRESSION
definition: >
  Acquired resistance to dabrafenib + trametinib in BRAF-mutant ATC
  (secondary BRAF / MEK / RAS / MAPK reactivation, NRAS or KRAS
  mutations, BRAF amplification), rapid local progression on cytotoxic
  CRT, new distant metastases (lung, bone, brain), or transformation
  from differentiated thyroid cancer (DTC) into ATC component
  (dedifferentiation event) — triggers re-staging, re-biopsy, salvage
  immunotherapy (pembrolizumab or pembrolizumab + lenvatinib) or trial
  enrollment.
definition_ua: >
  Набута резистентність до dabrafenib + trametinib при BRAF-mutant ATC
  (вторинна реактивація BRAF / MEK / RAS / MAPK, мутації NRAS / KRAS,
  ампліфікація BRAF), швидке локальне прогресування на цитотоксичній
  CRT, нові віддалені метастази (легені, кістки, мозок) або трансформація
  з диференційованого тиреоїдного раку (DTC) у ATC-компонент
  (дедиференціація) — тригер до повторного стейджингу, ребіопсії,
  сальваджу імунотерапією (pembrolizumab або pembrolizumab + lenvatinib)
  або трайлу.

trigger:
  type: composite_clinical
  any_of:
