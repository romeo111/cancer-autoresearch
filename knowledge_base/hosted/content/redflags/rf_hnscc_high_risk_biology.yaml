id: RF-HNSCC-HIGH-RISK-BIOLOGY
definition: "Adverse biology in head-and-neck SCC: HPV-negative oropharyngeal disease, p16-negative, smoking >10 pack-years with HPV+ disease (intermediate-risk), extranodal extension, positive surgical margins, or PD-L1 CPS ≥20 in metastatic context — each shifts adjuvant intensification (chemo-RT vs RT alone) or 1L choice (pembrolizumab mono vs pembrolizumab + chemo)."
definition_ua: "Несприятлива біологія HNSCC: HPV-негативний орофарингеальний рак, p16-негативний, паління >10 пачко-років при HPV+, екстранодальне поширення, позитивні хірургічні краї або PD-L1 CPS ≥20 у метастатичному контексті — змінює ад'ювантну інтенсифікацію (хіміо-RT vs RT) або 1-у лінію (pembrolizumab моно vs pembrolizumab + хіміо)."

trigger:
  type: biomarker
  any_of:
    - all_of:
        - finding: "primary_site"
          value: "oropharynx"
        - finding: "hpv_p16_status"
          value: "negative"
    - finding: "extranodal_extension"
      value: true
    - finding: "positive_surgical_margins"
      value: true
    - all_of:
        - finding: "metastatic_disease"
          value: true
        - finding: "pdl1_cps"
          threshold: 20
          comparator: ">="
    - all_of:
        - finding: "hpv_p16_status"
          value: "positive"
        - finding: "smoking_pack_years"
          threshold: 10
          comparator: ">"

clinical_direction: intensify
severity: major
priority: 80
category: high-risk-biology

relevant_diseases: [DIS-HNSCC]
shifts_algorithm: []

sources:
  - SRC-NCCN-NSCLC-2025
  - SRC-ONCOKB

last_reviewed: '2026-04-26'
draft: false

notes: >
  HPV / p16 status is the dominant prognostic biomarker in oropharyngeal
  SCC: HPV+ have 5-yr OS ~80% vs 50% HPV-negative. RTOG-0129 stratified
  HPV+ smokers (>10 pack-years) as intermediate-risk — current trials
  (NRG-HN005) test de-escalation only in HPV+ low-smoker patients.
  Extranodal extension or positive margins post-resection: indication
  for cisplatin + RT adjuvant (RTOG 9501, EORTC 22931 — OS benefit only
  in this high-risk subset). Metastatic / R/M HNSCC: PD-L1 CPS ≥20
  → pembrolizumab monotherapy (KEYNOTE-048, OS 14.9 vs 10.7 mo);
  CPS 1–19 → pembrolizumab + 5-FU + platinum; CPS <1 → EXTREME
  (cetuximab + cis + 5-FU).
