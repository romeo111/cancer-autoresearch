id: RF-MELANOMA-INFECTION-SCREENING
definition: >
  Active or latent infection requiring resolution / prophylaxis before
  initiating ICI (anti-PD1 ± anti-CTLA4) or BRAFi+MEKi in advanced
  melanoma: HBsAg+ or anti-HBc+ (HBV reactivation risk on ICI; baseline
  HBV DNA + antiviral prophylaxis if reactivation history), HCV-RNA+
  (DAA coordination; ICI generally safe with controlled HCV),
  HIV-positive (ICI safe with virologic suppression on ART; CHECKMATE
  HIV cohorts confirm efficacy), active TB, or active uncontrolled
  infection.
definition_ua: >
  Активна або латентна інфекція, що потребує лікування / профілактики
  перед ICI (анти-PD1 ± анти-CTLA4) або BRAFi+MEKi при запущеній
  меланомі: HBsAg+ або anti-HBc+ (ризик реактивації HBV на ICI;
  baseline HBV DNA + антивірусна профілактика при анамнезі
  реактивації), HCV-RNA+ (координація DAA; ICI зазвичай безпечний при
  контрольованому HCV), HIV+ (ICI безпечний при вірусологічній
  супресії на АРТ; HIV когорти CHECKMATE підтверджують ефективність),
  активний ТБ, або активна неконтрольована інфекція.

trigger:
  type: composite
  any_of:
    - finding: "hbsag"
      value: "positive"
    - finding: "anti_hbc_total"
      value: "positive"
    - finding: "hcv_rna"
      value: "positive"
    - finding: "hiv_status"
      value: "positive"
    - finding: "active_tb"
      value: true
    - finding: "active_uncontrolled_infection"
      value: true

clinical_direction: hold

severity: major
priority: 70
category: infection-screening

relevant_diseases:
  - DIS-MELANOMA
shifts_algorithm: []

sources:
  - SRC-NCCN-MELANOMA-2025
  - SRC-ESMO-MELANOMA-2024

last_reviewed: "2026-04-27"
draft: false

notes: >
  ICI + chronic HBV: HBsAg+ → entecavir or tenofovir prophylaxis from
  before first ICI dose through ≥6 months post-last-dose; monitor HBV
  DNA q3mo. Anti-HBc+ alone (resolved HBV): monitor HBV DNA + ALT
  q3mo, prophylaxis only if reactivation. HIV+ with CD4 >100 + viral
  load suppressed on ART: ICI active and tolerable (CHECKMATE-358
  HIV cohort). Active TB: complete intensive-phase anti-TB before
  initiating ICI to avoid masking IRIS / TB worsening on immune
  reconstitution. Direction "hold" surfaces a workup-prerequisite
  annotation rather than switching indication.
notes_ua: >
  ICI + chronic HBV: HBsAg+ → entecavir or tenofovir prophylaxis from before first ICI доза through ≥6 months post-last-доза; monitor HBV DNA q3mo. Anti-HBc+ alone (resolved HBV): monitor HBV DNA + ALT q3mo, prophylaxis only if reactivation. HIV+ with CD4 >100 + viral load suppressed on ART: ICI active and tolerable (CHECKMATE-358 HIV cohort). Active TB: complete intensive-phase anti-TB before initiating ICI to avoid masking IRIS / TB worsening on immune reconstitution. Direction "утримати" surfaces a обстеження-prerequisite annotation rather than switching показання.
ukrainian_review_status: pending_clinical_signoff
