id: RF-FL-INFECTION-SCREENING
definition: >
  Active or latent infection requiring resolution / prophylaxis before
  initiating any anti-CD20-containing FL regimen (R-CHOP, BR, G-B,
  R-Lenalidomide, R-mono): HBsAg-positive (HBV reactivation risk),
  anti-HBc-positive (occult HBV — particular concern with bendamustine /
  obinutuzumab combinations), HCV-RNA-positive, HIV-positive, or active TB.
definition_ua: >
  Активна / латентна інфекція перед будь-яким anti-CD20 режимом для FL
  (R-CHOP, BR, G-B, R-Lenalidomide, R-моно): HBsAg+ (ризик реактивації
  HBV), anti-HBc+ (occult HBV — особливо важливо при бендамустин /
  обінутузумаб комбінаціях), HCV-РНК+, HIV+, активний туберкульоз.

trigger:
  type: lab_value
  any_of:
    - finding: "hbsag"
      value: "positive"
    - finding: "anti_hbc_total"
      value: "positive"
    - finding: "hcv_rna"
      value: "positive"
    - finding: "hiv_status"
      value: "positive"
    - finding: "active_tb"
      value: true

clinical_direction: hold

severity: critical
priority: 60
category: infection-screening

relevant_diseases:
  - DIS-FL
shifts_algorithm: []

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-FL-2024

last_reviewed: "2026-04-27"
draft: false

notes: >
  HBsAg+ → mandatory entecavir/tenofovir prophylaxis from –7d through
  +12mo post-last anti-CD20 (longer for obinutuzumab — +18 mo).
  anti-HBc+ HBsAg-negative ("occult HBV") with bendamustine: HBV
  reactivation rates up to 20% reported — prophylaxis or close
  monitoring with HBV-DNA q3mo. HCV+: defer DAA cure pre-treatment
  if disease tempo allows; coordinate hepatology. Bendamustine reactivates
  HSV and VZV — acyclovir prophylaxis routine. PJP prophylaxis on
  G-bendamustine (T-cell depletion). FL is indolent — virtually always
  time to complete infectious workup before treating.
notes_ua: >
  HBsAg+ → обов'язковий entecavir/tenofovir prophylaxis from –7d through +12mo post-last anti-CD20 (longer for обінутузумаб — +18 міс.). anti-HBc+ HBsAg-negative ("occult HBV") with бендамустин: HBV reactivation rates до 20% reported — prophylaxis or close моніторинг with HBV-DNA q3mo. HCV+: defer DAA cure pre-лікування if хвороба tempo allows; coordinate hepatology. бендамустин reactivates HSV and VZV — acyclovir prophylaxis routine. PJP prophylaxis on G-бендамустин (T-cell depletion). FL is індолентний — virtually always time to complete infectious обстеження before treating.
