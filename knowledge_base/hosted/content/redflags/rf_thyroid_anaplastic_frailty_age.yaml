id: RF-THYROID-ANAPLASTIC-FRAILTY-AGE
definition: >
  Age ≥75 with ECOG ≥2 or ≥2 comorbidities — cisplatin-paclitaxel CRT
  poorly tolerated and curative-intent surgical resection often not
  feasible; for BRAF-mutant ATC, dabrafenib + trametinib monotherapy
  (without RT or surgery) is reasonable; for BRAF-wild-type frail
  patients, palliative-intent care + tracheostomy for airway management
  is often the appropriate path. ATC frailty assessment must integrate
  with palliative-care planning given short median OS.
definition_ua: >
  Вік ≥75 з ECOG ≥2 або ≥2 коморбідностями — cisplatin-paclitaxel CRT
  погано переноситься і куративна хірургічна резекція часто неможлива;
  для BRAF-mutant ATC — dabrafenib + trametinib монотерапія (без RT і
  хірургії) розумна; для BRAF-wild-type крихких — паліативна терапія +
  трахеостома для управління дихальним шляхом. Frailty-оцінка при ATC
  повинна інтегрувати паліативне планування з огляду на короткий
  медіанний ЗВ.

trigger:
  type: composite_clinical
  all_of:
    - finding: "age_years"
      threshold: 75
      comparator: ">="
    - any_of:
