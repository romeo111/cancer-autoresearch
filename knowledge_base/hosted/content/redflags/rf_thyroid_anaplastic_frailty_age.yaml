last_reviewed: "2026-04-27"
draft: false

notes: >
  ATC predominantly affects elderly (median age ~70); aggressive CRT
  is rarely tolerated in ≥75 with comorbidity. For BRAF-mut ATC in
  elderly: dabrafenib + trametinib monotherapy retains ~60% ORR with
  much lower toxicity than CRT — palliative-intent treatment may
  approach disease-modifying benefit. For BRAF-wt elderly: tracheostomy
  + symptom control + hospice often appropriate; selected fit elderly
  may benefit from pembrolizumab monotherapy (better tolerated than
  cytotoxic). Goals-of-care discussion within first MDT meeting is
  ATA-recommended given disease tempo. Severity critical because of
  high stakes; priority 50 because BRAF status overrides this in
  conflict (RF-THYROID-ANAPLASTIC-HIGH-RISK-BIOLOGY priority 30).
notes_ua: >
  ATC переважно в літніх (медіана ~70); агресивна CRT рідко
  переноситься у ≥75 з коморбідністю. BRAF+ ATC у літніх: dabrafenib +
  trametinib моно — ~60% ORR з набагато меншою токсичністю ніж CRT.
  BRAF-wt літній: трахеостома + симптоматична + хоспіс. Goals-of-care
  обговорення на 1-й MDT (ATA-рекомендовано).
