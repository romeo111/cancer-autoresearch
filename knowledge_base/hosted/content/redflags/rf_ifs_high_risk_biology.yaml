id: RF-IFS-HIGH-RISK-BIOLOGY
definition: >
  Infantile fibrosarcoma with NTRK fusion identified (ETV6-NTRK3 in >90%,
  LMNA-NTRK1 / TPM3-NTRK1 in minor variants) — defines the entity and
  opens larotrectinib / entrectinib targeted therapy for unresectable or
  metastatic disease, sparing pediatric patient from VAC (vincristine /
  actinomycin / cyclophosphamide) cytotoxic adjuvant.
definition_ua: >
  Інфантильна фібросаркома з виявленою NTRK-фузією (ETV6-NTRK3 у >90%,
  LMNA-NTRK1 / TPM3-NTRK1 у мінорних варіантах) — визначає сутність і
  відкриває таргетну терапію larotrectinib / entrectinib при
  нерезектабельній або метастатичній хворобі, оминаючи цитотоксичну
  адʼювантну VAC (vincristine / actinomycin / cyclophosphamide) у
  педіатричного пацієнта.

trigger:
  type: biomarker
  any_of:
    - finding: "BIO-NTRK-FUSION"
      value: "positive"

clinical_direction: intensify
severity: major
priority: 80
category: high-risk-biology

relevant_diseases: [DIS-IFS]
shifts_algorithm: []

sources:
  - SRC-NCCN-PEDIATRIC-SARCOMA
  - SRC-ONCOKB

last_reviewed: "2026-04-27"
draft: false

notes: >
  ETV6-NTRK3 fusion is the molecular defining lesion of IFS; >90% of
  histologically classic IFS cases are positive. SCOUT (larotrectinib
  pediatric) and STARTRK-NG (entrectinib) showed ORR 80-90% in NTRK-
  fusion pediatric sarcomas including IFS — durable responses, manageable
  toxicity (weight gain, transient transaminitis). NCCN tumor-agnostic
  category 1 for NTRK-fusion-positive solid tumors. NTRK-inhibitor 1L
  is now standard of care displacing surgery-then-cytotoxic-VAC for
  unresectable IFS. Source gap: SRC-NCCN-PEDIATRIC-SARCOMA cites pediatric
  sarcoma working group; tumor-agnostic FDA approval underpins regimen.
notes_ua: >
  ETV6-NTRK3 — молекулярна визначальна лезія IFS; >90% класичних IFS
  позитивні. SCOUT (larotrectinib) і STARTRK-NG (entrectinib) — ORR
  80-90% у NTRK-фузія-позитивних педіатричних саркомах включно з IFS.
  NCCN tumor-agnostic Cat 1. NTRK-інгібітор 1L — стандарт замість
  хірургія-потім-VAC для нерезектабельної IFS.
