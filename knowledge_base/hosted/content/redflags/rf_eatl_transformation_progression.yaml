id: RF-EATL-TRANSFORMATION-PROGRESSION
definition: "Refractory disease at end-of-induction (no CR/PR after 4 cycles CHOEP) OR rapid relapse — alloSCT or experimental therapy (brentuximab if CD30+, romidepsin/HDAC-i salvage)."
definition_ua: "Рефрактерне захворювання на кінець індукції (без CR/PR після 4 циклів CHOEP) АБО швидкий рецидив — alloSCT або експериментальна терапія (брентуксимаб якщо CD30+, ромідепсин/HDAC-i salvage)."

trigger:
  type: composite_clinical
  any_of:
    - finding: "eatl_no_response_after_4_cycles"
      value: true
    - finding: "eatl_rapid_relapse"
      value: true


clinical_direction: investigate
severity: critical
priority: 100
category: transformation-progression

relevant_diseases: [DIS-EATL]
shifts_algorithm: []

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-PTCL-2024

last_reviewed: "2026-04-25"
draft: false

notes: >
  Refractory EATL has dismal prognosis; clinical trial referral is the recommended next step.
notes_ua: >
  рефрактерний EATL has dismal прогноз; клінічне дослідження referral is the рекомендований next step.
ukrainian_review_status: pending_clinical_signoff
