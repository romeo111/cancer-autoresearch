last_reviewed: "2026-04-27"
draft: false

notes: >
  Thyroglobulin doubling time <12 months is a validated adverse
  prognostic marker (Miyauchi et al, JCEM 2011) — predicts shorter OS
  in DTC. RAI refractoriness defined per ATA criteria (Schlumberger
  consensus): no uptake at diagnosis, lesion-level uptake but no
  response, or progression after RAI ≥600 mCi cumulative. Lenvatinib is
  1L for RAI-refractory progressive PTC (SELECT trial); cabozantinib
  COSMIC-311 is FDA-approved 2L post-lenvatinib (PFS 11 vs 1.9 mo
  placebo). DTC→ATC dedifferentiation: re-biopsy any new rapidly
  enlarging mass (especially neck) — disease tempo changes dramatically.
  Brain metastases rare in PTC; if present, consider stereotactic RT +
  CNS-penetrant TKI. Selpercatinib for RET-fusion / pralsetinib for
  RET-fusion pediatric / adolescent.
notes_ua: >
  Час подвоєння тиреоглобуліну <12 міс. — валідований несприятливий
  прогностичний маркер (Miyauchi та ін.). RAI-рефрактерність — за ATA
  (Schlumberger). Lenvatinib — 1L для RAI-рефрактерної прогресуючої PTC
  (SELECT); cabozantinib (COSMIC-311) — FDA 2L post-lenvatinib (PFS
  11 vs 1.9 міс.). DTC→ATC: ребіопсія будь-якого нового масу.
