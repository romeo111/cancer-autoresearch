id: RF-THYROID-PAPILLARY-TRANSFORMATION-PROGRESSION
definition: >
  PTC transformation into anaplastic thyroid carcinoma component
  (DTC→ATC dedifferentiation, ~5-15% of long-standing PTC), progression
  to RAI-refractory metastatic disease (no iodine uptake on therapy
  scan, RECIST progression on therapeutic ¹³¹I activities), rapid
  thyroglobulin doubling time (<1 yr — adverse prognostic), new bulky
  lung / bone / brain metastases, or rapid progression on lenvatinib —
  triggers re-staging, re-biopsy of progressing lesion, salvage second-
  line TKI (cabozantinib post-lenvatinib) or selective TKI if molecular
  rebiopsy reveals actionable target.
definition_ua: >
  Трансформація PTC у компонент анапластичної тиреоїдної карциноми
  (DTC→ATC дедиференціація, ~5-15% хронічної PTC), прогресія у RAI-
  рефрактерну метастатичну хворобу (немає захоплення йоду на скані,
  RECIST прогресія на терапевтичних активностях ¹³¹I), швидкий час
  подвоєння тиреоглобуліну (<1 р. — несприятливий прогностичний), нові
  обʼємні метастази в легені / кістки / мозок або швидке прогресування
  на lenvatinib — тригер до повторного стейджингу, ребіопсії
  прогресуючої лезії, сальваджу 2-ї лінії TKI (cabozantinib після
  lenvatinib) або селективного TKI при actionable таргеті.

trigger:
  type: composite_clinical
  any_of:
    - finding: "dtc_to_atc_dedifferentiation"
      value: true
    - finding: "rai_refractory"
      value: true
    - finding: "thyroglobulin_doubling_time_months"
      threshold: 12
      comparator: "<"
    - finding: "new_metastatic_disease"
      value: true
    - finding: "rapid_progression_on_tki"
      value: true

clinical_direction: hold
severity: critical
priority: 50
category: transformation-progression

relevant_diseases: [DIS-THYROID-PAPILLARY]
shifts_algorithm: []

