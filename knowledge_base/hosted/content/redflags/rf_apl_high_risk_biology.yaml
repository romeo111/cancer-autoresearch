id: RF-APL-HIGH-RISK-BIOLOGY
definition: "APL high-risk by Sanz score: presenting WBC >10 K/μL — requires anthracycline addition (idarubicin) to ATRA + ATO (or AIDA-style) rather than chemo-free ATRA + ATO"
definition_ua: "Гострий промієлоцитарний лейкоз високого ризику за Санцем: WBC при дебюті >10 К/мкл — потребує додавання антрацикліну (ідарубіцину) до ATRA + ATO (або схема AIDA) замість безхіміотерапевтичної ATRA + ATO"

trigger:
  type: composite
  any_of:
    - finding: "wbc_k_ul"
      threshold: 10
      comparator: ">"
    - finding: "apl_sanz_risk"
      value: "high"

clinical_direction: intensify

severity: critical
category: high-risk-biology
relevant_diseases:
  - DIS-APL
shifts_algorithm:
  - ALGO-APL-1L

sources:
  - SRC-NCCN-AML-2025
  - SRC-ELN-APL-2019
  - SRC-APL0406-LOCOCO-2013

last_reviewed: "2026-04-25"
notes: >
  Sanz risk: low (WBC ≤10 + plt >40), intermediate (WBC ≤10 + plt ≤40),
  high (WBC >10). High-risk patients NOT eligible for chemo-free ATRA + ATO
  (APL0406 trial enrolled only low/intermediate). ATRA + ATO + idarubicin
  OR classic AIDA (ATRA + idarubicin) are accepted high-risk options;
  ATRA + ATO + idarubicin is preferred if ATO available.
  STUB — requires clinical co-lead signoff.
notes_ua: >
  Sanz risk: low (WBC ≤10 + plt >40), intermediate (WBC ≤10 + plt ≤40), high (WBC >10). високого ризику patients NOT придатний для chemo-free ATRA + ATO (APL0406 дослідження enrolled only low/intermediate). ATRA + ATO + idarubicin OR classic AIDA (ATRA + idarubicin) are accepted високого ризику options; ATRA + ATO + idarubicin is переважний if ATO available. STUB — requires clinical co-lead signoff.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
