id: RF-WM-FRAILTY-AGE
definition: >
  Frailty profile influencing WM regimen selection: ECOG ≥3, OR (age ≥75
  with G8 ≤14), OR composite frailty (age ≥70 + Charlson ≥3 + albumin
  <3.5). Triggers preference for low-burden regimens (rituximab
  monotherapy with IgM-flare guard, dose-attenuated BR, or zanubrutinib —
  better cardiac tolerability in elderly per ASPEN trial) over intensive
  multi-agent chemoimmuno.
definition_ua: >
  Профіль frailty при WM: ECOG ≥3, АБО (вік ≥75 з G8 ≤14), АБО
  композитна frailty (вік ≥70 + Charlson ≥3 + альбумін <3.5). Триггерує
  перевагу low-burden режимів (рітуксимаб-моно з IgM-flare guard,
  dose-attenuated BR, або занубрутиніб — краща кардіальна переносимість
  в elderly за ASPEN trial) над інтенсивною multi-agent chemoimmuno.

trigger:
  type: composite_score
  any_of:
    - finding: "ecog"
      threshold: 3
      comparator: ">="
    - all_of:
        - finding: "age"
          threshold: 75
          comparator: ">="
        - finding: "g8_score"
          threshold: 14
          comparator: "<="
    - all_of:
        - finding: "age"
          threshold: 70
          comparator: ">="
        - finding: "charlson_score"
          threshold: 3
          comparator: ">="
        - finding: "albumin_g_dl"
          threshold: 3.5
          comparator: "<"

clinical_direction: de-escalate

severity: major
priority: 90
category: frailty-age

relevant_diseases:
  - DIS-WM
shifts_algorithm: []  # not yet wired into ALGO-WM-1L.decision_tree — surfaces as plan annotation
sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-WM-2024

last_reviewed: "2026-04-27"
draft: false

notes: >
  WM is overwhelmingly an elderly disease (median age 70 at diagnosis).
  Frail elderly: BR with reduced bendamustine doses (70 mg/m² instead
  of 90) per StiL elderly subgroup; or rituximab monotherapy weekly x4
  + maintenance for low-burden symptomatic disease. Continuous BTKi:
  zanubrutinib preferred over ibrutinib in elderly with cardiac
  comorbidity (ASPEN — lower AF, hypertension, sudden cardiac events).
  IgM flare with rituximab can precipitate hyperviscosity in elderly;
  pre-treat with plasmapheresis if baseline IgM >40 g/L. Avoid intensive
  Dex-R-Cyclo in very frail (cytopenias, infection risk).
notes_ua: >
  WM is overwhelmingly an літнього віку хвороба (медіанний вік 70 при діагнозі). Frail літнього віку: BR with зменшений бендамустин doses (70 mg/m² instead of 90) per StiL літнього віку subgroup; or ритуксимаб монотерапія weekly x4 + підтримка for low-burden symptomatic хвороба. Continuous BTKi: занубрутиніб переважний over ібрутиніб in літнього віку with cardiac коморбідність (ASPEN — lower AF, гіпертензія, sudden cardiac events). IgM flare with ритуксимаб can precipitate hyperviscosity in літнього віку; pre-treat with plasmapheresis if базове IgM >40 g/L. Avoid intensive Dex-R-Cyclo in very frail (цитопенії, infection risk).
