id: RF-HCL-HIGH-RISK-BIOLOGY
definition: "BRAF V600E wild-type variant HCL (HCL-v) OR IGHV4-34 expression — purine analogs less effective; consider rituximab combination upfront or vemurafenib (for BRAF mutant) in 2L."
definition_ua: "BRAF V600E дикий тип, варіантна HCL (HCL-v) АБО IGHV4-34 експресія — пуринові аналоги менш ефективні; розглянути додавання rituximab з 1L або vemurafenib (BRAF mut) у 2L."

trigger:
  type: biomarker
  any_of:
    - finding: "hcl_variant_v"
      value: true
    - finding: "ighv4_34_positive"
      value: true
    - finding: "braf_v600e"
      value: "negative"


clinical_direction: intensify
severity: major
priority: 100
category: high-risk-biology

relevant_diseases: [DIS-HCL]
shifts_algorithm: []

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-DLBCL-2024

last_reviewed: "2026-04-25"
draft: false

notes: >
  HCL-v and IGHV4-34 are predictors of inferior response to single-agent purine analog. Adding rituximab (HCL14 trial: cladribine + rituximab) raises CR rate notably. Indication-level decision, not a 1L Algorithm switch.
notes_ua: >
  HCL-v and IGHV4-34 are predictors of поступається відповідь to single-agent purine analog. Adding ритуксимаб (HCL14 дослідження: кладрибін + ритуксимаб) raises CR rate примітно. показання-level decision, not a 1L Algorithm switch.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
