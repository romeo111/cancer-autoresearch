id: RF-CHONDROSARCOMA-HIGH-RISK-BIOLOGY
definition: "Adverse subtype or molecular feature in chondrosarcoma: dedifferentiated subtype (high-grade sarcoma component), mesenchymal subtype (HEY1-NCOA2 fusion, Ewing-like biology), grade III conventional histology, IDH1 R132 mutation in advanced unresectable disease (ivosidenib-eligible), or CDKN2A loss — each shifts treatment from observation/surgery alone to systemic therapy or trial enrollment."
definition_ua: "Несприятливий підтип або молекулярна ознака при хондросаркомі: дедиференційований підтип (компонент високодиференційованої саркоми), мезенхімальний підтип (фузія HEY1-NCOA2, Ewing-подібна біологія), grade III конвенційна гістологія, мутація IDH1 R132 в просунутій нерезектабельній хворобі (ivosidenib-кандидат) або втрата CDKN2A — змінює тактику від спостереження/самохірургії на системну терапію або трайл."

trigger:
  type: biomarker
  any_of:
    - finding: "chondrosarcoma_subtype"
      value: "dedifferentiated"
    - finding: "chondrosarcoma_subtype"
      value: "mesenchymal"
    - finding: "chondrosarcoma_grade"
      value: "III"
    - all_of:
        - finding: "BIO-IDH-MUTATION"
          value: "positive"
        - finding: "unresectable_or_metastatic"
          value: true
    - finding: "BIO-CDKN2A"
      value: "loss"

clinical_direction: intensify
severity: major
priority: 80
category: high-risk-biology

relevant_diseases: [DIS-CHONDROSARCOMA]
shifts_algorithm: []

sources:
  - SRC-NCCN-NSCLC-2025
  - SRC-ONCOKB

last_reviewed: "2026-04-26"
draft: false

notes: >
  Chondrosarcoma decision-making is dominated by subtype + grade.
  Dedifferentiated (~10%) — biphasic with high-grade sarcoma
  component, behaves aggressively (5-yr OS ~30%) → doxorubicin +
  ifosfamide adjuvant by extrapolation from soft-tissue sarcoma
  protocols. Mesenchymal (~3–5%, young adults) — HEY1-NCOA2
  fusion-positive small-round-blue-cell biology, treated like Ewing
  (VDC/IE protocols) — chemo-sensitive. Grade III conventional —
  consider adjuvant systemic therapy on trial. IDH1 R132 mutant
  (~40–50% of conventional) — ivosidenib has signal in advanced
  unresectable disease (Tap et al JCO 2020); off-label / trial.
  CDKN2A loss is prognostic in dedifferentiated subtype.
