id: RF-CRC-FRAILTY-AGE
definition: >
  Frailty/age profile precluding doublet-intensive or triplet chemo:
  ECOG ≥3, OR (age ≥80 + Charlson ≥3), OR composite (age ≥75 + albumin
  <3.0 + ≥2 comorbidities). Triggers de-escalation toward 5-FU/LV mono,
  capecitabine mono, or best supportive care.
definition_ua: >
  Профіль frailty при КРР: ECOG ≥3 АБО (≥80 + Charlson ≥3) АБО (≥75 +
  альбумін <3.0 + ≥2 коморбідностей). De-escalation до 5-FU/LV mono,
  капецитабіну, або BSC.

trigger:
  type: composite_score
  any_of:
    - finding: "ecog"
      threshold: 3
      comparator: ">="
    - all_of:
        - finding: "age"
          threshold: 80
          comparator: ">="
        - finding: "charlson_score"
          threshold: 3
          comparator: ">="
    - all_of:
        - finding: "age"
          threshold: 75
          comparator: ">="
        - finding: "albumin_g_dl"
          threshold: 3.0
          comparator: "<"
        - finding: "comorbidity_count"
          threshold: 2
          comparator: ">="

clinical_direction: de-escalate

severity: major
priority: 90
category: frailty-age

relevant_diseases:
  - DIS-CRC
shifts_algorithm:
  - ALGO-CRC-METASTATIC-1L
branch_targets:
  ALGO-CRC-METASTATIC-1L: "step-4"

sources:
  - SRC-NCCN-COLON-2025
  - SRC-ESMO-COLON-2024

last_reviewed: "2026-04-26"
draft: false

notes: >
  IDEA pooled analysis: 3 mo CAPOX adjuvant non-inferior to 6 mo for
  low-risk (T1-3 N1) stage III — explicitly designed for elderly /
  fragile. FOCUS-2 trial: capecitabine ± oxaliplatin in elderly mCRC
  showed acceptable efficacy with reduced toxicity. BSC alone if PS 4
  or organ failure precludes any chemo.
notes_ua: >
  IDEA pooled analysis: 3 mo CAPOX ад'ювантний не гірше to 6 mo for низького ризику (T1-3 N1) stage III — explicitly designed for літнього віку / fragile. FOCUS-2 дослідження: капецитабін ± оксаліплатин in літнього віку mCRC showed прийнятний ефективність with зменшений токсичність. BSC alone if PS 4 or organ failure precludes any chemo.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
