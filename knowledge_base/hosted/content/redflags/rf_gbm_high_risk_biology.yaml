id: RF-GBM-HIGH-RISK-BIOLOGY
definition: >
  Glioblastoma with adverse molecular biology under WHO CNS5 classification:
  MGMT promoter unmethylated (poor TMZ response — Stupp benefit attenuated),
  IDH-wildtype (defines true glioblastoma per WHO 2021 — IDH-mutant astrocytomas
  reclassified), CDKN2A/B homozygous deletion (independent poor-prognostic
  marker), or TERT promoter mutation. Drives MDT discussion of clinical-trial
  enrollment and intensified follow-up.
definition_ua: >
  GBM з біологією високого ризику за класифікацією WHO CNS5: MGMT
  немутильований промотор (поганий ефект TMZ — користь Stupp нижча),
  IDH-wildtype (визначає істинну гліобластому за WHO 2021 — IDH-mut
  astrocytoma реклаcифіковані), CDKN2A/B гомозиготна делеція (незалежний
  поганий прогностик), TERT promoter mutation. Спонукає обговорення
  enrollment в клінічні випробування та інтенсифікованого моніторингу.

trigger:
  type: biomarker
  any_of:
    - finding: "mgmt_methylation_status"
      value: "unmethylated"
    - finding: "idh_status"
      value: "wildtype"
    - finding: "cdkn2a_b_homozygous_deletion"
      value: true
    - finding: "tert_promoter_mutation"
      value: true

clinical_direction: intensify

severity: major
priority: 80
category: high-risk-biology

relevant_diseases:
  - DIS-GBM
shifts_algorithm: []  # not yet wired into ALGO-GBM-NEWLY-DIAGNOSED-1L.decision_tree — surfaces as plan annotation
sources:
  - SRC-NCCN-CNS-2025
  - SRC-EANO-GBM-2024

last_reviewed: "2026-04-27"
draft: false

notes: >
  MGMT-unmethylated GBM: TMZ benefit substantially smaller (median OS
  12-15 mo vs 21-23 mo for methylated per Stupp / EORTC 26981); strong
  rationale for clinical-trial enrollment (CeTeG / NOA-09 lomustine + TMZ
  for elderly methylated; tumor-treating fields TTF per EF-14 add 4-5 mo
  OS; bevacizumab does not extend OS but benefits steroid-sparing and
  symptomatic care). IDH-wildtype is now the defining molecular feature
  of GBM per WHO CNS5 (2021) — IDH-mutant astrocytomas grade 4 are a
  separate entity with substantially better prognosis and different
  algorithms (vorasidenib emerging). CDKN2A/B deletion in IDH-mut grade
  3-4 astrocytoma upgrades behavior to grade 4-equivalent.
notes_ua: >
  MGMT-unmethylated GBM: TMZ виграш substantially smaller (медіана ЗВ 12-15 mo vs 21-23 mo for methylated per Stupp / EORTC 26981); strong rationale for clinical-дослідження enrollment (CeTeG / NOA-09 lomustine + TMZ for літнього віку methylated; пухлина-treating fields TTF per EF-14 add 4-5 mo OS; бевацизумаб does not extend OS but виграш steroid-sparing and symptomatic care). IDH-wildtype is now the defining molecular feature of GBM per WHO CNS5 (2021) — IDH-mutant astrocytomas grade 4 are a separate сутність with substantially краще прогноз and відмінний algorithms (vorasidenib новий). CDKN2A/B делеція in IDH-mut grade 3-4 astrocytoma upgrades behavior to grade 4-еквівалентний.
ukrainian_review_status: pending_clinical_signoff
