id: RF-EATL-INFECTION-SCREENING
definition: "HBV/HCV/HIV/CMV serology + Strongyloides screen pre-CHOEP (immigrants from endemic areas) — anti-CD20 not used here, but rituximab-naive patients still require HBV prophylaxis if HBsAg+."
definition_ua: "HBV/HCV/HIV/CMV серологія + Strongyloides скринінг перед CHOEP (іммігранти з ендемічних регіонів) — rituximab тут не застосовують, але HBsAg+ пацієнти потребують HBV профілактики."

trigger:
  type: biomarker
  any_of:
    - finding: "hbsag"
      value: "positive"
    - finding: "strongyloides_endemic_exposure"
      value: true
    - finding: "hiv_serology"
      value: "positive"


clinical_direction: investigate
severity: major
priority: 100
category: infection-screening

relevant_diseases: [DIS-EATL]
shifts_algorithm: []

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-PTCL-2024

last_reviewed: "2026-04-25"
draft: false

notes: >
  Immunosuppression-driven Strongyloides hyperinfection is rare but lethal; ivermectin prophylaxis for endemic-area patients is standard.
notes_ua: >
  Immunosuppression-driven Strongyloides hyperinfection is рідкісний but lethal; ivermectin prophylaxis for endemic-area patients is стандарт.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
