id: RF-CRC-INFECTION-SCREENING
definition: >
  Infection-screening gate before mCRC systemic therapy: HBsAg+ /
  anti-HBc+ (HBV reactivation on pembrolizumab + chemo with steroids),
  HIV+ (alters drug pharmacokinetics + ICI safety), or active TB.
  Routes to mandatory prophylaxis (entecavir/TDF for HBV) BEFORE
  initiating pembro / FOLFOX+ICI / cetuximab.
definition_ua: >
  Скринінг інфекцій перед системною терапією при мКРР: HBsAg+ /
  anti-HBc+ (реактивація HBV на пембролізумаб + хіміо зі стероїдами),
  HIV+, активний ТБ. Профілактика ентекавіром / TDF ДО старту
  пембро / FOLFOX+ICI / цетуксимабу.

trigger:
  type: lab_value
  any_of:
    - finding: "hbsag"
      value: "positive"
    - finding: "anti_hbc_total"
      value: "positive"
    - finding: "hiv_status"
      value: "positive"
    - finding: "active_tb"
      value: true

clinical_direction: hold
severity: critical
priority: 60
category: infection-screening

relevant_diseases:
  - DIS-CRC
shifts_algorithm: []  # Same pattern as RF-DLBCL-INFECTION-SCREENING:
                      # operationalized via parallel SUP-HBV-PROPHYLAXIS,
                      # not by switching FOLFOX vs pembro.

sources:
  - SRC-NCCN-COLON-2025
  - SRC-ESMO-COLON-2024

last_reviewed: "2026-04-26"
draft: false

notes: >
  Pembrolizumab + bevacizumab carry HBV reactivation risk; entecavir
  prophylaxis from day -7 through ≥6 mo post-last-dose. HIV+ mCRC
  uses standard FOLFOX/pembro with ART optimization first; CD4 baseline
  documentation. Active TB: complete intensive phase before chemo.
notes_ua: >
  пембролізумаб + бевацизумаб carry HBV reactivation risk; entecavir prophylaxis from day -7 through ≥6 mo post-last-доза. HIV+ mCRC uses стандарт FOLFOX/pembro with ART optimization first; CD4 базове documentation. Active TB: complete intensive phase before chemo.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
