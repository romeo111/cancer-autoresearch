id: RF-ESOPH-FRAILTY-AGE
definition: >
  Frailty profile precluding CROSS / FLOT / definitive CRT in
  esophageal: ECOG ≥3, OR (age ≥75 + Charlson ≥3), OR composite
  (age ≥70 + albumin <3.0 + ≥10% weight loss + sarcopenia).
  Triggers definitive RT-only (palliative-intent), best-supportive-care
  with palliative stenting + nutrition optimization.
definition_ua: >
  Профіль frailty при esophageal: ECOG ≥3, АБО (≥75 + Charlson ≥3),
  АБО (≥70 + альбумін <3.0 + ≥10% втрата ваги + саркопенія). Definitive
  RT-only (паліативно), BSC + стент + нутриція.

trigger:
  type: composite_score
  any_of:
    - finding: "ecog"
      threshold: 3
      comparator: ">="
    - all_of:
        - finding: "age"
          threshold: 75
          comparator: ">="
        - finding: "charlson_score"
          threshold: 3
          comparator: ">="

clinical_direction: de-escalate
severity: major
priority: 90
category: frailty-age

relevant_diseases:
  - DIS-ESOPHAGEAL
shifts_algorithm: []

sources: [SRC-NCCN-ESOPHAGEAL-2025, SRC-ESMO-ESOPHAGEAL-2024]
last_reviewed: "2026-04-26"
draft: false

notes: >
  Esophageal cancer disproportionately affects older patients; pre-CROSS
  nutrition optimization (PEG/J-tube) often required. Frail elderly:
  hypofractionated RT 30-40 Gy palliative + stenting for dysphagia
  control.
notes_ua: >
  рак стравоходу disproportionately affects older patients; pre-CROSS nutrition optimization (PEG/J-tube) часто обов'язковий. Frail літнього віку: hypofractionated RT 30-40 Gy паліативний + stenting for dysphagia control.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
