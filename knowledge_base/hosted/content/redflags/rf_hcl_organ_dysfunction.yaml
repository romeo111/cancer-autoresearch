id: RF-HCL-ORGAN-DYSFUNCTION
definition: "Renal dysfunction (CrCl <60 mL/min) — cladribine clearance reduced; dose adjustment or pentostatin alternative considered."
definition_ua: "Ниркова дисфункція (CrCl <60 мл/хв) — кліренс кладрибіну знижений; коригування дози або заміна на пентостатин."

trigger:
  type: lab_value
  any_of:
    - finding: "creatinine_clearance_ml_min"
      threshold: 60
      comparator: "<"


clinical_direction: investigate
severity: major
priority: 100

relevant_diseases: [DIS-HCL]
shifts_algorithm: []

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-DLBCL-2024

last_reviewed: "2026-04-25"
draft: false

notes: >
  Both cladribine and pentostatin are renally cleared; CrCl <60 mL/min triggers 25-50% dose reduction. Hematology decision; not a regimen-class shift.
