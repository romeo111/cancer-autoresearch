id: RF-SALIVARY-FRAILTY-AGE
definition: >
  Age ≥75 with ECOG ≥2 or ≥2 comorbidities — cisplatin + RT and
  trastuzumab + chemotherapy combinations poorly tolerated; AR-targeted
  therapy (bicalutamide + LHRH for AR+ SDC) is favored low-toxicity
  alternative; for indolent histologies (low-grade mucoepidermoid /
  acinic cell), watchful waiting is appropriate.
definition_ua: >
  Вік ≥75 з ECOG ≥2 або ≥2 коморбідностями — cisplatin + RT і
  трастузумаб + хіміотерапія погано переносяться; AR-таргетна (бікалутамід
  + LHRH при AR+ SDC) — переважна низькотоксична альтернатива; для
  індолентних гістологій (low-grade mucoepidermoid / acinic cell) —
  спостереження.

trigger:
  type: composite_clinical
  all_of:
    - finding: "age_years"
      threshold: 75
      comparator: ">="
    - any_of:
        - finding: "ecog_status"
          threshold: 2
          comparator: ">="
        - finding: "comorbidity_count"
          threshold: 2
          comparator: ">="

clinical_direction: de-escalate
severity: major
priority: 100
category: frailty-age

