last_reviewed: "2026-04-27"
draft: false

notes: >
  Salivary gland cancers span indolent (low-grade mucoepidermoid, acinic
  cell — 10-yr OS >80%) to aggressive (salivary duct, high-grade
  transformation — 5-yr OS ~30%); frailty-age framing must consider
  histology + AR / HER2 / NTRK status. Cisplatin-CRT in elderly carries
  high mucositis + nephrotoxicity rates. Bicalutamide + LHRH (AR+ SDC)
  is well-tolerated even in elderly — comparable efficacy to
  chemotherapy with much lower toxicity (EORTC-1206). Larotrectinib /
  entrectinib (NTRK+) similar — well-tolerated. Geriatric assessment
  (G8) ≥70 recommended before chemoradiation. Consider IMRT alone
  (without chemo) for elderly with locally advanced disease + organ
  dysfunction.
notes_ua: >
  Слинні залози — від індолентних (low-grade — 10-річна ЗВ >80%) до
  агресивних (SDC — 5-річна ЗВ ~30%); frailty-age має враховувати
  гістологію + AR / HER2 / NTRK. Cisplatin-CRT у літніх — високі
  мукозит + нефротоксичність. Бікалутамід + LHRH (AR+ SDC) добре
  переноситься, ефект порівнянний з хіміо.
