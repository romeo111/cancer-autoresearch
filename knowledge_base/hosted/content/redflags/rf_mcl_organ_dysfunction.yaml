id: RF-MCL-ORGAN-DYSFUNCTION
definition: >
  Baseline organ dysfunction precluding standard MCL induction (Nordic
  R-MaxiCHOP/AraC, R-DHAP, R-CHOP, BR): LVEF <50% (R-CHOP / R-DHAP
  anthracycline contraindicated), CrCl <50 (HD-cytarabine in Nordic /
  R-DHAP requires renal function — neurotoxicity risk; CrCl <30 absolute
  contraindication), bilirubin >3× ULN, severe cardiac dysfunction
  (ibrutinib relative contraindication), or active bleeding diathesis.
definition_ua: >
  Базова дисфункція органів при MCL: LVEF <50% (антрациклін у R-CHOP /
  R-DHAP), CrCl <50 (HD-цитарабін у Nordic / R-DHAP — ризик нейротоксичності;
  CrCl <30 абсолютне протипоказання), білірубін >3× ULN, тяжка
  кардіальна дисфункція (ібрутиніб відносне протипоказання), активна
  геморагія.

trigger:
  type: lab_value
  any_of:
    - finding: "lvef_percent"
      threshold: 50
      comparator: "<"
    - finding: "creatinine_clearance_ml_min"
      threshold: 50
      comparator: "<"
    - finding: "bilirubin_ratio_to_uln"
      threshold: 3
      comparator: ">="
    - finding: "nyha_class_3_or_4"
      value: true
    - finding: "active_bleeding"
      value: true

clinical_direction: de-escalate

severity: major
priority: 85
category: organ-dysfunction

relevant_diseases:
  - DIS-MCL
shifts_algorithm: []  # not yet wired into ALGO-MCL-1L.decision_tree — surfaces as plan annotation
sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-MCL-2024

last_reviewed: "2026-04-27"
draft: false

notes: >
  HD-cytarabine (>2 g/m² per dose in Nordic, R-DHAP) is the
  cerebellar-toxicity-limiting drug — CrCl <50 mandates dose reduction
  (1 g/m² instead of 2-3 g/m²); CrCl <30 absolute contraindication.
  LVEF <50%: avoid R-CHOP backbone — use BR (StiL NHL1 — bendamustine
  + R, no anthracycline); for fit younger transplant candidates with
  LVEF 40-50%, R-DHAP without anthracycline acceptable as transplant
  bridge. Cardiac comorbidity + intended BTKi: zanubrutinib /
  acalabrutinib preferred over ibrutinib (lower AF / HTN per ALPINE /
  ELEVATE-RR data).
notes_ua: >
  HD-цитарабін (>2 g/m² per доза in Nordic, R-DHAP) is the cerebellar-токсичність-limiting drug — CrCl <50 mandates зниження дози (1 g/m² instead of 2-3 g/m²); CrCl <30 absolute протипоказання. LVEF <50%: avoid R-CHOP основа схеми — use BR (StiL NHL1 — бендамустин + R, ні anthracycline); for fit younger transplant candidates with LVEF 40-50%, R-DHAP without anthracycline прийнятний as transplant bridge. Cardiac коморбідність + intended BTKi: занубрутиніб / акалабрутиніб переважний over ібрутиніб (lower AF / HTN per ALPINE / ELEVATE-RR дані).
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
