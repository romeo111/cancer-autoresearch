id: RF-HCV-MZL-FRAILTY-AGE
definition: >
  HCV-associated MZL patient frail or elderly: ECOG ≥3, OR age ≥75 with
  ≥2 comorbidities, OR composite (age ≥70 + albumin <3.0 + cirrhosis),
  OR explicit "unfit for combination immunochemotherapy". Most HCV-MZL
  patients present in the 6th-7th decade with hepatic comorbidity from
  long-standing HCV.
definition_ua: >
  Літній або непридатний пацієнт із HCV-асоційованою MZL: ECOG ≥3, АБО
  ≥75 з ≥2 коморбідностями, АБО (≥70 + альбумін <3.0 + цироз), АБО
  клінічне рішення "unfit for combination immunochemotherapy". Більшість
  пацієнтів з HCV-MZL — 6-7 декада з печінковою коморбідністю на тлі
  тривалого HCV.

trigger:
  type: composite_score
  any_of:
    - finding: "ecog"
      threshold: 3
      comparator: ">="
    - finding: "fit_for_combination_chemo"
      value: false
    - all_of:
        - finding: "age"
          threshold: 75
          comparator: ">="
        - finding: "comorbidity_count"
          threshold: 2
          comparator: ">="
    - all_of:
        - finding: "age"
          threshold: 70
          comparator: ">="
        - finding: "albumin_g_dl"
          threshold: 3.0
          comparator: "<"
        - finding: "cirrhosis_present"
          value: true

clinical_direction: de-escalate

severity: major
priority: 90
category: frailty-age

relevant_diseases:
  - DIS-HCV-MZL
shifts_algorithm:
  - ALGO-HCV-MZL-1L

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-MZL-2024
  - SRC-BSH-MZL-2024

last_reviewed: "2026-04-27"
draft: false

notes: >
  HCV-MZL is typically indolent and DAA-responsive — antiviral therapy
  alone (DAA: glecaprevir/pibrentasvir or sofosbuvir/velpatasvir)
  produces ~75% lymphoma response when achieved viral cure (Arcaini
  2014). Frail patients should preferentially receive DAA-only with
  watch-and-wait for the lymphoma; reserve immunochemotherapy
  (R-bendamustine, R-CVP) for symptomatic / progressive disease after
  SVR. Bendamustine in elderly: high infection risk, monitor lymphocyte
  recovery + add PJP prophylaxis. Cirrhotic + frail: prefer rituximab-
  monotherapy. Geriatric assessment recommended.
notes_ua: >
  HCV-MZL is типово індолентний and DAA-responsive — antiviral терапія alone (DAA: glecaprevir/pibrentasvir or sofosbuvir/velpatasvir) produces ~75% лімфома відповідь when achieved viral cure (Arcaini 2014). Frail patients should preferentially receive DAA-only with watch-and-wait for the лімфома; reserve immunochemotherapy (R-бендамустин, R-CVP) for symptomatic / прогресування хвороби after SVR. бендамустин in літнього віку: high infection risk, monitor lymphocyte recovery + add PJP prophylaxis. Cirrhotic + frail: prefer ритуксимаб- монотерапія. Geriatric assessment рекомендований.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
