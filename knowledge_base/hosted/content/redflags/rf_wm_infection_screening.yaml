id: RF-WM-INFECTION-SCREENING
definition: >
  Active or latent infection requiring resolution / prophylaxis before
  initiating WM therapy: HBsAg-positive (high HBV reactivation risk on
  rituximab + bendamustine combination), anti-HBc-positive (occult HBV),
  HCV-RNA-positive (HCV-driven cryoglobulinemia / WM associations require
  hepatology coordination), HIV-positive, active TB, or hypogammaglobulinemia
  with recurrent infections (consider IVIG before BTKi/anti-CD20).
definition_ua: >
  Активна / латентна інфекція перед терапією WM: HBsAg+ (високий ризик
  реактивації HBV на рітуксимаб + бендамустин), anti-HBc+ (occult HBV),
  HCV-РНК+ (HCV-driven cryoglobulinemia / WM асоціації — координація
  гепатолога), HIV+, активний туберкульоз, гіпогамаглобулінемія з
  рекурентними інфекціями (розглянути IVIG до BTKi / anti-CD20).

trigger:
  type: lab_value
  any_of:
    - finding: "hbsag"
      value: "positive"
    - finding: "anti_hbc_total"
      value: "positive"
    - finding: "hcv_rna"
      value: "positive"
    - finding: "hiv_status"
      value: "positive"
    - finding: "active_tb"
      value: true
    - all_of:
        - finding: "igg_g_l"
          threshold: 4.0
          comparator: "<"
        - finding: "recurrent_infections"
          value: true

clinical_direction: hold

severity: critical
priority: 60
category: infection-screening

relevant_diseases:
  - DIS-WM
shifts_algorithm: []

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-WM-2024

last_reviewed: "2026-04-27"
draft: false

notes: >
  HBsAg+ with planned BR (bendamustine + rituximab — current standard
  per StiL elderly WM data): reactivation risk highest among WM regimens;
  entecavir/tenofovir prophylaxis from –7d through +12-18 mo. anti-HBc+
  HBsAg-negative on bendamustine: monitor HBV-DNA q1-3mo or pre-emptive
  prophylaxis. HCV+ patients: defer DAA cure pre-treatment if disease
  tempo allows (WM is indolent — virtually always feasible). WM patients
  are frequently hypogammaglobulinemic at baseline (paradox: monoclonal
  IgM often normal or elevated, but polyclonal IgG/IgA suppressed) —
  IVIG (0.4 g/kg q3-4 weeks) for symptomatic recurrent infection.
  PJP prophylaxis routine on bendamustine + ongoing BTKi maintenance.
notes_ua: >
  HBsAg+ with planned BR (бендамустин + ритуксимаб — current стандарт per StiL літнього віку WM дані): reactivation risk найвища серед WM схеми; entecavir/tenofovir prophylaxis from –7d through +12-18 mo. anti-HBc+ HBsAg-negative on бендамустин: monitor HBV-DNA q1-3mo or pre-emptive prophylaxis. HCV+ patients: defer DAA cure pre-лікування if хвороба tempo allows (WM is індолентний — virtually always feasible). WM patients are часто hypogammaglobulinemic на старті (paradox: monoclonal IgM часто normal or elevated, but polyclonal IgG/IgA suppressed) — ВВІГ (0.4 g/kg q3-4 weeks) for symptomatic рецидивний infection. PJP prophylaxis routine on бендамустин + ongoing BTKi підтримка.
