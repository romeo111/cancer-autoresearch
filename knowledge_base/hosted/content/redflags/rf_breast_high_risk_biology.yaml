id: RF-BREAST-HIGH-RISK-BIOLOGY
definition: "Germline or somatic BRCA1/2 mutation, PIK3CA mutation, ESR1 mutation, HER2-amplification, or PD-L1 positivity — each opens distinct biomarker-driven indications."
definition_ua: "Гермінальна або соматична мутація BRCA1/2, PIK3CA, ESR1, HER2-ампліфікація або PD-L1+ — кожен відкриває окремі біомаркер-направлені показання."

trigger:
  type: biomarker
  any_of:
    - finding: "BIO-BRCA-GERMLINE"
      value: "positive"
    - finding: "BIO-PIK3CA-MUTATION"
      value: "positive"
    - finding: "BIO-HER2-SOLID"
      value: "positive"
    - finding: "BIO-PDL1-EXPRESSION"
      value: "positive"
    - finding: "esr1_mutation"
      value: true

clinical_direction: intensify
severity: major
priority: 100
category: high-risk-biology

relevant_diseases: [DIS-BREAST]
shifts_algorithm: []

sources:
  - SRC-NCCN-BREAST-2025
  - SRC-ESMO-BREAST-METASTATIC-2024

last_reviewed:
draft: false

notes: >
  Biomarker-driven branching is the dominant breast-cancer pattern.
  Each positive biomarker opens distinct targeted-therapy options:
  BRCA → olaparib/talazoparib; PIK3CA → alpelisib; HER2-amp → HER2-
  targeted agents; PD-L1 → pembrolizumab + chemo; ESR1 → elacestrant.
  The Algorithm decision_tree resolves these per disease state.
notes_ua: >
  на основі біомаркерів branching is the dominant breast-рак pattern. Each positive біомаркер opens distinct targeted-терапія options: BRCA → олапариб/талазопариб; PIK3CA → алпелісиб; HER2-amp → HER2- targeted agents; PD-L1 → пембролізумаб + chemo; ESR1 → елацестрант. The Algorithm decision_tree resolves these per хвороба state.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
