id: RF-MM-FRAILTY-AGE
definition: >
  Frailty profile precluding standard-dose VRd / D-VRd induction in MM:
  IMWG frailty score ≥2 (defined by age ≥80 OR age 75-79 + Charlson ≥2 OR
  ECOG ≥2 + albumin <3.5), OR age ≥75 with ≥1 grade-2 cardiac/pulmonary
  comorbidity. Impacts dose schedule (Vd-Rd weekly vs twice-weekly,
  reduced lenalidomide, reduced dexamethasone), not regimen choice.
definition_ua: >
  Профіль frailty, що перешкоджає повнодозовому VRd/D-VRd при ММ: IMWG
  frailty score ≥2 (вік ≥80 АБО 75-79 + Charlson ≥2 АБО ECOG ≥2 + альбумін
  <3.5), АБО ≥75 з ≥1 коморбідністю серцево-судинною / легеневою grade 2.
  Впливає на схему дози, не на вибір режиму.

trigger:
  type: composite_score
  any_of:
    - finding: "imwg_frailty_score"
      threshold: 2
      comparator: ">="
    - all_of:
        - finding: "age"
          threshold: 80
          comparator: ">="
    - all_of:
        - finding: "age"
          threshold: 75
          comparator: ">="
        - finding: "ecog"
          threshold: 2
          comparator: ">="
        - finding: "albumin_g_dl"
          threshold: 3.5
          comparator: "<"

clinical_direction: de-escalate

severity: major
priority: 90
category: frailty-age

relevant_diseases:
  - DIS-MM
shifts_algorithm:
  - ALGO-MM-1L

sources:
  - SRC-NCCN-MM-2025
  - SRC-ESMO-MM-2023

last_reviewed: "2026-04-25"
draft: false

notes: >
  IMWG frailty score (Palumbo 2015) is validated against survival on
  novel-agent regimens. Frail patients on full-dose VRd have ≈15-20%
  treatment-related mortality vs ≈3% on dose-modified schedules.
  Dose-modified VRd (V weekly, R 15-25 mg, dex 20 mg weekly) preserves
  efficacy with substantially better tolerability. This RF de-escalates
  toward IND-MM-1L-VRD with dose-modified schedule (when high-risk
  cytogenetics + frailty co-occur — both step 1 and this trigger fire,
  intensify takes precedence per direction order; engine surfaces both).
notes_ua: >
  IMWG дряхлість score (Palumbo 2015) is validated against виживаність on novel-agent схеми. Frail patients on full-доза VRd have ≈15-20% лікування-related mortality vs ≈3% on доза-modified schedules. доза-modified VRd (V weekly, R 15-25 mg, dex 20 mg weekly) preserves ефективність with substantially краще переносимість. This RF de-escalates toward IND-MM-1L-VRD with доза-modified схема (when високого ризику cytogenetics + дряхлість co-occur — both step 1 and this trigger fire, intensify takes precedence per direction order; engine surfaces both).
ukrainian_review_status: pending_clinical_signoff
