id: RF-HBV-COINFECTION
definition: "Hepatitis B coinfection: HBsAg positive OR anti-HBc total positive (occult HBV risk). HCV-MZL-specific surveillance flag — universal HBV reactivation handling lives in RF-UNIVERSAL-HBV-REACTIVATION-RISK."
definition_ua: "Коінфекція HBV (HCV-MZL контекст): HBsAg+ АБО anti-HBc total+. Універсальне поводження з HBV-реактивацією — у RF-UNIVERSAL-HBV-REACTIVATION-RISK."

trigger:
  type: lab_value
  any_of:
    - finding: "hbsag"
      value: "positive"
    - finding: "anti_hbc_total"
      value: "positive"

# Reclassified 2026-04-25 from `hold` to `investigate` after clinical
# review (CLINICAL_REVIEW_QUEUE_REDFLAGS §B.1, Option 2). Rationale:
# ALGO-HCV-MZL-1L's two arms (ANTIVIRAL vs BR-AGGRESSIVE) are about
# disease control, not HBV management. HBV-prophylaxis is delivered as
# parallel supportive_care (entecavir/TDF), so the algorithm choice
# itself is unchanged. Universal RF-UNIVERSAL-HBV-REACTIVATION-RISK
# already covers reactivation surveillance for every disease that
# uses anti-CD20/BTKi/autoSCT — this disease-specific RF is kept for
# HCV-MZL-specific MDT-brief annotation but does not shift the algorithm.
clinical_direction: investigate

severity: major
priority: 100
category: infection-screening

relevant_diseases:
  - DIS-HCV-MZL
shifts_algorithm: []

sources:
  - SRC-EASL-HCV-2023
  - SRC-NCCN-BCELL-2025

last_reviewed: "2026-04-25"
notes: >
  HBV co-infection in HCV-MZL patients triggers MDT-brief annotation
  recommending HBV-prophylaxis (entecavir or TDF) before any anti-CD20
  exposure. Reactivation rates without prophylaxis: ~50% in HBsAg+, 5-10%
  in anti-HBc+ (occult HBV). Algorithm choice between ANTIVIRAL and
  BR-AGGRESSIVE arms is not affected — both arms can proceed with HBV
  prophylaxis in parallel.

  The cross-disease/universal HBV reactivation handling (HBsAg+,
  anti-HBc+, HBV-DNA detectable) is consolidated into
  RF-UNIVERSAL-HBV-REACTIVATION-RISK. This disease-specific entry kept
  for backwards compatibility with existing HCV-MZL plans; new diseases
  should rely on the universal flag instead.
notes_ua: >
  HBV co-infection in HCV-MZL patients triggers MDT-brief annotation recommending HBV-prophylaxis (entecavir or TDF) before any anti-CD20 exposure. Reactivation rates without prophylaxis: ~50% in HBsAg+, 5-10% in anti-HBc+ (occult HBV). Algorithm choice між ANTIVIRAL and BR-агресивний arms is not affected — both arms can proceed with HBV prophylaxis in parallel.

  The cross-хвороба/universal HBV reactivation handling (HBsAg+, anti-HBc+, HBV-DNA detectable) is consolidated into RF-UNIVERSAL-HBV-REACTIVATION-RISK. This хвороба-specific entry kept for backwards compatibility with existing HCV-MZL plans; new diseases should rely on the universal flag instead.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
