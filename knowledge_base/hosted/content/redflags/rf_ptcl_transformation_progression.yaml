  - SRC-ESMO-PTCL-2024

last_reviewed: "2026-04-27"
draft: false

notes: >
  PTCL NOS has dismal r/r outcomes — median OS ~6 mo without HCT.
  CD30+ subset: brentuximab vedotin monotherapy ORR 41% per Horwitz
  Blood 2014. Romidepsin (Pralatrexate, Belinostat) — ORRs 25-30%
  but durable CR uncommon. Best survival in r/r PTCL: salvage to CR2
  followed by alloSCT (transplant-eligible only) — 3y OS ~50% in
  responders. AutoSCT consolidation in CR1 standard for high-risk
  PTCL NOS per Nordic NLG-T-01. Clinical-trial enrollment strongly
  encouraged in r/r setting given paucity of effective options.
notes_ua: >
  PTCL NOS has dismal р/р outcomes — медіана ЗВ ~6 mo without HCT. CD30+ subset: брентуксимаб ведотин монотерапія ORR 41% per Horwitz Blood 2014. Romidepsin (Pralatrexate, Belinostat) — ORRs 25-30% but durable CR uncommon. найкращий виживаність in р/р PTCL: сальвадж to CR2 followed by алоТГСК (придатний до трансплантації only) — 3y OS ~50% in responders. аутоТГСК консолідація in CR1 стандарт for високого ризику PTCL NOS per Nordic NLG-T-01. Clinical-дослідження enrollment strongly encouraged in р/р setting given paucity of effective options.
