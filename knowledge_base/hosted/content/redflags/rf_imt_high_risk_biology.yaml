notes: >
  IMT is fusion-driven in ~60–70% of cases; comprehensive genomic
  profiling at diagnosis is now standard. Crizotinib in ALK-positive
  IMT (Schöffski et al, Lancet Oncol 2018; ORR ~50%; pediatric COG-
  ADVL0912) — also active in ROS1+ (entrectinib STARTRK-2). Resistance
  to crizotinib emerges via secondary ALK kinase mutations — switch to
  lorlatinib (more potent, CNS-penetrant) or alectinib. NTRK-fusion IMT
  responds to larotrectinib / entrectinib (NCCN tumor-agnostic). RET-
  fusion IMT case reports of selpercatinib responses. This RF re-routes
  algorithm from surgery-first / chemotherapy to fusion-targeted 1L.
notes_ua: >
  IMT — fusion-driven у ~60–70%; CGP при діагностиці стандарт. Crizotinib
  при ALK+ IMT (Schöffski та ін., Lancet Oncol 2018; ORR ~50%; педіатричне
  COG-ADVL0912). Резистентність до crizotinib — вторинні ALK kinase
  мутації — перехід на lorlatinib (потужніший, CNS-проникний) або
  alectinib. ROS1+ → entrectinib (STARTRK-2); NTRK+ → larotrectinib /
  entrectinib (NCCN tumor-agnostic).
