id: RF-IMT-HIGH-RISK-BIOLOGY
definition: >
  Inflammatory myofibroblastic tumor with actionable fusion driver:
  ALK fusion (TPM3-ALK, TPM4-ALK, CLTC-ALK; ~50%), ROS1 fusion (~10%),
  NTRK fusion (rare), RET fusion (rare), or PDGFRB fusion (rare) — opens
  targeted-therapy line (crizotinib / lorlatinib for ALK; entrectinib /
  crizotinib for ROS1; larotrectinib / entrectinib for NTRK; selpercatinib
  for RET) sparing the patient cytotoxic chemotherapy and aggressive
  surgery for unresectable disease.
definition_ua: >
  Запальна міофібробластична пухлина з дієвоспроможним fusion-драйвером:
  ALK-фузія (TPM3-ALK, TPM4-ALK, CLTC-ALK; ~50%), ROS1-фузія (~10%),
  NTRK-фузія (рідко), RET-фузія (рідко), PDGFRB-фузія (рідко) — відкриває
  таргетну лінію (crizotinib / lorlatinib для ALK; entrectinib /
  crizotinib для ROS1; larotrectinib / entrectinib для NTRK; selpercatinib
  для RET).

