id: RF-DIPSS-PLUS-HIGH
definition: "Primary myelofibrosis with DIPSS-Plus intermediate-2 or high risk — alloHCT referral mandatory in eligible patients (only curative option); ruxolitinib for symptom + spleen control while awaiting transplant"
definition_ua: "Первинний мієлофіброз з ризиком DIPSS-Plus проміжний-2 або високий — обов'язкове направлення на аллоТГСК у придатних пацієнтів (єдина радикальна опція); руксолітиніб для контролю симптомів та спленомегалії під час очікування трансплантації"

trigger:
  type: composite_score
  any_of:
    - finding: "dipss_plus_risk"
      value: "intermediate_2"
    - finding: "dipss_plus_risk"
      value: "high"
    - finding: "dipss_plus_score"
      threshold: 3
      comparator: ">="

clinical_direction: intensify

severity: critical
category: risk-score
relevant_diseases:
  - DIS-PMF
shifts_algorithm:
  - ALGO-PMF-1L

sources:
  - SRC-NCCN-MPN-2025
  - SRC-DIPSS-PLUS-GANGAT-2011
  - SRC-ESMO-MPN-2015

last_reviewed: "2026-04-27"
notes: >
  DIPSS-Plus (Gangat 2011) extends DIPSS with platelets <100K, RBC
  transfusion-dependence, unfavorable karyotype. int-2 / high → median
  OS ~2.9 / 1.3 years without alloHCT. AlloHCT is the only curative
  modality but 30-50% TRM in older patients. MIPSS70/MIPSS70+v2.0 are
  newer molecular extensions. Companion to RF-PMF-HIGH-RISK-DIPSS
  (existing, similar trigger): kept as a separately-named cross-cutting
  flag using the canonical risk-score nomenclature so future MDT
  briefs can target the named score directly.
