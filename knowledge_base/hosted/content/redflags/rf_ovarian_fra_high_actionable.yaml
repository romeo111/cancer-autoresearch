id: RF-OVARIAN-FRA-HIGH-ACTIONABLE
definition: >
  Folate receptor alpha (FRα) high expression (≥75% of viable tumor
  cells with ≥2+ membrane staining by VENTANA FOLR1 RxDx) in
  platinum-resistant high-grade serous ovarian carcinoma. Mirvetuximab
  soravtansine (MIRASOL — mPFS 5.6 vs 4.0 mo, OS 16.5 vs 12.7 mo
  vs investigator-choice chemo) is FDA-approved 2L+ ADC.
definition_ua: >
  Висока експресія фолатного рецептора α (FRα) (≥75% життєздатних
  клітин пухлини з ≥2+ мембранним забарвленням за VENTANA FOLR1 RxDx)
  при платина-резистентній серозній карциномі яєчників високого
  ступеня. Мирветуксимаб соравтансин (MIRASOL — мПФВ 5.6 проти 4.0
  міс, ЗВ 16.5 проти 12.7 міс vs хіміо за вибором дослідника) —
  FDA-схвалений 2L+ ADC.

trigger:
  type: biomarker
  any_of:
    - finding: "fra_status"
      value: "high"
    - finding: "folr1_status"
      value: "high"
    - finding: "fra_expression"
      value: "high"

clinical_direction: intensify

severity: major
priority: 65
category: high-risk-biology

relevant_diseases:
  - DIS-OVARIAN
shifts_algorithm:
  - ALGO-OVARIAN-2L

sources:
  - SRC-NCCN-OVARIAN-2025
  - SRC-ESMO-OVARIAN-2024
  - SRC-MIRASOL-MOORE-2024

last_reviewed: "2026-04-27"
draft: false

notes: >
  Companion diagnostic: VENTANA FOLR1 (FOLR1-2.1) RxDx Assay (Roche).
  Other FRα assays not validated for mirvetuximab selection.
  Re-biopsy at platinum-resistant progression preferred (expression
  can shift from primary). FRα-medium / -low excluded from MIRASOL
  labeling — receive AURELIA-style chemo + bev. Class toxicity:
  ocular AEs (~50% — keratopathy, blurred vision; lubricating drop
  prophylaxis required, ophthalmology baseline + on-treatment exams).
  ILD ~3% but routinely watched.
notes_ua: >
  Companion діагностика: VENTANA FOLR1 (FOLR1-2.1) RxDx Assay (Roche).
  Інші аналізи FRα не валідовані для відбору мирветуксимабу.
  Ре-біопсія при платина-резистентному прогресуванні переважна
  (експресія може зміститися від первинної). FRα-medium / -low
  виключені з MIRASOL — отримують AURELIA-схему хіміо + бев.
  Класова токсичність: офтальмологічні НЯ (~50% — кератопатія,
  затуманення; обов'язкова прапаратна profilактика з лубрикантами,
  baseline + on-treatment огляди офтальмолога). ILD ~3% але рутинно
  моніториться.
