id: RF-UROTHELIAL-FRAILTY-AGE
definition: >
  Urothelial cancer patient cisplatin-ineligible by Galsky criteria:
  ECOG ≥2, OR CrCl <60 mL/min, OR grade ≥2 hearing loss, OR grade ≥2
  peripheral neuropathy, OR NYHA class III heart failure. Also frailty
  composites (age ≥75 + ≥2 comorbidities; age ≥70 + albumin <3.0 +
  Charlson ≥3). Cisplatin-ineligibility is the central routing decision
  in advanced UC — directs to enfortumab-vedotin + pembrolizumab (EV-302)
  or carboplatin-gemcitabine + maintenance avelumab (JAVELIN-100).
definition_ua: >
  Пацієнт з уротеліальним раком, неприйнятний для цисплатину за
  Galsky-критеріями: ECOG ≥2, АБО CrCl <60 мл/хв, АБО зниження слуху
  ≥grade 2, АБО периферична нейропатія ≥grade 2, АБО NYHA III СН.
  Також композити frailty (≥75 + ≥2 коморбідності; ≥70 + альбумін
  <3.0 + Charlson ≥3). Цисплатин-неприйнятність — центральне
  маршрутизаційне рішення в запущеному UC: спрямовує на енфортумаб-
  ведотин + пембролізумаб (EV-302) або карбоплатин-гемцитабін +
  підтримка авелумаб (JAVELIN-100).

trigger:
  type: composite_score
  any_of:
    - finding: "ecog"
      threshold: 2
      comparator: ">="
    - finding: "creatinine_clearance_ml_min"
      threshold: 60
      comparator: "<"
    - finding: "hearing_loss_grade"
      threshold: 2
      comparator: ">="
    - finding: "peripheral_neuropathy_grade"
      threshold: 2
      comparator: ">="
    - finding: "nyha_class"
      value: "III"
    - finding: "fit_for_cisplatin"
      value: false
    - all_of:
        - finding: "age"
          threshold: 75
          comparator: ">="
        - finding: "comorbidity_count"
          threshold: 2
          comparator: ">="
    - all_of:
        - finding: "age"
          threshold: 70
          comparator: ">="
        - finding: "albumin_g_dl"
          threshold: 3.0
          comparator: "<"
        - finding: "charlson_score"
          threshold: 3
          comparator: ">="

clinical_direction: de-escalate

severity: critical
priority: 80
category: frailty-age

relevant_diseases:
  - DIS-UROTHELIAL
shifts_algorithm: []

sources:
  - SRC-NCCN-BLADDER-2025
  - SRC-EAU-BLADDER-2024

last_reviewed: "2026-04-27"
draft: false

notes: >
  Galsky cisplatin-ineligibility criteria (Lancet Oncol 2011) define
  the major UC routing fork: cisplatin-eligible → ddMVAC or
  gem-cisplatin (curative neoadjuvant; metastatic 1L); cisplatin-
  ineligible → EV+pembro (EV-302: OS HR 0.47 vs platinum-gem in
  metastatic UC, now preferred 1L for cisplatin-ineligible AND eligible
  per NCCN 2025 update), OR carbo-gem + maintenance avelumab
  (JAVELIN-100). Median age at UC diagnosis ~73 — most patients
  meet at least one Galsky criterion. Frail patients beyond Galsky
  (ECOG ≥3, severe organ dysfunction) → ICI monotherapy (pembro
  KEYNOTE-052) or best supportive care.
notes_ua: >
  Galsky цисплатин-ineligibility criteria (Lancet Oncol 2011) define the major UC routing fork: цисплатин-eligible → ddMVAC or gem-цисплатин (curative неоад'ювантний; метастатичний 1L); цисплатин- ineligible → EV+pembro (EV-302: OS HR 0.47 vs platinum-gem in метастатичний UC, now переважний 1L for цисплатин-ineligible AND eligible per NCCN 2025 update), OR carbo-gem + підтримка авелумаб (JAVELIN-100). медіанний вік at UC діагноз ~73 — найбільш patients meet щонайменше one Galsky criterion. Frail patients beyond Galsky (ECOG ≥3, severe organ dysfunction) → ICI монотерапія (pembro KEYNOTE-052) or найкраще підтримуюче лікування.
ukrainian_review_status: pending_clinical_signoff
