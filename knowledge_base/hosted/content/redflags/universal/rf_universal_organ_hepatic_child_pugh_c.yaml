id: RF-ORGAN-HEPATIC-CHILD-PUGH-C
definition: >
  Severe hepatic dysfunction (Child-Pugh C, score 10-15). Effectively
  contraindicates most cytotoxic and targeted systemic therapy.
  Best-supportive-care or strictly palliative regimens only; trial
  participation excluded. Liver transplant evaluation may take precedence
  over oncologic therapy in HCC.
definition_ua: >
  Тяжка печінкова дисфункція (Child-Pugh C, бал 10-15). Фактично
  протипоказує більшість цитотоксичної і таргетної системної терапії.
  Лише підтримуюче лікування або суто паліативні режими; участь у
  трайлах виключена. При HCC оцінка трансплантації печінки може мати
  пріоритет над онкологічним лікуванням.

trigger:
  type: composite_score
  all_of:
    - finding: "child_pugh_class"
      value: "C"

clinical_direction: hold

severity: critical
priority: 50
category: organ-dysfunction

