id: RF-LEPTOMENINGEAL-DISEASE
definition: >
  Leptomeningeal disease (LMD) confirmed by CSF cytology (positive
  malignant cells), CSF flow cytometry, or imaging (linear/nodular
  leptomeningeal enhancement on contrast MRI brain/spine). Triggers
  intrathecal chemotherapy (methotrexate, cytarabine, liposomal
  cytarabine), CSF-penetrant systemic therapy (HD-MTX, HD-cytarabine,
  pemetrexed, osimertinib at 160 mg, tucatinib), and consideration of
  craniospinal RT.
definition_ua: >
  Лептоменінгеальне захворювання (LMD), підтверджене цитологією ЦСР
  (позитивні злоякісні клітини), проточною цитометрією ЦСР, або
  візуалізацією (лінійне/вузликове підсилення лептоменінгу на КТ/МРТ
  з контрастом). Триггерує інтратекальну хіміотерапію (метотрексат,
  цитарабін, ліпосомальний цитарабін), CSF-проникну системну терапію
  (HD-MTX, HD-цитарабін, пеметрексед, осимертиніб 160 mg, тукатиніб),
  розгляд краніо-спинальної ПТ.

trigger:
  type: composite_score
  any_of:
    - finding: "csf_cytology_positive"
      value: true
    - finding: "leptomeningeal_enhancement_imaging"
      value: true
    - finding: "leptomeningeal_disease"
      value: true

clinical_direction: intensify

