notes: >
  Patchell 2005 RCT — surgery + RT > RT alone for ambulatory recovery
  in single-level epidural compression with life expectancy >3 mo.
  SCORAD III (Hoskin 2019) — 8 Gy x1 non-inferior to 20 Gy/5 fx for
  ambulatory metastatic spinal cord compression, simpler. SINS score
  (Spinal Instability Neoplastic Score) ≥7 → surgical consult; ≥13
  → unstable. Tumor types vary: lymphoma, MM, breast, prostate, lung
  most common; chemosensitive (lymphoma, MM, SCLC, germ cell) — favor
  chemo-first if asymptomatic-borderline; chemoresistant (RCC,
  melanoma, sarcoma) — favor surgery + RT. Time-to-treatment is the
  critical predictor of recovery — onset of paraplegia <48h prior to
  decompression has poor recovery; >48h paraplegic patients rarely
  ambulate again. Steroids: dex 96 mg/d x3d → taper (Vecht 1989) for
  high-risk; standard 16 mg/d adequate in less-severe.
notes_ua: >
  Patchell 2005 RCT — хірургія + ПТ > ПТ альо для відновлення ходи
  при одно-рівневій епідуральній компресії з очікуваним життям >3 міс.
  SCORAD III (Hoskin 2019) — 8 Gy x1 не гірше за 20 Gy/5 fx для
  амбулаторної метастатичної SCC, простіше. SINS score (Spinal
  Instability Neoplastic Score) ≥7 → хірургічна консультація; ≥13
  → нестабільна. Типи пухлин: лімфома, ММ, молочна, простата,
  легеня — найпоширеніші; хімочутливі (лімфома, ММ, SCLC, гермінативні)
  — chemo-first при асимптомній/межевій; хіморезистентні (RCC,
  меланома, саркома) — хірургія + ПТ. Час до лікування — критичний
  предиктор відновлення.
