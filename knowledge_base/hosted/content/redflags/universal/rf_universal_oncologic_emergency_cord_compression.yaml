id: RF-ONCOLOGIC-EMERGENCY-CORD-COMPRESSION
definition: >
  Malignant spinal cord compression (MSCC) — radiologic compression of
  cord/cauda equina by epidural tumor with neurologic deficit (motor
  weakness, sensory level, sphincter dysfunction) or impending deficit
  (severe back pain + radiologic compression). Triggers immediate
  dexamethasone 10 mg IV bolus → 16 mg/day, urgent MRI whole spine,
  surgical decompression within 24h if life expectancy ≥3 months
  + single-level disease (Patchell trial), and/or RT 8 Gy x1 or
  20 Gy/5 fx (SCORAD), and disease-directed systemic therapy.
definition_ua: >
  Злоякісна компресія спинного мозку (MSCC) — радіологічна компресія
  спинного мозку/кінського хвоста епідуральною пухлиною з
  неврологічним дефіцитом (моторна слабкість, сенсорний рівень,
  сфінктерна дисфункція) або з загрозою дефіциту (тяжкий біль у
  спині + радіологічна компресія). Триггерує негайний дексаметазон
  10 mg IV bolus → 16 mg/день, ургентну МРТ всього хребта,
  хірургічну декомпресію протягом 24 год при очікуваній тривалості
  життя ≥3 міс + одно-рівневій хворобі (Patchell trial), та/або
  ПТ 8 Gy x1 або 20 Gy/5 fx (SCORAD), плюс хвороб-направлену
  системну терапію.

