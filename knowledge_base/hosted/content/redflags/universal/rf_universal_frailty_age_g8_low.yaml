id: RF-FRAILTY-AGE-G8-LOW
definition: >
  Geriatric vulnerability flag: age ≥75 AND G8 screening score ≤14
  (out of 17 max). Triggers comprehensive geriatric assessment (CGA) and
  de-escalation toward attenuated regimens. G8 ≤14 has 85% sensitivity
  and 65% specificity for impaired CGA in oncology populations
  (Bellera et al. 2012, Decoster et al. 2015).
definition_ua: >
  Геріатрична вразливість: вік ≥75 ТА бал скринінгу G8 ≤14 (з максимальних
  17). Триггерує комплексну геріатричну оцінку (CGA) та де-ескалацію до
  редукованих режимів. G8 ≤14 має 85% чутливість і 65% специфічність
  для виявлення порушень при CGA в онкологічних популяціях (Bellera
  2012, Decoster 2015).

trigger:
  type: composite_score
  all_of:
    - finding: "age"
      threshold: 75
      comparator: ">="
    - finding: "g8_score"
      threshold: 14
      comparator: "<="

clinical_direction: de-escalate

severity: major
priority: 85
category: frailty-age

relevant_diseases:
  - "*"
shifts_algorithm: []

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-DLBCL-2024

last_reviewed: "2026-04-27"
draft: false

notes: >
  G8 is the SIOG-recommended screening tool for older oncology patients.
  Score ≤14 mandates full CGA (Charlson, IADL, MNA, MMSE, GDS) before
  regimen selection. SIOG / NCCN Older Adult Oncology guidelines: at
  G8 ≤14, default to dose-attenuated chemotherapy (R-mini-CHOP for
  DLBCL >80, attenuated VRD for myeloma in unfit, ABVD over BEACOPP for
  Hodgkin >60, FCR contraindicated in CLL >65). Distinct from RF-FITNESS-
  ECOG-POOR — a patient can be ECOG 1 yet G8-vulnerable due to
  cognitive/social/nutritional fragility.
notes_ua: >
  G8 — SIOG-рекомендований скринінговий інструмент для літніх онкологічних
  пацієнтів. Бал ≤14 вимагає повної CGA (Charlson, IADL, MNA, MMSE, GDS)
  перед вибором режиму. SIOG / NCCN Older Adult Oncology: при G8 ≤14
  — dose-attenuated chemotherapy (R-mini-CHOP при DLBCL >80, attenuated
  VRD при мієломі, ABVD замість BEACOPP при Hodgkin >60, FCR
  протипоказаний при CLL >65). Відрізняється від RF-FITNESS-ECOG-POOR —
  пацієнт може бути ECOG 1 але G8-вразливим через когнітивну/соціальну/
  нутрітивну фрагильність.
ukrainian_review_status: pending_clinical_signoff
