id: RF-ONCOLOGIC-EMERGENCY-SVC
definition: >
  Superior vena cava (SVC) syndrome: facial/neck swelling, plethora,
  jugular distension, venous collateral, dyspnea/stridor due to
  obstructed superior vena cava blood flow by mediastinal mass.
  Triggers urgent steroids, expedited histologic diagnosis, immediate
  initiation of disease-directed therapy (chemotherapy for chemosensitive
  histologies, RT for chemorefractory), and consideration of
  endovascular SVC stenting for severe symptoms.
definition_ua: >
  Синдром верхньої порожнистої вени (SVC): набряк обличчя/шиї,
  плетора, набухання яремних вен, венозні колатералі, задишка/стридор
  через обструкцію кровотоку у верхній порожнистій вені медіастинальною
  масою. Триггерує невідкладні стероїди, прискорену гістологічну
  діагностику, негайний старт хвороб-направленої терапії (хіміотерапія
  при хіміочутливих гістологіях, ПТ при хіміорезистентних) та розгляд
  ендоваскулярного стентування SVC при тяжких симптомах.

