id: RF-ONCOLOGIC-EMERGENCY-TLS
definition: >
  Tumor lysis syndrome (TLS), Cairo-Bishop laboratory or clinical
  criteria. Laboratory TLS: ≥2 of uric acid >8 mg/dL (or 25% increase),
  potassium >6 (or 25%↑), phosphate >4.5 (or 25%↑), calcium <7 (or 25%↓)
  within 3 days before / 7 days after treatment start. Clinical TLS:
  laboratory + creatinine ≥1.5× ULN, cardiac arrhythmia, or seizure.
  Triggers immediate IV hydration, rasburicase 0.2 mg/kg, electrolyte
  correction, and consideration of dialysis.
definition_ua: >
  Синдром розпаду пухлини (TLS), лабораторні або клінічні критерії
  Cairo-Bishop. Лабораторний TLS: ≥2 з сечова кислота >8 mg/dL (або
  +25%), калій >6 (або +25%), фосфат >4.5 (або +25%), кальцій <7 (або
  -25%) у вікні 3 дні до / 7 днів після початку лікування. Клінічний
  TLS: лабораторний + креатинін ≥1.5× ULN, серцева аритмія або
  судоми. Триггерує негайну в/в гідратацію, разбуриказу 0.2 mg/kg,
  корекцію електролітів, розгляд діалізу.

trigger:
  type: lab_value
  any_of:
    - finding: "tls_clinical"
      value: true
    - finding: "tls_laboratory"
      value: true
    - finding: "uric_acid_mg_dl"
      threshold: 8
      comparator: ">"
    - all_of:
        - finding: "potassium_mmol_l"
          threshold: 6
          comparator: ">"
        - finding: "phosphate_mg_dl"
          threshold: 4.5
          comparator: ">"

clinical_direction: hold

severity: critical
priority: 40
category: organ-dysfunction

relevant_diseases:
  - "*"
shifts_algorithm: []

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-NCCN-AML-2025

last_reviewed: "2026-04-27"
draft: false

notes: >
  Cairo & Bishop 2004 criteria, Coiffier et al. 2008 expert panel.
  Established TLS pre-existing (spontaneous TLS — Burkitt, T-ALL,
  HGBL, AML with high WBC) requires control before treatment.
  Treatment-emergent TLS: rasburicase 0.2 mg/kg/day x1-7 (G6PD-deficient
  contraindicated — use allopurinol); IV NS hydration 3 L/m²/day;
  avoid alkalinization (calcium phosphate precipitation); RRT for
  refractory hyperkalemia/hyperphosphatemia/oliguria. Distinct from
  RF-UNIVERSAL-TLS-RISK (pre-treatment risk stratification, prophylaxis)
  — this RF is for established TLS where treatment hold and intensive
  supportive care take priority over the next chemotherapy cycle.
notes_ua: >
  Критерії Cairo & Bishop 2004, експертна панель Coiffier 2008.
  Встановлений TLS (спонтанний — Burkitt, T-ALL, HGBL, AML з високим
  WBC) потребує контролю перед лікуванням. Treatment-emergent TLS:
  разбуриказа 0.2 mg/kg/день x1-7 (G6PD-дефіцит — протипоказання,
  замість — алопурінол); в/в NS 3 L/m²/день; уникати alkalinization
  (кальцій-фосфатна преципітація); RRT при рефрактерній гіперкаліємії/
  гіперфосфатемії/олігурії. Відрізняється від RF-UNIVERSAL-TLS-RISK
  (пре-лікувальна стратифікація ризику) — цей RF для встановленого
  TLS, де hold + інтенсивна підтримка — пріоритет.
