id: RF-PREGNANCY-PLANNING
definition: >
  Patient planning pregnancy within next 12 months. Triggers fertility
  preservation referral (oocyte/embryo cryopreservation, ovarian tissue
  cryopreservation, GnRH agonist co-administration, sperm banking),
  selection of regimens with lowest gonadotoxic burden where oncologic
  equivalence exists, and informed-consent emphasis on fertility outcomes.
definition_ua: >
  Пацієнт/-ка планує вагітність протягом наступних 12 місяців. Триггерує
  направлення на збереження фертильності (кріоконсервація ооцитів/
  ембріонів, тканини яєчника, ко-введення агоніста GnRH, кріоконсервація
  сперми), вибір режимів з найменшим гонадотоксичним навантаженням за
  онкологічної еквівалентності та акцент інформованої згоди на питанні
  фертильності.

trigger:
  type: composite_score
  any_of:
    - finding: "pregnancy_planning_12_months"
      value: true
    - finding: "fertility_preservation_requested"
      value: true

clinical_direction: investigate

severity: major
priority: 90
category: other

