  - SRC-NCCN-BCELL-2025

last_reviewed: "2026-04-27"
draft: false

notes: >
  ASCO 2018 fertility preservation guideline mandates discussion at
  diagnosis. Gonadotoxicity ranking: alkylators (cyclophosphamide,
  busulfan, melphalan) — high; anthracyclines + alkylators (R-CHOP,
  ABVD) — moderate-high cumulative; ABVD lower vs BEACOPP; FCR vs
  BR — BR less gonadotoxic; aromatase inhibitors require LHRH-co-
  administration in premenopausal. GnRH-agonist co-administration
  (POEMS, PROMISE-GIM6 in breast) reduces premature ovarian failure
  rate. Direction `investigate` because flag drives parallel
  fertility-preservation pathway, not alternative oncologic
  indication. Bridges to RF-PREGNANCY-ACTIVE if patient becomes
  pregnant during/after therapy.
notes_ua: >
  ASCO 2018 fertility preservation guideline вимагає обговорення при
  діагнозі. Ранг гонадотоксичності: алкілатори (циклофосфамід,
  бусульфан, мелфалан) — високий; антрацикліни + алкілатори (R-CHOP,
  ABVD) — помірно-високий кумулятивний; ABVD нижче ніж BEACOPP; FCR
  vs BR — BR менш гонадотоксичний; ароматазні інгібітори потребують
  ко-введення LHRH у пременопаузі. Ко-введення агоніста GnRH (POEMS,
  PROMISE-GIM6) зменшує частоту передчасної оваріальної недостатності.
