id: RF-PRIOR-HDACI-NAIVE
definition: >
  Patient has NOT previously received an HDAC inhibitor (vorinostat,
  romidepsin, belinostat, panobinostat, chidamide). Used as eligibility
  gate for HDACi-based 2L/3L regimens in PTCL (romidepsin Coiffier 2012,
  ORR 25-38%; belinostat BELIEF/Lee 2015, ORR 25%) and CTCL
  (vorinostat ZOLINZA 2007). Firing means HDACi-route remains open.
  Co-fires with disease-specific PTCL/CTCL flags to define the salvage
  algorithm branch.
definition_ua: >
  Пацієнт НЕ отримував раніше HDAC-інгібітор (вориностат, ромідепсин,
  белінoстат, панобіностат, хідамід). Використовується як гейт
  придатності для HDACi-2L/3L режимів у PTCL (ромідепсин Coiffier 2012,
  ORR 25-38%; белінoстат BELIEF/Lee 2015, ORR 25%) і CTCL (вориностат
  ZOLINZA 2007). Спрацювання — HDACi-маршрут відкритий. Ко-спрацьовує
  з захворювання-специфічними PTCL/CTCL прапорами для визначення гілки
  сальвадж алгоритму.

trigger:
  type: composite_score
  any_of:
    - finding: "prior_hdaci_received"
      value: false
    - finding: "prior_hdac_inhibitor_received"
      value: false
    - finding: "hdaci_naive"
      value: true
    - finding: "prior_therapy_classes"
      value: "no_hdaci"

clinical_direction: intensify

severity: minor
priority: 80
category: prior-therapy-class

relevant_diseases:
  - "*"
shifts_algorithm: []

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-PTCL-2024
  - SRC-ESMO-CTCL-2024

last_reviewed: "2026-04-27"
draft: false

notes: >
  Eligibility-gate flag for PTCL/CTCL salvage. PTCL: HDACi (romidepsin/
  belinostat) ORR 25-38%, mDOR 9-15 mo, single-agent — used at 2L+
  in non-AITL PTCL when BV (ECHELON-2) was not part of 1L. AITL has
  particular HDACi sensitivity (romidepsin AITL ORR ~50%). CTCL/MF/SS:
  vorinostat (ORR 30%) and romidepsin (ORR 34%) — used 2L+ for
  refractory disease, especially erythrodermic SS. Ro-CHOP (Ro+CHOP)
  was tested 1L (Ro-CHOP, Bachy 2022) and did NOT improve PFS over
  CHOP — HDACi belongs at 2L+, not 1L. Class toxicity: thrombocytopenia,
  neutropenia, fatigue, GI; QT-prolongation (romidepsin → ECG monitoring).
  Romidepsin USA-withdrawn for PTCL 2021 (post-marketing trial failed
  to confirm 1L benefit) but EMA-approved and active 2L+. Access UA:
  romidepsin not NSZU-listed; chidamide (China-developed, EMA-pending)
  not available.
notes_ua: >
  Eligibility-gate для PTCL/CTCL сальвадж. PTCL: HDACi (ромідепсин/
  белінoстат) ORR 25-38%, мDOR 9-15 міс, single-agent — використовується
  на 2L+ у не-AITL PTCL коли BV (ECHELON-2) не був у 1L. AITL має
  особливу HDACi-чутливість (ромідепсин AITL ORR ~50%). CTCL/MF/SS:
  вориностат (ORR 30%) і ромідепсин (ORR 34%) — використовуються 2L+
  для рефрактерної хвороби, особливо ерітродермічної SS. Ro-CHOP
  (Ro+CHOP) тестували 1L (Ro-CHOP, Bachy 2022) і це НЕ покращило ПФВ
  над CHOP — HDACi на 2L+, не на 1L. Класова токсичність:
  тромбоцитопенія, нейтропенія, втома, GI; QT-подовження (ромідепсин →
  моніторинг ECG). Ромідепсин виведений з USA для PTCL у 2021
  (post-marketing trial не підтвердив 1L benefit) але EMA-схвалений
  і активний 2L+. Доступ в Україні: ромідепсин не в НСЗУ-списку;
  хідамід (Китай, EMA-pending) недоступний.

