id: RF-UNIVERSAL-INFUSION-REACTION-FIRST-CYCLE
definition: >
  First exposure to a monoclonal antibody (rituximab, obinutuzumab,
  brentuximab vedotin, mogamulizumab, alemtuzumab, daratumumab) — high
  baseline rate of infusion reactions at cycle 1, declining sharply by
  cycle 3. Surveillance and slow-rate first infusion required.
definition_ua: >
  Перше введення моноклонального тіла (rituximab, obinutuzumab,
  brentuximab vedotin, mogamulizumab, alemtuzumab, daratumumab) — високий
  базовий рівень інфузійних реакцій на 1-му циклі, різко зменшується до
  3-го. Потрібен моніторинг + повільна швидкість першої інфузії.

trigger:
  type: composite_score
  all_of:
    - finding: "cycle_number"
      threshold: 1
      comparator: "=="
    - any_of:
        - finding: "regimen_contains_rituximab"
          value: true
        - finding: "regimen_contains_obinutuzumab"
          value: true
        - finding: "regimen_contains_brentuximab"
          value: true
        - finding: "regimen_contains_mogamulizumab"
          value: true
        - finding: "regimen_contains_alemtuzumab"
          value: true
        - finding: "regimen_contains_daratumumab"
          value: true

clinical_direction: investigate

severity: minor
priority: 100

relevant_diseases:
  - "*"
shifts_algorithm: []  # investigate-only — engine surfaces premedication
                      # checklist + monitoring schedule, no branch.

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-MZL-2024

last_reviewed: "2026-04-25"
draft: false

notes: >
  Anti-CD20 cycle-1 infusion-reaction rate: 30-77% any-grade for rituximab
  (Lim et al. 2012); 65% for obinutuzumab cycle-1 vs <10% by cycle-3.
  Premedication: paracetamol 1g + diphenhydramine 25-50 mg PO 30-60 min
  pre-infusion; methylprednisolone 80-100 mg IV when CD20 burden is high.
  Initial infusion rate 50 mg/h, escalate by 50 mg/h every 30 min if no
  reaction, max 400 mg/h (rituximab). Mogamulizumab and brentuximab have
  their own premedication regimens — engine should select per drug.
