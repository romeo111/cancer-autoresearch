id: RF-PRIOR-PARPI-EXPOSED
definition: >
  Patient has received prior PARP inhibitor (olaparib, niraparib,
  rucaparib, talazoparib) — either as maintenance or for treatment of
  HRD/BRCA-mutant disease. PARPi-exposure influences subsequent line:
  reduces benefit of platinum rechallenge, alters ADC selection
  (mirvetuximab in ovarian), and is increasingly a stratification
  variable in trial design.
definition_ua: >
  Пацієнт отримав попередню PARP-інгібіторну терапію (олапариб,
  ніраpariб, рукапариб, талазопариб) — як підтримку або як лікування
  HRD/BRCA-мутованої хвороби. PARPi-експозиція впливає на наступну
  лінію: зменшує користь повторної терапії платиною, змінює вибір ADC
  (мірветуксимаб при оваріальному), і все частіше — стратифікаційна
  змінна в дизайні трайлів.

trigger:
  type: composite_score
  any_of:
    - finding: "prior_parpi_received"
      value: true

clinical_direction: investigate

severity: major
priority: 90
category: other

