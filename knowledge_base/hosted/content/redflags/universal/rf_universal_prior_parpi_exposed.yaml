last_reviewed: "2026-04-27"
draft: false

notes: >
  Direction `investigate` (not de-escalate) because PARPi-exposure does
  not contraindicate any specific next-line — it informs ranking.
  Ovarian: post-PARPi platinum-sensitive recurrence — platinum doublet
  remains standard but ORR drops 20-30% vs PARPi-naive (Frenel 2022,
  OREO study); mirvetuximab soravtansine for FRα+ resistance/maintenance
  candidates (MIRASOL); bevacizumab combinations retain activity. Breast
  BRCA: post-talazoparib/olaparib (OlympiAD/EMBRACA) PD — capecitabine,
  eribulin, sacituzumab govitecan (TNBC), T-DXd if HER2-low. Prostate:
  post-olaparib PD (PROfound) — radium-223 if bone-predominant, Lu-177-
  PSMA-617, cabazitaxel.
notes_ua: >
  Направлення `investigate` (не de-escalate), бо PARPi-експозиція не
  протипоказує жодну конкретну наступну лінію — інформує ранжування.
  Оваріальний: після PARPi платина-чутливий рецидив — платинова
  комбінація залишається стандартом, але ORR падає 20-30% vs
  PARPi-наївних; мірветуксимаб соравтансин для FRα+. Молочна BRCA:
  після талазопарибу/олапарибу PD — капецитабін, ерибулін, сацитузумаб
  говітекан (TNBC), T-DXd при HER2-low. Простата: після олапарибу PD
  — радій-223, Lu-177-PSMA-617, кабазитаксел.
