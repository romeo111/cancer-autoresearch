last_reviewed: "2026-04-27"
draft: false

notes: >
  Bleomycin pulmonary toxicity is dose-dependent (cumulative >270 IU)
  and risk-elevated by baseline DLCO <60%, age >40, smoking, prior
  thoracic RT, renal dysfunction. RATHL trial (Johnson 2016) established
  PET2-negative-then-AVD safety, halving bleomycin exposure without
  PFS loss. For autoSCT conditioning: BEAM (BCNU 300 mg/m²) carries
  10-20% pneumonitis at DLCO <60% — substitute LEAM (lomustine) or
  BeEAM (bendamustine) per institutional preference. For ICI: prior
  pneumonitis grade ≥2 contraindicates rechallenge.
notes_ua: >
  Легенева токсичність блеоміцину дозо-залежна (кумулятивно >270 IU);
  ризик підвищують базовий DLCO <60%, вік >40, куріння, попередня
  торакальна ПТ, ниркова дисфункція. Трайл RATHL (Johnson 2016) показав
  безпеку PET2-негатив-тоді-AVD, удвічі скорочуючи блеоміцин без втрати
  PFS. Для autoSCT: BEAM (BCNU 300 mg/m²) дає 10-20% пневмоніту при DLCO
  <60% — замінити на LEAM або BeEAM. Для ІКТ: попередній пневмоніт ≥2
  ст. — протипоказання до повторного введення.
