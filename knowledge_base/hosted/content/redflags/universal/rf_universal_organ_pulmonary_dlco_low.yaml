id: RF-ORGAN-PULMONARY-DLCO-LOW
definition: >
  Reduced pulmonary diffusing capacity (DLCO <60% predicted). Bleomycin,
  BCNU/carmustine, BEAM conditioning, gemcitabine in combination with
  thoracic RT, and ICI in patients with prior pneumonitis are
  relatively/absolutely contraindicated. Triggers AVD-without-bleomycin,
  alternative lymphoma conditioning (LEAM, FEAM, BeEAM), or omission of
  bleomycin from ABVD per RATHL.
definition_ua: >
  Знижена дифузійна здатність легень (DLCO <60% від норми). Блеоміцин,
  BCNU/кармустин, BEAM-кондиціонування, гемцитабін у поєднанні з
  торакальною ПТ, та ІКТ у пацієнтів з попереднім пневмонітом —
  відносно/абсолютно протипоказані. Триггерує AVD без блеоміцину,
  альтернативне кондиціонування для лімфом (LEAM, FEAM, BeEAM) або
  виключення блеоміцину з ABVD за RATHL.

trigger:
  type: lab_value
  any_of:
    - finding: "dlco_percent"
      threshold: 60
      comparator: "<"

clinical_direction: de-escalate

severity: major
priority: 80
category: organ-dysfunction

relevant_diseases:
