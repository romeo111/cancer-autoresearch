notes: >
  Cumulative anthracycline cardiotoxicity is dose-dependent: doxorubicin
  ≥250 mg/m² lifetime — significant CHF risk, ≥450 mg/m² — high risk
  (Swain 2003); epirubicin equivalent ≈ 0.7x doxorubicin; idarubicin
  ≈ 4x doxorubicin per mg. Standard R-CHOP delivers 300 mg/m² across
  6 cycles — leaves headroom for relapse/salvage. Patients who received
  AC-T (240 mg/m² doxorubicin) for breast then progress to lymphoma
  have ~60 mg/m² remaining safely; substitute liposomal doxorubicin or
  R-CEOP. Trastuzumab cardiotoxicity is reversible (unlike anthracycline)
  but co-administration with anthracycline contraindicated; staggered
  AC→T → trastuzumab standard. Mediastinal RT (Hodgkin survivor)
  doubles anthracycline cardiotoxicity risk per equivalent dose.
notes_ua: >
  Кумулятивна антрациклінова кардіотоксичність дозо-залежна: доксорубіцин
  ≥250 mg/m² довічно — значущий ризик CHF, ≥450 mg/m² — високий
  (Swain 2003); епірубіцин еквівалент ≈ 0.7x доксорубіцину; ідарубіцин
  ≈ 4x на mg. Стандартний R-CHOP дає 300 mg/m² за 6 циклів — залишає
  запас для рецидиву/сальваджу. Пацієнти, які отримали AC-T (240 mg/m²
  доксорубіцину) при молочній і перейшли в лімфому, мають ~60 mg/m²
  безпечного запасу; замінити на ліпосомальний доксорубіцин або
  R-CEOP. Кардіотоксичність трастузумабу зворотна; ко-введення з
  антрацикліном протипоказане; staggered AC→T → трастузумаб —
  стандарт. Медіастинальна ПТ подвоює ризик антрациклінової
  кардіотоксичності.
