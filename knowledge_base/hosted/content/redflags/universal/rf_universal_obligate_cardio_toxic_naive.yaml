id: RF-OBLIGATE-CARDIO-TOXIC-NAIVE
definition: >
  Patient has never received cumulative cardio-toxic therapy
  (anthracycline, mitoxantrone, trastuzumab, mediastinal/cardiac
  radiation). Cumulative anthracycline exposure budget remains intact;
  full standard regimens (R-CHOP, AC-T, ABVD, BEACOPP) are dose-feasible
  without dose-cap concern. Distinct from RF-ORGAN-CARDIAC-LVEF-LOW
  (which gates on functional reserve regardless of prior exposure).
definition_ua: >
  Пацієнт ніколи не отримував кумулятивно кардіотоксичної терапії
  (антрациклін, мітоксантрон, трастузумаб, медіастинальне/серцеве
  опромінення). Бюджет кумулятивної експозиції антрациклінами цілий;
  повні стандартні режими (R-CHOP, AC-T, ABVD, BEACOPP) дозо-можливі
  без проблеми ліміту. Відрізняється від RF-ORGAN-CARDIAC-LVEF-LOW
  (який гейтить на функціональному резерві незалежно від попередньої
  експозиції).

