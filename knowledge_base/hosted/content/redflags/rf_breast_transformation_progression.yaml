id: RF-BREAST-TRANSFORMATION-PROGRESSION
definition: "Symptomatic CNS metastases OR rapid visceral progression on current therapy — emergency-tier flag requiring brain imaging, urgent multidisciplinary consult, and treatment intensification."
definition_ua: "Симптоматичні метастази в ЦНС АБО швидке вісцеральне прогресування на поточній терапії — невідкладний прапорець: ЦНС-візуалізація, термінова мультидисциплінарна консультація, інтенсифікація."

trigger:
  type: composite_clinical
  any_of:
    - finding: "symptomatic_cns_metastases"
      value: true
    - finding: "rapid_visceral_progression"
      value: true

clinical_direction: hold
severity: critical
priority: 50
category: transformation-progression

relevant_diseases: [DIS-BREAST]
shifts_algorithm: []

sources:
  - SRC-NCCN-BREAST-2025
  - SRC-ESMO-BREAST-METASTATIC-2024

last_reviewed:
draft: false

notes: >
  CNS-active HER2+ options: tucatinib + capecitabine + trastuzumab
  (HER2CLIMB; intracranial response rate ~50%); T-DXd (DESTINY-Breast03
  brain-met subgroup). For visceral crisis (rapid LFT/PFT decline):
  may need emergent chemotherapy backbone over endocrine therapy
  even in HR+ disease.
notes_ua: >
  CNS-active HER2+ options: тукатиніб + капецитабін + трастузумаб (HER2CLIMB; intracranial частота відповіді ~50%); T-DXd (DESTINY-Breast03 brain-met subgroup). For visceral crisis (rapid LFT/PFT зниження): may need emergent хіміотерапія основа схеми over endocrine терапія even in HR+ хвороба.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
