last_reviewed: '2026-04-26'
draft: false

notes: >
  Intrahepatic cholangiocarcinoma is the most molecularly fertile of
  GI tumors: FGFR2 fusions (~10–15% iCCA) — pemigatinib (FIGHT-202),
  futibatinib (FOENIX-CCA2), infigratinib; IDH1 R132 (~15% iCCA) —
  ivosidenib (ClarIDHy); BRAF V600E (~5%) — dabrafenib + trametinib
  (ROAR basket); HER2 amp (~5–15% extrahepatic / GBC) — trastuzumab +
  pertuzumab (MyPathway), zanidatamab (HERIZON-BTC-01); NTRK fusion
  (<1%) — larotrectinib / entrectinib; MSI-H (~1%) — pembrolizumab
  (KEYNOTE-158); BRCA — olaparib data emerging. Comprehensive genomic
  profiling at diagnosis is now standard for advanced biliary cancer
  (NCCN Cat 1 recommendation level for iCCA). Each positive biomarker
  re-routes the Algorithm.
notes_ua: >
  Intrahepatic cholangiocarcinoma is the найбільш molecularly fertile of GI tumors: FGFR2 fusions (~10–15% iCCA) — pemigatinib (FIGHT-202), futibatinib (FOENIX-CCA2), infigratinib; IDH1 R132 (~15% iCCA) — івосиденіб (ClarIDHy); BRAF V600E (~5%) — дабрафеніб + траметиніб (ROAR basket); HER2 amp (~5–15% extrahepatic / GBC) — трастузумаб + пертузумаб (MyPathway), zanidatamab (HERIZON-BTC-01); NTRK злиття (<1%) — ларотрексиніб / ентректиніб; MSI-H (~1%) — пембролізумаб (KEYNOTE-158); BRCA — олапариб дані новий. Comprehensive genomic profiling при діагнозі is now стандарт for поширений biliary рак (NCCN Cat 1 рекомендація level for iCCA). Each positive біомаркер re-routes the Algorithm.
