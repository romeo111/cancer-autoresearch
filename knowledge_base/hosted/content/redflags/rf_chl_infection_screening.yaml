id: RF-CHL-INFECTION-SCREENING
definition: >
  Active or latent infection requiring resolution / prophylaxis before
  initiating ABVD / A+AVD / BEACOPP in classical Hodgkin lymphoma:
  HBsAg-positive (HBV reactivation risk on prolonged steroid-free chemo
  is moderate, but high if BEACOPP with prednisone), anti-HBc-positive
  (occult HBV), HCV-RNA-positive, HIV-positive (HIV-Hodgkin association,
  often EBV-driven), or active TB.
definition_ua: >
  Активна/латентна інфекція перед ABVD / A+AVD / BEACOPP при cHL:
  HBsAg+ (помірний ризик реактивації HBV на ABVD; високий при BEACOPP
  з преднізолоном), anti-HBc+ (occult HBV), HCV-РНК+, HIV+ (асоціація
  HIV-Hodgkin, часто EBV-керований), активний туберкульоз.

trigger:
  type: lab_value
  any_of:
    - finding: "hbsag"
      value: "positive"
    - finding: "anti_hbc_total"
      value: "positive"
    - finding: "hcv_rna"
      value: "positive"
    - finding: "hiv_status"
      value: "positive"
    - finding: "active_tb"
      value: true

clinical_direction: hold

severity: major
priority: 65
category: infection-screening

relevant_diseases:
  - DIS-CHL
shifts_algorithm: []

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-HODGKIN-2024

last_reviewed: "2026-04-27"
draft: false

notes: >
  HBsAg+ → entecavir or tenofovir prophylaxis throughout chemo + 6-12 mo
  post (particularly important if escalated BEACOPP — prolonged steroid
  + alkylator load). HIV+ cHL: continue ART, full-dose ABVD (or A+AVD if
  fit) — outcomes approach HIV-negative cHL; avoid BEACOPP in HIV (excess
  toxicity). Active TB: full anti-TB course before chemo when feasible.
  PJP prophylaxis (TMP-SMX) not routine on ABVD but recommended on
  BEACOPP-escalated. EBV detectable ~30-40% cHL — informative not
  actionable for treatment selection.
notes_ua: >
  HBsAg+ → entecavir or tenofovir prophylaxis throughout chemo + 6-12 mo post (особливо important if ескальований BEACOPP — prolonged steroid + alkylator load). HIV+ cHL: continue ART, full-доза ABVD (or A+AVD if fit) — outcomes approach HIV-negative cHL; avoid BEACOPP in HIV (excess токсичність). Active TB: full anti-TB course before chemo when feasible. PJP prophylaxis (TMP-SMX) not routine on ABVD but рекомендований on BEACOPP-escalated. EBV detectable ~30-40% cHL — informative not actionable for лікування selection.
