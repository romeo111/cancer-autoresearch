id: RF-MM-INFECTION-SCREENING
definition: >
  Active or latent infection requiring resolution / prophylaxis before
  initiating MM induction (VRd, D-VRd): HBsAg+ or anti-HBc+ (HBV
  reactivation risk on dexamethasone + anti-CD38 in D-VRd; reactivation
  rate ≈8-15% on daratumumab without prophylaxis), HIV+, or active TB.
definition_ua: >
  Активна або латентна інфекція, що потребує лікування / профілактики
  перед індукцією при ММ (VRd, D-VRd): HBsAg+ або anti-HBc+ (ризик
  реактивації HBV на дексаметазоні + anti-CD38 у D-VRd; ≈8-15% на
  даратумумабі без профілактики), HIV+, або активний туберкульоз.

trigger:
  type: lab_value
  any_of:
    - finding: "hbsag"
      value: "positive"
    - finding: "anti_hbc_total"
      value: "positive"
    - finding: "hiv_status"
      value: "positive"
    - finding: "active_tb"
      value: true

clinical_direction: hold

severity: critical
priority: 60

relevant_diseases:
  - DIS-MM
shifts_algorithm: []  # Same pattern as RF-DLBCL-INFECTION-SCREENING +
                      # RF-UNIVERSAL-HBV-REACTIVATION-RISK: hold is
                      # operationalized via parallel SUP-HBV-PROPHYLAXIS,
                      # not by switching VRd vs D-VRd. The standard-risk
                      # patient with HBsAg+ still gets VRd (after
                      # entecavir starts); the high-risk patient still
                      # gets D-VRd.

sources:
  - SRC-NCCN-MM-2025
  - SRC-ESMO-MM-2023

last_reviewed: "2026-04-25"
draft: false

notes: >
  Daratumumab + dexamethasone amplifies HBV reactivation risk vs
  bortezomib-only regimens — entecavir or tenofovir prophylaxis from
  cycle-1 day-1 through 12 months post-last-dara. HIV+ MM uses
  HIV-aware regimen choice (no R, no rituximab — same VRd works on ART);
  baseline CD4 documentation required. Active TB: complete intensive
  phase before steroids + anti-CD38.
