id: RF-SCLC-INFECTION-SCREENING
definition: >
  Active or latent infection requiring resolution / prophylaxis before
  initiating platinum-etoposide + ICI (atezolizumab / durvalumab) or
  topotecan in SCLC: HBsAg+ or anti-HBc+ (HBV reactivation on cytotoxic
  chemo and on ICI), HCV-RNA+, HIV+, active TB, or active uncontrolled
  infection. SCLC patients are usually heavy smokers with high COPD /
  TB-history burden — TB screening notably relevant.
definition_ua: >
  Активна або латентна інфекція перед платина-етопозид + ICI
  (атезолізумаб / дурвалумаб) або топотекан при SCLC: HBsAg+ або
  anti-HBc+ (ризик реактивації HBV на ХТ та ICI), HCV-RNA+, HIV+,
  активний ТБ, або активна неконтрольована інфекція. Пацієнти зі
  SCLC переважно курці з високим тягарем COPD / ТБ-анамнезу — скринінг
  на ТБ особливо актуальний.

trigger:
  type: composite
  any_of:
    - finding: "hbsag"
      value: "positive"
    - finding: "anti_hbc_total"
      value: "positive"
    - finding: "hcv_rna"
      value: "positive"
    - finding: "hiv_status"
      value: "positive"
    - finding: "active_tb"
      value: true
    - finding: "latent_tb"
      value: true
    - finding: "active_uncontrolled_infection"
      value: true

clinical_direction: hold

severity: major
priority: 70
category: infection-screening

relevant_diseases:
  - DIS-SCLC
shifts_algorithm: []

sources:
  - SRC-NCCN-SCLC-2025
  - SRC-ESMO-SCLC-2021

last_reviewed: "2026-04-27"
draft: false

notes: >
  HBsAg+ → entecavir or tenofovir from before first cycle through ≥6
  months post-last-chemo / ICI. Latent TB common in SCLC population
  (heavy smoking + lower socioeconomic strata + Ukrainian endemic TB):
  IGRA / TST + chest imaging at workup; isoniazid prophylaxis 6-9 mo
  if positive, deferring start until at least 4 weeks of antiviral /
  anti-TB if active. HIV+ with stable ART can receive ICI safely.
  Active uncontrolled chest infection (frequent in SCLC presenting
  with post-obstructive pneumonia) — antibiotic course + drainage if
  needed before initiating cytotoxic chemo. Direction "hold" surfaces
  a workup-prerequisite annotation rather than switching indication.
notes_ua: >
  HBsAg+ → entecavir or tenofovir from before first цикл through ≥6 months post-last-chemo / ICI. Latent TB поширений in SCLC population (heavy smoking + lower socioeconomic strata + Ukrainian endemic TB): IGRA / TST + chest imaging at обстеження; isoniazid prophylaxis 6-9 mo if positive, deferring start until щонайменше 4 weeks of antiviral / anti-TB if active. HIV+ with stable ART can receive ICI safely. Active uncontrolled chest infection (частий in SCLC presenting with post-obstructive pneumonia) — antibiotic course + drainage if needed before initiating cytotoxic chemo. Direction "утримати" surfaces a обстеження-prerequisite annotation rather than switching показання.
