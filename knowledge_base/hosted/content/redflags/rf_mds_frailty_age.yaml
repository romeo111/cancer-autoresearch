id: RF-MDS-FRAILTY-AGE
definition: "MDS patient elderly or frail (age ≥80, ECOG ≥3, life expectancy <2 years, multiple comorbidities) where best supportive care or low-intensity HMA is preferred over alloHCT or intensive disease modification"
definition_ua: "Пацієнт з МДС літнього віку або з низьким функціональним статусом (вік ≥80, ECOG ≥3, очікувана тривалість життя <2 років, множинні коморбідності), коли підтримуюча терапія або низькоінтенсивна гіпометилююча терапія переважає над аллоТГСК або інтенсивною модифікацією хвороби"

trigger:
  type: composite
  any_of:
    - finding: "age_years"
      threshold: 80
      comparator: ">="
    - finding: "mds_frail_unfit"
      value: true
    - all_of:
        - finding: "ecog_performance_status"
          threshold: 3
          comparator: ">="
        - finding: "comorbidities_count"
          threshold: 3
          comparator: ">="

clinical_direction: de-escalate

severity: major
category: frailty-age
relevant_diseases:
  - DIS-MDS-LR
  - DIS-MDS-HR
shifts_algorithm:
  - ALGO-MDS-HR-1L

sources:
  - SRC-NCCN-AML-2025
  - SRC-ESMO-MDS-2021

last_reviewed: "2026-04-25"
notes: >
  Triggers de-escalation: in MDS-HR, opt for HMA or best-supportive-care
  pathway over alloHCT (which has high TRM in this group); in MDS-LR,
  emphasize transfusion strategy + iron chelation + symptom management.
  STUB — requires clinical co-lead signoff.
notes_ua: >
  Triggers de-escalation: in MDS-HR, opt for HMA or найкращий-supportive-care pathway over alloHCT (which has high TRM in this group); in MDS-LR, emphasize transfusion strategy + iron chelation + symptom management. STUB — requires clinical co-lead signoff.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
