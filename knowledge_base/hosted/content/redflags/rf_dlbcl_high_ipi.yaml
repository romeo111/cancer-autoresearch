id: RF-DLBCL-HIGH-IPI
definition: "DLBCL with International Prognostic Index ≥2 — selects intensified Pola-R-CHP over R-CHOP per POLARIX evidence"
definition_ua: "DLBCL з міжнародним прогностичним індексом IPI ≥2 — обирає інтенсифікований Pola-R-CHP замість R-CHOP за даними POLARIX"

trigger:
  type: composite_score
  any_of:
    - finding: "ipi_score"
      threshold: 2
      comparator: ">="
    - finding: "high_ipi"
      value: true

clinical_direction: intensify

category: risk-score
relevant_diseases:
  - DIS-DLBCL-NOS
shifts_algorithm:
  - ALGO-DLBCL-1L

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-DLBCL-2024

last_reviewed: "2026-04-25"
notes: >
  Per POLARIX trial: in IPI ≥2 newly-diagnosed DLBCL, Pola-R-CHP showed
  superior PFS (~6.5% absolute at 2 years) vs R-CHOP. Toxicity profile
  comparable except higher peripheral neuropathy with polatuzumab. Major
  access constraint in Ukraine — polatuzumab not НСЗУ-reimbursed; flag
  funding pathway in Plan.
notes_ua: >
  Per POLARIX дослідження: in IPI ≥2 newly-diagnosed DLBCL, Pola-R-CHP showed перевершує PFS (~6.5% absolute at 2 years) vs R-CHOP. профіль токсичності співставний except higher периферична нейропатія with polatuzumab. Major access constraint in Ukraine — polatuzumab not НСЗУ-відшкодовуваний; flag funding pathway in Plan.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
