id: RF-GBM-INFECTION-SCREENING
definition: >
  Active or unmanaged infection requiring resolution before initiating
  temozolomide (TMZ) chemoradiation in glioblastoma: HBsAg-positive (HBV
  reactivation risk on prolonged TMZ + corticosteroid co-therapy is real
  though lower than B-cell-depleting therapy), HCV-RNA-positive,
  HIV-positive (CD4 informs PJP / opportunistic risk on TMZ +
  corticosteroids), latent TB, or post-craniotomy surgical-site infection.
definition_ua: >
  Активна / неконтрольована інфекція перед TMZ-CRT при GBM: HBsAg+
  (ризик реактивації HBV на тривалій TMZ + кортикостероїдах — реальний,
  хоча нижчий за B-cell-depleting), HCV-РНК+, HIV+ (CD4 інформує ризик
  PJP та опортуністичних інфекцій на TMZ + стероїдах), латентний
  туберкульоз, або post-craniotomy surgical-site infection.

trigger:
  type: lab_value
  any_of:
    - finding: "hbsag"
      value: "positive"
    - finding: "hcv_rna"
      value: "positive"
    - finding: "hiv_status"
      value: "positive"
    - finding: "active_tb"
      value: true
    - finding: "post_craniotomy_ssi"
      value: true

clinical_direction: hold

severity: major
priority: 70
category: infection-screening

relevant_diseases:
  - DIS-GBM
shifts_algorithm: []

sources:
  - SRC-NCCN-CNS-2025
  - SRC-EANO-GBM-2024

last_reviewed: "2026-04-27"
draft: false

notes: >
  GBM patients on Stupp protocol (TMZ + RT + adjuvant TMZ + dexamethasone)
  develop profound CD4 lymphopenia — PJP prophylaxis (TMP-SMX 3x/week or
  pentamidine inhaled) routine throughout TMZ phase per NCCN CNS. HBV
  reactivation risk lower than rituximab regimens but real on prolonged
  steroid; entecavir prophylaxis if HBsAg+. Post-craniotomy SSI requires
  full antimicrobial course + neurosurgical clearance before initiating
  RT into surgical bed (RT into infected field worsens necrosis and
  precipitates abscess). Active TB: full anti-TB course before chemo
  when feasible (RT to brain may proceed; TMZ defer).
notes_ua: >
  GBM patients on Stupp protocol (TMZ + RT + ад'ювантний TMZ + dexamethasone) develop profound CD4 lymphopenia — PJP prophylaxis (TMP-SMX 3x/week or pentamidine inhaled) routine throughout TMZ phase per NCCN CNS. HBV reactivation risk lower than ритуксимаб схеми but real on prolonged steroid; entecavir prophylaxis if HBsAg+. Post-craniotomy SSI requires full antimicrobial course + neurosurgical clearance before initiating RT into surgical bed (RT into infected field погіршує necrosis and precipitates abscess). Active TB: full anti-TB course before chemo when feasible (RT to brain may proceed; TMZ defer).
