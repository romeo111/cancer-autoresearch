id: RF-NSCLC-BRAF-V600E-ACTIONABLE
definition: >
  BRAF V600E mutation in NSCLC adenocarcinoma — ~1-2% prevalence.
  Dabrafenib + trametinib (BRF113928 — ORR 64% 1L, 63% 2L+) is the
  approved targeted regimen; encorafenib + binimetinib (PHAROS) is
  newer alternative. Non-V600 BRAF mutations are not actionable with
  these doublets.
definition_ua: >
  Мутація BRAF V600E при НДРЛ-аденокарциномі — ~1-2% поширеність.
  Дабрафеніб + траметиніб (BRF113928 — ORR 64% 1L, 63% 2L+) — схвалена
  таргетна схема; енкорафеніб + биніметиніб (PHAROS) — новіша
  альтернатива. Не-V600 мутації BRAF не таргетуються цими дублетами.

trigger:
  type: biomarker
  any_of:
    - finding: "braf_v600e_mutation"
      value: true
    - finding: "braf_v600e"
      value: "positive"
    - finding: "braf_mutation"
      value: "V600E"

clinical_direction: intensify

severity: major
priority: 60
category: high-risk-biology

relevant_diseases:
  - DIS-NSCLC
shifts_algorithm:
  - ALGO-NSCLC-METASTATIC-1L
  - ALGO-NSCLC-METASTATIC-2L
branch_targets:
  ALGO-NSCLC-METASTATIC-1L: "step-4"

sources:
  - SRC-NCCN-NSCLC-2025
  - SRC-ESMO-NSCLC-METASTATIC-2024
  - SRC-BRF113928-PLANCHARD-2016

last_reviewed: "2026-04-27"
draft: false

notes: >
  Smoker-associated unlike most NSCLC drivers. Pyrexia is the dominant
  on-target tox of BRAF+MEK doublets — patient education + dose-hold
  algorithm essential. MEK-inhibitor LVEF monitoring (baseline +
  q3-monthly echo). PD-L1 status irrelevant when BRAF V600E +
  TKI-doublet chosen.
notes_ua: >
  Асоційовано з курінням (на відміну від більшості драйверів НДРЛ).
  Пірексія — домінуюча on-target токсичність дублетів BRAF+MEK —
  необхідне навчання пацієнта + алгоритм паузи дози. Моніторинг ФВЛШ
  на МЕК-інгібіторі (baseline + щоквартально ЕхоКГ). Статус PD-L1
  неактуальний при виборі BRAF V600E + TKI-дублет.
