draft: false

notes: >
  Salivary gland carcinoma is a histology-defined umbrella with distinct
  molecular drivers: MASC ~100% ETV6-NTRK3 fusion → larotrectinib (ORR
  ~80% basket trials). Salivary duct carcinoma (SDC) ~70-80% AR+ →
  bicalutamide + LHRH analog (EORTC-1206 phase 2 confirms benefit);
  ~30-40% HER2+ → trastuzumab + paclitaxel (similar ORR to breast
  cancer trials); HRAS-mutant ~10-15% → tipifarnib (KO-TIP-007 ORR ~38%
  in HRAS-mutant SDC). Adenoid cystic carcinoma ~15% NOTCH1 mutant —
  AL101 / brontictuzumab in trials; otherwise cisplatin-based chemo
  modest activity. Comprehensive histology + molecular profiling at
  diagnosis is now ESMO-recommended for advanced salivary cancer.
notes_ua: >
  Парасолькова гістологія: MASC ~100% ETV6-NTRK3 → larotrectinib (ORR
  ~80%). Salivary duct carcinoma (SDC) — ~70-80% AR+ → бікалутамід +
  LHRH (EORTC-1206); ~30-40% HER2+ → трастузумаб + паклітаксел; HRAS-
  mutant ~10-15% → tipifarnib (KO-TIP-007 ORR ~38%). Adenoid cystic
  ~15% NOTCH1 → AL101 / brontictuzumab у трайлах.
