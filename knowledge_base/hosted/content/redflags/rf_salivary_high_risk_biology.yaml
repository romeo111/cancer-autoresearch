id: RF-SALIVARY-HIGH-RISK-BIOLOGY
definition: >
  Salivary gland carcinoma with actionable molecular driver: ETV6-NTRK3
  fusion (mammary analog secretory carcinoma — ~100% MASC, larotrectinib
  / entrectinib), HER2 amplification (salivary duct carcinoma ~30-40%,
  trastuzumab + chemotherapy), HRAS mutation (SDC ~10-15%, tipifarnib),
  PIK3CA mutation (SDC ~20-30%), AR positivity (~70-80% SDC, androgen
  deprivation), or NOTCH1 mutation (adenoid cystic ~15%, gamma-secretase
  inhibitors in trials) — re-routes from cytotoxic chemotherapy to
  histology-specific targeted therapy.
definition_ua: >
  Карцинома слинних залоз з дієвоспроможним молекулярним драйвером:
  фузія ETV6-NTRK3 (mammary analog secretory carcinoma — ~100% MASC,
  larotrectinib / entrectinib), ампліфікація HER2 (salivary duct
  carcinoma ~30-40%, трастузумаб + хіміотерапія), мутація HRAS (SDC
  ~10-15%, tipifarnib), мутація PIK3CA (SDC ~20-30%), AR-позитивність
  (~70-80% SDC, андрогендеприваційна терапія), або мутація NOTCH1
  (adenoid cystic ~15%, гамма-секретазні інгібітори у трайлах) — змінює
  тактику від цитотоксичної хіміотерапії до гістологія-специфічної
  таргетної.

