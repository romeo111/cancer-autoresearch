id: RF-RCC-FRAILTY-AGE
definition: "Age ≥80 + ECOG ≥2 + comorbidity — ICI doublet toxicity prohibitive."
definition_ua: "Вік ≥80 + ECOG ≥2 + коморбідності."

trigger:
  type: composite_clinical
  all_of:
    - {finding: "age_years", threshold: 80, comparator: ">="}
    - any_of:
        - {finding: "ecog_status", threshold: 2, comparator: ">="}
        - {finding: "comorbidity_count", threshold: 2, comparator: ">="}

clinical_direction: de-escalate
severity: major
priority: 100
category: frailty-age

relevant_diseases: [DIS-RCC]
shifts_algorithm: []

sources:
  - SRC-NCCN-KIDNEY-2025
  - SRC-ESMO-RCC-2024

last_reviewed:
draft: false

notes: "Single-agent TKI or ICI mono (KEYNOTE-427) alternatives."
notes_ua: Single-agent TKI or ICI mono (KEYNOTE-427) alternatives.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
