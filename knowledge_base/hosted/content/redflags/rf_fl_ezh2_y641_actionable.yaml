last_reviewed: "2026-04-27"
draft: false

notes: >
  Tazemetostat is also active in EZH2-wildtype FL (ORR 35%) but the
  approved indication is EZH2-mut after ≥2 lines (ORR 69%, mPFS 13.8 mo
  in mutant cohort). Order EZH2 hotspot panel (NGS or targeted PCR) at
  first relapse so the result is in hand by 3L decision point. Tolerability
  profile favorable vs PI3Ki (no AIH/colitis class effect, no requirement
  for PJP prophylaxis); main toxicity is asthenia and cytopenia. Off-target
  T-cell lymphoma signal in early development resolved at approved dose.
  Access UA: not NSZU-reimbursed — consider compassionate-use access or
  EU early-access programs.
notes_ua: >
  Таземетостат також активний у EZH2-WT ФЛ (ORR 35%) але схвалене показання
  саме для EZH2-mut після ≥2 ліній (ORR 69%, мПФВ 13.8 міс у мутантній
  когорті). Замовляти панель EZH2 hotspot (NGS або targeted PCR) при
  першому рецидиві, щоб результат був до 3L рішення. Профіль переносимості
  сприятливіший за PI3Ki (без AIH/коліт класового ефекту, без обов'язкової
  PJP-профілактики); основна токсичність — астенія та цитопенії. Off-target
  Т-клітинно-лімфомний сигнал на ранній розробці зник на схваленій дозі.
  Доступ в Україні: не відшкодовується НСЗУ — розглянути compassionate-use
  або EU early-access програми.

