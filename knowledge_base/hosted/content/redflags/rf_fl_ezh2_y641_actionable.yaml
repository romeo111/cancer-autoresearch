id: RF-FL-EZH2-Y641-ACTIONABLE
definition: >
  EZH2 gain-of-function mutation (most commonly Y641 hotspot — Y641F/N/S/H/C
  + occasional A682G/A692V) is present in ~25% of follicular lymphoma. Drives
  EZH2-dependent epigenetic silencing of tumor-suppressor genes. Tazemetostat
  (EPZ-6438) is FDA-accelerated-approved (2020) for R/R FL with EZH2-mutated
  disease after ≥2 prior systemic lines (Morschhauser et al., Lancet Oncology
  2020; NCT01897571). Routes 3L+ FL with confirmed EZH2 hotspot to
  tazemetostat 800 mg PO BID over chemoimmunotherapy or PI3Ki.
definition_ua: >
  EZH2 gain-of-function мутація (найчастіше Y641 hotspot — Y641F/N/S/H/C
  плюс окремі A682G/A692V) присутня у ~25% фолікулярної лімфоми. Запускає
  EZH2-залежне епігенетичне глушіння tumor-suppressor генів. Таземетостат
  (EPZ-6438) FDA-схвалений (2020) для р/р ФЛ з EZH2-мутацією після ≥2 ліній
  (Morschhauser et al., Lancet Oncology 2020; NCT01897571). Маршрутизує 3L+
  ФЛ із підтвердженим EZH2 hotspot на таземетостат 800 мг PO 2р/добу замість
  chemoimmunotherapy або PI3Ki.

trigger:
  type: biomarker
  any_of:
    - finding: "ezh2_mutation"
      value: true
    - finding: "ezh2_y641"
      value: "positive"
    - finding: "ezh2_status"
      value: "mutated"
    - finding: "ezh2_hotspot"
      value: "positive"

clinical_direction: intensify

severity: major
priority: 65
category: high-risk-biology

