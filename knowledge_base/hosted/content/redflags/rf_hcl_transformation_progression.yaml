id: RF-HCL-TRANSFORMATION-PROGRESSION
definition: "Failure to achieve CR after 2 courses cladribine OR early relapse (<2 years) — switch to alternative purine analog + rituximab, vemurafenib (BRAF V600E+), or moxetumomab pasudotox."
definition_ua: "Без CR після 2 курсів кладрибіну АБО ранній рецидив (<2 років) — заміна на інший пуриновий аналог + rituximab, vemurafenib (BRAF V600E+), або моксетумомаб пасудотокс."

trigger:
  type: composite_clinical
  any_of:
    - finding: "hcl_no_cr_after_cladribine"
      value: true
    - finding: "hcl_early_relapse_under_2y"
      value: true


clinical_direction: investigate
severity: major
priority: 100
category: transformation-progression

relevant_diseases: [DIS-HCL]
shifts_algorithm: []

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-DLBCL-2024

last_reviewed: "2026-04-25"
draft: false

notes: >
  Refractory/early-relapsed HCL has multiple 2L options; selection driven by BRAF status and prior exposure. Sits in 2L Algorithm not 1L.
notes_ua: >
  рефрактерний/early-рецидивний HCL has multiple 2L options; selection driven by BRAF status and prior exposure. Sits in 2L Algorithm not 1L.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
