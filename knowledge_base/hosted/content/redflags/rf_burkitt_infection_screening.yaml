id: RF-BURKITT-INFECTION-SCREENING
definition: >
  Active or latent infection requiring resolution / prophylaxis before
  initiating DA-EPOCH-R or CODOX-M/IVAC in Burkitt: HBsAg-positive
  (mandatory anti-CD20 → high HBV reactivation risk), anti-HBc-positive
  (occult HBV), HCV-RNA-positive, HIV-positive (high prevalence in Burkitt
  — endemic and sporadic), or active TB. EBV testing recommended (endemic
  Burkitt EBV-driven; informs prognostication).
definition_ua: >
  Активна/латентна інфекція перед DA-EPOCH-R або CODOX-M/IVAC при Burkitt:
  HBsAg+ (мандатний anti-CD20 — високий ризик реактивації HBV), anti-HBc+
  (occult HBV), HCV-РНК+, HIV+ (висока поширеність у Burkitt), активний
  туберкульоз. EBV тестування рекомендоване (ендемічний Burkitt — EBV+;
  прогностична інформація).

trigger:
  type: lab_value
  any_of:
    - finding: "hbsag"
      value: "positive"
    - finding: "anti_hbc_total"
      value: "positive"
    - finding: "hcv_rna"
      value: "positive"
    - finding: "hiv_status"
      value: "positive"
    - finding: "active_tb"
      value: true

clinical_direction: hold

severity: critical
priority: 60
category: infection-screening

relevant_diseases:
  - DIS-BURKITT
shifts_algorithm: []

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-BURKITT-2024

last_reviewed: "2026-04-27"
draft: false

notes: >
  HBsAg+ → entecavir or tenofovir prophylaxis from –7d through +12mo
  post-last anti-CD20 (rituximab in DA-EPOCH-R or CODOX-M/IVAC + R).
  HIV+ Burkitt: 25-40% of adult Burkitt is HIV-associated. Use full-dose
  DA-EPOCH-R per CALGB 50202 / Sparano subgroup — HIV-Burkitt outcomes
  approach HIV-negative when ART optimized. Active TB: full anti-TB
  course before chemoimmuno when feasible (Burkitt is so rapid that
  delays risk progression — MDT decision). PJP prophylaxis (TMP-SMX)
  during and 3-6 mo post-induction.
notes_ua: >
  HBsAg+ → entecavir or tenofovir prophylaxis from –7d through +12mo post-last anti-CD20 (ритуксимаб in DA-EPOCH-R or CODOX-M/IVAC + R). HIV+ Burkitt: 25-40% of дорослий Burkitt is HIV-associated. Use full-доза DA-EPOCH-R per CALGB 50202 / Sparano subgroup — HIV-Burkitt outcomes approach HIV-negative when ART optimized. Active TB: full anti-TB course before chemoimmuno when feasible (Burkitt is so rapid that delays risk прогресування — MDT decision). PJP prophylaxis (TMP-SMX) during and 3-6 mo після індукції.
