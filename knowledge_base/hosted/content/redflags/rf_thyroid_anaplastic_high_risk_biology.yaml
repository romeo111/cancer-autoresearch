  - SRC-ATA-THYROID-2015

last_reviewed: "2026-04-27"
draft: false

notes: >
  ATC is one of the most aggressive human malignancies (median OS
  3-6 months historically). The discovery that ~25-40% are BRAF V600E-
  mutant transformed practice — dabrafenib + trametinib (ROAR basket)
  achieved ORR ~70% with median OS extended to ~14 mo in BRAF-mutant
  ATC, sometimes converting unresectable to resectable. NCCN Cat 1
  recommendation; FDA approval 2018. For BRAF-mut ATC, neoadjuvant
  dabrafenib + trametinib → surgery → adjuvant RT is now the optimal
  paradigm when feasible. NTRK / RET / ALK fusions <5% combined but
  highly actionable. Comprehensive genomic profiling within days of
  diagnosis is critical given disease tempo. Priority bumped to 30
  because targeted therapy is critical-tier override of cytotoxic
  default.
notes_ua: >
  ATC — найагресивніша пухлина (медіанна ЗВ 3-6 міс. історично). ~25-40%
  BRAF V600E-mutant — dabrafenib + trametinib (ROAR) ORR ~70%, медіанна
  ЗВ ~14 міс. NCCN Cat 1; FDA 2018. Для BRAF-mut: неоадʼювант → хірургія
  → адʼювантне RT — оптимально. NTRK / RET / ALK <5% сумарно, але
  високо actionable. CGP протягом днів від діагнозу.
