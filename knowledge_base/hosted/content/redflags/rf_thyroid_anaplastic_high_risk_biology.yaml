id: RF-THYROID-ANAPLASTIC-HIGH-RISK-BIOLOGY
definition: >
  Anaplastic thyroid carcinoma with actionable driver mutation: BRAF
  V600E (~25-40% ATC; dabrafenib + trametinib FDA-approved Cat 1 1L for
  BRAF-mutant ATC), NTRK fusion (rare; larotrectinib / entrectinib),
  RET fusion (rare; selpercatinib), or ALK fusion (very rare; alectinib /
  lorlatinib) — re-routes algorithm from emergency cytotoxic chemo + RT
  to targeted therapy with potential surgical resection after molecular
  response.
definition_ua: >
  Анапластична карцинома щитоподібної залози з дієвоспроможною
  драйверною мутацією: BRAF V600E (~25-40% ATC; dabrafenib + trametinib
  FDA-затверджений Cat 1 1L для BRAF-mutant ATC), фузія NTRK (рідко;
  larotrectinib / entrectinib), фузія RET (рідко; selpercatinib), фузія
  ALK (дуже рідко; alectinib / lorlatinib) — змінює тактику від
  невідкладної цитотоксичної хіміотерапії + RT до таргетної з можливим
  хірургічним видаленням після молекулярної відповіді.

trigger:
  type: biomarker
  any_of:
    - finding: "BIO-BRAF-V600E"
      value: "positive"
    - finding: "BIO-NTRK-FUSION"
      value: "positive"
    - finding: "BIO-RET"
      value: "fusion"
    - finding: "BIO-ALK-FUSION"
      value: "positive"

clinical_direction: intensify
severity: critical
priority: 30
category: high-risk-biology

relevant_diseases: [DIS-THYROID-ANAPLASTIC]
shifts_algorithm: []

sources:
