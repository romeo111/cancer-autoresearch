id: RF-T-ALL-HIGH-RISK-BIOLOGY
definition: "Early T-cell precursor (ETP) phenotype (CD1a-, CD8-, CD5 weak, with myeloid/stem-cell markers) — historically inferior outcomes with standard T-ALL chemo; nelarabine + alloSCT consolidation considered."
definition_ua: "Ранньо-Т-клітинний попередник (ETP) фенотип (CD1a-, CD8-, CD5 слабкий, з мієлоїдними/стовбуровими маркерами) — історично гірші результати на стандартній T-ALL хіміо; nelarabine + alloSCT консолідація."

trigger:
  type: biomarker
  any_of:
    - finding: "etp_phenotype"
      value: true
    - finding: "etp_all"
      value: true


clinical_direction: intensify
severity: critical
priority: 100
category: high-risk-biology

relevant_diseases: [DIS-T-ALL]
shifts_algorithm: []

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-PTCL-2024

last_reviewed: "2026-04-25"
draft: false

notes: >
  ETP-ALL is a WHO 2022 distinct entity. Modern MRD-stratified protocols (UKALL14, GRAALL) have closed much of the historical gap, but alloSCT eligibility remains the dominant decision — hence intensify.
notes_ua: >
  ETP-ALL is a WHO 2022 distinct сутність. Modern МЗХ-stratified protocols (UKALL14, GRAALL) have closed much of the historical gap, but алоТГСК eligibility remains the dominant decision —, отже intensify.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
