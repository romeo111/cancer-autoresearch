id: RF-IPSS-M-HIGH
definition: "MDS with IPSS-M high or very-high risk (2022 molecular update incorporating 31 gene mutations) — restratifies ~46% of patients vs IPSS-R; supports HR-MDS treatment pathway including alloHCT discussion + HMA-based 1L"
definition_ua: "MDS з високим або дуже високим ризиком за IPSS-M (молекулярне оновлення 2022 з 31 геном) — перекласифікує ~46% пацієнтів порівняно з IPSS-R; підтримує лікування за схемою HR-MDS включно з обговоренням аллоТГСК + 1-а лінія на основі гіпометилюючого агента"

trigger:
  type: composite_score
  any_of:
    - finding: "ipss_m_risk"
      value: "high"
    - finding: "ipss_m_risk"
      value: "very_high"
    - finding: "ipss_m_score"
      threshold: 0.5
      comparator: ">="

clinical_direction: intensify

severity: major
category: risk-score
relevant_diseases:
  - DIS-MDS-HR
  - DIS-MDS-LR
shifts_algorithm:
  - ALGO-MDS-HR-1L
  - ALGO-MDS-LR-1L

sources:
  - SRC-IPSS-M-BERNARD-2022
  - SRC-NCCN-AML-2025
  - SRC-ESMO-MDS-2021

last_reviewed: "2026-04-27"
notes: >
  IPSS-M (Bernard et al., NEJM Evidence 2022) integrates 31 gene
  mutations (TP53 multi-hit, SF3B1 favorable, ASXL1, EZH2, RUNX1,
  SRSF2, U2AF1, others) with IPSS-R clinical/cytogenetic features.
  Restratifies ~46% of patients — many IPSS-R intermediate cases
  upgrade to IPSS-M high/very-high (and vice versa). Trigger
  applicable to both MDS-HR and MDS-LR populations because IPSS-M
  upgrade is the canonical reason a clinically-LR patient gets routed
  to HR pathways. Threshold 0.5 corresponds to the "moderate-high"
  cutoff in Bernard's nomogram. Direction `intensify` — pushes toward
  alloHCT eligibility evaluation + HMA induction.
