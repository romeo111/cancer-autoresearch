id: RF-SOKAL-HIGH
definition: "CML chronic phase with Sokal high risk — supports 2nd-generation TKI 1L (dasatinib / nilotinib / bosutinib) over imatinib for faster MMR/MR4.5 and improved long-term cumulative incidence of progression"
definition_ua: "ХМЛ хронічної фази з високим ризиком за Sokal — підтримує 2-е покоління ТКІ 1-ї лінії (дазатиніб / нілотиніб / босутиніб) над іматинібом для швидшого MMR/MR4.5 та покращення довгострокової частоти прогресування"

trigger:
  type: composite_score
  any_of:
    - finding: "cml_sokal_risk"
      value: "high"
    - finding: "cml_sokal_score"
      threshold: 1.2
      comparator: ">"

clinical_direction: intensify

severity: major
category: risk-score
relevant_diseases:
  - DIS-CML
shifts_algorithm:
  - ALGO-CML-1L

sources:
  - SRC-NCCN-MPN-2025
  - SRC-ELN-CML-2020
  - SRC-ESMO-CML-2017

last_reviewed: "2026-04-27"
notes: >
  Sokal score (Sokal 1984) uses age, spleen size, platelet count,
  blast %. High-risk (Sokal >1.2) marks ~20-25% of CML-CP at diagnosis
  with worse 10-yr OS and PFS on imatinib vs intermediate/low. ENESTnd
  (Saglio 2010) and DASISION (Kantarjian 2010) show 2nd-gen TKIs
  achieve faster + deeper molecular responses than imatinib in
  high-Sokal subgroups. ELN 2020 prefers ELTS (RF-CML-HIGH-RISK-ELTS,
  existing) but Sokal remains the more widely-used bedside score.
  Companion to RF-HASFORD-HIGH; both can fire together. Conflict-
  resolution: this RF intensifies toward 2nd-gen TKI; cardiotoxicity
  flags (RF-CML-COMORBIDITY-COMPLEX) may de-escalate back to imatinib.
