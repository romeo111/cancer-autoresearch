id: RF-AML-HIGH-RISK-BIOLOGY
definition: "AML with adverse-risk biology per ELN 2022: TP53 mutation, complex / monosomal karyotype, RUNX1 / ASXL1 mutation, KMT2A rearrangement (other than t(9;11)), inv(3) / t(3;3), -5/del(5q), -7, FLT3-ITD without NPM1, or therapy-related"
definition_ua: "Гострий мієлоїдний лейкоз з біологією несприятливого ризику за ELN 2022: TP53 мутація, складний / моносомний каріотип, мутація RUNX1 / ASXL1, перебудова KMT2A (крім t(9;11)), inv(3) / t(3;3), -5/del(5q), -7, FLT3-ITD без NPM1, або вторинний (терапія-індукований)"

trigger:
  type: biomarker
  any_of:
    - finding: "tp53_mutation"
      value: true
    - finding: "complex_karyotype"
      value: true
    - finding: "monosomal_karyotype"
      value: true
    - finding: "monosomy_7"
      value: true
    - finding: "del_5q"
      value: true
    - finding: "inv_3_or_t_3_3"
      value: true
    - finding: "kmt2a_rearrangement_non_t911"
      value: true
    - finding: "runx1_mutation"
      value: true
    - finding: "asxl1_mutation"
      value: true
    - finding: "flt3_itd_without_npm1"
      value: true
    - finding: "therapy_related_aml"
      value: true
    - finding: "aml_eln_risk"
      value: "adverse"

clinical_direction: intensify

severity: critical
category: high-risk-biology
relevant_diseases:
  - DIS-AML
shifts_algorithm:
  - ALGO-AML-1L

sources:
  - SRC-NCCN-AML-2025
  - SRC-ELN-AML-2022

last_reviewed: "2026-04-25"
notes: >
  ELN-2022 adverse-risk patients are alloHCT candidates upfront if fit.
  Adds urgency to donor search and shifts the post-induction pathway
  (skip consolidation HiDAC if rapidly bridging to allo). FLT3-ITD with
  high allelic ratio + NPM1-wt is now classified adverse (down-graded
  from intermediate in ELN-2017). STUB — requires clinical co-lead
  signoff.
notes_ua: >
  ELN-2022 несприятливий-risk patients are alloHCT candidates перша лінія if fit. Adds urgency to donor search and shifts the після індукції pathway (skip консолідація HiDAC if rapidly bridging to allo). FLT3-ITD with high allelic ratio + NPM1-wt is now classified несприятливий (down-graded from intermediate in ELN-2017). STUB — requires clinical co-lead signoff.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
