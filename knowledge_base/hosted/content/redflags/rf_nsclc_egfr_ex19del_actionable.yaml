id: RF-NSCLC-EGFR-EX19DEL-ACTIONABLE
definition: >
  EGFR exon 19 deletion is the most common actionable EGFR-sensitizing
  mutation in NSCLC adenocarcinoma (~45-50% of EGFR-mutant cases).
  FDA/EMA-approved 1L targeted therapy is osimertinib (FLAURA — mPFS
  18.9 vs 10.2 mo, OS 38.6 vs 31.8 mo); MARIPOSA-2 establishes 2L
  amivantamab + lazertinib + chemo post-osimertinib progression.
definition_ua: >
  Делеція 19-го екзону EGFR — найчастіша actionable EGFR-сенсибілізуюча
  мутація при НДРЛ-аденокарциномі (~45-50% EGFR-мутантних випадків).
  FDA/EMA схвалена таргетна терапія 1L — осимертиніб (FLAURA); MARIPOSA-2
  визначає 2L (amivantamab + lazertinib + хіміотерапія) після
  прогресування на осимертинібі.

trigger:
  type: biomarker
  any_of:
    - finding: "egfr_exon19_deletion"
      value: true
    - finding: "egfr_ex19del"
      value: "positive"
    - finding: "egfr_mutation"
      value: "exon19_deletion"

clinical_direction: intensify

severity: critical
priority: 50
category: high-risk-biology

relevant_diseases:
  - DIS-NSCLC
shifts_algorithm:
  - ALGO-NSCLC-METASTATIC-1L
  - ALGO-NSCLC-METASTATIC-2L
branch_targets:
  ALGO-NSCLC-METASTATIC-1L: "step-2"

sources:
  - SRC-NCCN-NSCLC-2025
  - SRC-ESMO-NSCLC-METASTATIC-2024
  - SRC-FLAURA-SORIA-2018
  - SRC-MARIPOSA2-PASSARO-2024

last_reviewed: "2026-04-27"
draft: false

notes: >
  Routes 1L → osimertinib 80 mg PO daily (FLAURA). Acquired-resistance
  surveillance: ctDNA at progression for T790M (rare on osimertinib),
  C797S (~20% of post-osimertinib resistance), MET amplification,
  histologic transformation. 2L: MARIPOSA-2 amivantamab + lazertinib ±
  chemo. Stage I-IIIA resected — adjuvant osimertinib (ADAURA).
  Access UA: osimertinib not consistently NSZU-reimbursed; major
  barrier; consider patient-assistance programs.
notes_ua: >
  1L → осимертиніб 80 мг PO щодня (FLAURA). Моніторинг резистентності:
  цоДНК при прогресуванні (T790M рідко на осимертинібі, C797S ~20%
  пост-осимертиніб резистентність, MET амплифікація, гістологічна
  трансформація). 2L: MARIPOSA-2 amivantamab + lazertinib ± хіміо.
  Стадія I-IIIA після резекції — ад'ювантний осимертиніб (ADAURA).
  Доступ в Україні: осимертиніб нестабільно відшкодовується НСЗУ.
