  - SRC-ONCOKB

last_reviewed: "2026-04-27"
draft: false

notes: >
  Acquired resistance to 1st-gen TRK inhibitors typically emerges via
  on-target kinase-domain mutations (G595R for NTRK1, G623R for NTRK3,
  solvent-front and gatekeeper variants) within 12-24 months; off-target
  bypass via MAPK signaling described. Selitrectinib (LOXO-195) and
  repotrectinib (TPX-0005) are 2nd-gen designed to overcome these
  mutations — TRIDENT-1 enrolled pediatric with promising responses in
  TRK-resistant. Salvage cytotoxic (VAC, Ewing-like VDC/IE) reasonable
  if 2nd-gen unavailable. Re-biopsy at progression strongly recommended.
notes_ua: >
  Набута резистентність до 1-го покоління TRK-інгібіторів через on-target
  kinase-domain мутації (G595R NTRK1, G623R NTRK3) — 12-24 міс. 2-ге
  покоління — selitrectinib (LOXO-195) та repotrectinib (TPX-0005,
  TRIDENT-1). Сальвадж VAC / VDC-IE — резерв.
