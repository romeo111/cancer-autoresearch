id: RF-IFS-TRANSFORMATION-PROGRESSION
definition: >
  Progression of infantile fibrosarcoma on first-line larotrectinib /
  entrectinib (acquired NTRK kinase-domain solvent-front G595R / G667S
  mutation), new metastatic disease (lung most common), or rapid local
  progression — triggers second-generation TRK inhibitor (selitrectinib,
  repotrectinib) or salvage VAC / Ewing-like cytotoxic protocol.
definition_ua: >
  Прогресія інфантильної фібросаркоми на 1-й лінії larotrectinib /
  entrectinib (набута NTRK kinase-domain solvent-front мутація G595R /
  G667S), нова метастатична хвороба (найчастіше легені) або швидке
  локальне прогресування — тригер до 2-го покоління TRK-інгібіторів
  (selitrectinib, repotrectinib) або сальваджу VAC / Ewing-протоколу.

trigger:
  type: composite_clinical
  any_of:
    - finding: "BIO-NTRK-FUSION"
      value: "resistance_mutation"
    - finding: "ntrk_solvent_front_mutation"
      value: true
    - finding: "new_metastatic_disease"
      value: true
    - finding: "rapid_progression_on_trk_inhibitor"
      value: true

clinical_direction: hold
severity: critical
priority: 50
category: transformation-progression

relevant_diseases: [DIS-IFS]
shifts_algorithm: []

