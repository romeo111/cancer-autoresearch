id: RF-IMT-TRANSFORMATION-PROGRESSION
definition: >
  IMT progression on first-line crizotinib (acquired ALK kinase-domain
  resistance mutation L1196M / G1202R / I1171N), dedifferentiation into
  high-grade sarcoma (epithelioid inflammatory myofibroblastic sarcoma
  variant), new metastatic disease, or rapid local progression — triggers
  switch to lorlatinib / alectinib (next-gen ALK), repotrectinib (ROS1),
  or salvage cytotoxic chemotherapy.
definition_ua: >
  Прогресія IMT на 1-й лінії crizotinib (набута ALK kinase-domain
  резистентна мутація L1196M / G1202R / I1171N), дедиференціація у
  високодиференційовану саркому (epithelioid inflammatory myofibroblastic
  sarcoma варіант), нова метастатична хвороба або швидке локальне
  прогресування — тригер до lorlatinib / alectinib (наступне покоління
  ALK), repotrectinib (ROS1) або сальваджу.

