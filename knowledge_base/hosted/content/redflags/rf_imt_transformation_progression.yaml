notes: >
  Most IMT is intermediate-behavior; epithelioid inflammatory
  myofibroblastic sarcoma (EIMS) is an aggressive variant with
  exclusively ALK-fusion (typically RANBP2-ALK) that behaves like
  high-grade sarcoma — distinct prognosis, often metastatic at
  diagnosis, requires aggressive systemic therapy + surgery. Acquired
  ALK resistance mutations (L1196M gatekeeper, G1202R solvent-front,
  I1171N) drive crizotinib failure within 12-18 mo — switch to lorlatinib
  (covers most resistance variants) or alectinib (covers L1196M, less
  G1202R). ROS1+ progression: repotrectinib (TRIDENT-1). Re-biopsy at
  progression strongly recommended for resistance genotyping.
notes_ua: >
  Більшість IMT — поведінка інтермедіарна; epithelioid inflammatory
  myofibroblastic sarcoma (EIMS) — агресивний варіант (RANBP2-ALK),
  поводиться як high-grade саркома. Набуті ALK-резистентні мутації
  (L1196M, G1202R, I1171N) — провал crizotinib за 12-18 міс. — перехід
  на lorlatinib (покриває більшість) або alectinib.
