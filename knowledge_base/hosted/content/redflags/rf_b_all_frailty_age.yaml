id: RF-B-ALL-FRAILTY-AGE
definition: "Age ≥65 OR ECOG ≥3 with comorbidities — pediatric-inspired regimens (CALGB 10403, hyper-CVAD) inadequately tolerated; reduced-intensity protocol (mini-HCVD ± inotuzumab/blinatumomab) preferred."
definition_ua: "Вік ≥65 АБО ECOG ≥3 з коморбідностями — педіатричні протоколи (CALGB 10403, hyper-CVAD) погано переносяться; reduced-intensity (mini-HCVD ± inotuzumab/blinatumomab)."

trigger:
  type: composite_clinical
  any_of:
    - finding: "age_years"
      threshold: 65
      comparator: ">="
    - all_of:
        - finding: "ecog_status"
          threshold: 3
          comparator: ">="
        - finding: "comorbidity_count"
          threshold: 2
          comparator: ">="


clinical_direction: de-escalate
severity: major
priority: 100
category: frailty-age

relevant_diseases: [DIS-B-ALL]
shifts_algorithm: []

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-DLBCL-2024

last_reviewed: "2026-04-25"
draft: false

notes: >
  Pediatric-inspired adolescent-young-adult protocols dominate in fit <40; >65 mortality from induction toxicity is high. Mini-HCVD + inotuzumab/blinatumomab achieves better tolerability with comparable CR rates.
notes_ua: >
  педіатричний-inspired adolescent-young-дорослий protocols dominate in fit <40; >65 mortality from індукція токсичність is high. Mini-HCVD + inotuzumab/блінатумомаб achieves краще переносимість with співставний CR rates.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
