id: RF-WM-MYD88-L265P-ACTIONABLE
definition: >
  MYD88 L265P is the hallmark mutation of Waldenström macroglobulinemia,
  present in >90% of WM. Drives constitutive NF-κB activation through BTK.
  iNNOVATE (Dimopoulos NEJM 2018) and the iNNOVATE long-term follow-up
  established ibrutinib + rituximab > placebo + rituximab regardless of
  prior therapy; MYD88-L265P-positive disease has the highest response
  rate to BTKi monotherapy (ORR ~90%, major-response ~70%) while
  MYD88-WT WM responds poorly. Routes 1L symptomatic WM with MYD88-L265P
  toward BTKi-based therapy (ibrutinib, zanubrutinib per ASPEN, or
  ibrutinib + rituximab) over DRC chemoimmuno when chemo-avoidance is
  preferred (cardiac, frailty, hyperviscosity-controlled).
definition_ua: >
  MYD88 L265P — характерна мутація макроглобулінемії Вальденстрема,
  присутня у >90% WM. Викликає конститутивну активацію NF-κB через BTK.
  iNNOVATE (Dimopoulos NEJM 2018) та довготривалий fu встановили
  ібрутиніб + ритуксимаб > плацебо + ритуксимаб незалежно від попередньої
  терапії; MYD88-L265P-позитивна хвороба має найвищу відповідь на BTKi
  монотерапію (ORR ~90%, major-response ~70%), тоді як MYD88-WT WM
  слабо відповідає. Маршрутизує 1L симптоматичну WM з MYD88-L265P на
  BTKi-based терапію (ібрутиніб, занубрутиніб за ASPEN, або
  ібрутиніб + ритуксимаб) замість DRC chemoimmuno, коли уникнення хіміо
  є кращим (кардіо, frailty, гіперв'язкість контрольована).

