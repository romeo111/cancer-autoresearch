notes: >
  CXCR4 WHIM-like mutations (~30-40% of WM) co-occur with MYD88-L265P
  and reduce BTKi major-response rate (~30% with CXCR4-mut vs ~70% in
  CXCR4-WT) — order CXCR4 alongside MYD88 to risk-stratify BTKi response;
  CXCR4-mut + cardiac comorbidity favors zanubrutinib (ASPEN) or
  bortezomib-based DRC. MYD88-WT WM (~10%) is biologically distinct,
  often IgM-MGUS-like or marginal-zone-overlap, and BTKi response very
  low (ORR ~30%, major <10%) — for MYD88-WT WM prefer chemoimmuno
  (DRC/BR) or proteasome-inhibitor regimens. Detection: allele-specific
  PCR on bone-marrow CD19-sorted cells (peripheral blood lower
  sensitivity); sequencing alone misses ~10% of L265P due to low
  tumor fraction.
notes_ua: >
  CXCR4 WHIM-like мутації (~30-40% WM) ко-існують з MYD88-L265P і знижують
  major-response на BTKi (~30% при CXCR4-mut проти ~70% при CXCR4-WT) —
  замовляти CXCR4 разом з MYD88 для стратифікації відповіді на BTKi;
  CXCR4-mut + кардіокоморбідність — занубрутиніб (ASPEN) або
  бортезоміб-DRC. MYD88-WT WM (~10%) біологічно відмінна (часто
  IgM-MGUS-подібна або marginal-zone-overlap), і відповідь на BTKi дуже
  низька (ORR ~30%, major <10%) — для MYD88-WT WM перевагу мають
  chemoimmuno (DRC/BR) або протеасомні інгібітори. Виявлення: allele-specific
  PCR на BM CD19-sorted клітинах (peripheral blood — нижча чутливість);
  секвенування пропускає ~10% L265P через низьку tumor fraction.

