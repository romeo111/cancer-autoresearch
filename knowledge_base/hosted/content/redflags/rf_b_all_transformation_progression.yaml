id: RF-B-ALL-TRANSFORMATION-PROGRESSION
definition: "MRD-positive at end-of-induction (≥0.01% by flow or PCR) — switch to MRD-eradication strategy (blinatumomab, inotuzumab, or alloSCT consolidation)."
definition_ua: "MRD-позитив на кінець індукції (≥0.01% за flow або PCR) — перехід на MRD-ерадикацію (blinatumomab, inotuzumab, або alloSCT консолідація)."

trigger:
  type: lab_value
  any_of:
    - finding: "mrd_positive_post_induction"
      value: true
    - finding: "mrd_level_percent"
      threshold: 0.01
      comparator: ">="


clinical_direction: investigate
severity: critical
priority: 100
category: transformation-progression

relevant_diseases: [DIS-B-ALL]
shifts_algorithm: []

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-DLBCL-2024

last_reviewed: "2026-04-25"
draft: false

notes: >
  MRD post-induction is the single strongest prognostic factor in B-ALL. Drives 2L/consolidation strategy (blinatumomab → alloSCT for fit), not 1L induction choice. Flag surfaces as MDT priority.
notes_ua: >
  МЗХ після індукції is the single strongest прогностичний factor in B-ALL. Drives 2L/консолідація strategy (блінатумомаб → алоТГСК for fit), not 1L індукція choice. Flag surfaces as MDT priority.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
