id: RF-NLPBL-FRAILTY-AGE
definition: "Age >75 + ECOG ≥3 with asymptomatic stage I-II disease — observation alone is appropriate (NLPBL indolent natural history); RT spared."
definition_ua: "Вік >75 + ECOG ≥3 з асимптоматичною стадією I-II — спостереження достатнє (NLPBL індолентний перебіг); RT не потрібна."

trigger:
  type: composite_clinical
  all_of:
    - finding: "nlpbl_stage_i_or_ii"
      value: true
    - finding: "nlpbl_asymptomatic"
      value: true
    - any_of:
        - finding: "age_years"
          threshold: 75
          comparator: ">"
        - finding: "ecog_status"
          threshold: 3
          comparator: ">="


clinical_direction: de-escalate
severity: major
priority: 100
category: frailty-age

relevant_diseases: [DIS-NLPBL]
shifts_algorithm: []

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-HODGKIN-2024

last_reviewed: "2026-04-25"
draft: false

notes: >
  NLPBL has near-normal life expectancy in indolent forms; treatment de-escalation prioritized in elderly.
notes_ua: >
  NLPBL has near-normal очікувана тривалість життя in індолентний forms; лікування de-escalation prioritized in літнього віку.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
