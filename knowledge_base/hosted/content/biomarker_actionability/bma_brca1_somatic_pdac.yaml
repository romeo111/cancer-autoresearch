id: BMA-BRCA1-SOMATIC-PDAC
biomarker_id: BIO-HRR-PANEL
variant_qualifier: BRCA1 somatic loss-of-function
disease_id: DIS-PDAC
escat_tier: IIA
evidence_summary: 'Somatic BRCA1 loss-of-function in metastatic PDAC: POLO trial restricted
  to germline; somatic data limited but smaller series suggest similar PARPi sensitivity.
  NCCN allows PARPi consideration off-label in sBRCA PDAC. ESCAT IIA / OncoKB Level
  3A.

  '
evidence_summary_ua: 'соматичний BRCA1 втрата функції in метастатичний PDAC: POLO
  дослідження restricted to герміногенний; соматичний дані limited but smaller series
  suggest подібний PARPi чутливість. NCCN allows PARPi consideration off-label in
  sBRCA PDAC. ESCAT IIA / OncoKB рівень 3A.

  '
