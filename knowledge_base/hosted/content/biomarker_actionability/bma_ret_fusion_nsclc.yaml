id: BMA-RET-FUSION-NSCLC
biomarker_id: BIO-RET
variant_qualifier: "fusion (gene-level — KIF5B-RET, CCDC6-RET, NCOA4-RET et al.)"
disease_id: DIS-NSCLC
escat_tier: "IA"
oncokb_level: "1"
evidence_summary: >
  RET fusion in advanced NSCLC (~1-2% of adenocarcinoma): selpercatinib
  (LIBRETTO-001 Drilon 2020 — ORR 64% prior-tx / 85% TKI-naive;
  LIBRETTO-431 1L vs platinum-pemetrexed) and pralsetinib (ARROW
  Gainor 2021 — ORR 70%) are highly selective RET-TKIs with deep,
  durable responses including in CNS. Multikinase TKIs (cabozantinib,
  vandetanib) are inferior and toxic.
regulatory_approval:
  fda:
    - "selpercatinib — RET-fusion metastatic NSCLC (FDA accelerated 2020, full 2022)"
    - "pralsetinib — RET-fusion metastatic NSCLC (FDA accelerated 2020)"
  ema:
    - "selpercatinib — RET-fusion NSCLC (EMA approved 2021)"
    - "pralsetinib — RET-fusion NSCLC (EMA approved 2021)"
  ukraine: []
recommended_combinations:
  - "selpercatinib monotherapy (1L preferred per LIBRETTO-431)"
  - "pralsetinib monotherapy"
contraindicated_monotherapy:
  - "cabozantinib / vandetanib (inferior to selective RET-TKIs in NSCLC)"
primary_sources:
  - SRC-NCCN-NSCLC-2025
  - SRC-ESMO-NSCLC-METASTATIC-2024
  - SRC-ONCOKB
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IA. OncoKB Level 1. Detection: RNA-NGS preferred over DNA-NGS
  (intronic breakpoints). KIF5B-RET most common partner (~70%);
  fusion-partner generally does not influence TKI response (unlike ALK).
  Trial-source gaps: SRC-LIBRETTO-001, SRC-LIBRETTO-431, SRC-ARROW not
  yet ingested.
