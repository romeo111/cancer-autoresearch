id: BMA-RET-FUSION-NSCLC
biomarker_id: BIO-RET
variant_qualifier: fusion (gene-level — KIF5B-RET, CCDC6-RET, NCOA4-RET et al.)
disease_id: DIS-NSCLC
escat_tier: IA
evidence_summary: 'RET fusion in advanced NSCLC (~1-2% of adenocarcinoma): selpercatinib
  (LIBRETTO-001 Drilon 2020 — ORR 64% prior-tx / 85% TKI-naive; LIBRETTO-431 1L vs
  platinum-pemetrexed) and pralsetinib (ARROW Gainor 2021 — ORR 70%) are highly selective
  RET-TKIs with deep, durable responses including in CNS. Multikinase TKIs (cabozantinib,
  vandetanib) are inferior and toxic.

  '
evidence_summary_ua: 'RET злиття in поширений NSCLC (~1-2% of adenocarcinoma): селперкатиніб
  (LIBRETTO-001 Drilon 2020 — ORR 64% prior-tx / 85% TKI-naive; LIBRETTO-431 1L vs
  platinum-pemetrexed) and пралсетиніб (ARROW Gainor 2021 — ORR 70%) are highly селективний
  RET-TKIs with deep, durable responses включаючи in CNS. Multikinase TKIs (кабозантиніб,
  vandetanib) are поступається and toxic.

  '
