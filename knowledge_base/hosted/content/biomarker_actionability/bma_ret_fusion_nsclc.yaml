notes: 'ESCAT IA. OncoKB Level 1. Detection: RNA-NGS preferred over DNA-NGS (intronic
  breakpoints). KIF5B-RET most common partner (~70%); fusion-partner generally does
  not influence TKI response (unlike ALK). Trial-source gaps: SRC-LIBRETTO001-DRILON-2020,
  SRC-LIBRETTO-431, SRC-ARROW not yet ingested.

