evidence_summary: >
  TP53 hotspot mutation in MM — high-risk genetic feature; quadruplet (D-VRd) preferred; CAR-T effective. Hotspot R273H is among the most frequent DBD missense — gain-of-function dominant-negative behavior in some functional assays.
evidence_summary_ua: >
  TP53 hotspot мутація in MM — високого ризику genetic feature; quadruplet (D-VRd) переважний; CAR-T effective. Hotspot R273H is серед the найбільш частий DBD місенс — посилення функції dominant-negative behavior in some functional assays.
