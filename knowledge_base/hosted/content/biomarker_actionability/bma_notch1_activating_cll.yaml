id: BMA-NOTCH1-ACTIVATING-CLL
biomarker_id: BIO-NOTCH1-MUTATION
variant_qualifier: "activating (PEST domain truncating, c.7541_7542delCT canonical)"
disease_id: DIS-CLL
escat_tier: "IIIA"
oncokb_level: "3B"
evidence_summary: >
  NOTCH1 activating mutations (~10-15% of CLL) — adverse
  prognostic; reduced response to anti-CD20 mAb (rituximab,
  obinutuzumab) in some studies. Venetoclax-based fixed-duration
  (CLL14) and BTKi continuous remain effective. Not directly
  targeted; selects venetoclax-based therapy when present.
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
  - "venetoclax + obinutuzumab (CLL14)"
  - "acalabrutinib monotherapy"
  - "zanubrutinib monotherapy"
contraindicated_monotherapy:
  - "chlorambucil + obinutuzumab (relatively reduced anti-CD20 benefit per NOTCH1-mut subgroup)"
primary_sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-CLL-2024
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IIIA. NOTCH1 mutation identifies a subgroup that may be especially well-served by venetoclax-based regimens vs anti-CD20-based chemoimmuno.
