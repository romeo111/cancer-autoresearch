id: BMA-NOTCH1-ACTIVATING-CLL
biomarker_id: BIO-NOTCH1-MUTATION
variant_qualifier: activating (PEST domain truncating, c.7541_7542delCT canonical)
disease_id: DIS-CLL
escat_tier: IIIA
evidence_summary: 'NOTCH1 activating mutations (~10-15% of CLL) — adverse prognostic;
  reduced response to anti-CD20 mAb (rituximab, obinutuzumab) in some studies. Venetoclax-based
  fixed-duration (CLL14) and BTKi continuous remain effective. Not directly targeted;
  selects venetoclax-based therapy when present.

  '
evidence_summary_ua: 'NOTCH1 activating мутації (~10-15% of CLL) — несприятливий прогностичний;
  зменшений відповідь to anti-CD20 mAb (ритуксимаб, обінутузумаб) in some дослідження.
  венетоклакс-based fixed-duration (CLL14) and BTKi continuous remain effective. Not
  directly targeted; selects венетоклакс-based терапія when present.

  '
