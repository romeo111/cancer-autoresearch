id: BMA-MYC-REARRANGEMENT-NLPBL
biomarker_id: BIO-MYC-REARRANGEMENT
variant_qualifier: MYC rearrangement (rare in NLPBL — usually denotes transformation)
disease_id: DIS-NLPBL
escat_tier: IIIB
evidence_summary: 'MYC rearrangement in nodular lymphocyte-predominant B-cell lymphoma
  is rare and typically denotes transformation to aggressive lymphoma (DLBCL or HGBL).
  Treat as transformation event with R-CHOP / DA-EPOCH-R.

  '
evidence_summary_ua: 'MYC перебудова in nodular lymphocyte-predominant B-cell лімфома
  is рідкісний and типово denotes трансформація to агресивний лімфома (DLBCL or HGBL).
  Treat as трансформація event with R-CHOP / DA-EPOCH-R.

  '
