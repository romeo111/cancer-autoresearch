notes: 'ESCAT IA / OncoKB Level 1. IDH1 mutations are mutually exclusive with FGFR2
  fusions in cholangiocarcinoma; molecular profiling should cover both. Ivosidenib
  also has on-label use in IDH1-mutated AML (see existing BMAs). Resistance mechanisms:
  IDH2 isoform switching, receptor tyrosine kinase upregulation. Source-gap: SRC-NCCN-HEPATOBILIARY
  STUB; SRC-CLARIDHY-ABOU-ALFA-2020 not yet ingested.

  '
