id: BMA-IDH1-R132-CHOLANGIO
biomarker_id: BIO-IDH-MUTATION
variant_qualifier: IDH1 R132 hotspot (R132C ~70%, R132L, R132G, R132H, R132S; ~13-20%
  of intrahepatic cholangiocarcinoma)
disease_id: DIS-CHOLANGIOCARCINOMA
escat_tier: IA
evidence_summary: 'IDH1 R132 hotspot mutations occur in ~13-20% of intrahepatic cholangiocarcinoma
  and are FDA Level-1 actionable. Ivosidenib was FDA-approved 2021 for previously-treated
  IDH1-mutated locally advanced/metastatic cholangiocarcinoma based on ClarIDHy (Abou-Alfa
  Lancet Oncol 2020 — mPFS 2.7 vs 1.4 mo, HR 0.37; OS benefit on rank-preserving structural
  failure time analysis adjusted for crossover) per SRC-NCCN-HEPATOBILIARY. Comprehensive
  molecular profiling at diagnosis is recommended to identify IDH1-R132 patients who
  can be sequenced to ivosidenib in 2L after gemcitabine/cisplatin ± durvalumab (TOPAZ-1)
  1L.

  '
