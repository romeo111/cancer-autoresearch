id: BMA-NTRK-FUSION-SALIVARY
biomarker_id: BIO-NTRK-FUSION
variant_qualifier: "NTRK1/2/3 fusion (ETV6-NTRK3 defines mammary analogue secretory carcinoma, MASC)"
disease_id: DIS-SALIVARY
escat_tier: "IA"
oncokb_level: "1"
evidence_summary: >
  NTRK fusion in salivary gland tumors — virtually 100% of mammary
  analogue secretory carcinoma (MASC) carry ETV6-NTRK3. Larotrectinib
  (NAVIGATE / pooled phase 1/2, Drilon NEJM 2018 — ORR 75% across
  tumor types, salivary subset ORR ~85%) and entrectinib (STARTRK-2 /
  ALKA / STARTRK-NG) are FDA-approved tumor-agnostic for NTRK-fusion
  solid tumors. Salivary MASC has among the highest response rates.
regulatory_approval:
  fda:
    - "larotrectinib — NTRK-fusion solid tumors (FDA tumor-agnostic accelerated 2018, full 2022)"
    - "entrectinib — NTRK-fusion solid tumors (FDA tumor-agnostic 2019)"
  ema:
    - "larotrectinib — NTRK-fusion solid tumors (EMA tumor-agnostic 2019)"
    - "entrectinib — NTRK-fusion solid tumors (EMA tumor-agnostic 2020)"
  ukraine: []
recommended_combinations:
  - "larotrectinib monotherapy"
  - "entrectinib monotherapy (preferred for CNS disease)"
contraindicated_monotherapy: []
primary_sources:
  - SRC-ONCOKB
  - SRC-FDA-CDS-2026
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IA. OncoKB Level 1. MASC re-classified from acinic cell
  carcinoma in 2010 — driven entirely by ETV6-NTRK3 fusion. Detection:
  pan-TRK IHC screen → confirm by FISH or NGS. Resistance: solvent-front
  (NTRK G595R / G623R) and gatekeeper (G667C) mutations → next-gen
  TRK inhibitor selitrectinib / repotrectinib in trials. Source-gap:
  SRC-NCCN-HEAD-AND-NECK / SRC-NAVIGATE / SRC-STARTRK-2 not yet
  ingested.
