id: BMA-NRAS-Q61R-MELANOMA
biomarker_id: BIO-RAS-MUTATION
variant_qualifier: NRAS Q61R
disease_id: DIS-MELANOMA
escat_tier: IB
evidence_summary: 'NRAS Q61R is the most common NRAS hotspot in melanoma (~20% of
  cutaneous melanomas). Binimetinib (MEKi) monotherapy improved PFS vs dacarbazine
  in NEMO (Dummer et al. Lancet Oncol 2017) — modest benefit; not FDA-approved as
  monotherapy. ICI (anti-PD1 ± anti-CTLA4) is the standard 1L for NRAS-mut metastatic
  melanoma. MEKi+CDK4/6i combos under investigation.

  '
evidence_summary_ua: 'NRAS Q61R is the найбільш поширений NRAS hotspot in меланома
  (~20% of cutaneous melanomas). біниметиніб (MEKi) монотерапія покращений PFS vs
  dacarbazine in NEMO (Dummer et al. Lancet Oncol 2017) — modest виграш; not схвалений
  FDA as монотерапія. ICI (anti-PD1 ± anti-CTLA4) is the стандарт 1L for NRAS-mut
  метастатичний меланома. MEKi+CDK4/6i combos under investigation.

  '
