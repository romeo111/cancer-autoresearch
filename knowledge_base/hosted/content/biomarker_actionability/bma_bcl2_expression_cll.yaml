id: BMA-BCL2-EXPRESSION-CLL
biomarker_id: BIO-BCL2-EXPRESSION-IHC
variant_qualifier: "BCL2 high expression (universal in CLL)"
disease_id: DIS-CLL
escat_tier: "IA"
oncokb_level: "1"
evidence_summary: >
  CLL universally expresses BCL2 (no rearrangement needed; driven
  by miR-15/16 deletion at 13q14). Venetoclax-based fixed-duration
  (CLL14: VenO 1L; MURANO: VenR R/R) is FDA/EMA-approved and
  disease-defining as a target. Not biomarker-selected per se —
  BCL2 is a CLL-class marker.
evidence_summary_ua: >
  CLL universally expresses BCL2 (ні перебудова needed; driven by miR-15/16 делеція at 13q14). венетоклакс-based fixed-duration (CLL14: VenO 1L; MURANO: VenR р/р) is FDA/схвалений EMA and хвороба-defining as a target. Not біомаркер-selected per se — BCL2 is a CLL-class marker.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
