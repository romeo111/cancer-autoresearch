    - "venetoclax + obinutuzumab — 1L CLL/SLL (FDA 2019)"
    - "venetoclax + rituximab — R/R CLL (FDA 2018, MURANO)"
    - "venetoclax monotherapy — R/R 17p-del CLL (FDA 2016)"
  ema:
