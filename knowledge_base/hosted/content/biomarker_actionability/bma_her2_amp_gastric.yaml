id: BMA-HER2-AMP-GASTRIC
biomarker_id: BIO-HER2-SOLID
variant_qualifier: amplification / overexpression — IHC 3+ or (IHC 2+ + ISH amplified,
  HER2/CEP17 ≥2.0); ~15-20% of gastric/GEJ adenocarcinoma
disease_id: DIS-GASTRIC
escat_tier: IA
evidence_summary: 'HER2-positive gastric/GEJ adenocarcinoma (~15-20%): trastuzumab
  + chemotherapy is standard 1L (ToGA Bang Lancet 2010 — mOS 13.8 vs 11.1 mo, HR 0.74).
  Pembrolizumab + trastuzumab + chemo is FDA-approved 1L for HER2-positive PD-L1 CPS
  ≥1 metastatic gastric/GEJ disease per SRC-NCCN-GASTRIC-2025, SRC-ESMO-GASTRIC-2024
  (KEYNOTE-811). Trastuzumab deruxtecan (T-DXd) is FDA-approved 2L+ for HER2-positive
  (IHC 3+ or 2+) advanced gastric/GEJ adenocarcinoma based on DESTINY-Gastric01 (Shitara
  NEJM 2020 — ORR 51% vs 14% with chemotherapy).

  '
evidence_summary_ua: 'HER2-positive gastric/GEJ adenocarcinoma (~15-20%): трастузумаб
  + хіміотерапія is стандарт 1L (ToGA Bang Lancet 2010 — міс. 13.8 проти 11.1 міс.,
  HR 0.74). пембролізумаб + трастузумаб + chemo is схвалений FDA 1L for HER2-positive
  PD-L1 CPS ≥1 метастатичний gastric/GEJ хвороба per SRC-NCCN-GASTRIC-2025, SRC-ESMO-GASTRIC-2024
  (KEYNOTE-811). трастузумаб дерукстекан (T-DXd) is схвалений FDA 2L+ for HER2-positive
  (IHC 3+ або 2+) поширений gastric/GEJ adenocarcinoma based on DESTINY-Gastric01
  (Shitara NEJM 2020 — ORR 51% проти 14% with хіміотерапія).

  '
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
  fda:
  - trastuzumab + chemo — HER2+ metastatic gastric/GEJ adenocarcinoma 1L (FDA approved
    2010)
  - pembrolizumab + trastuzumab + chemo — HER2+ PD-L1 CPS≥1 1L (FDA approved 2021)
  - trastuzumab deruxtecan — HER2+ advanced gastric/GEJ 2L+ (FDA approved 2021)
  ema:
  - trastuzumab + chemo — HER2+ metastatic gastric/GEJ 1L (EMA approved 2010)
  - trastuzumab deruxtecan — HER2+ advanced gastric/GEJ (EMA approved 2023)
  ukraine: []
recommended_combinations:
- trastuzumab + fluoropyrimidine + platinum (1L per SRC-NCCN-GASTRIC-2025, SRC-ESMO-GASTRIC-2024)
- pembrolizumab + trastuzumab + fluoropyrimidine + platinum (1L HER2+ PD-L1 CPS ≥1
  per SRC-NCCN-GASTRIC-2025)
- trastuzumab deruxtecan (2L+ post-trastuzumab progression per SRC-NCCN-GASTRIC-2025)
contraindicated_monotherapy:
- trastuzumab monotherapy (combination with chemotherapy required for survival benefit)
primary_sources:
