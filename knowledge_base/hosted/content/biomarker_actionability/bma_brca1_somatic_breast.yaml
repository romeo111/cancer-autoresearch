id: BMA-BRCA1-SOMATIC-BREAST
biomarker_id: BIO-HRR-PANEL
variant_qualifier: BRCA1 somatic loss-of-function
disease_id: DIS-BREAST
escat_tier: IB
evidence_summary: 'Somatic BRCA1 loss-of-function in HER2-negative metastatic breast:
  TBCRC-048 (Tung 2020) showed talazoparib activity in sBRCA tumors (ORR ~31%). PARPi
  labels in breast are formally germline-only (gBRCAm); somatic tumors treated off-label
  or via NCCN extrapolation. ESCAT IB / OncoKB Level 2.

  '
evidence_summary_ua: 'соматичний BRCA1 втрата функції in HER2-negative метастатичний
  breast: TBCRC-048 (Tung 2020) showed талазопариб activity in sBRCA tumors (ORR ~31%).
  PARPi labels in breast are formally герміногенний-only (gBRCAm); соматичний tumors
  treated off-label or via NCCN extrapolation. ESCAT IB / OncoKB рівень 2.

  '
