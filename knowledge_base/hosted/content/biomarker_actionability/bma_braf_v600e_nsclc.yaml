id: BMA-BRAF-V600E-NSCLC
biomarker_id: BIO-BRAF-V600E
variant_qualifier: "V600E"
disease_id: DIS-NSCLC
escat_tier: "IA"
oncokb_level: "1"
evidence_summary: >
  BRAF V600E in advanced NSCLC (≈1-2% of adenocarcinomas):
  dabrafenib + trametinib gives ORR ~64% in 1L (Planchard et al.
  Lancet Oncol 2017) and is FDA/EMA-approved across lines.
  Encorafenib + binimetinib (PHAROS, Riely et al. JCO 2023) ORR
  75% in treatment-naïve, 46% pretreated — also FDA-approved 2023.
regulatory_approval:
  fda:
    - "dabrafenib + trametinib — metastatic V600E (FDA 2017)"
    - "encorafenib + binimetinib — metastatic V600E (FDA 2023)"
  ema:
    - "dabrafenib + trametinib — V600 mutation-positive NSCLC (EMA 2017)"
    - "encorafenib + binimetinib — V600E NSCLC (EMA 2023)"
  ukraine: []
recommended_combinations:
  - "dabrafenib + trametinib"
  - "encorafenib + binimetinib"
contraindicated_monotherapy:
  - "vemurafenib monotherapy (lower ORR ~42%, no FDA NSCLC label, used only when MEKi unavailable)"
primary_sources:
  - SRC-NCCN-NSCLC-2025
  - SRC-ESMO-NSCLC-METASTATIC-2024
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IA. OncoKB Level 1. Reflex testing for BRAF V600E in
  metastatic non-squamous NSCLC mandatory. Class 2 (V600 non-E) and
  Class 3 (kinase-impaired) BRAF mutations are NOT covered by these
  approvals — see separate cells. ICI monotherapy generally less
  effective in BRAF V600E NSCLC than BRAF/MEKi at progression.
