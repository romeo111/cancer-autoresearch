id: BMA-BRCA1-SOMATIC-OVARIAN
biomarker_id: BIO-HRR-PANEL
variant_qualifier: "BRCA1 somatic loss-of-function"
disease_id: DIS-OVARIAN
escat_tier: "IA"
oncokb_level: "1"
evidence_summary: >
  Somatic BRCA1 loss-of-function variants in advanced EOC confer PARPi
  sensitivity equivalent to germline; olaparib 1L maintenance (SOLO1 included
  sBRCA in EU label) and rucaparib 3L+ are FDA/EMA-approved regardless of
  germline status. ESCAT IA / OncoKB Level 1.
evidence_summary_ua: >
  соматичний BRCA1 втрата функції варіанти in поширений EOC confer PARPi чутливість еквівалентний to герміногенний; олапариб 1L підтримка (SOLO1 included sBRCA in EU label) and рукапариб 3L+ are FDA/схвалений EMA regardless of герміногенний status. ESCAT IA / OncoKB рівень 1.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
  fda:
    - "olaparib — 1L maintenance gBRCA/sBRCA advanced EOC (FDA 2018)"
    - "rucaparib — gBRCAm/sBRCAm 3L+ (FDA 2016)"
  ema:
    - "olaparib — 1L maintenance gBRCA/sBRCA advanced EOC (EMA 2019)"
  ukraine: []
recommended_combinations:
  - "olaparib monotherapy maintenance"
  - "rucaparib monotherapy maintenance"
  - "olaparib + bevacizumab (PAOLA-1)"
contraindicated_monotherapy: []
primary_sources:
  - SRC-NCCN-OVARIAN-2025
  - SRC-ESMO-OVARIAN-2024
  - SRC-ONCOKB
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  Somatic-only finding does NOT trigger cascade family testing. Tumor NGS
  reveals; reflex germline testing recommended to clarify. Same drug menu as
  germline.
