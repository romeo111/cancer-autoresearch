id: BMA-RET-KIF5B-NSCLC
biomarker_id: BIO-RET
variant_qualifier: "KIF5B-RET fusion"
disease_id: DIS-NSCLC
escat_tier: "IA"
oncokb_level: "1"
evidence_summary: >
  KIF5B-RET is the most common RET fusion in NSCLC (~70% of RET+ NSCLC).
  Treatment is identical to gene-level RET fusion: selpercatinib
  (LIBRETTO-001 / LIBRETTO-431) and pralsetinib (ARROW). Deep CNS
  penetrance with selpercatinib (intracranial ORR 82%).
regulatory_approval:
  fda:
    - "selpercatinib — RET-fusion metastatic NSCLC (FDA accelerated 2020, full 2022)"
    - "pralsetinib — RET-fusion metastatic NSCLC (FDA accelerated 2020)"
  ema:
    - "selpercatinib — RET-fusion NSCLC (EMA approved 2021)"
    - "pralsetinib — RET-fusion NSCLC (EMA approved 2021)"
  ukraine: []
recommended_combinations:
  - "selpercatinib monotherapy"
  - "pralsetinib monotherapy"
contraindicated_monotherapy:
  - "cabozantinib / vandetanib (inferior in selective-TKI era)"
primary_sources:
  - SRC-NCCN-NSCLC-2025
  - SRC-ESMO-NSCLC-METASTATIC-2024
  - SRC-ONCOKB
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IA. OncoKB Level 1. Fusion-partner-specific cell maintained
  for completeness (matches BMA-ALK-EML4-V1-NSCLC pattern).
