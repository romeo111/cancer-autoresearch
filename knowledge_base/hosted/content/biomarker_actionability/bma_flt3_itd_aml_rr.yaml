id: BMA-FLT3-ITD-AML-RR
biomarker_id: BIO-FLT3-ITD
variant_qualifier: internal tandem duplication (relapsed/refractory AML)
disease_id: DIS-AML
escat_tier: IA
evidence_summary: 'FLT3-ITD in relapsed/refractory AML: gilteritinib monotherapy superior
  to salvage chemo (ADMIRAL, Perl NEJM 2019 — OS 9.3 vs 5.6 mo, HR 0.64). Gilteritinib
  is preferred 2L for FLT3-mutant R/R AML and is a bridge to allo-SCT. Quizartinib
  also active R/R (QuANTUM-R) but FDA label is 1L only (R/R label withdrawn).

  '
evidence_summary_ua: 'FLT3-ITD in рецидивний/рефрактерний AML: гілтеритиніб монотерапія
  перевершує сальвадж chemo (ADMIRAL, Perl NEJM 2019 — OS 9.3 проти 5.6 міс., HR 0.64).
  гілтеритиніб is переважний 2L for FLT3-mutant р/р AML and is a bridge to allo-SCT.
  квізартиніб also active р/р (QuANTUM-R) but FDA label is 1L only (р/р label withdrawn).

  '
