id: BMA-FLT3-ITD-AML-RR
biomarker_id: BIO-FLT3-ITD
variant_qualifier: "internal tandem duplication (relapsed/refractory AML)"
disease_id: DIS-AML
escat_tier: "IA"
oncokb_level: "1"
evidence_summary: >
  FLT3-ITD in relapsed/refractory AML: gilteritinib monotherapy
  superior to salvage chemo (ADMIRAL, Perl NEJM 2019 — OS 9.3 vs 5.6
  mo, HR 0.64). Gilteritinib is preferred 2L for FLT3-mutant R/R AML
  and is a bridge to allo-SCT. Quizartinib also active R/R (QuANTUM-R)
  but FDA label is 1L only (R/R label withdrawn).
regulatory_approval:
  fda:
    - "gilteritinib — R/R FLT3-mutant AML (FDA approved 2018)"
  ema:
    - "gilteritinib — R/R FLT3-mutant AML (EMA approved 2019)"
  ukraine: []
recommended_combinations:
  - "gilteritinib monotherapy (2L bridge to allo-SCT)"
  - "gilteritinib + venetoclax + azacitidine (off-label intensification, trial)"
contraindicated_monotherapy: []
primary_sources:
  - SRC-ADMIRAL-PERL-2019
  - SRC-NCCN-AML-2025
  - SRC-ELN-AML-2022
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IA. OncoKB Level 1. Resistance: F691L gatekeeper, D835 TKD
  emerge under gilteritinib pressure — see BMA-FLT3-D835-AML-RR
  and BMA-FLT3-F691L-AML for next-step considerations. Distinguish
  from BMA-FLT3-ITD-AML which covers 1L.
