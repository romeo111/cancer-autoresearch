id: BMA-FLT3-D835-AML-RR
biomarker_id: BIO-FLT3-D835
variant_qualifier: TKD point mutation (D835Y/V; relapsed/refractory)
disease_id: DIS-AML
escat_tier: IA
evidence_summary: 'FLT3-D835 in R/R AML: gilteritinib superior to salvage chemo (ADMIRAL,
  Perl 2019 — pre-specified subset analysis showed activity across both ITD and D835/TKD;
  D835 subset response rates similar to ITD overall). Gilteritinib is preferred type-I
  FLT3i for D835-mutant R/R disease. Quizartinib remains contraindicated (no D835
  activity).

  '
evidence_summary_ua: 'FLT3-D835 in р/р AML: гілтеритиніб перевершує сальвадж chemo
  (ADMIRAL, Perl 2019 — pre-specified subset analysis showed activity across both
  ITD and D835/TKD; D835 subset відповідь rates подібний to ITD overall). гілтеритиніб
  is переважний type-I FLT3i for D835-mutant р/р хвороба. квізартиніб remains протипоказаний
  (ні D835 activity).

  '
