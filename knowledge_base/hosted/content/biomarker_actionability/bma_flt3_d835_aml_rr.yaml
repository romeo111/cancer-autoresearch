id: BMA-FLT3-D835-AML-RR
biomarker_id: BIO-FLT3-D835
variant_qualifier: "TKD point mutation (D835Y/V; relapsed/refractory)"
disease_id: DIS-AML
escat_tier: "IA"
oncokb_level: "1"
evidence_summary: >
  FLT3-D835 in R/R AML: gilteritinib superior to salvage chemo
  (ADMIRAL, Perl 2019 — pre-specified subset analysis showed activity
  across both ITD and D835/TKD; D835 subset response rates similar to
  ITD overall). Gilteritinib is preferred type-I FLT3i for D835-mutant
  R/R disease. Quizartinib remains contraindicated (no D835 activity).
evidence_summary_ua: >
  FLT3-D835 in р/р AML: гілтеритиніб перевершує сальвадж chemo (ADMIRAL, Perl 2019 — pre-specified subset analysis showed activity across both ITD and D835/TKD; D835 subset відповідь rates подібний to ITD overall). гілтеритиніб is переважний type-I FLT3i for D835-mutant р/р хвороба. квізартиніб remains протипоказаний (ні D835 activity).
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
  fda:
    - "gilteritinib — R/R FLT3-mutant (ITD or TKD D835) AML (FDA approved 2018)"
  ema:
    - "gilteritinib — R/R FLT3-mutant AML (EMA approved 2019)"
  ukraine: []
recommended_combinations:
  - "gilteritinib monotherapy (2L bridge to allo-SCT)"
  - "gilteritinib + venetoclax + azacitidine (off-label, trial)"
contraindicated_monotherapy:
  - "quizartinib (inactive vs D835)"
  - "sorafenib (poor activity vs D835 in clinical practice)"
primary_sources:
  - SRC-ADMIRAL-PERL-2019
  - SRC-NCCN-AML-2025
  - SRC-ELN-AML-2022
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IA. OncoKB Level 1. Per task brief: D835 R/R is well-
  characterized for gilteritinib (type-I) advantage over type-II.
