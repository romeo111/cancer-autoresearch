id: BMA-PIK3CA-HOTSPOT-CERVICAL
biomarker_id: BIO-PIK3CA-MUTATION
variant_qualifier: "hotspot (E545K / E542K / H1047R)"
disease_id: DIS-CERVICAL
escat_tier: "IIIA"
oncokb_level: "3B"
evidence_summary: >
  PIK3CA mutations occur in ~30% of squamous cervical cancers.
  No PI3Ki/AKTi approval in cervical (2026); investigational
  in tissue-agnostic basket trials. ICI (pembrolizumab,
  cemiplimab) remains the targeted-therapy backbone.
evidence_summary_ua: >
  PIK3CA мутації occur in ~30% of squamous cervical cancers. ні PI3Ki/AKTi схвалення in cervical (2026); експериментальний in tissue-agnostic basket trials. ICI (пембролізумаб, цеміплімаб) remains the targeted-терапія основа схеми.
