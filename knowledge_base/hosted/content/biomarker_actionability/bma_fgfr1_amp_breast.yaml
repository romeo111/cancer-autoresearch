  - SRC-ESMO-BREAST-METASTATIC-2024
  - SRC-ONCOKB
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IV (prognostic / hypothetical clinical actionability). OncoKB
  Level 4. Standard 1L HR+/HER2- metastatic breast remains CDK4/6i +
  endocrine; FGFR1-amp does not currently modify treatment selection.
