id: BMA-FGFR1-AMP-BREAST
biomarker_id: BIO-FGFR1
variant_qualifier: "amplification (~10-15% HR+ breast)"
disease_id: DIS-BREAST
escat_tier: "IV"
oncokb_level: "4"
evidence_summary: >
  FGFR1 amplification in HR+ breast cancer (~10-15%): prognostic for
  endocrine-therapy resistance and reduced PFS on aromatase inhibitor.
  Therapeutic actionability is unproven — multiple FGFR-TKI trials
  (lucitanib FINESSE, dovitinib) negative or marginal. No FGFR-targeted
  drug approved for breast cancer.
