id: BMA-FLT3-F691L-AML
biomarker_id: BIO-FLT3-D835
variant_qualifier: "F691L gatekeeper resistance mutation (post-FLT3i)"
disease_id: DIS-AML
escat_tier: "IIA"
oncokb_level: "R1"
evidence_summary: >
  FLT3-F691L is a gatekeeper mutation arising under FLT3-TKI selective
  pressure (gilteritinib, quizartinib). Confers cross-resistance to
  most current FLT3i. Crenolanib (investigational type-I) and
  next-gen FLT3i retain partial activity. No approved targeted option
  — clinical trial enrollment or salvage chemo + allo-SCT.
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
  - "salvage chemo + allo-SCT (preferred when fit)"
  - "clinical trial (next-gen FLT3i, crenolanib, FF-10101)"
  - "venetoclax + azacitidine (off-label salvage)"
contraindicated_monotherapy:
  - "gilteritinib (cross-resistance F691L)"
  - "quizartinib (cross-resistance F691L)"
primary_sources:
  - SRC-ADMIRAL-PERL-2019
  - SRC-ELN-AML-2022
  - SRC-ONCOKB
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IIA (resistance biomarker — guides what NOT to use). OncoKB
  Level R1. Cell intentionally uses BIO-FLT3-D835 as biomarker_id
  because F691L is a TKD/kinase-domain mutation captured under the
  FLT3-D835 / TKD entity per the cherry-picked BIO file (no separate
  F691L biomarker). variant_qualifier disambiguates. Clinical use:
  trigger ctDNA / BM rebiopsy at gilteritinib failure to detect F691L
  vs D835 emergence.
