id: BMA-ATM-LOSS-CLL
biomarker_id: BIO-HRR-PANEL
variant_qualifier: "ATM loss (11q deletion or somatic mutation)"
disease_id: DIS-CLL
escat_tier: "IIA"
oncokb_level: "3A"
evidence_summary: >
  ATM loss in CLL (del(11q) or somatic mutation): historically poor-prognostic
  with chemoimmunotherapy (FCR), but BTK inhibitors (ibrutinib, acalabrutinib,
  zanubrutinib) and venetoclax+obinutuzumab abrogate this risk. Avoid FCR in
  ATM-deficient CLL. ESCAT IIA (treatment-modifying) / OncoKB Level 3A.
regulatory_approval:
  fda:
    - "ibrutinib, acalabrutinib, zanubrutinib — CLL all-comers including del(11q)"
    - "venetoclax + obinutuzumab — 1L CLL"
  ema:
    - "BTKi — CLL all-comers"
    - "venetoclax + obinutuzumab — 1L CLL"
  ukraine: []
recommended_combinations:
  - "acalabrutinib (preferred for cardiac safety)"
  - "zanubrutinib"
  - "ibrutinib"
  - "venetoclax + obinutuzumab (fixed-duration)"
contraindicated_monotherapy:
  - "FCR (fludarabine-cyclophosphamide-rituximab) in ATM-deficient CLL — inferior outcomes"
primary_sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-CLL-2024
  - SRC-ONCOKB
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  Note: TP53 disruption (del(17p) or TP53 mutation) is the dominant adverse
  prognostic — ATM is secondary. Test del(11q) by FISH and ATM by NGS in all CLL
  pre-treatment.
