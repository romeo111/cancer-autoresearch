id: BMA-BRCA2-GERMLINE-BREAST
biomarker_id: BIO-BRCA1-BRCA2-GERMLINE
variant_qualifier: "BRCA2 germline pathogenic"
disease_id: DIS-BREAST
escat_tier: "IA"
evidence_summary: >
  BRCA2 germline pathogenic in HER2-negative metastatic breast: olaparib
  (OlympiAD) and talazoparib (EMBRACA) improve PFS; in early-stage high-risk
  HER2-negative, 1y adjuvant olaparib improves iDFS and OS (OlympiA). ESCAT IA /
  OncoKB Level 1.
evidence_summary_ua: >
  BRCA2 герміногенний патогенний in HER2-negative метастатичний breast: олапариб (OlympiAD) and талазопариб (EMBRACA) improve PFS; in ранньої стадії високого ризику HER2-negative, 1y ад'ювантний олапариб покращує iDFS and OS (OlympiA). ESCAT IA / OncoKB рівень 1.
