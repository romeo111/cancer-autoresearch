id: BMA-ROS1-SLC34A2-NSCLC
biomarker_id: BIO-ROS1-FUSION
variant_qualifier: "SLC34A2-ROS1 fusion"
disease_id: DIS-NSCLC
escat_tier: "IA"
oncokb_level: "1"
evidence_summary: >
  SLC34A2-ROS1 fusion (~10% of ROS1+ NSCLC) responds to standard
  ROS1-TKI therapy identically to other partners. No partner-specific
  treatment differentiation in current guidelines.
regulatory_approval:
  fda:
    - "repotrectinib / entrectinib / crizotinib — ROS1+ NSCLC (FDA approved)"
  ema:
    - "repotrectinib / entrectinib / crizotinib — ROS1+ NSCLC (EMA approved)"
  ukraine: []
recommended_combinations:
  - "repotrectinib monotherapy"
  - "entrectinib monotherapy"
  - "crizotinib monotherapy"
contraindicated_monotherapy: []
primary_sources:
  - SRC-NCCN-NSCLC-2025
  - SRC-ESMO-NSCLC-METASTATIC-2024
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IA. Partner identification is informative but not therapy-altering.
