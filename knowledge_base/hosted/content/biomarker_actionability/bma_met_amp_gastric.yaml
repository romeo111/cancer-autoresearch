id: BMA-MET-AMP-GASTRIC
biomarker_id: BIO-MET
variant_qualifier: "amplification (GCN ≥10 or MET/CEP7 ≥4)"
disease_id: DIS-GASTRIC
escat_tier: "IIIA"
oncokb_level: "3B"
evidence_summary: >
  MET amplification in gastric / GEJ adenocarcinoma (~5%): preclinical
  rationale strong but phase 3 trials of rilotumumab (anti-HGF;
  RILOMET-1) and onartuzumab (anti-MET; METGastric) were negative.
  Selective MET-TKI activity in MET-amp gastric is reported in
  case series and basket cohorts; no regulatory approval.
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
  - "clinical trial enrollment (selective MET-TKI basket)"
contraindicated_monotherapy:
  - "rilotumumab (failed RILOMET-1)"
  - "onartuzumab (failed METGastric)"
primary_sources:
  - SRC-NCCN-GASTRIC-2025
  - SRC-ESMO-GASTRIC-2024
  - SRC-ONCOKB
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IIIA. OncoKB Level 3B. Standard 1L gastric/GEJ remains
  fluoropyrimidine + platinum ± trastuzumab (HER2+) ± nivolumab
  (PD-L1+). MET status is not currently a routine treatment-decision
  biomarker outside trials.
