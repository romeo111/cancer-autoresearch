id: BMA-ALK-FUSION-NSCLC
biomarker_id: BIO-ALK-FUSION
variant_qualifier: "fusion (gene-level, TKI-naive)"
disease_id: DIS-NSCLC
escat_tier: "IA"
oncokb_level: "1"
evidence_summary: >
  ALK rearrangement in advanced NSCLC: alectinib (ALEX, Peters 2017)
  and lorlatinib (CROWN, Solomon 2024 — 5-yr PFS 60%) outperform
  crizotinib 1L. Lorlatinib has the highest CNS activity. Adjuvant
  alectinib improves DFS post-resection (ALINA, Solomon 2024).
evidence_summary_ua: >
  ALK перебудова in поширений NSCLC: алектиніб (ALEX, Peters 2017) and лорлатиніб (CROWN, Solomon 2024 — 5-річна ВБП 60%) перевершує кризотиніб 1L. лорлатиніб has the найвища активність в ЦНС. ад'ювантний алектиніб покращує DFS після резекції (ALINA, Solomon 2024).
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
  fda:
    - "alectinib — 1L ALK-rearranged NSCLC (FDA approved 2017)"
    - "lorlatinib — 1L ALK-rearranged NSCLC (FDA approved 2021, expanded)"
    - "brigatinib — 1L ALK-rearranged NSCLC (FDA approved 2020)"
    - "alectinib — adjuvant resected ALK+ NSCLC (FDA approved 2024)"
  ema:
    - "alectinib / brigatinib / lorlatinib — 1L ALK+ NSCLC (EMA approved)"
    - "alectinib — adjuvant ALK+ NSCLC (EMA approved 2024)"
  ukraine: []
recommended_combinations:
  - "alectinib monotherapy (1L)"
  - "lorlatinib monotherapy (1L, preferred for CNS disease)"
  - "brigatinib monotherapy (1L)"
contraindicated_monotherapy:
  - "crizotinib (inferior to 2nd/3rd-gen ALK-TKIs, no longer 1L)"
primary_sources:
  - SRC-NCCN-NSCLC-2025
  - SRC-ESMO-NSCLC-METASTATIC-2024
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IA. OncoKB Level 1. ~5% NSCLC adenocarcinoma. Detection by
  RNA-NGS / FISH / IHC (D5F3). EML4-ALK most common partner; variant
  type (v1 vs v3) influences resistance pattern and TKI selection.
