id: BMA-MYD88-L265P-WM
biomarker_id: BIO-MYD88-L265P
variant_qualifier: "L265P"
disease_id: DIS-WM
escat_tier: "IA"
oncokb_level: "1"
evidence_summary: >
  MYD88 L265P present in >90% of WM. Activates NF-κB via
  BTK/IRAK signaling — rationale for BTKi. Ibrutinib monotherapy
  (iNNOVATE substudy 2 / arm A — Treon et al. NEJM 2015 R/R;
  iNNOVATE — Dimopoulos et al. NEJM 2018 1L+R/R with rituximab)
  and zanubrutinib (ASPEN — Tam et al. Blood 2020) FDA-approved.
  CXCR4 WHIM-like co-mutation reduces but does not abolish
  response.
evidence_summary_ua: >
  MYD88 L265P present in >90% of WM. Activates NF-κB via BTK/IRAK signaling — rationale for BTKi. ібрутиніб монотерапія (iNNOVATE substudy 2 / arm A — Treon et al. NEJM 2015 р/р; iNNOVATE — Dimopoulos et al. NEJM 2018 1L+р/р with ритуксимаб) and занубрутиніб (ASPEN — Tam et al. Blood 2020) схвалений FDA. CXCR4 WHIM-like ко-мутація зменшує but does not abolish відповідь.
