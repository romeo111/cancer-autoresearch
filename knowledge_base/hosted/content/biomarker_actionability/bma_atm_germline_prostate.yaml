id: BMA-ATM-GERMLINE-PROSTATE
biomarker_id: BIO-HRR-PANEL
variant_qualifier: "ATM germline pathogenic"
disease_id: DIS-PROSTATE
escat_tier: "IB"
oncokb_level: "1"
evidence_summary: >
  ATM germline pathogenic in mCRPC: olaparib approved per PROfound (Cohort A
  included ATM); benefit smaller than BRCA but FDA/EMA-labeled.
  Talazoparib+enzalutamide and olaparib+abiraterone also include ATM in HRR-
  mutated populations. ESCAT IB / OncoKB Level 1.
regulatory_approval:
  fda:
    - "olaparib — HRR-mutated mCRPC including ATM (FDA 2020)"
    - "talazoparib + enzalutamide — HRR-mutated 1L"
  ema:
    - "olaparib — HRR-mutated mCRPC (limited to BRCA1/2 in EU label per EMA review)"
  ukraine: []
recommended_combinations:
  - "olaparib monotherapy (post-NHA)"
  - "talazoparib + enzalutamide (1L, HRR-mut)"
contraindicated_monotherapy: []
primary_sources:
  - SRC-NCCN-PROSTATE-2025
  - SRC-ESMO-PROSTATE-2024
  - SRC-EAU-PROSTATE-2024
  - SRC-ONCOKB
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  EMA label more restrictive than FDA — restricts olaparib to BRCA1/2 only in
  EU. Cascade testing mandatory; ATM carriers face elevated breast/pancreatic
  risk in relatives.
