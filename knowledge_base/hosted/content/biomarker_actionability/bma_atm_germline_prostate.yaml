id: BMA-ATM-GERMLINE-PROSTATE
biomarker_id: BIO-HRR-PANEL
variant_qualifier: ATM germline pathogenic
disease_id: DIS-PROSTATE
escat_tier: IB
evidence_summary: 'ATM germline pathogenic in mCRPC: olaparib approved per PROfound
  (Cohort A included ATM); benefit smaller than BRCA but FDA/EMA-labeled. Talazoparib+enzalutamide
  and olaparib+abiraterone also include ATM in HRR- mutated populations. ESCAT IB
  / OncoKB Level 1.

  '
evidence_summary_ua: 'ATM герміногенний патогенний in mCRPC: олапариб схвалений per
  PROfound (Cohort A included ATM); виграш smaller than BRCA but FDA/EMA-labeled.
  талазопариб+ензалутамід and олапариб+абіратерон also include ATM in HRR- mutated
  populations. ESCAT IB / OncoKB рівень 1.

  '
