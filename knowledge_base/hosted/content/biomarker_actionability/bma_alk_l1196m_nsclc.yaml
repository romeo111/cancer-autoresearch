id: BMA-ALK-L1196M-NSCLC
biomarker_id: BIO-ALK-FUSION
variant_qualifier: "L1196M (acquired resistance)"
disease_id: DIS-NSCLC
escat_tier: "IB"
oncokb_level: "R1"
evidence_summary: >
  ALK L1196M is the gatekeeper mutation conferring resistance to
  crizotinib but retaining sensitivity to 2nd-gen ALK-TKIs (alectinib,
  brigatinib, ceritinib) and to lorlatinib. Historically the most
  common crizotinib-resistance mutation; less prevalent now that
  crizotinib is no longer 1L.
evidence_summary_ua: >
  ALK L1196M is the gatekeeper мутація conferring резистентність до кризотиніб but retaining чутливість to 2nd-gen ALK-TKIs (алектиніб, брігатиніб, цертиніб) and to лорлатиніб. Historically the найбільш поширений кризотиніб-резистентна мутація; less prevalent now that кризотиніб is ні longer 1L.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
  fda:
    - "alectinib — post-crizotinib ALK+ NSCLC (FDA approved 2015)"
    - "brigatinib — post-crizotinib (FDA approved 2017)"
    - "lorlatinib — 2L+ ALK+ NSCLC (FDA approved 2018)"
  ema:
    - "alectinib / brigatinib / lorlatinib — 2L ALK+ NSCLC (EMA approved)"
  ukraine: []
recommended_combinations:
  - "alectinib monotherapy"
  - "brigatinib monotherapy"
  - "lorlatinib monotherapy"
contraindicated_monotherapy:
  - "crizotinib (resistant)"
primary_sources:
