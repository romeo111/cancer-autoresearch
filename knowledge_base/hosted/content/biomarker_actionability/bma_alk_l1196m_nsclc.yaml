  - SRC-ESMO-NSCLC-METASTATIC-2024
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  OncoKB R1 (resistance to crizotinib only). Less clinically relevant
  in the modern era as crizotinib is no longer 1L.
