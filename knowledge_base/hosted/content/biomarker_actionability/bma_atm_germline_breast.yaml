id: BMA-ATM-GERMLINE-BREAST
biomarker_id: BIO-HRR-PANEL
variant_qualifier: "ATM germline pathogenic"
disease_id: DIS-BREAST
escat_tier: "IIA"
oncokb_level: "3A"
evidence_summary: >
  ATM germline pathogenic confers ~2× lifetime breast-cancer risk; no PARPi
  indication (TBCRC-048 ATM cohort showed minimal activity). Standard breast-
  cancer therapy by ER/HER2 status. ESCAT IIA (predisposition) / OncoKB Level
  3A. Avoid radiotherapy in homozygous/biallelic ATM (radiosensitivity).
evidence_summary_ua: >
  ATM герміногенний патогенний confers ~2× lifetime breast-рак risk; ні PARPi показання (TBCRC-048 ATM cohort showed minimal activity). стандарт breast- рак терапія by ER/HER2 status. ESCAT IIA (predisposition) / OncoKB рівень 3A. Avoid променева терапія in homozygous/biallelic ATM (radiosensitivity).
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
  - "standard breast therapy by HR/HER2"
  - "enhanced screening (annual MRI)"
contraindicated_monotherapy:
  - "PARPi monotherapy (limited activity in ATM-only)"
primary_sources:
  - SRC-NCCN-BREAST-2025
  - SRC-ESMO-BREAST-METASTATIC-2024
  - SRC-ONCOKB
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  Heterozygous ATM is the typical breast-cancer scenario; homozygous = ataxia-
  telangiectasia (avoid ionizing radiation, including diagnostic CT when
  possible). Cascade testing mandatory.
