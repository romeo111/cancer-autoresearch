id: BMA-BRAF-V600E-GBM
biomarker_id: BIO-BRAF-V600E
variant_qualifier: "V600E"
disease_id: DIS-GBM
escat_tier: "IIIA"
oncokb_level: "2"
evidence_summary: >
  BRAF V600E in adult-type glioblastoma is rare (~1-3%) but more
  common in epithelioid GBM and pediatric high-grade glioma.
  Dabrafenib + trametinib is tissue-agnostic FDA-approved (2022)
  for BRAF V600E solid tumors after progression on prior therapy
  — covers BRAF V600E GBM (Wen et al. ROAR-glioma 2022, ORR 33%
  in HGG). Vorasidenib does NOT apply here (IDH-mutant only).
regulatory_approval:
  fda:
    - "dabrafenib + trametinib — tissue-agnostic V600E solid tumors after prior therapy (FDA 2022)"
  ema:
    - "dabrafenib + trametinib — V600E solid tumors (EMA 2023)"
  ukraine: []
recommended_combinations:
  - "dabrafenib + trametinib (recurrent / progressive after RT + TMZ)"
contraindicated_monotherapy:
  - "vemurafenib monotherapy (limited CNS penetration, paradoxical RAS-RAF activation in BRAF-WT clones)"
primary_sources:
  - SRC-NCCN-CNS-2025
  - SRC-EANO-GBM-2024
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IIIA. OncoKB Level 2 (tissue-agnostic). Reflex BRAF V600E
  testing recommended for epithelioid GBM and pediatric/AYA HGG.
  Distinct from low-grade pediatric glioma where BRAFi has stronger
  evidence.
