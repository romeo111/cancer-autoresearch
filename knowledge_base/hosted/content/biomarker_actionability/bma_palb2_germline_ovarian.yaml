id: BMA-PALB2-GERMLINE-OVARIAN
biomarker_id: BIO-HRR-PANEL
variant_qualifier: "PALB2 germline pathogenic"
disease_id: DIS-OVARIAN
escat_tier: "IIA"
oncokb_level: "3A"
evidence_summary: >
  PALB2 germline pathogenic in EOC: rare (~1%); biologically HR-deficient.
  Niraparib NOVA non-gBRCA cohort and rucaparib ARIEL3 LOH-high included PALB2;
  olaparib + bev (PAOLA-1) in HRD-positive includes PALB2. ESCAT IIA / OncoKB
  Level 3A.
regulatory_approval:
  fda:
    - "niraparib — maintenance recurrent EOC (HRD broad label includes PALB2)"
  ema:
    - "olaparib + bevacizumab — 1L HRD-positive EOC (incl PALB2-mutated)"
  ukraine: []
recommended_combinations:
  - "niraparib maintenance"
  - "olaparib + bevacizumab (HRD-positive)"
  - "rucaparib maintenance"
contraindicated_monotherapy: []
primary_sources:
  - SRC-NCCN-OVARIAN-2025
  - SRC-ESMO-OVARIAN-2024
  - SRC-ONCOKB
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  Cascade testing mandatory. PALB2 carriers face breast and pancreatic risk in
  relatives.
