id: BMA-NTRK-FUSION-NSCLC
biomarker_id: BIO-NTRK-FUSION
variant_qualifier: "NTRK1/3 fusion (rare ~0.1-0.5%)"
disease_id: DIS-NSCLC
escat_tier: "IA"
oncokb_level: "1"
evidence_summary: >
  NTRK fusion in NSCLC is rare (~0.1-0.5%). Larotrectinib and
  entrectinib are FDA tumor-agnostic; NSCLC subset of pooled trials
  shows durable responses including CNS activity (entrectinib has
  superior CNS penetrance). Tumor-agnostic actionability — NTRK
  testing is part of comprehensive NGS panels in NSCLC.
regulatory_approval:
  fda:
    - "larotrectinib — NTRK-fusion solid tumors (FDA tumor-agnostic 2018)"
    - "entrectinib — NTRK-fusion solid tumors (FDA tumor-agnostic 2019)"
  ema:
    - "larotrectinib / entrectinib — NTRK-fusion solid tumors (EMA tumor-agnostic 2019/2020)"
  ukraine: []
recommended_combinations:
  - "entrectinib monotherapy (preferred for CNS disease)"
  - "larotrectinib monotherapy"
contraindicated_monotherapy: []
primary_sources:
  - SRC-NCCN-NSCLC-2025
  - SRC-ESMO-NSCLC-METASTATIC-2024
  - SRC-ONCOKB
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IA (tumor-agnostic actionability). OncoKB Level 1. Detection:
  RNA-NGS preferred; pan-TRK IHC as screen.
