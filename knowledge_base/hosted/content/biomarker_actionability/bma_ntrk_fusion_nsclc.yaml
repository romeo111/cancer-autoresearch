id: BMA-NTRK-FUSION-NSCLC
biomarker_id: BIO-NTRK-FUSION
variant_qualifier: "NTRK1/3 fusion (rare ~0.1-0.5%)"
disease_id: DIS-NSCLC
escat_tier: "IA"
evidence_summary: >
  NTRK fusion in NSCLC is rare (~0.1-0.5%). Larotrectinib and
  entrectinib are FDA tumor-agnostic; NSCLC subset of pooled trials
  shows durable responses including CNS activity (entrectinib has
  superior CNS penetrance). Tumor-agnostic actionability — NTRK
  testing is part of comprehensive NGS panels in NSCLC.
evidence_summary_ua: >
  NTRK злиття in NSCLC is рідкісний (~0.1-0.5%). ларотрексиніб and ентректиніб are FDA пухлина-agnostic; NSCLC subset of pooled trials shows durable responses включаючи активність в ЦНС (ентректиніб has перевершує CNS penetrance). пухлина-agnostic actionability — NTRK testing is part of comprehensive NGS panels in NSCLC.
