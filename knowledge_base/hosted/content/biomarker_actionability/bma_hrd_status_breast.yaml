notes: 'ESCAT IA / OncoKB Level 1 (gBRCAm). Somatic BRCA mutations and broader HRD-genomic
  signatures (Myriad MyChoice CDx) have less consistent evidence in breast — current
  FDA-companion is BRACAnalysis CDx for gBRCAm. ESMO 2024 advanced breast guidelines
  flag PARP-i is preferred 2L over CDK4/6 sequencing in gBRCAm/HR+ metastatic when
  available. Source-gap: SRC-OLYMPIA, SRC-OLYMPIAD, SRC-EMBRACA not yet ingested.

