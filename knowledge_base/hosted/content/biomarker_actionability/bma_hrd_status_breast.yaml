id: BMA-HRD-STATUS-BREAST
biomarker_id: BIO-HRD-STATUS
variant_qualifier: germline BRCA1/2 (gBRCA) — primary FDA companion biomarker; somatic
  BRCA1/2 also actionable; broader HRD-genomic signatures investigational
disease_id: DIS-BREAST
escat_tier: IA
evidence_summary: 'Germline BRCA1/2 mutation (gBRCAm) breast cancer (HER2-negative,
  ~5-10% of metastatic): olaparib monotherapy is FDA-approved 2L+ for gBRCAm HER2-negative
  metastatic breast cancer based on OlympiAD (Robson NEJM 2017 — mPFS 7.0 vs 4.2 mo,
  HR 0.58); talazoparib monotherapy is FDA-approved on similar criteria (EMBRACA Litton
  NEJM 2018 — mPFS 8.6 vs 5.6 mo, HR 0.54) per SRC-NCCN-BREAST-2025, SRC-ESMO-BREAST-METASTATIC-2024.
  In the adjuvant setting, olaparib for 1y is FDA-approved for gBRCAm HER2-negative
  high-risk early breast cancer based on OlympiA (Tutt NEJM 2021 — IDFS HR 0.58, OS
  HR 0.68) per SRC-NCCN-BREAST-2025, SRC-ESMO-BREAST-EARLY-2024.

  '
evidence_summary_ua: 'герміногенний BRCA1/2 мутація (gBRCAm) рак молочної залози (HER2-negative,
  ~5-10% of метастатичний): олапариб монотерапія is схвалений FDA 2L+ for gBRCAm HER2-negative
  метастатичний рак молочної залози based on OlympiAD (Robson NEJM 2017 — mPFS 7.0
  проти 4.2 міс., HR 0.58); талазопариб монотерапія is схвалений FDA on подібний criteria
  (EMBRACA Litton NEJM 2018 — mPFS 8.6 проти 5.6 міс., HR 0.54) per SRC-NCCN-BREAST-2025,
  SRC-ESMO-BREAST-метастатичний-2024. In the ад''ювантний setting, олапариб for 1y
  is FDA-схвалений для gBRCAm HER2-negative високого ризику early рак молочної залози
  based on OlympiA (Tutt NEJM 2021 — IDFS HR 0.58, OS HR 0.68) per SRC-NCCN-BREAST-2025,
  SRC-ESMO-BREAST-EARLY-2024.

  '
