id: BMA-BCR-ABL1-P210-CML
biomarker_id: BIO-BCR-ABL1
variant_qualifier: "p210 (e13a2 / e14a2) — typical CML"
disease_id: DIS-CML
escat_tier: "IA"
oncokb_level: "1"
evidence_summary: >
  BCR-ABL1 p210 (e13a2/e14a2) defines chronic-phase CML and is the
  paradigm targeted-therapy success story. Imatinib 1L (IRIS, O'Brien
  2003) established BCR-ABL1 TKI as standard; 2nd-gen TKIs
  (dasatinib/nilotinib/bosutinib) achieve faster, deeper molecular
  responses with similar OS. Asciminib (ASCEMBL, Réa 2021) is the
  first STAMP-class allosteric TKI for resistant disease.
regulatory_approval:
  fda:
    - "imatinib — 1L CP-CML (FDA approved 2001)"
    - "dasatinib / nilotinib / bosutinib — 1L and 2L CP-CML (FDA approved)"
    - "asciminib — pretreated CP-CML and 1L (FDA approved 2021/2024)"
  ema:
    - "imatinib / dasatinib / nilotinib / bosutinib — CP-CML (EMA approved)"
    - "asciminib — pretreated CP-CML (EMA approved)"
  ukraine:
    - "imatinib — НСЗУ-reimbursed for CML"
recommended_combinations:
  - "imatinib monotherapy (1L, low-cost standard)"
  - "dasatinib monotherapy (1L)"
  - "nilotinib monotherapy (1L)"
  - "bosutinib monotherapy (1L)"
  - "asciminib monotherapy (resistant or 1L per ASC4FIRST)"
contraindicated_monotherapy: []
primary_sources:
  - SRC-ELN-CML-2025
  - SRC-IRIS-OBRIEN-2003
  - SRC-ASCEMBL-REA-2021
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IA. OncoKB Level 1. Monitoring by RT-qPCR on International Scale;
  MMR (≤0.1% IS at 12mo) defines optimal response per ELN 2020/2025.
  Choice of 1L TKI driven by comorbidity profile (cardiovascular for
  nilotinib; pleural effusion for dasatinib; etc.).
