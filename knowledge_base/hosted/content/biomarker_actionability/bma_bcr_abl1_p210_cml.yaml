id: BMA-BCR-ABL1-P210-CML
biomarker_id: BIO-BCR-ABL1
variant_qualifier: "p210 (e13a2 / e14a2) — typical CML"
disease_id: DIS-CML
escat_tier: "IA"
evidence_summary: >
  BCR-ABL1 p210 (e13a2/e14a2) defines chronic-phase CML and is the
  paradigm targeted-therapy success story. Imatinib 1L (IRIS, O'Brien
  2003) established BCR-ABL1 TKI as standard; 2nd-gen TKIs
  (dasatinib/nilotinib/bosutinib) achieve faster, deeper molecular
  responses with similar OS. Asciminib (ASCEMBL, Réa 2021) is the
  first STAMP-class allosteric TKI for resistant disease.
evidence_summary_ua: >
  BCR-ABL1 p210 (e13a2/e14a2) defines chronic-phase CML and is the paradigm targeted-терапія success story. іматиніб 1L (IRIS, O'Brien 2003) усталений BCR-ABL1 TKI as стандарт; 2nd-gen TKIs (дазатиніб/нілотиніб/бозутиніб) achieve faster, deeper molecular responses with подібний OS. асциминіб (ASCEMBL, Réa 2021) is the first STAMP-class allosteric TKI for resistant хвороба.
