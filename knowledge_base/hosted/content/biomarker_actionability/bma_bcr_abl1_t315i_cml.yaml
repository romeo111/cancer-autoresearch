id: BMA-BCR-ABL1-T315I-CML
biomarker_id: BIO-BCR-ABL1
variant_qualifier: "T315I (gatekeeper resistance)"
disease_id: DIS-CML
escat_tier: "IA"
oncokb_level: "R1"
evidence_summary: >
  BCR-ABL1 T315I is the gatekeeper mutation conferring pan-resistance
  to imatinib, dasatinib, nilotinib, and bosutinib. Ponatinib (PACE,
  Cortes 2013) is approved for T315I+ CML. Asciminib (allosteric STAMP
  inhibitor) at higher dose (200 mg BID) also has T315I activity per
  ASCEMBL extension and dedicated cohorts. Allo-HCT remains a salvage
  option in eligible patients.
evidence_summary_ua: >
  BCR-ABL1 T315I is the gatekeeper мутація conferring pan-резистентність до іматиніб, дазатиніб, нілотиніб, and бозутиніб. понатиніб (PACE, Cortes 2013) is схвалений для T315I+ CML. асциминіб (allosteric STAMP інгібітор) at higher доза (200 mg BID) also has T315I activity per ASCEMBL extension and dedicated cohorts. Allo-HCT remains a сальвадж option in eligible patients.
