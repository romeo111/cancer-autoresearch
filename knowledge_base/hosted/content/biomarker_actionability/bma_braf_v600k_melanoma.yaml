id: BMA-BRAF-V600K-MELANOMA
biomarker_id: BIO-BRAF-V600E
variant_qualifier: V600K
disease_id: DIS-MELANOMA
escat_tier: IA
evidence_summary: 'BRAF V600K (~10-20% of BRAF-mutant melanomas) shares all BRAF/MEKi
  approvals with V600E. Slightly lower ORR in pooled analyses (COMBI-d/v subgroup)
  but PFS/OS benefit preserved. Companion-diagnostic kits (cobas, THxID) detect both
  V600E and V600K.

  '
evidence_summary_ua: 'BRAF V600K (~10-20% of BRAF-mutant melanomas) shares all BRAF/MEKi
  approvals with V600E. Slightly lower ORR in pooled analyses (COMBI-d/v subgroup)
  but PFS/OS виграш preserved. Companion-діагностичний kits (cobas, THxID) detect
  both V600E and V600K.

  '
