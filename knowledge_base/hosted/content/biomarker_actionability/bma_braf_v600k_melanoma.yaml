id: BMA-BRAF-V600K-MELANOMA
biomarker_id: BIO-BRAF-V600E
variant_qualifier: "V600K"
disease_id: DIS-MELANOMA
escat_tier: "IA"
oncokb_level: "1"
evidence_summary: >
  BRAF V600K (~10-20% of BRAF-mutant melanomas) shares all
  BRAF/MEKi approvals with V600E. Slightly lower ORR in pooled
  analyses (COMBI-d/v subgroup) but PFS/OS benefit preserved.
  Companion-diagnostic kits (cobas, THxID) detect both V600E and
  V600K.
regulatory_approval:
  fda:
    - "dabrafenib + trametinib — V600E/K (FDA 2014)"
    - "encorafenib + binimetinib — V600E/K (FDA 2018)"
  ema:
    - "dabrafenib + trametinib — V600 (EMA 2015)"
    - "encorafenib + binimetinib — V600 (EMA 2018)"
  ukraine: []
recommended_combinations:
  - "dabrafenib + trametinib"
  - "encorafenib + binimetinib"
  - "vemurafenib + cobimetinib"
contraindicated_monotherapy:
  - "BRAFi monotherapy (vemurafenib alone) — inferior to combo"
primary_sources:
  - SRC-NCCN-MELANOMA-2025
  - SRC-ESMO-MELANOMA-2024
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IA (combined V600E/K). Treat identically to V600E. V600R
  (very rare, <1%) also responds; V600M anecdotal.
