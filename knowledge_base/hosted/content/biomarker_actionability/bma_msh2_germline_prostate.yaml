id: BMA-MSH2-GERMLINE-PROSTATE
biomarker_id: BIO-DMMR-IHC
variant_qualifier: MSH2 germline loss-of-function (dMMR / MSI-H)
disease_id: DIS-PROSTATE
escat_tier: IA
evidence_summary: 'MSH2 germline loss-of-function in prostate produces dMMR/MSI-H
  phenotype. Pan- tumor MSI-H ICI eligibility (pembrolizumab per KEYNOTE-158, dostarlimab
  per GARNET) supersedes tumor-specific lines via tissue-agnostic FDA approval. MSI-H
  in prostate is rare (~3-5%); pembrolizumab tissue-agnostic applies in mCRPC after
  standard therapy.

  '
evidence_summary_ua: 'MSH2 герміногенний втрата функції in prostate produces dMMR/MSI-H
  фенотип. Pan- пухлина MSI-H ICI eligibility (пембролізумаб per KEYNOTE-158, dostarlimab
  per GARNET) supersedes пухлина-specific lines via tissue-agnostic FDA схвалення.
  MSI-H in prostate is рідкісний (~3-5%); пембролізумаб tissue-agnostic applies in
  mCRPC after стандарт терапія.

  '
