id: BMA-BRAF-V600E-MM
biomarker_id: BIO-BRAF-V600E
variant_qualifier: "V600E"
disease_id: DIS-MM
escat_tier: "IIIA"
oncokb_level: "3B"
evidence_summary: >
  BRAF V600E is found in ~4% of multiple myeloma at diagnosis (more
  in extramedullary / plasma cell leukemia). Case series and small
  prospective cohorts (Andrulis et al. 2013, Sharman et al. 2015)
  document responses to vemurafenib monotherapy and BRAFi+MEKi
  combinations off-label, especially in plasmablastic / aggressive
  R/R disease. Not standard-of-care; tissue-agnostic dabrafenib +
  trametinib (BRAF V600E solid tumor approval 2022) does not
  formally extend to heme but is invoked as off-label rationale.
evidence_summary_ua: >
  BRAF V600E is found in ~4% of множинна мієлома при діагнозі (more in extramedullary / plasma cell лейкоз). Case series and small prospective cohorts (Andrulis et al. 2013, Sharman et al. 2015) document responses to вемурафеніб монотерапія and BRAFi+MEKi combinations off-label, особливо in plasmablastic / агресивний р/р хвороба. Not стандарт-of-care; tissue-agnostic дабрафеніб + траметиніб (BRAF V600E solid пухлина схвалення 2022) does not formally extend to heme but is invoked as off-label rationale.
