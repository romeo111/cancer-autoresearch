id: BMA-PIK3CA-HOTSPOT-ENDOMETRIAL
biomarker_id: BIO-PIK3CA-MUTATION
variant_qualifier: "hotspot (E545K / E542K / H1047R)"
disease_id: DIS-ENDOMETRIAL
escat_tier: "IIIA"
oncokb_level: "3B"
evidence_summary: >
  PIK3CA mutations occur in ~30-50% of endometrioid endometrial
  cancers, often co-occurring with PTEN loss. PI3Ki/AKTi/mTORi
  monotherapy modest activity (everolimus + letrozole
  recommended). Tissue-agnostic capivasertib not formally
  approved in endometrial.
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
  - "everolimus + letrozole"
  - "capivasertib (off-label tissue-agnostic rationale)"
contraindicated_monotherapy: []
primary_sources:
  - SRC-NCCN-UTERINE-2025
  - SRC-ESGO-ENDOMETRIAL-2025
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IIIA. POLE/MMR/p53 molecular subtype guides primary 1L choice (dostarlimab/pembrolizumab + carbo/pacli).
