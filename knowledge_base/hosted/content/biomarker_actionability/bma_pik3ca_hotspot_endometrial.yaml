id: BMA-PIK3CA-HOTSPOT-ENDOMETRIAL
biomarker_id: BIO-PIK3CA-MUTATION
variant_qualifier: hotspot (E545K / E542K / H1047R)
disease_id: DIS-ENDOMETRIAL
escat_tier: IIIA
evidence_summary: 'PIK3CA mutations occur in ~30-50% of endometrioid endometrial cancers,
  often co-occurring with PTEN loss. PI3Ki/AKTi/mTORi monotherapy modest activity
  (everolimus + letrozole recommended). Tissue-agnostic capivasertib not formally
  approved in endometrial.

  '
evidence_summary_ua: 'PIK3CA мутації occur in ~30-50% of endometrioid endometrial
  cancers, часто співіснуючий with PTEN loss. PI3Ki/AKTi/mTORi монотерапія modest
  activity (еверолімус + летрозол рекомендований). Tissue-agnostic capivasertib not
  formally схвалений in endometrial.

  '
