id: BMA-RET-CCDC6-NSCLC
biomarker_id: BIO-RET
variant_qualifier: CCDC6-RET fusion
disease_id: DIS-NSCLC
escat_tier: IA
evidence_summary: 'CCDC6-RET fusion is the second-most common RET fusion in NSCLC
  (~10-20%). Response to selective RET-TKIs (selpercatinib LIBRETTO-001, pralsetinib
  ARROW) is comparable to KIF5B-RET — fusion-partner identity does not currently modify
  treatment selection.

  '
evidence_summary_ua: 'CCDC6-RET злиття is the second-найбільш поширений RET злиття
  in NSCLC (~10-20%). відповідь to селективний RET-TKIs (селперкатиніб LIBRETTO-001,
  пралсетиніб ARROW) is співставний з KIF5B-RET — злиття-partner identity does not
  currently modify лікування selection.

  '
