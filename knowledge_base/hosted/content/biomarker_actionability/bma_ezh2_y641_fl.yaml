notes: >
  ESCAT IB / OncoKB Level 1. cobas EZH2 Mutation Test is the
  companion diagnostic. EZH2-WT subset has FDA approval as well but
  with ~halved ORR — mutation testing improves selection per ESMO 2024.
  EZH2-Y641 in DLBCL: investigational; not approved (DLBCL trials in
  combination with R-CHOP have not yet read out positively per
  SRC-NCCN-BCELL-2025). Source-gap: SRC-E7438-202 (Morschhauser 2020)
  not yet ingested.
