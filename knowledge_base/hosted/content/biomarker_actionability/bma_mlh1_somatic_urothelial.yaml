id: BMA-MLH1-SOMATIC-UROTHELIAL
biomarker_id: BIO-DMMR-IHC
variant_qualifier: "MLH1 somatic loss-of-function (dMMR / MSI-H)"
disease_id: DIS-UROTHELIAL
escat_tier: "IB"
oncokb_level: "1"
evidence_summary: >
  MLH1 somatic loss-of-function in urothelial produces dMMR/MSI-H phenotype.
  Pan-tumor MSI-H ICI eligibility (pembrolizumab per KEYNOTE-158, dostarlimab
  per GARNET) supersedes tumor-specific lines via tissue-agnostic FDA approval.
  MSI-H in urothelial is rare (~3-5%); pembrolizumab tissue-agnostic applies.
evidence_summary_ua: >
  MLH1 соматичний втрата функції in urothelial produces dMMR/MSI-H фенотип. Pan-пухлина MSI-H ICI eligibility (пембролізумаб per KEYNOTE-158, dostarlimab per GARNET) supersedes пухлина-specific lines via tissue-agnostic FDA схвалення. MSI-H in urothelial is рідкісний (~3-5%); пембролізумаб tissue-agnostic applies.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
  fda:
    - "pembrolizumab — pan-tumor MSI-H/dMMR"
  ema: []
  ukraine: []
recommended_combinations:
  - "pembrolizumab monotherapy (pan-tumor MSI-H, FDA 2017)"
  - "standard urothelial therapy (cisplatin or ICI 1L per PD-L1)"
contraindicated_monotherapy: []
primary_sources:
  - SRC-NCCN-BLADDER-2025
  - SRC-EAU-PROSTATE-2024
  - SRC-ONCOKB
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  Somatic MLH1 loss → cascade testing optional (reflex germline confirmation
  strongly recommended; ~30% of dMMR tumors have germline cause). Pan-tumor
  MSI-H ICI eligibility supersedes tumor-specific lines.
