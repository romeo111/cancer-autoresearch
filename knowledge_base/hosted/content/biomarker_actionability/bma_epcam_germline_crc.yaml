id: BMA-EPCAM-GERMLINE-CRC
biomarker_id: BIO-DMMR-IHC
variant_qualifier: "EPCAM germline 3' deletion (silences MSH2 by promoter methylation) → Lynch"
disease_id: DIS-CRC
escat_tier: "IA"
oncokb_level: "1"
evidence_summary: >
  EPCAM germline deletion (3' end) silences downstream MSH2 by promoter
  hypermethylation → Lynch syndrome with isolated MSH2/MSH6 protein loss on IHC.
  Treat as MSH2-equivalent Lynch: pembrolizumab 1L mCRC dMMR (KEYNOTE-177); pan-
  tumor MSI-H ICI eligibility supersedes tumor-specific lines. ESCAT IA / OncoKB
  Level 1.
evidence_summary_ua: >
  EPCAM герміногенний делеція (3' end) silences downstream MSH2 by promoter hypermethylation → Lynch syndrome with isolated MSH2/MSH6 protein loss on IHC. Treat as MSH2-еквівалентний Lynch: пембролізумаб 1L mCRC dMMR (KEYNOTE-177); pan- пухлина MSI-H ICI eligibility supersedes пухлина-specific lines. ESCAT IA / OncoKB рівень 1.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
  fda:
    - "pembrolizumab — 1L MSI-H/dMMR mCRC"
    - "pembrolizumab — pan-tumor MSI-H/dMMR"
  ema:
    - "pembrolizumab — 1L dMMR mCRC"
  ukraine: []
recommended_combinations:
  - "pembrolizumab monotherapy (1L mCRC dMMR, KEYNOTE-177)"
  - "nivolumab + ipilimumab (2L+, CheckMate-142)"
contraindicated_monotherapy:
  - "FOLFOX/FOLFIRI 1L in dMMR mCRC (inferior to ICI)"
  - "adjuvant 5-FU monotherapy in stage II dMMR"
primary_sources:
  - SRC-NCCN-COLON-2025
  - SRC-ESMO-COLON-2024
  - SRC-ONCOKB
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  EPCAM-Lynch is rarer than MLH1/MSH2/MSH6/PMS2 Lynch (~1-3% of Lynch cases).
  Cascade testing mandatory; family-line implications identical to MSH2 Lynch.
  Pan-tumor MSI-H ICI eligibility supersedes tumor-specific lines.
