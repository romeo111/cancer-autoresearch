id: BMA-BRCA1-GERMLINE-OVARIAN
biomarker_id: BIO-BRCA1-BRCA2-GERMLINE
variant_qualifier: "BRCA1 germline pathogenic"
disease_id: DIS-OVARIAN
escat_tier: "IA"
oncokb_level: "1"
evidence_summary: >
  BRCA1 germline pathogenic variants in advanced epithelial ovarian carcinoma
  (incl. fallopian-tube and primary peritoneal): olaparib maintenance after
  platinum-response in 1L (SOLO1, Moore 2018) yields ~70% reduction in
  progression risk; niraparib (NOVA, Mirza 2016) and rucaparib (ARIEL3) extend
  PFS in platinum-sensitive recurrence. ESCAT IA / OncoKB Level 1.
evidence_summary_ua: >
  BRCA1 герміногенний патогенний варіанти in поширений epithelial ovarian карцинома (incl. fallopian-tube and primary peritoneal): олапариб підтримка after platinum-відповідь in 1L (SOLO1, Moore 2018) yields ~70% зниження in прогресування risk; нірапариб (NOVA, Mirza 2016) and рукапариб (ARIEL3) extend PFS in platinum-sensitive рецидив. ESCAT IA / OncoKB рівень 1.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
  fda:
    - "olaparib — 1L maintenance gBRCAm advanced EOC (FDA 2018)"
    - "niraparib — maintenance platinum-sensitive recurrent EOC (FDA 2017)"
    - "rucaparib — gBRCAm/sBRCAm 3L+ EOC (FDA 2016)"
  ema:
    - "olaparib — 1L maintenance gBRCAm/sBRCAm advanced EOC (EMA 2019)"
    - "niraparib — maintenance recurrent EOC (EMA 2017)"
  ukraine: []
recommended_combinations:
  - "olaparib monotherapy maintenance"
  - "niraparib monotherapy maintenance"
  - "rucaparib monotherapy maintenance"
  - "olaparib + bevacizumab (PAOLA-1, HRD+)"
contraindicated_monotherapy: []
primary_sources:
  - SRC-NCCN-OVARIAN-2025
  - SRC-ESMO-OVARIAN-2024
  - SRC-ONCOKB
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  Germline finding mandates cascade testing for first-degree relatives. Includes
  primary peritoneal and fallopian-tube carcinomas (treated as ovarian-
  equivalent). PAOLA-1 supports olaparib+bev in HRD-positive (BRCA-mutant subset
  benefits most).
