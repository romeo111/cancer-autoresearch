id: BMA-EGFR-C797S-NSCLC
biomarker_id: BIO-EGFR-MUTATION
variant_qualifier: C797S
disease_id: DIS-NSCLC
escat_tier: IIB
evidence_summary: 'EGFR C797S is the principal acquired resistance mutation to osimertinib.
  Cis-configuration with T790M renders all currently approved 3rd-gen EGFR-TKIs ineffective;
  trans-configuration may respond to combination 1st-gen + osimertinib. Investigational
  4th-gen EGFR-TKIs (BLU-945, BBT-176) and amivantamab+chemo (MARIPOSA-2) are active
  options.

  '
evidence_summary_ua: 'EGFR C797S is the principal набутий резистентна мутація to осимертиніб.
  Cis-configuration with T790M renders all currently схвалений 3rd-gen EGFR-TKIs ineffective;
  trans-configuration may respond to комбінація 1st-gen + осимертиніб. експериментальний
  4th-gen EGFR-TKIs (BLU-945, BBT-176) and амівантамаб+chemo (MARIPOSA-2) are active
  options.

  '
