id: BMA-CHEK2-GERMLINE-BREAST
biomarker_id: BIO-HRR-PANEL
variant_qualifier: "CHEK2 germline pathogenic"
disease_id: DIS-BREAST
escat_tier: "IIA"
oncokb_level: "3A"
evidence_summary: >
  CHEK2 germline pathogenic (e.g. 1100delC) confers ~2× breast-cancer risk; no
  PARPi activity demonstrated (TBCRC-048 CHEK2 cohort minimal response).
  Standard HR/HER2-directed therapy. ESCAT IIA (predisposition) / OncoKB Level
  3A.
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
  - "standard breast therapy by subtype"
  - "enhanced screening (annual MRI from age 40)"
contraindicated_monotherapy:
  - "PARPi monotherapy (no demonstrated benefit)"
primary_sources:
  - SRC-NCCN-BREAST-2025
  - SRC-ESMO-BREAST-METASTATIC-2024
  - SRC-ONCOKB
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  Cascade testing per NCCN. CHEK2 c.1100delC (Eastern European founder) is the
  most common pathogenic variant. Bilateral mastectomy not routinely recommended
  (risk lower than BRCA).
