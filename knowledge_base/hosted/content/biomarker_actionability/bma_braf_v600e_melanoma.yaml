id: BMA-BRAF-V600E-MELANOMA
biomarker_id: BIO-BRAF-V600E
variant_qualifier: "V600E"
disease_id: DIS-MELANOMA
escat_tier: "IA"
oncokb_level: "1"
evidence_summary: >
  BRAF V600E (and V600K) in cutaneous melanoma is the prototypical
  driver: combination BRAF + MEK inhibition (dabrafenib + trametinib;
  encorafenib + binimetinib; vemurafenib + cobimetinib) yields high
  ORR (~65-70%) and improves OS vs single-agent BRAFi (COMBI-d/v,
  coBRIM, COLUMBUS). Adjuvant dabrafenib + trametinib improves RFS in
  resected stage III (COMBI-AD). Triplet with anti-PD-1 (atezolizumab
  + vemurafenib + cobimetinib; IMspire150) extends PFS over doublet.
evidence_summary_ua: >
  BRAF V600E (and V600K) in cutaneous меланома is the prototypical driver: комбінація BRAF + MEK inhibition (дабрафеніб + траметиніб; енкорафеніб + біниметиніб; вемурафеніб + кобіметиніб) yields high ORR (~65-70%) and покращує OS vs single-agent BRAFi (COMBI-d/v, coBRIM, COLUMBUS). ад'ювантний дабрафеніб + траметиніб покращує RFS in resected stage III (COMBI-AD). триплет with anti-PD-1 (атезолізумаб + вемурафеніб + кобіметиніб; IMspire150) extends PFS over дублет.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
  fda:
    - "dabrafenib + trametinib — unresectable/metastatic V600E/K (FDA 2014); adjuvant stage III V600E/K (FDA 2018)"
    - "encorafenib + binimetinib — unresectable/metastatic V600E/K (FDA 2018)"
    - "vemurafenib + cobimetinib — unresectable/metastatic V600E (FDA 2015)"
    - "atezolizumab + vemurafenib + cobimetinib — V600 mutation-positive (FDA 2020)"
  ema:
    - "dabrafenib + trametinib — advanced + adjuvant V600 (EMA 2015 / 2018)"
    - "encorafenib + binimetinib — V600 (EMA 2018)"
    - "vemurafenib + cobimetinib — V600 (EMA 2015)"
  ukraine:
    - "vemurafenib (Zelboraf) — registered; dabrafenib + trametinib via NSZU programs"
recommended_combinations:
  - "dabrafenib + trametinib"
  - "encorafenib + binimetinib"
  - "vemurafenib + cobimetinib"
  - "atezolizumab + vemurafenib + cobimetinib (triplet)"
contraindicated_monotherapy:
  - "BRAFi monotherapy (vemurafenib alone) — inferior OS vs combo, paradoxical RAS/RAF activation in BRAF-WT clones"
primary_sources:
  - SRC-NCCN-MELANOMA-2025
  - SRC-ESMO-MELANOMA-2024
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IA per ESMO precision-medicine WG. OncoKB Level 1. Companion
  diagnostics: cobas 4800 BRAF V600 Mutation Test, THxID-BRAF,
  FoundationOne CDx. V600K behaves clinically like V600E (slightly
  lower response rates) and shares all approvals.
