id: BMA-KIT-MUTATION-AML
biomarker_id: BIO-KIT
variant_qualifier: "activating mutation (exon 17 D816V / N822K most common; ~25-30% of core-binding-factor AML)"
disease_id: DIS-AML
escat_tier: "IIA"
oncokb_level: "3A"
evidence_summary: >
  KIT mutation in core-binding-factor (CBF) AML (t(8;21) / inv(16))
  is enriched (~25-30%) and confers worse OS vs CBF-AML wild-type.
  Dasatinib + 7+3 + HiDAC consolidation (CALGB-10801, Marcucci
  Blood 2020 — CBF-AML setting) is being studied; not standard.
  Avapritinib has activity in D816V-mutant AML basket cohorts but
  no AML approval. ELN 2022 considers KIT mutation in CBF-AML as
  intermediate/adverse-risk modifier within the favorable CBF subset.
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
  - "standard 7+3 + HiDAC consolidation (CBF-AML backbone)"
  - "dasatinib + 7+3 + HiDAC (CALGB-10801 trial / off-label intensification for CBF-AML KIT-mut)"
  - "avapritinib (D816V-AML, basket trial)"
contraindicated_monotherapy:
  - "imatinib (D816V-resistant; not active in CBF-AML in clinical trials)"
primary_sources:
  - SRC-NCCN-AML-2025
  - SRC-ELN-AML-2022
  - SRC-ONCOKB
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IIA. OncoKB Level 3A. KIT testing should be performed on every
  CBF-AML at diagnosis; result modifies prognosis and trial eligibility
  but does not yet change standard-of-care chemo backbone outside
  trials. Trial-source gap: SRC-CALGB-10801 not yet ingested.
