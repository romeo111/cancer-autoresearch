id: BMA-EGFR-L858R-NSCLC
biomarker_id: BIO-EGFR-MUTATION
variant_qualifier: "L858R"
disease_id: DIS-NSCLC
escat_tier: "IA"
evidence_summary: >
  EGFR L858R in advanced NSCLC: osimertinib 1L is standard (FLAURA);
  L858R historically shows somewhat lower TKI response than exon 19 del,
  prompting interest in combination strategies (FLAURA2 chemo combo;
  MARIPOSA amivantamab+lazertinib). Adjuvant osimertinib indicated post
  resection (ADAURA).
evidence_summary_ua: >
  EGFR L858R in поширений NSCLC: осимертиніб 1L is стандарт (FLAURA); L858R historically shows somewhat lower TKI відповідь than exon 19 del, prompting interest in комбінація strategies (FLAURA2 chemo combo; MARIPOSA амівантамаб+лазертиніб). ад'ювантний осимертиніб indicated post resection (ADAURA).
