id: BMA-EGFR-L858R-NSCLC
biomarker_id: BIO-EGFR-MUTATION
variant_qualifier: "L858R"
disease_id: DIS-NSCLC
escat_tier: "IA"
oncokb_level: "1"
evidence_summary: >
  EGFR L858R in advanced NSCLC: osimertinib 1L is standard (FLAURA);
  L858R historically shows somewhat lower TKI response than exon 19 del,
  prompting interest in combination strategies (FLAURA2 chemo combo;
  MARIPOSA amivantamab+lazertinib). Adjuvant osimertinib indicated post
  resection (ADAURA).
regulatory_approval:
  fda:
    - "osimertinib — 1L EGFR-mutated NSCLC (FDA approved 2018)"
    - "osimertinib — adjuvant resected EGFR-mutated NSCLC (FDA approved 2020)"
    - "amivantamab + lazertinib — 1L EGFR-mutated NSCLC (FDA approved 2024)"
  ema:
    - "osimertinib — 1L and adjuvant EGFR-mutated NSCLC (EMA approved)"
  ukraine: []
recommended_combinations:
  - "osimertinib monotherapy"
  - "osimertinib + pemetrexed/platinum (FLAURA2)"
  - "amivantamab + lazertinib (MARIPOSA)"
contraindicated_monotherapy: []
primary_sources:
  - SRC-NCCN-NSCLC-2025
  - SRC-ESMO-NSCLC-METASTATIC-2024
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IA. OncoKB Level 1. L858R+co-occurring TP53 mutation associates
  with shorter PFS — consider combination 1L for high-risk subset.
