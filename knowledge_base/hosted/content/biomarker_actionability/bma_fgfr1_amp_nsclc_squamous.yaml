id: BMA-FGFR1-AMP-NSCLC-SQUAMOUS
biomarker_id: BIO-FGFR1
variant_qualifier: "amplification (squamous histology, GCN ≥6 / FGFR1/CEN8 ≥2)"
disease_id: DIS-NSCLC
escat_tier: "IIIA"
oncokb_level: "3B"
evidence_summary: >
  FGFR1 amplification in squamous NSCLC (~15-20%). Multiple FGFR-TKI
  trials (lucitanib, AZD4547, BGJ398, erdafitinib) showed modest
  activity (ORR 5-15%) — FGFR1-amp does not predict robust response.
  Erdafitinib is NOT approved for FGFR1-amp NSCLC (label is FGFR2/3 in
  urothelial). Standard squamous NSCLC therapy applies; FGFR1-amp is
  trial-only actionability.
evidence_summary_ua: >
  FGFR1 ампліфікація in squamous NSCLC (~15-20%). Multiple FGFR-TKI trials (lucitanib, AZD4547, BGJ398, erdafitinib) showed modest activity (ORR 5-15%) — FGFR1-amp does not predict robust відповідь. Erdafitinib is NOT схвалений для FGFR1-amp NSCLC (label is FGFR2/3 in urothelial). стандарт squamous NSCLC терапія applies; FGFR1-amp is дослідження-only actionability.
