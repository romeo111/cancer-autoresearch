id: BMA-ROS1-CD74-NSCLC
biomarker_id: BIO-ROS1-FUSION
variant_qualifier: "CD74-ROS1 fusion"
disease_id: DIS-NSCLC
escat_tier: "IA"
oncokb_level: "1"
evidence_summary: >
  CD74-ROS1 is the most common ROS1 fusion partner in NSCLC (~40-50%
  of ROS1+ cases) and associates with higher rates of brain metastases
  at diagnosis. Treated identically to other ROS1 fusions: entrectinib,
  repotrectinib, or crizotinib 1L.
regulatory_approval:
  fda:
    - "repotrectinib / entrectinib / crizotinib — ROS1+ NSCLC (FDA approved)"
  ema:
    - "repotrectinib / entrectinib / crizotinib — ROS1+ NSCLC (EMA approved)"
  ukraine: []
recommended_combinations:
  - "repotrectinib monotherapy"
  - "entrectinib monotherapy"
  - "crizotinib monotherapy"
contraindicated_monotherapy: []
primary_sources:
  - SRC-NCCN-NSCLC-2025
  - SRC-ESMO-NSCLC-METASTATIC-2024
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IA. CD74-ROS1 specifically linked to higher CNS dissemination —
  bias toward CNS-active TKI (entrectinib, repotrectinib) over crizotinib.
