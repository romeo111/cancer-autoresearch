id: BMA-ROS1-CD74-NSCLC
biomarker_id: BIO-ROS1-FUSION
variant_qualifier: CD74-ROS1 fusion
disease_id: DIS-NSCLC
escat_tier: IA
evidence_summary: 'CD74-ROS1 is the most common ROS1 fusion partner in NSCLC (~40-50%
  of ROS1+ cases) and associates with higher rates of brain metastases at diagnosis.
  Treated identically to other ROS1 fusions: entrectinib, repotrectinib, or crizotinib
  1L.

  '
evidence_summary_ua: 'CD74-ROS1 is the найбільш поширений ROS1 злиття partner in NSCLC
  (~40-50% of ROS1+ cases) and associates with higher rates of метастази в мозок при
  діагнозі. Treated identically to other ROS1 fusions: ентректиніб, репотректиніб,
  or кризотиніб 1L.

  '
