id: BMA-EGFR-T790M-NSCLC
biomarker_id: BIO-EGFR-MUTATION
variant_qualifier: "T790M"
disease_id: DIS-NSCLC
escat_tier: "IA"
oncokb_level: "1"
evidence_summary: >
  EGFR T790M is the dominant acquired-resistance mechanism after 1st/2nd-gen
  EGFR-TKI (gefitinib/erlotinib/afatinib). Osimertinib (3rd-gen) is
  active against T790M and is standard 2L (AURA3, Mok et al. 2017).
  In the modern era T790M is rarely encountered de novo since osimertinib
  has moved to 1L; remains relevant after legacy 1L-TKI use.
regulatory_approval:
  fda:
    - "osimertinib — T790M-positive NSCLC after EGFR-TKI progression (FDA approved 2015/2017)"
  ema:
    - "osimertinib — T790M-positive NSCLC (EMA approved 2016)"
  ukraine: []
recommended_combinations:
  - "osimertinib monotherapy"
contraindicated_monotherapy:
  - "gefitinib (T790M-resistant)"
  - "erlotinib (T790M-resistant)"
  - "afatinib (T790M-resistant)"
primary_sources:
  - SRC-NCCN-NSCLC-2025
  - SRC-ESMO-NSCLC-METASTATIC-2024
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IA. OncoKB Level 1. ctDNA testing at progression on 1st/2nd-gen
  TKI is standard; tissue rebiopsy if plasma negative. Companion
  diagnostic: cobas EGFR Mutation Test v2.
