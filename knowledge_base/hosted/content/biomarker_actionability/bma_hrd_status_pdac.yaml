recommended_combinations:
- FOLFIRINOX (or modified) 1L for fit gBRCAm PDAC (preferred per SRC-NCCN-PANCREATIC-2025,
  SRC-ESMO-PANCREATIC-2024)
- gemcitabine + cisplatin 1L (alternative platinum-based for non-FOLFIRINOX-eligible
  gBRCAm per SRC-NCCN-PANCREATIC-2025)
- olaparib monotherapy maintenance (post-platinum response gBRCAm per SRC-NCCN-PANCREATIC-2025,
  SRC-ESMO-PANCREATIC-2024)
