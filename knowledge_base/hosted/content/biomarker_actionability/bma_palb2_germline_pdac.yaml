evidence_summary: >
  PALB2 germline pathogenic in metastatic PDAC: behaves BRCA-like; case series
  support platinum sensitivity and PARPi activity. POLO germline-only and BRCA-
  restricted; NCCN allows off-label olaparib for HRR-mutated. ESCAT IIA / OncoKB
  Level 3A.
