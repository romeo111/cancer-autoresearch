id: BMA-BCR-ABL1-V299L-CML
biomarker_id: BIO-BCR-ABL1
variant_qualifier: V299L
disease_id: DIS-CML
escat_tier: IB
evidence_summary: 'BCR-ABL1 V299L confers resistance to dasatinib and bosutinib but
  retains sensitivity to nilotinib and ponatinib. Switch to nilotinib is standard
  salvage; ponatinib reserved for multi-TKI-resistant.

  '
evidence_summary_ua: 'BCR-ABL1 V299L confers резистентність до дазатиніб and бозутиніб
  but retains чутливість to нілотиніб and понатиніб. Switch to нілотиніб is стандарт
  сальвадж; понатиніб reserved for multi-TKI-resistant.

  '
