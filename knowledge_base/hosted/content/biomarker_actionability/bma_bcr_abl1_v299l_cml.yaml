id: BMA-BCR-ABL1-V299L-CML
biomarker_id: BIO-BCR-ABL1
variant_qualifier: "V299L"
disease_id: DIS-CML
escat_tier: "IB"
oncokb_level: "R2"
evidence_summary: >
  BCR-ABL1 V299L confers resistance to dasatinib and bosutinib but
  retains sensitivity to nilotinib and ponatinib. Switch to nilotinib
  is standard salvage; ponatinib reserved for multi-TKI-resistant.
regulatory_approval:
  fda:
    - "nilotinib — 2L+ CML (FDA approved)"
    - "ponatinib — multi-TKI-resistant CML (FDA approved)"
  ema:
    - "nilotinib / ponatinib — 2L+ CML (EMA approved)"
  ukraine: []
recommended_combinations:
  - "nilotinib monotherapy"
  - "ponatinib monotherapy"
contraindicated_monotherapy:
  - "dasatinib (resistant)"
  - "bosutinib (resistant)"
primary_sources:
  - SRC-ELN-CML-2025
  - SRC-ELN-CML-2020
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  OncoKB R2. Recurrent dasatinib/bosutinib-resistance mutation;
  treatment switch driven by ELN mutation-guided algorithm.
