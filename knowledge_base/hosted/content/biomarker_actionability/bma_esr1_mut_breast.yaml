id: BMA-ESR1-MUT-BREAST
biomarker_id: BIO-ESR1
variant_qualifier: "ligand-binding-domain hotspots — D538G, Y537S/N/C, L536H, E380Q; acquired during aromatase-inhibitor exposure in ~30-40% of HR+/HER2- metastatic breast progressing on AI"
disease_id: DIS-BREAST
escat_tier: "IB"
evidence_summary: >
  ESR1 ligand-binding-domain mutations confer aromatase-inhibitor (AI)
  resistance through constitutive ER-α activation and are FDA-actionable
  in HR+/HER2-negative metastatic breast cancer post-AI ± CDK4/6i.
  Elacestrant (oral SERD) FDA-approved 2L+ for ESR1-mutated HR+/HER2-
  metastatic disease based on EMERALD (Bidard JCO 2022 — ESR1-mut
  subgroup mPFS 3.8 vs 1.9 mo, HR 0.55; benefit confined to ESR1-mut
  population) per SRC-NCCN-BREAST-2025, SRC-ESMO-BREAST-METASTATIC-2024.
  Detection by serial plasma ctDNA at progression is preferred per
  SRC-NCCN-BREAST-2025.
regulatory_approval:
  fda:
    - "elacestrant — ESR1-mutated HR+/HER2-negative advanced or metastatic breast cancer post-≥1 line endocrine therapy (FDA approved 2023)"
  ema:
    - "elacestrant — ESR1-mutated HR+/HER2-negative advanced breast cancer post-endocrine therapy (EMA approved 2023)"
  ukraine: []
recommended_combinations:
  - "elacestrant monotherapy (ESR1-mut HR+/HER2- post-AI ± CDK4/6i per SRC-NCCN-BREAST-2025, SRC-ESMO-BREAST-METASTATIC-2024)"
contraindicated_monotherapy:
  - "continuation of AI monotherapy at progression in confirmed ESR1-mutated disease (well-documented resistance per SRC-NCCN-BREAST-2025)"
primary_sources:
