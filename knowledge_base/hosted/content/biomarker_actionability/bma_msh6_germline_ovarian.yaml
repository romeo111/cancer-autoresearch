id: BMA-MSH6-GERMLINE-OVARIAN
biomarker_id: BIO-DMMR-IHC
variant_qualifier: "MSH6 germline loss-of-function (dMMR / MSI-H)"
disease_id: DIS-OVARIAN
escat_tier: "IA"
oncokb_level: "1"
evidence_summary: >
  MSH6 germline loss-of-function in ovarian produces dMMR/MSI-H phenotype. Pan-
  tumor MSI-H ICI eligibility (pembrolizumab per KEYNOTE-158, dostarlimab per
  GARNET) supersedes tumor-specific lines via tissue-agnostic FDA approval.
  MSI-H is rare (~3%) in EOC; pembrolizumab tissue-agnostic applies in
  pretreated setting.
regulatory_approval:
  fda:
    - "pembrolizumab — pan-tumor MSI-H/dMMR"
  ema: []
  ukraine: []
recommended_combinations:
  - "pembrolizumab monotherapy (pan-tumor MSI-H/dMMR, FDA 2017)"
  - "standard EOC therapy by HRD/BRCA status"
contraindicated_monotherapy: []
primary_sources:
  - SRC-NCCN-OVARIAN-2025
  - SRC-ESMO-OVARIAN-2024
  - SRC-ONCOKB
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  Germline MSH6 loss → cascade testing mandatory (Lynch syndrome). Family meets
  Amsterdam/Bethesda criteria. Pan-tumor MSI-H ICI eligibility supersedes tumor-
  specific lines.
