id: BMA-MSH6-GERMLINE-OVARIAN
biomarker_id: BIO-DMMR-IHC
variant_qualifier: MSH6 germline loss-of-function (dMMR / MSI-H)
disease_id: DIS-OVARIAN
escat_tier: IA
evidence_summary: 'MSH6 germline loss-of-function in ovarian produces dMMR/MSI-H phenotype.
  Pan- tumor MSI-H ICI eligibility (pembrolizumab per KEYNOTE-158, dostarlimab per
  GARNET) supersedes tumor-specific lines via tissue-agnostic FDA approval. MSI-H
  is rare (~3%) in EOC; pembrolizumab tissue-agnostic applies in pretreated setting.

  '
evidence_summary_ua: 'MSH6 герміногенний втрата функції in ovarian produces dMMR/MSI-H
  фенотип. Pan- пухлина MSI-H ICI eligibility (пембролізумаб per KEYNOTE-158, dostarlimab
  per GARNET) supersedes пухлина-specific lines via tissue-agnostic FDA схвалення.
  MSI-H is рідкісний (~3%) in EOC; пембролізумаб tissue-agnostic applies in pretreated
  setting.

  '
