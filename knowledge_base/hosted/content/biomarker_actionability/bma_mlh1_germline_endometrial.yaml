id: BMA-MLH1-GERMLINE-ENDOMETRIAL
biomarker_id: BIO-DMMR-IHC
variant_qualifier: "MLH1 germline loss-of-function (dMMR / MSI-H)"
disease_id: DIS-ENDOMETRIAL
escat_tier: "IA"
oncokb_level: "1"
evidence_summary: >
  MLH1 germline loss-of-function in endometrial produces dMMR/MSI-H phenotype.
  Pan-tumor MSI-H ICI eligibility (pembrolizumab per KEYNOTE-158, dostarlimab
  per GARNET) supersedes tumor-specific lines via tissue-agnostic FDA approval.
  Advanced/recurrent dMMR endometrial: dostarlimab + carbo/paclitaxel 1L (RUBY)
  and pembrolizumab + carbo/paclitaxel (NRG-GY018) doubled PFS.
  Dostarlimab/pembrolizumab monotherapy in 2L+. Adjuvant ICI in early-stage dMMR
  under study.
evidence_summary_ua: >
  MLH1 герміногенний втрата функції in endometrial produces dMMR/MSI-H фенотип. Pan-пухлина MSI-H ICI eligibility (пембролізумаб per KEYNOTE-158, dostarlimab per GARNET) supersedes пухлина-specific lines via tissue-agnostic FDA схвалення. поширений/рецидивний dMMR endometrial: dostarlimab + carbo/паклітаксел 1L (RUBY) and пембролізумаб + carbo/паклітаксел (NRG-GY018) doubled PFS. Dostarlimab/пембролізумаб монотерапія in 2L+. ад'ювантний ICI in ранньої стадії dMMR under дослідження.
