id: BMA-RET-C634R-MTC
biomarker_id: BIO-RET
variant_qualifier: "C634R (germline — MEN2A)"
disease_id: DIS-MTC
escat_tier: "IB"
oncokb_level: "1"
evidence_summary: >
  RET C634R is the most common MEN2A germline variant. In advanced /
  metastatic MEN2A-driven MTC, selpercatinib and pralsetinib have
  activity comparable to M918T disease (LIBRETTO-001 RET-mutant MTC
  cohort). FDA labels for selpercatinib/pralsetinib in RET-mutant MTC
  encompass germline / extracellular-domain variants. C634R also
  drives prophylactic-thyroidectomy timing in MEN2A kindred.
evidence_summary_ua: >
  RET C634R is the найбільш поширений MEN2A герміногенний варіант. In поширений / метастатичний MEN2A-driven MTC, селперкатиніб and пралсетиніб have activity співставний з M918T хвороба (LIBRETTO-001 RET-mutant MTC cohort). FDA labels for селперкатиніб/пралсетиніб in RET-mutant MTC encompass герміногенний / extracellular-domain варіанти. C634R also drives prophylactic-thyroidectomy timing in MEN2A kindred.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
  fda:
    - "selpercatinib — advanced/metastatic RET-mutant MTC (FDA accelerated 2020, full 2022)"
    - "pralsetinib — advanced/metastatic RET-mutant MTC (FDA accelerated 2020)"
  ema:
    - "selpercatinib / pralsetinib — RET-mutant advanced MTC (EMA approved 2021)"
  ukraine: []
recommended_combinations:
  - "selpercatinib monotherapy"
  - "pralsetinib monotherapy"
contraindicated_monotherapy:
  - "cabozantinib / vandetanib (selective-TKI preferred in selective-TKI era)"
primary_sources:
  - SRC-ONCOKB
  - SRC-NCCN-CNS-2025
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IB (slightly lower than M918T because LIBRETTO-531 1L
  superiority data are most robust in M918T-enriched cohorts; C634
  is treated identically by FDA label and clinical practice).
  OncoKB Level 1. Mandatory pheochromocytoma + hyperparathyroidism
  screening (MEN2A syndrome). Source-gap: SRC-NCCN-THYROID
  placeholder; SRC-LIBRETTO-001 not yet ingested.
