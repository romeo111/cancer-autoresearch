id: BMA-CCND1-T1114-MCL
biomarker_id: BIO-T11-14-IGH-CCND1
variant_qualifier: "t(11;14)(q13;q32) IGH/CCND1"
disease_id: DIS-MCL
escat_tier: "IA"
evidence_summary: >
  t(11;14) IGH/CCND1 is the defining genetic lesion of MCL — drives
  cyclin D1 overexpression. BTKi (acalabrutinib + rituximab — TRIANGLE,
  Dreyling Lancet 2024; ECHO — Wang NEJM 2024) is the new 1L standard
  regardless of fitness for TP53-mut; high-dose AraC + autoSCT
  historically (LyMa, MCL Younger). Venetoclax (CCND1 → BCL2-mediated
  anti-apoptosis rationale) active R/R.
evidence_summary_ua: >
  t(11;14) IGH/CCND1 is the defining genetic lesion of MCL — drives cyclin D1 гіперекспресія. BTKi (акалабрутиніб + ритуксимаб — TRIANGLE, Dreyling Lancet 2024; ECHO — Wang NEJM 2024) is the new 1L стандарт regardless of fitness for TP53-mut; high-доза AraC + аутоТГСК historically (LyMa, MCL Younger). венетоклакс (CCND1 → BCL2-mediated anti-apoptosis rationale) active р/р.
