id: BMA-ROS1-G2032R-NSCLC
biomarker_id: BIO-ROS1-FUSION
variant_qualifier: G2032R (acquired resistance)
disease_id: DIS-NSCLC
escat_tier: IB
evidence_summary: 'ROS1 G2032R is the dominant solvent-front resistance mutation after
  crizotinib or entrectinib. Repotrectinib retains activity against G2032R (TRIDENT-1,
  Drilon 2024) — ORR ~58% in TKI-pretreated + G2032R subset — and is the standard
  salvage TKI. Lorlatinib has variable activity vs G2032R.

  '
evidence_summary_ua: 'ROS1 G2032R is the dominant solvent-front резистентна мутація
  after кризотиніб or ентректиніб. репотректиніб retains activity against G2032R (TRIDENT-1,
  Drilon 2024) — ORR ~58% in TKI-pretreated + G2032R subset — and is the стандарт
  сальвадж TKI. лорлатиніб has variable activity vs G2032R.

  '
