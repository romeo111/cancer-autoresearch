id: BMA-ROS1-G2032R-NSCLC
biomarker_id: BIO-ROS1-FUSION
variant_qualifier: "G2032R (acquired resistance)"
disease_id: DIS-NSCLC
escat_tier: "IB"
oncokb_level: "R1"
evidence_summary: >
  ROS1 G2032R is the dominant solvent-front resistance mutation after
  crizotinib or entrectinib. Repotrectinib retains activity against
  G2032R (TRIDENT-1, Drilon 2024) — ORR ~58% in TKI-pretreated +
  G2032R subset — and is the standard salvage TKI. Lorlatinib has
  variable activity vs G2032R.
regulatory_approval:
  fda:
    - "repotrectinib — TKI-pretreated ROS1+ NSCLC including G2032R (FDA approved 2023)"
  ema:
    - "repotrectinib — TKI-pretreated ROS1+ NSCLC (EMA approved 2024)"
  ukraine: []
recommended_combinations:
  - "repotrectinib monotherapy"
contraindicated_monotherapy:
  - "crizotinib (resistant)"
  - "entrectinib (resistant)"
  - "ceritinib (resistant)"
primary_sources:
  - SRC-NCCN-NSCLC-2025
  - SRC-ESMO-NSCLC-METASTATIC-2024
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  OncoKB R1. ctDNA at progression preferred for resistance detection.
  Compound G2032R+L2026M may resist all current TKIs — consider chemo
  or trial enrollment.
