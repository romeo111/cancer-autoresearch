review_status: pending_clinical_signoff
drafted_by: claude_extraction
notes: >
  ESCAT IA / OncoKB Level 1. ATC is a clinical emergency — initiate
  BRAF testing on the same day as biopsy diagnosis per SRC-NCCN-THYROID-2025
  ("RAID" workflow). Resistance: development of MEK reactivation,
  alternative MAPK isoforms; triple combination with anti-PD-1 (ATLEP
  trial) is investigational. Source-gap: SRC-ROAR-SUBBIAH-2018
  not yet ingested.
