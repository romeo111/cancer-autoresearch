id: BMA-KIT-D816V-MASTOCYTOSIS
biomarker_id: BIO-KIT
variant_qualifier: "D816V (activation loop, exon 17 — >90% of advanced systemic mastocytosis)"
disease_id: DIS-MASTOCYTOSIS
escat_tier: "IA"
oncokb_level: "1"
evidence_summary: >
  KIT D816V in advanced systemic mastocytosis (AdvSM — aggressive SM,
  SM-AHN, mast cell leukemia): midostaurin (EXPLORER / D2201 phase 2,
  Gotlib NEJM 2016 — ORR 60%) and avapritinib (PATHFINDER / EXPLORER,
  Gotlib JCO 2023 — ORR 75%, deeper molecular response) are FDA-
  approved. Avapritinib selectively targets the D816V conformation
  with high potency. Imatinib is INACTIVE against D816V — distinct
  from imatinib-sensitive juxtamembrane mutations.
evidence_summary_ua: >
  KIT D816V in поширений systemic mastocytosis (AdvSM — агресивний SM, SM-AHN, mast cell лейкоз): мідостаурин (EXPLORER / D2201 фаза 2, Gotlib NEJM 2016 — ORR 60%) and avapritinib (PATHFINDER / EXPLORER, Gotlib JCO 2023 — ORR 75%, deeper molecular відповідь) are FDA- схвалений. Avapritinib selectively targets the D816V conformation with high potency. іматиніб is INACTIVE against D816V — distinct from іматиніб-sensitive juxtamembrane мутації.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
  fda:
    - "midostaurin — advanced SM (FDA approved 2017)"
    - "avapritinib — advanced SM (FDA approved 2021)"
  ema:
    - "midostaurin — advanced SM (EMA approved 2017)"
    - "avapritinib — advanced SM (EMA approved 2022)"
  ukraine: []
recommended_combinations:
  - "avapritinib monotherapy (preferred 1L AdvSM per PATHFINDER)"
  - "midostaurin monotherapy (alternative; broader registration)"
contraindicated_monotherapy:
  - "imatinib (D816V resistant — only KIT-WT or non-D816V AdvSM benefits)"
primary_sources:
  - SRC-ONCOKB
  - SRC-NCCN-MELANOMA-2025
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IA. OncoKB Level 1. Source-gap: SRC-NCCN-SM / SRC-EXPLORER /
  SRC-PATHFINDER not yet ingested. AdvSM diagnosis requires WHO-
  defined C-findings (cytopenias, hepatomegaly + dysfunction, organ
  damage). Indolent SM is generally NOT treated with KIT-TKI;
  symptomatic treatment only.
