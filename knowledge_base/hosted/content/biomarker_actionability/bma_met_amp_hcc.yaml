id: BMA-MET-AMP-HCC
biomarker_id: BIO-MET
variant_qualifier: "amplification / overexpression"
disease_id: DIS-HCC
escat_tier: "IIIA"
evidence_summary: >
  MET amplification / overexpression in HCC has biological rationale
  (HGF/MET autocrine loop in subset of HCC). Tivantinib (MET-high IHC)
  failed phase 3 (METIV-HCC, Rimassa 2018). No approved MET-targeted
  therapy in HCC; activity in baskets has been modest.
evidence_summary_ua: >
  MET ампліфікація / гіперекспресія in HCC has biological rationale (HGF/MET autocrine loop in subset of HCC). Tivantinib (MET-high IHC) failed фаза 3 (METIV-HCC, Rimassa 2018). ні схвалений MET-таргетна терапія in HCC; activity in baskets has been modest.
