id: BMA-MET-AMP-HCC
biomarker_id: BIO-MET
variant_qualifier: "amplification / overexpression"
disease_id: DIS-HCC
escat_tier: "IIIA"
oncokb_level: "4"
evidence_summary: >
  MET amplification / overexpression in HCC has biological rationale
  (HGF/MET autocrine loop in subset of HCC). Tivantinib (MET-high IHC)
  failed phase 3 (METIV-HCC, Rimassa 2018). No approved MET-targeted
  therapy in HCC; activity in baskets has been modest.
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
  - "clinical trial enrollment (basket / MET-targeted)"
contraindicated_monotherapy: []
primary_sources:
  - SRC-NCCN-HCC-2025
  - SRC-AASLD-HCC-2023
  - SRC-ONCOKB
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IIIA (target validated in another tumor, no clinical proof in
  HCC). OncoKB Level 4 (compelling biological evidence). Standard 1L
  HCC remains atezolizumab + bevacizumab regardless of MET status.
