id: BMA-MLH1-SOMATIC-GASTRIC
biomarker_id: BIO-DMMR-IHC
variant_qualifier: "MLH1 somatic loss-of-function (dMMR / MSI-H)"
disease_id: DIS-GASTRIC
escat_tier: "IA"
oncokb_level: "1"
evidence_summary: >
  MLH1 somatic loss-of-function in gastric produces dMMR/MSI-H phenotype. Pan-
  tumor MSI-H ICI eligibility (pembrolizumab per KEYNOTE-158, dostarlimab per
  GARNET) supersedes tumor-specific lines via tissue-agnostic FDA approval. 1L
  MSI-H gastric: nivolumab + chemo (CheckMate-649) and pembrolizumab + chemo
  (KEYNOTE-859) show enhanced benefit in MSI-H subgroup.
  Trastuzumab+pembro+chemo in HER2+ MSI-H (KEYNOTE-811).
regulatory_approval:
  fda:
    - "nivolumab + chemo — 1L gastric (broad label, MSI-H subgroup benefit)"
    - "pembrolizumab — pan-tumor MSI-H/dMMR"
  ema:
    - "nivolumab + chemo — 1L gastric"
  ukraine: []
recommended_combinations:
  - "nivolumab + FOLFOX/CapeOX (1L MSI-H gastric, CheckMate-649)"
  - "pembrolizumab + chemo (KEYNOTE-859)"
  - "pembrolizumab monotherapy (pan-tumor MSI-H, 2L+)"
contraindicated_monotherapy: []
primary_sources:
  - SRC-NCCN-GASTRIC-2025
  - SRC-ESMO-GASTRIC-2024
  - SRC-ONCOKB
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  Somatic MLH1 loss → cascade testing optional (reflex germline confirmation
  strongly recommended; ~30% of dMMR tumors have germline cause). Pan-tumor
  MSI-H ICI eligibility supersedes tumor-specific lines.
