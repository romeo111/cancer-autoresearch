id: BMA-KRAS-G12C-CRC
biomarker_id: BIO-KRAS-G12C
variant_qualifier: "G12C"
disease_id: DIS-CRC
escat_tier: "IB"
oncokb_level: "1"
evidence_summary: >
  KRAS G12C in mCRC (~3-4%): single-agent KRASG12C inhibitors
  insufficient (intrinsic EGFR feedback). Combination adagrasib +
  cetuximab (KRYSTAL-1, Yaeger et al. NEJM 2023) ORR 46%, PFS 6.9
  mo. Sotorasib + panitumumab (CodeBreaK 300, Fakih et al. NEJM
  2023) ORR 26% vs investigator's choice. Both FDA-approved 2024.
evidence_summary_ua: >
  KRAS G12C in mCRC (~3-4%): single-agent KRASG12C інгібітори insufficient (intrinsic EGFR feedback). комбінація адаграсиб + цетуксимаб (KRYSTAL-1, Yaeger et al. NEJM 2023) ORR 46%, PFS 6.9 mo. соторасиб + панітумумаб (CodeBreaK 300, Fakih et al. NEJM 2023) ORR 26% vs investigator's choice. Both схвалений FDA 2024.
