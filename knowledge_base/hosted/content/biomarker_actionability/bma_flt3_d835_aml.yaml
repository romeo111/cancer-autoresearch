id: BMA-FLT3-D835-AML
biomarker_id: BIO-FLT3-D835
variant_qualifier: "TKD point mutation (D835Y/V/H/F; ~7% AML, often co-occurs with ITD)"
disease_id: DIS-AML
escat_tier: "IB"
oncokb_level: "1"
evidence_summary: >
  FLT3-D835 (TKD) in newly-diagnosed AML: midostaurin + 7+3 was
  studied in FLT3-mutant (ITD or TKD) AML in RATIFY (Stone 2017) —
  benefit driven primarily by ITD subset, with smaller magnitude in
  TKD. Quizartinib (type II FLT3i) is INACTIVE against TKD D835
  (target alternate conformation). Gilteritinib (type I) and
  midostaurin retain activity. ELN 2022 prognostic impact of D835
  alone is intermediate.
evidence_summary_ua: >
  FLT3-D835 (TKD) in newly-diagnosed AML: мідостаурин + 7+3 was studied in FLT3-mutant (ITD or TKD) AML in RATIFY (Stone 2017) — виграш driven перш за все by ITD subset, with smaller magnitude in TKD. квізартиніб (type II FLT3i) is INACTIVE against TKD D835 (target alternate conformation). гілтеритиніб (type I) and мідостаурин retain activity. ELN 2022 прогностичний impact of D835 alone is intermediate.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
  fda:
    - "midostaurin + 7+3 — 1L FLT3-mutant (ITD or TKD) AML (FDA approved 2017)"
  ema:
