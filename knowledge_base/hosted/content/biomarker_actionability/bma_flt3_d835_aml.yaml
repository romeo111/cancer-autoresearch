last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IB. OncoKB Level 1. Critical TKI-selection point: D835 confers
  resistance to type II FLT3i (quizartinib, sorafenib) but NOT to
  type I FLT3i (gilteritinib, midostaurin, crenolanib). Companion
  diagnostic: LeukoStrat CDx detects both ITD and TKD D835.
