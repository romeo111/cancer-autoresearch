id: BMA-KIT-D816V-GIST
biomarker_id: BIO-KIT
variant_qualifier: "D816V (activation loop, exon 17 — rare in GIST primary; secondary resistance)"
disease_id: DIS-GIST
escat_tier: "IIA"
oncokb_level: "R1"
evidence_summary: >
  KIT D816V in GIST is rare as primary mutation (more typical of
  systemic mastocytosis) but emerges as a secondary resistance
  mutation under imatinib pressure. Confers imatinib + sunitinib
  resistance. Ripretinib (INVICTUS, Blay Lancet Oncol 2020 — switch-
  control inhibitor with broad activation-loop coverage) and
  avapritinib (NAVIGATOR; FDA-approved in PDGFRA D842V and ASM)
  retain activity vs D816V.
regulatory_approval:
  fda:
    - "ripretinib — 4L+ advanced GIST (FDA approved 2020 per INVICTUS)"
    - "avapritinib — only PDGFRA D842V GIST per FDA label (KIT D816V not in label, but mechanism-based off-label)"
  ema:
    - "ripretinib — 4L+ advanced GIST (EMA approved 2021)"
  ukraine: []
recommended_combinations:
  - "ripretinib (post-imatinib/sunitinib/regorafenib failure with D816V or other activation-loop secondary resistance)"
  - "avapritinib (off-label / trial for KIT D816V GIST)"
contraindicated_monotherapy:
  - "imatinib (D816V resistant)"
  - "sunitinib (D816V resistant — sunitinib best for ATP-binding-pocket secondary mutations)"
primary_sources:
  - SRC-ONCOKB
  - SRC-NCCN-MELANOMA-2025
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IIA. OncoKB Level R1 (resistance to imatinib/sunitinib). Source-
  gap as DIS-GIST plus SRC-INVICTUS / SRC-NAVIGATOR not yet ingested.
  ctDNA monitoring useful to detect emerging D816V before radiographic
  progression.
