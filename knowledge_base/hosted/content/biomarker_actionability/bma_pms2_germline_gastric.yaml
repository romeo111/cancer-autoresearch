id: BMA-PMS2-GERMLINE-GASTRIC
biomarker_id: BIO-DMMR-IHC
variant_qualifier: PMS2 germline loss-of-function (dMMR / MSI-H)
disease_id: DIS-GASTRIC
escat_tier: IA
evidence_summary: 'PMS2 germline loss-of-function in gastric produces dMMR/MSI-H phenotype.
  Pan- tumor MSI-H ICI eligibility (pembrolizumab per KEYNOTE-158, dostarlimab per
  GARNET) supersedes tumor-specific lines via tissue-agnostic FDA approval. 1L MSI-H
  gastric: nivolumab + chemo (CheckMate-649) and pembrolizumab + chemo (KEYNOTE-859)
  show enhanced benefit in MSI-H subgroup. Trastuzumab+pembro+chemo in HER2+ MSI-H
  (KEYNOTE-811).

  '
evidence_summary_ua: 'PMS2 герміногенний втрата функції in gastric produces dMMR/MSI-H
  фенотип. Pan- пухлина MSI-H ICI eligibility (пембролізумаб per KEYNOTE-158, dostarlimab
  per GARNET) supersedes пухлина-specific lines via tissue-agnostic FDA схвалення.
  1L MSI-H gastric: ніволумаб + chemo (CheckMate-649) and пембролізумаб + chemo (KEYNOTE-859)
  show enhanced виграш in MSI-H subgroup. трастузумаб+pembro+chemo in HER2+ MSI-H
  (KEYNOTE-811).

  '
