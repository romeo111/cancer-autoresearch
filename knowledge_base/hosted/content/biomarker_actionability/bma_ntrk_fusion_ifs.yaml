notes: >
  ESCAT IA. OncoKB Level 1. IFS is the prototype tumor for the
  paradigm shift from cytotoxic to targeted therapy in pediatric
  oncology. Prior standard (VAC chemotherapy) achieved ~70% response
  but with substantial toxicity. Larotrectinib enables less mutilating
  surgery in localized IFS. Source-gap: SRC-NCCN-PEDIATRIC-SARCOMA /
  SRC-SCOUT not yet ingested.
