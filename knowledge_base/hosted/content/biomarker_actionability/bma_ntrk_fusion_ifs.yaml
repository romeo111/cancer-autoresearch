id: BMA-NTRK-FUSION-IFS
biomarker_id: BIO-NTRK-FUSION
variant_qualifier: "ETV6-NTRK3 fusion (defining lesion)"
disease_id: DIS-IFS
escat_tier: "IA"
evidence_summary: >
  Infantile fibrosarcoma (IFS) is defined by ETV6-NTRK3 fusion (>90%).
  Larotrectinib has transformative activity (SCOUT pediatric trial,
  Laetsch Lancet Oncol 2018 — ORR 93% in IFS), enabling organ-sparing
  surgery and avoiding mutilating resection or intensive
  chemotherapy. Tumor-agnostic FDA approval since 2018; SCOUT data
  drove pediatric label.
evidence_summary_ua: >
  Infantile fibrosarcoma (IFS) is defined by ETV6-NTRK3 злиття (>90%). ларотрексиніб has transformative activity (SCOUT педіатричний дослідження, Laetsch Lancet Oncol 2018 — ORR 93% in IFS), enabling organ-sparing surgery and avoiding mutilating resection or intensive хіміотерапія. пухлина-agnostic FDA схвалення since 2018; SCOUT дані drove педіатричний label.
