id: BMA-MSH2-SOMATIC-PROSTATE
biomarker_id: BIO-DMMR-IHC
variant_qualifier: "MSH2 somatic loss-of-function (dMMR / MSI-H)"
disease_id: DIS-PROSTATE
escat_tier: "IB"
oncokb_level: "1"
evidence_summary: >
  MSH2 somatic loss-of-function in prostate produces dMMR/MSI-H phenotype. Pan-
  tumor MSI-H ICI eligibility (pembrolizumab per KEYNOTE-158, dostarlimab per
  GARNET) supersedes tumor-specific lines via tissue-agnostic FDA approval.
  MSI-H in prostate is rare (~3-5%); pembrolizumab tissue-agnostic applies in
  mCRPC after standard therapy.
regulatory_approval:
  fda:
    - "pembrolizumab — pan-tumor MSI-H/dMMR"
  ema: []
  ukraine: []
recommended_combinations:
  - "pembrolizumab monotherapy (pan-tumor MSI-H/dMMR, FDA 2017) in mCRPC after NHA/taxane"
contraindicated_monotherapy: []
primary_sources:
  - SRC-NCCN-PROSTATE-2025
  - SRC-ESMO-PROSTATE-2024
  - SRC-ONCOKB
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  Somatic MSH2 loss → cascade testing optional (reflex germline confirmation
  strongly recommended; ~30% of dMMR tumors have germline cause). Pan-tumor
  MSI-H ICI eligibility supersedes tumor-specific lines.
