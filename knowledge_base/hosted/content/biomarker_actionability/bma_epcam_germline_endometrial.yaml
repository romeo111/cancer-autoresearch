id: BMA-EPCAM-GERMLINE-ENDOMETRIAL
biomarker_id: BIO-DMMR-IHC
variant_qualifier: "EPCAM germline 3' deletion (silences MSH2 by promoter methylation) → Lynch"
disease_id: DIS-ENDOMETRIAL
escat_tier: "IA"
evidence_summary: >
  EPCAM germline deletion silences MSH2 → Lynch syndrome with dMMR endometrial
  cancer phenotype. Treat as MSH2-equivalent: dostarlimab + chemo 1L (RUBY);
  pan-tumor MSI-H ICI applies. ESCAT IA / OncoKB Level 1.
evidence_summary_ua: >
  EPCAM герміногенний делеція silences MSH2 → Lynch syndrome with dMMR рак ендометрію фенотип. Treat as MSH2-еквівалентний: dostarlimab + chemo 1L (RUBY); pan-пухлина MSI-H ICI applies. ESCAT IA / OncoKB рівень 1.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
  fda:
    - "dostarlimab + chemo — 1L dMMR endometrial"
    - "pembrolizumab — pan-tumor MSI-H/dMMR"
  ema:
    - "dostarlimab + chemo — 1L dMMR endometrial"
  ukraine: []
recommended_combinations:
  - "dostarlimab + carbo/paclitaxel (1L, RUBY)"
  - "pembrolizumab + chemo (NRG-GY018)"
  - "dostarlimab monotherapy (2L+ dMMR)"
contraindicated_monotherapy: []
