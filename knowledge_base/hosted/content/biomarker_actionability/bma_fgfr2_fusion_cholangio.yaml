id: BMA-FGFR2-FUSION-CHOLANGIO
biomarker_id: BIO-FGFR2
variant_qualifier: "fusion / rearrangement (BICC1-FGFR2 most common; ~10-15% intrahepatic cholangio)"
disease_id: DIS-CHOLANGIOCARCINOMA
escat_tier: "IA"
oncokb_level: "1"
evidence_summary: >
  FGFR2 fusion in intrahepatic cholangiocarcinoma (~10-15%):
  pemigatinib (FIGHT-202, Abou-Alfa Lancet Oncol 2020 — ORR 36%, mDOR
  9.1 mo) and futibatinib (FOENIX-CCA2, Goyal NEJM 2023 — ORR 42%,
  mPFS 9.0 mo) are FDA-approved for previously-treated FGFR2-fusion
  cholangio. Futibatinib is irreversible and has activity against
  pemigatinib-resistance gatekeeper mutations.
regulatory_approval:
  fda:
    - "pemigatinib — FGFR2-fusion cholangio 2L+ (FDA accelerated 2020)"
    - "futibatinib — FGFR2-fusion cholangio 2L+ (FDA accelerated 2022)"
  ema:
    - "pemigatinib — FGFR2-fusion cholangio (EMA approved 2021)"
    - "futibatinib — FGFR2-fusion cholangio (EMA approved 2023)"
  ukraine: []
recommended_combinations:
  - "pemigatinib monotherapy (2L+ post-gemcitabine/cisplatin)"
  - "futibatinib monotherapy (2L+; preferred after pemigatinib resistance)"
contraindicated_monotherapy: []
primary_sources:
  - SRC-ONCOKB
  - SRC-FDA-CDS-2026
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IA. OncoKB Level 1. 1L remains gemcitabine + cisplatin ±
  durvalumab (TOPAZ-1). FGFR2-fusion testing recommended at diagnosis
  by NCCN to plan 2L. Detection: RNA-NGS preferred (intronic
  breakpoints commonly missed by DNA panels). Resistance: gatekeeper
  V564F, molecular brake L617M, kinase-domain N549K — futibatinib
  retains activity vs many of these. Source-gap: SRC-NCCN-HEPATOBILIARY
  / SRC-FIGHT-202 / SRC-FOENIX-CCA2 not yet ingested.
