id: BMA-PALB2-GERMLINE-BREAST
biomarker_id: BIO-HRR-PANEL
variant_qualifier: "PALB2 germline pathogenic"
disease_id: DIS-BREAST
escat_tier: "IIA"
oncokb_level: "3A"
evidence_summary: >
  PALB2 germline pathogenic confers BRCA-like breast risk (~50% lifetime).
  Olaparib activity reported in PALB2-mutated breast (Tung TBCRC-048: ORR ~82%
  in HER2-negative metastatic, n=11) but PARPi labels in breast remain BRCA-
  only. NCCN lists PALB2 as a PARPi-eligible mutation off-label. ESCAT IIA /
  OncoKB Level 3A.
evidence_summary_ua: >
  PALB2 герміногенний патогенний confers BRCA-like breast risk (~50% lifetime). олапариб activity reported in PALB2-mutated breast (Tung TBCRC-048: ORR ~82% in HER2-negative метастатичний, n=11) but PARPi labels in breast remain BRCA- only. NCCN lists PALB2 as a PARPi-eligible мутація off-label. ESCAT IIA / OncoKB рівень 3A.
