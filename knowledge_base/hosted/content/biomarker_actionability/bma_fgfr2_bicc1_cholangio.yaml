id: BMA-FGFR2-BICC1-CHOLANGIO
biomarker_id: BIO-FGFR2
variant_qualifier: "BICC1-FGFR2 fusion (most common partner ~30-40% of FGFR2-fusion cholangio)"
disease_id: DIS-CHOLANGIOCARCINOMA
escat_tier: "IA"
oncokb_level: "1"
evidence_summary: >
  BICC1-FGFR2 fusion is the most common FGFR2 fusion partner in
  intrahepatic cholangiocarcinoma. Treatment is identical to gene-level
  FGFR2-fusion: pemigatinib (FIGHT-202) and futibatinib (FOENIX-CCA2).
  Fusion-partner identity does not currently modify TKI selection.
regulatory_approval:
  fda:
    - "pemigatinib — FGFR2-fusion cholangio 2L+ (FDA 2020)"
    - "futibatinib — FGFR2-fusion cholangio 2L+ (FDA 2022)"
  ema:
    - "pemigatinib / futibatinib — FGFR2-fusion cholangio (EMA approved)"
  ukraine: []
recommended_combinations:
  - "pemigatinib monotherapy"
  - "futibatinib monotherapy"
contraindicated_monotherapy: []
primary_sources:
  - SRC-ONCOKB
  - SRC-FDA-CDS-2026
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IA. OncoKB Level 1. Fusion-partner-specific cell maintained
  for completeness.
