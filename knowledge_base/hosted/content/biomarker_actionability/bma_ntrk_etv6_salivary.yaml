id: BMA-NTRK-ETV6-SALIVARY
biomarker_id: BIO-NTRK-FUSION
variant_qualifier: "ETV6-NTRK3 fusion"
disease_id: DIS-SALIVARY
escat_tier: "IA"
evidence_summary: >
  ETV6-NTRK3 is the defining fusion of mammary analogue secretory
  carcinoma (MASC) of salivary gland. Larotrectinib and entrectinib are
  highly active (NAVIGATE / STARTRK-2 pooled — ORR 75-90% in salivary
  cohort). Treatment is identical to gene-level NTRK fusion.
evidence_summary_ua: >
  ETV6-NTRK3 is the defining злиття of mammary analogue secretory карцинома (MASC) of salivary gland. ларотрексиніб and ентректиніб are highly active (NAVIGATE / STARTRK-2 pooled — ORR 75-90% in salivary cohort). лікування is identical to gene-level NTRK злиття.
