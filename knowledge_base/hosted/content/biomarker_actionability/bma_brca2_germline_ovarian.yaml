id: BMA-BRCA2-GERMLINE-OVARIAN
biomarker_id: BIO-BRCA1-BRCA2-GERMLINE
variant_qualifier: BRCA2 germline pathogenic
disease_id: DIS-OVARIAN
escat_tier: IA
evidence_summary: 'BRCA2 germline pathogenic in advanced EOC: olaparib 1L maintenance
  (SOLO1) → median PFS not reached vs 13.8 mo placebo at 5y. Niraparib (NOVA), rucaparib
  (ARIEL3) approved in platinum-sensitive recurrence. ESCAT IA / OncoKB Level 1.

  '
evidence_summary_ua: 'BRCA2 герміногенний патогенний in поширений EOC: олапариб 1L
  підтримка (SOLO1) → медіана ВБП not reached vs 13.8 mo placebo at 5y. нірапариб
  (NOVA), рукапариб (ARIEL3) схвалений in platinum-sensitive рецидив. ESCAT IA / OncoKB
  рівень 1.

  '
