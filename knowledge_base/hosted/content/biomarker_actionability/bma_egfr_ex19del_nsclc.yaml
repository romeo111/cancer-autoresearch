id: BMA-EGFR-EX19DEL-NSCLC
biomarker_id: BIO-EGFR-MUTATION
variant_qualifier: "exon 19 deletion"
disease_id: DIS-NSCLC
escat_tier: "IA"
oncokb_level: "1"
evidence_summary: >
  EGFR exon 19 deletion in advanced NSCLC: osimertinib 1L improves OS vs
  first-generation EGFR-TKIs (FLAURA, Soria et al. 2018; Ramalingam 2020).
  Adjuvant osimertinib post-resection improves DFS (ADAURA, Wu et al.
  2020). Exon 19 del is one of two classical sensitizing mutations
  (with L858R) and predicts the highest TKI response rates.
regulatory_approval:
  fda:
    - "osimertinib — 1L EGFR-mutated NSCLC (FDA approved 2018)"
    - "osimertinib — adjuvant resected EGFR-mutated NSCLC (FDA approved 2020)"
    - "osimertinib + chemo — 1L EGFR-mutated NSCLC (FDA approved 2024, FLAURA2)"
  ema:
    - "osimertinib — 1L and adjuvant EGFR-mutated NSCLC (EMA approved)"
  ukraine: []
recommended_combinations:
  - "osimertinib monotherapy"
  - "osimertinib + pemetrexed/platinum (FLAURA2 regimen)"
  - "amivantamab + lazertinib (MARIPOSA, 1L alternative)"
contraindicated_monotherapy: []
primary_sources:
  - SRC-NCCN-NSCLC-2025
  - SRC-ESMO-NSCLC-METASTATIC-2024
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IA. OncoKB Level 1. Companion diagnostic: cobas EGFR Mutation
  Test v2, FoundationOne CDx. Universal testing required for advanced
  non-squamous NSCLC.
