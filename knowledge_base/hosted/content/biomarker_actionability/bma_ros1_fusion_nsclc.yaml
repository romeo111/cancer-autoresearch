id: BMA-ROS1-FUSION-NSCLC
biomarker_id: BIO-ROS1-FUSION
variant_qualifier: "fusion (gene-level, TKI-naive)"
disease_id: DIS-NSCLC
escat_tier: "IA"
oncokb_level: "1"
evidence_summary: >
  ROS1 rearrangement in advanced NSCLC: entrectinib (CNS-active) and
  crizotinib have established 1L approvals. Repotrectinib (TRIDENT-1,
  Drilon 2024) demonstrated superior PFS and CNS activity 1L —
  including activity vs G2032R resistance — and is increasingly
  preferred. Lorlatinib also active off-label.
regulatory_approval:
  fda:
    - "repotrectinib — ROS1+ NSCLC (FDA approved 2023, 1L and TKI-pretreated)"
    - "entrectinib — 1L ROS1+ NSCLC (FDA approved 2019)"
    - "crizotinib — 1L ROS1+ NSCLC (FDA approved 2016)"
  ema:
    - "repotrectinib / entrectinib / crizotinib — ROS1+ NSCLC (EMA approved)"
  ukraine: []
recommended_combinations:
  - "repotrectinib monotherapy (preferred 1L)"
  - "entrectinib monotherapy (1L, CNS-active)"
  - "crizotinib monotherapy (1L alternative, less CNS activity)"
contraindicated_monotherapy: []
primary_sources:
  - SRC-NCCN-NSCLC-2025
  - SRC-ESMO-NSCLC-METASTATIC-2024
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IA. OncoKB Level 1. ~1-2% NSCLC adenocarcinoma. RNA-NGS
  preferred for fusion detection; FISH and IHC alternatives.
