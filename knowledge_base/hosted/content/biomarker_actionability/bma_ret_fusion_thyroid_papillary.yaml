id: BMA-RET-FUSION-THYROID-PAPILLARY
biomarker_id: BIO-RET
variant_qualifier: fusion (CCDC6-RET, NCOA4-RET, ELKS-RET et al.) — distinct from
  MTC mutations
disease_id: DIS-THYROID-PAPILLARY
escat_tier: IB
evidence_summary: 'RET fusion in papillary thyroid carcinoma (PTC) — ~5-10% sporadic,
  enriched in radiation-induced PTC. Selpercatinib (LIBRETTO-001 PTC cohort, Wirth
  2020 — ORR 79%) and pralsetinib (ARROW PTC cohort, ORR 89%) are FDA-approved for
  RAI-refractory advanced disease. Selective RET-TKIs are preferred over sorafenib
  / lenvatinib for RET-fusion-positive RAI-refractory disease.

  '
evidence_summary_ua: 'RET злиття in papillary thyroid карцинома (PTC) — ~5-10% sporadic,
  enriched in radiation-induced PTC. селперкатиніб (LIBRETTO-001 PTC cohort, Wirth
  2020 — ORR 79%) and пралсетиніб (ARROW PTC cohort, ORR 89%) are FDA-схвалений для
  RAI-рефрактерний поширений хвороба. селективний RET-TKIs are переважний over сорафеніб
  / ленватиніб for RET-злиття-positive RAI-рефрактерний хвороба.

  '
