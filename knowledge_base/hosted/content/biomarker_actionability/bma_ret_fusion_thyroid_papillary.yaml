id: BMA-RET-FUSION-THYROID-PAPILLARY
biomarker_id: BIO-RET
variant_qualifier: "fusion (CCDC6-RET, NCOA4-RET, ELKS-RET et al.) — distinct from MTC mutations"
disease_id: DIS-THYROID-PAPILLARY
escat_tier: "IB"
oncokb_level: "1"
evidence_summary: >
  RET fusion in papillary thyroid carcinoma (PTC) — ~5-10% sporadic,
  enriched in radiation-induced PTC. Selpercatinib (LIBRETTO-001 PTC
  cohort, Wirth 2020 — ORR 79%) and pralsetinib (ARROW PTC cohort,
  ORR 89%) are FDA-approved for RAI-refractory advanced disease.
  Selective RET-TKIs are preferred over sorafenib / lenvatinib for
  RET-fusion-positive RAI-refractory disease.
evidence_summary_ua: >
  RET злиття in papillary thyroid карцинома (PTC) — ~5-10% sporadic, enriched in radiation-induced PTC. селперкатиніб (LIBRETTO-001 PTC cohort, Wirth 2020 — ORR 79%) and пралсетиніб (ARROW PTC cohort, ORR 89%) are FDA-схвалений для RAI-рефрактерний поширений хвороба. селективний RET-TKIs are переважний over сорафеніб / ленватиніб for RET-злиття-positive RAI-рефрактерний хвороба.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
  fda:
    - "selpercatinib — RET-fusion advanced thyroid (papillary, RAI-refractory) (FDA accelerated 2020, full 2022)"
    - "pralsetinib — RET-fusion advanced thyroid (FDA accelerated 2020)"
  ema:
    - "selpercatinib / pralsetinib — RET-fusion advanced thyroid (EMA approved 2021)"
  ukraine: []
recommended_combinations:
  - "selpercatinib monotherapy (RAI-refractory advanced disease)"
  - "pralsetinib monotherapy"
contraindicated_monotherapy:
  - "lenvatinib / sorafenib (reserve for RET-fusion-negative or post-RET-TKI failure)"
primary_sources:
  - SRC-ONCOKB
  - SRC-NCCN-CNS-2025
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IB. OncoKB Level 1. RAI ablation remains 1L for differentiated
  PTC; selective RET-TKIs are deployed in RAI-refractory progressive
  metastatic disease. Detection: RNA-NGS preferred. Source-gap:
  SRC-NCCN-THYROID placeholder; SRC-LIBRETTO-001 / SRC-ARROW not
  yet ingested.
