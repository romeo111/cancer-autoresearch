id: BMA-BRCA2-SOMATIC-OVARIAN
biomarker_id: BIO-HRR-PANEL
variant_qualifier: "BRCA2 somatic loss-of-function"
disease_id: DIS-OVARIAN
escat_tier: "IA"
oncokb_level: "1"
evidence_summary: >
  Somatic BRCA2 loss-of-function in advanced EOC: PARPi (olaparib, niraparib,
  rucaparib) approved regardless of germline status; SOLO1 EU label and
  rucaparib FDA label include sBRCA. ESCAT IA / OncoKB Level 1.
evidence_summary_ua: >
  соматичний BRCA2 втрата функції in поширений EOC: PARPi (олапариб, нірапариб, рукапариб) схвалений regardless of герміногенний status; SOLO1 EU label and рукапариб FDA label include sBRCA. ESCAT IA / OncoKB рівень 1.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
  fda:
    - "olaparib — 1L gBRCA/sBRCA EOC"
    - "rucaparib — gBRCAm/sBRCAm 3L+"
  ema:
    - "olaparib — 1L gBRCA/sBRCA EOC"
  ukraine: []
recommended_combinations:
  - "olaparib monotherapy maintenance"
  - "rucaparib monotherapy maintenance"
  - "olaparib + bevacizumab (PAOLA-1)"
contraindicated_monotherapy: []
primary_sources:
  - SRC-NCCN-OVARIAN-2025
  - SRC-ESMO-OVARIAN-2024
