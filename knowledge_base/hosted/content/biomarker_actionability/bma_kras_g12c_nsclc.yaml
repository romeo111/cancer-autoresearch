id: BMA-KRAS-G12C-NSCLC
biomarker_id: BIO-KRAS-G12C
variant_qualifier: G12C
disease_id: DIS-NSCLC
escat_tier: IA
evidence_summary: 'KRAS G12C in advanced NSCLC (~13% of adenocarcinoma): sotorasib
  (CodeBreaK 100/200) and adagrasib (KRYSTAL-1) are FDA/EMA-approved for previously-treated
  metastatic disease. ORR ~40%, PFS ~6 mo. Frontline KRYSTAL-7 (adagrasib + pembrolizumab)
  and CodeBreaK 202 ongoing.

  '
evidence_summary_ua: 'KRAS G12C in поширений NSCLC (~13% of adenocarcinoma): соторасиб
  (CodeBreaK 100/200) and адаграсиб (KRYSTAL-1) are FDA/EMA-схвалений для previously-treated
  метастатичний хвороба. ORR ~40%, PFS ~6 mo. перша лінія KRYSTAL-7 (адаграсиб + пембролізумаб)
  and CodeBreaK 202 ongoing.

  '
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
  fda:
  - sotorasib (Lumakras) — locally advanced/metastatic G12C NSCLC after ≥1 prior systemic
    therapy (FDA 2021, full approval after CodeBreaK 200)
  - adagrasib (Krazati) — pretreated G12C NSCLC (FDA accelerated 2022)
  ema:
  - sotorasib — G12C NSCLC (EMA 2022)
  - adagrasib — G12C NSCLC (EMA 2024)
  ukraine: []
recommended_combinations:
- sotorasib monotherapy
- adagrasib monotherapy
contraindicated_monotherapy:
- non-G12C KRAS — sotorasib/adagrasib not active on G12D/G12V/G13D/Q61
