id: BMA-PDGFRA-EXON18-NON-D842-GIST
biomarker_id: BIO-PDGFRA
variant_qualifier: "exon 18 non-D842V mutation (e.g., D846Y, N848K, Y849K, deletion DIM842-844)"
disease_id: DIS-GIST
escat_tier: "IB"
evidence_summary: >
  PDGFRA non-D842V exon 18 mutations in GIST are imatinib-SENSITIVE
  (distinct from D842V). Imatinib 400 mg/day is standard 1L —
  responses comparable to KIT exon 11 GIST. Avapritinib also active.
  Genotyping is mandatory to distinguish D842V (avapritinib) from
  non-D842V exon 18 (imatinib-first).
evidence_summary_ua: >
  PDGFRA non-D842V exon 18 мутації in GIST are іматиніб-SENSITIVE (distinct from D842V). іматиніб 400 mg/day is стандарт 1L — responses співставний з KIT exon 11 GIST. Avapritinib also active. Genotyping is обов'язковий to distinguish D842V (avapritinib) from non-D842V exon 18 (іматиніб-first).
