escat_tier: IA
evidence_summary: 'BRCA1 germline pathogenic in metastatic PDAC after ≥16 weeks of
  platinum without progression: olaparib maintenance improves PFS (POLO, Golan 2019).
  No OS benefit demonstrated but durable PFS responders observed. ESCAT IA / OncoKB
  Level 1.

  '
evidence_summary_ua: 'BRCA1 герміногенний патогенний in метастатичний PDAC after ≥16
  weeks of platinum without прогресування: олапариб підтримка покращує PFS (POLO,
  Golan 2019). ні OS виграш продемонстровано but durable PFS responders observed.
  ESCAT IA / OncoKB рівень 1.

  '
