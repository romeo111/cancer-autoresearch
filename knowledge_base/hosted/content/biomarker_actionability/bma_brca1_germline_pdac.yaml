id: BMA-BRCA1-GERMLINE-PDAC
biomarker_id: BIO-BRCA1-BRCA2-GERMLINE
variant_qualifier: "BRCA1 germline pathogenic"
disease_id: DIS-PDAC
escat_tier: "IA"
oncokb_level: "1"
evidence_summary: >
  BRCA1 germline pathogenic in metastatic PDAC after ≥16 weeks of platinum
  without progression: olaparib maintenance improves PFS (POLO, Golan 2019). No
  OS benefit demonstrated but durable PFS responders observed. ESCAT IA / OncoKB
  Level 1.
evidence_summary_ua: >
  BRCA1 герміногенний патогенний in метастатичний PDAC after ≥16 weeks of platinum without прогресування: олапариб підтримка покращує PFS (POLO, Golan 2019). ні OS виграш продемонстровано but durable PFS responders observed. ESCAT IA / OncoKB рівень 1.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
  fda:
    - "olaparib — gBRCAm metastatic PDAC maintenance post-platinum (FDA 2019)"
  ema:
    - "olaparib — gBRCAm metastatic PDAC maintenance (EMA 2020)"
  ukraine: []
recommended_combinations:
  - "olaparib monotherapy maintenance after platinum-based 1L (FOLFIRINOX or gem-cis)"
contraindicated_monotherapy: []
primary_sources:
  - SRC-NCCN-PANCREATIC-2025
  - SRC-ESMO-PANCREATIC-2024
  - SRC-ONCOKB
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  Germline cascade testing mandatory. Platinum-based chemo (FOLFIRINOX
  preferred) is induction of choice in BRCA-mutated PDAC.
