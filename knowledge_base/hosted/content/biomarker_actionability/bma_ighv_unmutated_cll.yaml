id: BMA-IGHV-UNMUTATED-CLL
biomarker_id: BIO-IGHV-MUTATIONAL-STATUS
variant_qualifier: "IGHV-unmutated (≥98% homology to germline) — adverse risk; ~50-60% of CLL"
disease_id: DIS-CLL
escat_tier: "IA"
evidence_summary: >
  IGHV mutational status is a fundamental CLL risk stratifier and
  treatment-selection biomarker per SRC-NCCN-BCELL-2025, SRC-ESMO-CLL-2024,
  SRC-MOZ-UA-CLL-2022. IGHV-unmutated CLL has shorter response to
  chemoimmunotherapy (CIT — FCR, BR) and is now a strong indication
  for continuous BTK inhibitor (ibrutinib, acalabrutinib, zanubrutinib)
  or fixed-duration venetoclax-obinutuzumab as 1L regardless of TP53
  status. CLL14 (Fischer NEJM 2019 — venetoclax + obinutuzumab
  fixed-duration vs chlorambucil + obinutuzumab) and ECOG E1912
  (Shanafelt NEJM 2019 — ibrutinib + rituximab vs FCR) are foundational
  trials that demonstrated CIT inferiority specifically in IGHV-
  unmutated subgroups. ESMO 2024 explicitly recommends against FCR/BR
  1L in IGHV-unmutated patients.
evidence_summary_ua: >
