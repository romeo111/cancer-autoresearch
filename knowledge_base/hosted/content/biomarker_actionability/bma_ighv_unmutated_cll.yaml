notes: >
  ESCAT IA / OncoKB Level 2 (predictive biomarker — selects between
  drug classes, no targeted IGHV agent). IGHV-mutated favorable-risk
  patients without TP53 disruption have durable PFS with FCR (E1912
  showed FCR was non-inferior to ibrutinib+rituximab in IGHV-mut),
  but FCR carries long-term MDS/AML risk so younger patients are
  increasingly offered targeted therapy regardless. Source-gap:
  SRC-CLL14-FISCHER-2019, SRC-ECOG-E1912-SHANAFELT-2019, SRC-ELEVATE-TN
  not yet ingested.
