id: BMA-EGFR-EX20INS-NSCLC
biomarker_id: BIO-EGFR-MUTATION
variant_qualifier: "exon 20 insertion"
disease_id: DIS-NSCLC
escat_tier: "IA"
evidence_summary: >
  EGFR exon 20 insertions (excluding A763_Y764insFQEA) are insensitive to
  classical EGFR-TKIs. Amivantamab (EGFR-MET bispecific) + chemo is 1L
  standard (PAPILLON, Zhou et al. 2023). Mobocertinib was withdrawn
  globally 2023-2024 for failed confirmatory trial. Sunvozertinib
  (China-approved) is an emerging option in 2L.
evidence_summary_ua: >
  EGFR exon 20 insertions (виключаючи A763_Y764insFQEA) are insensitive to classical EGFR-TKIs. амівантамаб (EGFR-MET біспецифічний) + chemo is 1L стандарт (PAPILLON, Zhou et al. 2023). мобоцертиніб was withdrawn globally 2023-2024 for failed confirmatory дослідження. Sunvozertinib (China-схвалений) is an новий option in 2L.
