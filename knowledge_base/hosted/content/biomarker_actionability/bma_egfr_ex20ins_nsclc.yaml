id: BMA-EGFR-EX20INS-NSCLC
biomarker_id: BIO-EGFR-MUTATION
variant_qualifier: "exon 20 insertion"
disease_id: DIS-NSCLC
escat_tier: "IA"
oncokb_level: "1"
evidence_summary: >
  EGFR exon 20 insertions (excluding A763_Y764insFQEA) are insensitive to
  classical EGFR-TKIs. Amivantamab (EGFR-MET bispecific) + chemo is 1L
  standard (PAPILLON, Zhou et al. 2023). Mobocertinib was withdrawn
  globally 2023-2024 for failed confirmatory trial. Sunvozertinib
  (China-approved) is an emerging option in 2L.
regulatory_approval:
  fda:
    - "amivantamab + carboplatin + pemetrexed — 1L EGFR ex20ins NSCLC (FDA approved 2024, PAPILLON)"
    - "amivantamab — 2L EGFR ex20ins NSCLC (FDA approved 2021)"
  ema:
    - "amivantamab — 2L EGFR ex20ins (EMA approved 2021)"
    - "amivantamab + chemo — 1L (EMA approved 2024)"
  ukraine: []
recommended_combinations:
  - "amivantamab + carboplatin + pemetrexed (PAPILLON 1L)"
  - "amivantamab monotherapy (2L)"
  - "platinum-doublet chemotherapy (alternative)"
contraindicated_monotherapy:
  - "osimertinib (poor activity in classical ex20ins)"
  - "gefitinib / erlotinib / afatinib (resistant)"
  - "mobocertinib (withdrawn 2023-2024)"
primary_sources:
  - SRC-NCCN-NSCLC-2025
  - SRC-ESMO-NSCLC-METASTATIC-2024
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IA per PAPILLON. OncoKB Level 1. NGS preferred over PCR for
  detection — many ex20ins variants missed by hotspot PCR panels.
  A763_Y764insFQEA is the rare classical-TKI-sensitive exception.
