id: BMA-BRCA2-GERMLINE-MELANOMA
biomarker_id: BIO-BRCA1-BRCA2-GERMLINE
variant_qualifier: "BRCA2 germline pathogenic"
disease_id: DIS-MELANOMA
escat_tier: "IIIA"
evidence_summary: >
  BRCA2 germline pathogenic confers ~2-3× elevated cutaneous melanoma risk and
  uveal-melanoma association; no melanoma-specific PARPi indication exists.
  Standard melanoma therapy (BRAF/MEKi or ICI) per usual algorithm. PARPi only
  in clinical-trial context. ESCAT IIIA / OncoKB Level 3B.
evidence_summary_ua: >
  BRCA2 герміногенний патогенний confers ~2-3× elevated cutaneous меланома risk and uveal-меланома association; ні меланома-specific PARPi показання exists. стандарт меланома терапія (BRAF/MEKi or ICI) per usual algorithm. PARPi only in clinical-дослідження context. ESCAT IIIA / OncoKB рівень 3B.
