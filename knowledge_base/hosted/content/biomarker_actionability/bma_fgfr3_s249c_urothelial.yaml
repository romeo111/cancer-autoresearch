id: BMA-FGFR3-S249C-UROTHELIAL
biomarker_id: BIO-FGFR3-MUTATION
variant_qualifier: S249C
disease_id: DIS-UROTHELIAL
escat_tier: IA
evidence_summary: 'FGFR3 S249C is the most common activating FGFR3 mutation in urothelial
  carcinoma. Erdafitinib is approved for FGFR3-altered metastatic urothelial carcinoma
  after platinum chemotherapy (THOR cohort 1, Loriot 2023 — OS benefit vs chemotherapy
  in 2L+).

  '
evidence_summary_ua: 'FGFR3 S249C is the найбільш поширений activating FGFR3 мутація
  in уротеліальна карцинома. Erdafitinib is схвалений для FGFR3-altered метастатичний
  уротеліальна карцинома after platinum хіміотерапія (THOR cohort 1, Loriot 2023 —
  OS виграш vs хіміотерапія in 2L+).

  '
