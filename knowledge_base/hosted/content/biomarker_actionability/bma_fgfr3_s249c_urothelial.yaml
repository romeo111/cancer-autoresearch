id: BMA-FGFR3-S249C-UROTHELIAL
biomarker_id: BIO-FGFR3-MUTATION
variant_qualifier: "S249C"
disease_id: DIS-UROTHELIAL
escat_tier: "IA"
oncokb_level: "1"
evidence_summary: >
  FGFR3 S249C is the most common activating FGFR3 mutation in
  urothelial carcinoma. Erdafitinib is approved for FGFR3-altered
  metastatic urothelial carcinoma after platinum chemotherapy
  (THOR cohort 1, Loriot 2023 — OS benefit vs chemotherapy in 2L+).
evidence_summary_ua: >
  FGFR3 S249C is the найбільш поширений activating FGFR3 мутація in уротеліальна карцинома. Erdafitinib is схвалений для FGFR3-altered метастатичний уротеліальна карцинома after platinum хіміотерапія (THOR cohort 1, Loriot 2023 — OS виграш vs хіміотерапія in 2L+).
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
  fda:
    - "erdafitinib — FGFR3-altered metastatic urothelial 2L+ post-platinum (FDA approved 2024, full approval per THOR)"
  ema:
    - "erdafitinib — FGFR3-altered metastatic urothelial (EMA approved)"
  ukraine: []
recommended_combinations:
  - "erdafitinib monotherapy"
contraindicated_monotherapy: []
primary_sources:
  - SRC-NCCN-BLADDER-2025
  - SRC-EAU-BLADDER-2024
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IA per THOR cohort 1. OncoKB Level 1. Companion diagnostic:
  Therascreen FGFR RGQ RT-PCR Kit. Hyperphosphatemia and ocular
  toxicity (CSR) are erdafitinib class effects requiring monitoring.
