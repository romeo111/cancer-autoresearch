id: BMA-MSH2-SOMATIC-ENDOMETRIAL
biomarker_id: BIO-DMMR-IHC
variant_qualifier: MSH2 somatic loss-of-function (dMMR / MSI-H)
disease_id: DIS-ENDOMETRIAL
escat_tier: IA
evidence_summary: 'MSH2 somatic loss-of-function in endometrial produces dMMR/MSI-H
  phenotype. Pan-tumor MSI-H ICI eligibility (pembrolizumab per KEYNOTE-158, dostarlimab
  per GARNET) supersedes tumor-specific lines via tissue-agnostic FDA approval. Advanced/recurrent
  dMMR endometrial: dostarlimab + carbo/paclitaxel 1L (RUBY) and pembrolizumab + carbo/paclitaxel
  (NRG-GY018) doubled PFS. Dostarlimab/pembrolizumab monotherapy in 2L+. Adjuvant
  ICI in early-stage dMMR under study.

  '
evidence_summary_ua: 'MSH2 соматичний втрата функції in endometrial produces dMMR/MSI-H
  фенотип. Pan-пухлина MSI-H ICI eligibility (пембролізумаб per KEYNOTE-158, dostarlimab
  per GARNET) supersedes пухлина-specific lines via tissue-agnostic FDA схвалення.
  поширений/рецидивний dMMR endometrial: dostarlimab + carbo/паклітаксел 1L (RUBY)
  and пембролізумаб + carbo/паклітаксел (NRG-GY018) doubled PFS. Dostarlimab/пембролізумаб
  монотерапія in 2L+. ад''ювантний ICI in ранньої стадії dMMR under дослідження.

  '
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
  fda:
  - dostarlimab + chemo — 1L advanced/recurrent dMMR endometrial (FDA 2023)
  - pembrolizumab + chemo — 1L advanced endometrial (FDA 2024)
  - dostarlimab monotherapy — dMMR pretreated (FDA 2021)
  - pembrolizumab — pan-tumor MSI-H/dMMR
  ema:
  - dostarlimab + chemo — 1L dMMR endometrial (EMA 2023)
  ukraine: []
recommended_combinations:
- dostarlimab + carbo/paclitaxel (1L advanced dMMR, RUBY)
- pembrolizumab + carbo/paclitaxel (1L advanced, NRG-GY018)
- dostarlimab monotherapy (2L+ dMMR, GARNET)
- pembrolizumab monotherapy (pan-tumor MSI-H)
contraindicated_monotherapy: []
primary_sources:
