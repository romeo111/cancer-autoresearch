id: BMA-EGFR-MUTATION-GBM
biomarker_id: BIO-EGFR-MUTATION
variant_qualifier: "EGFRvIII / amplification"
disease_id: DIS-GBM
escat_tier: "X"
evidence_summary: >
  EGFR amplification (~40%) and EGFRvIII variant (~25%) are common in
  glioblastoma but no targeted therapy has shown OS benefit. Erlotinib,
  gefitinib, lapatinib trials negative. Depatuxizumab-mafodotin (ADC)
  failed phase III INTELLANCE-1. Currently no actionable EGFR-targeted
  therapy in GBM.
evidence_summary_ua: >
  EGFR ампліфікація (~40%) and EGFRvIII варіант (~25%) are поширений in гліобластома but ні таргетна терапія has shown OS виграш. ерлотиніб, гефітиніб, лапатиніб trials negative. Depatuxizumab-mafodotin (ADC) failed фаза 3 INTELLANCE-1. Currently ні actionable EGFR-таргетна терапія in GBM.
