id: BMA-PDGFRA-EXON14-GIST
biomarker_id: BIO-PDGFRA
variant_qualifier: "exon 14 mutation (ATP-binding pocket — N659K, N659Y; very rare)"
disease_id: DIS-GIST
escat_tier: "IB"
oncokb_level: "1"
evidence_summary: >
  PDGFRA exon 14 mutations in GIST are very rare and are imatinib-
  sensitive. Treatment is identical to other imatinib-sensitive PDGFRA
  variants: imatinib 400 mg/day 1L. Per OncoKB and NCCN, all PDGFRA
  non-D842V mutations are grouped as imatinib-responsive.
regulatory_approval:
  fda:
    - "imatinib — KIT/PDGFRA-mutant advanced GIST (FDA approved 2002)"
  ema:
    - "imatinib — KIT/PDGFRA+ GIST advanced and adjuvant (EMA approved 2002/2009)"
  ukraine: []
recommended_combinations:
  - "imatinib 400 mg/day (1L advanced/metastatic)"
contraindicated_monotherapy: []
primary_sources:
  - SRC-ONCOKB
  - SRC-IRIS-OBRIEN-2003
  - SRC-NCCN-MELANOMA-2025
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IB. OncoKB Level 1. Source-gap as DIS-GIST.
