id: BMA-TP53-MUT-MM
biomarker_id: BIO-TP53-MUTATION
variant_qualifier: "any pathogenic mutation OR del(17p)"
disease_id: DIS-MM
escat_tier: "IIA"
oncokb_level: "3A"
evidence_summary: >
  TP53-mut / del(17p) myeloma — high-risk cytogenetics composite; quadruplet (D-VRd; PERSEUS) preferred over triplet. Maintenance with daratumumab/lenalidomide. CAR-T (ide-cel, cilta-cel) effective regardless of TP53 status.
evidence_summary_ua: >
  TP53-mut / del(17p) мієлома — високого ризику cytogenetics composite; quadruplet (D-VRd; PERSEUS) переважний over триплет. підтримка with даратумумаб/леналідомід. CAR-T (ide-cel, cilta-cel) effective regardless of TP53 status.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
  - "D-VRd (1L transplant-eligible)"
  - "Dara-Rd (1L transplant-ineligible)"
  - "ide-cel / cilta-cel (R/R)"
  - "alloSCT consideration in young high-risk"
contraindicated_monotherapy: []
primary_sources:
