id: BMA-FANCA-GERMLINE-OVARIAN
biomarker_id: BIO-HRR-PANEL
variant_qualifier: "FANCA germline pathogenic (heterozygous)"
disease_id: DIS-OVARIAN
escat_tier: "IIIA"
oncokb_level: "3B"
evidence_summary: >
  FANCA germline (heterozygous) in EOC: Fanconi-anemia-pathway gene; biallelic
  loss = Fanconi anemia (recessive). Heterozygous carriers have uncertain cancer
  risk. FANCA included in some HRR panels (FANCL on PROfound HRR list). PARPi
  off-label consideration in HRD-positive. ESCAT IIIA / OncoKB Level 3B.
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
  - "niraparib (HRD-positive)"
  - "olaparib + bevacizumab"
contraindicated_monotherapy: []
primary_sources:
  - SRC-NCCN-OVARIAN-2025
  - SRC-ESMO-OVARIAN-2024
  - SRC-ONCOKB
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  Heterozygous FANCA actionability uncertain; biallelic loss = Fanconi anemia
  (avoid radiation, alkylators if applicable). Cascade testing case-by-case.
