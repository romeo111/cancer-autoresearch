id: BMA-FANCA-GERMLINE-OVARIAN
biomarker_id: BIO-HRR-PANEL
variant_qualifier: "FANCA germline pathogenic (heterozygous)"
disease_id: DIS-OVARIAN
escat_tier: "IIIA"
evidence_summary: >
  FANCA germline (heterozygous) in EOC: Fanconi-anemia-pathway gene; biallelic
  loss = Fanconi anemia (recessive). Heterozygous carriers have uncertain cancer
  risk. FANCA included in some HRR panels (FANCL on PROfound HRR list). PARPi
  off-label consideration in HRD-positive. ESCAT IIIA / OncoKB Level 3B.
evidence_summary_ua: >
  FANCA герміногенний (heterozygous) in EOC: Fanconi-анемія-pathway gene; biallelic loss = Fanconi анемія (recessive). Heterozygous carriers have uncertain рак risk. FANCA included in some HRR panels (FANCL on PROfound HRR list). PARPi off-label consideration in HRD-positive. ESCAT IIIA / OncoKB рівень 3B.
