  - "brentuximab vedotin + nivolumab — R/R cHL pre-/post-autoHCT per SRC-NCCN-BCELL-2025"
  - "brentuximab vedotin consolidation post-autoHCT — high-risk R/R cHL per SRC-NCCN-BCELL-2025"
contraindicated_monotherapy:
