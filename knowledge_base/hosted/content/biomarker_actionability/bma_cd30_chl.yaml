id: BMA-CD30-CHL
biomarker_id: BIO-CD30-IHC
variant_qualifier: "CD30 expression on Reed-Sternberg / Hodgkin cells (~100% positive by IHC — defining feature of classical Hodgkin lymphoma)"
disease_id: DIS-CHL
escat_tier: "IA"
evidence_summary: >
  CD30 is universally expressed on Reed-Sternberg cells in classical
  Hodgkin lymphoma and is the target of brentuximab vedotin (BV), an
  anti-CD30 antibody-drug conjugate (auristatin payload). 1L advanced-
  stage cHL: A+AVD (BV + doxorubicin/vinblastine/dacarbazine) is
  preferred over ABVD per ECHELON-1 (Ansell NEJM 2022 — 6y OS 93.9%
  vs 89.4%, HR 0.59) per SRC-NCCN-BCELL-2025, SRC-ESMO-HODGKIN-2024.
  Pediatric AHOD1331 supported BV + AVE-PC for high-risk pediatric.
  R/R cHL: BV monotherapy and BV + nivolumab are standard pre-/post-
  HCT options. BV consolidation post-autoHCT for high-risk R/R cHL
  (AETHERA Younes Lancet 2015 — improves PFS) per SRC-NCCN-BCELL-2025.
evidence_summary_ua: >
  CD30 is universally expressed on Reed-Sternberg cells in classical лімфома Ходжкіна and is the target of брентуксимаб ведотин (BV), an anti-CD30 кон'югат антитіло-препарат (auristatin payload). 1L поширений- stage cHL: A+AVD (BV + доксорубіцин/вінбластин/dacarbazine) is переважний over ABVD per ECHELON-1 (Ansell NEJM 2022 — 6y OS 93.9% проти 89.4%, HR 0.59) per SRC-NCCN-BCELL-2025, SRC-ESMO-HODGKIN-2024. педіатричний AHOD1331 supported BV + AVE-PC for високого ризику педіатричний. р/р cHL: BV монотерапія and BV + ніволумаб are стандарт pre-/post- HCT options. BV консолідація post-autoHCT for високого ризику р/р cHL (AETHERA Younes Lancet 2015 — покращує PFS) per SRC-NCCN-BCELL-2025.
