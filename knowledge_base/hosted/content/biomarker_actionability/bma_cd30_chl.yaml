notes: >
  ESCAT IA / OncoKB Level 1. CD30 IHC is universally positive in cHL,
  so the biomarker is essentially a histologic-confirmation gate
  rather than a selection threshold for the drug class. Source-gap:
  SRC-ECHELON-1, SRC-AETHERA, SRC-CHECKMATE-744 not yet ingested.
  PD-1 checkpoint inhibitors (pembrolizumab KEYNOTE-204, nivolumab
  CheckMate-205) are alternative biology-driven options in R/R cHL.
