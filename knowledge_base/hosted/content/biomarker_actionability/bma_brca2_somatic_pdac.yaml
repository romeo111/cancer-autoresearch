evidence_summary: >
  Somatic BRCA2 loss-of-function in metastatic PDAC: POLO germline-only; somatic
  series suggest similar PARPi sensitivity but evidence less robust. NCCN allows
  off-label PARPi consideration. ESCAT IIA / OncoKB Level 3A.
evidence_summary_ua: >
  соматичний BRCA2 втрата функції in метастатичний PDAC: POLO герміногенний-only; соматичний series suggest подібний PARPi чутливість but докази less robust. NCCN allows off-label PARPi consideration. ESCAT IIA / OncoKB рівень 3A.
