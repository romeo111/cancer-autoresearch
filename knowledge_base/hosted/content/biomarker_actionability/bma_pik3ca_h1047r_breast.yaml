notes: 'ESCAT IA. OncoKB Level 1. H1047R is a kinase-domain (exon 20) hotspot. Companion
  diagnostic: therascreen PIK3CA + Guardant360 CDx + FoundationOne Liquid CDx. Hyperglycemia
  is class-effect AE for alpelisib.

