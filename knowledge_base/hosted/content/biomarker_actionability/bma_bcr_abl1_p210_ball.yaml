id: BMA-BCR-ABL1-P210-BALL
biomarker_id: BIO-BCR-ABL1
variant_qualifier: "p210 (e13a2 / e14a2) — atypical Ph+ B-ALL"
disease_id: DIS-B-ALL
escat_tier: "IIA"
oncokb_level: "2"
evidence_summary: >
  p210 BCR-ABL1 in B-ALL (~30% of adult Ph+ ALL, much rarer in
  pediatric) — needs careful distinction from CML in lymphoid blast
  crisis. Treatment principles mirror p190 Ph+ ALL: TKI + chemotherapy
  or TKI + blinatumomab. Outcomes data limited by rarity but appear
  comparable to p190.
regulatory_approval:
  fda:
    - "ponatinib + chemotherapy — Ph+ B-ALL (FDA approved 2024)"
    - "dasatinib / imatinib + chemo — Ph+ B-ALL (FDA approved)"
  ema:
    - "ponatinib — Ph+ ALL (EMA approved)"
  ukraine: []
recommended_combinations:
  - "ponatinib + hyper-CVAD"
  - "dasatinib + blinatumomab"
  - "imatinib + chemotherapy"
contraindicated_monotherapy:
  - "TKI alone without chemo/immunotherapy backbone"
primary_sources:
  - SRC-NCCN-BCELL-2025
  - SRC-BLAST-GOKBUGET-2018
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IIA — strong retrospective evidence; treatment paradigm
  borrowed from p190 trials. Ensure CML in lymphoid BC is excluded
  (history, bone marrow, BCR-ABL transcript ratio).
