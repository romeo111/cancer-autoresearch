id: BMA-MET-AMP-NSCLC
biomarker_id: BIO-MET
variant_qualifier: amplification (high — gene copy number ≥10 or MET/CEP7 ≥4)
disease_id: DIS-NSCLC
escat_tier: IIA
evidence_summary: 'High-level MET amplification in NSCLC: capmatinib activity in high-amp
  cohort of GEOMETRY mono-1 (ORR ~29-40% at GCN ≥10). No FDA-approved drug for MET-amp
  alone — actionability is expansion-cohort / off-label / trial. Also a key resistance
  mechanism to EGFR-TKIs (post-osimertinib MET-amp → trial enrollment for amivantamab
  + lazertinib MARIPOSA-2 / SAVANNAH).

  '
evidence_summary_ua: 'High-level MET ампліфікація in NSCLC: капматиніб activity in
  high-amp cohort of GEOMETRY mono-1 (ORR ~29-40% at GCN ≥10). ні схвалений FDA drug
  for MET-amp alone — actionability is expansion-cohort / off-label / дослідження.
  Also a key resistance mechanism to EGFR-TKIs (post-осимертиніб MET-amp → дослідження
  enrollment for амівантамаб + лазертиніб MARIPOSA-2 / SAVANNAH).

  '
