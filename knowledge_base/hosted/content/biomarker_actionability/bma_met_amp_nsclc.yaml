id: BMA-MET-AMP-NSCLC
biomarker_id: BIO-MET
variant_qualifier: "amplification (high — gene copy number ≥10 or MET/CEP7 ≥4)"
disease_id: DIS-NSCLC
escat_tier: "IIA"
oncokb_level: "3A"
evidence_summary: >
  High-level MET amplification in NSCLC: capmatinib activity in
  high-amp cohort of GEOMETRY mono-1 (ORR ~29-40% at GCN ≥10).
  No FDA-approved drug for MET-amp alone — actionability is
  expansion-cohort / off-label / trial. Also a key resistance
  mechanism to EGFR-TKIs (post-osimertinib MET-amp → trial enrollment
  for amivantamab + lazertinib MARIPOSA-2 / SAVANNAH).
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
  - "capmatinib (off-label / trial for high-level amplification)"
  - "amivantamab + lazertinib (post-EGFR-TKI MET-amp resistance, MARIPOSA-2 / SAVANNAH context)"
contraindicated_monotherapy: []
primary_sources:
  - SRC-NCCN-NSCLC-2025
  - SRC-ESMO-NSCLC-METASTATIC-2024
  - SRC-ONCOKB
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IIA. OncoKB Level 3A. Threshold definitions vary across trials;
  GCN ≥10 by FISH or ≥6 copies by NGS most predictive. Distinguish
  primary amplification (de novo driver, ~1-2%) from acquired
  amplification (post-EGFR-TKI, ~15-30% of resistance).
