id: BMA-BRAF-V600E-OVARIAN
biomarker_id: BIO-BRAF-V600E
variant_qualifier: "V600E"
disease_id: DIS-OVARIAN
escat_tier: "IIA"
oncokb_level: "2"
evidence_summary: >
  BRAF V600E is a recurrent driver in low-grade serous ovarian
  carcinoma (LGSOC) — ~30% of LGSOC. Tissue-agnostic FDA approval
  of dabrafenib + trametinib for BRAF V600E solid tumors (Subbiah
  et al. ROAR; Salama et al. NCI-MATCH 2020) covers ovarian. ORR
  ~33% in basket trials. MEK inhibitors (trametinib, binimetinib)
  also active in LGSOC regardless of BRAF status (MILO, GOG 281).
regulatory_approval:
  fda:
    - "dabrafenib + trametinib — tissue-agnostic V600E unresectable/metastatic solid tumors after prior therapy (FDA 2022)"
  ema:
    - "dabrafenib + trametinib — V600E solid tumors (EMA 2023)"
  ukraine: []
recommended_combinations:
  - "dabrafenib + trametinib (tissue-agnostic indication; LGSOC preferred)"
  - "trametinib monotherapy (LGSOC, regardless of BRAF status — GOG 281)"
contraindicated_monotherapy: []
primary_sources:
  - SRC-NCCN-OVARIAN-2025
  - SRC-ESMO-OVARIAN-2024
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IIA — prospective basket evidence + tissue-agnostic
  approval. OncoKB Level 2. High-grade serous ovarian rarely BRAF
  V600E (<1%) — predominantly TP53-mutant; tissue-agnostic label
  still applies but yield is low. Reflex BRAF testing for LGSOC
  recommended.
