id: BMA-TP53-MUT-MCL
biomarker_id: BIO-TP53-MUTATION
variant_qualifier: "any pathogenic mutation OR del(17p)"
disease_id: DIS-MCL
escat_tier: "IIA"
oncokb_level: "3A"
evidence_summary: >
  TP53-mut MCL — predicts chemoimmuno failure. Acalabrutinib + rituximab (TRIANGLE / ECHO) preferred over R-CHOP/R-DHAP+autoSCT regardless of fitness.
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
  - "acalabrutinib + rituximab (1L)"
  - "ibrutinib + rituximab + venetoclax (R/R)"
  - "CAR-T brexu-cel (R/R)"
contraindicated_monotherapy: []
primary_sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-MCL-2024
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IIA. Gene-level cell — biallelic vs monoallelic distinction matters in MDS/AML (biallelic = TP53-multihit per IPSS-M / ICC 2022, far worse). Per-hotspot cells provided for the most common variants.
