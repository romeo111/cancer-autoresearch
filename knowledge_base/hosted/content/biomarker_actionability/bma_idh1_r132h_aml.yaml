id: BMA-IDH1-R132H-AML
biomarker_id: BIO-IDH-MUTATION
variant_qualifier: IDH1 R132H
disease_id: DIS-AML
escat_tier: IA
evidence_summary: 'IDH1 R132 mutations (~6-10% of AML). Ivosidenib monotherapy (AGILE,
  Montesinos et al. NEJM 2022 — combo with azacitidine; AG120-C-001 — monotherapy
  in R/R) FDA-approved. Ivosidenib + azacitidine (1L unfit, AGILE) doubles OS vs azacitidine
  alone.

  '
evidence_summary_ua: 'IDH1 R132 мутації (~6-10% of AML). івосиденіб монотерапія (AGILE,
  Montesinos et al. NEJM 2022 — combo with азацитидин; AG120-C-001 — монотерапія in
  р/р) схвалений FDA. івосиденіб + азацитидин (1L unfit, AGILE) doubles OS vs азацитидин
  alone.

  '
