id: BMA-MET-AMP-RCC-PAPILLARY
biomarker_id: BIO-MET
variant_qualifier: "amplification or activating mutation (papillary type-1 context)"
disease_id: DIS-RCC
escat_tier: "IIA"
evidence_summary: >
  MET-driven papillary type-1 RCC: cabozantinib superior to sunitinib
  in MET-driven pRCC (PAPMET / SWOG-1500, Pal 2021 — PFS 9.0 vs 5.6 mo
  in MET-driven cohort). Savolitinib (selective MET-TKI) showed
  activity in MET-driven papillary RCC (SAVOIR phase 3 closed early
  for futility vs sunitinib but signal in MET-driven subset).
evidence_summary_ua: >
  MET-driven papillary type-1 RCC: кабозантиніб перевершує сунитиніб in MET-driven pRCC (PAPMET / SWOG-1500, Pal 2021 — PFS 9.0 проти 5.6 mo in MET-driven cohort). саволітиніб (селективний MET-TKI) showed activity in MET-driven papillary RCC (SAVOIR фаза 3 closed early for futility vs сунитиніб but signal in MET-driven subset).
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
  fda:
    - "cabozantinib — advanced RCC including papillary (FDA approved 2016 for ccRCC; pRCC use is guideline-supported off-label / NCCN preferred)"
  ema:
