id: BMA-MET-AMP-RCC-PAPILLARY
biomarker_id: BIO-MET
variant_qualifier: "amplification or activating mutation (papillary type-1 context)"
disease_id: DIS-RCC
escat_tier: "IIA"
oncokb_level: "2"
evidence_summary: >
  MET-driven papillary type-1 RCC: cabozantinib superior to sunitinib
  in MET-driven pRCC (PAPMET / SWOG-1500, Pal 2021 — PFS 9.0 vs 5.6 mo
  in MET-driven cohort). Savolitinib (selective MET-TKI) showed
  activity in MET-driven papillary RCC (SAVOIR phase 3 closed early
  for futility vs sunitinib but signal in MET-driven subset).
regulatory_approval:
  fda:
    - "cabozantinib — advanced RCC including papillary (FDA approved 2016 for ccRCC; pRCC use is guideline-supported off-label / NCCN preferred)"
  ema:
    - "cabozantinib — advanced RCC (EMA approved)"
  ukraine: []
recommended_combinations:
  - "cabozantinib monotherapy (preferred for MET-driven pRCC type-1)"
  - "savolitinib (trial / off-label)"
contraindicated_monotherapy:
  - "sunitinib (inferior in MET-driven pRCC per PAPMET)"
primary_sources:
  - SRC-NCCN-KIDNEY-2025
  - SRC-ESMO-RCC-2024
  - SRC-ONCOKB
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IIA. OncoKB Level 2. Note: DIS-RCC is the umbrella entity
  (no separate DIS-RCC-PAPILLARY); papillary type-1 distinction is
  captured in variant_qualifier and notes. Trial-source gap:
  SRC-PAPMET / SRC-SAVOIR not yet ingested.
