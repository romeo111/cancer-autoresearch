id: BMA-BCR-ABL1-E255K-CML
biomarker_id: BIO-BCR-ABL1
variant_qualifier: "E255K / E255V (P-loop)"
disease_id: DIS-CML
escat_tier: "IB"
oncokb_level: "R2"
evidence_summary: >
  BCR-ABL1 E255K/V is a P-loop mutation conferring strong resistance
  to imatinib and reduced sensitivity to nilotinib. Dasatinib retains
  activity; ponatinib is fully active. P-loop mutations historically
  associated with worse outcomes — consider ponatinib early.
regulatory_approval:
  fda:
    - "dasatinib — 2L CML (FDA approved)"
    - "ponatinib — multi-TKI-resistant CML (FDA approved)"
  ema:
    - "dasatinib / ponatinib — 2L+ CML (EMA approved)"
  ukraine: []
recommended_combinations:
  - "dasatinib monotherapy"
  - "ponatinib monotherapy"
  - "asciminib monotherapy (in multi-TKI failure)"
contraindicated_monotherapy:
  - "imatinib (resistant)"
  - "nilotinib (reduced sensitivity)"
primary_sources:
  - SRC-ELN-CML-2025
  - SRC-ELN-CML-2020
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  OncoKB R2. P-loop mutations (E255K/V, Y253H) are clinically high-risk —
  early ponatinib use is reasonable per ELN guidance.
