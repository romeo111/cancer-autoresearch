id: BMA-BCR-ABL1-E255K-CML
biomarker_id: BIO-BCR-ABL1
variant_qualifier: "E255K / E255V (P-loop)"
disease_id: DIS-CML
escat_tier: "IB"
evidence_summary: >
  BCR-ABL1 E255K/V is a P-loop mutation conferring strong resistance
  to imatinib and reduced sensitivity to nilotinib. Dasatinib retains
  activity; ponatinib is fully active. P-loop mutations historically
  associated with worse outcomes — consider ponatinib early.
evidence_summary_ua: >
  BCR-ABL1 E255K/V is a P-loop мутація conferring strong резистентність до іматиніб and зменшений чутливість to нілотиніб. дазатиніб retains activity; понатиніб is fully active. P-loop мутації historically associated with гірше outcomes — consider понатиніб early.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
