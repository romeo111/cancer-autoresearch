id: BMA-ALK-EML4-V1-NSCLC
biomarker_id: BIO-ALK-FUSION
variant_qualifier: "EML4-ALK variant 1 (E13;A20)"
disease_id: DIS-NSCLC
escat_tier: "IA"
evidence_summary: >
  EML4-ALK variant 1 (E13;A20) is a stable fusion isoform with longer
  PFS on 2nd-gen ALK-TKIs vs variant 3. Standard 1L is alectinib or
  lorlatinib; v1 patients show particularly durable responses to
  alectinib (~3-year median PFS in subset analyses of ALEX and J-ALEX).
evidence_summary_ua: >
  EML4-ALK варіант 1 (E13;A20) is a stable злиття isoform with longer PFS on 2nd-gen ALK-TKIs vs варіант 3. стандарт 1L is алектиніб or лорлатиніб; v1 patients show особливо durable responses to алектиніб (~3-year медіана ВБП in subset analyses of ALEX and J-ALEX).
