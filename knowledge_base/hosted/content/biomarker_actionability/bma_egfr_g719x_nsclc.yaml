id: BMA-EGFR-G719X-NSCLC
biomarker_id: BIO-EGFR-MUTATION
variant_qualifier: "exon 18 G719X"
disease_id: DIS-NSCLC
escat_tier: "IB"
oncokb_level: "1"
evidence_summary: >
  EGFR exon 18 G719X (G719A/C/S) is an "uncommon" sensitizing mutation
  (~3% of EGFR-mut NSCLC). Afatinib (LUX-Lung pooled analysis, Yang
  2015) shows highest activity in G719X; osimertinib also active
  (UNICORN, Ahn 2022). Often co-occurs with S768I or L861Q.
evidence_summary_ua: >
  EGFR exon 18 G719X (G719A/C/S) is an "uncommon" sensitizing мутація (~3% of EGFR-mut NSCLC). афатиніб (LUX-Lung pooled analysis, Yang 2015) shows найвища activity in G719X; осимертиніб also active (UNICORN, Ahn 2022). часто co-occurs with S768I or L861Q.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
