id: BMA-NTRK-FUSION-GIST
biomarker_id: BIO-NTRK-FUSION
variant_qualifier: "NTRK1/3 fusion (rare in KIT/PDGFRA wild-type GIST)"
disease_id: DIS-GIST
escat_tier: "IA"
oncokb_level: "1"
evidence_summary: >
  NTRK fusion in GIST is rare and confined to KIT/PDGFRA wild-type
  GIST (which is itself ~10-15% of GIST). Larotrectinib and entrectinib
  are FDA tumor-agnostic for NTRK-fusion solid tumors; GIST cohort
  small but consistent with pan-tumor response rates.
evidence_summary_ua: >
  NTRK злиття in GIST is рідкісний and confined to KIT/PDGFRA wild-type GIST (which is itself ~10-15% of GIST). ларотрексиніб and ентректиніб are FDA пухлина-agnostic for NTRK-злиття solid tumors; GIST cohort small but consistent with pan-пухлина відповідь rates.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
  fda:
    - "larotrectinib — NTRK-fusion solid tumors (FDA tumor-agnostic 2018)"
    - "entrectinib — NTRK-fusion solid tumors (FDA tumor-agnostic 2019)"
  ema:
    - "larotrectinib / entrectinib — NTRK-fusion solid tumors (EMA tumor-agnostic 2019/2020)"
  ukraine: []
recommended_combinations:
  - "larotrectinib monotherapy"
  - "entrectinib monotherapy"
contraindicated_monotherapy:
  - "imatinib (KIT/PDGFRA-WT GIST is imatinib-refractory)"
primary_sources:
  - SRC-ONCOKB
  - SRC-FDA-CDS-2026
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IA. OncoKB Level 1. NTRK-fusion screening in GIST should
  be reserved for KIT/PDGFRA-WT cases (after SDHB IHC to exclude
  SDH-deficient GIST). Source-gap: SRC-NCCN-SARCOMA / SRC-NCCN-GIST
  not yet ingested.
