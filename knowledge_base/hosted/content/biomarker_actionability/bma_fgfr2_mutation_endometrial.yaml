id: BMA-FGFR2-MUTATION-ENDOMETRIAL
biomarker_id: BIO-FGFR2
variant_qualifier: activating mutation (~12% endometrioid; hotspots S252W, N549K,
  K310R)
disease_id: DIS-ENDOMETRIAL
escat_tier: IIA
evidence_summary: 'FGFR2 mutation in endometrial carcinoma (~10-12% endometrioid histology).
  Pemigatinib and erdafitinib have basket activity (FIGHT-207, Mirati / NCI-MATCH
  EAY131-W) — ORR ~25-30% in FGFR2-mutant endometrial. No regulatory approval for
  endometrial alone; tumor-agnostic FGFR-TKI label not yet granted.

  '
evidence_summary_ua: 'FGFR2 мутація in endometrial карцинома (~10-12% endometrioid
  гістологія). Pemigatinib and erdafitinib have basket activity (FIGHT-207, Mirati
  / NCI-MATCH EAY131-W) — ORR ~25-30% in FGFR2-mutant endometrial. ні regulatory схвалення
  for endometrial alone; пухлина-agnostic FGFR-TKI label not yet granted.

  '
