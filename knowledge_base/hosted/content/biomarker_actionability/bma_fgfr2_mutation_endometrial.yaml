id: BMA-FGFR2-MUTATION-ENDOMETRIAL
biomarker_id: BIO-FGFR2
variant_qualifier: "activating mutation (~12% endometrioid; hotspots S252W, N549K, K310R)"
disease_id: DIS-ENDOMETRIAL
escat_tier: "IIA"
oncokb_level: "3A"
evidence_summary: >
  FGFR2 mutation in endometrial carcinoma (~10-12% endometrioid
  histology). Pemigatinib and erdafitinib have basket activity
  (FIGHT-207, Mirati / NCI-MATCH EAY131-W) — ORR ~25-30% in
  FGFR2-mutant endometrial. No regulatory approval for endometrial
  alone; tumor-agnostic FGFR-TKI label not yet granted.
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
  - "pemigatinib (basket trial / NCI-MATCH for FGFR2-mutant endometrial)"
  - "erdafitinib (basket trial)"
contraindicated_monotherapy: []
primary_sources:
  - SRC-NCCN-UTERINE-2025
  - SRC-ESGO-ENDOMETRIAL-2025
  - SRC-ONCOKB
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IIA. OncoKB Level 3A. Standard advanced/recurrent endometrial
  1L is carboplatin + paclitaxel ± dostarlimab (RUBY) /
  pembrolizumab (NRG-GY018) for dMMR or pMMR. FGFR2 testing reserved
  for trial enrollment / panel-detected. Trial-source gap: SRC-FIGHT-207
  not yet ingested.
