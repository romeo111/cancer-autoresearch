id: BMA-BRCA1-GERMLINE-BREAST
biomarker_id: BIO-BRCA1-BRCA2-GERMLINE
variant_qualifier: "BRCA1 germline pathogenic"
disease_id: DIS-BREAST
escat_tier: "IA"
oncokb_level: "1"
evidence_summary: >
  BRCA1 germline pathogenic in HER2-negative metastatic breast (HR+ or TNBC):
  olaparib (OlympiAD, Robson 2017) and talazoparib (EMBRACA, Litton 2018)
  improve PFS vs physician-choice chemotherapy. In early-stage high-risk
  HER2-negative: 1y adjuvant olaparib improves iDFS and OS (OlympiA, Tutt 2021).
  ESCAT IA / OncoKB Level 1.
evidence_summary_ua: >
  BRCA1 герміногенний патогенний in HER2-negative метастатичний breast (HR+ or TNBC): олапариб (OlympiAD, Robson 2017) and талазопариб (EMBRACA, Litton 2018) improve PFS vs physician-choice хіміотерапія. In ранньої стадії високого ризику HER2-negative: 1y ад'ювантний олапариб покращує iDFS and OS (OlympiA, Tutt 2021). ESCAT IA / OncoKB рівень 1.
