notes: >
  Germline finding triggers cascade testing. Adjuvant olaparib eligibility: TNBC
  pT≥2 or pN+, or HR+ with CPS+EG ≥3 after neoadjuvant chemo. Platinum-based
  chemo also active in TNBC (TNT trial).
