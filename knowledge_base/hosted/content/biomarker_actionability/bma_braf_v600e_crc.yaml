id: BMA-BRAF-V600E-CRC
biomarker_id: BIO-BRAF-V600E
variant_qualifier: "V600E"
disease_id: DIS-CRC
escat_tier: "IB"
oncokb_level: "1"
evidence_summary: >
  BRAF V600E in metastatic CRC: encorafenib + cetuximab (with or without
  binimetinib) improves OS vs cetuximab+irinotecan in 2L+ (BEACON-CRC,
  Kopetz et al. 2019). BRAFi monotherapy is ineffective in CRC due to
  EGFR-mediated feedback reactivation — distinct from melanoma where
  BRAFi alone works.
evidence_summary_ua: >
  BRAF V600E in метастатичний CRC: енкорафеніб + цетуксимаб (with or without біниметиніб) покращує OS vs цетуксимаб+іринотекан in 2L+ (BEACON-CRC, Kopetz et al. 2019). BRAFi монотерапія is ineffective in CRC due to EGFR-mediated feedback reactivation — distinct from меланома where BRAFi alone works.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
  fda:
    - "encorafenib + cetuximab — mCRC 2L+ (FDA approved 2020)"
  ema:
    - "encorafenib + cetuximab — mCRC 2L+ (EMA approved 2020)"
  ukraine: []
recommended_combinations:
  - "encorafenib + cetuximab"
  - "encorafenib + cetuximab + binimetinib (off-label triplet)"
contraindicated_monotherapy:
  - "vemurafenib alone (CRC-resistant)"
  - "any BRAFi monotherapy in CRC"
primary_sources:
  - SRC-NCCN-COLON-2025
  - SRC-ESMO-COLON-2024
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IB per ESMO mCRC living guideline. OncoKB Level 1. Companion
  diagnostic: any FDA-approved BRAF V600E test (cobas, FoundationOne CDx).
  Not approved as monotherapy in CRC — combination only. Source ID note:
  task brief referenced SRC-ESMO-CRC-2024 but the actual KB entity is
  SRC-ESMO-COLON-2024 (matches the file naming convention for ESMO sources).
