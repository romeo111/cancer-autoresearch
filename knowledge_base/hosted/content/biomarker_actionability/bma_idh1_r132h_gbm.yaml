id: BMA-IDH1-R132H-GBM
biomarker_id: BIO-IDH-MUTATION
variant_qualifier: "IDH1 R132H"
disease_id: DIS-GBM
escat_tier: "IIA"
oncokb_level: "2"
evidence_summary: >
  IDH1 R132H — defines IDH-mutant astrocytoma (WHO 2021 grade 2-4)
  and oligodendroglioma (with 1p/19q codeletion). Vorasidenib
  improved PFS in residual/recurrent grade 2 IDH-mut glioma post-
  resection (INDIGO, Mellinghoff et al. NEJM 2023) — FDA-approved
  2024. For grade 4 (IDH-mut GBM equivalent) — standard of care
  still RT + TMZ; ivosidenib explored.
regulatory_approval:
  fda:
    - "vorasidenib — grade 2 IDH-mut astrocytoma/oligodendroglioma post-resection (FDA 2024)"
  ema:
    - "vorasidenib — grade 2 IDH-mut glioma (EMA 2024)"
  ukraine: []
recommended_combinations:
  - "vorasidenib monotherapy (low-grade IDH-mut)"
  - "ivosidenib (high-grade IDH-mut, off-label/trial)"
contraindicated_monotherapy: []
primary_sources:
  - SRC-NCCN-CNS-2025
  - SRC-EANO-GBM-2024
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IIA. OncoKB Level 2. IDH-mut GBM is a distinct entity from IDH-WT GBM and has better prognosis. R132H IHC is the standard screening test; non-canonical R132 require sequencing.
