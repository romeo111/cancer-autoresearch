recommended_combinations:
- trametinib monotherapy (Class 2; investigational)
- clinical trial enrollment (pan-RAF + MEKi)
contraindicated_monotherapy:
- vemurafenib / dabrafenib monotherapy (paradoxical RAS-RAF activation)
- encorafenib monotherapy (same paradoxical effect)
