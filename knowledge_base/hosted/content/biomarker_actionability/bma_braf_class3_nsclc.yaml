id: BMA-BRAF-CLASS3-NSCLC
biomarker_id: BIO-BRAF-V600E
variant_qualifier: non-V600 (Class 2 / Class 3 — kinase-dead, RAS-dependent)
disease_id: DIS-NSCLC
escat_tier: IIIB
evidence_summary: 'Class 2 BRAF (e.g., K601E, L597, fusions) — RAS-independent, signal
  as dimers. Class 3 BRAF (e.g., G466, N581, D594) — kinase-impaired, RAS-dependent.
  Neither responds well to V600E-targeted vemurafenib. Trametinib monotherapy or MEKi
  + pan-RAF inhibitors under investigation. NCI-MATCH subprotocol H (trametinib for
  non-V600 BRAF) showed limited responses.

  '
evidence_summary_ua: 'Class 2 BRAF (e.g., K601E, L597, fusions) — RAS-independent,
  signal as dimers. Class 3 BRAF (e.g., G466, N581, D594) — kinase-impaired, RAS-dependent.
  Neither responds well to V600E-targeted вемурафеніб. траметиніб монотерапія or MEKi
  + pan-RAF інгібітори under investigation. NCI-MATCH subprotocol H (траметиніб for
  non-V600 BRAF) showed limited responses.

  '
