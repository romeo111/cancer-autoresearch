id: BMA-MSH6-GERMLINE-ENDOMETRIAL
biomarker_id: BIO-DMMR-IHC
variant_qualifier: "MSH6 germline loss-of-function (dMMR / MSI-H)"
disease_id: DIS-ENDOMETRIAL
escat_tier: "IA"
oncokb_level: "1"
evidence_summary: >
  MSH6 germline loss-of-function in endometrial produces dMMR/MSI-H phenotype.
  Pan-tumor MSI-H ICI eligibility (pembrolizumab per KEYNOTE-158, dostarlimab
  per GARNET) supersedes tumor-specific lines via tissue-agnostic FDA approval.
  Advanced/recurrent dMMR endometrial: dostarlimab + carbo/paclitaxel 1L (RUBY)
  and pembrolizumab + carbo/paclitaxel (NRG-GY018) doubled PFS.
  Dostarlimab/pembrolizumab monotherapy in 2L+. Adjuvant ICI in early-stage dMMR
  under study.
regulatory_approval:
  fda:
    - "dostarlimab + chemo — 1L advanced/recurrent dMMR endometrial (FDA 2023)"
    - "pembrolizumab + chemo — 1L advanced endometrial (FDA 2024)"
    - "dostarlimab monotherapy — dMMR pretreated (FDA 2021)"
    - "pembrolizumab — pan-tumor MSI-H/dMMR"
  ema:
    - "dostarlimab + chemo — 1L dMMR endometrial (EMA 2023)"
  ukraine: []
recommended_combinations:
  - "dostarlimab + carbo/paclitaxel (1L advanced dMMR, RUBY)"
  - "pembrolizumab + carbo/paclitaxel (1L advanced, NRG-GY018)"
  - "dostarlimab monotherapy (2L+ dMMR, GARNET)"
  - "pembrolizumab monotherapy (pan-tumor MSI-H)"
contraindicated_monotherapy: []
primary_sources:
  - SRC-NCCN-UTERINE-2025
  - SRC-ESGO-ENDOMETRIAL-2025
  - SRC-ONCOKB
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  Germline MSH6 loss → cascade testing mandatory (Lynch syndrome). Family meets
  Amsterdam/Bethesda criteria. Pan-tumor MSI-H ICI eligibility supersedes tumor-
  specific lines.
