id: BMA-PIK3CA-E545K-BREAST
biomarker_id: BIO-PIK3CA-MUTATION
variant_qualifier: "E545K"
disease_id: DIS-BREAST
escat_tier: "IA"
oncokb_level: "1"
evidence_summary: >
  PIK3CA hotspot mutations (~40% of HR+/HER2- metastatic breast cancer):
  alpelisib + fulvestrant improves PFS vs fulvestrant alone (SOLAR-1,
  André et al. NEJM 2019) in PIK3CA-mut after AI failure. Inavolisib +
  palbociclib + fulvestrant (INAVO120, Turner et al. NEJM 2024) improves
  PFS in 1L PIK3CA-mut HR+/HER2- with ET-resistance — FDA-approved 2024.
  Capivasertib + fulvestrant (CAPItello-291, Turner et al. NEJM 2023)
  also active in PIK3CA-mut.
evidence_summary_ua: >
  PIK3CA hotspot мутації (~40% of HR+/HER2- метастатичний рак молочної залози): алпелісиб + фулвестрант покращує PFS vs фулвестрант alone (SOLAR-1, André et al. NEJM 2019) in PIK3CA-mut after AI failure. Inavolisib + палбоциклиб + фулвестрант (INAVO120, Turner et al. NEJM 2024) покращує PFS in 1L PIK3CA-mut HR+/HER2- with ET-resistance — схвалений FDA 2024. Capivasertib + фулвестрант (CAPItello-291, Turner et al. NEJM 2023) also active in PIK3CA-mut.
