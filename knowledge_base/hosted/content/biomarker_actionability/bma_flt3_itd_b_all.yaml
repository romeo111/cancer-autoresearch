  - SRC-ONCOKB
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IIIA. OncoKB Level 3B. Standard B-ALL therapy (pediatric-
  inspired chemo / blinatumomab / inotuzumab / CAR-T) applies; FLT3
  status does not currently modify treatment.
