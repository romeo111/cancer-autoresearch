id: BMA-FLT3-ITD-B-ALL
biomarker_id: BIO-FLT3-ITD
variant_qualifier: "internal tandem duplication (rare in B-ALL ~1-3%, MLL-rearranged enriched)"
disease_id: DIS-B-ALL
escat_tier: "IIIA"
oncokb_level: "3B"
evidence_summary: >
  FLT3-ITD in B-ALL is rare (~1-3% adult; enriched in MLL/KMT2A-
  rearranged infant ALL). Gilteritinib and midostaurin have basket
  activity in FLT3-mutant ALL but no phase-3 evidence. Tumor-agnostic
  FLT3i actionability is informed by AML data; specific B-ALL trials
  pending.
evidence_summary_ua: >
  FLT3-ITD in B-ALL is рідкісний (~1-3% дорослий; enriched in MLL/KMT2A- перебудований infant ALL). гілтеритиніб and мідостаурин have basket activity in FLT3-mutant ALL but ні phase-3 докази. пухлина-agnostic FLT3i actionability is informed by AML дані; specific B-ALL trials pending.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
