evidence_summary: >
  IDH2 R140Q (~5-9% of AML). Enasidenib (IDHIFA, AG221-C-001 Stein et al. Blood 2017) FDA-approved 2017 for R/R IDH2-mut AML. IDHENTIFY (Ph3) confirmed OS benefit late-line. Combos with azacitidine (Ph2) promising 1L unfit.
