id: BMA-KIT-EXON11-GIST
biomarker_id: BIO-KIT
variant_qualifier: "exon 11 deletion / insertion (juxtamembrane domain — ~50% of GIST)"
disease_id: DIS-GIST
escat_tier: "IA"
oncokb_level: "1"
evidence_summary: >
  KIT exon 11 mutation in GIST: imatinib 400 mg/day is standard 1L
  (B2222, Demetri NEJM 2002 — ORR 67%; EORTC-62005 / S0033 confirmed
  long-term benefit). Exon 11 mutants have the longest PFS and OS
  on imatinib of any GIST genotype. Adjuvant imatinib 3 yr post-
  resection improves RFS in high-risk disease (SSG-XVIII / ACOSOG-Z9001).
regulatory_approval:
  fda:
    - "imatinib 400 mg — advanced/metastatic KIT+ GIST (FDA approved 2002)"
    - "imatinib — adjuvant high-risk resected GIST 3 yr (FDA approved 2008/2012)"
  ema:
    - "imatinib — KIT+ GIST advanced and adjuvant (EMA approved 2002/2009)"
  ukraine: []
recommended_combinations:
  - "imatinib 400 mg/day (1L advanced/metastatic)"
  - "imatinib 400 mg/day adjuvant 3 yr (high-risk resected: ≥3 cm + mitoses ≥5/50 HPF, or rupture, or non-gastric primary)"
  - "imatinib adjuvant 6 yr (extended for highest-risk per PERSIST-5 / SSG-XXII)"
contraindicated_monotherapy: []
primary_sources:
  - SRC-ONCOKB
  - SRC-IRIS-OBRIEN-2003
  - SRC-NCCN-MELANOMA-2025
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IA. OncoKB Level 1. Source-gap: SRC-NCCN-SARCOMA / SRC-NCCN-GIST
  / SRC-B2222-DEMETRI / SRC-EORTC-62005 / SRC-SSG-XVIII not yet
  ingested — using SRC-NCCN-MELANOMA placeholder per DIS-GIST source
  gap. SRC-IRIS-OBRIEN-2003 cited as the imatinib pivotal CML/GIST-era
  reference. Resistance: secondary KIT exon 13/14 (ATP-binding) or
  17/18 (activation loop) mutations emerge during therapy.
