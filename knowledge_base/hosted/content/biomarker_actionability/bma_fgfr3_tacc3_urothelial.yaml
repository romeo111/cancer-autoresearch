id: BMA-FGFR3-TACC3-UROTHELIAL
biomarker_id: BIO-FGFR3-MUTATION
variant_qualifier: "FGFR3-TACC3 fusion"
disease_id: DIS-UROTHELIAL
escat_tier: "IA"
oncokb_level: "1"
evidence_summary: >
  FGFR3-TACC3 fusion is an activating rearrangement in urothelial
  carcinoma (~2-3%). Included in the erdafitinib companion-diagnostic
  FGFR alteration list. Erdafitinib responses in fusion-positive
  patients are comparable to those in mutation-positive (THOR, BLC2001).
evidence_summary_ua: >
  FGFR3-TACC3 злиття is an activating перебудова in уротеліальна карцинома (~2-3%). Included in the erdafitinib companion-діагностичний FGFR альтерація list. Erdafitinib responses in злиття-positive patients are співставний з those in мутація-positive (THOR, BLC2001).
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
  fda:
    - "erdafitinib — FGFR3-altered metastatic urothelial 2L+ (FDA approved 2024)"
  ema:
    - "erdafitinib — FGFR3-altered metastatic urothelial (EMA approved)"
  ukraine: []
recommended_combinations:
  - "erdafitinib monotherapy"
contraindicated_monotherapy: []
primary_sources:
  - SRC-NCCN-BLADDER-2025
  - SRC-EAU-BLADDER-2024
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IA. RNA-NGS preferred for fusion detection; some DNA panels
  miss intronic breakpoints.
