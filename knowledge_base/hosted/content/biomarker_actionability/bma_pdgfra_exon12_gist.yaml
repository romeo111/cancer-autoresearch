id: BMA-PDGFRA-EXON12-GIST
biomarker_id: BIO-PDGFRA
variant_qualifier: exon 12 mutation (juxtamembrane domain — V561D most common; rare
  <2% GIST)
disease_id: DIS-GIST
escat_tier: IB
evidence_summary: 'PDGFRA exon 12 mutations in GIST are imatinib-sensitive. Imatinib
  400 mg/day is standard 1L — response rates comparable to KIT exon 11 and PDGFRA
  non-D842V exon 18. Rare genotype (<2% of GIST).

  '
evidence_summary_ua: 'PDGFRA exon 12 мутації in GIST are іматиніб-sensitive. іматиніб
  400 mg/day is стандарт 1L — відповідь rates співставний з KIT exon 11 and PDGFRA
  non-D842V exon 18. рідкісний генотип (<2% of GIST).

  '
