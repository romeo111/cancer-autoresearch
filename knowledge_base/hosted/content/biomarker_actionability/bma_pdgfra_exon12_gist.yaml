id: BMA-PDGFRA-EXON12-GIST
biomarker_id: BIO-PDGFRA
variant_qualifier: "exon 12 mutation (juxtamembrane domain — V561D most common; rare <2% GIST)"
disease_id: DIS-GIST
escat_tier: "IB"
oncokb_level: "1"
evidence_summary: >
  PDGFRA exon 12 mutations in GIST are imatinib-sensitive. Imatinib
  400 mg/day is standard 1L — response rates comparable to KIT exon 11
  and PDGFRA non-D842V exon 18. Rare genotype (<2% of GIST).
regulatory_approval:
  fda:
    - "imatinib — KIT/PDGFRA-mutant advanced GIST (FDA approved 2002)"
  ema:
    - "imatinib — KIT/PDGFRA+ GIST advanced and adjuvant (EMA approved 2002/2009)"
  ukraine: []
recommended_combinations:
  - "imatinib 400 mg/day (1L advanced/metastatic)"
contraindicated_monotherapy: []
primary_sources:
  - SRC-ONCOKB
  - SRC-IRIS-OBRIEN-2003
  - SRC-NCCN-MELANOMA-2025
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IB. OncoKB Level 1. Source-gap as DIS-GIST.
