id: BMA-BRCA2-GERMLINE-PROSTATE
biomarker_id: BIO-BRCA1-BRCA2-GERMLINE
variant_qualifier: "BRCA2 germline pathogenic"
disease_id: DIS-PROSTATE
escat_tier: "IA"
evidence_summary: >
  BRCA2 germline pathogenic in mCRPC: largest PARPi benefit in HRR pathway
  (PROfound Cohort A); olaparib post-NHA, 1L olaparib+abiraterone (PROpel),
  niraparib+abiraterone (MAGNITUDE), talazoparib+enzalutamide (TALAPRO-2) all
  approved. ESCAT IA / OncoKB Level 1.
evidence_summary_ua: >
  BRCA2 герміногенний патогенний in mCRPC: largest PARPi виграш in HRR pathway (PROfound Cohort A); олапариб post-NHA, 1L олапариб+абіратерон (PROpel), нірапариб+абіратерон (MAGNITUDE), талазопариб+ензалутамід (TALAPRO-2) all схвалений. ESCAT IA / OncoKB рівень 1.
