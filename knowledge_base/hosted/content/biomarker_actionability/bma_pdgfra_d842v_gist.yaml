id: BMA-PDGFRA-D842V-GIST
biomarker_id: BIO-PDGFRA
variant_qualifier: "D842V (activation loop, exon 18 — ~7% of GIST, predominantly gastric)"
disease_id: DIS-GIST
escat_tier: "IA"
oncokb_level: "1"
evidence_summary: >
  PDGFRA D842V in GIST is imatinib-RESISTANT (distinct from
  imatinib-sensitive PDGFRA non-D842V mutations). Avapritinib
  (NAVIGATOR phase 1/2 + VOYAGER phase 3, Heinrich Lancet Oncol 2020 /
  Kang JCO 2022 — ORR 88-91% in D842V GIST; treatment-naive cohort)
  is FDA-approved for advanced D842V GIST. Imatinib, sunitinib,
  regorafenib are ineffective.
regulatory_approval:
  fda:
    - "avapritinib — PDGFRA D842V advanced GIST (FDA approved 2020 per NAVIGATOR / VOYAGER)"
  ema:
    - "avapritinib — PDGFRA D842V advanced GIST (EMA approved 2020)"
  ukraine: []
recommended_combinations:
  - "avapritinib monotherapy (1L for advanced D842V GIST — irrespective of line)"
contraindicated_monotherapy:
  - "imatinib (D842V resistant)"
  - "sunitinib (D842V resistant)"
  - "regorafenib (D842V resistant)"
  - "ripretinib (modest activity in D842V; reserve for avapritinib failure)"
primary_sources:
  - SRC-ONCOKB
  - SRC-FDA-CDS-2026
  - SRC-NCCN-MELANOMA-2025
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IA. OncoKB Level 1. Source-gap: SRC-NCCN-SARCOMA / SRC-NCCN-GIST
  / SRC-NAVIGATOR / SRC-VOYAGER not yet ingested. CNS toxicity
  (cognitive effects, intracranial hemorrhage) is on-target / dose-
  related — dose modifications standard. Companion-diagnostic genotyping
  via NGS panel mandatory before avapritinib initiation. Adjuvant
  imatinib has NO benefit in D842V GIST — these patients should be
  observed post-resection.
