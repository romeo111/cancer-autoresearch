id: BMA-ATM-LOSS-MCL
biomarker_id: BIO-HRR-PANEL
variant_qualifier: "ATM loss-of-function (mutation or 11q deletion)"
disease_id: DIS-MCL
escat_tier: "IIA"
oncokb_level: "3A"
evidence_summary: >
  ATM is the most common somatic mutation in MCL (~40-50%). Not directly
  therapy-selecting; standard MCL regimens (BTKi, R-CHOP/R-DHAP induction +
  ASCT, BR) apply. ATM loss may sensitize to ATR inhibitors in trials. ESCAT IIA
  (biological) / OncoKB Level 3A.
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
  - "standard MCL therapy by fitness (BTKi, R-CHOP/R-DHAP+ASCT, BR)"
  - "ATR inhibitor in trial (experimental)"
contraindicated_monotherapy: []
primary_sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-MCL-2024
  - SRC-ONCOKB
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  Concurrent TP53 mutation is the dominant adverse prognostic in MCL; isolated
  ATM is less prognostic.
