id: BMA-ATM-LOSS-MCL
biomarker_id: BIO-HRR-PANEL
variant_qualifier: ATM loss-of-function (mutation or 11q deletion)
disease_id: DIS-MCL
escat_tier: IIA
evidence_summary: 'ATM is the most common somatic mutation in MCL (~40-50%). Not directly
  therapy-selecting; standard MCL regimens (BTKi, R-CHOP/R-DHAP induction + ASCT,
  BR) apply. ATM loss may sensitize to ATR inhibitors in trials. ESCAT IIA (biological)
  / OncoKB Level 3A.

  '
evidence_summary_ua: 'ATM is the найбільш поширений соматичний мутація in MCL (~40-50%).
  Not directly терапія-selecting; стандарт MCL схеми (BTKi, R-CHOP/R-DHAP індукція
  + ASCT, BR) apply. ATM loss may sensitize to ATR інгібітори in trials. ESCAT IIA
  (biological) / OncoKB рівень 3A.

  '
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
