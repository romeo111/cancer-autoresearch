id: BMA-ALK-EML4-V3-NSCLC
biomarker_id: BIO-ALK-FUSION
variant_qualifier: EML4-ALK variant 3 (E6;A20)
disease_id: DIS-NSCLC
escat_tier: IA
evidence_summary: 'EML4-ALK variant 3 is associated with shorter PFS on 2nd-gen ALK-TKIs
  (crizotinib/alectinib) and a higher rate of acquired G1202R resistance. CROWN (Solomon
  2024) showed lorlatinib 1L delivers uniformly long PFS regardless of variant — making
  lorlatinib the preferred 1L choice for v3.

  '
evidence_summary_ua: 'EML4-ALK варіант 3 is associated with shorter PFS on 2nd-gen
  ALK-TKIs (кризотиніб/алектиніб) and a higher rate of набутий G1202R resistance.
  CROWN (Solomon 2024) showed лорлатиніб 1L delivers uniformly long PFS regardless
  of варіант — making лорлатиніб the переважний 1L choice for v3.

  '
