id: BMA-KRAS-G12C-OVARIAN
biomarker_id: BIO-KRAS-G12C
variant_qualifier: "G12C"
disease_id: DIS-OVARIAN
escat_tier: "IIIA"
oncokb_level: "3A"
evidence_summary: >
  KRAS G12C in ovarian (mostly low-grade serous) is rare. Tissue-
  agnostic basket data (CodeBreaK 100 multi-tumor cohort) show
  modest activity. NCCN supports off-label use after standard
  therapy in G12C+ advanced ovarian.
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
  - "sotorasib (off-label tissue-agnostic rationale)"
contraindicated_monotherapy: []
primary_sources:
  - SRC-NCCN-OVARIAN-2025
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IIIA. OncoKB Level 3A. LGSOC may also harbor BRAF V600E (preferred target where co-occurring).
