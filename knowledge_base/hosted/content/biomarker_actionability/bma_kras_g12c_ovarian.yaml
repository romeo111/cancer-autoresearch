id: BMA-KRAS-G12C-OVARIAN
biomarker_id: BIO-KRAS-G12C
variant_qualifier: G12C
disease_id: DIS-OVARIAN
escat_tier: IIIA
evidence_summary: 'KRAS G12C in ovarian (mostly low-grade serous) is rare. Tissue-
  agnostic basket data (CodeBreaK 100 multi-tumor cohort) show modest activity. NCCN
  supports off-label use after standard therapy in G12C+ advanced ovarian.

  '
evidence_summary_ua: 'KRAS G12C in ovarian (mostly низького ступеня serous) is рідкісний.
  Tissue- agnostic basket дані (CodeBreaK 100 multi-пухлина cohort) show modest activity.
  NCCN supports off-label use after стандарт терапія in G12C+ поширений ovarian.

  '
