id: BMA-BRCA1-GERMLINE-PROSTATE
biomarker_id: BIO-BRCA1-BRCA2-GERMLINE
variant_qualifier: "BRCA1 germline pathogenic"
disease_id: DIS-PROSTATE
escat_tier: "IA"
evidence_summary: >
  BRCA1 germline pathogenic in mCRPC: olaparib improves rPFS and OS post-NHA
  (PROfound Cohort A, de Bono 2020); rucaparib (TRITON2/3) and niraparib
  (MAGNITUDE BRCA subset) also approved. 1L olaparib + abiraterone (PROpel) and
  niraparib + abiraterone (MAGNITUDE) extend rPFS in HRR-positive mCRPC. ESCAT
  IA / OncoKB Level 1.
evidence_summary_ua: >
  BRCA1 герміногенний патогенний in mCRPC: олапариб покращує rPFS and OS post-NHA (PROfound Cohort A, de Bono 2020); рукапариб (TRITON2/3) and нірапариб (MAGNITUDE BRCA subset) also схвалений. 1L олапариб + абіратерон (PROpel) and нірапариб + абіратерон (MAGNITUDE) extend rPFS in HRR-positive mCRPC. ESCAT IA / OncoKB рівень 1.
