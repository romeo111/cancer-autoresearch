id: BMA-NTRK-FUSION-THYROID-PAPILLARY
biomarker_id: BIO-NTRK-FUSION
variant_qualifier: "NTRK1/3 fusion (rare in PTC, ~1-2%; enriched in radiation-induced PTC)"
disease_id: DIS-THYROID-PAPILLARY
escat_tier: "IA"
oncokb_level: "1"
evidence_summary: >
  NTRK fusion in papillary thyroid carcinoma (~1-2% sporadic, higher in
  radiation-induced disease — Chernobyl cohorts). Larotrectinib and
  entrectinib are FDA tumor-agnostic for NTRK-fusion solid tumors.
  PTC subset of NAVIGATE / STARTRK-2 demonstrates durable responses
  in RAI-refractory disease.
regulatory_approval:
  fda:
    - "larotrectinib — NTRK-fusion solid tumors including thyroid (FDA tumor-agnostic 2018)"
    - "entrectinib — NTRK-fusion solid tumors (FDA tumor-agnostic 2019)"
  ema:
    - "larotrectinib / entrectinib — NTRK-fusion solid tumors (EMA tumor-agnostic 2019/2020)"
  ukraine: []
recommended_combinations:
  - "larotrectinib monotherapy (RAI-refractory advanced disease)"
  - "entrectinib monotherapy"
contraindicated_monotherapy: []
primary_sources:
  - SRC-ONCOKB
  - SRC-FDA-CDS-2026
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IA. OncoKB Level 1. RAI ablation remains 1L for differentiated
  PTC. NTRK-TKI is for RAI-refractory progressive disease. Detection:
  RNA-NGS preferred. Source-gap: SRC-NCCN-THYROID placeholder.
