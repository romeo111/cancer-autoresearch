id: BMA-BRAF-V600E-AML
biomarker_id: BIO-BRAF-V600E
variant_qualifier: "V600E"
disease_id: DIS-AML
escat_tier: "IIIB"
oncokb_level: "4"
evidence_summary: >
  BRAF V600E in AML is rare (<1%, more in histiocytic disorders /
  mixed-phenotype acute leukemia with histiocytic component).
  Tissue-agnostic dabrafenib + trametinib not approved in heme.
  Off-label use case-report level; consider in BRAF V600E AML with
  myeloid/dendritic mixed lineage.
evidence_summary_ua: >
  BRAF V600E in AML is рідкісний (<1%, more in histiocytic disorders / mixed-фенотип acute лейкоз with histiocytic component). Tissue-agnostic дабрафеніб + траметиніб not схвалений in heme. off-label use case-report level; consider in BRAF V600E AML with myeloid/dendritic mixed lineage.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
