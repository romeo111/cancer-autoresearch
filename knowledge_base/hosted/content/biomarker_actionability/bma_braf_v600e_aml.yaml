last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IIIB. Distinct from histiocytic neoplasms (LCH, ECD) where BRAF V600E is the dominant driver — but those are not in our DIS list.
