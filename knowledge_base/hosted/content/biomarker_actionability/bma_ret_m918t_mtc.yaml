id: BMA-RET-M918T-MTC
biomarker_id: BIO-RET
variant_qualifier: "M918T (somatic ~50% sporadic MTC; germline = MEN2B)"
disease_id: DIS-MTC
escat_tier: "IA"
oncokb_level: "1"
evidence_summary: >
  RET M918T in medullary thyroid carcinoma (MTC): selpercatinib
  superior to cabozantinib/vandetanib in 1L advanced MTC (LIBRETTO-531,
  Hadoux NEJM 2024 — PFS HR 0.28). Activity also in germline-driven
  MEN2B disease. Pralsetinib (ARROW) similarly active. Selective
  RET-TKIs are preferred over multikinase TKIs.
regulatory_approval:
  fda:
    - "selpercatinib — advanced/metastatic RET-mutant MTC (FDA accelerated 2020, full 2022)"
    - "pralsetinib — advanced/metastatic RET-mutant MTC (FDA accelerated 2020)"
  ema:
    - "selpercatinib — RET-mutant advanced MTC (EMA approved 2021)"
    - "pralsetinib — RET-mutant advanced MTC (EMA approved 2021)"
  ukraine: []
recommended_combinations:
  - "selpercatinib monotherapy (preferred 1L per LIBRETTO-531)"
  - "pralsetinib monotherapy"
contraindicated_monotherapy:
  - "cabozantinib / vandetanib (inferior in LIBRETTO-531; reserve for selective-TKI failure or unavailability)"
primary_sources:
  - SRC-ONCOKB
  - SRC-NCCN-CNS-2025
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IA. OncoKB Level 1. SRC-NCCN-THYROID is not yet ingested —
  using SRC-NCCN-CNS-2025 as a placeholder for NCCN-derived guidance
  pending thyroid guideline ingestion (matches DIS-MTC source-gap
  flagging). Trial-source gap: SRC-LIBRETTO-531 not yet ingested.
  Calcitonin doubling time <12 mo and structural progression are
  systemic-therapy triggers.
