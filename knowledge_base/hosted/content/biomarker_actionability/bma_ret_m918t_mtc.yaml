id: BMA-RET-M918T-MTC
biomarker_id: BIO-RET
variant_qualifier: M918T (somatic ~50% sporadic MTC; germline = MEN2B)
disease_id: DIS-MTC
escat_tier: IA
evidence_summary: 'RET M918T in medullary thyroid carcinoma (MTC): selpercatinib superior
  to cabozantinib/vandetanib in 1L advanced MTC (LIBRETTO-531, Hadoux NEJM 2024 —
  PFS HR 0.28). Activity also in germline-driven MEN2B disease. Pralsetinib (ARROW)
  similarly active. Selective RET-TKIs are preferred over multikinase TKIs.

  '
evidence_summary_ua: 'RET M918T in medullary thyroid карцинома (MTC): селперкатиніб
  перевершує кабозантиніб/vandetanib in 1L поширений MTC (LIBRETTO-531, Hadoux NEJM
  2024 — PFS HR 0.28). Activity also in герміногенний-driven MEN2B хвороба. пралсетиніб
  (ARROW) similarly active. селективний RET-TKIs are переважний over multikinase TKIs.

  '
