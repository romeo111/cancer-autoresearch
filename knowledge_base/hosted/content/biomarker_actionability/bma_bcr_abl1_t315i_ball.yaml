id: BMA-BCR-ABL1-T315I-BALL
biomarker_id: BIO-BCR-ABL1
variant_qualifier: "T315I (gatekeeper resistance)"
disease_id: DIS-B-ALL
escat_tier: "IA"
evidence_summary: >
  T315I in Ph+ B-ALL — same biological consequence as in CML: pan-resistance
  to 1st/2nd-gen TKIs. Ponatinib + chemotherapy is standard (Jabbour
  2018, hyper-CVAD + ponatinib). T315I is more common in B-ALL than
  CML at presentation due to faster disease tempo and higher mutation
  pressure under early TKI exposure.
evidence_summary_ua: >
  T315I in Ph+ B-ALL — same biological consequence as in CML: pan-резистентність до 1st/2nd-gen TKIs. понатиніб + хіміотерапія is стандарт (Jabbour 2018, hyper-CVAD + понатиніб). T315I is more поширений in B-ALL than CML при зверненні due to faster хвороба tempo and higher мутація pressure under early TKI exposure.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
  fda:
    - "ponatinib — T315I-positive Ph+ ALL (FDA approved 2012)"
    - "ponatinib + chemotherapy — newly diagnosed Ph+ B-ALL (FDA approved 2024)"
  ema:
    - "ponatinib — T315I-positive Ph+ ALL (EMA approved 2013)"
  ukraine: []
recommended_combinations:
  - "ponatinib + chemotherapy (hyper-CVAD or pediatric backbone)"
  - "ponatinib + blinatumomab (chemo-free)"
contraindicated_monotherapy:
