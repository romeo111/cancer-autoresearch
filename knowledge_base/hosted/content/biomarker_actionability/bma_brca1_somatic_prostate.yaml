id: BMA-BRCA1-SOMATIC-PROSTATE
biomarker_id: BIO-HRR-PANEL
variant_qualifier: "BRCA1 somatic loss-of-function"
disease_id: DIS-PROSTATE
escat_tier: "IA"
oncokb_level: "1"
evidence_summary: >
  Somatic BRCA1 loss-of-function in mCRPC: PROfound enrolled both germline and
  somatic; olaparib benefit equivalent. PARPi labels in prostate cover both
  gBRCA and sBRCA. ESCAT IA / OncoKB Level 1.
evidence_summary_ua: >
  соматичний BRCA1 втрата функції in mCRPC: PROfound enrolled both герміногенний and соматичний; олапариб виграш еквівалентний. PARPi labels in prostate cover both gBRCA and sBRCA. ESCAT IA / OncoKB рівень 1.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
  fda:
    - "olaparib — HRR-mutated (germline or somatic) mCRPC post-NHA (FDA 2020)"
    - "olaparib + abiraterone — 1L BRCAm (g/s) mCRPC (FDA 2023)"
  ema:
    - "olaparib — BRCA1/2-mutated (g/s) mCRPC (EMA 2020)"
  ukraine: []
recommended_combinations:
  - "olaparib monotherapy (post-NHA)"
  - "olaparib + abiraterone (1L)"
  - "niraparib + abiraterone (1L)"
  - "talazoparib + enzalutamide (1L)"
contraindicated_monotherapy: []
primary_sources:
  - SRC-NCCN-PROSTATE-2025
  - SRC-ESMO-PROSTATE-2024
  - SRC-EAU-PROSTATE-2024
  - SRC-ONCOKB
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  Somatic-only does not mandate cascade testing but reflex germline confirmation
  strongly recommended (~50% of tumor-detected BRCA in prostate are germline).
