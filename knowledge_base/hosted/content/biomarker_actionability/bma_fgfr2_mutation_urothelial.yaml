id: BMA-FGFR2-MUTATION-UROTHELIAL
biomarker_id: BIO-FGFR2
variant_qualifier: "activating mutation (FGFR2 fusion or kinase-domain mutation)"
disease_id: DIS-UROTHELIAL
escat_tier: "IB"
oncokb_level: "1"
evidence_summary: >
  FGFR2 fusion / activating mutation in metastatic urothelial carcinoma:
  erdafitinib (BLC2001, Loriot NEJM 2019 — ORR 40%; THOR phase 3,
  Loriot NEJM 2023 — OS HR 0.64 vs chemo) is FDA-approved for
  FGFR2/3-altered locally advanced or metastatic urothelial 2L+.
  FGFR2 alterations less common than FGFR3 in urothelial (~3% vs ~15%).
evidence_summary_ua: >
  FGFR2 злиття / активуюча мутація in метастатичний уротеліальна карцинома: erdafitinib (BLC2001, Loriot NEJM 2019 — ORR 40%; THOR фаза 3, Loriot NEJM 2023 — OS HR 0.64 vs chemo) is FDA-схвалений для FGFR2/3-altered місцево-поширений or метастатичний urothelial 2L+. FGFR2 альтерації less поширений than FGFR3 in urothelial (~3% проти ~15%).
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
  fda:
    - "erdafitinib — FGFR2/3-altered metastatic urothelial 2L+ (FDA accelerated 2019, full 2024 per THOR)"
  ema:
    - "erdafitinib — FGFR2/3-altered locally advanced/metastatic urothelial (EMA approved 2024)"
  ukraine: []
recommended_combinations:
  - "erdafitinib monotherapy (2L+ post-platinum / post-IO)"
contraindicated_monotherapy: []
primary_sources:
  - SRC-NCCN-BLADDER-2025
  - SRC-EAU-BLADDER-2024
  - SRC-ONCOKB
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IB. OncoKB Level 1. FDA companion diagnostic: therascreen FGFR
  RGQ RT-PCR (covers FGFR2 fusions and FGFR3 mut/fusions). Detection:
  RNA-NGS preferred for fusions. Hyperphosphatemia is on-target
  toxicity requiring dose modification.
