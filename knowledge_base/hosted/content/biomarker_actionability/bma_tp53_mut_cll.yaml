id: BMA-TP53-MUT-CLL
biomarker_id: BIO-TP53-MUTATION
variant_qualifier: "any pathogenic mutation OR del(17p)"
disease_id: DIS-CLL
escat_tier: "IIIA"
oncokb_level: "3A"
evidence_summary: >
  TP53-mut CLL contraindicates chemoimmunotherapy (FCR/BR). BTKi (acalabrutinib, zanubrutinib, ibrutinib) or BCL2i (venetoclax + obinutuzumab; CLL14) preferred. Some guidelines favor venetoclax-based fixed-duration over continuous BTKi for high-risk; data evolving.
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
  - "acalabrutinib monotherapy"
  - "zanubrutinib monotherapy"
  - "venetoclax + obinutuzumab (CLL14)"
  - "BTKi + venetoclax (CAPTIVATE / GLOW)"
contraindicated_monotherapy: []
primary_sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-CLL-2024
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IIIA. Gene-level cell — biallelic vs monoallelic distinction matters in MDS/AML (biallelic = TP53-multihit per IPSS-M / ICC 2022, far worse). Per-hotspot cells provided for the most common variants.
