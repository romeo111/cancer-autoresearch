id: BMA-TP53-MUT-CLL
biomarker_id: BIO-TP53-MUTATION
variant_qualifier: "any pathogenic mutation OR del(17p)"
disease_id: DIS-CLL
escat_tier: "IIIA"
evidence_summary: >
  TP53-mut CLL contraindicates chemoimmunotherapy (FCR/BR). BTKi (acalabrutinib, zanubrutinib, ibrutinib) or BCL2i (venetoclax + obinutuzumab; CLL14) preferred. Some guidelines favor venetoclax-based fixed-duration over continuous BTKi for high-risk; data evolving.
evidence_summary_ua: >
  TP53-mut CLL contraindicates хіміоімунотерапія (FCR/BR). BTKi (акалабрутиніб, занубрутиніб, ібрутиніб) or BCL2i (венетоклакс + обінутузумаб; CLL14) переважний. Some настанови favor венетоклакс-based fixed-duration over continuous BTKi for високого ризику; дані evolving.
