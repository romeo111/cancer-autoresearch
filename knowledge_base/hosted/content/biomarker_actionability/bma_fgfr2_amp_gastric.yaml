id: BMA-FGFR2-AMP-GASTRIC
biomarker_id: BIO-FGFR2
variant_qualifier: "amplification (~5-7% gastric/GEJ; high-level GCN ≥10)"
disease_id: DIS-GASTRIC
escat_tier: "IIA"
oncokb_level: "3A"
evidence_summary: >
  FGFR2 amplification in gastric/GEJ adenocarcinoma (~5-7% high-level):
  bemarituzumab (anti-FGFR2b mAb) + mFOLFOX6 improved PFS/OS in
  FGFR2b-overexpressing 1L gastric (FIGHT phase 2, Wainberg Lancet
  Oncol 2022 — PFS 9.5 vs 7.4 mo; phase 3 FORTITUDE-101 ongoing).
  Selective FGFR-TKIs (futibatinib, pemigatinib) have basket activity
  in FGFR2-amp gastric.
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
  - "bemarituzumab + mFOLFOX6 (FGFR2b IHC 2+/3+ ≥10% — investigational, FORTITUDE-101)"
  - "futibatinib / pemigatinib (off-label / basket trial for FGFR2-amp)"
contraindicated_monotherapy: []
primary_sources:
  - SRC-NCCN-GASTRIC-2025
  - SRC-ESMO-GASTRIC-2024
  - SRC-ONCOKB
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IIA. OncoKB Level 3A. Bemarituzumab uses FGFR2b IHC (not
  amplification per se) as companion. 1L gastric standard remains
  fluoropyrimidine + platinum ± trastuzumab (HER2+) ± nivolumab
  (PD-L1+) until FORTITUDE-101 reads out. Trial-source gap:
  SRC-FIGHT / SRC-FORTITUDE-101 not yet ingested.
