id: BMA-BCR-ABL1-F317L-CML
biomarker_id: BIO-BCR-ABL1
variant_qualifier: "F317L"
disease_id: DIS-CML
escat_tier: "IB"
evidence_summary: >
  BCR-ABL1 F317L confers resistance to dasatinib but retains sensitivity
  to nilotinib, bosutinib, and ponatinib (Soverini 2011, in vitro
  sensitivity panels). Switch to nilotinib or bosutinib is standard
  per ELN 2020/2025 mutation-guided algorithm.
evidence_summary_ua: >
  BCR-ABL1 F317L confers резистентність до дазатиніб but retains чутливість to нілотиніб, бозутиніб, and понатиніб (Soverini 2011, in vitro чутливість panels). Switch to нілотиніб or бозутиніб is стандарт per ELN 2020/2025 мутація-guided algorithm.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
