id: BMA-KRAS-G12C-PDAC
biomarker_id: BIO-KRAS-G12C
variant_qualifier: G12C
disease_id: DIS-PDAC
escat_tier: IIB
evidence_summary: 'KRAS G12C is rare in PDAC (~1-2%, vs ~30% G12D and ~25% G12V).
  Sotorasib (CodeBreaK 100 PDAC cohort, Strickler et al. NEJM 2023) ORR 21%, PFS 4
  mo in pretreated G12C PDAC. Adagrasib (KRYSTAL-1 GI cohort) ORR 33%. NCCN recommends
  in 2L+.

  '
