escat_tier: IIA
evidence_summary: 'RAD51D germline pathogenic in EOC: confers HR deficiency. RAD51C
  and RAD51D have established EOC risk; included in HRR panels and HRD-positive PARPi
  trial subgroups (PAOLA-1, ARIEL3 LOH-high, NOVA non-gBRCA). RAD51B less established.
  ESCAT IIA-IIB / OncoKB 3A-3B.

  '
evidence_summary_ua: 'RAD51D герміногенний патогенний in EOC: confers HR deficiency.
  RAD51C and RAD51D have усталений EOC risk; included in HRR panels and HRD-positive
  PARPi дослідження subgroups (PAOLA-1, ARIEL3 LOH-high, NOVA non-gBRCA). RAD51B less
  усталений. ESCAT IIA-IIB / OncoKB 3A-3B.

  '
