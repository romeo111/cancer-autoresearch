id: BMA-FLT3-ITD-AML
biomarker_id: BIO-FLT3-ITD
variant_qualifier: "internal tandem duplication (juxtamembrane domain — ~25% of AML)"
disease_id: DIS-AML
escat_tier: "IA"
oncokb_level: "1"
evidence_summary: >
  FLT3-ITD in newly-diagnosed AML: midostaurin + 7+3 induction +
  high-dose cytarabine consolidation + maintenance improved OS vs
  chemo alone in fit adults (RATIFY, Stone NEJM 2017 — 4-yr OS HR
  0.78). Quizartinib + 7+3 + maintenance also superior in QuANTUM-First
  (Erba Lancet 2023 — 4-yr OS HR 0.78). FLT3-ITD remains a poor-risk
  marker (ELN 2022) when allelic ratio high; allo-SCT in CR1 indicated.
evidence_summary_ua: >
  FLT3-ITD in newly-diagnosed AML: мідостаурин + 7+3 індукція + high-доза цитарабін консолідація + підтримка покращений OS vs chemo alone in fit adults (RATIFY, Stone NEJM 2017 — 4-рік OS HR 0.78). квізартиніб + 7+3 + підтримка also перевершує in QuANTUM-First (Erba Lancet 2023 — 4-рік OS HR 0.78). FLT3-ITD remains a poor-risk marker (ELN 2022) when allelic ratio high; allo-SCT in CR1 indicated.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
  fda:
    - "midostaurin + 7+3 — 1L FLT3-mutant AML (FDA approved 2017)"
    - "quizartinib + 7+3 — 1L FLT3-ITD AML (FDA approved 2023)"
  ema:
    - "midostaurin + 7+3 — 1L FLT3-mutant AML (EMA approved 2017)"
    - "quizartinib + 7+3 — 1L FLT3-ITD AML (EMA approved 2024)"
  ukraine: []
recommended_combinations:
  - "midostaurin + 7+3 induction + HiDAC consolidation + midostaurin maintenance"
  - "quizartinib + 7+3 induction + HiDAC consolidation + quizartinib maintenance (FLT3-ITD specifically)"
  - "allo-SCT in CR1 (high-allelic-ratio FLT3-ITD or other adverse-risk features)"
contraindicated_monotherapy:
  - "FLT3i monotherapy (off-trial; combine with chemo or use in R/R)"
primary_sources:
  - SRC-RATIFY-STONE-2017
  - SRC-QUANTUM-FIRST-ERBA-2023
  - SRC-NCCN-AML-2025
  - SRC-ELN-AML-2022
  - SRC-ESMO-AML-2020
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IA. OncoKB Level 1. ELN 2022: high-allelic-ratio FLT3-ITD
  without NPM1 = adverse risk; FLT3-ITD with NPM1 (any AR) =
  intermediate. Companion diagnostic: LeukoStrat CDx FLT3 mutation
  assay (RT-PCR-based).
