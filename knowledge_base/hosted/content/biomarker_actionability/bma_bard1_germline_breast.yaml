evidence_summary: >
  BARD1 germline pathogenic confers moderate breast-cancer risk (~2-3×). BARD1
  forms heterodimer with BRCA1 → biological HR deficiency. Limited clinical
  PARPi data; off-label consideration. ESCAT IIA / OncoKB Level 3A.
