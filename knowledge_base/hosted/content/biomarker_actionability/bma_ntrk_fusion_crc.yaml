id: BMA-NTRK-FUSION-CRC
biomarker_id: BIO-NTRK-FUSION
variant_qualifier: "NTRK1/3 fusion (rare ~0.1-0.3%, enriched in MSI-H / dMMR CRC)"
disease_id: DIS-CRC
escat_tier: "IA"
oncokb_level: "1"
evidence_summary: >
  NTRK fusion in CRC is rare (~0.1-0.3%) but enriched in MSI-H / Lynch
  syndrome CRC (~5-10% of MSI-H). Larotrectinib and entrectinib are
  FDA tumor-agnostic; CRC subset of pooled trials shows durable
  responses. Practical detection challenge: pan-TRK IHC has high
  false-positive rate in MSI-H CRC — confirm with RNA-NGS.
regulatory_approval:
  fda:
    - "larotrectinib — NTRK-fusion solid tumors (FDA tumor-agnostic 2018)"
    - "entrectinib — NTRK-fusion solid tumors (FDA tumor-agnostic 2019)"
  ema:
    - "larotrectinib / entrectinib — NTRK-fusion solid tumors (EMA tumor-agnostic 2019/2020)"
  ukraine: []
recommended_combinations:
  - "larotrectinib monotherapy"
  - "entrectinib monotherapy"
contraindicated_monotherapy: []
primary_sources:
  - SRC-NCCN-COLON-2025
  - SRC-ESMO-COLON-2024
  - SRC-ONCOKB
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IA (tumor-agnostic actionability) — CRC has standard 1L
  options (chemo + EGFR/VEGF mAb) so NTRK-fusion testing is typically
  reserved for post-progression / panel testing. OncoKB Level 1.
