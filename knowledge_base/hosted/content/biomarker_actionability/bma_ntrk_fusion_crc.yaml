id: BMA-NTRK-FUSION-CRC
biomarker_id: BIO-NTRK-FUSION
variant_qualifier: "NTRK1/3 fusion (rare ~0.1-0.3%, enriched in MSI-H / dMMR CRC)"
disease_id: DIS-CRC
escat_tier: "IA"
evidence_summary: >
  NTRK fusion in CRC is rare (~0.1-0.3%) but enriched in MSI-H / Lynch
  syndrome CRC (~5-10% of MSI-H). Larotrectinib and entrectinib are
  FDA tumor-agnostic; CRC subset of pooled trials shows durable
  responses. Practical detection challenge: pan-TRK IHC has high
  false-positive rate in MSI-H CRC — confirm with RNA-NGS.
evidence_summary_ua: >
