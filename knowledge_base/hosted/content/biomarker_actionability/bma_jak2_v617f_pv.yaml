id: BMA-JAK2-V617F-PV
biomarker_id: BIO-JAK2
variant_qualifier: V617F (exon 14, JH2 pseudokinase domain — present in ~95% of polycythemia
  vera)
disease_id: DIS-PV
escat_tier: IA
evidence_summary: 'JAK2 V617F is the defining driver of polycythemia vera (~95%) and
  a WHO 2022 / ICC 2022 major diagnostic criterion (per SRC-NCCN-MPN-2025, SRC-ESMO-MPN-2015).
  Treatment is risk-stratified, not variant-genotype directed: low-risk PV → phlebotomy
  + low-dose aspirin; high-risk PV (age ≥60 or prior thrombosis) → cytoreduction with
  hydroxyurea or interferon-alpha (ropeginterferon-alfa-2b, PROUD-PV / CONTINUATION-PV
  Gisslinger 2020 — superior molecular response and event-free survival at 5y vs hydroxyurea);
  ruxolitinib (RESPONSE Vannucchi 2015 — 21% CHR + spleen response vs 1% best available
  therapy) for hydroxyurea- intolerant or -resistant disease.

  '
evidence_summary_ua: 'JAK2 V617F is the defining driver of polycythemia vera (~95%)
  and a WHO 2022 / ICC 2022 major діагностичний criterion (per SRC-NCCN-MPN-2025,
  SRC-ESMO-MPN-2015). лікування is risk-stratified, not варіант-генотип directed:
  низького ризику PV → phlebotomy + low-доза aspirin; високого ризику PV (age ≥60
  or prior thrombosis) → cytoreduction with гідроксикарбамід or інтерферон-alpha (ropeginterferon-alfa-2b,
  PROUD-PV / CONTINUATION-PV Gisslinger 2020 — перевершує molecular відповідь and
  виживаність без подій at 5y vs гідроксикарбамід); руксолитиніб (відповідь Vannucchi
  2015 — 21% CHR + spleen відповідь vs 1% найкращий available терапія) for гідроксикарбамід-
  intolerant or -resistant хвороба.

  '
