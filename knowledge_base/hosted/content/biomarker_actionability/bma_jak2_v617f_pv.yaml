notes: 'ESCAT IA / OncoKB Level 1 — JAK2 mutation status is required for diagnosis
  (WHO 2022 major criterion) and dictates eligibility for JAK-targeted therapy. Risk
  model: IPSS-PV (age, leukocytosis, thrombosis history). The V617F allele burden
  may correlate with phenotype severity but is not used as a treatment-selection threshold
  in current guidelines (per SRC-NCCN-MPN-2025, SRC-ESMO-MPN-2015). Exon 12 JAK2 mutations
  (~3%) cause idiopathic erythrocytosis with similar management — see notes on detection.
  Source-gap: SRC-NCCN-MPN-2025 currently STUB; awaits full ingestion.

  '
