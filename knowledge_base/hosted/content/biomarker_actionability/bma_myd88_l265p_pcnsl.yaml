disease_id: DIS-PCNSL
escat_tier: "IIB"
oncokb_level: "3A"
evidence_summary: >
  MYD88 L265P present in ~70-90% of PCNSL (often co-mutated with
  CD79B). Ibrutinib monotherapy crosses BBB and shows activity in
  R/R PCNSL (Grommes et al. Cancer Discov 2017; Soussain Eur J
  Cancer 2019). Off-label NCCN-supported in R/R disease.
evidence_summary_ua: >
  MYD88 L265P present in ~70-90% of PCNSL (часто co-mutated with CD79B). ібрутиніб монотерапія crosses BBB and shows activity in р/р PCNSL (Grommes et al. рак Discov 2017; Soussain Eur J рак 2019). off-label NCCN-supported in р/р хвороба.
