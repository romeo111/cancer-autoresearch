disease_id: DIS-PCNSL
escat_tier: IIB
evidence_summary: 'MYD88 L265P present in ~70-90% of PCNSL (often co-mutated with
  CD79B). Ibrutinib monotherapy crosses BBB and shows activity in R/R PCNSL (Grommes
  et al. Cancer Discov 2017; Soussain Eur J Cancer 2019). Off-label NCCN-supported
  in R/R disease.

  '
