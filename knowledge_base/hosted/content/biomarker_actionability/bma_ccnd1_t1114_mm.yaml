id: BMA-CCND1-T1114-MM
biomarker_id: BIO-T11-14-IGH-CCND1
variant_qualifier: "t(11;14)(q13;q32) IGH/CCND1"
disease_id: DIS-MM
escat_tier: "IIA"
evidence_summary: >
  t(11;14) myeloma (~15-20%) — distinct biology with high BCL2/MCL1
  ratio. Venetoclax monotherapy (M14-032; Kumar Blood 2017 ORR ~40%)
  and venetoclax + dexamethasone (BELLINI subgroup; Kumar Lancet
  Oncol 2020) active. BELLINI raised mortality signal in non-t(11;14)
  arm — venetoclax is now t(11;14)-selected in MM. CANOVA Ph3
  (venetoclax + dex vs pomalidomide + dex in t(11;14) R/R MM) read
  out 2024.
evidence_summary_ua: >
  t(11;14) мієлома (~15-20%) — distinct biology with high BCL2/MCL1 ratio. венетоклакс монотерапія (M14-032; Kumar Blood 2017 ORR ~40%) and венетоклакс + dexamethasone (BELLINI subgroup; Kumar Lancet Oncol 2020) active. BELLINI raised mortality signal in non-t(11;14) arm — венетоклакс is now t(11;14)-selected in MM. CANOVA Ph3 (венетоклакс + dex vs помалідомід + dex in t(11;14) р/р MM) read out 2024.
