id: BMA-CCND1-T1114-MM
biomarker_id: BIO-T11-14-IGH-CCND1
variant_qualifier: "t(11;14)(q13;q32) IGH/CCND1"
disease_id: DIS-MM
escat_tier: "IIA"
oncokb_level: "3A"
evidence_summary: >
  t(11;14) myeloma (~15-20%) — distinct biology with high BCL2/MCL1
  ratio. Venetoclax monotherapy (M14-032; Kumar Blood 2017 ORR ~40%)
  and venetoclax + dexamethasone (BELLINI subgroup; Kumar Lancet
  Oncol 2020) active. BELLINI raised mortality signal in non-t(11;14)
  arm — venetoclax is now t(11;14)-selected in MM. CANOVA Ph3
  (venetoclax + dex vs pomalidomide + dex in t(11;14) R/R MM) read
  out 2024.
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
  - "venetoclax + dexamethasone (R/R t(11;14)-selected, off-label NCCN-supported)"
  - "venetoclax + carfilzomib + dex (NCT trials)"
contraindicated_monotherapy:
  - "venetoclax in non-t(11;14) MM (BELLINI mortality signal)"
primary_sources:
  - SRC-NCCN-MM-2025
  - SRC-ESMO-MM-2023
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IIA. OncoKB Level 3A. FISH t(11;14) reflex testing should be standard at MM workup. NCCN listed as preferred R/R option in t(11;14)+ patients.
