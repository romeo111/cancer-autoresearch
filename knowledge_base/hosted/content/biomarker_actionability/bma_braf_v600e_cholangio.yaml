notes: >
  ESCAT IA / OncoKB Level 1 (tumor-agnostic). Comprehensive molecular
  profiling at diagnosis is per-NCCN standard for advanced biliary tract
  cancers — covers FGFR2 fusion, IDH1 R132, BRAF V600E, HER2, MSI,
  NTRK fusion. Source-gap: SRC-NCCN-HEPATOBILIARY currently a STUB;
  SRC-ROAR-SUBBIAH-2020 (biliary cohort) not yet ingested.
