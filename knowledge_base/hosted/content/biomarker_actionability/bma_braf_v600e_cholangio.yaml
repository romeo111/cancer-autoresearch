id: BMA-BRAF-V600E-CHOLANGIO
biomarker_id: BIO-BRAF-V600E
variant_qualifier: "V600E (exon 15, kinase domain — present in ~5% of intrahepatic cholangiocarcinoma; rarer in extrahepatic)"
disease_id: DIS-CHOLANGIOCARCINOMA
escat_tier: "IA"
oncokb_level: "1"
evidence_summary: >
  BRAF V600E in cholangiocarcinoma (mainly intrahepatic, ~5%) is a
  tumor-agnostic FDA Level-1 actionable target. Dabrafenib + trametinib
  is recommended for previously-treated BRAF V600E cholangiocarcinoma
  per SRC-NCCN-HEPATOBILIARY based on the ROAR basket trial (Subbiah
  Lancet Oncol 2020 — biliary tract cohort ORR 51%, mPFS 9 mo, mOS 14
  mo). 1L remains gemcitabine + cisplatin ± durvalumab (TOPAZ-1) for
  most patients; testing for BRAF V600E is recommended at diagnosis
  to plan 2L+ in patients without other actionable alterations
  (FGFR2 fusion, IDH1 mutation) per SRC-NCCN-HEPATOBILIARY.
evidence_summary_ua: >
  BRAF V600E in cholangiocarcinoma (mainly intrahepatic, ~5%) is a пухлина-agnostic FDA Level-1 actionable target. дабрафеніб + траметиніб is рекомендований for previously-treated BRAF V600E cholangiocarcinoma per SRC-NCCN-HEPATOBILIARY based on the ROAR basket дослідження (Subbiah Lancet Oncol 2020 — biliary tract cohort ORR 51%, mPFS 9 міс., міс. 14 міс.). 1L remains гемцитабін + цисплатин ± дурвалумаб (TOPAZ-1) for найбільш patients; testing for BRAF V600E is рекомендований при діагнозі to plan 2L+ in patients without other actionable альтерації (FGFR2 злиття, IDH1 мутація) per SRC-NCCN-HEPATOBILIARY.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
  fda:
    - "dabrafenib + trametinib — solid tumors with BRAF V600E (FDA tumor-agnostic 2022)"
  ema:
