id: BMA-BRAF-V600E-HCL
biomarker_id: BIO-BRAF-V600E
variant_qualifier: "V600E"
disease_id: DIS-HCL
escat_tier: "IB"
oncokb_level: "2"
evidence_summary: >
  BRAF V600E is the defining molecular lesion of classic hairy cell
  leukemia (~100% of cHCL; absent in HCL-variant). Vemurafenib
  monotherapy yields CR ~35% / ORR ~96% in relapsed/refractory cHCL
  (Tiacci et al. NEJM 2015). Vemurafenib + rituximab gives durable
  CR in ~87% (Tiacci et al. NEJM 2021). Dabrafenib + trametinib also
  active. Used as salvage after purine-analog failure or in
  cladribine-ineligible patients.
evidence_summary_ua: >
  BRAF V600E is the defining molecular lesion of classic волосатоклітинний лейкоз (~100% of cHCL; absent in HCL-варіант). вемурафеніб монотерапія yields CR ~35% / ORR ~96% in рецидивний/рефрактерний cHCL (Tiacci et al. NEJM 2015). вемурафеніб + ритуксимаб gives durable CR in ~87% (Tiacci et al. NEJM 2021). дабрафеніб + траметиніб also active. Used as сальвадж after purine-analog failure or in кладрибін-ineligible patients.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
