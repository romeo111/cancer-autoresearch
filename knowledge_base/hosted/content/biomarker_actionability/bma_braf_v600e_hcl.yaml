notes: >
  ESCAT IB. OncoKB Level 2. Frontline cHCL still cladribine ±
  rituximab (MDACC) — BRAFi reserved for relapsed/refractory or
  unfit patients. HCL-variant lacks BRAF V600E and is BRAFi-resistant.
