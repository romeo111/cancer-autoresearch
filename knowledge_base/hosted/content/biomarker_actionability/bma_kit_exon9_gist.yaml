id: BMA-KIT-EXON9-GIST
biomarker_id: BIO-KIT
variant_qualifier: exon 9 insertion (extracellular domain — ~10% GIST, predominantly
  small bowel)
disease_id: DIS-GIST
escat_tier: IB
evidence_summary: 'KIT exon 9 GIST has shorter PFS on imatinib 400 mg vs exon 11.
  Imatinib 800 mg/day (split 400 mg BID) improves PFS and OS vs 400 mg in this genotype
  (EORTC-62005 / MetaGIST meta-analysis, Gastrointest Stromal Tumor Meta-Analysis
  2010). High dose is standard 1L for exon 9.

  '
evidence_summary_ua: 'KIT exon 9 GIST has shorter PFS on іматиніб 400 mg vs exon 11.
  іматиніб 800 mg/day (split 400 mg BID) покращує PFS and OS vs 400 mg in this генотип
  (EORTC-62005 / MetaGIST meta-analysis, Gastrointest Stromal пухлина Meta-Analysis
  2010). High доза is стандарт 1L for exon 9.

  '
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
  fda:
  - imatinib (dose-escalated) — KIT+ GIST advanced (FDA 2002 covers dosing rationale)
  ema:
  - imatinib — KIT+ GIST (EMA approved 2002)
  ukraine: []
recommended_combinations:
- imatinib 800 mg/day split BID (1L advanced/metastatic exon 9)
contraindicated_monotherapy:
- imatinib 400 mg/day as 1L for exon 9 (inferior PFS — escalate to 800 mg)
primary_sources:
- SRC-IRIS-OBRIEN-2003
- SRC-NCCN-MELANOMA-2025
last_verified: '2026-04-27'
evidence_sources: []
actionability_review_required: true
notes: 'ESCAT IB. OncoKB Level 1. Source-gap as DIS-GIST. Adjuvant strategy in high-risk
  resected exon-9 GIST less established — extended- duration imatinib often considered.
  Exon 9 GIST predominantly small-bowel primary; extra-gastric origin should prompt
  KIT exon 9 testing if not already done.

  '
