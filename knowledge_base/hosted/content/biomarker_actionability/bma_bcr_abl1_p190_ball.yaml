id: BMA-BCR-ABL1-P190-BALL
biomarker_id: BIO-BCR-ABL1
variant_qualifier: "p190 (e1a2) — typical Ph+ B-ALL"
disease_id: DIS-B-ALL
escat_tier: "IA"
oncokb_level: "1"
evidence_summary: >
  Ph+ B-ALL (typically p190) requires TKI-incorporating regimens. Modern
  trials (D-ALBA, Foà 2020; GIMEMA LAL2116) show dasatinib + blinatumomab
  achieves molecular CR in >60% with reduced chemotherapy. Ponatinib +
  hyper-CVAD (Jabbour 2024) and ponatinib + blinatumomab combos extend
  this further. TKI selection now favors ponatinib for highest
  molecular-response rates.
evidence_summary_ua: >
  Ph+ B-ALL (типово p190) requires TKI-incorporating схеми. Modern trials (D-ALBA, Foà 2020; GIMEMA LAL2116) show дазатиніб + блінатумомаб achieves molecular CR in >60% with зменшений хіміотерапія. понатиніб + hyper-CVAD (Jabbour 2024) and понатиніб + блінатумомаб combos extend this further. TKI selection now favors понатиніб for найвища molecular-відповідь rates.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
  fda:
    - "ponatinib + chemotherapy — newly diagnosed Ph+ B-ALL (FDA approved 2024)"
    - "imatinib / dasatinib + chemo — Ph+ B-ALL (FDA approved historically)"
    - "blinatumomab — relapsed/refractory and MRD+ B-ALL (FDA approved)"
  ema:
    - "ponatinib — Ph+ ALL (EMA approved)"
    - "blinatumomab — relapsed/MRD+ B-ALL (EMA approved)"
  ukraine: []
recommended_combinations:
  - "ponatinib + hyper-CVAD (1L)"
  - "dasatinib + blinatumomab (D-ALBA chemo-light)"
  - "imatinib + chemotherapy (1L alternative, lower-resource setting)"
  - "ponatinib + blinatumomab (chemo-free regimen)"
contraindicated_monotherapy:
  - "TKI alone without chemotherapy or immunotherapy backbone (insufficient durability)"
primary_sources:
  - SRC-NCCN-BCELL-2025
  - SRC-BLAST-GOKBUGET-2018
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IA. Ponatinib preferred for highest molecular-response rates
  and to preempt T315I emergence. CNS prophylaxis essential. Allo-HCT
  consideration based on MRD response per ELN/NCCN.
