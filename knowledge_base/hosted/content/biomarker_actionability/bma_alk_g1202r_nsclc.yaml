id: BMA-ALK-G1202R-NSCLC
biomarker_id: BIO-ALK-FUSION
variant_qualifier: "G1202R (acquired resistance)"
disease_id: DIS-NSCLC
escat_tier: "IB"
oncokb_level: "R1"
evidence_summary: >
  ALK G1202R is a solvent-front mutation conferring resistance to
  1st/2nd-gen ALK-TKIs (crizotinib, alectinib, brigatinib, ceritinib).
  Lorlatinib remains active and is the standard salvage TKI (Shaw
  2019). Acquired G1202R is the most common resistance mutation after
  alectinib failure (~20-40%).
evidence_summary_ua: >
  ALK G1202R is a solvent-front мутація conferring резистентність до 1st/2nd-gen ALK-TKIs (кризотиніб, алектиніб, брігатиніб, цертиніб). лорлатиніб remains active and is the стандарт сальвадж TKI (Shaw 2019). набутий G1202R is the найбільш поширений резистентна мутація after алектиніб failure (~20-40%).
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
  fda:
    - "lorlatinib — 2L+ ALK+ NSCLC after 2nd-gen TKI (FDA approved 2018)"
  ema:
    - "lorlatinib — 2L+ ALK+ NSCLC (EMA approved 2019)"
  ukraine: []
recommended_combinations:
  - "lorlatinib monotherapy"
contraindicated_monotherapy:
  - "crizotinib (resistant)"
  - "alectinib (resistant)"
  - "brigatinib (resistant)"
  - "ceritinib (resistant)"
primary_sources:
