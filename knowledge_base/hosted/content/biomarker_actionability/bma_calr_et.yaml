notes: >
  ESCAT IA / OncoKB Level 1 — diagnostic criterion. CALR type-1 (52-bp
  deletion) is more common in PMF and confers better OS than type-2
  per several retrospective series; type-2 is enriched in ET. CALR-
  specific therapeutics (anti-CALR monoclonal antibodies, e.g. INCA
  033989) are in early-phase trials only; no in-repo source ingested
  yet. Source-gap: SRC-NCCN-MPN-2025 STUB.
