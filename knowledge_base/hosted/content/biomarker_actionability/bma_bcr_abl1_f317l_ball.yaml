id: BMA-BCR-ABL1-F317L-BALL
biomarker_id: BIO-BCR-ABL1
variant_qualifier: "F317L (acquired resistance)"
disease_id: DIS-B-ALL
escat_tier: "IIA"
oncokb_level: "R2"
evidence_summary: >
  F317L in Ph+ B-ALL — same kinase-domain consequence as in CML:
  dasatinib resistance with retained sensitivity to nilotinib and
  ponatinib. In ALL, ponatinib + chemo or blinatumomab is preferred
  switch given disease tempo.
regulatory_approval:
  fda:
    - "ponatinib — Ph+ ALL (FDA approved)"
  ema:
    - "ponatinib — Ph+ ALL (EMA approved)"
  ukraine: []
recommended_combinations:
  - "ponatinib + chemotherapy"
  - "ponatinib + blinatumomab"
contraindicated_monotherapy:
  - "dasatinib (resistant)"
  - "TKI alone without chemo/immunotherapy backbone"
primary_sources:
  - SRC-NCCN-BCELL-2025
  - SRC-PACE-CORTES-2013
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  OncoKB R2. ABL1 mutation panel testing at any sign of MRD failure
  or relapse is mandatory.
