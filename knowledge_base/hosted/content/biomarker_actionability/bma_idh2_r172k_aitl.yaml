  - SRC-NCCN-BCELL-2025
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IIIA. AITL frontline still CHOP/CHOEP; brentuximab + CHP for CD30+ disease (ECHELON-2).
