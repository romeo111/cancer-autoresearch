evidence_summary: >
  IDH2 R172 mutations occur in ~30% of AITL (TFH-derived PTCL).
  Enasidenib monotherapy active in IDH2-mut AITL (small case
  series; Lemonnier et al. Blood 2016 / 2021). NCCN supports
  off-label use in R/R IDH2-mut AITL.
