id: BMA-TP53-MUT-AML
biomarker_id: BIO-TP53-MUTATION
variant_qualifier: "any pathogenic mutation OR del(17p)"
disease_id: DIS-AML
escat_tier: "IIIB"
evidence_summary: >
  TP53-mut AML — chemo-resistant, dismal outcomes (CR ~20% with 7+3, OS ~6 mo). Decitabine 10-day or azacitidine + venetoclax (CR ~50% but non-durable in TP53-mut). AlloSCT outcomes poor but still preferred when feasible.
evidence_summary_ua: >
  TP53-mut AML — chemo-resistant, dismal outcomes (CR ~20% з 7+3, OS ~6 міс.). децитабін 10-day or азацитидин + венетоклакс (CR ~50% but non-durable in TP53-mut). алоТГСК outcomes poor but still переважний when feasible.
