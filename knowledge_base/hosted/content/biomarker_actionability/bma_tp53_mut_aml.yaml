id: BMA-TP53-MUT-AML
biomarker_id: BIO-TP53-MUTATION
variant_qualifier: "any pathogenic mutation OR del(17p)"
disease_id: DIS-AML
escat_tier: "IIIB"
oncokb_level: "4"
evidence_summary: >
  TP53-mut AML — chemo-resistant, dismal outcomes (CR ~20% with 7+3, OS ~6 mo). Decitabine 10-day or azacitidine + venetoclax (CR ~50% but non-durable in TP53-mut). AlloSCT outcomes poor but still preferred when feasible.
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
  - "azacitidine + venetoclax (palliative, R/R)"
  - "decitabine 10-day"
  - "alloSCT consideration"
  - "clinical trial"
contraindicated_monotherapy: []
primary_sources:
  - SRC-NCCN-AML-2025
  - SRC-ELN-AML-2022
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  ESCAT IIIB. Gene-level cell — biallelic vs monoallelic distinction matters in MDS/AML (biallelic = TP53-multihit per IPSS-M / ICC 2022, far worse). Per-hotspot cells provided for the most common variants.
