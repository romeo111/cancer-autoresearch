id: BMA-ATM-GERMLINE-PDAC
biomarker_id: BIO-HRR-PANEL
variant_qualifier: ATM germline pathogenic
disease_id: DIS-PDAC
escat_tier: IIA
evidence_summary: 'ATM germline pathogenic confers ~5-10× pancreatic-cancer risk;
  PARPi activity in ATM-mutated PDAC is modest (POLO germline-only, BRCA-restricted).
  NCCN recommends platinum-based chemo first; PARPi off-label or trial-only. ESCAT
  IIA / OncoKB Level 3A.

  '
evidence_summary_ua: 'ATM герміногенний патогенний confers ~5-10× pancreatic-рак risk;
  PARPi activity in ATM-mutated PDAC is modest (POLO герміногенний-only, BRCA-restricted).
  NCCN recommends platinum-based chemo first; PARPi off-label or дослідження-only.
  ESCAT IIA / OncoKB рівень 3A.

  '
