id: BMA-ATM-GERMLINE-PDAC
biomarker_id: BIO-HRR-PANEL
variant_qualifier: "ATM germline pathogenic"
disease_id: DIS-PDAC
escat_tier: "IIA"
oncokb_level: "3A"
evidence_summary: >
  ATM germline pathogenic confers ~5-10× pancreatic-cancer risk; PARPi activity
  in ATM-mutated PDAC is modest (POLO germline-only, BRCA-restricted). NCCN
  recommends platinum-based chemo first; PARPi off-label or trial-only. ESCAT
  IIA / OncoKB Level 3A.
evidence_summary_ua: >
  ATM герміногенний патогенний confers ~5-10× pancreatic-рак risk; PARPi activity in ATM-mutated PDAC is modest (POLO герміногенний-only, BRCA-restricted). NCCN recommends platinum-based chemo first; PARPi off-label or дослідження-only. ESCAT IIA / OncoKB рівень 3A.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
regulatory_approval:
  fda: []
  ema: []
  ukraine: []
recommended_combinations:
  - "FOLFIRINOX or gem-cis (platinum induction)"
  - "olaparib maintenance (off-label, NCCN-listed for HRR-mut)"
contraindicated_monotherapy: []
primary_sources:
  - SRC-NCCN-PANCREATIC-2025
  - SRC-ESMO-PANCREATIC-2024
  - SRC-ONCOKB
last_verified: "2026-04-27"
oncokb_snapshot_version: "v3.20-2026-04"
notes: >
  Cascade testing mandatory. ATM PDAC carriers eligible for high-risk
  surveillance protocols (CAPS).
