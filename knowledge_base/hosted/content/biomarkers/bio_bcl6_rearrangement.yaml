  ukrainian: "BCL6 rearrangement (3q27) — FISH break-apart"
  english: "BCL6 rearrangement"
biomarker_type: gene_fusion

mutation_details:
  gene: "BCL6"
  variant_type: "fusion (multiple partners; promoter substitution → over-expression)"
  functional_impact: "constitutive BCL6 over-expression — blocks differentiation, drives germinal-center program"

measurement: {method: "FISH break-apart probe on FFPE biopsy", units: "categorical (positive | negative)"}
specimen_requirements: ["FFPE biopsy block"]

