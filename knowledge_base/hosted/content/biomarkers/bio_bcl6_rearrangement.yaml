oncokb_skip_reason: fusion_mvp
external_ids:
  hgnc_symbol: BCL6
last_reviewed: "2026-04-25"
notes: >
  Cross-disease relevance:

  - **HGBL-DH/THL**: BCL6 rearrangement is the third member of double-/
    triple-hit definition. MYC + BCL6 = double-hit (less common than
    MYC + BCL2). MYC + BCL2 + BCL6 = triple-hit (rarest, worst
    prognosis). Drives DA-EPOCH-R over R-CHOP.
  - **DLBCL**: ~20-30% have isolated BCL6 rearrangement — does NOT
    drive treatment alone (only when combined with MYC).
  - **FL**: rare ~10%.

  Required FISH on every newly-diagnosed DLBCL alongside MYC + BCL2 to
  identify HGBL-DH/THL early.
notes_ua: >
  Cross-хвороба relevance:

  - **HGBL-DH/THL**: BCL6 перебудова is the third member of double-/
    triple-hit definition. MYC + BCL6 = double-hit (less поширений than
    MYC + BCL2). MYC + BCL2 + BCL6 = triple-hit (rarest, найгірший
    прогноз). Drives DA-EPOCH-R over R-CHOP.
  - **DLBCL**: ~20-30% have isolated BCL6 перебудова — does NOT
    drive лікування alone (only when combined with MYC).
  - **FL**: рідкісний ~10%.

  обов'язковий FISH on every newly-diagnosed DLBCL alongside MYC + BCL2 to identify HGBL-DH/THL early.
