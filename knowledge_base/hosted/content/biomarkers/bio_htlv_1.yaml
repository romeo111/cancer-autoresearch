id: BIO-HTLV-1
names:
  preferred: "HTLV-1 status (anti-HTLV-1 antibody + confirmatory)"
  ukrainian: "Статус HTLV-1 (антитіла + підтвердження)"
  english: "Human T-lymphotropic virus type 1 status"
  synonyms:
    - "HTLV-I"
    - "anti-HTLV-1"
    - "HTLV-1 serology"
biomarker_type: viral_serology

measurement:
  method: >
    Anti-HTLV-1 antibody screening (EIA or particle agglutination);
    reactive → confirmatory Western blot or line immunoassay to
    distinguish HTLV-1 from HTLV-2 and rule out indeterminate
    patterns. HTLV-1 proviral load (qPCR on PBMCs) is informative
    but not standardized — high proviral load (>4% of PBMCs)
    correlates with ATLL transformation risk in carriers but is
    NOT a treatment-decision biomarker in active ATLL.
  units: "categorical: HTLV-1 seropositive (carrier vs ATLL clinical) | seronegative"

specimen_requirements:
  - "Serum or plasma for screen"
  - "EDTA whole blood for confirmatory Western blot / proviral load"

related_biomarkers:
  - BIO-HIV-STATUS

sources:
  - SRC-NCCN-BCELL-2025

last_reviewed: "2026-04-26"
oncokb_skip_reason: serological
notes: >
  HTLV-1 etiology is the defining feature of Adult T-Cell
  Leukemia/Lymphoma (ATLL); WHO classification requires HTLV-1
  seropositivity + clonal HTLV-1 integration on Southern blot
  (or qPCR equivalent) for diagnosis.

  Geographic context matters for Ukraine: HTLV-1 prevalence is low
  (<0.1% in non-endemic Europe); endemic areas are Japan, Caribbean,
  parts of Sub-Saharan Africa, South America. ATLL diagnosis in a
  Ukrainian patient should prompt travel / heritage history; rare
  but real.

  Currently consumed by: ALGO-ATLL-1L (etiology rail — HTLV-1+ is
  necessary for ATLL classification; subtype determined by clinical
  features per Shimoyama). Quantitative proviral load monitoring
  flagged as a future Monitoring entity for asymptomatic carriers
  who are not currently candidates for treatment.

  reviewer_signoffs: 0  # STUB — pending two Clinical Co-Lead approvals
notes_ua: >
  HTLV-1 etiology is the визначальна ознака дорослий T-Cell лейкоз/лімфома (ATLL); WHO classification requires HTLV-1 seropositivity + clonal HTLV-1 integration on Southern blot (or qPCR еквівалентний) for діагноз.

  Geographic context matters for Ukraine: HTLV-1 prevalence is low (<0.1% in non-endemic Europe); endemic areas are Japan, Caribbean, parts of Sub-Saharan Africa, South America. ATLL діагноз in a Ukrainian patient should prompt travel / heritage history; рідкісний but real.

  Currently consumed by: ALGO-ATLL-1L (etiology rail — HTLV-1+ is necessary for ATLL classification; підтип determined by clinical features per Shimoyama). Quantitative proviral load моніторинг flagged as a future моніторинг сутність for asymptomatic carriers who are not currently candidates for лікування.

  reviewer_signoffs: 0  # STUB — pending two Clinical Co-Lead approvals
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
