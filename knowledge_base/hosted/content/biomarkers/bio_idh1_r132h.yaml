last_reviewed: "2026-04-27"
notes: >
  Defining feature of IDH-mutant glioma (per WHO 2021 CNS5 — distinct
  diagnostic class) and ~6-10% of AML. IHC (mIDH1-R132H antibody) is
  highly sensitive for this specific variant — used as first-pass
  glioma screen. Other IDH1 variants (R132C, R132G, R132S, R132L) are
  rarer and IHC-negative — require NGS. Ivosidenib (AGILE, AML 1L
  combo with azacitidine in IDH1-mut AML), enasidenib (IDH2 R140/R172),
  vorasidenib (INDIGO 2024 — first-in-class for grade 2 IDH-mut glioma
  post-resection — practice-changing). 2-HG MRS imaging emerging as
  noninvasive activity readout.
notes_ua: >
  визначальна ознака IDH-mutant glioma (per WHO 2021 CNS5 — distinct діагностичний class) та ~6-10% of AML. IHC (mIDH1-R132H antibody) is highly sensitive for this specific варіант — used as first-pass glioma screen. Other IDH1 варіанти (R132C, R132G, R132S, R132L) are rarer and IHC-negative — require NGS. івосиденіб (AGILE, AML 1L combo with азацитидин in IDH1-mut AML), енасиденіб (IDH2 R140/R172), vorasidenib (INDIGO 2024 — first-in-class for grade 2 IDH-mut glioma після резекції — practice-changing). 2-HG MRS imaging новий as noninvasive activity readout.
