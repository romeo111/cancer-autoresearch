id: BIO-ESTROGEN-RECEPTOR
names:
  preferred: "Estrogen receptor (ER)"
  ukrainian: "Естрогеновий рецептор (ЕР)"
  english: "Estrogen receptor"
  abbreviations: ["ER"]
codes:
  loinc: "16112-5"

biomarker_type: protein_expression_ihc

measurement:
  method: "Immunohistochemistry on FFPE tumor tissue (ASCO/CAP-validated antibody)"
  units: "percent of tumor nuclei staining"
  typical_range: [0, 100]

interpretation_notes: >
  ASCO/CAP 2020 thresholds:
  • ER-positive: ≥1% nuclear staining (eligible for endocrine therapy)
  • ER-low-positive (1-10%): endocrine therapy benefit modest; counsel
  • ER-negative: <1%
  Scoring should report % positive cells and intensity (Allred 0-8 or
  H-score where institutional practice supports). Repeat testing on
  recurrent / metastatic biopsy when feasible — discordance with primary
  ~15-20%.

related_biomarkers: ["BIO-PROGESTERONE-RECEPTOR", "BIO-HER2-SOLID"]

last_reviewed:
oncokb_skip_reason: ihc_no_variant
notes: >
  Foundational biomarker for breast cancer subtype assignment. Drives
  endocrine therapy eligibility and CDK4/6i indication. Cross-validated
  with PR for HR-positive classification.
notes_ua: >
  Foundational біомаркер for рак молочної залози підтип assignment. Drives endocrine терапія eligibility and CDK4/6i показання. Cross-validated with PR for HR-positive classification.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
