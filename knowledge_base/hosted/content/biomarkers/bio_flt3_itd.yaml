id: BIO-FLT3-ITD
names:
  preferred: "FLT3 internal tandem duplication (ITD)"
  ukrainian: "Внутрішня тандемна дуплікація FLT3 (ITD)"
  english: "FLT3-ITD"
  synonyms: ["FLT3 ITD", "FLT3-ITD-positive AML"]

biomarker_type: gene_mutation
mutation_details:
  gene: "FLT3"
  gene_hugo_id: "HGNC:3765"
  exon: "14-15 (juxtamembrane domain)"
  variant_type: "internal tandem duplication"
  functional_impact: "Constitutive FLT3 kinase activation through dimerization"

measurement:
  method: "PCR / fragment-length analysis (rapid TAT essential; required at AML diagnosis) OR NGS panel"
  units: "Allelic ratio (ITD-mutant : WT, e.g. 0.5 high-AR threshold per ELN-2017; ELN-2022 dropped AR threshold but still reported)"
  sensitivity_requirement: "Rapid PCR turn-around (≤72 h) required to inform 1L induction (midostaurin / quizartinib add-on per CALGB-10603 RATIFY / QuANTUM-First)"

specimen_requirements:
  - "Bone marrow aspirate (preferred at diagnosis)"
  - "Peripheral blood acceptable when blast count adequate"

related_biomarkers:
  - BIO-FLT3-D835
  - BIO-NPM1

sources:
  - SRC-NCCN-AML-2025
  - SRC-ELN-AML-2022
  - SRC-RATIFY-STONE-2017
  - SRC-QUANTUM-FIRST-ERBA-2023

oncokb_skip_reason: itd_mvp
external_ids:
  hgnc_symbol: FLT3
last_reviewed: "2026-04-27"
notes: >
  ~25% of newly diagnosed AML; high allelic ratio (≥0.5) historically
  associated with poorer outcomes (risk-stratifying in ELN-2017;
  ELN-2022 reclassified all FLT3-ITD as intermediate when NPM1-mutant
  irrespective of AR). Midostaurin + 7+3 (RATIFY) and quizartinib +
  7+3 (QuANTUM-First) FDA-approved 1L. Gilteritinib (ADMIRAL) approved
  for relapsed/refractory FLT3-mutated AML. FLT3-ITD is also a maintenance
  target post-allo-HSCT (sorafenib SORMAIN; gilteritinib BMT-CTN-1506).
notes_ua: >
  ~25% of вперше діагностований AML; high allelic ratio (≥0.5) historically associated with poorer outcomes (risk-stratifying in ELN-2017; ELN-2022 reclassified all FLT3-ITD as intermediate when NPM1-mutant irrespective of AR). мідостаурин + 7+3 (RATIFY) and квізартиніб + 7+3 (QuANTUM-First) схвалений FDA 1L. гілтеритиніб (ADMIRAL) схвалений для рецидивний/рефрактерний FLT3-mutated AML. FLT3-ITD is also a підтримка target post-allo-HSCT (сорафеніб SORMAIN; гілтеритиніб BMT-CTN-1506).
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
