last_reviewed: "2026-04-27"
notes: >
  Classical ALK gatekeeper mutation (analogous to EGFR T790M, BCR::ABL1
  T315I). Most frequently seen as acquired resistance after crizotinib
  (1st-gen). 2nd-generation TKIs (alectinib, brigatinib, ceritinib)
  retain activity — alectinib superiority over crizotinib in 1L (ALEX,
  Peters 2017) is partly explained by avoidance of L1196M-mediated
  resistance. Lorlatinib also active. Compound mutations involving
  L1196M (e.g., L1196M + G1202R) emerge under sequential TKI pressure
  and require trial-based strategies.
notes_ua: >
  Класична ALK gatekeeper-мутація (аналог EGFR T790M, BCR::ABL1 T315I).
  Найчастіше виявляється як набута резистентність після кризотинібу
  (1-ше покоління). TKI 2-го покоління (алектиніб, бригатиніб,
  цертиніб) зберігають активність — перевага алектинібу над кризотинібом
  у 1L (ALEX, Peters 2017) частково пояснюється уникненням резистентності
  через L1196M. Лорлатиніб також активний. Композитні мутації з L1196M
  (наприклад, L1196M + G1202R) виникають під послідовним TKI-тиском
  і потребують стратегій на основі клінічних досліджень.
