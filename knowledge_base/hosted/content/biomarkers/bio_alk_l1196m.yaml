# Classical ALK gatekeeper mutation — analogous to T790M in EGFR or
# T315I in BCR::ABL1. Confers resistance to crizotinib and partial
# resistance to alectinib; brigatinib, ceritinib, and lorlatinib
# retain meaningful clinical activity. Surfaces as RESISTANCE in OncoKB
# for crizotinib — triggers resistance-conflict banner if crizotinib
# is recommended at the same line where L1196M is present.
