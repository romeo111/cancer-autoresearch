id: BIO-CALR
names:
  preferred: "CALR mutation (exon 9)"
  ukrainian: "Мутація CALR (екзон 9)"
  english: "CALR mutation"
  synonyms: ["Calreticulin mutation"]

biomarker_type: gene_mutation
mutation_details:
  gene: "CALR"
  gene_hugo_id: "HGNC:1455"
  exon: "9"
  hotspots:
    - "Type 1 — c.1092_1143del52 (52-bp deletion; ~55% of CALR-mut MPN)"
    - "Type 2 — c.1154_1155insTTGTC (5-bp insertion; ~35%)"
    - "Other type-1-like / type-2-like (~10%)"
  variant_type: "frameshift indel (exon 9)"
  functional_impact: "Mutant CALR binds and constitutively activates MPL (thrombopoietin receptor) → JAK-STAT signaling"

measurement:
  method: "PCR + fragment-length analysis (preferred — distinguishes type 1 vs type 2) OR Sanger / NGS for exact variant"
  units: "categorical; variant type reported"
  sensitivity_requirement: "Standard PCR / fragment-length"

specimen_requirements:
  - "Peripheral blood (preferred — convenient, adequate granulocyte DNA)"
  - "Bone marrow aspirate acceptable"

related_biomarkers:
