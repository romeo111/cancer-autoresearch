  - SRC-ESMO-MPN-2015

oncokb_skip_reason: multi_allele_mvp
external_ids:
  hgnc_symbol: CALR
last_reviewed: "2026-04-27"
notes: >
  Diagnostic criterion for ET (~25%) and PMF (~25–30%); essentially
  absent in PV. Mutually exclusive with JAK2 V617F and MPL W515 (the
  three drive ~95% of MPNs). Type 1 (52-bp del) carries more
  myelofibrotic phenotype and better OS in PMF; type 2 (5-bp ins)
  more thrombocytosis-predominant ET phenotype with lower thrombosis
  risk. JAK inhibitors (ruxolitinib, momelotinib, fedratinib,
  pacritinib) are not mutation-specific — they target downstream
  JAK-STAT, so they work in CALR-, JAK2-, and MPL-driven disease.
  Mutant CALR is also a tumor-specific neoantigen — anti-mutCALR
  immunotherapy in early-phase trials.
