last_reviewed: "2026-04-27"
notes: >
  Most aggressive RET mutation. Germline → MEN2B (multiple endocrine
  neoplasia type 2B) — defines need for prophylactic thyroidectomy
  before age 1. Sporadic in ~25% of MTC, associated with poorer
  prognosis. Selpercatinib (Retsevmo) and pralsetinib (Gavreto) —
  selective RET inhibitors; LIBRETTO-001 ORR ~60-70% in advanced MTC.
  Replaced multikinase inhibitors (vandetanib, cabozantinib) as 1L
  systemic therapy in actionable RET-altered advanced MTC.
