# Strongest RET activator; defining lesion of MEN2B and ~25% of
# sporadic MTC. Selpercatinib (LIBRETTO-001), pralsetinib —
# RET-selective TKIs; OncoKB Level 1 expected. Vandetanib /
# cabozantinib (multikinase) historic alternatives.
