notes: >
  Defining differentiator between CLL (CD23+) and MCL (CD23−) when both
  are CD5+ B-cell. Always interpreted with CD5 + cyclin D1:
  CLL = CD5+ CD23+ cyclin D1−; MCL = CD5+ CD23− cyclin D1+. Diagnostic
  not algorithm-driving.
notes_ua: >
  Defining differentiator між CLL (CD23+) and MCL (CD23−) when both are CD5+ B-cell. Always interpreted with CD5 + cyclin D1: CLL = CD5+ CD23+ cyclin D1−; MCL = CD5+ CD23− cyclin D1+. діагностичний not algorithm-driving.
