id: BIO-CXCR4-WHIM
names:
  preferred: "CXCR4 WHIM-like mutation"
  ukrainian: "Мутація CXCR4 (WHIM-подібна)"
  english: "CXCR4 WHIM mutation"
  synonyms: ["CXCR4 mutation", "CXCR4-WHIM"]
biomarker_type: gene_mutation

mutation_details:
  gene: "CXCR4"
  variant_type: "frameshift / nonsense in C-terminus (truncates regulatory domain)"
  functional_impact: "constitutive CXCR4 activation, persistent CXCL12 signaling"

measurement: {method: "PCR + Sanger sequencing OR NGS panel for CXCR4 C-terminus", units: "categorical (positive | negative)"}
specimen_requirements: ["BM aspirate (CD138+ enriched for WM)"]

sources: [SRC-NCCN-BCELL-2025]

oncokb_skip_reason: multi_allele_mvp
external_ids:
  hgnc_symbol: CXCR4
last_reviewed: "2026-04-25"
notes: >
  Cross-disease relevance:

  - **Waldenström / LPL** (~30%): CXCR4-WHIM-mutated patients have
    weaker depth of response to BTKi monotherapy (zanubrutinib,
    ibrutinib). May favor adding chemoimmuno (DRC) vs BTKi-only.
    ASPEN trial subset analysis showed differential response.
  - Inherited WHIM syndrome (germline): warts, hypogammaglobulinemia,
    immunodeficiency, myelokathexis.

  Direct algorithm impact in WM: weak modifier — does not yet shift
  primary 1L choice but informs follow-up if BTKi response suboptimal.
  Future: trigger early DRC switch for CXCR4-WHIM at 6-month suboptimal
  response.
notes_ua: >
  Cross-хвороба relevance:

  - **Waldenström / LPL** (~30%): CXCR4-WHIM-mutated patients have
    weaker depth of відповідь to BTKi монотерапія (занубрутиніб,
    ібрутиніб). May favor adding chemoimmuno (DRC) vs BTKi-only.
    ASPEN дослідження subset analysis showed differential відповідь.
  - Inherited WHIM syndrome (герміногенний): warts, hypogammaglobulinemia,
    immunodeficiency, myelokathexis.

  Direct algorithm impact in WM: weak modifier — does not yet shift primary 1L choice but informs спостереження if BTKi відповідь suboptimal. Future: trigger early DRC switch for CXCR4-WHIM at 6-month suboptimal відповідь.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
