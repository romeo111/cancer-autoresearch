id: BIO-EBV-DNA
names:
  preferred: "EBV-DNA viral load (quantitative PCR, plasma)"
  ukrainian: "Вірусне навантаження EBV-DNA (кількісна ПЛР, плазма)"
  english: "EBV-DNA quantitative load"
  synonyms:
    - "EBV viral load"
    - "EBV PCR"
    - "Plasma EBV-DNA"
biomarker_type: viral_load

measurement:
  method: >
    Real-time quantitative PCR for EBV-DNA on cell-free plasma
    (preferred) or whole blood. Plasma EBV-DNA reflects active
    viral replication and tumor lysis; whole-blood EBV-DNA includes
    latent virus in B-cells and is less specific for active disease.
    Standardized in IU/mL via WHO international standard.
  units: "IU/mL (or copies/mL with assay-specific conversion)"
  typical_range: [0, 100000000]

specimen_requirements:
  - "EDTA plasma (preferred) or whole blood"
  - "Standardized to WHO 1st International Standard for EBV (NIBSC 09/260)"

related_biomarkers:
  - BIO-EBV-STATUS
  - BIO-HIV-STATUS

sources:
  - SRC-NCCN-BCELL-2025

last_reviewed: "2026-04-26"
oncokb_skip_reason: viral_load
notes: >
  Companion to BIO-EBV-STATUS (qualitative tissue EBER-ISH). EBV-DNA
  is the *quantitative* serum marker used for:

  - **Extranodal NK/T nasal-type lymphoma**: pre-treatment baseline;
    monitoring during SMILE / DDGP / asparaginase-based regimens;
    post-treatment surveillance. Rising EBV-DNA on therapy correlates
    with poor response; persistent post-treatment positivity
    predicts relapse.
  - **PTLD**: EBV-driven PTLD shows EBV-DNA load decrease with
    rituximab + reduced immunosuppression; trend is response surrogate.
  - **HIV-associated EBV+ DLBCL / plasmablastic / primary effusion**:
    contextual; not standardly used for treatment decisions.
  - **Post-HSCT monitoring**: weekly EBV-DNA used to detect early
    PTLD risk; preemptive rituximab if doubling.

  Wired into: ALGO-NK-T-NASAL-1L (notes only — full Monitoring entity
  with thresholds and frequency to be authored).

  reviewer_signoffs: 0  # STUB — pending two Clinical Co-Lead approvals
notes_ua: >
  Companion to BIO-EBV-STATUS (qualitative tissue EBER-ISH). EBV-DNA is the *quantitative* serum marker used for:

  - **Extranodal NK/T nasal-type лімфома**: pre-лікування базове;
    моніторинг during SMILE / DDGP / asparaginase-based схеми;
    post-лікування спостереження. Rising EBV-DNA on терапія correlates
    with poor відповідь; persistent post-лікування positivity
    predicts рецидив.
  - **PTLD**: EBV-driven PTLD shows EBV-DNA load зменшення with
    ритуксимаб + зменшений immunosuppression; trend is відповідь surrogate.
  - **HIV-associated EBV+ DLBCL / plasmablastic / primary effusion**:
    contextual; not standardly used for лікування decisions.
  - **Post-HSCT моніторинг**: weekly EBV-DNA used to detect early
    PTLD risk; preemptive ритуксимаб if doubling.

  Wired into: ALGO-NK-T-NASAL-1L (notes only — full моніторинг сутність with thresholds and frequency to be authored).

  reviewer_signoffs: 0  # STUB — pending two Clinical Co-Lead approvals
ukrainian_review_status: pending_clinical_signoff
