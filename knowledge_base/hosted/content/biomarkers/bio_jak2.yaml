id: BIO-JAK2
names:
  preferred: "JAK2 mutation (V617F or exon 12)"
  ukrainian: "Мутація JAK2 (V617F або екзон 12)"
  english: "JAK2 mutation"
  synonyms: ["JAK2 V617F", "JAK2 exon 12"]

biomarker_type: gene_mutation
mutation_details:
  gene: "JAK2"
  gene_hugo_id: "HGNC:6192"
  hotspots:
    - "V617F (exon 14, JH2 pseudokinase domain — ~95% of PV; ~50–60% of ET / PMF)"
    - "exon 12 (small in-frame indels — ~3% of PV; JAK2-V617F-negative PV)"
  variant_type: "missense / in-frame indel"
  functional_impact: "Constitutive JAK2 kinase activation through JH2-domain release → JAK-STAT signaling"

measurement:
  method: "Allele-specific PCR (V617F screen — high sensitivity LoD ~0.1% VAF) + Sanger / NGS for exon 12 if V617F-negative"
  units: "categorical (positive/negative); VAF reported (allele burden tracks disease)"
  sensitivity_requirement: "ASP / ddPCR LoD ~0.1% VAF for low-burden detection; allele burden useful for treatment monitoring"

specimen_requirements:
  - "Peripheral blood (preferred — adequate granulocyte DNA)"
  - "Bone marrow aspirate acceptable"

related_biomarkers:
  - BIO-CALR

sources:
  - SRC-NCCN-MPN-2025
  - SRC-ESMO-MPN-2015

last_reviewed: "2026-04-27"
notes: >
  Diagnostic for PV (V617F or exon 12 — together ≥98%), ET (~50–60%
  V617F), PMF (~50–60% V617F). Mutually exclusive with CALR and MPL.
  JAK2 inhibitors (ruxolitinib COMFORT-I/II; fedratinib JAKARTA-2;
  pacritinib PERSIST-2; momelotinib MOMENTUM) treat MF symptoms +
  splenomegaly across all driver genotypes. Ruxolitinib is also 1L
  for hydroxyurea-resistant / -intolerant PV (RESPONSE) and approved
  for symptomatic / high-risk ET in some jurisdictions. Allele
  burden reduction on therapy correlates with longer-term outcomes
  in PV / MF but is not a treatment switch trigger.
