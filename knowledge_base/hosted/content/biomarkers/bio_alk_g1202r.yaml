# Solvent-front mutation conferring pan-ALK-TKI resistance to all
# 1st/2nd-gen agents. Lorlatinib retains in-vitro and clinical activity
# (CROWN, Solomon 2021). Surfaces as RESISTANCE in OncoKB for crizotinib/
# ceritinib/alectinib/brigatinib — triggers resistance-conflict banner
# if any of those are recommended at the same line where G1202R is present.
