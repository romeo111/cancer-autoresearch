last_reviewed: "2026-04-27"
notes: >
  Most common on-target ALK-resistance mutation after 2nd-generation TKI
  (alectinib, brigatinib): emerges in ~20-40% of post-2G-TKI re-biopsies.
  Solvent-front position blocks binding of 1st/2nd-gen ALK inhibitors.
  Lorlatinib (3rd-gen, macrocyclic) maintains activity per CROWN trial
  data and post-progression analyses; preferred 2L+ option when G1202R
  detected. Compound mutations (G1202R + L1196M, G1202R + I1171N, etc.)
  may emerge under lorlatinib pressure and confer pan-ALK-TKI resistance —
  trial enrollment indicated.
notes_ua: >
  Найпоширеніша on-target ALK-мутація резистентності після TKI 2-го
  покоління (алектиніб, бригатиніб): виникає в ~20-40% повторних біопсій
  після 2G-TKI. Позиція solvent-front блокує зв'язування інгібіторів
  ALK 1/2-го покоління. Лорлатиніб (3-те покоління, макроциклічний)
  зберігає активність за даними CROWN та аналізів пост-прогресії; є
  переважним варіантом 2L+ при виявленні G1202R. Композитні мутації
  (G1202R + L1196M, G1202R + I1171N тощо) можуть виникнути під тиском
  лорлатинібу та зумовити pan-ALK-TKI резистентність — показано
  включення в клінічне дослідження.
