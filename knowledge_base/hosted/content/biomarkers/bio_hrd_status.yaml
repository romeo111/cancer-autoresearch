id: BIO-HRD-STATUS
names:
  preferred: "Homologous recombination deficiency (HRD) status"
  ukrainian: "Статус дефіциту гомологічної рекомбінації"
  english: "HRD status"
  synonyms: ["BRCAness", "HR-deficient"]
biomarker_type: gene_mutation
measurement:
  method: "Composite: BRCA1/2 (germline + somatic) + genomic instability score (Myriad myChoice CDx, FoundationOne CDx HRD)"
  units: "categorical: HRD-positive (BRCA1/2-mutant OR GIS ≥42) | HRD-negative"
specimen_requirements: ["FFPE tumor + paired germline DNA (preferred)"]
interpretation_notes: >
  Ovarian: HRD-positive (~50% of high-grade serous) → PARPi maintenance
  benefit (olaparib, niraparib, rucaparib). PAOLA-1 + SOLO-1 trials.
  Also: pancreatic (BRCA1/2 only), prostate (BRCA1/2 + ATM + others),
  emerging breast (germline BRCA pathway).
related_biomarkers: [BIO-BRCA1-BRCA2-GERMLINE]
sources: [SRC-NCCN-OVARIAN-2025, SRC-ESMO-OVARIAN-2024]

oncokb_skip_reason: tumor_agnostic
last_reviewed: "2026-04-26"
