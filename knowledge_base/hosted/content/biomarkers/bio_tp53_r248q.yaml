# DNA-contact mutant — R248 directly contacts the DNA minor groove.
# Substitution to glutamine abolishes specific DNA recognition
# (sequence-specific transactivation lost). Multi-allele biomarker
# pattern; OncoKB lookup deferred to MVP scope per parent
# BIO-TP53-MUTATION (multi_allele_mvp).
oncokb_skip_reason: multi_allele_mvp
external_ids:
  hgnc_symbol: "TP53"
  hgvs_protein: "p.R248Q"

last_reviewed: "2026-04-27"
notes: >
  R248 is one of the six most-mutated codons in TP53 (along with R175,
  G245, R249, R273, R282). DNA-contact class: R248 sits in the L3 loop
  and makes direct base-specific contact with the DNA minor groove.
  Substitution to glutamine (R248Q) abolishes sequence-specific DNA
  binding while preserving overall fold (distinguishing it from
  structural R175H). R248Q has well-documented gain-of-function (GOF)
  activities in mouse models — accelerates tumorigenesis and metastasis
  beyond simple p53-null. Clinical implications mirror other TP53
  hotspots: in AML/MDS routes away from intensive chemo toward
  venetoclax-azacitidine + alloSCT; in CLL/MCL/MM contraindicates
  chemoimmuno or routes to high-risk-cytogenetics regimens. Distinction
  from R248W (different substitution, also a hotspot) — R248Q tends to
  retain partial folding while R248W more disruptive; both are
  pathogenic.
notes_ua: >
  R248 — один з шести найчастіше мутованих кодонів TP53 (поряд з R175,
  G245, R249, R273, R282). Клас DNA-contact: R248 розташований у
  L3-петлі та робить пряме base-specific контактування з мінорною
  борозенкою ДНК. Заміна на глутамін (R248Q) скасовує
  послідовність-специфічне зв'язування з ДНК, зберігаючи загальну
  згортку (відрізняє від структурного R175H). R248Q має добре
  задокументовані gain-of-function (GOF) активності в моделях мишей —
  прискорює онкогенез та метастазування понад просту p53-нуль.
  Клінічні наслідки відображають інші TP53 hotspots: при AML/MDS
  відхід від інтенсивної ХТ до венетоклакс-азацитидин + алоТГСК;
  при CLL/MCL/MM протипоказана хіміоімунотерапія або шлях до схем
  cytogenetics високого ризику. Розрізнення з R248W (інша заміна,
  також hotspot) — R248Q зазвичай зберігає часткову згортку, тоді
  як R248W більш руйнівна; обидві патогенні.
