id: BIO-FL-FLIPI
names:
  preferred: "Follicular Lymphoma International Prognostic Index (FLIPI)"
  ukrainian: "Прогностичний індекс при фолікулярній лімфомі (FLIPI)"
  english: "FLIPI score"
  synonyms:
    - "FLIPI"
    - "FLIPI2"
biomarker_type: composite_score

measurement:
  method: "5-variable score: age >60, Hb <12 g/dL, LDH >ULN, stage III-IV, ≥5 nodal areas"
  units: "score 0-5 (low / int / high)"

specimen_requirements:
  - "Clinical assessment + CBC + LDH + imaging staging"

sources:
  - SRC-NCCN-BCELL-2025

last_reviewed: "2026-04-25"
oncokb_skip_reason: score
notes: >
  Risk groups: 0-1 low (10y OS ~70%); 2 int (~50%); ≥3 high (~35%).
  FLIPI2 incorporates Hb + β2M + LDH + bone marrow + longest mass
  diameter — slightly better-discriminating but used less commonly.
  Informational stratification for prognosis counsel; does NOT directly
  drive 1L treatment choice (GELF criteria do that).
notes_ua: >
  Risk groups: 0-1 low (10y OS ~70%); 2 int (~50%); ≥3 high (~35%). FLIPI2 incorporates Hb + β2M + LDH + кістковий мозок + longest mass diameter — slightly краще-discriminating but used less часто. Informational stratification for прогноз counsel; does NOT directly drive 1L вибір терапії (GELF criteria do that).
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
