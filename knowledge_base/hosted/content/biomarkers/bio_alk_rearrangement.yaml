last_reviewed: "2026-04-25"
notes: >
  Defining stratification within systemic ALCL:

  - **ALCL ALK+** (~70% of systemic ALCL): younger patients (median
    ~30-40), favorable prognosis (~70-80% 5y OS), responds well to
    CHP-Bv. Brentuximab + crizotinib emerging in r/r.
  - **ALCL ALK-** (~30%): older (median ~60), adverse prognosis
    (~30-40% 5y OS), benefits more from autoSCT consolidation in CR1.

  Both ALK+ and ALK- treated with same 1L (CHP-Bv per ECHELON-2).
  Status drives **consolidation strategy** (autoSCT for fit younger
  ALK- in CR1) and **r/r therapy choice** (crizotinib for ALK+ vs
  brentuximab/clinical trial for ALK-).

  Outside ALCL: ALK rearrangements in NSCLC drive crizotinib/alectinib
  (different therapeutic context); inflammatory myofibroblastic tumor
  (IMT). Lymphoma scope: ALCL only.
notes_ua: >
  Defining stratification within systemic ALCL:

  - **ALCL ALK+** (~70% of systemic ALCL): younger patients (медіана
    ~30-40), сприятливий прогноз (~70-80% 5-річна ЗВ), responds well to
    CHP-Bv. Brentuximab + кризотиніб новий in р/р.
  - **ALCL ALK-** (~30%): older (медіана ~60), несприятливий прогноз
    (~30-40% 5-річна ЗВ), виграш more from аутоТГСК консолідація in CR1.

  Both ALK+ and ALK- treated with same 1L (CHP-Bv per ECHELON-2). Status drives **консолідація strategy** (аутоТГСК for fit younger ALK- in CR1) та **р/р терапія choice** (кризотиніб for ALK+ vs brentuximab/клінічне дослідження for ALK-).

  Outside ALCL: ALK rearrangements in NSCLC drive кризотиніб/алектиніб (відмінний терапевтичний context); inflammatory myofibroblastic пухлина (IMT). лімфома scope: ALCL only.
