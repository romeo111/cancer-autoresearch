last_reviewed: "2026-04-25"
notes: >
  Cross-disease relevance:

  - **Follicular Lymphoma** (~25% Y641-mutated): predicts response to
    tazemetostat (EZH2 inhibitor) in r/r FL. FDA-approved for
    EZH2-mutated FL after ≥2 prior lines. Wild-type EZH2 r/r FL has
    lower response rate. NCCN: tazemetostat preferred in 3L+ for
    EZH2-mut.
  - **DLBCL** (~20%): GCB subtype enriched. Tazemetostat investigational.
  - **MM** (~5%): mostly subset with t(4;14) — investigational.

  Direct algorithm impact: future r/r FL routing toward tazemetostat
  vs other 3L+ options. Currently informational + 2L flag for clinical
  trials.
notes_ua: >
  Cross-хвороба relevance:

  - **фолікулярна лімфома** (~25% Y641-mutated): predicts відповідь to
    tazemetostat (EZH2 інгібітор) in р/р FL. FDA-схвалений для
    EZH2-mutated FL after ≥2 prior lines. Wild-type EZH2 р/р FL has
    lower частота відповіді. NCCN: tazemetostat переважний in 3L+ for
    EZH2-mut.
  - **DLBCL** (~20%): GCB підтип enriched. Tazemetostat експериментальний. - **MM** (~5%): mostly subset with t(4;14) — експериментальний.

  Direct algorithm impact: future р/р FL routing toward tazemetostat vs other 3L+ options. Currently informational + 2L flag for клінічні дослідження.
