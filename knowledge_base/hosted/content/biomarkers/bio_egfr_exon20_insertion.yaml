id: BIO-EGFR-EXON20-INSERTION
names:
  preferred: "EGFR Exon 20 insertion"
  ukrainian: "Інсерція в 20-му екзоні EGFR"
  english: "EGFR Exon 20 insertion"
biomarker_type: gene_mutation

mutation_details:
  gene: "EGFR"
  exon: "20"
  variant_type: "in-frame insertion"
  hgvs_protein: "Heterogeneous — most common A767_V769dup, S768_D770dup, D770_N771insSVD"
  functional_impact: "activating but sterically resistant to most 1st/2nd-gen EGFR-TKI"

measurement:
  method: "NGS panel (PCR may miss — sequence-specific assay required); ctDNA acceptable"
specimen_requirements: ["FFPE tumor — NGS strongly preferred (PCR misses many ex20 ins)"]

related_biomarkers: [BIO-EGFR-MUTATION, BIO-EGFR-L858R, BIO-EGFR-EXON19-DELETION]
sources: [SRC-NCCN-NSCLC-2025, SRC-ESMO-NSCLC-METASTATIC-2024]

# Targeted by amivantamab (EGFR-MET bispecific) + chemotherapy, and
# mobocertinib (where available). Standard EGFR-TKI response is poor —
# OncoKB resistance signal expected for gefitinib/erlotinib/osimertinib.
oncokb_lookup:
  gene: EGFR
  variant: Exon 20 insertion
external_ids:
  hgnc_symbol: "EGFR"
  oncokb_url: "https://www.oncokb.org/gene/EGFR/Exon%2020%20insertion"

last_reviewed: "2026-04-27"
notes: >
  ~5-10% of EGFR-mutant NSCLC. Heterogeneous insertions in exon 20 —
  most lie outside the αC-helix, conferring steric block to standard
  TKIs. Amivantamab + chemo (PAPILLON, Zhou 2023) — NEJM, 1L; standard.
  Mobocertinib withdrawn by manufacturer in some markets — verify
  availability. Sunvozertinib (DZD9008) emerging. Watch for A763_Y764insFQEA
  variant — exception that retains standard TKI sensitivity.
notes_ua: >
  ~5-10% of EGFR-mutant NSCLC. Heterogeneous insertions in exon 20 — найбільш lie outside the αC-helix, conferring steric block to стандарт TKIs. амівантамаб + chemo (PAPILLON, Zhou 2023) — NEJM, 1L; стандарт. мобоцертиніб withdrawn by manufacturer in some markets — verify availability. Sunvozertinib (DZD9008) новий. Watch for A763_Y764insFQEA варіант — exception that retains стандарт TKI чутливість.
ukrainian_review_status: pending_clinical_signoff
