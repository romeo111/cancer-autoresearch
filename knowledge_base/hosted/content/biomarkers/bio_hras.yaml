id: BIO-HRAS
names:
  preferred: "HRAS mutation"
  ukrainian: "Мутація HRAS"
  english: "HRAS mutation"
  synonyms: ["HRAS Q61", "HRAS G12", "HRAS G13"]

biomarker_type: gene_mutation
mutation_details:
  gene: "HRAS"
  gene_hugo_id: "HGNC:5173"
  hotspots:
    - "G12X (exon 2 — codon 12; G12V / G12D / G12S most common)"
    - "G13X (exon 2 — codon 13)"
    - "Q61X (exon 3 — codon 61; Q61R / Q61K most common in HNSCC)"
  variant_type: "activating missense"
  functional_impact: "Constitutive GTP-bound HRAS → MAPK / PI3K signaling"

measurement:
  method: "DNA-NGS (preferred) OR ctDNA NGS OR allele-specific PCR (codon 12 / 13 / 61)"
  units: "categorical; variant + VAF reported"
  sensitivity_requirement: "Standard NGS; tipifarnib enrolment uses VAF threshold ≥20% in some trials"

specimen_requirements:
  - "FFPE tumor tissue, minimum 20% tumor cellularity"

related_biomarkers:
  - BIO-KRAS-G12C
  - BIO-RAS-MUTATION

sources:
  - SRC-NCCN-BLADDER-2025
  - SRC-ONCOKB

last_reviewed: "2026-04-27"
notes: >
  HNSCC: ~5–8% (KURRENT-HN — tipifarnib + alpelisib activity in
  HRAS-mutant + PIK3CA-mut/amp subset). Thyroid (PDTC / ATC subset):
  ~5%. Urothelial / bladder: ~5%. Salivary duct carcinoma: ~10–15%.
  Tipifarnib (farnesyl-transferase inhibitor) is the only HRAS-targeted
  agent with positive single-arm signal — KO-TIP-001 (Ho et al, JCO
  2021) in R/M HRAS-mutant HNSCC achieved ORR ~55% in VAF-≥20% subset
  → FDA breakthrough designation; phase 3 AIM-HN ongoing. HRAS depends
  on farnesylation for membrane localization (KRAS / NRAS use
  geranylgeranyl alternative pathway → tipifarnib less active vs KRAS / NRAS).
