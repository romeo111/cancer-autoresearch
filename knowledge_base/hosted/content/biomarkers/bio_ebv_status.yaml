id: BIO-EBV-STATUS
names:
  preferred: "EBV status (EBER-ISH on tumor tissue)"
  ukrainian: "EBV статус (EBER-ISH на тканині)"
  english: "EBV status"
  synonyms: ["EBV", "Epstein-Barr virus", "EBER"]
biomarker_type: viral_load

measurement: {method: "EBER (EBV-encoded RNA) in-situ hybridization on FFPE tissue. Serum EBV-DNA quantitative for systemic involvement", units: "categorical (positive | negative); EBV-DNA copies/mL for serum"}
specimen_requirements: ["FFPE tumor tissue OR serum/plasma for EBV-DNA"]

sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
oncokb_skip_reason: viral_load
notes: >
  Cross-disease etiologic + therapeutic significance:

  - **Endemic Burkitt** (equatorial Africa): EBV+ in ~95%
  - **Sporadic Burkitt** (Western): EBV+ in ~15%
  - **Classical Hodgkin**: EBV+ in ~30-40% (mixed cellularity highest)
  - **Post-transplant LPD (PTLD)**: EBV-driven; rituximab + reduce
    immunosuppression often curative
  - **HIV-associated DLBCL / plasmablastic / primary effusion**: EBV+
    common
  - **NK/T nasal-type lymphoma**: EBV+ universally
  - **AITL microenvironment**: EBV+ B-cells frequent
  - **EBV+ DLBCL of elderly** (WHO 5th-ed entity): defined by EBV+

  Drives different treatment context:
  - PTLD → reduce immunosuppression + rituximab
  - HIV-associated → cART + standard regimen
  - EBV+ HL has same regimen but PD-1 blockade emerging response
    differential

  Currently informational in our KB; not algorithm-driving for
  treatment selection but documented for clinical context.
