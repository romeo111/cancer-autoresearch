id: BIO-PROGESTERONE-RECEPTOR
names:
  preferred: "Progesterone receptor (PR)"
  ukrainian: "Прогестероновий рецептор (ПР)"
  english: "Progesterone receptor"
  abbreviations: ["PR"]
codes:
  loinc: "16113-3"

biomarker_type: protein_expression_ihc

measurement:
  method: "Immunohistochemistry on FFPE tumor tissue (ASCO/CAP-validated antibody)"
  units: "percent of tumor nuclei staining"
  typical_range: [0, 100]

interpretation_notes: >
  PR-positive: ≥1% nuclear staining. PR-positivity in ER-positive disease
  predicts better endocrine-therapy response and outcomes. ER+/PR+
  vs ER+/PR- is a recognized prognostic distinction.

related_biomarkers: ["BIO-ESTROGEN-RECEPTOR"]

last_reviewed:
oncokb_skip_reason: ihc_no_variant
notes: >
  Companion biomarker to ER. Together define HR-positive subtype.
  Discordance ER+/PR- (~10-15%) more aggressive than ER+/PR+ but still
  endocrine-therapy-eligible.
notes_ua: >
  Companion біомаркер to ER. Together define HR-positive підтип. Discordance ER+/PR- (~10-15%) more агресивний than ER+/PR+ but still endocrine-терапія-eligible.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
