id: BIO-SF3B1
names:
  preferred: "SF3B1 mutation"
  ukrainian: "Мутація SF3B1"
  english: "SF3B1 mutation"
  synonyms: ["SF3B1 K700E"]

biomarker_type: gene_mutation
mutation_details:
  gene: "SF3B1"
  gene_hugo_id: "HGNC:10768"
  hotspots:
    - "K700E (~50% of SF3B1-mutant cases — most common)"
    - "K666N / K666E / K666T"
    - "H662 / R625 / E622"
  variant_type: "missense (HEAT-domain hotspots)"
  functional_impact: "Aberrant 3' splice-site recognition → cryptic exon inclusion → nonsense-mediated decay of target transcripts (e.g. ABCB7 in MDS-RS)"

measurement:
  method: "DNA-NGS panel (myeloid panel, lymphoid panel, or large solid-tumor panel)"
  units: "categorical; VAF reported"
  sensitivity_requirement: "Standard NGS"

specimen_requirements:
  - "Bone marrow aspirate (preferred for MDS / CLL prognostic workup)"
  - "Peripheral blood acceptable when blast / lymphocyte count adequate"

related_biomarkers:
  - BIO-CLL-HIGH-RISK-GENETICS

sources:
  - SRC-NCCN-AML-2025
  - SRC-ESMO-MDS-2021
  - SRC-IPSS-M-BERNARD-2022

last_reviewed: "2026-04-27"
notes: >
  MDS: ~20% overall, ~80% of MDS with ring sideroblasts (MDS-LR-RS in
  WHO-2022 / ICC-2022). SF3B1-mutant MDS-LR-RS has a distinct biology
  — favorable in IPSS-M, transfusion-dependent anemia phenotype,
  responds to luspatercept (COMMAND, MEDALIST). Also luspatercept
  ESAs first-line for low-risk MDS irrespective of RS in some regions
  per ESMO 2024 update. CLL: ~10–20%, adverse prognostic marker.
  Uveal melanoma: ~20%, intermediate prognosis (vs BAP1 worst).
  H3B-8800 / E7107 splicing modulators in development but no approved
  agents target SF3B1 directly.
