id: BIO-MGMT-METHYLATION
names:
  preferred: "MGMT promoter methylation status"
  ukrainian: "Статус метилювання промотора MGMT"
  english: "MGMT methylation"
  synonyms: ["O6-methylguanine-DNA methyltransferase methylation"]
biomarker_type: methylation
measurement:
  method: "Methylation-specific PCR (MSP) OR pyrosequencing OR methylation-array (450K/EPIC)"
  units: "categorical: methylated | unmethylated"
specimen_requirements: ["FFPE tumor block (≥40% tumor cellularity)"]
interpretation_notes: >
  Glioblastoma: methylated MGMT → ~3× longer OS benefit from
  temozolomide-containing therapy (Stupp protocol). Unmethylated +
  elderly (≥70) — TMZ benefit minimal; RT-only or TMZ-only acceptable
  per Nordic/Wick trials. Pediatric/young adult dilemma: methylated
  is favorable but TMZ-induced hypermutation risk on relapse exists.
related_biomarkers: []
sources: [SRC-NCCN-CNS-2025, SRC-EANO-GBM-2024]

oncokb_skip_reason: tumor_agnostic
external_ids:
  hgnc_symbol: MGMT
last_reviewed: "2026-04-26"
