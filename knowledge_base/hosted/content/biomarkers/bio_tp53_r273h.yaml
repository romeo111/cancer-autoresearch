# DNA-contact mutant — R273 directly contacts DNA. R273H preserves
# overall protein fold but abolishes specific DNA recognition.
# Multi-allele biomarker pattern; OncoKB lookup deferred to MVP scope
# per parent BIO-TP53-MUTATION (multi_allele_mvp).
oncokb_skip_reason: multi_allele_mvp
external_ids:
  hgnc_symbol: "TP53"
  hgvs_protein: "p.R273H"

last_reviewed: "2026-04-27"
notes: >
  R273 is among the top three most-mutated TP53 codons (with R175 and
  R248). DNA-contact class: R273 directly contacts the DNA major groove
  via its guanidinium side chain. R→H substitution preserves the
  thermal stability of the protein fold (distinguishing it from
  structural R175H) but eliminates specific DNA binding. R273H is one
  of the best-characterized GOF p53 mutants — promotes chemoresistance
  via NF-κB activation, drives invasion/metastasis through CXCR4 and
  RhoA pathways, reprograms metabolism (mevalonate pathway
  upregulation). Clinical implications mirror the TP53-mutant class:
  AML/MDS — venetoclax-azacitidine + alloSCT consideration; CLL/MCL —
  contraindicates chemoimmuno; MM — high-risk cytogenetics composite
  routes to quadruplet. Notably, R273H tumors are particularly
  resistant to platinum chemotherapy across solid-tumor types per
  multiple correlative analyses — relevant for ovarian, lung,
  esophageal cancer treatment selection.
notes_ua: >
  R273 — серед трьох найчастіше мутованих кодонів TP53 (з R175 та
  R248). Клас DNA-contact: R273 прямо контактує з мажорною борозенкою
  ДНК через свою гуанідінієву бічну групу. Заміна R→H зберігає
  термічну стабільність згортки білка (відрізняє від структурного
  R175H), але усуває специфічне зв'язування з ДНК. R273H — один з
  найкраще охарактеризованих GOF p53 мутантів: сприяє хеморезистентності
  через активацію NF-κB, керує інвазією/метастазуванням через шляхи
  CXCR4 та RhoA, перепрограмовує метаболізм (підвищення мевалонатного
  шляху). Клінічні наслідки відображають клас TP53-мутацій: AML/MDS
  — венетоклакс-азацитидин + розгляд алоТГСК; CLL/MCL — протипоказана
  хіміоімунотерапія; MM — композит cytogenetics високого ризику з
  переходом до квадруплету. Особливо: пухлини з R273H особливо
  резистентні до платинової ХТ при різних солідних пухлинах за
  даними кількох кореляційних аналізів — релевантно для лікування
  яєчників, легень, стравоходу.
