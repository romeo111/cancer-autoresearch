# Solvent-front mutation analogous to ALK G1202R. Confers resistance
# to crizotinib (Shaw 2014, NEJM), entrectinib, ceritinib, and even
# lorlatinib. Repotrectinib (next-gen macrocyclic) retains activity
# per TRIDENT-1 (Drilon 2024) — both TKI-naive and post-TKI cohorts
# show responses including in G2032R-positive patients. Surfaces as
# RESISTANCE in OncoKB for crizotinib/entrectinib — triggers resistance-
# conflict banner if those are recommended at the same line where
# G2032R is present.
oncokb_lookup:
  gene: ROS1
  variant: G2032R
external_ids:
  hgnc_symbol: "ROS1"
  hgvs_protein: "p.G2032R"
  oncokb_url: "https://www.oncokb.org/gene/ROS1/G2032R"

last_reviewed: "2026-04-27"
notes: >
  Most common acquired resistance mutation in ROS1-rearranged NSCLC
  treated with crizotinib (~40% of resistance cases). Solvent-front
  position structurally analogous to ALK G1202R; confers cross-
  resistance to crizotinib, ceritinib, entrectinib, and lorlatinib.
  Repotrectinib (TPX-0005), a next-generation macrocyclic ROS1/TRK
  inhibitor, demonstrates activity in G2032R-positive patients per
  TRIDENT-1 (Drilon 2024, NEJM): ORR ~38-58% in TKI-pretreated cohort
  including G2032R-positive subset. FDA-approved 2023 for ROS1+ NSCLC
  (TKI-naive and post-TKI). Standard recommendation when G2032R
  detected on prior ROS1-TKI failure.
notes_ua: >
  Найпоширеніша набута мутація резистентності при ROS1-rearranged НДКРЛ
  на тлі кризотинібу (~40% випадків резистентності). Позиція solvent-
  front структурно аналогічна ALK G1202R; зумовлює перехресну
  резистентність до кризотинібу, цертинібу, ентректинібу та лорлатинібу.
  Репотректиніб (TPX-0005) — макроциклічний інгібітор ROS1/TRK
  наступного покоління — демонструє активність у G2032R-позитивних
  пацієнтів за TRIDENT-1 (Drilon 2024, NEJM): ORR ~38-58% у когорті
  попередньо лікованих TKI, включно з G2032R-позитивною підгрупою.
  Схвалений FDA 2023 для ROS1+ НДКРЛ (TKI-naive та post-TKI).
  Стандартна рекомендація при виявленні G2032R на тлі попередньої
  невдачі ROS1-TKI.
