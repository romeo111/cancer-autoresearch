oncokb_skip_reason: multi_allele_mvp
external_ids:
  hgnc_symbol: AKT1
last_reviewed: "2026-04-27"
notes: >
  ~3–6% of HR+ HER2− metastatic breast (CAPItello-291 enrichment ~7%);
  also seen in endometrial, prostate, lung, meningioma. Capivasertib
  + fulvestrant FDA-approved for HR+ HER2− advanced breast harboring
  PIK3CA / AKT1 / PTEN alteration after progression on endocrine ±
  CDK4/6i (CAPItello-291). The pathway-altered cohort (any of the
  three) drove the benefit; AKT1 E17K alone is a smaller subset but
  responsive. Hyperglycemia + diarrhea + rash are class on-target
  effects.
notes_ua: >
  ~3–6% of HR+ HER2− метастатичний breast (CAPItello-291 enrichment ~7%); also seen in endometrial, prostate, lung, meningioma. Capivasertib + фулвестрант FDA-схвалений для HR+ HER2− поширений breast harboring PIK3CA / AKT1 / PTEN альтерація after прогресування on endocrine ± CDK4/6i (CAPItello-291). The pathway-altered cohort (any of the three) drove the виграш; AKT1 E17K alone is a smaller subset but responsive. гіперглікемія + діарея + висип are class on-target effects.
