id: BIO-AKT1
names:
  preferred: "AKT1 E17K mutation"
  ukrainian: "Мутація AKT1 E17K"
  english: "AKT1 E17K"
  synonyms: ["AKT1 mutation"]

biomarker_type: gene_mutation
mutation_details:
  gene: "AKT1"
  gene_hugo_id: "HGNC:391"
  hotspots: ["E17K (PH-domain hotspot; >90% of AKT1 mutations across tumors)"]
  variant_type: "missense"
  functional_impact: "Constitutive AKT1 membrane localization and PI3K-independent activation"

measurement:
  method: "DNA-NGS (preferred) OR ctDNA NGS OR allele-specific PCR (E17K)"
  units: "categorical; VAF reported"
  sensitivity_requirement: "Standard NGS; ctDNA acceptable for monitoring"

specimen_requirements:
  - "FFPE tumor tissue, minimum 20% tumor cellularity"
  - "Plasma ctDNA (CAPItello-291 stratification used tissue OR ctDNA)"

