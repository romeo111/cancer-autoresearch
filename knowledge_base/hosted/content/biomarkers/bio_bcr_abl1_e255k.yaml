id: BIO-BCR-ABL1-E255K
names:
  preferred: "BCR::ABL1 E255K nilotinib-resistance mutation"
  ukrainian: "BCR::ABL1 E255K — мутація резистентності до нілотинібу"
  english: "BCR-ABL1 E255K resistance mutation"
  synonyms: ["ABL1 p.E255K", "BCR-ABL E255K", "P-loop mutation"]
biomarker_type: gene_mutation

mutation_details:
  gene: "ABL1"
  exon: "4"
  variant_type: "missense"
  hgvs_protein: "p.E255K"
  functional_impact: "partial nilotinib resistance and reduced imatinib sensitivity; dasatinib, bosutinib, ponatinib retain activity"

