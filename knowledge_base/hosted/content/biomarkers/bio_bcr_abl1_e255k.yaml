  - SRC-ESMO-CML-2017

# P-loop mutation conferring partial nilotinib resistance and reduced
# imatinib sensitivity. Dasatinib alternative is preferred. Triggers
# resistance-conflict banner if nilotinib is recommended at the same
# line where E255K is present.
oncokb_lookup:
  gene: ABL1
  variant: E255K
external_ids:
  hgnc_symbol: "ABL1"
  hgvs_protein: "p.E255K"
  oncokb_url: "https://www.oncokb.org/gene/ABL1/E255K"

last_reviewed: "2026-04-27"
notes: >
  Classical P-loop mutation of ABL1. Reduces nilotinib sensitivity
  (IC50 ~5-7x baseline) and imatinib sensitivity (IC50 ~10-20x);
  associated with adverse prognosis on imatinib. Dasatinib, bosutinib,
  ponatinib retain in-vitro activity. Per ELN-2020 / ELN-2025: detection
  on nilotinib or imatinib failure → switch to dasatinib (preferred
  2G-TKI option) or ponatinib. P-loop mutations as a class (E255K,
  Y253H, G250E) generally favor dasatinib-based salvage; T315I excluded
  per separate biomarker.
notes_ua: >
  Класична P-loop мутація ABL1. Знижує чутливість до нілотинібу
  (IC50 ~5-7× від базової) та іматинібу (IC50 ~10-20×); асоціюється
  з несприятливим прогнозом на іматинібі. Дазатиніб, босутиніб,
  понатиніб зберігають in-vitro активність. Згідно з ELN-2020 /
  ELN-2025: виявлення при невдачі нілотинібу або іматинібу →
  перехід на дазатиніб (переважний 2G-TKI варіант) або понатиніб.
  P-loop мутації як клас (E255K, Y253H, G250E) загалом надають
  перевагу dasatinib-based salvage; T315I розглядається окремо.
ukrainian_review_status: pending_clinical_signoff
