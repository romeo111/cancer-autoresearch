id: BIO-SEZARY-COUNT
names:
  preferred: "Sézary cell count (peripheral blood, B-classification per ISCL/EORTC)"
  ukrainian: "Підрахунок клітин Сезарі (периферична кров, B-класифікація за ISCL/EORTC)"
  english: "Sézary cell count"
biomarker_type: cell_count

measurement: {method: "Flow cytometry (CD4+CD7- or CD4+CD26- abnormal subset) + morphology (atypical lymphocytes with cerebriform nuclei)", units: "cells/μL or % of CD4+; B0 <250 / B1 250-1000 / B2 ≥1000 OR ≥5% Sézary by morphology"}
specimen_requirements: ["Peripheral blood EDTA — fresh (<24h for flow accuracy)"]

sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
notes: >
  Defines "B" component of TNMB staging in MF/Sézary. B2 (≥1000 Sézary
  cells/μL) is the leukemic stage = Sézary syndrome by definition; up-
  stages disease to IVA1 regardless of skin stage. Qualifies for
  systemic-first therapy and especially for mogamulizumab (highest
  efficacy in B2). Distinguished from reactive lymphocytosis by clonal
  TCR (TEST-TCR-CLONALITY) + aberrant flow phenotype.
notes_ua: >
  Defines "B" component of TNMB стадіювання in MF/Sézary. B2 (≥1000 Sézary cells/μL) is the leukemic stage = Sézary syndrome by definition; up- stages хвороба to IVA1 regardless of skin stage. Qualifies for systemic-first терапія and особливо for mogamulizumab (найвища ефективність in B2). Distinguished from reactive lymphocytosis by clonal TCR (TEST-TCR-CLONALITY) + aberrant flow фенотип.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
