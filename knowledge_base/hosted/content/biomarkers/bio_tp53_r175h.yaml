# Most common TP53 hotspot in human cancer (~5-7% of all TP53-mutant
# tumors). Structural mutant (DNA-binding-domain conformation disrupted)
# — not directly drugged but informs prognosis + treatment intensity.
# Multi-allele biomarker pattern; OncoKB lookup deferred to MVP scope
# per parent BIO-TP53-MUTATION (multi_allele_mvp).
oncokb_skip_reason: multi_allele_mvp
external_ids:
  hgnc_symbol: "TP53"
  hgvs_protein: "p.R175H"

last_reviewed: "2026-04-27"
notes: >
  R175H is the most common TP53 missense hotspot across all human
  cancers (~5-7% of TP53-mutant tumors per IARC TP53 Database).
  Structural class mutant — the R175 substitution to histidine disrupts
  the DNA-binding domain fold (zinc-coordination region). Beyond
  loss-of-function (LoF), R175H is a canonical example of mutant-p53
  GAIN-OF-FUNCTION (GOF): the mutant protein acquires pro-oncogenic
  activities (chemoresistance via NF-kB, increased migration/invasion,
  metabolic reprogramming, chronic inflammation). Clinical implication:
  R175H+ tumors generally have worse chemo response than TP53-WT or
  even other TP53-mut tumors. In AML: TP53-mut (any) including R175H
  → very poor outcomes with intensive chemo, route to alloSCT or
  venetoclax-azacitidine + clinical trials. In MM: routes to quadruplet
  per high-risk cytogenetics composite. Emerging GOF-targeting
  strategies (eprenetapopt/APR-246, arsenic trioxide for structural
  mutants) are largely investigational; R175H specifically among the
  reactivatable structural mutants.
notes_ua: >
  R175H — найпоширеніший TP53 missense hotspot у всіх людських
  пухлинах (~5-7% TP53-mut пухлин за базою IARC TP53). Структурний
  клас мутанта — заміна R175 на гістидин порушує фолдинг ДНК-зв'язуючого
  домену (ділянка координації цинку). Окрім втрати функції (LoF),
  R175H є канонічним прикладом ПІДСИЛЕННЯ ФУНКЦІЇ (GOF) мутантного
  p53: мутантний білок набуває проонкогенних активностей (хеморезистентність
  через NF-kB, посилена міграція/інвазія, метаболічне перепрограмування,
  хронічне запалення). Клінічне значення: R175H+ пухлини зазвичай
  мають гіршу відповідь на ХТ, ніж TP53-WT або навіть інші TP53-mut.
  При AML: TP53-mut (будь-яка) включно з R175H → дуже погані
  результати інтенсивної ХТ, шлях до алоТГСК або венетоклакс-
  азацитидин + клінічні дослідження. При MM: шлях до квадруплету
  через композит cytogenetics високого ризику. Експериментальні
  GOF-таргетні стратегії (епренетапопт/APR-246, миш'яковий триоксид
  для структурних мутантів) переважно дослідницькі; R175H зокрема
  серед потенційно реактивованих структурних мутантів.
