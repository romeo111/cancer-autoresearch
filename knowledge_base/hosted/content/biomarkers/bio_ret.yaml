id: BIO-RET
names:
  preferred: "RET alterations (fusion or activating point mutation)"
  ukrainian: "Альтерації RET (фузія або активуюча точкова мутація)"
  english: "RET alterations"
  synonyms: ["RET fusion", "RET-rearranged", "RET M918T", "RET C634R"]

biomarker_type: gene_mutation
mutation_details:
  gene: "RET"
  gene_hugo_id: "HGNC:9967"
  hotspots:
    - "KIF5B-RET fusion (most common in NSCLC)"
    - "CCDC6-RET fusion (PTC)"
    - "NCOA4-RET fusion (PTC)"
    - "M918T (germline MEN2B; somatic in sporadic MTC)"
    - "C634R / C634F / C634Y (germline MEN2A — codon 634 cysteine)"
    - "C611 / C618 / C620 / C630 cysteine substitutions (MEN2A spectrum)"
  variant_type: "fusion / missense"
  functional_impact: "Constitutive RET tyrosine kinase activation"

measurement:
  method: "RNA-NGS (preferred for fusion sensitivity) + DNA-NGS (point mutations) OR FISH break-apart (fusion screen) OR allele-specific PCR (codon 634 / M918T)"
  units: "categorical (positive/negative); fusion partner reported"
  sensitivity_requirement: "RNA-NGS captures fusion partners; germline testing required for any MTC patient at presentation"

specimen_requirements:
  - "FFPE tumor tissue, minimum 20% tumor cellularity (fusion testing tolerates lower cellularity than amplification)"
  - "Peripheral blood for germline RET testing in MTC (mandatory per ATA / NCCN)"

related_biomarkers: []

sources:
  - SRC-NCCN-NSCLC-2025
  - SRC-ESMO-NSCLC-METASTATIC-2024
  - SRC-ONCOKB

last_reviewed: "2026-04-27"
notes: >
  Fusions: ~1–2% of NSCLC adenocarcinoma; ~10–20% of papillary thyroid
  carcinoma. Selpercatinib (LIBRETTO-001 / -431) and pralsetinib
  (ARROW) are approved for RET-fusion+ NSCLC and PTC.
  Point mutations (M918T, codon 634): hereditary medullary thyroid
  carcinoma in MEN2A (C634) / MEN2B (M918T) and ~50% of sporadic MTC.
  Selpercatinib and pralsetinib are 1L for advanced RET-mutant MTC
  (LIBRETTO-001, ARROW); multikinase TKIs (vandetanib, cabozantinib)
  are alternatives. Germline testing is mandatory for any MTC patient.
