id: BIO-EGFR-EXON19-DELETION
names:
  preferred: "EGFR Exon 19 deletion"
  ukrainian: "Делеція 19-го екзону EGFR"
  english: "EGFR Exon 19 deletion"
biomarker_type: gene_mutation

mutation_details:
  gene: "EGFR"
  exon: "19"
  variant_type: "in-frame deletion"
  hgvs_protein: "p.E746_A750del (most common); other in-frame deletions of exon 19 also actionable"
