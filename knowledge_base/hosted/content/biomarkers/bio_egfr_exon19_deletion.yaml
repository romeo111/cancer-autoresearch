measurement:
  method: "Tumor-tissue NGS panel OR ctDNA NGS OR PCR (cobas EGFR Mutation Test)"
specimen_requirements: ["FFPE tumor (preferred)", "Plasma ctDNA acceptable"]

related_biomarkers: [BIO-EGFR-MUTATION, BIO-EGFR-L858R, BIO-EGFR-T790M]
sources: [SRC-NCCN-NSCLC-2025, SRC-ESMO-NSCLC-METASTATIC-2024]

# Most common EGFR-TKI-sensitizing variant (~45-50%) and best PFS in
# meta-analyses. Canonical OncoKB form: "Exon 19 deletion" — extractor
# normalizes via _EXON_DESCRIPTORS whitelist.
oncokb_lookup:
  gene: EGFR
  variant: Exon 19 deletion
external_ids:
  hgnc_symbol: "EGFR"
  oncokb_url: "https://www.oncokb.org/gene/EGFR/Exon%2019%20deletion"

last_reviewed: "2026-04-27"
notes: >
  Best-prognosis EGFR variant — superior PFS vs L858R on osimertinib
  (FLAURA HR ~0.43 vs ~0.51). Also responds well to afatinib,
  dacomitinib, erlotinib, gefitinib. Most common single deletion is
  E746_A750 (~70% of all exon 19 deletions); other in-frame deletions
  E746-T751, L747-P753, etc. share TKI sensitivity. NCCN 2025: universal
  EGFR testing required for advanced non-squamous NSCLC.
notes_ua: >
  найкращий-прогноз EGFR варіант — перевершує PFS vs L858R on осимертиніб (FLAURA HR ~0.43 проти ~0.51). Also responds well to афатиніб, дакомітиніб, ерлотиніб, гефітиніб. найбільш поширений single делеція is E746_A750 (~70% of all exon 19 deletions); other in-frame deletions E746-T751, L747-P753, etc. share TKI чутливість. NCCN 2025: universal EGFR testing обов'язковий for поширений non-squamous NSCLC.
ukrainian_review_status: pending_clinical_signoff
