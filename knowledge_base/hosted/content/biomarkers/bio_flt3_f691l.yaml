# Gatekeeper mutation conferring acquired resistance to gilteritinib
# (most prominently per ADMIRAL and post-progression analyses) and
# also reduced activity of quizartinib, midostaurin, sorafenib.
# Surfaces as RESISTANCE in OncoKB for gilteritinib — triggers
# resistance-conflict banner if gilteritinib is recommended at the
# same line where F691L is present.
