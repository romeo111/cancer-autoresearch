last_reviewed: "2026-04-27"
notes: >
  FLT3 gatekeeper mutation analogous to BCR::ABL1 T315I, EGFR T790M,
  and ALK L1196M. Almost always emerges on top of pre-existing FLT3-ITD
  (rarely de novo). Most clinically relevant as acquired resistance to
  gilteritinib in relapsed/refractory FLT3-mut AML — the dominant
  on-target mechanism per ADMIRAL (Perl 2019, NEJM) post-progression
  series and several real-world cohorts. F691L also reduces quizartinib
  activity (originally a type-II FLT3 inhibitor with even narrower
  resistance profile) and midostaurin. No commercially available FLT3
  inhibitor reliably overcomes F691L; clinical trials of
  next-generation FLT3 inhibitors (FF-10101, MAX-40279) and combination
  strategies (FLT3i + venetoclax, FLT3i + hypomethylator) are the
  current investigational options. Detection at gilteritinib relapse
  → route to alloSCT (if not already done), trial enrollment, or
  venetoclax-based salvage.
notes_ua: >
  Gatekeeper-мутація FLT3, аналог BCR::ABL1 T315I, EGFR T790M та
  ALK L1196M. Майже завжди виникає на тлі попередньої FLT3-ITD
  (рідко de novo). Найбільш клінічно значуща як набута резистентність
  до гілтеритинібу при рецидивній/рефрактерній FLT3-mut AML —
  домінуючий on-target механізм за ADMIRAL (Perl 2019, NEJM) серіями
  пост-прогресії та кількома real-world когортами. F691L також знижує
  активність квізартинібу (спочатку type-II FLT3-інгібітор з ще більш
  вузьким профілем резистентності) та мідостаурину. Жоден комерційно
  доступний FLT3-інгібітор надійно не долає F691L; клінічні дослідження
  FLT3-інгібіторів наступного покоління (FF-10101, MAX-40279) та
  комбінаційних стратегій (FLT3i + венетоклакс, FLT3i + гіпометилюючий
  агент) є поточними дослідницькими опціями. Виявлення при рецидиві
  на гілтеритинібі → шлях до алоТГСК (якщо ще не виконана), включення
  в клінічне дослідження, або venetoclax-based salvage.
