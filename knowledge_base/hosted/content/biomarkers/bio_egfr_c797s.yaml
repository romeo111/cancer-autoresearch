last_reviewed: "2026-04-27"
notes: >
  Acquired resistance mutation to 3rd-generation EGFR-TKI (osimertinib) —
  the C797 cysteine is the covalent-binding residue for osimertinib, so
  C797S abolishes irreversible inhibition. Most common osimertinib-
  resistance EGFR-on-target alteration (~7-22% of post-osimertinib
  re-biopsies). Triggers ESCAT IB pathway: amivantamab + lazertinib
  per MARIPOSA-2 (Passaro 2024). Cis vs trans T790M+C797S configuration
  matters: trans (different alleles) may respond to combo of 3rd-gen +
  1st/2nd-gen EGFR-TKI; cis (same allele) is fully resistant to all
  current EGFR-TKI monotherapy and requires bypass strategy
  (amivantamab-based, chemo, or trial enrollment).
notes_ua: >
  Набута мутація резистентності до EGFR-TKI 3-го покоління (осимертиніб) —
  цистеїн C797 є залишком ковалентного зв'язування для осимертинібу, тому
  C797S скасовує незворотне інгібування. Найпоширеніша EGFR-on-target
  альтерація після прогресії на осимертинібі (~7-22% повторних біопсій).
  Активує шлях ESCAT IB: амівантамаб + лазертиніб згідно з MARIPOSA-2
  (Passaro 2024). Cis vs trans конфігурація T790M+C797S має значення:
  trans (різні алелі) може відповідати на комбінацію 3-го + 1/2-го
  покоління EGFR-TKI; cis (один алель) повністю резистентна до всіх
  поточних EGFR-TKI у монотерапії та потребує bypass-стратегії
  (на основі амівантамабу, хіміотерапія, або клінічне дослідження).
