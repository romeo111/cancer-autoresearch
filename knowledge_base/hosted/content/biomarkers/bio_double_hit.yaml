id: BIO-DOUBLE-HIT
names:
  preferred: "Double-hit (MYC + BCL2 and/or BCL6 rearrangements)"
  ukrainian: "Double-hit (MYC + BCL2/BCL6 rearrangements)"
  english: "Double-hit lymphoma rearrangements"
biomarker_type: gene_fusion

measurement: {method: "FISH break-apart probes for MYC, BCL2, BCL6 on FFPE biopsy", units: "categorical (positive | negative)"}
specimen_requirements: ["FFPE biopsy block"]

related_biomarkers:
  - BIO-MYC-REARRANGEMENT     # required component
  - BIO-BCL2-REARRANGEMENT    # most common secondary (~60% of double-hits)
  - BIO-BCL6-REARRANGEMENT    # less common secondary; with all three = triple-hit (worst)

sources: [SRC-NCCN-BCELL-2025]

oncokb_skip_reason: fusion_mvp
last_reviewed: "2026-04-25"
notes: >
  Defining feature of HGBL-DH/THL. MYC + BCL2 most common. MYC + BCL6
  less common. Triple-hit (all three) rarest, worst prognosis. MUST
  test on every newly-diagnosed DLBCL — missed identification leads
  to under-treatment with R-CHOP.
notes_ua: >
  визначальна ознака HGBL-DH/THL. MYC + BCL2 найбільш поширений. MYC + BCL6 less поширений. Triple-hit (all three) rarest, найгірший прогноз. MUST test on every newly-diagnosed DLBCL — missed identification leads to under-лікування with R-CHOP.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
