id: BIO-CLL-HIGH-RISK-GENETICS
names:
  preferred: "CLL high-risk genetics (TP53 / del(17p) / IGHV-unmutated / complex karyotype)"
  ukrainian: "Цитогенетика високого ризику при ХЛЛ (TP53/del(17p)/IGHV-unmutated/комплексний каріотип)"
  english: "CLL high-risk genetics composite"
biomarker_type: composite_score

measurement:
  method: "FISH for del(17p), TP53 sequencing, IGHV mutational analysis, karyotype on stimulated PBMC"
  units: "categorical (high-risk | standard-risk)"

specimen_requirements:
  - "Peripheral blood for FISH + IGHV (no marrow needed for CLL)"

sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
notes: >
  Composite "high-risk" if ANY: TP53 mutation OR del(17p) OR
  IGHV-unmutated (germline ≥98% homology). Complex karyotype (≥3
  abnormalities) compounds risk further. Drives 1L preference toward
  fixed-duration venetoclax+obinutuzumab over BTKi in some guidelines
  (CLL14 trial — high-risk subgroup similar PFS). Refractory chemoimmuno
  with high-risk → AVOID FCR/BR; go BTKi or venetoclax-O.
