id: BIO-FLT3-D835
names:
  preferred: "FLT3 tyrosine kinase domain (TKD) mutation"
  ukrainian: "Мутація тірозінкіназного домену FLT3 (TKD)"
  english: "FLT3-TKD (D835 / I836)"
  synonyms: ["FLT3-TKD", "FLT3 D835", "FLT3 I836"]

biomarker_type: gene_mutation
mutation_details:
  gene: "FLT3"
  gene_hugo_id: "HGNC:3765"
  exon: "20 (activation loop)"
  hotspots: ["D835Y", "D835V", "D835H", "D835E", "I836 deletion / substitution"]
  variant_type: "missense"
  functional_impact: "Constitutive FLT3 kinase activation via activation-loop conformational change"

measurement:
  method: "PCR + EcoRV restriction digest (classical) OR NGS panel"
  units: "categorical (positive/negative); VAF reported"
  sensitivity_requirement: "Rapid TAT preferred at AML diagnosis; type-II FLT3 inhibitors (quizartinib) less active against TKD vs type-I (gilteritinib, midostaurin)"

specimen_requirements:
  - "Bone marrow aspirate (preferred at diagnosis)"
  - "Peripheral blood acceptable when blast count adequate"

related_biomarkers:
  - BIO-FLT3-ITD
  - BIO-NPM1

sources:
  - SRC-NCCN-AML-2025
  - SRC-ELN-AML-2022
  - SRC-RATIFY-STONE-2017


# OncoKB integration hint (safe-rollout v3 §4 + PR-C). When a patient
# has this biomarker, the engine will issue an OncoKB lookup with these
# values. Conservative: only the canonical actionable variant; other
# variants on the same gene need their own variant-specific biomarker.
oncokb_lookup:
  gene: FLT3
  variant: D835Y
external_ids:
  hgnc_symbol: "FLT3"
  hgvs_protein: "p.D835Y"
  oncokb_url: "https://www.oncokb.org/gene/FLT3/D835Y"

last_reviewed: "2026-04-27"
notes: >
  ~7–10% of AML; can co-occur with FLT3-ITD. Type-I FLT3 inhibitors
  (midostaurin, gilteritinib, crenolanib) inhibit both ITD and TKD;
  type-II (quizartinib, sorafenib) bind only inactive conformation
  and are less effective against D835. FLT3-TKD also acts as a
  resistance mechanism to type-II inhibitors during therapy. ELN-2022
  classifies FLT3-TKD without ITD as intermediate-risk (revised down
  from adverse).
notes_ua: >
  ~7–10% of AML; can co-occur with FLT3-ITD. Type-I FLT3 інгібітори (мідостаурин, гілтеритиніб, crenolanib) inhibit both ITD and TKD; type-II (квізартиніб, сорафеніб) bind only inactive conformation and are less effective against D835. FLT3-TKD also acts as a resistance mechanism to type-II інгібітори during терапія. ELN-2022 classifies FLT3-TKD without ITD as проміжного ризику (revised down from несприятливий).
ukrainian_review_status: pending_clinical_signoff
