id: BIO-FGFR2
names:
  preferred: "FGFR2 alterations (fusion / amplification / mutation)"
  ukrainian: "Альтерації FGFR2 (фузія / амплифікація / мутація)"
  english: "FGFR2 alterations"
  synonyms: ["FGFR2 fusion", "BICC1-FGFR2", "FGFR2-AHCYL1"]

biomarker_type: gene_mutation
mutation_details:
  gene: "FGFR2"
  gene_hugo_id: "HGNC:3689"
  hotspots:
    - "BICC1-FGFR2 fusion (intrahepatic cholangiocarcinoma — most common partner)"
    - "FGFR2-AHCYL1 fusion"
    - "FGFR2-CCDC6 fusion"
    - "Amplification (gastric, breast)"
    - "Activating mutations in extracellular Ig-domains (S252W, Y375C)"
  variant_type: "fusion / amplification / missense"
  functional_impact: "Constitutive FGFR2 kinase activity (fusion); receptor stabilization (mutations)"

measurement:
  method: "RNA-NGS (preferred, captures fusion partners) OR DNA-NGS (CN + mutations + fusion-aware) OR FISH break-apart"
  units: "categorical (fusion: positive/negative); copy number ratio"
  sensitivity_requirement: "RNA-NGS preferred for fusion; ctDNA acceptable when tissue limited"

specimen_requirements:
  - "FFPE tumor tissue, minimum 20% tumor cellularity"
  - "Plasma ctDNA acceptable for fusion detection when tissue inadequate"

related_biomarkers:
  - BIO-FGFR1
  - BIO-FGFR3-MUTATION

sources:
  - SRC-NCCN-HCC-2025
  - SRC-ESMO-NSCLC-METASTATIC-2024
  - SRC-ONCOKB

last_reviewed: "2026-04-27"
notes: >
  FGFR2 fusion present in ~10–20% of intrahepatic cholangiocarcinoma —
  the canonical actionable alteration in this disease. Pemigatinib
  (FIGHT-202) and futibatinib (FOENIX-CCA2) FDA-approved for advanced
  cholangiocarcinoma harboring FGFR2 fusion or rearrangement after ≥1
  prior systemic therapy. Resistance: gatekeeper (V564F) and
  molecular-brake mutations — futibatinib (covalent) retains activity
  against some pemigatinib-resistance variants. FGFR2 amplification
  also a niche signal in gastric and breast.
