id: BIO-BRCA1-BRCA2-GERMLINE
names:
  preferred: "BRCA1/BRCA2 germline pathogenic variant"
  ukrainian: "Зародкова патогенна варіація BRCA1/BRCA2"
  english: "Germline BRCA1/BRCA2 mutation"
  synonyms: ["gBRCA1", "gBRCA2"]
biomarker_type: gene_mutation
mutation_details:
  gene: "BRCA1, BRCA2"
  variant_type: "loss-of-function (frameshift, nonsense, splice, large deletions)"
  functional_impact: "loss of homologous recombination repair"
  inheritance: "germline"
measurement:
  method: "Germline NGS panel (multi-gene HRD panel preferred over BRCA1/2 only) on blood or saliva"
  units: "categorical: pathogenic | likely_pathogenic | VUS | benign | absent"
specimen_requirements: ["Whole blood EDTA or saliva — germline DNA"]
interpretation_notes: >
  PDAC: ~6% germline BRCA1/2 prevalence; POLO trial — olaparib
  maintenance after ≥16 weeks platinum without progression. Genetic
  counseling mandatory (family-line implications).
  Also relevant: ovarian/breast/prostate; PALB2 has analogous biology.
related_biomarkers: []
sources: [SRC-NCCN-PANCREATIC-2025]

