id: BIO-MF-LCT
names:
  preferred: "Large-cell transformation in MF (LCT — >25% large cells, often CD30+)"
  ukrainian: "Велекоклітинна трансформація MF (LCT — >25% великих клітин, часто CD30+)"
  english: "Large-cell transformation"
biomarker_type: histology_morphology

measurement: {method: "Skin or LN biopsy review — proportion of large cells (>4× small lymphocyte size); CD30 IHC simultaneously", units: "categorical (LCT positive if ≥25% large cells | LCT negative)"}
specimen_requirements: ["Skin punch ≥6mm OR LN excisional biopsy + IHC panel"]

sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
notes: >
  LCT marks aggressive transformation of MF — prognosis worsens
  substantially (median OS ~2-4 years from LCT diagnosis vs decades
  for early-stage MF). Often CD30+ (~30-50%) → eligible for
  brentuximab vedotin per ALCANZA trial. Mandates systemic therapy
  reassessment regardless of TNMB stage. Distinct from primary
  cutaneous CD30+ ALCL (different entity, different prognosis).
notes_ua: >
  LCT marks агресивний трансформація of MF — прогноз погіршує substantially (медіана ЗВ ~2-4 years from LCT діагноз vs decades for ранньої стадії MF). часто CD30+ (~30-50%) → придатний для брентуксимаб ведотин per ALCANZA дослідження. Mandates systemic терапія reassessment regardless of TNMB stage. Distinct from primary cutaneous CD30+ ALCL (відмінний сутність, відмінний прогноз).
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
