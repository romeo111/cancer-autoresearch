last_reviewed: "2026-04-27"
notes: >
  ~10-20% of BRAF V600 family in melanoma (V600E ~70-80%; V600K next
  most common; V600D/R/M rare). Encorafenib + binimetinib (COLUMBUS),
  dabrafenib + trametinib (COMBI-d/COMBI-v), vemurafenib + cobimetinib
  (coBRIM) all active. Slightly worse PFS vs V600E in some sub-analyses
  but doublet remains standard. ICI (nivo+ipi, anti-PD-1) equally
  effective; sequencing decision driven by tempo, brain mets, LDH.
notes_ua: >
  ~10-20% of BRAF V600 family in меланома (V600E ~70-80%; V600K next найбільш поширений; V600D/R/M рідкісний). енкорафеніб + біниметиніб (COLUMBUS), дабрафеніб + траметиніб (COMBI-d/COMBI-v), вемурафеніб + кобіметиніб (coBRIM) all active. Slightly гірше PFS vs V600E in some sub-analyses but дублет remains стандарт. ICI (nivo+ipi, anti-PD-1) equally effective; sequencing decision driven by tempo, brain mets, LDH.
