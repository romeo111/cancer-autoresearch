id: BIO-HPV-STATUS
names:
  preferred: "Human Papillomavirus (HPV) status"
  ukrainian: "Статус ВПЛ (вірус папіломи людини)"
  english: "HPV status"
  synonyms: ["HPV genotype", "p16 IHC (surrogate for HPV in OPC)"]
biomarker_type: serum_marker  # functionally — viral nucleic acid + IHC surrogate
measurement:
  method: "p16 IHC (surrogate for HPV in OPC; >70% nuclear+cytoplasmic positivity = HPV+) AND/OR HPV in-situ hybridization OR HPV DNA PCR genotyping (HR-HPV: 16, 18, 31, 33, 45, 52, 58)"
  units: "categorical: HPV-positive (and genotype if known) | HPV-negative"
specimen_requirements: ["FFPE tumor block (cervix biopsy or OPC tonsillar/base-of-tongue)"]
interpretation_notes: >
  OPC (oropharyngeal SCC): HPV+ (p16+) = better prognosis, lower
  recurrence; de-escalation trials ongoing (RTOG 1016 — cetuximab
  inferior to cisplatin even in HPV+). HPV+ uses TNM 8th edition
  HPV+ -specific staging.
  Cervical: HPV+ near-universal (>99%); HR-HPV genotypes 16/18 cause
  ~70%. HPV-negative cervical SCC is rare and has different biology.
  Anal: HPV+ similar to cervical.
related_biomarkers: []
sources: [SRC-NCCN-CERVICAL-2025]  # NCCN Head&Neck source TBD when OPC vertical added
last_reviewed: "2026-04-26"
