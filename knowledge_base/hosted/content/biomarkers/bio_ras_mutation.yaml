id: BIO-RAS-MUTATION
names:
  preferred: "RAS mutation status (KRAS / NRAS exons 2-4)"
  ukrainian: "Статус мутацій RAS (KRAS / NRAS exons 2-4)"
  english: "RAS mutation status"
  synonyms: ["KRAS/NRAS extended", "Expanded RAS"]
biomarker_type: gene_mutation
mutation_details:
  gene: "KRAS, NRAS"
  exons: ["KRAS exons 2, 3, 4 (codons 12, 13, 59, 61, 117, 146)", "NRAS exons 2, 3, 4 (codons 12, 13, 59, 61, 117, 146)"]
  variant_type: "missense (predominantly)"
  functional_impact: "activating"
measurement:
  method: "NGS panel (preferred) or PCR-based (BEAMing, ddPCR for ctDNA)"
  units: "categorical: RAS-mutant (any) | RAS-WT (all 6 hotspots WT in both genes)"
specimen_requirements: ["FFPE tumor block, ≥10% tumor cellularity OR plasma ctDNA (limited sensitivity)"]
interpretation_notes: >
  In mCRC: ANY RAS mutation precludes anti-EGFR therapy (cetuximab,
  panitumumab) — bypasses EGFR signaling. ~50% of CRCs harbor RAS
  mutation; testing mandatory before 1L mCRC therapy planning.
  KRAS G12C (rare, ~3%) — adagrasib/sotorasib + cetuximab combinations
  emerging (KRYSTAL-10, CodeBreaK 300).
related_biomarkers: [BIO-BRAF-V600E]
sources: [SRC-NCCN-COLON-2025, SRC-ESMO-COLON-2024]

oncokb_skip_reason: multi_allele_mvp
last_reviewed: "2026-04-26"
