id: BIO-FGFR1
names:
  preferred: "FGFR1 alterations (amplification / mutation / fusion)"
  ukrainian: "Альтерації FGFR1 (амплифікація / мутація / фузія)"
  english: "FGFR1 alterations"
  synonyms: ["FGFR1 amplification", "8p11.23 amplification"]

biomarker_type: gene_mutation
mutation_details:
  gene: "FGFR1"
  gene_hugo_id: "HGNC:3688"
  hotspots:
    - "8p11.23 amplification (squamous NSCLC, breast luminal, HNSCC subset)"
    - "Fusion (rare; FGFR1-TACC1 in glioma)"
    - "Activating missense (rare)"
  variant_type: "amplification / fusion / missense"
  functional_impact: "Increased FGFR1 dosage and constitutive signaling"

measurement:
  method: "FISH (FGFR1/CEN8) OR DNA-NGS for copy number OR RNA-NGS for fusion"
  units: "FGFR1/CEN8 ratio (≥2.0 commonly used); GCN cutoff varies"
  sensitivity_requirement: "Threshold not standardized — FGFR1/CEN8 ≥2.0 or GCN ≥6 commonly used in trials"

specimen_requirements:
  - "FFPE tumor tissue, minimum 20% tumor cellularity"

related_biomarkers:
  - BIO-FGFR2
  - BIO-FGFR3-MUTATION

sources:
  - SRC-NCCN-NSCLC-2025
  - SRC-ESMO-NSCLC-METASTATIC-2024
  - SRC-ONCOKB

oncokb_skip_reason: multi_allele_mvp
external_ids:
  hgnc_symbol: FGFR1
last_reviewed: "2026-04-27"
notes: >
  ~15–20% of squamous NSCLC, ~10% of HR+ breast, subset of HNSCC and
  small-cell lung carcinoma. Predictive value of amplification alone is
  modest — earlier trials of multikinase FGFR inhibitors had limited
  responses; selective inhibitors (erdafitinib, pemigatinib, futibatinib)
  are primarily indicated for FGFR2/3 alterations. FGFR1 remains a
  prognostic / investigational target. Hyperphosphatemia is the
  on-target adverse effect of FGFR inhibition class-wide.
notes_ua: >
  ~15–20% of squamous NSCLC, ~10% of HR+ breast, subset of HNSCC and small-cell lung карцинома. предиктивний value of ампліфікація alone is modest — earlier trials of multikinase FGFR інгібітори had limited responses; селективний інгібітори (erdafitinib, pemigatinib, futibatinib) are перш за все indicated for FGFR2/3 альтерації. FGFR1 remains a прогностичний / експериментальний target. Hyperphosphatemia is the on-target несприятливий effect of FGFR inhibition class-wide.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
