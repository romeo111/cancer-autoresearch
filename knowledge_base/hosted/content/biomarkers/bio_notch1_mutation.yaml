id: BIO-NOTCH1-MUTATION
names:
  preferred: "NOTCH1 mutation (PEST domain)"
  ukrainian: "Мутація NOTCH1 (PEST domain)"
  english: "NOTCH1 mutation"
biomarker_type: gene_mutation

mutation_details:
  gene: "NOTCH1"
  variant_type: "frameshift / nonsense in PEST domain (most commonly p.P2514Rfs*4)"
  functional_impact: "stabilization of activated NOTCH1 → constitutive NF-κB + MYC signaling"

measurement: {method: "NGS panel covering PEST domain hot-spots", units: "categorical (positive | negative)"}
specimen_requirements: ["Peripheral blood for CLL; tumor for solid"]

sources: [SRC-NCCN-BCELL-2025]

oncokb_skip_reason: multi_allele_mvp
external_ids:
  hgnc_symbol: NOTCH1
last_reviewed: "2026-04-25"
notes: >
  Cross-disease relevance:

  - **CLL/SLL** (~10-15%): adverse prognostic marker — shorter OS,
    higher transformation rate to Richter (DLBCL). Often co-occurs
    with trisomy 12 + IGHV-unmutated. Modest impact on 1L choice
    in BTKi era but flag for early Richter watch.
  - **MCL** (~5-10%): adverse subset; may favor BTKi over chemoimmuno.
  - **T-ALL** (~50%): defining, drives γ-secretase inhibitor research.

  Currently informational in CLL/MCL; not direct algorithm driver.
  Future: 2L+ stratification + earlier Richter surveillance.
