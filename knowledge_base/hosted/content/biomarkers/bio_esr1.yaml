id: BIO-ESR1
names:
  preferred: "ESR1 mutation (ligand-binding domain)"
  ukrainian: "Мутація ESR1 (ліганд-зв'язуючий домен)"
  english: "ESR1 LBD mutation"
  synonyms: ["ESR1 LBD", "ER-α mutation", "ESR1 D538G", "ESR1 Y537S"]

biomarker_type: gene_mutation
mutation_details:
  gene: "ESR1"
  gene_hugo_id: "HGNC:3467"
  hotspots: ["D538G", "Y537S", "Y537N", "Y537C", "L536H", "E380Q"]
  variant_type: "missense (ligand-binding domain)"
  functional_impact: "Constitutive ER-α activation in absence of estrogen — drives aromatase-inhibitor resistance"

measurement:
  method: "Plasma ctDNA NGS (preferred — high concordance + serial monitoring) OR tumor-tissue NGS"
  units: "categorical (positive/negative); VAF reported"
  sensitivity_requirement: "ctDNA assay LoD ~0.5% VAF (Guardant360 / FoundationOne Liquid CDx); polyclonal ESR1 mutations common"

specimen_requirements:
  - "Plasma EDTA tube, processed within 4 h or stored in Streck-equivalent stabilizer"
  - "FFPE metastatic biopsy acceptable; archival primary tumor often negative (mutation acquired on AI therapy)"

related_biomarkers:
  - BIO-ESTROGEN-RECEPTOR
  - BIO-PIK3CA-MUTATION

sources:
  - SRC-NCCN-BREAST-2025
  - SRC-ESMO-BREAST-METASTATIC-2024
  - SRC-ONCOKB

oncokb_skip_reason: multi_allele_mvp
external_ids:
  hgnc_symbol: ESR1
last_reviewed: "2026-04-27"
notes: >
  Acquired in ~30–40% of HR+ HER2− metastatic breast progressing on
  aromatase inhibitor; <1% in primary tumors at diagnosis. Predictive
  for elacestrant (oral SERD; EMERALD trial — PFS benefit limited to
  ESR1-mut subgroup). Test on ctDNA at progression on AI ± CDK4/6i.
  Other oral SERDs (camizestrant, giredestrant, imlunestrant) and
  PROTACs in late development. Y537S confers more aggressive biology
  than D538G in some series. ctDNA is the preferred specimen because
  ESR1 mutations are typically subclonal in tissue and frequently
  polyclonal across metastatic sites.
notes_ua: >
  набутий in ~30–40% of HR+ HER2− метастатичний breast progressing on aromatase інгібітор; <1% in primary tumors при діагнозі. предиктивний for елацестрант (oral SERD; EMERALD дослідження — PFS виграш limited to ESR1-mut subgroup). Test on цоДНК at прогресування on AI ± CDK4/6i. Other oral SERDs (camizestrant, giredestrant, imlunestrant) and PROTACs in late development. Y537S confers more агресивний biology than D538G in some series. цоДНК is the переважний specimen because ESR1 мутації are типово subclonal in tissue and часто polyclonal across метастатичний sites.
