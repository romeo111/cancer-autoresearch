  hgvs_protein: "p.R282W"

last_reviewed: "2026-04-27"
notes: >
  R282 is the sixth most-mutated TP53 codon, often grouped with R248
  and R273 as the canonical hotspot ring. Hybrid structural/contact
  mutant: R282 stabilizes the L1/S3 loop region adjacent to the
  DNA-binding surface, and R→W partially destabilizes the fold while
  altering contact geometry. Functional studies show R282W retains
  partial transactivation activity on a subset of canonical p53 targets
  (CDKN1A/p21, BBC3/PUMA at reduced levels) — termed "partial LoF" —
  while still gaining oncogenic activities. Clinically R282W behaves
  similarly to other hotspots: in AML/MDS poor chemo response → routes
  to venetoclax-azacitidine + alloSCT consideration; in CLL/MCL/MM
  high-risk regimen routing. Distinction from full LoF mutants
  (truncating, splice-site) may matter for emerging mutant-p53
  reactivator drugs (eprenetapopt) where residual fold is required —
  R282W generally considered reactivatable in early-phase trials.
notes_ua: >
  R282 — шостий за частотою кодон мутацій TP53, часто групується з
  R248 та R273 як канонічне hotspot-кільце. Гібридний структурно-
  контактний мутант: R282 стабілізує ділянку L1/S3 петлі, прилеглу
  до ДНК-зв'язуючої поверхні, а заміна R→W частково дестабілізує
  згортку, одночасно змінюючи геометрію контакту. Функціональні
  дослідження показують, що R282W зберігає часткову трансактиваційну
  активність на підмножині канонічних цілей p53 (CDKN1A/p21, BBC3/PUMA
  у зниженому рівні) — термін "часткова LoF" — водночас набуваючи
  онкогенних активностей. Клінічно R282W поводиться подібно до
  інших hotspots: при AML/MDS погана відповідь на ХТ → шлях до
  венетоклакс-азацитидин + розгляд алоТГСК; при CLL/MCL/MM шлях до
  схем високого ризику. Розрізнення з повною LoF (truncating,
  splice-site) може мати значення для нових препаратів-реактиваторів
  мутантного p53 (епренетапопт), де потрібна залишкова згортка —
  R282W зазвичай вважається реактивованою у дослідженнях ранньої
  фази.
