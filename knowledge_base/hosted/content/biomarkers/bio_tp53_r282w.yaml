# Hybrid structural-contact mutant. R282 stabilizes the L1/S3 loop
# region adjacent to the DNA-binding surface; R→W substitution
# partially destabilizes the fold AND alters DNA-contact geometry.
# Multi-allele biomarker pattern; OncoKB lookup deferred to MVP scope
# per parent BIO-TP53-MUTATION (multi_allele_mvp).
oncokb_skip_reason: multi_allele_mvp
