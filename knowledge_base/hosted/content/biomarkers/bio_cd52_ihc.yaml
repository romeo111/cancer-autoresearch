external_ids:
  hgnc_symbol: "CD52"
notes: >
  Cross-disease relevance — alemtuzumab target:

  - **CLL**: alemtuzumab (anti-CD52) historically used for fludarabine-
    refractory CLL; almost obsolete now in BTKi/VenO era but option for
    select r/r cases.
  - **T-cell prolymphocytic leukemia (T-PLL)**: alemtuzumab is
    standard-of-care 1L (~80% response rate) — a rare T-cell entity.
  - **Sézary syndrome**: alemtuzumab option for refractory.
  - **B-cell lymphomas variably express**.

  Profound + prolonged immunosuppression on alemtuzumab — mandatory PJP
  + HSV/VZV + CMV-DNA monitoring. Future scope: T-PLL workstream when
  rare-disease module lands.
notes_ua: >
  Cross-хвороба relevance — alemtuzumab target:

  - **CLL**: alemtuzumab (anti-CD52) historically used for флударабін-
    рефрактерний CLL; almost obsolete now in BTKi/VenO era but option for
    select р/р cases.
  - **T-cell prolymphocytic лейкоз (T-PLL)**: alemtuzumab is
    стандарт-of-care 1L (~80% частота відповіді) — a рідкісний T-cell сутність.
  - **Sézary syndrome**: alemtuzumab option for рефрактерний. - **B-cell lymphomas variably express**.

  Profound + prolonged immunosuppression on alemtuzumab — обов'язковий PJP + HSV/VZV + CMV-DNA моніторинг. Future scope: T-PLL workstream when рідкісний-хвороба module lands.
