# Confers high-level resistance to dasatinib AND bosutinib via altered
# ATP-pocket conformation. Nilotinib and ponatinib are preferred
# alternatives. Triggers resistance-conflict banner if dasatinib OR
# bosutinib is recommended at the same line where V299L is present.
oncokb_lookup:
  gene: ABL1
  variant: V299L
external_ids:
  hgnc_symbol: "ABL1"
  hgvs_protein: "p.V299L"
  oncokb_url: "https://www.oncokb.org/gene/ABL1/V299L"

last_reviewed: "2026-04-27"
notes: >
  Resistance to BOTH dasatinib and bosutinib via P-loop conformational
  change. IC50 for dasatinib elevated ~15-20x; bosutinib ~25-50x.
  Nilotinib retains activity (IC50 unchanged). Ponatinib and asciminib
  both active. Per ELN-2020 / ELN-2025: detection on dasatinib or
  bosutinib failure → switch to nilotinib (preferred 2G-TKI option) or
  ponatinib. Distinguishing V299L from F317L is clinically meaningful:
  F317L spares bosutinib whereas V299L does not.
notes_ua: >
  Резистентність ОДНОЧАСНО до дазатинібу та босутинібу через
  конформаційну зміну P-loop. IC50 для дазатинібу підвищена ~15-20×;
  для босутинібу ~25-50×. Нілотиніб зберігає активність (IC50
  незмінна). Понатиніб та асциминіб активні. Згідно з ELN-2020 /
  ELN-2025: виявлення при невдачі дазатинібу або босутинібу →
  перехід на нілотиніб (переважний 2G-TKI варіант) або понатиніб.
  Розрізнення V299L від F317L клінічно значуще: F317L зберігає
  чутливість до босутинібу, тоді як V299L — ні.
ukrainian_review_status: pending_clinical_signoff
