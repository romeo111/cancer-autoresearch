id: BIO-NTRK-FUSION
names:
  preferred: "NTRK1/2/3 gene fusion"
  ukrainian: "Фузія генів NTRK1/2/3"
  english: "NTRK1/2/3 gene fusion"
  synonyms: ["TRK fusion", "NTRK rearrangement", "ETV6-NTRK3", "LMNA-NTRK1"]

biomarker_type: gene_fusion
mutation_details:
  gene: "NTRK1 / NTRK2 / NTRK3"
  gene_hugo_id: "HGNC:8031 (NTRK1) / HGNC:8032 (NTRK2) / HGNC:8033 (NTRK3)"
  hotspots:
    - "ETV6-NTRK3 (canonical secretory carcinoma fusion — salivary MASC, infantile fibrosarcoma, secretory breast)"
    - "LMNA-NTRK1 (soft-tissue / GI tumors)"
    - "TPM3-NTRK1"
    - "QKI-NTRK2 (pediatric glioma)"
    - "BCAN-NTRK1 (pediatric glioma)"
  variant_type: "chromosomal rearrangement / fusion"
  functional_impact: "Constitutive TRK kinase activity through 5'-partner-driven dimerization"

measurement:
  method: "RNA-based NGS (preferred, captures partners) OR pan-TRK IHC (screening) OR FISH break-apart (per gene) OR DNA-NGS with fusion-aware caller"
  units: "categorical (positive/negative); fusion partner + breakpoints reported"
  sensitivity_requirement: "Pan-TRK IHC ≥1+ → confirm by RNA-NGS or FISH; IHC less sensitive for NTRK3 fusions"

specimen_requirements:
  - "FFPE tumor tissue, minimum 20% tumor cellularity"
  - "Fresh-frozen acceptable for RNA quality if available"

related_biomarkers: []

sources:
  - SRC-NCCN-NSCLC-2025
  - SRC-ESMO-NSCLC-METASTATIC-2024
  - SRC-ONCOKB

last_reviewed: "2026-04-27"
notes: >
  Tumor-agnostic FDA approval for larotrectinib (NAVIGATE / SCOUT) and
  entrectinib (STARTRK-1/2 + ALKA) for NTRK-fusion-positive solid
  tumors after progression or where no satisfactory alternative exists.
  Fusion frequency: ~0.3% of common adult tumors but >90% in rare
  entities — secretory carcinoma of salivary gland (MASC), infantile
  fibrosarcoma, congenital mesoblastic nephroma, secretory breast
  carcinoma. Pan-TRK IHC is a reasonable inexpensive screen but RNA-NGS
  remains the gold standard. Resistance: solvent-front (G595R, G623R)
  and gatekeeper (F589L) mutations on progression — selitrectinib /
  repotrectinib in development.
