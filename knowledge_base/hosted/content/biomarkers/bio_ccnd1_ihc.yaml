id: BIO-CCND1-IHC
names:
  preferred: "Cyclin D1 expression by IHC (encoded by CCND1)"
  ukrainian: "Експресія Cyclin D1 (CCND1) — ІГХ"
  english: "Cyclin D1 expression"
  synonyms: ["Cyclin D1", "CCND1", "BCL1"]
biomarker_type: protein_expression_ihc

measurement: {method: "IHC on FFPE biopsy (anti-cyclin D1 antibody, SP4 clone)", units: "categorical (positive ≥10% nuclear staining | negative)"}
specimen_requirements: ["FFPE biopsy block"]

related_biomarkers: [BIO-T11-14-IGH-CCND1, BIO-CD5-IHC]

sources: [SRC-NCCN-BCELL-2025, SRC-NCCN-MM-2025]
