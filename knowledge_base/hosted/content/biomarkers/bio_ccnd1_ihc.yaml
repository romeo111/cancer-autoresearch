oncokb_skip_reason: ihc_no_variant
external_ids:
  hgnc_symbol: "CCND1"
notes: >
  Cross-disease relevance:

  - **MCL** (defining ~95%): nuclear cyclin D1 over-expression from
    t(11;14)(q13;q32) IGH/CCND1 translocation. Cyclin D1-negative MCL
    (~5%) requires SOX11 + clinical context for diagnosis.
  - **MM** (~15-20%): t(11;14) IGH/CCND1 subset — venetoclax-sensitive
    population (BELLINI trial signal); emerging targeted therapy.
  - **HCL** subset: cyclin D1-positive. Distinguishes from CLL.
  - **Plasma cell myeloma cyclin D1+ subset**: t(11;14) defines this
    subgroup — favorable cytogenetic + venetoclax-responsive.

  Drive r/r venetoclax pathway across MCL + MM t(11;14) subsets — future
  scope.
