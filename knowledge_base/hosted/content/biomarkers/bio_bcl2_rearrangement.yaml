notes: >
  Defining feature of FL (~85% — t(14;18) IGH/BCL2). Component of
  double-hit (HGBL-DH) when co-occurring with MYC rearrangement —
  worse prognosis than either alone, drives DA-EPOCH-R over R-CHOP.
  Rare standalone in DLBCL (~20-30%). Triple-hit (with BCL6 also)
  rarest + worst.
