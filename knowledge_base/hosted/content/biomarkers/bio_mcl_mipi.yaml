id: BIO-MCL-MIPI
names:
  preferred: "Mantle Cell Lymphoma International Prognostic Index (MIPI)"
  ukrainian: "MIPI — прогностичний індекс для MCL"
  english: "MIPI score"
biomarker_type: composite_score

measurement:
  method: "4 variables: age, ECOG, LDH, WBC; biological MIPI adds Ki67"
  units: "low (≤5.7) / int (5.7-6.2) / high (>6.2)"

specimen_requirements: ["Clinical + lab + Ki67 IHC for biological MIPI"]

sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
oncokb_skip_reason: score
notes: >
  Stratifies into low (5y OS ~80%), int (~50%), high (~30%). Biological
  MIPI (MIPI-b) incorporates Ki67 % — better discrimination especially
  in fit patients. Informs prognosis counsel; less directly drives 1L
  regimen choice than fitness assessment + TP53 status.
notes_ua: >
  Stratifies into low (5-річна ЗВ ~80%), int (~50%), high (~30%). Biological MIPI (MIPI-b) incorporates Ki67 % — краще discrimination особливо in fit patients. Informs прогноз counsel; less directly drives 1L схема choice than fitness assessment + TP53 status.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
