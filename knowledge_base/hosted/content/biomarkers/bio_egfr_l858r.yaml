notes: >
  ~40-45% of EGFR-mutant NSCLC. First-line osimertinib (FLAURA, AURA3
  data). Slightly inferior PFS vs Exon 19 deletion. Acquired resistance
  patterns: T790M (>50%) — addressed by osimertinib up-front;
  C797S, MET amplification, histologic transformation.
notes_ua: >
  ~40-45% of EGFR-mutant NSCLC. перша лінія осимертиніб (FLAURA, AURA3 дані). Slightly поступається PFS vs Exon 19 делеція. набута резистентність patterns: T790M (>50%) — addressed by осимертиніб up-front; C797S, MET ампліфікація, histologic трансформація.
