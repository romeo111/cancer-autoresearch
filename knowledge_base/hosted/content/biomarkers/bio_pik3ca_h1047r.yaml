last_reviewed: "2026-04-27"
notes: >
  ~40% of breast cancer carries PIK3CA mutation; H1047R and E545K are
  the two dominant hotspots (~50% and ~25% respectively). SOLAR-1 trial
  (André 2019, NEJM): alpelisib + fulvestrant doubled PFS vs fulvestrant
  alone in HR+/HER2- PIK3CA-mut MBC post-AI. INAVO120 (inavolisib) —
  next-gen PI3Kα inhibitor 1L. Capivasertib (AKT-i) also active in
  PIK3CA/AKT1/PTEN-altered (CAPItello-291). Hyperglycaemia AE common —
  baseline HbA1c required.
notes_ua: >
  ~40% of рак молочної залози carries PIK3CA мутація; H1047R and E545K are the two dominant hotspots (~50% та ~25% respectively). SOLAR-1 дослідження (André 2019, NEJM): алпелісиб + фулвестрант doubled PFS vs фулвестрант alone in HR+/HER2- PIK3CA-mut MBC post-AI. INAVO120 (inavolisib) — next-gen PI3Kα інгібітор 1L. Capivasertib (AKT-i) also active in PIK3CA/AKT1/PTEN-altered (CAPItello-291). Hyperglycaemia AE поширений — базове HbA1c обов'язковий.
