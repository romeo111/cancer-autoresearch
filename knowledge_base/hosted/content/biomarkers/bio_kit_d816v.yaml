last_reviewed: "2026-04-27"
notes: >
  Found in ~95% of advanced systemic mastocytosis (ASM, SM-AHN, MCL).
  Confers resistance to type-II KIT inhibitors (imatinib, sunitinib).
  Avapritinib (Ayvakit) — first KIT D816V-selective TKI; FDA-approved
  2021 for advanced SM and 2023 for indolent SM. Midostaurin
  (Stoffregen 2016): historic standard pre-avapritinib. Bone-marrow
  mast-cell quantification + tryptase + KIT D816V VAF together
  define disease burden. Allele-specific PCR is the gold standard
  for SM diagnosis (sensitivity to ~0.01% VAF).
notes_ua: >
  Found in ~95% of поширений systemic mastocytosis (ASM, SM-AHN, MCL). Confers резистентність до type-II KIT інгібітори (іматиніб, сунитиніб). Avapritinib (Ayvakit) — first KIT D816V-селективний TKI; схвалений FDA 2021 for поширений SM and 2023 for індолентний SM. мідостаурин (Stoffregen 2016): historic стандарт pre-avapritinib. Bone-marrow mast-cell quantification + tryptase + KIT D816V VAF together define хвороба burden. Allele-specific PCR is the gold стандарт for SM діагноз (чутливість to ~0.01% VAF).
