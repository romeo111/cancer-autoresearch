# Defining mutation in advanced systemic mastocytosis (~95%).
# Avapritinib (PIONEER, EXPLORER) — selective KIT D816V inhibitor;
# OncoKB Level 1 expected. Imatinib explicitly NOT effective —
# resistance signal expected.
