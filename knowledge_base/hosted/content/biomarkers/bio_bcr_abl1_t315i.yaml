# Classical BCR::ABL1 gatekeeper mutation. Confers pan-TKI resistance
# to all 1st/2nd-gen agents (imatinib, dasatinib, nilotinib, bosutinib).
# Ponatinib (PACE, Cortes 2013) and asciminib (ASCEMBL, Rea 2021) are
# the only commercially available agents with retained activity. Triggers
# resistance-conflict banner if any 1st/2nd-gen TKI is recommended at
# the same line where T315I is present (safe-rollout v3 §6 T3 mitigation).
