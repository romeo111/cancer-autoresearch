last_reviewed: "2026-04-27"
notes: >
  Classical gatekeeper mutation analogous to EGFR T790M and ALK L1196M.
  T315 normally forms a hydrogen bond with imatinib; the T→I substitution
  introduces a bulky isoleucine side chain that sterically blocks all
  type-II ATP-competitive TKIs (imatinib, nilotinib, dasatinib,
  bosutinib). Ponatinib (PACE, Cortes 2013) was specifically designed
  to accommodate the I315 side chain via a triple-bond linker and remains
  active. Asciminib (ASCEMBL, Rea 2021) — an allosteric STAMP inhibitor
  binding the myristoyl pocket — also retains activity at higher doses
  (200 mg BID for T315I). Per ELN-2020 and ELN-2025, T315I screening
  is mandatory at TKI failure or suboptimal response; presence dictates
  ponatinib or asciminib choice over 2G-TKI. In Ph+ B-ALL, T315I emerges
  rapidly under non-ponatinib TKI pressure — ponatinib + chemo (or +
  blinatumomab) is preferred when detected.
notes_ua: >
  Класична gatekeeper-мутація, аналог EGFR T790M та ALK L1196M. T315
  у нормі формує водневий зв'язок з іматинібом; заміна T→I вносить
  об'ємний бічний ланцюг ізолейцину, який стерично блокує всі type-II
  ATP-конкурентні TKI (іматиніб, нілотиніб, дазатиніб, босутиніб).
  Понатиніб (PACE, Cortes 2013) був спеціально розроблений для
  розміщення бічного ланцюга I315 через лінкер з потрійним зв'язком
  і зберігає активність. Асциминіб (ASCEMBL, Rea 2021) — алостеричний
  STAMP-інгібітор, що зв'язується з myristoyl-кишенею — також зберігає
  активність у вищих дозах (200 мг двічі на добу для T315I). Згідно
  з ELN-2020 та ELN-2025, скринінг T315I є обов'язковим при невдачі TKI
  або субоптимальній відповіді; наявність зумовлює вибір понатинібу або
  асцимінібу замість 2G-TKI. При Ph+ B-ALL T315I швидко виникає під
  тиском не-понатинібних TKI — понатиніб + ХТ (або + блінатумомаб)
  є переважним при виявленні.
