id: BIO-PIK3CA-MUTATION
names:
  preferred: "PIK3CA hotspot mutation"
  ukrainian: "Гарячі мутації PIK3CA"
  english: "PIK3CA hotspot mutation"
codes:
  loinc:

biomarker_type: mutation
mutation_details:
  gene: "PIK3CA"
  hotspots: ["E542K", "E545K", "H1047R", "H1047L"]
  type: "activating missense"
  functional_impact: "PI3K-alpha pathway activation"

measurement:
  method: "Tumor-tissue NGS panel OR plasma ctDNA NGS — both ASCO/CAP-acceptable"
  sensitivity_requirement: "VAF detection threshold ≥1% recommended for ctDNA"

interpretation_notes: >
  ~40% of HR+/HER2- metastatic breast cancers harbor activating PIK3CA
  mutations. SOLAR-1 trial established alpelisib + fulvestrant indication
  for PIK3CA-mutant after AI failure. Hotspots in exons 9 (helical
  domain) and 20 (kinase domain).

related_biomarkers: []

oncokb_skip_reason: multi_allele_mvp
external_ids:
  hgnc_symbol: PIK3CA
last_reviewed:
notes: >
  Companion diagnostic for alpelisib. Tissue + ctDNA both acceptable;
  ctDNA preferred when fresh tissue unavailable. UA-availability of
  alpelisib gates the clinical actionability.
notes_ua: >
  Companion діагностичний for алпелісиб. Tissue + цоДНК both прийнятний; цоДНК переважний when fresh tissue unavailable. UA-availability of алпелісиб gates the clinical actionability.
