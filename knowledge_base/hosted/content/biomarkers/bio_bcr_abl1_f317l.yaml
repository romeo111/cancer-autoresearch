# Confers partial dasatinib resistance — IC50 elevated ~5-10x. Switch
# preferred to nilotinib, bosutinib, or ponatinib per ELN. Triggers
# resistance-conflict banner if dasatinib is recommended at the same
# line where F317L is present.
