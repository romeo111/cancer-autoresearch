last_reviewed: "2026-04-27"
notes: >
  Dasatinib-resistance mutation in the ABL1 P-loop region. IC50 for
  dasatinib elevated ~5-10x, sufficient for clinical resistance at
  standard 100 mg QD dosing. Nilotinib, bosutinib, and ponatinib
  retain in-vitro activity and clinical efficacy. Per ELN-2020 / ELN-
  2025: detection on dasatinib failure → switch to nilotinib OR
  bosutinib (asciminib also active). Less common than T315I but a
  classical TKI-specific resistance pattern that informs sequential
  TKI selection rather than absolute resistance.
notes_ua: >
  Мутація резистентності до дазатинібу в ділянці P-loop ABL1.
  IC50 для дазатинібу підвищена ~5-10×, що достатньо для клінічної
  резистентності при стандартному дозуванні 100 мг 1 р/добу.
  Нілотиніб, босутиніб і понатиніб зберігають in-vitro активність
  і клінічну ефективність. Згідно з ELN-2020 / ELN-2025: виявлення
  при невдачі дазатинібу → перехід на нілотиніб АБО босутиніб
  (асциминіб також активний). Рідша за T315I, але класичний
  TKI-специфічний патерн резистентності, що визначає послідовний
  вибір TKI, а не абсолютну резистентність.
