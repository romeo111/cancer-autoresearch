id: BIO-MM-CYTOGENETICS-HR
names:
  preferred: "High-risk cytogenetics in multiple myeloma (FISH)"
  ukrainian: "Цитогенетика високого ризику при множинній мієломі (FISH)"
  english: "High-risk cytogenetics in multiple myeloma by interphase FISH"
  synonyms:
    - "MM HR FISH"
    - "Hochrisiko-Zytogenetik MM"
biomarker_type: gene_fusion

measurement:
  method: "Interphase FISH on CD138-enriched plasma cells"
  units: "categorical (positive | negative for each abnormality)"

specimen_requirements:
  - "Bone marrow aspirate, plasma-cell enriched (CD138+ selection)"
  - "Minimum 100-200 plasma cells scored per probe"

related_biomarkers:
  - BIO-TP53-MUTATION  # del(17p) / TP53 mutation is one component of this composite
knowledge_base_refs: {}
sources:
  - SRC-NCCN-MM-2025

last_reviewed: "2026-04-25"
notes: >
  Composite biomarker — "positive" if ANY of the following present per IMWG
  / R-ISS / R2-ISS conventions: t(4;14), t(14;16), t(14;20), del(17p)/TP53
  loss, gain or amplification of 1q21. t(11;14) is NOT high-risk
  (standard-risk). Drives treatment intensification — the algorithm's
  primary determinant for selecting quadruplet (D-VRd) over triplet (VRd)
  in transplant-eligible 1L MM.
