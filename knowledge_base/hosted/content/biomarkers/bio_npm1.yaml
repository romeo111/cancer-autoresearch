id: BIO-NPM1
names:
  preferred: "NPM1 mutation (cytoplasmic NPM1)"
  ukrainian: "Мутація NPM1 (цитоплазматичний NPM1)"
  english: "NPM1 mutation"
  synonyms: ["NPM1c", "NPM1 type A"]

biomarker_type: gene_mutation
mutation_details:
  gene: "NPM1"
  gene_hugo_id: "HGNC:7910"
  exon: "12"
  hotspots:
    - "Type A — c.860_863dupTCTG / p.W288fs (~75–80% of NPM1-mutant AML)"
    - "Type B — c.863_864insCATG"
    - "Type D — c.863_864insCCTG"
  variant_type: "frameshift insertion (4-bp duplication)"
  functional_impact: "Aberrant cytoplasmic NPM1 localization; dysregulated transcription / nucleolar function; HOXA upregulation"

measurement:
  method: "PCR / fragment-length assay (rapid TAT) OR NGS panel; real-time qPCR for MRD monitoring (post-induction + post-consolidation)"
  units: "categorical at diagnosis; copies / 10^4 ABL transcripts for MRD (ELN-MRD ≥2-log reduction = molecular response)"
  sensitivity_requirement: "MRD qPCR LoD ~10^-5; results inform consolidation intensification + allo-HSCT decisions"

specimen_requirements:
  - "Bone marrow aspirate (preferred at diagnosis + MRD timepoints)"
  - "Peripheral blood acceptable for MRD monitoring at later timepoints"

related_biomarkers:
  - BIO-FLT3-ITD
  - BIO-FLT3-D835

sources:
  - SRC-NCCN-AML-2025
  - SRC-ELN-AML-2022


# OncoKB integration hint (safe-rollout v3 §4 + PR-C). When a patient
# has this biomarker, the engine will issue an OncoKB lookup with these
# values. Conservative: only the canonical actionable variant; other
# variants on the same gene need their own variant-specific biomarker.
oncokb_lookup:
  gene: NPM1
  variant: W288fs

last_reviewed: "2026-04-27"
notes: >
  ~30% of adult AML; ~50% of cytogenetically normal AML. ELN-2022:
  NPM1-mut without FLT3-ITD = favorable risk; with FLT3-ITD =
  intermediate. MRD qPCR is one of the strongest prognosticators —
  ELN-MRD-2021 standardizes timepoints. Selinexor monotherapy + later
  selinexor combinations explored in NPM1-mut R/R AML (mechanism: XPO1
  inhibition restores nuclear NPM1 / p53). Menin inhibitors
  (revumenib, ziftomenib) are investigational for NPM1-mut and KMT2A-r
  AML.
