mutation_details:
  gene: "KRAS"
  exon: "2"
  variant_type: "missense"
  hgvs_protein: "p.G12V"
  functional_impact: "activating"

measurement:
  method: "Tumor-tissue NGS panel OR ctDNA NGS"
specimen_requirements: ["FFPE tumor", "Plasma ctDNA acceptable"]

related_biomarkers: [BIO-KRAS-G12C, BIO-KRAS-G12D, BIO-RAS-MUTATION]
sources: [SRC-NCCN-PANCREATIC-2025]

# Investigational — no FDA-approved selective inhibitor. Vaccine-based
# trials (e.g. ELI-002 for G12-mutant cancers) ongoing. Includes
# anti-EGFR resistance signal in CRC context.
oncokb_lookup:
  gene: KRAS
  variant: G12V
external_ids:
  hgnc_symbol: "KRAS"
  hgvs_protein: "p.G12V"
  oncokb_url: "https://www.oncokb.org/gene/KRAS/G12V"

last_reviewed: "2026-04-27"
notes: >
  ~25% of PDAC KRAS mutations, ~22% of CRC KRAS mutations. No
  FDA-approved G12V-selective therapy as of 2025. Adoptive T-cell
  therapy (TCR-T against G12V on HLA-A*11:01) — Memorial Sloan
  Kettering and others investigating. Like G12D, it confers
  resistance to anti-EGFR (cetuximab/panitumumab) in CRC.
notes_ua: >
  ~25% of PDAC KRAS мутації, ~22% of CRC KRAS мутації. ні схвалений FDA G12V-селективний терапія as of 2025. Adoptive T-cell терапія (TCR-T against G12V on HLA-A*11:01) — Memorial Sloan Kettering and others investigating. Like G12D, it confers резистентність до anti-EGFR (цетуксимаб/панітумумаб) in CRC.
ukrainian_review_status: pending_clinical_signoff
