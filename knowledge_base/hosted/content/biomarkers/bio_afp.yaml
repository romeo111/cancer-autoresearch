id: BIO-AFP
names:
  preferred: "Alpha-fetoprotein (serum)"
  ukrainian: "Альфа-фетопротеїн (сироватка)"
  english: "AFP"
  synonyms: ["α-fetoprotein"]
biomarker_type: serum_marker
measurement:
  method: "Serum immunoassay"
  units: "ng/mL (≥1000 ng/mL highly suggestive of HCC; >400 in cirrhotic + nodule confirms HCC without biopsy per AASLD)"
specimen_requirements: ["Serum (5 mL clotted blood)"]
interpretation_notes: >
  HCC: diagnostic role in cirrhotic + characteristic imaging
  (AFP >400 ng/mL — diagnostic alone per AASLD/EASL); prognostic
  (high AFP correlates with poorer OS); response monitoring (rapid
  rise during therapy = progression).
  Also elevated in: yolk-sac tumors, mixed germ cell, liver
  regeneration (post-transplant), pregnancy (physiologic).
related_biomarkers: []
sources: [SRC-NCCN-HCC-2025, SRC-AASLD-HCC-2023]

oncokb_skip_reason: tumor_marker
external_ids:
  hgnc_symbol: AFP
last_reviewed: "2026-04-26"
