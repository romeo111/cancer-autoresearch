id: BIO-IDH-MUTATION
names:
  preferred: "IDH1 / IDH2 mutation status"
  ukrainian: "Статус мутацій IDH1 / IDH2"
  english: "IDH mutation"
  synonyms: ["IDH-mutant"]
biomarker_type: gene_mutation
mutation_details:
  gene: "IDH1, IDH2"
  hotspots: ["IDH1 R132H/C/G/L/S", "IDH2 R140Q/W, R172K/G/M/W/S"]
  variant_type: "missense (gain-of-function)"
  functional_impact: "neomorphic — produces oncometabolite 2-HG, alters DNA + histone methylation"
measurement:
  method: "IHC (R132H-specific antibody for screening) + NGS/PCR for non-canonical variants"
  units: "categorical: IDH-mutant (specify variant) | IDH-WT"
specimen_requirements: ["FFPE tumor block"]
interpretation_notes: >
  Glioma WHO 2021: IDH-mutant 1p/19q-codeleted = oligodendroglioma
  (better prognosis); IDH-mutant non-codeleted = astrocytoma; IDH-WT
  with grade-IV features = glioblastoma. Vorasidenib (INDIGO trial)
  approved for IDH-mutant grade-2 glioma post-resection.
  Cholangiocarcinoma: ~15% intrahepatic IDH1-mutant — ivosidenib 2L+.
  AML: ivosidenib (IDH1) + enasidenib (IDH2) approved.
related_biomarkers: []
sources: [SRC-NCCN-CNS-2025, SRC-EANO-GBM-2024]

oncokb_skip_reason: multi_allele_mvp
last_reviewed: "2026-04-26"
