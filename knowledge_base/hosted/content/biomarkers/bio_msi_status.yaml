id: BIO-MSI-STATUS
names:
  preferred: "Microsatellite instability status"
  ukrainian: "Статус мікросателітної нестабільності"
  english: "MSI status (MSI-H / MSI-L / MSS)"
  synonyms: ["MSI", "Microsatellite instability"]
biomarker_type: msi_status

measurement:
  method: "PCR-based 5-marker panel (BAT-25, BAT-26, NR-21, NR-24, MONO-27) OR NGS-derived MSIsensor / MANTIS / mSINGS"
  units: "categorical: MSI-H (≥2 of 5 markers unstable, or NGS score ≥10) | MSI-L | MSS"
  rounding: "categorical"
specimen_requirements: ["FFPE tumor block + matched normal (PCR) OR tumor-only NGS"]
interpretation_notes: >
  MSI-H is the functional read-out of dMMR (deficient mismatch repair).
  Clinically equivalent to dMMR by IHC for treatment-decision purposes.
  MSI-H pan-cancer indicates ICI sensitivity (pembrolizumab FDA tissue-
  agnostic 2017). In CRC: MSI-H 1L mCRC → pembrolizumab (KEYNOTE-177).
  MSI-H also seen in gastric (~10%), endometrial (~30%), other GI sites
  (~5%).

related_biomarkers: [BIO-DMMR-IHC]
sources: [SRC-NCCN-COLON-2025, SRC-NCCN-GASTRIC-2025]

oncokb_skip_reason: tumor_agnostic
last_reviewed: "2026-04-26"
