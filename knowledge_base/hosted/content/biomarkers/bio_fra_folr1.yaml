id: BIO-FRA
names:
  preferred: "Folate receptor alpha (FRα / FOLR1) tumor expression"
  ukrainian: "Експресія фолатного рецептора α (FRα / FOLR1) пухлиною"
  english: "Folate receptor alpha (FRα / FOLR1) expression"
  synonyms: ["FOLR1", "FRα", "Folate receptor 1"]
biomarker_type: protein_expression_ihc
measurement:
  method: "IHC with VENTANA FOLR1 (FOLR1-2.1) RxDx Assay (companion diagnostic for mirvetuximab soravtansine); manual or auto-stain on FFPE."
  units: "categorical: high (≥75% of viable tumor cells with ≥2+ membrane staining intensity) | medium (50-74% ≥2+) | low (25-49% ≥2+) | negative (<25% ≥2+)"
specimen_requirements:
  - "FFPE tumor block — primary or metastatic; archived material acceptable but recent biopsy preferred (expression can shift with treatment)"
  - "Minimum 100 viable tumor cells assessable for scoring"
interpretation_notes: >
  Ovarian / fallopian / primary peritoneal high-grade serous carcinomas:
  ~35-40% FRα-high (≥75% TPS) at platinum-resistant relapse. Mirvetuximab
  soravtansine (MIRASOL trial, NEJM 2024 PMID 38109336) approved for
  FRα-high, platinum-resistant ovarian after 1-3 prior lines — only
  approved targeted use of FRα status as of 2026. FRα-medium / -low
  populations excluded from MIRASOL labeling but receive standard
  AURELIA-style chemo + bev. Re-biopsy at platinum-resistant progression
  is preferred to test current expression rather than relying on archival
  primary tumor.
related_biomarkers: []
sources: [SRC-NCCN-OVARIAN-2025, SRC-ESMO-OVARIAN-2024, SRC-MIRASOL-MOORE-2024]
last_reviewed: "2026-04-27"
notes: >
  Companion diagnostic: VENTANA FOLR1 (FOLR1-2.1) RxDx Assay (Roche).
  Other FRα assays (Leica, custom) not validated for mirvetuximab
  selection. CSD-4 biomarker — newly added 2026-04 for ALGO-OVARIAN-2L.
