id: BIO-CD5-IHC
names:
  preferred: "CD5 expression by IHC / flow cytometry"
  ukrainian: "Експресія CD5 (ІГХ / проточна цитометрія)"
  english: "CD5 expression"
biomarker_type: protein_expression_ihc

measurement: {method: "IHC on FFPE biopsy OR flow cytometry on PB/BM", units: "categorical (positive | negative)"}
specimen_requirements: ["FFPE biopsy OR fresh PBMC/BM aspirate"]

related_biomarkers: [BIO-CD23-IHC, BIO-CCND1-IHC]

sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
oncokb_skip_reason: ihc_no_variant
external_ids:
  hgnc_symbol: "CD5"
notes: >
  Cross-disease relevance — CD5+ B-cell lineage marker:

  - **CLL/SLL** (defining): CD5+ CD23+ classic immunophenotype
  - **MCL** (defining): CD5+ CD23− cyclin-D1+ — distinguishes from CLL
  - **DLBCL**: CD5+ DLBCL is adverse subset (~5-10%) — worse R-CHOP
    outcomes
  - **Burkitt** typically CD5−
  - **FL** typically CD5−
  - **MZL** typically CD5−
  - **PTCL** also CD5+ (T-cell marker; differential context)

  Used primarily for diagnostic differentiation rather than algorithm
  routing. CD5+ DLBCL future scope: candidate for early CAR-T pathway
  consideration.
notes_ua: >
  Cross-хвороба relevance — CD5+ B-cell lineage marker:

  - **CLL/SLL** (defining): CD5+ CD23+ classic immunophenotype - **MCL** (defining): CD5+ CD23− cyclin-D1+ — distinguishes from CLL - **DLBCL**: CD5+ DLBCL is несприятливий subset (~5-10%) — гірше R-CHOP
    outcomes
  - **Burkitt** типово CD5− - **FL** типово CD5− - **MZL** типово CD5− - **PTCL** also CD5+ (T-cell marker; differential context)

  Used перш за все for діагностичний differentiation rather than algorithm routing. CD5+ DLBCL future scope: candidate for early CAR-T pathway consideration.
