id: DIS-NK-T-NASAL
names:
  preferred: "Extranodal NK/T-Cell Lymphoma, Nasal Type"
  ukrainian: "Екстранодальна NK/T-клітинна лімфома, назального типу"
  english: "Extranodal NK/T-Cell Lymphoma, Nasal Type"
  synonyms: ["NK/T-NL", "ENKTL", "Nasal NK/T lymphoma", "Lethal midline granuloma"]

codes:
  icd_o_3_morphology: "9719/3"
  icd_10: "C86.0"
  who_classification: "Mature T-cell and NK-cell neoplasms — Extranodal NK/T-cell lymphoma, nasal type per WHO 5th ed."

archetype: etiologically_driven
oncotree_code: NKCL
lineage: nk_cell_lymphoma  # NK > T-cell у більшості

etiological_factors:
  - "EBV-driven у ~100% (EBER-ISH defining)"
  - "CD3-cytoplasmic+ / CD56+ / cytotoxic markers (TIA1, granzyme B, perforin)"
  - "Common у East Asian + Latin American populations (genetic predisposition)"
  - "P-glycoprotein expression — anthracycline resistance"

related_diseases:
  - DIS-PTCL-NOS
  - DIS-NASAL-TYPE-T-LBL  # rare related entity

epidemiology:
  context: >
    Геогафічно clustered — Asian + LATAM ~5-10% NHL; Caucasian <1%.
    Median age ~50. Класична presentation — nasal обструкція + tissue
    destruction (perforation septum, palate). Stage I/II у ~70% pts —
    локалізована форма с RT + chemo. Disseminated form (skin, GI, testis)
    rare поза Asia. Anthracycline-based regimens (CHOP) ineffective —
    P-gp resistance. Asparaginase-based (SMILE, P-GEMOX, DDGP) — standard.

sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
notes: >
  STUB. EBER-ISH on tumor — diagnostic. EBV viral load monitoring корелює
  з disease activity. Local concurrent CRT для localized stage I/II
  (DeVIC або P-GEMOX + RT 50 Gy). Disseminated → SMILE-based.
notes_ua: >
  STUB. EBER-ISH on пухлина — діагностичний. EBV viral load моніторинг корелює з хвороба activity. Local concurrent CRT для localized stage I/II (DeVIC або P-GEMOX + RT 50 Gy). Disseminated → SMILE-based.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
