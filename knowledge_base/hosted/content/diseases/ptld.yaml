id: DIS-PTLD
names:
  preferred: "Post-Transplant Lymphoproliferative Disorder"
  ukrainian: "Посттрансплантаційні лімфопроліферативні захворювання"
  english: "Post-Transplant Lymphoproliferative Disorder"
  synonyms: ["PTLD", "Post-transplant lymphoma", "Allograft-associated LPD"]

codes:
  icd_o_3_morphology: "9971/3"  # Post-transplant lymphoproliferative disorder
  icd_10: "D47.Z1"
  who_classification: "Lymphoid proliferations and lymphomas associated with immunodeficiency — Post-transplant lymphoproliferative disorders per WHO 5th ed. (4 categories: non-destructive, polymorphic, monomorphic, classical Hodgkin-like)"

archetype: stage_driven  # WHO category drives treatment intensity
oncotree_code: PTLD
lineage: b_cell_lymphoma  # most common; T-cell PTLD ~5-10% rare

etiological_factors:
  - "EBV-driven у ~70-80% (especially early-onset post-transplant)"
  - "Immunosuppression intensity (calcineurin inhibitors, anti-T-cell antibodies)"
  - "Donor vs recipient origin (donor-derived у solid organ transplant; recipient у HSCT)"
  - "EBV-naive recipient + EBV+ donor — найвищий ризик у solid organ transplant"

related_diseases:
  - DIS-DLBCL-NOS  # monomorphic PTLD often DLBCL-like morphology
  - DIS-PCNSL      # primary CNS PTLD субтип

epidemiology:
  context: >
    Cumulative incidence ~1-3% у solid organ transplant (highest у
    intestinal/lung), ~1-2% у HSCT. Bimodal timing: early (<1 рік
    post-transplant, EBV-driven, polymorphic) vs late (>1 рік,
    EBV-negative, monomorphic). 4-step treatment sequence:
    (1) reduce immunosuppression + monitor; (2) rituximab монотерапія
    для CD20+; (3) R-CHOP для monomorphic + r/r; (4) CD19 CAR-T
    (tabelecleucel — EBV-specific T-cells) у refractory.

sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
notes: >
  STUB. Multi-disciplinary — обов'язкова transplant team consultation
  перед IS reduction. EBV viral load PCR + EBER ISH for tumor —
  diagnostic. Solid organ transplant-specific: graft rejection ризик
  при IS reduction → balance.
notes_ua: >
  STUB. Multi-disciplinary — обов'язкова transplant team consultation перед IS зниження. EBV viral load PCR + EBER ISH for пухлина — діагностичний. Solid organ transplant-specific: graft rejection ризик при IS зниження → balance.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
