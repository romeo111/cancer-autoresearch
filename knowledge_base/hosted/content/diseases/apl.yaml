id: DIS-APL
names:
  preferred: "Acute Promyelocytic Leukemia (PML-RARA)"
  ukrainian: "Гострий промієлоцитарний лейкоз (PML-RARA)"
  english: "Acute Promyelocytic Leukemia"
  synonyms:
    - "APL"
    - "AML M3 (legacy FAB)"
    - "Promyelocytic leukemia"

codes:
  icd_o_3_morphology: "9866/3"  # APL with PML-RARA
  icd_o_3_topography: ["C42.1"]
  icd_10: "C92.4"
  snomed_ct:
  who_classification: "Acute promyelocytic leukemia with PML::RARA fusion (per WHO 5th ed.)"

archetype: molecularly_defined_emergency
oncotree_code: APLPMLRARA
lineage: myeloid_neoplasm

etiological_factors:
  - "PML-RARA fusion arising from t(15;17)(q24;q21) — defining genetic event in ~98%"
  - "Variant RARA fusions (rare): ZBTB16-RARA t(11;17) (ATRA-resistant), NPM1-RARA t(5;17), STAT5B-RARA"
  - "Therapy-related APL exists (post topo-II inhibitors, anthracyclines)"
  - "Sporadic — no consistent environmental risk factor"

related_diseases:
  - "DIS-AML"            # other AML subtypes (separated because therapy is opposite)

epidemiology:
  context: >
    ~10-15% of adult AML. Median age younger than other AML (~40).
    Historical mortality ~80% from bleeding (DIC) within first 7 days;
    modern era with ATRA + ATO achieves 5-y OS >90% in low-risk and
    >85% overall. The dominant clinical principle: APL is a medical
    emergency — initiate ATRA on clinical suspicion BEFORE cytogenetic
    confirmation. Risk stratification (Sanz score) by initial WBC + plt:
    low risk WBC ≤10 + plt >40 / intermediate WBC ≤10 + plt ≤40 /
    high risk WBC >10.

sources:
  - SRC-NCCN-AML-2025
  - SRC-ELN-APL-2019
  - SRC-APL0406-LOCOCO-2013

last_reviewed: "2026-04-25"
reviewers: []
notes: >
  Separated from DIS-AML because clinical logic is fundamentally different:
  (a) emergency ATRA initiation on suspicion (within hours of presentation),
  (b) DIC management is the dominant early task, (c) chemotherapy-free
  ATRA + ATO cures low-risk patients (APL0406 / LO-CoCo), (d) high-risk
  uses ATRA + ATO + idarubicin (or classic AIDA). NCCN and ELN both treat
  APL as a separate chapter — we mirror that. CHARTER §15.2 C2 — emergency
  initiation is partially time-critical (outside non-device CDS carve-out
  for the first dose); our scope is workup + plan AFTER initial stabilization.
  STUB — requires clinical co-lead signoff before publication. Myeloid
  expansion (heme).
notes_ua: >
  Separated from DIS-AML because clinical logic is fundamentally відмінний: (a) emergency ATRA initiation on suspicion (within hours of presentation), (b) DIC management is the dominant early task, (c) хіміотерапія-free ATRA + ATO cures низького ризику patients (APL0406 / LO-CoCo), (d) високого ризику uses ATRA + ATO + idarubicin (or classic AIDA). NCCN and ELN both treat APL as a separate chapter — we mirror that. CHARTER §15.2 C2 — emergency initiation is partially time-critical (outside non-device CDS carve-out for the first доза); our scope is обстеження + plan AFTER initial stabilization. STUB — requires clinical co-lead signoff before publication. Myeloid expansion (heme).
