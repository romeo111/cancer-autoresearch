id: DIS-MF-SEZARY
names:
  preferred: "Mycosis Fungoides / Sézary Syndrome"
  ukrainian: "Грибоподібний мікоз / Синдром Сезарі"
  english: "Mycosis Fungoides / Sézary Syndrome"
  synonyms: ["MF", "MF/SS", "Sézary"]
codes: {icd_o_3_morphology: "9700/3", icd_10: "C84.0", who_classification: "Mature T-cell neoplasms — Mycosis fungoides / Sézary syndrome per WHO 5th ed."}
archetype: stage_driven  # treatment fundamentally based on TNMB stage
lineage: t_cell_lymphoma  # cutaneous-predominant
etiological_factors: ["CD4+ skin-homing T-cells (CCR4+, CCR10+)", "Sézary = leukemic phase variant — circulating malignant cells"]
related_diseases: [DIS-PTCL-NOS]
epidemiology: {context: "Most common cutaneous lymphoma (~50%). Indolent early-stage (IA-IIA) — median survival decades; advanced (IIB+) substantially worse (~5 years)."}
sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
notes: >
  TNMB staging unique to MF (skin Tumor + Node + Metastasis + Blood
  involvement). Treatment fundamentally stage-based: skin-directed
  (topical steroids, NBUVB, PUVA, TSEBT) for early; systemic
  (mogamulizumab, brentuximab if CD30+, ECP, methotrexate, romidepsin,
  alemtuzumab) for advanced. Sézary syndrome variant always advanced.
  Out of Tier 1 detailed treatment scope for now — placeholder disease
  entity with skin-directed-then-systemic algorithm planned for next
  iteration.
