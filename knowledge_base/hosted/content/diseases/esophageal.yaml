metadata:
  proposal_status: partial
  awaiting_proposal: "KNOWLEDGE_SCHEMA_SPECIFICATION.md §17 — CROSS protocol (neoadjuvant CRT 41.4 Gy + carbo-pacli) + esophagectomy + adjuvant nivolumab phasing not modellable; FLOT periop adeno same gap"

notes: >
  Scaffolded for Phase GI-1: 1 RF (high-grade dysphagia / aspiration —
  most common acute presentation), 1 indication (CROSS-style scaffold
  noting RT not modellable), 1 algorithm. Full histology-stratified
  algorithm (squamous: definitive CRT for unresectable, CROSS for
  resectable; adeno: FLOT preferred for resectable, CROSS alternative)
  + adjuvant nivolumab post-CROSS without pCR + metastatic biomarker-
  stratified ICI/chemo combos await ratification + clinical authoring.

  Histology branching is critical — squamous and adeno have largely
  parallel but partially divergent paradigms. Per-prompt allowance:
  one disease YAML covers both, with histology field on Indication
  applicability.
notes_ua: >
  Scaffolded for Phase GI-1: 1 RF (високого ступеня dysphagia / aspiration — найбільш поширений acute presentation), 1 показання (CROSS-style scaffold noting RT not modellable), 1 algorithm. Full гістологія-stratified algorithm (squamous: definitive CRT for нерезектабельний, CROSS for резектабельний; adeno: FLOT переважний for резектабельний, CROSS alternative) + ад'ювантний ніволумаб post-CROSS without pCR + метастатичний біомаркер- stratified ICI/chemo combos await ratification + clinical authoring.

  гістологія branching is critical — squamous and adeno have largely parallel but partially divergent paradigms. Per-prompt allowance: one хвороба YAML covers both, with гістологія field on показання applicability.
