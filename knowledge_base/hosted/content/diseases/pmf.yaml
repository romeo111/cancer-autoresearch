id: DIS-PMF
names:
  preferred: "Primary Myelofibrosis (DIPSS-Plus stratified)"
  ukrainian: "Первинний мієлофіброз"
  english: "Primary Myelofibrosis"
  synonyms:
    - "PMF"
    - "Primary myelofibrosis"
    - "Idiopathic myelofibrosis"
    - "Myelofibrosis with myeloid metaplasia"
    - "Хвороба Вакеза-Османд"

codes:
  icd_o_3_morphology: "9961/3"
  icd_o_3_topography: ["C42.1"]
  icd_10: "D47.4"
  snomed_ct:
  who_classification: "Primary myelofibrosis (PMF) — Ph-negative myeloproliferative neoplasm; prefibrotic/early stage and overt fibrotic stage (per WHO 5th ed.)"

archetype: risk_stratified
oncotree_code: PMF
lineage: myeloid_neoplasm

etiological_factors:
  - "JAK2 V617F mutation in ~60% — most common driver"
  - "CALR exon 9 mutations in ~25% (type 1 / 52bp deletion has best prognosis; type 2 / 5bp insertion intermediate)"
  - "MPL W515 mutations in ~5-10%"
  - "Triple-negative PMF in ~10% — adverse prognosis; often higher-risk additional somatic mutations (ASXL1, EZH2, IDH1/2, SRSF2, U2AF1 — \"high-molecular-risk\")"
  - "Post-PV / post-ET MF: shares biology with PMF but distinct clinical course (MYSEC-PM scoring)"

related_diseases:
  - "DIS-PV"     # post-PV MF in ~10-15% over decades
  - "DIS-ET"     # post-ET MF in ~5-10%
  - "DIS-AML"    # transformation in ~10-20% (DIPSS-stage-dependent)
  - "DIS-MDS-HR" # MDS-MPN overlap differential

epidemiology:
  context: >
    Median age ~67. Annual incidence ~0.5-1 per 100,000 (rare). Clinical
    course dominated by progressive splenomegaly, constitutional symptoms,
    cytopenias (esp. anemia), and ~10-20% AML transformation. Risk
    stratification: DIPSS (Dynamic IPSS, 2010) → DIPSS-Plus (2011, adds
    karyotype + plt + transfusion need) is the most widely used. Newer
    molecular scores: MIPSS70, MIPSS70-plus v2.0 (adds ASXL1/EZH2/IDH/SRSF2/
    U2AF1 + cytogenetic risk). MYSEC-PM for post-PV/ET MF.

sources:
  - SRC-NCCN-MPN-2025
  - SRC-ESMO-MPN-2015
  - SRC-DIPSS-PLUS-GANGAT-2011
  - SRC-COMFORT-I-VERSTOVSEK-2012

last_reviewed: "2026-04-25"
reviewers: []
notes: >
  Risk-stratified archetype using DIPSS-Plus. Clinical decision flow:
  (1) Transplant-eligibility assessment for intermediate-2 / high-risk;
  (2) symptomatic splenomegaly / constitutional symptoms → ruxolitinib
  (COMFORT-I/II) — momelotinib if anemia is dominant problem (MOMENTUM);
  fedratinib 2L (FREEDOM-2); pacritinib for severe thrombocytopenia
  (PERSIST). Anemia management as dedicated track (transfusion, ESA in
  selected, danazol). NEVER abrupt-discontinue ruxolitinib (cytokine
  rebound). STUB — requires clinical co-lead signoff before publication.
  Myeloid expansion (heme).
notes_ua: >
  Risk-stratified archetype using DIPSS-Plus. Clinical decision flow: (1) Transplant-eligibility assessment for intermediate-2 / високого ризику; (2) symptomatic splenomegaly / constitutional symptoms → руксолитиніб (COMFORT-I/II) — момелотиніб if анемія is dominant problem (MOMENTUM); федратиніб 2L (FREEDOM-2); пакритиніб for severe тромбоцитопенія (PERSIST). анемія management as dedicated track (transfusion, ESA in selected, danazol). NEVER abrupt-припинити руксолитиніб (cytokine rebound). STUB — requires clinical co-lead signoff before publication. Myeloid expansion (heme).
