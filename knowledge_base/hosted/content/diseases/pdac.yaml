notes: >
  Scaffolded for Phase GI-1: 1 RF (biliary obstruction / cholangitis —
  most common acute decompensation), 1 indication (1L metastatic
  FOLFIRINOX as the most-applicable scaffolded option), 1 algorithm.
  Resectable / borderline / locally advanced strata + adjuvant
  mFOLFIRINOX + olaparib BRCA-maintenance await proposal ratification +
  clinical authoring.

  Key biomarkers: germline BRCA1/2 + PALB2 (POLO trial — olaparib
  maintenance), MSI/dMMR (~1% rare but pembro-eligible), KRAS G12C
  (rare ~1-2% in PDAC, sotorasib emerging).
notes_ua: >
  Scaffolded for Phase GI-1: 1 RF (biliary obstruction / cholangitis — найбільш поширений acute decompensation), 1 показання (1L метастатичний FOLFIRINOX as the найбільш-applicable scaffolded option), 1 algorithm. резектабельний / borderline / місцево-поширений strata + ад'ювантний mFOLFIRINOX + олапариб BRCA-підтримка await proposal ratification + clinical authoring.

  Key біомаркери: герміногенний BRCA1/2 + PALB2 (POLO дослідження — олапариб підтримка), MSI/dMMR (~1% рідкісний but pembro-eligible), KRAS G12C (рідкісний ~1-2% in PDAC, соторасиб новий).
