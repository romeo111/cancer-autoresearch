id: DIS-CHL
names:
  preferred: "Classical Hodgkin Lymphoma"
  ukrainian: "Класична лімфома Ходжкіна"
  english: "Classical Hodgkin Lymphoma"
  synonyms: ["cHL", "Hodgkin disease (NS / MC / LR / LD subtypes)"]

codes:
  icd_o_3_morphology: "9650/3"  # Hodgkin lymphoma NOS
  icd_10: "C81.9"
  who_classification: "Hodgkin lymphomas — Classical Hodgkin lymphoma per WHO 5th ed. (4 morphologic subtypes — nodular sclerosis, mixed cellularity, lymphocyte-rich, lymphocyte-depleted)"

archetype: stage_driven
oncotree_code: CHL
lineage: hodgkin_lymphoma
etiological_factors:
  - "Reed-Sternberg cells (CD15+ CD30+ CD20- by IHC)"
  - "EBV-associated in subset (~30-40%)"
  - "Most common subtype: nodular sclerosis (~70%)"
related_diseases: [DIS-NLPBL]
epidemiology: {context: "~95% of Hodgkin lymphoma. Bimodal age distribution (~25 + ~65). Highly curable: ~80% 5y OS overall; >90% early-stage."}
sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
notes: >
  Stage-driven 1L: early (I-II) → ABVD × 2-4 + ISRT (response-adapted
  per interim PET-CT Deauville score); advanced (III-IV) → ABVD × 6
  OR A+AVD × 6 (ECHELON-1 — brentuximab replaces bleomycin, OS benefit).
  escBEACOPP for high-risk advanced (more European preference).
notes_ua: >
  Stage-driven 1L: early (I-II) → ABVD × 2-4 + ISRT (відповідь-adapted per interim PET-CT Deauville score); поширений (III-IV) → ABVD × 6 OR A+AVD × 6 (ECHELON-1 — brentuximab replaces bleomycin, OS виграш). escBEACOPP for високого ризику поширений (more European preference).
ukrainian_review_status: pending_clinical_signoff
