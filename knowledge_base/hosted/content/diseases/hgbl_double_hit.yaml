id: DIS-HGBL-DH
names:
  preferred: "High-Grade B-Cell Lymphoma with MYC and BCL2 and/or BCL6 rearrangements (double-hit / triple-hit)"
  ukrainian: "Високозлоякісна B-клітинна лімфома з MYC + BCL2/BCL6 (double-hit / triple-hit)"
  english: "High-Grade B-Cell Lymphoma, Double-Hit / Triple-Hit"
  synonyms: ["HGBL-DH", "HGBL", "Double-hit lymphoma", "DH/THL"]

codes:
  icd_o_3_morphology: "9680/3"  # shared morphology family with DLBCL; FISH distinguishes
  icd_10: "C83.3"
  who_classification: "Aggressive B-cell lymphomas — High-grade B-cell lymphoma with MYC and BCL2 and/or BCL6 rearrangements per WHO 5th ed."

archetype: biomarker_driven
oncotree_code: HGBCL
lineage: b_cell_lymphoma

etiological_factors:
  - "MYC rearrangement (8q24) PLUS BCL2 (18q21) and/or BCL6 (3q27) rearrangements"
  - "GCB cell-of-origin in majority"
  - "Often higher proliferation than DLBCL but lower than Burkitt"

related_diseases:
  - DIS-DLBCL-NOS
  - DIS-BURKITT
  - DIS-FL  # transformation from FL accumulating MYC

epidemiology:
  context: >
    ~5-10% of GCB DLBCL by FISH. Aggressive course. Historically poor
    R-CHOP outcomes (5-year OS ~30%); DA-EPOCH-R substantially better
    (~50-65%) — preferred 1L. CAR-T pathway important for R/R cases.

sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
notes: >
  Mandatory FISH break-apart for MYC + BCL2 + BCL6 on every newly-
  diagnosed DLBCL — without it, double-hit is missed. Distinct from
  Burkitt (Ki67 ~100%, BCL2−) by Ki67 typically 70-90% + BCL2+.
notes_ua: >
  обов'язковий FISH break-apart for MYC + BCL2 + BCL6 on every newly- diagnosed DLBCL — without it, double-hit is missed. Distinct from Burkitt (Ki67 ~100%, BCL2−) by Ki67 типово 70-90% + BCL2+.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
