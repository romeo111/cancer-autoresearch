id: DIS-PMBCL
names:
  preferred: "Primary Mediastinal (Thymic) Large B-Cell Lymphoma"
  ukrainian: "Первинна медіастинальна (тимічна) B-великоклітинна лімфома"
  english: "Primary Mediastinal Large B-Cell Lymphoma"
  synonyms: ["PMBCL", "PMLBCL", "Mediastinal LBCL"]

codes:
  icd_o_3_morphology: "9679/3"
  icd_10: "C85.2"
  who_classification: "Aggressive B-cell lymphomas — Primary mediastinal (thymic) large B-cell lymphoma per WHO 5th ed."

archetype: risk_stratified
oncotree_code: PMBL
lineage: b_cell_lymphoma

etiological_factors:
  - "Putative thymic medullary B-cell origin (asteroid B-cells)"
  - "Recurrent gains/amplifications of 9p24.1 (PD-L1, PD-L2, JAK2) — ~70%"
  - "REL amplification (2p), MAL+, CIITA rearrangements"
  - "TP53 mutations less common than in DLBCL"

related_diseases:
  - DIS-DLBCL-NOS
  - DIS-CHL  # mediastinal grey zone lymphoma overlap

epidemiology:
  context: >
    ~2-4% of NHL. Peak age 30-40, female predominance ~2:1. Bulky
    mediastinal mass — typical presentation з SVC syndrome або
    pericardial/pleural effusions. Distinct biology від DLBCL NOS:
    overlap з cHL (cytokine signaling, 9p24.1). Cure rate з DA-EPOCH-R
    ~85-95% — найкращий результат серед aggressive lymphomas.

sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
notes: >
  STUB — pending Clinical Co-Lead approval per CHARTER §6.1. CT chest
  з biopsy of mediastinal mass — initial workup. Avoid steroids перед
  biopsy if possible. CNS prophylaxis not routine.
notes_ua: >
  STUB — pending Clinical Co-Lead схвалення per CHARTER §6.1. CT chest з біопсія of mediastinal mass — initial обстеження. Avoid steroids перед біопсія if possible. CNS prophylaxis not routine.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
