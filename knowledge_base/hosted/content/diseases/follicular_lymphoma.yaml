id: DIS-FL
names:
  preferred: "Follicular Lymphoma"
  ukrainian: "Фолікулярна лімфома"
  english: "Follicular Lymphoma"
  synonyms:
    - "FL"
    - "Follicular lymphoma grade 1-2"
    - "Follicular lymphoma grade 3A"

codes:
  icd_o_3_morphology: "9690/3"  # FL NOS / grade 1-2 / 3A
  icd_o_3_topography: []
  icd_10: "C82.0"  # Follicular lymphoma grade I (also C82.1 for II, C82.2 for IIIa)
  snomed_ct:
  who_classification: "Mature B-cell neoplasms — Follicular lymphoma per WHO 5th ed."

archetype: risk_stratified
oncotree_code: FL
lineage: b_cell_lymphoma

etiological_factors:
  - "t(14;18)(q32;q21) IGH/BCL2 translocation in ~85% — constitutive BCL2 over-expression blocks apoptosis"
  - "Secondary genetic events: EZH2 (Y641) mutations (~25%, may predict tazemetostat response), 1p36 deletion, KMT2D / CREBBP / EP300 (epigenetic)"
  - "Median age ~65; slight female predominance"

related_diseases:
  - "DIS-DLBCL-NOS"  # transformation target
  - "DIS-MZL-NODAL"  # differential dx
  - "DIS-MCL"        # differential dx (CD5+, cyclin D1+ different)

epidemiology:
  context: >
    Second most common NHL globally (~20% of all NHL, ~3-4 cases per
    100,000/year). Indolent: median survival 15-20 years for low-tumor-
    burden cases; many never need treatment. Transformation to DLBCL
    occurs ~3% per year (cumulative risk ~30% at 10 years), with
    substantially worse prognosis. FL grade 3B is biologically aggressive
    and treated like DLBCL.

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-EHA-WORKUP-2024

last_reviewed: "2026-04-25"
reviewers: []
notes: >
  Risk-stratified by FLIPI / FLIPI2 (informational); 1L decision driven
  more by GELF criteria (high vs low tumor burden) than FLIPI score.
  FL grade 3B treated as DLBCL — separate Indication (IND-DLBCL-1L-RCHOP).
  Transformation to DLBCL (Richter-like, but FL→DLBCL) re-enters DLBCL
  pathway with worse prognosis baseline.
notes_ua: >
  Risk-stratified by FLIPI / FLIPI2 (informational); 1L decision driven more by GELF criteria (high vs low пухлинне навантаження) than FLIPI score. FL grade 3B treated as DLBCL — separate показання (IND-DLBCL-1L-RCHOP). трансформація to DLBCL (Richter-like, but FL→DLBCL) re-enters DLBCL pathway with гірше прогноз базове.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
