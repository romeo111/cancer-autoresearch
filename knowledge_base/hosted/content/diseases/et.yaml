id: DIS-ET
names:
  preferred: "Essential Thrombocythemia"
  ukrainian: "Есенціальна тромбоцитемія"
  english: "Essential Thrombocythemia"
  synonyms:
    - "ET"
    - "Essential thrombocythaemia"
    - "Primary thrombocythemia"

codes:
  icd_o_3_morphology: "9962/3"
  icd_o_3_topography: ["C42.1"]
  icd_10: "D47.3"
  snomed_ct:
  who_classification: "Essential thrombocythaemia (ET) — Ph-negative myeloproliferative neoplasm (per WHO 5th ed.)"

archetype: risk_stratified
oncotree_code: ET
lineage: myeloid_neoplasm

etiological_factors:
  - "JAK2 V617F mutation in ~50-60% — most common driver"
  - "CALR exon 9 mutations in ~25-30% (type 1 / 52bp deletion is most frequent; lower thrombosis risk vs JAK2)"
  - "MPL W515 mutations in ~3-5%"
  - "Triple-negative ET in ~10-15% — diagnosis of exclusion after exclusion of reactive thrombocytosis + other MPN"
  - "Distinguish from prefibrotic / early PMF (PreT-PMF) — same drivers but worse prognosis; trephine biopsy critical"

related_diseases:
  - "DIS-PV"     # related Ph-negative MPN
  - "DIS-PMF"    # post-ET MF transformation in ~5-10% over 15 years
  - "DIS-AML"    # late transformation in ~1-5%

epidemiology:
  context: >
    Median age ~60 (bimodal — second peak in young women). Annual
    incidence ~1-2 per 100,000. Female predominance. Clinical course
    dominated by thrombosis + bleeding (paradoxical at very high plt
    >1500K via acquired vWD). IPSET-thrombosis risk score: age >60,
    prior thrombosis, JAK2 mutation, CV risk factors. AML transformation
    rare but cumulative; post-ET MF in ~5-10% over 15 years.

sources:
  - SRC-NCCN-MPN-2025
  - SRC-ESMO-MPN-2015

last_reviewed: "2026-04-25"
reviewers: []
notes: >
  Authored as separate disease from PV (see DIS-PV.notes for rationale).
  Treatment: low-risk ET → ASA only (avoid in extreme thrombocytosis with
  acquired vWD); high-risk → HU 1L; anagrelide 2L (PT-1 trial — non-inferior
  on thrombosis but more arterial events + bleeding + MF progression).
  PreT-PMF ("prefibrotic primary myelofibrosis") is increasingly distinguished
  from ET on trephine — has worse prognosis and behaves more like PMF;
  current scope: standard ET only. STUB — requires clinical co-lead signoff
  before publication. Myeloid expansion (heme).
notes_ua: >
  Authored as separate хвороба from PV (see DIS-PV.notes for rationale). лікування: низького ризику ET → ASA only (avoid in extreme thrombocytosis with набутий vWD); високого ризику → HU 1L; анагрелід 2L (PT-1 дослідження — не гірше on thrombosis but more arterial events + bleeding + MF прогресування). PreT-PMF ("prefibrotic primary myelofibrosis") is increasingly distinguished from ET on trephine — has гірше прогноз and behaves more like PMF; current scope: стандарт ET only. STUB — requires clinical co-lead signoff before publication. Myeloid expansion (heme).
ukrainian_review_status: pending_clinical_signoff
