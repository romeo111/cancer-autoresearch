id: DIS-CHONDROSARCOMA
names:
  preferred: "Chondrosarcoma"
  ukrainian: "Хондросаркома"
  english: "Chondrosarcoma"
  synonyms: ["Cartilaginous sarcoma"]

codes:
  icd_o_3_morphology: "9220/3"  # Chondrosarcoma NOS
  icd_o_3_topography: ["C40", "C41"]  # bones / joints
  icd_10: "C40, C41"
  who_classification: "WHO Soft Tissue and Bone Tumours 5th ed (2020): Chondrosarcoma — conventional, dedifferentiated, mesenchymal, clear cell subtypes"

archetype: stage_driven
lineage: "sarcoma"

etiological_factors:
  - "Sporadic (most)"
  - "Ollier disease / Maffucci syndrome (multiple enchondromas — IDH1/2 mosaic somatic mutations; ~25% lifetime malignant transformation risk)"
  - "Hereditary multiple exostoses (EXT1/2 — peripheral chondrosarcoma risk in osteochondromas)"

related_diseases: []

key_biomarkers:
  - BIO-IDH-MUTATION  # IDH1 R132 / IDH2 R140-R172 in ~50% of conventional chondrosarcoma; ivosidenib in trials
  - BIO-CDKN2A  # ~50% in dedifferentiated subtype — prognostic

epidemiology:
  global_incidence: "~25% of primary bone sarcomas; ~1 per 200K"
  age_distribution: "Conventional: 30-70 years; mesenchymal: younger (<30); dedifferentiated: ≥50"
  five_year_survival: "Grade I (atypical cartilaginous tumor) ~90%; conventional grade II 70%; grade III / dedifferentiated 30%"

sources:
  - SRC-ONCOKB
  - SRC-NCCN-NSCLC-2025  # SRC-NCCN-SARCOMA / Bone-Sarcoma not yet ingested — placeholder; flag for replacement

last_reviewed: "2026-04-27"
reviewers: []

metadata:
  proposal_status: partial
  awaiting_proposal: "Bone-sarcoma surgery (en bloc resection ± reconstruction) + adjuvant RT for unresectable / close-margin (chondrosarcoma is poorly chemo-sensitive). Source gap: SRC-NCCN-BONE-SARCOMA / SRC-ESMO-BONE-SARCOMA not yet ingested."

notes: >
  Cartilaginous primary bone neoplasm — historically considered
  chemotherapy-resistant and radiotherapy-resistant. Surgery is the
  principal treatment.

  Subtypes:
  - Conventional (~85%): IDH1/2 mutant ~50%; surgery + risk-adapted
    follow-up; metastatic disease has limited systemic options.
  - Dedifferentiated (~10%): biphasic — chondrosarcoma + high-grade
    sarcoma component; behaves like high-grade sarcoma; doxorubicin-
    based chemotherapy + surgery.
  - Mesenchymal (~3-5%): small-round-blue-cell biology; HEY1-NCOA2
    fusion; pediatric / young adult; chemo-sensitive (Ewing-like
    protocols).
  - Clear cell (~2%): low-grade; surgery.

  Targeted therapy:
  - IDH1 R132 mutant (~40-50% of conventional): ivosidenib has activity
    in advanced unresectable IDH1-mutant chondrosarcoma (Tap et al
    JCO 2020) — small phase 1 cohort, durable disease control;
    not yet FDA-approved for chondrosarcoma but used off-label.
  - IDH2 mutant: enasidenib in similar exploratory setting.

  Niche actionability — represents a small but real precision-oncology
  signal in a disease historically without systemic options.
