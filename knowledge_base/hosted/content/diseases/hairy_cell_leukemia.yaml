id: DIS-HCL
names:
  preferred: "Hairy Cell Leukemia"
  ukrainian: "Волосатоклітинний лейкоз"
  english: "Hairy Cell Leukemia"
  synonyms: ["HCL"]

codes:
  icd_o_3_morphology: "9940/3"
  icd_10: "C91.4"
  who_classification: "Mature B-cell leukemias — Hairy cell leukemia per WHO 5th ed."

archetype: biomarker_driven  # BRAF V600E defining
oncotree_code: HCL
lineage: b_cell_leukemia

etiological_factors:
  - "BRAF V600E somatic mutation in ~100% — defining feature"
  - "Pancytopenia + splenomegaly + 'hairy' lymphocytes on PB smear/marrow"
  - "Annexin A1 IHC + + CD11c+ + CD25+ + CD103+ flow markers"

related_diseases: []

epidemiology:
  context: >
    Rare (~2% of leukemias). Median age ~55, male predominance ~4:1.
    Indolent but cytopenia-driven morbidity. Single course of
    cladribine produces durable CR in >85% — among most curable
    hematologic malignancies.

sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
notes: >
  Watchful waiting for asymptomatic; treatment indication: significant
  cytopenia (Hb <11, plt <100K, ANC <1K), symptomatic splenomegaly,
  recurrent infections. BRAF V600E targeted therapy (vemurafenib)
  emerging for relapsed/refractory.
notes_ua: >
  спостережна тактика for asymptomatic; лікування показання: significant цитопенія (Hb <11, plt <100K, ANC <1K), symptomatic splenomegaly, рецидивний infections. BRAF V600E таргетна терапія (вемурафеніб) новий for рецидивний/рефрактерний.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
