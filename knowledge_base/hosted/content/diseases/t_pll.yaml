id: DIS-T-PLL
names:
  preferred: "T-Cell Prolymphocytic Leukemia"
  ukrainian: "T-клітинна пролімфоцитарна лейкемія"
  english: "T-Cell Prolymphocytic Leukemia"
  synonyms: ["T-PLL", "T-cell PLL"]

codes:
  icd_o_3_morphology: "9834/3"
  icd_10: "C91.6"
  who_classification: "Mature T-cell and NK-cell neoplasms — T-cell prolymphocytic leukaemia per WHO 5th ed."

archetype: biomarker_driven
oncotree_code: TPLL
lineage: t_cell_leukemia

etiological_factors:
  - "TCL1A activation (inv(14)(q11q32) or t(14;14)) — defining у ~80%"
  - "ATM gene mutations / 11q deletion — co-driver"
  - "JAK1 / JAK3 / STAT5B activating mutations"
  - "Often CD4+ CD8+ double-positive (~25%) — diagnostic clue"

related_diseases:
  - DIS-CLL  # historical confusion з CLL pre-flow cytometry era
  - DIS-PTCL-NOS

epidemiology:
  context: >
    Дуже rare — ~2% mature lymphoid leukemias. Median age ~65, M:F slight
    male predominance. Aggressive presentation — extreme lymphocytosis
    (often >100K), hepatosplenomegaly, generalized lymphadenopathy, skin
    infiltration ~25%. Median OS chemo-only ~7 months; з alemtuzumab
    response rate ~90% але median PFS ~12 months. Allo-SCT consolidation
    у CR1 — єдиний curative option (~30-40% long-term OS).

sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
notes: >
  STUB. Alemtuzumab IV — disease-defining therapy (anti-CD52 universally
  expressed). SC route менш ефективна. ATM mutation testing — important
  для prognosis. Allo-SCT planning одразу після diagnosis для fit pts.
notes_ua: >
  STUB. Alemtuzumab IV — хвороба-defining терапія (anti-CD52 universally expressed). SC route менш ефективна. ATM мутація testing — important для прогноз. Allo-SCT planning одразу після діагноз для fit pts.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
