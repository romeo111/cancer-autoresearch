id: DIS-BURKITT
names:
  preferred: "Burkitt Lymphoma"
  ukrainian: "Лімфома Беркітта"
  english: "Burkitt Lymphoma"
  synonyms: ["BL"]

codes:
  icd_o_3_morphology: "9687/3"
  icd_10: "C83.7"
  who_classification: "Aggressive B-cell lymphomas — Burkitt lymphoma per WHO 5th ed."

archetype: biomarker_driven  # MYC translocation defining
oncotree_code: BL
lineage: b_cell_lymphoma

etiological_factors:
  - "MYC rearrangement (8q24): t(8;14)(q24;q32) IGH/MYC ~80%; t(2;8) IGκ/MYC; t(8;22) IGλ/MYC"
  - "Subtypes: endemic (EBV-associated, equatorial Africa, jaw/face); sporadic (non-EBV, abdominal); immunodeficiency-associated (HIV+)"
  - "Highest known proliferation rate of any human malignancy — Ki67 ~100%"

related_diseases:
  - DIS-DLBCL-NOS  # differential — distinguish on MYC FISH + Ki67 100%
  - DIS-HGBL-DH    # double-hit can mimic; histology + cytogenetics differentiate

epidemiology:
  context: >
    ~1-2% of NHL adult; substantial pediatric proportion. Highly curable
    with intensive 1L (~80-90% sustained CR in adults) but rapidly fatal
    if untreated or under-treated. Cure depends on rapid initiation of
    intensive regimen — admission within days of diagnosis is standard.
    HIV-associated represents large fraction in resource-poor settings.

sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
notes: >
  Highly proliferative — risk of severe TLS at first dose. CNS prophylaxis
  mandatory (HD-MTX systemic + IT MTX/cytarabine). HIV testing mandatory
  at diagnosis. Time-sensitive but NOT "emergency-room time-critical" in
  CHARTER §15.2 C2 sense (treatment is outpatient/inpatient hematology
  pathway, not bedside emergency); we generate a Plan.
notes_ua: >
  Highly proliferative — risk of severe TLS at first доза. CNS prophylaxis обов'язковий (HD-MTX systemic + IT MTX/цитарабін). HIV testing обов'язковий при діагнозі. Time-sensitive but NOT "emergency-room time-critical" in CHARTER §15.2 C2 sense (лікування is outpatient/inpatient hematology pathway, not bedside emergency); we generate a Plan.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
