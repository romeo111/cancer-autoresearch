id: DIS-T-ALL
names:
  preferred: "T-Lymphoblastic Leukemia / Lymphoma"
  ukrainian: "T-лімфобластна лейкемія/лімфома"
  english: "T-Lymphoblastic Leukemia/Lymphoma"
  synonyms: ["T-ALL", "T-LBL", "ETP-ALL (subset)"]

codes:
  icd_o_3_morphology: "9837/3"  # T lymphoblastic leukemia/lymphoma
  icd_10: "C91.0"
  who_classification: "Precursor lymphoid neoplasms — T-lymphoblastic leukaemia/lymphoma per WHO 5th ed."

archetype: risk_stratified
oncotree_code: TLL
lineage: t_cell_lymphoblastic

etiological_factors:
  - "NOTCH1 activating mutations ~60-65%"
  - "FBXW7 mutations ~15% (often co-occur з NOTCH1)"
  - "CDKN2A/B deletions ~70%"
  - "ETP-ALL subset (early T-cell precursor): myeloid-like immunophenotype, RAS/PI3K mutations, poor prognosis"

related_diseases:
  - DIS-B-ALL
  - DIS-PTCL-NOS  # rare lineage switch on relapse

epidemiology:
  context: >
    ~25% дитячих ALL = T-ALL; у дорослих ~20-25% дорослого ALL. Median
    age дорослих ~30 років (молодший ніж B-ALL). Часто mediastinal mass +
    pleural effusions (T-LBL form). NOTCH1+ pts — favorable. ETP-ALL
    (~10-15%) — poor prognosis, gene-expression overlap з AML, allo-SCT
    у CR1 рекомендований. Nelarabine для R/R T-ALL (T-cell selective).

sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
notes: >
  STUB. Hyper-CVAD-based або pediatric-inspired. CD19 CAR-T NOT applicable
  (T-cell lineage). Rituximab НЕ потрібен (CD20-). Mediastinal mass —
  можлива airway compromise; emergent steroids/cytoreduction перед induction.
notes_ua: >
  STUB. Hyper-CVAD-based або педіатричний-inspired. CD19 CAR-T NOT applicable (T-cell lineage). ритуксимаб НЕ потрібен (CD20-). Mediastinal mass — можлива airway compromise; emergent steroids/cytoreduction перед індукція.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
