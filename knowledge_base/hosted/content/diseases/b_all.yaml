id: DIS-B-ALL
names:
  preferred: "B-Lymphoblastic Leukemia / Lymphoma"
  ukrainian: "B-лімфобластна лейкемія/лімфома"
  english: "B-Lymphoblastic Leukemia/Lymphoma"
  synonyms: ["B-ALL", "B-LBL", "Pre-B ALL"]

codes:
  icd_o_3_morphology: "9811/3"  # B lymphoblastic leukemia/lymphoma, NOS
  icd_10: "C91.0"  # Acute lymphoblastic leukemia (B-cell type)
  who_classification: "Precursor lymphoid neoplasms — B-lymphoblastic leukaemia/lymphoma per WHO 5th ed."

archetype: biomarker_driven  # cytogenetic risk drives all decisions
oncotree_code: BLL
lineage: b_cell_lymphoblastic

etiological_factors:
  - "Recurrent genetic abnormalities define WHO subtypes: BCR::ABL1 t(9;22) Ph+ ~25%, KMT2A rearrangements, ETV6::RUNX1 t(12;21), hyperdiploidy, hypodiploidy, BCR::ABL1-like (Ph-like, ~10-15% adults), iAMP21"
  - "IKZF1 deletions — adverse, common in Ph+/Ph-like"
  - "Down syndrome predisposition"

related_diseases:
  - DIS-T-ALL
  - DIS-DLBCL-NOS  # rare lymphoblastic transformation

epidemiology:
  context: >
    ~75% дитячих ALL = B-ALL; у дорослих складає ~80% дорослого ALL.
    Cure rate в дітей ~90% з MRD-driven pediatric-inspired protocols;
    у дорослих ~40-50% (пожилий вік, частіше Ph+/Ph-like). Ph+ B-ALL
    кардинально transformed by TKI era — додання imatinib/dasatinib/
    ponatinib + chemo backbone або BCR::ABL1-targeted-only attempts
    (D-ALBA, GIMEMA LAL2116) дають CR ~95%. CD19/CD22 CAR-T (tisagenlecleucel,
    brexucabtagene) для R/R + MRD+.

sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
notes: >
  STUB — pending Clinical Co-Lead approval. MRD-driven therapy кардинально
  важливий — flow cytometry або PCR/NGS MRD post-induction визначає
  consolidation choice. Ph+ B-ALL ВИМАГАЄ initial BCR::ABL1 PCR baseline.
  CNS prophylaxis (IT MTX/cytarabine + HD-MTX intercalated) mandatory.
notes_ua: >
  STUB — pending Clinical Co-Lead схвалення. МЗХ-driven терапія кардинально важливий — проточна цитометрія або PCR/NGS МЗХ після індукції визначає консолідація choice. Ph+ B-ALL ВИМАГАЄ initial BCR::ABL1 PCR базове. CNS prophylaxis (IT MTX/цитарабін + HD-MTX intercalated) обов'язковий.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
