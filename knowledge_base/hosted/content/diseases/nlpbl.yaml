id: DIS-NLPBL
names:
  preferred: "Nodular Lymphocyte-Predominant B-cell Lymphoma (formerly NLPHL)"
  ukrainian: "Нодулярна лімфоцит-домінантна B-клітинна лімфома (раніше NLPHL)"
  english: "Nodular Lymphocyte-Predominant B-cell Lymphoma"
  synonyms: ["NLPBL", "NLPHL", "Lymphocyte-predominant Hodgkin (legacy)"]

codes:
  icd_o_3_morphology: "9659/3"
  icd_10: "C81.0"
  who_classification: "Mature B-cell neoplasms — Nodular lymphocyte-predominant B-cell lymphoma per WHO 5th ed. (RECLASSIFIED from Hodgkin to B-cell in 5th ed.)"

archetype: stage_driven
oncotree_code: NLPHL
lineage: b_cell_lymphoma  # reclassified per WHO 5th ed.
etiological_factors:
  - "L&H ('lymphocytic and histiocytic', 'popcorn') cells: CD20+ CD15- CD30- (DIFFERENT from cHL)"
  - "Genetic similarities to T-cell/histiocyte-rich large B-cell lymphoma"
related_diseases: [DIS-CHL, DIS-DLBCL-NOS]
epidemiology: {context: "~5% of Hodgkin/NLPBL. Indolent — high cure rate early-stage (>90%); advanced rare. Late relapses possible."}
sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
notes: >
  WHO 5th-ed renamed NLPHL → NLPBL (now classified as B-cell, not
  Hodgkin). CD20+ → rituximab-responsive. Early-stage: ISRT alone
  curative in many. Advanced: R-CHOP-like (rituximab + chemo,
  reusing DLBCL pathway) preferred over ABVD.
notes_ua: >
  WHO 5th-ed renamed NLPHL → NLPBL (now classified as B-cell, not Hodgkin). CD20+ → ритуксимаб-responsive. ранньої стадії: ISRT alone curative in many. поширений: R-CHOP-like (ритуксимаб + chemo, reusing DLBCL pathway) переважний over ABVD.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
