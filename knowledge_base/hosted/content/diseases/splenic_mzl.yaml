id: DIS-SPLENIC-MZL
names:
  preferred: "Splenic Marginal Zone Lymphoma"
  ukrainian: "Селезінкова лімфома маргінальної зони"
  english: "Splenic Marginal Zone Lymphoma"
  synonyms: ["SMZL"]

codes:
  icd_o_3_morphology: "9689/3"
  icd_10: "C83.0"
  who_classification: "Mature B-cell neoplasms — Splenic marginal zone lymphoma per WHO 5th ed."

archetype: etiologically_driven  # HCV-association in significant subset
oncotree_code: SMZL
lineage: b_cell_lymphoma

etiological_factors:
  - "Hepatitis C virus (HCV) infection — etiologically associated in 10-30% (geographic variation)"
  - "Splenic localization of marginal zone B-cells"
  - "Frequent del(7q) cytogenetic abnormality"

related_diseases:
  - DIS-HCV-MZL
  - DIS-MZL-NODAL

epidemiology:
  context: >
    ~20% of all MZL. Median age ~65, slight female predominance. Indolent
    course; presents with splenomegaly, hypersplenism (cytopenias),
    villous lymphocytes on PB smear. HCV-positive subset behaves
    similarly to HCV-MZL extranodal (DAA-responsive).

sources: [SRC-NCCN-BCELL-2025, SRC-ESMO-MZL-2024, SRC-BSH-MZL-2024]
last_reviewed: "2026-04-25"
notes: >
  Clinical hallmark: massive splenomegaly + cytopenias from hypersplenism
  (often with little lymphadenopathy). HCV testing MANDATORY at diagnosis
  — DAA can produce durable lymphoma regression. For HCV-negative,
  rituximab monotherapy or splenectomy are 1L options.
notes_ua: >
  Clinical hallmark: massive splenomegaly + цитопенії from hypersplenism (часто with little lymphadenopathy). HCV testing обов'язковий при діагнозі — DAA can produce durable лімфома регресія. For HCV-negative, ритуксимаб монотерапія or splenectomy are 1L options.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
