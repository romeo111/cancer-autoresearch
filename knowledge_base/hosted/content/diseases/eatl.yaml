id: DIS-EATL
names:
  preferred: "Enteropathy-Associated T-Cell Lymphoma"
  ukrainian: "Ентеропатія-асоційована T-клітинна лімфома"
  english: "Enteropathy-Associated T-Cell Lymphoma"
  synonyms: ["EATL", "Type I EATL"]

codes:
  icd_o_3_morphology: "9717/3"
  icd_10: "C86.2"
  who_classification: "Mature T-cell and NK-cell neoplasms — Enteropathy-associated T-cell lymphoma per WHO 5th ed."

archetype: etiologically_driven
oncotree_code: EATL
lineage: t_cell_lymphoma

etiological_factors:
  - "Celiac disease association — HLA-DQ2.5 / DQ8 in ~95%"
  - "Gluten exposure-driven (refractory celiac type II → EATL transformation)"
  - "JAK1 / STAT3 mutations common"
  - "Loss of CD8 + CD56-negative phenotype"

related_diseases:
  - DIS-PTCL-NOS
  - DIS-MEITL  # monomorphic epitheliotropic intestinal T-cell lymphoma (separate WHO entity)

epidemiology:
  context: >
    Rare — ~5-10% всіх PTCL. Geographically clustered у Northern Europe
    (high celiac prevalence). Median age ~60. Часто presents як bowel
    perforation OR refractory celiac з weight loss + obstruction.
    Multifocal jejunal involvement typical. 5-year OS ~20% historically;
    з autoSCT consolidation ~50-60%.

sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
notes: >
  STUB. Exclude MEITL — separate entity з γδ TCR + CD56+ phenotype.
  Surgical resection common у presentation (perforation). HLA-DQ2/DQ8
  testing підтверджує celiac association.
notes_ua: >
  STUB. Exclude MEITL — separate сутність з γδ TCR + CD56+ фенотип. Surgical resection поширений у presentation (perforation). HLA-DQ2/DQ8 testing підтверджує celiac association.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
