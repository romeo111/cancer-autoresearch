id: DIS-ALCL
names:
  preferred: "Anaplastic Large Cell Lymphoma (systemic)"
  ukrainian: "Анапластична великоклітинна лімфома (системна)"
  english: "Anaplastic Large Cell Lymphoma, Systemic"
  synonyms: ["sALCL", "ALCL"]
codes: {icd_o_3_morphology: "9714/3", icd_10: "C84.6", who_classification: "Mature T-cell neoplasms — Anaplastic large cell lymphoma per WHO 5th ed."}
archetype: biomarker_driven  # ALK status defining (positive vs negative subtypes)
oncotree_code: ALCL
lineage: t_cell_lymphoma
etiological_factors: ["t(2;5)(p23;q35) NPM1-ALK in ~70% (ALK+ subtype) — kinase activation; ALK- subtype lacks rearrangement"]
related_diseases: [DIS-PTCL-NOS]
epidemiology: {context: "~3-5% of NHL. ALK+ younger (median age ~30-40), favorable (~70% 5y OS); ALK- older (median ~60), adverse (~30-40% 5y OS). All sALCL CD30+ universally — strong brentuximab response."}
sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
notes: >
  Three distinct entities under "ALCL" umbrella: systemic ALCL ALK+,
  systemic ALCL ALK-, primary cutaneous ALCL (separate disease, indolent).
  Breast-implant-associated ALCL is fourth distinct WHO 5th-ed entity
  (rare; treatment surgical + adjuvant). All CD30+ → brentuximab-CHP
  (ECHELON-2) preferred over CHOP for systemic disease.
notes_ua: >
  Three distinct entities under "ALCL" umbrella: systemic ALCL ALK+, systemic ALCL ALK-, primary cutaneous ALCL (separate хвороба, індолентний). Breast-implant-associated ALCL is fourth distinct WHO 5th-ed сутність (рідкісний; лікування surgical + ад'ювантний). All CD30+ → brentuximab-CHP (ECHELON-2) переважний over CHOP for systemic хвороба.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
