id: DIS-ATLL
names:
  preferred: "Adult T-Cell Leukemia/Lymphoma"
  ukrainian: "Дорослий T-клітинний лейкоз/лімфома"
  english: "Adult T-Cell Leukemia/Lymphoma"
  synonyms: ["ATLL", "ATL", "HTLV-1 lymphoma"]

codes:
  icd_o_3_morphology: "9827/3"
  icd_10: "C91.5"
  who_classification: "Mature T-cell and NK-cell neoplasms — Adult T-cell leukaemia/lymphoma per WHO 5th ed."

archetype: etiologically_driven
oncotree_code: ATLL
lineage: t_cell_lymphoma

etiological_factors:
  - "HTLV-1 (Human T-cell Lymphotropic Virus 1) — defining etiology, 100%"
  - "CD3+ CD4+ CD25+ CCR4+ FoxP3+ — Treg-like phenotype"
  - "TCR αβ rearrangement з clonal HTLV-1 integration"
  - "Endemic у Japan, Caribbean, Latin America, Sub-Saharan Africa"

related_diseases:
  - DIS-PTCL-NOS
  - DIS-MF-SEZARY  # cutaneous overlap

epidemiology:
  context: >
    HTLV-1 endemic regions — ~5% lifetime risk у carriers. Median age
    ~60. 4 clinical subtypes (Shimoyama 1991): smoldering (asymptomatic
    skin lesions), chronic (lymphocytosis), lymphoma (LN-predominant),
    acute (leukemic + organ infiltration). Прогноз різко варіює —
    smoldering median OS 5+ років; acute median ~6-12 місяців. AZT+IFN-α
    для indolent variants; mLSG15 (Japanese) для aggressive; mogamulizumab
    (anti-CCR4) для R/R; allo-SCT consolidation у CR1 для aggressive fit.

sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
notes: >
  STUB. HTLV-1 serology + clonal TCR — diagnostic. Hypercalcemia +
  lytic bone lesions часті. CCR4 expression universal — mogamulizumab
  target. Для localized lymphoma type — concurrent CRT можлива.
notes_ua: >
  STUB. HTLV-1 serology + clonal TCR — діагностичний. Hypercalcemia + lytic bone lesions часті. CCR4 експресія universal — mogamulizumab target. Для localized лімфома type — concurrent CRT можлива.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
