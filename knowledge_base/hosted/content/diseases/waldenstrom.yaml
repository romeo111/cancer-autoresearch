id: DIS-WM
names:
  preferred: "Waldenström Macroglobulinemia / Lymphoplasmacytic Lymphoma"
  ukrainian: "Макроглобулінемія Вальденстрема / Лімфоплазмоцитарна лімфома"
  english: "Waldenström Macroglobulinemia / Lymphoplasmacytic Lymphoma"
  synonyms: ["WM", "LPL"]

codes:
  icd_o_3_morphology: "9671/3"
  icd_10: "C88.0"
  who_classification: "Mature B-cell neoplasms — Lymphoplasmacytic lymphoma per WHO 5th ed."

archetype: biomarker_driven  # MYD88 L265P defining
oncotree_code: WM
lineage: b_cell_lymphoma

etiological_factors:
  - "MYD88 L265P somatic mutation in ~95% — defining genetic feature"
  - "CXCR4 mutation in ~30% — modulates BTKi response (CXCR4 WHIM-mutated → resistance)"
  - "IgM monoclonal protein production by lymphoplasmacytic infiltrate"

related_diseases: []

epidemiology:
  context: >
    ~1-2% of NHL. Median age ~65, slight male predominance. Indolent —
    many never need treatment. iwWM treatment indication: hyperviscosity,
    cytopenia, neuropathy from IgM, cryoglobulinemia, cold agglutinins,
    bulky disease, B-symptoms.

sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
notes: >
  Only NHL with defining "must-have" mutation (MYD88 L265P) — strongly
  predicts BTKi response. CXCR4 status affects BTKi depth of response
  (WT > WHIM-mutated). Hyperviscosity emergency requires plasmapheresis
  before any cytotoxic therapy.
notes_ua: >
  Only NHL with defining "must-have" мутація (MYD88 L265P) — strongly predicts BTKi відповідь. CXCR4 status affects BTKi depth of відповідь (WT > WHIM-mutated). Hyperviscosity emergency requires plasmapheresis before any cytotoxic терапія.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
