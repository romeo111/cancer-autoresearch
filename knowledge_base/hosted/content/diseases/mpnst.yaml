id: DIS-MPNST
names:
  preferred: "Malignant peripheral nerve sheath tumor (MPNST)"
  ukrainian: "Злоякісна пухлина оболонки периферичного нерва"
  english: "Malignant peripheral nerve sheath tumor"
  synonyms: ["MPNST", "Neurofibrosarcoma (historical)", "Malignant schwannoma (historical)"]

