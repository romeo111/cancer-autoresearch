id: DIS-CML
names:
  preferred: "Chronic Myeloid Leukemia (BCR-ABL1)"
  ukrainian: "Хронічна мієлоїдна лейкемія (BCR-ABL1)"
  english: "Chronic Myeloid Leukemia"
  synonyms:
    - "CML"
    - "Chronic myelogenous leukemia"
    - "Ph+ CML"
    - "Хронічний мієлолейкоз"

codes:
  icd_o_3_morphology: "9863/3"  # CML, BCR-ABL1+
  icd_o_3_topography: ["C42.1"]
  icd_10: "C92.1"
  snomed_ct:
  who_classification: "Chronic myeloid leukaemia, BCR::ABL1-positive (per WHO 5th ed.) — chronic, accelerated, blast phase"

archetype: etiologically_driven
oncotree_code: CML
lineage: myeloid_neoplasm

etiological_factors:
  - "BCR-ABL1 fusion arising from t(9;22)(q34;q11.2) (Philadelphia chromosome) in 100% — defining + targetable driver"
  - "p210 (Major BCR breakpoint, e13a2 / e14a2): classic CML (>95%)"
  - "p190 (minor BCR, e1a2): more often Ph+ ALL, occasionally lymphoid-blast-phase CML"
  - "p230 (micro BCR, e19a2): rare, indolent neutrophilic CML"
  - "Sporadic; rare environmental association (ionizing radiation)"

related_diseases:
  - "DIS-B-ALL"  # Ph+ ALL shares BCR-ABL1 driver (p190 predominantly)

epidemiology:
  context: >
    ~15% of adult leukemias, median age ~65. Annual incidence ~1-2 per
    100,000. Three phases (chronic / accelerated / blast); ~95% present
    in chronic phase. Pre-imatinib median OS ~3-5 years; post-TKI era
    OS approaches age-matched general population for patients achieving
    deep molecular response. Risk scores: Sokal (1984), Hasford/EUTOS
    (2011), ELTS (EUTOS Long-Term Survival, 2016) — ELTS is current
    ELN-preferred for predicting CML-related death and TKI choice.

sources:
  - SRC-NCCN-MPN-2025
  - SRC-ELN-CML-2020
  - SRC-ESMO-CML-2017

last_reviewed: "2026-04-25"
reviewers: []
notes: >
  Etiologically-driven archetype (single causal driver: BCR-ABL1).
  TKI choice in chronic phase 1L is the central question, driven by
  ELTS risk + comorbidity matrix: imatinib for low-risk / elderly /
  cost-constrained; nilotinib or dasatinib or bosutinib for higher-risk
  young targeting deep molecular response + treatment-free remission;
  ponatinib / asciminib reserved for T315I or ≥3L. Response milestones
  by IS BCR-ABL1: ≤10% at 3 mo, ≤1% at 6 mo, ≤0.1% (MMR) at 12 mo.
  STUB — requires clinical co-lead signoff before publication. Myeloid
  expansion (heme).
notes_ua: >
  Etiologically-driven archetype (single causal driver: BCR-ABL1). TKI choice in chronic phase 1L is the central question, driven by ELTS risk + коморбідність matrix: іматиніб for низького ризику / літнього віку / cost-constrained; нілотиніб or дазатиніб or бозутиніб for higher-risk young targeting deep molecular відповідь + лікування-free ремісія; понатиніб / асциминіб reserved for T315I or ≥3L. відповідь milestones by IS BCR-ABL1: ≤10% at 3 міс., ≤1% at 6 міс., ≤0.1% (MMR) at 12 mo. STUB — requires clinical co-lead signoff before publication. Myeloid expansion (heme).
