id: REG-VENETOCLAX-ALEMTUZUMAB-TPLL
name: "Venetoclax + alemtuzumab combination for r/r T-PLL (investigational)"
name_ua: "Венетоклакс + алемтузумаб комбінація для рецидивного/рефрактерного T-PLL (експериментально)"
alternate_names: ["VEN-ALE T-PLL"]

components:
  - drug_id: DRUG-VENETOCLAX
    dose: "Ramp-up 20 → 50 → 100 → 200 → 400 mg PO daily (weekly escalation due TLS risk)"
    schedule: "PO daily, continuous"
    route: PO
  - drug_id: DRUG-ALEMTUZUMAB
    dose: "30 mg IV 3×/week (Mon/Wed/Fri); dose escalation week 1 (3 mg → 10 mg → 30 mg)"
    schedule: "IV 3×/week × 12 weeks then re-evaluate"
    route: IV

cycle_length_days: 7
total_cycles: "12 weeks combined induction; alloSCT consolidation in CR fit; venetoclax continuation if no transplant"
toxicity_profile: severe

premedication:
  - "Venetoclax: TLS prophylaxis with hydration + allopurinol/rasburicase (mandatory during ramp-up; high-burden T-PLL = HIGH TLS risk)"
  - "Alemtuzumab: acetaminophen + diphenhydramine + methylprednisolone 100 mg before each infusion (especially first 3 doses)"
mandatory_supportive_care:
  - SUP-PJP-PROPHYLAXIS  # throughout + ≥6 months post-alemtuzumab
  - SUP-HSV-PROPHYLAXIS
  - SUP-HBV-PROPHYLAXIS
  - SUP-CMV-MONITORING  # weekly CMV PCR

dose_adjustments:
  - condition: "TLS biochemical (rising K, P, urate)"
    modification: "Hold venetoclax; intensify hydration + rasburicase; resume at lower step after resolution"
    source_refs: [SRC-NCCN-BCELL-2025]
  - condition: "Grade 4 neutropenia"
    modification: "Hold venetoclax; G-CSF support; resume at one step lower"
  - condition: "CMV viremia"
    modification: "Pre-emptive ganciclovir/valganciclovir; do not stop alemtuzumab"
  - condition: "Severe infection"
    modification: "Hold both agents; treat aggressively"
  - condition: "Concurrent strong CYP3A4 inhibitors (azoles)"
    modification: "Reduce venetoclax dose 75% or use alternative antifungal"

ukraine_availability:
  all_components_registered: false
  all_components_reimbursed: false
  notes: >
    Alemtuzumab off-label for T-PLL (registered in Ukraine for MS only).
    Venetoclax registered for CLL/AML; off-label for T-PLL. Both
    components require funding pathway clarification. Combination is
    investigational — refer to clinical trial when available.

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-PTCL-2024

last_reviewed: "2026-04-27"
notes: >
  Boidol 2017 (Blood) demonstrated BCL2 dependence in T-PLL with
  ex-vivo venetoclax sensitivity; clinical responses reported in
  alemtuzumab-refractory cases (Hampel 2020, Blood Adv). Combination
  with alemtuzumab leverages BCL2 inhibition + CD52 ADCC. Phase 1/2
  data emerging. Bridge to alloSCT in fit responders remains the
  goal — no curative chemo-only option. Severe pan-lymphopenia +
  TLS risk make this a tertiary-center regimen.
notes_ua: >
  Boidol 2017 (Blood) продемонстровано BCL2 dependence in T-PLL with ex-vivo венетоклакс чутливість; clinical responses reported in alemtuzumab-рефрактерний cases (Hampel 2020, Blood Adv). комбінація with alemtuzumab leverages BCL2 inhibition + CD52 ADCC. фаза 1/2 дані новий. Bridge to алоТГСК in fit responders remains the goal — ні curative chemo-only option. Severe pan-lymphopenia + TLS risk make this a tertiary-center схема.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
