notes: 'Per ESMO MZL 2024 + EASL HCV 2023: after SVR12 confirmation following DAA, observe lymphoma response over 6-12 months. ~70% of HCV-associated MZL achieve hematologic response from antiviral therapy alone. Persistent / progressive lymphoma after 6-12 months observation routes to immunochemotherapy (rituximab or BR — REG-BR-STANDARD).'
notes_ua: >-
  Per ESMO MZL 2024 + EASL HCV 2023: after SVR12 confirmation following DAA, observe лімфома відповідь over 6-12 місяців. ~70% of HCV-associated MZL achieve hematologic відповідь from antiviral терапія alone. Persistent / progressive лімфома after 6-12 months observation routes to immunochemotherapy (ритуксимаб or BR — REG-BR-стандарт).
