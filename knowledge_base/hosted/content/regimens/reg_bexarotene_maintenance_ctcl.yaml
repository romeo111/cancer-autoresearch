id: REG-BEXAROTENE-MAINTENANCE-CTCL
name: "Bexarotene low-dose maintenance for CTCL responders (75-150 mg/m² PO daily)"
name_ua: "Бексаротен maintenance низькодозовий для CTCL responders (75-150 mg/m² PO щодня)"
alternate_names: ["Bexarotene maintenance", "Targretin maintenance"]

components:
  - drug_id: DRUG-BEXAROTENE
    dose: "75-150 mg/m² PO once daily with meal (titrate from initial 150 down based on tolerance)"
    schedule: "PO daily, indefinite while in response"
    route: PO

cycle_length_days: 28
total_cycles: "Indefinite — continue while in response and tolerable"
toxicity_profile: low

premedication:
  - "Continue atorvastatin/fenofibrate prophylaxis if started during induction dose"
  - "Maintenance fasting lipid panel q3 months once stable"
  - "TSH/free T4 q3 months once stable; continue levothyroxine if initiated"
mandatory_supportive_care: []
monitoring_schedule_id:

dose_adjustments:
  - condition: "Triglycerides >400 mg/dL"
    modification: "Intensify lipid-lowering; reduce dose if persistent"
    source_refs: [SRC-NCCN-BCELL-2025]
  - condition: "Persistent low-grade leukopenia"
    modification: "Reduce to 75 mg/m² alternating days"
  - condition: "Disease progression"
    modification: "Discontinue maintenance; restart full-dose or alternative systemic therapy"

ukraine_availability:
  all_components_registered: false
  all_components_reimbursed: false
  notes: >
    Bexarotene not registered in Ukraine; ongoing maintenance access
    via international supply / named-patient pathway is the dominant
    barrier — supply continuity is critical because abrupt cessation
    risks rapid relapse.

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-CTCL-2024

last_reviewed: "2026-04-27"
notes: >
  Maintenance dosing extends responses beyond induction. Same toxicity
  profile as induction dose but typically lower-grade — many patients
  remain on indefinite maintenance with periodic dose adjustment.
  Maintenance dose can also be used after response to mogamulizumab
  or BV induction as relapse-prevention strategy.
notes_ua: >
  підтримка дозування extends responses beyond індукція. Same профіль токсичності as індукція доза but типово lower-grade — many patients remain on indefinite підтримка with periodic корекція дози. підтримка доза can also be used after відповідь to mogamulizumab or BV індукція as рецидив-prevention strategy.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
