id: REG-NIVO-MONO-ESOPH-2L
name: "Nivolumab monotherapy — 2L esophageal squamous (ATTRACTION-3)"
name_ua: "Ніволумаб монотерапія — 2L плоскоклітинна стравохід (ATTRACTION-3)"
alternate_names: ["ATTRACTION-3 regimen", "Nivo-mono ESCC 2L"]

components:
  - drug_id: DRUG-NIVOLUMAB
    dose: "240 mg IV q2w (alternatively 480 mg IV q4w)"
    schedule: "IV until progression / unacceptable toxicity / max 2 years"
    route: IV

cycle_length_days: 14
total_cycles: "Until progression / unacceptable toxicity / max 2 years"

toxicity_profile: low
premedication: []
mandatory_supportive_care: []
monitoring_schedule_id: null

dose_adjustments:
  - condition: "Grade 2 immune-related adverse event (irAE)"
    modification: "Hold + corticosteroids prednisone 0.5-1 mg/kg/d; resume when ≤Grade 1"
    source_refs: [SRC-NCCN-ESOPHAGEAL-2025]
  - condition: "Grade 3-4 irAE"
    modification: "Permanently discontinue for most G3-4; high-dose steroids prednisone 1-2 mg/kg/d"
    source_refs: [SRC-NCCN-ESOPHAGEAL-2025]

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: false
  notes: "Nivolumab out-of-pocket / charitable / clinical-trial pathway in Ukraine; not NSZU-funded for esophageal."

sources: [SRC-NCCN-ESOPHAGEAL-2025, SRC-ESMO-ESOPHAGEAL-2024]
last_reviewed: "2026-04-26"

notes: >
  ATTRACTION-3 (Kato 2019): 2L advanced esophageal squamous-cell
  carcinoma post-fluoropyrimidine + platinum — nivolumab vs taxane
  (docetaxel/paclitaxel) mOS 10.9 vs 8.4 mo (HR 0.77), better safety
  profile (Grade ≥3 AE 18% vs 63%). NCCN cat 1 for 2L ESCC. KEYNOTE-181
  (pembrolizumab) parallel evidence for 2L ESCC (PD-L1 CPS ≥10
  subset only). Adenocarcinoma 2L benefit less established for ICI
  monotherapy — patients route to ramucirumab + paclitaxel (gastric-style).
