id: REG-RITUXIMAB-MAINTENANCE-MCL
name: Rituximab maintenance post-induction MCL (LyMa schedule)
name_ua: Підтримуюча терапія ритуксимабом після індукції при МКЛ (LyMa)
alternate_names:
  - R-maintenance MCL
  - LyMa maintenance
components:
  - drug_id: DRUG-RITUXIMAB
    dose: 375 mg/m²
    schedule: IV every 2 months × 3 years post-autoSCT or 2 years post-CIT
    route: IV
cycle_length_days: 56
total_cycles: ≈18 doses over 3 years (post-ASCT) or 8-12 doses over 2 years (post-BR/R-CHOP older patients)
toxicity_profile: low
premedication:
  - Acetaminophen + diphenhydramine prior to each dose
mandatory_supportive_care: []
monitoring_schedule_id: MON-RITUXIMAB-MONO
dose_adjustments:
  - condition: ANC <1000 or active infection
    modification: Hold; resume on recovery
    source_refs:
      - SRC-NCCN-BCELL-2025
ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: true
  notes: Rituximab НСЗУ-reimbursed for MCL maintenance.
sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-MCL-2024
last_reviewed: '2026-04-27'
notes: 'LyMa trial (Le Gouill 2017, NEJM): post-autoSCT R-maintenance × 3 years extended PFS (4-yr 83% vs 64%) AND OS (4-yr 89% vs 80%). EU MCL Elderly trial supports R-maintenance q2-3 mo for ≥2 years post-CIT in older patients. Cumulative hypogammaglobulinemia + infection risk requires monitoring.'
notes_ua: >-
  LyMa дослідження (Le Gouill 2017, NEJM): post-аутоТГСК R-підтримка × 3 years extended PFS (4-рік 83% проти 64%) AND OS (4-рік 89% проти 80%). EU MCL літнього віку дослідження supports R-підтримка q2-3 mo for ≥2 years post-CIT in older patients. Cumulative hypogammaglobulinemia + infection risk requires моніторинг.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
