id: REG-BLINATUMOMAB-B-ALL
name: "Blinatumomab BiTE for MRD+ post-induction OR R/R B-ALL"
name_ua: "Блінатумомаб BiTE для MRD+ post-індукції або R/R B-ALL"
alternate_names:
  - "Blincyto"
  - "BLAST regimen"
  - "TOWER regimen"

components:
  - drug_id: DRUG-BLINATUMOMAB
    dose: "R/R B-ALL: cycle 1: 9 µg/day continuous IV d1-7, then 28 µg/day d8-28 of 42-day cycle. Cycles 2-5: 28 µg/day d1-28. Up to 9 cycles. MRD+ B-ALL: 28 µg/day continuous IV d1-28 of 42-day cycle, up to 4 cycles."
    schedule: "Continuous IV via ambulatory infusion pump; hospitalization recommended cycle 1 d1-9 + cycle 2 d1-2; outpatient pump-driven thereafter"
    route: IV
  - drug_id: DRUG-DEXAMETHASONE
    dose: "20 mg IV before first dose of cycle 1 (CRS prophylaxis); 20 mg IV before dose escalation cycle 1 d8"
    schedule: "Pre-dose only; not continuous"
    route: IV

cycle_length_days: 42
total_cycles: "MRD+: up to 4 cycles; R/R: up to 9 cycles; bridge to alloHCT for transplant-eligible after MRD-negativity / CR"

toxicity_profile: severe

premedication:
  - "Dexamethasone 20 mg IV 1 hour before first dose of cycle 1 + before dose escalation d8 (CRS prophylaxis)"
  - "Hospitalization for cycle 1 d1-9 + cycle 2 d1-2 — CRS + neurotoxicity surveillance"
  - "Pre-treatment HBV / HCV / HIV screening"
  - "Cytoreduction with chemotherapy (e.g., dexamethasone or low-dose induction) before blinatumomab if WBC >10K or BM blasts >50% (TLS / CRS risk)"
  - "Tocilizumab availability (≥2 doses) for severe CRS"

mandatory_supportive_care:
  - SUP-TLS-PROPHYLAXIS
  - SUP-HBV-PROPHYLAXIS

monitoring_schedule_id: null

dose_adjustments:
  - condition: "Grade ≥3 CRS"
    modification: "Hold blinatumomab; high-dose dexamethasone 8 mg IV q8h; tocilizumab 8 mg/kg IV; resume on resolution to Grade ≤1"
    rationale: "Boxed warning — fatal CRS reported"
    source_refs:
      - SRC-BLAST-GOKBUGET-2018
      - SRC-NCCN-BCELL-2025
  - condition: "Grade ≥3 neurotoxicity (encephalopathy, seizures, ataxia)"
    modification: "Hold; high-dose dexamethasone 24 mg/day; resume reduced dose (9 µg/day) on resolution to Grade ≤1; permanent discontinuation if recurrent ≥3 OR seizures"
    rationale: "Boxed warning — neurotoxicity dose-dependent"
    source_refs:
      - SRC-BLAST-GOKBUGET-2018
  - condition: "High tumor burden (BM blasts >50% OR PB blasts >15K)"
    modification: "Cytoreduce with chemotherapy before blinatumomab to reduce TLS + CRS risk"
    rationale: "TLS + CRS risk amplified at high tumor burden"
    source_refs:
      - SRC-NCCN-BCELL-2025
  - condition: "Pump infusion error / catheter dislodgement"
    modification: "Resume infusion as soon as feasible; do not bolus to make up missed dose"
    rationale: "Continuous infusion required; bolus increases CRS risk"
    source_refs:
      - SRC-NCCN-BCELL-2025

ukraine_availability:
  all_components_registered: false
  all_components_reimbursed: false
  notes: "Blinatumomab (Blincyto) NOT registered in Ukraine. International referral or compassionate-use pathway required. Dexamethasone registered + reimbursed."

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-BLAST-GOKBUGET-2018

last_reviewed: "2026-04-25"
notes: >
  Bispecific T-cell engager (BiTE) for MRD+ post-induction or R/R
  B-ALL. BLAST: complete MRD response 78%. TOWER: median OS 7.7
  vs 4.0 mo R/R Ph-. Continuous IV + hospitalization cycle 1
  limit accessibility. CRS + ICANS boxed warnings — tocilizumab
  + ICU support mandatory. STUB — pending Co-Lead sign-off.
