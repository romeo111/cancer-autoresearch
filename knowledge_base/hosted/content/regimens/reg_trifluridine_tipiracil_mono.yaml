id: REG-TRIFLURIDINE-TIPIRACIL-MONO
name: "Trifluridine-tipiracil monotherapy (RECOURSE, 3L+ mCRC)"
name_ua: "Трифлуридин-тіпірацил моно (RECOURSE, 3L+ мКРР)"
alternate_names: ["TAS-102 mono", "Lonsurf mono", "FTD/TPI"]

components:
  - drug_id: DRUG-TRIFLURIDINE-TIPIRACIL
    dose: "35 mg/m² PO BID (rounded to nearest 5 mg)"
    schedule: "Days 1-5 + days 8-12 of each 28-day cycle"
    route: PO

cycle_length_days: 28
total_cycles: "Until progression / unacceptable toxicity"

toxicity_profile: moderate

premedication: []
mandatory_supportive_care:
  - SUP-GCSF-NEUTROPENIA
monitoring_schedule_id: null

dose_adjustments:
  - condition: "ANC <500 OR febrile neutropenia OR platelets <50K"
    modification: "Hold dose; resume at next lower dose level (30 → 25 → 20 mg/m² BID); discontinue if intolerable at 20 mg/m²"
    source_refs: [SRC-NCCN-COLON-2025]
  - condition: "CrCl 30-59 mL/min (moderate renal impairment)"
    modification: "Reduce starting dose to 20 mg/m² BID"
    source_refs: [SRC-NCCN-COLON-2025]
  - condition: "CrCl <30 mL/min (severe renal impairment)"
    modification: "AVOID — insufficient safety data"
  - condition: "Hepatic impairment Child-Pugh B/C"
    modification: "AVOID — insufficient safety data"
  - condition: "Non-hematologic toxicity Grade 3+"
    modification: "Hold until ≤Grade 1, resume at next lower dose level"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: false
  notes: |
    Трифлуридин-тіпірацил зареєстровано в UA (РП присутнє станом на
    2026-04-27). НЕ реімбурсується НСЗУ — out-of-pocket / charitable
    pathway. Servier Ukraine PAP (де доступна).

sources: [SRC-NCCN-COLON-2025, SRC-ESMO-COLON-2024]
last_reviewed: "2026-04-27"

notes: >
  RECOURSE Phase III (2015): chemo-refractory mCRC, TAS-102 vs placebo,
  mOS 7.1 vs 5.3 mo (HR 0.68). NCCN Cat 1 monotherapy option for 3L+.
  Mechanism: trifluridine is a thymidine analog incorporated into DNA;
  tipiracil inhibits thymidine phosphorylase preventing trifluridine
  degradation. TS-independent — distinct from prior fluoropyrimidine
  exposure. SUNLIGHT combination (TAS-102 + bevacizumab) is preferred
  where bev accessible (mOS 10.8 vs 7.5 mo combo vs mono); this
  monotherapy regimen is the bev-contraindicated / bev-not-funded
  fallback. Myelosuppression (neutropenia + anemia) is dominant
  toxicity; G-CSF prophylaxis NOT routine but PRN.
