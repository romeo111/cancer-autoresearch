id: REG-DAA-SOF-VEL
name: "Sofosbuvir/Velpatasvir 12 weeks"
name_ua: "Софосбувір/Велпатасвір 12 тижнів"
alternate_names:
  - "SOF/VEL 12w"
  - "Epclusa 12w"

components:
  - drug_id: DRUG-SOFOSBUVIR-VELPATASVIR
    dose: "400/100 mg PO"
    schedule: "once daily"
    route: PO
    duration: "12 weeks continuous"

cycle_length_days: 84
total_cycles: "1 (continuous 12-week course)"

toxicity_profile: low

premedication: []
mandatory_supportive_care: []
monitoring_schedule_id:

dose_adjustments:
  - condition: "Decompensated cirrhosis (Child-Pugh B or C)"
    modification: "Add ribavirin; consider specialist consultation"
    rationale: "EASL 2023 recommends RBV addition in decompensated cirrhosis"
    source_refs:
      - SRC-EASL-HCV-2023

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: true
  notes: "Available via national HCV treatment program"

sources:
  - SRC-EASL-HCV-2023
  - SRC-ESMO-MZL-2024
  - SRC-MOZ-UA-LYMPH-2013

last_reviewed: "2026-04-24"
notes: >
  First-line antiviral regimen for HCV-associated lymphoproliferative
  disease. Achieves SVR12 (cure) in >95% of treatment-naive non-
  cirrhotic patients. Lymphoma regression often follows viral clearance
  in 4-12 months; formal reassessment at 6 months.
notes_ua: >
  перша лінія antiviral схема for HCV-associated lymphoproliferative хвороба. Achieves SVR12 (cure) in >95% of без попереднього лікування non- cirrhotic patients. лімфома регресія часто follows viral clearance in 4-12 months; formal reassessment at 6 місяців.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
