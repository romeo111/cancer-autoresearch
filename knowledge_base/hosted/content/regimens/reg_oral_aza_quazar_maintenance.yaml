id: REG-ORAL-AZA-QUAZAR-MAINTENANCE
name: "Oral azacitidine (CC-486 / Onureg) maintenance — AML CR1, transplant-ineligible (QUAZAR AML-001)"
name_ua: "Пероральний азацитидин (CC-486 / Onureg) — підтримуюча терапія AML у CR1 для нетрансплантат-кандидатів (QUAZAR AML-001)"
alternate_names:
  - "Onureg maintenance"
  - "CC-486"
  - "QUAZAR maintenance"

components:
  - drug_id: DRUG-AZACITIDINE
    dose: "300 mg PO once daily × 14 days of each 28-day cycle (oral formulation only — IV/SC azacitidine is NOT bioequivalent and must NOT be substituted)"
    schedule: "PO daily days 1-14 every 28 days, started within 4 months of CR/CRi achievement; continue until progression / unacceptable toxicity"
    route: PO

cycle_length_days: 28
total_cycles: "Continuous until relapse / unacceptable toxicity"
toxicity_profile: low-moderate

premedication:
  - "Antiemetic prophylaxis days 1-14 (low-moderate emetogenic; ondansetron 8 mg PO before dose)"
  - "Pre-cycle CBC + CMP; recheck on day 15 + monthly"
mandatory_supportive_care:
  - SUP-HBV-PROPHYLAXIS
monitoring_schedule_id:

dose_adjustments:
  - condition: "ANC <0.5 × 10⁹/L OR platelets <50 × 10⁹/L during maintenance"
    modification: "Hold; resume at 200 mg PO daily × 14 d on count recovery; if recurrent, shorten schedule to 7 days"
    rationale: "Cumulative myelosuppression; QUAZAR protocol allowed reduction to 200 mg or shortening to 7 days"
    source_refs:
      - SRC-QUAZAR-WEI-2020
      - SRC-NCCN-AML-2025
  - condition: "Grade ≥3 GI toxicity (diarrhea, nausea/vomiting refractory to antiemetics)"
    modification: "Hold; resume on resolution; if recurrent, shorten to 7-day schedule per cycle"
    rationale: "GI toxicity is the most common grade ≥3 non-hematologic AE in QUAZAR"
    source_refs:
      - SRC-QUAZAR-WEI-2020
  - condition: "Severe hepatic impairment (Child-Pugh C)"
    modification: "Avoid"
    rationale: "Limited data; hepatic clearance contribution"
    source_refs:
      - SRC-NCCN-AML-2025

ukraine_availability:
  all_components_registered: false
  all_components_reimbursed: false
  notes: "Oral azacitidine (Onureg) is NOT yet registered in Ukraine; SC/IV azacitidine is registered but is NOT a bioequivalent substitute (QUAZAR was strictly with oral CC-486 formulation). Access via clinical trial / named-patient programs only at present. SC azacitidine cannot be used as a substitute for QUAZAR maintenance."

sources:
  - SRC-QUAZAR-WEI-2020
  - SRC-NCCN-AML-2025

last_reviewed: "2026-04-27"
notes: >
  QUAZAR AML-001 (Wei 2020): oral azacitidine 300 mg PO daily × 14 d
  / 28-d cycle vs placebo as maintenance after CR/CRi post-induction
  ± consolidation in AML patients ≥55 years not eligible for HCT.
  mOS 24.7 vs 14.8 months (HR 0.69, p<0.001), mRFS 10.2 vs 4.8 months.
  FDA-approved Sep 2020 as Onureg. Critical: oral CC-486 is NOT
  bioequivalent to SC/IV azacitidine — only the oral formulation has
  this maintenance indication. Ukraine access major barrier (not
  registered as Onureg). STUB — requires Clinical Co-Lead signoff.
notes_ua: >
  QUAZAR AML-001 (Wei 2020): oral азацитидин 300 mg PO daily × 14 d / 28-d цикл vs placebo as підтримка after CR/CRi після індукції ± консолідація in AML patients ≥55 years not придатний для HCT. міс. 24.7 проти 14.8 місяців (HR 0.69, p<0.001), mRFS 10.2 проти 4.8 місяців. схвалений FDA Sep 2020 as Onureg. Critical: oral CC-486 is NOT bioequivalent to SC/IV азацитидин — only the oral formulation has this підтримка показання. Ukraine access major barrier (not registered as Onureg). STUB — requires Clinical Co-Lead signoff.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
