id: REG-SORAFENIB-MONO
name: "Sorafenib monotherapy"
name_ua: "Сорафеніб монотерапія"
alternate_names: ["Sorafenib"]

components:
  - drug_id: DRUG-SORAFENIB
    dose: "400 mg PO BID (start 200 mg BID; escalate to 400 mg if tolerated)"
    schedule: "Continuous"
    route: PO

cycle_length_days:
total_cycles: "Until progression / unacceptable toxicity"

toxicity_profile: moderate

premedication: []
mandatory_supportive_care: []
monitoring_schedule_id:

dose_adjustments:
  - condition: "Hand-foot skin reaction Grade 2-3"
    modification: "Reduce to 400→200 mg BID OR 400 mg daily; emollient prophylaxis; urea cream"
    source_refs: [SRC-NCCN-HCC-2025]
  - condition: "Hepatic decompensation (ascites, encephalopathy onset)"
    modification: "Hold; reassess Child-Pugh; consider permanent discontinuation if CP-C"
    source_refs: [SRC-NCCN-HCC-2025]
  - condition: "Severe diarrhea"
    modification: "Hold + supportive care; resume at reduced dose"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: true
  notes: "NSZU-funded for advanced HCC (Child-Pugh A primarily; CP-B individual decision)."

sources: [SRC-NCCN-HCC-2025, SRC-AASLD-HCC-2023]
last_reviewed: "2026-04-26"

notes: >
  SHARP trial 2008 — first systemic therapy with proven OS benefit in
  advanced HCC. Now 2L+ after atezo+bev / durva+treme failure, OR 1L
  alternative when ICI-combinations contraindicated (autoimmune disease,
  organ transplant). Lenvatinib (REFLECT) is non-inferior alternative
  with better PFS/ORR.
notes_ua: >
  SHARP дослідження 2008 — first systemic терапія with proven OS виграш in поширений HCC. Now 2L+ after atezo+bev / durva+treme failure, або 1L alternative when ICI-combinations протипоказаний (автоімунний хвороба, organ transplant). ленватиніб (REFLECT) is не гірше alternative with краще PFS/ORR.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
