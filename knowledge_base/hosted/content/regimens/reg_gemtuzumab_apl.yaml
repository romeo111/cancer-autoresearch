id: REG-GEMTUZUMAB-APL
name: "Gemtuzumab ozogamicin for relapsed APL with maintenance"
name_ua: "Гемтузумаб озогаміцин для рецидивуючого APL з підтримкою"
alternate_names:
  - "GO APL salvage"
  - "MyloFrance APL"

components:
  - drug_id: DRUG-GEMTUZUMAB-OZOGAMICIN
    dose: "Salvage: 3 mg/m² IV (max 4.5 mg) days 1, 4, 7 (combined with ATRA + ATO induction); maintenance: 3 mg/m² IV day 1 of each consolidation cycle × 4 cycles"
    schedule: "Induction d1, 4, 7 + consolidation q4wk × 4 cycles; bridge to autoSCT for molecularly-CR fit responders"
    route: IV
  - drug_id: DRUG-ATRA
    dose: "45 mg/m²/day PO (2 divided doses)"
    schedule: "Daily through induction + intermittent in consolidation per protocol"
    route: PO
  - drug_id: DRUG-ATO
    dose: "0.15 mg/kg/day IV (2-hour infusion) until molecular CR; then 5 days/week × 4 weeks q8wk × 4 consolidation cycles"
    schedule: "Daily induction; intermittent consolidation"
    route: IV

cycle_length_days: 28
total_cycles: "Induction until molecular CR + 4 consolidation cycles + autoSCT consolidation for fit molecularly-CR responders"

toxicity_profile: severe

premedication:
  - "Antiemetics — moderate-emetogenic prophylaxis"
  - "Pre-cycle CBC + LFT (bilirubin + ALT + AST + alkaline phosphatase) + LDH"
  - "Allopurinol 300 mg PO daily for TLS prophylaxis"
  - "Daily ECG + electrolyte correction during ATO"
  - "Antimicrobial + antiviral prophylaxis"
  - "DS-prophylaxis dexamethasone if rising WBC"

mandatory_supportive_care:
  - SUP-TLS-PROPHYLAXIS
  - SUP-HBV-PROPHYLAXIS

monitoring_schedule_id:

dose_adjustments:
  - condition: "Bilirubin >1.5× ULN OR AST/ALT >2.5× ULN"
    modification: "Hold gemtuzumab; resume reduced dose on resolution; permanent discontinuation if VOD diagnosed"
    rationale: "Hepatotoxicity precursor to VOD; boxed warning"
    source_refs:
      - SRC-MYLOFRANCE-ARIBI-2007
      - SRC-NCCN-AML-2025
  - condition: "Pre-alloHCT setting"
    modification: "Limit gemtuzumab to 1-2 doses pre-HCT; avoid dual-alkylator conditioning (no Bu/Cy); intensify hepatic monitoring"
    rationale: "VOD/SOS risk amplified post-HCT"
    source_refs:
      - SRC-NCCN-AML-2025
  - condition: "Differentiation syndrome on ATRA + ATO"
    modification: "Dexamethasone 10 mg IV q12h; hold ATRA + ATO until resolution"
    rationale: "DS leading cause of induction mortality"
    source_refs:
      - SRC-NCCN-AML-2025
  - condition: "Severe + prolonged cytopenia"
    modification: "G-CSF support; transfusion; defer subsequent gemtuzumab dose until count recovery"
    rationale: "Cumulative myelosuppression"
    source_refs:
      - SRC-MYLOFRANCE-ARIBI-2007

ukraine_availability:
  all_components_registered: false
  all_components_reimbursed: false
  notes: "Gemtuzumab ozogamicin (Mylotarg) NOT registered in Ukraine. ATRA + arsenic trioxide registered + reimbursed. International referral or compassionate-use pathway for gemtuzumab component."

sources:
  - SRC-NCCN-AML-2025
  - SRC-MYLOFRANCE-ARIBI-2007
  - SRC-APL-RELAPSE-LENGFELDER-2017

last_reviewed: "2026-04-25"
notes: >
  Gemtuzumab combined with ATRA + ATO for relapsed APL — APL is
  exquisitely CD33+, rapid deep MRD-negative responses common
  (CR ~91% per MyloFrance). Maintenance with gemtuzumab during
  consolidation cycles. Bridge to autoSCT for fit molecularly-CR
  responders. STUB — pending Co-Lead sign-off.
notes_ua: >
  Gemtuzumab combined with ATRA + ATO for рецидивний APL — APL is exquisitely CD33+, rapid deep МЗХ-negative responses поширений (CR ~91% per MyloFrance). підтримка with gemtuzumab during консолідація цикли. Bridge to аутоТГСК for fit molecularly-CR responders. STUB — pending Co-Lead sign-off.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
