id: REG-NIVO-MAINTENANCE-MELANOMA
name: "Nivolumab maintenance (post-induction nivo+ipi, advanced melanoma)"
name_ua: "Ніволумаб підтримка (після індукції nivo+ipi, поширена меланома)"
alternate_names:
  - "Nivo maintenance"
  - "CheckMate-067 maintenance phase"

components:
  - drug_id: DRUG-NIVOLUMAB
    dose: "480 mg IV q4w (alternative: 240 mg IV q2w; flat dosing per CheckMate-067 long-term)"
    schedule: "day 1 of each 28-day cycle"
    route: IV

cycle_length_days: 28
total_cycles: "Up to 2 years (CheckMate-067); continue beyond on case-by-case basis if ongoing benefit"
toxicity_profile: low-moderate

premedication: []
mandatory_supportive_care: []
monitoring_schedule_id:

dose_adjustments:
  - condition: "Immune-related AE G2 (e.g. colitis, pneumonitis, hepatitis, dermatitis)"
    modification: "Hold; prednisone 0.5-1 mg/kg/day until G≤1; resume nivo when steroid <10 mg/day"
    source_refs: [SRC-NCCN-MELANOMA-2025]
  - condition: "Immune-related AE G3-4"
    modification: "Hold; high-dose steroids (1-2 mg/kg/day methylprednisolone IV); permanent discontinuation for most G3 (colitis, pneumonitis, hepatitis, neuro); resume only if G≤1 and steroid <10 mg/day for select reversible G3"
    source_refs: [SRC-NCCN-MELANOMA-2025]
  - condition: "Endocrinopathy (thyroid, adrenal, hypophysitis, T1DM)"
    modification: "Continue nivo; hormone replacement (levothyroxine, hydrocortisone, insulin); steroids only for hypophysitis with mass effect"
    source_refs: [SRC-NCCN-MELANOMA-2025]
  - condition: "Myocarditis OR encephalitis OR Stevens-Johnson/TEN"
    modification: "Permanent discontinuation; high-dose steroids; multidisciplinary management"
    source_refs: [SRC-NCCN-MELANOMA-2025]

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: true
  notes: "Ніволумаб реімбурсується НСЗУ для меланоми (поширена 1L після ipi-induction та адьювант стадія III/IV)."

sources:
  - SRC-NCCN-MELANOMA-2025
  - SRC-ESMO-MELANOMA-2024
  - SRC-CHECKMATE-067-LARKIN-2019

last_reviewed: "2026-04-27"
reviewers: []
notes: >
  CheckMate-067 (Larkin 2019/2022, NEJM): nivolumab + ipilimumab
  induction (4 cycles) followed by nivolumab maintenance every 2 weeks
  (240 mg) or every 4 weeks (480 mg flat-dose) — 6.5-year mOS 49%
  vs 22% (chemo). Maintenance phase critical for long-term benefit.
  TSH/free T4 q6-8 weeks; AM cortisol if symptomatic; LFTs q2-4 weeks
  for first 6 months, then q4 weeks. irAE management per ASCO/ESMO
  guidelines.
notes_ua: >
  CheckMate-067 (Larkin 2019/2022, NEJM): індукція ніволумаб +
  іпілімумаб (4 цикли) з подальшою підтримкою ніволумаб q2тиж (240 мг)
  або q4тиж (480 мг плоска доза) — 6.5-річна mOS 49% vs 22% (хіміо).
  Фаза підтримки критична для довгострокової користі. ТТГ/вільний T4
  q6-8 тиж; ранковий кортизол при симптомах; печінкові проби q2-4 тиж
  перші 6 міс, потім q4 тиж. Менеджмент іриАЕ за ASCO/ESMO.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
