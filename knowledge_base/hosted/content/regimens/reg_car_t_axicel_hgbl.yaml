id: REG-CAR-T-AXICEL-HGBL
name: Axicabtagene ciloleucel (axi-cel CAR-T) for relapsed/refractory HGBL-DH
name_ua: Аксікабтагене сілолейцел (CAR-T) при рецидивній/рефрактерній HGBL-DH
alternate_names:
  - Axi-cel HGBL
  - ZUMA-7-style CAR-T
components: []  # phases supersede; kept empty for back-compat with downstream
                # consumers that still iterate `components` directly. PR3 of
                # regimen-phases-refactor — see plan-doc 2026-04-28 §4 + §5.

phases:
  - name: lymphodepletion
    purpose_ua: "виснаження лімфоцитів перед CAR-T для приживлення клітин (Flu/Cy days -5 to -3 per ZUMA pattern)"
    purpose_en: "lymphocyte depletion before CAR-T to enable cell engraftment (Flu/Cy days -5 to -3 per ZUMA pattern)"
    duration: "3 days, days -5 to -3"
    timing_relative_to: "main_infusion"
    timing_offset_days: -5
    optional: false
    components:
      - drug_id: DRUG-CYCLOPHOSPHAMIDE
        dose: "500 mg/m²/day"
        schedule: "IV days -5, -4, -3 (lymphodepletion)"
        route: IV
      - drug_id: DRUG-FLUDARABINE
        dose: "30 mg/m²/day"
        schedule: "IV days -5, -4, -3 (lymphodepletion)"
        route: IV
    sources:
      - SRC-NCCN-BCELL-2025
  - name: main
    purpose_ua: "основна CAR-T інфузія"
    purpose_en: "main CAR-T infusion"
    duration: "single infusion"
    timing_relative_to: "absolute"
    optional: false
    components:
      - drug_id: DRUG-AXICABTAGENE-CILOLEUCEL
        dose: 2 × 10⁶ CAR+ T cells/kg (max 2 × 10⁸)
        schedule: Single IV infusion after lymphodepletion (Flu/Cy days -5 to -3)
        route: IV
    sources:
      - SRC-NCCN-BCELL-2025

cycle_length_days: 1
total_cycles: Single infusion
toxicity_profile: high (CRS + ICANS)
premedication:
  - Acetaminophen + diphenhydramine pre-infusion (no steroid)
  - Tocilizumab + dexamethasone on standby for CRS/ICANS
mandatory_supportive_care: []
monitoring_schedule_id: MON-RITUXIMAB-MONO
dose_adjustments:
  - condition: Manufacturing failure or insufficient T-cell yield
    modification: Re-collection vs alternative therapy (bispecific antibody, salvage chemo)
    source_refs:
      - SRC-NCCN-BCELL-2025
  - condition: Active CRS Grade ≥2
    modification: Tocilizumab 8 mg/kg IV; dexamethasone for refractory CRS or ICANS
    source_refs:
      - SRC-NCCN-BCELL-2025
ukraine_availability:
  all_components_registered: false
  all_components_reimbursed: false
  notes: CAR-T not commercially available in Ukraine — international referral pathway (EU centers) required; case-by-case funding.
sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-DLBCL-2024
last_reviewed: '2026-04-27'
notes: 'ZUMA-1 (Locke 2019): axi-cel in r/r aggressive B-NHL — CR ~58%, durable response ~40% at 24 mo. ZUMA-7 (Locke 2022, NEJM): superior to standard salvage + autoSCT in early-relapse/primary-refractory. CRS + ICANS toxicity require certified CAR-T center.'
notes_ua: >-
  ZUMA-1 (Locke 2019): axi-cel in р/р агресивний B-NHL — CR ~58%, стійка відповідь ~40% at 24 mo. ZUMA-7 (Locke 2022, NEJM): перевершує стандарт сальвадж + аутоТГСК in early-рецидив/primary-рефрактерний. CRS + ICANS токсичність require certified CAR-T center.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
