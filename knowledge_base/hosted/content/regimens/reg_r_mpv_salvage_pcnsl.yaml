id: REG-R-MPV-SALVAGE-PCNSL
name: Salvage HD-MTX-based re-induction for relapsed PCNSL
name_ua: Salvage індукція HD-MTX при рецидиві PCNSL
alternate_names:
  - R-MPV salvage
  - HD-MTX re-induction
components:
  - drug_id: DRUG-RITUXIMAB
    dose: 500 mg/m²
    schedule: IV day 1
    route: IV
  - drug_id: DRUG-METHOTREXATE
    dose: 3.5 g/m² (with leucovorin rescue)
    schedule: IV day 2 over 2 hours
    route: IV
  - drug_id: DRUG-VINCRISTINE
    dose: 1.4 mg/m² (cap 2.8 mg)
    schedule: IV day 2
    route: IV
  - drug_id: DRUG-PROCARBAZINE
    dose: 100 mg/m²
    schedule: PO days 1-7 (odd cycles)
    route: PO
cycle_length_days: 14
total_cycles: 5-7 cycles to maximal response → consolidation (autoSCT thiotepa-based or repeat HD-MTX maintenance)
toxicity_profile: high
premedication:
  - Aggressive IV hydration + urine alkalinization (pH ≥7.5) for HD-MTX
  - Leucovorin rescue 24h post-MTX, continue until MTX <0.05 µmol/L
  - Acetaminophen + diphenhydramine before rituximab
mandatory_supportive_care: []
monitoring_schedule_id: MON-RITUXIMAB-MONO
dose_adjustments:
  - condition: CrCl <50 mL/min OR third-space fluid
    modification: HD-MTX contraindicated — reduce to MTX 1 g/m² with intensified rescue, OR substitute thiotepa-based regimen
    source_refs:
      - SRC-NCCN-CNS-2025
  - condition: Delayed MTX clearance (level >1 µmol/L at 48h)
    modification: Increase leucovorin; consider glucarpidase if >100 µmol/L at 24h
    source_refs:
      - SRC-NCCN-CNS-2025
ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: true
  notes: All components НСЗУ-available; HD-MTX requires inpatient setting + drug-level monitoring.
sources:
  - SRC-NCCN-CNS-2025
  - SRC-ESMO-DLBCL-2024
last_reviewed: '2026-04-27'
notes: For relapsed PCNSL after initial HD-MTX induction with documented prior chemosensitivity. Re-induction with R-MPV → consolidation autoSCT (thiotepa-based, IELSG32) preferred for fit. WBRT alternative for ASCT-ineligible (cognitive toxicity caveat). Ibrutinib emerging salvage option.
notes_ua: >-
  For рецидивний PCNSL after initial HD-MTX індукція with documented prior chemosensitivity. Re-індукція with R-MPV → консолідація аутоТГСК (thiotepa-based, IELSG32) переважний for fit. WBRT alternative for ASCT-ineligible (cognitive токсичність caveat). ібрутиніб новий сальвадж option.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
