id: REG-AVAPRITINIB-ADVSM-1L
name: "Avapritinib monotherapy (advanced systemic mastocytosis, 1L; KIT D816V+)"
name_ua: "Аваприніб моно (поширений системний мастоцитоз, 1L; KIT D816V+)"
alternate_names:
  - "Ayvakit AdvSM"
  - "EXPLORER regimen"
  - "PATHFINDER regimen"

components:
  - drug_id: DRUG-AVAPRITINIB
    dose: "200 mg PO once daily on empty stomach (≥1 h before / ≥2 h after food)"
    schedule: "Continuous, until progression or unacceptable toxicity"
    route: PO

cycle_length_days: 28
total_cycles: "Continuous until progression"
toxicity_profile: moderate

premedication:
  - "Empty stomach administration"
  - "Optimize anti-mediator therapy (H1/H2 blockers, montelukast) prior to start to mitigate mast-cell-activation flares"
  - "Baseline brain MRI (cerebral microbleed surveillance)"
mandatory_supportive_care: []
monitoring_schedule_id:

dose_adjustments:
  - condition: "Platelet count <50 ×10⁹/L at baseline"
    modification: "Avapritinib is contraindicated; manage with midostaurin or supportive care; reassess after AHN-component therapy in SM-AHN"
    rationale: "Increased intracranial hemorrhage risk at low platelet counts"
    source_refs:
      - SRC-NCCN-SM-2025
  - condition: "Cognitive effects (memory, mood, confusion) gr ≥2"
    modification: "Hold until ≤gr 1; resume at 100 mg; permanently discontinue if recurs at 100 mg"
    rationale: "Dose-related; cognitive AE was the main reason 200 mg (PATHFINDER) replaced 300 mg (EXPLORER) for AdvSM"
    source_refs:
      - SRC-NCCN-SM-2025
  - condition: "Intracranial hemorrhage (any size) or symptomatic cerebral microbleed"
    modification: "Permanently discontinue"
    rationale: "Boxed warning"
  - condition: "Severe cytopenia (ANC <0.5 ×10⁹/L OR platelets <25 ×10⁹/L)"
    modification: "Hold until recovery; resume at 100 mg"
    rationale: "Toxicity management — cytopenias common in advanced SM (marrow infiltration)"

ukraine_availability:
  all_components_registered: false
  all_components_reimbursed: false
  notes: "Avapritinib NOT registered in Ukraine. Access via DEC named-patient import or Blueprint Medicines EAP (KIT D816V documented). Cross-border (EU) treatment per наказ МОЗ 988 is realistic — SoC in EU."

sources:
  - SRC-NCCN-SM-2025
  - SRC-ONCOKB

last_reviewed: "2026-04-27"
notes: >
  EXPLORER (Gotlib NEJM 2023) + PATHFINDER (DeAngelo Nat Med 2023):
  avapritinib in advanced SM (ASM / SM-AHN / MCL) ORR ~75% with
  deep molecular response (KIT D816V VAF reduction) and mast-cell-
  burden reduction (serum tryptase, marrow mast-cell %, KIT D816V VAF
  composite). Median PFS not reached. PATHFINDER 200 mg dose
  registration mitigates cognitive AEs vs EXPLORER 300 mg. SM-AHN
  patients also need AHN-component-directed therapy (e.g. azacitidine
  for MDS / CMML AHN; intensive chemo for AML AHN — avapritinib does
  not address the AHN compartment alone).
notes_ua: >
  EXPLORER (Gotlib NEJM 2023) + PATHFINDER (DeAngelo Nat Med 2023): avapritinib in поширений SM (ASM / SM-AHN / MCL) ORR ~75% with deep molecular відповідь (KIT D816V VAF зниження) and mast-cell- burden зниження (serum tryptase, marrow mast-cell %, KIT D816V VAF composite). медіана ВБП not reached. PATHFINDER 200 mg доза registration mitigates cognitive AEs vs EXPLORER 300 mg. SM-AHN patients also need AHN-component-directed терапія (e.g. азацитидин for MDS / CMML AHN; intensive chemo for AML AHN — avapritinib does not address the AHN compartment alone).
ukrainian_review_status: pending_clinical_signoff
