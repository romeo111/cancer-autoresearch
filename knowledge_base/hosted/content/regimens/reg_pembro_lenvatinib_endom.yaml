id: REG-PEMBRO-LENVATINIB-ENDOM
name: "Pembrolizumab + Lenvatinib (KEYNOTE-775) — 2L pMMR endometrial"
name_ua: "Пембролізумаб + Ленватініб (KEYNOTE-775) — 2L pMMR ендометрій"
alternate_names: ["KEYNOTE-775 regimen", "Pembro-Lenva endometrial"]

components:
  - drug_id: DRUG-PEMBROLIZUMAB
    dose: "200 mg IV q3w (alternatively 400 mg IV q6w)"
    schedule: "IV until progression / unacceptable toxicity / max 35 cycles (~2 years)"
    route: IV
  - drug_id: DRUG-LENVATINIB
    dose: "20 mg PO once daily continuous"
    schedule: "Continuous PO daily"
    route: PO

cycle_length_days: 21
total_cycles: "Pembrolizumab up to 35 cycles (~2 yr); lenvatinib until progression / intolerance"
toxicity_profile: severe

premedication: []
mandatory_supportive_care: []
monitoring_schedule_id: null

dose_adjustments:
  - condition: "Hypertension Grade ≥2 (SBP ≥150 OR DBP ≥100)"
    modification: "Optimize antihypertensives; hold lenvatinib until controlled; consider dose reduction (20→14→10→8 mg)"
    rationale: "Hypertension is the most common lenvatinib toxicity (~65%); proactive antihypertensive use mandatory"
    source_refs: [SRC-NCCN-UTERINE-2025]
  - condition: "Proteinuria ≥2 g/24h"
    modification: "Hold lenvatinib until <2 g/24h; resume at next-lower dose level"
    source_refs: [SRC-NCCN-UTERINE-2025]
  - condition: "Grade 2 irAE (pembrolizumab)"
    modification: "Hold pembro + corticosteroids; resume when ≤Grade 1"
  - condition: "Grade 3-4 irAE"
    modification: "Permanently discontinue pembro; high-dose steroids prednisone 1-2 mg/kg/d"
  - condition: "Grade ≥3 lenvatinib-related diarrhea / fatigue / hand-foot / weight loss"
    modification: "Hold lenvatinib; resume at next-lower dose level (14 → 10 → 8 mg)"
  - condition: "Recent / planned major surgery"
    modification: "Hold lenvatinib ≥1 week pre-op + ≥2 weeks post-op until wound healed"
  - condition: "Arterial thromboembolism / GI perforation / fistula"
    modification: "Permanently discontinue lenvatinib"
  - condition: "LVEF decline or new heart failure"
    modification: "Hold lenvatinib; cardiology consult; resume only after recovery"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: false
  notes: >
    Both pembrolizumab and lenvatinib registered in Ukraine; neither
    NSZU-reimbursed for endometrial 2L (2026 onco package). Out-of-pocket
    / charitable / clinical-trial pathway only. Single-agent doxorubicin
    or paclitaxel-platinum re-challenge are the funded fallbacks when
    pembro+lenva access unavailable.

sources: [SRC-NCCN-UTERINE-2025, SRC-ESMO-ENDOMETRIAL-2022]
last_reviewed: "2026-04-26"

notes: >
  KEYNOTE-775 (Makker 2022): 2L advanced endometrial post-platinum —
  pembrolizumab + lenvatinib vs investigator's-choice chemo (doxo or
  pacli). All-comers: mOS 18.3 vs 11.4 mo (HR 0.62), PFS 7.2 vs 3.8 mo
  (HR 0.56), ORR 32% vs 15%. pMMR subgroup (the practical 2L
  population since dMMR receives ICI 1L): mOS 17.4 vs 12.0 mo
  (HR 0.68). NCCN cat 1 for 2L pMMR endometrial post-platinum.
  Toxicity is substantial — ~67% Grade ≥3 AE, ~20% discontinuation rate
  for AE. Hypertension prophylaxis + dose reduction algorithm mandatory.
