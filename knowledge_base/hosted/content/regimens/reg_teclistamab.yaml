id: REG-TECLISTAMAB
name: "Teclistamab BCMA × CD3 bispecific (with step-up dosing) — continuous SC weekly"
name_ua: "Теклістамаб BCMA × CD3 біспецифік (зі step-up dosing) — підшкірно щотижня"
alternate_names:
  - "Teclistamab"
  - "Tecvayli"
  - "MajesTEC-1 regimen"

components:
  - drug_id: DRUG-TECLISTAMAB
    dose: >
      Step-up: 0.06 mg/kg SC day 1, 0.3 mg/kg SC day 4, 1.5 mg/kg SC
      day 7 (≥48h between doses, inpatient observation). Full dose 1.5
      mg/kg SC weekly thereafter.
    schedule: "Weekly SC continuous (after step-up); transition to q2-weekly after ≥6 mo sustained ≥VGPR (per protocol amendment)"
    route: SC

cycle_length_days: 7
total_cycles: "Continuous until progression or unacceptable toxicity"
toxicity_profile: severe

premedication:
  - "Pre-step-up doses: dexamethasone 16 mg IV/PO + diphenhydramine 50 mg IV/PO + acetaminophen 650 mg PO — required for first 3 doses (CRS mitigation)"
  - "Tocilizumab 8 mg/kg IV must be on-site for emergency CRS management"
  - "Hospitalize for ≥48h after each step-up dose AND first full dose (CRS surveillance)"
mandatory_supportive_care:
  - SUP-PJP-PROPHYLAXIS
  - SUP-HSV-PROPHYLAXIS
  - SUP-IVIG-HYPOGAMMA
monitoring_schedule_id:

dose_adjustments:
  - condition: "CRS Grade 1 (fever ≥38°C only)"
    modification: "Acetaminophen + observation; hold next dose 48h until afebrile"
    source_refs: [SRC-NCCN-MM-2025]
  - condition: "CRS Grade 2 (hypotension responsive to fluids OR low-flow O₂)"
    modification: "Tocilizumab 8 mg/kg IV; ± dexamethasone 10 mg IV q6h; supportive care"
    source_refs: [SRC-NCCN-MM-2025]
  - condition: "CRS Grade 3-4 OR ICANS Grade 2+"
    modification: "Tocilizumab + high-dose dexamethasone OR methylprednisolone 1 g/day; ICU; anakinra for refractory"
    rationale: "Severe CRS / ICANS may be fatal if untreated"
  - condition: "Active infection any time during therapy"
    modification: "Hold teclistamab + targeted antibiotics; resume after resolution; consider IVIG if hypogammaglobulinemic"
    rationale: "Infection is the leading cause of treatment-related mortality with bispecifics; aggressive management essential"
    source_refs: [SRC-NCCN-MM-2025]
  - condition: "IgG <400 mg/dL"
    modification: "IVIG 0.4 g/kg q4 weeks (or until IgG >500); continue throughout teclistamab + ≥6 mo post-discontinuation"
    rationale: "On-target B-cell aplasia universal; IVIG reduces severe infection rate"
  - condition: "Persistent Grade 4 cytopenia"
    modification: "Hold; G-CSF; transfusions; resume at next dose level if recovery within 4 weeks"

ukraine_availability:
  all_components_registered: false
  all_components_reimbursed: false
  notes: >
    Teclistamab NOT registered in Ukraine; NOT available domestically.
    International referral pathway (clinical trial / charitable / out-of-
    pocket) — estimated USD 250-350K/year. Centre must have CRS/ICANS
    management capability + ICU access. Bispecifics produce more severe +
    prolonged immunosuppression than CAR-T — infection burden dominant.

sources:
  - SRC-NCCN-MM-2025

last_reviewed: "2026-04-25"
notes: >
  MajesTEC-1 (Moreau 2022, ASH 2023 update): triple-class refractory MM
  after ≥3 prior lines (median 5 prior) — ORR 63%, CR/sCR 39%, mPFS
  ~11 mo, mDOR ~22 mo. Approved 4L+ triple-class refractory (post-PI,
  post-IMiD, post-anti-CD38). Step-up dosing inpatient REQUIRED.
  Talquetamab (GPRC5D × CD3, MonumenTAL-1) and elranatamab (BCMA × CD3,
  MagnetisMM-3) are alternative bispecifics — separate future Regimen
  entities. CAR-T (cilta-cel, ide-cel) is the alternative cellular
  approach if accessible.
notes_ua: >
  MajesTEC-1 (Moreau 2022, ASH 2023 update): triple-class рефрактерний MM after ≥3 prior lines (медіана 5 prior) — ORR 63%, CR/sCR 39%, mPFS ~11 міс., mDOR ~22 mo. схвалений 4L+ triple-class рефрактерний (post-PI, post-IMiD, post-anti-CD38). Step-up дозування inpatient обов'язковий. Talquetamab (GPRC5D × CD3, MonumenTAL-1) and elranatamab (BCMA × CD3, MagnetisMM-3) are alternative bispecifics — separate future схема entities. CAR-T (cilta-cel, ide-cel) is the alternative cellular approach if accessible.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
