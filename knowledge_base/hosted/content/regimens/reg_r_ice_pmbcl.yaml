id: REG-R-ICE-PMBCL
name: R-ICE salvage with autoSCT consolidation (relapsed/refractory PMBCL)
name_ua: R-ICE salvage з консолідацією autoSCT (рецидивна/рефрактерна PMBCL)
alternate_names:
  - R-ICE → autoSCT
  - Salvage R-ICE
components:
  - drug_id: DRUG-RITUXIMAB
    dose: 375 mg/m²
    schedule: IV day 1
    route: IV
  - drug_id: DRUG-IFOSFAMIDE
    dose: 5000 mg/m² (with mesna)
    schedule: CI day 2
    route: IV
  - drug_id: DRUG-CARBOPLATIN
    dose: AUC 5 (max 800 mg)
    schedule: IV day 2
    route: IV
  - drug_id: DRUG-ETOPOSIDE
    dose: 100 mg/m²
    schedule: IV days 1-3
    route: IV
cycle_length_days: 14
total_cycles: 2-3 cycles → restage → autoSCT if chemosensitive
toxicity_profile: high
premedication:
  - Mesna for ifosfamide hemorrhagic cystitis prophylaxis
  - Antiemetics (5HT3 + dex + NK1)
  - G-CSF support
mandatory_supportive_care: []
monitoring_schedule_id: MON-RITUXIMAB-MONO
dose_adjustments:
  - condition: CrCl <60 mL/min
    modification: Reduce ifosfamide dose 25-50%; monitor for encephalopathy
    source_refs:
      - SRC-NCCN-BCELL-2025
  - condition: Grade ≥3 hematologic toxicity
    modification: Delay cycle; G-CSF mandatory; consider 25% dose reduction next cycle
    source_refs:
      - SRC-NCCN-BCELL-2025
ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: true
  notes: All components individually НСЗУ-available; autoSCT availability limited to specialized hematology centers in Ukraine.
sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-DLBCL-2024
last_reviewed: '2026-04-27'
notes: Standard salvage for chemosensitive r/r PMBCL. Rituximab + ICE × 2-3 cycles → response assessment (PET) → BEAM-conditioning autoSCT if PR/CR. ~50-60% achieve durable remission post-autoSCT. CAR-T (axi-cel/liso-cel) is alternative for chemorefractory or post-autoSCT relapse. Pembrolizumab also active in r/r PMBCL (KEYNOTE-170).
notes_ua: >-
  стандарт сальвадж for chemosensitive р/р PMBCL. ритуксимаб + ICE × 2-3 цикли → відповідь assessment (PET) → BEAM-conditioning аутоТГСК if PR/CR. ~50-60% achieve стійка ремісія post-аутоТГСК. CAR-T (axi-cel/liso-cel) is alternative for chemorefractory or post-аутоТГСК рецидив. пембролізумаб also active in р/р PMBCL (KEYNOTE-170).
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
