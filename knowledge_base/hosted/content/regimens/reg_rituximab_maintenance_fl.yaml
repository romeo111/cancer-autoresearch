id: REG-RITUXIMAB-MAINTENANCE-FL
name: Rituximab maintenance post-induction (PRIMA schedule)
name_ua: Підтримуюча терапія ритуксимабом після індукції (PRIMA)
alternate_names:
  - R-maintenance
  - PRIMA maintenance
components:
  - drug_id: DRUG-RITUXIMAB
    dose: 375 mg/m²
    schedule: IV every 8 weeks × 12 doses (≈2 years)
    route: IV
cycle_length_days: 56
total_cycles: 12 doses over 2 years
toxicity_profile: low
premedication:
  - Acetaminophen + diphenhydramine prior to each dose
mandatory_supportive_care: []
monitoring_schedule_id: MON-RITUXIMAB-MONO
dose_adjustments:
  - condition: ANC <1000 or active infection
    modification: Hold; resume on count recovery + infection control
    source_refs:
      - SRC-NCCN-BCELL-2025
  - condition: Severe hypogammaglobulinemia (<400 mg/dL) with recurrent infection
    modification: Discontinue maintenance; consider IVIG replacement
    source_refs:
      - SRC-NCCN-BCELL-2025
ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: true
  notes: Rituximab fully reimbursed via НСЗУ; biosimilars (Truxima, Ruxience) widely available.
sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-FL-2024
last_reviewed: '2026-04-27'
notes: 'PRIMA trial schedule (Salles 2011, Lancet): rituximab 375 mg/m² q8w × 2 years post-BR/R-CHOP induction. Median PFS extended ~3 years vs observation; OS impact unclear. PJP prophylaxis (cotrimoxazole) ≥6 mo after last dose; HBV reactivation surveillance throughout.'
notes_ua: >-
  PRIMA дослідження схема (Salles 2011, Lancet): ритуксимаб 375 mg/m² q8w × 2 years post-BR/R-CHOP індукція. медіана ВБП extended ~3 years vs observation; OS impact unclear. PJP prophylaxis (cotrimoxazole) ≥6 mo after last доза; HBV reactivation спостереження throughout.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
