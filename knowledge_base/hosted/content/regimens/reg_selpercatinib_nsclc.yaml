id: REG-SELPERCATINIB-NSCLC
name: "Selpercatinib monotherapy (LIBRETTO-001) — RET fusion+ NSCLC"
name_ua: "Селперкатиніб моно (LIBRETTO-001) — RET fusion+ НДРЛ"
alternate_names:
  - "Retevmo"
  - "LOXO-292"

components:
  - drug_id: DRUG-SELPERCATINIB
    dose: "160 mg PO BID with food (≥50 kg); 120 mg BID (<50 kg)"
    schedule: "Continuous"
    route: PO

cycle_length_days: 28
total_cycles: "Continuous until progression or unacceptable toxicity"
toxicity_profile: low-moderate

premedication: []
mandatory_supportive_care: []
monitoring_schedule_id: null

dose_adjustments:
  - condition: "Hypertension SBP ≥160 / DBP ≥100 despite optimal antihypertensive"
    modification: "Hold; restart at lower dose once SBP <140 / DBP <90"
    rationale: "Class effect ~40%"
    source_refs: [SRC-LIBRETTO001-DRILON-2020]
  - condition: "Hepatotoxicity ALT/AST >5× ULN OR bilirubin >3× ULN"
    modification: "Hold until recovery; resume lower dose; permanent discontinuation if recurs"
    rationale: "LFTs q2 weeks first 3 mo, monthly thereafter"
    source_refs: [SRC-LIBRETTO001-DRILON-2020]
  - condition: "QTc >500 ms"
    modification: "Hold; correct electrolytes; resume lower dose once QTc <470 ms"
  - condition: "Hemorrhage Grade ≥3"
    modification: "Hold; resume lower dose; permanent discontinuation if life-threatening"

ukraine_availability:
  all_components_registered: false
  all_components_reimbursed: false
  notes: >
    Selpercatinib NOT registered in UA. Access via Eli Lilly
    named-patient pathway (Retevmo / Retsevmo EAP — requires confirmed
    RET fusion / mutation NGS), cross-border (EU) per наказ МОЗ 988.

sources:
  - SRC-LIBRETTO001-DRILON-2020
  - SRC-NCCN-NSCLC-2025
  - SRC-ESMO-NSCLC-METASTATIC-2024

last_reviewed: "2026-04-27"
notes: >
  LIBRETTO-001 NSCLC: pretreated ORR 64% (mPFS 16.5 mo); TKI-naive
  ORR 85%; intracranial ORR 91%. FDA approval 2020 for RET-fusion+
  NSCLC any line. LIBRETTO-431 phase-3 vs platinum±pembrolizumab:
  PFS HR 0.46 confirmed 1L superiority. Pralsetinib (ARROW)
  alternative.
