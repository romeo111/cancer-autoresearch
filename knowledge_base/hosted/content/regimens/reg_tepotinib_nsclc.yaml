id: REG-TEPOTINIB-NSCLC
name: "Tepotinib monotherapy (VISION) — MET ex14 NSCLC"
name_ua: "Тепотініб моно (VISION) — MET ex14 НДРЛ"
alternate_names:
  - "Tepmetko"
  - "MSC2156119J"

components:
  - drug_id: DRUG-TEPOTINIB
    dose: "450 mg PO once daily with food"
    schedule: "Continuous"
    route: PO

cycle_length_days: 28
total_cycles: "Continuous until progression or unacceptable toxicity"
toxicity_profile: moderate

premedication: []
mandatory_supportive_care: []
monitoring_schedule_id: null

dose_adjustments:
  - condition: "Peripheral edema Grade ≥2"
    modification: "Diuretics + compression; reduce to 225 mg daily if persistent"
    rationale: "Edema in ~70% — class effect"
    source_refs: [SRC-VISION-PAIK-2020]
  - condition: "Hepatic transaminase elevation Grade ≥3"
    modification: "Hold; resume at lower dose"
    source_refs: [SRC-VISION-PAIK-2020]
  - condition: "ILD / pneumonitis any grade"
    modification: "Hold; permanent discontinuation Grade ≥3"

ukraine_availability:
  all_components_registered: false
  all_components_reimbursed: false
  notes: >
    Tepotinib NOT registered in UA. Access via Merck KGaA named-patient
    pathway, cross-border (EU), or clinical trial.

sources:
  - SRC-VISION-PAIK-2020
  - SRC-NCCN-NSCLC-2025
  - SRC-ESMO-NSCLC-METASTATIC-2024

last_reviewed: "2026-04-27"
notes: >
  VISION: combined cohort ORR 46% (1L 43%, pretreated 48%); mDOR
  11.1 mo. Once-daily oral — convenience advantage over capmatinib BID.
  Edema (~70%) most common AE.
