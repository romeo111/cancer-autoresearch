id: REG-AMIVANTAMAB-CHEMO
name: "Amivantamab + Carboplatin + Pemetrexed (NSCLC EGFR-mut post-osimertinib, MARIPOSA-2)"
name_ua: "Амівантамаб + Карбоплатин + Пеметрексед (НДРЛ EGFR-мут після осимертинібу, MARIPOSA-2)"
alternate_names:
  - "Ami-chemo"
  - "MARIPOSA-2 chemo arm"

components:
  - drug_id: DRUG-AMIVANTAMAB
    dose: "<80 kg: 1050 mg IV; ≥80 kg: 1400 mg IV (loading split D1/D2 of cycle 1, then weekly C1, then q3w from C2)"
    schedule: "Cycle 1 weekly (D1/D2 split, then D8, D15); cycle 2 onward day 1 of each 21-day cycle"
    route: IV
  - drug_id: DRUG-CARBOPLATIN
    dose: "AUC 5"
    schedule: "day 1 of each 21-day cycle × 4 cycles"
    route: IV
    duration: "4 cycles"
  - drug_id: DRUG-PEMETREXED
    dose: "500 mg/m² IV"
    schedule: "day 1 of each 21-day cycle; continue beyond 4 cycles as maintenance"
    route: IV

cycle_length_days: 21
total_cycles: "Carboplatin × 4 cycles; amivantamab + pemetrexed continue until progression / unacceptable toxicity"
toxicity_profile: severe

premedication:
  - "Amivantamab (cycle-1 day-1): IV dexamethasone 10-20 mg + diphenhydramine 25-50 mg + acetaminophen 650-1000 mg before infusion"
  - "Pemetrexed: folic acid 400-1000 µg PO daily (start 7d before, continue throughout) + vitamin B12 1000 µg IM q9w + dexamethasone 4 mg PO BID days -1, 0, +1"
  - "Carboplatin: standard antiemetic (5HT3 + dexamethasone)"
mandatory_supportive_care:
  - SUP-ANTIEMETIC-PREMED
monitoring_schedule_id:

dose_adjustments:
  - condition: "Severe infusion reaction to amivantamab IV"
    modification: "Switch to SC formulation (amivantamab-vmjw + hyaluronidase, ~5 min SC) — IRR rate ~13% SC vs ~65% IV"
    source_refs: [SRC-NCCN-NSCLC-2025]
  - condition: "ILD / pneumonitis G≥2"
    modification: "Hold amivantamab; CT chest + corticosteroids; permanent discontinuation if G≥3"
    source_refs: [SRC-NCCN-NSCLC-2025]
  - condition: "VTE (combined ami + chemo: ~10-15% rate)"
    modification: "Therapeutic anticoagulation; do not routinely discontinue amivantamab"
    rationale: "Prophylactic LMWH or DOAC for first 4 months recommended in MARIPOSA-2"
    source_refs: [SRC-NCCN-NSCLC-2025]
  - condition: "EGFR-class skin toxicity G≥2"
    modification: "Doxycycline 100 mg PO BID prophylactic; topical clindamycin + emollients; reduce ami if persistent G3"
  - condition: "CrCl <45 mL/min"
    modification: "Pemetrexed contraindicated (CrCl <45); carboplatin AUC dose-adjusted by Calvert formula"
    source_refs: [SRC-NCCN-NSCLC-2025]

ukraine_availability:
  all_components_registered: false
  all_components_reimbursed: false
  notes: "Амівантамаб НЕ зареєстрований в Україні (drlz.com.ua станом на 2026-04-27). Доступ — EAP J&J / cross-border (EU) / self-pay. Carboplatin + pemetrexed — реімбурсуються."

sources:
  - SRC-NCCN-NSCLC-2025
  - SRC-ESMO-NSCLC-METASTATIC-2024

last_reviewed: "2026-04-27"
reviewers: []
notes: >
  MARIPOSA-2 (Passaro 2024, Annals Oncol): amivantamab + carboplatin +
  pemetrexed (± lazertinib) vs carboplatin + pemetrexed in EGFR-mutant
  NSCLC progressing on osimertinib — mPFS 6.3 vs 4.2 mo (HR 0.48).
  Standard 3L (or 2L post-osi) for EGFR ex19del/L858R. SC ami strongly
  preferred from cycle 2 (PALOMA-3). VTE prophylaxis mandated when
  combined with lazertinib; consider for chemo combo as well per
  protocol (~10-15% VTE rate).
notes_ua: >
  MARIPOSA-2 (Passaro 2024, Annals Oncol): амівантамаб + карбоплатин +
  пеметрексед (± лазертиніб) vs карбоплатин + пеметрексед при
  EGFR-мутантному НДРЛ з прогресуванням на осимертинібі — mPFS 6.3 vs
  4.2 міс (HR 0.48). Стандарт 3L (або 2L після осі) для EGFR ex19del/L858R.
  ПК-форма ami переважна з циклу 2 (PALOMA-3). VTE-профілактика
  обов'язкова при комбінації з лазертинібом.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
