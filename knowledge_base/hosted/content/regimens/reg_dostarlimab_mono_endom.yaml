id: REG-DOSTARLIMAB-MONO-ENDOM
name: "Dostarlimab monotherapy (GARNET) — 2L+ dMMR endometrial"
name_ua: "Достарлімаб монотерапія (GARNET) — 2L+ dMMR ендометрій"
alternate_names: ["GARNET regimen", "Dostarlimab-mono endometrial"]

components:
  - drug_id: DRUG-DOSTARLIMAB
    dose: "500 mg IV q3w (cycles 1-4) then 1000 mg IV q6w (cycle 5+)"
    schedule: "IV per protocol — until progression / unacceptable toxicity / max 2 years"
    route: IV

cycle_length_days: 21
total_cycles: "Until progression / unacceptable toxicity / max ~2 years"
toxicity_profile: low

premedication: []
mandatory_supportive_care: []
monitoring_schedule_id:

dose_adjustments:
  - condition: "Grade 2 irAE"
    modification: "Hold + corticosteroids prednisone 0.5-1 mg/kg/d; resume when ≤Grade 1"
    source_refs: [SRC-NCCN-UTERINE-2025]
  - condition: "Grade 3-4 irAE"
    modification: "Permanently discontinue for most G3-4; high-dose steroids prednisone 1-2 mg/kg/d"
    source_refs: [SRC-NCCN-UTERINE-2025]

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: false
  notes: >
    Dostarlimab registered in Ukraine. NSZU 2026 onco package covers
    dostarlimab 1L for advanced/recurrent endometrial (RUBY); 2L+
    monotherapy use (GARNET) is also typically funded under same
    package since indication is endometrial-broad — verify per current
    NSZU protocol. Pembrolizumab is the labeled alternative for any
    MSI-H/dMMR solid tumor (KEYNOTE-158).

sources: [SRC-NCCN-UTERINE-2025, SRC-ESMO-ENDOMETRIAL-2022]
last_reviewed: "2026-04-26"

notes: >
  GARNET trial (Oaknin 2022): 2L+ recurrent/advanced dMMR endometrial
  post-platinum — dostarlimab monotherapy ORR 45% (single-arm),
  median DoR not reached (>16 mo), 2-year OS ~63%. FDA approved 2021
  for dMMR recurrent endometrial post-platinum. Pembrolizumab
  monotherapy is the parallel option (KEYNOTE-158 ORR ~57% in MSI-H
  endometrial). For dMMR patients who received ICI in 1L (RUBY/NRG-GY018),
  reuse in 2L is not standard — chemo or pembro+lenva is the alternative.
notes_ua: >
  GARNET дослідження (Oaknin 2022): 2L+ рецидивний/поширений dMMR endometrial post-platinum — dostarlimab монотерапія ORR 45% (single-arm), медіана DOR not reached (>16 міс.), 2-year OS ~63%. FDA схвалений 2021 for dMMR рецидивний endometrial post-platinum. пембролізумаб монотерапія is the parallel option (KEYNOTE-158 ORR ~57% in MSI-H endometrial). For dMMR patients who received ICI in 1L (RUBY/NRG-GY018), reuse in 2L is not стандарт — chemo or pembro+lenva is the alternative.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
