id: REG-REPOTRECTINIB-NSCLC
name: "Repotrectinib monotherapy (TRIDENT-1) — ROS1+ NSCLC (TKI-naive or post-prior ROS1-TKI)"
name_ua: "Репотректініб моно (TRIDENT-1) — ROS1+ НДРЛ (TKI-naive або після ROS1-TKI)"
alternate_names:
  - "Augtyro"
  - "TPX-0005"

components:
  - drug_id: DRUG-REPOTRECTINIB
    dose: "160 mg PO once daily x14 days, then 160 mg PO BID continuous (lead-in mitigates CNS-AE)"
    schedule: "Lead-in then continuous"
    route: PO

cycle_length_days: 28
total_cycles: "Continuous until progression or unacceptable toxicity"
toxicity_profile: moderate

premedication: []
mandatory_supportive_care: []
monitoring_schedule_id: null

dose_adjustments:
  - condition: "Vestibular / dizziness Grade ≥2"
    modification: "Maintain dose if tolerable; reduce to 120 mg BID if Grade 3 or persistent; usually adapts after 4-8 weeks"
    rationale: "Vestibular AE ~60% but usually transient with continued therapy"
    source_refs: [SRC-TRIDENT1-DRILON-2024]
  - condition: "Hepatic transaminase elevation Grade ≥3"
    modification: "Hold; resume at lower dose"
    source_refs: [SRC-TRIDENT1-DRILON-2024]
  - condition: "Skeletal fracture (long-term)"
    modification: "Bone density monitoring; bisphosphonate consideration"

ukraine_availability:
  all_components_registered: false
  all_components_reimbursed: false
  notes: >
    Repotrectinib NOT registered in UA. Access via BMS named-patient
    pathway (Augtyro EAP), cross-border (EU), or clinical trial.

sources:
  - SRC-TRIDENT1-DRILON-2024
  - SRC-NCCN-NSCLC-2025
  - SRC-ESMO-NSCLC-METASTATIC-2024

last_reviewed: "2026-04-27"
notes: >
  TRIDENT-1: ROS1 TKI-naive ORR 79% (mDOR 34.1 mo); post-1 ROS1-TKI
  ORR 38% incl. G2032R subset; intracranial ORR 89% TKI-naive.
  FDA approval 2023 for ROS1+ NSCLC any line. Lead-in dosing critical
  to manage CNS-AE — direct BID without ramp significantly worsens
  vestibular toxicity.
