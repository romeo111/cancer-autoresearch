id: REG-BEXAROTENE-MONO-CTCL
name: "Bexarotene PO monotherapy for CTCL (300 mg/m² daily, continuous)"
name_ua: "Бексаротен PO монотерапія для CTCL (300 mg/m² щодня, безперервно)"
alternate_names: ["Bexarotene mono", "Targretin mono"]

components:
  - drug_id: DRUG-BEXAROTENE
    dose: "300 mg/m² PO once daily with meal"
    schedule: "PO daily, continuous; reduce to 200 mg/m² if Grade ≥3 toxicity"
    route: PO

cycle_length_days: 28
total_cycles: "Continuous until progression / unacceptable toxicity; can transition to maintenance dose 75-150 mg/m²"
toxicity_profile: moderate

premedication:
  - "Initiate atorvastatin 10-20 mg PO daily OR fenofibrate prophylaxis BEFORE first dose"
  - "Baseline fasting lipid panel + TSH + free T4 + LFT + CBC"
  - "Pregnancy test (women of childbearing potential) + dual contraception confirmation"
mandatory_supportive_care: []
monitoring_schedule_id:

dose_adjustments:
  - condition: "Triglycerides >400 mg/dL despite statin/fibrate"
    modification: "Hold or reduce dose; intensify lipid-lowering; consider omega-3"
    source_refs: [SRC-NCCN-BCELL-2025]
  - condition: "Central hypothyroidism (low free T4 with low/normal TSH)"
    modification: "Initiate levothyroxine; do not adjust bexarotene dose for hypothyroidism alone"
  - condition: "Grade ≥3 leukopenia"
    modification: "Hold; resume at 200 mg/m² when ANC ≥1.0"
  - condition: "ALT/AST >3× ULN"
    modification: "Hold; reassess in 2 weeks; resume at lower dose if normalized"
  - condition: "Concurrent gemfibrozil"
    modification: "Avoid combination — gemfibrozil markedly increases bexarotene levels"

ukraine_availability:
  all_components_registered: false
  all_components_reimbursed: false
  notes: >
    Bexarotene not registered in Ukraine; access via international
    supply / named-patient pathway only. Topical 1% gel sometimes
    accessible via compounding for limited disease.

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-CTCL-2024

last_reviewed: "2026-04-27"
notes: >
  Duvic 2001 (Arch Dermatol) — ORR 45-55% in r/r CTCL. Triglyceride
  and thyroid management are dominant practical concerns; statin/
  fibrate prophylaxis effectively recommended from day 1. Suitable
  for both 2L (active disease control) and maintenance settings.
  Topical gel formulation useful for limited skin involvement.
notes_ua: >
  Duvic 2001 (Arch Dermatol) — ORR 45-55% in р/р CTCL. Triglyceride and thyroid management are dominant practical concerns; statin/ fibrate prophylaxis effectively рекомендований from day 1. Suitable for both 2L (active контроль хвороби) and підтримка settings. Topical gel formulation useful for limited skin involvement.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
