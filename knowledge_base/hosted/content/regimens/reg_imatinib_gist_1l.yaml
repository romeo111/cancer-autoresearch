id: REG-IMATINIB-GIST-1L
name: "Imatinib (GIST advanced/metastatic 1L; KIT/PDGFRA imatinib-sensitive)"
name_ua: "Іматиніб (GIST поширений/метастатичний 1L; KIT/PDGFRA чутливі)"
alternate_names:
  - "Imatinib 400 GIST"
  - "Glivec/Gleevec GIST 1L"
  - "B2222 regimen"

components:
  - drug_id: DRUG-IMATINIB
    dose: "400 mg PO once daily with food + large glass of water (KIT exon 11; PDGFRA non-D842V exon 18; PDGFRA exon 12/14)"
    schedule: "Continuous, until progression or unacceptable toxicity"
    route: PO

cycle_length_days:
total_cycles: "Continuous in advanced/metastatic disease until progression; 3 yr (or 6 yr extended) in adjuvant high-risk resected disease per SSG-XVIII / SSG-XXII / PERSIST-5"

toxicity_profile: low

premedication:
  - "Take with meal (reduces GI upset)"
  - "Antiemetic only if needed early on"
mandatory_supportive_care: []
monitoring_schedule_id:

dose_adjustments:
  - condition: "KIT exon 9 mutation"
    modification: "Escalate to 400 mg PO BID (800 mg/day total) from start — superior PFS vs 400 mg in EORTC-62005 / S0033 meta-analysis"
    rationale: "Exon 9 mutants require higher exposure for KIT inhibition"
    source_refs:
      - SRC-NCCN-GIST-2025
  - condition: "Progression on 400 mg with KIT exon 11"
    modification: "Dose-escalate to 800 mg/day; if continued progression switch to sunitinib (2L) → regorafenib (3L) → ripretinib (4L)"
    rationale: "Secondary resistance from KIT exon 13/14 (ATP-binding) or 17/18 (activation loop) mutations"
    source_refs:
      - SRC-NCCN-GIST-2025
  - condition: "Severe toxicity (cytopenias gr ≥3, severe edema, severe muscle cramps)"
    modification: "Hold; resume 300 mg daily once recovered; switch TKI if intolerance recurs"
    rationale: "Toxicity management"
  - condition: "Hepatic dysfunction (transaminases >5× ULN, bilirubin >3× ULN)"
    modification: "Hold; resume at reduced dose with hepatology co-management"
    rationale: "Hepatotoxicity is recognized AE"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: true
  notes: "Imatinib generic widely НСЗУ-reimbursed including for KIT/PDGFRA-sensitive GIST per Реімбурсаційний пакет «Онкологія» 2026."

sources:
  - SRC-NCCN-GIST-2025
  - SRC-IRIS-OBRIEN-2003

last_reviewed: "2026-04-27"
notes: >
  Standard 1L for advanced / metastatic GIST with imatinib-sensitive
  genotype (KIT exon 11 ~50%; KIT exon 9 ~10% — escalate to 800 mg;
  PDGFRA non-D842V exon 18; PDGFRA exon 12/14). NOT effective in
  PDGFRA D842V (use avapritinib 1L) or in SDH-deficient KIT/PDGFRA-WT
  GIST. B2222 / Demetri NEJM 2002 ORR ~67%; long-term PFS ~24 mo
  exon 11 vs ~12 mo exon 9. Genotype testing prior to 1L is
  mandatory per NCCN.
notes_ua: >
  стандарт 1L for поширений / метастатичний GIST with іматиніб-sensitive генотип (KIT exon 11 ~50%; KIT exon 9 ~10% — інтенсифікувати to 800 mg; PDGFRA non-D842V exon 18; PDGFRA exon 12/14). NOT effective in PDGFRA D842V (use avapritinib 1L) or in SDH-deficient KIT/PDGFRA-WT GIST. B2222 / Demetri NEJM 2002 ORR ~67%; long-term PFS ~24 mo exon 11 проти ~12 mo exon 9. генотип testing prior to 1L is обов'язковий per NCCN.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
