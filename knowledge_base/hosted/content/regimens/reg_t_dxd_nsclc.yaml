id: REG-T-DXD-NSCLC
name: "Trastuzumab deruxtecan (DESTINY-Lung01/02) — HER2-mutant NSCLC 2L+"
name_ua: "Трастузумаб дерукстекан (DESTINY-Lung01/02) — HER2-мутантний НДРЛ 2L+"
alternate_names:
  - "Enhertu"
  - "T-DXd"
  - "DS-8201"

components:
  - drug_id: DRUG-TRASTUZUMAB-DERUXTECAN
    dose: "5.4 mg/kg IV"
    schedule: "Day 1 of every 21-day cycle"
    route: IV

cycle_length_days: 21
total_cycles: "Continuous until progression or unacceptable toxicity"
toxicity_profile: moderate-severe

premedication:
  - "Antiemetic prophylaxis (high emetogenicity): NK1 + 5-HT3 + dexamethasone day 1, dexamethasone PO days 2-3"
mandatory_supportive_care:
  - SUP-GCSF-NEUTROPENIA  # G-CSF if febrile neutropenia history
monitoring_schedule_id: null

dose_adjustments:
  - condition: "Interstitial lung disease / pneumonitis any grade"
    modification: "Hold immediately; baseline + monthly CT chest; corticosteroids; permanent discontinuation Grade ≥2 (boxed warning ~12% incidence, ~3% G≥3, ~1% fatal)"
    rationale: "ILD is the dose-limiting and life-threatening AE"
    source_refs: [SRC-DESTINYLUNG02-GOTO-2023, SRC-DESTINYLUNG01-LI-2022]
  - condition: "Cardiomyopathy / LVEF decline >10% to <50%"
    modification: "Hold; cardiology consult; resume if LVEF recovers"
    source_refs: [SRC-DESTINYLUNG02-GOTO-2023]
  - condition: "Grade 4 neutropenia OR febrile neutropenia"
    modification: "Hold until recovery; G-CSF prophylaxis; reduce to 4.4 mg/kg if recurrent"
  - condition: "Severe nausea/vomiting despite premed"
    modification: "Add olanzapine; hospitalize for hydration if Grade 3"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: false
  notes: >
    T-DXd registered in UA and reimbursed via НСЗУ for HER2+ AND
    HER2-low metastatic breast cancer indications (DESTINY-Breast03 /
    -04). NSCLC HER2-mut indication NOT covered by НСЗУ (off-label by
    payer); funding required via charity / out-of-pocket / DEC special
    permit pathway citing FDA / EMA NSCLC label. Drug is physically
    available in UA — administrative pathway is the gate, not import.

sources:
  - SRC-DESTINYLUNG02-GOTO-2023
  - SRC-DESTINYLUNG01-LI-2022
  - SRC-NCCN-NSCLC-2025
  - SRC-ESMO-NSCLC-METASTATIC-2024

last_reviewed: "2026-04-27"
notes: >
  DESTINY-Lung01 (Li 2022): T-DXd 6.4 mg/kg ORR 55%, mPFS 8.2 mo,
  mOS 17.8 mo in pretreated HER2-mut NSCLC. DESTINY-Lung02 (Goto 2023):
  randomized 5.4 vs 6.4 mg/kg → 5.4 mg/kg ORR 49%, mPFS 9.9 mo, mOS
  19.5 mo, with substantially less pneumonitis. 5.4 mg/kg is now the
  label dose. Boxed pneumonitis warning + LVEF monitoring mandatory.
