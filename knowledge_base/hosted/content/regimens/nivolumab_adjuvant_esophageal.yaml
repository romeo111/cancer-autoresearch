notes: >
  CheckMate-577: post-CROSS-CRT-then-esophagectomy patients with
  residual ypT+ or ypN+ (no pCR) — adjuvant nivolumab × 1 year doubled
  DFS (22 vs 11 mo). Both adeno + squamous benefit. Initiation within
  4-16 weeks post-surgery per protocol.
