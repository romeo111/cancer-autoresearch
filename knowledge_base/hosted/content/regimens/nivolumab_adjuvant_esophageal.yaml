  CheckMate-577: post-CROSS-CRT-then-esophagectomy patients with residual ypT+ or ypN+ (ні pCR) — ад'ювантний ніволумаб × 1 year doubled DFS (22 проти 11 міс.). Both adeno + squamous виграш. Initiation within 4-16 weeks post-surgery per protocol.
