id: REG-VRD
name: "Bortezomib + Lenalidomide + Dexamethasone (VRd), 4-6 induction cycles"
name_ua: "Бортезоміб + Леналідомід + Дексаметазон (VRd), 4-6 циклів індукції"
alternate_names:
  - "VRd"
  - "RVd"
  - "Velcade-Revlimid-Dex"

components:
  - drug_id: DRUG-BORTEZOMIB
    dose: "1.3 mg/m²"
    schedule: "SC days 1, 8, 15 of each 28-day cycle (weekly schedule for induction)"
    route: SC
  - drug_id: DRUG-LENALIDOMIDE
    dose: "25 mg"
    schedule: "PO days 1-21 of each 28-day cycle"
    route: PO
  - drug_id: DRUG-DEXAMETHASONE
    dose: "40 mg (20 mg if age >75 or frail)"
    schedule: "PO days 1, 8, 15, 22 of each 28-day cycle"
    route: PO

cycle_length_days: 28
total_cycles: "4 cycles before stem-cell harvest (transplant-eligible) OR 8-12 cycles total (transplant-ineligible)"

toxicity_profile: moderate

premedication:
  - "Acyclovir 400 mg PO BID throughout proteasome inhibitor therapy (HSV/VZV prophylaxis)"
  - "Aspirin 81-100 mg PO daily for VTE prophylaxis (LMWH if higher VTE risk)"
mandatory_supportive_care:
  - SUP-HSV-PROPHYLAXIS
  - SUP-MM-VTE-PROPHYLAXIS
  - SUP-MM-BONE-PROTECTION
monitoring_schedule_id: MON-VRD-REGIMEN

dose_adjustments:
  - condition: "CrCl 30-60 mL/min"
    modification: "Lenalidomide 10 mg daily; bortezomib unchanged; dexamethasone unchanged"
    rationale: "Lenalidomide ~80% renally cleared; reduced dose preserves efficacy and limits toxicity"
    source_refs:
      - SRC-NCCN-MM-2025
  - condition: "CrCl <30 mL/min (no dialysis)"
    modification: "Lenalidomide 15 mg every other day; consider bortezomib unchanged with monitoring"
    rationale: "Major exposure increase with CrCl <30; dose reduction mandatory"
    source_refs:
      - SRC-NCCN-MM-2025
  - condition: "Age >75 OR frail (IMWG frailty score ≥2)"
    modification: "Dexamethasone 20 mg weekly; consider lenalidomide 15-20 mg"
    rationale: "Reduces steroid toxicity (infection, hyperglycemia, falls) without compromising efficacy in elderly/frail"
    source_refs:
      - SRC-NCCN-MM-2025
  - condition: "Grade ≥2 peripheral neuropathy"
    modification: "Reduce bortezomib to 1.0 mg/m² OR switch to weekly schedule (already done in this regimen)"
    rationale: "Neuropathy is dose-limiting and often permanent if not managed early"
  - condition: "Platelets <50K or ANC <1000 at cycle start"
    modification: "Hold lenalidomide ± bortezomib until recovery; consider G-CSF"
    rationale: "Cumulative myelosuppression"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: true
  notes: "Bortezomib, lenalidomide, dexamethasone all reimbursed via НСЗУ for myeloma indication"

sources:
  - SRC-NCCN-MM-2025

last_reviewed: "2026-04-25"
notes: >
  Standard 1L induction regimen for transplant-eligible MM (4 cycles
  before harvest, then ASCT, then 2 cycles consolidation, then
  lenalidomide maintenance). For transplant-ineligible patients, VRd-lite
  (8-12 cycles, modified dosing per SWOG S0777) is the preferred 1L
  triplet. Standard-risk cytogenetics → VRd; high-risk → escalate to
  D-VRd (REG-DARA-VRD).
notes_ua: >
  стандарт 1L індукція схема for придатний до трансплантації MM (4 цикли before harvest, then ASCT, then 2 цикли консолідація, then леналідомід підтримка). For непридатний до трансплантації patients, VRd-lite (8-12 цикли, modified дозування per SWOG S0777) is the переважний 1L триплет. стандартного ризику cytogenetics → VRd; високого ризику → інтенсифікувати to D-VRd (REG-DARA-VRD).
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
