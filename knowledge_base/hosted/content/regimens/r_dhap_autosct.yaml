id: REG-MCL-INTENSIVE-RDHAP-AUTOSCT
name: "Intensive 1L MCL: alternating R-CHOP / R-DHAP × 6 cycles + autoSCT consolidation + R maintenance"
name_ua: "Інтенсивна 1L MCL: альтернація R-CHOP / R-DHAP × 6 циклів + autoSCT + R-підтримка"
alternate_names: ["Nordic regimen", "MCL Younger", "R-DHAP/R-CHOP alternating"]

components:
  - drug_id: DRUG-RITUXIMAB
    dose: "375 mg/m²"
    schedule: "IV day 1 each cycle (R-CHOP + R-DHAP)"
    route: IV
  - drug_id: DRUG-CYCLOPHOSPHAMIDE
    dose: "750 mg/m²"
    schedule: "IV day 1 of R-CHOP cycles only"
    route: IV
  - drug_id: DRUG-DOXORUBICIN
    dose: "50 mg/m²"
    schedule: "IV day 1 of R-CHOP cycles only"
    route: IV
  - drug_id: DRUG-VINCRISTINE
    dose: "1.4 mg/m² (cap 2 mg)"
    schedule: "IV day 1 of R-CHOP cycles only"
    route: IV
  - drug_id: DRUG-PREDNISONE
    dose: "100 mg"
    schedule: "PO days 1-5 of R-CHOP cycles"
    route: PO
  - drug_id: DRUG-DEXAMETHASONE
    dose: "40 mg"
    schedule: "IV days 1-4 of R-DHAP cycles only"
    route: IV
  - drug_id: DRUG-CYTARABINE
    dose: "2 g/m² q12h"
    schedule: "IV day 2 of R-DHAP cycles (HiDAC component)"
    route: IV

cycle_length_days: 21
total_cycles: "6 alternating (3 R-CHOP + 3 R-DHAP), then BEAM/CBV-conditioned autoSCT, then R maintenance every 2 mo × 3 years"
toxicity_profile: high

premedication:
  - "Standard R-CHOP premedications + cytarabine eye drops + cerebellar exam pre each HiDAC"
mandatory_supportive_care:
  - SUP-PJP-PROPHYLAXIS
  - SUP-TLS-PROPHYLAXIS
  - SUP-ANTIEMETIC-PREMED
monitoring_schedule_id: MON-R-CHOP-REGIMEN

dose_adjustments:
  - condition: "Age >65 OR ECOG ≥2 at start"
    modification: "Generally NOT eligible — route to BTKi-based (REG-ACALABRUTINIB-RITUXIMAB)"
    rationale: "Tolerability of HiDAC drops sharply with age/frailty"
    source_refs: [SRC-NCCN-BCELL-2025]
  - condition: "Renal impairment CrCl <60"
    modification: "Reduce cytarabine; consider non-HiDAC arm only"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: true
  notes: "All R-CHOP + R-DHAP components reimbursed via НСЗУ; autoSCT performed at major hematology centers"

sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
notes: >
  Standard 1L for fit transplant-eligible MCL (age <65, ECOG 0-1).
  Nordic protocol or LYMA-style. Major contribution: HiDAC + autoSCT
  consolidation + R maintenance dramatically improved PFS (median
  >7-8 years vs ~3 years on R-CHOP alone). Cardiotoxicity risk +
  cumulative HiDAC toxicity — fitness selection critical.
notes_ua: >
  стандарт 1L for fit придатний до трансплантації MCL (age <65, ECOG 0-1). Nordic protocol or LYMA-style. Major contribution: HiDAC + аутоТГСК консолідація + R підтримка dramatically покращений PFS (медіана >7-8 years vs ~3 years on R-CHOP alone). кардіотоксичність risk + cumulative HiDAC токсичність — fitness selection critical.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
