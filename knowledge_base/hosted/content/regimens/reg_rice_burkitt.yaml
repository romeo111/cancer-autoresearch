id: REG-RICE-BURKITT
name: "R-ICE (Rituximab + Ifosfamide + Carboplatin + Etoposide) × 2-3 cycles → ASCT in CR2 (r/r Burkitt salvage)"
name_ua: "R-ICE × 2-3 циклів → ASCT в CR2 (рятувальна терапія рефрактерної Беркітта)"
alternate_names: ["R-ICE Burkitt salvage", "R-ICE-ASCT"]

components: []  # phases supersede; kept empty for back-compat with downstream
                # consumers that still iterate `components` directly. PR3 of
                # regimen-phases-refactor — see plan-doc 2026-04-28 §4 + §5.

phases:
  - name: salvage_induction
    purpose_ua: "сальвадж-індукція R-ICE × 2-3 цикли — іфосфамід + карбоплатин + етопозид з ритуксимабом для рефрактерної/рецидивної Беркітт-лімфоми перед ASCT"
    purpose_en: "salvage induction R-ICE × 2-3 cycles — ifosfamide + carboplatin + etoposide with rituximab for r/r Burkitt before ASCT"
    duration: "2-3 cycles × 14 days each"
    timing_relative_to: "absolute"
    optional: false
    components:
      - drug_id: DRUG-RITUXIMAB
        dose: "375 mg/m²"
        schedule: "IV day 1 of each 14-day cycle × 2-3"
        route: IV
      - drug_id: DRUG-IFOSFAMIDE
        dose: "5 g/m²"
        schedule: "IV continuous 24h day 2; mesna co-administration"
        route: IV
      - drug_id: DRUG-CARBOPLATIN
        dose: "AUC 5 (max 800 mg)"
        schedule: "IV day 2"
        route: IV
      - drug_id: DRUG-ETOPOSIDE
        dose: "100 mg/m²"
        schedule: "IV days 1-3"
        route: IV
      - drug_id: DRUG-METHOTREXATE
        dose: "12 mg IT"
        schedule: "IT each cycle (CNS prophylaxis / treatment)"
        route: IT
    sources:
      - SRC-NCCN-BCELL-2025
      - SRC-ESMO-BURKITT-2024
  - name: consolidation_autosct
    purpose_ua: "консолідація BEAM-кондиціонованою ASCT після PET-CR2 на сальвадж-індукцію (або алоТКМ при рефрактерності)"
    purpose_en: "consolidation with BEAM-conditioned ASCT after PET-CR2 to salvage induction (or alloSCT for refractory cases)"
    duration: "single transplant procedure (post PET-CT restaging)"
    timing_relative_to: "previous_phase_completion"
    optional: false
    components: []  # BEAM-conditioned ASCT or alloSCT — institution-specific
                   # conditioning; not enumerated as drug components here
                   # (placeholder per plan-doc §5 Group C)
    sources:
      - SRC-NCCN-BCELL-2025
      - SRC-ESMO-BURKITT-2024

cycle_length_days: 14
total_cycles: "2-3 cycles induction → restage by PET-CT → BEAM-conditioned ASCT in CR2 (fit transplant-eligible) OR alloSCT (refractory after R-ICE)"
toxicity_profile: very-high

premedication:
  - "TLS prophylaxis MANDATORY (rasburicase 0.2 mg/kg IV daily × 5 days OR allopurinol 600 mg PO daily + IV hydration ≥3 L/day)"
  - "Mesna 100% дози ifosfamide — hemorrhagic cystitis prophylaxis"
  - "IV hydration aggressive (≥3 L/day) throughout"
  - "Standard rituximab premedications (especially first dose)"
  - "Antiemetic regimen + leucovorin rescue post IT MTX"
  - "Prophylactic G-CSF day 5"
mandatory_supportive_care:
  - SUP-PJP-PROPHYLAXIS
  - SUP-TLS-PROPHYLAXIS
  - SUP-GCSF-NEUTROPENIA
  - SUP-ANTIEMETIC-PREMED
  - SUP-HBV-PROPHYLAXIS
monitoring_schedule_id:

dose_adjustments:
  - condition: "CrCl 30-50 mL/min"
    modification: "Reduce ifosfamide 50%; carboplatin AUC 4"
    source_refs: [SRC-NCCN-BCELL-2025]
  - condition: "Prior anthracycline cumulative dose >450 mg/m²"
    modification: "ICE preferable over anthracycline-containing salvage (no anthracycline component) — historic salvage choice for this reason"
  - condition: "Age >65"
    modification: "Reduce all drugs 25-50%; weekly CBC monitoring; consider not pursuing ASCT consolidation"
  - condition: "Ifosfamide encephalopathy (altered mental status during infusion)"
    modification: "Discontinue ifosfamide infusion immediately; methylene blue 50 mg IV q4-6h × 24h treatable"
    rationale: "Ifosfamide neurotoxicity reversible but life-threatening if missed"
  - condition: "Hemorrhagic cystitis"
    modification: "Increase mesna and hydration; if severe, discontinue ifosfamide"
    rationale: "Mesna-without-ifosfamide is fatal omission"
  - condition: "Failure to achieve CR after 2 cycles R-ICE (PR or PD)"
    modification: "Consider switch to R-DHAP (cisplatin-based salvage, non-cross-resistant) → if CR, then ASCT"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: true
  notes: >
    All R-ICE components reimbursed via НСЗУ. ASCT consolidation
    performed at major hematology centers (capacity-limited but
    domestic). Rasburicase for TLS prophylaxis preferred over
    allopurinol in high-burden Burkitt — verify availability before
    starting cycle 1.

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-BURKITT-2024

last_reviewed: "2026-04-25"
notes: >
  R-ICE is established salvage for r/r aggressive B-cell NHL (DLBCL,
  Burkitt, transformed FL). For Burkitt specifically — extremely
  poor natural history at relapse (~3-6 mo OS), rapid intervention
  with CNS-active intensive salvage critical. CR2 with ASCT
  consolidation provides ~30-40% durable remission in fit younger
  r/r Burkitt; alloSCT preferred for primary-refractory or post-ASCT
  relapse. CNS-disease at relapse common — IT therapy mandatory
  + consider HD-MTX intensification. R-DHAP (cisplatin-based) is
  non-cross-resistant alternative if R-ICE fails. CAR-T (axi-cel
  ZUMA-7-like data) emerging for r/r aggressive B-NHL — not yet
  Burkitt-validated but mechanistically applicable.
notes_ua: >
  R-ICE is усталений сальвадж for р/р агресивний B-cell NHL (DLBCL, Burkitt, трансформований FL). For Burkitt зокрема — extremely poor natural history at рецидив (~3-6 mo OS), rapid intervention with CNS-active intensive сальвадж critical. CR2 with ASCT консолідація provides ~30-40% стійка ремісія in fit younger р/р Burkitt; алоТГСК переважний for primary-рефрактерний or post-ASCT рецидив. CNS-хвороба at рецидив поширений — IT терапія обов'язковий + consider HD-MTX intensification. R-DHAP (цисплатин-based) is non-cross-resistant alternative if R-ICE fails. CAR-T (axi-cel ZUMA-7-like дані) новий for р/р агресивний B-NHL — not yet Burkitt-validated but mechanistically applicable.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
