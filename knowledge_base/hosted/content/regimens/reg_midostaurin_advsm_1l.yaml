id: REG-MIDOSTAURIN-ADVSM-1L
name: "Midostaurin monotherapy (advanced systemic mastocytosis, 1L alternative; D816V- or avapritinib-contraindicated)"
name_ua: "Мідостаурин моно (поширений системний мастоцитоз, 1L альтернатива; D816V- або контрапоказаний аваприніб)"
alternate_names:
  - "Rydapt AdvSM"
  - "D-RIVE regimen"

components:
  - drug_id: DRUG-MIDOSTAURIN
    dose: "100 mg PO BID with food"
    schedule: "Continuous, until progression or unacceptable toxicity"
    route: PO

cycle_length_days: 28
total_cycles: "Continuous until progression"
toxicity_profile: moderate

premedication:
  - "Take with meal (improves bioavailability, mitigates GI toxicity)"
  - "Antiemetic prophylaxis (5HT3 antagonist) — nausea/vomiting often dose-limiting"
  - "Optimize anti-mediator therapy (H1/H2 blockers, montelukast) prior to start"
mandatory_supportive_care: []
monitoring_schedule_id:

dose_adjustments:
  - condition: "Severe nausea/vomiting (gr ≥3) despite optimal antiemetics"
    modification: "Reduce to 50 mg PO BID; if persistent, hold and resume at 50 mg BID after recovery"
    rationale: "Most common dose-limiting AE; ~30% require dose reduction"
    source_refs:
      - SRC-NCCN-SM-2025
  - condition: "QTc >500 ms"
    modification: "Hold; correct electrolytes; resume at lower dose once QTc <470 ms"
    rationale: "QT prolongation risk"
  - condition: "Pulmonary symptoms (cough, dyspnea, hypoxia)"
    modification: "Investigate for pneumonitis; hold if interstitial infiltrates; resume at lower dose only after resolution"
    rationale: "Pulmonary toxicity is recognized AE"
  - condition: "Severe cytopenias (ANC <0.5 ×10⁹/L OR platelets <25 ×10⁹/L)"
    modification: "Hold until recovery; resume at 50 mg BID"
    rationale: "Toxicity management — cytopenias common in advanced SM"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: true
  notes: "Midostaurin registered + НСЗУ-reimbursed (Реімбурсаційний пакет «Онкологія» 2026 covers ASM / SM-AHN / MCL indication). More accessible 1L than avapritinib in Ukraine."

sources:
  - SRC-NCCN-SM-2025

last_reviewed: "2026-04-27"
notes: >
  D-RIVE / CPKC412D2201 (Gotlib NEJM 2016): midostaurin 100 mg BID in
  advanced SM ORR ~28% (per modified Valent / Cheson criteria;
  ORR ~60% by IWG-MRT-ECNM-modified). Pre-avapritinib standard-of-care.
  Now alternative when avapritinib is contraindicated (platelets
  <50 ×10⁹/L, prior intracranial hemorrhage, cognitive concerns) or
  inaccessible, OR for the rare KIT D816V-NEGATIVE advanced SM where
  avapritinib lacks activity. Significant nausea/vomiting toxicity —
  ~30% require dose reduction. NB: imatinib is CONTRAINDICATED in
  KIT D816V (steric clash); imatinib is reserved for the rare D816V-
  negative variant FIP1L1-PDGFRA myeloid neoplasm with eosinophilia
  (separate WHO entity).
notes_ua: >
  D-RIVE / CPKC412D2201 (Gotlib NEJM 2016): мідостаурин 100 mg BID in поширений SM ORR ~28% (per modified Valent / Cheson criteria; ORR ~60% by IWG-MRT-ECNM-modified). Pre-avapritinib стандарт-of-care. Now alternative when avapritinib is протипоказаний (platelets <50 ×10⁹/L, prior intracranial hemorrhage, cognitive concerns) or inaccessible, OR for the рідкісний KIT D816V-NEGATIVE поширений SM where avapritinib lacks activity. Significant nausea/vomiting токсичність — ~30% require зниження дози. NB: іматиніб is протипоказаний in KIT D816V (steric clash); іматиніб is reserved for the рідкісний D816V- negative варіант FIP1L1-PDGFRA myeloid neoplasm with eosinophilia (separate WHO сутність).
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
