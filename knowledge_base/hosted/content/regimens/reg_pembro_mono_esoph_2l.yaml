id: REG-PEMBRO-MONO-ESOPH-2L
name: "Pembrolizumab monotherapy — 2L esophageal PD-L1 CPS ≥10 (KEYNOTE-181)"
name_ua: "Пембролізумаб монотерапія — 2L стравохід PD-L1 CPS ≥10 (KEYNOTE-181)"
alternate_names: ["KEYNOTE-181 regimen"]

components:
  - drug_id: DRUG-PEMBROLIZUMAB
    dose: "200 mg IV q3w OR 400 mg IV q6w"
    schedule: "IV until progression / unacceptable toxicity / max 35 cycles (~2 years)"
    route: IV

cycle_length_days: 21
total_cycles: "Until progression / unacceptable toxicity / max 35 cycles"

toxicity_profile: low
premedication: []
mandatory_supportive_care: []
monitoring_schedule_id: null

dose_adjustments:
  - condition: "Grade 2 irAE"
    modification: "Hold + corticosteroids; resume when ≤Grade 1"
    source_refs: [SRC-NCCN-ESOPHAGEAL-2025]
  - condition: "Grade 3-4 irAE"
    modification: "Permanently discontinue for most; high-dose steroids prednisone 1-2 mg/kg/d"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: false
  notes: "Pembrolizumab out-of-pocket / charitable / clinical-trial pathway in Ukraine; not NSZU-funded for esophageal."

sources: [SRC-NCCN-ESOPHAGEAL-2025, SRC-ESMO-ESOPHAGEAL-2024]
last_reviewed: "2026-04-26"

notes: >
  KEYNOTE-181 (Kojima 2020): 2L advanced esophageal carcinoma
  (squamous + adeno) post-fluoropyrimidine + platinum — pembrolizumab
  vs investigator's-choice chemo (paclitaxel/docetaxel/irinotecan).
  In PD-L1 CPS ≥10 subgroup: mOS 9.3 vs 6.7 mo (HR 0.69). Squamous
  histology subgroup also benefited regardless of CPS but CPS ≥10
  is the FDA-label / NCCN-preferred selection cutoff. Both adeno + ESCC
  histologies eligible if CPS ≥10. Pembrolizumab also has 1L role with
  chemo per KEYNOTE-590 — 2L use applies when 1L did not include ICI.
