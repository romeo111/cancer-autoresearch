id: REG-ROMIDEPSIN-PTCL
name: "Romidepsin IV days 1, 8, 15 q28d — r/r PTCL incl AITL"
name_ua: "Ромідепсин IV дні 1, 8, 15 кожні 28 днів — рефрактерна PTCL/AITL"
alternate_names: ["Romi mono", "Istodax r/r PTCL"]

components:
  - drug_id: DRUG-ROMIDEPSIN
    dose: "14 mg/m² IV over 4 hours"
    schedule: "Days 1, 8, 15 of each 28-day cycle, until progression or unacceptable toxicity"
    route: IV

cycle_length_days: 28
total_cycles: "Until progression or unacceptable toxicity (response-driven)"
toxicity_profile: moderate

premedication:
  - "5-HT3 antagonist + dexamethasone before each infusion"
  - "K + Mg replacement to upper-normal range pre-infusion (QTc minimization)"
  - "TLS prophylaxis cycle 1 if high-burden"
mandatory_supportive_care:
  - SUP-PJP-PROPHYLAXIS
  - SUP-TLS-PROPHYLAXIS
  - SUP-ANTIEMETIC-PREMED
monitoring_schedule_id:

dose_adjustments:
  - condition: "Platelets <50K OR ANC <500"
    modification: "Hold; resume at same dose after recovery; if recurrent, reduce to 10 mg/m²"
    source_refs: [SRC-NCCN-BCELL-2025]
  - condition: "QTc >500 ms OR baseline >480 ms"
    modification: "Hold; correct K/Mg to upper normal range; cardiology consult; resume after QTc <480 ms"
    source_refs: [SRC-NCCN-BCELL-2025]
  - condition: "Bilirubin >1.5× ULN OR transaminases >3× ULN"
    modification: "Hold; reduce dose 25% on resume"
  - condition: "Concomitant strong CYP3A inhibitor"
    modification: "Reduce romidepsin to 10 mg/m² OR avoid concurrent inhibitor"
  - condition: "Concomitant warfarin"
    modification: "Increase INR monitoring frequency; expect INR rise"

ukraine_availability:
  all_components_registered: false
  all_components_reimbursed: false
  notes: >
    Romidepsin NOT registered in Ukraine. Access via international
    supply / clinical trial. NCCN-listed for r/r PTCL despite FDA
    PTCL indication withdrawal 2021 (CTCL indication retained).
    Particularly active in AITL — TFH-cell origin + TET2/IDH2/DNMT3A
    epigenetic dependence supports HDAC mechanism.

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-PTCL-2024

last_reviewed: "2026-04-25"
notes: >
  Coiffier 2012 (NCI 1312): r/r PTCL — ORR 25%, CR 15%, mDOR 17 mo.
  AITL subset response higher (~33%) than PTCL NOS (~25%). FDA
  approved for r/r PTCL 2011, voluntarily withdrew PTCL indication
  2021 after Ro-CHOEP confirmatory trial showed no PFS benefit over
  CHOP in 1L. Romidepsin retains FDA CTCL indication (2009 approval).
  NCCN continues to list for r/r PTCL after benefit-risk discussion.
  ECG ST/T changes during infusion are typically benign — distinguish
  from ischemic changes via baseline + serial ECGs.
notes_ua: >
  Coiffier 2012 (NCI 1312): р/р PTCL — ORR 25%, CR 15%, mDOR 17 mo. AITL subset відповідь higher (~33%) than PTCL NOS (~25%). FDA схвалений для р/р PTCL 2011, voluntarily withdrew PTCL показання 2021 after Ro-CHOEP confirmatory дослідження showed ні PFS виграш over CHOP in 1L. Romidepsin retains FDA CTCL показання (2009 схвалення). NCCN continues to list for р/р PTCL after виграш-risk discussion. ECG ST/T changes during infusion are типово доброякісний — distinguish from ischemic changes via базове + serial ECGs.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
