id: REG-AVAPRITINIB-GIST-1L
name: "Avapritinib monotherapy (GIST advanced/metastatic 1L; PDGFRA D842V)"
name_ua: "Аваприніб моно (GIST поширений/метастатичний 1L; PDGFRA D842V)"
alternate_names:
  - "Ayvakit GIST"
  - "NAVIGATOR regimen"
  - "VOYAGER regimen"

components:
  - drug_id: DRUG-AVAPRITINIB
    dose: "300 mg PO once daily on empty stomach (≥1 h before / ≥2 h after food)"
    schedule: "Continuous, until progression or unacceptable toxicity"
    route: PO

cycle_length_days: 28
total_cycles: "Continuous until progression"
toxicity_profile: moderate

premedication:
  - "Empty stomach administration — confirm fasting status"
mandatory_supportive_care: []
monitoring_schedule_id:

dose_adjustments:
  - condition: "Cognitive effects (memory, confusion, mood changes) gr ≥2"
    modification: "Hold until ≤gr 1, resume at 200 mg; permanently discontinue if recurs at 200 mg"
    rationale: "Cognitive toxicity is dose-related; PATHFINDER 200 mg dose has lower frequency"
    source_refs:
      - SRC-NCCN-GIST-2025
  - condition: "Intracranial hemorrhage / cerebral microbleed on MRI"
    modification: "Permanently discontinue"
    rationale: "Black box warning; class effect of selective KIT/PDGFRA inhibitors"
    source_refs:
      - SRC-NCCN-GIST-2025
  - condition: "Severe cytopenias (ANC <1.0 ×10⁹/L, platelets <50 ×10⁹/L)"
    modification: "Hold until recovery; resume at 200 mg"
    rationale: "Toxicity management"

ukraine_availability:
  all_components_registered: false
  all_components_reimbursed: false
  notes: "Avapritinib NOT registered in Ukraine. Access via DEC named-patient import or Blueprint Medicines EAP (PDGFRA D842V or KIT D816V documented). Cross-border (EU SoC) is realistic alt route."

sources:
  - SRC-NCCN-GIST-2025
  - SRC-ONCOKB

last_reviewed: "2026-04-27"
notes: >
  PDGFRA D842V is imatinib-RESISTANT — kinase-domain steric clash. Pre-
  avapritinib these patients had no targeted option (~5% PFS at
  6 mo on imatinib). NAVIGATOR (Heinrich 2020) ORR ~88% in PDGFRA D842V
  GIST. VOYAGER confirmed activity in later lines. Avapritinib is NOT
  preferred over imatinib in non-D842V GIST (BLU-285 / VOYAGER 4L
  comparison in unselected GIST did not beat regorafenib).
  Genotype-restricted indication.
notes_ua: >
  PDGFRA D842V is іматиніб-RESISTANT — kinase-domain steric clash. Pre- avapritinib these patients had ні targeted option (~5% PFS at 6 mo on іматиніб). NAVIGATOR (Heinrich 2020) ORR ~88% in PDGFRA D842V GIST. VOYAGER confirmed activity in later lines. Avapritinib is NOT переважний over іматиніб in non-D842V GIST (BLU-285 / VOYAGER 4L comparison in unselected GIST did not beat регорафеніб). генотип-restricted показання.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
