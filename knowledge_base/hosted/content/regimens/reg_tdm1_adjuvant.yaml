id: REG-TDM1-ADJUVANT
name: "T-DM1 adjuvant (HER2+ residual disease post-neoadjuvant)"
name_ua: "T-DM1 ад'ювантно (HER2+ резидуальне після неоад'юванту)"
alternate_names: ["KATHERINE regimen"]

components:
  - drug_id: DRUG-TRASTUZUMAB-EMTANSINE
    dose: "3.6 mg/kg IV"
    schedule: "Day 1 of 21-day cycle x 14 cycles"
    route: IV

cycle_length_days: 21
total_cycles: "14"
toxicity_profile: moderate

premedication: []
mandatory_supportive_care:
  - SUP-BONE-HEALTH-PROSTATE
monitoring_schedule_id:

dose_adjustments:
  - condition: "Platelet count <50,000/µL"
    modification: "Hold; resume at lower dose level"
  - condition: "ALT/AST >3x ULN OR bilirubin >1.5x ULN"
    modification: "Hold; resume after normalization"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: false
  notes: "Registered; adjuvant reimbursement gap. Out-of-pocket; high-cost barrier."

sources: [SRC-NCCN-BREAST-2025, SRC-ESMO-BREAST-EARLY-2024]
last_reviewed:
notes: >
  KATHERINE: T-DM1 superior to trastuzumab in adjuvant residual disease
  after neoadjuvant HER2+ therapy (50% reduction in iDFS events). Now
  standard for any residual ypT+ or ypN+ post-neoadj HER2+.
notes_ua: >
  KATHERINE: T-DM1 перевершує трастузумаб in ад'ювантний residual хвороба after неоад'ювантний HER2+ терапія (50% зниження in iDFS events). Now стандарт for any residual ypT+ or ypN+ post-neoadj HER2+.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
