id: REG-RITUXIMAB-MAINTENANCE-PTLD
name: "Rituximab maintenance after EBV+ B-PTLD response (PTLD-1 sequential approach)"
name_ua: "Ритуксимаб підтримка після відповіді EBV+ B-PTLD (послідовний підхід PTLD-1)"
alternate_names: ["R-maintenance PTLD", "PTLD-1 sequential maintenance"]

components:
  - drug_id: DRUG-RITUXIMAB
    dose: "375 mg/m²"
    schedule: "IV every 3 weeks × 4 doses (sequential consolidation per PTLD-1 trial); OR every 2 months × 8 doses for extended maintenance in selected high-risk patients"
    route: IV

cycle_length_days: 21
total_cycles: "4 doses (PTLD-1 standard) or up to 8 doses (extended high-risk)"
toxicity_profile: low

premedication:
  - "Antihistamine + acetaminophen + IV steroid before each dose"
  - "Continue HBV prophylaxis (entecavir / TDF) if HBsAg+ or anti-HBc+"
mandatory_supportive_care:
  - SUP-PJP-PROPHYLAXIS  # transplant + rituximab additive immunosuppression
  - SUP-HBV-PROPHYLAXIS
monitoring_schedule_id:

dose_adjustments:
  - condition: "Severe infusion reaction"
    modification: "Slow infusion rate; if anaphylactoid → discontinue"
    source_refs: [SRC-NCCN-BCELL-2025]
  - condition: "ANC <1000"
    modification: "Hold dose; resume when recovered"
  - condition: "Active CMV / EBV reactivation"
    modification: "Hold; pre-emptive antiviral; resume after viral load clears"
  - condition: "Graft rejection during maintenance"
    modification: "Hold; coordinate with transplant team for IS adjustment"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: true
  notes: >
    Rituximab fully reimbursed via НСЗУ for B-cell lymphoma indications;
    PTLD use covered as monomorphic B-PTLD or polymorphic CD20+ PTLD.

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-DLBCL-2024

last_reviewed: "2026-04-27"
notes: >
  Trappe 2017 (PTLD-1, JCO) — sequential rituximab × 4 then risk-
  adapted CHOP × 4 for low-risk responders; rituximab consolidation
  (continued q3w × 4 after initial 4 induction doses) became part
  of standard PTLD-1 schedule for CD20+ B-PTLD CR/PR responders to
  initial rituximab. Reduces relapse rate and avoids chemotherapy in
  rituximab-only responders. Continue HBV antiviral prophylaxis 12
  months post-rituximab. Coordinate with transplant team throughout —
  IS modulation continues in parallel.
notes_ua: >
  Trappe 2017 (PTLD-1, JCO) — sequential ритуксимаб × 4 then risk- adapted CHOP × 4 for низького ризику responders; ритуксимаб консолідація (continued q3w × 4 after initial 4 індукція doses) became part of стандарт PTLD-1 схема for CD20+ B-PTLD CR/PR responders to initial ритуксимаб. зменшує рецидив rate and avoids хіміотерапія in ритуксимаб-only responders. Continue HBV antiviral prophylaxis 12 months post-ритуксимаб. Coordinate with transplant team throughout — IS modulation continues in parallel.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
