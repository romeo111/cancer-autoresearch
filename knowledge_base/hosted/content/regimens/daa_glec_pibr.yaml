id: REG-DAA-GLEC-PIBR
name: "Glecaprevir/Pibrentasvir 8 weeks (treatment-naive non-cirrhotic)"
name_ua: "Глекапревір/Пібрентасвір 8 тижнів"
alternate_names:
  - "G/P 8w"
  - "Mavyret 8w"

components:
  - drug_id: DRUG-GLECAPREVIR-PIBRENTASVIR
    dose: "300/120 mg PO (3 tablets)"
    schedule: "once daily with food"
    route: PO
    duration: "8 weeks (12 weeks if compensated cirrhosis)"

cycle_length_days: 56
total_cycles: "1 (continuous 8-week course)"

toxicity_profile: low

dose_adjustments:
  - condition: "Compensated cirrhosis (Child-Pugh A)"
    modification: "Extend to 12 weeks"
    rationale: "EASL 2023 — fibrosis prolongs duration"
    source_refs:
      - SRC-EASL-HCV-2023

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: true

sources:
  - SRC-EASL-HCV-2023

last_reviewed: "2026-04-25"
notes: >
  Alternative pan-genotypic DAA, shorter duration than SOF/VEL.
  Contraindicated in decompensated cirrhosis (CI-DECOMP-CIRRHOSIS-GLEC).
notes_ua: >
  Alternative pan-genotypic DAA, shorter duration than SOF/VEL. протипоказаний in decompensated cirrhosis (CI-DECOMP-CIRRHOSIS-GLEC).
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
