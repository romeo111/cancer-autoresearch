id: REG-CABOZANTINIB-MTC-1L
name: "Cabozantinib monotherapy (advanced/progressive RET-WT MTC, 1L; or RET-mutant where RET-selective unavailable)"
name_ua: "Кабозантиніб моно (поширена/прогресуюча RET-WT МТС, 1L; або RET-мутантна за відсутності RET-селективного)"
alternate_names:
  - "Cometriq MTC"
  - "EXAM regimen"

components:
  - drug_id: DRUG-CABOZANTINIB
    dose: "140 mg PO once daily on empty stomach (Cometriq capsule formulation — MTC-specific)"
    schedule: "Continuous, until progression or unacceptable toxicity"
    route: PO

cycle_length_days: 28
total_cycles: "Continuous until progression"
toxicity_profile: severe

premedication:
  - "Empty stomach (≥1 h before / ≥2 h after food)"
  - "Pre-treatment dental evaluation (osteonecrosis-of-jaw risk)"
mandatory_supportive_care: []
monitoring_schedule_id: null

dose_adjustments:
  - condition: "Hand-foot skin reaction gr ≥2"
    modification: "Hold; resume at next lower dose level (100 → 60 mg) once ≤gr 1; topical urea + emollient prophylaxis"
    rationale: "Dose-limiting AE in EXAM (~50%)"
    source_refs:
      - SRC-NCCN-THYROID-2025
  - condition: "GI perforation, fistula, or severe hemorrhage"
    modification: "Permanently discontinue"
    rationale: "Boxed warning"
    source_refs:
      - SRC-NCCN-THYROID-2025
  - condition: "Severe hypertension (SBP ≥160 / DBP ≥100 despite optimal antihypertensives)"
    modification: "Hold; restart at lower dose once SBP <140 / DBP <90"
    rationale: "VEGFR-class AE"
  - condition: "Proteinuria ≥3+ on dipstick OR ≥3 g/24 h"
    modification: "Hold; resume at lower dose once <1 g/24 h"
    rationale: "VEGFR-class AE"
  - condition: "Wound healing concern (planned surgery)"
    modification: "Hold ≥28 d preoperative; resume ≥28 d postoperative once wound healed"
    rationale: "Anti-VEGFR impairs wound healing"

ukraine_availability:
  all_components_registered: false
  all_components_reimbursed: false
  notes: "Cabozantinib NOT registered in Ukraine. Access via DEC named-patient import or Ipsen / Exelixis EAP. Cross-border EU treatment per наказ МОЗ 988 realistic for documented MTC."

sources:
  - SRC-NCCN-THYROID-2025

last_reviewed: "2026-04-27"
notes: >
  EXAM (Schoffski 2012): cabozantinib 140 mg vs placebo improved PFS
  11.2 vs 4.0 mo in advanced progressive MTC; OS benefit in RET M918T
  subgroup (HR 0.60). Default 1L for RET-WT MTC (RAS-mutant or
  unknown — no RET-selective option) and a fallback for RET-mutant
  MTC if selpercatinib / pralsetinib are inaccessible. Vandetanib
  (ZETA) is the alternative multikinase MTC TKI; both predate the
  RET-selective era and carry substantial toxicity (HFSR, GI
  perforation, hypertension, hemorrhage, ONJ). Cometriq capsules
  (MTC) and Cabometyx tablets (RCC/HCC/DTC) are NOT bioequivalent —
  do not substitute.
