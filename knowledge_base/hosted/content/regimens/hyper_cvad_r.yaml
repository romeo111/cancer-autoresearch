id: REG-HYPER-CVAD-R
name: "Hyper-CVAD + Rituximab (CD20+) — alternating courses A/B, 8 cycles total"
name_ua: "Hyper-CVAD + ритуксимаб (для CD20+) — чергуючі цикли A/B, 8 циклів"
alternate_names: ["Hyper-CVAD-R", "MD Anderson protocol", "MDACC ALL"]

components:
  # Course A (cycles 1, 3, 5, 7) — Hyper-CVAD
  - {drug_id: DRUG-CYCLOPHOSPHAMIDE, dose: "300 mg/m² q12h × 6 doses", schedule: "IV days 1-3 (Course A only)", route: IV}
  - {drug_id: DRUG-VINCRISTINE, dose: "2 mg flat dose", schedule: "IV days 4 + 11 (Course A only)", route: IV}
  - {drug_id: DRUG-DOXORUBICIN, dose: "50 mg/m²", schedule: "IV day 4 (Course A only)", route: IV}
  - {drug_id: DRUG-DEXAMETHASONE, dose: "40 mg", schedule: "PO/IV days 1-4 + 11-14 (Course A only)", route: PO}
  # Course B (cycles 2, 4, 6, 8) — HD-MTX + HD-cytarabine
  - {drug_id: DRUG-METHOTREXATE, dose: "1 g/m²", schedule: "IV 24h infusion day 1 (Course B only); leucovorin rescue", route: IV}
  - {drug_id: DRUG-CYTARABINE, dose: "3 g/m² q12h × 4 doses", schedule: "IV days 2-3 (Course B only)", route: IV}
  # Rituximab (cycles 1-4 для CD20+)
  - {drug_id: DRUG-RITUXIMAB, dose: "375 mg/m²", schedule: "IV days 1 + 11 (cycles 1-4 для CD20+ only)", route: IV}
  # CNS prophylaxis (all cycles)
  - {drug_id: DRUG-METHOTREXATE, dose: "12 mg IT", schedule: "IT day 2 each cycle", route: IT}
  - {drug_id: DRUG-CYTARABINE, dose: "100 mg IT", schedule: "IT day 8 each cycle", route: IT}

cycle_length_days: 21
total_cycles: "8 alternating cycles (A/B/A/B/A/B/A/B); maintenance POMP × 30 months Ph-, або continuous TKI Ph+"
toxicity_profile: high

premedication:
  - "TLS prophylaxis (allopurinol/rasburicase + IV hydration) cycle 1"
  - "Rituximab premedication для cycles 1-4 (CD20+)"
  - "HD-MTX hydration + urine alkalinization + leucovorin rescue (Course B)"
  - "Prophylactic G-CSF day 5 (Course A) / day 4 (Course B) all cycles"
mandatory_supportive_care:
  - SUP-PJP-PROPHYLAXIS
  - SUP-HSV-PROPHYLAXIS
  - SUP-TLS-PROPHYLAXIS
  - SUP-GCSF-NEUTROPENIA
  - SUP-ANTIEMETIC-PREMED

dose_adjustments:
  - condition: "Age ≥60"
    modification: "Use mini-Hyper-CVAD (50% cyclophosphamide + dex; HD-MTX 250 mg/m²; HD-AraC 1 g/m²)"
  - condition: "Renal CrCl 30-50"
    modification: "Reduce HD-MTX to 500 mg/m²; consider omitting Course B"
  - condition: "Ph+ B-ALL"
    modification: "Add dasatinib 100 mg PO daily continuously OR ponatinib 30 mg daily"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: true
  notes: "Усі компоненти НСЗУ-доступні. Ponatinib обмежено доступний; dasatinib generic available."

sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
notes: >
  STUB — pending Clinical Co-Lead approval. MD Anderson regimen (Kantarjian
  et al). Add dasatinib/ponatinib continuously для Ph+. POMP maintenance
  (POMP = Prednisone+Oncovin+MTX+Purinethol) × 30 months після induction.
notes_ua: >
  STUB — pending Clinical Co-Lead схвалення. MD Anderson схема (Kantarjian et al). Add дазатиніб/понатиніб continuously для Ph+. POMP підтримка (POMP = Prednisone+Oncovin+MTX+Purinethol) × 30 months після індукція.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
