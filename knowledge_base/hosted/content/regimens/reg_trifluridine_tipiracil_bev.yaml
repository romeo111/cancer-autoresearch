id: REG-TRIFLURIDINE-TIPIRACIL-BEV
name: "Trifluridine-Tipiracil + Bevacizumab (SUNLIGHT) — 3L+ mCRC"
name_ua: "Трифлуридин-Типірацил + Бевацизумаб (SUNLIGHT) — 3L+ mКРР"
alternate_names:
  - "TAS-102 + bev"
  - "Lonsurf + bev"
  - "SUNLIGHT regimen"

components:
  - drug_id: DRUG-TRIFLURIDINE-TIPIRACIL
    dose: "35 mg/m² PO BID (based on FTD component)"
    schedule: "Days 1-5 + 8-12 of each 28-day cycle (4 doses/week × 2 weeks, then 14-day rest)"
    route: PO
  - drug_id: DRUG-BEVACIZUMAB
    dose: "5 mg/kg"
    schedule: "IV days 1, 15 of each 28-day cycle"
    route: IV

cycle_length_days: 28
total_cycles: "Until progression / unacceptable toxicity"
toxicity_profile: moderate-severe

premedication:
  - "Take TAS-102 within 1 hour after meals (morning + evening)"
  - "Antiemetic ondansetron 8 mg PO 30 min pre-dose if nausea"
mandatory_supportive_care:
  - SUP-GCSF-NEUTROPENIA  # primary if febrile neutropenia history; ~5% rate
monitoring_schedule_id:

dose_adjustments:
  - condition: "ANC <500 prior to next cycle"
    modification: "Hold; G-CSF; reduce TAS-102 by 5 mg/m²/dose level next cycle (max 2 reductions)"
    rationale: "Neutropenia is the dose-limiting toxicity"
    source_refs: [SRC-NCCN-COLON-2025]
  - condition: "Grade 3-4 non-hematologic AE"
    modification: "Hold until ≤Grade 1; resume at next-lower dose level"
  - condition: "CrCl 30-59 mL/min"
    modification: "Reduce starting dose to 20 mg/m² PO BID"
    source_refs: [SRC-NCCN-COLON-2025]
  - condition: "CrCl <30 mL/min"
    modification: "15 mg/m² PO BID; close monitoring"
  - condition: "Hypertension Grade ≥2 (bevacizumab)"
    modification: "Optimize antihypertensives; hold bev if uncontrolled"
  - condition: "Proteinuria >3.5 g/24h (bevacizumab)"
    modification: "Hold bevacizumab until <2 g/24h"
  - condition: "Recent / planned major surgery"
    modification: "Hold bevacizumab ≥28 days pre-op + ≥28 days post-op"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: false
  notes: >
    Trifluridine-tipiracil registered, NOT NSZU-reimbursed. Bevacizumab
    biosimilar increasingly available but combination is largely
    out-of-pocket / charitable / clinical-trial access. Single-agent
    TAS-102 (without bevacizumab, RECOURSE schedule) is the realistic
    monotherapy fallback if combination funding unavailable.

sources:
  - SRC-NCCN-COLON-2025
  - SRC-ESMO-COLON-2024

last_reviewed: "2026-04-25"
notes: >
  SUNLIGHT trial (Prager 2023): 3L+ mCRC after standard chemo —
  TAS-102 + bevacizumab vs TAS-102 alone improved mOS 10.8 vs 7.5 mo
  (HR 0.61), PFS 5.6 vs 2.4 mo (HR 0.44), ORR 6.3% vs 1.0%.
  Combination is now the preferred 3L+ option per NCCN 2025. Distinct
  mechanism from prior fluoropyrimidine exposure (TS-independent,
  thymidine analog incorporation) — active in 5-FU-refractory disease.
  Hand-foot reactions notably less than fluoropyrimidine; main toxicity
  is myelosuppression.
notes_ua: >
  SUNLIGHT дослідження (Prager 2023): 3L+ mCRC after стандарт chemo — TAS-102 + бевацизумаб vs TAS-102 alone покращений mOS 10.8 проти 7.5 міс. (HR 0.61), PFS 5.6 проти 2.4 міс. (HR 0.44), ORR 6.3% проти 1.0%. комбінація is now the переважний 3L+ option per NCCN 2025. Distinct mechanism from prior fluoropyrimidine exposure (TS-independent, thymidine analog incorporation) — active in 5-FU-рефрактерний хвороба. Hand-foot reactions примітно менше ніж fluoropyrimidine; main токсичність is myelosuppression.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
