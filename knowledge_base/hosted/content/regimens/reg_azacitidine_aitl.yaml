id: REG-AZACITIDINE-AITL
name: "5-Azacitidine SC/IV 75 mg/m² days 1-7 q28d — r/r AITL (epigenetic-targeted)"
name_ua: "5-Азацитидин SC/IV 75 мг/м² дні 1-7 кожні 28 днів — рефрактерна AITL (епігенетична терапія)"
alternate_names: ["5-Aza AITL", "Aza mono AITL"]

components:
  - drug_id: DRUG-AZACITIDINE
    dose: "75 mg/m²/day SC OR IV"
    schedule: "Days 1-7 of each 28-day cycle (or 5-2-2 schedule); until progression or unacceptable toxicity (≥6 cycles before declaring failure)"
    route: SC

cycle_length_days: 28
total_cycles: "Until progression (≥6 cycles before declaring failure — slow onset response)"
toxicity_profile: moderate

premedication:
  - "5-HT3 antagonist before each first-week injection"
  - "Local cold compress for SC site reactions"
  - "TLS prophylaxis cycle 1 (allopurinol + hydration) if high-burden"
mandatory_supportive_care:
  - SUP-PJP-PROPHYLAXIS
  - SUP-ANTIEMETIC-PREMED
monitoring_schedule_id:

dose_adjustments:
  - condition: "ANC <500 OR platelets <25K"
    modification: "Delay next cycle until ANC ≥500 + platelets ≥25K; reduce dose 33-50% next cycle if delay >14 days"
    source_refs: [SRC-NCCN-BCELL-2025]
  - condition: "Renal impairment (CrCl <60 OR serum creatinine elevated)"
    modification: "Reduce dose 50%; monitor renal function and electrolytes"
  - condition: "Hepatic impairment (severe)"
    modification: "Use cautiously; reduce dose; no specific guidance"
  - condition: "Severe SC site reactions"
    modification: "Switch to IV; cold compress + topical steroid for residual reactions"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: true
  notes: >
    Azacitidine registered + НСЗУ-reimbursed for MDS-HR and AML — but
    AITL/PTCL is OFF-LABEL use. Funding pathway must clarify off-label
    coverage; in practice often available via existing AML/MDS supply
    routes after MDT-justified prescription.

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-PTCL-2024

last_reviewed: "2026-04-25"
notes: >
  RUYUAN-2 / Lemonnier 2018-2023: emerging epigenetic therapy
  specifically active in AITL — ORR 50-75% in r/r AITL (small
  series). Mechanistic rationale: AITL has high frequency of TET2,
  IDH2, DNMT3A mutations (clonal hematopoiesis-like) creating
  epigenetic dysregulation that hypomethylating agents exploit.
  Off-label use; OFF-FDA but mentioned in NCCN PTCL-NOS with TFH
  features. Slow-onset response — minimum 4-6 cycles before declaring
  failure. Particularly attractive in AITL where conventional options
  are dismal AND drug already on shelf in heme practice (vs
  belinostat / romidepsin / pralatrexate not registered in UA).
notes_ua: >
  RUYUAN-2 / Lemonnier 2018-2023: новий epigenetic терапія зокрема active in AITL — ORR 50-75% in р/р AITL (small series). Mechanistic rationale: AITL has high frequency of TET2, IDH2, DNMT3A мутації (clonal hematopoiesis-like) creating epigenetic dysregulation that hypomethylating agents exploit. off-label use; OFF-FDA but mentioned in NCCN PTCL-NOS with TFH features. Slow-onset відповідь — minimum 4-6 цикли before declaring failure. особливо attractive in AITL where conventional options are dismal AND drug already on shelf in heme practice (vs belinostat / romidepsin / pralatrexate not registered in UA).
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
