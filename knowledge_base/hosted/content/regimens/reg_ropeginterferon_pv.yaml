id: REG-ROPEGINTERFERON-PV
name: "Ropeginterferon alfa-2b (Besremi) for PV — 1L cytoreductive"
name_ua: "Ропегінтерферон альфа-2b (Besremi) для PV — 1L цитредукція"
alternate_names:
  - "Besremi PV"
  - "PROUD-PV regimen"

components:
  - drug_id: DRUG-ROPEGINTERFERON-ALFA-2B
    dose: "Initial 100 µg SC every 2 weeks (50 µg if HU co-administered); titrate by 50 µg q2wk based on response + tolerance to maximum 500 µg q2wk"
    schedule: "Q2wk continuous; may extend to q4wk after sustained hematologic response ≥1 year; continue indefinitely"
    route: SC
  - drug_id: DRUG-ASPIRIN
    dose: "81-100 mg PO daily"
    schedule: "Continuous lifelong"
    route: PO

cycle_length_days:
total_cycles: "Indefinite; phlebotomy concurrent until Hct <45% sustained"

toxicity_profile: moderate

premedication:
  - "Baseline psychiatric assessment (depression / suicidality screen)"
  - "Baseline TSH, autoantibody panel (anti-thyroid, ANA), LFT, CBC, lipid panel"
  - "Baseline HBV / HCV / HIV serology"
  - "Counseling on flu-like symptoms (paracetamol PRN, particularly first months)"
  - "Pregnancy testing in WCBP + reliable contraception"

mandatory_supportive_care: []

monitoring_schedule_id:

dose_adjustments:
  - condition: "Grade ≥3 ALT/AST elevation"
    modification: "Hold; resume reduced dose on resolution; permanent discontinuation if Grade 4"
    rationale: "Autoimmune hepatitis risk"
    source_refs:
      - SRC-PROUD-PV-GISSLINGER-2020
      - SRC-NCCN-MPN-2025
  - condition: "Severe depression / suicidality"
    modification: "Permanent discontinuation; psychiatric referral"
    rationale: "Black-box neuropsychiatric warning"
    source_refs:
      - SRC-NCCN-MPN-2025
  - condition: "Symptomatic thyroiditis (hypo- or hyperthyroidism)"
    modification: "Continue ropeginterferon if asymptomatic; thyroid hormone replacement OR antithyroid therapy as indicated; discontinue if severe"
    rationale: "Autoimmune thyroiditis common; usually manageable"
    source_refs:
      - SRC-NCCN-MPN-2025
  - condition: "Persistent leukopenia / thrombocytopenia"
    modification: "Reduce by 50 µg q2wk; if Grade 4, hold + resume reduced"
    rationale: "Cytopenia dose-related"
    source_refs:
      - SRC-PROUD-PV-GISSLINGER-2020

ukraine_availability:
  all_components_registered: false
  all_components_reimbursed: false
  notes: "Ropeginterferon alfa-2b (Besremi) NOT registered in Ukraine. International referral or compassionate-use pathway required. Standard pegylated IFNa-2a (off-label PV) is alternative when accessible."

sources:
  - SRC-NCCN-MPN-2025
  - SRC-ESMO-MPN-2015
  - SRC-PROUD-PV-GISSLINGER-2020

last_reviewed: "2026-04-25"
notes: >
  First-line cytoreductive for newly-dx PV in HU-naive low-risk
  young patients (<60, no thrombosis history). Disease-modifying
  potential — JAK2-V617F allele burden reduction. Pegylated long-
  acting (q2wk dosing, vs q1wk for standard PEG-IFNa-2a). STUB —
  pending Co-Lead sign-off.
notes_ua: >
  перша лінія cytoreductive for newly-dx PV in HU-naive низького ризику young patients (<60, ні thrombosis history). хвороба-modifying potential — JAK2-V617F allele burden зниження. Pegylated long- acting (q2wk дозування, vs q1wk for стандарт PEG-IFNa-2a). STUB — pending Co-Lead sign-off.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
