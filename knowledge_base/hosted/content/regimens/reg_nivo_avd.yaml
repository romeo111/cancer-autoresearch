id: REG-NIVO-AVD
name: "N+AVD (Nivolumab + Adriamycin + Vinblastine + Dacarbazine), 6 cycles — emerging 1L standard advanced cHL (SWOG S1826)"
name_ua: "N+AVD (Ніволумаб + Доксорубіцин + Вінбластин + Дакарбазин), 6 циклів — emerging 1L стандарт для просунутої cHL (SWOG S1826)"
alternate_names: ["N+AVD", "Nivo-AVD", "SWOG S1826 regimen"]

components:
  - drug_id: DRUG-NIVOLUMAB
    dose: "240 mg flat dose"
    schedule: "IV days 1+15 of each 28-day cycle × 6"
    route: IV
  - drug_id: DRUG-DOXORUBICIN
    dose: "25 mg/m²"
    schedule: "IV days 1+15 of each 28-day cycle"
    route: IV
  - drug_id: DRUG-VINBLASTINE
    dose: "6 mg/m²"
    schedule: "IV days 1+15 of each 28-day cycle"
    route: IV
  - drug_id: DRUG-DACARBAZINE
    dose: "375 mg/m²"
    schedule: "IV days 1+15 of each 28-day cycle"
    route: IV

cycle_length_days: 28
total_cycles: "6"
toxicity_profile: moderate

premedication:
  - "Aprepitant + dexamethasone + 5-HT3 antagonist (high emetogenicity from dacarbazine)"
  - "Standard nivolumab premedications: paracetamol + diphenhydramine before first 2 doses (infusion reactions less common with checkpoint inhibitors than chemo monoclonals)"
mandatory_supportive_care:
  - SUP-ANTIEMETIC-PREMED
monitoring_schedule_id: MON-R-CHOP-REGIMEN  # reuse — same baseline + on-treatment structure

dose_adjustments:
  - condition: "Cumulative anthracycline >300 mg/m²"
    modification: "Echo + LVEF check before next dose; cap at 450-500 mg/m² lifetime"
    source_refs: [SRC-NCCN-BCELL-2025]
  - condition: "Grade ≥3 immune-related adverse event (irAE — pneumonitis, hepatitis, colitis, endocrinopathy)"
    modification: "Hold nivolumab; high-dose corticosteroids (1-2 mg/kg prednisone) until ≤Grade 1; then taper; for Grade 4 or selected Grade 3 (e.g. severe pneumonitis), discontinue permanently"
    rationale: "Standard ICI irAE management"
    source_refs: [SRC-NCCN-BCELL-2025]
  - condition: "Grade ≥2 peripheral neuropathy"
    modification: "Hold or reduce vinblastine"
  - condition: "ABSOLUTE: NEVER combine with bleomycin"
    modification: "Bleomycin REPLACED by nivolumab in this regimen — same rationale as A+AVD; additive lung toxicity is fatal if both given"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: false
  notes: >
    Nivolumab registered in Ukraine; reimbursed via НСЗУ for melanoma,
    NSCLC, RCC etc. Off-label for 1L cHL (FDA approval expected
    based on SWOG S1826). AVD components fully reimbursed. Brentuximab
    REMAINS preferred funding pathway given approved A+AVD indication
    if BV access available.

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-HODGKIN-2024

last_reviewed: "2026-04-25"
notes: >
  SWOG S1826 trial (Herrera 2024 NEJM): newly diagnosed advanced cHL
  (stage III-IV) — N+AVD vs A+AVD, n=994 — 2-year PFS 92% vs 83%
  (HR 0.48, p<0.001); markedly superior. Pediatric/AYA subgroup
  benefit larger. Toxicity favorable: less peripheral neuropathy
  + fewer Grade ≥3 hematologic AEs than A+AVD. Emerging 1L standard
  for advanced cHL — likely to displace A+AVD where access feasible.
  Bleomycin REPLACED by nivolumab (same rationale as A+AVD —
  eliminates BPT). NCCN 2025 update places N+AVD as Cat 1
  preferred for advanced cHL alongside A+AVD.
