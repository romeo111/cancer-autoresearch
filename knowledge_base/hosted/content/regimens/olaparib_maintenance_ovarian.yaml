id: REG-OLAPARIB-MAINT-OVARIAN
name: "Olaparib maintenance (HRD+ ovarian post-platinum response)"
name_ua: "Олапариб підтримка (HRD+ яєчники після відповіді на платину)"
alternate_names: ["SOLO-1 / PAOLA-1 maintenance"]

components:
  - drug_id: DRUG-OLAPARIB
    dose: "300 mg PO BID continuous"
    schedule: "Continuous"
    route: PO

cycle_length_days:
total_cycles: "Up to 2 years (SOLO-1 BRCA-mut) OR until progression / unacceptable toxicity"

toxicity_profile: moderate
premedication: ["5-HT3 antagonist for nausea (most patients tolerate after first 4 weeks)"]
mandatory_supportive_care: []
monitoring_schedule_id:

dose_adjustments:
  - condition: "Grade 2 anemia (Hgb 8-9.9)"
    modification: "Hold + transfuse if symptomatic; resume at reduced dose 250 mg BID"
    source_refs: [SRC-NCCN-OVARIAN-2025]
  - condition: "Persistent Grade 3 nausea"
    modification: "Reduce to 250 then 200 mg BID; aggressive antiemetics"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: false
  notes: "Out-of-pocket / charitable pathway in Ukraine."

sources: [SRC-NCCN-OVARIAN-2025, SRC-ESMO-OVARIAN-2024]
last_reviewed: "2026-04-26"

notes: >
  SOLO-1 (BRCA-mut maintenance after platinum 1L response): mPFS
  56 vs 14 mo (4× improvement). 5-yr OS interim: ~67% vs 47%.
  PAOLA-1 (bev + olaparib in HRD+): mPFS 37 vs 22 mo. Long-term
  MDS/AML risk warrants pre-treatment counseling.
notes_ua: >
  SOLO-1 (BRCA-mut підтримка after platinum 1L відповідь): mPFS 56 проти 14 міс. (4× покращення). 5-річна ЗВ interim: ~67% проти 47%. PAOLA-1 (bev + олапариб in HRD+): mPFS 37 проти 22 mo. Long-term MDS/AML risk warrants pre-лікування counseling.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
