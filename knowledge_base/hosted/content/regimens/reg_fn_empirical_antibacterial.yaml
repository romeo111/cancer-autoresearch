id: REG-FN-EMPIRICAL-ANTIBACTERIAL
name: "Febrile neutropenia empirical antibacterial therapy (high-risk MASCC <21 OR ANC <100)"
name_ua: "Емпірична антибактеріальна терапія при фебрильній нейтропенії (високий ризик MASCC <21 АБО ANC <100)"
alternate_names:
  - "FN empirical antibiotics"
  - "ASCO/IDSA/MASCC FN regimen"

components:
  - drug_id: DRUG-FILGRASTIM
    dose: "5 µg/kg SC daily until ANC ≥1000 × 2 consecutive days (therapeutic G-CSF; not routine for FN itself but recommended for high-risk + sepsis/instability)"
    schedule: "Daily until count recovery"
    route: SC

cycle_length_days: 1
total_cycles: "Continue antibiotics until afebrile ≥48h AND ANC >500 trending up; G-CSF until ANC ≥1000"
toxicity_profile: moderate

premedication: []
mandatory_supportive_care:
  - SUP-GCSF-NEUTROPENIA
monitoring_schedule_id:

dose_adjustments:
  - condition: "MRSA risk (recent MRSA colonization, central line infection, severe mucositis, hemodynamic instability, skin/soft tissue infection)"
    modification: "Add vancomycin 15-20 mg/kg IV q8-12h (load 25-30 mg/kg if septic shock); de-escalate at 48h if cultures negative"
    rationale: "Empiric Gram-positive coverage in high-risk subset; routine vancomycin NOT recommended for all FN"
    source_refs: [SRC-NCCN-AML-2025]
  - condition: "Beta-lactam allergy"
    modification: "Substitute aztreonam 2g IV q8h + vancomycin 15-20 mg/kg IV q8-12h (covers GN + GP without beta-lactam); add metronidazole 500 mg IV q8h if anaerobic coverage needed"
    source_refs: [SRC-NCCN-AML-2025]
  - condition: "Septic shock OR hemodynamic instability"
    modification: "Broaden empirically — add aminoglycoside (gentamicin 5-7 mg/kg IV q24h or amikacin 15 mg/kg IV q24h) for synergy; add vancomycin; consider antifungal (echinocandin or liposomal amphotericin B) if persistent fever ≥4-7 days"
    source_refs: [SRC-NCCN-AML-2025]
  - condition: "Persistent fever ≥4-7 days on broad-spectrum antibiotics"
    modification: "Add empirical antifungal (echinocandin: caspofungin 70 mg IV load → 50 mg IV daily, OR micafungin 100 mg IV daily; OR liposomal amphotericin B 3 mg/kg IV daily); CT chest + sinus + abdomen; galactomannan + beta-D-glucan; imaging-guided biopsy if feasible"
    source_refs: [SRC-NCCN-AML-2025]
  - condition: "Documented CRE / ESBL / Pseudomonas with resistance"
    modification: "Targeted therapy per culture/susceptibility — meropenem, ceftazidime/avibactam, ceftolozane/tazobactam, colistin, or per institutional antibiogram"
  - condition: "Low-risk FN (MASCC ≥21, oral tolerance, hemodynamic stability, ANC expected to recover ≤7 days)"
    modification: "Outpatient management acceptable: ciprofloxacin 750 mg PO BID + amoxicillin-clavulanate 875/125 mg PO BID; close f/u; rapid escalation on any deterioration"
    source_refs: [SRC-NCCN-AML-2025]

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: true
  notes: >
    Філграстим (та біосиміляри) — реімбурсується НСЗУ для FN
    профілактики/лікування. Піперацилін-тазобактам, цефепім, меропенем,
    ванкоміцин, азтреонам, аміноглікозиди — всі зареєстровані і широко
    доступні в стаціонарі. Це спрощений regimen-stub: повний emergency
    bundle включає piperacillin-tazobactam 4.5g IV q8h (або cefepime 2g
    IV q8h, або meropenem 1g IV q8h при підозрі на ESBL) як backbone
    бета-лактаму ± vancomycin при MRSA-ризику. DRUG IDs to author:
    piperacillin-tazobactam, cefepime, meropenem, vancomycin, aztreonam,
    metronidazole, ciprofloxacin, amoxicillin-clavulanate, gentamicin,
    amikacin, caspofungin, micafungin, liposomal amphotericin B.

sources:
  - SRC-NCCN-AML-2025
  - SRC-ESMO-AML-2020

last_reviewed: "2026-04-27"
reviewers: []
notes: >
  IDSA 2010 + ASCO 2018 + MASCC 2017 + NCCN Prevention and Treatment of
  Cancer-Related Infections 2024 standard. FN = single oral temperature
  ≥38.3°C OR ≥38°C sustained ≥1h, AND ANC <500 (or expected to fall
  <500 within 48h). Empirical anti-pseudomonal beta-lactam mono-therapy
  is the BACKBONE: piperacillin-tazobactam 4.5g IV q8h (extended
  infusion 4h preferred for severe sepsis), OR cefepime 2g IV q8h,
  OR meropenem 1g IV q8h (if prior ESBL / resistant GN risk).
  Vancomycin NOT routine — added only for MRSA-risk subsets. Time-to-
  antibiotic <60 min from FN recognition is critical (mortality
  surrogate). Source-control imperative: blood cultures × 2 (peripheral
  + central line), urine, sputum, stool C. diff if diarrhea, CT chest
  early if respiratory symptoms. G-CSF recommended for high-risk +
  sepsis/instability (does not replace antibiotics). Daily reassessment
  for de-escalation, antifungal addition, source localization. This
  regimen entity is the UMBRELLA — actual prescribing requires
  institutional antibiogram + clinical judgment + per-patient
  customization. Many supporting DRUG entities missing — flagged.
notes_ua: >
  IDSA 2010 + ASCO 2018 + MASCC 2017 + NCCN 2024 стандарт. FN =
  одноразова темп ≥38.3°C АБО ≥38°C сталий ≥1г, ТА ANC <500. Емпіричний
  анти-псевдомонадний бета-лактам моно — BACKBONE: піперацилін-
  тазобактам 4.5г IV q8г (extended infusion 4г при тяжкому сепсисі),
  АБО цефепім 2г IV q8г, АБО меропенем 1г IV q8г. Ванкоміцин НЕ
  рутинний — додається при MRSA-ризику. Time-to-antibiotic <60 хв від
  розпізнавання FN критичний. Source-control: культури крові ×2, сечі,
  мокроти, C. diff stool при діареї, CT грудної клітки раннє при
  респ-симптомах. G-CSF при високому ризику + сепсис. Цей entity —
  UMBRELLA; реальне призначення = інституційна антибіограма + клінічне
  судження.
