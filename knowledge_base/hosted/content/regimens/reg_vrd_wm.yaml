id: REG-VRD-WM
name: "Bortezomib + Rituximab + Dexamethasone (BDR) × 6-8 cycles — chemo-free alternative for r/r WM (incl CXCR4-WHIM-mutated)"
name_ua: "Бортезоміб + Ритуксимаб + Дексаметазон (BDR) × 6-8 циклів — chemo-free альтернатива для рефрактерної WM (incl CXCR4-WHIM-мутована)"
alternate_names: ["BDR", "VRd-WM", "Bort-Dex-Rit WM"]

components:
  - drug_id: DRUG-BORTEZOMIB
    dose: "1.3 mg/m²"
    schedule: "SC days 1, 8, 15, 22 of each 35-day cycle (weekly × 4, then 13-day rest)"
    route: SC
  - drug_id: DRUG-RITUXIMAB
    dose: "375 mg/m²"
    schedule: "IV day 1 OR weekly × 4 induction, then maintenance per protocol"
    route: IV
  - drug_id: DRUG-DEXAMETHASONE
    dose: "40 mg"
    schedule: "PO/IV days 1, 8, 15, 22 of each 35-day cycle"
    route: PO

cycle_length_days: 35
total_cycles: "6-8 cycles induction; rituximab maintenance optional based on response/depth"
toxicity_profile: moderate

premedication:
  - "Standard rituximab premedications (especially first dose)"
  - "Acyclovir 400 mg PO BID throughout (HSV/VZV prophylaxis — bortezomib increases VZV risk)"
  - "Plasmapheresis FIRST if symptomatic hyperviscosity (rituximab causes IgM flare in subset)"
mandatory_supportive_care:
  - SUP-PJP-PROPHYLAXIS
  - SUP-HSV-PROPHYLAXIS
  - SUP-HBV-PROPHYLAXIS
monitoring_schedule_id:

dose_adjustments:
  - condition: "Grade ≥2 peripheral neuropathy"
    modification: "Reduce bortezomib to 1.0 mg/m² weekly; if Grade ≥3 or any Grade ≥2 with pain, hold permanently and switch to carfilzomib OR DRC alternative"
    rationale: "Bortezomib peripheral neuropathy is dose-limiting and often permanent"
    source_refs: [SRC-NCCN-BCELL-2025]
  - condition: "Symptomatic hyperviscosity (RF-WM-HYPERVISCOSITY)"
    modification: "Plasmapheresis FIRST; HOLD rituximab until IgM reduced (rituximab causes IgM flare)"
    source_refs: [SRC-NCCN-BCELL-2025]
  - condition: "ANC <1500 OR platelets <75K cycle start"
    modification: "Delay cycle ≥7 days"
  - condition: "Severe infection"
    modification: "Hold; treat infection; resume at reduced bortezomib dose"
  - condition: "Pre-existing peripheral neuropathy Grade ≥1"
    modification: "Use weekly subcutaneous bortezomib (vs twice-weekly) — substantially reduces neuropathy incidence"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: true
  notes: >
    All BDR components registered + НСЗУ-reimbursed (bortezomib for
    MM, rituximab for B-cell NHL, dexamethasone). Off-label for WM
    (no specific WM indication on label) but mechanistically aligned
    + supported by NCCN. Practical chemo-free alternative when BTKi
    access blocking OR for CXCR4-WHIM-mutated WM where BTKi response
    weaker.

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-WM-2024

last_reviewed: "2026-04-25"
notes: >
  CXCR4-WHIM-mutated WM (~30%) has reduced depth of response to BTKi
  (zanubrutinib + ibrutinib both) — proteasome inhibitor mechanism
  (bortezomib) bypasses BTK pathway dependence. BDR per Treon 2009
  showed major response rate ~88% in r/r WM. Weekly subcutaneous
  bortezomib substantially reduces peripheral neuropathy vs
  twice-weekly IV. Time-limited (~6-8 cycles) — distinct from
  continuous BTKi paradigm. UA practical advantage: all components
  reimbursed.
notes_ua: >
  CXCR4-WHIM-mutated WM (~30%) has зменшений depth of відповідь to BTKi (занубрутиніб + ібрутиніб both) — proteasome інгібітор mechanism (бортезоміб) bypasses BTK pathway dependence. BDR per Treon 2009 showed major частота відповіді ~88% in р/р WM. Weekly subcutaneous бортезоміб substantially зменшує периферична нейропатія vs twice-weekly IV. Time-limited (~6-8 цикли) — distinct from continuous BTKi paradigm. UA practical advantage: all components відшкодовуваний.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
