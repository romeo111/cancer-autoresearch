id: REG-PEMBRO-MONO-HNSCC-1L
name: "Pembrolizumab monotherapy (HNSCC R/M, 1L; PD-L1 CPS ≥20)"
name_ua: "Пембролізумаб моно (HNSCC рецидивна/метастатична, 1L; PD-L1 CPS ≥20)"
alternate_names:
  - "KEYNOTE-048 monotherapy arm"
  - "Pembro mono HNSCC"

components:
  - drug_id: DRUG-PEMBROLIZUMAB
    dose: "200 mg IV q3w (or 400 mg IV q6w)"
    schedule: "Day 1 every 3 weeks (or q6w), for up to 35 cycles (~2 years) or until progression / unacceptable toxicity"
    route: IV

cycle_length_days: 21
total_cycles: "Up to 35 cycles (~2 years) or until progression"
toxicity_profile: low-moderate

premedication: []
mandatory_supportive_care: []
monitoring_schedule_id:

dose_adjustments:
  - condition: "Severe immune-related adverse event (gr ≥3 colitis, pneumonitis, hepatitis, endocrinopathy, nephritis, dermatitis)"
    modification: "Hold pembrolizumab; high-dose corticosteroids (1-2 mg/kg prednisone equiv) ± additional immunosuppression (infliximab, MMF) for steroid-refractory cases; permanent discontinuation if recurrent gr ≥3 or any gr 4 (except endocrinopathy on replacement)"
    rationale: "irAE management per ASCO / ESMO IO toxicity guidelines"
    source_refs:
      - SRC-NCCN-HNSCC-2025
  - condition: "Endocrinopathy (hypothyroidism, hypopituitarism, T1DM, primary adrenal insufficiency)"
    modification: "Hormone replacement; pembrolizumab can usually be continued"
    rationale: "Endocrine irAEs typically permanent but manageable with replacement"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: false
  notes: "Pembrolizumab registered in Ukraine; NOT reimbursed for HNSCC indication. Access via private / EAP / cross-border treatment. Major access barrier."

sources:
  - SRC-NCCN-HNSCC-2025

last_reviewed: "2026-04-27"
notes: >
  KEYNOTE-048 (Burtness Lancet 2019): in PD-L1 CPS ≥20 R/M HNSCC,
  pembrolizumab monotherapy vs EXTREME improved OS 14.9 vs 10.7 mo
  (HR 0.61) with substantially less toxicity. Preferred over chemo-IO
  in CPS ≥20 for fitness-limited patients. Median DOR ~22 mo;
  long-tail responders. Switch to chemo-IO or cetuximab-based regimen
  if rapid progression / visceral crisis at 1L assessment.
notes_ua: >
  KEYNOTE-048 (Burtness Lancet 2019): in PD-L1 CPS ≥20 R/M HNSCC, пембролізумаб монотерапія vs EXTREME покращений OS 14.9 проти 10.7 міс. (HR 0.61) with substantially less токсичність. переважний over chemo-IO in CPS ≥20 for fitness-limited patients. медіана DOR ~22 міс.; long-tail responders. Switch to chemo-IO or цетуксимаб-based схема if rapid прогресування / visceral crisis at 1L assessment.
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_extraction
