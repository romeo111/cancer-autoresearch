id: REG-D-RD-MAIA
name: "Daratumumab + Lenalidomide + Dexamethasone (D-Rd, MAIA — MM 1L transplant-ineligible)"
name_ua: "Даратумумаб + Леналідомід + Дексаметазон (D-Rd, MAIA — MM 1L непридатні до трансплантації)"
alternate_names:
  - "D-Rd"
  - "MAIA regimen"
  - "Dara-Rd"

components:
  - drug_id: DRUG-DARATUMUMAB
    dose: "1800 mg SC (or 16 mg/kg IV)"
    schedule: "Weekly cycles 1-2 (days 1, 8, 15, 22); every 2 weeks cycles 3-6 (days 1, 15); every 4 weeks cycle 7+ (day 1)"
    route: SC
  - drug_id: DRUG-LENALIDOMIDE
    dose: "25 mg PO daily (10 mg if CrCl 30-60)"
    schedule: "days 1-21 of each 28-day cycle"
    route: PO
  - drug_id: DRUG-DEXAMETHASONE
    dose: "40 mg PO/IV weekly (20 mg if age >75 or BMI <18.5 or frail)"
    schedule: "days 1, 8, 15, 22 of each 28-day cycle"
    route: PO

cycle_length_days: 28
total_cycles: "Continuous until progression or unacceptable toxicity"
toxicity_profile: moderate

premedication:
  - "Pre-daratumumab: dexamethasone (already in regimen, given before dara) + paracetamol 650-1000 mg + diphenhydramine 25 mg + montelukast 10 mg before first dose"
  - "Post-daratumumab: paracetamol/diphenhydramine for 1-2 days as needed (delayed reactions cycle 1)"
  - "Acyclovir 400 mg PO BID (HSV/VZV prophylaxis)"
  - "Aspirin 81-100 mg PO daily (VTE prophylaxis; LMWH if higher VTE risk)"
mandatory_supportive_care:
  - SUP-HSV-PROPHYLAXIS
  - SUP-MM-VTE-PROPHYLAXIS
  - SUP-MM-BONE-PROTECTION
  - SUP-PJP-PROPHYLAXIS
monitoring_schedule_id: MON-VRD-REGIMEN

dose_adjustments:
  - condition: "Age >75 OR frail (IMWG frailty ≥2)"
    modification: "Dexamethasone 20 mg weekly; consider lenalidomide 15-20 mg"
    source_refs: [SRC-NCCN-MM-2025]
  - condition: "CrCl 30-60 mL/min"
    modification: "Lenalidomide 10 mg daily; dara/dex unchanged"
    rationale: "Lenalidomide ~80% renally cleared; daratumumab not renally cleared"
    source_refs: [SRC-NCCN-MM-2025]
  - condition: "CrCl <30 mL/min (no dialysis)"
    modification: "Lenalidomide 5 mg daily OR 10 mg every other day"
    source_refs: [SRC-NCCN-MM-2025]
  - condition: "Severe IV-daratumumab infusion reaction"
    modification: "Switch to SC daratumumab (Faspro 1800 mg) — IRR rate ~13% SC vs ~50% IV cycle 1"
  - condition: "Cytopenias (ANC <1000 OR plt <50K)"
    modification: "Hold lenalidomide; resume next-lower dose on recovery; consider G-CSF support"

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: false
  notes: >
    Даратумумаб НЕ реімбурсується НСЗУ як 2026-04 — тільки клінічні
    випробування, благодійне фінансування, або out-of-pocket. Це
    суттєвий бар'єр і має бути явно зазначено пацієнту перед
    запропонуванням D-Rd. Альтернатива — VRd-lite (REG-VRD-LITE),
    повністю покрита.

sources:
  - SRC-NCCN-MM-2025
  - SRC-ESMO-MM-2023

last_reviewed: "2026-04-27"
reviewers: []
notes: >
  MAIA (Facon 2019, NEJM; updated 2021): D-Rd vs Rd in transplant-
  ineligible newly-diagnosed MM (median age 73). mPFS not reached vs
  34.4 mo (HR 0.53); 5-y OS 66% vs 53%. Best-evidence 1L for
  transplant-ineligible MM. SC daratumumab (1800 mg + hyaluronidase)
  preferred from cycle 2 — substantially shorter chair time and
  lower IRR rate. HBV screening + entecavir prophylaxis for any
  HBV-positive serology. Pre-treatment red-cell phenotyping
  (daratumumab interferes with crossmatch — anti-CD38 binds CD38 on
  RBCs, causing positive indirect Coombs panreactivity). Continuous
  treatment until progression.
notes_ua: >
  MAIA (Facon 2019, NEJM; оновлено 2021): D-Rd vs Rd в непридатних до
  трансплантації нових MM (медіанний вік 73). mPFS не досягнута vs
  34.4 міс (HR 0.53); 5-р OS 66% vs 53%. Найкраща доказова 1L для
  непридатних до трансплантації MM. ПК даратумумаб (1800 мг + гіалуронідаза)
  переважний з циклу 2. HBV-скринінг + ентекавір при будь-якій HBV-сероло-
  гії. Перед-лікування фенотипування RBC (даратумумаб інтерферує з
  крос-матчингом). Безперервне лікування до прогресії.
ukrainian_review_status: pending_clinical_signoff
