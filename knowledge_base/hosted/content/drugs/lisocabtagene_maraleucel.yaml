id: DRUG-LISOCABTAGENE-MARALEUCEL
names:
  preferred: "Lisocabtagene maraleucel"
  ukrainian: "Лісокабтаген маралейцел"
  english: "Lisocabtagene maraleucel"
  brand_names:
    - "Breyanzi"
  synonyms:
    - "liso-cel"
    - "JCAR017"
atc_code: L01XL08
rxnorm_id: null
drug_class: "CD19-directed autologous CAR-T cell therapy (4-1BB costimulation; defined CD4:CD8 1:1 composition)"
mechanism: >
  Autologous T cells transduced with a lentiviral vector encoding a CAR
  with anti-CD19 single-chain variable fragment (FMC63), 4-1BB
  costimulatory domain, and CD3-zeta activation domain. Distinguishing
  feature is administration of a defined 1:1 ratio of CD4+ and CD8+
  CAR-T cells (separately manufactured, then combined), which is
  hypothesized to deliver more predictable expansion kinetics and a more
  favorable CRS/ICANS profile vs CD28-based products. Lymphodepleting
  fludarabine + cyclophosphamide conditioning precedes a single IV
  infusion. Approved by FDA Feb 2021 and EMA April 2022 for relapsed/
  refractory large B-cell lymphoma (TRANSCEND-NHL-001), expanded in 2022
  to 2L (TRANSFORM trial), and in 2024 to relapsed/refractory CLL/SLL
  (TRANSCEND-CLL-004) and to relapsed/refractory follicular lymphoma
  (TRANSCEND-FL).
regulatory_status:
  fda:
    approved: true
    year_first_approval: 2021
    indications_brief:
      - "R/R LBCL after ≥1 prior line (DLBCL NOS, HGBL, PMBCL, FL grade 3B; 2L since 2022 TRANSFORM)"
      - "R/R CLL/SLL after BTKi + venetoclax (2024)"
      - "R/R follicular lymphoma after ≥2 prior lines (2024)"
  ema:
    approved: true
    year_first_approval: 2022
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: |
      Не зареєстровано в Україні (Держреєстр ЛЗ — РП відсутнє станом на 2026-04-27).
      Жодна CAR-T-терапія не ліцензована та не реімбурсується НСЗУ.
      Шляхи доступу:
      - Cross-border (EU): «Лікування за кордоном» (наказ МОЗ 988) до
        EBMT/JACIE-акредитованих центрів — Charité Berlin, Karolinska
        Stockholm, Hôpital Saint-Louis Paris, Klinikum Großhadern Munich.
        Показання: r/r LBCL ≥2L, r/r CLL після BTKi+venetoclax,
        r/r FL ≥3L.
      - EAP BMS / Celgene (compassionate use; через локальний офіс
        Bristol Myers Squibb Ukraine).
      - Trial-only: TRANSCEND/TRANSFORM-серія розширених програм.
      Source: drlz.com.ua пошук «lisocabtagene»/«breyanzi» 2026-04-27 —
      РП відсутнє. Орієнтовна вартість USD 410-450K (виробництво +
      лімфодеплеція + ICU + післялікарняний моніторинг).
typical_dosing: >
  Single IV infusion, target dose 100 × 10⁶ CAR-positive viable T cells
  (50-110 × 10⁶ in 1:1 CD4:CD8 ratio). Administered 2-7 days after
  lymphodepleting conditioning: cyclophosphamide 300 mg/m² IV daily × 3
  days + fludarabine 30 mg/m² IV daily × 3 days (days -5 to -3).
  Tocilizumab on-site (≥2 doses) before infusion is mandatory per REMS.
  Single infusion; no maintenance. Bridging therapy may be used during
  the 3-5 week manufacturing window. Renal adjustment: fludarabine 24
  mg/m² × 3 d if CrCl 30-69 mL/min; both agents held if CrCl <30 mL/min
  (consider alternative conditioning per institutional protocol). Hold
  infusion if active uncontrolled infection, severe organ dysfunction, or
  ANC <1,000/µL or platelets <50,000/µL not attributable to bridging.
formulations:
  - "Cryopreserved autologous CAR-T cell suspension; two patient-specific bags (CD4+ and CD8+ components, infused sequentially)"
absolute_contraindications:
  - "Active uncontrolled systemic infection at time of lymphodepletion"
  - "Pregnancy and lactation"
  - "Hypersensitivity to fludarabine, cyclophosphamide, or DMSO"
  - "Active CNS lymphoma (CNS-2/3 by registration; CNS-1 permitted post-TRANSCEND-NHL-001 expansion)"
  - "Severe organ dysfunction precluding ICU-level supportive care (NYHA III-IV CHF, FEV1 <50%, dialysis, severe hepatic dysfunction)"
  - "Active hepatitis B without antiviral suppression, HIV with detectable viremia"
black_box_warnings:
  - "Cytokine release syndrome (CRS) — Grade ≥3 ~2% in TRANSCEND-NHL-001 (any-grade ~42%); markedly lower than CD28 CAR-Ts"
  - "Immune effector cell-associated neurotoxicity syndrome (ICANS) — Grade ≥3 ~10% (any-grade ~30%)"
  - "Hemophagocytic lymphohistiocytosis / macrophage activation syndrome (HLH/MAS)"
  - "Prolonged cytopenias and B-cell aplasia / hypogammaglobulinemia"
  - "Secondary T-cell malignancies (FDA class boxed warning, 2024)"
  - "REMS / FACT-JACIE accreditation required for administration"
common_adverse_events:
  - "Neutropenia, prolonged ~80% (G3-4)"
  - "Anemia ~50%"
  - "Thrombocytopenia ~50%"
  - "CRS, any grade ~42% (median onset day 5)"
  - "ICANS / encephalopathy, any grade ~30% (median onset day 9)"
  - "Hypogammaglobulinemia ~70% (sustained months-years)"
  - "Fatigue ~45%"
  - "Headache ~30%"
  - "Nausea ~30%"
  - "Pyrexia ~25%"
  - "Decreased appetite ~25%"
  - "Hypotension ~25%"
  - "Infection (any) ~45%"
  - "Tremor ~15%"
serious_adverse_events:
  - "Severe CRS Grade ≥3 with hemodynamic compromise (rare relative to CD28 products)"
  - "Severe ICANS Grade ≥3 with cerebral edema or status epilepticus"
  - "Hemophagocytic lymphohistiocytosis (HLH/MAS)"
  - "Prolonged cytopenias requiring transfusion or G-CSF beyond day 30"
  - "Severe / opportunistic infection (PJP, CMV, invasive fungal, encapsulated bacteria)"
  - "Tumor lysis syndrome (high disease burden)"
  - "Secondary T-cell malignancy (class warning 2024)"
major_interactions:
  - "Concurrent corticosteroids: suppress CAR-T expansion — avoid prophylactic; reserve for severe AE management"
  - "Live vaccines: contraindicated peri-treatment and ≥6-12 months post"
  - "Tocilizumab: paired rescue agent for CRS — must be on-site before infusion"
  - "G-CSF: avoid first 21 days post-infusion (may amplify CRS/ICANS); reserve for severe / persistent neutropenia or febrile neutropenia"
  - "Other lymphotoxic chemotherapy: avoid ≥3 months post-infusion (impedes CAR persistence)"
  - "Bridging therapy: permitted during manufacturing; corticosteroid component should be tapered before lymphodepletion when possible"
pharmacology:
  half_life_hours: null
  clearance: "Cellular product — no traditional clearance; in vivo expansion peaks ~10-14 days post-infusion; persistence variable, CAR transgene often detectable >12 months"
  protein_binding_pct: null
  metabolism: "Living cell therapy — defined 1:1 CD4:CD8 ratio promotes balanced cytotoxic + helper response and contributes to lower CRS/ICANS profile vs axi-cel"
sources:
  - SRC-TRANSCEND-NHL-001-ABRAMSON-2020
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-DLBCL-2024
last_reviewed: "2026-04-27"
reviewer_signoffs: []
notes: >
  Pivotal: TRANSCEND-NHL-001 (Abramson et al., Lancet 2020) — 269 R/R
  LBCL patients ≥2 prior lines, ORR 73%, CR 53%, median DoR 23.1 months;
  Grade ≥3 CRS only 2% — markedly lower than axi-cel (~13%) and tisa-cel
  (~22%). TRANSFORM (Lancet 2022) moved liso-cel to 2L for primary-
  refractory / ≤12-month relapse DLBCL (superior EFS vs salvage +
  autoSCT). 2024 expansions: TRANSCEND-CLL-004 in BTKi/venetoclax-
  refractory CLL; TRANSCEND-FL in heavily pretreated FL. Differentiator
  vs axi-cel: 4-1BB costimulation + defined CD4:CD8 1:1 ratio →
  slower-onset, lower-grade CRS/ICANS (more outpatient-feasible at
  experienced centers). Ukraine: NOT registered, NO domestic CAR-T
  manufacturing. Access only via cross-border referral under "Лікування
  за кордоном" (наказ МОЗ 988); all-in cost USD 410-450K including
  manufacturing, lymphodepletion, ICU support, and IVIG supplementation
  for B-cell aplasia.
