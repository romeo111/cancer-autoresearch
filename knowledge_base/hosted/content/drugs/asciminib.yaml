id: DRUG-ASCIMINIB
names:
  preferred: "Asciminib"
  ukrainian: "Асцимініб"
  english: "Asciminib"
  brand_names: ["Scemblix"]
atc_code: L01EA06
rxnorm_id: "2557040"
drug_class: "BCR-ABL1 STAMP inhibitor (Specifically Targeting the ABL Myristoyl Pocket; allosteric)"
mechanism: >
  Allosteric inhibitor binding the ABL1 myristoyl pocket — distinct
  from the ATP-binding site targeted by all classical TKIs (imatinib,
  dasatinib, nilotinib, bosutinib, ponatinib). This unique
  mechanism avoids cross-resistance with most ATP-site mutations
  including T315I (at higher dose 200 mg BID). First-in-class STAMP
  inhibitor; approved 3L+ for CML-CP after ≥2 prior TKIs (ASCEMBL
  trial) and for T315I-mutated CML.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: false
    reimbursed_nszu: false
    last_verified: "2026-04-25"

typical_dosing: >
  CML-CP after ≥2 prior TKIs (no T315I): 80 mg PO once daily OR
  40 mg PO BID (with or without food, but consistency required;
  high-fat meal reduces exposure). T315I-positive CML-CP:
  200 mg PO BID. Continue until progression / unacceptable toxicity.

formulations: ["Tablets 20 mg, 40 mg"]

absolute_contraindications:
  - "Hypersensitivity"

black_box_warnings: []

major_interactions:
  - "Strong CYP3A4 inhibitors (azoles): exposure +; reduce dose"
  - "CYP3A4 inducers (rifampin): avoid"
  - "P-gp + BCRP substrates (rosuvastatin): exposure +"

common_adverse_events:
  - "Thrombocytopenia"
  - "Neutropenia"
  - "Headache"
  - "Arthralgia / myalgia"
  - "Fatigue"
  - "Nausea"
  - "Lipase elevation"
  - "Hypertension"
  - "Rash"

serious_adverse_events:
  - "Severe cytopenia (Grade ≥3)"
  - "Pancreatitis"
  - "Hypersensitivity"
  - "Cardiovascular events (lower than ponatinib but observed)"

pharmacology: {half_life: "~5-9 hours (BID dosing)"}

sources: [SRC-NCCN-MPN-2025, SRC-ELN-CML-2020]
last_reviewed: "2026-04-25"
notes: >
  Pivotal: ASCEMBL (Réa et al., Blood 2021) phase-3 — asciminib 40
  mg BID vs bosutinib 500 mg daily in CML-CP after ≥2 prior TKIs;
  MMR at 24 weeks 25.5% vs 13.2%. Vascular safety profile
  substantially better than ponatinib. T315I activity at higher
  dose (200 mg BID) per phase-1 (Hughes et al., NEJM 2019).
  Ukraine: NOT registered. STUB — pending Co-Lead sign-off.
