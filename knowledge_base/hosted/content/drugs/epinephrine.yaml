id: DRUG-EPINEPHRINE
names:
  preferred: "Epinephrine"
  ukrainian: "Адреналін (епінефрин)"
  english: "Epinephrine"
  brand_names:
    - "EpiPen"
    - "Adrenalin"
    - "Auvi-Q"
  synonyms:
    - "adrenaline"
atc_code: C01CA24
rxnorm_id: "3992"
drug_class: "Endogenous catecholamine; non-selective α and β adrenergic agonist (sympathomimetic)"
mechanism: >
  Endogenous catecholamine that stimulates all adrenergic receptor
  subtypes: α1 (vasoconstriction → reverses anaphylactic vasodilation
  and hypotension, reduces mucosal edema), β1 (positive inotropy and
  chronotropy → reverses cardiogenic component of anaphylactic shock
  and supports tissue perfusion), and β2 (bronchodilation → reverses
  anaphylactic bronchospasm; mast cell membrane stabilization →
  decreases further mediator release; vasodilation in skeletal
  muscle). The combined α + β1 + β2 actions make epinephrine
  uniquely first-line for anaphylaxis — no other single agent
  reverses all three life-threatening components (hypotension,
  bronchospasm, upper airway edema). Also used for cardiac arrest
  (asystole, PEA, refractory VF/VT) and infusion-reaction-related
  hypotension. Approved as a generic medicine since the early 20th
  century; modern auto-injectors approved 1980s.
regulatory_status:
  fda:
    approved: true
    indications_brief:
      - "Anaphylaxis (first-line; route IM thigh)"
      - "Cardiac arrest (IV/IO push during ACLS)"
      - "Symptomatic bradycardia / hypotension (IV infusion)"
      - "Severe acute asthma exacerbation (rare; preferred SABA usually)"
      - "Adjunct for local anesthesia (vasoconstrictor — reduces systemic absorption, prolongs duration)"
  ema:
    approved: true
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: true
    reimbursement_indications:
      - "Анафілаксія / анафілактоїдні реакції"
      - "Серцево-легенева реанімація"
      - "Шокові стани"
    last_verified: "2026-04-27"
    notes: "Зареєстровано в Україні (Adrenalin generics). NSZU-covered, ubiquitous. Auto-injectors EpiPen/Auvi-Q НЕ зареєстровані в Україні — використовуються ампули 1 мг/мл з ручним набором у шприц. Перевірено drlz.com.ua 2026-04-27."
typical_dosing: >
  ANAPHYLAXIS (adult): 0.3-0.5 mg (0.3-0.5 mL of 1 mg/mL solution)
  IM into anterolateral thigh (vastus lateralis); REPEAT every 5-15
  min as needed; if 2 doses required, escalate to IV infusion.
  Pediatric: 0.01 mg/kg IM (max 0.3 mg child <30 kg, 0.5 mg ≥30 kg).
  IV infusion for refractory anaphylactic shock: 0.05-1 µg/kg/min
  titrate to MAP ≥65 mmHg. CARDIAC ARREST: 1 mg IV/IO push every
  3-5 min during CPR (pediatric 0.01 mg/kg). SEVERE INFUSION
  REACTION (e.g., chemotherapy hypersensitivity): 0.3-0.5 mg IM
  thigh as for anaphylaxis. CRITICAL ROUTE NOTES: IM thigh is
  standard for anaphylaxis — IM deltoid is suboptimal (slower
  absorption); SC route is OBSOLETE (slow, unreliable absorption);
  IV bolus of 1:1000 (1 mg/mL) outside cardiac arrest causes severe
  hypertensive reactions and arrhythmia — use only the cardiac arrest
  bolus dose IV, otherwise IV use requires dilution and infusion.
  No renal or hepatic adjustment in emergency use.
formulations:
  - "1 mg/mL (1:1,000) ampule for IM injection — STANDARD FOR ANAPHYLAXIS"
  - "0.1 mg/mL (1:10,000) prefilled syringe for IV cardiac arrest"
  - "Auto-injector 0.3 mg / 0.15 mg (EpiPen, EpiPen Jr; Auvi-Q) — NOT widely available in Ukraine"
  - "Nebulizer solution 1% for stridor / croup (off-label adjunct)"
  - "Ophthalmic, dental anesthesia adjunct formulations"
absolute_contraindications:
  - "NONE in true anaphylaxis or cardiac arrest — life-saving outweighs all relative contraindications"
  - "Relative (consider in non-emergency use): severe hypertension, hyperthyroidism, narrow-angle glaucoma, severe coronary artery disease, ventricular arrhythmias, concurrent non-selective β-blocker (paradoxical hypertensive response — may need higher epinephrine dose + glucagon)"
black_box_warnings: []
common_adverse_events:
  - "Anxiety / restlessness — common, dose-related"
  - "Tremor — common"
  - "Palpitations / tachycardia — common"
  - "Headache — ~10-15%"
  - "Dizziness — ~10%"
  - "Sweating / diaphoresis — ~10%"
  - "Pallor — common"
  - "Nausea — ~5-10%"
  - "Mild hypertension — common"
  - "Local reaction at IM injection site — minor"
  - "Hyperglycemia (transient) — common"
  - "Hypokalemia (transient, β2-mediated) — common"
serious_adverse_events:
  - "Severe hypertensive crisis with intracranial hemorrhage (especially after IV bolus or in patients with underlying hypertension)"
  - "Acute myocardial infarction / ischemia (in patients with coronary artery disease)"
  - "Severe ventricular arrhythmia (V-tach, V-fib)"
  - "Acute pulmonary edema (rare)"
  - "Cerebrovascular accident (rare)"
  - "Tissue necrosis from accidental SC infiltration of high-concentration solution (treat with phentolamine local infiltration)"
  - "Severe rebound bronchospasm in asthma patients on β-blockers"
major_interactions:
  - "Non-selective β-blockers (propranolol, nadolol, timolol): paradoxical severe hypertension (unopposed α-stimulation) and reduced therapeutic response in anaphylaxis — may need higher epinephrine dose + glucagon 1-5 mg IV"
  - "MAO inhibitors: hypertensive crisis (potentiated by reduced catecholamine breakdown)"
  - "Tricyclic antidepressants: potentiated cardiovascular effects (hypertension, arrhythmia)"
  - "Halothane / volatile anesthetics: sensitize myocardium to arrhythmia"
  - "α-blockers (phentolamine, doxazosin): antagonize vasoconstrictor effect"
  - "Digoxin: increased ventricular ectopy"
  - "Cocaine, amphetamines: additive sympathomimetic effects → hypertensive crisis"
  - "Levothyroxine (high doses, hyperthyroidism): potentiates effects"
pharmacology:
  half_life_hours: 0.05  # ~2-3 minutes (highly transient)
  clearance: "Rapidly metabolized by COMT and MAO at sympathetic terminals and in liver; renal excretion of inactive metabolites (metanephrine, vanillylmandelic acid)"
  protein_binding_pct: 50
  metabolism: "COMT (catechol-O-methyltransferase) and MAO (monoamine oxidase) — both ubiquitous; very rapid clearance underlies need for repeat dosing every 5-15 min in anaphylaxis"
sources:
  - SRC-NCCN-BCELL-2025
  - SRC-NCCN-MM-2025
last_reviewed: "2026-04-27"
reviewer_signoffs: []
notes: >
  ABSOLUTE FIRST-LINE for anaphylaxis — no equivalent alternative.
  H1/H2 antihistamines (diphenhydramine, famotidine), corticosteroids
  (hydrocortisone, methylprednisolone), and bronchodilators are all
  ADJUNCTS, NOT replacements. Delay or omission of epinephrine in
  anaphylaxis is the leading modifiable cause of fatal outcome —
  give EARLY (within 5 min of recognition), give IM thigh (NOT SC,
  NOT deltoid), and REPEAT every 5-15 min if symptoms persist.
  Common pitfall in chemotherapy infusion reactions: treating with
  diphenhydramine + steroid alone while withholding epinephrine
  for "mild" symptoms — escalate immediately if hypotension,
  bronchospasm, or upper airway involvement. Patients on β-blockers
  who develop refractory anaphylaxis: add glucagon 1-5 mg IV bolus
  then 5-15 µg/min infusion (bypasses β-receptor block via
  intracellular cAMP elevation). Auto-injectors not widely
  available in Ukraine — emergency department / oncology day-unit
  protocols should pre-position 1 mg/mL ampules + syringes and
  drill the IM-thigh administration. Ukraine: registered, NSZU-
  covered, ubiquitous.
