id: DRUG-VEMURAFENIB
names:
  preferred: "Vemurafenib"
  ukrainian: "Вемурафеніб"
  english: "Vemurafenib"
  synonyms: ["PLX4032", "RG7204"]
  brand_names: ["Zelboraf"]
atc_code: L01EC01
rxnorm_id: ""
drug_class: "BRAF V600 kinase inhibitor"
mechanism: >
  STUB — needs full curation. First-in-class selective BRAF V600E/K
  kinase inhibitor; the historical proof-of-concept agent. Combined
  with cobimetinib (coBRIM) for BRAF V600 melanoma to mitigate
  paradoxical activation + skin toxicity. Also active in BRAF V600E
  Erdheim-Chester / hairy-cell leukemia (off-label / niche).

regulatory_status:
  fda:
    approved: true
    year_first_approval: 2011
    indications_brief: ["Unresectable/metastatic BRAF V600 melanoma (mono or combo cobimetinib)", "Erdheim-Chester (BRAF V600+)"]
  ema:
    approved: true
    year_first_approval: 2012
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: "STUB — pending CSD-4 verification. Dabrafenib (+trametinib) is the dominant BRAFi in UA reimbursement; vemurafenib less commonly funded."

typical_dosing: >
  STUB. 960 mg PO BID continuous, with cobimetinib 60 mg PO daily x21d /
  q28d cycle (coBRIM).

formulations:
  - "Tablets 240 mg"

absolute_contraindications: []
black_box_warnings: []
common_adverse_events:
  - "Photosensitivity (severe — sun protection critical)"
  - "Arthralgia"
  - "Rash / skin papillomas"
  - "Fatigue"
  - "Alopecia"
  - "Nausea"
  - "Pruritus"
serious_adverse_events:
  - "Cutaneous SCC / new primary melanoma (~25% — dermatology q3 mo)"
  - "Severe photosensitivity reactions / SJS / TEN"
  - "QT prolongation"
  - "Hepatotoxicity"
  - "Uveitis"
  - "Renal failure (rare)"
major_interactions:
  - "STUB — strong CYP3A4 inhibitors/inducers; QT-prolonging drugs"

pharmacology:
  half_life_hours: 57
  clearance: "hepatic"
  protein_binding_pct: 99
  metabolism: "CYP3A4"

sources:
  - SRC-NCCN-MELANOMA-2025
  - SRC-ESMO-MELANOMA-2024

last_reviewed: "2026-04-27"
reviewers: []
notes: >
  STUB — Phase CSD-4 promotion. Skin surveillance (full body derm exam
  q3 months) mandatory throughout treatment due to SCC/keratoacanthoma
  risk. Needs full curation of dose-adj, photosensitivity management,
  monitoring schedule (LFTs, ECG, derm).
