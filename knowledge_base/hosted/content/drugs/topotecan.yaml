id: DRUG-TOPOTECAN
names:
  preferred: "Topotecan"
  ukrainian: "Топотекан"
  english: "Topotecan"
  synonyms: ["SKF-104864"]
  brand_names: ["Hycamtin"]
atc_code: L01CE01
rxnorm_id: ""
drug_class: "Topoisomerase I inhibitor (camptothecin)"
mechanism: >
  STUB — needs full curation. Inhibits topoisomerase I — stabilizes
  DNA-Topo I cleavable complex → double-strand breaks during DNA
  replication. Used in platinum-resistant ovarian cancer, recurrent
  SCLC (sensitive disease), recurrent cervical cancer. Both IV and
  oral formulations.

regulatory_status:
  fda:
    approved: true
    year_first_approval: 1996
    indications_brief: ["Recurrent ovarian post-platinum", "Sensitive-relapse SCLC", "Recurrent cervical (combo cisplatin)"]
  ema:
    approved: true
    year_first_approval: 1996
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: "STUB — pending CSD-4 verification. Generic widely available globally; UA registration likely yes via generic — verify per drlz.com.ua."

typical_dosing: >
  STUB. IV: 1.5 mg/m²/day x 5 days every 21 days (classical) or weekly
  4 mg/m². Oral: 2.3 mg/m²/day x 5 days every 21 days.

formulations:
  - "IV powder for solution (1 mg, 4 mg vials)"
  - "Capsules 0.25 mg, 1 mg"

absolute_contraindications:
  - "Severe baseline cytopenia"
  - "Severe hepatic impairment"
black_box_warnings:
  - "Bone-marrow suppression — frequent monitoring required"
common_adverse_events:
  - "Severe neutropenia (~80% IV, ~50% oral)"
  - "Thrombocytopenia"
  - "Anemia"
  - "Diarrhea (oral > IV)"
  - "Nausea / vomiting"
  - "Fatigue"
  - "Alopecia"
serious_adverse_events:
  - "Febrile neutropenia"
  - "Severe diarrhea (oral)"
  - "Interstitial lung disease (rare)"
  - "GI perforation"
major_interactions:
  - "STUB — P-gp / BCRP substrate"

pharmacology:
  half_life_hours: 3
  clearance: "renal (predominant)"
  protein_binding_pct: 35
  metabolism: "minimal hepatic; renal excretion of parent + lactone-carboxylate"

sources:
  - SRC-NCCN-OVARIAN-2025
  - SRC-ESMO-OVARIAN-2024

last_reviewed: "2026-04-27"
reviewers: []
notes: >
  STUB — Phase CSD-4 promotion. Renal dose adjustment required
  (CrCl 20-39 → 50% dose reduction). Weekly schedule better tolerated
  than 5-day continuous in older / pretreated patients. Needs full
  curation of dose-adj for renal/hepatic, monitoring (CBC weekly),
  and supportive care (G-CSF, antiemetics).
