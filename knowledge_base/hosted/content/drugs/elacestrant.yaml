id: DRUG-ELACESTRANT
names:
  preferred: "Elacestrant"
  ukrainian: "Елацестрант"
  english: "Elacestrant"
  brand_names: ["Orserdu"]
atc_code: L02BA04
rxnorm_id: null
drug_class: "Oral SERD (selective estrogen receptor degrader)"
mechanism: >
  First-in-class oral SERD. EMERALD trial: elacestrant superior to fulvestrant or AI in ESR1-mutant HR+/HER2- metastatic post-CDK4/6i.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: |
      Не зареєстровано в UA (Держреєстр ЛЗ — РП відсутнє станом на 2026-04-27).
      Перший пероральний SERD для ESR1-mutated HR+/HER2- m BC
      post-CDK4/6+ET; не входить до НСЗУ.
      Шляхи доступу:
      - Named-patient import (DEC спецдозвіл).
      - EAP Menarini-Stemline (через локального дистрибʼютора) — потребує
        ESR1-mutation у ctDNA.
      - Cross-border (EU): EU мамологічні центри через "Лікування за
        кордоном" (наказ МОЗ 988); EMERALD SoC у EU для post-CDK4/6
        ESR1-mut пацієнтів.
      - Trial-only: post-marketing trials в EU.
      Source: drlz.com.ua пошук "elacestrant"/"orserdu" 2026-04-27 — РП відсутнє.

typical_dosing: >
  345 mg PO once daily with food.

key_toxicities:
  - Nausea (~35%)
  - Fatigue
  - Vomiting
  - Hot flashes
  - Decreased appetite
  - Hepatic enzyme elevations

sources: [SRC-NCCN-BREAST-2025, SRC-ESMO-BREAST-METASTATIC-2024]
last_reviewed: null
notes: >
  Indication: ESR1-mutant HR+/HER2- metastatic after at least one prior endocrine therapy. ESR1 mutation testing on ctDNA recommended pre-start.

notes_patient: >
  Таблетка-SERD: повністю руйнує естрогеновий рецептор у пухлинних клітинах. Зручна перорально (на відміну від ін'єкційного fulvestrant). Для раку грудей HR+ з мутацією ESR1.
