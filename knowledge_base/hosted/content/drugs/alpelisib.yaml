id: DRUG-ALPELISIB
names:
  preferred: "Alpelisib"
  ukrainian: "Алпелісіб"
  english: "Alpelisib"
  brand_names: ["Piqray"]
atc_code: L01EM03
rxnorm_id:
drug_class: "PI3K-alpha-selective inhibitor"
mechanism: >
  Selective inhibitor of PI3K-alpha (p110α isoform). Active in PIK3CA-mutant HR+/HER2- metastatic — combined with fulvestrant per SOLAR-1.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: false
    last_verified: "2026-04-27"
    notes: "Реєстрація МОЗ підтверджена для РМЗ HR+/HER2- PIK3CA-mut з fulvestrant (раніше registered=false — виправлено). НСЗУ не покриває — пілотні програми. Out-of-pocket переважно. Джерело: nszu.gov.ua (2026-04)."

    reimbursement_indications: []
typical_dosing: >
  300 mg PO once daily with food + fulvestrant standard dosing.

key_toxicities:
- Hyperglycemia (~64% any grade, ~37% G3+) — anti-diabetic management essential; pre-treatment HbA1c + fasting glucose; metformin first-line if hyperglycemic
- Rash (~52%) — antihistamines + topical/systemic corticosteroids
- Diarrhea (~58%)
- Stomatitis
- Decreased appetite, nausea, weight loss
- Hepatotoxicity

sources: [SRC-NCCN-BREAST-2025, SRC-ESMO-BREAST-METASTATIC-2024]
last_reviewed:
notes: >
  SOLAR-1: PIK3CA-mutant HR+/HER2- metastatic post-AI. Pre-treatment PIK3CA testing (tissue or ctDNA) required. Hyperglycemia management dominant clinical workflow burden.

notes_patient: >
  Таблетка-PI3Ki для пухлин раку грудей з мутацією PIK3CA. Комбінують з fulvestrant. Часто підвищує цукор крові — можливо знадобиться інсулін або метформін на фоні лікування.
