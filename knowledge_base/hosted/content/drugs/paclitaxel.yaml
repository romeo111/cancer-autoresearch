id: DRUG-PACLITAXEL
names:
  preferred: "Paclitaxel"
  ukrainian: "Паклітаксель"
  english: "Paclitaxel"
  brand_names: ["Taxol", "Onxol"]
atc_code: L01CD01
rxnorm_id: "56946"
drug_class: "Taxane (microtubule stabilizer)"
mechanism: >
  Diterpenoid originally isolated from Pacific yew (Taxus brevifolia).
  Binds the β-subunit of polymerized tubulin at the taxane-binding
  site, promoting microtubule assembly and stabilizing existing
  microtubules against depolymerization. Cells arrest at the
  G2/M-phase transition unable to complete mitosis, triggering
  apoptosis. Solubilized in Cremophor-EL (polyoxyethylated castor
  oil) + dehydrated alcohol — Cremophor-EL is responsible for the
  characteristic hypersensitivity reactions and necessitates
  premedication with corticosteroids + H1 + H2 antihistamines.

regulatory_status:
  fda:
    approved: true
    year_first_approval: 1992
    indications_brief:
