id: DRUG-TEMOZOLOMIDE
names:
  preferred: "Temozolomide"
  ukrainian: "Темозоломід"
  english: "Temozolomide"
  brand_names: ["Temodar", "Temodal"]
atc_code: L01AX03
rxnorm_id: "117055"
drug_class: "Oral alkylating agent (imidazotetrazine)"
mechanism: >
  Methylates DNA at O6/N7 of guanine. Crosses blood-brain barrier
  efficiently — backbone of Stupp protocol for newly-diagnosed
  glioblastoma (concurrent + adjuvant). MGMT promoter methylation
  predicts response (methylated → ~3× longer OS benefit vs unmethylated).

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: true
    reimbursement_indications:
      - "Гліобластома (Stupp — конкомітантно з променевою терапією та ад'ювантно)"
      - "Анапластична астроцитома / олігодендрогліома"
    last_verified: "2026-04-27"
typical_dosing: >
  GBM Stupp concurrent: 75 mg/m² PO daily during RT (6 weeks).
  GBM Stupp adjuvant: 150-200 mg/m² PO days 1-5 of every 28-d cycle × 6 cycles
  (start at 150, escalate to 200 if tolerated).
formulations: ["Capsules 5 mg, 20 mg, 100 mg, 140 mg, 180 mg, 250 mg"]

absolute_contraindications:
  - "Severe pre-existing myelosuppression"
  - "Pregnancy"
  - "Severe hypersensitivity"

black_box_warnings:
  - "Myelosuppression (delayed nadir 21-28 days)"
  - "Secondary malignancies (MDS / AML long-term risk)"

common_adverse_events:
  - "Myelosuppression (lymphopenia universal — PJP prophylaxis advised)"
  - "Nausea (premedicate with 5-HT3)"
  - "Fatigue"
  - "Constipation"
  - "Headache"

serious_adverse_events:
  - "Severe pancytopenia"
  - "PJP pneumonia (lymphopenia → opportunistic infection)"
  - "Hepatotoxicity (rare)"
  - "Secondary AML/MDS (long-term)"

sources:
  - SRC-NCCN-CNS-2025
  - SRC-EANO-GBM-2024

last_reviewed: "2026-04-26"
notes: >
  PJP prophylaxis (TMP-SMX 1 SS Mon/Wed/Fri or atovaquone 1500 mg
  daily, alternative dapsone 100 mg daily after G6PD screen) during
  concurrent RT + TMZ phase and adjuvant TMZ phase — universal
  lymphopenia (typically CD4 <200) creates opportunistic-infection
  risk window persisting weeks after the last cycle. MGMT promoter
  methylation testing is critical for treatment decision (Stupp
  NEJM 2005; Hegi NEJM 2005): methylated → ~3× greater OS benefit
  vs unmethylated. NOA-08 + Nordic trials: in elderly (>65)
  unmethylated → consider hypofractionated RT alone; methylated →
  TMZ-only or short-course RT + TMZ. CCNU + TMZ doublet
  (CeTeG/NOA-09) showed OS benefit in MGMT-methylated newly-dx GBM.
  Premedicate with 5-HT3 (ondansetron 8 mg) 1 hour before each
  dose; Mon-Fri schedules ease antiemetic burden. CBC weekly during
  concurrent RT, q2 weeks during adjuvant. UA: registered;
  НСЗУ-reimbursed for GBM (Stupp) + anaplastic glioma.
