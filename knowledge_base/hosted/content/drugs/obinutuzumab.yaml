id: DRUG-OBINUTUZUMAB
names:
  preferred: "Obinutuzumab"
  ukrainian: "Обінутузумаб"
  english: "Obinutuzumab"
  brand_names: ["Gazyva", "Gazyvaro"]
atc_code: L01FA03
rxnorm_id: "1442984"
drug_class: "Anti-CD20 monoclonal antibody (glycoengineered Type II)"
mechanism: >
  Glycoengineered, humanized anti-CD20 monoclonal antibody;
  enhanced ADCC vs rituximab; greater direct cell death induction.

regulatory_status:
  fda:
    approved: true
    first_approval_year: 2013
  ema:
    approved: true
  ukraine_registration:
    registered: true
    registration_number: "[TBD]"
    reimbursed_nszu: true
    reimbursement_indications:
    - 'Програма медичних гарантій 2026: ХЛЛ 1L з chlorambucil або venetoclax (CLL14)'
    - 'Реімбурсаційний пакет «Онкологія» 2026: ФЛ 1L високого тягаря з ХТ (GALLIUM)'
    - 'Реімбурсаційний пакет «Онкологія» 2026: ФЛ R/R після rituximab (GADOLIN)'
    last_verified: "2026-04-27"

    notes: 'Зареєстрований; НСЗУ покриває ХЛЛ 1L (CLL14 з venetoclax), ФЛ 1L high-burden та R/R. Менш універсально доступний ніж rituximab. Джерело: nszu.gov.ua (2026-04).'
typical_dosing: "1000 mg IV per cycle (loading + maintenance schedule)"
formulations:
- "IV infusion 25 mg/mL (1000 mg vial)"

absolute_contraindications:
- "Hypersensitivity"
- "Active severe infection"
- "Active hepatitis B without antiviral prophylaxis"
black_box_warnings:
- "Hepatitis B virus reactivation"
- "Progressive multifocal leukoencephalopathy"
common_adverse_events:
- "Infusion reactions (more frequent than rituximab)"
- "Neutropenia"
- "Thrombocytopenia"
- "Pyrexia"
serious_adverse_events:
- "Severe infusion reactions"
- "HBV reactivation"
- "Tumor lysis syndrome (high tumor burden)"

sources:
- SRC-NCCN-BCELL-2025
- SRC-ESMO-MZL-2024

last_reviewed: "2026-04-25"
notes: >
  Alternative anti-CD20 for patients with rituximab intolerance, or in
  CLL/follicular lymphoma settings. Less established for MZL than
  rituximab; data extrapolated from CLL/FL trials.

notes_patient: >
  Препарат-мітка нового покоління для B-клітин (alternative to rituximab). Активніше залучає імунну систему. Вводиться внутрішньовенно при фолікулярній лімфомі та CLL.
