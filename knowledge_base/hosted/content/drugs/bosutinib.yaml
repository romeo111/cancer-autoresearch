id: DRUG-BOSUTINIB
names:
  preferred: "Bosutinib"
  ukrainian: "Босутиніб"
  english: "Bosutinib"
  brand_names: ["Bosulif"]
atc_code: L01EA04
rxnorm_id: "1306287"
drug_class: "BCR-ABL1 / SRC-family TKI (2nd-generation)"
mechanism: >
  Dual BCR-ABL1 + SRC inhibitor. Active against most imatinib-resistant
  mutations except T315I, V299L. Distinct from dasatinib/nilotinib in
  toxicity profile: GI-dominant (diarrhea), minimal cardiac/pulmonary
  effects.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: true
    last_verified: "2026-04-27"

    reimbursement_indications:
    - 'Реімбурсаційний пакет «Онкологія» 2026: ХМЛ Ph+ хронічна фаза 2L+ після резистентності/непереносимості imatinib/dasatinib/nilotinib'
    - 'Реімбурсаційний пакет «Онкологія» 2026: ХМЛ 1L (BFORE) — обмежено'
    notes: 'Реєстрація МОЗ підтверджена (раніше registered=false — виправлено). НСЗУ покриває ХМЛ 2L+ і частково 1L. Уникати при T315I (потребує ponatinib/asciminib — pkg3). Джерело: nszu.gov.ua (2026-04).'
typical_dosing: >
  CML chronic phase 1L: 400 mg PO once daily with food. 2L+ (post other
  TKI failure): 500 mg daily.
formulations: ["Tablets 100 / 400 / 500 mg"]

absolute_contraindications:
- "Hypersensitivity"
- "Severe hepatic impairment"
- "Pregnancy"
black_box_warnings: []
major_interactions:
- "Strong CYP3A4 inhibitors / inducers"
- "PPIs (separate by ≥6 hours)"
common_adverse_events:
- "Diarrhea (>70% — often dose-limiting; may improve over time)"
- "Nausea/vomiting"
- "Abdominal pain"
- "Rash"
- "Hepatic transaminitis"
serious_adverse_events:
- "Severe diarrhea with dehydration"
- "Hepatotoxicity"
- "Renal toxicity (decline in eGFR over years)"

pharmacology: {half_life: "~22 hours"}

sources:
- SRC-NCCN-MPN-2025
- SRC-ELN-CML-2020

last_reviewed: "2026-04-25"
notes: >
  2nd-gen TKI option for CML with cardiovascular comorbidity (avoid
  dasatinib for pulmonary and nilotinib for vascular reasons). AVOID
  in patients with pre-existing severe GI disease (IBD, baseline
  diarrhea). NOT registered in Ukraine — significant access barrier.
