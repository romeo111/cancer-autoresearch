id: DRUG-QUIZARTINIB
names:
  preferred: "Quizartinib"
  ukrainian: "Квізартиніб"
  english: "Quizartinib"
  brand_names: ["Vanflyta"]
atc_code: L01EX21
rxnorm_id: "2624445"
drug_class: "Type-II selective FLT3-ITD tyrosine kinase inhibitor"
mechanism: >
  Type-II FLT3 inhibitor — binds the inactive (DFG-out) conformation
  of FLT3, highly selective for FLT3-ITD (limited activity vs
  FLT3-TKD/D835 mutations). Approved 2023 for newly-diagnosed
  FLT3-ITD+ AML in combination with intensive chemotherapy (induction
  + consolidation + maintenance) on the basis of QuANTUM-First trial.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: |
      Не зареєстровано в UA (Держреєстр ЛЗ — РП відсутнє станом на 2026-04-27).
      FLT3-ITD-інгібітор для frontline FLT3-ITD AML (з 7+3 індукцією);
      не входить до НСЗУ. Дуже новий (FDA 2023).
      Шляхи доступу:
      - Named-patient import (DEC спецдозвіл).
      - EAP Daiichi Sankyo Ukraine (Vanflyta access program; потребує
        FLT3-ITD підтвердженої PCR).
      - Cross-border (EU): EU гематоцентри через "Лікування за
        кордоном" (наказ МОЗ 988).
      - Trial-only: QuANTUM-серія post-marketing.
      Source: drlz.com.ua пошук "quizartinib"/"vanflyta" 2026-04-27 — РП відсутнє.

typical_dosing: >
  Induction: 35.4 mg PO once daily on days 8-21 of induction
  cycle (with 7+3). Consolidation: 35.4-53 mg PO daily on days
  6-19 of each consolidation. Maintenance (post-CR / post-HCT):
  26.5-53 mg PO daily for up to 3 years. Dose-titration based on
  QTc; dose reduction with strong CYP3A4 inhibitors.

formulations: ["Tablets 17.7 mg, 26.5 mg"]

absolute_contraindications:
  - "Hypersensitivity"

black_box_warnings:
  - "QTc prolongation — torsades de pointes, sudden death risk; ECG monitoring + electrolyte management mandatory"

major_interactions:
  - "Strong CYP3A4 inhibitors — reduce dose"
  - "Strong CYP3A4 inducers — avoid"
  - "Other QT-prolonging drugs — additive risk; AVOID combinations"

common_adverse_events:
  - "Cytopenia (febrile neutropenia, thrombocytopenia, anemia)"
  - "Diarrhea"
  - "Nausea"
  - "Fatigue"
  - "Hypokalemia / hypomagnesemia (driver of QTc)"
  - "Mucositis"

serious_adverse_events:
  - "QTc prolongation / torsades de pointes / sudden cardiac death"
  - "Severe febrile neutropenia + sepsis"
  - "Differentiation syndrome (rare, lower than gilteritinib)"

pharmacology: {half_life: "~73 hours (parent) / ~120 hours (active metabolite AC886)"}

sources: [SRC-NCCN-AML-2025, SRC-ELN-AML-2022]
last_reviewed: "2026-04-25"
notes: >
  Pivotal: QuANTUM-First (Erba et al., Lancet 2023) — quizartinib +
  intensive chemo + maintenance vs placebo+chemo in newly-dx
  FLT3-ITD+ AML; median OS 31.9 vs 15.1 mo (HR 0.78, p=0.032).
  Approved FDA July 2023. Type-II selectivity → does NOT cover
  FLT3-TKD/D835; for those use midostaurin (1L) or gilteritinib
  (R/R). Ukraine: NOT registered — access via named-patient import
  / EAP Daiichi Sankyo / cross-border. QTc monitoring + electrolyte
  correction mandatory throughout therapy.
