id: DRUG-TRAMETINIB
names:
  preferred: "Trametinib"
  ukrainian: "Траметиніб"
  english: "Trametinib"
  brand_names: ["Mekinist"]
atc_code: L01EE01
rxnorm_id:
drug_class: "MEK1/2 inhibitor"
mechanism: >
  Selective MEK inhibitor used in combination with dabrafenib. Reduces resistance + skin toxicity vs BRAFi alone.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: true
    last_verified: "2026-04-27"
    notes: "Зареєстрований; НСЗУ покриває лише в комбо з dabrafenib (моно — не рекомендовано). Джерело: nszu.gov.ua (2026-04)."

    reimbursement_indications:
    - 'Програма медичних гарантій 2026: меланома BRAF V600 1L з dabrafenib'
    - 'Реімбурсаційний пакет «Онкологія» 2026: меланома BRAF V600 адьювант з dabrafenib'
    - 'Реімбурсаційний пакет «Онкологія» 2026: НДРЛ BRAF V600E 1L з dabrafenib'
typical_dosing: >
  2 mg PO once daily + dabrafenib 150 mg BID.

key_toxicities:
- Cardiomyopathy / LVEF decline (echo monitoring)
- Retinal events (CSR-like)
- Hypertension
- Rash
- Diarrhea

sources: [SRC-NCCN-NSCLC-2025, SRC-ESMO-NSCLC-METASTATIC-2024]
last_reviewed:
notes: >
  Always combined with dabrafenib for BRAF V600E NSCLC, melanoma, ATC. Cardiac monitoring critical.

notes_patient: >
  Таблетка, що блокує MEK — сигнал нижче за BRAF. Завжди йде в парі з BRAF-інгібітором (dabrafenib або encorafenib) для меланоми та деяких раків легені.
