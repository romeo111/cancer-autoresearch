id: DRUG-MICAFUNGIN
names:
  preferred: "Micafungin"
  ukrainian: "Мікафунгін"
  english: "Micafungin"
  brand_names:
    - "Mycamine"
    - "Funguard"
atc_code: J02AX05
rxnorm_id: "352332"
drug_class: "Echinocandin antifungal (β-1,3-D-glucan synthase inhibitor)"
mechanism: >
  Semisynthetic lipopeptide echinocandin that non-competitively inhibits
  β-(1,3)-D-glucan synthase (Fks1/Fks2 complex), preventing synthesis
  of the essential fungal cell-wall polymer β-(1,3)-D-glucan and
  producing fungicidal activity against most Candida species (including
  many fluconazole-resistant strains) and fungistatic activity against
  Aspergillus species. NO activity against Cryptococcus, Mucorales,
  Fusarium, or Trichosporon. Pharmacologically similar to caspofungin
  but with a flat-dosing structure (no body-weight or hepatic
  adjustment in most patients), no loading dose, and the simplest DDI
  profile of the echinocandin class (no significant interactions with
  cyclosporine, tacrolimus, sirolimus). FDA-approved 2005. Notably
  approved for prevention of invasive candidiasis in HSCT recipients —
  pivotal indication in onco-hematology supportive care.
regulatory_status:
  fda:
    approved: true
    year_first_approval: 2005
    indications_brief:
      - "Prophylaxis of invasive Candida infections in adult HSCT recipients (pre-engraftment)"
      - "Esophageal candidiasis"
      - "Candidemia, acute disseminated candidiasis, Candida peritonitis and abscesses"
      - "Empirical antifungal therapy in persistent febrile neutropenia (per practice guidelines, off-label primary)"
  ema:
    approved: true
    year_first_approval: 2008
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: true
    reimbursement_indications:
      - "Профілактика інвазивних кандидозних інфекцій у пацієнтів HSCT (передприжитковий період)"
      - "Лікування кандидемії, інвазивного кандидозу, езофагіального кандидозу"
    last_verified: "2026-04-27"
    notes: "Зареєстровано в Україні (Mycamine generics). NSZU-covered для онкогематологічних пацієнтів. Перевірено drlz.com.ua 2026-04-27."
typical_dosing: >
  HSCT prophylaxis (adult): 50 mg IV once daily, started day of
  conditioning through engraftment / ANC recovery. Esophageal
  candidiasis: 150 mg IV daily. Candidemia / invasive candidiasis
  (adult): 100 mg IV once daily over 60-min infusion. Empirical
  antifungal in persistent neutropenic fever (off-label primary):
  100 mg IV daily. Pediatric: HSCT prophylaxis 1 mg/kg IV daily;
  candidemia 2 mg/kg IV daily (3 mg/kg if <40 kg consider).
  No loading dose required (steady-state achieved by day 4-5; clinical
  response unaffected by absence of loading vs caspofungin pattern).
  Renal: NO adjustment for any degree of renal impairment, including
  dialysis. Hepatic: no formal adjustment for mild-moderate; caution
  in severe (Child-Pugh >9). Duration: per indication — empirical FN
  through ANC recovery; candidemia 14 days beyond first negative
  blood culture.
formulations:
  - "IV powder for reconstitution: 50 mg, 100 mg vials"
absolute_contraindications:
  - "Hypersensitivity to micafungin or any echinocandin"
black_box_warnings:
  - "Hepatobiliary tumors observed in 3-month rat carcinogenicity studies (clinical relevance unclear; long-term human data reassuring) — minimize unnecessary prolonged exposure"
common_adverse_events:
  - "Mild transaminitis (ALT, AST elevation) — ~5-15%"
  - "Local infusion-site reaction / phlebitis — ~5-10%"
  - "Fever — ~5%"
  - "Headache — ~5-10%"
  - "Diarrhea — ~5-10%"
  - "Nausea — ~5%"
  - "Vomiting — ~3-5%"
  - "Hypokalemia — ~5-10%"
  - "Hypomagnesemia — ~3-5%"
  - "Anemia — ~3-5%"
  - "Rash — ~3-5%"
  - "Pruritus — ~2-3%"
  - "Hypocalcemia — ~3-5%"
  - "Histamine-related infusion reaction (flushing, hypotension) — ~2-3%"
serious_adverse_events:
  - "Severe hypersensitivity / anaphylaxis (rare)"
  - "Severe hepatic dysfunction (rare; mostly mild transaminitis)"
  - "Hepatic tumors (rat carcinogenicity signal — boxed; not seen in humans to date)"
  - "Stevens-Johnson syndrome / TEN (very rare)"
  - "Severe hemolysis / hemolytic anemia (rare)"
  - "Acute kidney injury (rare; non-renally cleared but case reports)"
  - "Significant hypokalemia / hypomagnesemia with cardiac arrhythmia (uncommon)"
major_interactions:
  - "Sirolimus: micafungin increases sirolimus AUC ~21% — monitor levels"
  - "Nifedipine: micafungin increases nifedipine AUC ~18% — minimal clinical significance"
  - "Itraconazole: micafungin increases itraconazole AUC ~22% — minimal"
  - "Cyclosporine, tacrolimus: NO clinically significant interaction (key advantage over caspofungin / azoles)"
  - "Mycophenolate: no clinically significant interaction"
  - "Live vaccines: avoid during active fungal infection"
  - "Hepatotoxic drugs (acetaminophen, methotrexate, statins, isoniazid): additive hepatotoxicity"
  - "Other azole / amphotericin antifungals: no significant interaction; combination occasionally used"
pharmacology:
  half_life_hours: 14  # 13-17 h
  clearance: "Hepatic — non-CYP catabolism (catechol-O-methyltransferase + arylsulfatase to inactive metabolites); <1% renal excretion"
  protein_binding_pct: 99
  metabolism: "Hepatic via non-CYP enzymes — minimal CYP-mediated DDIs, simplest DDI profile of echinocandin class"
sources:
  - SRC-NCCN-BCELL-2025
  - SRC-NCCN-MM-2025
last_reviewed: "2026-04-27"
reviewer_signoffs: []
notes: >
  Standard antifungal prophylaxis in HSCT — pivotal trial (van Burik
  CID 2004) demonstrated superiority over fluconazole for invasive
  fungal infection prevention in HSCT recipients. Also first-line
  treatment for candidemia and invasive candidiasis (IDSA 2016
  echinocandin recommendation). Differentiator from caspofungin:
  no loading dose, no body-weight adjustment, no hepatic adjustment
  in moderate impairment, even simpler DDI profile (no clinically
  meaningful interactions with cyclosporine or tacrolimus — key
  advantage in HSCT and solid-organ transplant where calcineurin
  inhibitors are concurrent). Boxed warning regarding hepatic
  tumors in rat carcinogenicity studies has not translated to
  human signal in two decades of post-marketing surveillance, but
  prescribing information warns against unnecessary prolonged use.
  Same spectrum limitations as caspofungin (no Mucor, no
  Cryptococcus, fungistatic for Aspergillus). Ukraine: registered,
  NSZU-covered; preferred echinocandin in HSCT contexts.
