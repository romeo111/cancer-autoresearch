id: DRUG-ERLOTINIB
names:
  preferred: "Erlotinib"
  ukrainian: "Ерлотиніб"
  english: "Erlotinib"
  brand_names: ["Tarceva"]
atc_code: L01EB02
rxnorm_id:
drug_class: "1st-generation EGFR TKI (reversible)"
mechanism: >
  Reversible EGFR-TKI. Pre-T790M era 1L standard; now 2L+ or alternate when osimertinib unavailable.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: true
    reimbursement_indications:
    - 'Програма медичних гарантій 2026: НДРЛ EGFR-mut 1L (історично; зараз поступається osimertinib)'
    last_verified: "2026-04-27"
    notes: "Зареєстрований; НСЗУ покриває для НДРЛ EGFR-mut, але клінічно витіснений osimertinib. Джерело: nszu.gov.ua (2026-04)."

typical_dosing: >
  150 mg PO once daily on empty stomach.

key_toxicities:
- Rash / acneiform eruption (~75%)
- Diarrhea
- Fatigue
- Hepatic transaminase elevations
- ILD (~1-2%)

sources: [SRC-NCCN-NSCLC-2025, SRC-ESMO-NSCLC-METASTATIC-2024]
last_reviewed:
notes: >
  Largely supplanted by osimertinib in 1L. 2L+ option when osi-resistance pathway not amenable to next-line targeted; rare in modern era.
