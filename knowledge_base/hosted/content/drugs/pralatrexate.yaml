id: DRUG-PRALATREXATE
names:
  preferred: "Pralatrexate"
  ukrainian: "Пралатрексат"
  english: "Pralatrexate"
  brand_names: ["Folotyn"]
atc_code: L01BA05
rxnorm_id: "877393"
drug_class: "Antifolate (selective for RFC-1 transporter — accumulates in malignant T-cells)"
mechanism: >
  Folate analog with high affinity for reduced folate carrier-1
  (RFC-1) transporter, selectively accumulating in malignant T-cells
  and inhibiting dihydrofolate reductase (DHFR). Internal
  polyglutamation traps the drug intracellularly. Mechanism distinct
  from methotrexate — designed for selective uptake in T-cell
  malignancies.

regulatory_status:
  fda: {approved: true}
  ema: {approved: false}  # withdrawn 2012 due to insufficient mature data; not currently EMA-approved
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    last_verified: "2026-04-25"
    notes: "Not registered in Ukraine; not EMA-approved (withdrawn 2012). Access via international supply / clinical trial only — limited."

typical_dosing: "30 mg/m² IV push over 3-5 min, weekly × 6 of every 7-week cycle, until progression or unacceptable toxicity"
formulations: ["IV solution 20 mg/mL"]

absolute_contraindications:
  - "Hypersensitivity"
  - "Severe hepatic impairment without folate / B12 supplementation"
black_box_warnings:
  - "Mucositis — common and dose-limiting; can be severe"
  - "Cytopenias — anemia, neutropenia, thrombocytopenia"
major_interactions:
  - "Trimethoprim/sulfamethoxazole — additive antifolate toxicity (avoid concurrent prolonged use)"
  - "NSAIDs — reduce pralatrexate clearance, increase toxicity"
  - "Probenecid — reduce clearance"
  - "Aspirin / penicillins — caution"
common_adverse_events:
  - "Mucositis (~70% any grade; ~21% Grade ≥3 — DOSE-LIMITING)"
  - "Thrombocytopenia"
  - "Nausea"
  - "Fatigue"
  - "Anemia"
  - "Constipation"
  - "Pyrexia"
serious_adverse_events:
  - "Severe mucositis (Grade ≥3) preventing PO intake — common dose modification trigger"
  - "Severe thrombocytopenia / hemorrhage"
  - "Severe neutropenia + infection"
  - "Hepatotoxicity"
  - "Tumor lysis syndrome (high-burden)"
  - "Stevens-Johnson / TEN (rare)"

pharmacology:
  half_life: "~12-18 hours"
  elimination: "Renal (~30%) + hepatic"

sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
notes: >
  PROPEL trial (O'Connor 2011): r/r PTCL n=111 (incl PTCL NOS, AITL,
  ALCL ALK-, transformed MF) — ORR 29%, CR 11%, mDOR 10.1 mo. FDA-
  approved for r/r PTCL after ≥1 prior line. Mucositis is dominant
  dose-limiting toxicity — MANDATORY folate 1 mg PO daily +
  vitamin B12 1 mg IM every 8-10 weeks throughout therapy +
  oral cryotherapy / cold-water gargle during infusion to mitigate.
  Major UA access barrier: not registered + not EMA-approved.
