id: DRUG-NELARABINE
names:
  preferred: "Nelarabine"
  ukrainian: "Неларабін"
  english: "Nelarabine"
  brand_names: ["Arranon", "Atriance"]
atc_code: L01BB07
rxnorm_id: "423139"
drug_class: "Nucleoside analog (deoxyguanosine analog) — selectively cytotoxic for T-lymphoblasts"
mechanism: >
  Pro-drug demethylated to ara-G (9-β-D-arabinofuranosylguanine), then
  phosphorylated to ara-GTP, which incorporates into DNA and inhibits
  DNA synthesis. T-lymphoblasts accumulate ara-GTP preferentially due
  to higher deoxyguanosine kinase activity, conferring T-cell selectivity.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: |
      Не зареєстровано в UA (Держреєстр ЛЗ — РП відсутнє станом на 2026-04-27).
      Purine nucleoside для r/r T-ALL/T-LBL; не входить до НСЗУ.
      Шляхи доступу:
      - Named-patient import (DEC спецдозвіл).
      - EAP Sandoz/Novartis (Atriance — через EU дистрибʼютора).
      - Cross-border (EU): EU педіатричні/гематоонкоцентри через
        "Лікування за кордоном" (наказ МОЗ 988); EMA-затверджено 2007.
      - Trial-only: post-marketing CALGB studies.
      Source: drlz.com.ua пошук "nelarabine"/"atriance"/"arranon" 2026-04-27 — РП відсутнє.

typical_dosing: "Adults: 1500 mg/m² IV over 2h on days 1, 3, 5 every 21 days. Pediatrics: 650 mg/m² IV daily × 5 every 21 days."
formulations: ["IV solution 5 mg/mL"]

absolute_contraindications:
  - "Hypersensitivity"
  - "Active severe neurological disease (relative — neurotoxicity dose-limiting)"
black_box_warnings:
  - "Severe neurologic adverse reactions including peripheral neuropathy, demyelination, ascending paralysis (Guillain-Barré-like), seizures — sometimes irreversible"
major_interactions:
  - "Pentostatin — increased neurotoxicity; avoid"
  - "Other CNS-active agents — additive neurotoxicity"
  - "Live vaccines — avoid during/post therapy"
common_adverse_events:
  - "Fatigue"
  - "Nausea, vomiting"
  - "Pyrexia"
  - "Anemia, neutropenia, thrombocytopenia"
  - "Peripheral neuropathy (any grade ~20%; Grade ≥3 ~5-10%)"
  - "Headache, somnolence"
  - "Diarrhea, constipation"
serious_adverse_events:
  - "Severe peripheral neuropathy / Guillain-Barré-like syndrome (sometimes irreversible)"
  - "Seizures, encephalopathy"
  - "Severe cytopenias + infection"
  - "Tumor lysis syndrome (high-burden T-ALL/T-LBL)"
  - "Demyelination"

pharmacology:
  half_life: "~30 min (parent); ~3 h (active ara-G)"
  elimination: "Renal (~25%) + intracellular trapping"

sources: [SRC-NCCN-BCELL-2025, SRC-ESMO-PTCL-2024]
last_reviewed: "2026-04-27"
notes: >
  AALL0434 (Dunsmore 2020) — adding nelarabine to augmented BFM
  improved 4-yr DFS in pediatric/AYA T-ALL (88.9% vs 83.3%). Adult
  data: Gökbuget 2017 — nelarabine effective in r/r T-ALL/T-LBL
  (CR ~37%). FDA-approved for r/r T-ALL/T-LBL after ≥2 prior lines.
  Neurotoxicity is dominant DLT — baseline neurologic exam mandatory;
  permanent discontinuation if Grade ≥2 neurologic events. Often used
  as bridge to alloSCT in fit responders.
