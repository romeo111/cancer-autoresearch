id: DRUG-DURVALUMAB
names:
  preferred: "Durvalumab"
  ukrainian: "Дурвалумаб"
  english: "Durvalumab"
  brand_names: ["Imfinzi"]
atc_code: L01FF03
rxnorm_id: "1922372"
drug_class: "Anti-PD-L1 human IgG1 monoclonal antibody (ICI)"
mechanism: >
  Blocks PD-L1. Combined with tremelimumab (anti-CTLA-4) as STRIDE
  regimen for 1L unresectable HCC (HIMALAYA).
regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: true
    reimbursement_indications:
    - 'Програма медичних гарантій 2026: НДРЛ стадія III нерезектабельна після ХПТ (PACIFIC, консолідація)'
    - 'Реімбурсаційний пакет «Онкологія» 2026: ДРЛ-розширене стадія 1L з карбоплатин+етопозид'
    last_verified: "2026-04-27"
    notes: "Раніше ключ reimbursed_nszu відсутній — встановлено true з обмеженням до PACIFIC-режиму (NSCLC III nerezектабельна) та ДРЛ ext. STRIDE-режим (з tremelimumab) — без UA НСЗУ. Джерело: nszu.gov.ua (2026-04)."
typical_dosing: >
  STRIDE (HCC): single priming dose tremelimumab 300 mg + durvalumab 1500 mg q4w until progression.
formulations: ["IV solution 50 mg/mL"]
absolute_contraindications: ["Active autoimmune disease on immunosuppression", "Pregnancy"]
black_box_warnings: ["irAE spectrum (pneumonitis, colitis, hepatitis, endocrinopathies)"]
common_adverse_events: ["Fatigue", "Rash", "Diarrhea", "Decreased appetite", "Hypothyroidism"]
serious_adverse_events: ["Severe colitis", "Pneumonitis", "Hepatitis", "Hypophysitis"]
sources: [SRC-NCCN-HCC-2025, SRC-AASLD-HCC-2023]
last_reviewed: "2026-04-26"
notes: >
  STUB — Phase GI-1. STRIDE (single tremelimumab + durvalumab) preferred
  over previous T+D dosing. mOS 16.4 mo vs 13.8 sorafenib (HIMALAYA).
  Useful when bev contraindicated (varices, recent thromboembolic event).
