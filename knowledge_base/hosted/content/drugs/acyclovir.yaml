id: DRUG-ACYCLOVIR
names:
  preferred: "Acyclovir"
  ukrainian: "Ацикловір"
  english: "Acyclovir"
  brand_names:
    - "Zovirax"
atc_code: J05AB01
rxnorm_id: "281"
drug_class: "Nucleoside analogue antiviral (acyclic guanosine)"
mechanism: >
  Selectively phosphorylated by viral thymidine kinase to acyclovir
  monophosphate, then by host kinases to acyclovir triphosphate, which
  inhibits viral DNA polymerase and terminates viral DNA chain elongation.
  Active against HSV-1, HSV-2, VZV; modest activity against EBV, CMV.

regulatory_status:
  fda:
    approved: true
  ema:
    approved: true
  ukraine_registration:
    registered: true
    registration_number: "[TBD]"
    reimbursed_nszu: true
    last_verified: "2026-04-25"

typical_dosing: "400 mg PO twice daily for HSV/VZV prophylaxis during proteasome inhibitor therapy"
formulations:
  - "Tablets 200 / 400 / 800 mg"
  - "IV powder 500 / 1000 mg vials"

absolute_contraindications:
  - "Hypersensitivity to acyclovir or valacyclovir"
black_box_warnings: []
major_interactions:
  - "Probenecid increases acyclovir exposure"
  - "Concomitant nephrotoxic agents (aminoglycosides, NSAIDs) increase renal risk"
common_adverse_events:
  - "Headache"
  - "Nausea"
  - "Diarrhea"
  - "Mild renal function changes"
serious_adverse_events:
  - "Acute kidney injury (crystalluria, especially with rapid IV infusion or dehydration)"
  - "Neurotoxicity (especially with renal impairment — confusion, hallucinations, tremor)"
  - "Thrombotic thrombocytopenic purpura / hemolytic uremic syndrome (rare, immunocompromised)"

pharmacology:
  half_life: "~3 hours (normal renal function); ~20 hours in anuric patients"

sources:
  - SRC-NCCN-MM-2025

last_reviewed: "2026-04-25"
notes: >
  HSV/VZV prophylaxis is mandatory during proteasome inhibitor therapy
  (bortezomib, carfilzomib, ixazomib) due to substantially increased risk
  of herpes zoster reactivation. Renal dose adjustment required if
  CrCl <50 mL/min. Valacyclovir (500 mg PO daily) is an acceptable
  prodrug alternative with better bioavailability.
