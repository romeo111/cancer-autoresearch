id: DRUG-HYDROCORTISONE
names:
  preferred: "Hydrocortisone"
  ukrainian: "Гідрокортизон"
  english: "Hydrocortisone"
  brand_names:
    - "Solu-Cortef"
    - "Cortef"
  synonyms:
    - "cortisol"
atc_code: H02AB09
rxnorm_id: "5492"
drug_class: "Corticosteroid — short-acting glucocorticoid (also significant mineralocorticoid activity)"
mechanism: >
  Synthetic form of endogenous cortisol; binds cytoplasmic glucocorticoid
  receptor → translocates to nucleus → modulates transcription of
  hundreds of inflammatory and immune-regulatory genes. Effects relevant
  to oncology supportive care: anti-inflammatory (suppression of
  cytokine release, leukocyte trafficking, complement activation),
  anti-allergic (membrane stabilization in mast cells / basophils,
  reduced eosinophil function), immunosuppressive, and significant
  mineralocorticoid activity (sodium/water retention — distinguishes
  from dexamethasone and methylprednisolone which lack mineralocorticoid
  effect; clinically relevant in adrenal insufficiency replacement).
  In acute use for chemotherapy infusion reactions and anaphylaxis,
  hydrocortisone provides delayed onset (4-6 h) reduction in late-
  phase mediator release (preventing biphasic reaction recurrence
  4-12 h after initial event). Approved as a generic glucocorticoid
  since 1955.
regulatory_status:
  fda:
    approved: true
    year_first_approval: 1955
    indications_brief:
      - "Adrenocortical insufficiency (Addison's disease, secondary)"
      - "Acute adrenal crisis (100 mg IV bolus, 200-300 mg/day)"
      - "Chemotherapy infusion reactions / mild anaphylaxis adjunct (NOT first-line — epinephrine first)"
      - "Severe asthma exacerbation"
      - "Inflammatory dermatologic, rheumatologic, ophthalmologic conditions"
      - "Septic shock (300 mg/day for vasopressor-refractory shock)"
  ema:
    approved: true
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: true
    reimbursement_indications:
      - "Адреналова недостатність (Аддісонова хвороба, рятувальна терапія)"
      - "Тяжкі алергічні / анафілактоїдні реакції — додаток до адреналіну"
      - "Хімо-індуковані інфузійні реакції"
      - "Септичний шок з вазопресорною резистентністю"
    last_verified: "2026-04-27"
    notes: "Зареєстровано в Україні (Solu-Cortef, generics). NSZU-covered, ubiquitous. Перевірено drlz.com.ua 2026-04-27."
typical_dosing: >
  ANAPHYLAXIS / SEVERE INFUSION REACTION ADJUNCT (adult): 100-200 mg
  IV bolus over 1-2 min, may repeat every 6 h; given AFTER epinephrine
  IM (epinephrine is the life-saving first-line, hydrocortisone
  prevents biphasic reaction). Pediatric: 4-8 mg/kg IV (max 200 mg).
  ACUTE ADRENAL CRISIS: 100 mg IV bolus then 200-300 mg/day in
  divided doses or continuous infusion until stable, then taper.
  CHRONIC REPLACEMENT in adrenal insufficiency: 15-25 mg/day PO in
  divided doses (e.g., 10 mg AM + 5-10 mg early afternoon mimicking
  diurnal cortisol rhythm). Stress dose for surgery / acute illness:
  100 mg IV/IM at induction, then 50 mg IV q6h × 24-48 h, taper.
  Renal: no adjustment. Hepatic: caution in severe cirrhosis (reduced
  conversion). Equivalence: 20 mg hydrocortisone = 5 mg prednisolone
  = 4 mg methylprednisolone = 0.75 mg dexamethasone (anti-inflammatory
  potency).
formulations:
  - "IV/IM powder for reconstitution: 100 mg, 250 mg, 500 mg, 1000 mg vials (Solu-Cortef = sodium succinate)"
  - "Tablet 5 mg, 10 mg, 20 mg"
  - "Topical cream / ointment 0.5%, 1%, 2.5% (dermatology — minimal oncology use)"
  - "Suppository 25 mg, 100 mg (proctitis)"
absolute_contraindications:
  - "Hypersensitivity to hydrocortisone or any corticosteroid"
  - "Systemic fungal infection (uncontrolled — exception is when steroid is the treatment for adrenal crisis from another cause)"
  - "Live vaccines during high-dose immunosuppression"
black_box_warnings: []
common_adverse_events:
  - "Sodium/water retention — common (especially with chronic high-dose; less of an issue with single bolus dose)"
  - "Hypokalemia — common (mineralocorticoid effect)"
  - "Hypertension (chronic use)"
  - "Hyperglycemia — common in chronic use"
  - "Insomnia, mood elevation / agitation (acute) — ~10-30%"
  - "Increased appetite (chronic)"
  - "Fluid retention / edema"
  - "Increased infection susceptibility (chronic)"
  - "Mild facial flushing (immediately post-IV bolus) — common, transient"
  - "Mild transient hypotension (rapid IV) — uncommon"
  - "Local infusion-site warmth — minor"
  - "Indigestion / dyspepsia (chronic)"
serious_adverse_events:
  - "Adrenal suppression with abrupt discontinuation after >2 weeks pharmacologic dosing — taper required"
  - "Severe psychiatric reactions (acute steroid psychosis, mania) — uncommon with single bolus, common with sustained high doses"
  - "Severe hypokalemic alkalosis with cardiac arrhythmia"
  - "Severe hyperglycemic emergency (DKA / HHS) in diabetics"
  - "Opportunistic infection reactivation (PJP, fungal, HSV/VZV/CMV) — chronic use"
  - "GI bleeding / ulcer perforation"
  - "Avascular necrosis (chronic high-dose)"
  - "Severe immune suppression with secondary infection (chronic)"
  - "Cushingoid features (chronic)"
  - "Tumor lysis syndrome (when used as cytoreductive in CLL / lymphoma)"
major_interactions:
  - "CYP3A4 inducers (rifampin, phenytoin, carbamazepine): reduce hydrocortisone exposure — increase dose if needed"
  - "CYP3A4 inhibitors (azoles, ritonavir, clarithromycin): increase hydrocortisone exposure → Cushingoid features"
  - "Loop diuretics (furosemide), thiazides: additive hypokalemia"
  - "Live vaccines (during high-dose immunosuppression): contraindicated"
  - "NSAIDs: additive GI ulceration / bleeding risk; PPI prophylaxis when co-administered"
  - "Anti-diabetic agents: hyperglycemia requires dose escalation of insulin / oral agents"
  - "Warfarin: variable INR shift — monitor closely"
  - "Aspirin: additive GI bleeding; aspirin levels may decrease with chronic steroid use, then rise on taper"
  - "Cyclosporine: mutual exposure increase"
  - "Vaccines (inactivated): reduced response during chronic immunosuppression"
pharmacology:
  half_life_hours: 2  # 1.5-2 h plasma; biological effect 8-12 h (short-acting)
  clearance: "Hepatic"
  protein_binding_pct: 90  # bound to corticosteroid-binding globulin (transcortin) and albumin
  metabolism: "CYP3A4 — hepatic oxidation to inactive metabolites; renal excretion of metabolites; mineralocorticoid activity (~1:1 vs glucocorticoid) distinguishes from synthetic glucocorticoids"
sources:
  - SRC-NCCN-BCELL-2025
  - SRC-NCCN-MM-2025
last_reviewed: "2026-04-27"
reviewer_signoffs: []
notes: >
  Standard adjunct for chemotherapy infusion reactions and severe
  anaphylaxis — given AFTER epinephrine IM (epinephrine is first-line,
  no substitute). Hydrocortisone's onset is delayed (4-6 h) so it
  prevents biphasic anaphylaxis recurrence rather than treating the
  acute event. Premedication for chemotherapy (e.g., taxanes,
  rituximab, daratumumab): typically dexamethasone 20 mg IV is used
  rather than hydrocortisone — dex is more potent (×30) per mg, has
  longer duration, lacks mineralocorticoid effect (less fluid
  retention), and dosing schedule is established. Hydrocortisone
  preferred over dex / methylprednisolone for: (1) adrenal
  insufficiency / crisis (mineralocorticoid activity matches
  physiological need); (2) septic shock with vasopressor refractoriness
  (300 mg/day approximately physiologic stress dose); (3) acute
  high-dose adjunct for refractory infusion reaction where
  mineralocorticoid effect supports hemodynamics. Single bolus of
  100-200 mg has minimal long-term consequences — no taper needed
  for ≤3 days of acute use. Ukraine: cheap, ubiquitous, NSZU-
  covered.
