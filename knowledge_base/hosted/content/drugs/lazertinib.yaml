id: DRUG-LAZERTINIB
names:
  preferred: "Lazertinib"
  ukrainian: "Лазертініб"
  english: "Lazertinib"
  synonyms: ["YH25448", "JNJ-73841937"]
  brand_names: ["Lazcluze", "Leclaza"]
atc_code: L01EB10
rxnorm_id: ""
drug_class: "Third-generation EGFR tyrosine kinase inhibitor"
mechanism: >
  STUB — needs full curation. Irreversible third-gen EGFR-TKI selective
  for sensitizing EGFR mutations (ex19del / L858R) and the T790M
  resistance mutation, sparing wild-type EGFR. CNS-penetrant.
  MARIPOSA: lazertinib + amivantamab vs osimertinib 1L → PFS 23.7 vs
  16.6 mo HR 0.70 (FDA 2024 with ami SC).

regulatory_status:
  fda:
    approved: true
    year_first_approval: 2024
    indications_brief: ["EGFR ex19del/L858R 1L NSCLC (combo amivantamab, MARIPOSA)"]
  ema:
    approved: true
    year_first_approval: 2024
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: "STUB — pending CSD-4 verification. Not registered in UA per drlz.com.ua snapshot 2026-04-27. Originally approved in South Korea 2021."

typical_dosing: >
  STUB. 240 mg PO once daily, combined with amivantamab IV/SC per
  MARIPOSA schedule.

formulations:
  - "Tablets 80 mg"
  - "Tablets 240 mg"

absolute_contraindications: []
black_box_warnings: []
common_adverse_events:
  - "Rash (acneiform — EGFR class)"
  - "Paronychia"
  - "Diarrhea"
  - "Dry skin"
  - "Stomatitis"
  - "Decreased appetite"
serious_adverse_events:
  - "Interstitial lung disease / pneumonitis"
  - "QT prolongation"
  - "Cardiomyopathy / LVEF decline"
  - "Severe rash / SCAR"
  - "Venous thromboembolism (with amivantamab combo)"
major_interactions:
  - "STUB — strong CYP3A4 inhibitors/inducers"

pharmacology:
  half_life_hours: 65
  clearance: "hepatic"
  protein_binding_pct: null
  metabolism: "CYP3A4"

sources:
  - SRC-NCCN-NSCLC-2025
  - SRC-ESMO-NSCLC-METASTATIC-2024

last_reviewed: "2026-04-27"
reviewers: []
notes: >
  STUB — Phase CSD-4 promotion. Currently approved only in combination
  with amivantamab (no monotherapy FDA approval despite Korea mono
  approval). VTE prophylaxis per MARIPOSA protocol. Needs full curation
  of dose-adj for hepatic, ILD management, drug interactions.
