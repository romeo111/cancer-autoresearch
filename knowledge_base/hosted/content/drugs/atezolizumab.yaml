typical_dosing: >
  Standard: 1200 mg IV q3w OR 840 mg IV q2w OR 1680 mg IV q4w.
  HCC IMbrave150: atezolizumab 1200 mg + bevacizumab 15 mg/kg q3w
  until progression / unacceptable toxicity.
  NSCLC adjuvant (IMpower010, PD-L1 ≥1%): 1200 mg q3w × 16 cycles.
  SCLC IMpower133: 1200 mg q3w with carboplatin AUC 5 + etoposide
  100 mg/m² × 4 cycles, then atezo q3w maintenance.
  Subcutaneous Tecentriq Hybreza (FDA 2024): 1875 mg SC q3w (with
  hyaluronidase co-formulation), ~7 min injection.
formulations:
- "IV solution 60 mg/mL (840 mg / 14 mL, 1200 mg / 20 mL vials)"
- "SC injection (Tecentriq Hybreza) 125 mg/mL with hyaluronidase"

absolute_contraindications:
- "Severe hypersensitivity / anaphylaxis to atezolizumab"
- "Active autoimmune disease on systemic immunosuppression (relative)"
- "Solid organ transplant on immunosuppression (relative)"
- "Pregnancy"
- "For HCC IMbrave150 regimen specifically: untreated high-risk varices, recent variceal bleed, Child-Pugh B/C"

black_box_warnings: []

common_adverse_events:
- "Fatigue (~35%)"
- "Decreased appetite (~25%)"
- "Nausea (~20%)"
- "Cough (~20%)"
- "Dyspnea (~20%)"
- "Pyrexia (~15-20%)"
- "Diarrhea (~15%)"
- "Pruritus (~15%)"
- "Rash (~15%)"
- "Musculoskeletal pain (~15%)"
- "Hypothyroidism (~5-10%)"
- "When combined with bevacizumab: hypertension (~30%), proteinuria (~30%)"
- "Mild infusion reactions (~1-3%)"

serious_adverse_events:
- "Immune-mediated pneumonitis (~3%; Grade 3+ ~1-2%)"
- "Immune-mediated colitis (~1-2%)"
- "Immune-mediated hepatitis (~2%)"
- "Endocrinopathies — thyroiditis (most common irAE), hypophysitis, adrenal insufficiency, type 1 DM"
- "Immune-mediated nephritis (~1%)"
- "Severe dermatologic reactions — SJS, TEN, DRESS"
- "Immune-mediated myocarditis (rare)"
- "Immune-mediated encephalitis, myelitis, Guillain-Barré-like syndrome"
- "Pancreatitis"
- "Severe infusion reactions"
- "Solid organ transplant rejection"
- "When with bev: GI perforation, severe hemorrhage (variceal), arterial thromboembolic events"

major_interactions:
- "Systemic corticosteroids (>10 mg/d prednisone) before initiation — may reduce efficacy"
- "Other immunosuppressants — may reduce efficacy"
- "Bevacizumab — efficacy potentiation in HCC, but additive risks (hemorrhage, perforation, HTN)"
- "Live vaccines — avoid during and ≥3 months after"
- "BRAF/MEK inhibitors (cobimetinib + vemurafenib) — additive hepatotoxicity, pyrexia"

