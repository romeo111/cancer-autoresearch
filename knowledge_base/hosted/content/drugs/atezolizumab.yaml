id: DRUG-ATEZOLIZUMAB
names:
  preferred: "Atezolizumab"
  ukrainian: "Атезолізумаб"
  english: "Atezolizumab"
  brand_names: ["Tecentriq", "Tecentriq Hybreza (SC)"]
atc_code: L01FF05
rxnorm_id: "1976831"
drug_class: "Anti-PD-L1 humanized IgG1-kappa monoclonal antibody (immune checkpoint inhibitor)"
mechanism: >
  Humanized IgG1 monoclonal antibody (with engineered Fc that abrogates
  ADCC) binding programmed death-ligand 1 (PD-L1) on tumor cells and
  tumor-infiltrating immune cells. Blocks both PD-L1/PD-1 and PD-L1/B7-1
  (CD80) interactions, restoring T-cell antitumor immunity. Anti-PD-L1
  mechanism (vs anti-PD-1 of pembro/nivo) preserves PD-1/PD-L2 signaling
  — a theoretical lower autoimmune-toxicity profile, though clinical
  irAE spectrum is similar. Pivotal HCC role: atezolizumab + bevacizumab
  (IMbrave150) — first ICI combination to surpass sorafenib in 1L
  unresectable HCC.

