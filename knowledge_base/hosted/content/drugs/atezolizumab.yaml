notes: >
  IMbrave150 prerequisites for HCC combo: Child-Pugh A, ECOG ≤1, EGD
  within 6 mo with treated high-risk varices (banding/ligation), no
  recent variceal bleed, no active GI bleeding, controlled BP, no
  significant proteinuria (UPCR <1 or 24-h urine <1 g). mOS 19.2 mo
  (vs 13.4 mo sorafenib). Major caveat: bevacizumab risks (perforation,
  hemorrhage, HTN, proteinuria) compound — strict patient selection.
  Standard ICI irAE management protocols apply (baseline TFTs / cortisol
  / LFTs / renal panel, serial labs, prompt steroids for Grade ≥2 irAE).
  IMpassion131 (TNBC paclitaxel combo) failed primary endpoint —
  TNBC indication withdrawn in US 2021; nab-paclitaxel combo
  (IMpassion130) still approved in some EU markets.
