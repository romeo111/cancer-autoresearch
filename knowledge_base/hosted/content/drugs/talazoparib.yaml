id: DRUG-TALAZOPARIB
names:
  preferred: "Talazoparib"
  ukrainian: "Талазопариб"
  english: "Talazoparib"
  brand_names: ["Talzenna"]
atc_code: L01XK04
rxnorm_id:
drug_class: "PARP inhibitor (PARP-trapper)"
mechanism: >
  PARP1/2 inhibitor with greater PARP-trapping activity than olaparib — physically traps PARP on DNA, enhancing cytotoxicity in HRR-deficient cells. TALAPRO-2 trial established mCRPC indication combined with enzalutamide.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: false
    last_verified: "2026-04-27"
    notes: "Зареєстрований у МОЗ для РМЗ HER2- BRCA-мутованого метастатичного (EMBRACA). НСЗУ не покриває станом на 2026-04 — пацієнти OOP/charity. Простатичний mCRPC HRR (TALAPRO-2) — також без UA НСЗУ. Джерело: nszu.gov.ua (2026-04)."

    reimbursement_indications: []
typical_dosing: >
  Combined with enzalutamide (TALAPRO-2): talazoparib 0.5 mg PO daily + enzalutamide 160 mg PO daily.

key_toxicities:
- Anemia (~65% — most common dose-limiting AE; transfusion frequently required)
- Neutropenia
- Thrombocytopenia
- Fatigue
- Nausea
- Same MDS/AML / pneumonitis class effects as olaparib

sources: [SRC-NCCN-PROSTATE-2025, SRC-ESMO-PROSTATE-2024]
last_reviewed:
notes: >
  Combination with enzalutamide for mCRPC 1L improves rPFS vs enzalutamide alone (TALAPRO-2). UA-access major barrier.

notes_patient: >
  Таблетка-PARPi для раку грудей і простати з мутацією BRCA. Найпотужніший серед PARPi у класі — приймається раз на добу у меншій дозі.
