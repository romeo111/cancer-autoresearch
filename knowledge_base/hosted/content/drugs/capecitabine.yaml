id: DRUG-CAPECITABINE
names:
  preferred: "Capecitabine"
  ukrainian: "Капецитабін"
  english: "Capecitabine"
  brand_names: ["Xeloda"]
atc_code: L01BC06
rxnorm_id: "194000"
drug_class: "Oral fluoropyrimidine prodrug"
mechanism: >
  Oral prodrug of 5-FU; converted via 3-step metabolism (carboxylesterase →
  cytidine deaminase → thymidine phosphorylase, the latter enriched in
  tumor tissue → tumor-selective activation). Replaces continuous-infusion
  5-FU in CAPOX, neoadjuvant rectal CRT, monotherapy elderly adjuvant.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: true
    reimbursement_indications:
      - "Колоректальний рак (ад'ювантна, метастатична)"
      - "Рак шлунка / стравохідно-шлункового з'єднання"
      - "Рак молочної залози (метастатична, у комбінації)"
    last_verified: "2026-04-27"
formulations: ["Tablets 150 mg, 500 mg"]

absolute_contraindications:
  - "DPD complete deficiency"
  - "CrCl <30 mL/min"
  - "Severe hepatic impairment"
  - "Pregnancy"

black_box_warnings:
  - "Warfarin interaction (bleeding — monitor INR weekly)"
  - "DPD-related toxicity"

common_adverse_events:
  - "Hand-foot syndrome (palmar-plantar erythrodysesthesia) — most common, dose-limiting"
  - "Diarrhea"
  - "Nausea"
  - "Mucositis"
  - "Hyperbilirubinemia"

serious_adverse_events:
  - "Severe hand-foot syndrome with skin breakdown"
  - "Severe diarrhea / dehydration"
  - "Coronary vasospasm (like 5-FU)"
  - "Severe DPD-deficiency reactions"

sources:
  - SRC-NCCN-COLON-2025
  - SRC-ESMO-COLON-2024

last_reviewed: "2026-04-26"
notes: >
  HFS prophylaxis: emollient creams (urea 10-20%), avoid friction
  and pressure on hands/feet, pre-emptive dose-hold at Grade 2 with
  resumption at lower dose. Renal dose adjustment is mandatory and
  often missed: CrCl 30-50 → 75% dose; CrCl <30 contraindicated.
  Hofheinz 2012 (rectal CRT): capecitabine non-inferior to
  infusional 5-FU with patient-friendlier oral schedule (no central
  line / pump). DPD deficiency screening (DPYD genotyping or
  uracilemia level) increasingly recommended pre-treatment in EU per
  EMA 2020 — pre-emptive dose adjustment for partial deficiency,
  contraindicated in complete deficiency. Warfarin INR monitoring
  weekly initially (CYP2C9 inhibition). Common combinations: CAPOX
  (capecitabine + oxaliplatin), CAPIRI / CAPEFOX, capecitabine +
  trastuzumab in HER2+ mBC, X-RT for rectal/gastric. UA: generic
  available, широко reimbursed under НСЗУ.

notes_patient: >
  Таблетка-«проліки», що в організмі перетворюється на 5-FU і блокує синтез ДНК пухлини. Зручна форма для домашнього прийому. Можливі почервоніння та біль у долонях і підошвах (hand-foot syndrome).
