id: DRUG-MOMELOTINIB
names:
  preferred: "Momelotinib"
  ukrainian: "Момелотиніб"
  english: "Momelotinib"
  brand_names: ["Ojjaara", "Omjjara"]
atc_code: L01EJ04
rxnorm_id: "2615870"
drug_class: "JAK1/JAK2 + ACVR1 inhibitor"
mechanism: >
  JAK1/JAK2 inhibitor with additional ACVR1 inhibition that lowers
  hepcidin → improves anemia. Distinguishes momelotinib from ruxolitinib
  (which often worsens anemia). 2L for MF with anemia.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: |
      Не зареєстровано в UA (Держреєстр ЛЗ — РП відсутнє станом на 2026-04-27).
      JAK1/2 + ACVR1 інгібітор для MF з anaemia (post-ruxolitinib або
      ruxo-naive); не входить до НСЗУ. (Руксолітиніб у НСЗУ — momelotinib ні).
      Шляхи доступу:
      - Named-patient import (DEC спецдозвіл).
      - EAP GSK Ukraine (Ojjaara/Omjjara access program — критерії:
        MF з Hb<10 g/dL, post-rux або rux-intolerant).
      - Cross-border (EU): EU гематоцентри через "Лікування за кордоном"
        (наказ МОЗ 988); EMA-затверджено 2024.
      - Trial-only: MOMENTUM, SIMPLIFY post-marketing.
      Source: drlz.com.ua пошук "momelotinib"/"ojjaara"/"omjjara" 2026-04-27 — РП відсутнє.

typical_dosing: >
  MF: 200 mg PO once daily with or without food. Renal/hepatic dose
  adjustments apply.
formulations: ["Tablets 100 / 150 / 200 mg"]

absolute_contraindications:
  - "Pregnancy"
  - "Hypersensitivity"
black_box_warnings: []
major_interactions:
  - "OATP1B1/1B3 substrates: rosuvastatin caution"
  - "Strong CYP3A4 inhibitors / inducers"
common_adverse_events:
  - "Diarrhea"
  - "Thrombocytopenia"
  - "Nausea"
  - "Headache"
  - "Dizziness"
serious_adverse_events:
  - "Severe thrombocytopenia"
  - "Hepatotoxicity"
  - "Infection (TB, HBV reactivation)"

pharmacology: {half_life: "~5 hours; CYP3A4 substrate"}

sources:
  - SRC-NCCN-MPN-2025
  - SRC-COMFORT-I-VERSTOVSEK-2012

last_reviewed: "2026-04-25"
notes: >
  Approved for MF with anemia (Hb <10) — MOMENTUM trial: spleen response +
  symptom improvement + Hb improvement compared with danazol. NOT
  registered in Ukraine. HBV / TB screening required before initiation.
