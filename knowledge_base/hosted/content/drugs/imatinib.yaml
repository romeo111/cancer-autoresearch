id: DRUG-IMATINIB
names:
  preferred: "Imatinib"
  ukrainian: "Іматиніб"
  english: "Imatinib"
  brand_names: ["Glivec", "Gleevec", "imatinib generic"]
atc_code: L01EA01
rxnorm_id: "282388"
drug_class: "BCR-ABL1 / KIT / PDGFR tyrosine-kinase inhibitor (1st-generation)"
mechanism: >
  Selective TKI of BCR-ABL1, KIT, PDGFR-α/β. Founder of the targeted
  CML era. Standard CML 1L for low-risk, comorbid, or
  cost-constrained patients.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: true
    reimbursement_indications:
      - "Хронічна мієлоїдна лейкемія (1L хронічна фаза, прискорена/бластна фаза)"
      - "Ph+ гострий лімфобластний лейкоз (у комбінації з хіміотерапією)"
      - "Гастроінтестинальна стромальна пухлина (GIST — KIT/PDGFRA-чутливі)"
    last_verified: "2026-04-27"
    notes: "Доступний як оригінал (Glivec) та генерики; покривається НСЗУ для CML та Ph+ ALL з 2017. Перевірено 2026-04-27."
typical_dosing: >
  CML chronic phase: 400 mg PO once daily with food + large glass of water.
  Ph+ ALL: 600-800 mg daily. Take with meal to reduce GI toxicity.
formulations: ["Tablets 100 mg / 400 mg"]

absolute_contraindications:
  - "Hypersensitivity to imatinib"
  - "Pregnancy (avoid; teratogenic)"
black_box_warnings: []
major_interactions:
  - "Strong CYP3A4 inhibitors / inducers alter exposure"
  - "Warfarin (CYP3A4 substrate)"
common_adverse_events:
  - "Periorbital edema / fluid retention"
  - "Nausea (mitigated by food)"
  - "Muscle cramps"
  - "Diarrhea"
  - "Rash"
  - "Cytopenias (typically mild)"
serious_adverse_events:
  - "Severe fluid retention / pleural effusion (rare)"
  - "Hepatotoxicity (rare)"
  - "Cardiac dysfunction (rare)"

pharmacology: {half_life: "~18 hours; CYP3A4 substrate"}

sources:
  - SRC-NCCN-MPN-2025
  - SRC-ELN-CML-2020
  - SRC-IRIS-OBRIEN-2003

last_reviewed: "2026-04-25"
notes: >
  Standard 1L for low-risk Sokal/EUTOS CML, elderly, or in cost-constrained
  settings (generics widely available, НСЗУ-reimbursed in Ukraine). 2nd-gen
  TKIs (dasatinib, nilotinib, bosutinib) achieve faster deep molecular
  response but no consistent OS benefit — ELN 2020 leaves choice to
  comorbidity matrix. Take with food + water.

notes_patient: >
  Таблетка, яка вимикає мутацію BCR-ABL у клітинах хронічного мієлоїдного лейкозу (та KIT/PDGFRA при GIST). Зазвичай добре переноситься, потребує щоденного прийому з їжею і великою кількістю води.
