id: DRUG-MEROPENEM
names:
  preferred: "Meropenem"
  ukrainian: "Меропенем"
  english: "Meropenem"
  brand_names:
    - "Merrem"
    - "Meronem"
atc_code: J01DH02
rxnorm_id: "29561"
drug_class: "Carbapenem β-lactam antibiotic (broad-spectrum, MDR coverage)"
mechanism: >
  Broad-spectrum carbapenem β-lactam that binds multiple penicillin-
  binding proteins (PBP-2 primarily, also PBP-3 and -1) with rapid
  bactericidal activity against most Gram-negative bacilli (including
  ESBL-producing Enterobacterales, AmpC overproducers, and many
  Pseudomonas), Gram-positive cocci (except MRSA, ampicillin-resistant
  enterococci), and most anaerobes including Bacteroides fragilis.
  Extremely stable against most β-lactamases including ESBLs and
  AmpC, but hydrolyzed by carbapenemases (KPC, NDM, OXA-48, VIM,
  IMP). Lower seizure-risk than imipenem (no DHP-1 inhibitor needed;
  reduced PBP-2 affinity in CNS). FDA-approved 1996. Reserved for
  documented or strongly suspected MDR Gram-negative infections,
  severe sepsis with broad-spectrum coverage need, and FN failing
  initial empirical therapy at 72-96 hours.
regulatory_status:
  fda:
    approved: true
    year_first_approval: 1996
    indications_brief:
      - "Complicated intra-abdominal infections, complicated skin/skin-structure infections"
      - "Bacterial meningitis (pediatric ≥3 months and adult)"
      - "Febrile neutropenia (escalation after pip-tazo / cefepime failure or documented MDR)"
      - "Severe nosocomial / ventilator-associated pneumonia with ESBL or AmpC coverage need"
  ema:
    approved: true
    year_first_approval: 1995
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: true
    reimbursement_indications:
      - "Тяжкі внутрішньолікарняні інфекції з резистентними Гр(-) збудниками (ESBL-Enterobacterales, AmpC-overproducers)"
      - "Менінгіт"
      - "Ескалація емпіричної терапії при фебрильній нейтропенії після pip-tazo/cefepime (typically day 4-5 без покращення)"
    last_verified: "2026-04-27"
    notes: "Зареєстровано в Україні (Meronem, generics). Покриття НСЗУ для критичних інфекцій. Резерв для MDR — антимікробний stewardship обмежує первинне використання. Перевірено drlz.com.ua 2026-04-27."
typical_dosing: >
  Febrile neutropenia / severe sepsis (adult): 1 g IV every 8 hours
  via 30-min infusion OR 2 g IV q8h via 3-hour prolonged infusion
  for severe Pseudomonas or MDR coverage. Bacterial meningitis: 2 g
  IV q8h. Pediatric (≥3 months): 20-40 mg/kg IV q8h (60 mg/kg q8h
  for meningitis), max 2 g per dose. Renal adjustment required:
  CrCl 26-50 → 1 g q12h; CrCl 10-25 → 0.5 g q12h; CrCl <10 → 0.5 g
  q24h; hemodialysis → 0.5 g q24h with dose after dialysis; CRRT →
  1 g q12h (or 1 g q8h for high-flow). Hepatic: no adjustment.
  Duration in FN: until ANC recovery and afebrile ≥48 h, typically
  7-14 days; in MDR documented infections, 10-14 days. Prolonged
  infusion (3 h) preferred for critically ill patients to optimize
  T>MIC against high-MIC organisms.
formulations:
  - "IV powder for reconstitution: 500 mg, 1 g vials"
absolute_contraindications:
  - "Hypersensitivity to meropenem or other carbapenems"
  - "History of severe / immediate hypersensitivity (anaphylaxis) to any β-lactam (penicillins, cephalosporins) — relative; cross-reactivity ~1%"
black_box_warnings: []
common_adverse_events:
  - "Diarrhea — ~5-7%"
  - "Nausea / vomiting — ~3-5%"
  - "Headache — ~3-5%"
  - "Rash — ~2-5%"
  - "Local infusion-site reaction / phlebitis — ~3-5%"
  - "Pruritus — ~2-3%"
  - "Constipation — ~2-3%"
  - "Anemia — ~2-5%"
  - "Thrombocytopenia (mild) — ~1-3%"
  - "Eosinophilia — ~2-3%"
  - "Mild transaminitis — ~3-5%"
  - "Hypokalemia — ~1-2%"
  - "Vaginal candidiasis — ~1-2%"
  - "Oral candidiasis — ~1-2%"
serious_adverse_events:
  - "Seizures (rare; lower than imipenem; risk with high-dose, renal dysfunction, CNS lesions, prior seizure history)"
  - "Severe hypersensitivity / anaphylaxis"
  - "Stevens-Johnson syndrome / toxic epidermal necrolysis (rare)"
  - "DRESS syndrome (rare)"
  - "Clostridioides difficile colitis (significant — broad-spectrum)"
  - "Severe / prolonged neutropenia or thrombocytopenia (rare)"
  - "Hemolytic anemia (rare; immune-mediated)"
  - "Acute interstitial nephritis (rare)"
  - "Hepatotoxicity (rare; mostly mild transaminitis)"
  - "Selection of carbapenem-resistant organisms (KPC-producing Klebsiella, CRE) with prolonged use — antimicrobial stewardship critical"
major_interactions:
  - "Valproic acid / valproate: meropenem reduces valproate serum levels by 60-100% within hours — RISK OF BREAKTHROUGH SEIZURES; AVOID combination, switch valproate to alternative (levetiracetam) before starting meropenem"
  - "Probenecid: reduces meropenem renal clearance — generally avoided"
  - "Aminoglycosides: chemical incompatibility in same line — administer separately"
  - "Live vaccines (oral typhoid, BCG): antibacterial activity may inactivate vaccine"
  - "Oral contraceptives: theoretical reduced efficacy via gut flora — additional contraception advised"
  - "Warfarin: variable INR effect (gut flora) — monitor"
  - "Cyclosporine, tacrolimus: minimal direct interaction but monitor levels in critically ill"
pharmacology:
  half_life_hours: 1  # ~1 hour normal renal function; ~6-10 hours in renal failure
  clearance: "Renal (~70% excreted unchanged in urine, ~25% as inactive metabolite)"
  protein_binding_pct: 2
  metabolism: "Hydrolysis by renal dehydropeptidase (resistant compared to imipenem); negligible CYP metabolism — strict renal adjustment required"
sources:
  - SRC-NCCN-BCELL-2025
  - SRC-NCCN-MM-2025
last_reviewed: "2026-04-27"
reviewer_signoffs: []
notes: >
  Reserve antibiotic — escalation choice in febrile neutropenia after
  72-96 hours of empirical pip-tazo or cefepime without clinical
  improvement, and first-line for documented or strongly suspected
  MDR Gram-negative infection (ESBL Enterobacterales, AmpC
  overproducers, Pseudomonas with broad resistance). Antimicrobial
  stewardship critical: prolonged carbapenem use selects for
  carbapenem-resistant organisms (KPC, NDM, OXA-48). CRITICAL
  interaction: meropenem dramatically reduces valproate levels
  (60-100% drop within hours) — patients on valproate for
  seizures or mood stabilization need a switch to levetiracetam
  BEFORE meropenem start, with overlap of 2-3 days. Lower seizure
  risk than imipenem, but still elevated with renal dysfunction
  and CNS pathology — meticulous renal dosing required. Avoid in
  uncomplicated indications where pip-tazo or cefepime suffices.
  Ukraine: widely available, NSZU-covered for critical infections.
