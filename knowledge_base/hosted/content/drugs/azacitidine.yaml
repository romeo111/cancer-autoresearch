id: DRUG-AZACITIDINE
names:
  preferred: "Azacitidine"
  ukrainian: "Азацитидин"
  english: "Azacitidine"
  brand_names: ["Vidaza", "Onureg (oral)"]
atc_code: L01BC07
rxnorm_id: "1117"
drug_class: "Hypomethylating agent (cytidine analog)"
mechanism: >
  Pyrimidine nucleoside analog incorporated into DNA and RNA, inhibits
  DNA methyltransferases → re-expression of silenced tumor-suppressor
  genes + cytotoxicity at higher doses. Backbone of MDS-HR, AML-unfit
  (with venetoclax), and CMML 1L therapy.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    registration_number: "[TBD]"
    reimbursed_nszu: true
    reimbursement_indications:
    - 'Програма медичних гарантій 2026: МДС високого ризику (IPSS Int-2/High) — терапія 1L'
    - 'Реімбурсаційний пакет «Онкологія» 2026: ГМЛ у пацієнтів, непридатних до інтенсивної ХТ, з venetoclax (VIALE-A)'
    last_verified: "2026-04-27"

    notes: 'Зареєстрований; НСЗУ покриває МДС-HR та ГМЛ unfit (комбо з venetoclax). ХММЛ — також. Джерело: nszu.gov.ua (2026-04).'
typical_dosing: >
  SC/IV 75 mg/m²/day × 7 days every 28-day cycle (most common); 5-2-2
  schedule (5 d on, 2 d off, 2 d on) acceptable. Continue ≥6 cycles before
  declaring failure (response often delayed 4-6 cycles). Ven+aza for AML:
  azacitidine 75 mg/m² days 1-7 + venetoclax ramp.
formulations: ["IV/SC powder 100 mg vials", "Oral tablets 200/300 mg (Onureg, AML maintenance)"]

absolute_contraindications:
- "Severe hepatic impairment (advanced malignant hepatic tumors)"
- "Hypersensitivity to azacitidine or mannitol"
- "Pregnancy / breastfeeding (teratogenic)"
black_box_warnings: []
major_interactions: []
common_adverse_events:
- "Cytopenias (anemia, neutropenia, thrombocytopenia — expected)"
- "Nausea/vomiting (low-moderate emetogenic)"
- "Injection-site reactions (SC)"
- "Fatigue"
- "Constipation/diarrhea"
serious_adverse_events:
- "Severe myelosuppression with febrile neutropenia"
- "Hepatotoxicity"
- "Renal tubular acidosis (rare)"
- "Tumor lysis syndrome (esp. with ven combo)"

pharmacology: {half_life: "~4 hours after SC; rapid hepatic + renal clearance"}

sources:
- SRC-NCCN-AML-2025
- SRC-ESMO-MDS-2021
- SRC-VIALE-A-DINARDO-2020

last_reviewed: "2026-04-25"
notes: >
  Used in MDS-HR (1L), AML-unfit (with venetoclax — VIALE-A), CMML, and
  AML maintenance (oral Onureg post-induction in selected patients).
  Response delayed — do NOT discontinue before cycle 6 unless overt
  progression. SC equivalent to IV; SC preferred outpatient.

notes_patient: >
  Хіміотерапія-«перезавантаження» епігенетики (hypomethylating agent): знімає неправильні хімічні мітки з ДНК пухлинних клітин і повертає нормальну роботу генів. Підшкірно або внутрішньовенно курсами по 7 днів.
