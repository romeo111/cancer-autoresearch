id: DRUG-LEVOFLOXACIN
names:
  preferred: "Levofloxacin"
  ukrainian: "Левофлоксацин"
  english: "Levofloxacin"
  brand_names:
    - "Levaquin"
    - "Tavanic"
    - "Levalox"
atc_code: J01MA12
rxnorm_id: "82122"
drug_class: "Third-generation respiratory fluoroquinolone (Gram-negative + Pseudomonas + improved Gram-positive incl. S. pneumoniae)"
mechanism: >
  L-isomer of ofloxacin; synthetic respiratory fluoroquinolone that
  inhibits bacterial DNA gyrase (topoisomerase II, primary in Gram-
  negatives) and topoisomerase IV (primary in Gram-positives) with
  bactericidal effect. Compared to ciprofloxacin, levofloxacin has
  superior Gram-positive activity — particularly against Streptococcus
  pneumoniae (including penicillin-resistant), viridans streptococci,
  and methicillin-susceptible Staphylococcus aureus — while retaining
  comparable Gram-negative coverage including Pseudomonas at the
  750 mg dose. Excellent oral bioavailability (~99%) makes IV and PO
  doses interchangeable. The Gram-positive enhancement is the basis
  for its use in febrile neutropenia (FN) PROPHYLAXIS in high-risk
  patients (anticipated ANC <100/µL ≥7 days), where viridans
  streptococcal bacteremia from oral mucositis is a major source.
  FDA-approved 1996.
regulatory_status:
  fda:
    approved: true
    year_first_approval: 1996
    indications_brief:
      - "Community-acquired pneumonia, nosocomial pneumonia"
      - "Acute bacterial sinusitis, acute bacterial exacerbation of chronic bronchitis (restricted post-2018 FDA warning)"
      - "Complicated/uncomplicated UTI, pyelonephritis"
      - "Skin/skin-structure infections"
      - "Anthrax (post-exposure and active disease)"
      - "Plague, tularemia"
      - "Antibacterial prophylaxis in high-risk febrile neutropenia (anticipated ANC <100/µL for ≥7 days; per NCCN, IDSA)"
  ema:
    approved: true
    year_first_approval: 1997
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: true
    reimbursement_indications:
      - "Тяжкі пневмонії, ускладнені інфекції сечовивідних шляхів"
      - "Антибактеріальна профілактика при високому ризику фебрильної нейтропенії (HSCT, AML індукція, тривалий ANC <100/µL)"
    last_verified: "2026-04-27"
    notes: "Зареєстровано в Україні (Tavanic, Levalox, generics). NSZU-covered для онкогематологічних пацієнтів. Профілактика FN — стандарт у HSCT та AML-індукції за NCCN/IDSA. Перевірено drlz.com.ua 2026-04-27."
typical_dosing: >
  Febrile neutropenia prophylaxis (high-risk hematologic, adult):
  500 mg PO/IV once daily, started day of conditioning / induction
  through ANC recovery (>500/µL). Severe pneumonia / Pseudomonas
  coverage: 750 mg IV/PO once daily. Uncomplicated UTI: 250 mg PO
  daily × 3 days. Complicated UTI / pyelonephritis: 750 mg PO/IV
  daily × 5 days. Pediatric (limited use, generally avoided due to
  arthropathy concerns): 8-10 mg/kg IV/PO q12h or q24h depending on
  age. Renal adjustment: CrCl 20-49 → 750 mg first dose then 750 mg
  q48h (or 500 mg first then 250 mg q24h); CrCl 10-19 → 750 mg first
  then 500 mg q48h (or 500 mg first then 250 mg q48h); HD/CRRT →
  same as CrCl 10-19. Hepatic: no adjustment. CRITICAL: separate
  from polyvalent cation chelators (antacids, iron, calcium, dairy)
  by ≥2 h before or 2 h after.
formulations:
  - "Tablet 250 mg, 500 mg, 750 mg"
  - "Oral solution 25 mg/mL"
  - "IV solution 250 mg, 500 mg, 750 mg pre-mixed bags"
  - "Ophthalmic solution 0.5%, 1.5%"
absolute_contraindications:
  - "Hypersensitivity to levofloxacin or other fluoroquinolones"
  - "History of fluoroquinolone-associated tendon rupture, severe peripheral neuropathy, or aortic dissection"
  - "Myasthenia gravis"
  - "Pregnancy (relative; only when benefit outweighs risk)"
  - "Known QT prolongation, hypokalemia, or concurrent QT-prolonging drugs (relative)"
black_box_warnings:
  - "Tendinitis and tendon rupture (Achilles tendon most common; risk increased by age >60, corticosteroid use, organ transplantation, renal failure)"
  - "Peripheral neuropathy (can be permanent)"
  - "CNS effects (toxic psychosis, seizures, anxiety, depression, suicidal ideation, confusion)"
  - "Exacerbation of myasthenia gravis (life-threatening respiratory weakness)"
  - "Aortic aneurysm and dissection (especially in elderly)"
  - "Class warning: avoid in uncomplicated infections (sinusitis, bronchitis, uncomplicated UTI) where alternatives exist (FDA, EMA 2018)"
common_adverse_events:
  - "Nausea — ~5-7%"
  - "Diarrhea — ~5%"
  - "Headache — ~5%"
  - "Insomnia — ~3-5%"
  - "Constipation — ~3%"
  - "Dizziness — ~3%"
  - "Vomiting — ~2-3%"
  - "Abdominal pain — ~2-3%"
  - "Rash — ~1-3%"
  - "Mild transaminitis — ~2-3%"
  - "Photosensitivity (UVA) — ~1-3%"
  - "Vaginal candidiasis — ~2-3%"
  - "Local infusion-site reaction (IV) — ~3-5%"
  - "Hypoglycemia / hyperglycemia (esp. diabetics) — ~1-3%"
  - "Mild QT prolongation — ~1-2%"
serious_adverse_events:
  - "Tendon rupture (boxed warning) — Achilles tendon most common"
  - "Severe / persistent peripheral neuropathy (boxed)"
  - "Aortic aneurysm rupture / dissection (especially elderly)"
  - "Severe CNS effects: seizures, psychosis, suicidal ideation"
  - "QT prolongation / torsades de pointes (modestly higher signal than ciprofloxacin)"
  - "Severe hypoglycemia (in diabetics on sulfonylureas / insulin) — sometimes fatal"
  - "Severe hyperglycemia / DKA (less common)"
  - "Severe hypersensitivity / anaphylaxis"
  - "Stevens-Johnson syndrome / toxic epidermal necrolysis (rare)"
  - "DRESS syndrome (rare)"
  - "Fulminant hepatotoxicity (rare; including hepatic failure)"
  - "Clostridioides difficile colitis"
  - "Selection of fluoroquinolone-resistant organisms with prolonged prophylactic use (E. coli, viridans strep, P. aeruginosa)"
  - "Exacerbation of myasthenia gravis"
  - "Hemolytic anemia / thrombocytopenia (rare)"
major_interactions:
  - "QT-prolonging drugs (methadone, ondansetron at high IV doses, antipsychotics, class IA/III antiarrhythmics, azoles): additive QT effect — monitor ECG, correct K/Mg"
  - "Sulfonylureas (glyburide, glipizide), insulin: hypoglycemia (sometimes severe / fatal) and rarely hyperglycemia — monitor glucose closely"
  - "Polyvalent cations (antacids with Al/Mg/Ca, iron supplements, zinc, sucralfate, dairy products, multivitamins): chelation reduces levofloxacin absorption — separate by ≥2 h"
  - "Warfarin: variable INR increase — monitor closely"
  - "Corticosteroids: additive tendon rupture risk — caution in elderly on chronic steroids (oncology context: dex pulses + levofloxacin prophylaxis common in MM)"
  - "NSAIDs: additive CNS effects (seizure threshold lowering)"
  - "Cyclosporine, tacrolimus: minimal direct interaction (less than ciprofloxacin) — monitor"
  - "Theophylline: minimal effect (unlike ciprofloxacin)"
  - "Live vaccines (oral typhoid, BCG): antibacterial activity may inactivate vaccine"
pharmacology:
  half_life_hours: 7  # ~6-8 h normal renal function; longer in renal failure
  clearance: "Renal (~85% excreted unchanged in urine)"
  protein_binding_pct: 30
  metabolism: "Minimal hepatic metabolism; renal excretion of unchanged drug — strict renal adjustment required"
sources:
  - SRC-NCCN-BCELL-2025
  - SRC-NCCN-MM-2025
last_reviewed: "2026-04-27"
reviewer_signoffs: []
notes: >
  Standard antibacterial prophylaxis in high-risk febrile neutropenia
  per IDSA / NCCN: anticipated ANC <100/µL ≥7 days (HSCT conditioning,
  AML induction, high-dose chemo for relapsed leukemia/lymphoma).
  Started day of conditioning / induction, continued through ANC
  recovery (>500/µL or marrow recovery). The Gram-positive enhancement
  vs ciprofloxacin (esp. viridans streptococcal mucositis-bacteremia
  prevention) is the rationale. Trade-offs: selects fluoroquinolone-
  resistant organisms over time (rising rates of ciprofloxacin/
  levofloxacin-resistant E. coli and viridans streptococci limit
  benefit at some centers — local antibiogram critical); does NOT
  prevent invasive fungal infection (separate antifungal prophylaxis
  required — posaconazole, fluconazole). Standard 750 mg dose for
  pneumonia + Pseudomonas; 500 mg sufficient for FN prophylaxis.
  Diabetes: severe / fatal hypoglycemia signal — stricter monitoring.
  Class-wide FDA / EMA 2018 warning: avoid in uncomplicated infections.
  Ukraine: NSZU-covered for hematology prophylaxis indications; widely
  available.
