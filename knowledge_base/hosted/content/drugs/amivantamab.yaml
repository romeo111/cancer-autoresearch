id: DRUG-AMIVANTAMAB
names:
  preferred: "Amivantamab"
  ukrainian: "Амівантамаб"
  english: "Amivantamab"
  synonyms: ["JNJ-61186372", "amivantamab-vmjw"]
  brand_names: ["Rybrevant"]
atc_code: L01FX18
rxnorm_id: ""
drug_class: "EGFR x MET bispecific monoclonal antibody"
mechanism: >
  Fully human bispecific IgG1 antibody simultaneously binding
  extracellular domains of EGFR (epidermal growth factor receptor)
  and MET (hepatocyte growth factor receptor / c-Met). The dual
  engagement triggers (1) ligand-blocking inhibition of both
  receptors, (2) downregulation / internalization of EGFR-MET
  heterodimers, (3) Fc-mediated effector function (ADCC,
  trogocytosis, ADCP) via low-fucose engineered Fc. Active against
  EGFR exon-20 insertion mutations (which are insensitive to
  classical EGFR-TKIs) and against secondary MET-amplification-
  mediated resistance to osimertinib. Pivotal evidence: CHRYSALIS
  (EGFR exon 20 ins NSCLC post-platinum: ORR ~40%, FDA accelerated
  2021 — first targeted therapy for ex20ins); MARIPOSA
  (amivantamab + lazertinib vs osimertinib 1L EGFR ex19del/L858R
  NSCLC: mPFS 23.7 vs 16.6 mo HR 0.70, FDA Aug 2024); MARIPOSA-2
  (amivantamab + chemo ± lazertinib vs chemo post-osimertinib);
  PAPILLON (amivantamab + chemo 1L EGFR ex20ins).

