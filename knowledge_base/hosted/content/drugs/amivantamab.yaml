id: DRUG-AMIVANTAMAB
names:
  preferred: "Amivantamab"
  ukrainian: "Амівантамаб"
  english: "Amivantamab"
  synonyms: ["JNJ-61186372", "amivantamab-vmjw"]
  brand_names: ["Rybrevant"]
atc_code: L01FX18
rxnorm_id: ""
drug_class: "EGFR x MET bispecific antibody"
mechanism: >
  STUB — needs full curation. Fully human bispecific IgG1 binding
  EGFR + MET extracellular domains; receptor degradation +
  Fc-mediated effector function (ADCC, trogocytosis). CHRYSALIS: ORR
  ~40% in EGFR exon 20 insertion NSCLC post-platinum (FDA 2021).
  MARIPOSA: amivantamab + lazertinib vs osimertinib 1L EGFR-mut NSCLC
  → PFS benefit (OS trending). MARIPOSA-2: ami + chemo (± lazertinib)
  post-osimertinib progression.

regulatory_status:
  fda:
    approved: true
    year_first_approval: 2021
    indications_brief: ["EGFR exon 20 insertion NSCLC post-platinum", "EGFR ex19del/L858R 1L NSCLC (combo lazertinib, MARIPOSA)", "EGFR ex19del/L858R post-osimertinib (combo carbo+pem, MARIPOSA-2)"]
  ema:
    approved: true
    year_first_approval: 2021
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: "STUB — pending CSD-4 verification. Not registered in UA per drlz.com.ua snapshot 2026-04-27."

typical_dosing: >
  STUB. <80 kg: 1050 mg IV; ≥80 kg: 1400 mg IV. Loading dose split over
  Day 1-2 of cycle 1, then weekly weeks 2-4, then every 2 weeks. SC
  formulation (amivantamab-vmjw SC) approved 2024 with reduced infusion
  reactions.

formulations:
  - "IV concentrate 350 mg / 7 mL vial"
  - "SC formulation (Rybrevant SC, hyaluronidase co-formulated)"

absolute_contraindications: []
black_box_warnings: []
common_adverse_events:
  - "Infusion-related reactions (~65% IV; <10% SC) — predominantly cycle-1 day-1"
  - "Rash (acneiform — EGFR class effect)"
  - "Paronychia"
  - "Hypoalbuminemia"
  - "Edema / peripheral swelling"
  - "Stomatitis"
  - "Diarrhea"
serious_adverse_events:
  - "Severe infusion reactions"
  - "Interstitial lung disease / pneumonitis"
  - "Severe rash / SCAR"
  - "Venous thromboembolism (especially with lazertinib combo)"
  - "Ocular toxicity (uveitis, blurred vision)"
major_interactions: []

pharmacology:
  half_life_hours: 270
  clearance: "proteolytic"
  protein_binding_pct: null
  metabolism: "n/a (mAb catabolism)"

sources:
  - SRC-NCCN-NSCLC-2025
  - SRC-ESMO-NSCLC-METASTATIC-2024

last_reviewed: "2026-04-27"
reviewers: []
notes: >
  STUB — Phase CSD-4 promotion. Premedication mandatory for IV (steroid,
  antihistamine, antipyretic). SC formulation strongly preferred where
  available (PALOMA-3 IRR reduction). VTE prophylaxis required in
  MARIPOSA combo with lazertinib (per protocol). Needs full curation of
  IRR management algorithm, dose modifications, monitoring.
