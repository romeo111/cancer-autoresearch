reviewers: []
notes: >
  SC formulation strongly preferred from cycle-2 onward where
  available — substantially lower IRR rate (PALOMA-3 ~13% vs ~65% IV)
  and shorter administration time. Cycle-1 day-1 IV infusion split
  (350 mg → wait → remainder) reduces IRR severity. VTE
  prophylaxis (prophylactic-dose LMWH or DOAC for first 4 months)
  is mandated by the MARIPOSA / MARIPOSA-2 protocols when combined
  with lazertinib — VTE risk is substantially elevated vs ami or
  laz monotherapy. Premedication for IV (steroid + antihistamine +
  antipyretic) is non-negotiable. Aggressive EGFR-class skin care
  (clindamycin gel, oral doxycycline 100 mg BID prophylaxis,
  emollients, sun protection); paronychia: chlorhexidine soaks +
  high-potency topical steroid + careful nail care. Baseline
  workup: LFTs, albumin, CBC, ECG, pregnancy test, CT chest (ILD
  baseline). Monitor LFTs / CBC / albumin q2 wk first 8 wk then
  monthly; CT chest at any new respiratory symptoms. UA access via
  EAP / self-pay only.
