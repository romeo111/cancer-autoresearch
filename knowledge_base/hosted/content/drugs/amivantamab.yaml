typical_dosing: >
  Weight-based: <80 kg = 1050 mg IV; ≥80 kg = 1400 mg IV. Cycle 1:
  loading dose split over Day 1 (350 mg + remainder) and Day 2 (full
  dose); then weekly Days 8, 15, 22 of cycle 1 (3-week cycle). Cycles
  2 onward: every 2 weeks. SC formulation (amivantamab-vmjw SC, with
  hyaluronidase, approved Mar 2024 on PALOMA-3): same fixed mg-by-
  weight, administered SC over ~5 minutes — substantially reduced
  infusion-related reaction rate (~13% vs ~65% IV) and ~5-fold
  shorter chair time. Premedication mandatory for IV (especially
  cycle-1 day-1): IV corticosteroid (dexamethasone 10-20 mg or
  methylprednisolone 40 mg), antihistamine (diphenhydramine 25-50
  mg), antipyretic (acetaminophen 650-1000 mg). VTE prophylaxis with
  prophylactic-dose LMWH or DOAC for first 4 months when combined
  with lazertinib (MARIPOSA protocol).

formulations:
  - "IV concentrate 350 mg / 7 mL single-dose vial"
  - "SC formulation 1600 mg / 13.4 mL or 2240 mg / 18.7 mL co-formulated with hyaluronidase (Rybrevant SC)"

absolute_contraindications:
  - "Severe hypersensitivity to amivantamab or any excipient"
  - "Pregnancy (embryo-fetal toxicity)"

black_box_warnings: []

common_adverse_events:
  - "Infusion-related reactions cycle-1 day-1 ~65% IV (overwhelmingly grade 1-2); ~13% SC"
  - "Rash / acneiform dermatitis ~80% (EGFR class)"
  - "Paronychia ~50%"
  - "Hypoalbuminemia ~70%"
  - "Edema / peripheral swelling (MET class) ~30%"
  - "Stomatitis ~25%"
  - "Diarrhea ~25%"
  - "Pruritus ~20%"
  - "Fatigue ~25%"
  - "Nausea ~25%"
  - "Decreased appetite ~20%"
  - "Constipation ~20%"
  - "Increased ALT/AST ~30%"

serious_adverse_events:
  - "Severe infusion reactions (G3 ~3% IV; rare with SC)"
  - "Interstitial lung disease / pneumonitis (G3+ ~3%; can be fatal)"
  - "Severe rash / dermatitis / SCAR (G3 ~5%)"
  - "Venous thromboembolism (~10-13% with lazertinib combo; G3+ ~5%; mandatory prophylaxis)"
  - "Ocular toxicity (uveitis, blurred vision, keratitis ~8%)"
  - "Severe paronychia with cellulitis"
  - "Hepatotoxicity (G3 ALT/AST ~3%)"
  - "Pneumonia"

major_interactions:
  - "Concurrent lazertinib (intentional MARIPOSA combination) — VTE prophylaxis required"
  - "Live vaccines — avoid"
  - "Concomitant chemotherapy (carboplatin + pemetrexed; PAPILLON / MARIPOSA-2) — additive cytopenia / fatigue"
  - "No major CYP-mediated DDI (mAb)"

pharmacology:
  half_life_hours: 270
  clearance: "non-renal (proteolytic catabolism); ~11 days terminal"
  protein_binding_pct: null
  metabolism: "n/a (mAb catabolism to amino acids)"

