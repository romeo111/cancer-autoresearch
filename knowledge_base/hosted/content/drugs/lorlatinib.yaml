id: DRUG-LORLATINIB
names:
  preferred: "Lorlatinib"
  ukrainian: "Лорлатініб"
  english: "Lorlatinib"
  brand_names: ["Lorbrena"]
atc_code: L01ED05
rxnorm_id:
drug_class: "3rd-generation ALK / ROS1 inhibitor"
mechanism: >
  Macrocyclic ALK/ROS1 TKI with activity vs nearly all ALK resistance mutations + excellent CNS penetration. CROWN: superior PFS vs crizotinib 1L (3-year PFS rate 64% lorlatinib vs 19% crizotinib).

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: false
    last_verified: "2026-04-27"
    notes: "Реєстрація МОЗ підтверджена для НДРЛ ALK+ 2L+ після прогресії на ≥1 ALK-TKI (раніше registered=false — виправлено). НСЗУ не покриває — out-of-pocket/charity. CROWN 1L дані поки не транслюються в UA reimbursement. Джерело: nszu.gov.ua (2026-04)."

    reimbursement_indications: []
typical_dosing: >
  100 mg PO once daily.

key_toxicities:
- Hypercholesterolemia / hypertriglyceridemia (>90% — statin management)
- Edema
- Cognitive AEs (memory, mood, confusion — class warning)
- Peripheral neuropathy
- Weight gain

sources: [SRC-NCCN-NSCLC-2025, SRC-ESMO-NSCLC-METASTATIC-2024]
last_reviewed:
notes: >
  CROWN trial: most active ALK TKI to date, with 3-year PFS exceeding any prior ALK 1L. Cognitive AE profile distinct — careful patient selection. Effective for post-alectinib resistance.
