id: DRUG-METRONIDAZOLE
names:
  preferred: "Metronidazole"
  ukrainian: "Метронідазол"
  english: "Metronidazole"
  brand_names:
    - "Flagyl"
    - "Metrogyl"
    - "Trichopolum"
atc_code: J01XD01
rxnorm_id: "6922"
drug_class: "Nitroimidazole antibiotic / antiprotozoal (anaerobic + protozoal coverage)"
mechanism: >
  Nitroimidazole prodrug that diffuses passively into bacteria and
  protozoa, where the low redox potential of anaerobic / microaerophilic
  organisms reduces its 5-nitro group to reactive radical intermediates
  (nitroso, hydroxylamine). These intermediates damage DNA via strand
  breakage and helix destabilization, producing bactericidal effect.
  Aerobic organisms cannot reduce the prodrug efficiently — hence the
  selective anaerobic spectrum. Active against Bacteroides fragilis
  group, Clostridioides spp. (including C. difficile and C.
  perfringens), Fusobacterium, Peptostreptococcus, Prevotella, and the
  protozoa Trichomonas, Giardia, Entamoeba histolytica. NO activity
  against aerobic bacteria. Standard add-on for anaerobic coverage in
  intra-abdominal, gynecologic, and dental infections, often paired
  with cefepime or aztreonam in febrile neutropenia with suspected
  intra-abdominal source. FDA-approved 1963.
regulatory_status:
  fda:
    approved: true
    year_first_approval: 1963
    indications_brief:
      - "Anaerobic bacterial infections (intra-abdominal, gynecologic, dental, skin/skin-structure)"
      - "Clostridioides difficile-associated diarrhea (oral; first-line if severe vancomycin not available)"
      - "Bacterial vaginosis, trichomoniasis, giardiasis, amebiasis"
      - "Surgical prophylaxis for colorectal procedures"
      - "Helicobacter pylori (combination therapy)"
  ema:
    approved: true
    year_first_approval: 1965
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: true
    reimbursement_indications:
      - "Анаеробні бактеріальні інфекції — додаткове покриття при FN з підозрою на інтраабдомінальне джерело"
      - "C. difficile коліт (легка/середня форма; пероральний)"
      - "Періанальна / періректальна інфекція (типовий контекст у нейтропенії)"
    last_verified: "2026-04-27"
    notes: "Зареєстровано в Україні (Trichopolum, Metrogyl, generics). Дешевий, NSZU-covered. Перевірено drlz.com.ua 2026-04-27."
typical_dosing: >
  Anaerobic infection / FN add-on (adult): 500 mg IV every 8 hours
  via 30-60 min infusion (or 500 mg PO q8h if able to tolerate oral —
  >90% bioavailability). Pediatric: 7.5 mg/kg IV/PO q6h, max 4 g/day.
  C. difficile colitis: 500 mg PO q8h × 10-14 days (mild-moderate;
  vancomycin oral preferred for severe). Renal: no major adjustment for
  CrCl ≥10 (but accumulate in anuric patients — give post-dialysis on
  HD days, reduce to q12h on CRRT). Hepatic impairment: reduce dose
  by 50% in severe (Child-Pugh C). Duration in FN combinations:
  matched to primary β-lactam, typically 7-14 days. Maximum continuous
  duration ≤10 days where possible due to peripheral neuropathy risk
  with prolonged use.
formulations:
  - "IV solution 500 mg / 100 mL ready-to-use bag"
  - "Tablet 250 mg, 500 mg"
  - "Extended-release tablet 750 mg"
  - "Oral capsule 375 mg"
  - "Vaginal gel 0.75% (5 g)"
  - "Topical gel 0.75%, 1%"
absolute_contraindications:
  - "Hypersensitivity to metronidazole or other nitroimidazoles (tinidazole, ornidazole — cross-reactivity)"
  - "First trimester pregnancy (for trichomoniasis only — relative; bacterial indications acceptable per CDC if benefit outweighs)"
  - "Concurrent disulfiram (within 2 weeks) — psychotic reactions"
  - "Concurrent alcohol consumption (within 3 days post-dose) — disulfiram-like reaction (less robust evidence than historically taught but practice persists)"
black_box_warnings:
  - "Carcinogenic in mice and rats; epidemiologic data in humans inconclusive but FDA-listed; minimize unnecessary exposure and prolonged courses"
common_adverse_events:
  - "Metallic taste — ~10-15%"
  - "Nausea — ~10-15%"
  - "Headache — ~5-10%"
  - "Anorexia — ~5%"
  - "Diarrhea — ~5%"
  - "Abdominal cramping — ~3-5%"
  - "Dry mouth — ~3-5%"
  - "Constipation — ~3%"
  - "Furred tongue / glossitis — ~3-5%"
  - "Vomiting — ~3-5%"
  - "Vaginal candidiasis — ~3-5%"
  - "Dark urine (red-brown discoloration; harmless) — common, harmless"
  - "Local infusion-site reaction / phlebitis (IV) — ~3-5%"
  - "Mild transaminitis — ~2-3%"
serious_adverse_events:
  - "Peripheral neuropathy (sensory; dose-dependent; usually with cumulative >40 g exposure or prolonged daily use); typically reversible if drug discontinued early"
  - "Optic neuropathy (rare; reversible)"
  - "Encephalopathy (rare; reversible after discontinuation)"
  - "Cerebellar ataxia (rare)"
  - "Aseptic meningitis (rare)"
  - "Stevens-Johnson syndrome / TEN (rare)"
  - "DRESS syndrome (rare)"
  - "Severe hepatic dysfunction (rare; including in Cockayne syndrome — contraindicated)"
  - "Pancreatitis (rare)"
  - "Disulfiram-like reaction with alcohol (flushing, nausea, vomiting, hypotension)"
  - "Severe psychotic reaction with disulfiram"
  - "QT prolongation (modest)"
  - "Reversible thrombocytopenia / neutropenia (rare)"
major_interactions:
  - "Alcohol (ethanol) and alcohol-containing medications (cough syrups, mouthwashes, IV solutions): disulfiram-like reaction — AVOID alcohol during therapy and ≥3 days post"
  - "Disulfiram: severe psychotic reaction — AVOID combination, separate by ≥2 weeks"
  - "Warfarin: metronidazole inhibits CYP2C9, increasing INR ~2× — reduce warfarin dose by 30-50% and monitor INR closely"
  - "Lithium: metronidazole increases lithium levels — monitor and reduce lithium dose"
  - "Phenytoin: metronidazole increases phenytoin levels — monitor levels"
  - "Cyclosporine, tacrolimus: increased calcineurin inhibitor exposure — monitor"
  - "Busulfan: metronidazole increases busulfan exposure with associated toxicity — AVOID combination"
  - "5-Fluorouracil: increased 5-FU toxicity — reduce 5-FU dose if combination required"
  - "Lopinavir/ritonavir: oral solution contains alcohol → disulfiram-like reaction"
  - "Mycophenolate: reduced exposure (gut flora) — monitor immunosuppression"
pharmacology:
  half_life_hours: 8  # 6-8 h normal; longer in severe hepatic / renal failure
  clearance: "Hepatic (60-80%) with renal excretion of metabolites"
  protein_binding_pct: 20
  metabolism: "Hepatic via CYP-independent oxidation and glucuronidation; metabolites have ~30% antibacterial activity; renal excretion of parent + metabolites"
sources:
  - SRC-NCCN-BCELL-2025
  - SRC-NCCN-MM-2025
last_reviewed: "2026-04-27"
reviewer_signoffs: []
notes: >
  Cheap, ubiquitous, narrow-spectrum anaerobic coverage. In febrile
  neutropenia, added when intra-abdominal or perirectal source is
  suspected (classic context: severe mucositis with abdominal pain,
  perianal cellulitis / abscess, typhlitis / neutropenic enterocolitis)
  and the primary β-lactam lacks anaerobic activity (cefepime,
  aztreonam, ceftriaxone). NOT needed when pip-tazo or meropenem is the
  primary agent — these already cover anaerobes. CRITICAL interactions:
  warfarin (INR doubles — pre-emptively halve warfarin); alcohol
  (disulfiram-like reaction including IV preparations containing ethanol
  excipient — read drug labels). Peripheral neuropathy is the limiting
  toxicity for prolonged use (≥4-6 weeks) — often persistent even after
  discontinuation; minimize duration. C. difficile colitis: oral
  metronidazole 500 mg q8h is acceptable for mild-moderate disease but
  oral vancomycin (or fidaxomicin) is preferred for severe (WBC
  >15,000, creatinine ≥1.5×) per IDSA 2017. Ukraine: cheap and
  ubiquitous; NSZU-covered.
