id: DRUG-DASATINIB
names:
  preferred: "Dasatinib"
  ukrainian: "Дазатиніб"
  english: "Dasatinib"
  brand_names: ["Sprycel"]
atc_code: L01EA02
rxnorm_id: "475343"
drug_class: "BCR-ABL1 / SRC-family TKI (2nd-generation)"
mechanism: >
  Multi-target TKI of BCR-ABL1 (~325× more potent than imatinib in vitro),
  SRC kinases, KIT, PDGFR. Active against most imatinib-resistant
  mutations except T315I. Pulmonary side-effect profile (effusions,
  pulmonary HTN) is the dose-limiting concern.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: true
    reimbursement_indications:
      - "Хронічна мієлоїдна лейкемія (1L хронічна фаза, прискорена/бластна фаза)"
      - "Ph+ гострий лімфобластний лейкоз (у комбінації з хіміотерапією)"
    last_verified: "2026-04-27"
formulations: ["Tablets 20 / 50 / 70 / 80 / 100 / 140 mg"]

absolute_contraindications:
  - "Hypersensitivity"
  - "Pregnancy"
black_box_warnings: []
major_interactions:
  - "PPIs / H2 blockers reduce absorption — separate by ≥2 hours OR avoid"
  - "Strong CYP3A4 inhibitors / inducers alter exposure"
common_adverse_events:
  - "Pleural effusion (~30% lifetime; dose-related)"
  - "Cytopenias (more than imatinib)"
  - "Diarrhea"
  - "Headache"
  - "Rash"
serious_adverse_events:
  - "Pulmonary arterial hypertension (rare, often reversible)"
  - "Severe pleural effusion requiring drainage"
  - "Bleeding (platelet-dysfunction)"
  - "Cardiac dysfunction"

pharmacology: {half_life: "~3-5 hours"}

sources:
  - SRC-NCCN-MPN-2025
  - SRC-ELN-CML-2020

last_reviewed: "2026-04-25"
notes: >
  Preferred 2nd-gen TKI for younger CML patients targeting deep molecular
  response + treatment-free remission, OR for Ph+ ALL. AVOID in
  pulmonary comorbidity (COPD, prior pleural disease, PAH) due to
  effusion risk.

notes_patient: >
  Таблетка-TKI 2-го покоління: блокує BCR-ABL ефективніше за imatinib і використовується при стійкості або непереносимості. Може спричиняти випіт у плеврі — повідомляйте про задишку.
