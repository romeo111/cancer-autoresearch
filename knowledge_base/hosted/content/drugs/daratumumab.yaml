id: DRUG-DARATUMUMAB
names:
  preferred: "Daratumumab"
  ukrainian: "Даратумумаб"
  english: "Daratumumab"
  brand_names:
  - "Darzalex"
  - "Darzalex Faspro (SC)"
atc_code: L01FC01
rxnorm_id: "1731059"
drug_class: "monoclonal_antibody — anti-CD38 IgG1κ (fully human)"
mechanism: >
  Binds CD38, which is highly expressed on plasma cells. Induces myeloma
  cell death through complement-dependent cytotoxicity (CDC), antibody-
  dependent cellular cytotoxicity (ADCC), antibody-dependent cellular
  phagocytosis (ADCP), apoptosis, and immunomodulation via depletion of
  CD38+ regulatory T-cells.

regulatory_status:
  fda:
    approved: true
    year_first_approval: 2015
    indications_brief: ["Multiple myeloma (newly-diagnosed transplant-eligible D-VRd; 1L non-eligible D-Rd; R/R)"]
  ema:
    approved: true
    year_first_approval: 2016
  ukraine_registration:
    registered: true
    registration_number: "[TBD]"
    reimbursed_nszu: true
    reimbursement_indications:
    - 'Програма медичних гарантій 2026: ММ 1L у не-трансплант кандидатів з VMP/Rd (D-VMP, D-Rd)'
    - 'Програма медичних гарантій 2026: ММ 1L у трансплант-кандидатів з VTd (D-VTd, CASSIOPEIA)'
    - 'Реімбурсаційний пакет «Онкологія» 2026: ММ R/R з Rd/Vd/Pd (POLLUX, CASTOR, APOLLO)'
    last_verified: "2026-04-27"

    notes: 'Зареєстрований; НСЗУ покриває ММ 1L (D-VMP/D-Rd/D-VTd) та R/R комбо. SC-формуляція (daratumumab+hyaluronidase) — пріоритетна. Джерело: nszu.gov.ua (2026-04).'
typical_dosing: >
  IV: 16 mg/kg weekly cycles 1-2, every 2 weeks cycles 3-6, then every
  4 weeks. SC (Faspro): 1800 mg with hyaluronidase, same schedule —
  preferred where available due to shorter administration time and
  fewer infusion reactions.
formulations:
- "IV concentrate 100 mg/5 mL, 400 mg/20 mL"
- "SC injection 1800 mg / 15 mL with hyaluronidase"

absolute_contraindications:
- "Hypersensitivity to daratumumab or hyaluronidase (SC formulation)"
black_box_warnings: []
major_interactions:
- "May interfere with blood typing (indirect Coombs/IAT — pan-positive) — type and screen + extended phenotype BEFORE first dose, communicate to blood bank"
- "May interfere with serum protein electrophoresis / immunofixation (mistaken for M-protein) — IFE-DIRA reflex testing helpful"
- "Live vaccines — contraindicated during therapy"
- "Concurrent dexamethasone / lenalidomide / bortezomib (intentional combinations) — additive infection risk, herpes prophylaxis required"
common_adverse_events:
- "Infusion-related reactions — IV cycle 1 ~50%; SC ~10%, mostly grade 1-2"
- "Neutropenia — ~40% grade ≥3 (combination)"
- "Thrombocytopenia — ~25% grade ≥3"
- "Anemia — ~30%"
- "Fatigue — ~40%"
- "Upper respiratory infection — ~30%"
- "Back pain — ~25%"
- "Cough — ~25%, dyspnea ~20%"
- "Pyrexia — ~20%"
- "Diarrhea — ~25%"
- "Nausea — ~20%"
serious_adverse_events:
- "Severe infusion reaction (anaphylaxis, bronchospasm) — IV cycle 1 ~5% grade ≥3"
- "Reactivation of hepatitis B — fulminant possible; screen + entecavir prophylaxis if HBsAg+ or anti-HBc+"
- "Severe infections (pneumonia, sepsis) — ~15-20% grade ≥3 over 1L therapy"
- "Hemolysis from interference with crossmatch (technical, not biologic)"
- "Tumor lysis syndrome (rare, high-burden MM)"
- "Cardiotoxicity (rare; mostly in pre-existing HF)"

pharmacology:
  half_life_hours: 432  # ~18 days at steady state
  clearance: "non-renal (saturable target-mediated disposition + reticuloendothelial)"
  protein_binding_pct:
  metabolism: "non-CYP; catabolized to amino acids; clearance falls as CD38+ tumor depletes"

sources:
- SRC-NCCN-MM-2025

last_reviewed: "2026-04-26"
reviewers: []
notes: >
  Reimbursement under НСЗУ in Ukraine is currently NOT in place — this is a
  meaningful access constraint. Patients selected for D-VRd in 1L need
  documented funding pathway (clinical trial, charitable scheme, or
  out-of-pocket). HBV screening (HBsAg + anti-HBc) mandatory before first
  dose; entecavir prophylaxis if HBsAg+ or anti-HBc+. Type and screen for
  red-cell antibodies BEFORE first dose to avoid daratumumab interference
  with crossmatching.

notes_patient: >
  Препарат-мітка для клітин мієломи (через CD38-білок). Допомагає імунній системі їх знищити. Вводиться внутрішньовенно або підшкірно у складі багатокомпонентних схем для множинної мієломи.
