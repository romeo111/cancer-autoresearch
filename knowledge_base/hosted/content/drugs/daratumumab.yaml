id: DRUG-DARATUMUMAB
names:
  preferred: "Daratumumab"
  ukrainian: "Даратумумаб"
  english: "Daratumumab"
  brand_names:
    - "Darzalex"
    - "Darzalex Faspro (SC)"
atc_code: L01FC01
rxnorm_id: "1731059"
drug_class: "Anti-CD38 IgG1κ monoclonal antibody"
mechanism: >
  Binds CD38, which is highly expressed on plasma cells. Induces myeloma
  cell death through complement-dependent cytotoxicity (CDC), antibody-
  dependent cellular cytotoxicity (ADCC), antibody-dependent cellular
  phagocytosis (ADCP), apoptosis, and immunomodulation via depletion of
  CD38+ regulatory T-cells.

regulatory_status:
  fda:
    approved: true
  ema:
    approved: true
  ukraine_registration:
    registered: true
    registration_number: "[TBD]"
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-25"

typical_dosing: >
  IV: 16 mg/kg weekly cycles 1-2, every 2 weeks cycles 3-6, then every
  4 weeks. SC (Faspro): 1800 mg with hyaluronidase, same schedule —
  preferred where available due to shorter administration time and
  fewer infusion reactions.
formulations:
  - "IV concentrate 100 mg/5 mL, 400 mg/20 mL"
  - "SC injection 1800 mg / 15 mL with hyaluronidase"

absolute_contraindications:
  - "Hypersensitivity to daratumumab or hyaluronidase (SC formulation)"
black_box_warnings: []
major_interactions:
  - "May interfere with blood typing (indirect Coombs/IAT) — type and screen before first dose; document phenotype"
  - "Live vaccines should not be administered during therapy"
common_adverse_events:
  - "Infusion-related reactions (substantially fewer with SC route)"
  - "Neutropenia, thrombocytopenia"
  - "Fatigue"
  - "Upper respiratory infection"
  - "Back pain"
  - "Cough, dyspnea"
serious_adverse_events:
  - "Severe infusion reactions (anaphylaxis, bronchospasm)"
  - "Reactivation of hepatitis B (screen + prophylaxis required)"
  - "Severe infections (pneumonia, sepsis)"

pharmacology:
  half_life: "~18 days at steady state (saturable target-mediated clearance)"

sources:
  - SRC-NCCN-MM-2025

last_reviewed: "2026-04-25"
notes: >
  Reimbursement under НСЗУ in Ukraine is currently NOT in place — this is a
  meaningful access constraint. Patients selected for D-VRd in 1L need
  documented funding pathway (clinical trial, charitable scheme, or
  out-of-pocket). HBV screening (HBsAg + anti-HBc) mandatory before first
  dose; entecavir prophylaxis if HBsAg+ or anti-HBc+. Type and screen for
  red-cell antibodies BEFORE first dose to avoid daratumumab interference
  with crossmatching.
