id: DRUG-TRIFLURIDINE-TIPIRACIL
names:
  preferred: "Trifluridine + Tipiracil"
  ukrainian: "Трифлуридин + Типірацил"
  english: "Trifluridine + Tipiracil"
  brand_names:
    - "Lonsurf"
    - "TAS-102"
atc_code: L01BC59
rxnorm_id: "1721577"
drug_class: "Oral fluoropyrimidine prodrug + thymidine phosphorylase inhibitor (combination tablet)"
mechanism: >
  Trifluridine (FTD) is a thymidine analog incorporated into DNA causing
  DNA dysfunction; rapidly degraded by thymidine phosphorylase (TP) in
  vivo, limiting bioavailability. Tipiracil hydrochloride (TPI) is a
  potent TP inhibitor that protects FTD from catabolism, enabling oral
  bioavailability + sustained tissue exposure. Active in fluoropyrimidine-
  refractory disease (distinct mechanism from 5-FU TS inhibition).

regulatory_status:
  fda:
    approved: true
  ema:
    approved: true
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-25"
    notes: "Registered; NOT NSZU-reimbursed. Out-of-pocket / charitable / clinical-trial access."

typical_dosing: >
  35 mg/m² (based on FTD component) PO BID days 1-5 + 8-12 of 28-day
  cycle (4 doses/week × 2 weeks, then 14-day rest). Take within 1 hour
  after meals (morning + evening).
formulations:
  - "Tablet 15 mg / 6.14 mg (FTD/TPI)"
  - "Tablet 20 mg / 8.19 mg (FTD/TPI)"

absolute_contraindications:
  - "Severe baseline myelosuppression (ANC <1000 OR platelets <75K)"
  - "Hypersensitivity"
black_box_warnings: []
major_interactions:
  - "Concurrent live vaccines — avoid"
  - "Severe renal impairment — dose reduction required"
common_adverse_events:
  - "Neutropenia (~50% any grade; ~38% Grade ≥3)"
  - "Nausea (~50%)"
  - "Anemia"
  - "Fatigue"
  - "Diarrhea"
  - "Decreased appetite"
  - "Thrombocytopenia"
serious_adverse_events:
  - "Severe myelosuppression with febrile neutropenia (~5%)"
  - "Severe diarrhea / dehydration"
  - "Interstitial lung disease (rare)"
  - "Hepatic toxicity"

pharmacology:
  half_life: "~1.4 hours (trifluridine; tipiracil ~2.1 hours)"

sources:
  - SRC-NCCN-COLON-2025
  - SRC-ESMO-COLON-2024

last_reviewed: "2026-04-25"
notes: >
  RECOURSE trial (Mayer 2015): 3L+ mCRC after standard chemo (FOLFOX,
  FOLFIRI, anti-EGFR/anti-VEGF) — TAS-102 vs placebo improved mOS 7.1
  vs 5.3 mo (HR 0.68). SUNLIGHT trial (2023): TAS-102 + bevacizumab vs
  TAS-102 alone improved mOS 10.8 vs 7.5 mo (HR 0.61) — establishing
  combination as preferred over monotherapy in 3L+. Stop if ANC <500
  prior to dose; allow ≥3 days recovery between cycles.
