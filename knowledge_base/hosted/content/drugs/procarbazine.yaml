id: DRUG-PROCARBAZINE
names:
  preferred: "Procarbazine"
  ukrainian: "Прокарбазин"
  english: "Procarbazine"
  brand_names: ["Matulane", "Natulan"]
atc_code: L01XB01
rxnorm_id: "8744"
drug_class: "Hydrazine alkylating agent (oral)"
mechanism: >
  Methylates DNA at O6/N7 of guanine after hepatic activation. Crosses
  blood-brain barrier — hence its role in PCNSL (R-MPV) and BEACOPP-Hodgkin.
  Reversible MAO inhibitor: tyramine-rich foods + sympathomimetics → HTN crisis.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: false
    last_verified: "2026-04-25"

typical_dosing: >
  PCNSL (R-MPV): 100 mg/m² PO daily × 7 days every 14 days.
  Hodgkin (BEACOPP escalated): 100 mg/m² PO days 1-7 every 21 days.
formulations: ["Capsules 50 mg"]

absolute_contraindications:
  - "Concurrent use with foods/drugs containing tyramine or sympathomimetics (MAOI interaction)"
  - "Severe hepatic / renal dysfunction"
  - "Pre-existing severe bone marrow suppression"

black_box_warnings:
  - "Myelosuppression (delayed nadir 4-6 weeks)"
  - "Secondary malignancies (AML risk in long-term Hodgkin survivors)"
  - "Pulmonary toxicity"

common_adverse_events:
  - "Nausea/vomiting (high — give antiemetic)"
  - "Myelosuppression"
  - "Flu-like syndrome"
  - "Disulfiram-like effect with alcohol"

serious_adverse_events:
  - "Hypertensive crisis (MAOI + tyramine)"
  - "Pulmonary fibrosis (rare, dose-cumulative)"
  - "Secondary AML/MDS"

sources:
  - SRC-NCCN-BCELL-2025
last_reviewed: "2026-04-25"
notes: >
  STUB — Phase 9. Patient counseling on MAOI diet (avoid aged cheese,
  cured meats, fermented foods, broad beans) is mandatory. Avoid SSRIs,
  pseudoephedrine, sympathomimetics. Used in R-MPV (PCNSL) and
  BEACOPP escalated (Hodgkin) — both are restricted protocols.
