id: DRUG-FRUQUINTINIB
names:
  preferred: "Fruquintinib"
  ukrainian: "Фруквінтиніб"
  english: "Fruquintinib"
  synonyms: ["HMPL-013"]
  brand_names: ["Fruzaqla", "Elunate"]
atc_code: L01EK04
rxnorm_id: ""
drug_class: "Highly selective oral VEGFR1/2/3 tyrosine kinase inhibitor"
mechanism: >
  STUB — needs full curation. Highly selective small-molecule TKI of
  VEGFR-1/2/3, sparing most off-target kinases — improved tolerability
  vs multikinase TKIs (regorafenib). FRESCO-2: fruquintinib vs placebo
  improved mOS 7.4 vs 4.8 mo and PFS in refractory mCRC post chemo +
  anti-VEGF + anti-EGFR (RAS-WT) ± TAS-102/regorafenib.

regulatory_status:
  fda:
    approved: true
    year_first_approval: 2023
    indications_brief: ["Refractory metastatic CRC after fluoropyrimidine, oxaliplatin, irinotecan, anti-VEGF ± anti-EGFR"]
  ema:
    approved: true
    year_first_approval: 2024
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: "STUB — pending CSD-4 verification. Not registered in UA per drlz.com.ua snapshot 2026-04-27."

typical_dosing: >
  STUB. 5 mg PO once daily on a 3-weeks-on / 1-week-off schedule.

formulations:
  - "Capsules 1 mg"
  - "Capsules 5 mg"

absolute_contraindications: []
black_box_warnings: []
common_adverse_events:
  - "Hypertension"
  - "Hand-foot syndrome (palmar-plantar erythrodysesthesia)"
  - "Proteinuria"
  - "Asthenia / fatigue"
  - "Diarrhea"
  - "Stomatitis"
serious_adverse_events:
  - "Hemorrhage (GI, intracranial)"
  - "Hypertensive crisis"
  - "GI perforation / fistula"
  - "Posterior reversible encephalopathy syndrome (PRES)"
  - "Hepatotoxicity"
  - "Wound-healing impairment (hold pre-/post-surgery)"
major_interactions:
  - "STUB — strong CYP3A4 inhibitors/inducers"

pharmacology:
  half_life_hours: 42
  clearance: "hepatic"
  protein_binding_pct: 95
  metabolism: "CYP3A4"

sources:
  - SRC-NCCN-COLON-2025
  - SRC-ESMO-COLON-2024

last_reviewed: "2026-04-27"
reviewers: []
notes: >
  STUB — Phase CSD-4 promotion. 3L+ refractory mCRC option alongside
  regorafenib and TAS-102 ± bevacizumab. Tolerability advantage over
  regorafenib in cross-trial comparison. Needs full curation of dose-adj
  for HTN/proteinuria, monitoring (BP, urinalysis, LFTs), and surgical
  hold windows.
