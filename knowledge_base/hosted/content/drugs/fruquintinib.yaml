id: DRUG-FRUQUINTINIB
names:
  preferred: "Fruquintinib"
  ukrainian: "Фруквінтиніб"
  english: "Fruquintinib"
  synonyms: ["HMPL-013"]
  brand_names: ["Fruzaqla", "Elunate"]
atc_code: L01EK04
rxnorm_id: ""
drug_class: "Highly selective oral VEGFR1/2/3 tyrosine kinase inhibitor"
mechanism: >
  Highly selective ATP-competitive small-molecule TKI of vascular
  endothelial growth factor receptors 1, 2, and 3 (VEGFR-1/2/3),
  with sub-nanomolar in-vitro potency and minimal off-target
  inhibition (negligible activity vs FGFR, PDGFR, KIT, RET) — the
  selectivity profile is intentionally narrow to improve tolerability
  vs multikinase TKIs (regorafenib, sorafenib). Blocks VEGF-driven
  angiogenesis and lymphangiogenesis in the tumor microenvironment;
  no direct antiproliferative effect on tumor cells. Pivotal evidence
  FRESCO-2 (multinational, Western mCRC, refractory after chemo +
  anti-VEGF + anti-EGFR if RAS-WT, ± TAS-102 / regorafenib):
  fruquintinib vs placebo + best supportive care, mOS 7.4 vs 4.8 mo
  HR 0.66, mPFS 3.7 vs 1.8 mo HR 0.32. FDA approval Nov 2023.
  Original China approval 2018 (Elunate, FRESCO trial).

regulatory_status:
  fda:
    approved: true
    year_first_approval: 2023
    indications_brief:
      - "Refractory metastatic colorectal cancer after fluoropyrimidine, oxaliplatin, irinotecan, anti-VEGF, and anti-EGFR (if RAS-WT)"
  ema:
    approved: true
    year_first_approval: 2024
    indications_brief:
      - "Refractory mCRC post chemo + anti-VEGF (± anti-EGFR if RAS-WT)"
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: "Не зареєстровано per drlz.com.ua snapshot 2026-04-27. Regorafenib + TAS-102 (trifluridine/tipiracil) ± bevacizumab dominate UA late-line mCRC practice; fruquintinib not yet on НСЗУ. Доступ via EAP Takeda / cross-border / self-pay."

typical_dosing: >
  5 mg PO once daily on a 3-weeks-on / 1-week-off schedule (28-day
  cycle), with or without food, until progression / unacceptable
  toxicity. Dose level -1 = 4 mg daily; -2 = 3 mg daily; permanent
  discontinuation if recurrent G3-4 at -2. Hold for hypertensive
  crisis, G3-4 hand-foot syndrome, G3-4 proteinuria, GI perforation
  / fistula, or severe hemorrhage. Stop 2 weeks pre-elective surgery
  and resume only after wound healing (≥2 weeks post-op typically).
  No formal renal adjustment for CrCl ≥30; not studied in severe
  hepatic impairment.

formulations:
  - "Capsules 1 mg"
  - "Capsules 5 mg"

absolute_contraindications:
  - "Hypersensitivity to fruquintinib or any excipient"
  - "Severe uncontrolled hypertension (resistant to ≥3 antihypertensives)"
  - "Recent (within ≥4 weeks) major surgery / unhealed wound"
  - "Active GI fistula or perforation"
  - "Severe ongoing hemorrhage"
  - "Pregnancy (embryo-fetal toxicity)"

black_box_warnings: []

common_adverse_events:
  - "Hypertension ~37% any-grade; G3 ~14%"
  - "Hand-foot syndrome (palmar-plantar erythrodysesthesia) ~35%"
  - "Proteinuria ~36%"
  - "Asthenia / fatigue ~35%"
  - "Diarrhea ~35%"
  - "Stomatitis ~30%"
  - "Decreased appetite ~30%"
  - "Hypothyroidism ~25% (anti-VEGF class)"
  - "Dysphonia ~25%"
  - "Abdominal pain ~25%"
  - "Nausea ~22%"
  - "Increased ALT/AST ~20%"

serious_adverse_events:
  - "Hemorrhage — GI, intracranial, pulmonary (G3+ ~3%; can be fatal)"
  - "Hypertensive crisis (G3+ ~14%; baseline + serial BP)"
  - "GI perforation / fistula (G3+ ~2%; especially with peritoneal carcinomatosis or recent surgery)"
  - "Posterior reversible encephalopathy syndrome (PRES; rare but reported)"
  - "Hepatotoxicity (G3 ALT/AST ~3%)"
  - "Wound-healing impairment (hold pre-/post-elective surgery)"
  - "Severe hand-foot syndrome (G3 ~7%) requiring dose hold / reduction"
  - "Thrombotic microangiopathy (rare; anti-VEGF class)"
  - "Cardiac dysfunction / LVEF decline (rare)"

major_interactions:
  - "Strong CYP3A4 inhibitors (azoles, clarithromycin, ritonavir) — ↑ exposure"
  - "Strong CYP3A4 inducers (rifampin, phenytoin, carbamazepine, St John's wort) — ↓ exposure; avoid"
  - "Other anti-VEGF agents (bevacizumab) — additive toxicity; not co-administered"
  - "Anticoagulants (warfarin, DOAC) — additive bleeding risk; balance with thrombosis risk"
  - "QT-prolonging drugs — modest additive risk"
  - "Hormonal contraception — efficacy preserved, but pregnancy contraindicated"

pharmacology:
  half_life_hours: 42
  clearance: "hepatic (predominantly CYP3A4)"
  protein_binding_pct: 95
  metabolism: "CYP3A4 (primary); minor CYP2C8 / 2C9 / 2C19; FMO3"

sources:
  - SRC-NCCN-COLON-2025
  - SRC-ESMO-COLON-2024

last_reviewed: "2026-04-27"
reviewers: []
notes: >
  Late-line refractory mCRC option alongside regorafenib and
  trifluridine/tipiracil (TAS-102) ± bevacizumab. Cross-trial
  comparison suggests numerically better tolerability than
  regorafenib (less HFS, less LFT elevation, more straightforward
  HTN management). FRESCO-2 enrolled patients post all-major-classes
  including TAS-102 / regorafenib — true salvage population.
  Baseline workup: BP, urinalysis (UPCR), LFTs, CBC, TSH, ECG,
  pregnancy test. Monitor BP weekly first 6 weeks then monthly,
  urinalysis monthly, LFTs monthly, TSH q3 months. Hold for SBP
  >160/100 — escalate antihypertensives (ACE-i / ARB first then
  CCB). Hold ≥2 weeks before elective surgery; resume only after
  full wound healing (typically ≥2 weeks post-op). UA access via
  EAP / self-pay; not on НСЗУ.
