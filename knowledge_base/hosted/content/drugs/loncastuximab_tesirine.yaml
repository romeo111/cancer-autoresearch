id: DRUG-LONCASTUXIMAB-TESIRINE
names:
  preferred: "Loncastuximab tesirine"
  ukrainian: "Лонкастуксимаб тезирин"
  english: "Loncastuximab tesirine"
  brand_names:
    - "Zynlonta"
  synonyms:
    - "lonca"
    - "ADCT-402"
    - "loncastuximab tesirine-lpyl"
atc_code: L01FX22
rxnorm_id: null
drug_class: "Anti-CD19 antibody-drug conjugate (ADC) with pyrrolobenzodiazepine (PBD) dimer payload"
mechanism: >
  Humanized IgG1κ monoclonal antibody targeting CD19, conjugated via a
  cathepsin-cleavable valine-alanine linker to SG3199, a pyrrolobenzodiazepine
  (PBD) dimer warhead. Average drug-to-antibody ratio ~2.3. After binding
  surface CD19 on B-cell lymphoma cells, the ADC is internalized;
  cathepsin B cleavage in the lysosome releases the PBD payload, which
  alkylates and cross-links DNA in the minor groove without distorting
  the helix — these cross-links evade DNA repair and trigger apoptosis.
  PBD warheads retain activity in cells resistant to topoisomerase or
  microtubule-targeting payloads. FDA-approved April 2021 for
  relapsed/refractory diffuse large B-cell lymphoma (DLBCL NOS, DLBCL
  arising from low-grade lymphoma, high-grade B-cell lymphoma) after ≥2
  prior systemic lines (LOTIS-2). EMA approval December 2022.
regulatory_status:
  fda:
    approved: true
    year_first_approval: 2021
    indications_brief:
      - "R/R DLBCL NOS / HGBL / DLBCL arising from low-grade lymphoma after ≥2 prior systemic lines (3L+)"
  ema:
    approved: true
    year_first_approval: 2022
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: |
      Не зареєстровано в Україні (Держреєстр ЛЗ — РП відсутнє станом на 2026-04-27).
      Не реімбурсується НСЗУ. Шляхи доступу:
      - Self-pay через закордонну постачання (Туреччина / EU аптеки);
        вартість ~USD 30-40K за курс 6 циклів.
      - EAP ADC Therapeutics / Sobi: компасіонатний доступ через
        локального медрепрезентанта (одиничні випадки в гематологічних
        центрах Києва, Львова).
      - Trial-only: LOTIS-серія розширених програм та комбінаційних
        досліджень (LOTIS-5 lonca + R-GemOx).
      Source: drlz.com.ua пошук «loncastuximab»/«zynlonta» 2026-04-27 —
      РП відсутнє.
typical_dosing: >
  150 µg/kg IV every 3 weeks for cycles 1-2, then 75 µg/kg IV every 3
  weeks from cycle 3 onward, until disease progression or unacceptable
  toxicity. Premedication with dexamethasone 4 mg PO BID × 3 days
  (starting day prior to infusion, day of, and day after) is mandatory
  to reduce edema, effusions, and infusion reactions. Dose adjustments:
  hold for ANC <1.0 × 10⁹/L, platelets <50 × 10⁹/L, GGT >2.5× ULN, or
  effusions / edema requiring intervention; reduce by 25-50% on resumption
  if recurrent. No dose adjustment for renal impairment (CrCl ≥30 mL/min)
  or mild hepatic impairment; not studied in severe hepatic impairment
  (avoid). Median 3-5 cycles in LOTIS-2.
formulations:
  - "Lyophilized powder 10 mg / single-dose vial; reconstituted and diluted for IV infusion over 30 minutes"
absolute_contraindications:
  - "Severe hypersensitivity to loncastuximab tesirine or any component"
  - "Pregnancy (PBD payload is genotoxic; effective contraception required during and ≥9 months post for women; ≥6 months for men)"
  - "Severe hepatic impairment (Child-Pugh C; not studied)"
black_box_warnings: []
common_adverse_events:
  - "Increased GGT — ~42%"
  - "Neutropenia — ~40% (G3-4 ~26%)"
  - "Thrombocytopenia — ~33% (G3-4 ~18%)"
  - "Anemia — ~26% (G3-4 ~10%)"
  - "Lymphopenia — ~20%"
  - "Fatigue — ~30%"
  - "Edema (peripheral, periorbital, pleural effusion, ascites, pericardial effusion) — ~30% any-grade; class effect of PBD ADCs"
  - "Nausea — ~24%"
  - "Cough — ~21%"
  - "Skin reactions / photosensitivity / rash — ~28% (sun-protective measures advised throughout treatment + 1 month post)"
  - "Musculoskeletal pain — ~20%"
  - "Pyrexia — ~16%"
  - "Hyperglycemia — ~12%"
  - "Decreased appetite — ~14%"
serious_adverse_events:
  - "Severe effusions / edema (pleural, pericardial, ascites) — Grade ≥3 ~5%; can require drainage"
  - "Severe cytopenias (G4 neutropenia, G4 thrombocytopenia) with bleeding or febrile neutropenia"
  - "Serious / opportunistic infections (PJP, viral reactivation) — Grade ≥3 ~10%"
  - "Hepatotoxicity (transaminase / GGT elevation, rare DILI)"
  - "Cutaneous reactions including severe photosensitivity, exfoliative dermatitis"
  - "Embryo-fetal toxicity (genotoxic PBD payload)"
  - "Infusion reactions (rare; pre-medication recommended)"
major_interactions:
  - "Strong CYP3A4 inhibitors (azole antifungals, ritonavir): may increase free PBD payload exposure — monitor closely; avoid if possible"
  - "Live vaccines: avoid during therapy and ≥3 months post"
  - "Other myelosuppressive agents: additive cytopenia"
  - "Concurrent corticosteroids beyond protocol-mandated premedication: may increase infection risk; balance with edema-control benefit"
  - "Hepatotoxic drugs (azoles, statins): additive risk of GGT / transaminase elevation"
  - "QT-prolonging drugs: no specific signal but PBD-class drugs warrant baseline + on-treatment ECG monitoring"
pharmacology:
  half_life_hours: 168  # ~7 days for the ADC
  clearance: "Non-renal; ADC catabolized to amino acids and free PBD payload; payload cleared hepatically"
  protein_binding_pct: null
  metabolism: "ADC undergoes proteolytic catabolism; released SG3199 PBD payload metabolized by CYP3A4 (minor) and conjugation"
sources:
  - SRC-LOTIS-2-CAIMI-2021
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-DLBCL-2024
last_reviewed: "2026-04-27"
reviewer_signoffs: []
notes: >
  Pivotal: LOTIS-2 (Caimi et al., Lancet Oncol 2021) — 145 R/R DLBCL
  patients with ≥2 prior lines (~99% prior R-CHOP, ~17% prior CAR-T),
  ORR 48%, CR 24%, median DoR 13.4 months in responders. Single-agent
  activity in heavily pretreated population including post-CAR-T
  failures. Position in DLBCL algorithm: 3L+ option after R-CHOP and
  CAR-T (or in CAR-T-ineligible patients), competing with polatuzumab
  vedotin + bendamustine + rituximab (Pola-BR) and bispecific antibodies
  (epcoritamab, glofitamab). Edema/effusion management is the principal
  toxicity issue: mandatory dexamethasone premedication, monitor weight
  + auscultation each cycle, drain effusions when symptomatic. Skin
  photosensitivity requires SPF50+ broad-spectrum sunscreen and
  protective clothing throughout treatment + 1 month after. Ukraine: NOT
  registered, NOT NSZU-reimbursed; access via self-pay (~USD 30-40K
  per 6-cycle course) or compassionate-use program through ADC
  Therapeutics / Sobi. LOTIS-5 (lonca + R-GemOx) ongoing for 2L use.
