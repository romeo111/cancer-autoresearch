id: DRUG-CABOZANTINIB
names:
  preferred: "Cabozantinib"
  ukrainian: "Кабозантиніб"
  english: "Cabozantinib"
  brand_names: ["Cometriq", "Cabometyx"]
atc_code: L01EX07
rxnorm_id: "1363011"
drug_class: "Multi-kinase inhibitor (MET, VEGFR1-3, RET, AXL, KIT, FLT3, ROS1)"
mechanism: >
  Oral multi-targeted TKI inhibiting MET, VEGFR1-3, RET, AXL, KIT,
  FLT3, and ROS1. Approved for medullary thyroid carcinoma (EXAM trial
  — capsule formulation Cometriq 140 mg), renal cell carcinoma
  (METEOR / CABOSUN — tablet formulation Cabometyx 60 mg), HCC
  (CELESTIAL 2L), and DTC (COSMIC-311). Activity in MTC independent
  of RET mutation status — option for RET-WT MTC where selective RET
  inhibitors are not appropriate.

regulatory_status:
  fda:
    approved: true
  ema:
    approved: true
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: |
      Не зареєстровано в Україні (Держреєстр ЛЗ — РП відсутнє станом на
      2026-04-27). Multi-kinase TKI для MTC, ниркової карциноми, ГЦК,
      DTC рефрактерної до RAI.
      Шляхи доступу:
      - Named-patient import (DEC спецдозвіл).
      - EAP Ipsen / Exelixis (Cabometyx access program).
      - Cross-border (EU): SoC у багатьох EU країнах.
      Source: drlz.com.ua пошук "cabozantinib"/"cometriq"/"cabometyx"
      2026-04-27 — РП відсутнє.

typical_dosing: >
  Medullary thyroid carcinoma (Cometriq capsules): 140 mg PO once
  daily on empty stomach (≥1 h before / ≥2 h after food).
  RCC / HCC / DTC (Cabometyx tablets): 60 mg PO once daily on empty
  stomach. Capsule and tablet formulations are NOT bioequivalent.
formulations:
  - "Capsules 20 mg / 80 mg (Cometriq — MTC indication)"
  - "Tablets 20 mg / 40 mg / 60 mg (Cabometyx — RCC / HCC / DTC)"

absolute_contraindications:
  - "Hypersensitivity to cabozantinib"
  - "Recent severe GI hemorrhage or perforation"
  - "Severe hepatic impairment (Child-Pugh C) — use with caution / avoid"
black_box_warnings:
  - "GI perforation / fistula"
  - "Severe / fatal hemorrhage"
major_interactions:
  - "Strong CYP3A4 inhibitors / inducers — avoid or dose-adjust"
  - "Anticoagulants — bleeding risk"
common_adverse_events:
  - "Diarrhea (~60-70%)"
  - "Hand-foot skin reaction (palmar-plantar erythrodysesthesia)"
  - "Fatigue"
  - "Hypertension"
  - "Decreased appetite / weight loss"
  - "Mucositis / stomatitis"
  - "Nausea"
  - "Hypothyroidism (often pre-existing post-thyroidectomy in MTC)"
serious_adverse_events:
  - "GI perforation / fistula"
  - "Severe hemorrhage"
  - "Venous + arterial thrombotic events"
  - "Severe hypertensive crisis / PRES"
  - "Wound healing impairment"
  - "Osteonecrosis of the jaw"
  - "Proteinuria / nephrotic syndrome"

pharmacology:
  half_life: "~99-120 hours; CYP3A4 substrate"

sources:
  - SRC-NCCN-THYROID-2025
  - SRC-NCCN-KIDNEY-2025
  - SRC-NCCN-HCC-2025

last_reviewed: "2026-04-27"
notes: >
  EXAM (Schoffski 2012, MTC): cabozantinib 140 mg vs placebo improved
  PFS 11.2 vs 4.0 mo; OS benefit in M918T-mutant subgroup. ZETA
  (vandetanib) is the alternative MTC multikinase TKI; both predate
  RET-selective era. Modern preferred sequence in advanced
  RET-mutant MTC: selpercatinib > pralsetinib > cabozantinib /
  vandetanib (toxicity pushes selectives first). For RET-WT MTC
  (RAS-mutant or unknown), cabozantinib retains primary role.
  Capsule (Cometriq) and tablet (Cabometyx) are NOT interchangeable
  — different bioavailability per FDA prescribing information.
