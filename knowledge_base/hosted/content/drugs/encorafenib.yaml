id: DRUG-ENCORAFENIB
names:
  preferred: "Encorafenib"
  ukrainian: "Енкорафеніб"
  english: "Encorafenib"
  brand_names: ["Braftovi"]
atc_code: L01EC03
rxnorm_id: "1996072"
drug_class: "BRAF inhibitor (oral, V600-selective)"
mechanism: >
  Selective ATP-competitive BRAF V600E/K kinase inhibitor. Longer
  target-residence time vs vemurafenib/dabrafenib → less paradoxical
  ERK activation in WT BRAF cells. In mCRC BRAF V600E + cetuximab
  (BEACON CRC) — first BRAF-targeted approval in CRC.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: false
    last_verified: "2026-04-27"
    reimbursement_indications: []
    notes: 'Зареєстрований для меланоми BRAF V600 (з binimetinib) та КРР BRAF V600E (з cetuximab, BEACON). НСЗУ не покриває станом на 2026-04 — out-of-pocket. Меланома — переважно dabrafenib+trametinib. Джерело: nszu.gov.ua (2026-04).'
typical_dosing: >
  CRC BRAF V600E (BEACON): 300 mg PO daily (with cetuximab 400→250 mg/m² weekly).
  Melanoma (with binimetinib): 450 mg PO daily.
formulations: ["Capsules 75 mg"]

absolute_contraindications:
- "Severe hypersensitivity"
- "Pregnancy"

common_adverse_events:
- "Fatigue"
- "Nausea"
- "Skin reactions (acneiform; less than vemurafenib)"
- "Diarrhea"
- "Arthralgia"
- "Headache"

serious_adverse_events:
- "Cutaneous SCC / new primary melanoma (BRAFi class effect — dermatology q3 mo)"
- "QT prolongation"
- "Hepatic failure (rare)"
- "Uveitis"

sources:
- SRC-NCCN-COLON-2025
- SRC-ESMO-COLON-2024

last_reviewed: "2026-04-26"
notes: >
  BEACON CRC (Kopetz NEJM 2019, Lancet 2022 update): encorafenib +
  cetuximab vs irinotecan/FOLFIRI + cetuximab control — mOS 9.3 vs
  5.9 mo in BRAF V600E mCRC 2L+. Triplet arm (enco + cetux +
  binimetinib) showed numerically higher ORR but no OS benefit vs
  doublet — doublet is the current standard. COLUMBUS (melanoma):
  encorafenib + binimetinib vs vemurafenib mPFS 14.9 vs 7.3 mo. Skin
  surveillance for new cutaneous SCC and primary melanoma mandatory
  throughout treatment (BRAFi class effect — derm exam q3 mo).
  Baseline + serial ECG (QTc), LFTs, derm + ophthalmologic exam.
  UA: registered for melanoma + CRC indications; НСЗУ does not
  reimburse — out-of-pocket. Dabrafenib+trametinib remains the
  reimbursed BRAFi+MEKi combo in UA melanoma practice.

notes_patient: >
  Таблетка-BRAF-інгібітор нового покоління. Комбінують з MEK-інгібітором (binimetinib) при меланомі або з cetuximab при кишечнику з мутацією BRAF V600E.
