id: DRUG-BINIMETINIB
names:
  preferred: "Binimetinib"
  ukrainian: "Бінiметиніб"
  english: "Binimetinib"
  synonyms: ["MEK162", "ARRY-162"]
  brand_names: ["Mektovi"]
atc_code: L01EE03
rxnorm_id: ""
drug_class: "MEK1/2 inhibitor"
mechanism: >
  Selective allosteric (non-ATP-competitive) inhibitor of MEK1/MEK2
  kinases that bind a pocket adjacent to the ATP site, locking MEK in
  an inactive conformation. Blocks downstream phosphorylation of ERK1/2
  in the constitutively activated RAS/RAF/MEK/ERK pathway, suppressing
  proliferation and survival signaling in BRAF V600-mutant tumor cells.
  Combined with a BRAF inhibitor (encorafenib) the doublet mitigates
  paradoxical MAPK reactivation seen with BRAFi monotherapy and
  prolongs response duration. Clinical evidence: COLUMBUS (encorafenib +
  binimetinib vs vemurafenib in BRAF V600 unresectable / metastatic
  melanoma, mPFS 14.9 vs 7.3 mo, mOS 33.6 vs 16.9 mo). Historically
  evaluated as the third agent in BEACON-CRC triplet (no OS gain over
  encorafenib + cetuximab doublet — doublet is the standard for BRAF
  V600E mCRC).

regulatory_status:
  fda:
    approved: true
    year_first_approval: 2018
    indications_brief:
      - "Unresectable/metastatic melanoma BRAF V600E/K (combo encorafenib)"
  ema:
    approved: true
    year_first_approval: 2018
    indications_brief:
      - "Unresectable/metastatic melanoma BRAF V600 (combo encorafenib)"
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: "Не зареєстровано в UA per drlz.com.ua snapshot 2026-04-27. Dabrafenib+trametinib is the dominant BRAFi+MEKi combo in UA НСЗУ; encorafenib+binimetinib not on reimbursement list — out-of-pocket / EAP via Pierre Fabre / cross-border."

typical_dosing: >
  45 mg PO BID continuous (every ~12 hours), with or without food, in
  combination with encorafenib 450 mg PO once daily (COLUMBUS schedule
  for BRAF V600 melanoma). Dose-modify for hepatic impairment (avoid
  in moderate-severe per label) and for adverse events: dose level -1
  is 30 mg BID; -2 is permanent discontinuation if recurrent G3-4
  toxicity. Hold for serous retinopathy / RVO until resolution.

formulations:
  - "Tablets 15 mg"

absolute_contraindications:
  - "Hypersensitivity to binimetinib or any excipient"
  - "Pregnancy (embryo-fetal toxicity per animal data)"
  - "Severe hepatic impairment (Child-Pugh C — no PK data)"
  - "Active uncontrolled retinal vein occlusion or serous retinopathy"

black_box_warnings: []

common_adverse_events:
  - "Fatigue ~43%"
  - "Nausea ~41%"
  - "Diarrhea ~36%"
  - "Vomiting ~30%"
  - "Abdominal pain ~28%"
  - "Arthralgia ~26%"
  - "Increased CK (asymptomatic) ~58%"
  - "Increased AST/ALT ~25-30%"
  - "Anemia ~36%"
  - "Hypertension ~11%"
  - "Acneiform / non-acneiform rash ~22%"
  - "Peripheral edema ~13%"

serious_adverse_events:
  - "Cardiomyopathy / LVEF decline (Grade ≥3 ~3%; baseline + serial echo q1mo x 3 then q3mo)"
  - "Retinal vein occlusion / serous retinopathy (G3 ~3%; mandates ophtho for new visual symptoms)"
  - "Hepatotoxicity — Grade ≥3 ALT/AST elevation ~6%"
  - "Rhabdomyolysis (rare; CK monitoring)"
  - "Interstitial lung disease / pneumonitis (rare)"
  - "Venous thromboembolism (~6%)"
  - "Hemorrhage (G3 ~3%)"
  - "Severe rash / dermatitis (rare SJS-like)"

major_interactions:
  - "Strong UGT1A1 inhibitors (atazanavir, indinavir) — increase exposure; monitor for AE"
  - "Concurrent BRAFi (encorafenib) is the intended combination — pharmacokinetics established"
  - "Other QT-prolonging drugs — caution (modest QTc effect)"
  - "Hepatotoxic agents (acetaminophen high-dose, isoniazid, rifampin) — additive ALT/AST risk"
  - "Live vaccines — avoid during therapy"

pharmacology:
  half_life_hours: 3.5
  clearance: "hepatic (predominantly UGT1A1 glucuronidation)"
  protein_binding_pct: 97
  metabolism: "primarily UGT1A1 glucuronidation; minor CYP1A2/CYP2C19"

sources:
  - SRC-NCCN-MELANOMA-2025
  - SRC-ESMO-MELANOMA-2024

last_reviewed: "2026-04-27"
reviewers: []
notes: >
  Used exclusively in combination with encorafenib for BRAF V600
  melanoma (COLUMBUS) — encorafenib monotherapy is not standard.
  Mandatory baseline workup: LFTs, CK, LVEF echo, ophthalmologic exam,
  ECG (for QTc), pregnancy test. Monitor: LFTs + CK every 2 weeks for
  first 8 weeks then monthly; LVEF echo at 1 month then every 3
  months; ophtho for any new visual symptom. Compared with
  dabrafenib+trametinib the toxicity profile is broadly similar but
  with less pyrexia and somewhat more retinal events. In UA, access
  is via cross-border EU centers, EAP, or self-pay; dabrafenib+trametinib
  remains the НСЗУ-funded BRAFi+MEKi.
