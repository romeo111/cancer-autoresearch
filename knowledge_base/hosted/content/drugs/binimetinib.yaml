id: DRUG-BINIMETINIB
names:
  preferred: "Binimetinib"
  ukrainian: "Бінiметиніб"
  english: "Binimetinib"
  synonyms: ["MEK162", "ARRY-162"]
  brand_names: ["Mektovi"]
atc_code: L01EE03
rxnorm_id: ""
drug_class: "MEK1/2 inhibitor"
mechanism: >
  STUB — needs full curation. Selective allosteric MEK1/MEK2 inhibitor;
  blocks downstream MAPK signaling. Used in combination with BRAFi
  (encorafenib) for BRAF V600 melanoma and historically as the third
  agent in BEACON-CRC triplet (no OS gain over doublet — doublet is the
  standard).

regulatory_status:
  fda:
    approved: true
    year_first_approval: 2018
    indications_brief: ["Melanoma BRAF V600E/K (combo encorafenib)"]
  ema:
    approved: true
    year_first_approval: 2018
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: "STUB — pending CSD-4 verification. Not registered in UA per drlz.com.ua snapshot 2026-04-27."

typical_dosing: >
  STUB. 45 mg PO BID, combined with encorafenib 450 mg PO daily
  (COLUMBUS melanoma) or historically 300 mg encorafenib + cetuximab in
  the BEACON-CRC triplet arm.

formulations:
  - "Tablets 15 mg"

absolute_contraindications: []  # STUB
black_box_warnings: []
common_adverse_events:
  - "Diarrhea"
  - "Nausea"
  - "Fatigue"
  - "Rash / acneiform"
  - "CK elevation"
serious_adverse_events:
  - "Cardiomyopathy / LVEF decline (echo monitoring)"
  - "Retinal vein occlusion / serous retinopathy"
  - "Hepatotoxicity"
  - "Rhabdomyolysis (CK elevation)"
  - "Interstitial lung disease (rare)"
major_interactions: []

pharmacology:
  half_life_hours: 3.5
  clearance: "hepatic"
  protein_binding_pct: 97
  metabolism: "primarily glucuronidation (UGT1A1)"

sources:
  - SRC-NCCN-MELANOMA-2025
  - SRC-ESMO-MELANOMA-2024

last_reviewed: "2026-04-27"
reviewers: []
notes: >
  STUB — Phase CSD-4 promotion. Needs full curation including dose-adj
  for hepatic impairment, full AE profile (notably retinal vein
  occlusion / CSR-like findings), drug interactions, monitoring schedule
  (LFTs, echo, ophtho).
