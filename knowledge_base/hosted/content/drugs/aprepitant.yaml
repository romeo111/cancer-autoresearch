id: DRUG-APREPITANT
names:
  preferred: "Aprepitant"
  ukrainian: "Апрепітант"
  english: "Aprepitant"
  brand_names:
    - "Emend"
atc_code: A04AD12
rxnorm_id: "327361"
drug_class: "Substance P / neurokinin-1 (NK1) receptor antagonist"
mechanism: >
  Selective high-affinity antagonist of the human substance P /
  neurokinin-1 (NK1) receptor in the central nervous system, blocking
  the late vomiting signal mediated by substance P binding in the
  nucleus tractus solitarius and area postrema. This complements
  the early-phase blockade by 5-HT3 antagonists (which control acute
  CINV) by preventing the delayed phase (24-120 h post-chemotherapy).
  Standard component of triple-antiemetic prophylaxis (NK1 + 5-HT3 +
  dexamethasone, ± olanzapine) for highly emetogenic chemotherapy
  (HEC) such as cisplatin ≥50 mg/m², AC (anthracycline +
  cyclophosphamide), and BEACOPP. Approved by FDA March 2003 and EMA
  November 2003.
regulatory_status:
  fda:
    approved: true
    year_first_approval: 2003
    indications_brief: ["Prevention of acute and delayed CINV with HEC and MEC", "Postoperative nausea/vomiting"]
  ema:
    approved: true
    year_first_approval: 2003
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: true
    reimbursement_indications:
      - "Антиеметична профілактика при високоемоегенній хіміотерапії (HEC) — компонент triple-therapy з дексаметазоном + 5-HT3 антагоністом"
      - "Антиеметична профілактика при моделовано емоегенній хіміотерапії (MEC), особливо карбоплатин AUC ≥4"
    last_verified: "2026-04-27"
    notes: "Зареєстровано в Україні (Emend та generics). Покриття НСЗУ для онкопацієнтів. Перевірено drlz.com.ua 2026-04-27."
typical_dosing: >
  Oral 3-day regimen for HEC: 125 mg PO 1 hour before chemotherapy on
  day 1, then 80 mg PO once daily on days 2 and 3. For MEC: same
  schedule. Always combined with 5-HT3 antagonist (ondansetron
  8-16 mg or palonosetron 0.25 mg IV) and dexamethasone (12 mg PO/IV
  day 1, then 8 mg days 2-4 — note dex DOSE REDUCTION when combined with
  aprepitant due to CYP3A4 interaction roughly doubling dex AUC). No
  dose adjustment for renal impairment or mild-moderate hepatic
  impairment; not studied in severe hepatic impairment (Child-Pugh C).
  Single-day 165 mg dose available in some regions for selected
  regimens. Pediatric (≥6 months): weight-based dosing.
formulations:
  - "Capsule 40 mg, 80 mg, 125 mg"
  - "Tri-pack: one 125 mg + two 80 mg capsules (3-day course)"
  - "Oral suspension (pediatric) 25 mg/mL"
absolute_contraindications:
  - "Hypersensitivity to aprepitant, fosaprepitant, or excipients"
  - "Concurrent use with pimozide (CYP3A4 substrate; QT prolongation)"
  - "Concurrent use with cisapride or terfenadine (withdrawn but listed historically)"
black_box_warnings: []
common_adverse_events:
  - "Fatigue — ~15-20%"
  - "Hiccups — ~10% (NK1-class effect)"
  - "Headache — ~10%"
  - "Constipation — ~10%"
  - "Diarrhea — ~10%"
  - "Anorexia — ~10%"
  - "Asthenia — ~5-10%"
  - "Dyspepsia — ~6%"
  - "Increased ALT/AST — ~5-10% (mild, transient)"
  - "Insomnia — ~5%"
  - "Dizziness — ~5%"
  - "Mucositis (when added to HEC regimens)"
serious_adverse_events:
  - "Stevens-Johnson syndrome / toxic epidermal necrolysis (rare)"
  - "Anaphylaxis / angioedema (rare)"
  - "Severe hepatic dysfunction (rare)"
  - "Significant CYP3A4-mediated drug interactions causing toxicity of co-administered substrates"
  - "Reduced efficacy of hormonal contraceptives during and 28 days post"
major_interactions:
  - "Strong CYP3A4 substrates (pimozide CONTRAINDICATED; midazolam, alfentanil — increase exposure 2-3×)"
  - "Dexamethasone (CYP3A4 substrate): aprepitant DOUBLES dex AUC — REDUCE dex by 50% on co-administration days (8 mg instead of 16 mg)"
  - "Methylprednisolone: increase exposure ~2.5× — reduce by ~50%"
  - "Warfarin (CYP2C9 substrate): aprepitant induces CYP2C9, decreasing INR — monitor INR for 2 weeks post each course"
  - "Hormonal contraceptives (CYP3A4 substrates): reduced efficacy — use alternative non-hormonal contraception during and 28 days post"
  - "Strong CYP3A4 inhibitors (ketoconazole, ritonavir): increase aprepitant AUC ~5× — caution"
  - "Strong CYP3A4 inducers (rifampin, phenytoin, carbamazepine): decrease aprepitant AUC ~10× — avoid co-use"
  - "Chemotherapy CYP3A4 substrates (etoposide, vinblastine, vincristine, ifosfamide, irinotecan, paclitaxel, docetaxel): theoretical exposure increase — usually not clinically significant for short 3-day course but monitor for unexpected toxicity"
pharmacology:
  half_life_hours: 12  # 9-13 h
  clearance: "Hepatic; non-renal"
  protein_binding_pct: 95
  metabolism: "CYP3A4 (predominant); minor CYP1A2 and CYP2C19; also moderate CYP3A4 inhibitor + inducer of CYP2C9 — multiple drug interactions"
sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-DLBCL-2024
last_reviewed: "2026-04-27"
reviewer_signoffs: []
notes: >
  Foundation NK1 antagonist for CINV prevention in HEC regimens. Three-
  drug regimen (NK1 + 5-HT3 + dex) shifts complete-response rate from
  ~50% (5-HT3 + dex alone) to ~80% across days 1-5 in cisplatin-based
  HEC trials (Hesketh, Warr). Adding olanzapine 10 mg PO d1-4 to make
  it a four-drug regimen further improves complete response by ~10%
  absolute (Navari, NEJM 2016). Critical interaction: aprepitant
  doubles dexamethasone exposure → must halve dex dose when co-
  prescribed (16 mg → 8 mg on day 1 if using oral dex; IV dex needs
  similar adjustment). Fosaprepitant 150 mg IV is the IV pro-drug
  alternative (single dose). For high-risk DLBCL R-CHOP / BEACOPP /
  ICE / DHAP, aprepitant is standard premed.
