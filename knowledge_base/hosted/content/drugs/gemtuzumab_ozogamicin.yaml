id: DRUG-GEMTUZUMAB-OZOGAMICIN
names:
  preferred: "Gemtuzumab ozogamicin"
  ukrainian: "Гемтузумаб озогаміцин"
  english: "Gemtuzumab ozogamicin"
  brand_names: ["Mylotarg"]
atc_code: L01FX02
rxnorm_id: "1659131"
drug_class: "Anti-CD33 humanized IgG4 monoclonal antibody-drug conjugate (calicheamicin payload)"
mechanism: >
  Humanized anti-CD33 IgG4 monoclonal antibody conjugated to
  N-acetyl-γ-calicheamicin dimethyl hydrazide. Binds CD33 on
  myeloid blasts (>80% AML express CD33; APL especially CD33+),
  internalizes, releases calicheamicin → DNA double-strand breaks
  → apoptosis. Originally withdrawn 2010 over OS concerns; reapproved
  2017 at fractionated lower dose with improved safety profile.
  Used in newly-dx CD33+ AML (ALFA-0701) and salvage CD33+ AML +
  relapsed APL (MyloFrance).

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: false
    reimbursed_nszu: false
    last_verified: "2026-04-25"

typical_dosing: >
  Newly-dx AML (ALFA-0701): 3 mg/m² IV (max 4.5 mg) days 1, 4, 7
  of induction + day 1 of each consolidation. R/R AML / APL
  (MyloFrance): 3 mg/m² IV days 1, 4, 7. Single-agent salvage
  dose: 6 mg/m² IV day 1 + 3 mg/m² IV day 8.

formulations: ["Lyophilized powder for IV infusion 4.5 mg/vial"]

absolute_contraindications:
  - "Hypersensitivity"
  - "Pregnancy"

black_box_warnings:
  - "Hepatotoxicity / VOD/SOS (boxed) — risk increased with subsequent alloHCT"
  - "Severe + prolonged myelosuppression"

major_interactions:
  - "Concurrent hepatotoxic agents: cumulative risk"
  - "Live vaccines: avoid"

common_adverse_events:
  - "Cytopenia (severe + prolonged)"
  - "Febrile neutropenia"
  - "Hepatotoxicity (transaminitis, bilirubin elevation)"
  - "Mucositis"
  - "Nausea"
  - "Infusion reactions"
  - "Tumor lysis syndrome"

serious_adverse_events:
  - "VOD/SOS (boxed warning)"
  - "Severe + prolonged myelosuppression"
  - "Severe infection / sepsis"
  - "Hepatotoxicity Grade ≥3"
  - "Tumor lysis syndrome"
  - "Severe infusion reactions"

pharmacology: {half_life: "~62 hours (humanized antibody)"}

sources: [SRC-NCCN-AML-2025]
last_reviewed: "2026-04-25"
notes: >
  Anti-CD33 ADC. ALFA-0701 (Castaigne et al., Lancet 2012) — newly
  dx AML 50-70 + 7+3 + GO at fractionated dose: improved EFS +
  RFS. MyloFrance-1 (Aribi et al., Cancer 2007) — single-agent
  GO in r/r APL post-ATRA-ATO: CR ~91% (relapsed APL exquisitely
  CD33+; rapid deep MRD-negative responses). VOD risk dominant
  safety concern — dose-fractionation reduced incidence vs original
  9 mg/m² regimen. Ukraine: NOT registered. STUB — pending
  Co-Lead sign-off.
