id: DRUG-LENALIDOMIDE
names:
  preferred: "Lenalidomide"
  ukrainian: "Леналідомід"
  english: "Lenalidomide"
  brand_names:
  - "Revlimid"
atc_code: L04AX04
rxnorm_id: "337535"
drug_class: "immunomodulator — IMiD (cereblon E3 ligase modulator)"
mechanism: >
  Binds cereblon (CRBN) within the CRL4-CRBN E3 ubiquitin ligase complex,
  redirecting it to ubiquitinate IKZF1 and IKZF3 transcription factors.
  Their degradation is selectively cytotoxic to multiple myeloma cells and
  has immunomodulatory effects (NK and T-cell activation).

regulatory_status:
  fda:
    approved: true
    year_first_approval: 2005
    indications_brief: ["Multiple myeloma (1L, R/R, maintenance)", "MDS with del(5q)", "Mantle cell lymphoma (R/R)", "Follicular / marginal zone lymphoma (R²)"]
  ema:
    approved: true
    year_first_approval: 2007
  ukraine_registration:
    registered: true
    registration_number: "[TBD]"
    reimbursed_nszu: true
    reimbursement_indications:
    - 'Програма медичних гарантій 2026: ММ 1L з bortezomib+dexamethasone (VRd) для не-трансплант кандидатів'
    - 'Програма медичних гарантій 2026: ММ підтримуюча терапія після ауто-ТКМ'
    - 'Реімбурсаційний пакет «Онкологія» 2026: ММ R/R з dexamethasone (Rd) або з daratumumab'
    - 'Реімбурсаційний пакет «Онкологія» 2026: МДС низького ризику del(5q) трансфузіє-залежний'
    last_verified: "2026-04-27"

    notes: 'Зареєстрований; НСЗУ покриває ММ 1L (VRd), maintenance, 2L+ (Rd, DRd) та МДС-LR del(5q). Джерело: nszu.gov.ua (2026-04).'
typical_dosing: "25 mg PO days 1-21 of 28-day cycle (induction); reduced for renal impairment"
formulations:
- "Capsules 2.5 / 5 / 10 / 15 / 20 / 25 mg"

absolute_contraindications:
- "Pregnancy (teratogen — REMS / Revlimid Risk Management Programme mandatory)"
- "Hypersensitivity"
black_box_warnings:
- "Embryo-fetal toxicity (teratogen)"
- "Hematologic toxicity (neutropenia, thrombocytopenia)"
- "Venous and arterial thromboembolism (mandatory prophylaxis)"
major_interactions:
- "Digoxin — lenalidomide may increase digoxin levels (P-gp competition); monitor"
- "Erythropoiesis-stimulating agents (epoetin, darbepoetin) — increase thrombosis risk"
- "Concurrent dexamethasone (intentional in Rd, VRd, KRd) — synergistic but additive infection / thromboembolism risk"
- "Estrogen-containing contraceptives — additive thrombosis risk; non-hormonal contraception preferred"
- "Strong CYP3A4 modulators — minimal interaction (lenalidomide is renally cleared)"
- "Live vaccines — contraindicated"
common_adverse_events:
- "Neutropenia — ~40% grade ≥3"
- "Thrombocytopenia — ~20% grade ≥3"
- "Anemia — ~30%"
- "Diarrhea — ~40% (chronic; can be bile-acid mediated, responds to cholestyramine)"
- "Fatigue — ~40%"
- "Skin rash — ~30%, usually self-limited"
- "Muscle cramps — ~25%"
- "Constipation — ~25%"
- "Cough, dyspnea — ~20%"
- "Pyrexia — ~20%"
- "Insomnia — ~15%"
serious_adverse_events:
- "Venous thromboembolism (DVT, PE) — ~5-10% with high-dose dex; <3% with aspirin prophylaxis"
- "Arterial thromboembolism (MI, stroke) — ~2-3%"
- "Second primary malignancies (AML, MDS, solid tumors) — ~3-7% over 5 years of maintenance"
- "Hepatotoxicity (severe) — rare"
- "Severe skin reactions (Stevens-Johnson, TEN, DRESS) — rare"
- "Tumor lysis syndrome (high-burden MCL / MM)"
- "Tumor flare reaction (CLL, MCL — pain, lymphadenopathy enlargement; differentiate from progression)"

pharmacology:
  half_life_hours: 3  # ~3-5 h normal renal; up to 9 h CrCl <30
  clearance: "renal"
  protein_binding_pct: 30
  metabolism: "minimal hepatic; ~80% renally excreted unchanged"

sources:
- SRC-NCCN-MM-2025

last_reviewed: "2026-04-26"
reviewers: []
notes: >
  Renal dose adjustment is critical: CrCl 30-60 mL/min → 10 mg daily;
  CrCl <30 (no dialysis) → 15 mg every other day; dialysis → 5 mg post-
  dialysis on dialysis days. VTE prophylaxis (aspirin 81-325 mg or LMWH
  in higher-risk patients) is mandatory throughout therapy.

notes_patient: >
  Таблетка-immunomodulator (IMiD): підсилює імунну відповідь проти пухлини й одночасно прямо впливає на пухлинні клітини. Стандарт для множинної мієломи та MDS-low risk. Підвищує ризик тромбозів — зазвичай призначають аспірин або антикоагулянт.
