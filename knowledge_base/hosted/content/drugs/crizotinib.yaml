id: DRUG-CRIZOTINIB
names:
  preferred: "Crizotinib"
  ukrainian: "Кризотиніб"
  english: "Crizotinib"
  brand_names: ["Xalkori"]
atc_code: L01ED01
rxnorm_id: null
drug_class: "1st-generation ALK / ROS1 / MET inhibitor"
mechanism: >
  Multi-target TKI active in ALK, ROS1, and MET-driven NSCLC. Largely supplanted by alectinib/lorlatinib for ALK and entrectinib for ROS1, but retains role in ROS1+ NSCLC where access to newer agents limited.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: true
    last_verified: null
    notes: "Registered; reimbursed for ALK-rearranged metastatic NSCLC."

typical_dosing: >
  250 mg PO BID.

key_toxicities:
  - Visual disturbances (~60%)
  - Edema
  - Diarrhea
  - Nausea
  - Hepatotoxicity
  - QT prolongation
  - Pneumonitis (rare)

sources: [SRC-NCCN-NSCLC-2025, SRC-ESMO-NSCLC-METASTATIC-2024]
last_reviewed: null
notes: >
  ROS1-positive NSCLC standard 1L when entrectinib unavailable. Largely 2L+ for ALK now.
