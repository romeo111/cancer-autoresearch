id: DRUG-ROLAPITANT
names:
  preferred: "Rolapitant"
  ukrainian: "Ролапітант"
  english: "Rolapitant"
  brand_names:
    - "Varubi"
    - "Varuby"
atc_code: A04AD14
rxnorm_id: "1738521"
drug_class: "Long-acting substance P / neurokinin-1 (NK1) receptor antagonist"
mechanism: >
  Selective competitive antagonist of the substance P / NK1 receptor
  in CNS emetic centers (nucleus tractus solitarius, area postrema),
  blocking the late phase of chemotherapy-induced nausea and vomiting
  (CINV) mediated by substance P. Distinguishing pharmacokinetic
  feature is an exceptionally long terminal half-life of ~7 days
  (~169 hours), which provides receptor coverage across the full 5-day
  delayed phase from a single oral dose without need for follow-up
  doses on days 2-3. Approved by FDA September 2015 and EMA April
  2017 for prevention of delayed CINV in adults receiving HEC or MEC.
regulatory_status:
  fda:
    approved: true
    year_first_approval: 2015
    indications_brief: ["Prevention of delayed CINV with HEC and MEC (single oral dose, no day 2-3 continuation)"]
  ema:
    approved: true
    year_first_approval: 2017
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: |
      Не зареєстровано в Україні (Держреєстр ЛЗ — РП відсутнє станом на
      2026-04-27); не реімбурсується НСЗУ. Альтернативи: aprepitant
      (3-day oral) або fosaprepitant (single IV) — обидва зареєстровані
      в Україні з покриттям НСЗУ. Шляхи доступу: self-pay через
      закордонну поставку (EU/Туреччина), вартість ~USD 100-150 за
      разову дозу. Source: drlz.com.ua пошук «rolapitant»/«varubi»
      2026-04-27.
typical_dosing: >
  180 mg PO single dose 1-2 hours before chemotherapy on day 1 only;
  no dose on days 2-3 (the long half-life provides 5-day coverage).
  Always combined with 5-HT3 antagonist (ondansetron 8-16 mg or
  palonosetron 0.25 mg IV) and dexamethasone (12 mg PO/IV day 1,
  then 8 mg days 2-4). Notable difference from aprepitant: rolapitant
  does NOT inhibit CYP3A4, so dexamethasone dose adjustment is NOT
  required. No dose adjustment for renal impairment. No adjustment
  for mild-moderate hepatic impairment; not studied in severe hepatic
  impairment (avoid). Not approved in pediatrics.
formulations:
  - "Tablet 90 mg (administered as 2 tablets = 180 mg)"
  - "IV emulsion (some markets) — withdrawn in US 2018 due to anaphylaxis signal; oral retained"
absolute_contraindications:
  - "Hypersensitivity to rolapitant or excipients"
  - "Concurrent use with thioridazine (CYP2D6 substrate; QT prolongation, fatal arrhythmia risk)"
  - "Severe hepatic impairment (Child-Pugh C; not studied)"
black_box_warnings: []
common_adverse_events:
  - "Neutropenia — ~9% (G3-4 ~7%)"
  - "Hiccups — ~5% (NK1-class effect)"
  - "Decreased appetite — ~9%"
  - "Dizziness — ~6%"
  - "Headache — ~5%"
  - "Constipation — ~3-5%"
  - "Anemia — ~3%"
  - "Asthenia — ~3%"
  - "Stomatitis — ~3%"
  - "Abdominal pain — ~3%"
  - "Dyspepsia — ~3%"
  - "Fatigue — ~5-10%"
serious_adverse_events:
  - "Anaphylaxis / anaphylactoid reaction (notably with the now-withdrawn IV formulation)"
  - "Severe hypersensitivity"
  - "Significant CYP2D6-mediated drug interactions (substrate accumulation)"
  - "Severe hepatic toxicity (rare)"
  - "Stevens-Johnson syndrome (rare)"
major_interactions:
  - "CYP2D6 substrates with narrow therapeutic index (thioridazine CONTRAINDICATED; pimozide caution): rolapitant is a moderate CYP2D6 inhibitor — increased substrate exposure for up to 28 days after dose"
  - "Dextromethorphan, tamoxifen, codeine, metoprolol: CYP2D6 substrates — monitor for toxicity / efficacy changes"
  - "Strong CYP3A4 inducers (rifampin, phenytoin, carbamazepine, St John's wort): decrease rolapitant exposure ~80% — AVOID concomitantly and within 28 days post-rolapitant dose"
  - "BCRP and P-gp substrates (sulfasalazine, methotrexate, irinotecan, topotecan, rosuvastatin, digoxin): rolapitant is a moderate BCRP/P-gp inhibitor — monitor for substrate toxicity"
  - "Dexamethasone: NO interaction (unlike aprepitant) — dex dose unchanged"
  - "Hormonal contraceptives: NO clinically significant interaction (contrast with aprepitant)"
pharmacology:
  half_life_hours: 169  # ~7 days — longest of the NK1 class
  clearance: "Hepatic"
  protein_binding_pct: 99
  metabolism: "CYP3A4 (predominant) → active metabolite M19 with similar half-life; rolapitant is a moderate CYP2D6 inhibitor; minimal CYP3A4 inhibition (key differentiator from aprepitant)"
sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-DLBCL-2024
last_reviewed: "2026-04-27"
reviewer_signoffs: []
notes: >
  Long-acting NK1 antagonist with single-dose convenience and absent
  CYP3A4 interaction (no need for dexamethasone dose halving — a
  practical advantage when patients already take other CYP3A4
  substrates). Pivotal trials: HEC1, HEC2, MEC (Rapoport, Lancet
  Oncol 2015) — rolapitant + ondansetron + dex superior to placebo
  + ondansetron + dex for delayed-phase CR (~70% vs ~57%). IV
  formulation withdrawn US in 2018 due to anaphylaxis signal; oral
  remains available. Key DDI hazard is CYP2D6 inhibition lasting up
  to 28 days post-dose — review concomitant medications carefully
  (especially tamoxifen patients, where reduced endoxifen formation
  is a theoretical efficacy concern). Ukraine: NOT registered;
  alternatives (aprepitant, fosaprepitant) widely available.
