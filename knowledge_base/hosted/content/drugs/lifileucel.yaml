id: DRUG-LIFILEUCEL
names:
  preferred: "Lifileucel"
  ukrainian: "Ліфілейцел"
  english: "Lifileucel"
  synonyms: ["LN-144"]
  brand_names: ["Amtagvi"]
atc_code: ""
rxnorm_id: ""
drug_class: "Autologous tumor-infiltrating lymphocyte (TIL) cell therapy"
mechanism: >
  STUB — needs full curation. Patient-specific autologous TIL product
  manufactured ex vivo from a resected tumor specimen, expanded with
  IL-2, then infused after lymphodepleting chemo (cyclophosphamide +
  fludarabine) and followed by short-course high-dose IL-2. First TIL
  therapy approved for a solid tumor (advanced melanoma post anti-PD-1
  ± BRAFi+MEKi).

regulatory_status:
  fda:
    approved: true
    year_first_approval: 2024
    indications_brief: ["Unresectable/metastatic melanoma post anti-PD-1 (and BRAFi+MEKi if BRAF V600+)"]
  ema:
    approved: false
    year_first_approval: null
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: "STUB — pending CSD-4 verification. Not registered in UA. EU access nascent; cell-therapy logistics + manufacturing capacity gating."

typical_dosing: >
  STUB. Single intravenous infusion of 7.5x10⁹ to 72x10⁹ viable TIL
  cells after non-myeloablative lymphodepletion (cyclophosphamide
  60 mg/kg/day x 2 + fludarabine 25 mg/m²/day x 5), followed by up to
  6 doses high-dose IL-2 (aldesleukin 600,000 IU/kg q8-12h).

formulations:
  - "IV cell suspension (patient-specific)"

absolute_contraindications: []
black_box_warnings:
  - "Treatment-related mortality, prolonged severe cytopenia, severe infection, cardiopulmonary disorders, renal failure (boxed warning per US PI)"
common_adverse_events:
  - "Cytopenias (lymphodepletion + cell-therapy effect)"
  - "Pyrexia / chills (IL-2 effect)"
  - "Hypotension"
  - "Capillary leak / fluid retention"
  - "Diarrhea"
serious_adverse_events:
  - "Treatment-related death (~7-8% in trial cohorts)"
  - "Severe cytopenia / prolonged neutropenia"
  - "Severe infection / sepsis"
  - "Cardiopulmonary toxicity from IL-2"
  - "Renal failure"
  - "Capillary leak syndrome"
major_interactions: []

pharmacology:
  half_life_hours: null
  clearance: null
  protein_binding_pct: null
  metabolism: "n/a (cellular product)"

sources:
  - SRC-NCCN-MELANOMA-2025
  - SRC-ESMO-MELANOMA-2024

last_reviewed: "2026-04-27"
reviewers: []
notes: >
  STUB — Phase CSD-4 promotion. UA access ≈ zero in MVP — referenced
  for completeness; trial-only / cross-border. Requires accredited
  cell-therapy center (similar logistics to CAR-T). Needs full curation
  of eligibility (LDH, lesion accessibility for harvest, prior-PD-1
  refractoriness), monitoring schedule, and IL-2 toxicity management.
