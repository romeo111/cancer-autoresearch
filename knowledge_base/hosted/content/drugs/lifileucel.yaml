notes: >
  First cell-therapy approved for any solid tumor. Logistics
  resemble CAR-T but more demanding: requires fresh tumor harvest
  (single accessible ≥1.5 cm lesion; surgical or interventional-
  radiology biopsy not adequate — needs gross tissue), centralized
  manufacturing (~22 days), bridging therapy during manufacturing,
  in-patient lymphodepletion + TIL infusion + IL-2 administration in
  ICU-capable cell-therapy center, prolonged cytopenia recovery,
  and ~7-8% treatment-related mortality. Eligibility per FDA label:
  ECOG 0-1, adequate organ function, anti-PD-1 ± BRAFi+MEKi
  failure, accessible lesion for harvest, anticipated tolerance of
  IL-2. Patient selection is critical — frail patients have
  prohibitive mortality risk. UA access in MVP effectively zero;
  the only realistic pathway is cross-border referral to a US (or
  eventually EU) Iovance-accredited center via 'Лікування за
  кордоном' (наказ МОЗ 988) with private / charitable funding —
  total cost USD 500K-1M. Listed for completeness; rule-engine
  inclusion as a referral-only option in melanoma post-anti-PD-1.
