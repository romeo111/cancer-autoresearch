id: DRUG-FLUDARABINE
names:
  preferred: "Fludarabine"
  ukrainian: "Флударабін"
  english: "Fludarabine"
  brand_names: ["Fludara"]
atc_code: L01BB05
rxnorm_id: "4490"
drug_class: "Purine analog antimetabolite (adenosine analog)"
mechanism: >
  Fluorinated purine nucleoside analog of adenosine. Phosphorylated
  intracellularly to active triphosphate (F-ara-ATP); incorporated
  into DNA + RNA, inhibits ribonucleotide reductase + DNA primase
  + DNA polymerase α → S-phase arrest + apoptosis. Profoundly
  immunosuppressive (T-cell depletion → ideal for CAR-T
  lymphodepletion). Historically used in CLL (FCR), salvage
  lymphoma regimens, alloHCT conditioning.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    registration_number: "[TBD]"
    reimbursed_nszu: true
    last_verified: "2026-04-25"

typical_dosing: >
  CAR-T lymphodepletion: 30 mg/m² IV daily × 3-4 days. CLL FCR:
  25 mg/m² IV days 1-3 every 28 days × 6 cycles. Salvage lymphoma
  (FluMel conditioning): 30 mg/m² IV days 1-5. Renal dose adjust:
  CrCl 30-70 mL/min reduce 25%; CrCl <30 mL/min consider avoiding
  or reduce 50%.

formulations: ["Powder for IV infusion 50 mg/vial; oral tablets 10 mg in some markets"]

absolute_contraindications:
  - "Severe renal impairment CrCl <30 (relative — dose-reduce)"
  - "Hemolytic anemia (autoimmune; flagged in CLL)"
  - "Pregnancy"
  - "Hypersensitivity"

black_box_warnings:
  - "Severe + prolonged myelosuppression"
  - "Severe immunosuppression (CD4 lymphopenia + opportunistic infection — PJP, CMV, HSV reactivation)"
  - "Transfusion-associated GVHD — irradiate ALL blood products lifelong post-fludarabine"
  - "Autoimmune hemolytic anemia (in CLL particularly)"
  - "Neurotoxicity at high doses (encephalopathy, cortical blindness)"

major_interactions:
  - "Pentostatin: avoid (severe pulmonary toxicity)"
  - "Live vaccines: avoid for ≥6 months post-fludarabine"
  - "Other myelosuppressive agents: additive cytopenia"

common_adverse_events:
  - "Cytopenia (myelo + lymphosuppression)"
  - "Fever / infection"
  - "Nausea / diarrhea"
  - "Fatigue"
  - "Cough"
  - "Mucositis"

serious_adverse_events:
  - "Severe + prolonged cytopenia"
  - "Opportunistic infection (PJP, CMV, listeriosis, fungal)"
  - "Transfusion-associated GVHD (lifelong blood product irradiation required)"
  - "Autoimmune hemolytic anemia (CLL)"
  - "Neurotoxicity (high-dose, rare)"
  - "Tumor lysis syndrome"

pharmacology: {half_life: "~10 hours; renal excretion"}

sources: [SRC-NCCN-BCELL-2025, SRC-NCCN-AML-2025]
last_reviewed: "2026-04-25"
notes: >
  Backbone of CAR-T lymphodepleting conditioning (Flu/Cy). Also
  historic CLL backbone (FCR), now largely supplanted by BTKi /
  BCL2i. CRITICAL: irradiate ALL blood products LIFELONG after
  fludarabine exposure to prevent transfusion-associated GVHD.
  PJP + viral prophylaxis mandatory during + ≥6 months after
  treatment. Renal dose adjustment essential. Ukraine: registered
  + НСЗУ-reimbursed.
