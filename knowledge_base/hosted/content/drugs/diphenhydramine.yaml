id: DRUG-DIPHENHYDRAMINE
names:
  preferred: "Diphenhydramine"
  ukrainian: "Дифенгідрамін"
  english: "Diphenhydramine"
  brand_names:
    - "Benadryl"
    - "Dimedrol"
atc_code: R06AA02
rxnorm_id: "3498"
drug_class: "First-generation H1 antihistamine (ethanolamine class); also moderate anticholinergic, sedative-hypnotic, antiemetic, mild α1-blocker"
mechanism: >
  Competitive reversible H1 receptor antagonist that blocks histamine-
  mediated vasodilation, increased capillary permeability, smooth-
  muscle contraction, sensory nerve stimulation, and pruritus.
  Lipophilic — readily crosses the blood-brain barrier producing
  significant sedation. Additional actions: muscarinic antagonism
  (anticholinergic — dry mouth, urinary retention, mydriasis,
  constipation, confusion in elderly), modest α1-adrenergic
  antagonism (mild orthostatic hypotension), and 5-HT-antagonist /
  D2-antagonist effects contributing to antiemetic and antimotion-
  sickness activity. In oncology supportive care, used as: (1)
  premedication for chemotherapy infusion reactions (paclitaxel,
  carboplatin retreatment, rituximab, monoclonal antibodies);
  (2) adjunct treatment of mild-to-moderate hypersensitivity /
  infusion reactions (mainstay of pruritus, urticaria, mild bronchospasm
  — but NOT a substitute for epinephrine in true anaphylaxis); and
  (3) management of acute extrapyramidal symptoms from metoclopramide,
  prochlorperazine. FDA-approved 1946 (the original prescription
  antihistamine).
regulatory_status:
  fda:
    approved: true
    year_first_approval: 1946
    indications_brief:
      - "Allergic rhinitis, allergic conjunctivitis, urticaria, pruritus"
      - "Premedication and adjunct for chemotherapy infusion reactions"
      - "Adjunct (NOT first-line) for anaphylaxis — pruritus / urticaria component only"
      - "Motion sickness, postoperative nausea/vomiting"
      - "Acute extrapyramidal reactions (dystonia from metoclopramide, prochlorperazine)"
      - "Insomnia (short-term)"
  ema:
    approved: true
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: true
    reimbursement_indications:
      - "Премедикація перед інфузіями паклітаксел, ритуксимаб, моноклональні антитіла"
      - "Лікування алергічних реакцій / кропив'янки / свербежу, у т.ч. при інфузійних реакціях"
      - "Гостра дистонія від метоклопраміду / прохлорперазину"
    last_verified: "2026-04-27"
    notes: "Зареєстровано в Україні (Dimedrol generics). Дешевий, ubiquitous. NSZU-covered. Перевірено drlz.com.ua 2026-04-27."
typical_dosing: >
  PREMEDICATION (paclitaxel, rituximab, etc.): 25-50 mg IV 30 min
  before infusion (paired with H2 antagonist + dexamethasone).
  ACUTE INFUSION REACTION / mild anaphylaxis adjunct: 25-50 mg IV
  push, may repeat every 4-6 h (max 400 mg/day adult). Acute
  extrapyramidal reaction: 25-50 mg IV/IM push, repeat in 15-30 min
  if no response. Allergic urticaria / pruritus: 25-50 mg PO every
  4-6 h, max 300 mg/day. Pediatric: 1 mg/kg IV/PO q6h (max 50 mg
  per dose, 300 mg/day). Geriatric (≥65 yrs): use cautiously —
  start 25 mg, increased fall and confusion risk; consider non-
  sedating second-generation H1 (cetirizine, loratadine) for
  non-emergency indications. Renal impairment: extended dosing
  interval (q9h moderate, q12h severe). Hepatic: caution; reduce
  dose in severe.
formulations:
  - "Tablet 25 mg, 50 mg"
  - "Capsule 25 mg, 50 mg"
  - "Oral solution / elixir 12.5 mg / 5 mL"
  - "IV/IM solution 50 mg/mL"
  - "Topical cream / gel (allergy itch — minimal use in oncology)"
absolute_contraindications:
  - "Hypersensitivity to diphenhydramine or other ethanolamine antihistamines"
  - "Acute narrow-angle glaucoma"
  - "Stenosing peptic ulcer (anticholinergic worsens)"
  - "Pyloroduodenal obstruction"
  - "Bladder neck obstruction / severe BPH with urinary retention"
  - "Concurrent MAO inhibitor"
  - "Neonates and premature infants (paradoxical excitation, severe sedation)"
  - "Breastfeeding (passes into milk; sedation in infant)"
black_box_warnings: []
common_adverse_events:
  - "Sedation / drowsiness — ~30-50%"
  - "Dry mouth (anticholinergic) — ~20-30%"
  - "Dizziness — ~10-15%"
  - "Headache — ~5-10%"
  - "Constipation — ~5-10%"
  - "Urinary retention — ~5-10% (more in elderly, BPH)"
  - "Blurred vision — ~5-10%"
  - "Nausea — ~5%"
  - "Asthenia / fatigue — ~10%"
  - "Confusion — ~5-10% (substantially higher in elderly; on Beers list as inappropriate in elderly)"
  - "Tachycardia — ~3-5%"
  - "Mild hypotension (with rapid IV) — ~3-5%"
  - "Paradoxical excitation (especially pediatric, elderly, ICU patients) — ~3-5%"
serious_adverse_events:
  - "Severe sedation / respiratory depression (especially with concurrent CNS depressants)"
  - "Anticholinergic delirium (elderly, on Beers list)"
  - "Severe paradoxical agitation / hallucinations"
  - "QT prolongation (modest; significant with massive overdose)"
  - "Severe hypotension with rapid IV push"
  - "Photosensitivity (rare)"
  - "Stevens-Johnson syndrome (rare)"
  - "Severe anticholinergic syndrome with overdose: hyperthermia, mydriasis, urinary retention, seizures, coma"
  - "Acute narrow-angle glaucoma precipitation"
major_interactions:
  - "MAO inhibitors: prolonged and intensified anticholinergic effects — AVOID combination, separate by ≥14 days"
  - "Other CNS depressants (alcohol, opioids, benzodiazepines, sedating antidepressants, antipsychotics): additive sedation — caution especially in elderly"
  - "Other anticholinergic agents (oxybutynin, scopolamine, tricyclic antidepressants): additive anticholinergic burden"
  - "Acetylcholinesterase inhibitors (donepezil): mutual antagonism"
  - "QT-prolonging drugs (high-dose IV ondansetron, methadone, antipsychotics): additive QT effect (modest)"
  - "Metoprolol, propranolol: minimal interaction"
  - "CYP2D6 inhibitors (paroxetine, fluoxetine, bupropion): may increase diphenhydramine exposure"
pharmacology:
  half_life_hours: 9  # 8-10 h adult; longer in elderly (~14 h)
  clearance: "Hepatic"
  protein_binding_pct: 80
  metabolism: "CYP2D6 (predominant) and CYP3A4 — also a moderate CYP2D6 inhibitor (modestly increases substrate exposure for tamoxifen, codeine, metoprolol — usually not clinically significant for premedication doses)"
sources:
  - SRC-NCCN-BCELL-2025
  - SRC-NCCN-MM-2025
last_reviewed: "2026-04-27"
reviewer_signoffs: []
notes: >
  Foundation H1 antihistamine for chemotherapy infusion-reaction
  premedication (especially paclitaxel — Cremophor vehicle reactions —
  and rituximab / other monoclonal antibodies). Standard premedication
  package: dexamethasone 20 mg IV + diphenhydramine 25-50 mg IV +
  H2 antagonist (famotidine 20 mg IV) given 30 min before chemo.
  Also first adjunct for ACTIVE infusion reactions (urticaria,
  pruritus, mild bronchospasm, mild flushing) — but ESCALATE TO
  EPINEPHRINE if hypotension, severe bronchospasm, upper airway
  edema, or no response to antihistamine + steroid + fluids within
  10-15 min. CRITICAL: diphenhydramine is NEVER a substitute for
  epinephrine in anaphylaxis — the leading cause of preventable
  fatal anaphylaxis is using antihistamine alone. Beers-list
  inappropriate in elderly (≥65 yrs) for routine use due to
  anticholinergic delirium and fall risk — substitute non-sedating
  second-generation H1 for chronic indications. Extrapyramidal
  reaction rescue: 25-50 mg IV reverses metoclopramide / promethazine
  acute dystonia within 5-10 min. Ukraine: cheap, ubiquitous.
