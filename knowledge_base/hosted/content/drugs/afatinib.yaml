id: DRUG-AFATINIB
names:
  preferred: "Afatinib"
  ukrainian: "Афатиніб"
  english: "Afatinib"
  brand_names: ["Gilotrif", "Giotrif"]
atc_code: L01EB03
rxnorm_id:
drug_class: "2nd-generation EGFR/HER2 TKI (irreversible)"
mechanism: >
  Irreversible pan-HER (EGFR / HER2 / HER4) TKI. More toxic than 1G TKIs but covers some uncommon EGFR mutations (G719X, L861Q, S768I). LUX-Lung 7 / 8: superior PFS vs gefitinib / erlotinib in selected populations.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: true
    last_verified: "2026-04-27"
    notes: "Зареєстрований; НСЗУ покриває 1L EGFR-mut НДРЛ. Поступається osimertinib, але ефективний при uncommon EGFR mutations (G719X, L861Q). Джерело: nszu.gov.ua (2026-04)."

    reimbursement_indications:
    - 'Програма медичних гарантій 2026: НДРЛ EGFR-mut (ex19del/L858R та uncommon mutations) 1L'
typical_dosing: >
  40 mg PO once daily on empty stomach. Reduce to 30 mg if intolerable diarrhea.

key_toxicities:
- Diarrhea (~95%)
- Rash
- Stomatitis
- Paronychia

sources: [SRC-NCCN-NSCLC-2025, SRC-ESMO-NSCLC-METASTATIC-2024]
last_reviewed:
notes: >
  Niche use for uncommon EGFR mutations not covered by osimertinib. Rarely first-line in modern era.
