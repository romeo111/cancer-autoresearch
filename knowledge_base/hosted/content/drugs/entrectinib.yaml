typical_dosing: >
  600 mg PO once daily.

key_toxicities:
  - Dysgeusia
  - Constipation
  - Fatigue
  - Cognitive / mood (TRK class)
  - Weight gain
  - Hepatic

sources: [SRC-NCCN-NSCLC-2025, SRC-ESMO-NSCLC-METASTATIC-2024]
last_reviewed: null
notes: >
  STARTRK-2: tumor-agnostic NTRK + ROS1 efficacy. Larotrectinib alternative for NTRK-only.
