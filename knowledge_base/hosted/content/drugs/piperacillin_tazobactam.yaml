id: DRUG-PIPERACILLIN-TAZOBACTAM
names:
  preferred: "Piperacillin/Tazobactam"
  ukrainian: "Піперацилін/Тазобактам"
  english: "Piperacillin/Tazobactam"
  brand_names:
    - "Zosyn"
    - "Tazocin"
    - "Tazobac"
  synonyms:
    - "pip-tazo"
    - "Pip/Tazo"
    - "PTZ"
atc_code: J01CR05
rxnorm_id: "203134"
drug_class: "Extended-spectrum penicillin + β-lactamase inhibitor combination"
mechanism: >
  Piperacillin is a ureidopenicillin that binds penicillin-binding
  proteins (PBPs) and inhibits bacterial cell-wall synthesis,
  producing rapid bactericidal activity against most Gram-negative
  bacilli including Pseudomonas aeruginosa, most Enterobacterales,
  many anaerobes, and selected Gram-positive cocci. Tazobactam is an
  irreversible β-lactamase inhibitor (penicillanic acid sulfone) that
  binds and inactivates plasmid-mediated and chromosomal class A
  β-lactamases (TEM, SHV, CTX-M ESBLs partially), restoring
  piperacillin activity against many β-lactamase-producing organisms.
  First-line empiric monotherapy for febrile neutropenia (FN) at
  most centers per IDSA, ECIL-4, and NCCN guidelines because of
  pseudomonal coverage, anaerobic activity, and good safety profile.
regulatory_status:
  fda:
    approved: true
    year_first_approval: 1993
    indications_brief:
      - "Febrile neutropenia (empirical monotherapy)"
      - "Nosocomial pneumonia (Pseudomonas coverage)"
      - "Intra-abdominal infections, complicated UTI, skin/soft tissue, pelvic infections"
  ema:
    approved: true
    year_first_approval: 1995
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: true
    reimbursement_indications:
      - "Емпірична терапія фебрильної нейтропенії в онкогематологічних пацієнтів"
      - "Внутрішньолікарняна пневмонія, інтраабдомінальна інфекція, ускладнені інфекції сечових шляхів"
    last_verified: "2026-04-27"
    notes: "Зареєстровано в Україні (Tazocin, generics). Покриття НСЗУ для стаціонарних онкологічних пацієнтів — стандарт першої лінії FN-емпірики. Перевірено drlz.com.ua 2026-04-27."
typical_dosing: >
  Febrile neutropenia (adult): 4.5 g IV every 6-8 hours via 30-min
  bolus OR (preferred for severe sepsis / pseudomonal infection)
  prolonged 4-hour infusion to optimize time-above-MIC. Standard
  empiric: 4.5 g IV q8h. Pediatric (≥9 months): 100 mg piperacillin/
  kg IV q8h, max 4 g per dose. Renal adjustment required: CrCl 20-40
  → 3.375 g q6h or 4.5 g q8h; CrCl <20 → 2.25 g q6h or 4.5 g q12h;
  hemodialysis → 2.25 g q8h with extra 0.75 g after each session;
  CRRT → 3.375 g q6h. Hepatic: no adjustment. Duration in FN: until
  ANC recovery (>500/µL) and afebrile ≥48 h, typically 5-14 days;
  de-escalate based on cultures + clinical course. CAUTION:
  prolonged-infusion administration improves PK/PD but requires
  separate IV line because piperacillin is incompatible with
  aminoglycosides, vancomycin (precipitate), and many vesicants.
formulations:
  - "IV powder for reconstitution: 2.25 g (2 g pip / 0.25 g tazo), 3.375 g (3/0.375), 4.5 g (4/0.5), 13.5 g (12/1.5 bulk pharmacy)"
absolute_contraindications:
  - "Hypersensitivity to penicillins, cephalosporins (cross-reactivity ~1-3%), carbapenems, or β-lactamase inhibitors"
  - "History of severe immediate hypersensitivity (anaphylaxis, SJS, TEN) to any β-lactam"
black_box_warnings: []
common_adverse_events:
  - "Diarrhea — ~10-15%"
  - "Nausea — ~5-10%"
  - "Headache — ~5-10%"
  - "Rash (maculopapular, often 5-10 days into therapy) — ~5-10%"
  - "Insomnia — ~5%"
  - "Constipation — ~5%"
  - "Vomiting — ~3-5%"
  - "Fever (drug fever) — ~3-5%"
  - "Pruritus — ~3%"
  - "Local infusion-site reaction / phlebitis — ~5%"
  - "Hypokalemia — ~3-5% (sodium-rich formulation effect)"
  - "Eosinophilia — ~3%"
  - "Mild transaminitis — ~3-5%"
  - "Thrombocytopenia (mild) — ~1-3%"
serious_adverse_events:
  - "Severe / immediate hypersensitivity (anaphylaxis, angioedema, bronchospasm) — rare but life-threatening"
  - "Stevens-Johnson syndrome / toxic epidermal necrolysis (rare)"
  - "DRESS syndrome (rare)"
  - "Acute interstitial nephritis (~1-3%; presents as rising creatinine + eosinophilia ± rash 5-15 days into therapy)"
  - "Acute kidney injury, particularly when combined with vancomycin (debated nephrotoxicity signal in adults)"
  - "Clostridioides difficile colitis"
  - "Severe / prolonged neutropenia (rare; usually after >14 days therapy)"
  - "Hemolytic anemia (rare; immune-mediated)"
  - "Seizures with massive over-dosing or severe renal failure (β-lactam neurotoxicity)"
  - "Sodium overload / volume expansion in heart failure (~64 mg Na per gram of piperacillin)"
major_interactions:
  - "Aminoglycosides (gentamicin, tobramycin, amikacin): CHEMICAL INACTIVATION when mixed in same line — administer separately; in renal failure piperacillin can also reduce serum aminoglycoside levels"
  - "Vancomycin: incompatible in same line; controversial AKI signal when co-administered (VPT-AKI), monitor renal function closely"
  - "Methotrexate: piperacillin reduces MTX renal clearance — monitor for MTX toxicity, adjust leucovorin"
  - "Probenecid: reduces piperacillin renal clearance — increased serum levels"
  - "Warfarin: variable INR effect (gut flora alteration) — monitor INR"
  - "Oral contraceptives: theoretical reduced efficacy via gut flora — additional contraception advised"
  - "Cyclosporine: variable; monitor cyclosporine levels"
  - "Live vaccines (oral typhoid, BCG): antibacterial activity may inactivate vaccine"
pharmacology:
  half_life_hours: 1  # ~1 hour for both components in normal renal function; 4-7 h in severe renal failure
  clearance: "Renal (~70-80% excreted unchanged in urine)"
  protein_binding_pct: 30
  metabolism: "Minimal hepatic metabolism; predominantly renal excretion of unchanged drug — adjust for renal dysfunction"
sources:
  - SRC-NCCN-BCELL-2025
  - SRC-NCCN-MM-2025
last_reviewed: "2026-04-27"
reviewer_signoffs: []
notes: >
  Standard first-line empirical antibiotic for febrile neutropenia
  (FN) per IDSA 2010 (Freifeld), ECIL-4, and NCCN — combines
  pseudomonal coverage, broad anaerobic activity, and acceptable
  toxicity profile. De-escalate after 48-72 h based on cultures
  (pip-tazo continued or narrowed to a directed agent). Add
  vancomycin if MRSA suspected (line infection, skin/soft-tissue
  source, prior MRSA colonization, hemodynamic instability) — but
  the pip-tazo + vanco combination has a debated AKI signal in adults
  (no signal in pediatrics or in CRRT). Common errors: under-dosing
  in CrCl 40-60 (still use 4.5 g q8h, not q12h), failure to extend
  infusion in critically ill patients (4-h infusion improves
  T>MIC), missing the rash → DRESS / SJS conversion early. Sodium
  load matters in heart failure — 4.5 g q6h delivers ~3 g sodium/
  day. Ukraine: widely available; first-line FN empirical agent in
  hematology centers per local protocols aligned with NCCN/IDSA.
