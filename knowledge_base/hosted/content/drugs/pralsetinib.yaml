id: DRUG-PRALSETINIB
names:
  preferred: "Pralsetinib"
  ukrainian: "Пралсетініб"
  english: "Pralsetinib"
  synonyms: ["BLU-667"]
  brand_names: ["Gavreto"]
atc_code: L01EX23
rxnorm_id: ""
drug_class: "Selective RET tyrosine kinase inhibitor"
mechanism: >
  STUB — needs full curation. Highly selective RET kinase inhibitor;
  active against RET fusions (NSCLC, thyroid) and activating RET point
  mutations (medullary thyroid, MEN2). ARROW: ORR 61% in RET-fusion+
  NSCLC (TKI-naive ~70%; post-platinum ~57%). FDA 2020.
  Note: marketing rights returned to original developer; commercial
  availability has shifted (off-market in US 2024 for some indications;
  EU continues).

regulatory_status:
  fda:
    approved: true
    year_first_approval: 2020
    indications_brief: ["RET-fusion+ NSCLC", "RET-mutant medullary thyroid cancer", "RET-fusion+ thyroid cancer (selpercatinib preferred per current US availability)"]
  ema:
    approved: true
    year_first_approval: 2021
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: "STUB — pending CSD-4 verification. Not registered in UA per drlz.com.ua snapshot 2026-04-27. Selpercatinib is the dominant RET-TKI globally."

typical_dosing: >
  STUB. 400 mg PO once daily on empty stomach.

formulations:
  - "Capsules 100 mg"

absolute_contraindications: []
black_box_warnings: []
common_adverse_events:
  - "Fatigue"
  - "Constipation"
  - "Musculoskeletal pain"
  - "Hypertension"
  - "Cytopenias (anemia, neutropenia, lymphopenia)"
  - "AST/ALT elevation"
  - "Pneumonia (selective-RET-TKI class)"
serious_adverse_events:
  - "ILD / pneumonitis"
  - "Hypertensive crisis"
  - "Severe cytopenias"
  - "Hepatotoxicity"
  - "QT prolongation"
  - "Hemorrhage"
  - "Wound-healing impairment"
  - "Tumor lysis syndrome (rare; high-burden RET+)"
major_interactions:
  - "STUB — strong CYP3A4 inhibitors/inducers; P-gp; food effect (take fasting)"

pharmacology:
  half_life_hours: 22
  clearance: "hepatic"
  protein_binding_pct: 97
  metabolism: "CYP3A4"

sources:
  - SRC-NCCN-NSCLC-2025
  - SRC-ESMO-NSCLC-METASTATIC-2024

last_reviewed: "2026-04-27"
reviewers: []
notes: >
  STUB — Phase CSD-4 promotion. In the RET-TKI class with selpercatinib;
  selpercatinib is generally preferred when both are available
  (LIBRETTO-431 head-to-head). Needs full curation of dose-adj for
  hepatic, monitoring (LFTs, BP, CBC, ECG), and pneumonitis management.
