id: DRUG-SOTORASIB
names:
  preferred: "Sotorasib"
  ukrainian: "Сотерасіб"
  english: "Sotorasib"
  brand_names: ["Lumakras"]
atc_code: L01XX73
rxnorm_id: null
drug_class: "KRAS G12C-selective covalent inhibitor"
mechanism: >
  First-in-class covalent inhibitor of KRAS G12C — locks the protein in its inactive GDP-bound state. CodeBreaK 100: ORR ~37% in pretreated KRAS G12C+ NSCLC.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: |
      Не зареєстровано в UA (Держреєстр ЛЗ — РП відсутнє станом на 2026-04-27).
      Перший FDA-затверджений KRAS-G12C інгібітор (2021); не входить до НСЗУ.
      Шляхи доступу:
      - Named-patient import (DEC спецдозвіл).
      - EAP Amgen Ukraine (Lumakras access — критерії: KRAS-G12C+ NSCLC
        ≥2L після платини + ICI).
      - Cross-border (EU): EU онкоцентри через "Лікування за кордоном"
        (наказ МОЗ 988); EMA-затверджено 2022.
      - Trial-only: CodeBreaK-серія, post-marketing.
      Source: drlz.com.ua пошук "sotorasib"/"lumakras" 2026-04-27 — РП відсутнє.

typical_dosing: >
  960 mg PO once daily.

key_toxicities:
  - Diarrhea
  - Hepatotoxicity (~25% transaminase elevation)
  - Nausea
  - Fatigue
  - Pneumonitis (rare)

sources: [SRC-NCCN-NSCLC-2025, SRC-ESMO-NSCLC-METASTATIC-2024]
last_reviewed: null
notes: >
  CodeBreaK 200 vs docetaxel in 2L: PFS benefit, OS not significant. Approved 2L+ for KRAS G12C-mutant NSCLC.

notes_patient: >
  Таблетка, що блокує мутацію KRAS G12C — донедавна вважалася «непридатною для таргетної терапії». Застосовується при раку легені після першої лінії.
