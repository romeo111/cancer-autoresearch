id: DRUG-INOTUZUMAB-OZOGAMICIN
names:
  preferred: "Inotuzumab ozogamicin"
  ukrainian: "Інотузумаб озогаміцин"
  english: "Inotuzumab ozogamicin"
  brand_names: ["Besponsa"]
atc_code: L01FX08
rxnorm_id: "1929210"
drug_class: "Anti-CD22 humanized IgG4 monoclonal antibody-drug conjugate (calicheamicin payload)"
mechanism: >
  Humanized anti-CD22 IgG4 monoclonal antibody conjugated to
  N-acetyl-γ-calicheamicin dimethyl hydrazide (DNA-binding cytotoxic
  payload). Binds CD22 on B-ALL blasts, internalizes, releases
  calicheamicin → DNA double-strand breaks → apoptosis. Approved 2L+
  for R/R Ph- B-ALL on basis of INO-VATE phase-3.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: false
    reimbursed_nszu: false
    last_verified: "2026-04-25"

typical_dosing: >
  Cycle 1 induction: 0.8 mg/m² IV day 1, 0.5 mg/m² IV days 8 + 15
  (total 1.8 mg/m²). Cycle 2-6 (consolidation post-CR): 0.5 mg/m²
  IV days 1, 8, 15 (total 1.5 mg/m²). Cycles every 21-28 days.
  Discontinue if no response after 2 cycles. Standard course
  bridge to alloHCT.

formulations: ["Lyophilized powder for IV infusion 0.9 mg/vial"]

absolute_contraindications:
  - "Hypersensitivity to inotuzumab ozogamicin or calicheamicin"
  - "Pregnancy"
  - "Confirmed history of severe veno-occlusive disease / sinusoidal obstruction syndrome (VOD/SOS)"

black_box_warnings:
  - "Hepatotoxicity / VOD/SOS — risk increased with subsequent alloHCT (boxed); incidence ~14% post-HCT"
  - "Increased mortality post-HCT vs comparator chemotherapy in INO-VATE (HR 1.31)"

major_interactions:
  - "Concurrent hepatotoxic agents: cumulative risk"
  - "Live vaccines: avoid"

common_adverse_events:
  - "Cytopenia (febrile neutropenia, thrombocytopenia, anemia)"
  - "Infection"
  - "Mucositis"
  - "Nausea"
  - "Hepatotoxicity (transaminitis, bilirubin elevation)"
  - "Headache"
  - "Pyrexia"

serious_adverse_events:
  - "VOD/SOS (boxed warning)"
  - "Severe infection / sepsis"
  - "Hepatotoxicity (Grade ≥3)"
  - "Tumor lysis syndrome"
  - "Infusion reactions"
  - "QTc prolongation"

pharmacology: {half_life: "~12 days"}

sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
notes: >
  Pivotal: INO-VATE (Kantarjian et al., NEJM 2016) phase-3 in
  R/R Ph- B-ALL — inotuzumab vs investigator-choice salvage chemo;
  CR/CRi 80.7% vs 29.4%; MRD-negativity 78.4% vs 28.1%; median OS
  7.7 vs 6.7 mo (HR 0.77). FDA approval Aug 2017. CRITICAL: VOD
  risk amplified by subsequent alloHCT — limit to 2 cycles
  pre-HCT, avoid dual alkylator conditioning, monitor LFT
  carefully. Bridge-to-HCT intent dominates use. Ukraine: NOT
  registered. STUB — pending Co-Lead sign-off.
