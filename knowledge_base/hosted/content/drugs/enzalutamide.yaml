id: DRUG-ENZALUTAMIDE
names:
  preferred: "Enzalutamide"
  ukrainian: "Ензалутамід"
  english: "Enzalutamide"
  brand_names: ["Xtandi"]
atc_code: L02BB04
rxnorm_id: null
drug_class: "Androgen receptor pathway inhibitor (ARPI)"
mechanism: >
  Direct AR antagonist — competes with androgen for binding, blocks AR nuclear translocation, DNA binding, and coactivator recruitment. Active even in low-androgen castrate environment.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: true
    reimbursement_indications:
      - "Метастатичний кастраційно-резистентний рак передміхурової залози (mCRPC)"
      - "Метастатичний гормон-чутливий рак передміхурової залози (mHSPC)"
      - "Неметастатичний кастраційно-резистентний рак передміхурової залози (nmCRPC)"
    last_verified: "2026-04-27"
    notes: "Reimbursed for mCRPC and mHSPC per НСЗУ formulary 2024."
typical_dosing: >
  160 mg PO once daily, with or without food. Continue until progression or unacceptable toxicity.

key_toxicities:
  - Fatigue (~50%)
  - Hot flashes
  - Hypertension
  - Falls / dizziness (~10%) — caution in elderly
  - Cognitive impairment / memory issues (~5-10%)
  - Seizures (~0.4%) — contraindicated in seizure-history patients
  - Posterior reversible encephalopathy syndrome (PRES, rare)

sources: [SRC-NCCN-PROSTATE-2025, SRC-ESMO-PROSTATE-2024]
last_reviewed: null
notes: >
  Active in pre-chemotherapy and post-docetaxel mCRPC. CNS penetration > apalutamide / darolutamide; cognitive AEs more common in elderly.

notes_patient: >
  Таблетка-anti-androgen для раку простати: блокує сам рецептор тестостерону на пухлинних клітинах. Приймається раз на добу. Можлива втома, припливи, рідко — судоми.
