id: DRUG-RAMUCIRUMAB
names:
  preferred: "Ramucirumab"
  ukrainian: "Рамуцирумаб"
  english: "Ramucirumab"
  brand_names:
    - "Cyramza"
atc_code: L01FG02
rxnorm_id: "1535996"
drug_class: "Anti-VEGFR2 IgG1 monoclonal antibody"
mechanism: >
  Fully human IgG1 monoclonal antibody targeting the extracellular
  domain of VEGFR-2, blocking VEGF-A, -C, -D ligand binding and
  downstream pro-angiogenic + pro-survival signaling. Distinct from
  bevacizumab (anti-VEGF-A ligand). Approved across multiple solid
  tumors as second-line antiangiogenic.

regulatory_status:
  fda:
    approved: true
  ema:
    approved: true
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-25"
    notes: "Registered; NOT NSZU-reimbursed for NSCLC. Out-of-pocket / charitable / clinical-trial access; bevacizumab biosimilar more accessible alternative angiogenic but distinct mechanism."

typical_dosing: >
  NSCLC (REVEL, with docetaxel): 10 mg/kg IV day 1 of each 21-day cycle.
  Gastric (RAINBOW, with paclitaxel): 8 mg/kg IV days 1, 15 of 28-day cycle.
  HCC (REACH-2, monotherapy AFP ≥400): 8 mg/kg IV q2 weeks.
formulations:
  - "IV solution 10 mg/mL — 100 mg / 10 mL and 500 mg / 50 mL vials"

absolute_contraindications:
  - "Active uncontrolled severe hemorrhage"
  - "Recent (≤28 days) major surgery"
  - "Hypersensitivity"
black_box_warnings:
  - "Hemorrhage — including severe, sometimes fatal"
  - "Gastrointestinal perforation"
  - "Impaired wound healing"
  - "Arterial thromboembolic events"
major_interactions:
  - "Concurrent anticoagulants — additive bleeding risk"
  - "Concomitant other anti-VEGF agents — overlapping toxicity"
common_adverse_events:
  - "Hypertension (~20-30%; Grade ≥3 ~5-15%)"
  - "Diarrhea"
  - "Fatigue"
  - "Epistaxis"
  - "Headache"
  - "Stomatitis"
  - "Proteinuria"
serious_adverse_events:
  - "Severe / fatal hemorrhage (GI, pulmonary)"
  - "GI perforation (rare but serious)"
  - "Arterial thromboembolic events (MI, stroke)"
  - "Wound healing complications"
  - "Reversible posterior leukoencephalopathy (PRES, very rare)"
  - "Severe infusion reactions"

pharmacology:
  half_life: "~14 days"

sources:
  - SRC-NCCN-NSCLC-2025
  - SRC-ESMO-NSCLC-METASTATIC-2024

last_reviewed: "2026-04-25"
notes: >
  REVEL trial (Garon 2014): in 2L NSCLC after platinum doublet,
  docetaxel + ramucirumab vs docetaxel improved mOS (10.5 vs 9.1 mo,
  HR 0.86). Modest absolute benefit; toxicity (hypertension, bleeding)
  is meaningful — careful patient selection. Hold ≥28 days before any
  major surgery; restart only after wound fully healed. Active
  hemoptysis or recent GI ulcer = contraindication.
