id: DRUG-VANCOMYCIN
names:
  preferred: "Vancomycin"
  ukrainian: "Ванкоміцин"
  english: "Vancomycin"
  brand_names:
    - "Vancocin"
    - "Vancosan"
    - "Edicin"
atc_code: J01XA01
rxnorm_id: "11124"
drug_class: "Glycopeptide antibiotic (Gram-positive only; MRSA / ampicillin-resistant enterococci)"
mechanism: >
  Branched tricyclic glycopeptide that binds the D-alanyl-D-alanine
  terminus of pentapeptide cell-wall precursors, sterically blocking
  transpeptidation and transglycosylation steps in bacterial cell-
  wall synthesis. Bactericidal against most Gram-positive cocci and
  bacilli including methicillin-resistant Staphylococcus aureus
  (MRSA), coagulase-negative staphylococci (most), ampicillin-
  resistant enterococci (Enterococcus faecium and faecalis except
  VRE), Streptococcus pneumoniae (including penicillin-resistant),
  and most anaerobic Gram-positives (Clostridioides difficile via
  oral route). No Gram-negative activity. FDA-approved 1958. In
  febrile neutropenia (FN), added to pip-tazo / cefepime / meropenem
  when MRSA is suspected (catheter-related infection, skin/soft-tissue
  source, prior MRSA colonization, hemodynamic instability,
  pneumonia with cavitation, severe mucositis with Gram-positive
  bacteremia risk).
regulatory_status:
  fda:
    approved: true
    year_first_approval: 1958
    indications_brief:
      - "Serious infections caused by MRSA (bacteremia, endocarditis, pneumonia, meningitis, osteomyelitis, skin/soft-tissue)"
      - "Penicillin-allergy alternative for streptococcal endocarditis"
      - "Empirical add-on in febrile neutropenia for suspected MRSA / Gram-positive line infection"
      - "Oral vancomycin: Clostridioides difficile-associated diarrhea (CDI)"
  ema:
    approved: true
    year_first_approval: 1986
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: true
    reimbursement_indications:
      - "Тяжкі MRSA-інфекції (бактеріємія, ендокардит, пневмонія)"
      - "Емпірична добавка при фебрильній нейтропенії з підозрою на MRSA / Гр(+) інфекцію"
      - "Пероральний ванкоміцин для C. difficile колітів"
    last_verified: "2026-04-27"
    notes: "Зареєстровано в Україні (Vancosan, Edicin, generics). Покриття НСЗУ для тяжких інфекцій. Перевірено drlz.com.ua 2026-04-27."
typical_dosing: >
  Adult IV (severe Gram-positive infection / FN add-on): loading dose
  25-30 mg/kg IV (max 3 g) over ≥1 hour for severe sepsis / endocarditis,
  followed by maintenance 15-20 mg/kg IV every 8-12 hours adjusted to
  AUC24/MIC 400-600 mg·h/L (preferred per IDSA 2020) or trough 15-20
  mg/L for serious MRSA infections. Pediatric: 15 mg/kg IV q6h. Renal
  adjustment essential — use Bayesian AUC monitoring or dose-
  individualization software (CrCl <50 → reduce frequency, e.g., q24h
  or q48h depending on CrCl); hemodialysis → variable; CRRT → continuous
  infusion 25-35 mg/kg/day. Hepatic: no adjustment. Duration: per
  source/syndrome; FN add-on continued ≥48-72 h; if no MRSA isolated
  and no clear Gram-positive source, discontinue per stewardship.
  CRITICAL: infuse over ≥1 hour (or ≥1 hour per gram for doses >1 g)
  to avoid vancomycin infusion reaction ("red man syndrome").
formulations:
  - "IV powder for reconstitution: 500 mg, 750 mg, 1 g, 5 g, 10 g vials"
  - "Oral capsule 125 mg, 250 mg (CDI only — no systemic absorption)"
  - "Oral solution 25 mg/mL, 50 mg/mL (CDI only)"
absolute_contraindications:
  - "Hypersensitivity to vancomycin or other glycopeptides (teicoplanin cross-reactivity ~10%)"
  - "Severe pre-existing hearing loss (relative; ototoxicity risk)"
black_box_warnings: []
common_adverse_events:
  - "Vancomycin infusion reaction / 'red man syndrome' (flushing, pruritus, erythema of upper body) — ~5-15% with rapid infusion; rate-related, not allergic; mitigated by slowing infusion to ≥1 h per gram and antihistamine pretreatment"
  - "Local infusion-site reaction / phlebitis — ~10-15% (use central line for prolonged courses)"
  - "Nausea — ~5%"
  - "Rash (immune) — ~3-5%"
  - "Fever (drug fever) — ~2-3%"
  - "Eosinophilia — ~2-3%"
  - "Reversible neutropenia (~2%; usually after >7 days therapy)"
  - "Mild thrombocytopenia — ~1-3%"
  - "Headache — ~2-3%"
  - "Mild reversible nephrotoxicity (~5-15% with trough ≥20)"
  - "Tinnitus / mild hearing changes — ~1-2%"
serious_adverse_events:
  - "Acute kidney injury — particularly with trough levels >20 mg/L, AUC24 >700 mg·h/L, or co-administration with piperacillin/tazobactam (debated VPT-AKI signal in adults), aminoglycosides, NSAIDs, contrast"
  - "Ototoxicity — irreversible high-frequency hearing loss with prolonged exposure or high troughs, especially with concomitant aminoglycosides or loop diuretics"
  - "Severe immediate hypersensitivity / anaphylaxis (true IgE-mediated, distinct from red man syndrome)"
  - "Stevens-Johnson syndrome / TEN / DRESS (rare)"
  - "Linear IgA bullous dermatosis (vancomycin-induced; rare)"
  - "Severe neutropenia (rare; resolves with discontinuation)"
  - "Severe thrombocytopenia (immune-mediated)"
  - "Cardiac arrest with extremely rapid IV push"
major_interactions:
  - "Aminoglycosides: additive nephrotoxicity + ototoxicity — avoid combination unless required for synergy in enterococcal endocarditis"
  - "Piperacillin/tazobactam: debated AKI signal in adults (VPT-AKI); monitor renal function closely; consider cefepime substitution in patients with risk factors"
  - "Loop diuretics (furosemide): additive ototoxicity"
  - "NSAIDs: additive nephrotoxicity"
  - "IV contrast media: additive AKI risk; pre-hydrate"
  - "Anesthetic agents (volatile, propofol): increased infusion reaction risk during induction — pre-medicate with antihistamine"
  - "Neuromuscular blockers (succinylcholine, vecuronium): potentiates blockade"
  - "Calcineurin inhibitors (cyclosporine, tacrolimus): additive nephrotoxicity"
  - "Cholestyramine (oral): binds oral vancomycin in gut — reduces CDI efficacy; separate by ≥3 h"
pharmacology:
  half_life_hours: 6  # 4-11 h normal renal function; 7+ days in anuric patients
  clearance: "Renal (~80-90% excreted unchanged in urine; non-dialyzable by conventional HD; cleared by high-flux HD and CRRT)"
  protein_binding_pct: 50
  metabolism: "No significant hepatic metabolism; renal excretion of unchanged drug — strict renal dose adjustment with AUC-guided monitoring"
sources:
  - SRC-NCCN-BCELL-2025
  - SRC-NCCN-MM-2025
last_reviewed: "2026-04-27"
reviewer_signoffs: []
notes: >
  Empirical vancomycin add-on to FN regimen indicated for: clinically
  evident catheter-site or tunnel infection, skin/soft-tissue infection,
  pneumonia with cavitation, hemodynamic instability, severe mucositis
  with high Gram-positive bacteremia risk, prior MRSA colonization,
  blood culture preliminary Gram-positive cocci. Discontinue at 48-72 h
  if cultures negative and no clinical Gram-positive source per
  stewardship. AUC-guided dosing (target AUC24 400-600 mg·h/L)
  preferred over trough-based dosing per IDSA 2020 — Bayesian software
  improves both efficacy (deeper MRSA killing) and safety (lower AKI
  rate). KEY pitfalls: 'red man syndrome' from rapid infusion is NOT
  allergy — slow infusion fixes it; conversely, true anaphylaxis is rare
  but distinct (urticaria, hypotension, bronchospasm). Combination with
  pip-tazo has a debated AKI signal in adults — substitute cefepime if
  patient at high renal risk (elderly, baseline CKD, contrast exposure,
  HSCT). Oral vancomycin only for CDI — no systemic absorption.
  Ukraine: widely available, NSZU-covered.
