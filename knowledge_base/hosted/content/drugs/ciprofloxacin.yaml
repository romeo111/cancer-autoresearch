id: DRUG-CIPROFLOXACIN
names:
  preferred: "Ciprofloxacin"
  ukrainian: "Ципрофлоксацин"
  english: "Ciprofloxacin"
  brand_names:
    - "Cipro"
    - "Ciprobay"
    - "Ciprolet"
atc_code: J01MA02
rxnorm_id: "2551"
drug_class: "Second-generation fluoroquinolone antibiotic (Gram-negative + atypicals + Pseudomonas)"
mechanism: >
  Synthetic broad-spectrum fluoroquinolone that inhibits two essential
  bacterial type-II topoisomerases: DNA gyrase (topoisomerase II) —
  primary target in Gram-negative bacteria — and topoisomerase IV —
  primary target in Gram-positive bacteria. Inhibition prevents DNA
  supercoiling/uncoiling required for replication, transcription, and
  repair, producing bactericidal effect with concentration-dependent
  killing (AUC/MIC > 100 for Gram-negative). Excellent activity vs
  Pseudomonas aeruginosa (best of the older fluoroquinolones),
  Enterobacterales (including ESBLs in some regions), Haemophilus,
  intracellular pathogens (Legionella, Chlamydia), atypical
  mycobacteria, Bacillus anthracis. Modest Gram-positive activity
  (lower than later fluoroquinolones). Approximately 70% oral
  bioavailability — IV-to-PO step-down convenient. FDA-approved 1987.
regulatory_status:
  fda:
    approved: true
    year_first_approval: 1987
    indications_brief:
      - "Complicated UTI, pyelonephritis, complicated intra-abdominal (with metronidazole)"
      - "Bone and joint infections (with adjunct)"
      - "Anthrax post-exposure prophylaxis"
      - "Inhalation anthrax, plague"
      - "Oral step-down therapy in selected febrile neutropenia (low-risk MASCC ≥21, oral monotherapy ± amoxicillin-clavulanate per IDSA outpatient FN protocol)"
  ema:
    approved: true
    year_first_approval: 1989
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: true
    reimbursement_indications:
      - "Емпірична / спрямована терапія Гр(-) інфекцій"
      - "Step-down з IV до PO у відповідних онкологічних інфекційних епізодах"
      - "Outpatient FN-терапія у low-risk пацієнтів (MASCC ≥21) per IDSA"
    last_verified: "2026-04-27"
    notes: "Зареєстровано в Україні (Ciprolet, Ciprobay, generics). Дешевий, ubiquitous. NSZU-covered. ВАЖЛИВО: НЕ застосовується для FN-профілактики (не levofloxacin профіль) — ciprofloxacin має слабше Гр(+) покриття; для FN-prophyaxis обирають levofloxacin. Перевірено drlz.com.ua 2026-04-27."
typical_dosing: >
  Severe Gram-negative infection (adult IV): 400 mg IV every 8-12 hours
  via 60-min infusion. Oral step-down or moderate infection: 500-750 mg
  PO every 12 hours. Outpatient febrile neutropenia (low-risk, IDSA):
  750 mg PO q12h + amoxicillin-clavulanate 875 mg PO q12h. Pediatric
  (typically avoided due to arthropathy concern but used for plague,
  anthrax, complicated UTI): 10 mg/kg IV q12h, max 400 mg/dose. Renal
  adjustment: CrCl 30-50 → 250-500 mg PO q12h or 200-400 mg IV q12h;
  CrCl <30 → 250-500 mg PO q18-24h or 200-400 mg IV q18-24h;
  hemodialysis → dose post-dialysis. Hepatic: no adjustment.
  CRITICAL: separate from polyvalent cation chelators (antacids,
  iron, calcium, sucralfate, dairy) by ≥2 hours before or 6 hours
  after — these reduce ciprofloxacin absorption by 30-90%.
formulations:
  - "Tablet 250 mg, 500 mg, 750 mg"
  - "Extended-release tablet 500 mg, 1000 mg"
  - "Oral suspension 250 mg / 5 mL, 500 mg / 5 mL"
  - "IV solution 200 mg / 100 mL, 400 mg / 200 mL"
  - "Ophthalmic solution 0.3%; ophthalmic ointment"
  - "Otic suspension"
absolute_contraindications:
  - "Hypersensitivity to ciprofloxacin or other fluoroquinolones"
  - "Concurrent tizanidine (CYP1A2 inhibition → severe hypotension, sedation)"
  - "History of fluoroquinolone-associated tendon rupture, severe peripheral neuropathy, or aortic dissection"
  - "Myasthenia gravis (exacerbation)"
  - "Pregnancy (relative; only use when benefit outweighs risk — arthropathy in animal studies)"
  - "Known QT prolongation, hypokalemia, or concurrent QT-prolonging drugs"
black_box_warnings:
  - "Tendinitis and tendon rupture (Achilles tendon most common; risk increased by age >60, corticosteroid use, organ transplantation; can occur weeks-months post-treatment)"
  - "Peripheral neuropathy (can be permanent)"
  - "CNS effects (toxic psychosis, seizures, anxiety, depression, suicidal ideation, confusion)"
  - "Exacerbation of myasthenia gravis (life-threatening respiratory weakness)"
  - "Aortic aneurysm and dissection (especially in elderly)"
  - "Class warning: avoid in uncomplicated infections (sinusitis, bronchitis, uncomplicated UTI) where alternatives exist (FDA, EMA 2018)"
common_adverse_events:
  - "Nausea — ~5-10%"
  - "Diarrhea — ~5%"
  - "Headache — ~3-5%"
  - "Vomiting — ~3%"
  - "Abdominal pain — ~3%"
  - "Rash — ~2-3%"
  - "Dyspepsia — ~3%"
  - "Dizziness — ~2-3%"
  - "Restlessness / insomnia — ~2-3%"
  - "Mild transaminitis — ~2-3%"
  - "Photosensitivity (UVA) — ~1-3%"
  - "Vaginal candidiasis — ~2-3%"
  - "Local infusion-site reaction (IV) — ~3-5%"
  - "Crystalluria (rare; with alkaline urine + dehydration)"
serious_adverse_events:
  - "Tendon rupture (Achilles, biceps, hand) — boxed warning"
  - "Severe / persistent peripheral neuropathy — boxed warning"
  - "Aortic aneurysm rupture / dissection (especially elderly with cardiovascular risk factors)"
  - "Severe CNS effects: seizures, toxic psychosis, depression, suicidal ideation"
  - "QT prolongation / torsades de pointes (modest baseline risk; markedly elevated with hypokalemia, other QT drugs)"
  - "Hypoglycemia (especially in diabetics on sulfonylureas or insulin) and hyperglycemia"
  - "Severe hypersensitivity / anaphylaxis"
  - "Stevens-Johnson syndrome / toxic epidermal necrolysis (rare)"
  - "DRESS syndrome (rare)"
  - "Hepatotoxicity (rare; including fulminant)"
  - "Clostridioides difficile colitis"
  - "Exacerbation of myasthenia gravis — respiratory failure"
  - "Crystalluria → AKI (rare; with alkaline urine + dehydration)"
major_interactions:
  - "Tizanidine: CONTRAINDICATED (severe hypotension, sedation via CYP1A2 inhibition)"
  - "Theophylline: ciprofloxacin increases theophylline levels 2-3× via CYP1A2 inhibition — monitor levels, halve dose"
  - "Warfarin: variable INR increase — monitor closely"
  - "QT-prolonging drugs (methadone, ondansetron at high IV doses, antipsychotics, class IA/III antiarrhythmics): additive QT effect"
  - "Polyvalent cations (antacids with Al/Mg/Ca, iron supplements, zinc, sucralfate, dairy products, calcium-fortified juices, multivitamins): chelation reduces ciprofloxacin absorption 30-90% — separate by ≥2 h before or 6 h after"
  - "Sulfonylureas (glyburide), insulin: hypoglycemia (and rarely severe hyperglycemia) — monitor blood glucose"
  - "NSAIDs: additive CNS effects (seizure threshold lowering)"
  - "Corticosteroids: additive tendon rupture risk — caution in elderly on chronic steroids"
  - "Cyclosporine: increased nephrotoxicity"
  - "Methotrexate: ciprofloxacin reduces MTX renal clearance — monitor for toxicity"
  - "Phenytoin: variable phenytoin levels — monitor"
pharmacology:
  half_life_hours: 4  # ~3.5-4.5 h normal renal function; ~7 h in renal failure
  clearance: "Renal (~50% excreted unchanged in urine; biliary/transintestinal ~25%)"
  protein_binding_pct: 30
  metabolism: "Limited hepatic via CYP1A2 (also potent CYP1A2 inhibitor — major DDI source); renal + biliary excretion"
sources:
  - SRC-NCCN-BCELL-2025
  - SRC-NCCN-MM-2025
last_reviewed: "2026-04-27"
reviewer_signoffs: []
notes: >
  Workhorse fluoroquinolone for Gram-negative + Pseudomonas. In
  oncology, the principal use is IV-to-PO step-down therapy after
  documented Gram-negative bacteremia / UTI / intra-abdominal infection
  responding to initial broad-spectrum, allowing earlier discharge.
  ALSO used for outpatient management of low-risk febrile neutropenia
  (MASCC score ≥21, no comorbidities, expected ANC recovery <7 days)
  with the IDSA-recommended ciprofloxacin + amoxicillin-clavulanate
  oral regimen. NOT used for FN prophylaxis — that role belongs to
  levofloxacin, which has better Gram-positive coverage (esp.
  viridans streptococci, a major mucositis-related bacteremia source).
  Class-wide FDA / EMA 2018 warning restricts fluoroquinolones to
  serious infections without alternatives — applies to ciprofloxacin.
  Polyvalent cation chelation is the most common cause of treatment
  failure with oral therapy — patient counselling critical. CYP1A2
  inhibition causes major DDIs (tizanidine contraindicated;
  theophylline doubles). Ukraine: cheap, ubiquitous, NSZU-covered.
