id: DRUG-SALBUTAMOL
names:
  preferred: "Salbutamol"
  ukrainian: "Сальбутамол"
  english: "Salbutamol"
  brand_names:
    - "Ventolin"
    - "ProAir"
    - "Salbuvent"
  synonyms:
    - "albuterol"
atc_code: R03AC02
rxnorm_id: "435"
drug_class: "Short-acting selective β2-adrenergic agonist (SABA) bronchodilator"
mechanism: >
  Selective short-acting β2-adrenergic agonist that activates β2
  receptors on bronchial smooth muscle, stimulating adenylyl cyclase
  → increased intracellular cAMP → relaxation of bronchial smooth
  muscle and bronchodilation. Onset of action 5-15 min after
  inhalation, peak effect 30-60 min, duration 4-6 h. Also produces
  mast cell membrane stabilization (modestly reducing histamine
  release), enhanced mucociliary clearance, and decreased microvascular
  permeability. Selectivity for β2 over β1 (~30:1) limits cardiac
  stimulation at therapeutic doses but loses selectivity at high
  doses or with parenteral routes (tachycardia, palpitations,
  modest blood pressure changes). In oncology supportive care,
  used for: (1) bronchospasm component of chemotherapy infusion
  reactions and anaphylaxis (adjunct to epinephrine, NOT
  substitute); (2) acute exacerbations of underlying asthma /
  COPD precipitated by infections during cytotoxic therapy;
  (3) bronchospasm following CAR-T cytokine release syndrome.
  FDA-approved 1980 (US: albuterol; UK: salbutamol — same molecule).
regulatory_status:
  fda:
    approved: true
    year_first_approval: 1980
    indications_brief:
      - "Acute bronchospasm — asthma, COPD"
      - "Exercise-induced bronchospasm prevention"
      - "Bronchospasm component of anaphylaxis or chemotherapy infusion reaction"
  ema:
    approved: true
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: true
    reimbursement_indications:
      - "Гострий бронхоспазм при астмі, ХОЗЛ"
      - "Бронхоспазм при анафілаксії / хімо-індукованих інфузійних реакціях (додаток до адреналіну)"
    last_verified: "2026-04-27"
    notes: "Зареєстровано в Україні (Ventolin, generics). Дешевий, ubiquitous. NSZU-covered. Перевірено drlz.com.ua 2026-04-27."
typical_dosing: >
  ACUTE BRONCHOSPASM / INFUSION REACTION (adult, nebulized): 2.5-5 mg
  in 3 mL NS via nebulizer with O2 6-8 L/min, repeat every 20 min × 3
  doses then every 1-4 h as needed. METERED-DOSE INHALER (MDI) with
  spacer: 4-8 puffs (90 µg / puff) every 20 min × 3 doses then every
  1-4 h. SEVERE BRONCHOSPASM (refractory): continuous nebulization
  10-15 mg/h. Pediatric nebulizer: 0.15 mg/kg (min 2.5 mg, max 5 mg)
  per dose; MDI with spacer 2-4 puffs per dose. IV (rare; not preferred
  over inhalation): 250 µg slow bolus then 5-20 µg/min infusion. Renal:
  no adjustment. Hepatic: no adjustment. CRITICAL: nebulization
  preferred for moderate-severe bronchospasm or when patient unable to
  use MDI properly; MDI with spacer equally efficacious in cooperative
  patients. Monitor heart rate, K+ (hypokalemia at high doses),
  glucose (transient hyperglycemia).
formulations:
  - "Nebulizer solution 2.5 mg / 3 mL, 5 mg / 5 mL (single-dose ampules)"
  - "Metered-dose inhaler (MDI) 90 µg / puff (200 puffs / canister)"
  - "Dry powder inhaler (DPI) 200 µg / dose"
  - "Tablet (rare oncology use) 2 mg, 4 mg, 8 mg ER"
  - "Syrup 2 mg / 5 mL"
  - "IV solution 0.5 mg/mL (limited availability)"
absolute_contraindications:
  - "Hypersensitivity to salbutamol or other β2-agonists"
  - "Concurrent non-selective β-blockers (relative — antagonism)"
  - "Severe untreated tachyarrhythmia"
black_box_warnings: []
common_adverse_events:
  - "Tremor — ~10-25% (dose-related)"
  - "Tachycardia / palpitations — ~10-15%"
  - "Headache — ~5-10%"
  - "Dizziness — ~5-10%"
  - "Restlessness / nervousness — ~5-10%"
  - "Nausea — ~3-5%"
  - "Throat irritation / cough (inhaled) — ~5-10%"
  - "Hypokalemia — ~5-10% (β2-mediated K+ shift into cells; clinically significant in hypokalemic / digoxin-treated patients)"
  - "Hyperglycemia — ~3-5% (transient)"
  - "Mild hypotension or hypertension — ~3-5%"
  - "Insomnia — ~3-5%"
  - "Muscle cramps — ~3-5%"
  - "Dry mouth — ~3%"
serious_adverse_events:
  - "Severe paradoxical bronchospasm (rare; substitute alternative bronchodilator)"
  - "Severe tachyarrhythmia (V-tach; particularly with overuse, IV use, or QT-prolonging co-medications)"
  - "Acute myocardial ischemia (in patients with coronary artery disease)"
  - "Severe hypokalemia with cardiac arrhythmia (especially in patients on diuretics, digoxin, or with baseline hypokalemia)"
  - "Lactic acidosis (high-dose continuous nebulization or IV)"
  - "Severe hypersensitivity / anaphylaxis (very rare; paradoxical)"
  - "Hyperglycemic emergency (in diabetics)"
  - "Tolerance / down-regulation of β2 receptors with overuse — reduced effectiveness"
major_interactions:
  - "Non-selective β-blockers (propranolol, nadolol, timolol): antagonize bronchodilation — AVOID combination; use cardioselective (metoprolol, bisoprolol) if β-blocker required"
  - "Other sympathomimetics (epinephrine, pseudoephedrine, cocaine, amphetamines): additive cardiovascular effects — caution"
  - "MAO inhibitors, tricyclic antidepressants: potentiate β2-mediated cardiovascular effects — caution within 14 days"
  - "Digoxin: salbutamol-induced hypokalemia potentiates digoxin toxicity"
  - "Diuretics (loop, thiazide), corticosteroids, theophylline: additive hypokalemia"
  - "QT-prolonging drugs (high-dose IV ondansetron, methadone, antipsychotics, fluoroquinolones): additive QT effect (modest)"
  - "Halothane, volatile anesthetics: sensitize myocardium — potentiate β2-induced arrhythmia"
  - "Inhaled ipratropium: additive bronchodilation — synergistic, often combined for severe bronchospasm"
pharmacology:
  half_life_hours: 4  # 4-6 h plasma; biological effect 4-6 h
  clearance: "Hepatic + renal"
  protein_binding_pct: 10
  metabolism: "Hepatic sulfation to inactive metabolite; ~30% renal excretion of unchanged drug; rapid first-pass metabolism limits oral bioavailability — inhalation route preferred"
sources:
  - SRC-NCCN-BCELL-2025
  - SRC-NCCN-MM-2025
last_reviewed: "2026-04-27"
reviewer_signoffs: []
notes: >
  Standard adjunct for bronchospasm component of anaphylaxis,
  chemotherapy infusion reactions, and CAR-T cytokine release
  syndrome — given concurrently with epinephrine (epinephrine
  remains the FIRST-LINE for true anaphylaxis with hypotension or
  upper airway edema). Nebulized 2.5-5 mg q20min × 3 then q1-4h
  is standard for moderate-severe bronchospasm. Critical:
  salbutamol does NOT reverse hypotension or upper airway edema —
  if these are present, epinephrine IM thigh is mandatory and
  urgent. Add ipratropium 500 µg nebulized if bronchospasm
  refractory or severe (combined β2 + muscarinic blockade). For
  bronchospasm during paclitaxel, rituximab, or monoclonal antibody
  infusions: stop infusion, administer salbutamol nebulized,
  diphenhydramine + famotidine + steroid as supportive — escalate
  to epinephrine if hypotension / upper airway involvement /
  no response in 5-10 min. Avoid in patients with cardiomyopathy
  / serious arrhythmia (QT-prolonging chemotherapy regimens
  particularly — TKIs, arsenic trioxide). Tachycardia and
  hypokalemia are dose-related — monitor in continuous nebulization.
  Ukraine: cheap, ubiquitous, NSZU-covered.
