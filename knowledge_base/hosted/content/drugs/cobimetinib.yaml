id: DRUG-COBIMETINIB
names:
  preferred: "Cobimetinib"
  ukrainian: "Кобіметиніб"
  english: "Cobimetinib"
  synonyms: ["GDC-0973", "XL518"]
  brand_names: ["Cotellic"]
atc_code: L01EE02
rxnorm_id: ""
drug_class: "MEK1/2 inhibitor"
mechanism: >
  STUB — needs full curation. Selective allosteric MEK1/MEK2 inhibitor;
  used in combination with vemurafenib (BRAFi) for BRAF V600 melanoma
  (coBRIM trial). Also part of triplet atezolizumab + cobimetinib +
  vemurafenib in BRAF V600 advanced melanoma (IMspire150).

regulatory_status:
  fda:
    approved: true
    year_first_approval: 2015
    indications_brief: ["BRAF V600 melanoma (combo vemurafenib)", "BRAF V600 melanoma (combo atezo + vemurafenib, IMspire150)"]
  ema:
    approved: true
    year_first_approval: 2015
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: "STUB — pending CSD-4 verification. Dabrafenib+trametinib is the dominant BRAFi+MEKi combo in UA practice; cobimetinib+vemurafenib less commonly reimbursed."

typical_dosing: >
  STUB. 60 mg PO once daily for 21 days then 7-day break (cycle 28d),
  combined with vemurafenib 960 mg PO BID continuous.

formulations:
  - "Tablets 20 mg"

absolute_contraindications: []
black_box_warnings: []
common_adverse_events:
  - "Diarrhea"
  - "Photosensitivity"
  - "Nausea"
  - "Pyrexia"
  - "Vomiting"
  - "Rash"
  - "CK elevation"
serious_adverse_events:
  - "Cardiomyopathy / LVEF decline"
  - "Retinal detachment / serous retinopathy"
  - "Severe rash / dermatitis"
  - "Hepatotoxicity"
  - "Rhabdomyolysis"
  - "Severe hemorrhage"
major_interactions:
  - "STUB — strong CYP3A4 inhibitors significantly increase exposure"

pharmacology:
  half_life_hours: 44
  clearance: "hepatic"
  protein_binding_pct: 95
  metabolism: "CYP3A4, UGT2B7"

sources:
  - SRC-NCCN-MELANOMA-2025
  - SRC-ESMO-MELANOMA-2024

last_reviewed: "2026-04-27"
reviewers: []
notes: >
  STUB — Phase CSD-4 promotion. Sun-protective measures critical (BRAFi
  combo amplifies photosensitivity). Echo + ophtho monitoring as with
  other MEKi. Needs full curation of dose-adj, monitoring schedule,
  drug interactions.
