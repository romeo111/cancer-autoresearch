id: DRUG-BELINOSTAT
names:
  preferred: "Belinostat"
  ukrainian: "Белінoстат"
  english: "Belinostat"
  brand_names: ["Beleodaq"]
atc_code: L01XX49
rxnorm_id: "1543574"
drug_class: "Pan-HDAC inhibitor (hydroxamic acid)"
mechanism: >
  Pan-histone deacetylase (HDAC) inhibitor — increases acetylation of
  histones and non-histone proteins, derepressing tumor-suppressor
  genes, blocking cell-cycle progression, inducing apoptosis. Active
  in T-cell lymphomas with epigenetic dysregulation (TFH-cell origin,
  TET2/IDH2/DNMT3A mutations) — particularly AITL and PTCL NOS.

regulatory_status:
  fda: {approved: true}
  ema: {approved: false}
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    last_verified: "2026-04-25"
    notes: "Not registered in Ukraine; not EMA-approved. Access via clinical trial / international supply only — limited."

typical_dosing: "1000 mg/m² IV once daily on days 1-5 of each 21-day cycle, until progression or unacceptable toxicity"
formulations: ["IV powder 500 mg vial"]

absolute_contraindications:
  - "Hypersensitivity"
  - "Severe hepatic impairment"
black_box_warnings: []
major_interactions:
  - "UGT1A1 inhibitors / inducers — affects metabolism (atazanavir, sorafenib elevate exposure)"
  - "QT-prolonging drugs concomitantly — additive QTc risk"
  - "Anticoagulants — bleeding risk in thrombocytopenia"
common_adverse_events:
  - "Nausea / vomiting"
  - "Fatigue"
  - "Pyrexia"
  - "Anemia"
  - "Thrombocytopenia"
  - "Diarrhea"
  - "Decreased appetite"
serious_adverse_events:
  - "Severe thrombocytopenia / hemorrhage"
  - "Severe neutropenia + infection"
  - "Hepatotoxicity"
  - "QTc prolongation"
  - "Tumor lysis syndrome (high-burden disease)"
  - "Severe infection"

pharmacology:
  half_life: "~1-2 hours"
  elimination: "UGT1A1 glucuronidation"

sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
notes: >
  BELIEF trial (O'Connor 2015): r/r PTCL (incl AITL, PTCL NOS, ALCL,
  enteropathy-associated, hepatosplenic) — ORR 26%, CR 11%, median
  DOR 13.6 mo. FDA-approved for r/r PTCL. AITL subset response higher
  than PTCL NOS subset (likely TFH biology + epigenetic dependence).
  Major UA access barrier: not registered + not EMA-approved.
