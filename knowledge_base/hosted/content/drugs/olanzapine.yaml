id: DRUG-OLANZAPINE
names:
  preferred: "Olanzapine"
  ukrainian: "Оланзапін"
  english: "Olanzapine"
  brand_names:
    - "Zyprexa"
    - "Zyprexa Zydis (ODT)"
atc_code: N05AH03
rxnorm_id: "61381"
drug_class: "Atypical (second-generation) antipsychotic; multireceptor antagonist (D2, 5-HT2A/2C, H1, M1, α1)"
mechanism: >
  Thienobenzodiazepine atypical antipsychotic with high-affinity
  antagonism at multiple receptors implicated in nausea and vomiting:
  dopamine D2 (mesolimbic), serotonin 5-HT2A/2C, histamine H1,
  muscarinic M1, and α1-adrenergic. Multi-receptor blockade in the
  vomiting center, area postrema, and chemoreceptor trigger zone
  produces broad-spectrum antiemetic effect across acute, delayed,
  and breakthrough CINV phases. Adding olanzapine 10 mg PO days 1-4
  to triple antiemetic prophylaxis (NK1 + 5-HT3 + dex) improves
  complete-response rate by ~10% absolute for HEC (Navari, NEJM 2016).
  Particularly effective for refractory or breakthrough nausea where
  single-receptor antagonists have failed. Approved by FDA September
  1996 (psychiatric indications); CINV use is guideline-supported
  off-label / on-label depending on jurisdiction.
regulatory_status:
  fda:
    approved: true
    year_first_approval: 1996
    indications_brief: ["Schizophrenia", "Bipolar I disorder (manic/mixed)", "Treatment-resistant depression (combo)", "CINV — guideline-supported (NCCN/ASCO/MASCC) but off-label per FDA labeling"]
  ema:
    approved: true
    year_first_approval: 1996
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: "Зареєстровано в Україні для психіатричних показань (Zyprexa та generics). Не реімбурсується НСЗУ для онкологічного off-label антиеметичного застосування — пацієнт оплачує самостійно (~UAH 200-400 за курс 4 дні). Широко рекомендований у NCCN/ASCO/MASCC рекомендаціях для CINV."
typical_dosing: >
  CINV adjunct: 10 mg PO once daily on days 1-4 of HEC; or 5 mg PO
  once daily in elderly (≥65 yrs), frail patients, or to limit
  sedation. Single oral dose 30-60 minutes before chemo on day 1
  works adequately if 4-day course not feasible. Some protocols use
  5 mg PO daily × 4 days as standard to reduce sedation while
  preserving efficacy (Navari 2016 used 10 mg). Breakthrough CINV
  rescue: 10 mg PO once, then 10 mg daily × 3 days. Bedtime dosing
  preferred to align peak sedation with sleep. Renal: no adjustment.
  Hepatic impairment: start lower (5 mg) and titrate. Pediatric
  ≥6 yrs: 0.1 mg/kg up to 10 mg.
formulations:
  - "Tablet 2.5 mg, 5 mg, 7.5 mg, 10 mg, 15 mg, 20 mg"
  - "Orally disintegrating tablet (ODT, Zyprexa Zydis) 5 mg, 10 mg, 15 mg, 20 mg — useful in active vomiting"
  - "IM injection 10 mg (acute psychosis only; not for routine CINV)"
  - "Long-acting depot IM (Zyprexa Relprevv — psychiatry only, not for CINV)"
absolute_contraindications:
  - "Hypersensitivity to olanzapine"
  - "Narrow-angle glaucoma (uncontrolled)"
  - "Concurrent treatment with parenteral benzodiazepine + IM olanzapine (cardiopulmonary depression, deaths reported)"
  - "Active dementia-related psychosis (FDA boxed warning — increased mortality)"
black_box_warnings:
  - "Increased mortality in elderly patients with dementia-related psychosis (cerebrovascular events, infection)"
  - "Post-injection delirium / sedation syndrome with long-acting IM (Zyprexa Relprevv) — not relevant to oral CINV use"
common_adverse_events:
  - "Sedation / somnolence — ~30-40% (dose-related; mitigated by bedtime dosing and 5 mg dose)"
  - "Increased appetite / weight gain — ~15-25% chronic use; less with 4-day CINV course"
  - "Dry mouth — ~10-15%"
  - "Constipation — ~10-15%"
  - "Orthostatic hypotension — ~5-10%"
  - "Dizziness — ~10%"
  - "Asthenia / fatigue — ~10%"
  - "Akathisia — ~5%"
  - "Hyperglycemia / new-onset diabetes (long-term use; less concern with 4-day CINV course)"
  - "Hyperlipidemia (long-term use)"
  - "Anticholinergic effects (urinary retention, blurred vision)"
  - "Insomnia (paradoxical, ~5%)"
serious_adverse_events:
  - "Neuroleptic malignant syndrome (rare)"
  - "Severe hyperglycemia / DKA (rare with short-term use; more common chronic)"
  - "QT prolongation (modest, dose-dependent)"
  - "Severe orthostatic hypotension with falls"
  - "Tardive dyskinesia (long-term high-dose; not seen with 4-day CINV courses)"
  - "Severe hepatic dysfunction (rare)"
  - "Seizure (lowered threshold; rare)"
  - "Agranulocytosis (very rare)"
major_interactions:
  - "CNS depressants (benzodiazepines, opioids, alcohol, sedating antihistamines): additive sedation — caution especially in elderly and post-op"
  - "Parenteral benzodiazepine + IM olanzapine: CONTRAINDICATED (cardiopulmonary depression, deaths)"
  - "Strong CYP1A2 inducers (carbamazepine, smoking, omeprazole): decrease olanzapine exposure ~50% — may need dose escalation"
  - "Strong CYP1A2 inhibitors (fluvoxamine, ciprofloxacin): increase olanzapine exposure 2-4× — consider dose reduction"
  - "Antihypertensives: additive hypotension"
  - "Anticholinergic drugs: additive anticholinergic burden (constipation, urinary retention, confusion)"
  - "Levodopa / dopamine agonists: olanzapine antagonizes therapeutic effect"
  - "Metoclopramide: additive risk of extrapyramidal symptoms — avoid combination"
pharmacology:
  half_life_hours: 30  # 21-54 h
  clearance: "Hepatic"
  protein_binding_pct: 93
  metabolism: "CYP1A2 (predominant) and UGT1A4 glucuronidation; minor CYP2D6 — multiple DDIs especially with smoking and CYP1A2 inhibitors"
sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-DLBCL-2024
last_reviewed: "2026-04-27"
reviewer_signoffs: []
notes: >
  Adding olanzapine 10 mg PO d1-4 to triple antiemetic prophylaxis
  (NK1 + palonosetron + dex) improves complete-response rate from
  ~66% to ~74% in HEC (Navari NEJM 2016 — pivotal). Equivalent
  efficacy seen with 5 mg dose with substantially less sedation
  (Yanai 2018, Lancet Oncol). Particularly valuable for: AC chemo
  (breast), high-dose cisplatin, BEACOPP, and breakthrough nausea
  refractory to standard triple therapy. Sedation is the principal
  patient-experience barrier — bedtime dosing and 5 mg dose mitigate.
  Avoid combining with metoclopramide (additive EPS) and IM
  benzodiazepines (cardiopulmonary depression). Available as ODT for
  patients with active vomiting. Ukraine: registered, NOT NSZU-
  reimbursed for CINV — patient self-pay (~UAH 200-400 per 4-day
  course); affordable adjunct that materially improves CINV control.
