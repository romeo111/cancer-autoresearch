notes: >
  CTLA-4 irAE pattern differs from PD-1: earlier onset (often within
  first cycle), more colitis, more hypophysitis, less pneumonitis /
  thyroiditis (vs PD-1). Cumulative cycle count rather than ongoing
  exposure drives toxicity (because of long half-life and IgG1
  effector functions); after 4-cycle induction the irAE risk
  trajectory continues for weeks-to-months. Hypophysitis is often
  permanent — patients require lifelong corticosteroid + thyroid
  hormone replacement. Baseline workup before any combo with anti-
  PD-1: TFTs, LFTs, creatinine, cortisol (AM), HbA1c, lipase /
  amylase, troponin if cardiac risk, HBV/HCV, CT chest, dermatologic
  exam. Monitor TFTs / LFTs / creatinine / cortisol before each
  cycle for first 4 cycles then before each nivo dose. Hospitalize
  early and treat aggressively with high-dose IV methylprednisolone
  for any G3-4 irAE; escalate to infliximab / mycophenolate / IVIG /
  ATG for steroid-refractory. Cross-disease entity: ipilimumab is
  used in melanoma (1L combo nivo, adjuvant mono superseded by
  nivo), RCC (1L combo nivo intermediate/poor risk), MSI-H/dMMR
  CRC (combo nivo), HCC (combo nivo post sorafenib), mesothelioma
  (1L combo nivo), NSCLC (1L combo nivo ± chemo), esophageal SCC
  (1L combo nivo). Toxicity-vs-efficacy trade-off favors patients
  with adequate functional reserve and access to skilled irAE
  management.
