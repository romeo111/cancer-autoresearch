id: DRUG-IPILIMUMAB
names:
  preferred: "Ipilimumab"
  ukrainian: "Іпілімумаб"
  english: "Ipilimumab"
  brand_names: ["Yervoy"]
atc_code: L01FX04
rxnorm_id: ""
drug_class: "Anti-CTLA-4 monoclonal antibody (immune checkpoint inhibitor)"
mechanism: >
  Fully human IgG1κ monoclonal antibody targeting cytotoxic
  T-lymphocyte-associated antigen 4 (CTLA-4 / CD152), an inhibitory
  checkpoint receptor expressed on activated T cells and constitutively
  on regulatory T cells (Tregs). By blocking CTLA-4 / B7 (CD80/CD86)
  engagement at the T-cell priming stage in lymph nodes, ipilimumab
  releases an early brake on T-cell activation and expands the
  anti-tumor T-cell repertoire; the IgG1 isotype also depletes
  intratumoral Tregs via Fc-mediated ADCC. Mechanism is
  complementary and non-redundant with anti-PD-1 (which acts at the
  effector phase in the tumor microenvironment), giving clear
  efficacy gains in combination but also markedly increased irAE
  burden. Historical first-in-class ICI (FDA 2011 melanoma — Hodi
  NEJM 2010, first OS-prolonging therapy in metastatic melanoma).
  Pivotal combination trials: CheckMate-067 (nivo+ipi vs nivo vs
  ipi melanoma 1L — 5-yr OS 52% combo, 44% nivo, 26% ipi), CheckMate-
  214 (nivo+ipi vs sunitinib intermediate/poor-risk RCC),
  CheckMate-743 (nivo+ipi mesothelioma 1L), CheckMate-9LA
  (nivo+ipi+chemo NSCLC), CheckMate-9DW (HCC).

