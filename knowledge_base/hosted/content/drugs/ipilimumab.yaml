typical_dosing: >
  Melanoma 1L combo: ipilimumab 3 mg/kg IV over 90 minutes every 3
  weeks × 4 doses + nivolumab 1 mg/kg IV q3w × 4 doses (induction),
  then nivolumab monotherapy 240 mg q2w or 480 mg q4w until
  progression / toxicity / 24 mo. RCC 1L combo: ipilimumab 1 mg/kg +
  nivolumab 3 mg/kg IV q3w × 4 doses, then nivo mono. Mesothelioma /
  MSI-H mCRC / HCC / NSCLC 1L combos: per protocol-specific schedules
  (typically 1 mg/kg q3w or q6w with nivolumab). Adjuvant melanoma
  monotherapy: 10 mg/kg q3w × 4 then q12w up to 3 yr (largely
  superseded by nivolumab adjuvant). No formal renal or hepatic dose
  adjustment (mAb catabolism). Hold for G2-3 irAE; permanently
  discontinue for G4 irAE, myocarditis, recurrent G3 despite
  steroids, or any life-threatening reaction.

formulations:
  - "IV concentrate 5 mg/mL (50 mg / 10 mL or 200 mg / 40 mL single-dose vials)"

absolute_contraindications:
  - "Severe hypersensitivity to ipilimumab or any excipient"
  - "Active autoimmune disease requiring systemic immunosuppression"
  - "Solid-organ transplant on calcineurin inhibitor (high rejection risk)"
  - "Pregnancy"

black_box_warnings:
  - "Severe and fatal immune-mediated adverse reactions — colitis, hepatitis, dermatitis (SJS/TEN), neuropathy, endocrinopathies; can occur during or after ipilimumab; substantially more frequent and more severe than with anti-PD-1 alone"

common_adverse_events:
  - "Fatigue ~40-50%"
  - "Diarrhea ~30-35% (any grade)"
  - "Pruritus ~30%"
  - "Rash ~25-30%"
  - "Nausea ~25%"
  - "Decreased appetite ~20%"
  - "Vomiting ~15%"
  - "Pyrexia ~15%"
  - "Hypothyroidism ~10-15%"
  - "Headache ~15%"
  - "Abdominal pain ~15%"
  - "Hypophysitis ~5-10% (substantially higher than PD-1 mono)"

serious_adverse_events:
  - "Severe colitis with possible perforation (G3+ ~10-15% mono, ~15-20% combo; CTLA-4-typical, often early in course)"
  - "Severe hepatitis (G3+ ALT/AST ~5-10%; can be fatal)"
  - "Hypophysitis with secondary adrenal insufficiency (often permanent — lifelong corticosteroid + thyroid replacement)"
  - "Severe pneumonitis (G3+ ~3-5% combo)"
  - "Immune-mediated nephritis (~1-2%)"
  - "Severe cutaneous reactions (SJS / TEN / DRESS — rare)"
  - "Myocarditis (rare; very high case-fatality — combo with PD-1 increases risk)"
  - "Encephalitis / GBS / myasthenic syndrome / aseptic meningitis"
  - "Solid-organ transplant rejection"
  - "Severe infusion reactions"

major_interactions:
  - "Concurrent anti-PD-1 (nivolumab, pembrolizumab) — intentional combination; toxicity additive (G3+ irAE ~55% combo vs ~15% PD-1 mono)"
  - "Systemic corticosteroids ≥10 mg prednisone-equivalent at baseline — may blunt activity; avoid unless required"
  - "Live attenuated vaccines — contraindicated"
  - "Calcineurin inhibitors / immunosuppressants in transplant — rejection vs efficacy trade-off"
  - "Vemurafenib + ipilimumab — historical combination caused severe hepatotoxicity; avoid concurrent"

pharmacology:
  half_life_hours: 360
  clearance: "non-renal (proteolytic / reticuloendothelial catabolism); ~15 days terminal"
  protein_binding_pct: null
  metabolism: "n/a (mAb catabolism to amino acids)"

sources:
