id: DRUG-NINTEDANIB
names:
  preferred: "Nintedanib"
  ukrainian: "Нінтеданіб"
  english: "Nintedanib"
  brand_names: ["Vargatef", "Ofev"]
atc_code: L01EX09
rxnorm_id: null
drug_class: "Triple angiokinase inhibitor (VEGFR1-3 / PDGFRα-β / FGFR1-3)"
mechanism: >
  Oral multikinase inhibitor blocking VEGFR1-3, PDGFRα/β, and FGFR1-3.
  Anti-angiogenic mechanism complementary to docetaxel cytotoxicity.
  Approved in EU as Vargatef + docetaxel for 2L NSCLC adenocarcinoma
  per LUME-Lung 1; also approved for IPF / progressive fibrosing ILD
  as Ofev (separate indication).

regulatory_status:
  fda: {approved: true}  # IPF only in US; Vargatef NOT FDA-approved for NSCLC
  ema: {approved: true}
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: |
      Зареєстровано в UA (Ofev — IPF/PF-ILD; Vargatef — НДРЛ-аденокарцинома 2L).
      НСЗУ не покриває для NSCLC (out-of-pocket / charity); Ofev для
      IPF — окремий пульмонологічний пакет, не онкологічний.
      Шляхи доступу для NSCLC:
      - Self-pay (Vargatef registered).
      - EAP Boehringer Ingelheim Ukraine.
      Source: drlz.com.ua пошук "nintedanib"/"vargatef"/"ofev" 2026-04-27.

typical_dosing: >
  NSCLC (Vargatef + docetaxel): 200 mg PO BID days 2-21 of each 21-day
  cycle (in combination with docetaxel 75 mg/m² IV day 1).

key_toxicities:
  - Diarrhea (~62% — class effect, manage proactively)
  - Hepatotoxicity (transaminase elevation; LFTs q-cycle)
  - Nausea, vomiting, decreased appetite
  - Bleeding (lower than mAb anti-VEGF agents)
  - Hypertension
  - GI perforation (rare)
  - Thromboembolism

sources: [SRC-NCCN-NSCLC-2025, SRC-ESMO-NSCLC-METASTATIC-2024]
last_reviewed: "2026-04-27"
notes: >
  LUME-Lung 1 (Reck 2014): docetaxel + nintedanib vs docetaxel in 2L NSCLC
  — adenocarcinoma OS benefit (12.6 vs 10.3 mo, HR 0.83); particularly
  active in patients progressing within 9 mo of 1L (mOS 10.9 vs 7.9 mo,
  HR 0.75). Squamous histology no benefit. Oral PO alternative to
  ramucirumab (REVEL) for fit adenocarcinoma 2L.
