id: DRUG-CILTACABTAGENE-AUTOLEUCEL
names:
  preferred: "Ciltacabtagene autoleucel"
  ukrainian: "Цилтакабтаген аутолейцел"
  english: "Ciltacabtagene autoleucel"
  brand_names:
    - "Carvykti"
  synonyms:
    - "cilta-cel"
    - "JNJ-4528"
    - "LCAR-B38M"
atc_code: L01XL07
rxnorm_id: null
drug_class: "BCMA-directed autologous CAR-T cell therapy (4-1BB costimulation; dual-epitope binder)"
mechanism: >
  Autologous T cells transduced with a lentiviral vector encoding a chimeric
  antigen receptor (CAR) that contains two BCMA-targeting heavy-chain-only
  variable domains (VHH) in tandem, a CD8α hinge/transmembrane region, a
  4-1BB costimulatory domain, and a CD3-zeta activation domain. The
  bivalent VHH design improves avidity for B-cell maturation antigen
  (BCMA), expressed on malignant plasma cells. After lymphodepleting
  fludarabine + cyclophosphamide conditioning, a single IV infusion
  produces in vivo expansion + sustained cytotoxicity against BCMA+
  myeloma cells. Approved by FDA Feb 2022 and EMA May 2022 for
  relapsed/refractory multiple myeloma after ≥4 prior lines (CARTITUDE-1)
  and expanded in 2024 to 2L+ R/R MM in lenalidomide-refractory patients
  (CARTITUDE-4).
regulatory_status:
  fda:
    approved: true
    year_first_approval: 2022
    indications_brief:
      - "R/R multiple myeloma after ≥1 prior line including PI + IMiD, lenalidomide-refractory (2L+ since 2024)"
  ema:
    approved: true
    year_first_approval: 2022
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: |
      Не зареєстровано в Україні (Держреєстр ЛЗ — РП відсутнє станом на 2026-04-27).
      CAR-T-терапії проти BCMA не ліцензовані та не реімбурсуються НСЗУ;
      доменне виробництво CAR-T в Україні відсутнє.
      Шляхи доступу:
      - Cross-border (EU/Israel): державне направлення «Лікування за
        кордоном» (наказ МОЗ 988) до EBMT/JACIE-акредитованих центрів
        (Charité Berlin, Karolinska Stockholm, Hôpital Saint-Louis Paris,
        Hadassah Jerusalem). Показання: r/r MM після ≥1 лінії з PI+IMiD,
        len-refractory.
      - EAP J&J / Legend Biotech (compassionate use; одиничні випадки
        через локальний офіс).
      - Trial-only: CARTITUDE-серія, реєстр європейських trial-сайтів.
      Source: drlz.com.ua пошук «ciltacabtagene»/«carvykti» 2026-04-27 —
      РП відсутнє. Орієнтовна вартість USD 450-550K (виробництво +
      лімфодеплеція + ICU + керування пізніми токсичностями).
typical_dosing: >
  Single IV infusion, target dose 0.75 × 10⁶ CAR-positive viable T cells/kg
  (range 0.5-1.0 × 10⁶/kg; cap 1.0 × 10⁸ total CAR+ cells). Administered
  2-5 days after lymphodepleting conditioning: cyclophosphamide 300 mg/m²
  IV daily × 3 days + fludarabine 30 mg/m² IV daily × 3 days
  (days -5 to -3). Tocilizumab on-site (≥2 doses) before infusion is
  mandatory per REMS. No maintenance; single infusion. Bridging therapy
  may be used during the 4-7 week manufacturing window. In patients with
  CrCl 30-59 mL/min, fludarabine reduced to 24 mg/m² × 3 d; cyclophosphamide
  unchanged. Dose hold / delay if active infection, ANC <1,000/µL prior
  to lymphodepletion, or rapidly progressive extramedullary disease
  (consider re-bridging).
formulations:
  - "Cryopreserved autologous CAR-T cell suspension; patient-specific bag (single dose)"
absolute_contraindications:
  - "Active uncontrolled systemic infection at time of lymphodepletion"
  - "Pregnancy and lactation"
  - "Hypersensitivity to fludarabine, cyclophosphamide, or DMSO (cryopreservant)"
  - "Active CNS myeloma or progressive multifocal leukoencephalopathy"
  - "Severe organ dysfunction precluding ICU-level supportive care (NYHA III-IV CHF, FEV1 <50%, dialysis)"
  - "Active hepatitis B (without antiviral prophylaxis), HIV with detectable viral load, or active hepatitis C"
black_box_warnings:
  - "Cytokine release syndrome (CRS) — Grade ≥3 ~5% in CARTITUDE-1 (any-grade ~95%); tocilizumab + ICU support mandatory"
  - "Immune effector cell-associated neurotoxicity syndrome (ICANS) — Grade ≥3 ~9%"
  - "Parkinsonism and other delayed/movement neurotoxicities — distinctive cilta-cel signal (~5-6%); may be delayed weeks-months and fatal"
  - "Guillain-Barré syndrome and cranial nerve palsies (rare but serious)"
  - "Hemophagocytic lymphohistiocytosis / macrophage activation syndrome (HLH/MAS)"
  - "Prolonged and recurrent cytopenias with secondary infections"
  - "Secondary T-cell malignancies (FDA class boxed warning, 2024)"
  - "REMS / FACT-JACIE accreditation required for administration"
common_adverse_events:
  - "CRS, any grade ~95% (median onset day 7; resolution ~4 days)"
  - "Neutropenia, prolonged ~95%"
  - "Anemia ~80%"
  - "Thrombocytopenia ~75%"
  - "Hypogammaglobulinemia, sustained ~90% (lasts months-years)"
  - "ICANS / encephalopathy, any grade ~20%"
  - "Movement / cognitive neurotoxicity (delayed) ~5-6%"
  - "Infection (any) ~58% (bacterial, viral reactivation)"
  - "Fatigue ~50%"
  - "Nausea ~30%"
  - "Headache ~25%"
  - "Pyrexia ~25%"
  - "Hypotension ~25%"
  - "Lymphopenia ~95%"
serious_adverse_events:
  - "Severe CRS Grade ≥3 with hemodynamic collapse / multi-organ failure"
  - "Severe ICANS Grade ≥3 with cerebral edema or seizures"
  - "Delayed parkinsonism / movement disorder (potentially fatal; cilta-cel-specific)"
  - "Hemophagocytic lymphohistiocytosis (HLH/MAS)"
  - "Severe / prolonged cytopenias requiring transfusion + GCSF beyond day 30"
  - "Severe / opportunistic infection (PJP, CMV reactivation, invasive fungal)"
  - "Tumor lysis syndrome (high disease burden)"
  - "Secondary T-cell malignancy (class warning 2024)"
major_interactions:
  - "Concurrent corticosteroids: suppress CAR-T expansion — avoid prophylactic steroids; use only for severe AE management (CRS Grade ≥2 unresponsive to tocilizumab; ICANS Grade ≥2)"
  - "Live vaccines: contraindicated peri-treatment and ≥6-12 months post"
  - "Tocilizumab: paired rescue agent for CRS — must be on-site before infusion"
  - "Granulocyte-colony stimulating factor (G-CSF): avoid in first 21 days post-infusion (may worsen CRS/ICANS); use only for clinically significant neutropenic infection thereafter"
  - "Other lymphotoxic chemotherapy: avoid for ≥3 months post-infusion (impedes CAR persistence)"
  - "Bridging anti-myeloma therapy: permitted during manufacturing window; daratumumab and BCMA-directed prior agents do not preclude eligibility but may impact efficacy"
pharmacology:
  half_life_hours: null
  clearance: "Cellular product — no traditional clearance; in vivo expansion peaks ~13 days post-infusion; persistence variable, CAR transgene detectable median ~100 days, with subset >2 years"
  protein_binding_pct: null
  metabolism: "Living cell therapy — CAR-T cells expand, contract, then a memory pool persists; B-cell aplasia / hypogammaglobulinemia is the surrogate of persistence"
sources:
  - SRC-CARTITUDE-1-BERDEJA-2021
  - SRC-NCCN-MM-2025
  - SRC-ESMO-MM-2023
last_reviewed: "2026-04-27"
reviewer_signoffs: []
notes: >
  Pivotal: CARTITUDE-1 (Berdeja et al., Lancet 2021) — 97 heavily
  pretreated R/R MM patients (median 6 prior lines), ORR 97%, sCR 67%,
  median PFS 34.9 months (longest of any single-agent therapy in this
  population). FDA approval Feb 2022; CARTITUDE-4 (NEJM 2023) shifted
  approval to 2L+ in lenalidomide-refractory patients. Distinctive
  cilta-cel signal: delayed movement disorders (parkinsonism, cranial
  nerve palsies) — incidence ~5-6%, partly mitigated by stricter
  patient selection and aggressive early CRS/ICANS management. Manufacturing
  window 4-7 weeks. Ukraine: NOT registered, NO domestic CAR-T
  manufacturing. Access only via cross-border referral (EBMT/JACIE EU
  centers) under "Лікування за кордоном" (наказ МОЗ 988); approximate
  all-in cost USD 450-550K including manufacturing, lymphodepletion,
  ICU support, and post-CAR-T immunoglobulin replacement / infection
  prophylaxis. Compare to teclistamab (BCMA × CD3 bispecific) — off-the-
  shelf alternative with no manufacturing delay but lower depth/duration
  of response.
