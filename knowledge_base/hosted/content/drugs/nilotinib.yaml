id: DRUG-NILOTINIB
names:
  preferred: "Nilotinib"
  ukrainian: "Нілотиніб"
  english: "Nilotinib"
  brand_names: ["Tasigna"]
atc_code: L01EA03
rxnorm_id: "656656"
drug_class: "BCR-ABL1 TKI (2nd-generation)"
mechanism: >
  Selective TKI of BCR-ABL1 (~30× more potent than imatinib). Active
  against most imatinib-resistant mutations except T315I, V299L, F317L.
  Vascular adverse-event profile (PAOD, MI, stroke) is the dose-limiting
  concern long-term.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: true
    reimbursement_indications:
      - "Хронічна мієлоїдна лейкемія (1L хронічна фаза, 2L після іматинібу)"
    last_verified: "2026-04-27"
typical_dosing: >
  CML chronic phase 1L: 300 mg PO BID on empty stomach (≥1 h before / ≥2 h
  after meals). 2L: 400 mg BID. Strict fasting requirement increases QT
  prolongation if violated.
formulations: ["Capsules 50 / 150 / 200 mg"]

absolute_contraindications:
  - "Hypersensitivity"
  - "Long QT syndrome / baseline QTc >480 ms"
  - "Pregnancy"
  - "Severe hepatic impairment"
black_box_warnings:
  - "QT prolongation, sudden death (boxed)"
  - "Strict fasting requirement"
major_interactions:
  - "QT-prolonging drugs"
  - "Strong CYP3A4 inhibitors / inducers"
  - "PPIs / H2 blockers (avoid)"
common_adverse_events:
  - "Rash"
  - "Headache"
  - "Pruritus"
  - "Nausea"
  - "Hyperglycemia"
  - "Hyperbilirubinemia (Gilbert-like)"
  - "Hyperlipidemia"
serious_adverse_events:
  - "QT prolongation → torsades / sudden death"
  - "Peripheral arterial occlusive disease"
  - "Myocardial infarction / stroke"
  - "Pancreatitis"
  - "Hepatitis"

pharmacology: {half_life: "~17 hours; CYP3A4 substrate"}

sources:
  - SRC-NCCN-MPN-2025
  - SRC-ELN-CML-2020

last_reviewed: "2026-04-25"
notes: >
  Preferred 2nd-gen TKI for younger CML patients without CV risk factors
  targeting deep molecular response + TFR. AVOID in cardiovascular disease
  (PAOD, prior MI, uncontrolled hypertension), pancreatitis history,
  diabetes, hyperlipidemia. Strict fasting requirement is non-trivial
  adherence burden.

notes_patient: >
  Таблетка-TKI 2-го покоління для CML. Приймається натщесерце (за 2 год до та 1 год після їжі). Контролюємо ЕКГ через ризик подовження QT-інтервалу.
