id: DRUG-METOCLOPRAMIDE
names:
  preferred: "Metoclopramide"
  ukrainian: "Метоклопрамід"
  english: "Metoclopramide"
  brand_names:
    - "Reglan"
    - "Cerucal"
    - "Maxolon"
atc_code: A03FA01
rxnorm_id: "6915"
drug_class: "Dopamine D2 receptor antagonist (central + peripheral); 5-HT4 agonist; weak 5-HT3 antagonist (at high dose); prokinetic"
mechanism: >
  Substituted benzamide that antagonizes dopamine D2 receptors centrally
  in the chemoreceptor trigger zone (area postrema) and peripherally in
  the upper GI tract, reducing nausea and accelerating gastric emptying.
  Also a 5-HT4 receptor agonist (potentiating release of acetylcholine
  in the enteric plexus → enhanced peristalsis) and at high doses (≥1
  mg/kg) a weak 5-HT3 antagonist. The prokinetic action distinguishes
  it from pure D2 antagonists and is therapeutically useful for
  chemotherapy-induced gastroparesis, opioid-induced delayed gastric
  emptying, and post-treatment dyspepsia. Approved by FDA in 1979 for
  nausea/vomiting and gastroparesis; widely used as breakthrough
  antiemetic in CINV regimens. Use restricted in 2009 (FDA boxed
  warning) and 2013 (EMA) due to tardive dyskinesia risk with
  prolonged or high-dose use.
regulatory_status:
  fda:
    approved: true
    year_first_approval: 1979
    indications_brief: ["Diabetic gastroparesis (≤12 weeks)", "GERD short-term", "Prevention of postoperative nausea/vomiting", "Breakthrough CINV (off-label primary; on-label as adjunct)"]
  ema:
    approved: true
    year_first_approval: 1985
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: true
    reimbursement_indications:
      - "Симптоматичне лікування нудоти/блювання, у тому числі в онкологічних пацієнтів (breakthrough CINV)"
      - "Прокінетична терапія при гастропарезі"
    last_verified: "2026-04-27"
    notes: "Дешевий та широко доступний у всіх формах (Cerucal generics). Покриття НСЗУ. Тривалість терапії обмежена до ≤5 діб через ризик тардивної дискінезії (EMA 2013, наказ МОЗ України відповідно)."
typical_dosing: >
  Breakthrough CINV (adult): 10-20 mg PO/IV/IM every 4-6 hours as
  needed, max 30 mg/day or 0.5 mg/kg/day for routine use; total
  duration limited to ≤5 days per EMA / FDA restrictions to minimize
  tardive dyskinesia risk. High-dose CINV (historical, pre-5-HT3-
  antagonist era): 1-2 mg/kg IV q2h × 3-5 doses with diphenhydramine
  premed for EPS — now rarely used outside salvage. Renal impairment:
  reduce dose ~50% if CrCl <60 mL/min (renal excretion). Hepatic:
  caution. Pediatric: 0.1 mg/kg PO/IV q6h, max 0.5 mg/kg/day, ≤5
  days. Elderly (>65 yrs): start 5 mg with extended interval (q8h);
  higher tardive dyskinesia risk.
formulations:
  - "Tablet 5 mg, 10 mg"
  - "Oral solution 5 mg / 5 mL"
  - "Orally disintegrating tablet 5 mg, 10 mg"
  - "IV/IM solution 5 mg/mL"
absolute_contraindications:
  - "Hypersensitivity to metoclopramide"
  - "GI obstruction, perforation, or hemorrhage (prokinetic action contraindicated)"
  - "Pheochromocytoma (hypertensive crisis)"
  - "History of tardive dyskinesia or other extrapyramidal disorder from neuroleptics"
  - "Concurrent levodopa or dopamine agonists (mutual antagonism)"
  - "Epilepsy / seizure disorder (lowered threshold)"
  - "Methemoglobinemia (esp. neonates with G6PD deficiency)"
black_box_warnings:
  - "Tardive dyskinesia — irreversible movement disorder risk increases with cumulative exposure and treatment duration; LIMIT to ≤12 weeks chronic / ≤5 days acute use (CINV); higher risk in elderly, women, diabetics"
common_adverse_events:
  - "Drowsiness / sedation — ~10-15%"
  - "Restlessness / akathisia — ~10-15%"
  - "Diarrhea — ~5-10%"
  - "Asthenia / fatigue — ~5-10%"
  - "Dizziness — ~5%"
  - "Headache — ~5%"
  - "Hyperprolactinemia (galactorrhea, menstrual changes, gynecomastia) — chronic use"
  - "Dry mouth — ~3-5%"
  - "Anxiety — ~3-5%"
  - "Insomnia — ~3%"
  - "Constipation (paradoxical, rare) — ~2%"
  - "Mild hypotension or hypertension — ~2-3%"
serious_adverse_events:
  - "Tardive dyskinesia (irreversible; boxed warning) — risk rises with cumulative exposure"
  - "Acute extrapyramidal symptoms (oculogyric crisis, dystonia, parkinsonism) — especially young adults and high-dose IV; treat with diphenhydramine 50 mg IV or benztropine"
  - "Neuroleptic malignant syndrome (rare)"
  - "Severe depression with suicidal ideation"
  - "Hypertensive crisis in undiagnosed pheochromocytoma"
  - "Methemoglobinemia (rare; neonates and G6PD)"
  - "QT prolongation (rare; high-dose IV)"
  - "Seizures (in predisposed patients)"
major_interactions:
  - "Dopamine agonists / levodopa: mutual antagonism — AVOID combination"
  - "Antipsychotics (haloperidol, olanzapine, risperidone): additive EPS / TD risk — AVOID"
  - "MAO inhibitors: hypertensive crisis (catecholamine release)"
  - "CNS depressants (alcohol, opioids, benzodiazepines, sedating antihistamines): additive sedation"
  - "SSRI / SNRI / triptans / fentanyl / tramadol / linezolid: increased serotonin syndrome risk (5-HT4 agonist component)"
  - "Anticholinergic agents and opioid analgesics: antagonize prokinetic effect (slow gastric emptying)"
  - "Cyclosporine, digoxin, mexiletine: prokinetic action alters absorption (cyclosporine increased; digoxin decreased)"
  - "Succinylcholine: metoclopramide inhibits plasma cholinesterase — prolonged neuromuscular blockade"
pharmacology:
  half_life_hours: 5  # 4-6 h; longer with renal impairment
  clearance: "Renal (~85% of dose excreted in urine, ~25% unchanged)"
  protein_binding_pct: 30
  metabolism: "Hepatic sulfation and glucuronidation (minor CYP2D6); largely renal excretion of unchanged drug — adjust for CrCl <60 mL/min"
sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-DLBCL-2024
last_reviewed: "2026-04-27"
reviewer_signoffs: []
notes: >
  Cheap, widely available, fast-acting breakthrough antiemetic for
  CINV unresponsive to first-line 5-HT3 antagonists. Largely supplanted
  by 5-HT3 antagonists for primary CINV prophylaxis since the 1990s
  but retains a niche for: breakthrough nausea, opioid-induced nausea,
  chemotherapy-induced gastroparesis, and post-radiation nausea.
  CRITICAL: total duration limited to ≤5 days for acute use and
  ≤12 weeks for any indication (FDA 2009 boxed warning, EMA 2013) due
  to irreversible tardive dyskinesia risk. Risk highest in elderly,
  women, and diabetics. Acute EPS (oculogyric crisis, dystonia)
  responds to diphenhydramine 50 mg IV or benztropine 1-2 mg IV.
  AVOID combination with metoclopramide + olanzapine (additive EPS /
  TD risk). Ukraine: cheap, ubiquitous, NSZU-covered.
