id: DRUG-BORTEZOMIB
names:
  preferred: "Bortezomib"
  ukrainian: "Бортезоміб"
  english: "Bortezomib"
  brand_names:
  - "Velcade"
atc_code: L01XG01
rxnorm_id: "356733"
drug_class: "proteasome_inhibitor — boronic-acid 26S proteasome inhibitor"
mechanism: >
  Reversibly inhibits the chymotrypsin-like activity of the 26S proteasome,
  causing accumulation of misfolded proteins and ER-stress-mediated
  apoptosis in plasma cells, which are uniquely sensitive due to high
  immunoglobulin synthesis.

regulatory_status:
  fda:
    approved: true
    year_first_approval: 2003
    indications_brief: ["Multiple myeloma (1L, R/R)", "Mantle cell lymphoma"]
  ema:
    approved: true
    year_first_approval: 2004
  ukraine_registration:
    registered: true
    registration_number: "[TBD]"
    reimbursed_nszu: true
    reimbursement_indications:
    - 'Програма медичних гарантій 2026: ММ 1L (VRd, VMP, VTd, VCd)'
    - 'Програма медичних гарантій 2026: МКЛ 1L з R-CHOP-подібними схемами'
    last_verified: "2026-04-27"

    notes: 'Зареєстрований; НСЗУ покриває ММ 1L (всі стандартні режими) та МКЛ 1L. Дженерик доступний з 2017. SC введення — пріоритет (нижчі нейропатії). Джерело: nszu.gov.ua (2026-04).'
typical_dosing: "1.3 mg/m² SC days 1, 4, 8, 11 of 21-day cycle (or weekly schedule day 1, 8, 15, 22 of 28-day cycle)"
formulations:
- "IV/SC powder 3.5 mg vials"

absolute_contraindications:
- "Hypersensitivity to bortezomib, boron, or mannitol"
- "Severe pre-existing peripheral neuropathy (Grade ≥2 with pain)"
black_box_warnings: []
major_interactions:
- "Strong CYP3A4 inhibitors (ketoconazole, ritonavir, clarithromycin) — increase exposure → toxicity"
- "Strong CYP3A4 inducers (rifampin, carbamazepine, St John's wort) — reduce efficacy"
- "Concurrent dexamethasone (intentional, in VRD/VTd) — additive immunosuppression, antiviral prophylaxis mandatory"
- "Live vaccines — contraindicated during therapy"
- "Other neuropathic agents (vincristine, cisplatin) — additive peripheral neuropathy"
common_adverse_events:
- "Peripheral neuropathy (sensory > motor) — ~30% IV grade ≥2; ~14% SC grade ≥2"
- "Thrombocytopenia (cyclical, recovers between cycles) — ~30% grade ≥3"
- "Fatigue — ~50%"
- "GI symptoms (nausea ~40%, diarrhea ~30%, constipation ~25%)"
- "Herpes zoster reactivation — ~10% without prophylaxis; <1% with acyclovir"
- "Anemia — ~25% grade ≥3"
- "Neutropenia — ~20% grade ≥3"
- "Pyrexia — ~25%"
- "Anorexia — ~25%"
- "Injection-site reactions (SC) — ~6%, mild"
- "Hypotension — ~10%"
serious_adverse_events:
- "Severe peripheral neuropathy with pain (dose-limiting; may require discontinuation)"
- "Thrombotic microangiopathy (rare)"
- "Acute pulmonary syndrome / interstitial pneumonitis (rare)"
- "Cardiac failure / arrhythmia / QT prolongation (rare)"
- "Tumor lysis syndrome (high tumor burden)"
- "Hepatic failure (rare)"
- "PML (rare)"

pharmacology:
  half_life_hours: 12  # 9-15 hours, multi-day distribution after first dose
  clearance: "hepatic"
  protein_binding_pct: 83
  metabolism: "CYP3A4 (primary), CYP2C19, CYP1A2 — hepatic oxidation"

sources:
- SRC-NCCN-MM-2025

last_reviewed: "2026-04-26"
reviewers: []
notes: >
  SC administration strongly preferred over IV — equivalent efficacy with
  ~half the rate of grade ≥3 peripheral neuropathy. HSV/VZV prophylaxis
  with acyclovir is mandatory for the duration of therapy.
