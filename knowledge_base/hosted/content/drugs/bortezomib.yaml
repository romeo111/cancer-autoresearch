id: DRUG-BORTEZOMIB
names:
  preferred: "Bortezomib"
  ukrainian: "Бортезоміб"
  english: "Bortezomib"
  brand_names:
    - "Velcade"
atc_code: L01XG01
rxnorm_id: "356733"
drug_class: "Proteasome inhibitor (boronic-acid 26S proteasome inhibitor)"
mechanism: >
  Reversibly inhibits the chymotrypsin-like activity of the 26S proteasome,
  causing accumulation of misfolded proteins and ER-stress-mediated
  apoptosis in plasma cells, which are uniquely sensitive due to high
  immunoglobulin synthesis.

regulatory_status:
  fda:
    approved: true
  ema:
    approved: true
  ukraine_registration:
    registered: true
    registration_number: "[TBD]"
    reimbursed_nszu: true
    reimbursement_indications:
      - "Множинна мієлома (1L та рецидив)"
    last_verified: "2026-04-25"

typical_dosing: "1.3 mg/m² SC days 1, 4, 8, 11 of 21-day cycle (or weekly schedule day 1, 8, 15, 22 of 28-day cycle)"
formulations:
  - "IV/SC powder 3.5 mg vials"

absolute_contraindications:
  - "Hypersensitivity to bortezomib, boron, or mannitol"
  - "Severe pre-existing peripheral neuropathy (Grade ≥2 with pain)"
black_box_warnings: []
major_interactions:
  - "Strong CYP3A4 inhibitors (ketoconazole, ritonavir) increase exposure"
  - "Strong CYP3A4 inducers (rifampin, carbamazepine) reduce efficacy"
common_adverse_events:
  - "Peripheral neuropathy (sensory > motor) — substantially reduced with SC route"
  - "Thrombocytopenia (cyclical, recovers between cycles)"
  - "Fatigue"
  - "GI symptoms (nausea, diarrhea, constipation)"
  - "Herpes zoster reactivation (mandatory antiviral prophylaxis)"
serious_adverse_events:
  - "Severe peripheral neuropathy"
  - "Thrombotic microangiopathy (rare)"
  - "Acute pulmonary syndrome (rare)"
  - "Cardiac failure / arrhythmia (rare)"

pharmacology:
  half_life: "9-15 hours; predominantly hepatic metabolism (CYP3A4, CYP2C19)"

sources:
  - SRC-NCCN-MM-2025

last_reviewed: "2026-04-25"
notes: >
  SC administration strongly preferred over IV — equivalent efficacy with
  ~half the rate of grade ≥3 peripheral neuropathy. HSV/VZV prophylaxis
  with acyclovir is mandatory for the duration of therapy.
