typical_dosing: >
  Standard adult: 200 mg IV q3 weeks OR 400 mg IV q6 weeks (over 30 min).
  Pediatric: 2 mg/kg (up to 200 mg) IV q3w.
  Treatment continued until disease progression, unacceptable toxicity,
  or 24 months in most solid-tumor indications (35 cycles q3w).
  Adjuvant melanoma: 1 year (KEYNOTE-054).
  Neoadjuvant + adjuvant TNBC (KEYNOTE-522): 200 mg q3w × 8 cycles
  with chemo, then 9 cycles adjuvant.
  Neoadjuvant + adjuvant NSCLC (KEYNOTE-671): 200 mg q3w × 4 cycles
  with platinum-doublet, then 13 cycles adjuvant.
  Combination doses unchanged when paired with chemo, lenvatinib,
  axitinib, or trastuzumab.
formulations:
- "IV solution 25 mg/mL (100 mg / 4 mL vial)"

absolute_contraindications:
- "Severe hypersensitivity / anaphylaxis to pembrolizumab"
- "Active autoimmune disease requiring systemic immunosuppression (relative; case-by-case after multidisciplinary review)"
- "Solid organ transplant on immunosuppression (relative; high rejection risk)"
- "Pregnancy (Category D — animal data)"
- "Allogeneic hematopoietic stem cell transplant — high risk of severe GVHD if given pre- or post-HSCT"

black_box_warnings:
- "Severe and fatal immune-mediated adverse reactions (any organ; can occur after discontinuation)"

common_adverse_events:
- "Fatigue (~30-40%)"
- "Pruritus (~20-30%)"
- "Rash / vitiligo (~20%)"
- "Diarrhea (~15-20%; assess for colitis)"
- "Decreased appetite (~15-25%)"
- "Nausea (~15-20%)"
- "Arthralgia (~15-20%)"
- "Hypothyroidism (~10-15%; usually managed with replacement)"
- "Hyperthyroidism (~5%)"
- "Cough (~15%)"
- "Pyrexia (~10%)"
- "Infusion reactions (~3%, usually mild)"

serious_adverse_events:
- "Immune-mediated pneumonitis (~3-5%; Grade 3+ ~1-2%; can be fatal)"
- "Immune-mediated colitis (~2-5%)"
- "Immune-mediated hepatitis (~1-3%)"
- "Immune-mediated endocrinopathies — thyroiditis, hypophysitis, adrenal insufficiency, type 1 diabetes mellitus / DKA"
- "Immune-mediated nephritis with renal dysfunction (~1%)"
- "Severe dermatologic reactions — SJS, TEN, DRESS (rare)"
- "Immune-mediated myocarditis (rare; can be fatal)"
- "Immune-mediated encephalitis, myelitis, Guillain-Barré-like syndrome"
- "Immune-mediated myositis / rhabdomyolysis"
- "Pancreatitis"
- "Severe infusion reactions (rare)"
- "Solid organ transplant rejection"
- "Severe complications of allogeneic HSCT (GVHD, hepatic VOD, fatal)"

major_interactions:
- "Systemic corticosteroids (>10 mg/d prednisone equivalent) — may reduce efficacy if started before pembrolizumab; acceptable for irAE management"
- "Other immunosuppressants — reduce efficacy"
- "Live vaccines — avoid during therapy and up to 3 months after"
- "Other ICIs (especially CTLA-4 like ipilimumab) — additive irAE risk"
- "BRAF/MEK inhibitors — additive hepatotoxicity, pyrexia"

pharmacology:
  half_life_hours: 528
  half_life_notes: "Median t½ ~22 days (528 h). Steady state by ~16 weeks (~4 cycles q3w)."
  clearance: "non-specific catabolism (proteolysis); not renally or hepatically cleared in conventional sense"
  protein_binding_pct:
  metabolism: "non-CYP; antibody catabolism (reticuloendothelial system, target-mediated drug disposition)"
  volume_of_distribution_l: 6

sources:
