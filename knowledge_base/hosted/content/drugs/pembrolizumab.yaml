id: DRUG-PEMBROLIZUMAB
names:
  preferred: "Pembrolizumab"
  ukrainian: "Пембролізумаб"
  english: "Pembrolizumab"
  brand_names: ["Keytruda"]
atc_code: L01FF02
rxnorm_id: "1547545"
drug_class: "Anti-PD-1 humanized IgG4-kappa monoclonal antibody (immune checkpoint inhibitor)"
mechanism: >
  Humanized IgG4 monoclonal antibody binding the programmed cell death
  protein 1 (PD-1) receptor on activated T cells, B cells, and NK cells.
  Blocks the PD-1/PD-L1 and PD-1/PD-L2 interactions, releasing the
  tumor-induced inhibition of cytotoxic T-cell activity and restoring
  anti-tumor immunity. IgG4 backbone minimizes ADCC. Activity correlates
  with tumor PD-L1 expression (CPS or TPS), tumor mutational burden
  (TMB-H ≥10 mut/Mb), microsatellite instability (MSI-H / dMMR), and
  inflamed tumor microenvironment phenotypes. Approved across many
  solid tumors and classical Hodgkin / PMBCL lymphoma.

