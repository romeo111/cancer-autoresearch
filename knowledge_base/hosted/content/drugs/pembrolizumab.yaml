last_reviewed: "2026-04-26"
reviewers: []
notes: >
  Cross-disease entity. ICI-class management protocols apply uniformly:
  baseline TFTs, cortisol, glucose, LFTs, renal panel, troponin if
  combo with CTLA-4 ICI; serial labs every cycle. Grade 2 irAE — hold,
  start prednisone 0.5-1 mg/kg/d; Grade 3-4 — discontinue, prednisone
  1-2 mg/kg/d, escalate to infliximab/MMF/IVIG/tocilizumab if refractory.
  Permanent discontinuation for any Grade 3-4 endocrine event NOT
  required if hormone replacement controls (most can resume). Endpoint
  predictors: PD-L1 CPS / TPS by 22C3 IHC, MSI/dMMR, TMB. PD-L1 cutoff
  varies by indication (TPS ≥1% NSCLC adjuvant, TPS ≥50% NSCLC 1L mono,
  CPS ≥1 gastric, CPS ≥10 cervical / TNBC met).
