    - "NSCLC (1L mono ≥50% TPS, 1L combo, adjuvant + neoadjuvant KEYNOTE-671)"
    - "Head and neck SCC (1L)"
    - "Classical Hodgkin lymphoma (r/r)"
    - "Primary mediastinal B-cell lymphoma"
    - "Urothelial carcinoma"
    - "MSI-H / dMMR solid tumors (tissue-agnostic, KEYNOTE-158/164)"
    - "TMB-H solid tumors (≥10 mut/Mb, tissue-agnostic)"
    - "Gastric / GEJ adenocarcinoma (with chemo, CPS ≥1)"
    - "Esophageal SCC and adenocarcinoma"
    - "Cervical cancer (CPS ≥1)"
    - "Endometrial carcinoma (dMMR; or with lenvatinib, pMMR)"
    - "Hepatocellular carcinoma (2L)"
    - "Renal cell carcinoma (with axitinib or lenvatinib)"
    - "Triple-negative breast cancer (KEYNOTE-522 neoadj, KEYNOTE-355 met PD-L1+)"
    - "Cutaneous SCC, Merkel cell, MCC"
    - "Biliary tract cancer (KEYNOTE-966)"
