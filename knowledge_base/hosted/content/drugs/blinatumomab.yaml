id: DRUG-BLINATUMOMAB
names:
  preferred: "Blinatumomab"
  ukrainian: "Блінатумомаб"
  english: "Blinatumomab"
  brand_names: ["Blincyto"]
atc_code: L01FX07
rxnorm_id: "1597835"
drug_class: "Bispecific T-cell engager (BiTE) — anti-CD19 × anti-CD3"
mechanism: >
  Bispecific single-chain antibody construct binding CD19 on B-cell
  malignancies AND CD3 on T cells, forming an immunological synapse
  that activates polyclonal cytotoxic T-cell killing of CD19+
  blasts. First-in-class BiTE. Approved for MRD+ post-induction
  B-ALL (BLAST trial) AND R/R Ph- and Ph+ B-ALL.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: false
    reimbursed_nszu: false
    last_verified: "2026-04-25"

typical_dosing: >
  R/R B-ALL: cycle 1: 9 µg/day continuous IV infusion days 1-7,
  then 28 µg/day days 8-28 of 42-day cycle. Cycles 2-5: 28 µg/day
  days 1-28. Up to 9 cycles total. MRD+ B-ALL: 28 µg/day continuous
  IV days 1-28 of 42-day cycle, up to 4 cycles. Continuous IV via
  ambulatory infusion pump. Hospitalization recommended for cycle
  1 days 1-9 + cycle 2 days 1-2.

formulations: ["Powder for IV infusion 38.5 µg/vial"]

absolute_contraindications:
  - "Hypersensitivity"
  - "Pregnancy"

black_box_warnings:
  - "Cytokine release syndrome (CRS) — fatal if not managed; Grade ≥3 ~2-15%"
  - "Neurotoxicity (encephalopathy, seizures, ataxia, aphasia) — Grade ≥3 ~10-15%"

major_interactions:
  - "Concurrent dexamethasone given as premedication; otherwise minimal CYP interactions"
  - "Live vaccines: avoid"

common_adverse_events:
  - "Pyrexia"
  - "CRS (variable severity)"
  - "Neurologic events (tremor, headache, encephalopathy)"
  - "Infusion-site reactions"
  - "Cytopenia (less than chemo)"
  - "Infection"
  - "Hypogammaglobulinemia"

serious_adverse_events:
  - "Severe CRS (boxed)"
  - "Severe neurotoxicity (boxed)"
  - "Severe infection / sepsis"
  - "Tumor lysis syndrome"
  - "Pancreatitis (rare)"

pharmacology: {half_life: "~2.1 hours; continuous IV infusion required"}

sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
notes: >
  Pivotal trials: TOWER (R/R Ph- B-ALL phase-3 vs chemo: median OS
  7.7 vs 4.0 mo, HR 0.71); BLAST (MRD+ B-ALL phase-2: MRD response
  78%); ALCANTARA (R/R Ph+ post-TKI). FDA approval Dec 2014; EMA
  Nov 2015. MRD+ indication added 2018. Continuous infusion +
  hospitalization for cycle 1 limit accessibility. Ukraine: NOT
  registered. STUB — pending Co-Lead sign-off.
