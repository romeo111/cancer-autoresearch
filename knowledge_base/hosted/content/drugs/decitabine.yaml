id: DRUG-DECITABINE
names:
  preferred: "Decitabine"
  ukrainian: "Децитабін"
  english: "Decitabine"
  brand_names: ["Dacogen", "Inqovi (oral, with cedazuridine)"]
atc_code: L01BC08
rxnorm_id: "42355"
drug_class: "Hypomethylating agent (cytidine analog)"
mechanism: >
  Deoxyribonucleoside analog of cytidine; incorporated into DNA, irreversibly
  inhibits DNA methyltransferases at low doses, cytotoxic at higher doses.
  Alternative to azacitidine for MDS-HR and AML; oral formulation Inqovi
  (decitabine+cedazuridine) approved for MDS.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: true
    last_verified: "2026-04-27"

    reimbursement_indications:
    - 'Програма медичних гарантій 2026: МДС високого ризику (IPSS Int-2/High) — терапія 1L'
    - 'Реімбурсаційний пакет «Онкологія» 2026: ГМЛ у пацієнтів старше 65 років, непридатних до інтенсивної ХТ'
    notes: 'Зареєстрований; НСЗУ покриває МДС-HR та ГМЛ unfit (моно або комбо з venetoclax). Симетрично з azacitidine. Джерело: nszu.gov.ua (2026-04).'
typical_dosing: >
  IV 20 mg/m²/day × 5 days every 28-day cycle (most common). 10-day schedule
  (20 mg/m² days 1-10) historically used in elderly AML but largely replaced
  by ven+aza. Inqovi: 35 mg decitabine + 100 mg cedazuridine PO once daily
  days 1-5 q28d.
formulations: ["IV powder 50 mg vial", "Inqovi oral tablets 35 mg / 100 mg"]

absolute_contraindications:
- "Hypersensitivity to decitabine"
- "Pregnancy / breastfeeding"
black_box_warnings: []
major_interactions: []
common_adverse_events:
- "Cytopenias (predictable, recovery in cycles 2-3)"
- "Febrile neutropenia"
- "Fatigue"
- "Nausea"
serious_adverse_events:
- "Severe myelosuppression"
- "Sepsis / pneumonia"

pharmacology: {half_life: "~30-40 minutes IV"}

sources:
- SRC-NCCN-AML-2025
- SRC-ESMO-MDS-2021

last_reviewed: "2026-04-25"
notes: >
  Functionally equivalent to azacitidine for HMA-naive MDS-HR; selection
  often based on local availability and reimbursement. Some retrospective
  data favor decitabine for TP53-mutated AML/MDS but no head-to-head RCT.
  Oral Inqovi simplifies MDS administration.

notes_patient: >
  Hypomethylating agent: «перезавантажує» епігенетику пухлинних клітин при MDS і AML. Вводиться внутрішньовенно курсами. Зазвичай переноситься легше за класичну хіміотерапію.
