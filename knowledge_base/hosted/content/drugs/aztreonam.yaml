id: DRUG-AZTREONAM
names:
  preferred: "Aztreonam"
  ukrainian: "Азтреонам"
  english: "Aztreonam"
  brand_names:
    - "Azactam"
    - "Cayston"
atc_code: J01DF01
rxnorm_id: "1359"
drug_class: "Monobactam β-lactam antibiotic (Gram-negative only; aerobic coverage including Pseudomonas)"
mechanism: >
  Synthetic monocyclic β-lactam antibiotic that binds penicillin-
  binding protein 3 (PBP-3) of aerobic Gram-negative bacilli with
  high affinity, inhibiting cell-wall synthesis and producing
  bactericidal effect. Activity narrowly restricted to aerobic
  Gram-negative bacteria including Pseudomonas aeruginosa,
  Enterobacterales (most), Haemophilus, Neisseria. NO activity
  against Gram-positive bacteria, anaerobes, atypicals. Unique
  monobactam structure does NOT cross-react with penicillin or
  cephalosporin antibodies in IgE-mediated hypersensitivity, making
  aztreonam the preferred Gram-negative β-lactam for patients with
  documented severe penicillin allergy (including anaphylaxis). The
  exception is ceftazidime, which shares the aminothiazolyl side
  chain — patients with confirmed ceftazidime hypersensitivity may
  also react to aztreonam. FDA-approved 1986.
regulatory_status:
  fda:
    approved: true
    year_first_approval: 1986
    indications_brief:
      - "Gram-negative infections in penicillin-allergic patients (UTI, lower respiratory, septicemia, skin/skin-structure, intra-abdominal in combination, gynecologic)"
      - "Empirical Gram-negative coverage in febrile neutropenia with severe penicillin allergy (combined with vancomycin for Gram-positive coverage and metronidazole for anaerobic)"
      - "Inhaled aztreonam (Cayston) for chronic Pseudomonas in cystic fibrosis"
  ema:
    approved: true
    year_first_approval: 1990
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: true
    reimbursement_indications:
      - "Гр(-) інфекції у пацієнтів з тяжкою алергією до пеніциліну (анафілаксія в анамнезі)"
      - "Емпірична FN-терапія при confirmed серйозній алергії до бета-лактамів"
    last_verified: "2026-04-27"
    notes: "Зареєстровано в Україні (Azactam generics). Покриття НСЗУ для документованих penicillin-алергічних пацієнтів. Резервний препарат — обмежене застосування. Перевірено drlz.com.ua 2026-04-27."
typical_dosing: >
  Severe Gram-negative infection / FN (adult): 2 g IV every 6-8 hours
  via 30-min infusion. Pediatric: 30 mg/kg IV q6-8h, max 2 g per dose;
  cystic fibrosis chronic suppression 50 mg/kg q6h. Renal adjustment
  required: CrCl 10-30 → 50% dose reduction (e.g., 1 g q6-8h); CrCl
  <10 → 25% of usual dose (e.g., 500 mg q6-8h); hemodialysis → 500 mg
  q6-8h with extra 12.5% of initial dose after each dialysis session;
  CRRT → 1 g q8h. Hepatic: no adjustment. Duration in FN combination:
  per source / syndrome, typically 7-14 days. CRITICAL pairing in
  penicillin-allergic FN: aztreonam (Gram-negative) + vancomycin (Gram-
  positive) ± metronidazole (anaerobic) covers approximately the same
  spectrum as pip-tazo monotherapy but spares penicillin cross-
  reactivity.
formulations:
  - "IV/IM powder for reconstitution: 500 mg, 1 g, 2 g vials"
  - "Inhaled (Cayston) 75 mg/vial nebulized solution (CF only)"
absolute_contraindications:
  - "Hypersensitivity to aztreonam"
  - "Documented severe immediate hypersensitivity to ceftazidime (shared aminothiazolyl side chain)"
black_box_warnings: []
common_adverse_events:
  - "Local infusion-site reaction / phlebitis — ~3-5%"
  - "Rash (maculopapular) — ~2-5%"
  - "Diarrhea — ~3-5%"
  - "Nausea / vomiting — ~3%"
  - "Pruritus — ~2-3%"
  - "Mild transaminitis — ~3-5%"
  - "Eosinophilia — ~3-5%"
  - "Thrombocytosis (mild) — ~1-3%"
  - "Hypotension (with rapid infusion) — ~1-3%"
  - "Nasal congestion (inhaled formulation) — ~5-10%"
  - "Cough (inhaled formulation) — ~5-10%"
  - "Abdominal cramping — ~1-3%"
  - "Vaginal candidiasis — ~1-2%"
serious_adverse_events:
  - "Severe immediate hypersensitivity / anaphylaxis (rare; can occur even in penicillin-allergic patients despite generally low cross-reactivity)"
  - "Stevens-Johnson syndrome / toxic epidermal necrolysis (rare)"
  - "DRESS syndrome (rare)"
  - "Clostridioides difficile colitis"
  - "Severe hepatic dysfunction / cholestasis (rare)"
  - "Hematologic suppression — neutropenia, thrombocytopenia (rare; usually after prolonged use)"
  - "Acute interstitial nephritis (rare)"
  - "Bronchospasm (inhaled formulation)"
major_interactions:
  - "Aminoglycosides: chemical incompatibility in same line — administer separately; clinically synergistic in serious Pseudomonas infection"
  - "Probenecid: reduces aztreonam renal clearance — increased exposure"
  - "Furosemide: minor pharmacokinetic effect; clinically not significant"
  - "Live vaccines (oral typhoid, BCG): antibacterial activity may inactivate vaccine"
  - "Oral contraceptives: theoretical reduced efficacy via gut flora — additional contraception advised"
  - "Warfarin: variable INR effect (gut flora) — monitor"
  - "Cefazolin and other cephalosporins: no clinically significant interaction"
  - "Anticoagulants (heparin): physical incompatibility in IV line — separate access"
pharmacology:
  half_life_hours: 2  # ~1.5-2 hours; up to 6 hours in renal failure
  clearance: "Renal (~70% excreted unchanged in urine)"
  protein_binding_pct: 56
  metabolism: "Minimal hepatic metabolism; predominantly renal excretion of unchanged drug — adjust dose for CrCl <30"
sources:
  - SRC-NCCN-BCELL-2025
  - SRC-NCCN-MM-2025
last_reviewed: "2026-04-27"
reviewer_signoffs: []
notes: >
  Niche but essential agent for documented severe penicillin allergy
  (anaphylaxis, SJS, DRESS) in patients requiring Gram-negative
  coverage — particularly in febrile neutropenia where the standard
  pip-tazo / cefepime / meropenem options are excluded. Standard FN
  regimen for severe penicillin allergy: aztreonam 2 g IV q8h +
  vancomycin (MRSA + Gram-positive coverage) + metronidazole 500 mg
  IV q8h (anaerobic coverage if intra-abdominal source). Note the
  ceftazidime cross-reactivity caveat (shared aminothiazolyl side
  chain) — confirm allergy history specifically asks about
  ceftazidime. For most labeled "penicillin allergy" patients without
  severe immediate-type reactions, modern allergy de-labeling protocols
  with skin testing or graded challenge can restore access to standard
  β-lactams; allergy consultation often warranted before defaulting to
  aztreonam-based regimens. Ukraine: registered, NSZU-covered for
  documented severe β-lactam allergy.
