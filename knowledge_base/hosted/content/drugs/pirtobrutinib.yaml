id: DRUG-PIRTOBRUTINIB
names:
  preferred: "Pirtobrutinib"
  ukrainian: "Піртобрутиніб"
  english: "Pirtobrutinib"
  brand_names:
    - "Jaypirca"
atc_code: L01EL04
rxnorm_id: "2596549"
drug_class: "Non-covalent (reversible) BTK inhibitor"
mechanism: >
  Highly selective non-covalent reversible inhibitor of BTK that binds
  the kinase via a distinct mechanism not requiring the C481 cysteine
  residue. Retains activity against BTK-C481S/R mutations that confer
  resistance to covalent BTK inhibitors (ibrutinib, acalabrutinib,
  zanubrutinib). Preserves activity in TP53-mutated CLL where
  conventional chemoimmunotherapy fails.

regulatory_status:
  fda:
    approved: true
  ema:
    approved: true
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-25"
    notes: "Not registered in Ukraine. Off-label / clinical-trial / charitable / out-of-pocket access only — major access barrier for post-cBTKi resistant patients."

typical_dosing: "200 mg PO once daily, continuous until progression or unacceptable toxicity"
formulations:
  - "Tablet 50 mg / 100 mg"

absolute_contraindications:
  - "Hypersensitivity"
black_box_warnings: []
major_interactions:
  - "Strong CYP3A4 inhibitors / inducers: reduce / avoid (similar to covalent BTKis)"
  - "Anticoagulants + antiplatelets: bleeding risk persists (class effect)"
common_adverse_events:
  - "Fatigue"
  - "Diarrhea"
  - "Neutropenia"
  - "Anemia, thrombocytopenia"
  - "Bruising / minor bleeding"
  - "Cough"
  - "COVID-19 / respiratory infection"
serious_adverse_events:
  - "Major hemorrhage (lower than ibrutinib but present)"
  - "Atrial fibrillation (lower rate than ibrutinib)"
  - "Severe infection"
  - "Second primary malignancies"
  - "Hepatic failure (rare)"

pharmacology:
  half_life: "~19 hours"

sources:
  - SRC-NCCN-BCELL-2025

last_reviewed: "2026-04-25"
notes: >
  BRUIN trial (Mato 2023): in r/r CLL/SLL after prior cBTKi (median 3
  prior lines), ORR 73%; among BTK-C481-mutated subset ORR ~71%.
  Approved for r/r CLL/SLL after ≥2 prior lines including cBTKi + BCL2i,
  AND for r/r mantle cell lymphoma after ≥2 prior lines including cBTKi.
  Distinct binding mechanism overcomes C481-mutated resistance — primary
  rationale for use. Cardiac safety profile better than ibrutinib (afib
  ~3% vs 7-15%) but bleeding risk persists. Major UA access barrier:
  not registered.
