id: DRUG-ISATUXIMAB
names:
  preferred: "Isatuximab"
  ukrainian: "Ісатуксімаб"
  english: "Isatuximab"
  brand_names:
    - "Sarclisa"
atc_code: L01FC02
rxnorm_id: "[TBD]"
drug_class: "monoclonal_antibody — anti-CD38 IgG1κ (chimeric, mouse-human)"
mechanism: >
  Binds a distinct, allosteric epitope on CD38 (different from
  daratumumab's binding site) on plasma cells and other CD38+
  populations. Induces myeloma cell death through complement-dependent
  cytotoxicity (CDC), antibody-dependent cellular cytotoxicity (ADCC),
  antibody-dependent cellular phagocytosis (ADCP), direct apoptosis
  (Fc-independent — distinguishes from daratumumab), and
  immunomodulation via depletion of CD38+ regulatory T-cells and
  inhibition of CD38 enzymatic activity (NAD+/cADPR axis). Cross-
  reactivity with daratumumab is partial — clinical activity has been
  observed after daratumumab failure in some patients but the two
  agents are treated as the same effective class for sequencing
  purposes (one-shot anti-CD38 line per CHARTER hierarchy).

regulatory_status:
  fda:
    approved: true
    year_first_approval: 2020
    indications_brief:
      - "Relapsed/refractory multiple myeloma in combination with pomalidomide + dexamethasone (Isa-Pd) after ≥2 prior lines including lenalidomide and a proteasome inhibitor (ICARIA-MM)"
      - "Relapsed/refractory multiple myeloma in combination with carfilzomib + dexamethasone (Isa-Kd) after 1-3 prior lines (IKEMA)"
      - "Newly-diagnosed multiple myeloma not eligible for ASCT in combination with bortezomib + lenalidomide + dexamethasone (Isa-VRd; IMROZ 2024 — added 2024)"
  ema:
    approved: true
    year_first_approval: 2020
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: |
      Не зареєстровано в UA (Держреєстр ЛЗ — РП відсутнє станом на 2026-04-27).
      Anti-CD38 mAb для r/r MM (з pomalidomide/dex або carfilzomib/dex)
      та NDMM (IMROZ); не входить до НСЗУ. (Даратумумаб у НСЗУ для MM —
      ісатуксимаб ні).
      Шляхи доступу:
      - Named-patient import (DEC спецдозвіл) — за рахунок пацієнта.
      - EAP Sanofi Ukraine (Sarclisa access program — критерії: r/r MM
        ≥1 prior line, lenalidomide/PI-refractory).
      - Cross-border (EU): EU гематоцентри через "Лікування за кордоном"
        (наказ МОЗ 988); EMA-затверджено 2020 (Isa-Pd, Isa-Kd).
      - Trial-only: ICARIA, IKEMA, IMROZ post-marketing.
      Source: drlz.com.ua пошук "isatuximab"/"sarclisa" 2026-04-27 — РП відсутнє.

typical_dosing: >
  IV: 10 mg/kg every week during cycle 1 (4 doses), then every 2 weeks
  from cycle 2 onward. Cycle length 28 days. Pre-medication mandatory
  before each infusion: dexamethasone (40 mg PO or IV — also part of
  combination), acetaminophen 650-1000 mg PO, diphenhydramine 25-50 mg
  IV/PO, H2 blocker (ranitidine or famotidine), and montelukast 10 mg
  PO (optional, reduces IRRs). Infusion durations: first dose 3-4 hours
  with rate escalation; subsequent doses 75-90 minutes if first dose
  tolerated. IV-only — no SC formulation available (contrast with
  daratumumab Faspro).
formulations:
  - "IV concentrate 100 mg / 5 mL single-dose vial"
  - "IV concentrate 500 mg / 25 mL single-dose vial"

absolute_contraindications:
  - "Severe hypersensitivity to isatuximab or any excipient"
black_box_warnings:
  - "Hepatitis B virus reactivation — class effect for anti-CD38 monoclonal antibodies; screen HBsAg + anti-HBc total before first dose; entecavir (or tenofovir if entecavir resistance) prophylaxis if HBsAg+ or anti-HBc+; monitor HBV-DNA periodically through therapy and ≥6 months after last dose"
major_interactions:
  - "Interferes with serologic blood crossmatch (indirect Coombs / IAT — pan-positive against panel cells via anti-CD38 binding to red-cell CD38) — type and screen + extended red-cell phenotype (or genotype) BEFORE first dose; communicate to blood bank that patient is on anti-CD38 mAb (effect persists ~6 months after last dose)"
  - "Interferes with serum protein electrophoresis / immunofixation — IgG-kappa band may be mistaken for residual M-protein (especially in IgG-kappa myeloma); IFE-DIRA (daratumumab-specific reflex; also detects isatuximab) helpful to distinguish"
  - "Live attenuated vaccines — contraindicated during therapy and for ≥3 months after last dose"
  - "Concurrent dexamethasone / pomalidomide / carfilzomib / lenalidomide / bortezomib (intentional combinations) — additive infection risk; HSV/VZV prophylaxis (acyclovir) and PJP prophylaxis (TMP-SMX or atovaquone) required"
common_adverse_events:
  - "Infusion-related reactions — first-dose ~32% (vs ~50% for IV daratumumab); ~95% of IRRs occur during the first infusion; mostly grade 1-2 (chills, nausea, dyspnea, hypertension/hypotension)"
  - "Neutropenia — ~50% all-grade; ~25-35% grade ≥3 (combination-dependent; higher with Pd backbone)"
  - "Thrombocytopenia — ~15-20% grade ≥3"
  - "Anemia — ~30% all-grade"
  - "Fatigue — ~30%"
  - "Upper respiratory tract infection — ~30%"
  - "Diarrhea — ~25%"
  - "Pneumonia — ~15-20%"
  - "Nausea — ~15%"
  - "Dyspnea — ~15%"
serious_adverse_events:
  - "Severe infusion reaction (anaphylaxis, bronchospasm, laryngeal edema) — first dose ~1-3% grade ≥3; stop infusion, supportive care; permanent discontinuation for grade 4"
  - "Hepatitis B reactivation — fulminant hepatitis possible (BBW); class effect"
  - "Severe infections (pneumonia, sepsis) — ~20-25% grade ≥3 over therapy course (combination-dependent)"
  - "Second primary malignancies — observed in long-term follow-up of combination regimens (lenalidomide / pomalidomide co-contribution)"
  - "Tumor lysis syndrome (rare, high-burden MM)"
  - "Hemolysis from interference with crossmatch (technical, not biologic — still risks transfusion delay)"

pharmacology:
  half_life_hours: 672  # ~28 days at steady state (target-mediated; accumulation through cycles 1-2)
  clearance: "non-renal (saturable target-mediated disposition + reticuloendothelial catabolism); clearance decreases over treatment as CD38+ tumor burden depletes"
  protein_binding_pct: null  # not applicable — monoclonal antibody
  metabolism: "non-CYP; catabolized to amino acids via reticuloendothelial proteolysis; no renal or hepatic dose adjustment required"

sources:
  - SRC-NCCN-MM-2025
  - SRC-ESMO-MM-2023

last_reviewed: "2026-04-27"
reviewers: []
notes: >
  Clinical positioning: anti-CD38 mAb in the same class as daratumumab.
  Two are not concurrently used; choice driven by access, infusion
  tolerance (lower first-dose IRR with isatuximab), and combination
  partner. Distinct epitope rationale supports salvage activity after
  daratumumab failure in selected cases (limited evidence; not
  protocol-default).

  Primary trials (citations TBD — see flag in final report):
  - ICARIA-MM (Attal et al., Lancet 2019) — Isa-Pd vs Pd in
    relapsed/refractory MM, ≥2 prior lines: PFS 11.5 vs 6.5 months
    (HR 0.596).
  - IKEMA (Moreau et al., Lancet 2021) — Isa-Kd vs Kd in
    relapsed/refractory MM, 1-3 prior lines: PFS not reached vs 19.2
    months (HR 0.531); deeper MRD-negativity.
  - IMROZ (Facon et al., NEJM 2024) — Isa-VRd vs VRd in
    transplant-ineligible newly-diagnosed MM: PFS benefit (HR ~0.60).

  Reimbursement under НСЗУ in Ukraine: NOT in place — same access
  constraint as daratumumab. Patients selected for any isatuximab-
  containing combination need a documented funding pathway (clinical
  trial, charitable scheme, or out-of-pocket).

  HBV screening (HBsAg + anti-HBc) mandatory before first dose;
  entecavir prophylaxis if HBsAg+ or anti-HBc+ (BBW). Type and screen
  for red-cell antibodies + extended phenotype BEFORE first dose to
  avoid anti-CD38 interference with crossmatching (effect persists
  ~6 months after last dose).

  Pivotal trials and clinical positioning summarized above. Class
  positioning: anti-CD38 mAb in same class as daratumumab; choice
  driven by access, infusion tolerance (lower first-dose IRR with
  isatuximab), and combination partner. Distinct epitope rationale
  supports salvage activity after daratumumab failure in selected
  cases (limited evidence; not protocol-default — anti-CD38
  generally treated as one-shot class line per CHARTER hierarchy).

notes_patient: >
  Препарат-мітка для клітин мієломи (через CD38, як і daratumumab). Допомагає імунній системі їх знищити. Вводиться внутрішньовенно у складі багатокомпонентних схем.
