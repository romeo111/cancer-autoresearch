id: DRUG-LORAZEPAM
names:
  preferred: "Lorazepam"
  ukrainian: "Лоразепам"
  english: "Lorazepam"
  brand_names:
    - "Ativan"
    - "Temesta"
atc_code: N05BA06
rxnorm_id: "6470"
drug_class: "Intermediate-acting benzodiazepine (GABA-A positive allosteric modulator)"
mechanism: >
  Binds the benzodiazepine site on GABA-A receptors, increasing the
  frequency of chloride channel opening upon GABA binding and producing
  hyperpolarization of neurons in cortical, limbic, and brainstem
  pathways. Therapeutic effects in oncology supportive care:
  anticipatory chemotherapy-induced nausea/vomiting (CINV) — where
  conditioned anxiety triggers nausea before chemo administration —
  and management of acute anxiety, insomnia, and agitation in
  hospitalized cancer patients. Also used as an anticonvulsant for
  seizure rescue (high-dose chemotherapy, ifosfamide encephalopathy,
  CNS metastases) and as an adjunct to multi-receptor antiemetic
  regimens for refractory CINV. Approved by FDA September 1977.
regulatory_status:
  fda:
    approved: true
    year_first_approval: 1977
    indications_brief: ["Anxiety disorders", "Acute anxiety / agitation", "Status epilepticus and acute seizure rescue", "Anticipatory CINV (off-label primary; on-label adjunct)", "Pre-procedural sedation"]
  ema:
    approved: true
    year_first_approval: 1980
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: true
    reimbursement_indications:
      - "Тривога і ажитація"
      - "Анксіолітична / антиеметична premedication при хіміотерапії, особливо anticipatory CINV"
      - "Конвульсивні стани (статус епілептикус, рятувальна терапія)"
    last_verified: "2026-04-27"
    notes: "Контрольований препарат (психотропний список III в Україні). Зареєстровано (Lorafen, Ativan generics). Покриття НСЗУ для невідкладних та психіатричних показань. Виписується на спеціальному рецепті."
typical_dosing: >
  Anticipatory CINV: 0.5-2 mg PO/SL the night before chemotherapy and
  again 1-2 hours before chemo on day 1; can repeat 0.5-1 mg q6-8h on
  day 1 if needed. Acute breakthrough anxiety / agitation: 0.5-2 mg
  PO / IV / IM, repeat q6-8h as needed. Status epilepticus / acute
  seizure rescue: 4 mg IV slow push (over 2-5 min), may repeat once
  in 5-10 min if no response. Geriatric / debilitated: start 0.5 mg.
  Renal: no major adjustment (non-renal clearance). Hepatic: caution
  in severe impairment but glucuronidation pathway preserved better
  than for diazepam (preferred BZD in liver dysfunction). Pediatric:
  0.05 mg/kg/dose IV/PO (max 2 mg) for anxiety; 0.1 mg/kg IV (max
  4 mg) for status. Limit duration to manage dependence risk: ≤4
  weeks continuous use, then taper.
formulations:
  - "Tablet 0.5 mg, 1 mg, 2 mg"
  - "Oral concentrate 2 mg/mL"
  - "Sublingual tablet 0.5 mg, 1 mg, 2 mg"
  - "IV/IM solution 2 mg/mL, 4 mg/mL"
absolute_contraindications:
  - "Hypersensitivity to lorazepam or any benzodiazepine"
  - "Acute narrow-angle glaucoma"
  - "Severe respiratory insufficiency (relative; absolute if uncompensated)"
  - "Sleep apnea syndrome (severe)"
  - "Myasthenia gravis"
  - "Concurrent strong opioids without monitored care setting (FDA boxed warning)"
  - "Severe hepatic impairment (relative; preferred BZD if needed but reduce dose)"
black_box_warnings:
  - "Concomitant use with opioids may result in profound sedation, respiratory depression, coma, and death; reserve combination for patients in whom alternatives are inadequate; use lowest effective doses and shortest durations"
  - "Risks from abuse, misuse, and addiction (Schedule IV controlled substance US; equivalent in EU/UA) — physical dependence within ~4 weeks of regular use; abrupt discontinuation can precipitate withdrawal seizures"
common_adverse_events:
  - "Sedation / drowsiness — ~15-25%"
  - "Dizziness / unsteadiness — ~10-15%"
  - "Asthenia / fatigue — ~5-10%"
  - "Ataxia — ~5-10% (especially elderly)"
  - "Confusion / memory impairment — ~5-10% (especially elderly)"
  - "Anterograde amnesia (for events after dosing) — common, dose-dependent"
  - "Headache — ~5%"
  - "Dry mouth — ~3-5%"
  - "Constipation — ~3-5%"
  - "Nausea (paradoxical) — ~3%"
  - "Hypotension (mild) — ~3%"
  - "Disinhibition / paradoxical agitation — ~1-3% (esp. elderly, pediatric)"
serious_adverse_events:
  - "Respiratory depression (especially with concurrent opioids — boxed warning)"
  - "Severe sedation / coma in opioid co-use"
  - "Profound hypotension (with rapid IV push)"
  - "Withdrawal seizures upon abrupt discontinuation after >4 weeks regular use"
  - "Falls and fractures in elderly"
  - "Paradoxical reactions (rage, agitation, hostility) — esp. elderly and pediatric"
  - "Suicidal ideation (rare)"
  - "Anaphylaxis (very rare)"
major_interactions:
  - "Opioids (fentanyl, morphine, methadone, oxycodone): boxed warning — profound sedation, respiratory depression, death; if combination unavoidable, lowest doses + monitored setting"
  - "CNS depressants (alcohol, antihistamines, sedating antidepressants, antipsychotics, anticonvulsants): additive sedation"
  - "Other benzodiazepines and Z-drugs (zolpidem, zopiclone): avoid combination"
  - "Probenecid: increases lorazepam exposure ~50% — reduce dose"
  - "Valproate: increases lorazepam exposure — reduce dose ~50%"
  - "Theophylline: antagonizes sedation"
  - "Clozapine: severe sedation, hypotension, respiratory arrest with combination"
  - "HIV protease inhibitors (ritonavir): minimal interaction with lorazepam (glucuronidation pathway) — major advantage over diazepam in HIV / liver disease"
pharmacology:
  half_life_hours: 14  # 10-20 h
  clearance: "Hepatic (glucuronidation by UGT2B7)"
  protein_binding_pct: 91
  metabolism: "Glucuronidation (Phase II) — no active metabolites; preserved in mild-moderate hepatic impairment, making lorazepam preferred BZD in liver dysfunction"
sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-DLBCL-2024
last_reviewed: "2026-04-27"
reviewer_signoffs: []
notes: >
  Standard agent for anticipatory CINV (conditioned nausea triggered
  by sights/smells of chemotherapy unit prior to actual administration)
  — addresses anxiety component that pure 5-HT3 / NK1 antagonists do
  not. Also valuable as adjunct in refractory CINV regimens. Sublingual
  formulation onset ~15-30 min, useful for breakthrough anxiety and
  in patients unable to swallow. Glucuronidation metabolism (no active
  metabolites) makes lorazepam the preferred benzodiazepine in
  patients with hepatic impairment, elderly, or on multiple CYP-
  interacting medications. KEY SAFETY: opioid co-administration is
  boxed-warning (profound sedation, respiratory depression, death) —
  in cancer patients receiving both, monitor closely and use lowest
  effective doses; never bolus IV lorazepam in opioid-naive patients
  without airway management capability. Schedule IV controlled
  substance (US/UA equivalent психотропний контроль).
