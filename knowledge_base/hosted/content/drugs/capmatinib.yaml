id: DRUG-CAPMATINIB
names:
  preferred: "Capmatinib"
  ukrainian: "Капматініб"
  english: "Capmatinib"
  brand_names: ["Tabrecta"]
atc_code: L01EX17
rxnorm_id: null
drug_class: "MET-selective TKI"
mechanism: >
  Selective inhibitor of MET (c-MET) tyrosine kinase. GEOMETRY mono-1: ORR ~68% in 1L MET ex14-mutant NSCLC.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: false
    reimbursed_nszu: false
    last_verified: null
    notes: "Not registered in Ukraine. Off-label access."

typical_dosing: >
  400 mg PO BID with food.

key_toxicities:
  - Peripheral edema
  - Nausea
  - Fatigue
  - Hepatotoxicity
  - Pneumonitis (rare)

sources: [SRC-NCCN-NSCLC-2025, SRC-ESMO-NSCLC-METASTATIC-2024]
last_reviewed: null
notes: >
  Indicated for MET ex14 skipping mutation NSCLC. Tepotinib alternative.
