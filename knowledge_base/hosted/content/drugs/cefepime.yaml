id: DRUG-CEFEPIME
names:
  preferred: "Cefepime"
  ukrainian: "Цефепім"
  english: "Cefepime"
  brand_names:
    - "Maxipime"
    - "Maxcef"
atc_code: J01DE01
rxnorm_id: "20481"
drug_class: "Fourth-generation cephalosporin (extended Gram-negative + Gram-positive coverage; AmpC stable)"
mechanism: >
  Zwitterionic fourth-generation cephalosporin that rapidly penetrates
  the outer membrane of Gram-negative bacteria via porin channels
  and binds penicillin-binding proteins (PBP-3 primarily), inhibiting
  bacterial cell-wall synthesis with bactericidal effect. Stable
  against AmpC β-lactamases (chromosomal, common in Enterobacter,
  Citrobacter, Serratia, Proteus indole-positive — "ESCAPPM" / SPACE
  organisms) and most Gram-positive PBP-2a, but hydrolyzed by ESBLs
  and KPC carbapenemases. Excellent activity vs Pseudomonas
  aeruginosa, Enterobacterales, methicillin-susceptible
  staphylococci, streptococci. Limited anaerobic coverage (no
  Bacteroides fragilis activity). FDA-approved 1996; widely used as
  monotherapy for febrile neutropenia (alternative to pip-tazo).
regulatory_status:
  fda:
    approved: true
    year_first_approval: 1996
    indications_brief:
      - "Febrile neutropenia (empirical monotherapy)"
      - "Nosocomial pneumonia"
      - "Complicated UTI, complicated intra-abdominal (combined with metronidazole for anaerobic coverage)"
      - "Uncomplicated skin/soft tissue infections"
  ema:
    approved: true
    year_first_approval: 1995
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: true
    reimbursement_indications:
      - "Емпірична терапія фебрильної нейтропенії"
      - "Внутрішньолікарняна пневмонія"
      - "Інтраабдомінальна інфекція (у комбінації з metronidazole)"
    last_verified: "2026-04-27"
    notes: "Зареєстровано в Україні (Maxipime, generics). Покриття НСЗУ. Альтернатива piperacillin/tazobactam для FN-емпірики, особливо коли потрібно уникнути сольового навантаження або суперечливого AKI-сигналу з vancomycin. Перевірено drlz.com.ua 2026-04-27."
typical_dosing: >
  Febrile neutropenia (adult): 2 g IV every 8 hours via 30-min infusion
  (preferred over q12h for FN given the bactericidal time-above-MIC
  PK/PD). Pediatric: 50 mg/kg IV q8h, max 2 g. Renal adjustment
  required: CrCl 30-60 → 2 g q12h; CrCl 11-29 → 2 g q24h; CrCl <11 →
  1 g q24h; hemodialysis → 1 g q24h with dose after dialysis on dialysis
  days; CRRT → 2 g q12h (per institutional protocol). Hepatic: no
  adjustment. Duration in FN: until ANC recovery (>500/µL) and
  afebrile ≥48 h. CRITICAL: cefepime neurotoxicity (encephalopathy,
  myoclonus, non-convulsive status epilepticus) is a recognized
  concern, especially with renal dysfunction and elderly — mandates
  meticulous renal dosing.
formulations:
  - "IV powder for reconstitution: 500 mg, 1 g, 2 g vials"
absolute_contraindications:
  - "Hypersensitivity to cefepime, other cephalosporins, or β-lactam antibiotics with severe immediate reaction history (anaphylaxis to penicillin)"
black_box_warnings: []
common_adverse_events:
  - "Local infusion-site reaction / phlebitis — ~3-5%"
  - "Rash (maculopapular) — ~2-5%"
  - "Diarrhea — ~3%"
  - "Nausea — ~2%"
  - "Headache — ~2%"
  - "Pruritus — ~2%"
  - "Fever (drug fever) — ~1-3%"
  - "Eosinophilia — ~2%"
  - "Positive Coombs test (without hemolysis) — ~15-20%"
  - "Mild transaminitis — ~2-3%"
  - "Thrombocytosis or mild thrombocytopenia — ~1-3%"
  - "Vaginal candidiasis — ~1-3%"
serious_adverse_events:
  - "Cefepime-induced neurotoxicity (encephalopathy, myoclonus, non-convulsive status epilepticus, seizures, coma) — particularly with renal dysfunction or under-dose-adjusted; reversible with discontinuation + sometimes hemodialysis"
  - "Severe immediate hypersensitivity / anaphylaxis"
  - "Stevens-Johnson syndrome / toxic epidermal necrolysis (rare)"
  - "DRESS syndrome (rare)"
  - "Clostridioides difficile colitis"
  - "Acute interstitial nephritis (rare)"
  - "Hemolytic anemia (immune-mediated; rare)"
  - "Severe / prolonged neutropenia (rare)"
  - "Hepatotoxicity (rare)"
major_interactions:
  - "Aminoglycosides: chemical incompatibility in same line — administer separately"
  - "Probenecid: reduces cefepime renal clearance — increased exposure"
  - "Warfarin: variable INR effect (gut flora) — monitor"
  - "Vancomycin: physical incompatibility in same line — administer separately"
  - "Loop diuretics (furosemide): additive nephrotoxicity at high doses"
  - "Live vaccines: antibacterial activity may inactivate vaccine (oral typhoid, BCG)"
  - "Oral contraceptives: theoretical reduced efficacy via gut flora — additional contraception advised"
  - "Antacids / chelators: not relevant (IV-only formulation)"
pharmacology:
  half_life_hours: 2  # ~2 hours; up to 14 hours in severe renal failure
  clearance: "Renal (~85% excreted unchanged in urine)"
  protein_binding_pct: 20
  metabolism: "Minimal hepatic; predominantly renal excretion of unchanged drug — strict renal dose adjustment required to prevent neurotoxicity"
sources:
  - SRC-NCCN-BCELL-2025
  - SRC-NCCN-MM-2025
last_reviewed: "2026-04-27"
reviewer_signoffs: []
notes: >
  Alternative first-line FN empirical agent to piperacillin/tazobactam,
  with key advantage of avoiding the pip-tazo + vancomycin AKI signal
  and lacking the high sodium load. Disadvantage: limited anaerobic
  coverage (add metronidazole if intra-abdominal source suspected),
  and the recognized cefepime neurotoxicity hazard in renal dysfunction.
  Cefepime-induced encephalopathy: confusion → myoclonus → non-
  convulsive status epilepticus, often misattributed to sepsis or
  underlying disease; key clue is recent renal function decline + dose
  not adjusted; EEG shows generalized periodic discharges; treatment
  is discontinuation ± hemodialysis. ECIL-4 and IDSA 2010 list
  cefepime as preferred FN monotherapy alongside pip-tazo and
  meropenem. Avoid in patients with documented cefepime neurotoxicity
  or in elderly with eGFR <30 unless reduced dose meticulously
  applied. Ukraine: widely available, NSZU-covered.
