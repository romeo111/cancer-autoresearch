id: DRUG-OSIMERTINIB
names:
  preferred: "Osimertinib"
  ukrainian: "Осимертиніб"
  english: "Osimertinib"
  brand_names: ["Tagrisso"]
atc_code: L01EB04
rxnorm_id:
drug_class: "3rd-generation EGFR TKI (T790M-active)"
mechanism: >
  Irreversible covalent EGFR-TKI selective for activating mutations and T790M resistance mutation. Excellent CNS penetration. 1L preferred for EGFR-mut metastatic per FLAURA + FLAURA2; adjuvant for stage IB-IIIA EGFR-mut resected per ADAURA.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: true
    last_verified: "2026-04-27"
    notes: "Зареєстрований; НСЗУ покриває 1L EGFR-mut НДРЛ та 2L T790M+. Адьювант (ADAURA) — частково. Джерело: nszu.gov.ua (2026-04)."

    reimbursement_indications:
    - 'Програма медичних гарантій 2026: НДРЛ EGFR-mut (ex19del/L858R) 1L (FLAURA)'
    - 'Реімбурсаційний пакет «Онкологія» 2026: НДРЛ EGFR T790M+ 2L після прогресії на 1-/2-gen EGFR-TKI'
    - 'Реімбурсаційний пакет «Онкологія» 2026: НДРЛ EGFR-mut стадія IB-IIIA адьювантна терапія після резекції (ADAURA)'
typical_dosing: >
  1L: 80 mg PO once daily. Continue until progression. ADAURA adjuvant: 80 mg PO daily x 3 years.

key_toxicities:
- Diarrhea (~50%)
- Rash (~30%, milder than 1G TKIs)
- Paronychia
- Cardiac (QT prolongation, LVEF decline; ECG + echo monitoring)
- Pneumonitis (~3-5%, can be fatal — CT chest on respiratory symptoms)
- Stomatitis

sources: [SRC-NCCN-NSCLC-2025, SRC-ESMO-NSCLC-METASTATIC-2024]
last_reviewed:
notes: >
  FLAURA: osimertinib superior to 1G TKIs in 1L EGFR-mut metastatic. FLAURA2: osimertinib + chemo further extends PFS. ADAURA: adjuvant 3-year osi reduces recurrence by 80% vs placebo in resected EGFR-mut stage IB-IIIA.

notes_patient: >
  Таблетка-TKI 3-го покоління, що блокує мутації EGFR (включно з T790M) у раку легені. Добре проникає в мозок. Зазвичай добре переноситься, приймається раз на добу.
