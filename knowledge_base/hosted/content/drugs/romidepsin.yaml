id: DRUG-ROMIDEPSIN
names:
  preferred: "Romidepsin"
  ukrainian: "Ромідепсин"
  english: "Romidepsin"
  brand_names: ["Istodax"]
atc_code: L01XH02
rxnorm_id: "751591"
drug_class: "HDAC inhibitor (cyclic peptide; HDAC1/2 selective)"
mechanism: >
  Bicyclic depsipeptide HDAC inhibitor with greater selectivity for
  class I HDAC (HDAC1, HDAC2) — increases histone acetylation,
  derepresses tumor-suppressor genes, induces apoptosis in T-cell
  malignancies. Particularly active in PTCL with epigenetic
  dysregulation. Note: FDA initially approved for PTCL but
  voluntarily withdrew PTCL indication in 2021 (post-marketing
  Ro-CHOEP trial showed no PFS benefit over CHOP); CTCL indication
  retained. Still used internationally per NCCN guidance for r/r
  PTCL after individual benefit-risk discussion.

regulatory_status:
  fda: {approved: true}  # CTCL indication only after PTCL withdrawal
  ema: {approved: true}
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    last_verified: "2026-04-25"
    notes: "Not registered in Ukraine. Access via international supply / clinical trial only. PTCL indication withdrawn from FDA label (2021) but NCCN-listed; CTCL indication retained."

typical_dosing: "14 mg/m² IV over 4 hours on days 1, 8, 15 of each 28-day cycle, until progression or unacceptable toxicity"
formulations: ["IV powder 10 mg vial"]

absolute_contraindications:
  - "Hypersensitivity"
  - "Concomitant QT-prolonging drugs without strict cardiac monitoring"
black_box_warnings: []
major_interactions:
  - "Strong CYP3A inhibitors (azoles, ritonavir): elevate exposure — caution"
  - "Strong CYP3A inducers (rifampin, carbamazepine): efficacy loss"
  - "QT-prolonging drugs: additive risk"
  - "Warfarin: increased INR — monitor closely"
common_adverse_events:
  - "Nausea / vomiting"
  - "Fatigue"
  - "Anemia"
  - "Thrombocytopenia"
  - "Neutropenia"
  - "ECG ST/T changes (typically benign)"
  - "Pyrexia"
serious_adverse_events:
  - "Severe cytopenia (thrombocytopenia / neutropenia)"
  - "QTc prolongation / cardiac arrhythmia"
  - "Severe infection"
  - "Tumor lysis syndrome"
  - "Hepatotoxicity"

pharmacology:
  half_life: "~3 hours"
  elimination: "CYP3A4 metabolism"

sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
notes: >
  NCI 1312 / Coiffier 2012: r/r PTCL — ORR 25-38% (CR 15%); mDOR 17
  mo. FDA initially approved for r/r PTCL (2011) AND CTCL (2009);
  PTCL indication voluntarily withdrawn 2021 after Ro-CHOEP confirmatory
  trial (PFS not superior to CHOP). CTCL indication retained. NCCN
  still lists romidepsin for r/r PTCL after individual benefit-risk
  discussion. Particularly active in AITL (TFH-cell origin,
  epigenetic dysregulation TET2/IDH2/DNMT3A). Major UA access
  barrier: not registered.
