id: DRUG-PEGYLATED-LIPOSOMAL-DOXORUBICIN
names:
  preferred: "Pegylated liposomal doxorubicin"
  ukrainian: "Пегільований ліпосомальний доксорубіцин"
  english: "Pegylated liposomal doxorubicin"
  synonyms: ["PLD", "Doxil", "Caelyx", "liposomal doxorubicin"]
  brand_names: ["Doxil", "Caelyx", "Lipodox"]
atc_code: L01DB01
rxnorm_id: ""
drug_class: "Anthracycline (PEGylated liposomal formulation)"
mechanism: >
  STUB — needs full curation. Doxorubicin encapsulated in PEG-coated
  liposomes; preferential extravasation into tumor (EPR effect),
  reduced cardiotoxicity vs conventional doxorubicin, and altered AE
  profile (palmar-plantar erythrodysesthesia dominant). Used in
  platinum-resistant ovarian cancer (CALYPSO etc.), Kaposi sarcoma,
  metastatic breast cancer.

regulatory_status:
  fda:
    approved: true
    year_first_approval: 1995
    indications_brief: ["Recurrent ovarian cancer post-platinum", "Multiple myeloma (combo bortezomib)", "AIDS-related Kaposi sarcoma"]
  ema:
    approved: true
    year_first_approval: 1996
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: "STUB — pending CSD-4 verification. Generally available in UA via various import channels; conventional doxorubicin is more commonly used / reimbursed; PLD typically self-pay. Verify per drlz.com.ua."

typical_dosing: >
  STUB. Ovarian: 40-50 mg/m² IV every 4 weeks (or 30 mg/m² combined
  with platinum). Slow infusion rate (initial 1 mg/min) to minimize
  infusion reactions.

formulations:
  - "IV liposomal dispersion 2 mg/mL"

absolute_contraindications:
  - "Severe hypersensitivity to doxorubicin"
black_box_warnings:
  - "Cardiomyopathy (cumulative dose; lower risk than conventional doxorubicin but real)"
  - "Infusion reactions (acute, often cycle-1)"
common_adverse_events:
  - "Palmar-plantar erythrodysesthesia (PPE / hand-foot syndrome) — dominant DLT"
  - "Stomatitis / mucositis"
  - "Nausea"
  - "Cytopenias (less than conventional dox)"
  - "Fatigue"
serious_adverse_events:
  - "Cardiomyopathy (dose-dependent; total lifetime anthracycline cap)"
  - "Severe infusion reactions"
  - "Severe hand-foot syndrome (G3) requiring dose hold"
  - "Secondary leukemia (anthracycline class)"
  - "Stomatitis G3+"
major_interactions:
  - "STUB — anthracycline + trastuzumab cardiotox additive; sequential not concurrent"

pharmacology:
  half_life_hours: 75
  clearance: "RES uptake (liposomal); doxorubicin metabolism then renal/biliary"
  protein_binding_pct: 70
  metabolism: "CYP3A4 (doxorubicin payload)"

sources:
  - SRC-NCCN-OVARIAN-2025
  - SRC-ESMO-OVARIAN-2024

last_reviewed: "2026-04-27"
reviewers: []
notes: >
  STUB — Phase CSD-4 promotion. Cumulative anthracycline dose tracking
  required (lifetime ~550 mg/m² conventional dox equivalent; PLD
  somewhat higher tolerated). PPE prophylaxis: cool compresses, avoid
  pressure/heat, urea-containing emollients. Needs full curation of
  dose-adj for hepatic, cardiac monitoring schedule (LVEF baseline +
  cumulative-dose triggers), PPE management algorithm.
