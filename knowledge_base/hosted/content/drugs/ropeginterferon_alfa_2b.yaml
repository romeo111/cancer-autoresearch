id: DRUG-ROPEGINTERFERON-ALFA-2B
names:
  preferred: "Ropeginterferon alfa-2b"
  ukrainian: "Ропегінтерферон альфа-2b"
  english: "Ropeginterferon alfa-2b"
  brand_names: ["Besremi"]
atc_code: L03AB15
rxnorm_id: "2476523"
drug_class: "Mono-pegylated long-acting interferon alfa-2b"
mechanism: >
  Mono-PEGylated proline-conjugated interferon alfa-2b with prolonged
  half-life enabling biweekly to monthly SC dosing. Direct
  antiproliferative + immunomodulatory effect on JAK2-V617F clone;
  achieves molecular response (V617F allele burden reduction) in a
  subset of patients — the only currently-approved cytoreductive
  therapy with disease-modifying potential in PV. Approved 1L
  regardless of HU exposure on basis of PROUD-PV / CONTINUATION-PV.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: false
    reimbursed_nszu: false
    last_verified: "2026-04-25"

typical_dosing: >
  Initial 100 µg SC q2wk (50 µg if combined with HU); titrate
  by 50 µg every 2 weeks based on hematologic response + tolerance,
  to maximum 500 µg q2wk. After hematologic response sustained ≥1
  year, may extend interval to q4wk. Continue indefinitely.

formulations: ["Pre-filled pen 250 µg/0.5 mL, 500 µg/0.5 mL"]

absolute_contraindications:
  - "Pregnancy (relative — interferons historically used in pregnancy with caution)"
  - "Severe psychiatric disease — active suicidality, severe depression"
  - "Decompensated liver disease (Child-Pugh B/C)"
  - "Severe autoimmune disease (active)"
  - "Severe cardiovascular disease (uncontrolled)"

black_box_warnings:
  - "Neuropsychiatric (depression, suicidality, mania) — discontinue if severe"
  - "Autoimmune (thyroiditis, hepatitis, hemolytic anemia) — discontinue if severe"
  - "Ischemic / cardiovascular events"
  - "Infectious disorders"

major_interactions:
  - "Theophylline / methadone: levels increase"
  - "Myelosuppressive agents: additive cytopenia"
  - "Alcohol: hepatotoxicity"

common_adverse_events:
  - "Flu-like symptoms (myalgia, fatigue, fever) — particularly first months"
  - "ALT/AST elevation"
  - "Leukopenia / thrombocytopenia (mild)"
  - "Arthralgia"
  - "Injection-site reaction"
  - "Anti-thyroid autoantibody development / thyroiditis"
  - "Mood changes, depression"

serious_adverse_events:
  - "Severe depression, suicidality"
  - "Autoimmune hepatitis"
  - "Autoimmune thyroiditis (clinical hypo- or hyperthyroidism)"
  - "Severe ischemic events"
  - "Severe cytopenia"

pharmacology: {half_life: "~7-10 days (vs ~30 hours for standard pegylated IFNa-2a)"}

sources: [SRC-NCCN-MPN-2025, SRC-ESMO-MPN-2015]
last_reviewed: "2026-04-25"
notes: >
  Pivotal: PROUD-PV / CONTINUATION-PV (Gisslinger et al., Lancet
  Haematol 2020) — phase-3 ropeginterferon vs HU in newly-dx PV
  age <60 (non-high-thrombosis-risk). Complete hematologic
  response ~71% vs ~51% at 36 months; 36-month JAK2-V617F allele
  burden reduction substantially greater. FDA approval Nov 2021,
  EMA Feb 2019. Disease-modifying potential (V617F allele burden
  reduction) distinct from HU and ruxolitinib. Ukraine: NOT
  registered. STUB — pending Co-Lead sign-off.
