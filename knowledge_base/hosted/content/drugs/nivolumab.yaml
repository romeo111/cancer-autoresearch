    - "Classical Hodgkin lymphoma (r/r post-HSCT and BV)"
    - "Head and neck SCC (2L)"
    - "Urothelial carcinoma (adjuvant high-risk muscle-invasive; metastatic)"
    - "Esophageal SCC and adenocarcinoma (CheckMate-577 adjuvant after CROSS, CheckMate-648 1L)"
