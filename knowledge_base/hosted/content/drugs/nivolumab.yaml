reviewers: []
notes: >
  CheckMate-577: adjuvant nivolumab × 1 yr in patients with residual
  ypT+ or ypN+ post-CROSS — DFS approximately doubled (median 22.4 vs
  11.0 mo). CheckMate-649: 1L gastric / GEJ / esophageal adenocarcinoma
  with FOLFOX or CAPOX — OS benefit in CPS ≥5 (FDA + EMA approvals
  restrict to CPS ≥5 / CPS ≥1 respectively). Combination with ipi
  amplifies irAE rates substantially: melanoma combo Grade 3-4 irAE
  ~45-55% vs 15-20% mono. ICI-class management protocols apply
  uniformly (baseline TFTs/cortisol/LFTs, serial labs, prompt
  steroid intervention for Grade ≥2 irAE).
