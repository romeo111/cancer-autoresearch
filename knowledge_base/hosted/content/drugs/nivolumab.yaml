typical_dosing: >
  Standard adult monotherapy: 240 mg IV q2w OR 480 mg IV q4w (over 30 min).
  Pediatric melanoma adjuvant (≥12 yrs, ≥40 kg): 240 mg q2w; <40 kg: 3 mg/kg q2w.
  With ipilimumab (1L melanoma, RCC, MSI-H CRC): nivolumab 1 mg/kg +
  ipilimumab 3 mg/kg q3w × 4 doses, then nivolumab 240 mg q2w or
  480 mg q4w maintenance.
  CheckMate-649 (gastric 1L + chemo): 360 mg q3w with chemo or
  240 mg q2w.
  CheckMate-577 (adjuvant esophageal post-CROSS without pCR):
  240 mg q2w × 16 wks, then 480 mg q4w to total 1 year.
  Treatment until progression, unacceptable toxicity, or specified
  duration (1 yr adjuvant; 2 yrs metastatic in some indications).
formulations:
- "IV solution 10 mg/mL (40 mg / 4 mL, 100 mg / 10 mL, 240 mg / 24 mL vials)"
- "SC formulation (Opdivo Qvantig, hyaluronidase co-formulated; FDA 2024)"

absolute_contraindications:
- "Severe hypersensitivity / anaphylaxis to nivolumab"
- "Active autoimmune disease on systemic immunosuppression (relative)"
- "Solid organ transplant on immunosuppression (relative; high rejection risk)"
- "Pregnancy"
- "Allogeneic HSCT — risk of severe GVHD if given before or shortly after"

black_box_warnings:
- "Severe and fatal immune-mediated adverse reactions (any organ; same spectrum as pembrolizumab)"
- "Complications of allogeneic HSCT post-nivolumab — hyperacute GVHD, hepatic VOD, severe sepsis (fatal cases)"

common_adverse_events:
- "Fatigue (~25-35%)"
- "Pruritus (~15-25%)"
- "Diarrhea (~15-20%)"
- "Rash / vitiligo (~15-20%)"
- "Decreased appetite (~15%)"
- "Nausea (~15%)"
- "Arthralgia (~10-20%)"
- "Hypothyroidism (~10%)"
- "Hyperthyroidism (~3-5%)"
- "Cough (~15%)"
- "Constipation"
- "Mild infusion reactions (~3-10%)"

serious_adverse_events:
- "Immune-mediated pneumonitis (~3%; Grade 3+ ~1%)"
- "Immune-mediated colitis (~2-3% mono; ~10-15% with ipilimumab combo)"
- "Immune-mediated hepatitis (~2% mono; ~10% with ipi)"
- "Endocrinopathies — thyroiditis, hypophysitis, adrenal crisis, type 1 DM / DKA"
- "Immune-mediated nephritis (~1%)"
- "Severe dermatologic reactions — SJS, TEN, DRESS"
- "Immune-mediated myocarditis (rare; can be fatal — particularly with ipi combo)"
- "Immune-mediated encephalitis, myelitis, Guillain-Barré-like syndrome"
- "Pancreatitis"
- "Severe infusion reactions"
- "Solid organ transplant rejection"
- "Hyperacute / fatal GVHD with allogeneic HSCT"

major_interactions:
- "Systemic corticosteroids (>10 mg/d prednisone) before initiation — may reduce efficacy; acceptable for irAE management"
- "Other immunosuppressants — may reduce efficacy"
- "Ipilimumab — synergistic efficacy AND substantially increased irAE risk (Grade 3-4 irAE ~45-55% with combo vs ~15-20% mono)"
- "Live vaccines — avoid during and up to 3 months after"
- "BRAF/MEK inhibitors — additive hepatotoxicity, pyrexia"

