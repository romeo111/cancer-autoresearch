id: DRUG-NIVOLUMAB
names:
  preferred: "Nivolumab"
  ukrainian: "Ніволумаб"
  english: "Nivolumab"
  brand_names: ["Opdivo", "Opdualag (with relatlimab)"]
atc_code: L01FF01
rxnorm_id: "1597876"
drug_class: "Anti-PD-1 fully human IgG4 monoclonal antibody (immune checkpoint inhibitor)"
mechanism: >
  Fully human IgG4 monoclonal antibody binding programmed cell death
  protein 1 (PD-1) on activated T cells, blocking the inhibitory
  PD-1/PD-L1 and PD-1/PD-L2 interactions and restoring cytotoxic
  T-cell antitumor responses. IgG4 backbone with a stabilizing S228P
  hinge mutation minimizes ADCC. Mechanistically equivalent to
  pembrolizumab; combined with anti-CTLA-4 (ipilimumab) the dual
  blockade amplifies T-cell priming and effector activity at the cost
  of substantially increased irAE rates. Combined with relatlimab
  (anti-LAG-3) in Opdualag for melanoma. Approved as monotherapy or
  combination across many solid tumors and classical Hodgkin lymphoma.

