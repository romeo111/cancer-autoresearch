id: DRUG-AVAPRITINIB
names:
  preferred: "Avapritinib"
  ukrainian: "Аваприніб"
  english: "Avapritinib"
  brand_names: ["Ayvakit", "Ayvakyt"]
atc_code: L01EX18
rxnorm_id: null
drug_class: "Type-I selective KIT/PDGFRA inhibitor (D816V- and D842V-active)"
mechanism: >
  Selective KIT and PDGFRA inhibitor designed to bind the active
  conformation; uniquely active against the imatinib-resistant
  KIT D816V (advanced systemic mastocytosis) and PDGFRA D842V (GIST)
  activation-loop mutations. NAVIGATOR (PDGFRA D842V GIST) ORR ~88%;
  EXPLORER + PATHFINDER (advanced SM) ORR ~75% with deep molecular
  responses.

regulatory_status:
  fda:
    approved: true
  ema:
    approved: true
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: |
      Не зареєстровано в Україні (Держреєстр ЛЗ — РП відсутнє станом на
      2026-04-27). Селективний KIT/PDGFRA-інгібітор для PDGFRA D842V
      GIST та поширеного системного мастоцитозу (KIT D816V+).
      Шляхи доступу:
      - Named-patient import (DEC спецдозвіл).
      - EAP Blueprint Medicines (Ayvakit access program — потребує
        підтвердженої PDGFRA D842V або KIT D816V мутації NGS).
      - Cross-border (EU): EU онкоцентри через "Лікування за кордоном"
        (наказ МОЗ 988); SoC у багатьох EU країнах для GIST D842V та
        AdvSM.
      Source: drlz.com.ua пошук "avapritinib"/"ayvakit" 2026-04-27 — РП відсутнє.

typical_dosing: >
  PDGFRA D842V GIST: 300 mg PO once daily on empty stomach.
  Advanced systemic mastocytosis: 200 mg PO once daily on empty stomach
  (lower dose to mitigate cognitive / cerebral microbleed risk seen at
  300 mg in EXPLORER).
formulations: ["Tablets 100 mg / 200 mg / 300 mg"]

absolute_contraindications:
  - "Hypersensitivity to avapritinib"
  - "Platelet count <50 × 10⁹/L (advanced SM dosing — bleeding risk)"
black_box_warnings:
  - "Intracranial hemorrhage / cerebral microbleeds — dose-related; monitor MRI baseline + on-treatment in advanced SM"
major_interactions:
  - "Strong CYP3A4 inhibitors / inducers — avoid; reduce dose if unavoidable"
common_adverse_events:
  - "Cognitive effects (memory impairment, confusion) — dose-related, more frequent ≥300 mg"
  - "Edema (periorbital, peripheral)"
  - "Nausea / vomiting"
  - "Fatigue"
  - "Diarrhea"
  - "Hair color changes"
  - "Cytopenias (advanced SM dosing)"
serious_adverse_events:
  - "Intracranial hemorrhage (cerebral microbleeds — class effect)"
  - "Severe cognitive impairment requiring discontinuation"
  - "Tumor lysis syndrome (advanced SM with high mast-cell burden)"
  - "Severe thrombocytopenia (advanced SM)"

pharmacology:
  half_life: "~32-57 hours; CYP3A4/2C9 substrate"

sources:
  - SRC-ONCOKB
  - SRC-NCCN-GIST-2025
  - SRC-NCCN-SM-2025

last_reviewed: "2026-04-27"
notes: >
  Two distinct dose levels by indication. NAVIGATOR established 300 mg
  as PDGFRA D842V GIST dose (transformative ORR ~88% vs <5% historical
  imatinib in this genotype). EXPLORER showed cognitive AEs and
  cerebral microbleeds at 300 mg in advanced SM, leading to
  PATHFINDER's 200 mg dose registration. Baseline + on-treatment
  brain MRI recommended in advanced SM. Not effective in KIT D816V-
  negative advanced SM (rare FIP1L1-PDGFRA myeloid neoplasm with
  eosinophilia is treated with imatinib instead).
