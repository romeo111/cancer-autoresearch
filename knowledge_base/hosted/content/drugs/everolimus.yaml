id: DRUG-EVEROLIMUS
names:
  preferred: "Everolimus"
  ukrainian: "Еверолімус"
  english: "Everolimus"
  brand_names: ["Afinitor", "Votubia"]
atc_code: L01EG02
rxnorm_id: null
drug_class: "mTOR inhibitor (rapalog)"
mechanism: >
  Allosteric inhibitor of mTORC1 — blocks PI3K/AKT/mTOR pathway downstream of AKT. In HR+/HER2- breast: reverses endocrine resistance when added to AI (BOLERO-2 with exemestane) or fulvestrant (PrECOG/MANTA). Also approved in advanced RCC, pNET, and SEGA in tuberous sclerosis.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: |
      Зареєстровано в UA (Держреєстр ЛЗ — РП наявне; брендові
      Afinitor + генерики). НСЗУ онкопакет переважно не покриває
      breast indication (RCC indication покривається ширше).
      Шляхи доступу для breast HR+/HER2- 2L:
      - Out-of-pocket (генерики ~значно дешевше за брендовий Afinitor).
      - Реімбурсаційна програма "Доступні ліки" — не охоплює.
      - Pilot programs / clinical trials.
      Source: drlz.com.ua пошук "everolimus"/"afinitor" 2026-04-27.

typical_dosing: >
  10 mg PO once daily continuous + exemestane 25 mg PO daily (BOLERO-2)
  OR + fulvestrant 500 mg IM standard schedule (PrECOG 0102).

key_toxicities:
  - Stomatitis (~56% — dexamethasone mouthwash prophylaxis reduces ~70%)
  - Rash
  - Fatigue
  - Hyperglycemia / hyperlipidemia
  - Non-infectious pneumonitis (~16% any grade, ~3% G3+) — boxed warning
  - Infections (immunosuppression)
  - Cytopenias

sources: [SRC-BOLERO2-BASELGA-2012, SRC-NCCN-BREAST-2025, SRC-ESMO-BREAST-METASTATIC-2024]
last_reviewed: "2026-04-27"
notes: >
  Pivotal trial: BOLERO-2 (everolimus + exemestane). Off-label use
  with fulvestrant supported by PrECOG 0102 (Kornblum 2018) and
  clinical practice for fulvestrant-pretreated patients. Dexamethasone
  mouthwash 0.5 mg/5 mL swish/spit BID for first 8 weeks reduces
  G2+ stomatitis from ~33% to ~2% (SWISH trial).
