id: DRUG-CASPOFUNGIN
names:
  preferred: "Caspofungin"
  ukrainian: "Каспофунгін"
  english: "Caspofungin"
  brand_names:
    - "Cancidas"
atc_code: J02AX04
rxnorm_id: "352300"
drug_class: "Echinocandin antifungal (β-1,3-D-glucan synthase inhibitor)"
mechanism: >
  Semisynthetic lipopeptide echinocandin that non-competitively inhibits
  β-(1,3)-D-glucan synthase, the enzyme complex (Fks1/Fks2) that
  synthesizes β-(1,3)-D-glucan, an essential structural polymer of the
  fungal cell wall absent from mammalian cells. Cell-wall instability
  produces fungicidal activity against most Candida species (including
  C. glabrata, C. krusei, and many fluconazole-resistant strains) and
  fungistatic activity against Aspergillus species. NO activity against
  Cryptococcus, Mucorales (Mucor, Rhizopus), Fusarium, or Trichosporon
  (these lack significant β-glucan or have alternative cell-wall
  structures). Excellent safety profile vs amphotericin B; narrow drug
  interaction profile vs azoles. FDA-approved 2001 — first echinocandin
  approved. Standard agents in febrile neutropenia with persistent fever
  ≥4-7 days despite broad-spectrum antibacterials (empirical antifungal
  add-on per IDSA / NCCN), and in documented invasive candidiasis or
  candidemia.
regulatory_status:
  fda:
    approved: true
    year_first_approval: 2001
    indications_brief:
      - "Empirical antifungal therapy in persistent neutropenic fever ≥4-7 days despite broad-spectrum antibacterials"
      - "Candidemia and invasive candidiasis (including intra-abdominal abscesses, peritonitis, pleural space infections)"
      - "Esophageal candidiasis"
      - "Invasive aspergillosis (salvage; refractory or intolerant of other therapies)"
  ema:
    approved: true
    year_first_approval: 2001
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: true
    reimbursement_indications:
      - "Емпірична антифунгальна терапія при персистуючій фебрильній нейтропенії"
      - "Кандидемія / інвазивний кандидоз"
      - "Інвазивний аспергільоз — salvage-терапія"
    last_verified: "2026-04-27"
    notes: "Зареєстровано в Україні (Cancidas, generics). NSZU-covered для онкогематологічних пацієнтів. Перевірено drlz.com.ua 2026-04-27."
typical_dosing: >
  Adult: loading dose 70 mg IV on day 1 over 60-min infusion, then
  maintenance 50 mg IV once daily over 60-min infusion. For patients
  >80 kg, increase maintenance to 70 mg daily. Hepatic adjustment:
  moderate (Child-Pugh 7-9) → maintenance 35 mg daily after 70 mg
  load; severe (Child-Pugh >9) → no formal recommendation, use with
  caution. Renal: NO adjustment for any degree of renal impairment
  including dialysis (non-renal clearance — major advantage in
  critical care). Pediatric (≥3 months): 70 mg/m² IV day 1 (max 70
  mg) then 50 mg/m² IV daily (max 50 mg). Coadministration with
  enzyme inducers (rifampin, efavirenz, phenytoin, carbamazepine,
  dexamethasone): increase maintenance to 70 mg daily to compensate
  for accelerated clearance. Duration: per indication — empirical FN
  through ANC recovery + clinical resolution; candidemia 14 days
  beyond first negative blood culture; aspergillosis prolonged
  (often switch to oral voriconazole when stable).
formulations:
  - "IV powder for reconstitution: 50 mg, 70 mg vials"
absolute_contraindications:
  - "Hypersensitivity to caspofungin or any echinocandin"
black_box_warnings: []
common_adverse_events:
  - "Local infusion-site reaction / phlebitis — ~10%"
  - "Fever — ~10%"
  - "Headache — ~5-10%"
  - "Mild transaminitis (ALT, AST elevation) — ~5-15%"
  - "Diarrhea — ~5-10%"
  - "Nausea — ~5%"
  - "Vomiting — ~3-5%"
  - "Hypokalemia — ~5-10%"
  - "Hypomagnesemia — ~3-5%"
  - "Anemia — ~5%"
  - "Rash — ~3-5%"
  - "Pruritus — ~2-3%"
  - "Histamine-related infusion reaction (flushing, warmth, modest hypotension) — ~3%"
  - "Hypotension — ~2-3%"
serious_adverse_events:
  - "Severe hypersensitivity / anaphylaxis (rare; including in patients with prior tolerance)"
  - "Severe hepatic dysfunction (rare; including hepatic failure)"
  - "Stevens-Johnson syndrome / TEN (rare)"
  - "Severe histamine-mediated reactions with rapid infusion (rare; mitigated by 60-min infusion duration)"
  - "Severe hypokalemia with cardiac arrhythmia"
major_interactions:
  - "Cyclosporine: caspofungin AUC increased ~35%; reciprocal increase in transaminases (~3% incidence) — monitor LFTs but combination is acceptable for HSCT GVHD prophylaxis context"
  - "Tacrolimus: caspofungin reduces tacrolimus AUC ~26% — monitor tacrolimus levels and adjust upward if needed"
  - "Enzyme inducers (rifampin, efavirenz, phenytoin, carbamazepine, nevirapine, dexamethasone): accelerate caspofungin clearance — increase maintenance dose to 70 mg daily"
  - "Live vaccines: avoid during active fungal infection"
  - "Sirolimus / everolimus: minimal interaction"
  - "Mycophenolate: no clinically significant interaction"
  - "Other azole antifungals (fluconazole, voriconazole, posaconazole): no significant interaction; combination antifungal therapy used in selected scenarios"
  - "Hepatotoxic drugs (acetaminophen, methotrexate, statins, isoniazid): additive hepatotoxicity"
pharmacology:
  half_life_hours: 11  # 9-11 h beta phase; long terminal phase ~30-50 h
  clearance: "Hepatic — slow chemical degradation (hydrolysis + N-acetylation) plus minimal CYP metabolism; <2% renal excretion of unchanged drug"
  protein_binding_pct: 97
  metabolism: "Slow chemical degradation in plasma + tissues; minor CYP3A4 (not a substrate or inhibitor in clinically meaningful way) — minimal DDI profile, key advantage over azoles"
sources:
  - SRC-NCCN-BCELL-2025
  - SRC-NCCN-MM-2025
last_reviewed: "2026-04-27"
reviewer_signoffs: []
notes: >
  First-line empirical antifungal in persistent FN despite broad-
  spectrum antibacterials (typically day 4-7 of unresolved fever),
  per IDSA / ECIL / NCCN. Echinocandin class also first-line for
  candidemia and invasive candidiasis (IDSA 2016 — replaced
  fluconazole as default). Major advantages over amphotericin B:
  comparable / superior efficacy in candidiasis, vastly better
  tolerability (no nephrotoxicity, no infusion reaction beyond mild
  histamine-related, no significant electrolyte wasting). Major
  advantage over azoles: minimal CYP-mediated DDIs (critical when
  patient is on cyclosporine, tacrolimus, vincristine, ibrutinib,
  venetoclax, or other CYP3A4 substrates). Disadvantages: limited
  Aspergillus activity (fungistatic; voriconazole or isavuconazole
  preferred for documented invasive aspergillosis), no Mucor or
  Cryptococcus coverage, IV-only (no oral switch). De-escalate to
  oral fluconazole when species and susceptibility known and patient
  tolerating PO. Loading dose 70 mg essential — single 50 mg dose
  produces sub-therapeutic exposure for first 48 h. Ukraine: NSZU-
  covered for onco-hematology indications; widely available.
