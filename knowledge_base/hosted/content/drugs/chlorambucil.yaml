id: DRUG-CHLORAMBUCIL
names:
  preferred: "Chlorambucil"
  ukrainian: "Хлорамбуцил"
  english: "Chlorambucil"
  synonyms: ["CB-1348"]
  brand_names: ["Leukeran"]
atc_code: L01AA02
rxnorm_id: "2555"
drug_class: "Alkylating agent — nitrogen mustard"
mechanism: >
  Bifunctional alkylating agent of the nitrogen-mustard class. Aromatic
  nitrogen mustard with a phenylbutyric-acid carrier; less reactive
  (and therefore better orally bioavailable + less acutely toxic) than
  classical nitrogen mustards. Forms aziridinium intermediates that
  alkylate the N7 position of guanine, generating intra- and
  interstrand DNA cross-links → blocked replication, transcription,
  and apoptosis (preferentially in slowly-dividing lymphoid cells).
  Cell-cycle non-specific. Used for decades in CLL (now largely
  supplanted by BTK and BCL2 inhibitors), Waldenström, and as the
  partner of obinutuzumab in elderly comorbid CLL (CLL11 trial).

regulatory_status:
  fda:
    approved: true
    year_first_approval: 1957
    indications_brief:
      - "CLL"
      - "Hodgkin lymphoma (historical)"
      - "Non-Hodgkin lymphoma — indolent (historical)"
      - "Waldenström macroglobulinaemia"
  ema:
    approved: true
    year_first_approval: 1959
    indications_brief:
      - "CLL"
      - "Indolent NHL"
      - "Waldenström"
      - "Hodgkin lymphoma (historical)"
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: true
    reimbursement_indications:
      - "Хронічний лімфоцитарний лейкоз (CLL) у літніх коморбідних пацієнтів — комбінація з обінутузумабом (CLL11)"
      - "Waldenström макроглобулінемія (історична індикація)"
    last_verified: "2026-04-27"
    notes: "Включений до НСЗУ переліку як низьковартісний пероральний алкілуючий агент для CLL elderly + WM. Часто резерв для пацієнтів з обмеженим доступом до новіших BTKi/BCL2i."

typical_dosing: >
  CLL11 (obinutuzumab + chlorambucil, elderly comorbid CLL 1L):
  0.5 mg/kg PO on days 1 and 15 of each 28-day cycle × 6 cycles.
  Monotherapy CLL (historical): 0.1-0.2 mg/kg PO daily continuous
  OR 0.4 mg/kg PO every 2 weeks (escalate by 0.1 mg/kg until response
  or myelosuppression). Waldenström: 0.1 mg/kg PO daily until best
  response. Take on empty stomach (food reduces bioavailability ~10-20%).

formulations:
  - "Tablets 2 mg"
  - "Oral suspension (extemporaneous compounding)"

absolute_contraindications:
  - "Hypersensitivity to chlorambucil or other nitrogen mustards"
  - "Pregnancy (teratogenic, mutagenic; embryo-fetal lethality)"
  - "Prior demonstrated resistance"
  - "Severe bone-marrow failure not attributable to disease"

black_box_warnings:
  - "Secondary malignancies — therapy-related AML / MDS (cumulative dose >0.4 g/m² substantially increases risk; latency 4-7 years)"
  - "Severe + prolonged myelosuppression (especially cumulative; recovery may take weeks-months)"
  - "Infertility (azoospermia, ovarian failure — often permanent; counsel on fertility preservation before therapy)"
  - "Mutagenicity / carcinogenicity (genotoxic; long-term cancer risk)"

common_adverse_events:
  - "Myelosuppression (neutropenia, thrombocytopenia, anemia — dose-dependent; nadir typically 7-14 days)"
  - "Mild nausea / vomiting (less than IV alkylators)"
  - "Mucositis (uncommon at standard doses)"
  - "Rash (~5%)"
  - "Hyperuricemia (especially high-burden CLL — TLS risk)"
  - "Mild hepatotoxicity (transaminitis ~10-20%)"

serious_adverse_events:
  - "Therapy-related MDS / AML (cumulative dose-dependent; ~3-5% over 5-10 years in long-term users)"
  - "Severe + prolonged pancytopenia"
  - "Severe infection (febrile neutropenia, opportunistic) during nadir"
  - "Tumor lysis syndrome (high-burden CLL/lymphoma — uncommon with oral chlorambucil but reported)"
  - "Stevens-Johnson syndrome / TEN (rare)"
  - "Interstitial pneumonitis / pulmonary fibrosis (rare; cumulative)"
  - "Seizures (high-dose; rare)"
  - "Permanent infertility"

major_interactions:
  - "Live vaccines — contraindicated during therapy and ≥3 months post"
  - "Other myelosuppressives (cytotoxic chemo, radiation) — additive cytopenia"
  - "Phenylbutazone — may increase chlorambucil toxicity"
  - "Allopurinol — increased risk of rash; monitor uric acid (TLS prophylaxis often warranted)"

pharmacology:
  half_life_hours: 1.5  # parent ~1.5 h; active metabolite phenylacetic mustard ~2.5 h
  clearance: "hepatic CYP-mediated to active phenylacetic-acid mustard; renal excretion of metabolites <1% unchanged"
  protein_binding_pct: 99
  metabolism: "Hepatic — β-oxidation to phenylacetic acid mustard (active alkylator); further oxidation; minimal renal contribution"
  bioavailability_pct: 70  # variable; food reduces

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-CLL-2024

last_reviewed: "2026-04-27"
reviewers: []
notes: >
  CLL11 (Goede 2014, NEJM): obinutuzumab + chlorambucil vs rituximab +
  chlorambucil vs chlorambucil alone in previously-untreated CLL with
  comorbidities (CIRS >6 OR CrCl 30-69) — mPFS 26.7 vs 15.2 vs 11.1 mo.
  Established G-Clb as a fitness-tailored 1L for elderly comorbid CLL.
  Now positioned behind venetoclax-obinutuzumab and BTK-inhibitor
  monotherapy in most NCCN/ESMO algorithms, but remains relevant for
  patients without access to those agents OR with contraindications to
  them. Long history (since 1957) — most familiar oral chemotherapy in
  community haematology. Counsel on infertility and secondary-malignancy
  risk before initiating; consider sperm banking / oocyte cryopreservation
  for younger patients (uncommonly used in this age group). TLS
  prophylaxis (allopurinol + hydration) for high-burden disease at
  cycle 1.
