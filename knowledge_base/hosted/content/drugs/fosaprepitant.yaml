id: DRUG-FOSAPREPITANT
names:
  preferred: "Fosaprepitant"
  ukrainian: "Фосапрепітант"
  english: "Fosaprepitant"
  brand_names:
    - "Emend IV"
    - "Ivemend"
atc_code: A04AD12
rxnorm_id: "404587"
drug_class: "Substance P / neurokinin-1 (NK1) receptor antagonist (intravenous prodrug of aprepitant)"
mechanism: >
  Phosphorylated water-soluble prodrug of aprepitant; rapidly converted
  by ubiquitous tissue phosphatases to active aprepitant within 30
  minutes of IV administration. Active moiety blocks the substance P /
  NK1 receptor in CNS emetic centers (nucleus tractus solitarius, area
  postrema), preventing the delayed phase of chemotherapy-induced
  nausea and vomiting (CINV) that is incompletely controlled by 5-HT3
  antagonists alone. A single 150 mg IV dose given on day 1 covers
  the full delayed phase (~5 days), eliminating need for oral days 2-3
  capsules. Approved by FDA January 2008 (single-dose 150 mg
  formulation: October 2008) and EMA January 2008.
regulatory_status:
  fda:
    approved: true
    year_first_approval: 2008
    indications_brief: ["Prevention of acute and delayed CINV with HEC and MEC (single-dose IV alternative to 3-day oral aprepitant)"]
  ema:
    approved: true
    year_first_approval: 2008
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: true
    reimbursement_indications:
      - "Антиеметична профілактика при високоемоегенній хіміотерапії — IV альтернатива пероральному aprepitant у пацієнтів з нудотою, дисфагією або для одноразового зручного дозування"
    last_verified: "2026-04-27"
    notes: "Зареєстровано в Україні. Покриття НСЗУ для онкопацієнтів. Часто використовується у форматі day-1-only IV для зручності адміністрування у стаціонарі."
typical_dosing: >
  Single 150 mg IV infusion over 20-30 minutes, administered 30 minutes
  before chemotherapy on day 1 only. Always combined with 5-HT3
  antagonist (ondansetron 8-16 mg or palonosetron 0.25 mg IV) and
  dexamethasone (12 mg IV/PO day 1, then 8 mg PO days 2-4 — note
  dex dose REDUCTION when combined with fosaprepitant). No dose
  adjustment for renal impairment (including dialysis); no adjustment
  for mild-moderate hepatic impairment; not studied in severe hepatic
  impairment. Pediatric ≥6 months: weight-based 4 mg/kg (max 150 mg).
  Higher infusion-site reaction rate vs aprepitant — use a free-flowing
  larger vein, avoid extravasation.
formulations:
  - "Lyophilized powder 150 mg / single-dose vial; reconstituted in 5 mL NS, then diluted in 145 mL NS for IV infusion"
absolute_contraindications:
  - "Hypersensitivity to fosaprepitant, aprepitant, polysorbate 80, or excipients"
  - "Concurrent use with pimozide (CYP3A4 substrate; QT prolongation)"
black_box_warnings: []
common_adverse_events:
  - "Infusion-site reactions (pain, erythema, induration, thrombophlebitis) — ~5-10% (notably higher than aprepitant; class effect of polysorbate-80 vehicle)"
  - "Fatigue — ~15%"
  - "Hiccups — ~10%"
  - "Headache — ~10%"
  - "Constipation — ~10%"
  - "Diarrhea — ~8%"
  - "Anorexia — ~10%"
  - "Asthenia — ~5-10%"
  - "Dyspepsia — ~6%"
  - "Increased ALT/AST — ~5-10% (mild, transient)"
  - "Hot flush, flushing — ~3-5%"
  - "Dizziness — ~5%"
serious_adverse_events:
  - "Anaphylaxis / anaphylactoid reactions during or shortly after infusion"
  - "Severe infusion-site reactions including thrombophlebitis, vesicle / necrosis (uncommon)"
  - "Stevens-Johnson syndrome (rare)"
  - "Significant drug interactions with CYP3A4 substrates (similar to oral aprepitant)"
  - "Severe hepatic dysfunction (rare)"
major_interactions:
  - "Strong CYP3A4 substrates (pimozide CONTRAINDICATED; midazolam, alfentanil — increased exposure 2-3×)"
  - "Dexamethasone (CYP3A4 substrate): fosaprepitant doubles dex AUC — REDUCE dex by 50% on co-administration day"
  - "Methylprednisolone: increased exposure — reduce by ~50%"
  - "Warfarin: weak CYP2C9 induction — monitor INR for 2 weeks post each course"
  - "Hormonal contraceptives: reduced efficacy — use alternative contraception during and 28 days post"
  - "Strong CYP3A4 inhibitors (ketoconazole, ritonavir): increase aprepitant exposure"
  - "Strong CYP3A4 inducers (rifampin, phenytoin, carbamazepine): markedly decrease aprepitant exposure — avoid"
  - "Vesicants / irritants in same line (e.g., doxorubicin, vincristine): use separate IV access — fosaprepitant infusion-site irritation may be misattributed"
pharmacology:
  half_life_hours: 12  # active aprepitant half-life
  clearance: "Hepatic; rapid hydrolysis to aprepitant by tissue phosphatases"
  protein_binding_pct: 95
  metabolism: "Pro-drug → aprepitant within 30 min; aprepitant metabolized by CYP3A4 (also moderate CYP3A4 inhibitor and CYP2C9 inducer)"
sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-DLBCL-2024
last_reviewed: "2026-04-27"
reviewer_signoffs: []
notes: >
  IV alternative to oral aprepitant for HEC/MEC prophylaxis. Single
  150 mg dose = full 3-day oral course in efficacy. Preferred when:
  patient cannot reliably swallow capsules (mucositis, dysphagia,
  active vomiting prior to chemo), inpatient setting where IV
  administration is convenient, or compliance concerns. Trade-off:
  ~5-10% infusion-site reactions vs <1% for oral. Same key DDI
  profile as aprepitant — especially the dexamethasone dose halving.
  In Ukrainian onco-day-units, fosaprepitant is increasingly used over
  oral aprepitant for inpatient HEC because of guaranteed
  administration timing relative to the chemo infusion.
