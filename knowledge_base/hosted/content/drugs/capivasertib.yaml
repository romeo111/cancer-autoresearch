id: DRUG-CAPIVASERTIB
names:
  preferred: "Capivasertib"
  ukrainian: "Капівасертиб"
  english: "Capivasertib"
  synonyms: ["AZD5363"]
  brand_names: ["Truqap"]
atc_code: L01EX27
rxnorm_id: ""
drug_class: "Pan-AKT1/2/3 inhibitor"
mechanism: >
  STUB — needs full curation. Potent ATP-competitive inhibitor of all
  three AKT isoforms (AKT1/2/3). PI3K/AKT/PTEN pathway alterations are
  enriched in HR+/HER2- breast after CDK4/6i. CAPItello-291: capivasertib
  + fulvestrant doubled PFS in PIK3CA/AKT1/PTEN-altered HR+/HER2- mBC
  post-AI ± CDK4/6i (FDA 2023).

regulatory_status:
  fda:
    approved: true
    year_first_approval: 2023
    indications_brief: ["HR+/HER2- mBC with PIK3CA/AKT1/PTEN alteration post-AI (combo fulvestrant)"]
  ema:
    approved: true
    year_first_approval: 2024
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: "STUB — pending CSD-4 verification. Not registered in UA per drlz.com.ua snapshot 2026-04-27."

typical_dosing: >
  STUB. 400 mg PO BID 4-days-on / 3-days-off intermittent schedule,
  combined with fulvestrant 500 mg IM monthly.

formulations:
  - "Tablets 160 mg"
  - "Tablets 200 mg"

absolute_contraindications: []
black_box_warnings: []
common_adverse_events:
  - "Diarrhea (~70% any-grade)"
  - "Hyperglycemia"
  - "Rash / cutaneous reactions"
  - "Nausea"
  - "Fatigue"
serious_adverse_events:
  - "Severe hyperglycemia / DKA (especially diabetic patients)"
  - "Severe diarrhea (G3+)"
  - "Severe cutaneous adverse reaction (SCAR / SJS rare)"
  - "Hepatotoxicity"
major_interactions:
  - "STUB — strong CYP3A4 inhibitors/inducers; PPI not significant"

pharmacology:
  half_life_hours: 9
  clearance: "hepatic"
  protein_binding_pct: null
  metabolism: "CYP3A4"

sources:
  - SRC-NCCN-BREAST-2025
  - SRC-ESMO-BREAST-METASTATIC-2024

last_reviewed: "2026-04-27"
reviewers: []
notes: >
  STUB — Phase CSD-4 promotion. Eligibility: PIK3CA / AKT1 / PTEN
  alteration on tumor or ctDNA NGS. Intermittent dosing critical for
  hyperglycemia/diarrhea management. Needs full curation of dose-adj,
  monitoring (HbA1c baseline, fasting glucose), and SCAR risk.
