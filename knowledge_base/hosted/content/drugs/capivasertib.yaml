id: DRUG-CAPIVASERTIB
names:
  preferred: "Capivasertib"
  ukrainian: "Капівасертиб"
  english: "Capivasertib"
  synonyms: ["AZD5363"]
  brand_names: ["Truqap"]
atc_code: L01EX27
rxnorm_id: ""
drug_class: "Pan-AKT1/2/3 ATP-competitive inhibitor"
mechanism: >
  Potent ATP-competitive small-molecule inhibitor of all three AKT
  serine/threonine kinase isoforms (AKT1, AKT2, AKT3) within the
  PI3K-AKT-mTOR signaling pathway. Suppresses downstream
  phosphorylation of effector substrates (FOXO, GSK3, TSC2, MDM2,
  4EBP1 via mTORC1), reducing proliferation and survival signaling
  and partially reversing endocrine-therapy resistance in HR+
  breast cancer driven by PI3K-pathway alterations. Tumors with
  activating PIK3CA / AKT1 mutations or PTEN loss (~40-50% of HR+/
  HER2- mBC after CDK4/6i) are enriched for response. Pivotal
  evidence CAPItello-291 (HR+/HER2- mBC after AI ± CDK4/6i):
  capivasertib + fulvestrant vs placebo + fulvestrant — overall mPFS
  7.2 vs 3.6 mo HR 0.60; in PIK3CA/AKT1/PTEN-altered subgroup mPFS
  7.3 vs 3.1 mo HR 0.50. FDA approval Nov 2023 (mutation-restricted).

regulatory_status:
  fda:
    approved: true
    year_first_approval: 2023
    indications_brief:
      - "HR+/HER2- mBC with PIK3CA / AKT1 / PTEN alteration after AI ± CDK4/6i (combo fulvestrant)"
  ema:
    approved: true
    year_first_approval: 2024
    indications_brief:
      - "HR+/HER2- mBC with PIK3CA/AKT1/PTEN alteration post-AI (combo fulvestrant)"
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: "Не зареєстровано per drlz.com.ua snapshot 2026-04-27. Доступ via EAP AstraZeneca / cross-border / self-pay. Alpelisib (PIK3CA-mutant; SOLAR-1) was the precedent agent in this space — also not on UA НСЗУ."

typical_dosing: >
  400 mg PO BID on an intermittent 4-days-on / 3-days-off schedule
  (e.g., Days 1-4, 8-11, 15-18, 22-25 of a 28-day cycle), in
  combination with fulvestrant 500 mg IM Days 1, 15 of cycle 1 then
  Day 1 of subsequent 28-day cycles. The intermittent schedule is
  critical — it was empirically optimized in phase-1 for tolerability
  (continuous dosing produced unacceptable hyperglycemia and
  diarrhea). Dose level -1 = 320 mg BID; -2 = 200 mg BID; permanent
  discontinuation if recurrent G3-4 at -2. Hold for severe
  hyperglycemia (FBG ≥250 / random ≥500 / DKA), severe diarrhea
  (G3-4), severe rash (G3-4 / SCAR), severe hepatotoxicity. No formal
  renal adjustment for CrCl ≥30; avoid in severe hepatic impairment.

formulations:
  - "Tablets 160 mg"
  - "Tablets 200 mg"

absolute_contraindications:
  - "Hypersensitivity to capivasertib or any excipient"
  - "Pregnancy (embryo-fetal toxicity)"
  - "Severe hepatic impairment (Child-Pugh C — no PK data)"
  - "Active uncontrolled diabetes / DKA"

black_box_warnings: []

common_adverse_events:
  - "Diarrhea ~70% (any-grade); G3 ~9%"
  - "Hyperglycemia ~17% any-grade (higher in diabetic / pre-diabetic; G3 ~2%)"
  - "Rash / cutaneous reactions (maculopapular, acneiform) ~38%; G3 ~12%"
  - "Nausea ~35%"
  - "Fatigue ~30%"
  - "Vomiting ~20%"
  - "Decreased appetite ~17%"
  - "Stomatitis / mucositis ~15%"
  - "Anemia ~30%"
  - "ALT/AST elevation ~15%"
  - "Increased creatinine (modest; transporter not true AKI) ~10%"
  - "Headache ~17%"

serious_adverse_events:
  - "Severe hyperglycemia / DKA — especially in diabetic patients (~2-4% G3+; mandatory baseline HbA1c + fasting glucose; metformin first-line; insulin escalation as needed)"
  - "Severe diarrhea (G3 ~9%; aggressive loperamide; consider octreotide for refractory)"
  - "Severe cutaneous adverse reaction (G3 rash ~12%, rare SJS/TEN/DRESS — mandate dermatology consult and corticosteroid taper for G3)"
  - "Hepatotoxicity (G3 ALT/AST ~5%)"
  - "Pneumonitis (rare)"
  - "Severe asthenia / fatigue"

major_interactions:
  - "Strong CYP3A4 inhibitors (azoles, clarithromycin, ritonavir) — ↑ exposure; avoid or reduce dose"
  - "Strong CYP3A4 inducers (rifampin, phenytoin, carbamazepine, St John's wort) — ↓ exposure; avoid"
  - "PPI / H2-blockers — minimal effect (no significant pH-dependent absorption)"
  - "Insulin / oral hypoglycemics — adjust diabetes regimen for hyperglycemia management"
  - "Live vaccines — avoid"
  - "Hormonal contraception — efficacy preserved, but pregnancy contraindicated; non-hormonal backup advised"

pharmacology:
  half_life_hours: 9
  clearance: "hepatic (predominantly CYP3A4)"
  protein_binding_pct: 23
  metabolism: "CYP3A4 (primary)"

sources:
  - SRC-NCCN-BREAST-2025
  - SRC-ESMO-BREAST-METASTATIC-2024

last_reviewed: "2026-04-27"
reviewers: []
notes: >
  Eligibility gate: PIK3CA / AKT1 activating mutation OR PTEN loss-of-
  function alteration on tumor or ctDNA NGS (FDA companion diagnostic
  FoundationOne CDx). The 4-on / 3-off intermittent schedule is
  critical — continuous dosing in phase-1 was intolerable. Hyperglycemia
  is the signal AE — substantially less than alpelisib (~70% vs ~17%
  any-grade) but still requires baseline HbA1c, fasting glucose,
  patient education on symptoms, and proactive metformin / insulin
  if pre-existing dysglycemia. Diarrhea management: prophylactic
  loperamide as needed (not routine); dietary modification; hold +
  resume at lower dose for G3+. Rash: dermatology referral early;
  topical / oral steroid taper; hold for G3. Baseline workup: HbA1c,
  fasting glucose, CMP, LFTs, lipid panel, pregnancy test, ECG,
  dermatologic exam. Monitor fasting glucose weekly first 4 weeks
  then with each cycle, HbA1c q3 months, LFTs q2 wk first 8 wk then
  monthly. UA access via EAP / self-pay; not on НСЗУ.

notes_patient: >
  Таблетка-AKTi для раку грудей HR+ з мутаціями шляху AKT/PI3K/PTEN. Комбінується з fulvestrant. Контролюємо рівень цукру і функцію кишечника.
