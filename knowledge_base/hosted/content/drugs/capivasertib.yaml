id: DRUG-CAPIVASERTIB
names:
  preferred: "Capivasertib"
  ukrainian: "Капівасертіб"
  english: "Capivasertib"
  brand_names: ["Truqap"]
atc_code: L01EX29
rxnorm_id: null
drug_class: "AKT serine/threonine kinase inhibitor (pan-AKT)"
mechanism: >
  Selective small-molecule inhibitor of all three AKT isoforms (AKT1/2/3) — blocks the PI3K/AKT/mTOR pathway downstream of PI3K. Activity enriched in tumors with PIK3CA, AKT1, or PTEN alterations (CAPItello-291).

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: |
      Не зареєстровано в UA (Держреєстр ЛЗ — РП відсутнє станом на
      2026-04-27). FDA-approved 2023 для HR+/HER2− advanced breast з
      PIK3CA / AKT1 / PTEN alteration після прогресії на endocrine ±
      CDK4/6i (CAPItello-291).
      Шляхи доступу:
      - Named-patient import (DEC спецдозвіл) — за рахунок пацієнта.
      - EAP AstraZeneca Ukraine (Truqap) — limited.
      - Cross-border (EU): EU мамологічні центри через "Лікування за
        кордоном" (наказ МОЗ 988).
      - Trial-only.
      Source: drlz.com.ua пошук "capivasertib"/"truqap" 2026-04-27 —
      РП відсутнє.

typical_dosing: >
  400 mg PO BID 4 days on / 3 days off + fulvestrant standard dosing.

key_toxicities:
  - Diarrhea (~72% any grade, ~9% G3+) — loperamide first-line
  - Hyperglycemia (~17%) — pre-treatment HbA1c + glucose monitoring
  - Rash (~38%) — antihistamines + topical/systemic corticosteroids
  - Nausea, fatigue
  - Stomatitis

sources: [SRC-CAPITELLO291-TURNER-2023, SRC-NCCN-BREAST-2025, SRC-ESMO-BREAST-METASTATIC-2024]
last_reviewed: "2026-04-27"
notes: >
  CAPItello-291: pathway-altered (PIK3CA / AKT1 / PTEN) HR+/HER2-
  advanced breast post-AI ± CDK4/6i. Pathway-alteration testing
  (NGS preferred; PTEN loss requires combined IHC + NGS) required
  pre-start. Diarrhea management dominant clinical workflow burden.
