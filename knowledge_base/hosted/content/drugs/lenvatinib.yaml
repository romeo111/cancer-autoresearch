typical_dosing: ">60 kg: 12 mg PO daily; ≤60 kg: 8 mg PO daily."
formulations: ["Capsules 4 mg, 10 mg"]
absolute_contraindications: ["Severe uncontrolled hypertension", "Active hemorrhage", "Pregnancy"]
common_adverse_events: ["Hypertension (universal)", "Diarrhea", "Decreased appetite", "Fatigue", "Hand-foot skin reaction", "Hypothyroidism", "Proteinuria"]
serious_adverse_events: ["Severe hypertension / hypertensive crisis", "Cardiac dysfunction", "Hepatic decompensation", "Hemorrhage (esp. varices)", "Posterior reversible encephalopathy syndrome"]
sources: [SRC-NCCN-HCC-2025, SRC-AASLD-HCC-2023]
last_reviewed: "2026-04-26"
notes: >
  Hypertension pre-treatment optimization mandatory: ACE-i / ARB
  first, then add CCB (amlodipine), then beta-blocker if needed.
  Hold for SBP >160 or DBP >100 mm Hg; resume at lower dose once
  controlled. Child-Pugh A only fully studied; CP-B excluded from
  REFLECT (HCC) — limited data. SELECT (radioiodine-refractory DTC):
  mPFS 18.3 vs 3.6 mo placebo. CLEAR (RCC 1L): lenvatinib +
  pembrolizumab vs sunitinib — mPFS 23.9 vs 9.2 mo, OS HR 0.66.
  KEYNOTE-775 (R/R endometrial post-platinum): lenvatinib + pembro
  vs chemo, OS HR 0.62. Baseline + serial BP, urinalysis (UPCR),
  LFTs, TSH, ECG. Counsel hold pre- and post-elective surgery
  (≥2 wk wound-healing). UA: зареєстрований; НСЗУ покриває DTC,
  ГЦК, RCC, ендометрій (з pembro).

notes_patient: >
  Таблетка-TKI, що блокує ріст судин у пухлині (VEGFR) та інші ростові сигнали. Використовується при раку щитоподібної залози, нирок, печінки, ендометрію. Часто підвищує тиск — контролюємо щоденно.
