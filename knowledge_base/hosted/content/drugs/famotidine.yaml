id: DRUG-FAMOTIDINE
names:
  preferred: "Famotidine"
  ukrainian: "Фамотидин"
  english: "Famotidine"
  brand_names:
    - "Pepcid"
    - "Quamatel"
    - "Kvamatel"
atc_code: A02BA03
rxnorm_id: "4278"
drug_class: "Histamine H2 receptor antagonist (acid suppression; allergic-reaction H2 blockade)"
mechanism: >
  Selective competitive antagonist at the histamine H2 receptor on
  gastric parietal cells, blocking histamine-stimulated gastric acid
  secretion (basal, nocturnal, food-stimulated, and pentagastrin-
  stimulated) — produces ~50-90% acid suppression depending on dose.
  In allergic reactions and chemotherapy infusion reactions, the H2
  antagonism complements H1 antagonist (diphenhydramine) blockade —
  histamine acts on both H1 (bronchospasm, vasodilation, urticaria,
  pruritus) AND H2 (vasodilation, gastric secretion, cardiac
  inotropy) receptors, and combined H1 + H2 blockade is superior to
  either alone for prevention and treatment of urticaria, mild
  anaphylactoid reactions, and chemotherapy infusion reactions
  (paclitaxel, carboplatin retreatment, monoclonal antibodies).
  Famotidine is preferred among H2 antagonists in oncology because
  of lack of CYP-mediated drug interactions (cimetidine inhibits
  CYP1A2, CYP2D6, CYP3A4 — major DDI source; ranitidine withdrawn
  worldwide 2019-2020 for NDMA contamination). FDA-approved 1986.
regulatory_status:
  fda:
    approved: true
    year_first_approval: 1986
    indications_brief:
      - "Acid-related disorders (PUD, GERD, ZES, dyspepsia)"
      - "Stress ulcer prophylaxis in critically ill patients"
      - "Premedication for chemotherapy infusion reactions (paclitaxel, monoclonal antibodies)"
      - "Adjunct H2 blockade in anaphylaxis / urticaria (combined with H1 antagonist)"
  ema:
    approved: true
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: true
    reimbursement_indications:
      - "Премедикація хімотерапії (paclitaxel, моноклональні антитіла)"
      - "Лікування алергічних реакцій / кропив'янки (комбінована H1+H2 блокада)"
      - "Кислотозалежні захворювання (виразка, ГЕРХ)"
    last_verified: "2026-04-27"
    notes: "Зареєстровано в Україні (Quamatel/Kvamatel, generics). Дешевий, ubiquitous. NSZU-covered. Перевірено drlz.com.ua 2026-04-27."
typical_dosing: >
  CHEMOTHERAPY PREMEDICATION (paclitaxel, rituximab, monoclonal
  antibodies — adult): 20 mg IV 30 min before infusion (paired with
  diphenhydramine 25-50 mg IV + dexamethasone). ACUTE ALLERGIC /
  INFUSION REACTION ADJUNCT (combined with H1): 20 mg IV every 6 h
  × 24 h. Acid suppression (PUD, GERD): 20-40 mg PO BID or 20 mg IV
  q12h. Stress ulcer prophylaxis: 20 mg IV q12h. Pediatric (≥1 year):
  0.25 mg/kg IV q6-12h, max 40 mg/day. Renal adjustment: CrCl 30-60 →
  20 mg q24h (or half-dose at usual interval); CrCl <30 → 20 mg
  q24-48h or 50% dose; hemodialysis → dose post-dialysis. Hepatic:
  no adjustment. Onset of acid suppression IV: ~30 min; oral: ~1 h.
  Duration acid suppression: 10-12 h. Long-term tolerance and
  rebound hyperacidity less than PPIs.
formulations:
  - "Tablet 10 mg (OTC), 20 mg, 40 mg"
  - "Oral suspension 40 mg / 5 mL"
  - "IV solution 10 mg/mL (1 mL ampule = 10 mg) — diluted in NS"
  - "Combination products with calcium carbonate / magnesium hydroxide (OTC GERD)"
absolute_contraindications:
  - "Hypersensitivity to famotidine or other H2 receptor antagonists"
black_box_warnings: []
common_adverse_events:
  - "Headache — ~5%"
  - "Dizziness — ~2-3%"
  - "Constipation — ~2%"
  - "Diarrhea — ~2%"
  - "Asthenia / fatigue — ~2%"
  - "Mild transaminitis — ~1-2%"
  - "Local injection-site reaction (IV) — minor"
  - "Mild bradycardia (with rapid IV) — ~1-2%"
  - "Nausea — ~1-2%"
  - "Insomnia — ~1-2%"
  - "Dry mouth — ~1-2%"
  - "Vitamin B12 deficiency (very prolonged use, ≥2 years) — uncommon"
serious_adverse_events:
  - "QT prolongation (modest; significant only in renal failure with under-adjusted dosing or combined with other QT drugs)"
  - "Severe bradycardia / heart block (with rapid IV in elderly or cardiac patients) — rare"
  - "Pancytopenia / agranulocytosis (rare)"
  - "Stevens-Johnson syndrome / TEN (very rare)"
  - "Anaphylaxis (very rare; paradoxical given indication)"
  - "Hepatic dysfunction (rare; reversible)"
  - "Confusion / delirium (elderly with renal impairment, under-adjusted dosing)"
  - "Severe hypersensitivity / interstitial nephritis (rare)"
major_interactions:
  - "Iron supplements, atazanavir, dasatinib, erlotinib, gefitinib, dabigatran, ketoconazole, itraconazole: H2 antagonists raise gastric pH → reduced absorption of pH-dependent drugs — separate dosing or substitute proton pump inhibitor caveat applies"
  - "Tizanidine: minor effect (unlike cimetidine which is contraindicated)"
  - "Theophylline: minimal effect (unlike cimetidine)"
  - "Procainamide: famotidine modestly reduces procainamide renal clearance — minor"
  - "Live vaccines: no specific interaction"
  - "Other CYP-metabolized drugs: NO clinically significant CYP-mediated interactions (key advantage over cimetidine)"
  - "Antacids: separate by ≥1 h to avoid reduced famotidine absorption"
  - "Corticosteroids, NSAIDs: famotidine offers acid suppression for stress ulcer prophylaxis — beneficial co-administration"
pharmacology:
  half_life_hours: 3  # 2.5-4 h normal renal function; up to 20 h in severe renal failure
  clearance: "Renal (~70% excreted unchanged in urine)"
  protein_binding_pct: 17
  metabolism: "Minimal hepatic metabolism (~30% via S-oxidation); predominantly renal excretion of unchanged drug — strict renal dose adjustment required for CrCl <60"
sources:
  - SRC-NCCN-BCELL-2025
  - SRC-NCCN-MM-2025
last_reviewed: "2026-04-27"
reviewer_signoffs: []
notes: >
  Standard H2 component of chemotherapy premedication, paired with H1
  antihistamine (diphenhydramine) and corticosteroid (dexamethasone).
  Particularly important before paclitaxel (Cremophor vehicle hyper-
  sensitivity), rituximab, daratumumab, and other monoclonal antibodies
  with significant infusion reaction rates. Combined H1 + H2 blockade
  is empirically superior to H1 alone for prevention of mild-to-moderate
  hypersensitivity reactions (Lieberman-Goodyear, 2010). NEVER a
  substitute for epinephrine in true anaphylaxis — H1 + H2 + steroid
  treats pruritus, urticaria, mild bronchospasm, but does not reverse
  hypotension or upper airway edema. Famotidine preferred over cimetidine
  in oncology because of clean DDI profile (cimetidine inhibits multiple
  CYPs causing exposure increases of warfarin, theophylline, phenytoin,
  TKIs, vincristine — major hazard); ranitidine withdrawn worldwide
  2019-2020 for NDMA contamination. CRITICAL: H2 antagonists raise
  gastric pH → reduce absorption of pH-dependent oral oncology agents
  (dasatinib, erlotinib, gefitinib, dabigatran, atazanavir) — separate
  by 2-10 h or substitute / time TKI dose. Renal dose adjustment
  important to prevent confusion / delirium in elderly. Ukraine: cheap,
  ubiquitous, NSZU-covered.
