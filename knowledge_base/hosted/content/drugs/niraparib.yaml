id: DRUG-NIRAPARIB
names:
  preferred: "Niraparib"
  ukrainian: "Нірапариб"
  english: "Niraparib"
  brand_names: ["Zejula", "Akeega (with abiraterone)"]
atc_code: L01XK02
rxnorm_id:
drug_class: "PARP inhibitor"
mechanism: >
  PARP1/2 inhibitor with mCRPC indication in combination with abiraterone for BRCA-mutant disease (MAGNITUDE trial). Akeega is the fixed-dose combination tablet with abiraterone.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: true
    last_verified: "2026-04-27"
    notes: "Реєстрація МОЗ підтверджена (раніше registered=false — виправлено). НСЗУ покриває оваріальне 1L maintenance (PRIMA) та 2L+ платиночутливе. Джерело: nszu.gov.ua (2026-04)."

    reimbursement_indications:
    - 'Програма медичних гарантій 2026: рак яєчників — підтримуюча терапія 1L (PRIMA, незалежно від BRCA, HRD-стратифіковано)'
    - 'Реімбурсаційний пакет «Онкологія» 2026: рак яєчників рецидивний платиночутливий — підтримуюча терапія'
typical_dosing: >
  Akeega combination: niraparib 200 mg + abiraterone 1000 mg PO daily + prednisone 10 mg daily.

key_toxicities:
- Anemia (~43%)
- Thrombocytopenia (~36%) — distinguishing AE; dose-reduce frequently
- Hypertension (combination effect with abiraterone)
- Fatigue
- Nausea

sources: [SRC-NCCN-PROSTATE-2025, SRC-ESMO-PROSTATE-2024]
last_reviewed:
notes: >
  BRCA-mutant mCRPC option; thrombocytopenia management more demanding than olaparib. UA-access barrier.

notes_patient: >
  Таблетка-PARPi: блокує лагодження ДНК у пухлинних клітинах. Використовується як підтримуюча терапія при раку яєчників. Контролюємо аналіз крові — можливе зниження тромбоцитів і нейтрофілів.
