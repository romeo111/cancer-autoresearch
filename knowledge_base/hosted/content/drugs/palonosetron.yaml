id: DRUG-PALONOSETRON
names:
  preferred: "Palonosetron"
  ukrainian: "Палоносетрон"
  english: "Palonosetron"
  brand_names:
    - "Aloxi"
    - "Onicit"
atc_code: A04AA05
rxnorm_id: "284258"
drug_class: "Long-acting second-generation 5-HT3 receptor antagonist (antiemetic)"
mechanism: >
  Selective competitive antagonist at the 5-hydroxytryptamine type 3
  (5-HT3) serotonin receptor located peripherally on vagal afferent
  terminals in the GI tract and centrally in the chemoreceptor trigger
  zone (area postrema). Distinguishing features vs first-generation
  5-HT3 antagonists (ondansetron, granisetron): ~30× higher receptor
  binding affinity, ~7× longer plasma half-life (~40 h vs ~4-6 h),
  and demonstrated allosteric receptor cross-talk with NK1 receptors
  that contributes to superior delayed-phase CINV control. A single
  IV or oral dose covers both acute (0-24 h) and delayed (24-120 h)
  phases of CINV. Approved by FDA July 2003 and EMA March 2005.
regulatory_status:
  fda:
    approved: true
    year_first_approval: 2003
    indications_brief: ["Prevention of acute and delayed CINV with MEC and HEC", "Postoperative nausea/vomiting"]
  ema:
    approved: true
    year_first_approval: 2005
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: true
    reimbursement_indications:
      - "Антиеметична профілактика при моделовано- та високоемоегенній хіміотерапії — long-acting 5-HT3 антагоніст переважний для multi-day режимів та для контролю delayed-phase CINV"
    last_verified: "2026-04-27"
    notes: "Зареєстровано в Україні (Aloxi, Onicit, generics). Покриття НСЗУ. Перевірено drlz.com.ua 2026-04-27."
typical_dosing: >
  0.25 mg IV bolus over 30 seconds, 30 minutes before chemotherapy on
  day 1 only (single dose covers ≥120 h). Oral 0.5 mg PO 1 hour before
  chemotherapy is alternative. For multi-day chemotherapy (e.g., ICE,
  cisplatin × 5), repeat on alternate days (e.g., d1 and d3) is common
  off-label practice; dosing every 7 days has supportive evidence in
  metronomic regimens. No dose adjustment for renal or hepatic
  impairment. Pediatric (1 month-17 years): 20 µg/kg IV (max 1.5 mg).
  No dose cap with concomitant strong CYP enzyme modulators (minimal
  CYP-mediated metabolism). NK1 antagonist + dexamethasone added to
  palonosetron for HEC = standard triple-antiemetic regimen.
formulations:
  - "IV solution 0.25 mg / 5 mL (50 µg/mL) single-dose vial"
  - "Capsule 0.5 mg (Aloxi)"
  - "Fixed-dose combination with netupitant 300/0.5 mg (Akynzeo) — single oral capsule integrating NK1 + 5-HT3"
absolute_contraindications:
  - "Hypersensitivity to palonosetron or any 5-HT3 antagonist"
  - "Congenital long QT syndrome (relative, but contraindicated by some prescribing information)"
black_box_warnings: []
common_adverse_events:
  - "Headache — ~9%"
  - "Constipation — ~5%"
  - "QT prolongation (modest, dose-dependent) — ~1-2%"
  - "Dizziness — ~3%"
  - "Diarrhea — ~3%"
  - "Fatigue — ~3%"
  - "Bradycardia — ~2%"
  - "Increased ALT/AST — ~2-3%"
  - "Insomnia — ~2%"
  - "Abdominal pain — ~2%"
  - "Asthenia — ~2%"
  - "Hypertension — ~1-2%"
serious_adverse_events:
  - "Serotonin syndrome (when combined with serotonergic drugs — SSRIs, SNRIs, MAOIs, fentanyl, tramadol)"
  - "Severe QT prolongation / torsades de pointes (extremely rare with palonosetron — lowest QT signal in 5-HT3 class)"
  - "Severe hypersensitivity / anaphylaxis (rare)"
  - "Bowel obstruction / severe constipation in predisposed patients"
  - "Stevens-Johnson syndrome (very rare)"
major_interactions:
  - "Apomorphine: CONTRAINDICATED with all 5-HT3 antagonists (severe hypotension, loss of consciousness)"
  - "Serotonergic drugs (SSRIs, SNRIs, MAOIs, fentanyl, tramadol, methylene blue, lithium, St John's wort): increased risk of serotonin syndrome — monitor for tremor, hyperreflexia, agitation"
  - "QT-prolonging drugs (ondansetron at high IV doses, ciprofloxacin, methadone, fluconazole, antipsychotics): additive QT effect — palonosetron itself has minimal QT effect at standard doses"
  - "Other 5-HT3 antagonists: avoid combination (no added benefit, additive AE)"
  - "Drugs with narrow therapeutic index metabolized by CYP3A4 / CYP2D6: minimal interaction (palonosetron is poorly metabolized) — key advantage in polypharmacy"
pharmacology:
  half_life_hours: 40  # 35-45 h — longest of 5-HT3 class
  clearance: "50% renal (unchanged drug + N-oxide metabolite); 50% hepatic"
  protein_binding_pct: 62
  metabolism: "CYP2D6 (minor) and CYP3A4 (minor); largely renal excretion of unchanged drug — minimal DDI profile"
sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-DLBCL-2024
last_reviewed: "2026-04-27"
reviewer_signoffs: []
notes: >
  Preferred 5-HT3 antagonist for HEC and for multi-day chemotherapy
  regimens because of long half-life and demonstrated superiority in
  delayed-phase CINV control vs ondansetron in head-to-head trials
  (Saito 2009, Aapro 2014). Triple antiemetic regimen for HEC: NK1
  antagonist (aprepitant or fosaprepitant) + palonosetron 0.25 mg IV +
  dexamethasone 12 mg IV day 1, with dex tapered through delayed phase.
  Akynzeo (netupitant 300 mg + palonosetron 0.5 mg) fixed-dose oral
  capsule simplifies triple therapy to two pills (Akynzeo + dex) on
  day 1. Lowest QT signal in 5-HT3 class — preferred when ondansetron
  contraindicated due to QT concerns or cardiac comorbidity. Minimal
  CYP-mediated metabolism makes it the safer 5-HT3 choice in
  polypharmacy patients (e.g., patients on CYP3A4 inhibitors).
