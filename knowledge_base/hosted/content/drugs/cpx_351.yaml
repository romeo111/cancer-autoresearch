id: DRUG-CPX-351
names:
  preferred: "CPX-351 (liposomal cytarabine + daunorubicin 5:1)"
  ukrainian: "CPX-351 (ліпосомний цитарабін + даунорубіцин 5:1)"
  english: "Liposomal cytarabine-daunorubicin"
  brand_names: ["Vyxeos"]
  synonyms:
    - "Vyxeos"
    - "Liposomal daunorubicin-cytarabine"
atc_code: L01XY01
rxnorm_id: "1989612"
drug_class: "Liposomal-encapsulated cytarabine + daunorubicin (5:1 molar ratio)"
mechanism: >
  Bilayer liposome co-encapsulating cytarabine + daunorubicin in a
  pharmacologically synergistic 5:1 molar ratio, prolonging
  intracellular drug exposure. Demonstrated OS benefit vs standard
  7+3 specifically in older patients with secondary AML
  (therapy-related AML or AML with myelodysplasia-related changes,
  AML-MRC).

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: |
      Не зареєстровано в UA (Держреєстр ЛЗ — РП відсутнє станом на 2026-04-27).
      Liposomal cytarabine+daunorubicin (5:1) для t-AML/AML-MRC;
      не входить до НСЗУ. (Стандартні цитарабін+даунорубіцин у НСЗУ).
      Шляхи доступу:
      - Named-patient import (DEC спецдозвіл) — за рахунок пацієнта.
      - EAP Jazz Pharmaceuticals (Vyxeos — через EU дистрибʼютора).
      - Cross-border (EU): EU гематоцентри через "Лікування за кордоном"
        (наказ МОЗ 988); EMA-затверджено 2018.
      - Trial-only: post-marketing studies в EU.
      Source: drlz.com.ua пошук "cpx-351"/"vyxeos" 2026-04-27 — РП відсутнє.

typical_dosing: >
  Induction: 100 units/m² IV (= cytarabine 100 mg/m² + daunorubicin
  44 mg/m²) on days 1, 3, 5 of cycle 1 (re-induction days 1, 3 if
  needed). Consolidation: 65 units/m² IV on days 1, 3 every 5-8
  weeks for up to 2 cycles. Strict ECHO before each cycle (cumulative
  anthracycline tracking).

formulations: ["Powder for IV infusion: 44 mg daunorubicin + 100 mg cytarabine per vial"]

absolute_contraindications:
  - "Hypersensitivity to cytarabine, daunorubicin, or copper-containing components"
  - "Severe hepatic impairment"

black_box_warnings:
  - "Not interchangeable with other cytarabine or daunorubicin products — fatal dosing errors reported"
  - "Cardiotoxicity — cumulative anthracycline tracking mandatory"
  - "Severe + prolonged myelosuppression"

major_interactions:
  - "Other cardiotoxic drugs (anthracyclines, trastuzumab) — additive cardiac risk"
  - "Live vaccines: avoid"

common_adverse_events:
  - "Severe + prolonged cytopenia (neutropenia, thrombocytopenia)"
  - "Febrile neutropenia / sepsis"
  - "Bleeding"
  - "Mucositis / diarrhea"
  - "Rash"
  - "Fatigue"

serious_adverse_events:
  - "Hemorrhage (CNS / GI)"
  - "Cardiotoxicity (LVEF decline, CHF)"
  - "Severe + prolonged myelosuppression — recovery often >day 35"
  - "Tissue necrosis on extravasation"

pharmacology: {half_life: "Cytarabine ~40 h / daunorubicin ~32 h (liposomal); compare ~3 h / ~18.5 h free"}

sources: [SRC-NCCN-AML-2025, SRC-ELN-AML-2022]
last_reviewed: "2026-04-25"
notes: >
  Pivotal: Lancet et al. (J Clin Oncol 2018) phase-3 in older
  (60-75) patients with AML-MRC, t-AML, or AML-CMML history; median
  OS 9.56 vs 5.95 mo (HR 0.69) vs standard 7+3. Approved FDA Aug
  2017 specifically for "newly-dx tAML or AML-MRC" — narrow
  population. Ukraine: NOT registered — access via named-patient
  import / EAP Jazz / cross-border. CRITICAL: dosing units are
  "units/m²" NOT "mg/m²" — labeling errors fatal (each unit = 1
  mg cytarabine + 0.44 mg daunorubicin in fixed liposomal ratio).
  Verify each prescription with pharmacy + nursing.
