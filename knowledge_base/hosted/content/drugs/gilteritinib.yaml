id: DRUG-GILTERITINIB
names:
  preferred: "Gilteritinib"
  ukrainian: "Гілтеритиніб"
  english: "Gilteritinib"
  brand_names: ["Xospata"]
atc_code: L01EX13
rxnorm_id: "2103164"
drug_class: "Selective FLT3 + AXL tyrosine kinase inhibitor (Type I)"
mechanism: >
  Type-I FLT3 inhibitor active against both FLT3-ITD and FLT3-TKD
  (D835) mutations, including activation-loop mutations that confer
  resistance to Type-II FLT3 inhibitors (quizartinib, sorafenib).
  Also inhibits AXL (proposed FLT3-TKI resistance mechanism).
  Approved on the basis of ADMIRAL trial (single-agent vs salvage
  chemotherapy in R/R FLT3-mutated AML).

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: |
      Не зареєстровано в UA (Держреєстр ЛЗ — РП відсутнє станом на 2026-04-27).
      FLT3-інгібітор для r/r FLT3-mutated AML; не входить до НСЗУ
      (мідостаурин у пакеті НСЗУ для frontline FLT3-AML, гілтеритиніб — ні).
      Шляхи доступу:
      - Named-patient import (DEC спецдозвіл) — за рахунок пацієнта.
      - EAP Astellas Ukraine (Xospata access program — потребує
        FLT3-ITD/TKD підтвердженої мутації PCR/NGS).
      - Cross-border (EU): EU гематоцентри через "Лікування за
        кордоном" (наказ МОЗ 988).
      - Trial-only: ADMIRAL post-marketing, post-HCT maintenance trials.
      Source: drlz.com.ua пошук "gilteritinib"/"xospata" 2026-04-27 — РП відсутнє.

typical_dosing: >
  120 mg PO once daily, continuous, until disease progression or
  unacceptable toxicity. Dose modifications for QTc prolongation,
  differentiation syndrome, posterior reversible encephalopathy
  syndrome (PRES), pancreatitis. Take with or without food.

formulations: ["Tablets 40 mg"]

absolute_contraindications:
  - "Hypersensitivity to gilteritinib"

black_box_warnings:
  - "Differentiation syndrome — fatal if not recognized; corticosteroids + dose interruption mandatory"
  - "PRES (posterior reversible encephalopathy syndrome) — discontinue if confirmed"
  - "QTc prolongation — baseline + serial ECG; correct K+/Mg++"

major_interactions:
  - "Strong CYP3A4 inhibitors (azoles, clarithromycin, ritonavir) — increase exposure"
  - "Strong CYP3A4 inducers (rifampin, phenytoin, St John's wort) — avoid"
  - "Other QT-prolonging drugs — additive risk"

common_adverse_events:
  - "Transaminase elevation"
  - "Myalgia / arthralgia"
  - "Fatigue"
  - "Nausea / diarrhea"
  - "Edema"
  - "Anemia / thrombocytopenia / neutropenia"

serious_adverse_events:
  - "Differentiation syndrome (~3-5%)"
  - "PRES (rare but serious)"
  - "QTc prolongation"
  - "Pancreatitis"
  - "Hepatotoxicity"

pharmacology: {half_life: "~113 hours"}

sources: [SRC-NCCN-AML-2025, SRC-ELN-AML-2022]
last_reviewed: "2026-04-25"
notes: >
  Pivotal trial: ADMIRAL (Perl et al., NEJM 2019) — single-agent
  gilteritinib vs investigator-choice salvage chemo in R/R
  FLT3-mutated AML; median OS 9.3 vs 5.6 mo (HR 0.64). Standard
  2L+ for R/R FLT3-mutated AML. Type-I selectivity covers both
  FLT3-ITD and FLT3-TKD/D835 mutations (advantage vs Type-II
  quizartinib which misses TKD). Ukraine: NOT registered, NOT
  reimbursed — major access barrier; international referral or
  EAP Astellas Ukraine compassionate-use pathway required.
  Differentiation syndrome (3-5%) is the signature AE — mandate
  corticosteroid hold + supportive care; rechallenge after
  resolution.
