id: DRUG-GEFITINIB
names:
  preferred: "Gefitinib"
  ukrainian: "Гефітиніб"
  english: "Gefitinib"
  brand_names: ["Iressa"]
atc_code: L01EB01
rxnorm_id:
drug_class: "1st-generation EGFR TKI (reversible)"
mechanism: >
  Reversible EGFR-TKI similar to erlotinib. Equivalent efficacy in clinical use.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: true
    reimbursement_indications:
    - 'Програма медичних гарантій 2026: НДРЛ EGFR-mut 1L (історично)'
    last_verified: "2026-04-27"
    notes: "Зареєстрований; НСЗУ покриває для НДРЛ EGFR-mut. Як і erlotinib — клінічно витіснений osimertinib. Джерело: nszu.gov.ua (2026-04)."

typical_dosing: >
  250 mg PO once daily.

key_toxicities:
- Same class profile as erlotinib (rash, diarrhea, fatigue)

sources: [SRC-NCCN-NSCLC-2025, SRC-ESMO-NSCLC-METASTATIC-2024]
last_reviewed:
notes: >
  Interchangeable with erlotinib. Also supplanted by osimertinib in 1L.
