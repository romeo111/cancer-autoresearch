id: DRUG-ABIRATERONE
names:
  preferred: "Abiraterone acetate"
  ukrainian: "Абіратерон"
  english: "Abiraterone acetate"
  brand_names: ["Zytiga", "Yonsa"]
atc_code: L02BX03
rxnorm_id: null
drug_class: "Androgen biosynthesis inhibitor (CYP17A1)"
mechanism: >
  Selective irreversible CYP17A1 inhibitor — blocks adrenal and intratumoral androgen synthesis (testosterone, DHT precursors). Always combined with low-dose corticosteroid (prednisone) to mitigate mineralocorticoid excess (hypertension, hypokalemia, fluid retention).

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: true
    reimbursement_indications:
      - "Метастатичний кастраційно-резистентний рак передміхурової залози (mCRPC)"
      - "Метастатичний гормон-чутливий рак передміхурової залози високого ризику (mHSPC, LATITUDE/STAMPEDE)"
    last_verified: "2026-04-27"
    notes: "Доступний як генерик; покривається НСЗУ для mCRPC та mHSPC високого ризику. Перевірено 2026-04-27 (drlz.com.ua, nszu.gov.ua/likuvannya-zlovkisnykh-novoutvoren)."
key_toxicities:
  - Hypertension (~20%) — monitor BP; usually responds to standard antihypertensives
  - Hypokalemia (~17%) — monitor K+; may require supplementation
  - Fluid retention / peripheral edema (~25%)
  - Hepatotoxicity (~10% transaminase elevations; monitor LFT q2w x 3 months then monthly)
  - Cardiac events (modest excess; AF, HF)
  - Adrenocortical insufficiency if prednisone discontinued abruptly

sources: [SRC-NCCN-PROSTATE-2025, SRC-ESMO-PROSTATE-2024]
last_reviewed: null
notes: >
  Workhorse ARPI for mHSPC LATITUDE-high-risk and mCRPC 1L. Always co-administer prednisone — mineralocorticoid syndrome from CYP17 blockade is serious.

notes_patient: >
  Таблетка для раку простати: блокує синтез тестостерону в усіх тканинах (не лише в яєчках). Приймається з преднізолоном — для безпеки кори надниркових залоз.
