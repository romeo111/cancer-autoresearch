id: DRUG-ETOPOSIDE
names:
  preferred: "Etoposide"
  ukrainian: "Етопозид"
  english: "Etoposide"
  synonyms: ["VP-16", "Etoposide phosphate (Etopophos)"]
  brand_names: ["VePesid", "Toposar", "Etopophos", "Vepeside"]
atc_code: L01CB01
rxnorm_id: "4179"
drug_class: "antineoplastic — topoisomerase II inhibitor (epipodophyllotoxin)"
mechanism: >
  Semi-synthetic podophyllotoxin derivative; stabilizes the cleavable
  topoisomerase II–DNA complex, preventing strand religation and producing
  protein-linked DNA double-strand breaks that trigger apoptosis. Cell-cycle
  S/G2 phase active. Etoposide phosphate (Etopophos) is a water-soluble
  prodrug rapidly converted to etoposide by serum phosphatases, allowing
  faster IV administration without solvent reactions.

regulatory_status:
  fda:
    approved: true
    year_first_approval: 1983
    indications_brief: ["Refractory testicular tumors (BEP)", "Small-cell lung cancer", "Off-label widespread: lymphoma (DA-EPOCH-R, BEACOPP, ICE, ESHAP), AML salvage, HLH (HLH-94/2004)"]
  ema:
    approved: true
    year_first_approval: 1983
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: true
    reimbursement_indications:
      - "Дрібноклітинний рак легень (EP, EC ± atezolizumab/durvalumab)"
      - "Гермінативно-клітинні пухлини (BEP)"
      - "Лімфоми (R-EPOCH, R-ICE, BEACOPP)"
      - "Гострий мієлоїдний лейкоз (FLAG-Ida — окремі схеми)"
    last_verified: "2026-04-27"
typical_dosing: >
  DA-EPOCH-R (DLBCL / Burkitt / HGBL): 50 mg/m²/day continuous IV days
  1-4 (96-h infusion), starting dose; dose-adjusted up by ~20% per cycle
  if ANC nadir >0.5.
  BEACOPP escalated (Hodgkin): 200 mg/m² IV days 1-3.
  ICE (R/R DLBCL pre-ASCT): 100 mg/m² IV days 1-3.
  ESHAP: 40 mg/m²/day continuous IV days 1-4 (96-h infusion).
  AML 7+3 alternative / induction reinforcement: 100-150 mg/m² IV days 1-5.
  HLH-94/2004: 150 mg/m² IV twice weekly × 2 weeks then weekly.
  BEP (testicular): 100 mg/m² IV days 1-5 every 21 days × 3-4 cycles.
formulations:
  - "IV concentrate 20 mg/mL (100, 500, 1000 mg vials)"
  - "Etopophos (phosphate prodrug) IV powder 100 mg / vial"
  - "Capsules 50 mg, 100 mg (oral; ~50% bioavailability)"

absolute_contraindications:
  - "Severe hypersensitivity to etoposide, etoposide phosphate, or polysorbate 80"
  - "Severe pre-existing myelosuppression"
  - "Severe hepatic impairment (relative; dose-reduce)"

black_box_warnings:
  - "Severe myelosuppression (dose-limiting at all schedules)"
  - "Anaphylactoid reactions during IV infusion (avoid rapid bolus; infuse over ≥30-60 min for VP-16, faster acceptable for Etopophos)"
  - "Secondary AML with 11q23 (KMT2A/MLL) translocation — well-documented therapy-related risk"

common_adverse_events:
  - "Myelosuppression (neutropenia ~70% grade ≥3 at standard dose)"
  - "Alopecia — universal with multi-day dosing"
  - "Nausea / vomiting — moderate emetogenicity (~40%)"
  - "Mucositis — ~20% standard; ~50% high-dose"
  - "Hypotension during infusion (rate-related; resolves with slowing) — ~5%"
  - "Fatigue — ~50%"
  - "Anorexia — ~30%"
  - "Diarrhea — ~25%"
  - "Hepatic transaminase elevation — ~10%"
  - "Peripheral neuropathy (mild) — ~5%"
  - "Phlebitis at IV site — common"

serious_adverse_events:
  - "Severe neutropenia with febrile neutropenia / sepsis"
  - "Therapy-related AML / MDS with 11q23 (~1-3%, latency 1-3 years; higher with weekly schedules)"
  - "Anaphylactoid infusion reaction (bronchospasm, hypotension)"
  - "Stevens-Johnson syndrome / TEN (rare)"
  - "Tumor lysis syndrome (with high-burden disease)"
  - "Cardiac toxicity at high doses (rare)"

major_interactions:
  - "Warfarin — INR rises; monitor closely"
  - "Strong CYP3A4 inhibitors (azoles, ritonavir, clarithromycin) — increase exposure / toxicity"
  - "Strong CYP3A4 inducers (rifampin, phenytoin, carbamazepine) — reduce exposure"
  - "Cyclosporine — significantly increases etoposide AUC (used therapeutically in some HLH protocols)"
  - "Live vaccines — contraindicated"
  - "P-glycoprotein inhibitors — may increase exposure"

pharmacology:
  half_life_hours: 7  # 6-8 h IV; oral similar
  clearance: "mixed hepatic + renal (~30-40% unchanged renal)"
  protein_binding_pct: 95
  metabolism: "CYP3A4 (catechol metabolite) and conjugation; renal excretion of parent and metabolites"

sources:
  - SRC-NCCN-BCELL-2025
last_reviewed: "2026-04-26"
reviewers: []
notes: >
  Used widely in heme: DA-EPOCH-R (DLBCL / Burkitt / HGBL / PMBL),
  BEACOPP-escalated (Hodgkin), ICE / RICE (R/R DLBCL salvage), ESHAP
  (R/R lymphoma salvage), HLH-94/2004 (hemophagocytic lymphohistiocytosis),
  AML salvage / induction-intensification protocols, and BEP (germ-cell).
  Therapy-related AML with 11q23 (KMT2A/MLL fusion) is the principal
  late toxicity, more frequent with weekly than 3-weekly dosing
  (cumulative exposure threshold ~2 g/m²). Slow infusion (≥30-60 min)
  to avoid hypotension and infusion reactions; Etopophos phosphate
  prodrug allows faster infusion without solvent toxicity. Oral
  bioavailability variable (~50%) — IV preferred for curative protocols.

notes_patient: >
  Хіміотерапія, що блокує фермент topoisomerase і не дає пухлинним клітинам поділятися. Вводиться внутрішньовенно або у вигляді капсул; частина багатьох комбінованих схем.
