id: DRUG-TRABECTEDIN
names:
  preferred: "Trabectedin"
  ukrainian: "Трабектедин"
  english: "Trabectedin"
  synonyms: ["Ecteinascidin-743", "ET-743"]
  brand_names: ["Yondelis"]
atc_code: L01CX01
rxnorm_id:
drug_class: "Marine-derived alkylating agent (tetrahydroisoquinoline alkaloid; minor-groove DNA binder)"
mechanism: >
  Binds the minor groove of DNA at guanine N2, bending the helix toward
  the major groove and inducing transcription-coupled nucleotide-excision
  repair–dependent DNA double-strand breaks. Modulates the tumor
  microenvironment by depleting tumor-associated macrophages.

regulatory_status:
  fda:
    approved: true
    year_first_approval: 2015
    indications_brief:
      - "Unresectable or metastatic liposarcoma / leiomyosarcoma after anthracycline (single-agent)"
  ema:
    approved: true
    year_first_approval: 2007
    indications_brief:
      - "Advanced soft-tissue sarcoma after anthracycline + ifosfamide failure"
      - "Relapsed platinum-sensitive ovarian cancer in combination with PLD (OVA-301)"
  ukraine_registration:
    registered: false
    reimbursed_nszu: false
    last_verified: "2026-04-27"
    notes: "Не зареєстрований в Україні станом на 2026-04. Доступ — благодійний/іменний імпорт. CSD-4 stub."
typical_dosing: >
  Sarcoma (single-agent): 1.5 mg/m² IV over 24 h every 21 days via central
  line, with mandatory dexamethasone 20 mg IV 30 min pre-dose.
  Ovarian (with PLD per OVA-301): 1.1 mg/m² IV over 3 h every 21 days
  given immediately after PLD 30 mg/m².

formulations:
  - "Powder for IV infusion 0.25 mg, 1 mg vials"

absolute_contraindications:
  - "Active serious / uncontrolled infection"
  - "Severe hepatic impairment (bilirubin > ULN)"
  - "Hypersensitivity to trabectedin"
  - "Concurrent yellow-fever vaccine"

black_box_warnings: []

major_interactions:
  - "Strong CYP3A4 inhibitors (ketoconazole, ritonavir) — markedly increase exposure; avoid"
  - "Strong CYP3A4 inducers (rifampin, phenytoin) — reduce exposure; avoid"
  - "Hepatotoxic drugs — additive risk"
  - "Live vaccines — avoid"

common_adverse_events:
  - "Nausea / vomiting (~70%)"
  - "Fatigue (~60%)"
  - "Neutropenia (~60%)"
  - "Anemia"
  - "Thrombocytopenia"
  - "Transaminase elevation (>50% — usually transient, peaks day 5)"
  - "Anorexia"
  - "Constipation / diarrhea"
  - "Headache"
  - "Myalgia / arthralgia"

serious_adverse_events:
  - "Severe neutropenia / febrile neutropenia"
  - "Hepatotoxicity — including cholestatic and rare fatal hepatic failure"
  - "Rhabdomyolysis (creatine-kinase elevation; check pre-each cycle)"
  - "Cardiomyopathy (left-ventricular dysfunction; baseline + serial echo)"
  - "Capillary leak syndrome (rare)"
  - "Extravasation injury — must give via central venous access"

pharmacology:
  half_life_hours: 180
  clearance: "hepatic (CYP3A4 predominant)"
  protein_binding_pct: 97
  metabolism: "CYP3A4 (extensive); biliary excretion"

sources:
  - SRC-NCCN-OVARIAN-2025
  - SRC-ESMO-OVARIAN-2024
  - SRC-OVA-301-MONK-2010

last_reviewed: "2026-04-27"
reviewers: []
notes: >
  Ovarian: OVA-301 (Monk et al., JCO 2010, PMID 20194850) — phase 3
  trabectedin + PLD vs PLD alone in relapsed ovarian; PFS 7.3 vs 5.8 mo
  overall (HR 0.79); benefit greatest in partially-platinum-sensitive
  (PFI 6-12 mo) subgroup. Mandatory premedication with dexamethasone
  reduces hepatic and emetogenic toxicity. Central line required.
  Cumulative cardiotoxicity risk additive to anthracycline exposure —
  baseline and serial LVEF monitoring mandatory in PLD combination.
