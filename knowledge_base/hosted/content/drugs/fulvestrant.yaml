id: DRUG-FULVESTRANT
names:
  preferred: "Fulvestrant"
  ukrainian: "Фулвестрант"
  english: "Fulvestrant"
  brand_names: ["Faslodex"]
atc_code: L02BA03
rxnorm_id: null
drug_class: "SERD (selective estrogen receptor degrader)"
mechanism: >
  Pure ER antagonist — binds ER and induces its degradation, with no agonist activity. Standard of care second-line endocrine therapy for HR+/HER2- metastatic, especially after AI failure.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: true
    reimbursement_indications:
      - "Метастатичний HR+/HER2- рак молочної залози (моно- або у комбінації з CDK4/6i / alpelisib)"
    last_verified: "2026-04-27"
    notes: "Reimbursed for HR+/HER2- metastatic."
key_toxicities:
  - Injection-site reactions (~14%)
  - Hot flashes
  - Bone pain
  - Fatigue
  - Hepatic transaminase elevations (mild)
  - Same general endocrine-deprivation effects as AIs

sources: [SRC-NCCN-BREAST-2025, SRC-ESMO-BREAST-METASTATIC-2024]
last_reviewed: null
notes: >
  Workhorse 2L endocrine therapy. Combined with palbociclib (PALOMA-3), ribociclib (MONALEESA-3), abemaciclib (MONARCH-2) for CDK4/6i-naive disease, or after CDK4/6i progression as monotherapy or with alpelisib (PIK3CA-mutant).

notes_patient: >
  Ін'єкція раз на місяць у м'язи: повністю руйнує естрогеновий рецептор у пухлинних клітинах (SERD). Використовується при раку грудей HR+, часто разом з CDK4/6-інгібіторами.
