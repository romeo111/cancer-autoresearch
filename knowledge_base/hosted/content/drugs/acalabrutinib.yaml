id: DRUG-ACALABRUTINIB
names:
  preferred: "Acalabrutinib"
  ukrainian: "Акалабрутиніб"
  english: "Acalabrutinib"
  brand_names: ["Calquence"]
atc_code: L01EL02
rxnorm_id: "1986828"
drug_class: "Second-generation BTK inhibitor (selective)"
mechanism: >
  Covalent irreversible inhibitor of Bruton's tyrosine kinase (BTK).
  More selective than ibrutinib for BTK over off-target kinases (TEC,
  EGFR, ITK) — substantially reduced cardiac (atrial fibrillation),
  bleeding, and hypertension toxicities while preserving CLL/MCL efficacy.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    registration_number: "[TBD]"
    reimbursed_nszu: true
    last_verified: "2026-04-27"

    reimbursement_indications:
    - 'Програма медичних гарантій 2026: ХЛЛ 1L (ELEVATE-TN, моно або з obinutuzumab)'
    - 'Реімбурсаційний пакет «Онкологія» 2026: ХЛЛ 2L+ після ХІТ або BTKi/венетоклаксу'
    - 'Реімбурсаційний пакет «Онкологія» 2026: МКЛ R/R (ACE-LY-004)'
    notes: 'Зареєстрований; НСЗУ покриває ХЛЛ 1L/2L+ та МКЛ 2L+. Кращий профіль кардіотоксичності ніж ibrutinib. Джерело: nszu.gov.ua (2026-04).'
typical_dosing: "100 mg PO twice daily continuous (CLL/MCL/SLL); take with PPI separation (acid-sensitive — 2h apart)"
formulations: ["Capsules 100 mg", "Tablets 100 mg (Calquence Maleate)"]

absolute_contraindications:
- "Severe hepatic impairment (Child-Pugh C)"
- "Hypersensitivity"
black_box_warnings: []
major_interactions:
- "Strong CYP3A4 inhibitors (azoles, ritonavir): hold or reduce dose"
- "Strong CYP3A4 inducers (rifampin): avoid (efficacy loss)"
- "PPIs / H2-blockers / antacids: reduce absorption — separate dosing or use tablet form"
- "Anticoagulants/antiplatelets: bleeding risk additive"
common_adverse_events:
- "Headache (40-50% — usually transient)"
- "Diarrhea"
- "Bruising / petechiae"
- "Fatigue"
- "Upper respiratory infections"
serious_adverse_events:
- "Major bleeding (lower than ibrutinib but real)"
- "Atrial fibrillation (lower than ibrutinib)"
- "Severe infections (PJP, opportunistic)"
- "Tumor lysis syndrome (uncommon, low-burden disease)"
- "Second primary malignancies (long-term)"

pharmacology: {half_life: "~1 hour parent; active metabolite ACP-5862 ~7 hours"}

sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
notes: >
  Preferred BTKi over ibrutinib in modern CLL/MCL guidelines (ELEVATE-RR
  for r/r CLL — comparable efficacy, fewer cardiac/hypertension events).
  ELEVATE-TN: 1L CLL data also favorable. Ukraine: registered but NOT
  reimbursed via НСЗУ — funding gap; ibrutinib substitution if access
  blocking. PPI co-administration reduces absorption — separate by 2h
  or switch to acalabrutinib maleate tablet (PPI-compatible).

notes_patient: >
  Таблетка-BTKi 2-го покоління, селективніша за ibrutinib — менше побічних з боку серця. Стандарт для CLL та мантійноклітинної лімфоми. Приймається двічі на добу.
