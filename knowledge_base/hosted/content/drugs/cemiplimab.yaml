id: DRUG-CEMIPLIMAB
names:
  preferred: "Cemiplimab"
  ukrainian: "Цеміплімаб"
  english: "Cemiplimab"
  synonyms: ["REGN2810", "cemiplimab-rwlc"]
  brand_names: ["Libtayo"]
atc_code: L01FF06
rxnorm_id: ""
drug_class: "Anti-PD-1 monoclonal antibody (immune checkpoint inhibitor)"
mechanism: >
  STUB — needs full curation. Fully human IgG4 antibody binding PD-1;
  blocks PD-1 / PD-L1+PD-L2 → restores T-cell function. Approved
  indications: advanced cutaneous SCC (FDA 2018 — first systemic
  approval), advanced basal cell carcinoma post-Hh, PD-L1 ≥50% NSCLC
  1L (EMPOWER-Lung 1; alt to pembrolizumab), PD-L1 ≥1% NSCLC + chemo
  (EMPOWER-Lung 3), recurrent cervical cancer post-platinum.

regulatory_status:
  fda:
    approved: true
    year_first_approval: 2018
    indications_brief: ["Advanced cutaneous SCC", "Advanced basal cell carcinoma post-Hh", "PD-L1 ≥50% NSCLC 1L (mono)", "PD-L1 ≥1% NSCLC 1L + chemo", "Recurrent cervical post-platinum"]
  ema:
    approved: true
    year_first_approval: 2019
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: "STUB — pending CSD-4 verification. Not registered in UA per drlz.com.ua snapshot 2026-04-27. Pembrolizumab dominates UA ICI reimbursement landscape."

typical_dosing: >
  STUB. 350 mg IV over 30 minutes every 3 weeks (flat dose).

formulations:
  - "IV concentrate 350 mg / 7 mL vial"

absolute_contraindications: []
black_box_warnings: []
common_adverse_events:
  - "Fatigue"
  - "Rash / pruritus"
  - "Diarrhea"
  - "Musculoskeletal pain"
  - "Nausea"
serious_adverse_events:
  - "Immune-mediated pneumonitis"
  - "Immune-mediated colitis"
  - "Immune-mediated hepatitis"
  - "Immune-mediated endocrinopathies (thyroid, adrenal, pituitary, type-1 DM)"
  - "Immune-mediated nephritis"
  - "Severe cutaneous reactions (SJS / TEN / DRESS)"
  - "Myocarditis (rare; high mortality)"
  - "Solid-organ-transplant rejection"
major_interactions: []

pharmacology:
  half_life_hours: 480
  clearance: "proteolytic"
  protein_binding_pct: null
  metabolism: "n/a (mAb catabolism)"

sources:
  - SRC-NCCN-NSCLC-2025
  - SRC-ESMO-NSCLC-METASTATIC-2024

last_reviewed: "2026-04-27"
reviewers: []
notes: >
  STUB — Phase CSD-4 promotion. Generally interchangeable with
  pembrolizumab in PD-L1-high NSCLC 1L per cross-trial efficacy
  comparison; cutaneous-SCC + BCC niches are unique. Needs full
  curation of irAE-management algorithm, monitoring (TFTs, LFTs,
  cortisol, troponin baseline), and special populations (transplant).
