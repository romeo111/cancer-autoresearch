id: DRUG-MIRVETUXIMAB-SORAVTANSINE
names:
  preferred: "Mirvetuximab soravtansine"
  ukrainian: "Мірветуксимаб соравтанзин"
  english: "Mirvetuximab soravtansine"
  synonyms: ["IMGN853", "mirv", "mirvetuximab soravtansine-gynx"]
  brand_names: ["Elahere"]
atc_code: L01FX26
rxnorm_id: ""
drug_class: "Folate receptor alpha (FRα)–directed antibody-drug conjugate (ADC)"
mechanism: >
  Humanized anti-FRα IgG1 monoclonal antibody (M9346A) conjugated via
  a cleavable disulfide-containing linker (sulfo-SPDB) to DM4
  (ravtansine), a maytansinoid microtubule-disrupting cytotoxic
  payload (drug-to-antibody ratio ~3.5). After binding folate
  receptor alpha (FOLR1) expressed on epithelial ovarian / fallopian
  / primary peritoneal carcinomas, the ADC is internalized; lysosomal
  cleavage releases active DM4 catabolites that bind tubulin and
  cause mitotic arrest and apoptosis. Bystander effect from
  membrane-permeable catabolites partially compensates for
  heterogeneous FRα expression. Pivotal evidence MIRASOL (FRα-high
  platinum-resistant ovarian, 1-3 prior lines, vs investigator-choice
  chemotherapy): mPFS 5.6 vs 4.0 mo HR 0.65, ORR 42% vs 16%, mOS
  16.5 vs 12.7 mo HR 0.67 — first PARPi-independent OS benefit in
  platinum-resistant ovarian. FDA full approval Mar 2024 (after
  accelerated 2022); EMA 2024.

regulatory_status:
  fda:
    approved: true
    year_first_approval: 2022
    indications_brief:
      - "Platinum-resistant epithelial ovarian / fallopian / primary peritoneal cancer, FRα-high, 1-3 prior systemic regimens"
  ema:
    approved: true
    year_first_approval: 2024
    indications_brief:
      - "Platinum-resistant FRα-high ovarian cancer post 1-3 prior lines"
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: "Не зареєстровано per drlz.com.ua snapshot 2026-04-27. Доступ via EAP AbbVie/ImmunoGen / cross-border (EU centers) / self-pay. Eligibility requires VENTANA FOLR1 (FOLR1-2.1) IHC ≥75% PS2+ tumor cells."

typical_dosing: >
  6 mg/kg adjusted ideal body weight (AIBW) IV every 3 weeks until
  disease progression, unacceptable toxicity, or for at least 2
  cycles to assess response. Use AIBW (not actual body weight) to
  reduce dose-related ocular toxicity. Pre-medication for ocular
  prophylaxis: corticosteroid eye drops (prednisolone acetate 1% 1
  drop QID for 4 days starting 1 day before each infusion, then BID
  for 2 days) AND lubricating eye drops continuously. Standard IV
  pre-medication for infusion reactions: corticosteroid +
  antihistamine + acetaminophen for first 3 cycles. No formal renal
  or hepatic adjustment.

formulations:
  - "Lyophilized powder for IV infusion (single-dose vials 100 mg)"

absolute_contraindications:
  - "Severe hypersensitivity to mirvetuximab soravtansine or any excipient"
  - "Pregnancy (embryo-fetal toxicity from DM4)"
  - "Active corneal disorder (ulcer, severe keratitis)"

black_box_warnings:
  - "Ocular toxicity (boxed warning) — keratopathy / blurred vision / dry eye / photophobia / cataract / uveitis; severe events including corneal ulcer can occur; mandate baseline + every-other-cycle ophthalmologic exam (visual acuity + slit-lamp); withhold for G2-3 ocular toxicity until improvement to ≤G1, permanently discontinue G4 or persistent G3"

common_adverse_events:
  - "Visual impairment / blurred vision ~50%"
  - "Keratopathy ~37%"
  - "Dry eye ~27%"
  - "Photophobia ~10%"
  - "Cataract ~10% (long-term)"
  - "Fatigue ~50%"
  - "Nausea ~40%"
  - "Diarrhea ~30%"
  - "Abdominal pain ~30%"
  - "Constipation ~25%"
  - "Peripheral neuropathy (sensory) ~30%"
  - "Cytopenias (mild — anemia ~37%, thrombocytopenia ~14%, neutropenia ~10%)"
  - "ALT/AST elevation ~40% mostly G1-2"

serious_adverse_events:
  - "Severe ocular toxicity (G3 keratopathy / corneal ulcer / vision loss ~8%)"
  - "Pneumonitis / interstitial lung disease (G3+ ~1-2%; class — ADC + maytansinoid)"
  - "Severe peripheral neuropathy (G3 ~2%; sensory dominant)"
  - "Severe hypersensitivity / infusion reactions (~7%; pre-meds for first 3 cycles)"
  - "Hepatotoxicity (G3 ALT/AST ~3%)"
  - "Bowel obstruction / perforation (rare; pre-existing peritoneal disease — caution)"
  - "Severe asthenia / fatigue (G3 ~6%)"

major_interactions:
  - "Strong CYP3A4 inhibitors — affect DM4 payload metabolism; minor systemic exposure"
  - "Live vaccines — avoid"
  - "Concurrent ocular irritants / topical NSAIDs — may worsen keratopathy"
  - "Other neurotoxic agents (taxanes, platinum) — additive peripheral neuropathy if sequenced closely"

pharmacology:
  half_life_hours: 110
  clearance: "non-renal (proteolytic catabolism of antibody); payload via hepatic"
  protein_binding_pct: null
  metabolism: "ADC catabolism via reticuloendothelial system; DM4 catabolites via CYP3A4"

sources:
  - SRC-NCCN-OVARIAN-2025
  - SRC-ESMO-OVARIAN-2024

last_reviewed: "2026-04-27"
reviewers: []
notes: >
  Eligibility gate: FRα-high tumor by VENTANA FOLR1 (FOLR1-2.1) IHC
  ≥75% of tumor cells with ≥2+ membrane staining intensity (PS2+).
  Subcohorts with lower FRα expression have not shown benefit and
  are excluded from the indication. Mandatory baseline + every-
  other-cycle ophthalmologic examination (visual acuity, slit-lamp,
  fundoscopy if symptoms) — collaboration with ophthalmology is
  essential and access can be a real-world barrier. Counsel
  patients to use lubricating drops continuously and corticosteroid
  drops per protocol; report any new visual symptom immediately.
  Use AIBW dosing (not actual BW) to reduce ocular AE incidence.
  Standard IV pre-medication for first 3 cycles (corticosteroid +
  antihistamine + acetaminophen) reduces infusion reactions. UA
  access via EAP / cross-border / self-pay — no UA НСЗУ pathway.
