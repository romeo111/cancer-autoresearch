id: DRUG-MIRVETUXIMAB-SORAVTANSINE
names:
  preferred: "Mirvetuximab soravtansine"
  ukrainian: "Мірветуксимаб соравтанзин"
  english: "Mirvetuximab soravtansine"
  synonyms: ["IMGN853", "mirv"]
  brand_names: ["Elahere"]
atc_code: L01FX26
rxnorm_id: ""
drug_class: "Folate receptor alpha (FRα)–directed antibody-drug conjugate (ADC)"
mechanism: >
  STUB — needs full curation. Humanized anti-FRα IgG1 conjugated via a
  cleavable linker to DM4 (maytansinoid tubulin inhibitor). Internalized
  by FRα-high tumor cells; releases DM4 → microtubule disruption → cell
  death. MIRASOL: mirvetuximab vs investigator-choice chemo doubled PFS
  + improved OS in platinum-resistant ovarian with FRα-high (≥75% PS2+)
  expression.

regulatory_status:
  fda:
    approved: true
    year_first_approval: 2022
    indications_brief: ["Platinum-resistant epithelial ovarian/fallopian/primary peritoneal cancer, FRα-high, 1-3 prior lines"]
  ema:
    approved: true
    year_first_approval: 2024
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: "STUB — pending CSD-4 verification. Not registered in UA per drlz.com.ua snapshot 2026-04-27."

typical_dosing: >
  STUB. 6 mg/kg adjusted ideal body weight IV every 3 weeks.

formulations:
  - "Lyophilized powder for IV infusion (single-dose vials 100 mg)"

absolute_contraindications:
  - "STUB — known hypersensitivity to product"
black_box_warnings:
  - "Ocular toxicity (boxed warning) — keratopathy, uveitis, dry eye, blurred vision; may be severe and require dose hold"
common_adverse_events:
  - "Visual impairment / blurred vision"
  - "Keratopathy"
  - "Fatigue"
  - "Nausea / diarrhea"
  - "Peripheral neuropathy"
  - "Cytopenias (mild)"
serious_adverse_events:
  - "Severe ocular toxicity (G3 keratopathy)"
  - "Pneumonitis / interstitial lung disease"
  - "Peripheral neuropathy (sensory)"
  - "Severe hypersensitivity / infusion reactions"
major_interactions: []

pharmacology:
  half_life_hours: 110
  clearance: "proteolytic / catabolism"
  protein_binding_pct: null
  metabolism: "ADC catabolism; payload via CYP3A4"

sources:
  - SRC-NCCN-OVARIAN-2025
  - SRC-ESMO-OVARIAN-2024

last_reviewed: "2026-04-27"
reviewers: []
notes: >
  STUB — Phase CSD-4 promotion. Eligibility: FRα-high by VENTANA FOLR1
  (FOLR1-2.1) IHC ≥75% PS2+. Mandatory baseline + ongoing ophthalmologic
  exams; lubricating drops + corticosteroid drops prophylaxis. Needs full
  curation of pre-meds, dose-adj, ocular-toxicity management algorithm.
