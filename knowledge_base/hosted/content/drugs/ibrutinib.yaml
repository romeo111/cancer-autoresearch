id: DRUG-IBRUTINIB
names:
  preferred: "Ibrutinib"
  ukrainian: "Ібрутиніб"
  english: "Ibrutinib"
  brand_names: ["Imbruvica"]
atc_code: L01EL01
rxnorm_id: "1442986"
drug_class: "Bruton's tyrosine kinase (BTK) inhibitor"
mechanism: >
  Irreversible covalent inhibitor of BTK; disrupts B-cell receptor
  signaling, induces apoptosis in malignant B cells.

regulatory_status:
  fda:
    approved: true
    first_approval_year: 2013
  ema:
    approved: true
  ukraine_registration:
    registered: true
    registration_number: "[TBD]"
    reimbursed_nszu: true
    reimbursement_indications:
    - 'Програма медичних гарантій 2026: ХЛЛ 1L (моно або з obinutuzumab/rituximab)'
    - 'Реімбурсаційний пакет «Онкологія» 2026: ХЛЛ 2L+ після ХІТ'
    - 'Реімбурсаційний пакет «Онкологія» 2026: МКЛ R/R після ≥1 лінії'
    - 'Реімбурсаційний пакет «Онкологія» 2026: макроглобулінемія Вальденстрема (WM) MYD88+'
    last_verified: "2026-04-27"

    notes: 'Зареєстрований; НСЗУ покриває ХЛЛ 1L/2L+, МКЛ 2L+, WM. Джерело: nszu.gov.ua (2026-04).'
typical_dosing: "560 mg PO once daily (MZL); 420 mg PO once daily (CLL)"
formulations:
- "Capsule 70 mg / 140 mg"
- "Tablet 140 mg / 280 mg / 420 mg / 560 mg"

absolute_contraindications:
- "Hypersensitivity"
- "Concurrent strong CYP3A inhibitors without dose adjustment"
black_box_warnings: []
major_interactions:
- "Strong CYP3A inhibitors (ketoconazole, ritonavir): reduce ibrutinib"
- "Strong CYP3A inducers (rifampin, phenytoin): avoid"
- "Anticoagulants and antiplatelets: increased bleeding risk"
common_adverse_events:
- "Diarrhea"
- "Fatigue"
- "Bruising / bleeding"
- "Atrial fibrillation"
- "Hypertension"
- "Infections"
serious_adverse_events:
- "Major hemorrhage"
- "Atrial fibrillation requiring anticoagulation"
- "Severe infection"
- "Second primary malignancies"

sources:
- SRC-NCCN-BCELL-2025
- SRC-ESMO-MZL-2024

last_reviewed: "2026-04-25"
notes: >
  Approved for relapsed/refractory MZL after at least one prior
  anti-CD20 therapy. Not first-line for HCV-MZL but relevant for
  later lines if antiviral + chemoimmunotherapy fail.

notes_patient: >
  Таблетка-BTKi: блокує сигнал росту B-клітин (включно з пухлинними) при CLL та лімфомах. Приймається щоденно. Можливі кровотечі та порушення серцевого ритму — повідомляйте про синці й серцебиття.
