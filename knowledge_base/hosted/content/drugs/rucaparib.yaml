id: DRUG-RUCAPARIB
names:
  preferred: "Rucaparib"
  ukrainian: "Рукапариб"
  english: "Rucaparib"
  synonyms: ["AG-014699", "CO-338"]
  brand_names: ["Rubraca"]
atc_code: L01XK03
rxnorm_id: ""
drug_class: "PARP1/2/3 inhibitor"
mechanism: >
  STUB — needs full curation. Oral inhibitor of PARP1/2/3; traps PARP
  on DNA, generating replication-fork collapse → synthetic lethality in
  HRD tumors (BRCA1/2 mutated). ARIEL3: maintenance after platinum-
  sensitive relapse in ovarian. TRITON2/3: prostate BRCA-mutant mCRPC
  (FDA accelerated; partial withdrawal post-confirmatory).

regulatory_status:
  fda:
    approved: true
    year_first_approval: 2016
    indications_brief: ["Maintenance recurrent ovarian post-platinum (ARIEL3)", "BRCA-mutant mCRPC post-AR (TRITON; status evolving)"]
  ema:
    approved: true
    year_first_approval: 2018
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: "STUB — pending CSD-4 verification. Not registered in UA per drlz.com.ua snapshot 2026-04-27. Olaparib + niraparib are the dominant PARPi in EU practice."

typical_dosing: >
  STUB. 600 mg PO BID continuous. Dose adj for cytopenias/AEs to 500 mg
  / 400 mg / 300 mg BID.

formulations:
  - "Tablets 200 mg"
  - "Tablets 250 mg"
  - "Tablets 300 mg"

absolute_contraindications: []
black_box_warnings: []
common_adverse_events:
  - "Nausea"
  - "Fatigue"
  - "Anemia"
  - "Thrombocytopenia"
  - "Increased ALT/AST"
  - "Increased creatinine (transporter inhibition; not true renal injury)"
  - "Dysgeusia"
serious_adverse_events:
  - "MDS / AML (PARPi class warning)"
  - "Severe cytopenias (Hb < 8, plt < 50, ANC < 1.0)"
  - "Pneumonitis (rare)"
major_interactions:
  - "STUB — moderate CYP1A2/2C8/2C9/2C19/3A inhibition; CYP1A2 substrates (caffeine, theophylline)"

pharmacology:
  half_life_hours: 17
  clearance: "hepatic + renal"
  protein_binding_pct: 70
  metabolism: "CYP2D6, CYP1A2, CYP3A4"

sources:
  - SRC-NCCN-OVARIAN-2025
  - SRC-ESMO-OVARIAN-2024

last_reviewed: "2026-04-27"
reviewers: []
notes: >
  STUB — Phase CSD-4 promotion. Less commonly used than olaparib/
  niraparib in 1L maintenance. Distinct creatinine-rise pattern (MATE
  transporter inhibition — not nephrotoxicity). Needs full curation of
  dose-adj, monitoring schedule (CBC weekly first month then monthly,
  LFTs), and MDS/AML surveillance.
