id: DRUG-RUCAPARIB
names:
  preferred: "Rucaparib"
  ukrainian: "Рукапариб"
  english: "Rucaparib"
  synonyms: ["AG-014699", "CO-338"]
  brand_names: ["Rubraca"]
atc_code: L01XK03
rxnorm_id: ""
drug_class: "PARP1/2/3 inhibitor"
mechanism: >
  Oral small-molecule inhibitor of poly(ADP-ribose) polymerase
  (PARP) 1, 2 and 3, with both catalytic inhibition and PARP-trapping
  activity (locks PARP onto DNA, generating replication-fork collapse
  during S-phase). In tumors with deficient homologous recombination
  repair (HRR) — most prominently BRCA1/2 mutated, but also other
  HRR-pathway alterations (RAD51C/D, BRIP1, PALB2, CHEK2 in some
  contexts) — accumulated double-strand breaks cannot be faithfully
  repaired, producing synthetic lethality. Pivotal trials: ARIEL3
  (maintenance after platinum-sensitive recurrent ovarian — mPFS
  benefit greatest in BRCA-mut, then HRD-positive, then HRD-negative);
  TRITON2/TRITON3 (BRCA-mutant mCRPC post-AR-targeted therapy — FDA
  accelerated 2020, mCRPC indication subsequently restricted /
  partially withdrawn after confirmatory analyses).

regulatory_status:
  fda:
    approved: true
    year_first_approval: 2016
    indications_brief:
      - "Maintenance therapy of recurrent epithelial ovarian / fallopian / primary peritoneal cancer in CR/PR after platinum (ARIEL3)"
      - "BRCA-mutant mCRPC post-AR-targeted (status evolving — FDA narrowed labeling 2022)"
  ema:
    approved: true
    year_first_approval: 2018
    indications_brief:
      - "Maintenance recurrent ovarian post-platinum"
      - "BRCA-mutant relapsed/refractory ovarian post ≥2 lines platinum"
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: "Не зареєстровано per drlz.com.ua snapshot 2026-04-27. Olaparib + niraparib are the dominant PARPi in EU and UA practice; rucaparib third-line / niche. Доступ via EAP / cross-border / self-pay."

typical_dosing: >
  600 mg PO BID continuous, with or without food. Dose modifications
  for cytopenias / non-hematologic AE: -1 = 500 mg BID; -2 = 400 mg
  BID; -3 = 300 mg BID; permanent discontinuation if recurrent G3-4
  at -3. Hold for any G3-4 hematologic AE until recovery (Hb ≥9,
  plt ≥100, ANC ≥1.0). No formal renal adjustment for CrCl ≥30; not
  studied in severe renal or hepatic impairment.

formulations:
  - "Tablets 200 mg"
  - "Tablets 250 mg"
  - "Tablets 300 mg"

absolute_contraindications:
  - "Hypersensitivity to rucaparib or any excipient"
  - "Pregnancy (embryo-fetal toxicity)"
  - "Severe hepatic or renal impairment (no PK data)"

black_box_warnings: []

common_adverse_events:
  - "Nausea ~75%"
  - "Fatigue ~70%"
  - "Vomiting ~37%"
  - "Anemia ~55% any-grade; G3 ~22%"
  - "Thrombocytopenia ~30% any-grade; G3 ~5%"
  - "ALT/AST elevation ~70% any-grade; G3 ~10%"
  - "Increased creatinine (transporter MATE1/MATE2-K inhibition; not true AKI) ~90%"
  - "Dysgeusia ~40%"
  - "Decreased appetite ~38%"
  - "Constipation ~36%"
  - "Diarrhea ~35%"
  - "Photosensitivity ~12%"

serious_adverse_events:
  - "MDS / AML (PARPi class warning, ~1-2% over long-term maintenance follow-up; can be fatal)"
  - "Severe cytopenias — anemia G3+ ~22%, thrombocytopenia G3+ ~5%, neutropenia G3+ ~10%"
  - "Pneumonitis (rare)"
  - "Severe hepatotoxicity (G3+ ALT/AST ~10%; reversible on hold)"
  - "Severe photosensitivity / SCAR (rare)"
  - "VTE (modest excess in maintenance studies)"

major_interactions:
  - "Moderate inhibition of CYP1A2 — caffeine, theophylline, tizanidine exposure ↑"
  - "Moderate inhibition of CYP2C8 / 2C9 / 2C19 / 3A — modest effect on substrates (warfarin INR monitoring)"
  - "P-gp / BCRP substrates — rucaparib inhibits"
  - "MATE1/MATE2-K inhibition — increases serum creatinine (no true AKI; do not interpret as renal failure)"
  - "Other myelosuppressive agents — additive cytopenia"
  - "Live vaccines — avoid"

pharmacology:
  half_life_hours: 17
  clearance: "hepatic + modest renal"
  protein_binding_pct: 70
  metabolism: "CYP2D6 (predominant); CYP1A2 / CYP3A4 minor; some non-CYP"

sources:
  - SRC-NCCN-OVARIAN-2025
  - SRC-ESMO-OVARIAN-2024

last_reviewed: "2026-04-27"
reviewers: []
notes: >
  Less commonly used than olaparib or niraparib in 1L maintenance
  (which now has both BRCA-mut and HRD-positive labels for olaparib
  ± bevacizumab — rucaparib's 1L ATHENA-MONO data is positive but
  approval restricted in some regions). Distinct creatinine-rise
  pattern from MATE transporter inhibition — labs may show "AKI"
  picture but no actual nephrotoxicity (do not stop or dose-adjust
  on creatinine alone; check cystatin C or renal scan if uncertain).
  Photosensitivity less prominent than vemurafenib but real —
  counsel sun protection. Baseline workup: CBC, CMP, pregnancy test.
  Monitor CBC weekly first month then monthly; LFTs monthly. Long-
  term MDS/AML surveillance with annual CBC + smear if persistent
  cytopenia. UA access via EAP / self-pay only.

notes_patient: >
  Таблетка-PARPi для раку яєчників і простати з мутацією BRCA. Приймається двічі на добу. Серед побічних — нудота, підвищення креатиніну (показника нирок), зміни в аналізі крові.
