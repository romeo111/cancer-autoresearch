id: DRUG-MERCAPTOPURINE
names:
  preferred: "6-Mercaptopurine"
  ukrainian: "6-Меркаптопурин"
  english: "Mercaptopurine"
  brand_names:
    - "Purinethol"
    - "Purixan"
atc_code: L01BB02
rxnorm_id: "6816"
drug_class: "antineoplastic — purine analog (thiopurine)"
mechanism: >
  Purine antagonist; converted by HGPRT to thio-IMP, which inhibits
  de novo purine biosynthesis and incorporates into DNA/RNA as
  thio-dGTP, causing chain termination and triggering apoptosis.
  Backbone of B-ALL maintenance (POMP / vincristine + MTX + 6-MP +
  prednisone) for 2-3 years post-induction-consolidation.

regulatory_status:
  fda:
    approved: true
    year_first_approval: 1953
    indications_brief: ["Acute lymphoblastic leukemia (induction + maintenance)"]
  ema:
    approved: true
  ukraine_registration:
    registered: true
    registration_number: "[TBD]"
    reimbursed_nszu: true
    last_verified: "2026-04-27"

typical_dosing: >
  B-ALL maintenance: 50-75 mg/m² PO daily (continuous), titrated to
  ANC 0.75-1.5 × 10⁹/L and platelets >75 × 10⁹/L. Dose adjusted by
  TPMT/NUDT15 genotype if measured (intermediate metabolizers ~50%
  reduction; poor metabolizers ~10% of standard dose or avoid).
formulations:
  - "Tablets 50 mg"
  - "Oral suspension 20 mg/mL (Purixan, pediatric formulation)"

absolute_contraindications:
  - "Hypersensitivity to mercaptopurine"
  - "Severe hepatic impairment"
  - "Pregnancy (teratogenic)"
  - "Concurrent allopurinol without dose reduction (allopurinol blocks xanthine oxidase, increases 6-MP toxicity 3-4×)"
black_box_warnings:
  - "Severe myelosuppression (especially in TPMT- or NUDT15-deficient patients) — genotype testing recommended before initiation"
  - "Hepatotoxicity, including hepatic veno-occlusive disease"
major_interactions:
  - "Allopurinol / febuxostat: REDUCE 6-MP dose by 50-75% (xanthine oxidase inhibition increases active metabolite)"
  - "Warfarin: 6-MP reduces warfarin effect"
  - "Aminosalicylates (mesalamine, sulfasalazine): potentiate myelosuppression via TPMT inhibition"
  - "Live vaccines: avoid"
common_adverse_events:
  - "Myelosuppression (anemia, neutropenia, thrombocytopenia)"
  - "Nausea, vomiting"
  - "Hepatotoxicity (transaminitis)"
  - "Mucositis"
  - "Hyperpigmentation"
serious_adverse_events:
  - "Severe myelosuppression — fatal in TPMT/NUDT15-deficient genotypes without dose reduction"
  - "Hepatic veno-occlusive disease / sinusoidal obstruction syndrome"
  - "Pancreatitis"
  - "Secondary malignancies (long-term thiopurine exposure)"

pharmacology:
  half_life_hours: 1
  clearance: "hepatic (xanthine oxidase, TPMT, NUDT15)"
  bioavailability_pct: 16
  metabolism: "Xanthine oxidase, TPMT, HGPRT — TPMT/NUDT15 polymorphisms drive toxicity risk"

sources:
  - SRC-NCCN-BCELL-2025

last_reviewed: "2026-04-27"
reviewers: []
notes: >
  Cornerstone of B-ALL maintenance (POMP regimen, 2-3 years post-induction-
  consolidation). TPMT and NUDT15 genotyping should be performed
  pre-initiation when available — poor metabolizers require dramatic
  dose reduction or alternative therapy. Take on empty stomach (food
  + dairy reduce absorption ~25%). Avoid allopurinol coadministration
  without dose reduction. Bedtime dosing improves tolerance.
