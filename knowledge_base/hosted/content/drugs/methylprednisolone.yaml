typical_dosing: >
  ANAPHYLAXIS / SEVERE INFUSION REACTION ADJUNCT (adult): 40-125 mg
  IV bolus over 1-2 min after epinephrine IM; may repeat every 6 h
  for 24 h. CHEMOTHERAPY PREMEDICATION (e.g., docetaxel hypersensitivity
  prevention): 40-80 mg IV 30 min before infusion; or 8 mg PO BID
  × 3 days starting day before docetaxel for retention prevention.
  irAE management (immune checkpoint inhibitor toxicity): Grade 2 →
  0.5-1 mg/kg/day PO; Grade 3-4 → 1-2 mg/kg/day IV with subsequent
  taper over 4-6 weeks. CYTOKINE RELEASE SYNDROME (CAR-T) escalation:
  1 mg/kg IV q12h or 1000 mg IV daily × 3 days for severe / refractory
  CRS not responding to tocilizumab. CEREBRAL EDEMA: 32-128 mg/day
  IV (alternative when dexamethasone unavailable; dex preferred).
  ACUTE SPINAL CORD INJURY (controversial NASCIS protocol): 30 mg/kg
  IV over 15 min, then 5.4 mg/kg/h × 23 h (largely abandoned).
  Pediatric: 0.5-2 mg/kg IV (depends on indication). Renal: no
  adjustment. Hepatic: caution; reduce dose in severe. Equivalence:
  4 mg methylprednisolone = 5 mg prednisone = 20 mg hydrocortisone =
  0.75 mg dexamethasone.
formulations:
  - "IV/IM powder for reconstitution (Solu-Medrol = sodium succinate): 40 mg, 125 mg, 500 mg, 1000 mg, 2000 mg vials"
  - "IM long-acting suspension (Depo-Medrol = acetate): 40 mg/mL, 80 mg/mL — joint / bursa injections, NOT for systemic IV use"
  - "Tablet (Medrol): 2 mg, 4 mg, 8 mg, 16 mg, 32 mg"
  - "Methylprednisolone dose-pack (oral taper for 6-day course)"
absolute_contraindications:
  - "Hypersensitivity to methylprednisolone or any corticosteroid"
  - "Systemic fungal infection (uncontrolled)"
  - "IM Depo-Medrol: never IV (suspension, not solution — embolic risk)"
  - "Live vaccines during high-dose immunosuppression"
  - "Recent live vaccine within 2 weeks (relative)"
black_box_warnings: []
common_adverse_events:
  - "Insomnia, mood elevation / agitation — ~30-50% even with single bolus"
  - "Hyperglycemia — ~20-40% (acute and chronic)"
  - "Increased appetite, weight gain — chronic use"
  - "Fluid retention (less than hydrocortisone) — ~5-10%"
  - "Mild hypertension — chronic use"
  - "Increased infection susceptibility — chronic"
  - "Muscle weakness (steroid myopathy) — chronic"
  - "Dyspepsia, GI ulceration — ~10-15% chronic"
  - "Cushingoid features — chronic"
  - "Skin atrophy, easy bruising — chronic"
  - "Acne — chronic"
  - "Mild facial flushing immediately post-IV bolus — common, transient"
  - "Hypokalemia (less than hydrocortisone)"
  - "Cataract / posterior subcapsular — long-term"
serious_adverse_events:
  - "Severe psychiatric reactions (steroid psychosis, mania, severe depression) — even with single high-dose pulse"
  - "Severe hyperglycemic emergency (DKA / HHS) in diabetics"
  - "Adrenal suppression with abrupt discontinuation after >2 weeks pharmacologic dosing — taper required"
  - "Opportunistic infection reactivation (PJP, fungal, HSV/VZV/CMV) — chronic use; high-dose pulse may trigger reactivation"
  - "GI bleeding / perforation"
  - "Avascular necrosis of femoral head (chronic high-dose)"
  - "Tumor lysis syndrome (when used cytoreductively in CLL / lymphoma)"
  - "Cardiac arrhythmia from rapid IV high-dose pulse (≥250 mg) — administer over ≥30 min for ≥250 mg"
  - "Severe immune suppression with secondary infection (chronic)"
  - "Pulmonary embolism / venous thromboembolism (high-dose pulse — modest signal)"
major_interactions:
  - "CYP3A4 inducers (rifampin, phenytoin, carbamazepine): reduce methylprednisolone exposure — increase dose if needed"
  - "CYP3A4 inhibitors (azoles, ritonavir, clarithromycin, aprepitant): increase methylprednisolone exposure → Cushingoid features (aprepitant ~2.5× exposure increase — reduce methylprednisolone ~50%)"
  - "Loop diuretics (furosemide), thiazides: additive hypokalemia (less than hydrocortisone)"
  - "Live vaccines (during high-dose immunosuppression): contraindicated"
  - "NSAIDs: additive GI ulceration / bleeding risk; PPI prophylaxis when co-administered"
  - "Anti-diabetic agents: hyperglycemia requires dose escalation of insulin / oral agents"
  - "Warfarin: variable INR shift — monitor closely"
  - "Aspirin: additive GI bleeding; chronic steroid lowers aspirin levels"
  - "Cyclosporine: mutual exposure increase, increased nephrotoxicity"
  - "Vaccines (inactivated): reduced response during chronic immunosuppression"
  - "Neuromuscular blockers (in ICU on high-dose pulse): prolonged weakness, critical illness myopathy"
pharmacology:
  half_life_hours: 3  # 2-3 h plasma; biological effect 12-36 h (intermediate-acting)
  clearance: "Hepatic"
  protein_binding_pct: 78
  metabolism: "CYP3A4 — hepatic oxidation; renal excretion of metabolites; minimal mineralocorticoid activity vs hydrocortisone (~5:1 GC:MC) — preferred when fluid retention undesirable"
