id: DRUG-METHYLPREDNISOLONE
names:
  preferred: "Methylprednisolone"
  ukrainian: "Метилпреднізолон"
  english: "Methylprednisolone"
  brand_names:
    - "Solu-Medrol"
    - "Medrol"
    - "Depo-Medrol"
    - "Metypred"
atc_code: H02AB04
rxnorm_id: "6902"
drug_class: "Corticosteroid — intermediate-acting synthetic glucocorticoid (minimal mineralocorticoid activity)"
mechanism: >
  Synthetic glucocorticoid that binds the cytoplasmic glucocorticoid
  receptor and modulates transcription of inflammatory and immune
  genes — broadly suppressing cytokine production, leukocyte
  trafficking, mast cell mediator release, and complement activation.
  Compared to hydrocortisone: 4-5× greater anti-inflammatory potency
  per mg, longer duration of biological effect (~12-36 h vs 8-12 h),
  and minimal mineralocorticoid activity (no significant sodium / water
  retention) — preferred over hydrocortisone for non-adrenal-replacement
  indications. In oncology supportive care, principal uses: (1)
  premedication and treatment of chemotherapy infusion reactions
  (intermediate dose 40-125 mg IV); (2) high-dose pulse therapy for
  immune-related adverse events (irAEs) from immune checkpoint
  inhibitors (1-2 mg/kg/day for moderate, 1-2 mg/kg/day IV for
  severe/Grade 3-4 colitis, pneumonitis, hepatitis, hypophysitis);
  (3) management of severe anaphylaxis as adjunct after epinephrine;
  (4) cerebral edema from brain metastases (intermediate-dose
  alternative when dexamethasone unavailable); (5) cytokine release
  syndrome (CRS) escalation rescue when tocilizumab inadequate.
  FDA-approved 1957.
