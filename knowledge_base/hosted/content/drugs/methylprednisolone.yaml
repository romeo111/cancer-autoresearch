notes: >
  Workhorse corticosteroid for: (1) acute infusion reactions and
  anaphylaxis adjunct (40-125 mg IV after epinephrine); (2) immune-
  related adverse events from checkpoint inhibitors — the
  defining role; (3) CRS escalation when tocilizumab inadequate.
  Compared to hydrocortisone: more potent per mg (4-5×), longer
  duration, less mineralocorticoid effect (preferred when fluid
  retention undesirable). Compared to dexamethasone: slightly less
  potent (×6), shorter duration, but lower CNS penetration
  (slightly less psychiatric AE per equivalent dose); dex preferred
  for cerebral edema and antiemesis, methylprednisolone preferred
  for irAE management per NCCN / ESMO immunotherapy toxicity
  guidelines. CRITICAL: high-dose pulse (≥250 mg IV) must be infused
  over ≥30 min — rapid bolus risks fatal cardiac arrhythmia.
  Aprepitant DDI: aprepitant increases methylprednisolone exposure
  ~2.5× — reduce methylprednisolone ~50% when both prescribed (e.g.,
  in HEC chemotherapy with antiemetic regimen). Single bolus of
  40-125 mg has minimal long-term consequences; courses ≥2 weeks
  require taper to prevent adrenal crisis. Long-acting Depo-Medrol
  IM is for joint injections only — never for systemic IV use.
  Ukraine: NSZU-covered; widely available.
