id: DRUG-DACOMITINIB
names:
  preferred: "Dacomitinib"
  ukrainian: "Дакомітініб"
  english: "Dacomitinib"
  brand_names: ["Vizimpro"]
atc_code: L01EB07
rxnorm_id:
drug_class: "2nd-generation EGFR TKI (irreversible)"
mechanism: >
  Irreversible pan-HER TKI. ARCHER 1050: superior PFS + OS vs gefitinib in 1L EGFR-mut metastatic. Pre-osimertinib alternative.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: false
    last_verified: "2026-04-27"
    notes: "Реєстрація МОЗ підтверджена для НДРЛ EGFR-mut (раніше registered=false — виправлено). НСЗУ не покриває — частково через пере-перекриття з gefitinib/erlotinib/osimertinib. Out-of-pocket. Джерело: nszu.gov.ua (2026-04)."

    reimbursement_indications: []
typical_dosing: >
  45 mg PO once daily.

key_toxicities:
- Rash
- Diarrhea
- Paronychia
- More AEs than 1G/3G TKIs

sources: [SRC-NCCN-NSCLC-2025, SRC-ESMO-NSCLC-METASTATIC-2024]
last_reviewed:
notes: >
  Niche role; osimertinib is the modern 1L. Listed for completeness.
