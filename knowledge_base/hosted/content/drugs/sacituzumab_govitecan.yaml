id: DRUG-SACITUZUMAB-GOVITECAN
names:
  preferred: "Sacituzumab govitecan"
  ukrainian: "Сацитузумаб говітекан"
  english: "Sacituzumab govitecan"
  brand_names: ["Trodelvy"]
atc_code: L01XC34
rxnorm_id: null
drug_class: "Trop-2-targeted antibody-drug conjugate (SN-38 payload)"
mechanism: >
  Anti-Trop-2 antibody linked to SN-38 (active metabolite of irinotecan, topoisomerase-I inhibitor). Trop-2 is overexpressed on most epithelial cancers; ADC delivers SN-38 selectively.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: |
      Не зареєстровано в UA (Держреєстр ЛЗ — РП відсутнє станом на 2026-04-27).
      Trop-2 ADC для m TNBC (≥2L) та HR+/HER2- m BC (post-CDK4/6);
      не входить до пакетів НСЗУ.
      Шляхи доступу:
      - Named-patient import (DEC спецдозвіл) — за рахунок пацієнта.
      - EAP Gilead Ukraine (compassionate use program — Trodelvy access
        program для пацієнтів з m TNBC ≥2L).
      - Cross-border (EU): EU мамологічні центри (Charité, IEO Milan)
        через "Лікування за кордоном" (наказ МОЗ 988).
      - Trial-only: ASCENT/TROPiCS-серія завершені; post-marketing
        в EU триває.
      Source: drlz.com.ua пошук "sacituzumab"/"trodelvy" 2026-04-27 — РП відсутнє.

typical_dosing: >
  10 mg/kg IV days 1, 8 of 21-day cycle.

key_toxicities:
  - Severe neutropenia (~64% any grade, ~52% G3+) — UGT1A1*28 polymorphism dose-modifies
  - Diarrhea (~62%)
  - Anemia
  - Nausea, fatigue, alopecia
  - Hypersensitivity / infusion reactions

sources: [SRC-NCCN-BREAST-2025, SRC-ESMO-BREAST-METASTATIC-2024]
last_reviewed: null
notes: >
  ASCENT: sacituzumab superior to physician's-choice chemo in pretreated metastatic TNBC. TROPiCS-02: HR+/HER2- ≥3L. Trop-2 expression status not required for treatment selection (universal expression).

notes_patient: >
  Препарат-ADC, що знаходить пухлинні клітини за маркером Trop-2 і доставляє їм хіміо-вантаж. Використовується при triple-negative раку грудей і HR+ після гормональних ліній.
