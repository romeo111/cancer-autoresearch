id: DRUG-CETUXIMAB
names:
  preferred: "Cetuximab"
  ukrainian: "Цетуксимаб"
  english: "Cetuximab"
  brand_names: ["Erbitux"]
atc_code: L01FE01
rxnorm_id: "318341"
drug_class: "Anti-EGFR chimeric IgG1 monoclonal antibody"
mechanism: >
  Chimeric (mouse Fv / human IgG1) monoclonal antibody binding the
  extracellular domain of the epidermal growth factor receptor
  (EGFR/HER1) with high affinity, competitively blocking binding of
  endogenous ligands (EGF, TGF-α). Inhibits ligand-induced receptor
  dimerization and downstream RAS-RAF-MAPK + PI3K-AKT signaling.
  IgG1 backbone enables ADCC. Effective ONLY in RAS wild-type mCRC
  (mutant KRAS / NRAS bypass EGFR signaling); BRAF V600E mutants are
  also intrinsically resistant. Left-sided primary tumor location is
  a positive predictor of benefit (CALGB-80405, FIRE-3 subgroup).

regulatory_status:
  fda:
    approved: true
    year_first_approval: 2004
    indications_brief:
      - "Metastatic colorectal cancer — KRAS/NRAS wild-type (1L with FOLFIRI/FOLFOX; 2L; mono)"
      - "Locally advanced head and neck SCC (with radiation)"
      - "Recurrent / metastatic head and neck SCC (with platinum + 5-FU; or mono)"
      - "BRAF V600E mCRC (with encorafenib — BEACON CRC, 2L+)"
  ema:
    approved: true
    year_first_approval: 2004
  ukraine_registration:
    registered: true
    registration_number: "[TBD — to be populated by Держреєстр ЛЗ lookup]"
    reimbursed_nszu: false
    reimbursement_indications:
      - "Selective NSZU coverage for RAS-WT left-sided mCRC"
    last_verified: "2026-04-26"
    notes: "Out-of-pocket; selective NSZU coverage."

typical_dosing: >
  mCRC: 400 mg/m² IV loading dose over 2 h, then 250 mg/m² IV weekly
  over 1 h. Alternative q2w schedule: 500 mg/m² IV q14d (non-inferior
  in CRC; aligns with FOLFOX/FOLFIRI).
  Head and neck (with RT): 400 mg/m² loading 1 wk pre-RT, then
  250 mg/m² weekly during RT (typically 7-8 weeks).
  Head and neck (recurrent/metastatic with platinum + 5-FU):
  400 mg/m² loading, then 250 mg/m² weekly.
  BRAF V600E mCRC (BEACON regimen): 400 mg/m² loading, then 250 mg/m²
  weekly with encorafenib 300 mg PO daily.
  Premedication: H1 antihistamine (diphenhydramine 50 mg IV) ± H2
  blocker before each infusion; consider corticosteroid for first
  infusion.
formulations:
  - "IV solution 5 mg/mL (100 mg / 20 mL, 200 mg / 40 mL, 500 mg / 100 mL vials)"

absolute_contraindications:
  - "Severe hypersensitivity / anaphylaxis on prior exposure"
  - "Known KRAS / NRAS mutation in mCRC (lack of efficacy; ineffective)"
  - "Pregnancy"

black_box_warnings:
  - "Severe infusion reactions (~3% Grade 3-4; higher in southeastern US — preformed IgE to galactose-α-1,3-galactose; tick-bite association)"
  - "Cardiopulmonary arrest and sudden death — observed with cetuximab + radiation in head and neck (~2%); careful electrolyte monitoring (Mg, K, Ca)"

common_adverse_events:
  - "Acneiform rash (~80-90%; correlates with response — lack of rash predicts poor outcome)"
  - "Hypomagnesemia (~50%; can be severe and require IV supplementation)"
  - "Paronychia / nail changes (~15-20%)"
  - "Dry skin / xerosis (~50%)"
  - "Pruritus (~40%)"
  - "Diarrhea (~20-30%)"
  - "Fatigue (~20-30%)"
  - "Mucositis"
  - "Headache"
  - "Anorexia"
  - "Weight loss"
  - "Conjunctivitis / blepharitis"

serious_adverse_events:
  - "Anaphylactic infusion reactions — region-specific (preformed IgE to α-Gal in galactose-α-1,3-galactose; high in southeastern US, central Europe)"
  - "Severe acneiform rash with secondary infection / cellulitis"
  - "Severe hypomagnesemia with arrhythmia / tetany"
  - "Interstitial lung disease / pneumonitis (rare)"
  - "Severe diarrhea with dehydration"
  - "Cardiopulmonary arrest (esp. with concurrent RT + electrolyte derangement)"
  - "Keratitis / ulcerative keratitis (rare)"
  - "Stevens-Johnson syndrome (rare)"

major_interactions:
  - "Radiation (head and neck) — additive efficacy AND additive mucositis / dermatitis"
  - "Platinum chemotherapy — additive efficacy + cumulative toxicity"
  - "Other EGFR inhibitors (panitumumab, erlotinib) — no benefit, additive toxicity (avoid)"
  - "Live vaccines — avoid"
  - "Encorafenib (BEACON) — synergistic in BRAF V600E mCRC (intentional)"

pharmacology:
  half_life_hours: 168
  half_life_notes: "Median t½ ~7 days (168 h); range 4-10 d. Steady state by ~3 weeks (weekly dosing)."
  clearance: "non-specific catabolism (proteolysis); target-mediated drug disposition at EGFR-rich sites"
  protein_binding_pct: null
  metabolism: "non-CYP; antibody catabolism"
  volume_of_distribution_l: 3

sources:
  - SRC-NCCN-COLON-2025
  - SRC-ESMO-COLON-2024

last_reviewed: "2026-04-26"
reviewers: []
notes: >
  Mandatory pre-treatment testing in mCRC: extended RAS panel (KRAS
  exons 2-4 + NRAS exons 2-4) + BRAF V600E + tumor sidedness. Left-
  sided RAS-WT BRAF-WT → strong cetuximab benefit; right-sided WT →
  bevacizumab preferred (CALGB-80405). Rash management: doxycycline
  100 mg BID prophylaxis (STEPP study) reduces severe rash; topical
  clindamycin / metronidazole for established rash; sunscreen + skin
  emollient. Monitor Mg weekly; replace IV when serum Mg <1.0 mg/dL.
  Premedicate aggressively in regions with high α-Gal IgE prevalence;
  consider serum α-Gal IgE screening in highest-risk areas.
