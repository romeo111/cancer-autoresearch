id: DRUG-LIPOSOMAL-AMPHOTERICIN-B
names:
  preferred: "Liposomal amphotericin B"
  ukrainian: "Ліпосомальний амфотерицин B"
  english: "Liposomal amphotericin B"
  brand_names:
    - "AmBisome"
    - "Ambisome"
  synonyms:
    - "L-AmB"
    - "LAmB"
atc_code: J02AA01
rxnorm_id: "342523"
drug_class: "Polyene macrolide antifungal (broad-spectrum, including Mucorales) — liposome-encapsulated formulation for reduced nephrotoxicity"
mechanism: >
  Polyene macrolide that binds ergosterol in the fungal cell membrane,
  forming transmembrane channels that disrupt membrane integrity, allow
  leakage of intracellular contents (potassium, magnesium), and produce
  fungicidal activity. Liposomal encapsulation in unilamellar vesicles
  (~80 nm) preferentially delivers amphotericin to fungal cells via
  ergosterol affinity while sparing mammalian cell membranes (which
  contain cholesterol with lower amphotericin affinity), markedly
  reducing nephrotoxicity, infusion reactions, and electrolyte wasting
  vs conventional amphotericin B deoxycholate. Broadest spectrum of any
  antifungal: most Candida (including azole-resistant), Aspergillus
  (active, fungicidal), Cryptococcus, ENDEMIC mycoses (Histoplasma,
  Blastomyces, Coccidioides, Sporothrix), AND Mucorales (Mucor,
  Rhizopus, Lichtheimia, Cunninghamella) — the latter is critical
  because echinocandins and most azoles do not cover Mucorales.
  NOT active against Aspergillus terreus, Trichosporon (intrinsically
  resistant), or Pseudallescheria. FDA-approved 1997.
regulatory_status:
  fda:
    approved: true
    year_first_approval: 1997
    indications_brief:
      - "Empirical antifungal therapy in persistent neutropenic fever (alternative to echinocandin)"
      - "Cryptococcal meningitis (induction with flucytosine)"
      - "Visceral leishmaniasis"
      - "Invasive aspergillosis (alternative to voriconazole / isavuconazole)"
      - "Mucormycosis (first-line — no equivalent alternative)"
      - "Endemic mycoses (severe disseminated histoplasmosis, blastomycosis, coccidioidomycosis)"
  ema:
    approved: true
    year_first_approval: 1990
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: true
    reimbursement_indications:
      - "Інвазивні мікози у пацієнтів з імуносупресією (Mucormycosis — обов'язково L-AmB; інвазивний аспергільоз; кандидоз з нирковою недостатністю)"
      - "Емпірична антифунгальна терапія при персистуючій FN (альтернатива caspofungin/micafungin)"
      - "Криптококовий менінгіт (індукція з flucytosine)"
    last_verified: "2026-04-27"
    notes: "Зареєстровано в Україні (AmBisome). NSZU-covered. ВАЖЛИВО: ОБИРАТИ ліпосомальну формуляцію (AmBisome), а НЕ конвенційний amphotericin B deoxycholate (значно вищий ризик нефротоксичності). Перевірено drlz.com.ua 2026-04-27."
typical_dosing: >
  Empirical antifungal in persistent FN (adult): 3 mg/kg IV once daily
  over 60-120 min infusion. Documented invasive aspergillosis: 5 mg/kg
  IV daily. Mucormycosis: 5-10 mg/kg IV daily — higher doses (10
  mg/kg) often used initially for CNS or rhino-orbital-cerebral
  involvement until clinical response. Cryptococcal meningitis
  induction: 3-4 mg/kg IV daily + flucytosine 100 mg/kg/day PO ×
  2 weeks. Visceral leishmaniasis: 3 mg/kg IV daily × 5 days, then
  day 14 and day 21. Pediatric: same mg/kg dosing. Renal: no formal
  dose adjustment but monitor renal function closely; nephrotoxicity
  reduced vs conventional ~75% but NOT eliminated. Hepatic: no
  adjustment. Premedication for infusion reaction (less common with
  liposomal but still seen): acetaminophen + diphenhydramine
  ± hydrocortisone 25-50 mg IV. K+ and Mg+ supplementation often
  required. Test dose (1 mg over 10 min) historically used; not
  required for liposomal formulation per most modern protocols.
formulations:
  - "IV powder for reconstitution: 50 mg vial; reconstituted to 4 mg/mL liposomal suspension, then diluted to 0.2-2 mg/mL with D5W (NOT NS — precipitation)"
absolute_contraindications:
  - "Hypersensitivity to amphotericin B or any liposomal-formulation excipient"
  - "Concurrent leukocyte transfusion (severe pulmonary toxicity reported)"
black_box_warnings: []
common_adverse_events:
  - "Infusion reaction (chills, fever, rigors, nausea, vomiting) — ~10-25% (less than conventional ~70-80%)"
  - "Hypokalemia — ~30-40% (often requires aggressive K+ replacement)"
  - "Hypomagnesemia — ~20-30%"
  - "Renal impairment (rising creatinine, decreased eGFR) — ~10-25% (less than conventional ~50%)"
  - "Anemia — ~10-15%"
  - "Mild transaminitis — ~10-15%"
  - "Hyperbilirubinemia — ~5-10%"
  - "Headache — ~10%"
  - "Hypotension during infusion — ~5-10%"
  - "Tachycardia — ~5%"
  - "Hyperglycemia — ~5%"
  - "Diarrhea — ~5-10%"
  - "Local infusion-site reaction / phlebitis — ~5-10%"
  - "Dyspnea — ~5-10%"
serious_adverse_events:
  - "Severe nephrotoxicity (rising creatinine, oliguric renal failure, sometimes irreversible) — risk markedly reduced vs conventional but persists"
  - "Severe electrolyte wasting (K+, Mg++) with cardiac arrhythmia"
  - "Severe immediate infusion reaction (anaphylactoid; distinct from chills/fever — bronchospasm, hypotension, chest pain)"
  - "Acute pulmonary edema / hypoxia (uncommon; often during rapid infusion or with leukocyte transfusion)"
  - "Severe hepatic dysfunction (rare)"
  - "Bone marrow suppression (anemia common; severe pancytopenia rare)"
  - "Stevens-Johnson syndrome / TEN (rare)"
  - "Cardiac arrhythmia (typically secondary to hypokalemia)"
  - "Acidosis / renal tubular acidosis"
major_interactions:
  - "Nephrotoxic drugs (aminoglycosides, vancomycin, cyclosporine, tacrolimus, foscarnet, NSAIDs, IV contrast): additive nephrotoxicity — avoid combination or monitor renal function intensively"
  - "Corticosteroids: enhance hypokalemia (additive K+ wasting)"
  - "Digoxin: hypokalemia from amphotericin potentiates digoxin toxicity"
  - "Antiarrhythmics (class IA / III): hypokalemia / hypomagnesemia potentiate arrhythmia"
  - "Skeletal muscle relaxants (succinylcholine, vecuronium): hypokalemia potentiates blockade"
  - "Leukocyte transfusion: severe pulmonary toxicity — separate by ≥4 h"
  - "Other antifungals (azoles, echinocandins, flucytosine): often used in combination for severe infection; pharmacokinetic interactions minimal"
  - "Zidovudine, ganciclovir: additive bone marrow suppression"
  - "Live vaccines: avoid during active fungal infection"
pharmacology:
  half_life_hours: 100  # 100-150 h beta phase; long terminal phase
  clearance: "Reticuloendothelial uptake; minimal renal excretion of unchanged drug; long terminal phase"
  protein_binding_pct: 95
  metabolism: "Largely uncharacterized; not significantly metabolized by CYP enzymes; eliminated slowly via reticuloendothelial system after liposomal degradation — accumulation possible with prolonged use"
sources:
  - SRC-NCCN-BCELL-2025
  - SRC-NCCN-MM-2025
last_reviewed: "2026-04-27"
reviewer_signoffs: []
notes: >
  The ONLY broad antifungal with robust Mucorales activity — first-line
  for documented mucormycosis (rhino-orbital-cerebral, pulmonary,
  cutaneous) where no echinocandin or fluconazole-class alternative
  works. Also first-line for visceral leishmaniasis and induction
  therapy for cryptococcal meningitis. In febrile neutropenia,
  alternative to echinocandin when echinocandin spectrum gaps are
  concerning (Mucor, Cryptococcus, Trichosporon, Fusarium suspected),
  patient is intolerant to echinocandins, or response failure to
  empirical echinocandin. CRITICAL: ALWAYS prescribe AmBisome
  (liposomal) — NOT amphotericin B deoxycholate (conventional);
  conventional formulation has 50%+ nephrotoxicity rate and severe
  infusion reactions, supplanted by liposomal in essentially all
  modern oncology contexts. Reconstitute and dilute in D5W only —
  precipitation occurs in saline. Monitor K+, Mg++ daily and
  pre-emptively replace; renal function 2-3× weekly. Liposomal
  preserves spectrum + activity vs conventional with substantially
  better tolerability. Ukraine: registered, NSZU-covered; specify
  AmBisome on prescriptions to avoid pharmacy substitution with
  conventional formulation.
