id: DRUG-TAMOXIFEN
names:
  preferred: "Tamoxifen"
  ukrainian: "Тамоксифен"
  english: "Tamoxifen"
  brand_names: ["Nolvadex"]
atc_code: L02BA01
rxnorm_id: null
drug_class: "SERM (selective estrogen receptor modulator)"
mechanism: >
  Mixed agonist/antagonist at estrogen receptor — antagonist in breast tissue, agonist in bone, endometrium, and CV system. Classic adjuvant therapy for premenopausal HR+ breast cancer; also used in metastatic.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: true
    reimbursement_indications:
      - "Гормон-чутливий рак молочної залози (ад'ювантна, пременопауза/постменопауза)"
      - "Метастатичний гормон-чутливий рак молочної залози"
      - "Профілактика рецидиву DCIS"
    last_verified: "2026-04-27"
    notes: "Generic; reimbursed; off-patent for decades."
typical_dosing: >
  20 mg PO once daily for 5-10 years adjuvant (premenopausal); continued in metastatic until progression.

key_toxicities:
  - Hot flashes
  - Endometrial-cancer risk (~2-3x baseline; surveillance for postmenopausal bleeding)
  - Venous thromboembolism (~2-3x baseline)
  - Vaginal discharge / dryness
  - Cataract risk (modest)
  - CYP2D6 metabolism — poor metabolizers may have reduced efficacy

sources: [SRC-NCCN-BREAST-2025, SRC-ESMO-BREAST-METASTATIC-2024]
last_reviewed: null
notes: >
  Standard of care for premenopausal HR+ adjuvant. Switch to AI ± ovarian suppression after 2-5 years often considered. Postmenopausal: AI generally preferred but tamoxifen acceptable when AI contraindicated.

notes_patient: >
  Таблетка-блокатор естрогенового рецептора (SERM). Заважає естрогену стимулювати ріст пухлинних клітин грудей. Стандартна гормональна терапія для пременопаузних жінок.
