id: DRUG-ALECTINIB
names:
  preferred: "Alectinib"
  ukrainian: "Алектиніб"
  english: "Alectinib"
  brand_names: ["Alecensa"]
atc_code: L01ED03
rxnorm_id:
drug_class: "2nd-generation ALK inhibitor (CNS-penetrant)"
mechanism: >
  ALK + RET inhibitor with excellent CNS penetration. ALEX: superior PFS + intracranial response vs crizotinib in 1L ALK-rearranged metastatic. Adjuvant ALINA: 3-year DFS benefit in resected ALK+ stage IB-IIIA.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: true
    reimbursed_nszu: true
    last_verified: "2026-04-27"
    notes: "Зареєстрований; НСЗУ покриває 1L ALK+ НДРЛ — стандарт допомоги. Джерело: nszu.gov.ua (2026-04)."

    reimbursement_indications:
    - 'Програма медичних гарантій 2026: НДРЛ ALK+ 1L (ALEX)'
    - 'Реімбурсаційний пакет «Онкологія» 2026: НДРЛ ALK+ адьювант стадія IB-IIIA після резекції (ALINA)'
typical_dosing: >
  600 mg PO BID with food. Adjuvant ALINA: 600 mg BID x 2 years.

key_toxicities:
- Anemia
- Myalgia / CK elevation
- Fatigue
- Photosensitivity rash
- Bradycardia
- Hepatotoxicity

sources: [SRC-NCCN-NSCLC-2025, SRC-ESMO-NSCLC-METASTATIC-2024]
last_reviewed:
notes: >
  Workhorse 1L ALK inhibitor. CNS efficacy critical (high CNS-met rate in ALK+).

notes_patient: >
  Таблетка-TKI, що блокує ALK-fusion при раку легені. Стандарт першої лінії для ALK-позитивної форми. Добре проникає в мозок і добре переноситься.
