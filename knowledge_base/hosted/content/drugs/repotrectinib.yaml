id: DRUG-REPOTRECTINIB
names:
  preferred: "Repotrectinib"
  ukrainian: "Репотректініб"
  english: "Repotrectinib"
  synonyms: ["TPX-0005"]
  brand_names: ["Augtyro"]
atc_code: L01EX26
rxnorm_id: ""
drug_class: "Next-generation ROS1 / NTRK / ALK tyrosine kinase inhibitor"
mechanism: >
  STUB — needs full curation. Macrocyclic next-gen TKI with activity
  against ROS1 (incl. G2032R solvent-front resistance), NTRK1/2/3 (incl.
  G595R / G667C resistance), and ALK. CNS-penetrant. TRIDENT-1 (ROS1
  NSCLC): ORR 79% TKI-naive, 38% post-crizotinib (FDA 2023 ROS1 NSCLC).
  TRIDENT-1 NTRK arm: tumor-agnostic NTRK fusion (FDA 2024).

regulatory_status:
  fda:
    approved: true
    year_first_approval: 2023
    indications_brief: ["ROS1+ NSCLC (1L and post-prior ROS1-TKI)", "NTRK fusion solid tumors (tumor-agnostic, post-prior NTRK-TKI)"]
  ema:
    approved: true
    year_first_approval: 2024
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-04-27"
    notes: "STUB — pending CSD-4 verification. Not registered in UA per drlz.com.ua snapshot 2026-04-27."

typical_dosing: >
  STUB. 160 mg PO once daily x14 days, then 160 mg PO BID continuous.
  Lead-in mitigates CNS adverse events.

formulations:
  - "Capsules 40 mg"
  - "Capsules 160 mg"

absolute_contraindications: []
black_box_warnings: []
common_adverse_events:
  - "Dizziness (~60% — CNS class)"
  - "Dysgeusia"
  - "Paresthesia"
  - "Constipation"
  - "Fatigue"
  - "Ataxia / gait disturbance"
  - "Cognitive impairment (mild)"
serious_adverse_events:
  - "Severe CNS effects (cognitive, ataxia)"
  - "ILD / pneumonitis"
  - "Hepatotoxicity"
  - "Myalgia / CK elevation"
  - "Skeletal fractures (long-term, ROS1-TKI class)"
  - "Hyperuricemia"
major_interactions:
  - "STUB — strong CYP3A4 inhibitors/inducers; P-gp"

pharmacology:
  half_life_hours: 30
  clearance: "hepatic"
  protein_binding_pct: 95
  metabolism: "CYP3A4"

sources:
  - SRC-NCCN-NSCLC-2025
  - SRC-ESMO-NSCLC-METASTATIC-2024

last_reviewed: "2026-04-27"
reviewers: []
notes: >
  STUB — Phase CSD-4 promotion. Lead-in dosing schedule critical (BID
  start without lead-in significantly worsens CNS toxicity). Active
  vs G2032R ROS1 (key crizotinib-resistance mutation). Needs full
  curation of dose-adj, CNS-AE management, drug interactions.
