id: DRUG-BREXUCABTAGENE-AUTOLEUCEL
names:
  preferred: "Brexucabtagene autoleucel"
  ukrainian: "Брексукабтаген аутолейцел"
  english: "Brexucabtagene autoleucel"
  brand_names: ["Tecartus"]
atc_code: L01XX71
rxnorm_id: "2419123"
drug_class: "Anti-CD19 CD28-costimulated CAR-T cell therapy (autologous; T-cell selection by CD4/CD8 + CD19 depletion process step)"
mechanism: >
  Autologous T-cells engineered with anti-CD19 CAR (CD28 costim +
  CD3-zeta activation, identical receptor construct to axi-cel) but
  manufactured with a CD19-depletion step prior to transduction —
  reduces malignant CD19+ B-cell contamination of the apheresis
  product (clinically meaningful in leukemic MCL where circulating
  malignant cells are prominent). Following lymphodepleting
  conditioning, engineered cells expand in vivo, recognize CD19+
  B-cells, trigger cytotoxic killing.

regulatory_status:
  fda: {approved: true}
  ema: {approved: true}
  ukraine_registration:
    registered: false
    registration_number: null
    reimbursed_nszu: false
    last_verified: "2026-04-25"
    notes: "Not registered in Ukraine. Access via international referral / clinical trial / out-of-pocket only."

typical_dosing: "Target 2 × 10^6 anti-CD19 CAR+ T-cells/kg (max 2 × 10^8) — single IV infusion after fludarabine 30 mg/m² + cyclophosphamide 500 mg/m² IV days -5 to -3 lymphodepletion"
formulations: ["Cryopreserved autologous CAR-T cell suspension for IV infusion"]

absolute_contraindications:
  - "Active uncontrolled infection"
  - "Active CNS lymphoma (relative — ZUMA-2 excluded CNS)"
  - "Hypersensitivity to fludarabine or cyclophosphamide"
black_box_warnings:
  - "Cytokine release syndrome (CRS) — can be fatal"
  - "Immune effector cell-associated neurotoxicity syndrome (ICANS) — can be fatal"
  - "Hemophagocytic lymphohistiocytosis (HLH/MAS)"
  - "Prolonged cytopenia + B-cell aplasia / hypogammaglobulinemia"
  - "Secondary malignancies (T-cell lymphoma, FDA boxed 2024)"
major_interactions:
  - "Live vaccines contraindicated peri-treatment + 6+ months post"
  - "Tocilizumab + corticosteroids used FOR CRS / ICANS — but routine prophylactic steroids reduce CAR efficacy"
common_adverse_events:
  - "CRS (~91% any grade; ~15% Grade ≥3 in ZUMA-2 MCL cohort)"
  - "ICANS / neurologic AEs (~63% any grade; ~31% Grade ≥3)"
  - "Prolonged neutropenia, thrombocytopenia, anemia"
  - "Hypogammaglobulinemia / B-cell aplasia"
  - "Fever, hypotension, fatigue"
serious_adverse_events:
  - "Severe CRS (Grade ≥3 ~15%)"
  - "Severe ICANS (Grade ≥3 ~31% in MCL — higher than DLBCL setting)"
  - "HLH"
  - "Tumor lysis syndrome"
  - "Secondary T-cell malignancy"

pharmacology:
  expansion_peak: "~7-14 days post-infusion"
  persistence: "Weeks to months"

sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
notes: >
  ZUMA-2 (Wang 2020): r/r MCL after prior cBTKi (median 3 prior lines)
  — ORR 91%, CR 68%, 3-yr OS ~60%. First and only CAR-T approved for
  MCL. Higher Grade ≥3 ICANS in MCL setting (~31%) vs DLBCL (~28%) —
  MCL patients tend to be older + heavily pretreated. CD19-depletion
  manufacturing step distinguishes brexu-cel from axi-cel — needed
  due to leukemic-phase MCL contamination of apheresis. Centre must
  be FACT/JACIE/REMS-accredited. Tocilizumab on-site mandatory.
  Major UA access barrier: not registered.
