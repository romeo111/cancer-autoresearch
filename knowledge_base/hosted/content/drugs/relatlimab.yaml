    notes: "STUB — pending CSD-4 verification. Not registered in UA per drlz.com.ua snapshot 2026-04-27. Nivo+ipi remains dominant ICI doublet in UA practice."

typical_dosing: >
  STUB. Fixed combo Opdualag: relatlimab 160 mg + nivolumab 480 mg
  IV every 4 weeks.

formulations:
  - "IV fixed-dose combo (relatlimab 160 mg + nivolumab 480 mg per vial — Opdualag)"

