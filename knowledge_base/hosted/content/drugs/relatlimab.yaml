typical_dosing: >
  Fixed-dose combination Opdualag: relatlimab 160 mg + nivolumab 480
  mg IV over 30 minutes every 4 weeks. Single-vial co-formulation —
  cannot be dosed independently. Continue until disease progression,
  unacceptable toxicity, or up to 24 months. No dose adjustment for
  renal or hepatic impairment (mAb catabolism). Hold for G2-3 irAE
  (both components held); permanently discontinue for G4 irAE,
  myocarditis, or recurrent G3 despite re-treatment.

formulations:
  - "IV fixed-dose combination 160 mg relatlimab + 480 mg nivolumab per single-dose vial (Opdualag)"

absolute_contraindications:
  - "Severe hypersensitivity to relatlimab, nivolumab, or any excipient"
  - "Active solid-organ transplant on immunosuppression (high rejection risk; case-by-case)"

black_box_warnings: []

common_adverse_events:
  - "Fatigue ~40%"
  - "Pruritus / rash ~30%"
  - "Musculoskeletal pain ~30%"
  - "Diarrhea ~25%"
  - "Hypothyroidism ~15-18%"
  - "Hyperthyroidism ~5%"
  - "Headache ~15%"
  - "Vitiligo ~7%"
  - "Decreased appetite ~15%"
  - "Anemia ~25%"
  - "Increased lipase / amylase ~15%"

serious_adverse_events:
  - "Immune-mediated pneumonitis (G3+ ~2%)"
  - "Immune-mediated colitis (G3+ ~3%)"
  - "Immune-mediated hepatitis (G3+ ~6% — somewhat higher than nivo mono)"
  - "Immune-mediated endocrinopathies (thyroiditis, adrenal insufficiency, hypophysitis, type-1 DM, hypoparathyroidism — uniquely reported with rela+nivo)"
  - "Immune-mediated nephritis (~1%)"
  - "Severe cutaneous reactions (SJS / TEN — rare)"
  - "Myocarditis (rare; high mortality — baseline + serial troponin if cardiac history)"
  - "Encephalitis / GBS / myasthenic syndrome (rare)"
  - "Solid-organ transplant rejection"
  - "Hemophagocytic lymphohistiocytosis (rare)"

major_interactions:
  - "Systemic corticosteroids ≥10 mg prednisone-equivalent at baseline — may blunt activity; avoid unless required for prior irAE"
  - "Live attenuated vaccines — avoid during and ≥3 months after"
  - "Concurrent CTLA-4 inhibitors — toxicity additive; not standard"
  - "Anti-PD-1 component (nivolumab) is intentional — co-formulated"
  - "Calcineurin inhibitors in transplant — rejection vs efficacy trade-off"

pharmacology:
  half_life_hours: 270
  clearance: "non-renal (proteolytic / reticuloendothelial catabolism); ~12 days"
  protein_binding_pct: null
  metabolism: "n/a (mAb catabolism to amino acids)"

sources:
