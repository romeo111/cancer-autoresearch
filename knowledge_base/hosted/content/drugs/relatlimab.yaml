notes: >
  STUB — Phase CSD-4 promotion. Toxicity profile favorable vs nivo+ipi
  doublet (lower G3+ irAE rate). Considered in patients where ipi
  toxicity is a concern. Needs full curation of irAE-management
  algorithm (steroid hold, taper), monitoring schedule (TFTs, LFTs,
  cortisol, troponin baseline).
