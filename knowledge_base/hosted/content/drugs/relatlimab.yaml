id: DRUG-RELATLIMAB
names:
  preferred: "Relatlimab"
  ukrainian: "Релатлімаб"
  english: "Relatlimab"
  synonyms: ["BMS-986016", "relatlimab-rmbw"]
  brand_names: ["Opdualag (fixed-dose combo with nivolumab)"]
atc_code: L01FX27
rxnorm_id: ""
drug_class: "Anti-LAG-3 monoclonal antibody (immune checkpoint inhibitor)"
mechanism: >
  STUB — needs full curation. Human IgG4 antibody binding LAG-3 (CD223),
  blocking LAG-3 / MHC-II interaction → restores T-cell function. Only
  approved as fixed-dose combo with nivolumab (Opdualag).
  RELATIVITY-047: nivo + rela vs nivo monotherapy in 1L unresectable/
  metastatic melanoma → mPFS 10.2 vs 4.6 mo (HR 0.75); approved FDA 2022.

regulatory_status:
  fda:
    approved: true
    year_first_approval: 2022
    indications_brief: ["1L unresectable/metastatic melanoma (fixed combo with nivolumab — Opdualag)"]
  ema:
    approved: true
