last_reviewed: "2026-04-27"
reviewers: []
notes: >
  Toxicity profile is favorable vs nivo+ipi doublet (G3+ irAE ~21%
  vs ~55%) with comparable PFS — positions Opdualag as a less-toxic
  ICI doublet for patients in whom CTLA-4 toxicity is a major
  concern (older, frail, prior autoimmune history with caution).
  Hepatitis rate may be modestly higher than nivo monotherapy alone.
  Baseline workup: TFTs, LFTs, creatinine, cortisol, HbA1c, lipase,
  troponin if cardiac risk, HBV/HCV serology, dermatologic +
  pulmonary review, baseline imaging. Monitor TFTs / LFTs /
  creatinine before each dose for first 6 cycles. Hospitalize and
  start IV methylprednisolone 1-2 mg/kg/day for G3-4 irAE; consult
  organ-specialist; escalate to infliximab / mycophenolate / IVIG /
  ATG for steroid-refractory cases (per ASCO / NCCN / ESMO
  irAE-management guidelines). Cannot be dose-fractionated — both
  agents are co-formulated in a single vial.
