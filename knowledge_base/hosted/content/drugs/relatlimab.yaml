id: DRUG-RELATLIMAB
names:
  preferred: "Relatlimab"
  ukrainian: "Релатлімаб"
  english: "Relatlimab"
  synonyms: ["BMS-986016", "relatlimab-rmbw"]
  brand_names: ["Opdualag (fixed-dose combo with nivolumab)"]
atc_code: L01FX27
rxnorm_id: ""
drug_class: "Anti-LAG-3 monoclonal antibody (immune checkpoint inhibitor)"
mechanism: >
  Fully human IgG4 monoclonal antibody binding lymphocyte-activation
  gene 3 (LAG-3, CD223), an inhibitory checkpoint receptor expressed
  on activated/exhausted T cells, regulatory T cells, and NK cells.
  By blocking LAG-3 / MHC class II and LAG-3 / FGL1 interactions,
  relatlimab restores effector T-cell function in the tumor
  microenvironment, particularly when combined with PD-1 blockade
  (which targets a non-redundant exhaustion pathway). First-in-class
  anti-LAG-3 approved for clinical use; available only as a
  fixed-dose combination with nivolumab (Opdualag). Pivotal evidence
  RELATIVITY-047 (1L unresectable / metastatic melanoma): nivolumab +
  relatlimab vs nivolumab monotherapy mPFS 10.2 vs 4.6 mo (HR 0.75);
  G3+ irAE rate ~21% vs ~12% (clearly lower than nivo+ipi ~55%).

