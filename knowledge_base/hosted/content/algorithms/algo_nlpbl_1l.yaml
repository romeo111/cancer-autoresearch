id: ALGO-NLPBL-1L
applicable_to_disease: DIS-NLPBL
applicable_to_line_of_therapy: 1
purpose: >
  NLPBL 1L (WHO 5th-ed B-cell, formerly NLPHL): early-stage
  IA-IIA → ISRT alone or observation (default — durable remission,
  ~95% ORR); rituximab monotherapy as alternative for patients where
  RT contraindicated (young women with breast field overlap, prior
  RT, patient preference). Advanced III-IV → R-CHOP-like via FL
  aggressive pathway (CD20+ B-cell biology preserved).

output_indications:
  - IND-NLPBL-1L-OBSERVATION-OR-RT
  - IND-NLPBL-1L-RITUXIMAB-MONO
  - IND-FL-1L-RCHOP-AGGRESSIVE  # shared — for advanced NLPBL

default_indication: IND-NLPBL-1L-OBSERVATION-OR-RT
alternative_indication: IND-NLPBL-1L-RITUXIMAB-MONO

decision_tree:
  - step: 1
    evaluate:
      all_of:
        - condition: "Early stage I-II"
        - condition: "Localized disease amenable to RT"
    if_true:
      next_step: 2
    if_false:
      result: IND-FL-1L-RCHOP-AGGRESSIVE  # advanced → FL-style aggressive
    notes: "MDT-only — multi-condition fitness/eligibility AND-conjunction; cannot wire RF additively without inverting clinical intent. Restructure manually if engine routing required."

  - step: 2
    evaluate:
      any_of:
        - condition: "RT contraindicated (young patient breast/thyroid field overlap, prior RT, patient refuses)"
    if_true:
      result: IND-NLPBL-1L-RITUXIMAB-MONO
    if_false:
      result: IND-NLPBL-1L-OBSERVATION-OR-RT
    notes: "Free-text condition without matching disease-scoped RF; engine routes to default. Flag for RF authoring."

sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
notes: >
  3-arm algorithm: ISRT default for early-stage RT-amenable;
  rituximab-mono alternative for early-stage RT-contraindicated;
  R-CHOP via FL aggressive for advanced. WHO 5th-ed reclassification
  (NLPHL → NLPBL = B-cell, NOT Hodgkin) means treatment leverages
  CD20+ biology — never ABVD.
