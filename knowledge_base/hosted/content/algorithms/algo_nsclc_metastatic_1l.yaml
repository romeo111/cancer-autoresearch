id: ALGO-NSCLC-METASTATIC-1L
applicable_to_disease: DIS-NSCLC
applicable_to_line_of_therapy: 1
purpose: >
  Select 1L metastatic NSCLC regimen via molecular-cascade decision
  tree: actionable driver → driver-targeted TKI/ADC; driver-negative →
  PD-L1 TPS → ICI strategy. Stage III unresectable handled in separate
  Algorithm.

output_indications:
  - IND-NSCLC-EGFR-MUT-MET-1L
  - IND-NSCLC-ALK-MET-1L
  - IND-NSCLC-KRAS-G12C-MET-2L
  - IND-NSCLC-PDL1-HIGH-MET-1L
  - IND-NSCLC-PDL1-LOW-NONSQ-MET-1L

default_indication: IND-NSCLC-PDL1-LOW-NONSQ-MET-1L
alternative_indication: IND-NSCLC-PDL1-HIGH-MET-1L

decision_tree:
  - step: 1
    evaluate:
      any_of:
        - red_flag: RF-NSCLC-HIGH-RISK-BIOLOGY
    if_true:
      next_step: 2
    if_false:
      next_step: 5
  - step: 2
    # EGFR sensitizing mutation (ex19del / L858R / ex20ins covered by RF set)
    # → osimertinib 1L (FLAURA) or amivantamab+chemo for ex20ins (PAPILLON).
    evaluate:
      any_of:
        - red_flag: RF-NSCLC-EGFR-EX19DEL-ACTIONABLE
        - red_flag: RF-NSCLC-EGFR-EX20INS-ACTIONABLE
        - condition: "EGFR L858R or other classical sensitizing mutation"
    if_true:
      result: IND-NSCLC-EGFR-MUT-MET-1L
    if_false:
      next_step: 3
  - step: 3
    # ALK fusion → alectinib/brigatinib/lorlatinib 1L.
    evaluate:
      any_of:
        - red_flag: RF-NSCLC-ALK-FUSION-ACTIONABLE
    if_true:
      result: IND-NSCLC-ALK-MET-1L
    if_false:
      next_step: 4
  - step: 4
    # Other actionable drivers — ROS1 / KRAS G12C / BRAF V600E / MET ex14 /
    # RET fusion / NTRK fusion / HER2-mut. KRAS G12C is 2L+ only (no 1L
    # G12C-inhibitor approval); other drivers route to per-driver 1L when
    # an Indication exists (deferred — currently routes to KRAS-G12C-MET-2L
    # placeholder per pre-CSD-6A behaviour).
    evaluate:
      any_of:
        - red_flag: RF-NSCLC-MET-EX14-ACTIONABLE
        - red_flag: RF-NSCLC-RET-FUSION-ACTIONABLE
        - red_flag: RF-NSCLC-ROS1-FUSION-ACTIONABLE
        - red_flag: RF-NSCLC-NTRK-FUSION-ACTIONABLE
        - red_flag: RF-NSCLC-BRAF-V600E-ACTIONABLE
    if_true:
      result: IND-NSCLC-KRAS-G12C-MET-2L
    if_false:
      next_step: 5
    notes: "MDT-only — driver-positive cohort routes to 2L+ targeted regimen as a placeholder (1L per-driver Indications not yet authored for ROS1/MET/RET/NTRK/BRAF V600E in this KB; PROD-5 territory). KRAS G12C deliberately excluded from 1L (no approved 1L G12Ci)."
  - step: 5
    evaluate:
      any_of:
        - condition: "PD-L1 TPS ≥50%"
    if_true:
      result: IND-NSCLC-PDL1-HIGH-MET-1L
    if_false:
      result: IND-NSCLC-PDL1-LOW-NONSQ-MET-1L
    notes: "Free-text condition without matching disease-scoped RF; engine routes to default. Flag for RF authoring."

sources: [SRC-NCCN-NSCLC-2025, SRC-ESMO-NSCLC-METASTATIC-2024]
last_reviewed: null
notes: >
  Decision tree intentionally simplified for MVP. KRAS G12C step routes
  to KRAS-G12C-MET-2L (which is 2L+ per current guidelines); for true
  1L driver-targeting of ROS1 / BRAF / MET / RET / NTRK / HER2, additional
  per-driver indications would be required (deferred). Driver-negative
  branches into PD-L1-stratified ICI ± chemo.
