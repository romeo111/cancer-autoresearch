id: ALGO-MM-1L
applicable_to_disease: DIS-MM
applicable_to_line_of_therapy: 1
purpose: >
  Select default + alternative Indication for first-line multiple myeloma
  based on cytogenetic risk category and patient fitness. Outputs the
  two-plan pair required by CHARTER §2 — VRd (standard-risk default) vs
  D-VRd (high-risk default; alternative shown for standard-risk patients
  with funding pathway).

output_indications:
  - IND-MM-1L-VRD
  - IND-MM-1L-DVRD

default_indication: IND-MM-1L-VRD
alternative_indication: IND-MM-1L-DVRD

decision_tree:
  # Step 1 — high-risk cytogenetics OR aggressive plasma-cell biology
  # (PCL, EMD, rapid lab progression) escalates to D-VRd quadruplet.
  - step: 1
    evaluate:
      any_of:
        - red_flag: RF-MM-HIGH-RISK-CYTOGENETICS
        - red_flag: RF-MM-TRANSFORMATION-PROGRESSION
    if_true:
      result: IND-MM-1L-DVRD
    if_false:
      next_step: 2

  # Step 2 — frailty doesn't switch indication (both VRd / D-VRd have
  # dose-modified schedules) but is recorded in trace so render layer
  # surfaces it. We pin to IND-MM-1L-VRD here as the de-escalated
  # default; the dose-modification is a Regimen-level concern handled
  # by the supportive_care + monitoring_schedule plumbing.
  - step: 2
    evaluate:
      any_of:
        - red_flag: RF-MM-FRAILTY-AGE
    if_true:
      result: IND-MM-1L-VRD
    if_false:
      next_step: 3

  - step: 3
    evaluate:
      all_of:
        - condition: "Standard-risk cytogenetics (no high-risk FISH abnormality)"
        - condition: "ECOG ≤ 2"
    if_true:
      result: IND-MM-1L-VRD
    if_false:
      result: IND-MM-1L-VRD
    notes: "MDT-only — multi-condition fitness/eligibility AND-conjunction; cannot wire RF additively without inverting clinical intent. Restructure manually if engine routing required."

sources:
  - SRC-NCCN-MM-2025
  - SRC-ESMO-MM-2023

last_reviewed: "2026-04-27"
notes: >
  Cytogenetic risk + aggressive biology are the primary regimen
  determinants; frailty is recorded but doesn't switch regimen
  (handled at Regimen dose-modification layer). Transplant eligibility is
  a downstream consideration that affects total cycle count and post-
  induction pathway (ASCT + consolidation + maintenance vs continuous
  induction-then-maintenance), but not the induction regimen choice.
  Both Indications carry CI-LENALIDOMIDE-PREGNANCY and
  CI-BORTEZOMIB-SEVERE-NEUROPATHY; D-VRd additionally carries
  CI-HBV-NO-PROPHYLAXIS. RF-MM-RENAL-DYSFUNCTION (investigate)
  triggers dose adjustment but does not shift regimen choice.
  RF-MM-INFECTION-SCREENING (hold) operates via parallel
  SUP-HBV-PROPHYLAXIS, not a decision-tree branch.

  Etiology rails (parallel to indication selection):

  - HBV (HBsAg+ OR anti-HBc+) — entecavir 0.5 mg PO daily before first
    daratumumab or isatuximab dose, continued through induction +
    ≥12 months post-last-anti-CD38. Anti-CD38 mAbs have documented HBV
    reactivation risk (FDA labels; NCCN MM 2.2025). For VRd-only (no
    anti-CD38), HBV reactivation risk is lower but entecavir still
    recommended in HBsAg+ on prolonged steroid pulse. CI-HBV-NO-
    PROPHYLAXIS (extended 2026-04-27 to cover daratumumab) is a hard
    contraindication on D-VRd, blocking plan finalization until
    SUP-HBV-PROPHYLAXIS is acknowledged.

  - HCV — Less common in MM cohort; treat MM first and coordinate DAA
    timing with hepatologist. Avoid sofosbuvir + amiodarone interaction.

  HIV+ MM is rare (older population, typically post-PCP / post-PJP era);
  manage per ART-aware MM consensus (continue ART, prefer integrase-
  inhibitor backbone, no empiric VRd dose-reduction). BIO-HBV-STATUS,
  BIO-HCV-STATUS, BIO-HIV-STATUS missing — flagged for future round.
