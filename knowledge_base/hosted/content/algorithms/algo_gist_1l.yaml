id: ALGO-GIST-1L
applicable_to_disease: DIS-GIST
applicable_to_line_of_therapy: 1
purpose: >
  Select 1L systemic therapy for advanced / metastatic GIST (and
  high-risk adjuvant) by KIT/PDGFRA genotype. Imatinib for the
  imatinib-sensitive majority (~85%); avapritinib for the
  imatinib-resistant PDGFRA D842V subset (~7%). KIT exon 9 dose
  escalation (400 → 800 mg) is encoded inside REG-IMATINIB-GIST-1L
  rather than as a separate Indication.

output_indications:
  - IND-GIST-1L-IMATINIB
  - IND-GIST-1L-AVAPRITINIB-PDGFRA-D842V

default_indication: IND-GIST-1L-IMATINIB
alternative_indication: IND-GIST-1L-AVAPRITINIB-PDGFRA-D842V

decision_tree:
  - step: 1
    evaluate:
      any_of:
        - condition: "PDGFRA D842V mutation positive"
    if_true:
      result: IND-GIST-1L-AVAPRITINIB-PDGFRA-D842V
    if_false:
      next_step: 2
    notes: "Free-text condition without matching disease-scoped RF; engine routes to default. Flag for RF authoring."
  - step: 2
    evaluate:
      any_of:
        - condition: "KIT exon 11 mutation positive"
        - condition: "KIT exon 9 mutation positive"
        - condition: "PDGFRA non-D842V exon 18 OR exon 12 OR exon 14 mutation positive"
    if_true:
      result: IND-GIST-1L-IMATINIB
    if_false:
      next_step: 3
    notes: "Free-text condition without matching disease-scoped RF; engine routes to default. Flag for RF authoring."
  - step: 3
    evaluate:
      any_of:
        - condition: "KIT/PDGFRA wild-type (SDH-deficient OR NF1-mutant OR uncharacterized)"
    if_true:
      result: IND-GIST-1L-IMATINIB
    if_false:
      result: IND-GIST-1L-IMATINIB
    notes: "Free-text condition without matching disease-scoped RF; engine routes to default. Flag for RF authoring."

sources:
  - SRC-NCCN-GIST-2025
  - SRC-ONCOKB
last_reviewed: '2026-04-26'
notes: >
  Decision tree intentionally simplified for MVP: KIT/PDGFRA-WT
  (SDH-deficient or NF1-mutant) GIST is routed to imatinib as the
  fallback default but is in fact imatinib-refractory — clinically
  these patients should go to clinical trial / sunitinib /
  regorafenib. Authoring an explicit IND-GIST-1L-WT-CLINICAL-TRIAL
  is deferred (no trial-ID source dependency curated). KIT exon 9
  dose-escalation (400 → 800 mg) is encoded inside
  REG-IMATINIB-GIST-1L dose_adjustments; not a separate Indication.
