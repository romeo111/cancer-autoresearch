id: ALGO-CLL-2L
applicable_to_disease: DIS-CLL
applicable_to_line_of_therapy: 2
purpose: 'Select 2L+/relapsed CLL Indication based on which 1L mechanism failed. Three tracks: (1) post-cBTKi failure → switch class to BCL2-inhibitor — IND-CLL-2L-VENR-MURANO (venetoclax+rituximab MURANO regimen); (2) post-VenO (venetoclax+obinutuzumab) failure → switch back to BTKi — IND-CLL-1L-ZANUBRUTINIB (also valid as 2L for VenO-1L failures, better cardiac safety); (3) post-cBTKi+BCL2i (both failed) OR documented BTK-C481 mutation → IND-CLL-3L-PIRTOBRUTINIB (non-covalent BTKi).

  '
output_indications:
- IND-CLL-2L-VENR-MURANO
- IND-CLL-1L-ZANUBRUTINIB
- IND-CLL-3L-PIRTOBRUTINIB
default_indication: IND-CLL-2L-VENR-MURANO
alternative_indication: IND-CLL-3L-PIRTOBRUTINIB
decision_tree:
- step: 1
  evaluate:
    any_of:
    - red_flag: RF-CLL-POST-BTKI-C481-ACTIONABLE
    - red_flag: RF-CLL-TRANSFORMATION-PROGRESSION
  if_true:
    result: IND-CLL-3L-PIRTOBRUTINIB
  if_false:
    next_step: 2
  notes: "Wired via RF-CLL-POST-BTKI-C481-ACTIONABLE (CSD-9A): C481S/PLCG2 resistance after cBTKi routes to pirtobrutinib (BRUIN, Mato 2021 — ORR 82%, mPFS 19.6 mo); transformation also routes here pending DLBCL-algo handoff upstream."
- step: 2
  evaluate:
    all_of:
    - red_flag: RF-PRIOR-BTKI-PROGRESSION
    - none_of:
      - red_flag: RF-CLL-VEN-RESISTANT-ACTIONABLE
  if_true:
    result: IND-CLL-2L-VENR-MURANO
  if_false:
    next_step: 3
  notes: "Wired via RF-PRIOR-BTKI-PROGRESSION + none_of RF-CLL-VEN-RESISTANT-ACTIONABLE (CSD-9A): post-cBTKi failure with venetoclax-naive disease (no BCL2-G101V, no prior-ven PD) routes to MURANO ven+rituximab; ven-resistant cases fall through to step 3 BTKi class-switch."
- step: 3
  evaluate:
    all_of:
    - any_of:
      - red_flag: RF-CLL-VEN-RESISTANT-ACTIONABLE
    - none_of:
      - red_flag: RF-PRIOR-BTKI-PROGRESSION
  if_true:
    result: IND-CLL-1L-ZANUBRUTINIB
  if_false:
    result: IND-CLL-2L-VENR-MURANO
  notes: "Wired via RF-CLL-VEN-RESISTANT-ACTIONABLE (CSD-9A) + none_of RF-PRIOR-BTKI-PROGRESSION: venetoclax progression in cBTKi-naive patients routes back to BTKi class (zanubrutinib); cBTKi-exposed ven-resistant cases were already captured at step 1 via RF-CLL-POST-BTKI-C481-ACTIONABLE."
sources:
- SRC-NCCN-BCELL-2025
- SRC-ESMO-CLL-2024
last_reviewed: '2026-04-26'
notes: 'OOS / wiring gaps: (1) Lisocabtagene maraleucel (TRANSCEND CLL-004) for double-exposed CLL — not modeled. (2) Allogeneic SCT for high-risk young double-refractory — referral outside KB. (3) Richter transformation detection should route to ALGO-DLBCL — must be resolved upstream at disease-resolution. (4) Reuse of IND-CLL-1L-ZANUBRUTINIB as 2L is intentional — same regimen, different indication line; acceptable per existing applicable_to.line_of_therapy semantics (regimen-level reuse). Surface for hematologist: should we author dedicated IND-CLL-2L-ZANUBRUTINIB to make line semantics explicit? (5) Idelalisib / duvelisib (PI3Ki) — not modeled (largely abandoned due to immune toxicity).

  '
