id: ALGO-CLL-2L
applicable_to_disease: DIS-CLL
applicable_to_line_of_therapy: 2
purpose: >
  Select 2L+/relapsed CLL Indication based on which 1L mechanism failed.
  Three tracks: (1) post-cBTKi failure → switch class to BCL2-inhibitor —
  IND-CLL-2L-VENR-MURANO (venetoclax+rituximab MURANO regimen); (2)
  post-VenO (venetoclax+obinutuzumab) failure → switch back to BTKi —
  IND-CLL-1L-ZANUBRUTINIB (also valid as 2L for VenO-1L failures, better
  cardiac safety); (3) post-cBTKi+BCL2i (both failed) OR documented
  BTK-C481 mutation → IND-CLL-3L-PIRTOBRUTINIB (non-covalent BTKi).

output_indications:
  - IND-CLL-2L-VENR-MURANO
  - IND-CLL-1L-ZANUBRUTINIB
  - IND-CLL-3L-PIRTOBRUTINIB

default_indication: IND-CLL-2L-VENR-MURANO
alternative_indication: IND-CLL-3L-PIRTOBRUTINIB

decision_tree:
  # Step 1 — both cBTKi + BCL2i failed OR BTK-C481-mut → pirtobrutinib.
  - step: 1
    evaluate:
      any_of:
        - condition: "Both prior cBTKi AND venetoclax-based regimen failed (≥2 prior lines)"
        - condition: "BTK-C481 mutation documented at progression"
    if_true:
      result: IND-CLL-3L-PIRTOBRUTINIB
    if_false:
      next_step: 2

  # Step 2 — post-cBTKi failure (single mechanism): switch to BCL2i.
  - step: 2
    evaluate:
      all_of:
        - condition: "Prior 1L cBTKi (ibrutinib/acalabrutinib/zanubrutinib) failed"
        - condition: "Venetoclax-naive"
    if_true:
      result: IND-CLL-2L-VENR-MURANO
    if_false:
      next_step: 3

  # Step 3 — post-VenO failure: switch back to BTKi (zanubrutinib preferred).
  - step: 3
    evaluate:
      all_of:
        - condition: "Prior 1L venetoclax+obinutuzumab failed"
        - condition: "cBTKi-naive OR BTK-WT"
    if_true:
      result: IND-CLL-1L-ZANUBRUTINIB
    if_false:
      result: IND-CLL-2L-VENR-MURANO

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-ESMO-CLL-2024

last_reviewed: "2026-04-26"
notes: >
  OOS / wiring gaps:
  (1) Lisocabtagene maraleucel (TRANSCEND CLL-004) for double-exposed
  CLL — not modeled.
  (2) Allogeneic SCT for high-risk young double-refractory — referral
  outside KB.
  (3) Richter transformation detection should route to ALGO-DLBCL —
  must be resolved upstream at disease-resolution.
  (4) Reuse of IND-CLL-1L-ZANUBRUTINIB as 2L is intentional — same
  regimen, different indication line; acceptable per existing
  applicable_to.line_of_therapy semantics (regimen-level reuse).
  Surface for hematologist: should we author dedicated
  IND-CLL-2L-ZANUBRUTINIB to make line semantics explicit?
  (5) Idelalisib / duvelisib (PI3Ki) — not modeled (largely abandoned
  due to immune toxicity).
