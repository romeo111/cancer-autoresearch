id: ALGO-SMZL-1L
applicable_to_disease: DIS-SPLENIC-MZL
applicable_to_line_of_therapy: 1
purpose: >
  Select default + alternative for first-line splenic MZL based on HCV
  status. HCV-positive → DAA antiviral therapy first (lymphoma often
  regresses with viral cure); HCV-negative → rituximab monotherapy.

output_indications:
  - IND-SMZL-1L-HCV-POSITIVE
  - IND-SMZL-1L-RITUXIMAB

default_indication: IND-SMZL-1L-RITUXIMAB
alternative_indication: IND-SMZL-1L-HCV-POSITIVE

decision_tree:
  - step: 1
    evaluate:
      all_of:
        - red_flag: RF-SMZL-INFECTION-SCREENING  # HCV RNA / anti-HCV positive
        - condition: "HCV RNA detectable (anti-HCV alone insufficient)"
        - condition: "Compensated liver function (no decompensated cirrhosis)"
    if_true:
      result: IND-SMZL-1L-HCV-POSITIVE
    if_false:
      next_step: 2
  - step: 2
    evaluate:
      all_of:
        - condition: "HCV RNA negative OR no antiviral candidate"
        - condition: "CD20+ histology confirmed"
    if_true:
      result: IND-SMZL-1L-RITUXIMAB
    if_false:
      result: IND-SMZL-1L-RITUXIMAB
    notes: "MDT-only after CSD-7A audit — composite is biomarker/disease-specific (not fitness/eligibility/prior-therapy), so no pan-disease RF applies. Wireable only via dedicated disease-specific RFs in a future round."

sources: [SRC-NCCN-BCELL-2025, SRC-ESMO-MZL-2024]
last_reviewed: "2026-04-27"
notes: >
  HCV testing MANDATORY. If HCV-RNA detectable AND compensated liver →
  DAA pathway (REG-DAA-SOF-VEL). Anti-HCV-seropositive but HCV-RNA
  undetectable (post-spontaneous-clearance or post-prior-DAA) does NOT
  qualify for IND-SMZL-1L-HCV-POSITIVE — route to rituximab. Decompensated
  cirrhosis = HCV-positive route blocked → rituximab fallback +
  hepatology consult.

  Etiology rails (parallel to indication selection):

  - HCV (driver) — primary algorithm step (above).
  - HBV (HBsAg+ OR anti-HBc+) — entecavir before rituximab on the HCV-
    negative arm; also coordinated with DAA on HCV+ arm if HBV+ co-
    infection (ESMO MZL 2024 §HBV-coinfection note: occult HBV
    reactivation under anti-CD20 + DAA-induced HCV clearance is a
    documented risk requiring concurrent HBV antiviral).
  - HIV — rare in SMZL; standard ART continuation; rituximab acceptable.

  BIO-HBV-STATUS, BIO-HIV-STATUS missing — flagged.
