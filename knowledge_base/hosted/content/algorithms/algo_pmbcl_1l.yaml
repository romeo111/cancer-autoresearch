id: ALGO-PMBCL-1L
applicable_to_disease: DIS-PMBCL
applicable_to_line_of_therapy: 1
purpose: >
  Select 1L PMBCL regimen. DA-EPOCH-R preferred (better PFS, RT-sparing);
  R-CHOP + ISRT acceptable alternative.

output_indications:
  - IND-PMBCL-1L-DA-EPOCH-R
  - IND-PMBCL-1L-RCHOP-RT

default_indication: IND-PMBCL-1L-DA-EPOCH-R
alternative_indication: IND-PMBCL-1L-RCHOP-RT

decision_tree:
  # Step 1 — frailty/age check first: fragile elderly tolerate R-CHOP+RT
  # better than infusional DA-EPOCH-R (NCCN B-cell 2025).
  - step: 1
    evaluate:
      any_of:
        - red_flag: RF-PMBCL-FRAILTY-AGE
    if_true:
      result: IND-PMBCL-1L-RCHOP-RT
    if_false:
      next_step: 2
  # Step 2 — center capability / patient preference fallback to R-CHOP+RT.
  - step: 2
    evaluate:
      any_of:
        - condition: "Center cannot deliver infusional DA-EPOCH-R safely"
        - condition: "Patient prefers shorter chemo + RT"
        - red_flag: RF-PMBCL-ORGAN-DYSFUNCTION
    if_true:
      result: IND-PMBCL-1L-RCHOP-RT
    if_false:
      result: IND-PMBCL-1L-DA-EPOCH-R

sources: [SRC-NCCN-BCELL-2025]
last_reviewed: "2026-04-25"
notes: >
  Both arms NCCN-recommended. End-of-induction PET-CT decides RT для
  R-CHOP arm — handled у Plan tracking, not algorithm.
