id: WORKUP-SUSPECTED-GBM
applicable_to:
  lineage_hints:
    - glioblastoma
    - high_grade_glioma
    - solid_tumor_brain_gbm
    - brain_tumor_suspect
  tissue_locations:
    - brain
    - cerebrum
    - cerebellum
    - brainstem
  presentation_keywords:
    - new_neurologic_deficit
    - new_seizure
    - first_seizure_adult
    - mass_effect
    - brain_mri_mass
    - enhancing_brain_lesion
    - midline_shift
    - increased_intracranial_pressure
    - progressive_headache_with_focal_signs

# Pre-biopsy diagnostic workup for suspected glioblastoma / high-grade glioma
# per NCCN CNS v2.2025 and EANO GBM 2024.
required_tests:
  - TEST-MRI-BRAIN-CONTRAST             # multimodal MRI baseline mandatory
  - TEST-CBC
  - TEST-CMP
  - TEST-LFT
  - TEST-COAG-PANEL                     # pre-craniotomy / stereotactic biopsy

desired_tests:
  - TEST-MGMT-METHYLATION               # reflex on resection / biopsy specimen
  - TEST-IDH-MUTATION                   # WHO 2021 classification — IDH-wt = GBM
  - TEST-NGS-COMPREHENSIVE              # CDKN2A, EGFR, TERT, +7/-10 for integrated diagnosis
  - TEST-CECT-CAP                       # rule out metastatic primary if imaging atypical

mandatory_questions:
  - "Steroid use prior to MRI (dexamethasone masks contrast enhancement; document dose / start date)?"
  - "Seizure activity — type, frequency, current AED and dose?"
  - "Anticoagulation / antiplatelet therapy (must hold before stereotactic biopsy or craniotomy)?"
  - "History of prior cancer (rules out brain metastasis on differential — alters surgical plan)?"
  - "Prior cranial radiotherapy (radiation-induced glioma differential)?"
  - "Functional status / cognitive baseline (KPS / MoCA — drives extent-of-resection vs biopsy decision)?"
  - "Family history of brain tumors / Li-Fraumeni / NF1 / Lynch / Turcot syndrome?"

sources:
  - SRC-NCCN-CNS-2025
  - SRC-EANO-GBM-2024

last_reviewed: "2026-04-25"
notes: >
  Pre-steroid MRI is preferred when feasible — corticosteroids cause
  rapid radiographic regression of enhancement that obscures lesion
  margins and confounds extent-of-resection planning. Multimodal MRI
  (T1+C, T2/FLAIR, DWI, perfusion, MRS) is mandatory. Tissue
  acquisition: maximal safe resection is preferred over stereotactic
  biopsy when feasible (5-ALA-guided improves extent of gross-total
  resection). Stereotactic biopsy alone for deep / eloquent / midline
  unresectable lesions. Integrated WHO 2021 diagnosis requires IDH +
  MGMT + 1p/19q (for differential) + relevant molecular markers
  (CDKN2A homozygous deletion, EGFR amplification, +7/-10, TERT
  promoter) — order all at biopsy/resection. Ophthalmology /
  neurology consultation pre-procedure if visual fields or focal
  deficits.
