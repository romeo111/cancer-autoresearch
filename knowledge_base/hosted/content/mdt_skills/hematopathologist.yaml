notes: 'STUB — subspecialized pathologist for lymphoid + myeloid neoplasms. Owns: WHO 5th-ed classification
  mapping, IHC panel design (CD20/CD3/CD5/CD10/CD23/BCL2/BCL6/MYC/Ki67), flow cytometry interpretation,
  FISH (MYC/BCL2/BCL6 break-apart), Hans algorithm (ABC vs GCB DLBCL), gene-rearrangement studies. Critical
  for differentiating lymphoma subtypes — without rich hematopathology, you can''t pick the right Tier
  1 algorithm.'
