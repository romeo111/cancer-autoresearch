notes: 'STUB — autoSCT/alloSCT decision-making. Activates for: first-line consolidation in transplant-eligible
  MCL + high-risk DLBCL; salvage transplant for relapsed/refractory aggressive lymphomas; alloSCT for
  relapsed CLL/T-cell. Triggers: fit_for_transplant + ECOG ≤ 2 + age ≤ 70-75 (relative).'
