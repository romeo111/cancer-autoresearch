id: TEST-DERMATOSCOPY
names:
  preferred: "Dermatoscopy / dermoscopy of pigmented lesion"
  ukrainian: "Дермоскопія пігментованого утворення"
  english: "Dermatoscopy"
  synonyms: ["Dermoscopy", "Epiluminescence microscopy"]
loinc_codes: []
category: clinical_assessment
purpose: >
  In-office magnified evaluation of pigmented skin lesions to triage
  ABCDE-suspicious lesions for excisional biopsy; reduces benign-lesion
  biopsy rate and improves early melanoma detection.
specimen: "Surface optical examination (no specimen)"
turnaround_time: "Same visit"
priority_class: critical
availability_ukraine:
  state_funded: true
  typical_availability: "Dermato-oncology centers; growing in primary care"
sources:
  - SRC-NCCN-MELANOMA-2025
  - SRC-ESMO-MELANOMA-2024
last_reviewed: "2026-04-25"
notes: >
  STUB. Use 7-point checklist or 3-point checklist; refer all suspect
  lesions for full-thickness excisional biopsy with 1-3 mm margin
  (NEVER shave or punch a melanoma suspect — depth-determination is
  destroyed).
