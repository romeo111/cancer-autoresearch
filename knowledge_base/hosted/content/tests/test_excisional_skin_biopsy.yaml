id: TEST-EXCISIONAL-SKIN-BIOPSY
names:
  preferred: "Full-thickness excisional skin biopsy with 1-3 mm margin"
  ukrainian: "Повношарова ексцизійна біопсія шкіри з відступом 1-3 мм"
  english: "Excisional skin biopsy"
loinc_codes: []
category: histology
purpose: >
  Definitive tissue diagnosis of pigmented or otherwise suspect skin
  lesions; provides Breslow thickness, ulceration, mitotic rate, and
  margin assessment essential for melanoma staging.
specimen: "Full-thickness ellipse including subcutaneous fat, oriented"
turnaround_time: "Pathology 5-10 days"
priority_class: critical
availability_ukraine:
  state_funded: true
  typical_availability: "Universal at dermato-surgical and oncology centers"
sources:
  - SRC-NCCN-MELANOMA-2025
  - SRC-ESMO-MELANOMA-2024
last_reviewed: "2026-04-25"
notes: >
  STUB. Avoid shave or partial biopsy of pigmented lesions where
  melanoma is in the differential — depth measurement is required for
  staging and is destroyed by partial sampling. Re-excise wider per
  Breslow-based margin guidelines after diagnosis.
