id: TEST-CA125
names:
  preferred: "Serum CA-125"
  ukrainian: "Сироватковий CA-125"
  english: "CA-125"
loinc_codes: ["10334-1"]
category: lab
purpose: >
  Tumor marker for epithelial ovarian / fallopian-tube / primary
  peritoneal carcinoma; baseline pretreatment, used in ROMA index for
  adnexal mass triage, monitoring response and recurrence.
specimen: "Serum (gold-top tube)"
turnaround_time: "1-2 days"
priority_class: critical
availability_ukraine:
  state_funded: true
  typical_availability: "Universal at oncology and gynecology centers"
sources:
  - SRC-NCCN-OVARIAN-2025
  - SRC-ESMO-OVARIAN-2024
last_reviewed: "2026-04-25"
notes: >
  STUB. Not specific for ovarian cancer (elevated in endometriosis,
  PID, pregnancy, cirrhosis, menses). Combine with HE4 + ROMA in
  premenopausal patients to improve specificity.
