id: TEST-ENDOMETRIAL-BIOPSY
names:
  preferred: "Endometrial sampling (Pipelle or hysteroscopy with D&C)"
  ukrainian: "Біопсія ендометрія (Pipelle або гістероскопія з вишкрібанням)"
  english: "Endometrial biopsy"
  synonyms: ["Pipelle biopsy", "Hysteroscopic biopsy", "D&C"]
loinc_codes: []
category: histology
purpose: >
  Definitive tissue diagnosis for endometrial carcinoma in patients
  with abnormal uterine bleeding or thickened endometrium; enables
  histologic typing, grade, and molecular classification.
specimen: "Endometrial tissue (Pipelle or curettage)"
turnaround_time: "Procedure same week; pathology 5-10 days"
priority_class: critical
availability_ukraine:
  state_funded: true
  typical_availability: "Pipelle in office settings; hysteroscopy at gynecology hospitals"
sources:
  - SRC-NCCN-UTERINE-2025
  - SRC-ESMO-ENDOMETRIAL-2022
last_reviewed: "2026-04-25"
notes: >
  STUB. Pipelle sensitivity ~90% for endometrial carcinoma; non-diagnostic
  or persistent bleeding → hysteroscopy with directed biopsy. Reflex
  molecular classification (POLE / MMR / p53) per ESMO 2022 stratifies
  adjuvant therapy.
