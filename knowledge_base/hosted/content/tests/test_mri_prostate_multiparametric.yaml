id: TEST-MRI-PROSTATE-MULTIPARAMETRIC
names:
  preferred: "Multiparametric prostate MRI (T2 + DWI + DCE) — PI-RADS v2.1"
  ukrainian: "Мультипараметрична МРТ простати (T2 + DWI + DCE), PI-RADS v2.1"
  english: "mp-MRI prostate"
  synonyms: ["mpMRI", "Prostate MRI", "PI-RADS MRI"]
loinc_codes: ["49118-3"]
category: imaging
purpose: >
  Pre-biopsy lesion localization and PI-RADS scoring to direct
  targeted (MRI/US-fusion) biopsy; reduces clinically insignificant
  cancer detection; assesses local extent (extracapsular, seminal
  vesicle invasion).
specimen: "Imaging procedure (multiparametric protocol with gadolinium)"
turnaround_time: "2-4 days"
priority_class: critical
availability_ukraine:
  state_funded: false
  typical_availability: "Major oncology and academic centers; private; protocol quality variable"
sources:
  - SRC-NCCN-PROSTATE-2025
  - SRC-EAU-PROSTATE-2024
  - SRC-ESMO-PROSTATE-2024
last_reviewed: "2026-04-25"
notes: >
  STUB. EAU 2024: pre-biopsy mp-MRI now standard-of-care for biopsy-naive
  patients with suspicion. PI-RADS ≥3 lesions trigger targeted biopsy.
  PI-RADS 1-2 + low-risk PSA can defer biopsy with shared decision.
