id: TEST-MAMMOGRAPHY-DIAGNOSTIC
names:
  preferred: "Diagnostic mammography (bilateral) ± tomosynthesis"
  ukrainian: "Діагностична мамографія (двостороння) ± томосинтез"
  english: "Diagnostic mammography"
  synonyms: ["DBT", "Bilateral mammogram"]
loinc_codes: ["24604-1"]
category: imaging
purpose: >
  First-line breast imaging for any palpable mass, focal pain, nipple
  discharge, or screening abnormality in women ≥30. Tomosynthesis
  improves cancer detection and reduces recall in dense breasts.
specimen: "Imaging procedure (no specimen)"
turnaround_time: "Same day; report within 1-2 days"
priority_class: critical
availability_ukraine:
  state_funded: true
  typical_availability: "Widely available in regional centers; tomosynthesis limited to major oncology hospitals"
sources:
  - SRC-NCCN-BREAST-2025
  - SRC-ESMO-BREAST-EARLY-2024
last_reviewed: "2026-04-25"
notes: >
  STUB. Combine with bilateral breast US for women <40 or with dense
  breasts. BI-RADS 4-5 lesions require core-needle biopsy under
  image guidance.
