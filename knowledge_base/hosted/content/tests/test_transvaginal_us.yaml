id: TEST-TRANSVAGINAL-US
names:
  preferred: "Transvaginal pelvic ultrasound"
  ukrainian: "Трансвагінальне УЗД органів малого тазу"
  english: "Transvaginal US"
  synonyms: ["TVUS", "TVS"]
loinc_codes: ["38090-3"]
category: imaging
purpose: >
  First-line imaging for postmenopausal bleeding (endometrial
  thickness assessment) and adnexal mass characterization (IOTA
  Simple Rules / O-RADS).
specimen: "Transvaginal probe imaging (no specimen)"
turnaround_time: "Same day"
priority_class: critical
availability_ukraine:
  state_funded: true
  typical_availability: "Universal"
sources:
  - SRC-NCCN-UTERINE-2025
  - SRC-NCCN-OVARIAN-2025
  - SRC-ESMO-ENDOMETRIAL-2022
  - SRC-ESMO-OVARIAN-2024
last_reviewed: "2026-04-25"
notes: >
  STUB. Postmenopausal endometrial thickness >4 mm with bleeding →
  endometrial biopsy mandatory. Adnexal mass with O-RADS 4-5 →
  CA-125 + tumor-board referral.
