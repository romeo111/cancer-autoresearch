id: TEST-PELVIC-MRI
names:
  preferred: "Pelvic MRI with contrast (gynecologic protocol)"
  ukrainian: "МРТ органів малого тазу з контрастом (гінекологічний протокол)"
  english: "Pelvic MRI"
loinc_codes: ["43480-4"]
category: imaging
purpose: >
  Local-stage assessment of endometrial, ovarian, and cervical
  carcinomas; superior to CT for depth of myometrial invasion,
  cervical stromal involvement, and parametrial extension.
specimen: "Imaging procedure (gadolinium contrast)"
turnaround_time: "2-4 days"
priority_class: standard
availability_ukraine:
  state_funded: false
  typical_availability: "Major oncology and academic centers"
sources:
  - SRC-NCCN-UTERINE-2025
  - SRC-NCCN-OVARIAN-2025
  - SRC-ESMO-ENDOMETRIAL-2022
last_reviewed: "2026-04-25"
notes: >
  STUB. For endometrial carcinoma: assess myometrial invasion >50%,
  cervical involvement, lymph nodes. For ovarian: characterize
  indeterminate adnexal mass when US ambiguous.
