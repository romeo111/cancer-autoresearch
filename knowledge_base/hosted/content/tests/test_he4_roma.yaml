id: TEST-HE4-ROMA
names:
  preferred: "Serum HE4 + ROMA index"
  ukrainian: "Сироватковий HE4 + індекс ROMA"
  english: "HE4 with ROMA"
loinc_codes: ["62315-1"]
category: lab
purpose: >
  Adnexal-mass triage; combined with CA-125 in the ROMA algorithm to
  stratify pre-/post-menopausal women into high/low risk of epithelial
  ovarian cancer for referral to gynecologic oncologist.
specimen: "Serum (gold-top tube)"
turnaround_time: "2-3 days"
priority_class: standard
availability_ukraine:
  state_funded: false
  typical_availability: "Private and major oncology labs"
sources:
  - SRC-NCCN-OVARIAN-2025
  - SRC-ESMO-OVARIAN-2024
last_reviewed: "2026-04-25"
notes: >
  STUB. Higher specificity than CA-125 alone in premenopausal women
  (less false-positive elevation in benign gynecologic conditions).
