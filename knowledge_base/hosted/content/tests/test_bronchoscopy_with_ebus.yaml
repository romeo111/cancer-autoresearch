id: TEST-BRONCHOSCOPY-WITH-EBUS
names:
  preferred: "Flexible bronchoscopy with EBUS-TBNA"
  ukrainian: "Гнучка бронхоскопія з EBUS-TBNA"
  english: "Bronchoscopy with EBUS"
  synonyms: ["EBUS-TBNA", "Endobronchial US"]
loinc_codes: []
category: histology
purpose: >
  Tissue sampling of central lung lesions and mediastinal lymph nodes
  for both diagnosis and N-staging in NSCLC and SCLC. Preferred for
  central tumors and N1/N2 nodes.
specimen: "Bronchial / transbronchial biopsy + lymph-node FNA"
turnaround_time: "Procedure same week; pathology 5-10 days"
priority_class: critical
availability_ukraine:
  state_funded: true
  typical_availability: "Major oncology and pulmonology centers; EBUS confined to ~10 hospitals"
sources:
  - SRC-NCCN-NSCLC-2025
  - SRC-NCCN-SCLC-2025
  - SRC-ESMO-NSCLC-EARLY-2024
last_reviewed: "2026-04-25"
notes: >
  STUB. CT-guided transthoracic core biopsy is alternative for
  peripheral lesions. EBUS-TBNA is the preferred modality for
  mediastinal staging when N2/N3 disease is suspected on imaging.
