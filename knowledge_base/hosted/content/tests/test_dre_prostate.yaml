id: TEST-DRE-PROSTATE
names:
  preferred: "Digital rectal examination of the prostate"
  ukrainian: "Пальцеве ректальне обстеження простати"
  english: "DRE"
  synonyms: ["Prostate DRE"]
loinc_codes: []
category: clinical_assessment
purpose: >
  Tactile assessment of prostate symmetry, nodules, and induration as
  part of initial diagnostic workup; contributes to clinical T-stage.
specimen: "Physical examination (no specimen)"
turnaround_time: "Same visit"
priority_class: critical
availability_ukraine:
  state_funded: true
  typical_availability: "Universal — performed by urologist or family physician"
sources:
  - SRC-NCCN-PROSTATE-2025
  - SRC-EAU-PROSTATE-2024
last_reviewed: "2026-04-25"
notes: >
  STUB. PSA + DRE remain complementary in screening; abnormal DRE
  warrants biopsy regardless of PSA per EAU 2024.
