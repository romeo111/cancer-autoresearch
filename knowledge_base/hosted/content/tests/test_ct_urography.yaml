id: TEST-CT-UROGRAPHY
names:
  preferred: "CT urography (multi-phase with excretory phase)"
  ukrainian: "КТ-урографія (мультифазна з екскреторною фазою)"
  english: "CT urography"
  synonyms: ["CTU", "IVU-CT"]
loinc_codes: ["30781-5"]
category: imaging
purpose: >
  Evaluation of upper urinary tract for hematuria workup; detects
  upper-tract urothelial carcinoma (UTUC), renal masses, and
  parenchymal pathology. Excretory phase essential for urothelial
  evaluation.
specimen: "Imaging with iodinated IV contrast"
turnaround_time: "1-2 days"
priority_class: critical
availability_ukraine:
  state_funded: true
  typical_availability: "Most regional radiology centers"
sources:
  - SRC-NCCN-BLADDER-2025
  - SRC-EAU-BLADDER-2024
last_reviewed: "2026-04-25"
notes: >
  STUB. Indicated for any unexplained hematuria. Renal-protocol MR
  urography alternative for iodine allergy or impaired renal function.
