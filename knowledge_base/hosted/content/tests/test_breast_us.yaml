id: TEST-BREAST-US
names:
  preferred: "Bilateral breast and axillary ultrasound"
  ukrainian: "Двостороннє УЗД молочних залоз і пахвових ділянок"
  english: "Breast US"
  synonyms: ["Breast sonography"]
loinc_codes: ["24628-0"]
category: imaging
purpose: >
  Adjunct to mammography for characterizing palpable mass, evaluating
  dense breast tissue, guiding core-needle biopsy, and screening
  axillary nodes for clinical staging.
specimen: "Imaging procedure (no specimen)"
turnaround_time: "Same day"
priority_class: critical
availability_ukraine:
  state_funded: true
  typical_availability: "Universal"
sources:
  - SRC-NCCN-BREAST-2025
  - SRC-ESMO-BREAST-EARLY-2024
last_reviewed: "2026-04-25"
notes: >
  STUB. Primary imaging modality in women <30 or pregnancy. Axillary
  US-FNA of suspicious nodes upstages clinical N0 → N1 in ~25% of
  invasive cancers.
