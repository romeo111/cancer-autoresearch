id: TEST-CYSTOSCOPY
names:
  preferred: "Cystoscopy with biopsy / TURBT"
  ukrainian: "Цистоскопія з біопсією / ТУР сечового міхура"
  english: "Cystoscopy"
  synonyms: ["TURBT", "Bladder cystoscopy"]
loinc_codes: []
category: histology
purpose: >
  Direct visualization of bladder mucosa, biopsy of suspicious lesions,
  and transurethral resection of bladder tumor (TURBT) for diagnosis,
  staging (muscle-invasive vs non-muscle-invasive), and initial
  management.
specimen: "Bladder biopsy / TURBT specimen with detrusor muscle"
turnaround_time: "Procedure same week; pathology 5-10 days"
priority_class: critical
availability_ukraine:
  state_funded: true
  typical_availability: "Universal — every regional urology center"
sources:
  - SRC-NCCN-BLADDER-2025
  - SRC-EAU-BLADDER-2024
last_reviewed: "2026-04-25"
notes: >
  STUB. Detrusor muscle in specimen mandatory for accurate T-staging.
  Re-TURBT within 6 weeks for high-grade T1 or absent muscle. Blue-light
  cystoscopy (HAL) increases detection of CIS.
