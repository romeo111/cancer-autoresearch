  grades:
    '1': Asymptomatic
    '2': Symptomatic; medical intervention indicated
    '3': Severe symptoms; intervention indicated
    '4': Life-threatening consequences; urgent intervention indicated
    '5': Death
  definition: A disorder characterized by leakage of intravascular fluids into the
