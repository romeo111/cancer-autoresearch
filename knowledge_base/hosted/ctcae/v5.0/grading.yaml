- code: CTCAE.hypertension
  meddra_code: '10020772'
  term: Hypertension
  soc_category: Vascular disorders
  grades:
    '1': 'Adult: Systolic BP 120 - 139 mm Hg or diastolic BP 80 - 89 mm Hg;


      Pediatric: Systolic/diastolic BP >90th percentile but< 95th percentile;


      Adolescent: BP ≥120/80 even if < 95th percentile'
    '2': 'Adult: Systolic BP 140 - 159 mm Hg or diastolic BP 90 - 99 mm Hg if previously
      WNL; change in baseline medical intervention indicated; recurrent or persistent
      (>=24 hrs); symptomatic increase by >20 mm Hg (diastolic) or to >140/90 mm Hg;
      monotherapy indicated initiated;


      Pediatric and adolescent: Recurrent or persistent (>=24 hrs) BP >ULN; monotherapy
      indicated; systolic and /or diastolic BP between the 95th percentile and 5 mmHg
      above the 99th percentile;


      Adolescent: Systolic between 130-139 or diastolic between 80-89 even if < 95th
      percentile'
    '3': 'Adult: Systolic BP >=160 mm Hg or diastolic BP >=100 mm Hg; medical intervention
      indicated; more than one drug or more intensive therapy than previously used
      indicated;


      Pediatric and adolescent: Systolic and/or diastolic > 5 mmHg above the 99th
      percentile'
    '4': 'Adult and Pediatric: Life-threatening consequences (e.g., malignant hypertension,
      transient or permanent neurologic deficit, hypertensive crisis); urgent intervention
      indicated'
    '5': Death
  definition: A disorder characterized by a pathological increase in blood pressure.
  navigational_note: null
