version: v5.0
source_url: https://evs.nci.nih.gov/ftp1/CTCAE/CTCAE_5.0/CTCAE_v5.0_2017-11-27.xlsx
license: Public domain (NCI)
adverse_events:
- code: CTCAE.anemia
  meddra_code: '10002272'
  term: Anemia
  soc_category: Blood and lymphatic system disorders
  grades:
    '1': Hemoglobin (Hgb) <LLN - 10.0 g/dL; <LLN - 6.2 mmol/L; <LLN - 100 g/L
    '2': Hgb <10.0 - 8.0 g/dL; <6.2 - 4.9 mmol/L; <100 - 80g/L
    '3': Hgb <8.0 g/dL; <4.9 mmol/L; <80 g/L; transfusion indicated
    '4': Life-threatening consequences; urgent intervention indicated
    '5': Death
  definition: A disorder characterized by a reduction in the amount of hemoglobin
    in 100 ml of blood. Signs and symptoms of anemia may include pallor of the skin
    and mucous membranes, shortness of breath, palpitations of the heart, soft systolic
    murmurs, lethargy, and fatigability.
  navigational_note: null
- code: CTCAE.blood_and_lymphatic_system_disorders_other_specify
  meddra_code: '10005329'
  term: Blood and lymphatic system disorders - Other, specify
  soc_category: Blood and lymphatic system disorders
  grades:
    '1': Asymptomatic or mild symptoms; clinical or diagnostic observations only;
      intervention not indicated
    '2': Moderate; minimal, local or noninvasive intervention indicated; limiting
      age-appropriate instrumental ADL
    '3': Severe or medically significant but not immediately life-threatening; hospitalization
      or prolongation of existing hospitalization indicated; limiting self care ADL
    '4': Life-threatening consequences; urgent intervention indicated
    '5': Death
  definition: '-'
  navigational_note: null
- code: CTCAE.bone_marrow_hypocellular
  meddra_code: '10048580'
  term: Bone marrow hypocellular
  soc_category: Blood and lymphatic system disorders
  grades:
    '1': Mildly hypocellular or <=25% reduction from normal cellularity for age
    '2': Moderately hypocellular or >25 - <50% reduction from normal cellularity for
      age
    '3': Severely hypocellular or >50 - <=75% reduction cellularity from normal for
      age
    '4': Aplastic persistent for longer than 2 weeks
    '5': Death
  definition: A disorder characterized by the inability of the bone marrow to produce
    hematopoietic elements.
  navigational_note: null
- code: CTCAE.disseminated_intravascular_coagulation
  meddra_code: '10013442'
  term: Disseminated intravascular coagulation
  soc_category: Blood and lymphatic system disorders
  grades:
    '1': '-'
    '2': Laboratory findings with no bleeding
    '3': Laboratory findings and bleeding
    '4': Life-threatening consequences; urgent intervention indicated
    '5': Death
  definition: A disorder characterized by systemic pathological activation of blood
    clotting mechanisms which results in clot formation throughout the body. There
    is an increase in the risk of hemorrhage as the body is depleted of platelets
    and coagulation factors.
  navigational_note: null
- code: CTCAE.eosinophilia
  meddra_code: '10014950'
  term: Eosinophilia
  soc_category: Blood and lymphatic system disorders
  grades:
    '1': '>ULN and >Baseline'
    '2': '-'
    '3': Steroids initiated
    '4': '-'
    '5': '-'
  definition: A disorder characterized by laboratory test results that indicate an
    increased number of eosinophils in the blood.
  navigational_note: null
- code: CTCAE.febrile_neutropenia
  meddra_code: '10016288'
  term: Febrile neutropenia
  soc_category: Blood and lymphatic system disorders
  grades:
    '1': '-'
    '2': '-'
    '3': ANC <1000/mm3 with a single temperature of >38.3 degrees C (101 degrees F)
      or a sustained temperature of >=38 degrees C (100.4 degrees F) for more than
      one hour
    '4': Life-threatening consequences; urgent intervention indicated
    '5': Death
  definition: A disorder characterized by an ANC <1000/mm3 and a single temperature
    of >38.3 degrees C (101 degrees F) or a sustained temperature of >=38 degrees
    C (100.4 degrees F) for more than one hour
  navigational_note: null
- code: CTCAE.hemolysis
  meddra_code: '10019491'
  term: Hemolysis
  soc_category: Blood and lymphatic system disorders
  grades:
    '1': Laboratory evidence of hemolysis only (e.g., direct antiglobulin test; DAT;
      Coombs'; schistocytes; decreased haptoglobin)
    '2': Evidence of hemolysis and >=2 g decrease in hemoglobin
    '3': Transfusion or medical intervention indicated (e.g., steroids)
    '4': Life-threatening consequences; urgent intervention indicated
    '5': Death
  definition: A disorder characterized by laboratory test results that indicate widespread
    erythrocyte cell membrane destruction.
  navigational_note: null
- code: CTCAE.hemolytic_uremic_syndrome
  meddra_code: '10019515'
  term: Hemolytic uremic syndrome
  soc_category: Blood and lymphatic system disorders
  grades:
    '1': '-'
    '2': '-'
    '3': Laboratory findings with clinical consequences (e.g., renal insufficiency,
      petechiae)
    '4': Life-threatening consequences, (e.g., CNS hemorrhage or thrombosis/embolism
      or renal failure)
    '5': Death
  definition: A disorder characterized by a form of thrombotic microangiopathy with
    renal failure, hemolytic anemia, and severe thrombocytopenia.
  navigational_note: null
- code: CTCAE.leukocytosis
  meddra_code: '10024378'
  term: Leukocytosis
  soc_category: Blood and lymphatic system disorders
  grades:
    '1': '-'
    '2': '-'
    '3': '>100,000/mm3'
    '4': Clinical manifestations of leucostasis; urgent intervention indicated
    '5': Death
  definition: A disorder characterized by laboratory test results that indicate an
    increased number of white blood cells in the blood.
  navigational_note: null
- code: CTCAE.lymph_node_pain
  meddra_code: '10025182'
  term: Lymph node pain
  soc_category: Blood and lymphatic system disorders
  grades:
    '1': Mild pain
    '2': Moderate pain; limiting instrumental ADL
    '3': Severe pain; limiting self care ADL
    '4': '-'
    '5': '-'
  definition: A disorder characterized by a sensation of marked discomfort in a lymph
    node.
  navigational_note: null
- code: CTCAE.methemoglobinemia
  meddra_code: '10027506'
  term: Methemoglobinemia
  soc_category: Blood and lymphatic system disorders
  grades:
    '1': '-'
    '2': '>ULN'
    '3': Requiring urgent intervention
    '4': Life-threatening consequences
    '5': Death
  definition: A disorder characterized by laboratory test results that indicate increased
    methemoglobin in the blood.
  navigational_note: null
- code: CTCAE.thrombotic_thrombocytopenic_purpura
  meddra_code: '10043648'
  term: Thrombotic thrombocytopenic purpura
  soc_category: Blood and lymphatic system disorders
  grades:
    '1': '-'
    '2': '-'
    '3': Laboratory findings with clinical consequences (e.g., renal insufficiency,
      petechiae)
    '4': Life-threatening consequences, (e.g., CNS hemorrhage or thrombosis/embolism
      or renal failure)
    '5': Death
  definition: A disorder characterized by the presence of microangiopathic hemolytic
    anemia, thrombocytopenic purpura, fever, renal abnormalities and neurological
    abnormalities such as seizures, hemiplegia, and visual disturbances. It is an
    acute or subacute condition.
  navigational_note: null
- code: CTCAE.aortic_valve_disease
  meddra_code: '10061589'
  term: Aortic valve disease
  soc_category: Cardiac disorders
  grades:
    '1': Asymptomatic valvular thickening with or without mild valvular regurgitation
      or stenosis by imaging
    '2': Asymptomatic; moderate regurgitation or stenosis by imaging
    '3': Symptomatic; severe regurgitation or stenosis by imaging; symptoms controlled
      with medical intervention
    '4': Life-threatening consequences; urgent intervention indicated (e.g., valve
      replacement, valvuloplasty)
    '5': Death
  definition: A disorder characterized by a defect in aortic valve function or structure.
  navigational_note: null
- code: CTCAE.asystole
  meddra_code: '10003586'
  term: Asystole
  soc_category: Cardiac disorders
  grades:
    '1': Periods of asystole; non-urgent medical management indicated
    '2': '-'
    '3': '-'
    '4': Life-threatening consequences; urgent intervention indicated
    '5': Death
  definition: A disorder characterized by a dysrhythmia without cardiac electrical
    activity. Typically, this is accompanied by cessation of the pumping function
    of the heart.
  navigational_note: null
- code: CTCAE.atrial_fibrillation
  meddra_code: '10003658'
  term: Atrial fibrillation
  soc_category: Cardiac disorders
  grades:
    '1': Asymptomatic, intervention not indicated
    '2': Non-urgent medical intervention indicated
    '3': Symptomatic, urgent intervention indicated; device (e.g., pacemaker); ablation;
      new onset
    '4': Life-threatening consequences; embolus requiring urgent intervention
    '5': Death
  definition: A disorder characterized by a dysrhythmia without discernible P waves
    and an irregular ventricular response due to multiple reentry circuits. The rhythm
    disturbance originates above the ventricles.
  navigational_note: null
- code: CTCAE.atrial_flutter
  meddra_code: '10003662'
  term: Atrial flutter
  soc_category: Cardiac disorders
  grades:
    '1': Asymptomatic, intervention not indicated
    '2': Non-urgent medical intervention indicated
    '3': Symptomatic, urgent intervention indicated; device (e.g., pacemaker); ablation
    '4': Life-threatening consequences; embolus requiring urgent intervention
    '5': Death
  definition: A disorder characterized by a dysrhythmia with organized rhythmic atrial
    contractions with a rate of 200-300 beats per minute. The rhythm disturbance originates
    in the atria.
  navigational_note: null
- code: CTCAE.atrioventricular_block_complete
  meddra_code: '10003673'
  term: Atrioventricular block complete
  soc_category: Cardiac disorders
  grades:
    '1': '-'
    '2': Non-urgent intervention indicated
    '3': Symptomatic and incompletely controlled medically, or controlled with device
      (e.g., pacemaker); new onset
    '4': Life-threatening consequences; urgent intervention indicated
    '5': Death
  definition: A disorder characterized by a dysrhythmia with complete failure of atrial
    electrical impulse conduction through the AV node to the ventricles.
  navigational_note: null
- code: CTCAE.atrioventricular_block_first_degree
  meddra_code: '10003674'
  term: Atrioventricular block first degree
  soc_category: Cardiac disorders
  grades:
    '1': Asymptomatic, intervention not indicated
    '2': Non-urgent intervention indicated
    '3': '-'
    '4': '-'
    '5': '-'
  definition: A disorder characterized by a dysrhythmia with a delay in the time required
    for the conduction of an electrical impulse through the atrioventricular (AV)
    node beyond 0.2 seconds; prolongation of the PR interval greater than 200 milliseconds.
  navigational_note: null
- code: CTCAE.cardiac_arrest
  meddra_code: '10007515'
  term: Cardiac arrest
  soc_category: Cardiac disorders
  grades:
    '1': '-'
    '2': '-'
    '3': '-'
    '4': Life-threatening consequences; urgent intervention indicated
    '5': Death
  definition: A disorder characterized by cessation of the pumping function of the
    heart.
  navigational_note: null
- code: CTCAE.cardiac_disorders_other_specify
  meddra_code: '10007541'
  term: Cardiac disorders - Other, specify
  soc_category: Cardiac disorders
  grades:
    '1': Asymptomatic or mild symptoms; clinical or diagnostic observations only;
      intervention not indicated
    '2': Moderate; minimal, local or noninvasive intervention indicated; limiting
      age-appropriate instrumental ADL
    '3': Severe or medically significant but not immediately life-threatening; hospitalization
      or prolongation of existing hospitalization indicated; limiting self care ADL
    '4': Life-threatening consequences; urgent intervention indicated
    '5': Death
  definition: '-'
  navigational_note: null
- code: CTCAE.chest_pain_cardiac
  meddra_code: '10008481'
  term: Chest pain - cardiac
  soc_category: Cardiac disorders
  grades:
    '1': Mild pain
    '2': Moderate pain; pain on exertion; limiting instrumental ADL; hemodynamically
      stable
    '3': Pain at rest; limiting self care ADL; cardiac catheterization; new onset
      cardiac chest pain; unstable angina
    '4': '-'
    '5': '-'
  definition: A disorder characterized by substernal discomfort due to insufficient
    myocardial oxygenation e.g., angina pectoris.
  navigational_note: 'Also consider Cardiac disorders: Myocardial infarction.'
- code: CTCAE.conduction_disorder
  meddra_code: '10010276'
  term: Conduction disorder
  soc_category: Cardiac disorders
  grades:
    '1': Mild symptoms; intervention not indicated
    '2': Non-urgent medical intervention indicated
    '3': Symptomatic, urgent intervention indicated
    '4': Life-threatening consequences
    '5': Death
  definition: A disorder characterized by pathological irregularities in the cardiac
    conduction system.
  navigational_note: null
- code: CTCAE.cyanosis
  meddra_code: '10011703'
  term: Cyanosis
  soc_category: Cardiac disorders
  grades:
    '1': '-'
    '2': Present
    '3': '-'
    '4': '-'
    '5': '-'
  definition: A disorder characterized by a bluish discoloration of the skin and/or
    mucous membranes.
  navigational_note: null
- code: CTCAE.heart_failure
  meddra_code: '10019279'
  term: Heart failure
  soc_category: Cardiac disorders
  grades:
    '1': Asymptomatic with laboratory (e.g., BNP [B-Natriuretic Peptide ]) or cardiac
      imaging abnormalities
    '2': Symptoms with moderate activity or exertion
    '3': Symptoms at rest or with minimal activity or exertion; hospitalization; new
      onset of symptoms
    '4': Life-threatening consequences; urgent intervention indicated (e.g., continuous
      IV therapy or mechanical hemodynamic support)
    '5': Death
  definition: A disorder characterized by the inability of the heart to pump blood
    at an adequate volume to meet tissue metabolic requirements, or, the ability to
    do so only at an elevation in the filling pressure.
  navigational_note: 'If left sided use Cardiac disorders: Left ventricular systolic
    dysfunction; also consider Cardiac disorders: Restrictive cardiomyopathy, Investigations:
    Ejection fraction decreased.'
- code: CTCAE.left_ventricular_systolic_dysfunction
  meddra_code: '10069501'
  term: Left ventricular systolic dysfunction
  soc_category: Cardiac disorders
  grades:
    '1': '-'
    '2': '-'
    '3': Symptomatic due to drop in ejection fraction responsive to intervention
    '4': Refractory or poorly controlled heart failure due to drop in ejection fraction;
      intervention such as ventricular assist device, intravenous vasopressor support,
      or heart transplant indicated
    '5': Death
  definition: A disorder characterized by failure of the left ventricle to produce
    adequate output.
  navigational_note: 'Also consider Investigations: Ejection fraction decreased.'
- code: CTCAE.mitral_valve_disease
  meddra_code: '10061532'
  term: Mitral valve disease
  soc_category: Cardiac disorders
  grades:
    '1': Asymptomatic valvular thickening with or without mild valvular regurgitation
      or stenosis by imaging
    '2': Asymptomatic; moderate regurgitation or stenosis by imaging
    '3': Symptomatic; severe regurgitation or stenosis by imaging; symptoms controlled
      with medical intervention
    '4': Life-threatening consequences; urgent intervention indicated (e.g., valve
      replacement, valvuloplasty)
    '5': Death
  definition: A disorder characterized by a defect in mitral valve function or structure.
  navigational_note: null
- code: CTCAE.mobitz_type_ii_atrioventricular_block
  meddra_code: '10027786'
  term: Mobitz (type) II atrioventricular block
  soc_category: Cardiac disorders
  grades:
    '1': Asymptomatic, intervention not indicated
    '2': Symptomatic; medical intervention indicated
    '3': Symptomatic and incompletely controlled medically, or controlled with device
      (e.g., pacemaker); new onset
    '4': Life-threatening consequences; urgent intervention indicated
    '5': Death
  definition: A disorder characterized by a dysrhythmia with relatively constant PR
    interval prior to the block of an atrial impulse. This is the result of intermittent
    failure of atrial electrical impulse conduction through the atrioventricular (AV)
    node to the ventricles.
  navigational_note: null
- code: CTCAE.mobitz_type_i
  meddra_code: '10027787'
  term: Mobitz type I
  soc_category: Cardiac disorders
  grades:
    '1': Asymptomatic, intervention not indicated
    '2': Symptomatic; medical intervention indicated
    '3': Symptomatic and incompletely controlled medically, or controlled with device
      (e.g., pacemaker)
    '4': Life-threatening consequences; urgent intervention indicated
    '5': Death
  definition: A disorder characterized by a dysrhythmia with a progressively lengthening
    PR interval prior to the blocking of an atrial impulse. This is the result of
    intermittent failure of atrial electrical impulse conduction through the atrioventricular
    (AV) node to the ventricles.
  navigational_note: null
- code: CTCAE.myocardial_infarction
  meddra_code: '10028596'
  term: Myocardial infarction
  soc_category: Cardiac disorders
  grades:
    '1': '-'
    '2': Asymptomatic and cardiac enzymes minimally abnormal and no evidence of ischemic
      ECG changes
    '3': Severe symptoms; cardiac enzymes abnormal; hemodynamically stable; ECG changes
      consistent with infarction
    '4': Life-threatening consequences; hemodynamically unstable
    '5': Death
  definition: A disorder characterized by gross necrosis of the myocardium; this is
    due to an interruption of blood supply to the area.
  navigational_note: null
- code: CTCAE.myocarditis
  meddra_code: '10028606'
  term: Myocarditis
  soc_category: Cardiac disorders
  grades:
    '1': '-'
    '2': Symptoms with moderate activity or exertion
    '3': Severe with symptoms at rest or with minimal activity or exertion; intervention
      indicated; new onset of symptoms
    '4': Life-threatening consequences; urgent intervention indicated (e.g., continuous
      IV therapy or mechanical hemodynamic support)
    '5': Death
  definition: A disorder characterized by inflammation of the muscle tissue of the
    heart.
  navigational_note: null
- code: CTCAE.palpitations
  meddra_code: '10033557'
  term: Palpitations
  soc_category: Cardiac disorders
  grades:
    '1': Mild symptoms; intervention not indicated
    '2': Intervention indicated
    '3': '-'
    '4': '-'
    '5': '-'
  definition: A disorder characterized by an unpleasant sensation of irregular and/or
    forceful beating of the heart.
  navigational_note: null
- code: CTCAE.paroxysmal_atrial_tachycardia
  meddra_code: '10034040'
  term: Paroxysmal atrial tachycardia
  soc_category: Cardiac disorders
  grades:
    '1': Asymptomatic, intervention not indicated
    '2': Non-urgent medical intervention indicated
    '3': Symptomatic, urgent intervention indicated; ablation
    '4': Life-threatening consequences; incompletely controlled medically; cardioversion
      indicated
    '5': Death
  definition: A disorder characterized by a dysrhythmia with abrupt onset and sudden
    termination of atrial contractions with a rate of 150-250 beats per minute. The
    rhythm disturbance originates in the atria.
  navigational_note: null
- code: CTCAE.pericardial_effusion
  meddra_code: '10034474'
  term: Pericardial effusion
  soc_category: Cardiac disorders
  grades:
    '1': '-'
    '2': Asymptomatic effusion size small to moderate
    '3': Effusion with physiologic consequences
    '4': Life-threatening consequences; urgent intervention indicated
    '5': Death
  definition: A disorder characterized by fluid collection within the pericardial
    sac, usually due to inflammation.
  navigational_note: null
- code: CTCAE.pericardial_tamponade
  meddra_code: '10053565'
  term: Pericardial tamponade
  soc_category: Cardiac disorders
  grades:
    '1': '-'
    '2': '-'
    '3': '-'
    '4': Life-threatening consequences; urgent intervention indicated
    '5': Death
  definition: A disorder characterized by an increase in intrapericardial pressure
    due to the collection of blood or fluid in the pericardium.
  navigational_note: null
- code: CTCAE.pericarditis
  meddra_code: '10034484'
  term: Pericarditis
  soc_category: Cardiac disorders
  grades:
    '1': Asymptomatic, ECG or physical findings (e.g., rub) consistent with pericarditis
    '2': Symptomatic pericarditis (e.g., chest pain)
    '3': Pericarditis with physiologic consequences (e.g., pericardial constriction)
    '4': Life-threatening consequences; urgent intervention indicated
    '5': Death
  definition: A disorder characterized by irritation to the layers of the pericardium
    (the protective sac around the heart).
  navigational_note: null
- code: CTCAE.pulmonary_valve_disease
  meddra_code: '10061541'
  term: Pulmonary valve disease
  soc_category: Cardiac disorders
  grades:
    '1': Asymptomatic valvular thickening with or without mild valvular regurgitation
      or stenosis by imaging
    '2': Asymptomatic; moderate regurgitation or stenosis by imaging
    '3': Symptomatic; severe regurgitation or stenosis by imaging; symptoms controlled
      with medical intervention
    '4': Life-threatening consequences; urgent intervention indicated (e.g., valve
      replacement, valvuloplasty)
    '5': Death
  definition: A disorder characterized by a defect in pulmonary valve function or
    structure.
  navigational_note: null
- code: CTCAE.restrictive_cardiomyopathy
  meddra_code: '10038748'
  term: Restrictive cardiomyopathy
  soc_category: Cardiac disorders
  grades:
    '1': Imaging findings only
    '2': Symptomatic without signs of heart failure
    '3': Symptomatic heart failure or other cardiac symptoms, responsive to intervention;
      new onset of symptoms
    '4': Refractory heart failure or other poorly controlled cardiac symptoms
    '5': Death
  definition: A disorder characterized by an inability of the ventricles to fill with
    blood because the myocardium (heart muscle) stiffens and loses its flexibility.
  navigational_note: null
- code: CTCAE.right_ventricular_dysfunction
  meddra_code: '10058597'
  term: Right ventricular dysfunction
  soc_category: Cardiac disorders
  grades:
    '1': Asymptomatic with laboratory (e.g., BNP [B-Natriuretic Peptide ]) or cardiac
      imaging abnormalities
    '2': Symptoms with moderate activity or exertion
    '3': Severe symptoms, associated with hypoxia, right heart failure; oxygen indicated
    '4': Life-threatening consequences; urgent intervention indicated (e.g., ventricular
      assist device); heart transplant indicated
    '5': Death
  definition: A disorder characterized by impairment of right ventricular function
    associated with low ejection fraction and a decrease in motility of the right
    ventricular wall.
  navigational_note: null
- code: CTCAE.sick_sinus_syndrome
  meddra_code: '10040639'
  term: Sick sinus syndrome
  soc_category: Cardiac disorders
  grades:
    '1': Asymptomatic, intervention not indicated
    '2': Symptomatic, intervention not indicated; change in medication initiated
    '3': Symptomatic, intervention indicated
    '4': Life-threatening consequences; urgent intervention indicated
    '5': Death
  definition: A disorder characterized by a dysrhythmia with alternating periods of
    bradycardia and atrial tachycardia accompanied by syncope, fatigue and dizziness.
  navigational_note: null
- code: CTCAE.sinus_bradycardia
  meddra_code: '10040741'
  term: Sinus bradycardia
  soc_category: Cardiac disorders
  grades:
    '1': Asymptomatic, intervention not indicated
    '2': Symptomatic, intervention not indicated; change in medication initiated
    '3': Symptomatic, intervention indicated
    '4': Life-threatening consequences; urgent intervention indicated
    '5': Death
  definition: A disorder characterized by a dysrhythmia with a heart rate less than
    60 beats per minute that originates in the sinus node.
  navigational_note: null
- code: CTCAE.sinus_tachycardia
  meddra_code: '10040752'
  term: Sinus tachycardia
  soc_category: Cardiac disorders
  grades:
    '1': Asymptomatic, intervention not indicated
    '2': Symptomatic; non-urgent medical intervention indicated
    '3': Urgent medical intervention indicated
    '4': '-'
    '5': '-'
  definition: A disorder characterized by a dysrhythmia with a heart rate greater
    than 100 beats per minute that originates in the sinus node.
  navigational_note: null
- code: CTCAE.supraventricular_tachycardia
  meddra_code: '10042604'
  term: Supraventricular tachycardia
  soc_category: Cardiac disorders
  grades:
    '1': Asymptomatic, intervention not indicated
    '2': Non-urgent medical intervention indicated
    '3': Symptomatic, urgent intervention indicated
    '4': Life-threatening consequences
    '5': Death
  definition: A disorder characterized by a dysrhythmia with a heart rate greater
    than 100 beats per minute that originates above the ventricles.
  navigational_note: null
- code: CTCAE.tricuspid_valve_disease
  meddra_code: '10061389'
  term: Tricuspid valve disease
  soc_category: Cardiac disorders
  grades:
    '1': Asymptomatic valvular thickening with or without mild valvular regurgitation
      or stenosis
    '2': Asymptomatic; moderate regurgitation or stenosis by imaging
    '3': Symptomatic; severe regurgitation or stenosis; symptoms controlled with medical
      intervention
    '4': Life-threatening consequences; urgent intervention indicated (e.g., valve
      replacement, valvuloplasty)
    '5': Death
  definition: A disorder characterized by a defect in tricuspid valve function or
    structure.
  navigational_note: null
- code: CTCAE.ventricular_arrhythmia
  meddra_code: '10047281'
  term: Ventricular arrhythmia
  soc_category: Cardiac disorders
  grades:
    '1': Asymptomatic, intervention not indicated
    '2': Non-urgent medical intervention indicated
    '3': Urgent intervention indicated
    '4': Life-threatening consequences; hemodynamic compromise
    '5': Death
  definition: A disorder characterized by a dysrhythmia that originates in the ventricles.
  navigational_note: null
- code: CTCAE.ventricular_fibrillation
  meddra_code: '10047290'
  term: Ventricular fibrillation
  soc_category: Cardiac disorders
  grades:
    '1': '-'
    '2': '-'
    '3': '-'
    '4': Life-threatening consequences; hemodynamic compromise
    '5': Death
  definition: A disorder characterized by a dysrhythmia without discernible QRS complexes
    due to rapid repetitive excitation of myocardial fibers without coordinated contraction
    of the ventricles.
  navigational_note: null
- code: CTCAE.ventricular_tachycardia
  meddra_code: '10047302'
  term: Ventricular tachycardia
  soc_category: Cardiac disorders
  grades:
    '1': '-'
    '2': Non-urgent medical intervention indicated
    '3': Symptomatic, urgent intervention indicated
    '4': Life-threatening consequences; hemodynamic compromise
    '5': Death
  definition: A disorder characterized by a dysrhythmia with a heart rate greater
    than 100 beats per minute that originates distal to the bundle of His.
  navigational_note: null
- code: CTCAE.congenital_familial_and_genetic_disorders_other_specify
  meddra_code: '10010331'
