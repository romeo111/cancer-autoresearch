    '2': Symptomatic; moderate decrease in visual acuity (best corrected visual acuity
      20/40 and better or 3 lines or less decreased vision from known baseline); limiting
      instrumental ADL
    '3': Symptomatic with marked decrease in visual acuity (best corrected visual
      acuity worse than 20/40 or more than 3 lines of decreased vision from known
      baseline, up to 20/200); limiting self care ADL
    '4': Best corrected visual acuity of 20/200 or worse in the affected eye
    '5': '-'
  definition: A disorder characterized by involvement of the sclera of the eye.
