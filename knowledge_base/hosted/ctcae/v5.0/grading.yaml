- code: CTCAE.hearing_impaired
  meddra_code: '10019245'
  term: Hearing impaired
  soc_category: Ear and labyrinth disorders
  grades:
    '1': "Adults enrolled on a Monitoring Program (on a 1, 2, 4, 3, 6, and 8 kHz audiogram):\
      \ Threshold shift of 15 - 25 dB averaged at 2 contiguous test frequencies in\
      \ at least one ear;\n \nAdults not enrolled on a Monitoring Program: Subjective\
      \ change in hearing in the absence of documented hearing loss;\n\nPediatric\
      \ (on a 1, 2, 3, 4, 6, and 8 kHz audiogram): Threshold shift >20 dB hearing\
      \ loss (HL) (i.e., 25 dB HL or greater); sensorineural hearing loss (SNHL) above\
      \ 4 kHz (i.e., 6 or 8 kHz) in at least one ear"
    '2': 'Adults enrolled on a Monitoring Program (on a 1, 2, 3, 4, 6, and 8 kHz audiogram):
      Threshold shift of >25 dB averaged at 2 contiguous test frequencies in at least
      one ear;


      Adults not enrolled on a Monitoring Program: Hearing loss with hearing aid or
      intervention not indicated; limiting instrumental ADL;


      Pediatric (on a 1, 2, 3, 4, 6, and 8 kHz audiogram): Threshold shift >20 dB
      at 4 kHz in at least one ear'
    '3': "Adults enrolled on a Monitoring Program (on a 1, 2, 3, 4, 6, and 8 kHz audiogram):\
      \ Threshold shift of >25 dB averaged at 3 contiguous test frequencies in at\
      \ least one ear; therapeutic intervention indicated;\n\nAdults not enrolled\
      \ on a Monitoring Program: Hearing loss with hearing aid or intervention indicated;\
      \ limiting self care ADL; \n\nPediatric (on a 1, 2, 3, 4, 6, and 8 kHz audiogram):\
      \ Hearing loss sufficient to indicate therapeutic intervention, including hearing\
      \ aids; threshold shift >20 dB at 2 to < 4 kHz in at least one ear"
    '4': 'Adults: Decrease in hearing to profound bilateral loss (absolute threshold
      >80 dB HL at 2 kHz and above); nonservicable hearing


      Pediatric: Audiologic indication for cochlear implant; > 40 dB HL (i.e., 45
      dB HL or more); SNHL at 2 kHz and above'
    '5': '-'
  definition: A disorder characterized by partial or complete loss of the ability
    to detect or understand sounds resulting from damage to ear structures.
  navigational_note: null
